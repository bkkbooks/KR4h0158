body:
  text: 宋元詩會卷三十三兵部主事陳焯編陳瓘字瑩中南劍沙縣人少嗜學不慕進取父母勉以門户事乃一出輒中甲科掌書記湖州簽判越州州守蔡卞知其賢每事加禮而瓘已窺卞心術常欲遠之章惇入相瓘從衆道謁惇聞其名邀與細論時務瓘勸惇消朋黨持中道庶可以救弊意雖忤惇然亦驚異頗有兼收之語至都用瓘為太常博士及卞與惇合志正論遂絀哲宗每覽瓘奏章感悅約再入見執政聞而憾之出通判滄州徽宗即位召為右正言遷左司諫極論卞惇誤國之罪會蔡京逐御史龔夬瓘草疏論京未及上而已罷監揚州料院明年還為著作郎又忤宰相曾布除名逺竄最後徙台州瓘嘗著尊堯録辨正神宗時誣史宰相指以為罪私命凶人具獄脅瓘以死瓘抗辨大呼終不能害在台五年始得自便帝欲復用之終為執政所持轉徙江楚間卒年六十五紹興中賜諡忠肅接花色紅可使紫葉單可使千花小可使大子少可使繁天賦有定質我力能使遷自矜接花手可奪造化權衆聞悉驚詫遣我屢嘆吁用智固巧矣天時可易歟我欲春採菊我欲冬賞桃汝不能栽接汝巧亦徒勞雨露草必生雪霜松不死不死有本性必生亦時爾汝之所變易是亦時所為時乎不可違何物不隨時秀聚亭曉色春風裏維舟一小亭看山渾不倦坐待雪峰青崔鶠字德符雍丘人徙居陽翟登進士第調為鳳州司户參軍筠州推官徽宗初立以日食求言鶠上書數千言力白司馬光之忠直備數章惇之姦邪帝覽而善之以為相州教授蔡京嗾言者攻擊免官歸屏處十年召為殿中侍御吏既至而欽宗即位授右正言又上書極論蔡京請斬之以謝天下時論歸重俄得攣疾加龍圖閣學士主管嵩山崇福宫酴釄依柏引蔓上冒其顚春風亦已老自厭丹采媚獨留白雪花灑此千尺翠嵯峨珠籠冠縹眇冒佛髻幽香勿襲人恐為真色纍但願保明姿終日奉清對要之萬物夥汙潔自有類江月圖冥冥一葉輕不知水與天獨於灝氣中仰見素璧圓超然狂道士起視清夜闌自拈白玉笛吹此江月寒想當萬籟息逸響流空煙我從江海來形留意先還何當買魚篷追此水墨仙早春偶題寒風淅瀝鳴枯葦小鴨睡殘猶未起更教細雨結輕寒坐聽蕭蕭打窗紙石盆養蒲已抽翠雕斛栽花先弄紫擁爐閉閣賦幽香未怕春冰生硯水石牛莊間居不識春風面知從底處來紅深桃靨破緑靜水簾開物外心常挂人間事不諧從今江海去無復世推排春日落日不可盡丹林紫谷開明明遠色裏歷歷暝鴉回題績溪雪峰樓題詩最高處不為待人看記著今朝勝山明松雪寒春日村居春草門前已沒靴更無人過野人家離離細竹時聞雨淡淡疏簾不隔花婆娑園晚禽噪竹百千翅殘菊橫枝三兩花好在山園養衰疾風波不到野人家黃州道中莫愁微雨落輕雲十里長亭未墊巾流水小橋山下路馬頭無處不逢春倪濤字巨濟廣德軍人丱角能屬文年十五試太學第一遂擢進士官著作佐郎司勛員外郎朝廷有事燕雲濤力言不可輕議忤王黼貶死年三十九明年金師圍汴始憶其言官一子次韻毛達可給事秋懷結茅遠人村破屋水半扉涼葉墮清響空山轉斜暉微官卧江漢素心久依依十年天涯秋搖落幾芳菲鳥啼歲月去蝶夢東南飛平生丘壑志有言輒乖違不如孤征鴻春風自知歸謝逸字無逸臨川人文章學業為搢紳所推重以其所居溪堂稱之曰溪堂先生與弟薖俱擅詩名於江西在崇寧大觀間修身砥行不為世俗所染蓋卓然有道者王立之大裘軒小人拙生事三冬卧無帳忍寒東窗低坐待朝曦上徐徐晨光熙稍稍氣血暢熏然四體和恍若醉春釀此法祕勿傳不易車百兩君胡得此法開軒亦東向蘇公名大裘意豈在萬丈但觀名軒心人人如挾纊閨恨汲井浣我衣伐石固我墉塵埃不被體寂無人蹤通洋洋西江水我車不敢渡夙駕豈不早早行畏多露行止既有義離合亦有時衆人豈無心不如我所之送董元達讀書不作儒生酸躍馬西入金城關塞垣苦寒風氣惡歸來面皴鬚眉斑先皇召見延和殿議論慷慨天開顔謗書盈篋不復辨脫身來看江南山長江滚滚蛟龍怒扁舟此去何當還大梁城裏定相見玉川破屋應數間鐵柱觀豫章城南老子宫階前一柱立積鐵云是旌陽役萬鬼夜半舁來老蛟穴插定三江不沸騰切勿搖撼坤軸裂蒼苔包裹鱗皴皮我欲摩娑肘屢掣旌陽挈家上天去只留千夫應門户西山高處風露寒兹事恍惚從誰語安得猛士若朱亥袖柱橫山打狂虎豫章别李元中宣德舊聞諸李隱龍眠伯時已老元中少一行作吏各天涯故人落落疏星曉西山影裡識君面碧照章江眸子瞭向來問道渺多岐只今領略歸玄妙老鳳垂頭禁不語古木查牙噪春鳥身在幕府心江湖左胥右律但坐嘯第愁一葉釣魚舟不容七尺堂堂表我今歸卧靈谷雲君應紫禁鶯花繞相思有夢到茅齋細雨青燈坐林杪社日雨栁重重葉風溪細細紋清歡惟煮茗美味只羮芹飲不遭田父歸無遺細君東皋農事動舉趾待耕耘寄隱士先生骨相不封侯卜居但得林塘幽家藏玉唾幾千卷手校韋編三十秋相知四海孰青眼高卧一菴今白頭襄陽耆舊詢名德祗有龎公不入州一作襄陽耆舊節獨苦祗有龎公難與儔謝薖字幼槃操行文字與兄齊名吕居仁評無逸詩似康樂幼槃詩似元暉自謂平等之論明萬歷已酉閩人謝肇浙官京師從內府抄得其稿詫為竒事皆二謝之知已也顔魯公祠堂上皇御宇無長䇿牧羊豎子孤恩澤銀菟分印屬兒曹二十餘州齊陷賊常山死守平原拒公家兄弟聲名赫平原白首立班行忠義凛凛真嚴霜歷事四朝惟一節當年舌舐中丞血豈知丞相面如藍貌雖平易心巉巗老臣何罪死虎口到今誰為袪其銜臨風志士長悲吒矧瞻遺像嚴祠下未能立草迎送詞一奠椒漿淚盈把碧筒君不見韓潮州銀作飲盞誇工倕鐫花鏤葉太瑣碎何言豪士亦爾為又不見六一翁嘗吟鸚鵡紅螺詩華堂一釂豈不樂清歌勸酒須蛾眉吾儕山人寧有此競折圓荷為飲器細傾初作露珠圓滿引忽驚雲液碎鼻中寂寂聞妙香舌本徐徐識真味採蓮當聲花當妓豈有登臨百金費安得城西十頃塘水光搖蕩暑風涼時引碧筒如象鼻仍看翠蓋充霓裳有懷覺範上人道人心與貌俱古哦詩不復效等伍清疑仙掌露華墮新似秋空玉鈎吐要將餘事付風騷已悟玄機窺佛祖泐潭老子乳於菟果在叢林嘯風雨何當掃室祗樹園夜看金盆聽軟語我雖不是龎德公懶駕柴車入城府公如歸結白蓮社留我山邊一㕓許陳循中求賦高麗墨詩為作長句老松收煙琢玄玉可試洮州鴨頭緑來從萬里古樂浪傳到麻源第三谷要須岱郡鹿角膠搗成方解土炭嘲請君摩研寫新作一弄潺湲弔康樂李成德作二筆几以其一見貽琴不安絃製竒古可憐不入文房譜鼠鬚龍尾玉蟾蜍與汝俱成會心侣誰能好事為品題端效廣微亡輒補謫仙傳樣桂林家以暗投人吾竊取我書大俗如墨豬下慙羅趙何足數蒙公逺惠試臨池一字不成如畫虎欲報初無青玉案哦詩况乏驚人語淨鋪側理待君來愼莫躊躇畏今雨種竹闢地種修竹得方緣祕經成隂向北宇倒影落中庭直取內含素豈惟枝鬭青龍鍾玉川子猶擬抱添丁秋暑秋暑不可耐秋風殊未來何時疏畫扇無處覔涼臺誰謂月離畢空驚山殷雷愁聞老農語南畝半黃埃寄汪信民泮水傳經老蓬山著史才宦遊思引去祿養可歸來要路眼誰白浮雲心自灰少年何太健君馬獨虺隤繫纜苻離日君行殊未歸寄書問亳社有夢過江西不見揮犀柄頻驚響馬蹄殷勤具雞黍多謝德公妻喜董彥遠自仙巖歸鉢囊髙挂同僧夏遠寄巖間一把茅地僻猿猴長作伴食貧櫻筍不充庖瘦藤任拄萬峰頂野鶴來歸千歲巢簡點篋中詩幾首蒼頭特遣為君抄玉茗花佳園昨夜變春容清曉驚開玉一叢素質定欺雲液白淺粧羞退鶴翎紅似聞金谷初無種欲畫鵝溪恐未工底事餘花避三舍孤高元有史君風寄洪鴻父兒時訪道章江上燕雀羣中見阿鴻南浦飛雲看畫蝀北窗欹枕傲清風讀書長憶登山勝作尉聊甘食薺窮想見咏懷非一律鉤章棘句定能工食菜道人真是伊蒲塞頓頓園蔬入饌來紫芥寒葅參薤韭黃橙苦酒伴鹽梅蒸豚不羡貯人乳飯豆亦能羮芋魁但恐酪奴不解事攪令枵腹轉春雷過金山下作揚子江中風浪生小舟如葉任敧傾槳搖但指金山寺霧暗初疑鐵甕城絶頂逈分雙塔秀層樓危立一僧清他年來訪誅茆地吾與此鄉春水盟鳴鳩雲隂解盡却殘暉屋上鳴鳩喚婦歸不見池塘煙雨裏鴛鴦相並濕紅衣李簿家有侍兒妙麗善歌舞諸人惜其死為賦詩余亦賦草頭朝泣露漙漙樵歌暮歸丘隴寒當時座上客半醉琵琶不許近簾彈吳彩鸞寫真天上鳳皇難獨宿人間翡翠本雙棲丹青不與文簫共誰遣雉東迷雀西山間籬落秋花未得霜嫣然一笑媚秋陽可人風味撩詩興不記姚家宫樣黃徐俯字師川洪州分寧人以父禧死國事授通直郎纍官至司馬郎靖康中張邦昌僭位俯遂致仕因買婢名昌奴遇客至即呼前驅使之建炎初落職內侍鄭諶識俯于江西重其詩名言于高宗又用胡直孺汪藻薦擢右諫議大夫中書舍人紹興二年復賜進士出身遷翰林學士改端明殿簽書樞密院兼參知政事時趙鼎欲以嶽飛鎮荆襄俯持不可又劉光世乞入奏俯欲許之而鼎議大將未得離軍俯乃求去豫祠未幾卒俯有俊才從曾幾吕本中遊獨以進身由中人而與趙忠簡立異識者病之詩六卷行世白鷺洲金陵與廬陵俱出白鷺洲相望萬里江中同二水流雙廟開元天寶間衮衮見諸公不聞張與許名在臺省中唐庚字子西睂州丹稜人善屬文舉進士為宗子博士張商英薦其才提舉京畿常平商英罷相庚亦坐貶安置惠州會赦復官承議郎提舉上清太平宫歸蜀道病卒年五十一文集二十卷寄郭潛夫我昔遊瀘江泛舟奔楚宫黔江自南來胥會涪之東黔江清且碧瀘江濁而紅紅碧不相入分流如卧虹羣瀦激湍濤洶湧成戰攻須臾盡變濁混混顔色同清固不勝濁此理天下通君視開成間牛李爭長雄要之贊皇子不勝太牢公物理自古然徘徊歎無窮張曲江鐵像詩像在韶州韶人相傳明皇悔時所鑄云開元太平久錯處非一拍就令乏賢人何至相仙客直道既凋喪曲江遂疏斥汲黯困後薪賈生罷前席金鑑束高閣鐵胎空數尺妙處難形容英表良髣佛摩挲許國姿尚想立朝色同時反棄置異代長歎息雙榕水東雙榕間有叟時出遊清風衣屨古白雪鬚髯虬吟哦明月夕簸弄寒江秋驚傳里中兒不泊岸下舟君看鬼趣中有此風味不安知非黃石但恨無留侯此生鉏犂手誤入簪紳流無功折毫髮負罪平山丘政爾求澡濯聞之歎綢繆摳衣倘可親跪履安敢羞得聞半偈語一解終身憂性不喜伐國兵書非所求蜜果臣聞失旦雞已曉猶強鳴書生坐口窮抵死輸血誠嶺南貢蜜果海道趨彤庭黃蜂樂受職紫鳳助揚舲忠勤雖云至思慮良未精由來瘴癘鄉不識霜雪情土風不待講氣象昏如酲粳稻粳稻熱水泉水泉腥而况野果實豈足奉聖明未論體性殊已覺面目生食之倘有補勞者甘如餳政恐無禆益所出非和平上林寧少此下箸安可輕軒轅嘗百毒上古雜神靈武王嗜鮑魚幾諫仗老成芻蕘復何有葵藿甘自傾瘧疾示友人體中初微溫來勢如湯鑊忽然毛髮起冷撼如振鐸良久交戰罷項背如釋縛尚覺頭涔涔睂額如鑱鑿空日一寒暑有凖如契約伏枕兩晦朔枵然如空槖平生十圍腰病起如飢鶴衰髮本無幾脫去如秋籜到今僅能步出沒如尺蠖舊聞五嶺法有此萬户瘧而我自僑寓了不蒙濶略况子又持養何至亦例著此身自空虛客疾安所託請作如是觀無病亦無藥喜雨呈趙世澤去年雨多憂水潦今年雨少憂枯稿都緣縣政失中和水旱年年勤父老前時雲起雨欲落夜半風來還一掃明朝引首望雲漢屋上晨暾仍杲杲賦輸百萬未破白簿腳何緣得勾倒上書自劾欲歸去老婦挽衣傍奪藁技窮往訴北山神是夕沛然償所禱稻畦䆉稏勢已活竹裏蕭疏聲更好故應神意閔孤拙茍免歲終書下考便安杵臼伺秋成雲子滿田行可搗劒州道中見桃李盛開而梅花猶有存者桃花能紅李能白春深何處無顔色不應尚有數枝梅可是東君苦留客向來開處當嚴冬桃李未在交遊中即今已是丈人行肯與年少爭春風內前行內前車馬撥不開文德殿下宣麻回紫薇侍郎拜右相中使押赴文昌臺旄頭昨夜光照牖是夕收芒如秃帚明日化為甘雨來官家喚作調元手右相視事明日始得雨喜甚書商霖二大字賜之周公禮樂未要作致身姚宋也不惡向來兩翁當國年民間斗米才四錢鳴鵲行簷前羣鵲鳴相呼法當有客或遠書吾今何處得書尺而况賓客乘軒車平生眼中抹泥塗泛愛了不分賢愚卒為所賣罪滿軀放逐南越烹蟾蜍百口寄食西南隅三年莫知安穩無家書已自不可必更望故人雙鯉魚故人頃來絶能疏况復萬嶺千江湖雞肋曾是安拳餘至今畏客如於莬豈惟避謗謝還往此日誰肯窺吾廬杜門却掃也不惡何但忘客兼忘吾喧喧鳴鵲汝過矣曷不往噪權門朱冬雷行百蟲蟄處安如家阿香夜起推雷車一時技癢不忍爬撼動尺蠖掀龍蛇龍蛇尺蠖踞已久亦欲奮迅舒頑麻夢中一震忽驚躍發破墐户排泥沙泥沙已出雷遽止錯愕欲去難藏遮蟲蛇狼狽莫知數間有伏龍吁可嗟蛋兒歌瀘南二子天一邊思之不見今三年阮咸已老得遙集白髮自愧還欣然未看顱骨并頰顴啼中已有過秦篇諸田何得賤庶孽會斬莊賈摧強燕夜坐感懷聲斷鐘樓月文書對坐時破窗燈熖走凍研筆鋒遲名利髮將鶴風霜手欲龜何當一蓑雨披曉剪蓴絲武陵道中朝持漢使節暮作楚囚奔路入離騷國江通款乃村垣墻知地濕草木驗冬溫寂寞桃源路行人秖斷魂收景初書并示藥物乾坤心腹友江海鬢毛斑藥補他鄉闕書開故國顔何時乘下澤此日仰高山會是歸耕耦由來有賜環九日懷舍弟重陽陶令節單閼賈生年秋色蒼梧外衰顔紫菊前登高知地盡引滿覺天旋去歲京城雨茱萸對惠連夜坐懷舍弟無雲仍露坐有月更江皋沈陸傷吾道浮生憶爾曹扁舟應夏口此日數秋毫不見今三載當時已二毛雜詩惠州作八首屏迹舍人巷灌園居士橋花開不旋踵草剃復齊腰蛤吠明朝雨雞鳴暗夜潮未能全獨樂鄰里去還邀已絶經年筆仍開盡日門身謀嗟翠羽人事嘆榕根蔬食風掀市樓居水破村嶺南霜自薄何得鬢邊繁便歸良不惡未去且隨緣户口知無瘴謳歌覺有年藤箋得句後桂酒抱愁邊經術吾衰矣猶堪舉力田不死良難學全生或可幾茶隨東客到藥附廣船歸棊倦收成敗書慵卷是非關心無雜慮魂夢入精微為農沙子步附保水西鄉隱几江天逺開門佛土香時情荒徑草野色淡漁梁欲縱高秋目東偏短作墻已分詩驅使寧辭酒過差南烹人釣蛤北信客占鴉年事侵膚理憂端宿肺家向來功業興到晚詠餘霞海氣東南上野煙申酉間草平連别洞雨轉入他山道路魚鹽去樵蘇竹木還西江并北客相對各蒼顔水過魚村濕沙寬牧地平片雲明外暗斜日雨邊晴山轉秋光曲川長暝色橫瘴鄉人自樂耕釣各浮生江漲秋來雨似澆雨罷水如潮市改依高岸津喧救斷橋雲陰哭鳩婦池溢走魚苗天意良難測前時旱欲焦謾成雲暗便窗破山寒賴屋低往還天外少早晏雨中迷書册開仍闔履聲東復西何嘗有所賦得句旋安題野望賴有澄江在專供倚杖清水裁偏岸直雲截亂山平鼙鼓知農隙雞豚覺歲成却緣搖落後木杪得孤城醉眠山靜似太古日長如小年餘花猶可醉好鳥不妨眠世味門常掩時光簟已便夢中頻得句拈筆又忘筌送客之五羊不到番禺久繁雄良自如江山禹貢外城郭漢兵餘圎折明珠浦旁行異域書五羊雖足樂雙鯉未宜疏晚春寄友人眼底春愁惱殺儂揚州往事旋成空風流只合稱狂客衰颯何堪作病翁水國春深梅子雨江天日暮鯉魚風何時執手同尊酒收拾清歡笑語中春日郊外城中未省有春光城外榆槐已半黃山好更宜餘積雪水生看欲倒垂楊鶯邊日暖如人語草際風來作藥香疑此江頭有佳句為君尋取却茫茫南遷去去寬鄉託此蹤閙中無地頓衰翁未誅綺語猶輕典更賜羅浮有底功蝦菜賤時皆丙穴茅柴美處即郫筒著鞭要及春前到趂賦梅花庾嶺東初到惠州盧橘楊梅乃爾甜肯容遷謫到睂尖因行採藥非無得取足看山未害亷辨謗若為家一喙著書不直字三縑老師補處吾何敢政為宗風不敢謙次勾景山見寄韻此生正坐不知天豈有豨苓解引年但覺轉喉都是諱就令搖尾有誰憐腰金已付兒曹佩心印還當我輩傳他日乘車來問道葦間相顧共延緣收家書西川消息到南州骨肉無他歲有秋驥子解吟青玉案木蘭堪戰黑山頭即時旅思春氷拆昨夜燈花黍穗抽從此歸田應坐享故山已為理菟裘北風纍日不止寒甚寄鄭潮陽山前臘雪想紛紛風到南訛盡處村甕面不容存酒子牀頭幾欲㸑桐孫園林呼舞知衰怯窗户奔馳覺眩昏咫尺潮陽五袴國可能分我一襦溫間居未許幽人曉夢長朝朝親炷佛前香有詩為愛袁家酒無病緣抄陸氏方身雜蛋中誰是我食除蛇外總隨鄉白沙翠竹門前路疑出西郊向草堂聞勾景山補盩厔丞仍聞學道有得以詩調之發萬里一笑人言盩厔似江湖莫對丞哉歎負余别後耳根無正始向來紙尾得黃初可憐鬼谷縱橫口全讀神溪縹眇書臣朔許長錢許少何當天子念公車遣興八千岐路愁何補四十光隂老亦宜此去只堪犀首飲向來都是虎頭癡逢時有道其如命得意無言所恨遲詩債即今渾倚閣新篇惟有莫相疑聞鄭二對吏五羊舊友年來略散亡新收鄭子亦皇皇歲云暮矣無雙雁我所思兮在五羊獄吏事權先自貴書生蹤迹况能狂風流人物今餘幾何忍羣兒復謗傷重陽後二日從無盡泛舟遊處士臺故詩人秦龜從所居旱河經雨水微沙船貼臺根日未斜三徑就荒悲白土一樽相屬對黃花已將遠眺收平楚更遣清言到永嘉要見仙翁頭似漆請看醉後落烏紗瀘人何邦直者為安溪把截將有功不賞反得罪來惠州貧甚吾呼與飲為作此詩楚人季布以勇顯魯國朱家用俠聞馳馬彎弓臣好武吹毛洗垢吏深文王孫此日誰漂母卿子前時號冠軍滿引一杯齊物論白衣蒼狗聽浮雲寓精道齋感懷家山作論兵作賦兩匆匆人事光隂轉首空五夜夢飛山色裏一年秋在雨聲中揚州騎鶴非無意上蔡牽黃信此窮幸有林泉未歸去欲將清興問征鴻遊仙雲宫出郭三竿日橫江一葦航雀飛田有麥蠶罷野無桑下馬危梯滑開門古殿香雨餘丹井溢苔入醮壇荒畫老星辰動碑殘歲月亡鐘聲落城市符祝走村鄉野鳥啼巴蜀山崖刻漢唐臨歸更回首惜此一襟涼春日雜興三首愛梅長恐著花遲日禱東風莫後期及得見梅還冷淡東風全在小桃枝茸茸小雨弄春晴已有狂花未見鶯便使一年惆悵在曉窗寒夢别輕盈月團新碾破春酲賴有歸鴻寄好音人在天涯莫回首恐偷華髮上瑤簪渡沔鶴歸遼海悲人世猿入巴山呌月明惟有沙蟲今好在往來休並水邊行白鷺説與門前白鷺羣也應從此斷知聞諸君有意除鈎黨甲乙推求恐到君蔡京興化仙遊人字元長登熙寧三年進士拜中書舍人改知開封府當司馬光秉政復差役法京首如約光甚喜已而臺諫言京挾邪壞法出知成德軍紹聖初入權户部尚書章惇復變法議久不決京謂惇曰取熙寧成法施行之爾何以講為惇然之自爾兩人相倚以濟及徽宗立京用提舉洞霄宫深結中使童貫于杭因而得柄大政為所欲為害政黨邪卒致宗社之禍其得以耄年死道路者幸也寄兒攸遠征老懶身心不自由封書寄與淚橫流百年信誓當深念三伏征塗合少休目送旌旗如昨夢心存關塞起新愁緇衣堂下清風滿早早歸來醉一甌題殿壁瓊瑤錯落密成林檜竹交加午有陰恩許塵凡時縱步不知身在五雲深孫覿字仲益常州人政和間進士相傳蘇子瞻南遷時一妾有娠不得偕往遂嫁常州孫氏及子瞻北歸則仲益生六七齡矣命名曰覿謂賣見也覿詩不愧作者惟志万俟卨之墓獲罪名教其為東坡遺胤未知是否聊因野史所載而存之富陽道中二首渺渺行雲幔溶溶曳水衣雷翻巢墮乳風落網粘飛獨拄青藜杖來推白板扉平生丘壑趣漂泊寸心違白帽炎州客青裙酒姥家微風搖扇浪細雨落簷花客舍休占鵩蠻村欲饌蛇會令醒復醉高枕送生涯化度寺失路迷千嶂投林借一枝扣門竹西寺立馬日斜時矍鑠僧窺户雎盱犬透籬定知嫌不速明日與君辭題硤江蕭氏菴二首雪屋清如洗雲崖翠作堆破扉風自掩敗壁雨先頺野色初還柳林香尚有梅滄江千萬頃一鳥鏡中回雲逐歸心亂山隨望眼賒疏林敧晚照淺溜咽春沙客路三年過僧窗一笑譁此生安稅駕有地即為家讀類説二首亡是談烏有彭郎得小姑誰言鳩作婦謾道雁為奴絡緯那能織提壺豈解酤龜兹堪一笑非馬亦非驢額癢會出耳足間仍有氂石頑飛作燕楮老孕生雞楓癭那因怒松肪豈是肥君看轉丸手亦復化神竒龜潭擺落攀緣斷驅除磊塊平庭松敵老健潭水伴孤清待月出時看尋雲起處行相隨木上坐徙倚到參橫到象州寓行衙太守陳容德攜酒見過飣坐黃柑噀手香堆盤丹荔照人光莫辭蛋酒一尊赤會壓瘴茅千里黃未省讒言遭薏苡直將空腹傲檳榔酒醒夢覺知何處樹影參差月滿廊雉山寺青蘿閣蠻村避謗三年過野寺尋僧半日間小檻吹香花漠漠斷崖潄碧水潺潺桄榔葉底秋聲滿柏子煙中午夢還便擬買舟隨釣叟一蓑煙雨繫滄灣熊夫人遣介欲壻澤民小詩戲之墻頭鄰女三年望户外文君一笑窺欲得賢夫嫁張耳此真佳壻是羲之定知不折飛梭齒似説先齊舉案眉豈有侯門深似海水流紅葉謾題詩宋元詩會卷三十三
