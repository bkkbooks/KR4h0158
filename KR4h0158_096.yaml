body:
  text: 宋元詩會卷九十六兵部主事陳焯編戴良字叔能浦江人少學文於黃栁及余忠宣皆得其指授至正辛丑以薦授江淮等處行中書省儒學提舉遭亂避地吳中晚乃挈家泛海訪求豪傑欲有所為卒無所遇明初召至京師將官之以老病辭卒於寓舍山有杞山有杞于吳之里君子至止可以宴喜水有魚于吳之墟君子止居可以宴胥於山於水有軒膴膴何斯違斯莫或遑處于水于山有亭閒閒何斯違斯莫或遑安安其可懷耄將至矣今也不樂嵗月逝矣爰作斯圖式歌且謡願言公退惟以逍遙其樂也哉感懷四首杪歲屬搖落青蒲忽青青萌達未幾日大火已南明天運一如是廢興安得停商郊遷夏鼎殷士裸周京冀方既已沒亳社亦云平務光直達道敝屣薄時榮𤣥圃有丹木八幹何亭亭光同白玉潤液比碧瑶清不知何年代産此至陽精仙經所嘗言服之可千齡吾將具舟楫涉海掇其英良辰豈長遇隂晦在須臾今日弗為樂明旦恐不如都門多佳麗清囀當座隅促席道平素况有髙士俱列俎過三鼎傾酒盡百壺揮金娛心意慷慨不留儲達人每滔蕩俗士恆自拘白頭懷轗軻撫已一長吁家藏兩寶劍已合雌與雄潛鋒在金匣謂當長相從何言風雨夕化作雙蛟龍一遊吳水西一落豐城東相去邈千里時時氣上衝神物終不隔歲晏會當逢贈别汪定海前舟已云發後舟更誰待春事動江皋客愁滿山海别晷只須臾會期知何在亦既違素心安得顔不改和淵明連雨獨飲陶翁固貧士異患猶不干公田足種秫亦且居一官我無半畝宅三旬才九餐况多身外憂有甚饑與寒委懷窮櫩下何以開此顔清風颯然至髙歌吾掩關寄宋潛溪孤鴻失儔侣連翩洲渚湄自知羽翮短不與同奮飛寄聲奮飛者當慎子所之烟波渺無從雲路迥難依雲路多鷹隼烟波有虞機田居我生非匏瓜於世可無食躬耕實所慕戮力歸稼穡當春土脉動農事滿阡陌晨興負耒去日入弗遑息我苗今已長我耕有餘隙斗酒勞近鄰隻雞餉過客人生但如是亦足慰平昔此意誰復知千載惟沮溺節婦操為賈妻作父母嫁妾時遺妾雙鴛綺雙鴛既同生亦復與同死當知妾有夫結言亦如此妾夫今在逺妾身今獨止恐為行露侵莫與雙鴛齒飲恨赴長川川竭恨乃已立秋日言懷六龍不可頓四序忽復移氣變感人心愴然已秋時池荷挺素質園葵吐芳㽔豈無一日好不久還當衰覽物惜年邁撫景傷志違日暮坐空堂此懷當告誰中秋無酒彼節忽已易吾年信難留含情及𤣥夜逝將秉燭遊皎皎明月光照我城南樓常時猶足賞矧乃當素秋東鄰有美酒飲之袪百憂客途無由得虛使時運流未知明年月還如此夜不既虛行樂志空歎將誰尤别宋潛溪昨宵郡齊宿今旦赴行舟官程不敢違可使須臾留掩泣别故交强顔逐前儔未嘗去鄉邑詎能千里遊金陵古帝鄉雄跨東南州至今列甲第奕奕居公侯冠蓋若雲擁車馬如川流厚祿不虛授髙才將見收如何獨多念去去懷百憂送劉彥英東還轉蓬無定在飄颻將何之未遽離本根賴有回飈吹在昔從一官整駕來南陲何意十載留竟負三年期上有垂白親下有初長兒平生已艱瘁况復當亂離及兹神武師拓地如拾遺遂令客行士秋晏薄言歸慈母既生還弱子亦抱持歌舞入故都志願幸無違鴻鵠遊四海鷦鷯守一枝寧守卑棲分不隨鴻鵠飛詠懷少小秉微尚游心在六經苒苒歲年遲乃與塵事冥入秋多佳日何以陶我情園蔬青可摘新榖亦既升命室釀美酒一壺聊復傾兒女在我側親戚還合并終觴無雜言但說歲功成至樂固如此是外徒營營和沈休文雙溪八詠二首秋至愍衰草衰草遍平陸方晨露染黃入夜風銷緑别葉有歸聲故蕊無留馥徑莖忽自摧寒叢竦如束彼物既如斯我年寧不促已失早生榮敢冀晚凋福何當即去兹縱浪從所欲晨征聽曉鴻鴻飛何處所隨陽弱水岸違寒長沙渚冥冥憶霜羣雍雍呌雲侣固將聨匹儔豈惟念羇旅視夜已昭晳度聲尚悽楚以之頻感觸將何慰艱阻帛書望不來誰知我心苦還舊居自我逺行遊故廬今始歸如何草載間舊事都已非曳杖過比鄰相呼尋故知不見垂白翁但見初長兒我園既稍葺我田亦就治種秫釀美酒拾薪煮豆糜一笑集親朋相從說暌離以之感疇昔俯仰多所悲人生一世中所憂渴與饑力耕給其用此外更何思便當息吾駕皓首以為期答李寧之涸鱗思赴海倦翮念歸山如何逺遊客歲久不知還世塗方擾擾豺虎尚為患久嫌軍務勞翻羡為客閒夜雨滴愁夢晨風颯頽年丈夫雖耿介亦或多苦顔而我承結鄰獨喜相追攀未堅金石交已枉瑶華篇時時感嘉貺相視兩悽酸豈不欲為答情深諒難宣寄王子充燕燕何從來其羽已差池飛入華堂內意在巢君帷君帷豈不好傷哉非故知引去方未能欲留復回疑噭噭徒曉風翾翾空暮闈城東會飲送王天錫隂崖斂暝霏霜陸耀晴晛蕭蕭落木多綿綿衰草遍開冬感徂物列飲會羣彥美醑溢流霞妍談粲餘絢時髦非我匹清尊豈余戀行矣送將歸悵焉罷歡宴引領阻雲從搔首歎蓬轉贈别祝彥明悵望臨荒蹊驅馳騁遐步江紆練月初山標綵霞暮天長路易迷水深舟難渡征人去不息倦僕立相顧此時悲送君安能髮不素徐叔度遺紈扇團團七華扇名在制久缺感君裂紈素與䝉卻煩暍入手訝如圭映容疑學月玩之炎氣消握之微風發郤願暑長在無使情暫歇治圃二首三春豐雨澤晨興觀我畦嘉蔬有餘滋草盛相與齊戮力治亂穢指景光已西好月因時來歸路杳然迷暮鳥尋舊林晚獸遵故蹊我亦息微勞去去安吾棲長夏罕人事齊居有餘閒北窗多悴物且遂灌吾園攢根既舒達積葉亦蔥芊瓜瓞繞畦長新葵應節鮮抱甕一回視生意盈化先在我豈不勞即境多所歡悠悠千載間樊生信為賢次場口久宦迷故都故都在何處驅車向鄰壤白頭不知路長林日夕行曠野東西顧方逺歎途阻逾近覆心懼豈無入林翮莫與歸飈遇望九靈山九靈邈何許連峰髙不極依俙接逺霧仿像起寒色我家是山下别來歲頻易屋廬閒鳥聲冢墓遺獸跡可望不可至空多故鄉憶泛海仲夏發會稽乍秋别勾章擬杭黑水海首渡青龍洋南條山已斷北界水何長逺近浪為國周圍天作疆川后偶安恬天吳亦屏藏蕩槳乘月疾挂席逐風揚零露拂蟠木旭日耀扶桑我行無休隙此去何渺茫東海蹈仲連西溟遁伯陽輕名冀道勝重已企時康孰謂情可陳旅念坐自傷望大牢山稍入東膠界即見大牢山峰攢侔劒㦸嶂叠類雲烟稜稜插巨海渺渺漾中川波濤共突兀天日相澄鮮氓居接島嶼觀宇連術阡既館茹芝士亦巢遁世賢客行積昏旦水宿倦舟船兹山思獨往結茅徵願言柁師不我從太息歸中原抵膠州舟行無休期晨夜涉風水蹈越歷吳鄉乘楚造齊鄙逼浦波尚險即陸路才砥依俙見州郭倉皇問官邸土牆訝已頽草屋驚全圯所幸民俗淳稍使客情喜北來既旬月西去尚幾里嚴程謂已近危途方始此沮洳浩茫茫菅茅復靡靡幽燕去斷魂伊洛望心死日暮坐空牀浩然念枌梓永樂寺觀先師栁公三大篆及諸石刻泫然賦此舍舟遵微行振衣遊淨域誰知登眺初已動存沒憶大篆揭巍堂古句刻貞石詞翰固留今身世悉成昔筠緑雨新霽山寒窗易夕方懷露電悲何有林泉適龜毛廬倦游去朝市委懷在田園既悟執㦸疲益知荷蓧賢夙晨飯牛出夕曛負耒還春作固云力秋斂未盈㕓求贏豈其願拙業乃所安不見龜上毛成氊亦良難和陶雜詩三首大鈞播萬類飄忽如風塵為物在世中倐焉成我身弟兄與妻子於前定何親生同屋室處死與丘山鄰彼蒼無私力宵盡已復晨獨有路旁堠長閲往來人羲馭不肯遲榮悴詎可量舉頭望穹昊日月已宿房隕霜凋衆類慘慘未渠央李梅忽冬實又復值愆陽物化茍如此秪亂我中腸朝耕谷口田暮採陌上桑歲晚望有收嗟哉成粃糠白頭去逐食所謀惟稻粱嗷嗷天海際何異雁隨陽昨宵得竒夢可喜復可傷為言東海上卻粒有其方早晚西王母酌以瑶池觴和陶擬古三首白日忽已晚流光薄西隅老人閉關坐慘慘意不舒日月我戶牖天地吾室廬自非奪元化此中寧久居今夕復何夕凉月滿平蕪悠悠望去途歎息將焉如陶詩何如之如訓作似焉如之如訓作往今人用焉如代何如者皆謬也我昔年少時髙視隘八荒惟思涉險道誰能戒垂堂南轅與北軌所歷何杳茫一旦十年後盡化爭戰場豈無英雄士幾人歸北邙撫此重長歎壯志失軒昂斂退就衡宇蹙蹙守一方往事且棄置身在亦奚傷勸君勿沈憂沈憂損天和尊中有美酒胡不飲且歌我觀此身世變幻一何多無相亦無壞信若空中花戚戚以終老君今其奈何和陶飲酒六首今晨風日美吾行欲何之平生慕陶公得似斜川時此身已如寄無為待來兹况多載酒人任意復奚疑山顛與水裔一觴歡共持昔出非好榮今處非避喧中行有前訓恐遂墮一偏商於四老人遺之在西山朝歌紫芝去暮逐白雲還當其扶漢儲亦復吐一言三春布陽德萬物發華滋凌霄直微類近亦附喬枝低迷衆無覩髙出乃見竒煌煌九霄中榮夸遽爾為我道似不爾一笑縣吾羈我如北塞駒困此東南道有力不獲騁長鳴至于老冉冉隂陽移萬物遞榮槁既無騰化術此身豈長好一朝委運往恐遂失吾寶何當攜麯君縱浪遊八表靡靡歲云暮此已非吾時浮居執蕩志逝將與世辭破屋交悲風得處正在兹握粟者誰子無煩决所疑道喪士失已節義久吾欺於心茍不愧窮達一任之我老愛窮居蓬蒿荒繞宅與世罕所同車馬絶來迹寓形天壤內幾人年滿百顧獨守區區保此堅與白若復不酣飲此生端足惜題㢲上人游息軒名山鬱岧嶤飛軒起𢎞敞覺花墮檻明忍草緣階長日落萬壑冷風振百泉響掃庭驅虎出倚欄延月上雲影共棲息山光同偃仰晚磬度筠清夕窗含澗爽良遊雖暫適多纍詎長往所以俗中人昏昏在天壤艾如張翠為襟錦為衣朝朝暮暮澤水飛澤中青草深且茂莫聽爾媒登壟雊壟頭西接桃李場蓬藋艾盡有羅張羅雖可避機莫測爾誤觸之恐身傷請看舊日張羅處祥鳳冥鴻不肯顧朱鷺朱鷺何從止去啄金堤飲玉水朝隨赤雁暮碧雞蕩漾驚波不得棲有時挾子上林去網絲紛紛復難避不如斂翅江海湄逺卻幽并游俠兒白頭吟莫把白頭吟來調緑綺琴蜀客當年聘私室兩情總向琴中得誰信黃金買賦時已是青蛾辭寵日兔絲春來託女蘿雪霜未至尚纒柯若箇人心如草木不到白頭妾遭逐妾有嫁時緑玉簪時時插髻悅君心一朝墜地雙股折恰似君心中道絶我簪縱折猶共藏君心一絶去他鄉白紵歌闔廬宫中夜檛鼓宫樹烏啼月未午玉缸提來酒如乳白紵衣成向君舞美人醉起行步難腰間珂珮聲珊珊肯緣嬌愛减君歡寶叉墮地不敢言宫中門户多無數君恩反覆日幾度明朝重著舞時衣心中已道不相宜短歌行青天上有無根日馳光暫明還復黑晝夜相催老卻人忽忽吾年四十七偶看舊鏡鏡為羞昔髭未生今白頭朱顔丹藥已難覓青史功名行且休富貴不來老還至病妻對之怨且詈妻年比我雖稍卑近亦催頽如我衰一生仳離殆居半此世歡娛能幾時湖州行送人作郡湖州歲歲修城堡敵騎時燒城外草城外居民如野鹿目睽睽兮尾促促去輸官稅輸不足半在軍中半在獄獨留新婦餉姑前也執吳綃供稅錢吳綃已盡歸未得復到官家候消息我相聞之憂爾湖命選賢侯此剖符賢侯若為湖作主便須罷却徵求苦留得湖民障兹土題顧氏長江圖天下幾人畫山水虎頭子孫世莫比何年寫此長江圖多少江山歸筆底巴陵三峽天所開逺勢似向岷峨來洞庭瀟灑僅毫末楚客湘君安在哉江上一朝風雨急老我曾來踏舟立鼓枻既聞潭畔吟抱琴復聽竹間泣别來幾日世已非忽此披圖憶曩時早知避地多處所肯逐紅塵千里歸訪止公於文溪杖錫遊兹地過從動隔年已無離别想那有去來緣心事青山外禪機白石前偶來非道意敢借慧燈然投王郡守已落時人後誰能說姓名惟應馬南郡偏重鄭康成賓館縣牀待公庭罷吏迎為居門下久童僕亦多情投同僉公投鉞幾専征分藩復此行身為漢飛將家若魯諸生祕略三邊服妖氛一劒橫已多門下客持筆待功成送歸安丞之子官何處湖流一舸通汀洲蘋影濶城郭水光中夜泛苕溪月春吟若下風若逢陳太守為報各衰翁自定州入海乍離東海郡又上北溟船紅見波中日青窺水際天鄉關千里隔身世一帆縣鄉信何從達歸鴻落照前至膠州自入東膠路鄉邦此地賒人悲西候日帆亂北溟霞民俗農為業州城土作家驛樓何處是庭樹暮棲鴉宿髙密客路信悠悠荒城許暫投黃塵齊地晚紅葉海邦秋燈影明官驛鐘聲度縣樓去家今幾許猶自夢東州寓昌樂淮海來時路東西幾日程一年行萬里數口託孤城邯水方馳箭崤函未罷兵餘年已無幾坐此欲何成次益都使傳來遙甸估車馳近坰茅廬城外市楊樹驛邊亭淄水穿原緑牛山入郡青西遊應未遂又復渡滄溟經金繩廢寺寂寞唐朝寺頻年客到稀空山孤殿在荒徑一僧歸苔色驕秋雨松聲振夕暉驚烏初有託近亦出林飛歲暮移家東海上汨沒度危時草市腥江鮑民居雜島夷衣冠隨俗變姓字畏人知保已無深計翻言命可疑辛亥除夕湖海風雲暗道途霜雪清如何一年盡翻使百愁生俗薄乖留計時危緩去程家人團坐夜應悉旅中情渡海結屋雲林度半生老來翻向海中行驚看水色連天色厭聽風聲雜浪聲舟子夜喧疑島近估人曉卜驗潮平時危歸國渾無路敢憚波濤萬里程黑水洋涉海才經五日期深洋一望黑淋漓波搖月夜人先見船過雨天龍未知險勝吕梁漂鷁處悲同巫峽泣猿時平生自有乘桴志莫為微軀到此疑寄鶴年衡門之下可棲遲且抱遺經住海涯東漢已編髙士傳西方仍誦美人詩衰年避地方蓬轉故國傷心忽黍離天末秋風正蕭瑟一鴻聲徹暮雲悲有懷淬用剛賦此以寄何處名山擅地靈雨微峰下樹青青九天石落疑星化一夜龍歸挾霧腥禪窟已鐫新賜翰法函惟啓舊藏經道人猶恨居山淺杖錫時時入杳冥承君衡叔幹逺送賦此以别長風吹度海東邊慣聽潮聲已十年往事免成塵撲面新愁惟有雪盈顛半生望眼迷遼鶴一夜歸心到蜀鵑逺賦驪駒慚二妙縱歌安得酒如川寄俞伯熊兼柬李仲彬東郭先生最老成天才久已負時名能詩不减唐工部解飲渾如晉步兵塞上征鴻髙避弋海東歸鶴暗聞聲比鄰喜有知心客一夜彈碁直到明懷滑攖寧海日蒼凉兩鬢絲異鄉飄泊已多時欲為散木居官道故託長桑說上池蜀客著書人豈識韓公賣藥世偏知道途同是傷心者只合相從賦黍離咏懷古迹客來慎勿說姑蘇弔古令人百感俱已訝當年嘗越膽更堪此日聽吳趨荒臺鹿下江聲咽古木烏啼月影孤欲問闔閭埋葬地五湖東畔已荒蕪憶汪遁齊四明羇客近如何别去今才一月過記得小齊多野思豆花隂裏唱離歌周伯琦字伯溫饒州人父應極事武宗仁宗為翰林待制伯琦自幼從宦京師入國學為上舍生以䕃授南海縣主簿三轉為翰林修撰至正元年改奎章閣為宣文閣藝文監為崇文監伯琦官授經郎於宣文閣帝愛其工書法眷遇日隆常呼伯溫而不名命僉廉訪司事於廣東復召入翰林以待制升直學士十二年命南士皆得居省臺伯琦與貢師泰同擢監察御史會御史大夫額哷特穆爾將大軍南討失律喪師臺臣劉希曾等具疏糾之伯琦反劾希曾等越分干譽遂由是不為公論所與屢除江夏浙西肅政廉訪江南行臺監察御史多被人言十七年以參知政事招諭張士誠於平江士誠既降伯琦前誣漸白因留平江十餘年士誠滅伯琦始歸鄱陽尋卒有詩文稿行世入居庸關出關復入關五見月上弦草木雖未霜寒風已凄然崖路何紆縈叠嶂橫中天上有太古石下有無底泉幽致良足嘉萬雷奈喧闐馴象寶轡鳴紫駝錦幪鮮鐵騎簇雲隊黃屋循星纒時巡謐風俗執法恭後先達官國同休拔宅如登仙細民終歲勞輸轉百舌煎苦樂殊雲泥使我中心悁偶經巖谷勝復憶江湖壖升髙望白雲楚天浩無邊王師未休息敢賦歸來篇題南陽諸葛廟劒江流水緑沄沄五丈原頭日又曛舊業未能歸後主大星先已落前軍南陽祠廟荒秋草西蜀關山隔暮雲正統不慚傳萬古莫將成敗論三分答復見心長老見寄二首浙水東頭佛舍連蒲菴上士坐忘年五雲古衲層瀾湧百寶浮圖列宿躔牀上貝書多譯梵門前海舶直通燕比丘喜得階蘭秀應種菩提滿法田九載違離得逺書窗更歲厯斗旋樞華星秋月超元白峻嶺重江限越吳柏子樹隂浮碧砌蓮花漏水響銅壺老夫素有林泉癖一曲何當乞鑑湖郯韶字九成吳興人哀楊節婦吳氏丞相師昏長夜酒司徒援絶憑城守七萬兵分諸將屯坐視霜風折蓉栁氷肌月貌忍泥滓錦棚觽佩同歸水九泉無愧先人面終身不作他鄉鬼君不見雕戈白馬氣如雲昨日烈丈夫今日降將軍於乎楊婦吳氏何可羣次韻玉山晚泊長林夕露下一雁過秋天月照風燈外星沈夜水前美人隔烟渚清夢落江船孤坐聞城漏迢迢夜不眠題漁家壁漫郎家在黃泗浦閒看飛花坐北窗渡口青山髙似屋門前湖水直通江垂楊繫艇已千尺春鯉上盤才一雙野老相過無一事白頭喜對酒盈缸和報復元秋興大星出海芒角稀新月隔林光景微空山無眠雞犬獨樹忽驚烏鵲飛已喜中朝下優詔側聞南國尚戎衣釣竿早晚落吾手日日放船來水扉用楊鐵崖書畫船亭韻與玉山同賦二首越來溪上暮潮過飲馬橋頭春水波出郭喜知塵事少吹簫無奈月明多花飛斷岸衝歸燕栁䕃長溝泛白鵝擬送一甌臨水榭扣絃同奏竹枝歌卜築喜過揚子宅城居曲曲抱溪流夕陽在波人影亂秋水上簾竹色幽載酒到門從問字據牀吹笛不驚鷗月明後夜稽山雪乘興還能具小舟寄范叔豹江路霜寒木葉凋憶君何處思迢迢長年旅食同秋雁故里風烟隔暮潮甚欲寄書酬逺别絶憐把燭待清宵雙溪月色凉如水誰採瓊芳慰寂寥次韻楊子壽同浦太守遊顧園辟疆園裏好花開路隔仙源一水隈春暖鳬鷖當檻浴草青蝴蝶上衣來柘枝屢舞團團扇竹葉深傾灧灧杯何事緑波生浩蕩畫橋風急彩舟回奉寄玉山仙人愛向桃源住曲曲雲林勝輞川秋水到門船似屋青山當檻樹如烟常時待月溪邊立最愛梳頭竹裏眠我有好懷清夢逺題詩還到草堂前虞山道中有懷仲瑛言偃宅前湖水東千門楊栁緑搖風一篷山色斜陽外半夜雨聲春夢中獨客年年如旅雁行人草草似驚鴻芳洲杜若憑誰采心逐寒潮處處同吳中覽古赤欄橋下記停橈細雨菰蒲響暮潮說與行人莫回首故宫烟栁正蕭蕭過漁浦江水飛花作雪輕月明似入剡溪行可堪一夜天涯雨臥聽春潮送櫓聲曉發商溪戲柬金粟道人商水西頭花滿烟畫船銀燭理絲絃翠屏何處驚殘夢臥看青天春月圓題魏明鉉老翁住在浣花村日日哦詩醉瓦盆怪底橫江見船尾不知春水到柴門和西湖竹枝詞二首十五女兒羅髻垂照水學畫雙蛾眉長橋橋下彎彎月偏向儂家照别離妾家西湖住橫塘門前楊栁萬條長願郎醉後休輕折留待重來繫馬韁周砥字履道吳人擬古二首迢迢逺别離相去幾萬里月照衡陽關風吹漢江水宵夢不可託路迷復中止登山還有屐涉水亦有舟我心如縣旌搖搖獨無休常恐瑶華落春風不能留豈君弗識察故此長悠悠安得似鸚鵡銜書東海頭翡翠栖蘭苕鴛鴦上錦機物固各有類寸心獨何依春色來幾日海燕忽雙飛迎風不須入塵滿青樓扉對新栁才弄新春色已有縈愁意欲倚不成眠待扶還似醉疏雨飄枝濕暮雀銜花墜脉脉獨含情故園那得至夜坐懷孝常待月下石壁罷琴竹間亭坐絶百蟲響旅懷才夜寧天髙玉露㵼草木流晶熒四山湛秋色萬物無隱形風蟬抱葉落雪鵠迎雲停此時西澗人柴門久已扄誰同展清會念此風泠泠世難避空谷憂思同醉醒偶適不為貴人生易漂零茫茫河漢流熒惑光衆星干戈未衰息前途杳冥冥歲晏有結託東去浮滄溟讀書讀書易為感時節已徂秋行遊固可適歲月懼不留髙齊曠而寂人務罕相酬千載事了了寧不慕前修道在無今古天運每周流萬理由我具消搖極冥搜為樂不在兹況復儲怨尤豫本楚狂士意氣邁九州偶然似有契持身寓林丘萬鍾非所辭一毫非所求晚晴送禪師浮雲暮褰霽空宇湛然清復念還山客遲遲南澗行新禽響叢木殘照入孤城即此閒來往方紆塵外情元日試墨金鴨香猶吐風簾影自飄輕冰生墨沼餘雪綴寒條茅屋行當買山雲坐可招且無軒冕意隨分樂漁樵五月草日雨中飲南樓何許開尊散旅愁疏簾氷簟水南樓天邊逺岫一黃鵠雨裏垂楊雙白鷗閒對故人思故國不堪歸夢阻歸舟東行未見烟塵靜腸斷髙堂鶴髮秋雨後竹堂東偏芝草亭澗水繞榻風泠泠碧梧鶯語嬌似醉玉瓶荷花愁欲醒可憐光景易流轉無奈踪跡尚漂零瑶琴一彈為君掩日暮髙山雲杳冥夏日同强二秀才過鑑公山房遊仁壽精舍尋僧直到梵王家便汲山泉為煮茶阮藉從來無禮法湯休何用著袈裟醉眠石閣聽風樹步入松雲掃澗花與子歸時仍並轡蕭條墓道夕陽斜寄楊文可屋廬星散當山郭門前小溪相與通橘子壓樹千頭緑鯉魚跳波雙尾紅空梁寒月拱夜鼠傍壁燈火鳴秋蟲故人亦在他鄉住此時作客情思同因泉公歸簡王二秀才千巖春靜一僧歸相送空林夕景微茶具等閒拋石閣釣竿行已臥苔磯草生南浦牽詩夢漚下輕波識道機若見王喬因借問雙鳬何日向南飛漁莊秋月團團照藥闌水邊簾幕晚多寒素娥不上青鸞去借得銀筝花裏彈鄭元祐字明德遂昌人元末來往玉山甚數送友還鄉墮地作男兒有用須及早當年縣弧意焉得鄉曲老青雲一蹉跎鬢髮日已皓常恐歸去遲心焉惄如搗我家東吳城翠竹森若葆力耕輸王稅妻子亦溫飽詩成每獨詠觴至或共倒富貴將焉如歲晏聊自保蕭蕭風前栁貿貿霜下草有官固當歸無官歸亦好出塞已踰烏盩山未涉白狼水饑羸形骸黑枕戈待明起將軍方踏踘天地入馬箠吾儕亦何人一死等螻蟻姑蘇臺城西髙臺髙百尺傳是吳王舊遊迹百花正開西子醉明月芳洲照清夕嬌顔如花醉王側城上烏啼曉星白歌鼓聲消醉未消越王已將兵來朝鏦金撾鼓殷天地兵敗可復棲夫椒吳人遺恨化潮汐暮往朝來箭涇直不然亦可君甬東何用蕭蕭馬嘶驛東坡赤壁圖奎星墮地不化石化作盤天老胸臆清禁森嚴著不得半夜吹簫過赤壁百萬蛟龍不敢聽萬古東流月華白春日湖上有感潮落空城誰重過猶餘里耳聽鳴珂襄陽耆舊知誰在江左風流不厭多自見石麟眠枳棘長聞蜀魄呌松蘿野梅開盡西湖雪萬斛春愁奈爾何元宵懷錢塘武帝親迎太乙神流光絢煜動星辰行宫典禮猶存漢軹道山河已易秦香徑至今啼木客露盤無淚泣金人紅燈幾㸃東風裏猶是元宵一度春楊鐵崖新亭草𤣥心苦思如何艤岸舟輕不動波聽雨夜篷燒燭短截雲湘竹弄愁多賦成猶夢橫江鶴書罷應籠泛渚鵝想見後堂凉月白彭宣腸斷雪兒歌贈張景亮仕回投老何曾畏簡書青山原不負吾廬魚須久疊牀頭笏馬軏新縣屋角車翠被春寒聽雨睡白頭日午趂風梳好官付與諸郎做千古封留意有餘次韻劉憲副春日湖望湖水荒荒寒食天相逢猶話國初年江樓夜唱花間集翠管春吹月下船𤣥圃自應留富麗湘雲誰為惜清妍可憐頭白歸來日井邑凄凉生野烟陶靖節像袖裏慚無博浪捶酒醒空賦稚桑詩悲凉一曲山陽笛滿眼山河是義熙宋元詩會卷九十六
