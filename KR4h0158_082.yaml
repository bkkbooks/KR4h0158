body:
  text: 宋元詩會卷八十二兵部主事陳焯編朱德潤字澤民睢水人工詩畫延祐間用趙孟俯薦得入仕籍宦弗稱志遂挂冠歸年七十二卒有存復齋稿虞集為跋曰澤民文章典雅而理致甚明獨惜以繪事掩其所長然識者不猒其多能也二子復吉中吉於明初官典籍給事家藏有睢陽五老圖乃其九世祖兵部郎中朱會與杜祁公輩稱五老者也送馮海粟待制入京人生百年間會面能幾何昔年别君去氷雪滿長河今嵗復送君堤栁青婆娑春塘漾輕舸曉日生微波柔櫓數聲動遊子行不歌夢隨征帆杳思逐春流多落花粘空樽錯落金巨羅聚散未足道且使朱顔酡次韻貢仲章學士題仙山圖浮生三十餘失志墮塵鞅南吳與北燕所歷如翻掌山中猿鶴期别路成榛莽瑶草霜未凋靈芝日應長久聞東王公御氣九霄上縹眇星霞裾虛室絶華想欲從道無因寫此寄清曠泛太湖訪友扁舟去何所渺渺太湖陰依依桑梓村拍拍枕寒潯飛雲入遐睇鳥道橫青岑篙師戒勿渡柔櫓力不任我身雖骨立未肯折壯心放船當中流浩歌激清音何當被宫錦再作峨嵋吟和柯敬仲博士幽蘭陽和遍巖谷猗蘭發初芳幽姿不自媚隨風忽飄香寧辭雨露恩感此嵗月長願隨郎官握得上中書堂不慚山澤姿高貴比金張靈芝在宣室豈獨懷沅湘題唐明皇幸驪山圖驪山西北高萬乘東南至霓旌蒼翠中閣道丹青內憶昔上林遊春寒多並轡羯鼓召花奴黃門催力士霓裳曲未終驚動漁陽騎題張參政所藏太真上馬圖開元朝野時清明姚宋廟謀多輔成紫宸前殿焚錦繡花萼樓高延弟兄那知暇豫生淫樂慢舞霓裳羽衣薄龍漦流禍入宫牆野鹿銜花汙簾箔春晴並轡曲江行回顧阿環嬌態生繡衣珠趿如花旋秦虢椒房恩寵鮮宫中舁出錦棚兒兵滿漁陽人未知一朝犯順入宫闕咸陽煙塵迷日月翠華雜沓驚塵蒙劍閣西回渭水中王臣下微同列國從此藩鎮爭豪雄人生富貴真迷途傾城褒姒無時無漫道玄宗不知政試問當年無逸圖仙山圖為趙彥昭賦崆洞之山戴斗極疊嶂橫陳開碣石翠崖丹磴互低昂復閣層欄轉空碧碧桃花落笙聲幽雙成吹玉彩鳯謳跨鳯騰雲去無迹清猿啼斷層崖秋霞光隱映山長在寰海茫茫隔煙靄舊遊仙侣謾招呼誤落人間幾千載吳爭越戰何可數束書欲問桃源路畫圖空見避秦人隔水漁郎不相顧送李益齋之臨洮緑陰滿京畿送子之臨洮臨洮何茫茫流出長城濠長城岸阻玉關厄于闐蔥嶺河涼高羌氐兒郎走帶箭哀笳風起斗擊刁良人西征二三載寶幢車馬聲塵遙如今不用酒泉郡豈必坐使朱顔凋蒲萄苜蓿味雖美異方土俗殊鄉里避地猶當似管寧受封應得論箕子願從列騎擁旌旄歸來燕處華堂裏却話人情翻掌難曽浥征袍淚如洗讀隋書廣通渠邊渭水流長安猛將縣兜牟陳郎酣睡未知曉采石夜渡江聲秋韓擒不待賀若報呼得蠻丁作鄉導銅鉦一聲歌管闌望仙閣下旌旗繞兵家兒女髮照人金井梧桐三墜身血痕已汙青溪草遺恨空憐高使君當時只道明良會三十年間轉頭事江都未放錦帆回晉陽城內驚塵起德政碑德政碑路旁立石高巍巍傳是邑中賢令尹三年秩滿人頌之刻石道傍紀德政傍人見者或歔欷借問歔欷者誰子云是西家鐫石兒去年官差鐫此石官司督工限十日上户斂錢支半工每年準備遭驅責城中書生無學俸但得錢多好作頌豈知令尹賢不賢且喜豪民來饋送德政碑磨不去勸君改作橋梁柱乞與行人濟不通免令觀者嗟何補水深圍水深圍田疇蕩蕩如湖陂圍低水深岸不立雖有木石將何施里中申官官不允徴糧每歲歸倉廪稻粱無種長菰蒲民産賠償官始準今春水潦忽無津十分災作五分申問渠何故作此弊府州覆熟成三分吏胥入鄉日旁午二分徴作賠官賦倘逢人訴熟為荒破盡家資猶不補因此年年怕官惱水淹水深俱不報東南民力日漸窮不願為農願為盜人生盜賊豈願為天生衣食官迫之水淹償米或時稔賠糧無奈水深圍題石崇錦障圖洛陽金谷園中花雕玉為欄繡作遮琉璃器多出珍饌瑪瑙街長行細車椒房塗香貯歌舞曵珠珥翠籠輕紗珊瑚扶疏三四尺王羊貴戚爭豪奢那知花淫風雨妬古來山澤生龍蛇嬋娟墜樓寶珈碎月明夜半啼驚鴉除日日行三百六十五今夕方除嵗云暮人生憂樂百年期又見日除當此度養和適情宜及時古今中壽七十稀自非金石不可永刀圭誰保長生期彭宣老𣆀亦何之不須更作送窮詩客聞此詞莫傷咨樽前且醉黃金巵觀內廄洗馬黃雲灑雨沙場秋灘高水平凝不流曉霜襲透蒼駝裘圉人浴馬津水頭緑驃連錢雙驊騮日光射波脂膩浮青絲脫鞚黃金鈎輕爬短刷濕未收三花剪髮平且柔籋雲駿氣將無儔束芻斗豆豈馬羞茫茫豐草生林丘霜蹄胡為踏長楸振鬛一躍期天遊十四日泊安陵廣川六百里驛道上皇州紫極星辰近黃河日夜流村明湥夕火灘泊過年舟明發乘車去逢人説浪遊和龔子敬先生遊春韻烹茶熱旨酒坐石得嘉賔好鳥時鳴晝幽花不放春山遺今古事詩著往來人楚地龔夫子諸生數問津贈黃竹村老儒畫梅竹煙水旴江渺丹陽度雪寒久憐梅淡泊先問竹平安夜月清詩思春風彩筆端北來知巳少嵗暮欲彈冠送張景亮知州致仕角巾歸里舊儒冠宦轍馳驅涉萬端楊柳碧溪春晝永梅花白雪夜窗寒朝廷有道容辭老田野無羈得盡歡幸喜玉堂遺業在安居留待後人看送劉德璋提點還宜興通真觀通真仙觀欲凌虛牝谷先生晝隱居玄鶴不歸􅏞表柱白雲長護紫泥書桐棺已化人徒仰鐵鎖高縣孰可舒便欲束書陽羡路青牛春晚又回車遊梁溪暮歸古樹呼風作雅音石梁溪渡景沈沈山橫宿靄曉晴薄人倚曲欄秋思深潁水空遺黃鵠恨茂陵多感白頭吟栖遲莫厭歸來晚明月驚烏繞故林和王繼學治書駒隙流光一鏡縣虛明直與綺窗連鑿開混沌知身外别有山川在眼前蓬島秋深稽漢使桃源春暖避秦仙敬亭山色看如畫熊枕圍屏穩晝眠送趙季文任湖州録判萬里奉親官署近萱堂春早燕呢喃桃花紅似郎君馬楊栁青於從事衫苕水漁舟煙浩渺何山書舍石巉巖莫思杜牧尋芳晚剩有新詩寄一緘題豫章山房豫章林老色參天擁護山僧丈室前豈為法身同草木要驅塵慮出風煙茶甌香篆晨齋後竹几蒲團夜榻邊獨有瀏陽歐學士題詩遙問不空禪和虞先生題當山張真人别業嵐雨初晴緑樹新松蘿夾屋淨無塵洞花幽鳥時時别野鶴孤雲日日親紅霧半窗丹火候青山萬古百年人從君更覔方平宅玄武門前作近鄰紅葉題詩金殿風微拾墜紅題詩聊寄玉溝東芳情有意隨流水細字無心學斷鴻别館乍涼霜透幕長門深夜月移宫才情偶爾成佳配不道周南有國風出郭步自東臯隔市塵青山高下欲迎人汀花有意開何晚野草無名亦自春陶淵明歸去來圖甲子題年玩物華門前栗里自桑麻從他晉史書劉宋别有黃花處士家蘇天爵字伯修真定人父志道歷官行省稱能吏天爵以國子生試名第一釋褐授大都路薊州判官調功德使司照磨改國史院典籍升應奉翰林文字進修撰擢江南行臺監察御史斷疑獄如神入為監察御史改奎章閣授經郎復拜御史在官四月知無不言自是內遷外擢皆顯官中忤時相罷歸久之上察其誣復使參知浙省大都路都總管兩浙都轉運使仍以江浙參知總兵饒信積勞得疾卒於軍中年五十九天爵為學博而知要長於紀載著國朝名臣事略十五卷文類七十卷詩文稿三十七卷送同知任君玉西歸薇花曽見照青春今日都門又送君入蜀使迎新大守渡瀘人識舊將軍琴聲彈落巴山月馬首披開劍閣雲見説西州民事簡客來多誦長卿文黃清老字子肅邵武人泰定中進士官翰林供奉福山菴晨光海上來雲氣升萬壑雞鳴落花中殘鐘度城郭菴僧戴星出我自飯藜藿寧知天地心但有山水樂書燈夜搖動霧氣侵几閣開扉得新月欲掩見栖雀煙霞暫相違筆硯庶有託但留松間雪付與雙白鶴庭柯換故葉林竹脫新籜何日芝草開拿舟付前約送王君冕歸陜西四首麥熟天乍熱開軒理瑶琴兹辰有客至一徑蒼苔深日出樹影倒曠坐分緑陰清談落餘花松風雜幽禽君子希道德永言結同心狂風捲茅屋遙見溪上山人生有遇合離别何足歎黃鵠將西歸臨風振羽翰我有雙明珠置之青雲端朝朝復暮暮照君千里還少年處山谷壯嵗遊京師性本猿鶴羣焉能牛馬馳曩有採薪憂挂冠願為醫近得聖賢對讀書甘如飴習慣已成癖豈無君子知十載宦京輦田園就荒蕪茲焉得歸耕休馬南山隅舉酒樹色動鶯燕鳴相呼流水既悅君白雲亦邀余錦囊可贈還愧非明月珠送李子威代祀嵩衡淮海二首羣生望甘澤五嶽雲氣通天香落巖谷瑞靄春冥濛海潮天際來金碧森萬峰劃落紫翠堆亭亭玉芙蓉古廟絲竹存迎神奏黃鍾空山遞餘響落花舞青童南海祝融宅汪洋載神州巨浸含萬有元氣何空浮蒼蒼島嶼間倣佛通十洲神魚在深淵甘霖何以求朝折若木枝夕飲桐柏流萬里竟探討豈徒司馬遊古樂府二首君好錦繡假妾好明月珠錦繡可為服服美令人愚不如珠夜光可以照讀書君好春芍藥妾好夏池蓮芍藥多艷色春風迷少年不如蓮有實可以壽君筵登平逺臺鼇頂峰六鼇簸蕩玄圃碎三島崩騰失空翠海風掣斷南山雲分我滄江半江水臺南巖谷青岌岌竒松怪石作人立山巔恐有風雨來林徑空濛落花濕水東屴崱結平緑積霧飛嵐坐堪掬蓬萊迢迢幾萬里一碧天光浸寒玉吟翁回首看不足緩步䇿驢度空谷誰知咫尺山中幽望斷殘暉立修竹天馬山溪隨天馬西北行半空忽見蓮花生雙鸞欲下却飛去旌旗引入丹霞城攀蘿上到猿啼處恍然曠坐消百慮千山無人雲氣深終日徘徊不能去虛空樓閣時自開異香忽起三清臺風吹笑語落天半疑是神仙跨鶴來百花潭上春自照白鹿呼人猿亦嘯路迷不敢輕問津恐有賢人隱耕釣蒼崖九折樵徑通絶頂可見西崆洞塵心豁然臂欲羽竦身直上凌天風尋故人適興一尋君君家在白雲寒花秋後見落葉夜深聞隨意坐苔石呼童煮澗芹不須談世事詩思正紛紛貢闈偶成呈同院諸公射宫圍棘斷經過間却秋聲太液波風定碧簾聞禁漏夜殘銀燭見星河仙人共對青藜杖詞客孤眠白玉坡弱水蓬萊三萬里不知何處月明多雪夜直宿玉堂琪樹花生禁漏遲金莖月色近書闈白雲入水春無迹銀漢橫空夜有輝竹靜似聞蒼玉佩松寒欲傍緑荷衣乾坤清氣蓬萊表獨坐天風拂翠微張志道别都門竹寺西軒共聽琴杏花猶記紫囊吟溪山老我扁舟興風雨知君萬里心滄海夜潮銀漢濕蓬萊春樹碧雲深三年離别樽前話傾倒何時更似今庚午興聖殿進史瑶編初進侍明光日麗龍池晝刻長堤栁染成春水色宫花併入御爐香金壺灑露層階滑玉碗分氷廣殿涼矇瞍似知天意喜鳯笙新奏五雲章梧桐雨曽將秋信報人知又與西風泣别離刻緑滴殘猶有淚題紅流去更無詩舊巢鳯冷朝飛逺古井金寒曉汲遲待得楚臺雲散後却憑琴調寄相思題平翠樓華樓突兀摩蒼天清吟飛上神飄然虛欄六曲飛雲起蓮峰千仞當樽前晴嵐帶霧結秋色修竹過雨鳴寒泉東風一笑歌石鼓心期試問金鼇仙友人擬古樂府因題絶句四首采荇歸來午花梢日轉廊緑陰涼似水不見洗紅妝生愛東鄰女蛾眉畫不如近來機杼廢臨得右軍書今夜中秋月含情獨上樓辰星三兩點偏照玉簾鈎露井疏桐晚風亭碧藕秋捲簾山月上水宿見雙鷗登福山遇僧偶出鷲嶺雲深杖屨幽竹風松影共悠悠何人分得僧家榻坐看南山一片秋友人見訪不遇君來白鶴下青𡨕我入春山聼曉鶯可惜小樓風雨過無人收拾萬松聲貢師泰字泰甫寧國宣城人文靖奎之子也少肄業國子泰定四年授太和州判官改歙縣丞棹應奉翰林文字出為紹興路總管府推官屢讞疑獄人稱為神再入翰林歷待制國子司業禮部郎中遷吏部拜監察御史升吏部侍郎外任浙西庸田使江西廉訪副使召為禮部尚書參知江浙行省用户部尚書分部閩中再以祕書卿召行至海寧得疾卒師泰以文字知名而於政事尤長所至輒效士譽翕然歸之有集行世雜咏四首看月當看缺月缺終須圓賞花莫待開花開落還先靜觀萬物理可以全吾天東鄰侈曼舞西鄰沸繁絃歌燕猶未終飄忽如浮煙宣尼陳蔡間伯夷首陽巔斯人雖已矣清風萬古傳千金不為恩一語終感德所以古來士慷慨重相得眷兹義利間誰能有真識張儀復連衡酈生空伏軾魯連不帝秦高論抗六國遂令千載下撫卷長歎息疏林收霽靄方池含密陰坐深清晝冷餘花散鳴禽緘情何所寄撫我緑綺琴世無鍾子期誰能復知音偃息北窗下好風從南來開窗延好風懷抱忽為開人生如逆旅造花同嬰孩小知鬭蝸角營營真可哀是非何足論客至且銜杯姑蘇百花洲上姑蘇臺吳王宴時花正開半空畫燭西子醉三更鐵甲東門來吳波渺渺吳山簇不見嬌嚬倚欄曲丹楓落月怨啼烏碧草東風走驚鹿闔閭丘墓相連處應恨夫差迷不悟斷指千年血未乾遊魂夜哭臺前路章華靈王宗國崇臺宇按劍章華睨中土辨裳伏地走諸侯鐘鼓凌空震三楚騁驕不畏伍子謀落成乞與吳兵遊孤舟竟走江上路塊土獨占山中愁十年霸氣終蕭索回首華榮歸不得飢魂漂泊啼秋煙細腰却舞新王前朝陽神娥縹眇高唐上楚宫樓閣森相向丹楓蒼桂涌孤關白石清江簇連嶂行雲冥冥飛雨寒孤猿咽咽秋花間翠鈿龍駕杳何處斷魂殘夢愁空山微臣宋玉誇能賦當日襄王豈真遇千古秋風恨未平高泉飛落三巴怒黃金昭王鋭志移青社築土縣金奉賢者四方劍佩集強燕千里風塵馳駿馬郭君自舉先羣豪樂生獨步超凡曹酬恩一雪霸國恥建功並倚雲天高君臣意氣千年少落日荒涼沒秋草黃金買貴滿長安悵惆英雄布衣老戲馬項王戲馬從東來意氣蹴局全秦推入關不並沛公轡還鄉却上彭城臺重瞳按劍風雲靡萬匹騰空煙霧起凄涼垓下泣名騅零落江邊餘數騎寄奴千載心爭雄登高把酒臨秋風詐移晉鼎非男子君看百戰東城死銅雀半空高柱翔金雀玉扆繐帷塵漠漠西陵老樹暝色寒長安殘妓春情薄曲終紅袖辭尊前簷傾斷甓飛人間分香老淚恨不滅秋風吹入苔花斑漢家一片鄴城土肯為姦雄載歌舞銷盡曹瞞萬古魂落日漳河咽寒雨送顧仲莊之海北釣龍臺下與君别萬里東南何日還星斗動搖天在水海門空闊浪如山瓊玕寶樹來三島鸚鵡金籠出百蠻簫鼓船回應北上鳳池春早佩珊珊送馬御史萬斛龍驤海上回除書忽報自天來紅蓮日轉神仙幕翠柏霜飛御史臺已喜文章收俊譽還因綱紀得長材風塵滿目難為别且盡江頭酒一杯送洪元成赴靜江治中海上東風吹鬢毛杏花開處雨蕭騷薦書舊最司徒考宫錦新裁别駕袍落日山城旌斾逺拍天春水柁樓高莫憐投老多辛苦萬里行囊有豹韜題張子固所藏鮮于墨迹一自昭陵藏墨本書名誰復更超羣忽傳河朔専行草不讓吳興變𨽻分黃鵠夜深隨落月白鵝秋冷化孤雲風流賴有張公子雪繭封題比右軍題李則平憲副所藏息齋竹滿川風雨長篔簹吹作參差二鳯凰籜粉已翻鱗甲紫墨花還染羽毛蒼春寒弱幹當軒潤日暮清陰入酒涼便欲截筒鳴嶰谷却愁彈瑟望瀟湘巴陵女子盧希孟貞節尚書子婦魏王孫清白傳家節更貞諸將已捐南渡主孤身猶抗北來軍血書夜灑巴陵月烈氣秋橫鄂渚雲欲弔忠魂無覔處惟應瑶席從湘君題淵明小像竹杖芒鞋白鹿裘山中甲子幾春秋呼童檢點門前栁莫放花飛過石頭柯九思字敬仲天台人工詩善畫際遇文宗為奎章閣鑒書博士得出入內廷後失寵退居吳下元史無柯傳蓋未之考也題誠夫尚書垂綸亭尚書昔隱江漢間垂綸滄波弄白石千山桃葉起春謳萬頃蘆花湧秋色適興偶拂珊瑚光豈意渭濵終得璜未央奏策動天子四海籍籍傳文章至今亭子松陰古磯上蒼苔長膏雨經綸事竟尋舊遊願逐茶煙渡湘浦釣月軒談笑從吾樂相過罷送迎憑欄看月出倚釣待雲生蝶化人間夢鷗尋海上盟軒車穩適意何物更關情送陳玉林南還龍去亭空思惘然道人和淚話當年珠宫錫號開三島金榜承恩自九天花落御牀霑宿霧苔生輦路濕蒼煙春來怕渡秦淮水處處青林呌杜鵑姚婁東往玉山因書以寄相逢何事且徘徊澤國桃花岸岸開見説衡陽南去路秋深無雁寄書來索陽莊瓜榖雨初乾可自由荷鋤原上倦還休醉迷芳草生春夢誰識東陵是故侯題畫白頭翁春濃不放小禽棲白髮衝冠向曉啼簾幕半開人未起樓臺風暖日猶低偶題寄玉山溪行處處是仙家谷口逢君日未斜隔岸雲深相借問青松望極有桃花偶成柬匡廬山人青鳥當時養得馴碧梧露下覆清晨紗窗忽見秋如許應有蛾眉憶逺人題李遵道畫扇江清地僻野人家門外橋通石徑斜不信東華塵十丈萬山晴雪看梨花題唐子華畫秋江才子圖林臯霜老紅初冷嵒畔煙虛翠欲消記得山陰曽訪隱一笻秋色度溪橋宇文公諒字子貞其先成都人徙吳興公諒弱冠有操行館嘉興富家有夜奔者叱去之明日即辭歸不告以故登至順四年進士第授徽州路同知婺源事改餘姚遷高郵府惟官除國子助教調應奉翰林文字同知制誥兼國史院編修移病歸後歷國子監丞提舉江浙儒學廉訪嶺南以疾請老所著有以齋詩稿玉堂漫稿若干卷送復見心往定水定水招提鳴鶴東鑑湖歸去泛孤篷鉢衣不濕荷花露玉麈遙生桂子風山靜祇看雲自動江澄莫訝水如空沃州有約尋支遁還許清談共野翁西湖竹枝詞斷霞灑灑魚尾紅清唱一聲湖月東阿儂只在繡簾裏隔著荷花無路通台哈布哈字兼善本巴約特氏初名塔布哈文宗為易斯名父塔布台歷仕台州録事判官遂家於台布哈家貧好讀書集賢待制周仁榮養而教之年十七領江浙鄉試第一明年賜進士及第授集賢修撰轉祕監著作拜江南行臺御史擢中臺監察御史首劾托歡貪暴既抗章言文宗后加徽號及太臣列土封王為非制幾中危禍賴后悟得免自是屢任外職擢翰林侍讀學士兼修國史方國珍亂海上以布哈稔知賊情遷浙東宣慰使都元帥分閫溫州至則國珍冦溫縱火筏焚之一夕遁去會與左丞博囉約期進討博囉違約先三日出洋兵潰被執為國珍飾詞上聞布哈痛憤欲死朝廷莫由知之繼遣大司農逹實等至黃巖招撫俱與布哈意見抵牾每值事會可圖輒縱之去更授以官國珍詭降而勢益熾布哈竟力戰死所著有復古編十卷賦得上林鶯送張兵曹春日陽關道鶯聲滿上林來從金谷曉飛度玉樓陰栁嫩難分色歌停稍辨音明朝空解語人去落花深春日次宋顯夫韻帝城三月多春色南陌風光畫不如躑躅花深啼杜宇鸕鷀灘暖聚王餘玉樓似是秦宫宅金水元非鄭國渠處處笙歌移白日揚雄空讀五車書汴梁懷古雅勒呼集中已見此詩必有一誤花石岡前麋鹿過中原秋色動關河欲詢故國傷心事忍聽前朝皓齒歌蔓草有風嘶石馬荆榛無月泣銅駝人間富貴皆如夢不獨興亡感慨多京師上元夜華月澄澄宿霧收萬家燈火見皇州天閽虎豹依霄漢人海魚龍混斗牛公子錦韀鳴玉勒內家珠箔控銀鈎道旁亦有揚雄宅寂寞藝窗冷似秋寄姚子仲懶趨青瑣立朝班焚却銀魚挂鐵冠琪樹有枝空集燕竹花無實謾栖鸞漢廷將相思王允晉代衣冠託謝安聖世只今多雨露上林芳草似琅玕春日宣則門書事簡虞伯生三月龍池栁色深碧梧煙暖日愔愔蜂粘落絮縈青幔燕逐飛花避緑沈仙仗曉開班玉筍雲韶春奏錫瓊林從臣盡獻河東賦獨有相如得賜金寄同年宋吏部金鏡承恩對紫薇錦韀白馬耀春暉謾隨仙仗朝天去不記宫花壓帽歸海國風高秋氣早關河雲冷雁聲稀嗟豫已屬明時棄自整絲綸覔釣磯送趙常伯淮西憲副東華晨霧正霏霏使者分符向合肥封事尚留青鎖闥蒙恩近出紫宸闈江涵曉日明樓堞風引春雲上繡衣珍重故人千里别緑尊須盡莫相違鞦韆詞芙蓉宫額半塗黃雙送秋千出畫牆簾底燕驚花雨亂樹頭蜂繞襪塵香巧將新月添眉黛間倩東風響珮璫歸去緑窗和困睡暫憑春夢到遼陽送瓊州萬戶入京海氣昏昏接蜃樓颶風吹浪蹴天浮旌旗晝捲蕉花落弓劍朝縣瘴雨收曽把烏號悲絶域却乘赤撥上神州男兒墜地四方志須及生封萬戶侯絶句二首繡簾鈎月夜生涼花霧陰陰入畫堂吹徹玉簫人未寢更添新火試沈香金吾列侍擁旌旄五色雲深雉尾高視草詞臣方退食內宫傳敕賜葡萄送王奏差調福州春水溶溶滿鑑湖蘭舟長護錦屠蘇可憐走馬閩山道榕葉陰中聽鷓鴣庫庫字子山喀喇氏祖雅克章事世祖從征有功庫庫幼肄業國學其學問得諸許衡長襲宿衛制行清潔始授集賢待制遷兵部郎中轉祕書監奉命往核泉舶芥視珠犀不少留目改僉禮儀院拜監察御史遷祕書大監外歷江南行臺御史浙西廉訪使江浙行省平章政事內歷禮部尚書奎章閣學士大學士知經筵事翰林承旨知制詔兼修國史至正五年將用為平章政事感熱疾先卒年五十一生平志在匡君濟時每侍經筵必娓娓敷陳冀有感動常言宋徽宗多能惟一事不能順帝問何謂一事曰獨不能為君耳聞者韙之分賦清風嶺送逹兼善總管紹興清風嶺頭清風起佳人昔日沈江水一身義重鴻毛輕芳名千載清風裏會稽太守金閨英通籍當年第一名劇郡疲民應有望會將霖雨濟蒼生宋元詩會卷八十二
