body:
  text: 宋元詩㑹卷十兵部主事陳焯編歐陽修字永叔廬陵人四嵗而孤母鄭以荻畫地親誨之學敏悟過人及冠嶷然有聲宋興百年而文體猶仍五季修遊隨得古本韓文苦志力學遂以文章名天下舉進士試南宫第一擢甲科調西京推官入朝為館閣校勘范仲淹之貶修貽書責司諫髙若訥坐貶夷陵令久之復校勘進集賢校理慶厯三年知諫院時正人在位僉小忌之目為朋黨修為帝分别言之撰朋黨論以進同修起居注遂知制誥詔奉使河東還以龍圖閣直學士為河北都轉運使㑹杜衍等以黨議罷去上疏力爭亦出知滁州徙揚州潁州復學士留守南京丁母憂服闋召判流内銓遷翰林學士俾修唐書使朔方其國為之加禮知嘉祐二年貢舉知開封府改羣牧使拜禮部侍郎兼侍讀學士建議立儲五年任樞宻副使六年參知政事與韓琦同心輔政英宗立太后垂簾左右交構幾成嫌隙賴修等調䕶兩宫以安濮議起修引喪服記謂為人後者為其父母降期服而不沒父母之名朝論牴牾惟蔣之竒與修意合薦為御史衆以姦邪目之竒之竒患之用薛宗孺誣修帷薄不根之語上章劾修神宗詰問由來皆詞窮坐黜修亦力求退罷以刑部尚書知亳州年六十即乞休加太子少師致仕卒諡文忠贈杜黙南山有鳴鳳其音和且清鳴於有道國出則天下平杜黙東土秀能吟鳳凰聲作詩幾百篇長歌仍短行攜之入京邑欲使衆耳驚來時上師堂再拜辭先生先生頷首遣教以勿驕矜贈之三豪篇而我濫一名杜子來訪我欲求相和鳴顧我文字卑未足當豪英豈如子之辭鏗鍠間鏞笙滛哇俗所樂百鳥徒嚶嚶杜子卷舌去歸衫翩以輕京東聚羣盜河北㸃新兵饑荒與愁苦道路日以盈子盍引其吭發聲通下情上聞天子聰次使宰相聽何必九包一作苞禽始能瑞一作薦堯庭子詩何時作我耳久已傾願以白玉琴寓之朱絲繩水谷夜行寄子美聖俞寒一作晨雞號荒林山壁月倒挂披衣起視夜攬轡念行邁我來夏云初素節今已届髙河㵼長空勢落九州外㣲風動涼襟曉氣清餘睡緬懷京師友文一作有酒邈一作邀髙㑹其間蘇與梅二子可畏愛篇章富縱横聲價相磨一作葢子美氣良雄萬竅號一噫有時肆顚狂醉墨灑霶霈譬一作勢如千里馬已發不可殺盈前盡珠璣一一難柬汰梅翁事清切石齒潄寒瀨作詩三十年視我猶後輩文詞愈清新心意雖一作難老大譬如妖韶女老自有餘態近詩尤古硬一作淡咀嚼苦難嘬初如食橄攬真味久愈在蘇豪以氣轢一作爍舉世徒驚駭梅窮獨我知古貨今難賣二子雙鳳凰百鳥之嘉瑞雲烟一翺翔羽翮一摧鎩安得相從遊終日鳴噦噦問胡苦思之對酒把新蟹暮春有感幽憂無以銷春日靜愈長熏風入花骨花枝互低昻徃來採花蜂清蜜未滿房春事已爛熳落英漸飄揚蛺蝶無所為飛飛助其忙啼鳥亦屢變新音巧調篁遊絲最無事百尺拖晴光天工施造化萬物感春陽我獨不如春久病臥空堂時節去莫挽浩歌自成傷按六書無熳字古歌曰卿雲爛兮糺縵縵兮縵訓素繒亦無火義而唐詩多用爛熳不知何本讀徂徠集徂徠魯東山石子居山阿魯人之所瞻子與山嵯峨今子其死矣東山復誰過精魂已埋沒文章豈能磨夀命雖不長所得固已多舊藁偶自録滄溟之一螺其餘誰付與散失存幾何存之警後世古鑑照妖魔子生誠多難憂患靡不罹音羅宦學三十年六經老研摩問胡所專心仁義丘與軻揚雄韓愈氏此外豈知他尤勇攻佛老奮筆如揮戈不量敵衆寡膽大身么麽往年遭母喪泣血走岷峨垢面跣雙足鉏犁事田坡至今鄉里化孝弟勤蠶禾昨者來太學青衫踏朝靴陳詩頌聖德厥聲續猗那羔雁聘黄晞晞驚走鄰家施為可怪駭世俗安委蛇謗口由此起中之若飛梭上頼天子聖不挂網者羅憶在太學年大雪如翻波生徒日盈門饑坐列雁鵝絃誦聒鄰里唐虞賡詠歌常續最髙第騫游各名科豈止學者師謂宜國之皤夭夀反仁鄙誰尸此偏頗不知詉詉者又忍加詆訶聖賢要久逺毁譽暫諠譁生為舉世疾死也一作者古人嗟作詩遺魯社祠子以為歌重讀徂徠集我欲哭石子夜開徂徠編開編未及讀涕泗已漣漣勉盡三四章收淚輒忻歡切切善惡戒丁寜仁義言如聞子談論疑子立我前乃知長在世誰謂已一作子沈泉昔也人事乖相從常苦艱今而每思子開卷子在顔我欲貴子文刻以金玉聨金可爍而銷玉可碎非堅不若書一作傳以紙六經皆紙傳但當書百本傳百以為千或落於四荒或藏在深山待彼謗熖熄放此光芒縣人生一世中長短無百年無窮在其後萬世在其先得長多幾何得短未足憐惟彼不可朽名聲文行然讒誣不須辨亦止百年間百年後來者憎愛不相縁公議然後出自然見媸姸孔孟困一生毁逐遭百端後世茍不公至今無聖賢所以忠義士恃此死不難當子病方革謗辭正騰喧衆人皆欲殺聖主獨保全已埋猶不信僅免斵其棺此事古未有每思輙長歎我欲犯衆怒為子記此寃下紓㝠㝠忿仰叫昭昭天書於蒼翠石立彼崔嵬巔詢求子世家恨子兒女頑經嵗不見報有辭未能詮一作銓忽開子遺文使我心已寛子道自能久吾言豈須鑴讀書吾生本寒儒老尚把書卷眼力雖已疲心意殊未倦正經首唐虞偽説起秦漢篇章異句讀解詁及箋傳是非自相攻去取在勇斷初如兩軍一作兵交乗勝方一作多酣戰當其旗鼓催不覺人馬汗至哉天下樂終日在几一作書案念昔始從師力學希仕宦豈敢取聲名惟期脱貧賤忘食日已晡然薪夜侵旦謂言得志一作意後便可焚筆硯少償辛苦時惟事寢與飯嵗月不我留一生今過半中間嘗忝竊内外職文翰官榮日清近廪給亦豐羡人情慎所習酖毒比安宴漸追時俗流稍稍學營辦盃盤窮水陸賔客羅俊彦自從中年來人事攻百箭非惟職有憂亦自老可歎形骸苦衰病心志亦退愞前時可喜事閉眼不欲見惟尋舊讀書簡編多朽斷古人重温故官事幸有間乃知讀書勤其樂固無限少而干禄利老用忘憂患又知物貴久至寶見百鍊紛華暫時好俯仰浮雲散淡泊味愈長始終殊不變何時乞殘骸萬一免罪譴買書載舟歸築室一作屋潁水岸平生頗論述詮次加㸃竄庶幾垂後世不然死芻豢信哉蠧書魚韓子語非訕讀梅氏詩有感示徐生子美忽已死聖俞舍吾南嗟吾譬馳車而失左右驂勍敵嘗壓壘羸兵當戒嚴凡人貴勉强惰逸易安恬吾既苦多病交朋復凋殱篇章久不作意思如膠粘良田失時耕草莽廢鉏芟美井不日汲何由發清甘偶開梅此篇不覺日挂簷乃知文字樂愈久益無厭吾嘗哀世人聲利競爭貪哇咬聒兩耳死不享韶咸而幸知此樂又常深討探今官得閒散舍此欲奚耽頑庸雖警䇿賴子發其箝聖俞惠宣州筆戲書聖俞宣城人能使紫毫筆宣人諸葛髙世業守不失𦂳心縛長毫三副頗精宻硬軟適人手百管不差一京師諸筆工牌榜自稱述纍纍相國東比若衣縫蝨或柔多虚尖或硬不可屈但能裝管榻有表曽無實價髙仍費錢用不過數日豈如宣城毫耐久仍可乞送胡學知湖州武平天下才四十滯鉛槧忽乗使君舟歸榜一作艕不可纜都門春漸動柳色緑將暗挂帆千里風水濶江灔灔吳興水精宫樓閣在寒檻橘柚秋苞繁烏程春瓮釅清談越客醉屢舞吳娘豔寄詩毋憚頻一作煩以慰離居念大熱二首四時成萬物寒暑迭鈞陶壯陽當用事大夏炎蒸歊造化本無情怨咨徒爾勞身㣲天地濶四顧無由逃九門閶闔開萬仭崑崙髙積雪寒凛凛清風吹寥寥嗟我雖欲徃而身無羽毛陽暉爍四野萬里纎雲收羲和困路逺正午當空留枝條不動影草木皆含愁深林虎不嘯卧喘如吳牛蜩蟬一何㣲嗟爾徒啾啾感興唧唧復唧唧夜歎曉未息蟲聲急愈尖病耳聞若刺壯士易為老良時最難得日月相隨東天行自南北三者不相謀萬古無窮極安知人世間嵗月忽已易内押刺韻音戚折刑部海棠戲贈聖俞揺揺牆頭花豔豔爭青娥朝見開尚少暮看繁已多不惜花開繁所惜時節過昨日枝上紅今日隨流波物理固如此去一作古來知奈何達人但飲酒壯士徒悲歌夜聞風聲有感奉呈原父舍人聖俞直講夜半羣動息有風生樹端颯然飄我衣起坐為長歎苦暑君勿厭初涼君勿歡暑在物猶盛涼歸嵗將寒清霜忽已飛零露亦漙漙霜露本無情豈肯私蕙蘭不獨草木爾君形安得完櫛髮變新白鑑容消一作無故丹風埃共一作苦侵迫心志亦摧殘萬古一飛隼兩曜雙跳丸擾擾賢與愚流沙逐驚湍其來固如此獨久知誠難服食為藥誤此言真不刋但當飲美酒何必被輕紈風雨三日不出呈聖俞少年喜追隨老大厭諠譁慙愧二三子邀我行看花花開豈不好時節亦云嘉因病既不飲衆歡獨成一作我嗟管絃暫過耳風雨愁還家三日不出門摧尵類寒鴉妻兒强我飲飣餖果與𤓰濁酒傾殘壺枯魚雜乾蝦小婢立我前赤脚兩髻丫軋軋鳴雙絃正如艣嘔啞坐令江湖心浩蕩思無涯寵禄不知報鬢毛今已華有田清潁間尚可事桑麻安得一黄犢幅巾駕柴車寄題劉著作羲叟家園效聖俞體嘉子治新園乃在太行谷山髙地苦寒當樹所宜木羣花媚春陽開落一何速凛凛心節竒惟應松與竹毋栽當暑槿寜種深秋菊菊死抱枯枝槿艶隨昏旭黄楊雖可愛南土氣常燠未知經雪霜果自保其緑顔色茍不衰始知根性足此外衆草花徒能悦凡目千金買姚黄慎勿同流俗感事二首空山一道士辛苦學延齡一旦隨物化反言仙已成開墳見空棺謂已超青㝠尸一作或解如蛇蟬換骨脱其形既云須變化何不任死生仙境不可到誰知仙有無或乗九斑虬或駕五雲車朝倚扶桑枝暮遊崑崙墟徃來幾萬里誰復遇諸涂富貴不還鄉安事富貴歟神仙不可見魑魅與為徒人生不免死魂魄入幽都仙者得長生又云超太虚等為不在世與鬼亦何殊得仙猶若此何况不得乎寄謝山中人辛勤亦何愚行次葉縣朝渡汝河流暮宿楚山曲城隂日下寒野氣春深緑征車倦長道故國有喬木行行漸樂郊東風滿平陸絳守居園池嘗聞紹述綘守居偶來覽登周四隅異哉樊子怪可吁心欲獨出無古初窮荒摉幽入有無一語詰曲百盤紆孰云已出不剽襲句斷欲學盤庚書荒烟古木蔚遺墟我來嗟秖一作止得其餘栢槐端莊偉丈夫蒼顔鬱鬱老不枯靚容新麗亦何姝清池翠蓋擁紅蕖狐鬅虎摶豈足道記録細碎何區區虙氏八卦畫河圗禹湯臯虺一作陶槩唐虞豈不古奥萬世模嫉世姣巧一作好習卑汙以竒矯薄駭羣愚用此猶得追韓徒我思其人為躊躇作詩聊謔為坐娛洛陽牡丹圖洛陽地脉花最宜牡丹尤為天下竒我昔所記數十種於今十年半忘之開圗若見古人面其間數種昔未窺客言一作云近嵗花特異徃徃變出呈新枝洛人驚誇立名字買種不復論家貲比新較舊難一作莫優劣爭先擅價各一時當時絶品可數者魏紅窈窕姚黄妃夀安細葉開尚少一作蚤朱砂玉板人一作猶未知傳聞千葉昔未有只從左紫名初馳四十年間花百變最後最好潛溪緋今花雖新我未識未信與舊誰妍媸當時一作年所見已云絶豈有更好一作妍此可疑古稱天下無正色但恐世好隨時移鞓紅鶴翎豈不美斂色如避新來姬何况逺説蘇與賀有類異世誇嬙施造化無情宜一槩偏此著意何其私又疑人心愈巧偽天一作名欲鬭巧窮精㣲不然元化朴散久豈特近嵗成澆漓爭新一作先鬬麗若不已更後百載知何為但應新花日愈好惟有我老年年衰贈無為軍李道士二首無為道士三尺琴中有萬古無窮音音如石上㵼流水㵼之不竭由源深彈雖在指聲在意聽不以耳而以心心意既得形骸忘不覺天地白日愁雲隂李師琴紋一作形如臥蛇一彈使我三咨嗟五音商羽上肅殺颯颯坐上風吹沙忽然黄鐘回暖律當冬草木皆萌芽郡齋日午公事退荒涼樹石相交加李師一彈鳳皇聲空山百鳥停嘔啞我怪李師年七十面目明秀光如霞問胡以然笑語我慎勿辛苦求丹砂惟當養其根自然燿其華又云理身如理琴正聲不可干以邪我聽其言未云足野鶴何事還思家抱琴揖我出門去獵獵歸袖風中斜和劉原父澄心紙君不見曼卿子美真竒才久已零落埋黄埃子美生窮死愈貴殘章斷藁如瓊瑰曼卿醉題紅粉壁壁粉已剥昏烟煤河傾崑崙勢曲折雪壓大華髙崔嵬自從二子相繼沒山川氣象皆低摧君家雖有澄心紙有敢下筆知誰哉宣州詩翁餓一作饑欲死黄鵠折翼鳴聲哀有時得飽好言語似聽髙唱傾金罍二子雖死此翁在老手尚能工剪裁奈何不寄反示我如棄正論求誹詼嗟我今衰不復昔空能把卷闔且開百年干戈流戰血一國歌舞今荒臺當時百物盡精好徃徃遺棄淪蒿萊君從何處得此紙純堅瑩膩卷百枚官曹職事喜閒暇臺閣唱和相追陪文章自古世不乏閒出安知無後來答聖俞人皆喜詩翁有酒誰肯一醉之嗟我獨無酒數徃從一作就翁何所為君居南方我北走世路離合安可期汴渠千艘日上下來及水門猶未知五年不見勞夢寐三日始徃何其遲城東鹻河有名字萬家棄水為汙池人居其上茍賢者我視此水猶漣漪入門下馬解衣帶共坐習習春風吹濕薪熒熒煑薄茗四顧壁立空無遺萬錢方丈飽則止一瓢飲水樂無涯況出新詩數十首珠璣大小光陸離他人欲一不可有一作得君家筐篚滿莫持才大一作多名髙乃富貴豈比金紫包愚癡貴賤同為一丘土聖賢獨如星日垂道德内樂不假物猶一作沂須朋友并良時蟬聲漸已變秋意得酒安問醇與醨玉堂官閒無事業親舊幸可從其私與翁老矣㑹有幾當棄百事勤追隨思白兎雜言戲答公儀憶鶴之作君家白鶴白雪毛我家白兎白玉毫誰將贈兩翁謂此二物皎潔勝瓊瑶已憐野性易馴擾復愛仙格何孤髙玉兎四蹄不解舞不如霜鶴能清嘷低垂兩翅趂節拍婆娑弄影誇嬌嬈兩翁念此二物者久不見之心甚勞京師少年殊好尚意氣横出爭雄豪清尊美酒不輒飲千金爭買紅顔韶莫令少年聞我語笑我乖僻遭譏嘲或被偷開兩家籠縱此二物令逍遥兎奔滄海却入明月窟鶴飛玉山千仞直上青松巢索然兩衰翁何以慰無憀纎腰緑鬢既非老者事玉山滄海一去何由招於劉功曹家見楊直講女奴彈琵琶戲作呈聖俞大絃聲遲小絃促十嵗嬌兒彈啄木啄木不啄新生枝惟啄槎牙枯樹腹花繁蔽日銷空園樹老參天杳深谷不見啄木鳥但聞啄木聲春風和暖百鳥語山路磽确行人行啄木飛從何處來花間葉底時丁丁林空山靜啄愈響行人舉頭飛鳥驚嬌兒身小指撥硬功曹㕔冷絃索鳴繁聲急節傾四坐為爾飲盡黄金觥楊君好雅心不俗太學官卑飯脱粟嬌兒兩幅青布裙三脚木牀坐調曲竒書古畫不論價盛以錦囊裝玉軸披頭掩卷有時倦臥聽琵琶仰看屋客來呼兒旋梳洗滿額花鈿貼黄菊雖然可愛眉目秀無奈長饑頭頸縮宛陵詩翁莫笑渠人生自足乃為娛此兒此曲翁家無鳴鳩天將隂鳴鳩逐婦鳴中林鳩婦怒啼無好音天雨止鳩呼婦歸鳴且喜婦不亟歸呼不已逐之其去恨不蚤呼不肯來固其理吾老病骨知隂晴每愁天隂聞此聲日長思睡不可得遭爾聒聒何時停衆鳥笑鳴鳩爾拙固無匹不能娶巧婦以共營家室寄巢生子四散飛一身有婦長相失夫婦之恩重太山背恩棄義須㬰間心非無情不得已物有至拙誠可憐君不見人心百態巧且姦臨危利害兩相關朝為親戚暮仇敵自古常嗟交道難鬼車嘉祐六年秋九月二十有八日天愁無光月不出浮雲蔽天衆星沒舉手向空如漆抹天昏地黑有一物不見其形但聞其聲其初切切凄凄或髙或低乍似玉女調玉笙衆管參差而不齊既而吚吚呦呦若軋若抽又如百兩江州車囘輪轉軸聲啞嘔鳴機夜織錦江上羣雁驚起蘆花洲吾謂此何聲初莫窮端由老婢撲燈呼兒曹云此怪鳥無匹儔其名為鬼車夜載百鬼凌空遊其聲雖小身甚大翅如車輪排十頭凡鳥有一口其聲已啾啾此鳥十頭有十口口挿一舌連一一作十喉一口出一聲千聲百響更相酬昔時周公居東周厭聞此鳥憎若讐夜呼庭氏率其屬彎弧俾逐出九州射之三發不能中天遣天狗從空投自從狗嚙一頭落斷頸至今清血流爾來相距三千秋晝藏夜出如鵂鶹每逢隂黑天外過乍見火光驚輒墮有時餘血下㸃汚所遭之家家必破我聞此語驚且疑反祝疾飛無我禍我思天地何茫茫百物巨細理莫詳吉凶在人不在物一蛇兩足反為祥却呼老婢炷燈火捲簾開户清華堂須㬰雲散衆星出夜靜皎月流清光感二子黄河一千年一清岐山鳴鳳不再鳴自從蘇梅二子死天地寂然收雷聲百蟲壞户不啟蟄萬木逢春不發萌豈無百鳥解言語喧啾終日無人聽二子精思極摉抉天地鬼神無遁情及其放筆騁豪俊筆下萬物生光榮古人謂此覷天巧命短疑為天公憎昔時李杜爭横行麒麟鳳凰世所驚二物非能致太平須時太平然後生開元天寶物盛極自此中原疲戰爭英雄白骨化黄土富貴何止浮雲輕唯有文章爛日星氣凌山岳常崢嶸賢愚自古皆共盡突兀空留後世名送張屯田歸洛歌昔年洛浦見花落曽作悲歌歌落花愁來欲遣何可奈時向金河尋杜家杜家花雖非絶品猶可開顔為之飲少年意氣易成懽醉不還家伴花寢一來京國兩傷春憔悴窮愁九陌塵紅芳紫莟處處有騎馬欲尋無故人黄河三月入隨河河水多時悵望多為憐此水來何處中有伊流與洛波忽聞君至自西京洗眼相看眼暫明心衰面老畏人問驚我瘦骨清如氷今年七月妹喪夫稚兒孀女啼呱呱季秋九月予喪婦十月厭厭成病軀端居移病新城下日不出門無過者獨行時欲彊髙歌一曲未終雙涕洒可憐明月與春風嵗嵗年年事不同暫别已嗟非舊態再來應是作衰翁感時惜别情無已無酒送君空有淚西歸必有問君人為道别來今若此答謝景山遺古瓦硯歌火數四百炎靈銷誰其代者當塗髙窮姦極酷不易取始知文景基局牢坐揮長喙啄天下豪傑競起如蝟毛董吕傕汜相繼死紹術權備爭咆咻力彊者勝怯者敗豈較才德為功勞然猶到手不敢取而使螟蝗生蝮蜪子丕當初不自恥敢謂舜禹傳之堯得之以此失亦此誰知五馬食一槽當其盛時爭意氣叱咤靁雹生風飈干戈戰罷數功閥周蔑方召堯無臯英雄致酒奉髙㑹巍然銅雀髙岧岧圓歌宛轉激清徴妙舞左右囘纎腰一朝西陵看栱木寂寞繐帳空蕭蕭當時凄凉已可歎而況後世悲前朝髙臺已傾漸平地此瓦一墜埋蓬蒿苔文半滅荒土蝕戰血曽經野火燒敗皮敝網各有用誰使鑴鑱成凸凹景山筆力若干弩句遒語老能揮毫嗟予奪得何所用簿領朱墨徒紛淆走官南北未嘗捨緹襲三四勤緘包有時屬思欲飛洒意緒軋軋難抽繰舟行屢備一作被水神奪徃徃㝠晦遭風濤質頑物久有精怪常恐變化生靈妖名都所至必傳玩愛之不換魯寶刀長歌送我怪且偉欲報慚愧無瓊瑶答朱寀捕蝗詩捕蝗之術世所非欲究此語興於誰或云豐凶嵗有數天孽未可人力支或言蝗多不易捕驅民入野踐其畦因之姦吏恣貪擾户到頭斂無一遺災蝗食苖民自若吏虐民苖皆被之吾嗟此語祗知一不究其本論其皮驅雖不盡勝養患昔人固已决不疑秉蟊投火況舊法古之去惡猶如斯既多而捕誠未易其失安在常由遲詵詵最説子孫衆為腹所孕多蜫蚳始生朝畆暮已頃化一為百無根涯口含鋒刀疾風雨毒腸不滿疑常饑髙原下隰不知數進退整若隨金鼙嗟兹羽孽物共惡不知造化其誰尸大凡萬事悉如此禍當早絶防其㣲蠅頭出土不易捕羽翼已就功難施只驚羣飛自天下不究生子由山陂官書立法空太峻吏愚畏罰反自欺蓋藏十不敢申一上心雖惻何由知不如寛法擇良令告蝗不隱捕以時今苖因捕雖踐死明嵗猶免為蝝菑吾嘗捕蝗見其事較以利害曽深思官錢二十買一斗示以明信民爭馳歛㣲成衆在人力頃刻露積如京坁乃知孽蟲雖甚衆嫉惡茍鋭無難為徃時姚崇用此議誠哉賢相得所宜因吟君贈廣其説為我持之告採詩日本刀歌昆夷道逺不復通世傳切玉誰能窮寶刀近出日本國越賈得之滄海東魚皮裝貼香木鞘黄白間雜鍮與銅百金傳入好事手佩服可以禳妖凶傳聞其國居大島土壤沃饒風俗好其先徐福詐秦民採藥淹留丱童老百工五種與之居至今玩器皆精巧前朝貢獻屢徃來士人徃徃工詞藻徐福行時書未焚逸書百篇今尚存令嚴不許傳中國舉世無人識古文先王大典藏絶域蒼波浩蕩無通津令人感激坐流涕鏽澁短刀何足云奉使道中寄坦師道人少賈海上遊海舶破散身沉浮黄金滿篋人所寄吹簸偶得還中州贏身歸金不受報祗取斗酒相獻酬歡娛慈母終一世脱去妻子藏巖幽蒼煙寥寥池水漫白玉菡蓞吹髙秋夜燃栢子煑山藥憶此東望無時休塞垣春枯積雪溜沙礫威怒黄雲愁五更匹馬隨雁起想見鄮郭花今稠百年夸奪終一丘世上滿眼真悠悠寄聲萬里心綢繆莫道異趣無相求葛氏鼎大河昔決東南流蕭條東郡今遺湫我從故老問其由云古五鼎藏髙丘地靈川秀草木稠鬱鬱佳氣蒸常浮惟物伏見數有周祕藏竒怪神所摉天昏地慘鬼哭幽至寶欲出風雲秋蕩揺山川失維陬九龍大戰驅蛟虬剨然岸裂轟雲一作雷驫滑人夜驚鳥嘲啁婦走抱兒扶白頭蒼生仰叫黄屋憂聚徒百萬如蚍蜉千金一掃隨浮漚天旋海沸動九州此鼎始出人間留滑人得之不敢收竒模古質非今侔器大難用識者不以示世俗遭揶掫明堂㑹朝饗諸侯饔官百品供王羞調以五味烹全牛時有用捨吾無求二三子學雕琳球見之始驚中歎愀披荒斵古爭窮蒐苦語難岀聲吚嚘馬圖出河龜一作龍負疇自古恠説何悠悠嗟我老矣不能休勉彊作詩慙效尤緑竹堂獨飲夏篁解籜隂加交卧齋公退無喧囂清和況復值佳月翠樹好鳥鳴咬咬芳樽有酒美可酌胡為欲飲先長謡人生暫别客秦楚尚欲泣淚相攀邀況兹一訣乃永已獨使幽夢恨蓬蒿憶予驅馬别家去去時栢陌東風髙楚鄉留滯一千里歸來落盡李與桃殘花不共一日看東風吹哭聲嗷嗷洛地不見青春色白楊但有風蕭蕭姚黄魏紫開次第不覺成恨俱零凋榴花最晩今又折紅緑㸃綴如裙腰年芳轉新物轉好逝者日與生期遥予生本是少年氣瑳磨牙角爭雄豪馬遷班固洎歆向下筆㸃竄皆嘲嘈客來共坐説今古紛紛落盡玉塵毛彎弓或擬射石虎又欲醉斬荆江蛟自言剛氣貯心腹何爾柔軟為脂膏吾聞莊生善齊物平日吐論竒牙聱憂從中來不自遣强叩瓦缶何譊譊伊人達者尚乃爾情之所鍾况吾曹愁填胷中若山積雖欲强飲如沃焦乃判自苦英壯氣不有此恨如何消又聞浮屠説生死滅沒謂若梦幻泡前有萬古後萬世其中一世猶刀蟧安得獨灑一榻淚欲助河水増滔滔古來此事無可奈不如飲此罇中醪雪新陽力㣲初破萼客隂用壯猶相薄朝寒稜稜風莫犯暮雪緌緌止還作馳驅風雲初慘淡炫晃山川漸開廓光芒可愛初日照潤澤終為和氣爍美人髙堂晨起驚幽士虚窻靜聞落酒壚成徑集缾罌獵騎尋蹤得狐貉龍虵掃處斷復續猊虎團成呀且攫共貪終嵗飽麰麥豈惜空林饑鳥雀沙墀朝賀迷象笏桑野行歌沒芒屩乃知一雪萬人喜顧我不飲胡為樂坐看天地絶氛埃使我胷襟如洗瀹脱遺前言笑塵雜捜索萬象窺㝠漠潁雖陋邦文士衆巨筆人人把矛槊自非我為發其端凍口何由開一噱黄牛峽祠大川雖有神淫祀亦其俗石馬繫祠門山鵶噪叢木潭潭村鼓隔溪聞楚巫歌舞送迎神畫船百丈山前路上灘下峽長來去江水東流不暫停黄牛千古長如故峽山侵天起青嶂崖崩路絶無由上黄牛不下江頭飲行人惟向舟中望朝朝暮暮見黄牛徒使行人過此愁山髙更逺望猶見不是黄牛滯客舟語曰朝見黄牛暮見黄牛一朝一暮黄牛如故千葉紅梨花峽州署中舊有此花紅梨千葉愛者誰白髮郎官心好竒徘徊繞樹不忍折一日千匝看無時夷陵寂寞千山裏地逺氣偏時節異愁烟苦霧少芳非野卉蠻花鬭紅紫可憐此樹生此處髙枝絶一作紅豔無人顧春風吹落復吹開山鳥飛來自飛去根盤樹老幾經春真賞今纔遇使君風輕絳雪罇前舞日暖繁香露下聞從來竒物産天涯安得移根植帝家猶勝張騫為漢使辛勤西域徙榴花黄牛峽以徴古諺紅梨花以廣異聞其詩可勿論也希真堂東手種菊花十月始開當春種花唯恐遲我獨種菊君勿誚春枝滿園爛張錦風雨須㬰落顛倒看多易厭情不專鬬紫誇紅隨俗好豁然髙秋天地肅百物衰零一作陵誰暇弔君看金蘂正芬敷曉日浮霜相照耀煌煌正色秀可餐藹藹清香寒愈峭髙人避喧守幽獨淑女靜容修一作羞窈窕方當揺落看轉佳慰我寂寥何以報時攜一罇相就飲如得貧交論久要我從多難壯心衰迹與世人殊靜躁種花勿一作不種兒女花老大安能逐年少贈沈博士歌遵沈夫子胡為醉翁吟醉翁豈能知爾琴滁山髙絶滁水深空巖悲風夜吹林山溜白玉縣青岑一瀉萬仭源莫尋醉翁每來喜登臨醉倒石上遺其簪雲荒石老嵗月侵子有三尺徽黄金冩我幽思窮﨑􅋂自言愛此萬仞水謂是太古之遺音泉淙石亂到不平指下嗚咽悲人心時時弄餘聲言語輭滑如春禽嗟乎沈夫子爾琴誠工彈且止我昔被謫居滁山名雖為翁實少年坐中醉客誰最賢杜彬琵琶皮作絃自從彬死世莫傳玉練鎖東坡詩云新客從翻玉連鎖練疑當作連聲入黄泉死生聚散日零落耳冷心衰翁索莫國恩未報慙禄厚世事多虞嗟力薄顔摧鬢改真一翁心以一作已憂醉安知樂沈夫子謂我翁言何苦悲人生百年間飲酒能幾時攬衣推琴起視夜仰見河漢西南移樂哉襄陽人送劉太尉從廣一作景元赴襄陽嗟爾樂哉襄陽人萬屋連甍清漢濱語言輕清㣲帶秦南通交廣西峨岷羅縠纎麗藥物珍枇杷甘橘薦清罇磊落金盤爛璘璘槎頭縮項昔所聞黄橙擣虀香復辛春雷動地竹走根錦苞玉筍味爭新鳳林花發南山春掩映谷口藏山門樓臺金碧瓦鱗鱗峴首髙亭倚浮雲漢水如天㵼沄沄斜陽返照白鳥羣兩岸桑柘雜耕耘文王遺化已寂寞千載誰復思其仁荆州漢魏以來重古今相望多名臣嗟爾樂哉襄陽人道扶白髮抱幼孫逺迎劉侯朱兩輪劉侯年少氣甚淳詩書學問若寒士罇爼談笑多嘉賔徃時邢洺一作臺有善政至今遺愛留其民誰能持我詩以為我先賀襄陽人謝觀文王尚書惠西京牡丹舉正京師輕薄兒意氣多豪俠爭誇朱顔事一作競年少肯慰白髮將花挿尚書好事一作士與俗殊憐我霜毛苦蕭颯贈以洛陽花滿盤鬭麗爭竒紅紫雜兩京相去五百里幾日馳來足何捷紫檀金粉香未吐緑萼紅苞露猶浥謂我嘗為洛陽客頗向此花曽涉獵憶昔進士初登科始事相公沿吏牒河南官屬盡賢俊洛城池一作苑籞相連接我時年纔二十餘每到花開如蛺蝶姚黄魏紫腰帶鞓潑墨齊頭藏緑葉鶴翎添色又其次此外雖妍猶婢妾爾來不覺三十年嵗月纔如熟羊胛無情草木不改色多難人生自摧拉見花了了雖舊識感物依依幾抆睫念昔逢花必沽酒起坐驩呼屢傾榼而今得酒復何為愛花繞之空百匝心衰力懶一作乏難勉彊與昔一何殊勇怯感公意厚不知報墨筆淋漓口徒囁嘗新茶呈聖俞建安三千里京師三月嘗新茶人情好先務取勝百物貴蚤相矜誇年窮臘盡春欲動蟄雷未起驅龍蛇夜聞擊鼓滿山谷千人助呌聲喊呀萬木寒癡睡不醒惟有此樹先萌芽乃知此為最靈物宜其獨得天地之英華終朝採摘不盈掬通犀銙小圓復窊鄙哉穀雨槍與旗多不足貴如刈麻建安太守急寄我香蒻包褁封題斜枲甘器潔天色好坐中揀擇客亦嘉新香嫩色如始造不似來逺從天涯停匙側盞試水路拭目向空看乳花可憐俗夫把金錠一作挺一作鋌茶録多用挺字猛火炙背如蝦蟇由來真物有真賞坐逢詩老頻咨嗟須㬰共起索酒飲何異奏雅終滛哇洗兒歌為聖俞作月暈五色如虹蜺深山猛虎夜生兒虎兒可愛光陸離開眼已有百步威詩翁雖老神骨秀想見嬌嬰目與眉木星之精為紫氣照山生玉水生犀兒一作此翁不比他兒翁三十年名天下知材髙位下衆所惜天與此兒聊慰之翁家洗兒衆人喜不惜金錢散閭一作鄰里宛陵他日見髙門車馬煌煌梅氏子奉答原父見過寵示之作不作流水聲行將二十年吾生少賤足憂患憶昔有罪初南遷飛帆洞庭入白浪墮淚三峽聽流泉援琴冩得入此曲聊以自慰窮山間中間永陽亦如此醉臥幽谷聽潺湲自從還朝戀榮禄不覺鬢髮俱凋殘耳衰聽重手漸顫自昔指法將誰傳偶欣日色曝書畫試拂塵埃張斷絃嬌兒癡女繞翁膝爭欲彊翁聊一彈紫㣲閣老適我過愛我指下聲泠然戲一作語君此是伯牙曲自古常歎知音難君雖不能琴能得琴一作其意斯為賢自非樂道甘寂寞誰肯顧我相留連興闌束帶索馬去却鎖塵匣包青氊㑹飲聖俞家有作兼呈原父景仁聖從憶昨九日訪君時正見階前兩叢菊愛之欲繞行百匝庭下不能容我足折花却坐時嗅之已醉還家手猶馥今朝我復到君家兩菊階前猶對束枯莖槁葉苦風霜無復滿叢金間緑京師誰家不種花碧砌朱欄敞華屋奈何來對兩枯株共坐窮簷何局促詩翁文字發天葩豈比青紅凡草木凡草開花數日間天葩無根長在目遂令我每飲君家不覺長缾臥牆曲坐中年少皆賢豪莫怪我今雙鬢秃須知朱顔不可恃有酒當歡一作飲且相屬雙井茶西江水清江石老石上生茶如鳳爪窮臘不寒春氣蚤雙井芽生先百草白毛囊以紅碧紗十斤茶養一兩芽長安富貴五侯家一啜猶須三日誇寶雲日注非不精爭新棄舊世人情豈知君子有常德至寶不隨時變易君不見建溪龍鳳團不改舊時香味色送龍茶與許道人潁陽道士青霞客來似浮雲去無蹟夜朝北斗太清一作虚壇不道姓名人不識我有龍團古蒼璧九龍泉深一百尺慿君汲井試烹之不是人間香味色戲石唐山隱者石唐仙室紫雲深潁陽真人此算心真人已去升寥廓嵗嵗巖花自開落我昔曽為洛陽客偶向巖前坐磐石四字丹書萬仭崖神清之洞鎖樓臺雲深路絶無人到鸞鶴今應待我來宋元詩㑹卷十
