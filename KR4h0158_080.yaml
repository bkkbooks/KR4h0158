body:
  text: 宋元詩會卷八十兵部主事陳焯編薩都拉下華清曲題楊妃病齒沈香亭北春書長海棠睡起扶殘妝清歌妙舞一時靜燕語鶯啼空斷腸朱唇半啓榴房破脂清紅注珍珠顆一點春酸入瓠犀雪色鮫綃濕香唾九華帳裏熏蘭煙玉肱曲枕珊瑚偏玉叉半脫翠蛾斂龍髯天子空垂涎妾身雖侍君王側别有間情向誰説斷腸塞上錦繃兒萬恨千愁言不得成都遙進新荔枝金盤紫露甘如飴紅塵一騎不成笑病中風味心自知君不聞華清宫一齒作楚藏禍癰又不聞馬嵬坡一身濺血未足多漁陽一日鼙鼓動始覺開元天下痛雲臺不見漢功臣三十六牙何足用楊花曲燕京女兒十六七顔如花紅眼如漆蘭香滿路馬如飛窄袖籠鞭嬌欲滴春風淡蕩搖春心銀筝銀燭高堂深繡裳不暖錦鴛夢紫煙紅霧天沈沈芳年誰惜去如水春困著人倦梳洗夜來小雨濕天街滿院楊花飛不起芙蓉曲兼善狀元索賦秋江渺渺芙蓉香秋江女兒將斷腸綘袍春淺護雲暖翠袖日暮迎風涼鯨魚風起江波白霜落洞庭飛木葉蕩舟何處採蓮人愛惜芙蓉悴顔色如夢曲哀燕將軍芙蓉花為誰好洞房昨夜將軍老將軍老去空鐵衣漆燈照室人不歸宫錦袍氊帳高將軍夜酌涼蒲萄蒲萄力重醉不醒美人猶在珊瑚枕海子頭誰家樓繡簾半捲風悠悠行人謂是將軍府將軍不來罷歌舞平村曲春水緑將軍獵回曽此宿將軍一去成荒丘依舊平村春水流皓齒歌細腰舞緑窗朱戶將軍府將軍老去無少年為野草兮為荒田如花人櫻桃唇傍人近前丞相嗔繁華日日笙歌動世事悠悠總如夢鞦韆謡寒梅零落春雪灑蕭娘腰瘦無一把淡黃楊栁未成陰何人已繫青驄馬畫樓深處迎春歸鞦韆影裏紅杏肥濛濛花氣濕人面東風吹冷輕羅衣衣上粉珠流不歇暗解翠裙花下摺殷勤莫遣燕子知會向人間報風月過嘉興三山雲海幾千里十幅蒲帆挂秋水吳中過客莫思家江南畫船如屋裏蘆芽短短穿碧沙船頭鯉魚吹浪花吳姬蕩槳入城去細雨小寒生緑紗我歌水調無人續江上月涼吹紫竹春風一曲鷓鴣詞花落鶯啼滿城緑江南樂江南樂春水虹橋滿城郭出門不用金馬絡門前花船如畫閣緑紗窗虛鎖春霧隔窗蛾眉秋水活翡翠冠高羅袖濶楚舞吳歌勸郎酌紫竹瑶絲相間作船頭栁花如雪落船尾彩旗風綽綽秉燭夜遊隨意足人生無如江南樂江南怨江南怨生男逺遊生女賤十三畫得蛾眉成十五新妝識郎面識郎一面思猶淺千金買官遊不轉郎家水田跨州縣大船小船過淮甸買官未得不肯歸不惜韶華去如箭楊花簾幕飛乳燕疏雨梧桐閉深院人生無如江南怨過居庸關至順癸酉嵗居庸關山蒼蒼關南暑多關北涼天門曉開虎豹卧石鼓晝擊雲雷張關門鑄鐵半空倚古來幾度壯士死草根白骨棄不收冷雨陰風泣山鬼道傍老翁八十餘短衣白髮扶犁鋤路人立馬問前事猶能歷歷言丘墟夜來鋤豆得戈鐵雨蝕風吹失顔色鐵腥惟帶土花青猶是將軍戰時血前年人復鐵作門貔貅萬竈如雲屯生存有功挂玉印死者誰復招孤魂居庸關何崢嶸上天胡不呼六丁驅之海外休甲兵男耕女織天下平千古萬古無戰爭七夕後一夜樂陵臺上懷李御史公藝涼風吹動梧桐葉㵼下泠泠露華白樂陵臺上悄無人獨倚梧桐看秋月月高當午桐影直不覺衣沾露華濕此時却憶金陵人酒醒江樓聽吹笛偕卞敬之遊吳山駝峯紫陽洞天風吹我登駝峯大山小山石玲瓏赤霞日射紫瑪瑙白露夜滴青芙蓉飄飄雲氣穿石室石上涼風吹細竹挂冠何日賦歸來掃石篝燈洞中宿題壽監司所藏美人織錦圖卷中織錦秦川女大姬啞啞弄機杼小姬織倦何所思簾幕無人燕雙語成都花發江水春門前馬嘶車轔轔髻雲兩耳看欲墮蛾眉八字畫不伸行人一去無消息氷蠶吐絲成五色柔腸九曲細如絲萬縷春愁政如織綺窗睡起聞早鶯西樓月落金盆傾暖霞拂地海棠曉香雪潑戶梨花晴日長春院機聲動梭影穿花飛小鳯水心驚起鴛鴦棲花底不成蝴蝶夢纎纎玉指柔且和香鈎小襪裁春羅滿懷心事付流水蕩目雲錦回青波梅仙山行赤星落地漢祚微端門日日腥風吹咸陽秋色壓宫樹金人夜泣銅駝悲先生袖疏探虎窟漢鼎猶堪支一足九重煙霧似海深門外何人知慟哭賊莽白日升高臺玉璽墮地聲如雷周公揖讓孺子戲絳袍將軍何日來塵飛滄海風擲瓦白鶴身輕快如馬一聲鐵笛度閩關山月溪風共瀟灑龍爭虎鬭耳不聞長嘯袖拂松枝雲夜鐺白石煮秋雨玉佩赤錦飄霞裙先生一去幾千載尚有當年遺迹在題詩絶壁寄先生頓使林巒顔色改藥爐寂寞秋草深丹井水落莓苔侵至今火灰化為土猶有丹光穿樹林過淮河淮水清河水黃出門偶爾同異鄉排空捲雲若飛電隨風逐浪庸何傷東流入海殊不惡萬里同行有清濁西樓别寄閩憲諸公八月八日溪上别溪上彩旗紅獵獵離情已逐渡江雲邊草連天翦秋色玉驄金虎諸大夫欲别不别留斯須沙明淺渚白鳥下酒盡落日青山孤丈夫有淚不須灑去客挂帆君上馬悠悠回首各東西惟見西溪捕魚者閩關一片月太行一片雲雁書逺寄隔山嶽雲飛月明多憶君送友人之金陵陳郎買舟上金陵寒江水落風浪小飛帆逺挂蔣山青空城畫角秦淮曉白門酒美東冶亭吳姬喚客客不行樓中子弟盡年少玉奴行酒吹鸞笙陳郎不聽黃金縷朝走東吳暮走楚半生落魄一故袍感慨長歌弔千古六朝遺迹生暮煙故家荒塜迷花鈿鳯凰臺上醉李白何人知子囊無錢為九江方七高賦匡廬山中有佳士讀書結屋青雲松碧窗夜影紫翠動落日照見香爐峯窺燈夜壁山鬼過采蘭東徑仙人逢危簷墮雪聽風竹古寺隔嶺聞煙鐘每思幽絶動歸興嵗晚落葉迷行蹤扁舟何日過湖口分我半壁青芙蓉中秋月夜泛舟於金陵石頭城秦淮流水西復東倒涵天影磨青銅飛廉掃空出海月明珠飛入琉璃宫著我扁舟二三友江上雪槎泛牛斗笑語人間兩岸燈進君江上一尊酒醉來起舞聽浩歌宛如玉樹春風和世間樂事古來少天下明月今夕多六代江山自瀟灑潮落潮生石城下人生得意當夜遊此月此水年年秋雨傘開如輪合如束剪紙調膏護秋竹日中荷葉影亭亭雨裏芭蕉聲簌簌晴天却陰雨却晴二天之説誠分明但操大柄常在手覆盡東西南北行春别花氣壓簾愁不掃細雨粼粼長芳草玉叉燕尾剪春寒坐惜流年鏡中老東風吹栁人不知春嬌滿眼顰雙眉吳松錦字夢中得曉來月落聞烏啼南園日暖蝴蝶醉香霧熏人海棠睡朱門小立蹴金蓮落紅起作離人淚春遊太真觀東風惱人如著酒曉鶯啼斷門前栁青山忽然契我懷飛上玄都拾星斗緑雲弄雨小立久幾片落花春在手遼東白鶴胡不歸松下丹鉛老霜臼過桐廬桐廬山水天下清洪濤拍岸山圍城桐君已乘丹鳯去世間草木誰知情落日搖紅魚尾赤江上潮回沙嘴立三三兩兩野人家半住漁村半樵牧盡拋章甫求仙靈松間黃鶴喚不應阻風三日看山色平生慣識枯枝藤碧桃海上開多少幾度春風長瑶草白雲滿地不歸來石爛松枯天地老送石民瞻吳江訪友老友吳江去吳江水尚高一樽散鱸膾四月過櫻桃矍鑠緑玉杖風流白紵袍西窗故人夜應是動揮毫和學士伯生虞先生寄韻白鬢眉山老玉堂清晝間聲名滿天下翰墨落人間才俊賈太傳行高元魯山獨憐江海客樽酒夜闌珊投宿龍潭道林寺倦遊借禪榻客意稍從容落日江船鼓孤燈野寺鐘竹雞啼雨過山臼帶雲舂半夜波濤作長潭起卧龍送景南上人歸江西登高傷逺别鴻雁幾行飛萬木江頭落一僧船上歸故山秋嶂逺殘日晚鐘微亦有同袍者多應候竹扉偕趙逢吉避暑石頭城日暮余歸逢吉留宿山中却寄竹下一僧坐城頭獨客還星河到平地風露滿空山犬吠松林外燈明石壁間故人借禪榻心共白雲間夜宿升龍觀舊日宸遊地朱欄護輦紋龍飛九天雨鶴夢一龕雲神火丹爐見仙音客枕聞殷勤謝道士深夜禮茅君秋日雨中登石城訪長老圭白巖不遇石頭城畔去紅葉雨紛紛半日不見路四山都是雲魚龍隨水上鐘磬隔江聞遙憶南莊叟天寒補衲裙苦雨水溢呈憲司諸公病客如僧懶多寒擁毳裘三山一夜雨四月滿城秋海瘴連雲起江湖入市流釣竿如在手便可上漁舟送李恕可隨王宗師入京借得茅山鶴乘風飛上天江聲近九里客路已三千禁闕紅雲上家鄉碧海邊待聞金馬詔復見玉堂仙送莫秀才歸番陽番陽秋水落白下買船還逺夢驚新雁歸帆識舊灣打碑過薦福携酒看芝山却憶曽遊處清溪萬栁間寄石民瞻京口石彭澤詩懷似鶴形蒼天容老健白髮照江清夜鼎薰雞舌秋袍織鳯翎醉扶緑玉杖應望石頭城題紫薇觀馮道士房卜築長江上回峯晚更竒山村猿索飯竹屋鶴聽碁雲護燒丹竈泉香洗藥池道人足高興不許俗人知次崔鎮壁間韻木落嵗時晏黃雲欲雪天買魚河下客立馬渡頭船野逈風欺帽天寒袖裹鞭夜眠三鼓後晚發五更前寄王御史御史傳天語飛霜到海垠浙江潮似雪閩海臘如春孤客見明月亂山愁逺人何時動歸興家有白頭親送管元帥南征楚帆風一葉此去幾時還日暮漢江碧雨晴湘竹斑邊聲連草木野色動荆蠻決策平猺後歸心北固山鍾山遇風雨城市多驄馬清遊有幾人山靈飛白雨朝士説紅塵雲起鐘樓暝桃開野寺春上人歸太晚誰主復誰賔龍潭送侍中田美中攜酒十里作公子青驄馬追隨十里遙風頭雲葉凍酒面雪花消惜别頻回首無因見舞腰君歸金帳暖何限可憐宵送宣古木鐵面小將軍旌旗照海門兵機出孫武膽氣走桓溫社稷劒三尺乾坤酒一樽茫茫雲漢內此意與誰論山中懷友自是麒麟種卑栖又幾年故廬南雪下短褐北風前嵗暮山林瘦天高雨露偏惟應丈夫志未受故人憐送唐卿御史去去紅塵外秋光滿華嵩故鄉歸衣錦行路避乘驄未覺長安逺真成冀北空燕山一枝桂回首正西風宿大橫驛燈火明沙渡牛羊過水西村舂千澗落野店四山齊桂樹偏冝月人家盡向溪秋蟾莫相惱惟聽度關雞遊梅仙山和唐人韻二首城郭千峰合仙凡一水分顛崖縣鳥道亂石聚羊羣苔井分丹水茶爐煮白雲肩輿萬松嶺有客訪梅君絶頂尋仙迹寒泉照病容栖鸞多種竹愛鶴莫移松丹藥人來乞山粳手自舂秋深霜葉滿麋鹿日相逢次王御史江城連日雪騎馬欲何之老樹昏鴉集寒塘落雁遲松窗燈下酒竹屋夜深棋寄語王公子幽棲或可期塵鏡古鏡色如墨千年獨此留玉臺蟲網暗珠匣土花浮莫笑塵埃滿曽令鬼魅愁蟠龍今已化雲雨夢悠悠廢檠不解照珠翠早同文字盟何年中路棄無復向人明宿雨高齋夢秋吟廢館情相看幾今夕及此慨平生斷碑零落秋風卧何年破廟碑圖經愁莫載耆舊説頻移野燒龜文失荒臺鳥迹疑遙知千載後拂拭轉堪悲卧鐘龍虡久摧折深埋奈爾何耕民誰睥睨野衲自摩挲雅奏多年歇銘文幾字訛斜陽荆棘裏長伴舊銅駝道中謾興雲氣千峰暝溪流水拍橋竹溪泥滑滑榕樹雨瀟瀟曲棧鈎崖角垂虹挂嶺腰山家酒初熟或許借椰飄京口夜坐鐵甕城頭刻漏遲涼霜如雪撲簾飛雁聲墮地夢回枕月色滿城人搗衣塞北將軍猶索戰江南遊子苦思歸呼鷹腰箭從圍獵苜蓿秋深馬正肥登金山雄跨亭朱欄六曲倚高秋元氣茫茫日夜浮客去客來天地老潮生潮落古今愁疏鐘水國前朝寺落日海門何處舟更擬黃昏盡餘興却從燈火望揚州寄天竺長老訴笑隱召住大龍翔集慶寺東南隱者人不識一日才名動九重地濕厭看天竺雨月明來聽景陽鐘衲衣香暖留春麝石鉢雲寒卧夜龍何日相從陪杖履秋風江上採芙蓉高郵城樓曉望城上高樓城下湖城頭畫角曉嗚嗚望中燈火明還滅天際星河淡欲無隔水人家種楊栁帶霜鳬雁起菰蒲短衣匹馬非吾事擬向煙波覔釣徒和中丞伯庸馬先生贈别江南驛使路遙遙逺赴龍門看海潮桂殿且留修月斧銀河未許渡星軺隔花立馬聽更漏帶月鳴珂趂早朝秪恐淮南春色動萬竿煙雨緑相招寄京口鶴林寺長老即休白頭不出城南寺枯坐蒲團笑客忙過暑葛衣從破碎逢秋竹院愈荒涼空山雲濕龍歸鉢古屋松低鶴到牀遙憶題詩舊遊處夜深東壁月蒼蒼次學士盧疏齋題贈句容唐别駕疏齋落落謫仙才句曲名山數往來晚讀茶經醫酒病春從鄰舍覔花栽昔年奏對含雞舌今日登臨獨鳯臺賴有間居唐别駕相尋猿鶴莫驚猜三衢守馬昂夫索題爛柯山石橋洞口龍眠紫氣多登臨聊和采芝歌爛柯仙子何年去鞭石神人此地過烏鵲橫橋秋有影銀河垂地夜無波遙知題柱凌雲客天近應聞織女梭宿茅山崇禧觀南塢樓天際三峯橫紫煙山前山後盡芝田樓臺木末疑無路雞犬雲中半是仙白石經年皆化玉青松鎮日秪聞泉曲林三館幽棲地一夜鐘樓聽雨眠登鎮陽龍興寺閣觀銅鑄梵容眼中樓觀見應稀鐵鳯棲簷勢欲飛天半寶花飄閣道月中桂子落僧衣高擎玉露仙人掌上礙銀河織女機全趙堂堂遺物在山川良是昔人非送僉事王君實之淮東使君臘月揚州去東閣梅開雪壓枝淮上有官皆避馬竹西無處不題詩春風楊栁平山路夜月瓊花后土祠從此公餘多勝覽好傳佳句逺人知元統乙亥初春除閩憲知事謝參政許可用惠茶春到人間才十日東風先過玉川家紫薇書寄斜封印黃閣香分上賜茶秋露有聲浮薤葉夜窗無夢到梅花清風兩腋歸何處直上三山看海霞阻風崔鎮有感逆風吹河河倒行阻風時節近清明南人北人俱上塜桃花杏花開滿城雖云年少慣作客但覺此日難為情河魚村酒亦足醉賴有同船好弟兄贈吳山紫陽庵女道士武林吳山紫陽庵浙民有丁姓者棄俗為全真一日忽召其妻入山書詩四句云懶散六十三妙用無人識順逆兩俱忘虛空鎮常寂坐抱一膝而逝俗謂之騎鶴化其妻束髮簪冠為女道士奉其夫蛻二十年不下山幾於得道神仙渺茫姑不暇論其婦一節乃可尚也婦年七十王其姓諱守素亦浙人云登覽之餘因為賦詩不見遼東丁令威舊遊城郭昔人非鏡中春去青鸞老華表山空白鶴歸石竹淚乾斑雨在玉簫聲斷綵雲飛洞門花落無人迹獨坐蒼苔補道衣過鵝湖寺十里蒼松對寺門四圍翠滴露紛紛湖心水滿通銀漢山頂鵝飛化白雲玉井芙蓉天畔出劒池雪浪月中聞石牀茶竈如招隱還許間人一半分臺山懷古粵王故國四圍山雲氣猶屯虎豹關銅獸暗隨秋露泣海鴉多背夕陽還一時人物風塵外千古英雄草恭間日暮鷓鴣啼更急荒苔野竹雨斑斑層樓廣寒世界夜迢迢醉拍闌干酒易消河漢入樓天不雨江風吹月海初潮影搖翠幕金蓮炬夢斷涼雲碧玉簫休唱後庭舊時曲六朝宫殿草蕭蕭題揚州驛銀燭高燒照不眠呼兒飲馬汲清泉寒砧萬户月如水塞雁一聲霜滿天金縷欵歌來枕上銀瓶索酒到亭前明朝走向燕山道贏得紅樓説少年次張舉韻題皖山金氏繡野亭南冠猶有舊風流説著舒州處處幽最喜園林動花竹不妨城郭帶林丘一樽濁酒青山暮三徑晚香黃菊秋未識孤高金處士杖藜應許約同遊贈學古淡上人瘦影相隨九節笻同袍無處覔行蹤逺看天目山中寺來聽石頭城裏鐘洗鉢泉通陳井水開窗雲度蔣陵松忽聞一夜猿啼月却憶飛來最上峰再遊崇禧寺野人再到城南寺臨水芙蓉次第開新酒瓦盆青映竹舊題石壁緑封苔夕陽半嶺牛羊下秋色滿天鴻雁來獨上新亭天地濶不須揮淚灑蓬萊題李遵道畫竹木圖風流未識生前面翰墨空遺死後名鳯尾拂雲秋有影龍頭出水夜無聲半生清節江南夢萬里靈槎海上行應逐錦袍弄明月倒騎赤鯉對吹笙次韻登凌歊臺山勢如龍去復回間雲野望護崇臺離宫夜有月高下輦路日無人往來春色不隨亡國盡野花只作舊時開斷碑衰草荒煙裏風雨年年上緑苔訪揭曼碩袐書城中車馬多如雲載酒問字無一人碧桃花開光艷艷硯池水暖波粼粼先生楷書白晝靜家童畫紙烏絲勻落紅滿地送客去十年不見江南春采石懷李白夢斷金雞萬里天醉揮秃筆掃蠻箋錦袍日進酒一斗采石江空月滿船金馬重門天似海青山荒塜夜如年抵應風骨蛾眉妬不作天仙作水仙登石城登臨未惜馬蹄遙古木秋高萬葉凋廢館徒傳陳後主新碑猶載晉南朝年深階路埋花徑雨壞山牆出翠翹六代興亡在何處石頭依舊打寒潮懷句曲外史霞佩翩翩出洞天當時倣佛見臞仙幾年海上張公子今日山中葛稚川滄海塵飛丹已熟玉堂人去榻空縣林間載酒來相覔乞寫丹經與世傳次韻寄張伯雨茅山句曲道人門不出幾時茫屨接殷勤春晴洗藥分泉去午睡烹茶隔竹聞山腳客行驚犬吠樹皮苔老結龍紋三層臺上月如水半夜吹簫入紫雲病中夜坐江樹花開午夜春緑香吹散隔簾雲吟詩思苦家人怪搗藥聲高鄰舍聞惟有工程餐白术亦無心事對紅裙消愁且喜樓西畔明月一池蛙亂喧招隱首山分韻得生字龍飛鳯隱知何處今日空餘黃鵠名千古江山圍故國五更風雨入空城猿啼洞府暮雲合花落祠堂春草生何日結茅向青壁抱琴坐石聽泉聲酌桂芳庭桂枝秋露洗銀瓶醉裏題詩記答曽接竹池通丹井水隔松人誦蘂珠經茶香石鼎燒紅葉酒渴氷盤破紫菱一帶鍾山青未了碧窗雲氣護龍亭次韻參政繼學王先生自海南還桂林空山幽響落林柯蠻犬呶呶吠碧蘿大庾嶺頭三月盡鬱孤臺下幾人過檳榔雨過鳩鳴急薜荔雲深猿嘯多幾度裁詩寄相憶江南如此奈愁何九華山題石潭驛馬上行人看九華飄飄高旆倚天涯排空峭石生玄筍落日竒峯挂赤霞仙掌三秋擎露屑天河半夜礙星槎雲中五老應招手喚客來遊太乙家夢登齊山得詩二首登高逺望四山齊何處風流杜牧之白苧曽聽松下唱紫簫還向月中吹野雲雨後無行迹芳草春深有斷碑夢裏勝遊間記得翠微亭上寫烏絲杖藜踏破碧崔嵬夢裏清遊樂未回萬壑泉聲松下去數行秋色雁邊來文章小杜人何在風雨重陽菊自開山路雲深行客倦竹雞飛上獨春臺答茅山道士見寄道人自有愛山癖蠟屐平生幾兩穿七竅冷雲秋噴竹一琴明月夜調絃山中紫府茅君宅肘後丹方許史傳短褐擬尋黃獨出長鑱斸雪早春前平望驛左帶吳松右太湖人家笑語隔菰蒲風濤不動魚龍國煙雨翻成水墨圖越客卧吹船上笛吳姬多倚水邊壚鑑湖道士如招隱一曲他年得賜無過紫薇庵訪馮道士道士愛幽居年來一事無盆池新過雨石上種菖蒲山中華蓋洞石氣冷蕭蕭不見眠雲客惟逢避雨樵過高郵射陽湖雜詠飄蕭樹梢風淅瀝湖上雨不見打魚人菰蒲雁相語秋風吹白波秋雨鳴敗荷平湖三十里過客感秋多憩奉真道院落花風揚步虛聲翠草玄芝爛熳生過客不知春早晚午窗晴日睡聞鶯過揚州買舟南浦秋聞雁呼酒西窗夜剪燈何處玉簫天似水瓊花一夜白如氷上京即事七首一派簫韶起半空水晶行殿玉屛風諸王舞蹈千官賀齊捧蒲萄壽兩宫上苑棕毛百尺樓天風搖曵錦絨鈎內家宴罷無人到面面珠簾夜不收行殿參差翡翠光朱衣花帽宴親王繡簾齊卷熏風起十六天魔舞袖長中官作隊導宫車小樣紅靴踏軟沙昨夜內家清暑宴御羅涼帽插珠花大野連山沙作堆白沙平處見樓臺行人禁地避芳草盡向曲闌斜路來院院翻經有呪僧垂簾白晝點酥燈上京六月涼如水酒渴天厨更賜氷牛羊散漫落日下野草生香乳酪酣卷地朔風沙似雪家家行帳下氊簾過贊善庵夕陽欲下行人少落葉蕭蕭路不分修竹萬竿秋影亂山風吹作滿窗雲將遊茅山先寄張伯雨借騎白鶴訪茅君琪樹秋聲隔夜聞料得山中張外史開門先掃鶴巢雲春日鎮陽栁溪道院城外青溪出洞門道人歸去日長曛栁花滿地無人掃隔水遙看是白雲寄奎章學士濟南李溉之山東李白似劉伶投老歸來酒未醒天下三分秋月色二分多在水心亭黃河舟中月夜十丈雲帆拂斗杓星槎風急浪花飄夜深露冷銀河近卧聽天孫織絳綃釣臺夜興仙茶旋煮桐江水坐客遙分石壁燈風露滿船山月上夜深獨對釣臺僧早發山頭鐘響不聞雞重露翻鴉滿樹啼艇子釣臺東畔發月輪却在釣臺西泊江家步無月同孟志學小酌蘭溪春水似蒲萄越女如花壓小槽今夜共君溪上醉直須溪月照宫袍黃亭驛曉起積雨莓苔上壁青曉寒山館夢初醒鷓鴣聲裏流年度自是行人不願聽閩城嵗暮嶺南春早不見雪臘月街頭聽買花海國人家除夕近滿城微雨濕山茶彭城雜詠三首亞父塜前春草齊楚王城上夕陽低黃鶯不解興亡事飛過海棠枝上啼城下黃河去不回四山依舊畫屛閉無人念得登臨意獨上將軍戲馬臺何處春風燕子樓斷碑落日古城頭畫眉人逺繁華歇無數逺山生暮愁奎章閣感興二首奎章三月文書靜花落春深鎖閣門玉座不移天步逺石碑空有御書存花落春深似去年無人再到閣門前當時濟濟誇多士爭進文章乞賜錢京城立春燕姬白馬青絲韁短衣窄袖銀鐙光御溝飲馬不回首貪看栁花飛過墻雪中妃子梁王宴罷下瑶臺窄窄紅靴步雪來疑是陽和三月暮楊花飛處牡丹開醉起楊栁樓心月滿牀錦屏繡褥夜生香不知門外春多少自起移燈照海棠宫詞駿馬驕嘶懶著鞭晚涼騎過御樓前宫娥不識中書令借問誰家美少年黃河斗杓照水半垂天水氣漲天如白煙南北櫓聲爭上下月中聞鼓避官船宋元詩會卷八十
