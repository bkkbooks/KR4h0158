body:
  text: 宋元詩會卷八十兵部主事陳焯編薩都拉下華清曲題楊妃病齒沈香亭北春書長海棠睡起扶殘妝清歌妙舞一時静燕語鶯啼空斷腸朱唇半啟榴房破脂清紅注珍珠顆一㸃春酸入瓠犀雪色鮫綃濕香唾九華帳裏熏蘭烟玉肱曲枕珊瑚偏玉釵半脱翠蛾斂龍髯天子空垂涎妾身雖侍君王側别有閒情向誰說斷腸塞上錦䙀兒萬恨千愁言不得成都遥進新荔枝金盤紫露甘如飴紅塵一騎不成笑病中風味心自知君不聞華清宫一齒作楚蔵禍癰又不聞馬嵬坡一身濺血未足多漁陽一日鼙鼔動始覺開元天下痛雲臺不見漢功臣三十六牙何足用楊花曲燕京女兒十六七顔如花紅眼如漆蘭香滿路馬如飛窄袖籠鞭嬌欲滴春風淡蕩揺春心銀筝銀燭高堂深繡裳不暖錦鴛夢紫烟紅霧天沈沈芳年誰惜去如水春困著人倦梳洗夜来小雨濕天街滿院楊花飛不起芙蓉曲兼善狀元索賦秋江渺渺芙蓉香秋江女兒將斷腸綘袍春淺䕶雲暖翠袖日暮迎風凉鯨魚風起江波白霜落洞庭飛木葉蕩舟何處採蓮人愛惜芙蓉悴顔色如夢曲哀燕將軍芙蓉花為誰好洞房昨夜將軍老將軍老去空鐵衣漆燈照室人不歸宫錦袍氊帳高将軍夜酌凉蒲萄蒲萄力重醉不醒美人猶在珊瑚枕海子頭誰家樓繡簾半捲風悠悠行人謂是將軍府將軍不来罷歌舞平村曲春水緑將軍獵囘曽此宿將軍一去成荒丘依舊平村春水流皓齒歌細腰舞緑窻朱戸將軍府將軍老去無少年為野草兮為荒田如花人櫻桃唇傍人近前丞相嗔繁華日日笙歌動世事悠悠總如夢鞦韆謡寒梅零落春雪灑蕭娘腰瘦無一把淡黄楊栁未成陰何人已繫青驄馬畫樓深處迎春歸鞦韆影裏紅杏肥濛濛花氣濕人面東風吹冷輕羅衣衣上粉珠流不歇暗解翠裙花下摺殷勤莫遣燕子知㑹向人間報風月過嘉興三山雲海㡬千里十幅蒲帆挂秋水呉中過客莫思家江南畫船如屋裏蘆芽短短穿碧沙船頭鯉魚吹浪花呉姬蕩槳入城去細雨小寒生緑紗我歌水調無人續江上月凉吹紫竹春風一曲鷓鴣詞花落鶯啼滿城緑江南樂江南樂春水虹橋滿城郭出門不用金馬絡門前花船如畫閣緑紗窻虚鎖春霧隔窻蛾眉秋水活翡翠冠高羅袖濶楚舞呉歌勸郎酌紫竹瑶絲相間作船頭栁花如雪落船尾彩旗風綽綽秉燭夜遊隨意足人生無如江南樂江南怨江南怨生男逺遊生女賤十三畫得蛾眉成十五新妝識郎面識郎一面思猶淺千金買官遊不轉郎家水田跨州縣大船小船過淮甸買官未得不肯歸不惜韶華去如箭楊花簾幕飛乳燕疎雨梧桐閉深院人生無如江南怨過居庸闗至順癸酉嵗居庸闗山蒼蒼闗南暑多闗北凉天門曉開虎豹卧石鼔晝撃雲雷張闗門鑄鐵半空倚古来㡬度壯士死草根白骨棄不收冷雨陰風泣山鬼道傍老翁八十餘短衣白髪扶犁鋤路人立馬問前事猶能歴歴言丘墟夜来鋤豆得戈鐵雨蝕風吹失顔色鐵腥惟帶土花青猶是將軍戰時血前年人復鐵作門貔貅萬竈如雲屯生存有功挂玉印死者誰復招孤魂居庸闗何崢嶸上天胡不呼六丁驅之海外休甲兵男耕女織天下平千古萬古無戰争七夕後一夜樂陵臺上懐李御史公藝凉風吹動梧桐葉㵼下泠泠露華白樂陵臺上悄無人獨倚梧桐看秋月月高當午桐影直不覺衣沾露華濕此時却憶金陵人酒醒江樓聴吹笛偕卞敬之遊呉山駝峯紫陽洞天風吹我登駝峯大山小山石玲瓏赤霞日射紫瑪瑙白露夜滴青芙蓉飄飄雲氣穿石室石上凉風吹細竹挂冠何日賦歸来掃石篝燈洞中宿題壽監司所藏美人織錦圖卷中織錦秦川女大姬啞啞弄機杼小姬織倦何所思簾幕無人燕雙語成都花發江水春門前馬嘶車轔轔髻雲兩耳看欲墮蛾眉八字畫不伸行人一去無消息氷蠶吐絲成五色柔腸九曲細如絲萬縷春愁政如織綺窻睡起聞早鶯西樓月落金盆傾暖霞拂地海棠曉香雪潑戸梨花晴日長春院機聲動梭影穿花飛小鳯水心驚起鴛鴦棲花底不成蝴蝶夢纎纎玉指柔且和香鈎小襪裁春羅滿懐心事付流水蕩目雲錦迴青波梅仙山行赤星落地漢祚㣲端門日日腥風吹咸陽秋色壓宫樹金人夜泣銅駝悲先生袖疏探虎窟漢鼎猶堪支一足九重烟霧似海深門外何人知慟哭賊莽白日升高臺玉璽墮地聲如雷周公揖譲孺子戲絳袍將軍何日来塵飛滄海風擲瓦白鶴身輕快如馬一聲鐵笛度閩闗山月溪風共瀟灑龍争虎鬭耳不聞長嘯袖拂松枝雲夜鐺白石煮秋雨玉佩赤錦飄霞裙先生一去㡬千載尚有當年遺跡在題詩絶壁寄先生頓使林巒顔色改藥爐寂寞秋草深丹井水落莓苔侵至今火灰化為土猶有丹光穿樹林過淮河淮水清河水黄出門偶爾同異鄉排空捲雲若飛電隨風逐浪庸何傷東流入海殊不惡萬里同行有清濁西樓别寄閩憲諸公八月八日溪上别溪上彩旗紅獵獵離情已逐渡江雲邊草連天翦秋色玉驄金虎諸大夫欲别不别留斯須沙明淺渚白鳥下酒盡落日青山孤丈夫有淚不須灑去客挂帆君上馬悠悠囘首各東西惟見西溪捕魚者閩闗一片月太行一片雲雁書逺寄隔山嶽雲飛月明多憶君送友人之金陵陳郎買舟上金陵寒江水落風浪小飛帆逺挂蔣山青空城畫角秦淮曉白門酒美東冶亭呉姬喚客客不行樓中子弟盡年少玉奴行酒吹鸞笙陳郎不聴黄金縷朝走東呉暮走楚半生落魄一故袍感慨長歌弔千古六朝遺跡生暮烟故家荒塜迷花鈿鳯凰臺上醉李白何人知子囊無錢為九江方七高賦匡廬山中有佳士讀書結屋青雲松碧窻夜影紫翠動落日照見香爐峯窺燈夜壁山鬼過采蘭東徑仙人逢危簷墮雪聴風竹古寺隔嶺聞烟鐘每思幽絶動歸興嵗晩落葉迷行踪扁舟何日過湖口分我半壁青芙蓉中秋月夜泛舟於金陵石頭城秦淮流水西復東倒涵天影磨青銅飛廉掃空出海月明珠飛入琉璃宫著我扁舟二三友江上雪槎泛牛斗笑語人間兩岸燈進君江上一尊酒醉来起舞聴浩歌宛如玉樹春風和世間樂事古来少天下明月今夕多六代江山自瀟灑潮落潮生石城下人生得意當夜遊此月此水年年秋雨傘開如輪合如束剪紙調膏䕶秋竹日中荷葉影亭亭雨裏芭蕉聲簌簌晴天却陰雨却晴二天之説誠分明但操大柄常在手覆盡東西南北行春别花氣壓簾愁不掃細雨粼粼長芳草玉釵燕尾剪春寒坐惜流年鏡中老東風吹栁人不知春嬌滿眼顰雙眉呉松錦字夢中得曉来月落聞烏啼南園日暖蝴蝶醉香霧熏人海棠睡朱門小立蹴金蓮落紅起作離人淚春遊太真觀東風惱人如著酒曉鶯啼斷門前栁青山忽然契我懐飛上𤣥都拾星斗緑雲弄雨小立久㡬片落花春在手遼東白鶴胡不歸松下丹鉛老霜臼過桐廬桐廬山水天下清洪濤拍岸山圍城桐君已乗丹鳯去世間草木誰知情落日揺紅魚尾赤江上潮囘沙嘴立三三兩兩野人家半住漁村半樵牧盡抛章甫求仙靈松間黄鶴喚不應阻風三日看山色平生慣識枯枝藤碧桃海上開多少㡬度春風長瑶草白雲滿地不歸来石爛松枯天地老送石民瞻呉江訪友老友呉江去呉江水尚高一樽散鱸膾四月過櫻桃矍鑠緑玉杖風流白紵袍西窻故人夜應是動揮毫和學士伯生虞先生寄韻白鬢眉山老玉堂清晝閒聲名滿天下翰墨落人間才俊賈太傳行高元魯山獨憐江海客樽酒夜䦨珊投宿龍潭道林寺倦遊借禪榻客意稍從容落日江船鼓孤燈野寺鐘竹雞啼雨過山臼帶雲舂半夜波濤作長潭起卧龍送景南上人歸江西登高傷逺别鴻雁㡬行飛萬木江頭落一僧船上歸故山秋嶂逺殘日晚鐘㣲亦有同袍者多應候竹扉偕趙逢吉避暑石頭城日暮余歸逢吉留宿山中却寄竹下一僧坐城頭獨客還星河到平地風露滿空山犬吠松林外燈明石壁間故人借禪榻心共白雲閒夜宿昇龍觀舊日宸遊地朱欄䕶輦紋龍飛九天雨鶴夢一龕雲神火丹爐見仙音客枕聞殷勤謝道士深夜禮茅君秋日雨中登石城訪長老珪白巖不遇石頭城畔去紅葉雨紛紛半日不見路四山都是雲魚龍隨水上鐘磬隔江聞遥憶南莊叟天寒補衲裙苦雨水溢呈憲司諸公病客如僧懶多寒擁毳裘三山一夜雨四月滿城秋海瘴連雲起江湖入市流釣竿如在手便可上漁舟送李恕可隨王宗師入京借得茅山鶴乗風飛上天江聲近九里客路已三千禁闕紅雲上家鄉碧海邊待聞金馬詔復見玉堂仙送莫秀才歸番陽番陽秋水落白下買船還逺夢驚新雁歸帆識舊灣打碑過薦福携酒看芝山却憶曽遊處清溪萬栁間寄石民瞻京口石彭澤詩懐似鶴形蒼天容老健白髪照江清夜鼎薫雞舌秋袍織鳯翎醉扶緑玉杖應望石頭城題紫薇觀馮道士房卜築長江上囘峯晩更竒山村猿索飯竹屋鶴聴碁雲䕶燒丹竈泉香洗藥池道人足高興不許俗人知次崔鎮壁間韻木落嵗時晏黄雲欲雪天買魚河下客立馬渡頭船野逈風欺㡌天寒袖裹鞭夜眠三鼓後晚發五更前寄王御史御史傳天語飛霜到海垠浙江潮似雪閩海臘如春孤客見明月亂山愁逺人何時動歸興家有白頭親送管元帥南征楚帆風一葉此去㡬時還日暮漢江碧雨晴湘竹斑邊聲連草木野色動荆蠻决策平猺後歸心北固山鍾山遇風雨城市多驄馬清遊有㡬人山靈飛白雨朝士説紅塵雲起鐘樓暝桃開野寺春上人歸太晚誰主復誰賔龍潭送侍中田美中攜酒十里作公子青驄馬追隨十里遥風頭雲葉凍酒面雪花消惜别頻囘首無因見舞腰君歸金帳暖何限可憐宵送宣古木鐵面小將軍旌旗照海門兵機出孫武膽氣走桓温社稷劒三尺乾坤酒一樽茫茫雲漢内此意與誰論山中懐友自是麒麟種卑栖又㡬年故廬南雪下短褐北風前嵗暮山林瘦天高雨露偏惟應丈夫志未受故人憐送唐卿御史去去紅塵外秋光滿華嵩故鄉歸衣錦行路避乗驄未覺長安逺真成冀北空燕山一枝桂囘首正西風宿大横驛燈火明沙渡牛羊過水西村舂千澗落野店四山齊桂樹偏冝月人家盡向溪秋蟾莫相惱惟聴度闗雞遊梅仙山和唐人韻二首城郭千峰合仙凡一水分顛崖縣鳥道亂石聚羊羣苔井分丹水茶爐煮白雲肩輿萬松嶺有客訪梅君絶頂尋仙跡寒泉照病容栖鸞多種竹愛鶴莫移松丹藥人来乞山稉手自舂秋深霜葉滿麋鹿日相逢次王御史江城連日雪騎馬欲何之老樹昏鴉集寒塘落雁遲松窻燈下酒竹屋夜深棋寄語王公子幽棲或可期塵鏡古鏡色如墨千年獨此留玉臺蟲網暗珠匣土花浮莫笑塵埃滿曽令鬼魅愁蟠龍今已化雲雨夢悠悠廢檠不解照珠翠早同文字盟何年中路棄無復向人明宿雨高齋夢秋吟廢館情相看㡬今夕及此慨平生斷碑零落秋風卧何年破廟碑圖經愁莫載耆舊説頻移野燒龜文失荒臺鳥跡疑遥知千載後拂拭轉堪悲卧鐘龍虡久摧折深埋奈爾何耕民誰睥睨野衲自摩挲雅奏多年歇銘文㡬字訛斜陽荆棘裏長伴舊銅駝道中謾興雲氣千峰暝溪流水拍橋竹溪泥滑滑榕樹雨瀟瀟曲棧鈎崖角垂虹挂嶺腰山家酒初熟或許借椰飄京口夜坐鐵甕城頭刻漏遲凉霜如雪撲簾飛雁聲墮地夢迴枕月色滿城人搗衣塞北将軍猶索戰江南遊子苦思歸呼鷹腰箭從圍獵苜蓿秋深馬正肥登金山雄跨亭朱欄六曲倚高秋元氣茫茫日夜浮客去客来天地老潮生潮落古今愁疎鐘水國前朝寺落日海門何處舟更擬黄昏盡餘興却從燈火望揚州寄天竺長老訴笑隠召住大龍翔集慶寺東南隠者人不識一日才名動九重地濕厭看天竺雨月明来聴景陽鐘衲衣香暖留春麝石鉢雲寒卧夜龍何日相從陪杖履秋風江上採芙蓉高郵城樓曉望城上高樓城下湖城頭畫角曉嗚嗚望中燈火明還滅天際星河澹欲無隔水人家種楊栁帶霜鳬雁起菰蒲短衣匹馬非吾事擬向烟波覔釣徒和中丞伯庸馬先生贈别江南驛使路遥遥逺赴龍門看海潮桂殿且留修月斧銀河未許渡星軺隔花立馬聴更漏帶月鳴珂趂早朝秪恐淮南春色動萬竿烟雨緑相招寄京口鶴林寺長老即休白頭不出城南寺枯坐蒲團笑客忙過暑葛衣從破碎逢秋竹院愈荒凉空山雲濕龍歸鉢古屋松低鶴到牀遥憶題詩舊遊處夜深東壁月蒼蒼次學士盧疎齋題贈句容唐别駕疎齋落落謫仙才句曲名山數往来晚讀茶經醫酒病春從隣舍覔花栽昔年奏對含雞舌今日登臨獨鳯臺賴有閒居唐别駕相尋猿鶴莫驚猜三衢守馬昂夫索題爛柯山石橋洞口龍眠紫氣多登臨聊和采芝歌爛柯仙子何年去鞭石神人此地過烏鵲横橋秋有影銀河垂地夜無波遥知題柱凌雲客天近應聞織女梭宿茅山崇禧觀南塢樓天際三峯横紫烟山前山後盡芝田樓臺木末疑無路雞犬雲中半是仙白石經年皆化玉青松鎮日秪聞泉曲林三館幽棲地一夜鐘樓聴雨眠登鎮陽龍興寺閣觀銅鑄梵容眼中樓觀見應稀鐵鳯棲簷勢欲飛天半寶花飄閣道月中桂子落僧衣高擎玉露仙人掌上碍銀河織女機全趙堂堂遺物在山川良是昔人非送僉事王君實之淮東使君臘月揚州去東閣梅開雪壓枝淮上有官皆避馬竹西無處不題詩春風楊栁平山路夜月瓊花后土祠從此公餘多勝覧好傳佳句逺人知元統乙亥初春除閩憲知事謝叅政許可用惠茶春到人間纔十日東風先過玉川家紫薇書寄斜封印黄閣香分上賜茶秋露有聲浮薤葉夜窻無夢到梅花清風兩腋歸何處直上三山看海霞阻風崔鎮有感逆風吹河河倒行阻風時節近清明南人北人俱上塜桃花杏花開滿城雖云年少慣作客但覺此日難為情河魚村酒亦足醉賴有同船好弟兄贈呉山紫陽庵女道士武林呉山紫陽庵淛民有丁姓者棄俗為全真一日忽召其妻入山書詩四句云懶散六十三妙用無人識順逆兩俱㤀虚空鎮常寂坐抱一膝而逝俗謂之騎鶴化其妻束髪簪冠為女道士奉其夫蛻二十年不下山㡬於得道神仙渺茫姑不暇論其婦一節乃可尚也婦年七十王其姓諱守素亦淛人云登覧之餘因為賦詩不見遼東丁令威舊遊城郭昔人非鏡中春去青鸞老華表山空白鶴歸石竹淚乾斑雨在玉簫聲斷綵雲飛洞門花落無人迹獨坐蒼苔補道衣過鵞湖寺十里蒼松對寺門四圍翠滴露紛紛湖心水滿通銀漢山頂鵞飛化白雲玉井芙蓉天畔出劒池雪浪月中聞石牀茶竈如招隠還許閒人一半分臺山懐古粤王故國四圍山雲氣猶屯虎豹闗銅獸暗隨秋露泣海鴉多背夕陽還一時人物風塵外千古英雄草恭間日暮鷓鴣啼更急荒苔野竹雨斑斑層樓廣寒世界夜迢迢醉拍䦨干酒易消河漢入樓天不雨江風吹月海初潮影摇翠幙金蓮炬夢斷凉雲碧玉簫休唱後庭舊時曲六朝宫殿草蕭蕭題揚州驛銀燭高燒照不眠呼兒飲馬汲清泉寒砧萬户月如水塞雁一聲霜滿天金縷欵歌来枕上銀瓶索酒到亭前明朝走向燕山道贏得紅樓説少年次張舉韻題皖山金氏繡野亭南冠猶有舊風流説著舒州處處幽最喜園林動花竹不妨城郭帶林丘一樽濁酒青山暮三徑晚香黄菊秋未識孤高金處士杖藜應許約同遊贈學古澹上人瘦影相隨九節笻同袍無處覔行蹤逺看天目山中寺来聴石頭城裏鐘洗鉢泉通陳井水開窻雲度蔣陵松忽聞一夜猿啼月却憶飛来最上峰再遊崇禧寺野人再到城南寺臨水芙蓉次第開新酒瓦盆青映竹舊題石壁緑封苔夕陽半嶺牛羊下秋色滿天鴻雁来獨上新亭天地濶不湏揮淚灑蓬莱題李遵道畫竹木圖風流未識生前面翰墨空遺死後名鳯尾拂雲秋有影龍頭出水夜無聲半生清節江南夢萬里靈槎海上行應逐錦袍弄明月倒騎赤鯉對吹笙次韻登凌歊臺山勢如龍去復迴閒雲野望䕶崇臺離宫夜有月高下輦路日無人往来春色不隨亡國盡野花只作舊時開斷碑衰草荒烟裏風雨年年上緑苔訪掲㬅碩袐書城中車馬多如雲載酒問字無一人碧桃花開光艶艶硯池水暖波粼粼先生楷書白晝静家童畫紙烏絲勻落紅滿地送客去十年不見江南春采石懐李白夢斷金雞萬里天醉揮秃筆掃蠻箋錦袍日進酒一斗采石江空月滿船金馬重門天似海青山荒塜夜如年抵應風骨蛾眉妬不作天仙作水仙登石城登臨未惜馬蹄遥古木秋高萬葉凋廢館徒傳陳後主新碑猶載晉南朝年深堦路埋花徑雨壊山牆出翠翹六代興亡在何處石頭依舊打寒潮懐句曲外史霞佩翩翩出洞天當時彷彿見臞仙㡬年海上張公子今日山中葛稚川滄海塵飛丹已熟玉堂人去榻空縣林間載酒来相覔乞冩丹經與世傳次韻寄張伯雨茅山句曲道人門不出㡬時茫屨接殷懃春晴洗藥分泉去午睡烹茶隔竹聞山脚客行驚犬吠樹皮苔老結龍紋三層臺上月如水半夜吹簫入紫雲病中夜坐江樹花開午夜春緑香吹散隔簾雲吟詩思苦家人怪搗藥聲高隣舍聞惟有工程餐白术亦無心事對紅裙消愁且喜樓西畔明月一池蛙亂喧招隠首山分韻得生字龍飛鳯隠知何處今日空餘黄鵠名千古江山圍故國五更風雨入空城猿啼洞府暮雲合花落祠堂春草生何日結茅向青壁抱琴坐石聴泉聲酌桂芳庭桂枝秋露洗銀瓶醉裏題詩記答曽接竹池通丹井水隔松人誦蘂珠經茶香石鼎燒紅葉酒渇氷盤破紫菱一帶鍾山青未了碧窻雲氣䕶龍亭次韻叅政繼學王先生自海南還桂林空山幽響落林柯蠻犬呶呶吠碧蘿大庾嶺頭三月盡鬱孤臺下㡬人過㯽榔雨過鳩鳴急薜荔雲深猿嘯多㡬度裁詩寄相憶江南如此奈愁何九華山題石潭驛馬上行人看九華飄飄高旆倚天涯排空峭石生𤣥筍落日竒峯挂赤霞仙掌三秋擎露屑天河半夜礙星槎雲中五老應招手喚客来遊太乙家夢登齊山得詩二首登高逺望四山齊何處風流杜牧之白苧曽聴松下唱紫簫還向月中吹野雲雨後無行跡芳草春深有斷碑夢裏勝遊閒記得翠㣲亭上冩烏絲杖藜踏破碧崔嵬夢裏清遊樂未囘萬壑泉聲松下去數行秋色雁邊来文章小杜人何在風雨重陽菊自開山路雲深行客倦竹雞飛上獨春臺答茅山道士見寄道人自有愛山癖蠟屐平生㡬兩穿七竅冷雲秋噴竹一琴明月夜調絃山中紫府茅君宅肘後丹方許史傳短褐擬尋黄獨出長鑱斸雪早春前平望驛左帶呉松右太湖人家笑語隔菰蒲風濤不動魚龍國烟雨翻成水墨圖越客卧吹船上笛呉姬多倚水邊壚鑑湖道士如招隠一曲他年得賜無過紫薇庵訪馮道士道士愛幽居年来一事無盆池新過雨石上種菖蒲山中華盖洞石氣冷蕭蕭不見眠雲客惟逢避雨樵過高郵射陽湖雜詠飄蕭樹梢風淅瀝湖上雨不見打魚人菰蒲雁相語秋風吹白波秋雨鳴敗荷平湖三十里過客感秋多憩奉真道院落花風颺歩虚聲翠草𤣥芝爛熳生過客不知春早晚午窻晴日睡聞鶯過揚州買舟南浦秋聞雁呼酒西窻夜剪燈何處玉簫天似水瓊花一夜白如氷上京即事七首一派簫韶起半空水晶行殿玉屛風諸王舞蹈千官賀齊捧蒲萄壽兩宫上苑棕毛百尺樓天風揺曵錦絨鈎内家宴罷無人到面面珠簾夜不收行殿参差翡翠光朱衣花㡌宴親王繡簾齊卷熏風起十六天魔舞袖長中官作隊導宫車小様紅靴踏輭沙昨夜内家清暑宴御羅凉㡌揷珠花大野連山沙作堆白沙平處見樓臺行人禁地避芳草盡向曲䦨斜路来院院翻經有呪僧垂簾白晝㸃酥燈上京六月凉如水酒渇天厨更賜氷牛羊散漫落日下野草生香乳酪酣卷地朔風沙似雪家家行帳下氊簾過贊善庵夕陽欲下行人少落葉蕭蕭路不分脩竹萬竿秋影亂山風吹作滿窻雲将遊茅山先寄張伯雨借騎白鶴訪茅君琪樹秋聲隔夜聞料得山中張外史開門先掃鶴巢雲春日鎮陽栁溪道院城外青溪出洞門道人歸去日長曛栁花滿地無人掃隔水遥看是白雲寄奎章學士濟南李溉之山東李白似劉伶投老歸来酒未醒天下三分秋月色二分多在水心亭黄河舟中月夜十丈雲帆拂斗杓星槎風急浪花飄夜深露冷銀河近卧聴天孫織絳綃釣臺夜興仙茶旋煮桐江水坐客遥分石壁燈風露滿船山月上夜深獨對釣臺僧早發山頭鐘響不聞鷄重露翻鴉滿樹啼艇子釣臺東畔發月輪却在釣臺西泊江家步無月同孟志學小酌蘭溪春水似蒲萄越女如花壓小槽今夜共君溪上醉直湏溪月照宫袍黄亭驛曉起積雨莓苔上壁青曉寒山館夢初醒鷓鴣聲裏流年度自是行人不願聴閩城嵗暮嶺南春早不見雪臘月街頭聴買花海國人家除夕近滿城㣲雨濕山茶彭城雜詠三首亞父塜前春草齊楚王城上夕陽低黄鶯不解興亡事飛過海棠枝上啼城下黄河去不囘四山依舊畫屛閉無人念得登臨意獨上将軍戯馬臺何處春風燕子樓斷碑落日古城頭畫眉人逺繁華歇無數逺山生暮愁奎章閣感興二首奎章三月文書静花落春深鎖閣門玉座不移天步逺石碑空有御書存花落春深似去年無人再到閣門前當時濟濟誇多士争進文章乞賜錢京城立春燕姬白馬青絲繮短衣窄袖銀鐙光御溝飲馬不囘首貪看栁花飛過墻雪中妃子梁王宴罷下瑶臺窄窄紅靴步雪来疑是陽和三月暮楊花飛處牡丹開醉起楊栁樓心月滿牀錦屏繡褥夜生香不知門外春多少自起移燈照海棠宫詞駿馬驕嘶懶著鞭晚凉騎過御樓前宫娥不識中書令借問誰家美少年黄河斗杓照水半垂天水氣漲天如白烟南北櫓聲争上下月中聞鼓避官船宋元詩會卷八十
