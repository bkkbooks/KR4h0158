body:
  text: 宋元詩會卷三十二兵部主事陳焯編黃裳字冕仲延平人元豐間舉進士第一官至尚書有演山集六十卷莆田王悅序其稿曰延平有劍潭綿亘數百里蛟龍宅之其北曰演峰氣象清爽為神人棲息之地尚書端明黃公家於其間集名演山蓋有取焉公之高文大册汪洋瀚漫不知紀極當韋布時著作已林立矣及洊歷華要撰述愈勤要之淵源六經栽培教化故足尚也按王序如此其文不多傳於世惟山谷詩中屢有與冕仲倡和之作則風致亦可想見矣道倫竹閣曾看孤山翠微麓回環閣下千莖竹醉吟先生唐室賢灑落情懷出流俗赤城德士攀髙風特借嘉名榜山腹雪霜難犯中心虛直節凌雲聳蒼玉月華弄影無纎塵合有丹霄鳳來宿燕子樓盼盼初歸樓上時相如燕子長雙飛有才將色世間少况復節義猶堪依將軍一去十餘載玉簫瑤瑟無心解豈不能死空相隨以色纍公非所知白老曾為賦詩客風裊花枝醉無力後會勳郎漢陽驛因語歔欷已成昔走筆還賡美人句猶感白楊堪作柱我來登賞非唐人尚引多情聊愴神人生興盡皆為塵百年一餉難留春髙樓人散誰復親只有燕子年年新簡元輿祠部百花巖上仙人住巖下為州山水聚白頭青冢南北人倒影沈沈濁懷古倚欄把酒與誰同况是使君為獻主應喚漁舟疏葦中旋膾遊鱗落紅縷祕書座上最軒昂能共春雲爭態度紅衣帶月今何處幾轉春殘掩朱户飛船送客空斷腸梁塵謾落聲中句虛白亭前湖水間忽為霓裳起思慕出門沙土亂如雨薰風吹夢天南去簡無咎學士北澶車馬來何暮芹茅池邊失歡聚有分共為文字遊却向西郊話今古世俗聰明多澆漓信厚期君中有主職事無塵靜相對滿榻詩書香數縷嚴扄如在柳隂中緑幄朱簾細風度紫犀銙破雪花濃石鼎煎聲繞窗户凖擬七碗邀盧同清滌煩襟出新句共笑先生最貧苦誤使簾前客相慕虛名薄利能幾多裹飯區區來復去初秋偶作火行金候兩猶爭擾擾蚊蠅自未平雲漏雨聲蒸地爽日含山色暮天明直須紈扇恩情斷始向籬花意態生萬里薄寒無一點月明中看雁初橫聞雁露下多時雁未鳴數聲雲外此宵征北人書到三秋盡南國弓開一字橫孤館有誰驚好夢平蘆何處起寒更想應爼上終須免宜向方塘寄此生除夜送代倪簽判北風吹雪抹潮頭待過東南第一州去客情生來歲夢隔江燈照此時愁玉皇謫吏行當復金闕除書即便收言簡氣清終有用卧龍山下自難留社日遊雲門山不須扶我自登山腳力能勝十八盤一字雁低頭上過兩城人細掌中看雖知北户緣猶在却笑南柯夢未闌忽見歸雲應是信滿襟先得洞天寒朝沖之字叔用舉進士與喻汝礪為同門生紹聖間黨禍興其兄以道及羣從多入黨人籍中叔用逺引遁居具茨山下踰十年廷議將欲用之竟高蹈不起其詩有具茨集紀愁北風吹我裳夏潦漂我屋牛羊踐我稼雀鼠耗我穀雪寒墮我指雨淫疾我腹朝行桑榆間秋序傷逺目莫涉水之涯含沙中兩足攬轡馬病黃伏軾輿脫輹陟山既見虎還舍乃對鵩一沐三握髮十飯九不肉先生昔離垢居士今耐辱飽聞戒畏塗那知有沈陸雪月落雞聲寒曉色靜茅屋開門驚不知夜雪壓修竹槎牙生新氷鱗甲刻溪谷晶晶洲渚明冽冽川原肅孤蹲雀不動沈酣客猶宿呼童晨汲歸獨潄寒泉玉陸元鈞宰寄日注茶我昔不知風雅頌草木獨遺茶北諷陋哉徐鉉説茶苦欲與淇園竹同種又疑禹漏稅九州橘柚當年錯包貢腐儒妄測聖人意逺物勞民亦安用含桃熟薦當在盤荔子生來枉飛鞚羊葅異好亦何有蚶菜殊珍要非奉君家季疵真禍首毁論徒勞世仍重爭新鬭試誇擊拂風俗移人可深痛老夫病渴手自煎嗜好悠悠亦從衆更煩小陸分日注密封細字蠻奴送槍旗却憶採擷初雪花似是雲溪動更期遺我但敲門玉川無復周公夢贈僧法一墨黃山之巔百尺松虬枝偃蓋連羣峰山神守護魑魅避道人剪伐天為容捫崖踸踔篝火逺絶壁暗靄凝煙濃玄霜霏霏玉杵下捕麋煮角當嚴冬隂房風日不可到律琯吹盡灰無蹤小書細字著名姓黃金照耀圖雙龍守臣再拜選進日九關有詔開重重老儒偶得實天幸千金更買無由逢上人淡泊何所好工書草𨽻如飛蓬苦來求我惜不得一酬十載相過從君不見玉堂詞人紫垣客拜賜舞蹈黃羅封長安紙價猶未貴江南江北山皆童復以承晏墨贈之法一謂前墨不佳故我聞江南墨官有諸奚老超尚不如廷圭後來承晏復秀出喧然父子名相齊百年相傳文斷碎倣佛尚見蛟龍背電光屬天星斗昏雨痕倒海風雲晦却憶當年清暑殿黃門侍立才人見銀鈎灑落桃花箋牙牀磨試紅絲研同時書畫三萬軸大徐小篆徐熙竹御題四絶海內傳祕府毫芒惜如玉君不見建隆天子開國初曹公受詔行掃除王侯舊物人今得更寫西天貝葉書簡江子之求茶政和密雲不作圃小夸寸許蒼龍蟠金花絳囊如截玉緑面倣佛松溪寒人間此品那可得三年聞有終未識老夫於此百不忙飽食但苦夏日長北窗無風睡不解齒頰苦澀思清涼故人新除協律郎交遊多在白玉堂揀牙鬭夸皆飫嘗幸為傳聲李太府煩渠折簡買頭綱寄王立之臘雨城南宅衝寒憶屢陪拊憐庭下石問訊竹間梅諸子譍門立羣公跋馬回不知多病後誰與倒樽罍寄江子之平生江季子疏懶近忘吾不啻三年别如何一字無燒丹勾漏令釀酒步兵厨二者將安擇功名莫浪圖初來東里乘流從此去河漢失清都送騎沙邊散征帆雨外孤挾雌栖隴雉生子哺巢烏宇宙將焉往飄飄盡畏途再至都城崢嶸花蕚西清曉望猶迷御路紅塵合宫槐碧瓦齊夾城知輦過復道覺香低中使傳宣入千門避馬蹄秋雨感事苦雨荒秋宅寒生木葉悲半縣藤護碧中缺蔓穿籬書校時開帙竿垂日繫絲儒冠吾已誤何責五男兒别飾道二十弟賁之少傅三朝老文章壯九州賦詩資政殿賜字太清樓跋燭辭軒陛簪花近冕旒慶門吾老矣華國汝能不别息道二十二弟兌之中令有清德風流二百年舉家惟食粥絶口不言錢里閈容吾老庭闈賴汝賢陶丘過范蠡莫泛五湖船贈江子我子之江郎淮海秀經術古同師溫潤無前輩清新有近詩一丘須蚤計五斗莫堅辭獻賦修竿牘知君定不為送惠純上人遊閩蚤聽閩人説土風此身嘗欲到閩中春溝水動茶花白夏谷雲生荔子紅襟帶九江山不斷梯航百粵海相通北窗夜展圖經看手自題書寄逺公次四兄以道韻效李義山雪暮冬一丈長安雪壯士臨風獨慨慷門巷豈無騎馬客江湖猶有捕魚郎夜平蔡賊兵輕敵曉入梁園賦擅場載酒欲尋誰與飲江梅頭白自悲傷和江子我竹夫人黃藤白簟倦呼盧髙卧南窗示楷模郭芍藥情元最密鄭櫻桃迹近相疏下帷度日甘同夢隱几終年得異書晚向禪房陪杖屨清秋霜霰意何如復和少蘊內翰甥兼謝伯藴通判兄再贈西湖波浪還佳色風物悲人老可驚遊接竹林公對叔夢迷春色我思兄酒沾鸚鵡杯行盡詩傍蟾蜍研立成壯思不逢韓吏部高名誰伴謝宣城次韻集津兄懷嵩少示王立之蚤聞三十六峰前願寄茅茨一澗邊谷轉馬蹄山繚繞巖關虎口樹嬋娟陽坡日暖宜瓜地隂嶺天寒熟芋田便好與公相隱去不宜相對尚茫然睡起素屛紋簟徹輕紗睡起氷盤自削瓜風筍微微開緑籜雨槐細細落黃花經營薄産初無意補葺疏籬漸有涯待得髙秋尋靖老臨流坐石問丹砂都下追感往昔因成二首少年使酒走京華縱步曾遊小小家看舞霓裳羽衣曲聽歌玉樹後庭花門侵楊柳垂珠箔窗對櫻桃卷碧紗坐客半驚隨逝水主人星散落天涯春風踏月過章華青鳥雙邀阿母家繫馬栁低當户葉迎人桃出隔墻花鬢深叉暖雲侵臉臂薄衫寒玉映紗莫作一生惆悵事鄰州不在海西涯送王敦素朴龍蟠山色引衡廬霜落清江影碧虛鼓枻厭騎沙苑馬行厨欲食武昌魚緩歌玉樹翻新曲趣入金鑾續舊書宦達故人稀會面君來相見肯如初留别江子之盡室飄零去上都試於溱洧卜幽居不從刺史求彭澤敢向君王乞鏡湖平日甚豪今潦倒少年最樂晚﨑嶇故人鼎貴甘相絶别後君須寄一書題超化寺壁曲池風定碧瀾平小白魚如鏡裏行水竹再來應識我壁間不用更題名送人遊江南湧金門外斷紅塵衣錦城邊著白蘋不到西湖看山色定應未可作詩人立春巧勝金花真樂事堆盤細菜亦宜人自慚白髮嘲吾老不上譙門看打春朝説之字以道無咎從弟蘇子瞻器之目為竒才作書詆孟子崇觀間致仕隱嵩山後復起為女弟所誚晚附梁師成志節掃地矣送陳叔易應召處士誰人為作牙盡攜猿鶴到京華從今鄰壑堪惆悵六六峰前只一家喻汝礪陵陽人與眺沖之同門進士有捫膝稿其詩多見成都所傳海雲山詩甚佳惜字多訛誤姑舍之未録也遊嚴真觀支機石壁有記古鼎丹茅古木共幽意長廊亦宴如於焉詠逍遙且復散衣裾塵慮颯已空道心頗閎舒不知度世人去此歲幾徂云何有丹砂尚爾留庭隅支機亦悠哉誰復訂有無我知此公意慨彼元封初繼之五鳳間斯民斃刀鋸聊欲謝世網歘以道自娛抱獨理自會曠懷遺所拘初匪逃世人而世自我疏含默念斯人起我憂患餘謁諸葛廟孤雲何其髙明月不可繫灼灼抱此心與世自涇渭釋耒從所歡感亂亦歔欷咨惟今之人竊國未云恥匕首入吳市秋風動燕水區區袁與曹等是刺客耳而我于其間秉義不敢墜哀音回衝飈清義動幽邃天心固難亮吾獨信所履溶溶日間雲漠漠苔點砌飢鼯墜蒼瓦淡薄公所憩靜然想英姿孤懷亦差慰謁江瀆廟坤軸東南傾大江日夜注前驅下洛洙餘濤略吳楚任勢不期勞得意緣所遇水也初無營神哉亮誰主芳蘭沈清華碧藻舒翠縷晨鵠戲野岸春鳬集深渚均是得所安伊神豈私汝古來幾精魂捨此迷所處淫遊不知還沙村失煙樹而我後千載悠然在江滸抱嗇貴無競矜名忌多取冥冥罨岸風淫淫打船雨舞雪窺洪濤開蘋渡前浦再拜謝神貺聊復隨所住晚泛浣花遂宿草堂扣橈泛澄虛濯流睇幽芳晚霙襯竒樹夕霏媚疏篁歸鳥亦暫間夜魄動初涼忽焉衆星微天高月舒光昔也杜陵子淡然此茅堂客至酒自斟句得意已忘云何當念飢零落在道旁古來技入神一飯豈所望吾輩天所窮慨歌淚沾裳遊琴臺皋朔語類俳上頗倡優之嚴吾數預事慘凛失所棲眷言彼姝子深情結幽期浩露泛酒甕輕雲思琴徽撫絃視八荒頗覺秦岫低紛紛漢諸子悟解良獨遲一朝不自保頸血霑裳衣公豈不炯戒慮禍蓋已微汚已迥前識達生邁天倪濶哉昭曠情豈屑後代嗤草堂詩六首燦燦詩翁錦里西只緣詩好合窮栖竹鋪冷色雲連寺柳漾晴絲鳥過溪凝怨不禁關樹暗駐情應恨蜀山低離人苦怕春歸盡可忍紅英半著泥間把煙光次第陳岷峨風物見精神翻成錦繡千般樣供與江山幾處春深屋長河元老大蛾眉曼緑却逡巡從公乞取無邊手免作詩中半箇人從教日日敞窗扉嫌怕風光入眼遲剩買芒鞋供看竹趂乘春雨去栽榿苦無賓客僧來後薄有生涯鶴下時聞道鄰翁酒初熟新篘一酌莫相遺遠嶼曲洲縱復橫沙邊繁鳥弄簫笙一軒簷冷松隂合十里林香藥草生路轉斷楂逢石坐風移深竹見僧行晚來懷抱尤清曠時有幽人帶月耕竹外清疏浸碧溪溪邊竹淡煙雲霏間看雪嶺題詩罷醉罷西郊信馬歸霄漢直愁雙闕迥夢魂長著五陵飛故園秀木又春色只恐歸去池臺非錦官城西春草芳杜陵客子憂思長浴晴晚樹淡浮緑卧水幽花深度香交情憫憫言燕阻舊國渺渺雲山蒼白蘋洲渚落日晚雲邊正銜歸雁行韓駒字子蒼仙井監人少有文稱政和初以獻頌補假將仕郎召試舍人院賜進士出身除祕省正字尋坐為蘇氏學出知州縣召為著作郎校正御前文籍分撰樂章除祕監遷中書舍人兼修國史尋權直學士院制詞簡重為時所推高宗即位知江州紹興五年卒駒雅負詩名惜其進用多由宦者士論薄之答蔡伯世食筍蓴絲化鹽豉槐葉資新麵豈知苦竹萌風味常獨擅昔我居錦城屢喫田家飯扶杖自入箐煨此犢角繭後參鶴林禪餽我桑門饌蒸蒸沸鼎中亂下白玉片惟無它物乘始覺真味現三年客東都錦籜寧復見千金洛陽來惟充大臣膳前時過君食欣逢故人面那知列仙臞已雜蒯通雋吾寧飽甘肥憤吒那忍咽請歸謂主孟厨人後當諫苦苣雜嘉蔬沈香和甲煎柯亭既誤椽畫障或遭練古來可歎事千載寄明辨作詩弔籜龍助子當食歎題采菊圖往在京口為曾公卷題采菊圖九日東籬采落英白衣遙見眼能明向令自有杯中物一假風流可得成蔡天啓屢哦此詩以為善然余嘗謂古人寄懷於物而無所好然後為達况淵明之高其於黃花直寓意耳至言飲酒適意亦非淵明極致向使無酒但悠然見南山其樂多矣遇酒輒醉醉醒之後豈知有江州太守哉當以此論淵明復作二首黃菊有何好且寄平生懷遇酒興不淺無酒意亦佳此理誰復明自昔寡所諧空餘采菊圖寂寞縣髙齋今日菊始華叢雁鳴相和若無一觴酒如此重九何悠然數酌盡會心豈在多醒來不復記散髮東山阿謝錢珣仲惠高麗墨王卿贈我三韓紙白若截肪光照几錢侯繼贈朝鮮墨黑如點漆光浮水舊傳績溪多老松奚超既死松亦空易水良工近名世珍才始不歸潘翁蕭然南堂一居士赤管隃麋無月賜借問元圭何自來去年海中持節使明窗宴坐不匆匆引紙磨墨寒生風自笑平生綰蛇蚓更慚爾雅注魚蟲殷勤二物從來遠禆海環瀛眼中見若欲揮寫藏名山不如却作談天衍分寧大竹取為酒樽短脛寬大腹可容二升而漆其外戲為短歌此君少日青而臞爾來黑肥如瓠壺縮肩短帽壓兩耳無乃戲學騶侏儒人言腹大中何有不獨容君更容酒未須常要託後車滑稽且作先生友少陵匏樽安在哉次山石臼空飛埃茅簷對客夜驚笑麴生叩門何自來老向人間不稱意但覺淵明酒多味乞取田家老瓦盆伴我年年竹根醉送趙承之祕監出守南陽繁臺十月寒置酒共祖南陽侯九士一客相獻酬皆言南陽出水幽菊泉釀酒不論石上酥醍醐出肥牛使君樓前橘柚古丞相堂下蒲蓮稠夜然蠟炬賔醉舞春風敧眠百花洲各持一觴勸公飲此行樂矣公何求我獨倚杖商聲謳此公人間第一流方今羣賢從法駕金狨塞路嘶驊騮獨令此公守一州臨分慷慨淚莫收南陽南陽樂復樂歸來歸來無久留順老寄菜花乾戲作長句道人禪餘自鉏菜小摘黃花日中曬峨嵋㮕脯久不來麴糝薑絲典刑在封題寄我紙作囊中有巴蜀齋厨香起炊曉甑八月白配此春盤一掬黃㮕軟木耳八月白稻名也泰興道中縣郭連青竹人家蔽緑蘿地偏春事少山迥夕陽多暗水披崖出輕船掠岸過傳呼細扶柁吾老怯風波次韻兼簡李道夫麥秋宜晚起况復雨頻頻桃竹猶能杖柴車未可巾間分酒賢聖靜記藥君臣會有騎鯨李來陪賀季真似矩尚書師枉道由臨川賦詩貽彥章內翰謹次元韻送行二首喪亂乖離數衰慵問訊疏新霜上鬚鬢老淚溼襟裾忽報迎車騎遙知奉璽書豈惟謀郤縠文亦似相如郡戟蒼山上平分二水流四時無癘氣五管有賢侯靜契羅公遠禪參帛道猷人生一麾樂不必向中州上泰州使君陳瑩中當年賢路雜薰蕕歎息諸公善自謀今日在前皆鼎鑊後來知我獨春秋海邊已擊師襄磬湖上新逢范蠡舟惟有書生最無事不妨挾册更西遊次韻參寥此身不擬墮塵緣長恐驚鴻落響弦踏盡世間千澗壑歸來胸次一山川深宫木末猶秋色故國天涯只暮煙憑仗道人分石甃要看庭下玉龍旋夜泊寧陵汴水日馳三百里扁舟東下便開帆旦辭杞國風微北夜泊寧陵月政南老樹挾霜鳴窣窣寒花垂露落毶毶茫然不悟身何處水色天光共蔚藍次韻翁監再來館中歸老江湖久自盟睡餘且復對空枰重來內閣人誰健慣踏天街馬不驚已喜劉歆分七略尚傳韓愈誨諸生太平潤色須公等應許吾兼吏隱名登赤壁磯緩尋翠竹白沙遊更挽藤梢上上頭豈有危巢與棲鶻亦無陳迹但飛鷗經營二頃將歸老眷戀羣山為少留百日使君何足道空餘詩句在江樓次韻南溪觀魚城西鼓楫又城東不待溪分上下風碧樹垂楊間黃緑氷盤行鱠簇青紅橫塘日暮林巒合斷岸秋來浦溆通安得此身無世纍便隨漁艇入空濛撫州邂逅彥正提刑道舊感歎憶在昭文並直廬與君三歲侍皇居花開輦路春迎駕日轉蓬山曉曝書學士南來尚巖穴神州北望已丘墟愁逢旌節滄江上握手秋風淚滿裾余為著作郎如瑩為司令官舍皆在左掖門外高頭坊紹興四年如瑩持節江西道撫相訪輒成長句邂逅都城接下風官居總在日華東門瞻曲角趨朝近路轉高頭出局同今日繡衣新使者晚塗霜鬢舊鄰翁一杯無復當時樂赤縣黃圖淚眼中六月二十一日子文待制見訪熱甚追記館中納涼故事漫成一首鳳閣西頭千步廊與君長夏對胡牀隂隂檜色連宫草寂寂棊聲度苑墻細乳分茶紋簟冷明珠擘芡小荷香身今老病投炎瘴最憶氷盤貯蔗漿頃年侍立集英殿見周表卿唱名第二客居臨川表卿為宜黃丞歲滿訪别作詩送之往時束帶侍明光曾看揮毫點御牀只道驊騮已騰踏不知雕鶚尚摧藏官居四合峰巒雨驛路千林橘柚霜莫為艱難歸故里漢庭今重甲科郎為亞卿作三首離歌三疊最關情不省從來此地聞蚤是春殘心事惡落花隂裏更辭君更欲樽前抵死留為君徐唱木蘭舟臨行翻恨君恩雜十二金叉淚總流君住江濱起畫樓妾居海角送潮頭潮中有妾相思淚流到樓前更不流館中直宿書事二首十載名山慣杖藜清都直宿夢魂疑卧聞長樂鐘聲近尚憶寒山半夜時北風吹馬襲貂裘薄雪連雲凍未收銀闕晝開禽鳥白信知三館是瀛洲謝人送鳳團及建茶白髮前朝舊史官風罏煮茗暮江寒蒼龍不復從天下拭淚看君小鳳團張元幹字仲宗永福人由上舍官大監所其祖文靖公未第時為劉氏壻劉無出蚤卒葬于福清其迹漸泯元幹從舊篋中得祖手澤因披榛莽求之為文立石以傳名幽巖尊祖録聞者韙之生平尤篤友誼為可風云有蘆州歸來集過宿趙次張郊居二首北客多流落東村更寂寥肯同清夜夢不待故人招月挂荒園竹霜飛獨木橋聽雞休起舞且共説天驕莫歎交遊晚相期歲月深秋來初識面老去要知心燈火須更僕杯盤取自斟平生王霸術袖手有微吟花飛雨暗連兵氣花飛點客愁寓居皆野寺相過只扁舟不作新塘去還為後栁遊盤餐雖杞菊得飽勝椎牛中秋不見月和范才元不見中秋月長吟五字城浮雲有底急清影可憐生殘夜四更句故人千里情與君徒悵望天上自分明劉希顔感懷次韻避謗疏毛穎推愁賴索郎坐來春漏促夢去畏途長故國書題冷新詩齒頰香湖山雖好在歲月已相忘寒食書懷往昔升平客大梁新煙然燭九衢香車聲馳道內家出春色禁溝宫栁黃陵邑秪今稱趙地衣冠誰復問唐裝傷心寒食當時事夢想流鶯下苑牆同錢申伯遊東山掃榻開軒走寺宫吾曹終日得從容夕陽初落鱓溪路雲氣半遮獅子峰試問丹砂回白髮何如瀑布煮枯松暮年縱有壯心在歸意已勝山色濃鮑由字欽止處州龍泉人舉進士少親炙蘇軾於詩文得其指授徽宗召對除工部員外郎與執政不合罷去久之復召為郎再罷起知明州又知海州奉祠卒嘗注杜詩有文集五十卷雨餘礎潤雨欲作好風每相先蕭蕭清入簾令我心灑然閉門倦長夏枕書日昏眠快此風雨餘端如濯飛泉坌山有佳趣草木更幽妍井華養文石香篆橫雲煙俯仰方丈間勝事亦可憐永懷觸熱子我勞良獨賢李昭玘字成季濟南人少與眺補之齊名為蘇軾所知第進士教授徐州用李清臣薦為祕省校書加校理通判潞州入為祕丞歷提刑京東西路坐元符黨奪官徽宗立召為右司員外遷常少崇寧初再罷主管鴻慶宫入黨籍居間十五年寓意書畫自號樂靜先生靖康初以起居舍人召而已卒紹興間追復其官春日遊金明池日有江湖思坐無車馬塵橫橋自照水啼鳥不驚人輦路晴飛絮宫門暗鎖春多情老園吏灑地喜相親張商英字天覺蜀州新津人長身玉立負氣俶儻起家通州主簿章惇經制夔召與語竒之還朝薦擢監察御史以妄奏侵大臣責監荆南稅更十年乃得館閣校勘再責監稅赤岸哲宗初為開封府推官急於求進移書蘇軾自請入臺執政聞而不悅稍抑之未幾以司諫召遂力攻元祐大臣觀望押闔初無定嚮歷知洪州發運江淮入遷中舍崇寧初為翰林學士適相蔡京草制褒美得擢尚書左丞復與京議政不合入元祐黨籍罷知亳州京久盜國柄中外怨病見商英能立異同更稱為賢徽宗因人望相之商英為政持平稍革弊政人心益喜但意廣才疏機事不密終排于異已者晚貶崇信軍節度卒年七十九孤憤吟二首平津諛武帝堯舜未為聰歸來東閣士稱頌比周公勢利變人心上下交相蒙低顔望眉睫一喜生春風優遊卒兹歲安知朝野空青青一本桑下可百夫息冷冷一井泉上有千人汲千里以為郡百里以為邑生齒豈不繁教化繄爾力何事北窗人歎此徒勞職香林院瑟瑟松上風冥冥竹間露窗虛草色寒石仄蒼苔古長廊寂無人殿閣下鈴語此意兩蕭然仿偟不能去南峰寺孤雲飛遠岫落日滿平川寺據南山頂僧傳北祖禪擬峴亭英雄往事堪歎息欄干徙倚情何極學取山公醉似泥不同羊祐謀人國張壆字子厚武進人登科不仕與東萊吕子進同年進士嘗作詩寄吕為時所稱記夢中作楚峽雲嬌宋玉愁月明溪淨印銀鈎襄王定是思前夢又抱靈衾上玉樓寄吕子進舍人籬鷃雲鵬各有程匆匆相别未忘情恨君不在篷籠底共聽蕭蕭夜雨聲遊山寺僧以惡草具進戲酬之凍僕競競依竈燎山僧草草具盤飱井丹已厭嘗蔥葉庾亮何勞惜韭根周紫芝字少隱宣城人號竹坡老人六十一歲始第出知興國州稱循吏焉有竹坡詩話行世莫愁歌蓮花深紅蓮葉緑平沙月上鴛鴦宿青腰三板蘭作橈月下莫愁歌一曲移舟入花花轉深花深調苦難為音江邊半夜誰相語只有嬋娟知此心露花漸白月漸午刺舟自覓來時路明朝繫纜栁邊門却在夜深潮落處按近日坊選將此首為周竹坡作入元詩中不知竹坡即紫芝即少隱也苕霅舟中雲暗千家雨寒生兩岸秋水翻波入户人覩玉明樓山色遮愁眼荷香滿客舟水晶宫裏夢還作此生遊柬耕老霅川湖上雖相見重來失後期風塵為客久舟楫送歸遲雁遠無消息梅殘惱别離何時酌君酒爛縵説新詩汪革字信民臨川人嘗謂人咬得菜根斷則百事可做所著有青溪類稿寄謝無逸問訊江南謝康樂溪堂春木想扶疏高談何日看揮麈安步從來可當車但得丹霞訪龎老何須狗監薦相如新年更勵於陵節妻子同鋤五畝蔬霍洞字太清常州武進人崇寧間狀元霍端友之從孫也宿田舍北風吹晴屋滿霜翁兒赤體悲無裳閨中幼婦飢欲泣忍飢取麻燈下績一身豈暇私自憐鳴機軋軋明窗前織成五丈如霜布翁作襴裙兒作袴明朝官中催租急依然赤體當風立太守春遊呈以絶句朝來五馬去尋春誰信家家甑有塵枕藉道旁宜細問恐非芳草醉眠人何大圭字晉之廣德人宣政間為館職有聲偶然作茅屋松窗小隱家茶煙漠漠水斜斜簷間乳燕未成語庭下石榴爭放花賴有詩書銷白日倦隨車馬走黃沙林泉舊約好徑去風雨滿江垂釣車周知微字明老晉陵尉能同時有陸元光者晉陵宰也亦詩附見於此題臨淮雙頭白蓮圖既不學叔隗季隗南歸晉又不學大喬小喬東入吳一種桃根與桃葉若為化作雙芙蕖臨淮政成有餘暇坐令華屋生瀟灑鵝溪一幅萬里寬移得斷江入圖畫天空水濶江茫茫相見女英並娥皇九嶷雲深蒼梧遠氷姿泣露不成妝苦心抱恨何年了香骨應甘沒秋草不如回首謝秋風分作尹邢來漢宫遊盱眙龜山作回文潮回暗浪雪山傾遠浦漁舟釣月明橋對寺門松徑小檻當泉眼石波清迢迢緑樹江天曉靄靄紅霞海日晴遙望四山雲接水碧峰千點數帆輕宋元詩會卷三十二
