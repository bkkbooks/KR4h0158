body:
  text: 宋元詩會卷十三兵部主事陳焯編蔡襄字君謨仙遊人舉進士為西京留守推官館閣校勘范仲淹以言事去國余靖論救之尹洙請與同貶歐陽修移書責司諫高若訥由是三人皆坐譴襄作四賢一不肖詩遠近傳誦進知諫院規切君過責備大臣一無鯁避聞者悚然俄直史館兼修起居注益任職論事多禆國體以母老求知福州改福建路轉運使復修起居注唐介忤宰相貶春州襄力爭之得改英州溫成后追册請勿立忌併罷監護園陵官三御史論梁適解職襄不草制帝遇之益厚賜其母冠帔示寵遷龍圖閣直學士知開封府再知溫州召為翰林學士三司使乞知杭州拜端明殿學士治平三年丁母憂明年卒年五十六贈吏部侍郎諡忠惠楊叔武北堂夜話嵗晏物景薄層隂向晚饒輕雲隱微月殘雪棲枯條夫君有高適顧我慰寂寥瀟灑開北堂拂榻延良宵前几陳古書坐見千載遙間亦發新句幽思含九韶神明靜外照念慮醉中消揚雄戒丹轂顔子安一瓢良玉不火變翠柏寧霜雕此心固獨往聲利詎得招遊鼓山靈源洞郡樓瞻東方嵐光瑩人目乘舟逐蚤潮十里登南麓雲深翳落花樹暗迷幽谷朝雞亂木魚晏日明金屋靈泉注石竇清吹出篁竹捫蘿躋上峰大空延眺矚孤青浮海山長白挂天瀑况逢肥遁人性尚自幽獨西景復向城淹留未云足寄題滁州豐樂亭君為滁上守乘間務幽尋羣從留山阿美望窮前林良宴追佳賞高亭曠遐臨煙雲無定姿水石惟清音靜見魚鳥適遙聞雞犬深時節屢豐有民里無欺侵豈獨延衆物因兹託沖襟大筆每絶唱芳樽寧孤斟别日念已長來期詎能今安得凌風翰相從殫嵗隂出東門向北苑路曉行東城隅光華著諸物溪漲浪花生山晴鳥聲出稍稍見人煙川原正蒼鬱丙申秋過漁溪驛驛舊有梅數株嘗題詩記今無有也曾把蚤梅枝思君在别離别離雖云遠萬里終還期樹枯根已撥人去復何之故館動秋色雲物藏寒曦清香不可聞衰草空繁滋一夜平階雨輾轉良自知訪天台菴幽人去未還門户和雲閉亭午樹隂圓深冬泉響細寒生羣蟲蟄清徹孤鶴唳寂寞傍山歸寫向滄溟際留别舊居花檻别意起中夕出門風吹衣側月光艷薄餘花香氣微清尊嵗相向欲去心有違殘葩勿盡放主人行亦歸翠巖寺攬蔓巖扃峻交繩寶界平斜峰約雲勢密樹起秋聲泉檻妨蛩響霜樓助月明冥筌兼灑落警句一何清夏晚南野夏竹圍前檻涼襟析舊酲疊雲封日茜斜雨著虹明魚動池開暈蟬移樹減清葭洲煙向暝鳬鶩自相迎蕪隂樓上野馬沈寒氣神禽度暖風斷霞天共紫斜日樹齊紅山口橫虛釣江隈跋遠篷解窮千里目爭奈思無窮和丘提刑聞新鴈寄度支翔鴈來江渚秋容在遠空幾聲疏樹外一字斷雲中虛館埀簷月平臯敗葉風裁詩託幽思幽思更無窮送别陳比部祖向西郊道川原畫閣臨燒痕經雨活樹色入溪深斜日明春態孤雲感客心何人知别意重把酒杯斟洪澤阻風今日風期惡遲回一水濵村旗呈酒聖廟鼓賽河神躍鯉曾驚網飢烏不避人篙工時借問何處即通津開州園縱民逰樂風日朝來好園林雨後清逰魚知水樂蝶戲見春晴草軟迷行迹花深隱笑聲觀民聊自適不用管絃迎奉酬王知縣賞春不預以詩見贈仙陬翠觀盡繁英朱白相兼照眼明池浸嵐光生晚碧鳥驚人語斷春聲談諧遽喜開懷久骫骳終慙走筆成佳致可能陶靖節庭柯斜盼獨忘情過天津橋日暖溪平水漸銷水聲才下內前橋山川滿眼間宫殿草樹迷人舊市朝每向尋春偏有意却成懷古更無聊洛陽平昔多豪俊惆悵埋魂不可招宿延平津鳴籟蕭森萬木聲濃嵐環合亂峰青樓臺矗處雙溪會雷電交時一劍靈曉市人煙披霽旭夜潭漁火鬭寒星畫屏曾指孤舟看今日孤舟在畫屏晝寢宴坐軒憶與蘇才翁會别投涼下馬卧僧家繞簟清風卷絳紗修竹滿前微雨過逺山無際薄雲遮武侯舊隱人應到閩嶠孤城日自斜解與塵心消百事更開新焙煮靈芽丙申五月逰興化西門上溪尋溪偶過上溪逰雨後溪渾水亂流因傍堤松却飛蓋為聞山鳥輟鳴騶平田䆉稏青雲合滿谷芭蕉碧玉抽開濟無功須蚤去故時瓜隴有通侯和江上觀潮地卷天回出海東人間何事可爭雄千年浪説鴟夷怒一沸全疑渤澥空寂靜最宜聞夜枕峥嶸須待駕秋風尋思物理真難測隨月虧圓亦未通遣興苦竹生筍四五寸櫻桃開花千萬枝空濛野色當樓處索寞春寒帶雨時已放清歌逐瑶管旋篘新釀行金巵衰翁酩酊自為樂舉鞭不問并州兒上已日州園東樓地上多于枝上花東樓凝望惜年華潮頭正對伍胥廟燕子爭歸百姓家粉籜漸高山徑筍緑旗初展石巖茶流芳自與人兼老樽酒相逢莫重嗟杭州璘上人以花數種見寄名卉參差十數科商船千里任風波土花分破根株小春色隨來意緒多欲種更看移樹法將開須用傍欄歌中年漸不勝杯酌紅翠他時奈爾何陪尹子漸申安禮宿香山寺二月已強半尋春登石樓山光侵暮變草色到雲休歸鳥沈巖際行人過樹頭剝苔看石碣因火認魚舟漸夜灘聲惡憑虛屋勢浮乘間聊自適觴詠屬吾流宿漁梁驛庭樹疏疏河漢低瓦溝霜白月平西寒鴉不奈單棲苦落泊驚飛到曉啼入天竺山留客山光物態弄春暉莫為輕隂便擬歸縱使晴明無雨過入雲深處亦霑衣徐虞部以龍尾石硯邀余第品仍授來使持還書府玉質純蒼理緻精鋒鋩都盡墨無聲相如間道還持去肯要秦人十五城梅堯臣字聖俞宣城人侍讀學士詢從子也工為詩以深遠古淡為宗初用蔭官桐城主簿調河南留守錢惟演見而嗟賞之歐陽修與為詩友自歎不及歷德興建德襄城縣令監稅湖州大臣屢薦宜在館閣召試賜進士出身為國子監直講纍遷尚書都官員外郎預修唐書未成卒有宛陵集四十卷野田行輕雷長陂水農事乃及辰茅旌送山鬼瓦鼓迎田神青臯暗藏雉萬木欣已春桑間偶耕者誰復來問津過開封古城荒城臨殘日雞犬三四家豈復古阡陌但問新桑麻頽垣下多穴所窟狐與蛇漢兵墮銅鏃青血為土花寄靈隱通教僧竒山青若洗草木生石上根萌不可窮條蔓自增王其隂有高僧日食惟一盎世人久已疏猿鳥應相向秋夜感懷風葉相追逐庭響如人行獨宿不成寐起坐心屏營哀哉齊體人魂氣今何征曾不如隕籜繞樹猶有聲涕淚不能止月落荒雞鳴陽翟縣城凝嵩亭西北望嵩色憶上太室時陟彼已不淺坐此安能知誰棲絶壁下但見前峰危正與曩未異目存迹焉追追詠崔奉禮小園前此訪君時已觀堂宇邃安知中屏開自有幽林致花搴巖桂紅石擘雲根翠正當秋風來不見搖落意夜聽鄰家唱夜中未成寐鄰歌聞所稀想像朱唇動髣佛梁塵飛誤節應偷笑竊聽起披衣須臾曲已終窗月存餘暉寄題滁州醉翁亭琅琊谷口泉分流漾山翠使君愛泉清每來泉上醉日暮使君歸野老紛紛至但留山鳥啼與伴松間吹秋日村行溪霧晝盡收山村夜初晦飢禽來往飛遠樹青紅碎原上楚牛牧屋頭吳婦碓雞肥酒已熟野老邀同輩彼鴷吟斫木喙雖長不啄柏與松松柏木堅直中心無蠧蟲廣庭木云美不與松柏比臃腫質性虛朽蝎招猛觜主人赫然怒我愛爾何毁彈射出窮山羣鳥亦相喜啁啾弄好音自謂得天理哀哉彼鴷禽吻血徒為爾鷹鸇不摶擊狐兔縱橫起况兹樹腹殆力去且濱死范饒州坐中客語食河豚魚春洲生荻芽春岸飛楊花河豚當是時貴不數魚蝦其狀已可怪其毒亦莫加忿腹若封豕怒目猶吳蛙庖煎茍失所入喉為鏌鎁若此喪軀體何須資齒牙持問南方人黨護復矜誇皆言美無度誰謂死如麻吾語不得屈自思空咄嗟退之來潮陽始憚餐籠蛇子厚居柳州而甘食蝦蟆二物雖可憎性命無舛差斯味曾不比中藏禍無涯甚美惡亦稱此言誠可嘉田家語庚辰詔書凡民三丁籍一立校與長號弓箭手用備不虞主司欲以多媚上急責郡吏郡吏畏不敢辨遂以屬縣令互摉民口雖老幼不得免上下愁怨天雨淫淫豈助聖上撫育之意耶因録田家之言次為文以俟採詩者云誰道田家樂春稅秋未足里胥扣我門日夕苦煎促盛夏流潦多白水高於屋水既害我菽蝗又食我粟前月詔書來生齒復版録三丁籍一壯要使操弓韣州符今又嚴老吏持鞭朴摉索稚與艾唯存跛無目田閭敢怨嗟父子各悲哭南畝焉可事買箭賣牛犢愁氣變久雨鐺缶空無粥盲跛不能耕死亡在遲速我聞誠所慙徒爾叨君祿却詠歸去來刈薪向深谷冬雷上帝設號令隱其南山下震發固有時曷常事憑怒春以動含生夏以奮風雨冬其息不用藏在黃厚土我今來江南嵗厯惟建午如何小雪前向曉疑鳴釡蛟蛇龜蟲厄鱗裂口塊吐蝦蟆不食月深窟僵兩股天公豈物欺若此汨時序或言非天公實乃隂怪主嘗觀古祠畫牛首椎連鼓黑雲雜狂飈相與為肺腑是不由昊穹安能順寒暑吾因考厥事復以驗莽鹵市井欺量衡定知不活汝元惡逆大倫弗加霹靂斧此豈曰無私故豫未所取必恐竊天威似將文法侮焉顧五行錯詎畏萬物覩欲扣九門陳恨身無鳥羽偶書寄蘇子美君詩壯且竒君筆正復妙二者世其寶一得亦難料我今或盈軸體逸思亦峭有如秋空鷹氣壓城雀鷂又如飲巨鍾一舉不能釂既釂心已醉顚倒視兩曜吾交有永叔徑正語多要嘗評吾二人放檢不同調其於文字間苦硬與惡少雖然趣尚殊握手幸相笑月下懷裴如晦宋中道九陌無人行寒月淨如水洗然天宇空玉井東南起我馬卧我庭帖帖埀頸耳霜花滿黑鬛安欲致千里我僕寢我廄相背肖兩已夜深忽驚魘呼若中流矢是時興我懷顧影行月底唯影與月光舉止無猜毁吾交有裴宋心意月影比尋常同語默肯問世俗子飲劉原甫家原甫懷二古錢勸酒其一齊之大刀長五寸半其一王莽時金錯刀長二寸半主人勸客飲勸客無夭妍欲出古時物先謂射以年我料孔子履久化武庫煙固知陶氏梭飛來風雨天世無軒轅鏡百怪爭後先復聞豐城劍已入平津淵聊讐二百載儻有書畫傳嗢呼才十一便言傾觥船探懷發二寶太公新室錢獨行齊大刀鎌形末環連文存半辨齊背有模法圓次觀金錯刀一刀直五千其文如此精銅不蠧蝕肉好鈎婉全為君舉酒盡跨馬月娟娟再同江鄰幾陳和叔學士集劉舍人宅觀白鷴孔雀鳬鼎周亞夫印鈿玉寶赫連勃勃龍雀刀主人鳳凰池二客天祿閣共來東軒飲高論雜諧謔南籠養白鷴北籠養孔雀素質水紋纖翠毛金縷薄大誇鳬柄鼎不比龍頭杓玉印傳條侯字辨亞與惡鈿劍刻辟邪符寶殊制作末觀赫連刀龍雀鑄鐶鍔每出一物玩必勸衆賔酌又令三雲髻行酒何婥約固非世俗歡自得閲古樂聖賢泯泯去安有不死藥竟知不免此焉用強檢縛開目即是今轉目已成昨歸時見月上酒醒見月落恍然如夢寐前語誠不錯韻語答永叔內翰世人作肥字正如論饅頭厚皮雖然佳俗物已可羞字法歎中絶今將五十秋近日稍稍貴追蹤慕前流曾未三數人得與古昔儔古人皆能書獨其賢者留後世不推此但務於書求不知前日工隨紙泯已休顔書茍不佳世豈不寶收設如楊凝式言且直節修又若李廷中清愼實罕侔乃知愛其書兼取為人優豈書能存久賢哲人焉廋非賢必能此惟賢乃為尤其餘皆泯泯死去同馬牛太尹歐陽公昨日喜疾瘳信筆寫此語語可忘病憂黃昏走小校寄我東郭陬綴之輒成篇聊以助吟謳諭烏百鳥共戴鳳惟欲鳳德昌願鳳得其輔咨爾孰可當百鳥告兩間惟烏最靈長乃呼鳥與鵲將政庶鳥康烏時來佐鳳署置且非良咸用所附已欲同助翺翔以燕代鴻雁傳書識暄涼鸜鵒代鸚鵡剝舌説語詳秃鶬代老鶴乘軒事昻藏野鶉代雄雞爪觜稱擅場雀豹代雕鶚摶擊肅秋霜蝙蝠常入幕捕蚊夜何忙老鴟啄臭腐盤飛使遊揚鵂鶹與梟鵩待以為非常一朝百鳥厭讒烏出逺方烏伎亦止此不敢戀鳳傍養子頗似父又貪噪豺狼為烏鳥不伏獸肻為爾戕莫如且斂翮休用苦不量吉凶豈自了人事亦交相初冬夜坐憶桐城山行我昔吏桐鄉窮山屐屢躡路險獨後來心危常自怯下顧雲容容前溪未可涉半崖風颯然驚鳥爭墮葉修蔓不知名丹實坼在莢林端野鼠飛緣挽一何捷馬行聞虎氣竪耳鼻息􅫆遂投山家宿駭汗衣尚浹歸來撫童僕前事語妻妾吾妻常有言艱勤壯時業安慕終日間笑媚看婦靨自是甘努力于今無所懾老大官雖暇失偶淚滿睫書之空自知城上鼓三疊寄歐陽永叔滁州昔讀韋公集固多滁州詞爛熳寫風土下上窮幽竒君今得此郡名與前人馳君才比江海浩浩觀無涯下筆猶高帆十幅美滿吹一舉一千里只在頃刻時尋常行舟艫傍岸撑牽疲有才茍如此但恨不勇為仲尼著春秋貶骨嘗苦笞後世各有史善惡亦不遺君能切體類鏡照嫫與施直辭鬼膽懼微文姦魄悲不書兒女書不作風月詩唯存先王法好醜無使疑安求一時譽當期千載知此外有甘脆可以奉親慈山蔬采筍蕨野膳獵麏麋鱸膾古來美梟炙今且推夏果亦瑣細一一舊頗窺圓尖剝水實青紅摘林枝又足供宴樂聊與子所宜愼勿思北來我言非狂癡洗慮當以淨洗垢當以脂此語同飲食逺寄入君脾和王仲儀詠癭二十韻汝水出山險汝民多病癭或如雞精滿或如猿嗛並女慚高掩襟男大濶裁領飲水擬注壺吐詞侔有鯁樗里既已聞杜預亦不幸秦人號智囊吳瓠繫狗頸常住頤伶仃安及脛只欲仰問天無由俯窺井挾帶嵗月深冒犯風霜冷厭惡雖自知剖割且誰肻不唯羞把鏡仍亦愁弔影內燎煩羊厴外砭費針頴在木曰楠榴刳之可為皿此誠無所用既有何能辟音屏膨脝側無首臃腫異臚頂難將面目施可與胎胞逞賢哉臨汝守世德調金鼎氓俗雖醜乖教令日修整風土恐隨遷晨昏憂屢省儻欲便慈顔名城不難請憶將渡揚子江月暈知天風舟人夜相語平明好挂帆白浪須出浦此身猶在吳歸夢預到楚今日念同來吾妻已為土鴨雛春鴨日浮波羽冷難伏卵嘗因雞抱時託以雞窠暖三旬卵既坼羽毛寒脛短雞寧辨其雛翅擁情欵欵一日向水涯所稟殊未斷泛然去中流雞呼心悹悹人之茍異懷負義不足算有志在育養勿論報德限答宣城張主簿遺鴉山茶次其韻昔觀唐人詩茶詠鴉山嘉鴉銜茶子生遂同山名鴉重以初槍旗采之穿煙霞江南雖盛産處處無此茶纖嫩如雀舌煎烹比露芽競收青蒻焙不重漉酒紗顧渚亦頗近蒙頂來以遐雙井鷹掇爪建溪春剝葩日鑄弄香美天目猶稻麻吳人與越人各各相鬭夸傳買費金帛愛貪無夷華甘苦不一致精粗還有差至珍非貴多為贈勿言些如何煩縣僚忽遺及我家雪貯雙砂罌詩琢無玉瑕文字摉怪竒難於抱長蛇明珠滿紙上剩畜不為奢玩久手生胝窺久眼生花嘗聞茗消肉應亦可破瘕飲啜氣覺清賞重歎復嗟歎嗟既不足吟誦又豈加我今實強為君莫笑我耶得雷太簡自製蒙頂茶陸羽舊茶經一意重蒙頂比來唯建溪團片敵湯餅顧渚及陽羡又復下越茗近來江國人鷹爪誇雙井凡今天下品非此不覽省蜀荈久無味聲名謾馳騁因雷與改造帶露摘牙頴自煮至揉焙入碾只俄頃湯嫩乳花浮香新舌甘永初分翰林公豈數博士冷醉來不知惜悔許已向醒重思朋友義果決在勇猛倐然乃以贈蠟囊收細梗吁嗟茗與鞭二物誠不幸我貧事事無得之似贅癭椹澗晝夢誰謂死無知每出輒來夢豈其憂在途似亦會相送初看不異昔及寤始悲痛人間轉面非清魂殁猶共靈樹鋪夕夢晝夢同坐隅夕夢立我左自置五色絲色透縑囊過意在留補綴恐衣或綻破殁仍憂我身使存心得墮武陵行生事在漁樵所居亦煙水野艇一竿絲朝朝狎清泚忽自傍藤陰乘流轉山觜始覺景氣佳潛通小溪裏常時不見春入谷驚花蘂幽興窮緑波玩芳心莫已花外一峰明林間碧洞啓遙聞雞犬音漸悟人煙邇挾彈篇長安細侯年尚少獨出春郊不須曉手持柘彈灞陵邊豈惜金丸射飛鳥金丸射盡飛鳥空解衣市酒向新豐醉倒銀瓶方肯去去卧紅樓歌吹中不管花開與花老明朝還去杜城東使風跨下橋南逆水風十幅蒲帆彎若弓淮波帶日魚鱗紅岌岌飛上北斗中龜山始撞人定鐘岸草澀澀鳴秋蟲余居御橋南夜聞妖鳥鳴效昌黎體都城夜半隂雲黑忽聞轉轂聲咿呦嘗憶楚鄉有妖鳥一身九首如贅疣或時月暗過閭里緩音低語若有求小兒藏頭婦滅火閉門雞犬不爾留我問楚俗何苦爾云是鬼車載鬼逰鬼車載鬼奚所及抽人之筋繫車輈昔聽此言未能信欲訪上天終無由今來中土百物正安能遂與南方儔上帝因風如可達願令驅逐出九州永叔寄澄心堂紙二幅昨朝人自東郡來古紙兩軸緘縢開滑如春冰密如繭把玩驚喜心徘徊蜀箋脆蠧不禁久剡楮薄軟還可咍書言寄去當寶惜慎勿亂與人剪裁江南李氏有國日百金不許市一枚澄心堂中惟此物靜几鋪寫無塵埃當時國破何所有帑藏空竭生莓苔但存圖書及此紙輦入都府非珍瓌于今已踰六十載棄置大屋墻角堆幅狹不堪作詔命聊備粗使供鸞臺鸞臺天官或好事持歸祕惜何嫌猜君今轉遺重增愧無君筆札無君才心煩收拾乏櫝匱日畏扯裂防嬰孩不忍揮毫徒有思依依還起子山哀同蔡君謨江鄰幾觀宋中道書畫君謨善書能别書宣獻家藏天下無宣獻既沒二子立漆匣甲乙收盈厨鍾王真迹尚可覩歐禇遺墨非因模開元大厯名流夥一一手澤存有餘行草楷正大小異點畫徑婉精神殊坐中鄰幾素近視最辨纎悉時驚吁逡巡蔡侯得所得索硯鋪紙才須臾一掃一幅太快健檀溪躍過瘦的盧觀書已畢復觀畫數軸吳江種稻圖稻苖秧秧水拍拍羣鷺矯翼人荷鋤陂塍高下石籠密竹樹參倚荆籬疏大車立輪轉流急小犢欺顧稚子驅令人頻有故鄉念春事况及蠶桑初虎頭將軍畫列女二十餘子拖裙裾許穆夫人尤窈窕因誦載馳誠起豫余無書性無田區美人雖見身老癯舉頭事事不稱意不如倒盡君酒壺觀何君寶畫燕馬易畫吳牛難圖馬骨應細牛骨粗馬毛要密牛毛疏粗疏必辨别細密多糢糊乃知戴嵩筆能出韓幹徒韓馬精神在韁勒嵩牛怒鬭無牽拘昨日何家觀小軸絹雖破爛色不渝二頭相觸角競犄前腳如跪後腳舒尾株拓直脊膂蹙筋力寫盡蹄腕殊一勝一敗又苦似勝者狠逐敗者趨卷窮赤印置小字置字乃是陶尚書尚書國初人愛畫收幾厨買時不惜金與帛帛載羊車錢載驢後世兒孫不能保賣入窮市無須臾凡目矜新不重故千錢酬直皆笑愚四牛遂為何氏有裝背入眼天下無坐中吾儕趣已異又喜玄女傳兵符此本實稱閻令畫下筆簡細容顔姝三人鬼狀一牛首八女二十美丈夫黃帝中間蔭葩蓋霞扇錯玳旌擁朱冠服難知嵗月遠但見儀衛森清都復觀鹿臺獨夫受妲己不笑何由娛酒池肉林騎行炙剖心斫脛堪悲吁數幅吳王宴西子綵舟張樂當姑蘇宫娥數百族高下鬒髻一一紅芙蕖危峰細浪得平遠前對洞庭傍大湖商紂夫差可埀誡歷世傳玩參盤盂雕鷹草木不足記特詠此事心何如觀楊之美畫天官乘車建朱旗赤幡前亞風卷披二龍緩駕蒼髯垂印箱傍挈文籍隨雙驂推軛如畏遲行從冠服多威儀水官自有真龍騎兩佐並跨鯨尾螭步趨羣吏怪眼眉雲生海面無端涯雷部處上相與期人身獸爪負鼓馳後有同類挾且槌次執電鏡風囊吹青蛇有角魚足鬐上下引導神所施地官既失不可知此畫傳是閻令為設色鮮潤筆法竒絹理滑膩雞子皮吳生龍王多裂隳八軸展玩忘晨炊李成山水曉景移黃荃花竹雀擁技韓幹馬本摸拓時神駿都失存毫釐日高腹枵眼眥眵邂逅獲見何言疲厚謝主翁意不衰他日飽目看無遺和江鄰幾景德寺避暑垤蟻不應雨鳴鳶不生風鬱氣若甑炊初陽如火紅裸膚汗交流腯體膏將鎔龍頭費挹酌犢鼻強遮蒙常畏俗物來去避青蓮宫廣堂鋪琉璃高簷蔭梧桐廊壁畫地獄獄具鑊鋸舂鐵城何熖熖鐵牀亦彤彤誰知炮烙死活間傳自西域黃面翁正類人世苦此熱聲利役使亡西東京師貴賃幾椽舍窮煎相似聒欲聾屋頭朝爨作飲食枕底夕艾驅蚊蟲宜爾近巷江夫子賦詩特壓塵土中蔡君謨示古大弩牙黃銅弩牙金錯花銀闌線齒如排沙上立準度可省括箭溝三道前直窊其度四寸寸五刻鋈光歷歷無纎差蔡侯出此問誰得往年客遺來琅琊琅琊築城穿厚壤既獲磨洗爭傳誇莫知嵗月孰製作精妙近世應難加發機高下在分刻今人妄射功仍賖願侯擬之起新法勿使邊兵死似麻許生南歸大盤小盤堆明珠海估眩目迷精粗斗量入貢由掇拾未必一一疵纇無不貢亦自有光價此等固知魚目殊許生懷文頗所似暫抑安用頻增吁倚門老母應日望霜前稻熟舂紅稃歸來爛炊多釀酒洗蕩幽憤傾盆盂九卿有命不愁晚朱邑當年是嗇夫二十四日江鄰幾邀觀三館書畫録其所見五月祕府始暴書一日江君來約豫世間難有古畫筆可往共觀臨石渠我時跨馬冒熱去開厨發匣鳴鑰魚羲獻墨迹十一卷水玉作軸光疏疏最竒小楷樂毅論永和題尾付官奴又看四本絶品畫戴嵩吳牛望青蕪李成寒林樹半枯黃荃工妙白􅊵圖不知名姓貌人物二公對奕旁觀俱黃金錯鏤為投壺粉障復畫一病夫後有女子執巾裾牀前紅毯平圍爐牀上二姝展氍毹繞牀屏風山有無畫中見畫三重鋪此幅巧甚意思殊孰真孰假丹青模世事若此還可吁和歐陽永叔啼鳥十八韻南方窮山多野鳥百種巧舌乘春鳴深林參天不見日滿壑呼嘯誰識名但依音響得其字因與爾雅殊形聲我昔曾有禽言詩粗究一二啼嗥情苦竹岡頭泥滑滑君時最賞趣向精餘篇亦各有思致恨未與盡衆鳥評君今山郡日無事靜聽鳥語如交爭提壺相與來勸飲戴勝亦助能勸耕我念此鳥頗有益如欲使君勤以行勸耕幸且強職事勸飲亦冀無獨醒杜鵑蜀魄哭歸去小人懷土慎勿聽城頭春鳩自謂拙鵲巢輒處安得平高窠喬木美毛羽哢吭葉底無如鶯口中調簧定何益下啄蚯蚓孰曰清自餘多類不足數一一推本煩神靈我居中土别無鳥老鴉鸜鵒方縱橫教雛呌噪日羣集豈有勸酒花下傾願君切莫厭啼鳥啼鳥於君無所營途中寄上尚書晏相公二十韻驚飈入林鴉亂飛舞空落葉相追隨秋權摧物不見迹但使萬古生愁悲登山臨水昔感别身作旅人安得宜單舟匹婦更無婢朝餐每愧婦親炊平生獨以文字樂曾未敢恥貧賤為官雖寸進實過分名姓已被賢者知疏愚生不謁豪貴守此退縮行將衰潁州相公秉道德一見不以論高卑久調元化費精力猶且未倦刪書詩唐之文章剔蕪穢纎悉寧有差毫釐謂其耽學可與語便語淵奧袪佹疑浮言近意不歷口直欲海窟拏蛟螭再拜膝前荷勤誨垂槖捆載歸忘飢解艇水驛無幾舍新詩又遣牙兵持上言行李覽物景聊可與婦陳酒巵下言狂斐頗及古陶韋比格吾不私相公貴且事翰墨我輩豈得專逰嬉今將蒿芹薦爼豆定亦不以微薄遺常令有詠無巨細當因川陸舟車貽日對順流思疾置老魚姦怯濳鱗鬐晏公全集二百餘卷明嘉靖時嚴分宜家尚有之後竟不可得見矣覽此詩為之慨然送方進士逰廬山長風沙浪屋許大羅剎石齒水下排歷此二險過湓浦始見瀑布縣蒼崖繫舟上岸入松徑三日踏穿新蠟鞋路盤深谷出嶺望後山日照前山霾偶逢風雨恐衣濕側倚石脅人相乖雨收不覺在高處卻見童僕提攜偕水聲不絶鳥聲好藥草香氣侵人懷老僧避俗去足跣野客就澗開門䦱樹嵓隱映見寺剎層層杳杳躋雲階塢田將穫鳥雀橫秋果正熟猿猴東林淡虀應似舊唯此足以待爾儕子心灑落撇然往我方塵垢難磨揩秋雨篇秋雨一向不解休連昏接晨終窮秋梅生不量仰天問神官夜夢言語周日月是天之兩目忽然生翳無藥瘳只知淚滴為赤子赤子豈悟天公憂天公哭􅮕􅮕灑涕落九州地祗不敢安泥潦已沒頭乃因從容詰神官后稷今在帝所不從前后稷知稼穡曾以筋力親田疇曷不告帝且輟泣九榖正熟容其收蚤時不泣此時泣憂民欲活反扼喉神官發怒髭奮虬下土小臣安預謀恐然驚覺汗交流樹上已聽呼雌鳩和吳沖卿學士石屏吳夫子佩銀龜乘天馬素怪竒忽得虢略一片石其中白色圓如規又有樹與烏畫手雖妙何能為吳乃持問歐陽公比公曩獲猶可疑疑不為辨賦以詩詩辭粲粲明星埀復遣賫來使我和坐上巨公傍睨之范侯實有揚雄學咸云此理難究推我歸滌慮反覆思義雖不經聊解頤月與太陽合朔時陽烏飛上桂樹枝枝上作窠生羣兒人不知天公天公欲俾世間見影著石面如粘黐烏既不得去月亦不可移留為千古作好玩慎勿傾撲同玉碑時在唐書局與歐陽永叔王元叔范景仁會食得所示詩莫登樓莫登樓腳力雖健勞雙眸下見紛紛馬與牛馬矜鞍轡牛服輈露臺歌吹聲不休腰鼓百面紅臂褠先打六么後梁州棚簾夾道多夭柔鮮衣壯僕獰髭虬寶撾呵叱倚王侯夸妍鬭艷目已偷天寒酒醺誰爾侜倚檻心往形獨留有此光景無能遊粉署深沉空翠幬青綾被冷風颼颼懷抱既如此何須望樓頭高車再過謝永叔內翰世人重貴不重舊重舊今在歐陽公昨朝喜我都門入高車臨岸進船篷俯躬拜我禮愈下騶從竊語音微通我公聲名壓朝右何厚於此瘦老翁笑言啞啞似平昔妻子信説如梁鴻自兹連雨泥沒脛未得謁帝明光宫冒隂履溼就稅地親賓未過知巷窮復聞傳呼公又至黃金絡馬聲瓏瓏紫袍寶帶照屋室飲水啜茗當清風邀以新詩出古律霜髯屢頷搖寒松因嗟近代貴莫比官為司空仍侍巾今成冡丘已寂寞文字豈得留無窮以此易彼可勿愧浮榮有若送雨虹須臾斷滅不復見唯有明月常當空况我學不為買祿直欲到死攀軻雄一飯足以飽我腹一衣足以飾我躬老雖得職不足顯願與公去歡樂同歡樂同治田園潁水東宋元詩會卷十三
