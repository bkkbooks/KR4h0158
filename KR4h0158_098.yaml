body:
  text: 宋元詩會卷九十八兵部主事陳焯編萬石德躬題陳希夷像花項君王瓦棺冷柴家陵上西風緊殿前點檢不知名醉眼摩挲睨周鼎白晝龍虎行天階紫微小星何僭哉先生大笑出門去明日華山歸去來山色還如舊時好流水小橋散芳草千載誰知驢背心芒碭雲深入孤島汴城峩峩汴水流江南江北數百州秦王未巳晉王起人間萬嵗更千秋棄婦吟萬君有退宮人引一首曹選誤屬鮮于樞當移置此上堂拜姑姑不語門外上車别鄰里命輕不敢怨他人回頭却看房中女女子勿啼汝父賢必不嫁汝狂少邉丈夫有心只如此蕩子情多無十年風吹柳花春日暮鄰姬送上來時路父母俱亡門戶衰未到先愁兄嫂怒歸來明鏡半無光繡帶雙紅空斷腸今夜無人看夫壻雨打寒窗歸夢長辛文房蘇蘇小歌東流水底西飛魚銜得錢塘紋錦書幾回錯認青驄馬著處間乘油壁車鸚鵡杯殘春樹暗蒲萄衾冷夜窗虛蓮子種成南北岸苦心相望欲何如清明日遊太傅林亭隔水園林丞相宅路人猶記種花時可憐總被風吹盡不許遊人折一枝楊子承獨不見窈窕一佳人鉛華淨如練臨風弄錦瑟其音哀且怨南鄰去乘鸞北里效飛燕小院落花深間庭芳草遍日暮掩朱扉如何獨不見甘茂實秋懷秋雨種白髮一滴生一莖半為作詩苦半為憂天傾天傾或可補詩苦終無成朝來覽青鏡何時再復生不如原上草秋死春仍榮馬臻志道春日寫望逺波重疉限空明淡拂生綃絶點塵半舸夕陽喧酒客一樓寒色倚詩人早鶯懷舊隨時至芳草無情著處新却憶城中有貧者杏花開盡不知春山居人事喧喧任奕棋青山數畝是歸期分將藥草鋤雲種買得松杉趂雨移老去故人多入夢愁來間事總成詩芒鞋布襪身猶健十里沙堤信杖藜野外野外蕭條景更佳牧童將犢臥晴沙白鷗長繞分魚市紅杏深藏賣酒家倦向客程添懊惱老看春事厭紛譁田翁也學青門隱料理荒畦自種瓜秋日間咏西湖晴雨畫圖間坐倚闌干自解顔無酒誰供千日醉有錢難買一生間草衰春色來時路鶴宿秋聲起處山橫笛吹殘天又晚釣船燈火入蘆灣徐天倪擬古三首皎皎機上絲織為遊子衣遊子蕩風塵素衣化成緇風塵不可避四顧將何之豈不念潔白徒重翟子悲朂哉加浣濯河水清且漪娉婷閨中女天質知自愛空懷蘋藻心日月苦行邁蹇修意良勤遲遲如有待未嫁庸何傷失身將重悔婉娩自結髮伉儷情誼深夫征日易久魚雁成消沈自憐鏡中貌衰白將駸駸有衣為誰薰有花為誰簪顧影雖無儔秉心猶斷金青天縣明月照影不照人黃伯暘香奩曲下階拜新月空庭夜如水相思隔千里未有團圓意張淳玉簪開軒俯瞰碧雲衢白筆含香半吐鬚帶露折來何處可膽瓶秋水淡如無鮑仲華過郝參政墓茂林喬梓上干雲葉葉曾沾雨露恩萬古西山青不斷鳥啼花落幾黃昏顧濟淵明畫像無錢猶愛菊有酒即橫琴萬石醉不了一名間到今徑松存老節門柳積秋隂人畫歸來像誰傳歸去心施釣武昌南樓鸚鵡洲邉艤客舟憲君邀我上南樓胡牀老子三更月鐡笛仙人一曲秋流水白雲吳夏口西風黃鶴晉磯頭如今盡屬王孫草添得江南幾許愁送人歸天台君去丹山伴赤霞忍分書劍各天涯交情十載共為客歸夢幾番同到家一路暖雲蒸藥氣半溪流水引桃花黃庭好問長生訣莫待秋風兩鬢華送金華史學録回永嘉雁蕩青山洗盡泮宮塵三載琴書又問津海濶正憐鷗去逺山深須遣雁來頻沈郎風月詩俱瘦謝老池塘草自春莫笑廣文官獨冷長安一日看花人陳觀題甄氏訪山亭水流花落日生雲日靜風喧草欲薰老去風流猶未減一丘一壑要平分李仲淵送鎦宗道奉使日南一介強于十萬兵秋風持節使麟泠可容贊普窺唐壤要遣莎車拜漢廷蜃吐瘴煙黎洞暗鯨掀巨浪海雲腥元戎已辦安邉策萬古千秋汗簡青張孔孫風雨回舟風雨來時撥棹歸濟川心事有誰知停舟且做江湖夢浪靜風恬未是遲盛景年送胡正辭春水淡無姿垂楊雨方緑送人南浦岸飛下雙鸜鵒鸜鵒羽衣短只過溪南宿征帆順風去萬里隨鴻鵠趍名莫憚勞既榮還慮辱賓階有富人清論俱成俗東吳開漕府郎吏明如玉時艱海亦枯莫盡杯中醁萬頃雲亭浮雲海上來西橫太湖過散彩涵秋汀垂隂入虛坐日照天影移風吹浪紋破開窗緑樹間何人讀書卧白鶴觀幽徑松竹深人行隂露滴獨犬下階眠一嫗當山績旌幢高殿閉鐘磬虛堂寂道士不相逄蛛絲縣素壁遊鳳林飲周子順宅芙蓉隔秋水水深不堪採小階涼氣生空牆竹隂在杯行日暮頻人情醉中改忽驚潮水來門前有東海毛直方擬古高堂列綺席賓御何委蛇粲粲金芙蓉春葩照蛾睂檀槽起清籟鐵撥絃鵾雞秖聞筵中曲不聞曲中詞蕭蕭青冢魂化作秋雁歸玉關去時淚點點溼朱絲豈知哀怨情及此歡笑期彈者錦纒頭聽者金屈巵但令今人樂不惜古人悲妾薄命妾肌如玉顔如花長睂窈窈青山斜深閨學成新婦禮鏡鸞不與留年華昨朝東鄰裁嫁衣今朝西鄰催結褵自憐孤燈照春夢年年風雨梨花時不怨父母貧不恨蹇修拙妾生賦命自坎壈底用間情寫紅葉千絲萬絲霜練光與誰織作雲錦裳千針萬針兩黼黻與誰佩服朝明堂吁嗟妾薄命薄命可奈何失時還自羞失身羞更多妾寧失時無失身平生分定月下繩但把貞心守貞色肯信嬋娟解誤人秋感宇宙百年身江湖萬里心世情高枕逺詩味閉門深白髮銷窮達青山傲古今情知秋亦客何事感秋吟漁父辭二首呼兒買米得新粳漁村且喜見秋成今朝嘗新莫草草好釣鱸魚來煮羮溪橋竹邉有酒沽攜魚換酒滿葫蘆篷頭月上不覺醉自卷蘆葉吹嗚嗚龎隆余構山莊於苕溪棲賢山其前軒顔曰卧雲時旴江羅君緯以山長來涖安定書院云其家亦有卧雲軒在麻源索余作卧雲歌白雲悠悠遍空谷野人掃雲結茅屋茅屋門深嵗月長獨向此中睡正熟洞門沈沈春滿牀去來只在白雲鄉睡甜不怕衣裳冷夢覺空餘枕簟涼須臾雲去無留迹門外落花紅覆石野人起來著雙屐孤鶴一聲四山碧趙茂元秋宵吟平林薄暮風淅瀝黃金滿地秋狼藉新月出嶺光欲流萬籟無聲夜寥閴誰家美人吹鳳簫彩鸞對舞摩青霄欄干縹眇碧雲逺天風入骨涼蕭蕭銅壺氷寒銀箭澀玉露滴空衣袂溼紅花落盡爐煙收幽懷耿耿生新愁寒螿啼碎人間秋老牛歎老牛帶月原上耕耕兒怒呵嗔不行瘢瘡滿背股流血力乏不勝空哀鳴日暮歸家羸欲倒水冷萁枯豆顆少半夜風霜徹骨寒夢魂尚繞桃林道服箱曾作千金犍負重致逺人所憐而今棄擲非故主飽食不如盜倉鼠徐秋雲漢武帝萬戶千門禁漏遲建章花發錦成幃瑤池有信青鸞至金屋無人白燕飛風起輪臺春寂寂露零仙掌月輝輝樓前簫鼓繁華夢汾上年年只雁歸唐明皇太平風月屬三郎羯鼓聲中思轉長天子錦纒娛虢國貴妃音律教寧王人歸巫峽山空在花落溫泉水更香誰信蓬萊青鳥使回來無語怨漁陽楊𢎞道空村謠凄風羊角轉曠野埃塵腥膏血夜為火望際光青熒頽垣俯積灰破屋仰見星蓬蒿塞前路瓦礫堆中庭殺戮餘稚老疲羸行欲倒問汝居空村何以供朝昏氣息僅相屬致詞難遽言往時百餘家今日數人存頃筐長鑱隨日出樹木有皮草有根舂磨沃飢火水土仍君恩但恨誅求盡地底官吏有時猶到門李道坦春日行東風入樹吹流鶯曉窗睡熟花冥冥美人窗間動曉思鶯聲枕上提春情坐中日出花滿城城南春深楊柳青王孫不歸消息斷深閨無人春草生草生猶有時王孫何日歸斜陽照流水萬里長相思東園三月花爛開西園蝴蝶雙飛來明朝蝶去春無主閉門花落愁如雨山中苦寒歌深山苦寒弗可居門前積雪三尺餘隂崖一夜石脫骨寒澑萬瓦氷垂鬚道人凍卧山之麓暮爇松脂煮溪緑山隂孤棹期不來夢入幽崖聞折竹征西將軍持短兵馳馬夜渡黃河氷關東諸將面欲裂嚴光獨釣桐江側吳嵩古叉歎何年美人寶叉失深井沈泥汙玓瓅一朝拾得再揩磨三回五回看歎息雙鸞匹鳳兩股勻終然汙色難為新當時光瑩照頭上有似桃李搖青春今人不識古儀狀寶叉雖好非時樣為君插罷擁髻悲物無貴賤皆隨時車遙遙車遙遙舟迢迢斷送行人幾暮朝車馳道路不停軌舟挾風波難住橈家中雖貧常在目每恨舟車苦相促但行一日兩日程死生與君非骨肉瞿唐水深蜀山高檣傾轅折不憚勞何當萬里隨君去得似篙師與車馭金德啓紅梅醉卧西湖處士家夢回惟見赤城霞總然冷艷隨春變依舊疏枝映日斜姑射氷姿凝絳蠟羅浮雪骨換丹砂北人慣在江南住猶説前村有杏花楊鵬翼鞦韆日轉華簷樹影偏謝家庭院簇神仙綵繩斜擘纎纎筍畫板輕承步步蓮弄玉未升霄漢上緑珠先墮綵樓前不知小徑殘紅裏明日何人拾翠細李仲南夜夜曲玉窗結怨歌幽獨絃絶鸞膠幾時續銅龍漏促春夜長冷雨酸風亂心曲間薰翠被鬱金香拂拭繡枕屏山緑飛飛乳燕歸復遲寂莫流蘇帳前燭梁彥中春晝溪水搖光動綵牆雲山倒影蘸霞觴一庭芳樹清隂薄千尺遊絲白日長風細柳塘鶯語滑泥融花徑燕飛忙乾坤俯仰窺難盡花柳無私種種香張澄春思一春長作客連日苦多風野樹凄迷緑簷花黯淡紅愁隨詩卷積囊與酒樽空巢燕如相識頻來草舍中高思恭嶽陽樓待渡楚水凝千里湘雲隔萬層城高秋浦月星雜夜船燈旅况天誰管年光雁可憑殷勤淡山色相送過巴陵方瀾石門曉行風高木葉脫從此曉寒新積雨見初日遠山如故人煙村一葦渡野寺數家鄰獨念行藏異沙鷗未我馴秋夕有感搖落秋漸晚露香籬下花疏鐘出煙寺新月入人家蛩語日夜急雁飛天漢斜蹇余不能去塵世事如麻過吳江離離逺村落晴不見炊煙秋水漲無岸野舟撑入田天留新稼穡人戀舊山川不待鴻飛定西風已肅然黃誠性讀文山集三百餘年樂育恩晚從科目得斯人﨑嶇嶺海期年國零落氊毛萬死身諸葛未亡猶有漢包胥欲泣更無秦挑燈慷慨歌梁甫鬢髮蕭森愴鬼神談復寄玉筍劉師服道士玉筍峰頭玉作人梅花壇下讀丹經曉分露水洗明月夜掃雲洲拾落星海舄近傳鳬徑度泉琴誤許鶴同聽何當謝却塵中鞅共倚松根劚茯苓達德越士雨花臺漠漠平蕪碧蕭蕭亂葉紅褰衣上危石欹帽立西風日月奔馳外江山感慨中他鄉對零落那放酒杯空送欽上人遊錢塘淮南來往熟惟我最相知年少堅持律心空不廢詩春泉間聽處野寺獨歸時遙想猿啼夜縣燈話所思桂􅛁八禽言姑惡姑惡姑不錯姑惡何如小姑惡小姑譖妾生間言遂令婦姑情分薄朝嗔暮逐去不辭珍鮭誰供膾誰斫但願小姑他日嫁兒夫還遇惡姑如小姑提壺提壺復提壺提壺沽酒何處沽彭澤公田誰種秫臨卭女子羞當壚客來煮茶度寒夜杖頭不用縣青蚨提壺提壺勸爾即緘口覆人居巢辟人首婆餅焦婆餅焦阿婆製餅婦為爐爐紅火烈餅成炭婆怒逐婦歸蓬蒿化為異物身羽毛至今銜怨語聲高婆餅焦婦休逐少待來年新麥熟脫布袴脫布袴人情好新皆厭故古來聞有韓昭侯此日那逄廉叔度千需萬索杼軸空今年新衣在何處脫布袴風雨寒脫衣容易換衣難三箇半布積絲纍寸盈尺度下機先製老姑衣忍使天寒披故絮篋中止有半匹存征人書來索襦袴布已盡秋又風妾身依然單過冬不如歸不如歸山川良是人民非風波途路多險巇車摧舟覆將安之榖城黃石待已久上蔡蒼鷹悔却遲不如歸歸及早白雲滿地無人掃泥滑滑暮雨瀟瀟暝雲結苦竹岡頭虎迹新黃蒿城外人蹤絶僕夫股栗步莫前瘦馬凌兢愁仆蹶泥滑滑何時乾出門咫尺行路難行不得也哥哥千呼萬呼奈余何黃陵花落暗春雨湘江水深生素波奮衣出門天地窄仗劍欲往旌旗多行不得早歸來只今誰掃黃金臺歐陽伯恭題蘇武李陵泣别圖祈連山前箭如雨渤海海邉羝不乳同是肝腸十九年白髮君歸朝故主臣心有血一斗許亦欲隨君歸釁鼓五千健兒五千母臣若獨歸魂魄苦空將老淚寄君歸歸拜茂陵墳上土于石號介翁感古引建安天下如潰瓜一榻之外非吾家黃屋飄颻定何許魚為龍兮鼠為虎老瞞詐力敢欺天朵頥羊鼎方垂涎紫髯將軍一攘臂控荆引越三千里慷慨山東大耳兒南飛烏鵲栖無枝草廬一語君臣契目中久矣無吳魏堂堂大義凜不磨靈關劒閣爭嵯峨昨夜西南一星落六尺之孤竟誰託渭水旌旗歸故都江上空存八陳圖抱膝長歌出師表古柏蒼蒼為誰老史紫薇江南曲風凄露冷江南岸瑟瑟寒波秋練練采蓮歌斷紅雲空蘋葉蘆花結新怨鴛鴦鸂鶒俱可憐相呼相倚沙觜眠白頭漁父搖蒼煙一雙飛上枯樹巔杜元和王守之斷腸曲桃花夾堤春水滑棹歌三疉行舟發行舟去去東復西幾度桃花二三月花前一别一回老相思日多歡樂少君重黃金輕别離黃金難買少年時張鳴善送人遊廬山曽到匡廬境巉巒際碧空萬松無路入一水與天通白鹿眠清晝晴猿嘯晚風洪崖如可約吾亦訪雲中阮魯瞻江橋樹江橋樹荏苒年華暮迎得行人來送得行人去落葉成秋風秋風在何處劉珍寄友人相别豈不易相見良獨難迢迢白雲城渺渺羊角山夢長覺道遠迹滯愁春殘知音况何許取琴為誰彈連百正釣絲風短髮冷颼颼倚欄初下鈎間來片水外輕弄一痕秋淺拂蘆花亂低分柳影浮煙波清夢遠吹不到公侯鄧彧之落葉秋庭晝無人落葉自滿地端居觀物化人生亦如寄朝聞鳴蟬悲夕已見其蛻嵗晏共蕭條臨風發長喟江橋樹江橋樹日日斜陽暮春風吹落花半隨流水去花落有盡時流水無盡處甘立賦得城上烏送客月落城上樓烏啼樓上頭一啼海色動再啼朝景浮馬鳴黃金勒霜滿翠羽裘烏啼在故處人生多去留古長信秋詞輦路青苔雨後深銅魚雙鑰晝沈沈詞臣還有相如在不得當時買賦金吳王納涼圖六月長洲水殿涼酒酣揮袖倚新妝芙蓉露冷秋雲薄回首西風響屧廊唐棣溪上秋居白蘋洲上白鷗飛欲學嚴光築釣磯鴻雁無多秋水濶溪山雖好故人稀懶鞭羸馬侵星出且放孤舟入浪歸老去每懷鄉里樂涼風吹滿芰荷衣春波小隱鴛鴦湖上春水生吳姬蕩槳春波平碧山隔樹遠莫見白鳥近人渾不驚倚檻鈎簾間把釣停杯度曲醉吹笙舊時王謝風流在却笑窮途阮步兵苕溪述懷康莊道上謝輪蹄只合歸來向此棲白鳥影邉漁艇小青山堆裏酒樓低簾開野樹雲當戶簷蘸春波屋枕溪今日水晶宮裏住詩成不愧使君題寄題謝子翼晚翠亭洞庭咫尺少經過嵐翠霏霏晚更多風作雨聲鳴墜葉雲垂秋影落滄波楓林賽社聞村鼓橘岸開船發棹歌欲泛空明三萬頃恨無題咏到隂何陳嚴錢選畫花霅翁夙號老詞客亂後却工花寫生寓意豈求顔色似錢塘風物記升平茍宗道蔚州元氏怡齋八元乃八龍嶷若瓊樹林難兄復難弟感激恩義深室家宛相好如鼓瑟與琴翩翩鴻雁行鏘鏘鸞鳳音二王一品題價重雙南金終當仕虞廷藹然列華簪要在風俗淳不異古與今他人有兄弟聚散如飛禽鬩墻不相能干戈日相尋尺布斗粟謠行路為傷心棠棣廢已久角弓義湮沈因書怡齋詩以為友于針王思廉夀陽妝圖一聲白雁渡江潮便覺金陵王氣銷畫史不知亡國恨猶將鉛粉記前朝昭君出塞圖黃沙堆雪暗龍庭馬上琵琶掩淚聽禦敵分明無上䇿錯教紅粉怨丹青張礎汾亭古意圖漢家宮闕白雲秋魏國川原過雁愁萬古松風一茅舍不隨華屋變山丘關山風雨圖山氣凝寒雨不開江濤拍岸雪成堆漁翁慣識風波惡天際孤舟已早回黃君瑞雙燕吟雙燕雙雙飛更復雙雙栖穿花探水雙銜泥簷前葺壘雙哺兒春風一雙至秋風一雙歸念爾失其雌故巢寧獨依莫學里中輕薄夫暮亡其妻朝納姬孫元實池中白蓮蘂宮夜涼張暑宴仙姝散花水晶殿霞綃中單雲錦緣黃金為房玉為鈿翠旌導前寶蓋殿霓裳中序按未遍一人素衣持羽扇頎然中立白玉辨羣姝被酒酡發面冠佩頽然醉相盼彼峩辨者色不變以口承露不肯咽終然貞白難為薦獨向西風抱清怨黃庚鶴林仙壇寺古壇歸鶴杳野鹿自成羣嵐氣浮清曉鐘聲出白雲樹穿僧屋老水到寺門分人世無窮事山中了不聞夜坐即事對景坐清夜蕭然鬢已華詩慳難就藁燈暗不成花易醉愁邉酒頻歸夢裏家何時鋤舊圃學種邵平瓜秋夕和呂講師韻誰彈招隱操雲外伴清幽午夜山林月一花天地秋經臺涼影淡禪榻古香浮不作蟾宮夢凄然憶舊遊偶書豪氣消磨盡攜書客海濵文章難遇主天地不憐貧家室依劉表妻兒笑買臣彼蒼還可問吾道幾時春夜坐世事等輕雲蘧廬寄此身青燈少年夢白髮異鄉人按劍驚山鬼吞舟養谷神黃庭重讀罷吾得葆吾真白州即事一雨洗空碧江城獨倚樓山吞殘日沒水挾斷雲流燈影深村夜鐘聲古寺秋西州舊遊地十載此淹留採菊籬東間採菊三徑碧苔深曉露冷雙屐秋風香一襟餐英供小酌嗅蕊伴清吟會得悠然處方知靖節心修竹東園宴客二月韶光潑眼濃攜樽宴客小亭東酒當半醉半醒處春在輕寒輕暖中拂檻柳添吟鬢緑壓闌花妬舞衣紅晚來聽唱梁州曲聲繞吳姬扇底風小酌小酌園林酒半醺落紅影裏惜餘春插花歸去蜂隨帽傍柳行來鶯避人白髮尚為千里客黃金難鑄百年身何時歸賦滄浪水浣我征衣萬斛塵月夜登樓玉宇澄清暮藹收吟邉怕倚仲宣樓寒蟾千里夜如晝新雁一聲天欲秋湖海誰青豪傑眼風霜易白少年頭更殘忽聽荒城角吹老梅花總是愁春陰芍藥點滴簷聲溼徑雲翻階紅藥帶啼痕可憐花片都零落雨露雖多不是恩聞角誰送寒聲入夢中遙知人在戍樓東明朝梅嶺花飛雪未必都因昨夜風一春新緑園林雨過時黃鸝無語恨春歸楊花怕逐東風去搭住闌干不肯飛池荷紅藕花多映碧欄秋風才起易凋殘池塘一假榮枯事却被沙鷗冷眼看客懷年年春暮客天涯愁見東風揚柳花自歎身如梁上燕營巢長傍别人家見雁有懷滿眼西風憶故廬親朋音問久相疏年年江上無情雁只帶秋來不帶書江村極目江天一望賒寒煙漠漠日西斜十分秋色無人管半屬蘆花半蓼花閨情效香奩作金鴨煙銷一字香滿懷春恨強梳妝看花又怕東風惡偷隔紗窗看海棠江村即事江村暝色漸凄迷數點殘鴉雜雁飛雁宿蘆花鴉宿樹各分一半夕陽歸宋元詩會卷九十八
