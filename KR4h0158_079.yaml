body:
  text: 宋元詩會卷七十九兵部主事陳焯編陳旅字衆仲興化莆田人先世以儒學稱旅幼孤資稟穎異於書無所不讀稍長至温陵從傅古直游聲名日著用薦為閩海儒學官適御史馬祖常使泉南一見竒之勸其遊京師既至虞集見其文慨然歎曰此所謂我老將休付子斯文者矣與祖常交口延譽於諸公間中書平章趙世延又力薦之除國子助教三年考滿諸生不忍其去請於朝再任焉出為江浙儒學副提舉擢應奉翰林文字遷國子監丞卒年五十有六所著詩文十四卷春山圖春山雲木暝初日映遥岑林霏醫高閣望之勞我心幽逕縁崖逈飛淙響磵深芳月忽已晏誰哉與登臨秋山圖之子託冲隠秋山樓觀深矧兹及霜晨遐矚沈氛陰翠巘含白雲丹楓映青林靈溪鳴石溜野屋負層岑趨喧事多違即曠恒愜心何哉芳月晏而我阻幽尋湖上分韻得春字君子佩明信相期湖水濱時欣宿雨霽畫舸送遊人輕鷗集蘭渚佳樹變鶯晨山逺烟容淡日出水光新美人含麗思艶曲歌陽春暌攜會彌歡酣適趣益真兹遊敦徳誼况乃及兹辰安福李氏臨溪亭結屋負南郭清溪流屋前端居塵事少水木自幽妍滌硏弄寒碧鳴瑟寫潺湲沙鳥時近人汀雲相往還烹鮮芼溪毛留客坐前軒逝川道體著觀物悟㣲言題楊顯民來詩卷後夢遊洞庭野斜月映疎星軒后來張樂伶倫吹鳯笙夢囘憶其音幽邈有餘清截竹學向人世人皆不聴南州有高士洗耳卧巖扄凉風鳴松林石磵響瑽琤何日即與語曠然千古情賦雲錦溪緑水春生渚丹花集陽林愛此雲錦好蘭舟轉溪深賀監謝軒冕載酒過山陰遥聞櫂歌發縹緲不可尋題米元暉溧陽溪山圖宿雨散層巘林麓翳烟霏遥山斷復連川上初晰㣲我昔困行役漂蕩秋未歸幽子喬松流邂逅啟郊扉撫景正若此别離嗟願違覧卷遂終日溪雲欲生衣次韻寄太乙宫上官師二首端居感流序階樹日摵摵凉風起高城上有南飛翮揚雄不邀名拓落猶遠客美矣陶徴君斂裳去彭澤我居城東南西北有殊庭病久曠冲賞懐哉松桂青曼倩諒竒士夙受火珠經雲河澹秋夕泰畤明三星桃花鸂鶒圖婀娜絳花明連娟碧筠静金塘春水多文禽汎晴影大堤冩遊悰日照華服靚萬殊各有適况及芳嵗永陶淵明撫松圖原野凉風至草樹日蕭條杖笻還故丘青松在東皋孤陰近衡宇薄日映層標念其有貞操撫之以消揺明妃出塞圖昭君北嫁呼韓國巫山更有昭君村黄金鏤鞍玉驄馬分明載得巫山雲凉風吹動釵頭雁一曲琵琶冩幽怨沙草遥連雞塞庭野花不種鴛鸞殿内家日日選娉婷淚痕滿袖空多情漢廷自此恩信重美人身比鴻毛輕蘇伯修往上京王君實以高麗笠贈之且有詩伯修屬和往年飲馬灤河秋灤水斜抱石城流青城丈人来水上揭謝蘇王皆與遊顧余濫倚橋門席斜陽半落鼇峰石夜凉共飲明月樽醉眠更聴高樓笛灤河九曲流濺濺自我不見今三年蘇郎又扈屬車去佇望弗及心茫然龍門峽中雲氣濕山雨定灑高麗笠别意遥憐柳色深歸心莫為鵑聲急不才未許收詞垣賦成何日奏甘泉人言凡骨難變化為我致意青城仙謝氏祖孫創澧陽橋涔陽極目雲氣昏衝風揚波鼉窟翻湘妃抱琴望虞舜日暮江竹多啼痕木蘭為舟不可度誰幻層淵作平路天潢夜静牛渚長海市朝晴蜃樓吐祖孫移山山可移昔人不信今見之千年猶有召伯埭白面聚斂嗟何為海谷歸虚谷在渤海東八紘之水注其中不盈不縮浩無際吞吐日月含空濛靈鼇於此負山出上有縹緲金銀宫人間相去㡬萬里弱水滿眼多迴風琴高来時踏赤鯉少君歸去乘白鴻秦王到老不得渡嗟我欲往將焉從子房有孫海谷子告我有路非難通只隨雲氣相上下與子共謁扶桑公宫人倦繡圖龍碧鮫綃剪秋水輕風吹香團扇底琵琶彈歇宫晝長釵落鬢邊雙燕紫二姝誰是薛靈芸繡得金塘兩鴛似宫奴夕殿喚更衣露濕銀牀響桐子友人記余少作因録之溪村積水生寒烟匡牀睡起清明天隔溪暮哭人飯鬼塍問燒錢野風起酒旗山前雨疎疎来禽花低飛鷓鴣荒墳纍纍出新草草長如人人又老東門大道青陽間可憐車馬無時閒次韻上官来復見寄琳館薄炎熱松壇深嵗年高人坐堂上疎雨落堦前潘岳頭空白揚雄學未𤣥定應拂塵服從子弄雲泉楊季子水北山房豫章楊季子語我草堂幽野徑穿雲入山泉繞舍流竹光書帙曉溪影釣絲秋水北真佳隠誰從節度遊方壺道士作荒山白雲圖寄豫章楊顯民之子讀書處亂山生白雲林花晴冉冉巖瀑暝紛紛畫此何為者持之以贈君謂宜作春雨舒卷只成文清漳黄氏北墅聞説黄家墅開門入翠嵐細岑依舍北流水出城南雨暖蘭抽筍霜晴樹落柑千年讀書地更莫乞羊曇題羅稚川畫卷雨氣通林壑江光動野航道人巖下去茅屋樹邊凉斷岸入秋水遠山留夕陽登臨休作賦遊子未還鄉謝徴君松巢昔聞徴君在天目松間結巢成久留南榮北郭井里近西枝東柯林谷幽蕙帳眠深翠露落石泉醸就緗花浮擬借丹梯向高處枳白桐乳非吾求送鄭希道杭州路知事㡬年讀書白鹿洞諸老遲子黄金臺豈為錢塘足清賞遂令幙府得英才郡中日晏文牘少湖上春晴畫舫開我向都門折楊栁子亦寄我孤山梅送張真人代祀武當龍虎兩山桂館祠官持羽節名山兩地躡丹梯共誇曼倩来金馬大勝王褒祀碧雞杵磵暝痕銷雨石杼巖秋影動星溪蕙肴椒醑登瑶席定有神光起畤畦次韻本元上人相别君向雷峰塔邊住詩成總在倚欄時蘇堤殘栁凝烟小葛塢閒雲度水遲衲子定囘花繞座高人别後草生墀相知不似渾忘郤誰問荘周與惠施送李盤中真人代祀江南三名山弱水囘風不受帆三山只在大江南使槎郤帶秋星溼仙掌遥分夕露廿瑄玉禮神通景氣寶香隨地結晴嵐泰壇建論昭靈貺老我猶能效史談題城市山林圖城市山林路不分畫橋騎馬是徴君樹頭粉堞連青嶂陌上紅塵亂白雲水巷栁深鶯喚友陽坡草暖鹿為羣滑稽誰似東方朔更向金門避世氛懐慶王節婦良人飄渺泊烟鴻窻竹寒沾雨淚紅檜楫不游淇水上柏舟仍見衛風中龜文屈曲秋機斷鸞影低徊曉鏡空贏得公名寫桓表千年光燄吐晴虹送朱運峰著書得官南歸城東有客過吾廬揮塵高談逸氣舒金馬豈無方朔伎石渠今取夏侯書沙隄老屋秋楓合海浦歸帆暮雨疎我亦草𤣥官拓落江南無地可耕鋤元宵懐錢塘武帝親祠太乙神流光洶湧動星辰行宫典禮猶存漢軹道山河已易秦香徑至今啼木客露盤無復泣金人紅燈㡬㸃東風裏猶是元宵一度春院中聞駕先還再和伯修甘泉宴罷雁聲寒桂樹吹香出寶闌翠輦遥臨秋海白霓旌高拂曙星殘氊城家拜銀麕賜棘院人爭繡虎看堪笑子雲能作賦獨騎瘦馬後奚官送王致道代祠北岳北海濟瀆南鎮皇帝齋明守鎮圭祠官奉節出金閨北尋海瀆瞻恒岳南涉江淮上會稽山下靈風吹桂櫂雲邊仙樹拂丹梯王褒空有甘泉頌投老還鄉祀碧雞送毛真人南還真人不似壺丘子老去都㤀杜徳機太乙象文令虎守尚方鳧舄背人飛巖扉暖翠侵緗帙江渚晴霞上羽衣遊子故園春似海客牕長日聴催歸壽虞先生道園衡山道士駐飛車千載儒宗出相家月下華星生五色人間珠樹吐三花芝田養鶴春凝乳茞石聴鶯曉颺霞朝退日長賔客醉翠房文火伏丹砂道園生時其外祖夢衡山道士送趙子期使交趾曉日承恩紫殿深都門祖道馬駸駸上書不奏唐䝉策歸槖寜将陸賈金露入珠盤鮫室白苔生銅柱象崖陰為君臨水歌黄鵠天北天南萬里心天谷東郭先生履欲穿尋幽俄得谷中天漁人誰去縁溪岸山鬼能来送石泉池暖碧桃深映雨林春琪樹總含烟後来聞有何高士傳得終南大洞篇題雲林晴曉圖故人别後江波緑神女歸来峽雨乾海上日花春冉冉天邊雲樹曉團團滿汀芳草留孤艇度石幽泉咽下灘最愛東頭小亭子聴鶯何日一憑䦨為董宇定賦杏林詩侯官古縣多山水中有當年董奉家邑子每懐江上樹仙人還種日邊花珠林夜氣凝丹露貝闕晨光散綵霞我憶舊遊成逺别上東門外立昏鴉福州冲虚觀力士持兵守絳宫吹笙人去斗壇空白榆城闕秋雲上紅樹樓臺夕照中鴻寶昔疑丹井謬龜泉今悟玉池通他年不跨芝田鶴曽向清虚學御風次韻陳景思見寄用世已無伎高人方據梧詞林忝供奉客舍候徴呼拓落需㣲禄騫騰失壯圖為文下枚孺力穡後孫愉春草生湖曲晴雲飛屋隅論交尊有螘意别履非鳧擬汎鴟夷舸重遊泰伯都山泉㪺雲乳石荈瀹瓊酥作鱠溪庖近聴猿野磴紆松風吹緑鬢花雨落紅毹佳什勤相贈幽期愧獨踰煩君語宗長為我謝寅夫題畫蘭竹美人隔澧浦日暮倚幽篁繁霜忽已殞為我紉秋芳題水仙花圖莫信陳王賦洛神凌波那得更生塵水香露影空青處留得當年解佩人題耿氏所藏豔圖五月風生水殿凉緑楊深處奏鶯簧佳人偏愛臨池坐欲與荷花鬭晩妝為彭道士賦鶴峰跨鶴臺高倚翠㣲昔人城郭是耶非蘂珠宫觀秋如水有客吹笙月下歸題張氏風竹圖湘江風卷白頭波北渚雲深帝子過欲采瓊芳渡江去翠衫輕薄曉寒多貢奎字仲章寜國宣城人以文學名家延祐至治間官京師為集賢直學士卒諡文靖焯按元史載奎於其子師泰傳中未詳履歴及别考家乗云奎幼名三郎和易端重始授池州齊山書院山長尋徴赴吏部至徳六年擢太常奉禮郎遷國史院編修丁憂服除除江西儒學提舉復入翰林為待制終直學士生平著作甚多俱散佚無存所傳世者僅雲林小稿而已秋日陪大學士趙公憩龍山𤣥真宫巖巖居庸闗左挾飛仙居蒼茫四山合石徑穿盤紆人家稍相接林木何森敷觚稜生曉烟𤣥風凌紫虛念彼羽流集豈與世俗居溪流轉雲碾餘潤分園蔬鐘磬答空谷齋供薦芳腴穹碑紀宗傳道一教乃殊素餐貴崇本卒嵗事耕鋤漁父在何許空有桃林株坐慚秉文幹尸禄常曠迂日暮陟層巔丹霞成長裾遥睇空中雲超然能卷舒虎林𤣥妙觀琳宫古崔嵬獨據山勝絶天光垂帝座照耀金碧色脩廊接層崖俯日視深澤陰陰木葉暗石削蒼壁冽流泉出嵌空六月灑飛雪平生功名謀洗我肝肺熱同遊得幽人再拜摩斷碣興亡見唐漢高爽了呉越更擬窮幽探馳景忽西滅題董簡卿所蔵瀟湘圖瀟湘在何處展卷心悠然是中浮雲飛上與蒼梧連憶昔弄扁舟載雪清江天湘君招不来明月在我前㣲鐘破征夢落雁栖寒烟迴首行萬里攬衣羡孤鶱可憐楚人詞惟悴窮嵗年圖畫豈不好此意誰復傳已矣三歎嗟臨風叩商絃雪晴今晨持我書燕坐雪照屋閉門謝塵鞅展巻自朗讀衆說初若攻𡨕思意纔復旭日上團團清泉喚春緑涓涓晴櫩溜洗眼濺飛瀑豈不事遊觀驅馬泥及腹永懐同袍士嵗晩在空谷好風忽東来起翫庭下竹邳州古城結危構交逵裒招延朱碧遞隠見岡迴勢蜿蜒填車縱横遊重屋光華鮮扣門多乞食民饑逺流遷桑柘重藹緑鬱鬱浮蒼烟念此萬里道我舟亦已旋雲樹列環岫晴鳧散平川烜赫驪珠光隨風墮靈篇神清契高㝠性斂涵静淵出處古異途世故寜糺纒簡書誠可樂軒冕非自捐推篷晩逾迅凝霞助孤鶱秋懐瑶漢夜澄寂烈烈羣象嚴浮雲翕交互圓光尚㣲纎階蟲競鳴響濕螢度飛檐持志惕自警屛營以深濳驚飈度幽幌凝香啟方奩栩栩莊生蝶秉志能養恬雞鳴何孳孳憂心愧如惔答陳華仲二首海上三神山上有學仙侣泠泠紫簫聲吹作飛鳯語迴飈蕩溟海散落成烟雨豈無知音者一振九苞羽持之獻天庭上以奉明主貧賤交有道富貴多異途所以古君子擇交嚴所趨霜劒閒寶室烈士發長吁隔世或相慕同居秦越殊寥寥千載間羡彼管鮑徒題淵明圖若士超世流高風凌飛仙倦懐經濟術嗜酒豈自然去之千嵗間賢才孰相先畏途轍皇皇歸歟袖翩翩日暮孤雲飛黄花澹秋妍坐憐王𢎞輩矯首南山巔即事藹藹羣樹林孤雲暮来歸紛紛飛鳥倦斂翮相因依臨軒方獨坐凉飈吹我衣物理固有常悠然悟其機山中何者樂躬耕自無饑百年事未晚寜勞歌昨非歸歟友田父一樽聊可揮送别劉道夫春晚益可愛緑陰蔽前郊念子暫時别我心已云勞浮雲始舒霽倐見疎雨飄暄爽驟變更豈異世俗交㣲飈起林杪清池樹光揺沈憂渺予心衰髪矧漸凋悵焉立斯須幽禽語嘐嘐雨中驟熱變風雨氣候一日殊緑樹擁如盖殘花落無餘閒居日偏永手把種藝書幽幽魚鳥適寂寂車馬疎曰父二三輩濁酒時来俱愁陰每思霽㣲凉意稍舒攜笻獨延佇層雲起遥墟送史高士謁呉閑閑春水武昌船帆飛敬亭雨孤城壓喧囂聴此檣燕語揮手謝時人開胸散煩暑煌煌闕下書曵曵雲間侣真人紫霞佩執簡授璇宇攬衣欲從之神交諒頃許霽雨沐霄容風㣲鵠初舉遊心愜高明脱屣邁行旅懐哉會何時酌彼盈樽醑送鄧提舉之官浙江白雲一觴酒離思滄溟間子行勿復居念我何當還杳杳飛鴻書瑟瑟清鏡顔潛機不私貸歳月忽已闌贈之雲錦章譬彼蒼玉環何以解塵纓幽泉弄潺潺拜醮北觀齋罷敞春服趿履步脩廊籠禽動新響雨餘竹風凉道人房更深爐烟引㣲香於焉謝塵鞅閒来日偏長登虎丘山吉士雅巾履具舟約芳遊朝晴出西郭午凉登虎丘松逕度遥嶺歴此層級脩當時呉王劒硎光裂嵒幽平甸眺萬頃閒瞻烟樹稠頗聞山僧賢飛錫下林陬獨遺方丈室於焉集清流一簟可平生豈惜半日留煮茗試泉冽焚香延宿篝疎雨催晩歸隨波散浮漚京城客館公宇日無事閲書稍怡情浩漫罔窮極静定悟始明籠禽動幽響庭草遂㣲生俯念節物變宴處常懼盈寜復辭勞苦王事驅我行雨餘夕陽照空雷殷殘聲暄爽倐未定雲勢方縱横訪遇當獲趣及兹煩抱嬰何時故園友濁酒與同傾寄示師文姪川明山秀草花馥氣連鬱儀迴地軸晴嵐宿靄屯氤氲石根飛泉迸寒玉此中縹緲仙人居樓觀金碧繞翠竹我来曽住纔七日迴首人間白雲速飄揺金衣鶴雙飛白玉童吹紫鸞曲天聲忽逺奈别何青山送人秋思多作詩寄汝仍自歌梅花零落雪吹盡願㭘瑶草山之阿謝李息齋惠墨竹湖州墨竹蘇州詩李侯二美能兼之長安塵中忽到眼坐我六月江南時幽人江南結林屋紫碧森森萬竿玉清風激昂此君語六月寒生不知暑只今見畫思故鄉博山日永凝清香人生萬事直適意相對悠然希坐㤀寒食掃松即事東風㣲㣲吹雨晴春山草暖雉飛鳴時哉物性各有適人生悲樂難為情客行十步九迴首寒食道旁多哭聲往年攜手原上頭今年酧酒原上丘相逢須識夢中夢有聲莫帶愁中愁送劉道夫西崦松篁路雪消沙水清天寒行役倦酒醒别愁生落日横車影長雲送雁聲梅花應未發留待照春晴秋日陪集賢學士趙敬夫憇龍山𤣥真宫山轉疑無地人家近隔村野田秋穫盛岡路晩行喧川淨雲生石溪平水到門偶尋高士隠相見遂忘言贈孔令尹百里光山逺三年縣令賢人皆思舊徳我欲賦新田緑霧桑浮野黄雲稻際天風流昔潘岳空作種花傳試院次韻答呉草廬先生蹔客留應喜㣲官去恨遲竹高當戸直花重向簾垂對酒驚人别看詩感嵗移山中足幽事猿鶴舊曾期陽墅道中馬上千峰列溪行不盡源野船高似屋山縣小如村路遶田間曲池漫雨後渾静来應最樂緑樹擁柴門即事小雨春寒重呉蠶上箔遲枕欹清夢覺窻掩緑陰垂喜聴林鴉哺閒看垤蟻移相思故人逺誰與話心期憶昔暗憶曾遊地遥看不盡天宿雲連野樹積雨聚溪船故友疎三益㣲官負十年閒居成癖性長日枕書眠遊大梵寺三首逺客閒無計㣲官欲賦歸偶尋幽寺去頗覺俗情非涸澤饑鷹戀高空獨雁飛西風如有意向晩襲人衣清溪盤百曲虹影駕横槎春事怨行客夕陽啼亂鴉山明分衆木天濶散悲笳郤羨僧家勝推窻瞰水涯遨遊窮樂事模寫得新詩古寺看山後㣲風到竹時地幽塵不染人語燕歸遲向晩寒猶峭惟應客袖知居庸闗早行茅屋聞雞起羸驂並轡行澗深孤碓響山暗數燈明細憶留題處空慚不棄名客愁偏切耳斜月候蟲鳴濟州舊濟知何處新城久作州危橋通去驛高堰聚行舟市雜荆呉客河分兖泗流人烟多似簇聒耳厭喧啾郊行雙溪溪上路重到五年遲桑柘成陰處鶯花向老時泊舟隨岸曲坐石看雲移政愛沙鷗狎驚飛底見疑郊行馬上看山山不盡客中行路路偏長叢祠社散羣烏啄層漢秋高數雁翔疎雨著人絺袖濕㣲風吹面稻禾香迴岡偶憇幽塘上顛倒松陰百尺彊久留翰院思歸日日思歸未有期夢魂㡬度遶園池白雲滿地山深處紅日當簷雪霽時竹外板輿春歩小花間銀燭夜筵遲好将烏鵲頻占喜便買歸舟泛碧漪得家書睡起相思勞寸心捲簾無語立簷陰故人千里碧雲合斜日半川紅樹深江雁忽傳秋後信隴梅應待雪中尋天涯奔走成何事輸與寒窻抱膝吟試院秋日即事薄遊時覺鬢毛蒼病怯西風夜更長官冷久無金馬夢院深惟有木犀香歸舟欲解天如水故友難㤀客思鄉試問宋郎愁㡬許雁聲何處起滄浪邳州荒城十載路重經暫艤扁舟坐驛亭春到梅花何處白雪晴山色向人青驚心家逺書難寄迎面風寒酒易醒莫憶牽衣兒女態曉猿霜鶴笑林扄送謝明逺之官平江碧波千頃照姑蘇目送危檣數幅蒲古寺雲遮丘卧虎荒臺葉落夜啼烏黒頭清鏡来勲業緑幕深衣入畫圖暇日過遊新得句秋風應寄故鄉鱸送汪叔志之南安繞郭清溪帶路長衝寒極目送危檣水涯梅栁傳春信雪後樓臺照夕陽杜牧吟邊山鳥去謝公行處石苔蒼碧雲暮合天無際囘首相思欲斷腸貢性之曹選附貢性之詩于仲章集後未嘗略著其生平按仲章子為貢師泰至正間官淛江行省參政有姪貢友初亦因師泰僑寓錢塘師泰極愛之曽贈以詩有頌椒留子美戱蠟愛僧虔之句今考性之詩首西湖燕集當即僑錢塘之友初也友初其字而性之其名乎西湖燕集分韻得南字我志在丘壑野性夙所耽今晨適休暇樂此風日堪而我二三友濟濟皆儒簪扶擕眺西郊到處窮幽探湖光淨澄練山色浮晴嵐林木葉已脱梅花蘂猶緘言瞻和靖祠芳草埋空函載登岳王墓老樹雲相參眼明三竺國金碧眩精藍商歌起樵牧清梵来瞿曇方将履夷曠尋復躡巉巖去去不知逺落日山脚含美人具清讌畫舫如雲龕浮游六橋間水天遥共涵賦得蛾眉亭送胡長史粹中之楚雙蛾横翠黛孤亭枕江流伊人適行邁於焉拽蘭舟山空夕烟斂月白水光浮永懐謫仙人浩歌動清秋風景詎不美公程靡遲留明發指武昌千里路悠悠言從夏口驛遄經鸚鵡洲王國實重鎮屹然居上游皇圖永萬古輔翊在謀猷兹行亦已壯毋使増離憂牧牛圖溪童飲牛渡溪水牛遇水深行復止人知水深牛不行誰識囘頭顧其子桃林之野春雨晴燒痕囘緑春草青大守勸農當二月土膏肥暖牛可耕邯郸城頭征戰息寗戚徒勞吟白石一聲笛裏太平歌牛背溪童自朝夕唐馬圖開元天廐多良馬四十萬疋皆龍駒奚官牽出立仙杖箇箇五花雲錦如許教蒭粟官家給餵飼何曽敢相失花邊栁下恣長鳴不比駑駘甘伏櫪太平天子無戰争四海久矣風塵清青絲絡頭玉為轡看花不出長安城世間豈無千里足往往徒遭奴𨽻辱如何獨領鳯池春慎勿從人厭羈束宫梅圖璚樓夜寒銀漏澀滿地霜華月光白翠禽啼斷夢中魂窈窕虛窻碧紗隔千門深鎖含章宫未許人間識春色只愁笛裏曲聲哀零落香鈿㸃妝額林壑深秀為鄧宗經賦芙蓉城郭自天成長日開軒看雨情飛瀑曉翻千嶂雪驚濤秋湧萬松聲雙雙去鳥風中度一一遊人畫裏行濟世功成許歸隠肯教林壑負深盟清燕堂江山深處畫堂深朋宴曾聞屢盍簪奕世衣冠惟望族百年桑梓尚喬林珠簾捲雨聴春晝寶鴨含烟散夕陰我亦有懐同笑語圖書堆裏坐鳴琴送陸景宣靖州從軍蠻荒溪洞極邊頭仗劒從軍憶壯遊楊栁春風千聚落旌旗曉日萬貔貅路經彭蠡洲前過江自巴陵城下流早報逺人歸聖化貂蝉從古出兠鍪送戴伯貞簡校還廣西桂江烟水接瀟湘逐客歸来道路長卷裏謾多新製作篋中猶是舊衣裳逢人且說身如夢老我相看鬢已霜此去莫教音問隔雁飛今喜過衡陽水竹軒萬竹瀟瀟水遶門九街車馬自昏晨晴天波影揺窻戸静夜秋聲入夢魂曾為故人頻下榻每因佳客屢開樽百年清致今猶昔春雨深深長子孫城南耕隠愛爾城南隠者居春田遶屋總膏腴兒孫候暖晨驅犢燈火分凉夜校書入社有懐占樂嵗趨朝無夢候公車相逢自歎飄零久投老歸来愧不如次萍居留别韻且復長亭折栁枝離筵已判酒如池因思㑹面難期處直使銜杯到醉時檣燕留人雙上下岸花迎客半低垂計程明日毗陵道吟寄新詩欲倩誰有懐夏文度文表昆仲珍簟生凉簇浪紋寳爐香煖散晴薫葛巾白苧消三伏繭紙烏絲冩八分文字勇追韓吏部詩才清逼鮑參軍眼中年少多如許獨爾風流莫與羣題畫山水山水東南勝逰遨嵗月遷登高頻折屐載月屢移船鏡水荷花裏秦雲嶺樹邊猿偷霜果下鹿借石牀眼野趣間誰適詩懐静自便洞深通窈窕澗曲冩之𤣥采藥時逢虎看棋或遇仙僧留題竹字鶴避煮茶烟㨗徑惟増愧移文只浪傳種桃春萬樹别有武陵天東坡竹玉堂罷直獨歸遲墨瀋将秋入硯池坐到夜深清不寐鎖窻凉影碧參差畫馬天閑牽出許奚官飲罷春流未解鞍記得曾陪仙仗立五雲深處隔花看附郭矮梅詠炭詩此詩極為貢所賞故録之樵青黧面學崑崙斫月燒雲樹欲髠萬竈黒烟灰出刼一星紅燄火還魂汚身若有仙翁幻報國今無義士吞爭似茅齋風雪夜地爐榾柮暖温温薩都拉字天錫本京口朱氏子冐囘囘姓與黄清老同年進士題焦山方丈壁江風入霜林寒葉下疎雨蕭蕭復蕭蕭可聴不可數山僧亦好竒呼童掃行路到處覺秋聲肩輿入山去秋日病起池上顧兹林塘幽消此閒日永飄風辭萍踪落葉散魚影天池風露凉秋深藕花冷有懐無與言獨立心自省早發黄河即事晨牽大河上曙色滿船頭依依樹林出慘慘烟霧收村墟雜雞犬門巷出羊牛炊烟動茅屋秋稻上壠丘嘗新未及試官租急徴求兩河水平堤夜有盗賊憂長安里中兒生長不識愁朝馳五花馬暮脱千金裘鬭雞五坊市酣歌最高樓繡被夜中酒玉人坐更籌豈知農家子力穡望有秋短褐長不充糲食長不周醜婦有子女鳴機事耕疇上以充國賦下以祀松楸去年築河防驅夫如驅囚人家廢耕織嗷嗷齊東州饑餓半欲死驅之長河流河源天上来趨下性所由古人有善備鄙夫無良謀我歌兩岸曲庶逹公與侯凄風振枯稿短髪凉颼颼寄朱舜咨王伯循僧即休三首大江湧金山穏若青蓮座山下有龍宫見水不敢唾江山萬古同日月片帆過把酒妙高臺狂歌醉相和飄飄鶴林僧布襪青鞋雙長江飛鉢度碧海魚龍幢逺来作偈别楚雨鳴秋窻振錫獨歸去天花飛滿江㣲茫揚子橋細雨濕秋色小艇載呉姬揺揺語相接風起布帆高一往不可得夜宿廣陵城吹簫照明月宿烏石驛雲起烏石峰雨洒紫溪嶺孤館如山深愁人覺宵永燈花剪復開風竹亂不整清晨度閩闗南斗落衣領好冩度闗詩㸃筆題石筍石上晩酌天章臺高臺在層霄肩輿上絶壁露下酒樽凉月出海門白坐拂衣上雲醉卧林下石西風吹鬢毛南斗在肘腋題詩向天閽奎光射瑶席宿臺山寺絶頂江白潮已来山黒月未出樹杪一燈明雲房人獨宿近水星動揺河漢下垂屋四月夜深寒繁露在脩竹夜興半峰走晴雷風力吹邊雨層雲不成陰殘缺如敗堵山深日易暝孤館孰賔主燈花翳復明落葉聲可數獨立誰與親厨人夜深語題茶陽驛飛亭白雲飛出山怒擘蒼峽裂幽谷響晴雷絶壁洒飛雪萬折入滄海龍宫水晶闕簸揚弄珠人氷簾挂寒月贈白雲白雲抑何閒竟日不下山時從脩竹裏相伴一僧還悠悠覆松頂渺渺歸岫間奔走塵俗客視君多厚顔望武夷溪行望武夷峭壁何斬絶赤霞亂不收大化元氣泄下有萬年松上有太古雪秪恐明月中鐵笛吹石裂宿武夷艤舟山水間借問武夷觀月挂水晶簾風吹紫霞幔雞犬過雲間笙樂度天半傳語武夷君酒熟幸相喚宋元詩會卷七十九
