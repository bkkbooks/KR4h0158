body:
  text: 宋元詩會卷九十四兵部主事陳焯編丁鶴年字鶴年回回人穆爾丹官武昌因家焉鶴年遂以克丹丁為姓其長兄吉雅摩迪音字元德次兄鄂拉實字允中至正間並舉進士鶴年詩典麗清醇天姿既髙而學力足以副之一時詞彥罕有出其右者風泉清聽為文禪師賦幽棲空谷中石室如懸磬坐閲造化機動靜互相勝風生萬籟隨雨過百泉應蕭蕭亂疏鐘泠泠隱清磬虎嘯山月昏龍吟海波靜上人謝聲塵悠然入深定喧寂兩俱忘是乃名真聽歲晏二首歲晏百憂集獨坐彈鳴琴琴聲久不諧何以怡我心拂衣出門去荆棘當道深還歸茅屋底抱膝梁父吟歲晏百憂集擊節發商歌商歌未終調淚下如縣河故鄉渺何許北斗南嵯峨有家不可歸無家將奈何感寓三首宇宙忽空濶飲馬萬里流平生負兩眼及此行寓州天清健鶻運木脫饑鷹投長風吹海雨濯我紫綺裘相逢半遊俠把酒髯如虬慷慨說史記歷今山川秋向來衣帶水目短河無舟西風桂花落我上天台山仙子扶我手冷然蒼水環乘鸞者誰子飛烟渺難攀三生此遊戲弄影銀河灣空山忽飛瀑四顧鳴潺湲長揖馬子微此豈非人間船頭書千乘船尾酒百壺酒盡書在眼落月如明珠忽悟八陳法縱橫如河圖惜哉經世士未有窺唐虞季子相六國所見惟隂符胡節婦一自失良人年年不見春常時折花處青苔滿行路即今垂老百事非篋中惟有嫁時衣姑終養子能成立望夫差勝山頭石登北固山多景樓風月無邊地乾坤有此樓城隨山北固潮蹴海西流眼界寬三島胸襟隘九州階前遺恨石誰復話安劉幽期何處赴幽期青林白谷陲谷虛秋氣早林茂曙光遲談罷風生麈歌闌月在巵謀身良自足何補國安危春日海村門巷絶輪蹄春深緑草齊風光不相負泉石且幽棲捲幔通花氣移牀避燕泥時時得佳句自向竹間題涵清軒為慈溪懋上人作止水才盈掬涵空有底寬玉壺秋影淨金鏡曉光寒落月斜沈白流霞淺浴丹上人方宴坐應向靜中看贈李仙姑何年萼緑華來降地仙家花擁青鸞節香隨白鹿車清輝回雪月𤣥想結雲霞不赴瑶池宴桃開幾度花送定海許縣丞蛟門佐邑滿南去候庭闈雨露隨花綬雲霞避綵衣賢聲今已著色養舊無違萬里滄溟月清秋作伴歸慈溪歸隱為馮子木大尹作舊隱慈溪上歸休足自怡水翻琴上曲山送畫中詩叢菊秋容淡孤松晝景遲依然對猿鶴無愧北山移題筠軒為定海胡處士賦種竹繞前楹年深徑節成薄雲通雨氣清夜動秋聲魚豕空遺簡鸞皇合度笙往來三徑熟不負歲寒盟病衰病骨秋增痛衰容日减華臉霞憐竹葉鬢雪妬菱花往事嗟何及歸程望轉賒少年歌舞地此日屬誰家故宫人粉愁香怨不勝情强整殘妝對老兵别殿金蓮餘故步後庭玉樹變新聲眼穿雁字雲連塞夢斷羊車月滿城天上桃花王母去世人誰識許飛瓊雪後泛東湖雪後湖山玉作圍小舟乘興弄清輝貪看月裏鸞回舞不覺風前鷁退飛雲母屛空春閴寂水晶宫冷晚霏微仙家一笑乾坤老誰馭瑶池八駿歸梧竹軒為鳳浦方氏作鳳鳥曾聞此地過至今梧竹滿丘阿政懷剪葉書周史卻恨翻枝入楚歌金井月明秋影薄石壇風細晚凉多中郎去後知音少共負竒材奈老何存齊詩話云時作者已滿卷矣此詩一出皆為斂袵九靈山房圖為戴先生賦九靈别業何年到聊作新圖寄所思幽谷白雲晴窈窕髙簷翠樹曉參差輞川已入王維畫韋曲仍傳杜甫詩咫尺相望成萬里臥遊心事許誰知二靈寺守歲守歲山房迥絶緣燈光香灺共蕭然無人更獻椒花頌有客同參柏子禪已悟化城非樂事不知今日是何年憂心悄悄渾忘寐坐待扶桑日麗天暮春感懷杜宇聲聲喚客愁故園何處此登樓落花飛絮成春夢剩水殘山異昔遊歌扇多情明月在舞衣無跡綵雲收東皇去後韶華盡老圃寒香别作秋一作别有秋奉寄九靈先生花栁村村接海濱攜家隨處避風塵衣冠栗里猶存晉雞犬桃源久絶秦坐對青山渾不厭忘機白鳥自相親也知出處關時運豈但逃名效隱淪寄定海故將軍邵公輔往事浮雲杳莫攀壯懷未展鬢先斑不聞奉使通銀漢空見將軍老玉關故壘荒涼千騎盡滄溟浩蕩一鷗閒風塵隨處嚴訶止愁殺田間野獵還贈李全真𤣥元孫子𤣥都客汗漫長遊宇宙間黃鶴白雲迷鄂渚青牛紫氣滿函關袖中寶劒雌雄合鼎內金丹大小還不見吹笙王子晉秋來幾度駐緱山兵後還武昌避亂移家大海隈楚雲湘月首頻回歸期實誤王孫草逺信虛憑驛使梅天地無情時屢改江山有待我重來白頭哀怨知多少欲賦慚無庾信才題昌國普陀寺寺在寧波東南海島間即昌國州之故墟也神鼇屹立戴崔嵬俯瞰滄溟水一杯積翠自天開罨畫布金隨地起樓臺祈靈漢使乘槎到傳法番僧折葦來若使祖龍知勝概豈應驅石訪蓬萊按錢本此題原二首其次作警句云三更日浴咸池水八月潮吞渤海天知歸菴為四明董氏作衮衮紅塵未息機斯人何事獨知歸青山不辨將來計白髮徒嗟既往非谷口雲霞隨葛屨沙頭魚鳥識荷衣自慚潦倒江湖表猶對旄丘賦式微樊口隱居為武昌李均玉作萬里雲霄斂翼回挂冠髙臥大江隈春深門巷先生栁雪後園林處士梅翠擁樊山邀杖屨緑浮湘水映樽罍誰能領取坡仙鶴月下吹簫共往來戲贈劉雲翁千金不惜買新聲贏得風流老更成銀甕葡萄浮臘蟻金屏窈窕囀春鶯香凝宴寢頻開席花暗閒房合度笙夜燕未終賓客醉莫將明燭照華纓錢塘懷古錢塘佳麗冠南州故國繁華逐水流龍虎已消王霸氣江山空鎖古今愁吳臣廟冷潮喧夜宋主陵荒塔倚秋最是西湖歌舞地數聲魚笛散鳬鷗武餘清樂為致仕尹將軍賦汗馬功成即引年登山臨水小遊仙印紋久祕微生緑字韻新成盡入𤣥深造煙霞靈運屐浩歌風月鄂君船貽謀尚有孫吳略膝下時時課一篇勉戴𤣥學才名籍甚冠時髦愛爾青年氣獨豪千里共誇騏驥足九苞爭覩鳳皇毛月中把桂雲生履天上看花日映袍宦達每由稽古力夜深燈火莫辭勞避地避地長年大海東蕭條生事野人同春深耒耜孤村雨日落帆檣逺浦風那得文章偕隱豹聊將音問託歸鴻平生自恨無仙骨五色蓬萊咫尺中卜居木石為交不背盟卜居應得愜幽情雨苔蘸水溪魚上風葉墜階山犬鳴習懶已成忘盥櫛避喧漸逺絶逢迎義肥百戰收全勝特為耽詩太瘦生題東湖青山寺古鼎銘長老鍾秀閣手開樓閣貯羣經面對湖山衛百靈玉鏡夜寒通沆􅒭翠屏秋淨倒空青避煙鶴起簷間樹行雨龍歸几上瓶我亦逃禪雲水客便應蕭散共松扄清勝軒為姑蘇潤上人作繞屋松杉手自栽重隂長日護蒼苔一溪窈窕花間入三徑參差竹下開夜半霜鐘寧假莛秋深月鏡本無臺主人定起焚香坐何處扁舟櫂雪來悼湖心寺文上人祗林一葉隕秋霜回首滄洲淚兩行几上殘經塵已暗篋中遺稿墨猶香雲迷圓澤三生石月冷維摩十笏房想像清容何處記寒梅幾㸃竹蒼蒼逃禪室與蘇伊舉話舊有感不學揚雄事草𤣥且隨蘇晉暫逃禪無錐可卓香嚴地有柱難擎杞國天謾託丹霞燒木佛誰憐玉露泣銅仙茫茫東海皆魚鱉何處堪容魯仲連夢得先妣墓窮冬風雪正交馳獨扣泉扄訪母慈極浦空江泥滑滑荒岡舊隴塜纍纍那知恍惚魂歸夜正是呼號淚盡時孝格皇天吾豈敢聊同烏鳥報恩私寄西湖林一貞先生錦繡湖山世絶稀東風不放賞心違芙蓉楊栁臨清淺佛剎仙宫繞翠微畫舫載春天上坐紫騮䭾醉月中歸髙情獨有林和靖門掩晴空看鶴飛自詠五首一夜西風到海濱樓船東出海揚塵生慚黃歇三千客死慕田橫五百人紀歲自應書甲子朝元誰共守庚申悲歌撫罷龍泉劒獨立蒼溟望北辰堂堂至正最多材萬國同文壽域開漠北諸生登第去越南計吏進賢來鳳韶九奏黃金殿鶴駕三朝白玉臺回首黃塵揚碧海五雲無處覓蓬萊千官何處扈宸遊回首風塵偏九州黃竹雪深迷玉輦蒼梧雲斷見珠丘令威不盡去家怨精衛豈勝填海愁大禹胼胝天所眷肯教綸邑久淹留六軍遙駐墨河濆故國丘墟詎忍聞露冷金銅應獨泣火炎玉石竟俱焚虞淵日暮無還景禹穴秋深有斷雲草澤遺民今白髮憑髙無奈思紛紛九鼎神州竟陸沈偷生江海復山林頻繁誰在隆中顧憔悴惟餘澤畔吟齧雪心危天日逺看雲淚盡歲時深百年家國無窮事可得忘機老漢隂奉寄王宣慰兼呈九靈先生别館新成足宴遊珊珊環珮總名流獨推南國為髙士共識東陵是故侯天上鶯花三月夢人間春雨五更愁行藏盡付浮雲外爛醉豐年稌黍秋山居懶散形骸不自持黃冠聊束鬢邊絲頻來猿鶴渾相識久混龍蛇竟不知養拙最宜情淡泊全生深藉德支離看雲本自忘饑渴况有氷泉與石芝逃禪室解嘲久慕陶公臥北窗還從馬祖吸西江掃愁那用千金帚折慢惟瞻七寶幢日晏捲簾延疊嶂雨晴攲枕聽流淙周妻何肉俱無纍秪有詩魔老未降兵後還武昌亂定還家兩鬢蒼物情人事總堪傷西風古塜遊狐兔落日荒郊臥虎狼五栁久非彭澤令百花今豈杜陵莊舊遊回首都成夢獨數殘更坐夜長過九江追悼李子威太守瓣香遙拜九江城太守精神日月明叔姪並歸忠義傳江山不盡古今情潮回湓浦聲猶怒雲起爐峰氣未平生死總魁天下士丈夫端不負科名次小孤山峽束千雷怒擊撞危峰屹立壓驚瀧山聨廬霍朝三楚水落荆揚限九江鎮海重關當第一擎天孤柱故無雙珮環月夜知何處露濕蓬萊玉女窗題西圃卷為蕪湖辛順中作坐閲桑田變歸為菽水謀聊從西圃隱少慰北堂憂汲月滄江曉鋤雲沃野秋新蔬和雨摘碩果帶霜收嘉樹巢烏鳥閒庭下白鷗管寧金不顧季路米應求千載誰同調東陵有故侯過安慶追悼余文貞公將軍匹馬入舒城擊賊頻煩訓義兵孝以保家忠徇國聚而出戰散歸耕圍侔月暈全無隙捷振天威大有聲遊說飛書徒間諜輸誠仗節愈堅貞雲梯屢郤妖氛豁露布交馳殺氣平千里荆揚憑保障七年淮海賴澄清山深猰㺄殱還出江濶鯨鯢斬更橫外援內儲俱斷絶裹瘡飲血獨支撑天昏苦霧埋營壘日落隂風卷旆旌甘與張巡為癘鬼肯同王衍誤蒼生三千將士皆同死百二山河亦繼傾靜對風霆思號令遙從箕尾識精誠頌碑不愧詞臣色哀詔偏傷聖主情願為執鞭生不遂臨風三酹重沾纓上明州太守茶子俊還武昌遷葬告牒而作漢江東抱楚江流先壠猶餘土一壞廟冷桐鄉耆舊逝田荒栗里子孫愁兵戈隔夢三千里霜露傷心二十秋荒隧天寒烏鳥下空林日落白狐遊碑焚斷石經時變碗出遺金有夜偷過客尚知來下馬仙翁誰復指眠牛擬從樊口遷京口遙别沙頭下石頭髙士束芻思致奠故人惠麥久維舟已知多病垂垂老敢為常貧故故留為政幸逢宗正恕申情當念子平憂劬勞罔報生何益存殁沾恩死必酬願及清明三月節一盂麥飯灑松楸採蓮曲二首採蓮復採蓮下有孤鴛鴦秋花不結實夜夜守空房朝採並蒂蓮暮綰同心結不學緑楊枝含嚬送離别迎大年椿上人不值暮歸偶成東歸聞道已浮杯力疾逢迎日幾回何處晚來成誤認風簾竹影月窗梅竹枝詞竹雞啼處一聲聲山雨來時郎欲行蜀天恰似離人眼十日都無一日晴附吉雅摩迪音鶴年長兄貽鶴年紙帳誰搗霜藤萬杵勻製成鶴帳逺塵氛香生蘆絮秋將老夢熟梅花夜未分枕上不迷巫峽雨牀頭常對剡溪雲竹爐松火茶煙暖一假餘清總屬君鄂拉實克丹鶴年次兄題九靈山房圖夢裏家山十載違丹青咫尺是耶非墨池新水春還滿書閣浮雲晚更飛張翰見機先引去管寧避亂久忘歸人生若解幽棲意處處林丘有蕨薇王逢字原吉江隂人至正中作河清頌臺臣薦之稱疾辭避亂於松之青龍江復徙上海烏涇自號最閒園丁藩鎮交辟不就明初録用亦堅辭年七十卒有梧溪集七卷行世遊崑山懷舊丈夫貴善後事或失謀始桓桓張楚國挺生海陵鄙一門蓄大志羣雄適蜂起𤣥珠探甓社白馬飲浙水三年車轍南北向復同軌量容甘公說情厚穆生醴誓擊祖逖楫竟折孫䇿箠天王詔褒贈守將躬歲祀翼然東昆丘蘭橑映疏綺青蘩春薦豆翠柏寒動棨乾坤宥孤臣風雨猖五鬼銅駝使有覺洊懼臥荆杞張士誠降元元追封士德為楚國公廟祀昆山楊廉夫詩所謂先封楚國碑也過楊員外别業公名乘字文載濟南人至正十六年不受淮張之辟遂引决焉翠羽無深巢麝香無隱穴由來老蚌珠淚泣滄海月於乎楊員外竟類膏自爇憶昨佐南省四境正騷屑朝廷忌朔人軍事莫敢說遂罹池魚禍遄被栁惠黜寄身傍江潭乃心在王室星躔錯吳分氣候乖鄒律天風搖青薲徒步空短髮譙𤣥初謝遣龔勝終守節譬如百鍊鋼不撓從寸折又如合抱松豈藉澗底蘖我時浮扁舟鷗外候朝日荒郊無留景别業自深鬱時清議勸忠公寃果昭晰大名流天地當與河水竭結交卣卓間遺言見餘烈往揚名開化二鄉掩骼分藩多賢勞不敏忝賓客雖無官守拘亦復與言責二鄉䖍劉禍慘凄長平厄先王制禮經孟春當掩骼僕夫有難色欵假才任䇿駸駸度岡坂渺渺循藪澤稍稍煙微青歷歷野四白游魂行草上遺老候道側我豈物役徒兹來出心臆皇天久下憫赤子非寇敵鴟鳥何不仁銜啄血更瀝因歌戰城南風悲淚狼籍天門行天門髙髙俯四極寸田尺地登版籍澤梁無禁漁者多潮海干戈恣充斥去年官餉私敓攘今年私醝官價償屠燒縣邑誠細事大將謂博囉特穆爾左丞不死鯨鯢鄉烹羊椎牛醉以酒腰纒白帶紅帕首定盟㰱血許自新禦寇征蠻復何有國家承平歲月久念女紛紛迫糊口羽林堅鋭莫汝攖慎勿輕誇好身手春風栁黃開陳雲號令始見真將軍博囉特穆爾討方谷真兵敗被執為求招安至正辛卯歲也宋制置彭大雅瑪瑙酒碗歌周伯溫大參徴賦有序今大尉開藩之三月命部將王左丞晟書使踵海上招至吳中以豫無錫避地說晟勸張楚公歸元擢淮省都事辭時江浙參政周公適涖分省延飲齊閣歡甚出瑪瑙酒碗曰此彭大雅燕饗舊物子才器足當之遂引滿酌之再氣酣思湧率爾走筆紀清賞非求知他人焉歌曰淮藩開吳豪俠滿歌鐘地屬姑蘇館相儒獨為緩頰生笑出彭公瑪瑙碗血乾智伯髏不腥黃玉瑩錯紅水精妖蟆蝕月魄半死虹光霞氣噴且盈隱若陳偃邊將營彭公彭公古烈士重慶孤城亦勞止天忘西顧二十年畝盡東來數千里武侯祝文何乃偉敗由宋祚民今祀太湖底寧魚米豐官廨喜與閒門同酒波碗面動峽影想見師犒飄風中再酌庶沃磊磊胸君不見漢家將軍五郡封班彪天與世史功詩狂昭諫客吳越存心唐室人憐忠嗚呼尚友豫豈敢醉墨慘淡雲飛鴻七月聞河南平章凶問六月妖星芒角白幾夜徘徊天市側尋聞盜殺李上公窮旅孤臣淚沾臆當時寬猛制萑澤安得受降反受敵上公忠名垂竹帛書生奚為費褘惜東南風動旗黃色蒲稍天馬長依北壬寅六月田豐王士誠刺殺李忠襄于濟南城下先是庚申君見星變歎曰當損大將馳使戒諭忠襄正此詩所謂妖星芒角也劉夫人劉夫人至正太尉吳王嬪笄珈車服置弗御淡煙常鎖雙睂春中州援逺敵在目叔貴日驕彊日蹙背城借一王本心狐埋狐搰將軍欲夫人勇决烈女義百口樓居親舉燧片時隂慘萬世生月明風清珮音至君不見男兒成敗古有之孰以楚霸輕虞姬蘇民安得夫人祠烏栖白鳬庶少衰寄桃浦諸故知即事五首素癡得名侯君房自享大案焦征羌莫嫌衛旌不舉筯口簡授使多嚴光世間堪鄙是何物糞土之英褌中虱後園石壁倚秋林醉有髫孫旁執筆山牀折足琴暗徽種菊不種西山薇願從漢士碑有道夢逢秦鬼歌無衣閒園不入烟火境巨浸盡漂桃土梗老伴惟餘臥隴雲抱晦含光體常靜有章擲還太尉閣有版不受丞相垣南朝天子許謝病竊長木石儀鸞園平生氣節詩千首才非元亞元遺山甘劉後劉靜修素聞魯廟鑄金人晚學程門坐泥偶雙平原裏新得原名庶全歸他日壙銘辭大手貴不難得富可嗟二事亦到園丁家雷王藥吏錦襠袴野藤絡樹金銀花園丁橫笻坐梧下竊愧長年釋耕者身膏草野身土苴語孫耰鋤莫輕把東坡楚頌存虛名止烏作亭烏涇新作殊有情枇杷換葉何青青雪中開花來逺馨多仁多核知爾少柏樹根添鄭𤣥草慧海禪師識侯景華容兒女哭劉表如何太白謫仙人竟坐夜郎唐絶徼裁詩寄語多才郎塵間寵辱要相忘霸橋吟興驢背上月盎冰壺虀味長此原吉戊辰歲即事寫懷寄故知之作蓋絶筆也小匕首歌水晶生苗月牙直彗芒披雲電流隙蟄蛇斷尾短草間海鶻褪翎霜雪色宋斤魯削讓峭刻金錯錐刀豈其敵吳鴻扈稽飛著體不曾為主開邊鄙嗟兹神物久泥滓用之可以報國士簷氷卓筯日黯空稍玩股掌生雄風鮫魚室臥縞帶影長鈹辟易萬雉墉古昔客揕秦王胸幾仆翠鳳咸陽宫由來意氣泰山重命甘燎毛不旋踵誰隳古制鑄小之佩稱衣冠加珌琫我歌三歎淚滿裾曹鱄豫聶無時無夜過蒼墩江隱居白茅蕭蕭風色昏歸人自語烟際村我騎蹇驢童抱尊記得君家忘卻門徑穿竹入背江路傍是梁朝敬宗墓月中對鶴吹洞簫露水琤然落髙樹常州江隂再失無錫告警病中自鴻山將遷海上病就山中隱烽催海上舟連城新鬼哭深壁大臣羞赤眚纒金火炎風汗馬牛遙占女兄弟先已下長洲聞畿甸消息白草生畿甸黃沙走塞庭直憂星入斗兼畏雨淋鈴殿閣餘龍氣衣冠自鵠形吳粳斷供餉隴麥向人青得兒掖書時戊申歲客夢躬耕隴兒書報過家月明山怨鶴天黑道橫蛇寶氣空遺水春程不見花衰容愧耆舊猶語玉人車此詩記戊申歲正月洪武改元之年也宫中行樂詞二首羽獵罷長楊宸遊入未央鸞開雙畫扇鶴舞百霓裳玉盞瓊花露金盤紫蔗霜長門誰閉月流影在滄浪芍藥為離草鴛鴦是匹禽君無神女夢妾有楚王心日短黃金屋宵長緑綺琴相將戒霜露拜月繡簾隂近故二首近故儒林老於豫起歎嗟清秋書柿葉落日賦桃花碑碣留吳滿雲山向越賒多情楚宫月來照未栖鴉近故維揚老威儀本漢官才髙三禮賦心折一泥丸露氣金盤濕簫聲碧落寒空餘茂苑樹鵑血幾時乾成廷圭寓於維揚卒於至正末年此二詩為成而作錢塘春感四首紫罽軿車從六龍盡隨仙曲度青空蒼山樓闕旃林裏赤羽旌麾野廟中百姓未忘周大賚成都元有漢遺風流鶯不管傷春恨衝落桃花滿樹紅玉氣凌虛散曉霞虎闈麟閣靜烟花中天日月迂黃道滄海風雲冷翠華望帝神遊䕫子國烏衣夢隔野人家當時舉目山河異豈但紅顔泣塞笳周南風俗古衣冠五色雲中憶駐鑾瓔珞檜髙藏白獸蘂珠花發降文鸞河通織女機絲濕雨歇巫娥翠黛寒滿地吳山誰灑淚一江春水獨憑䦨日華初動衮衣明劒佩千官隱繡楹五色黼函開玉座九重湯藥下銀罌書題鳳尾仙曹喜恩浹螭坳學士榮文化有餘戎事略銅駝草露不勝情秋感二首紛紛攘攘厭黃巾妖血徒膏草野塵馬化一龍猶王晉楚存三户未亡秦颶風天靜浮青海朔漠山髙直紫宸莫為鬼方勞外伐檿弧箕服最愁人南越東吳帶楚皋頻年醉眼送飛毛滄洲露白蒹葭滿甲第秋聲蟋蟀髙九日天涯桑落酒三軍城上柘黃袍試觀漢後詩人作獨覺遺風屬阮陶聞鐘苜蓿胡桃霜露濃衣冠文物歎塵容皇天老去非無姓衆水東朝自有宗荆楚舊煩殷奮伐越陀新拜漢官封狂夫待旦夕良苦喜聽寒山半夜鐘聞吳門消息百尺齊雲半壁開陪臣猶進九霞杯蓬星氣白干天棓苕水烽青入露臺盡擬田單收故土不期髙幹損雄材淮魚斷信燕鴻隔吳樹蕭蕭葉下來無題五首五緯南行秋氣髙大河諸將走兒曹投鞍尚得齊熊耳卷甲何堪棄虎牢汧隴馬肥青苜蓿甘凉酒壓紫蒲萄神州比似仙山固誰料長風掣巨鰲無題前後十首皆感悼明師入燕庚申北狩之事天槍幾夜直鈎陳車駕髙秋重北巡總謂羽林無猛士不緣金屋有佳人廣寒霓仗閒華月太液龍舟動白蘋雪滿上京勞大饗西封華嶽弔秦民白衣􅖻􅑳渡吳兵赤羽旌旗奪趙營灤水天回龍虎氣榆林風逐馬駝聲靚妝宫女愁啼竹白髮祠官憶薦櫻猶有燕鷹神不王鴐鵝髙去塞雲平五城月落靜朝雞萬竈烟消入水犀椒闥珮琚遺白草木天圖籍冷青藜北臣舊說齊王肅南仕新聞漢日磾天意人心竟何在虎林還控雁門西十載羣雄百戰疲金城萬雉自湯池地分玉冊盟俱在露仄銅盤影不支中夜馬羣風北向當年車轍日南馳獨憐石鼓眠秋草猶是宣王頌美詞書無題後凡三首偶感燕太子丹事火流南斗紫垣虛芳草王孫思愴如淮潦浸天魚有帛塞庭連雪雁無書不同趙朔藏文褓終異秦嬰袒素車漆女中心漫於邑杞民西望幾踟蹰塞空霜木抱猿雌草暗江南罷射麛秦地舊歸燕質子瀛封曾畀宋孤兒愁邊返照窺墻榻夢裏驚塵喪韘觽莫䜟白翎終曲語蛟龍雲雨發無時元世祖聽彈白翎雀曰何其曲終有凄怨之聲乎幾年薪膽泣孤嬰一夕南風馬角生似見流星離斗分謬傳靈武直咸京九苞雛鳳冲霄翼三匝慈烏落月情縱少當時趙雲將臥龍終始漢臣名洪武七年遣瑪勒岱巴柆北歸此詩記其事故有舊歸質子及南風馬角之句明祖封瑪勒岱巴拉為崇禮侯故曰瀛封曾畀宋孤兒也寄錢泰窩陳雪軒二遺叟天轉雲東上六符有懷無寢枕同孤紫芝隱曲歌商皓烈火殘經補漢儒私地春先梅老發盛隂雷疾草狂蘇祖生遲旦疏殊甚不計中流少一壺甲子冬偶書雲東亂定少新知江左書來有跛兒才盡能為文自祭醒狂寧要鍤相隨天家青女催衣急漏水金人上箭遲郤喜故鄉原上樹十年羇羽託深枝西厦牀頭鴟臥久空金壁上蝸行尚有琴儒子成名狂阮籍霸才無主老陳琳虹霓氣冠登萊市蝙蝠羣飛顧陸林環海烟沙翻萬鍤連村霜月抱孤衾送于子實辟淮閫掾淮海風髙急鼓鼙潁州烽火照淮西餱糧幾道通流馬樓櫓重城望火離星入夜寒芒角動地連秋暝瘴氛低君今掉鞅元戎幕肯慰流亡父老啼秋詞香散天街靜玉珂露臺風殿夜如何星從河漢淡中落秋在梧桐疏處多鸞影不曾離寶鑑蛛絲先已綴金梭君王繭館詢遺事郤擬鑾車共載過贈别浙省和和左丞國寶自常州移鎮徽州三十韻時歲癸巳武德興元運文恬近百年一隅初難作四境遂兵連斧扆朝元早彤弓授命專馮岑材並濟李郭駕爭先路入延陵邑星分左轄躔著名黃閣上虛位紫宫前汗血駒千匹跿跔士兩甄帳寒龍守劒城曙虎飛旃跡掃齊門瑟身親楚醴筵慧山屏列野震澤鏡涵天刁斗軍中堠鉏犁亂後田白無遺朽骨青有續炊烟插羽書閒署封泥詔撫邊陳容催畫鼓蜂氣動樓船舊政猶霜肅新安素地偏蜄精嘗感夢帝子或逢仙漆葉雲羞密茶花雪妬妍誦絃家櫛比冠蓋里班聨鄒魯流風洽甌蠻習俗遷比來疲賦斂况復值戈鋋餼廩官曹待謳歌父老傳挽屯吳幼節總制漢文淵裴度歸休近羊公臥治便鼎彛今燀赫韋布數周旋小閣牛行炙長楸鶻試拳王彛五雜組孫武十三篇區服殘河汴神州巋薊燕殄除才蚋蠓睥睨滿鯨鱣狂斐言姑及髙明義莫捐憂君尚有疏儻寄麥光箋奉寄趙伯器參政尹時中員外詔立淮南省符張閫外兵風雷朝煥發牛斗夜精明參政材超偉元僚器老成武林多樹政禁籞舊蜚英鳳暖文章蔚鯤秋羽翼橫天池今並奮嶰管後和鳴地要尤膏沃時危必戰爭輔車依海岱衣帶限蠻荆玉葉開王邸烟花匝子城萬艘鹽雪積千里稻雲平織貝殊珍粲紅樓艷曲縈夤緣胥狡黠貨殖駔驕盈汝䘲初萌起河流寖妄行鎮綏增屏翰贊畫授權衡愛稼須除螣憐牛貴搏虻式蛙曾霸主斬馬乃書生青汗三千牘丹心一寸誠相臣連萬騎郡邑望雙旌甓社湖移蚌繅絲井露鯨里無安堵樂野有望塵驚潟鹵烟侵燧孤嫠膽碎鉦五賢迷古轍六詠歇新賡瓦礫皆王土逋逃本爾氓長驅勞組練盡掃愧欃槍喻擬相如檄降懲白起坑跋胡狼曷備毒尾蠆難攖濟猛收神略疏恩渙寇情佇聞鹿柵下莫作鬼方征回鶻卑唐室天驕撓漢營乾坤一羽扇社稷幾羊羮枤杜交加影芙蓉䮍娜莖超然延爽笏肅若衛寒更慮念真如是功勳孰與京誓清懷晉逖虛左慕齊嬰好定龍蟠價毋登狗盜名石洪重𦙍辟韓愈建封迎故典何其盛斯文與有榮中州襟陜隴上國掖幽并麟閣將來繪雞壇宿昔盟芻蕘言慎擇葵藿義同傾和戍婦陳聞雁有感介胄多年蟣蝨生客窗今夜落邊聲螭頭叉子鴛鴦股獨自挑燈萬里情雜題二首洄塘昨夜緑波增偶䇿交州鬼面藤一雨百花香洗盡流春矼上立魚鷹紫桐生乳竹含胎草細花幽石徑回獨自去來人不覺茶烟風揚過池臺宋元詩會卷九十四
