body:
  text: 宋元詩㑹卷五十四兵部主事陳焯編熊鉌號勿軒建陽人為寧州司户參軍入元不仕老而好學所著有翰墨全書行世按元文類中有熊鉌者亦係閩人其著作多屬大徳至大間距宋亡三十餘載恐非勿軒當再考之遊武夷山我來武夷山逺意起千古嘗疑混沌開疏鑿未經禹峽山猶古梁洪濤莽囘互行舟畱大壑營巢餘斷樹垠崖波濤痕隱隱皆可覩陶然上古民要服固深阻秦威何桓桓薄海猶廣土六合皆湧沸一枝豈寧處嘗言十三君隱隱避秦侣一日厭塵寰泠然遂髙舉上山娱賓雲下山滿豺虎神仙何渺茫虹橋想虛語桃源亦其類好事自誇詡風氣日已開蛇斷出眞主遂令閩山陬盡入職方宇漢志名始彰祠堂用魚脯流傳世代久琳宫粲衣羽至今此名山號為神仙府上致用院李同知論海舶易經致民用肇自羲農先耒耜既生聚市易還懋遷公私不交病本末無倒縣古人致主術稱物匪有偏厥初禹作貢不但中邦田四海自錫貢寧憚來徃邊碣石來冀右海岱青徐連東南並淮揚亦自江海沿夫豈寳逺物有道歸陶甄成周制國用半在周官編虞衡與商賈胡不末利捐艱難開國心什一猶欲蠲裒益固有道公功格皇天後儒不知學説理多虛𤣥生財昧大道民命日益朘管商一作俑蠧弊貽千年漁鹽尚抑末奈何誘開阡懷清一以築㷀獨堪哀憐封君擅半賦公私重熬煎寒機凍女手汗粒頳農肩織衣不上體舂粟不下咽傷哉力田家欲説涕淚漣何如棄之去逐末利百千矧此賈舶人入海如登仙逺窮象齒徼深入驪珠淵大貝與南琛錯落萬斛船取之人不傷用之我何愆奈何昧輕重屑屑窮算鞭錙銖較鷺股漏網魚吞船安得體國臣為天掘泉源上資國脈壽下拯民瘼瘨朝夕禹貢志菲食甘胝胼九載不入門千古孰與賢更想公旦心待旦尤乾乾世俗吝與驕曾不絲毫牽所以太和治常在虞周前此道久已亡利欲充垓埏豈曰治不及曾是心無傳名公中州傑自是天分全問學甚充厚願力還精堅博物功不勞無欲心湛然維此一樞軸實秉大化甄如天有北斗物物歸璣璇帝念南海民風化舊所宣皇皇風霜節炳炳奎璧躔纎㣲亦何凂闔散有大權利用六府修制用九府圜古人不可作得意皆蹄筌誰哉識治本理此南熏絃三代事寂寞念之心中㾓書生武夷客偶此來海堧使者採風謡詩歌寓惓惓寄趙菊東山長三首男兒貴神交何必見顔色大江有佳士夢寐不可得忽來幔亭間片雲亦相識娟娟如在眼猶此一水隔澹然幽貞姿乃是夕英菊託根九秋杪霜露凄已肅我疑靈均伴只有淵明獨采采黄金花豈意在林曲胡為此不采却采泮水芹聖人望魯念彼黍車轔轔餘澤孟孫氏管商何足論新畬有陳根猶是豐芭春上嚴亷訪三首古人重民敎禮樂用為急虞書有三官周典猶二職太學領奉常西都有餘責兩生既不來何參又無術漢興歴數世兹事竟未遑一絶不復續千載重慨慷房魏輔貞觀汗瀋空流漿開寳襲唐陋儀儼負義方南方尚秉禮文風未云衰釋奠古雅樂鄉飲舊漢儀表章在正學舎魯將安之願言假良遇制作逄昌時擣衣曲北望悠悠音信少空房念逺心常早流螢煜煜夜稍清塞雁嗈嗈寒已到細絲清水練方新在椸半濕日中明隔籬翁媪寐不熟月落尚聞砧杵聲將軍錦帳環歌舞百戰仍遲歸寸土老農肩米肉成瘡思婦裁衣淚如雨呈劉治中弱水流西河水東瞻烏爰止誰雌雄天地方閉何時通顚倒溷室成仙宫我羡仙人在髙空絶粒輕舉乘天風豢養不及真神龍人生剪羽樊籠中名尤利怨方相攻忽聞海上蓬萊翁却來幔亭跨長虹願畱徜徉羣仙峰塵寰渺渺知何窮送洛陽靳中事銅駝巷陌棘風凉尚記東都舊帝鄉甲馬營空雲氣遠杜鵑聲去洛園荒天開地闢人才出風起雲飛汗竹香倘得行窩容我老春風借地種姚黄聞讀書有感萬疊青山鎖暮隂倚欄凝竚意深深趂時士女忻秦服學語兒童解楚吟當日繁華逐流水何年拱把秀穹林遼東爼豆銅川筮認取斯人萬古心越川道中野田秋澗響潺潺新翠喬林繞舎環淡日凝烟横别浦斜風吹雨過前山柴扉初放牛羊出漁艇方攜蠏蛤還自笑平生愛遊覽天敎長在水雲間客夜書事西風凉信入虗簷絺綌微單已戒嚴鄉夢不隨秋夜永客愁偏向雨聲添清髙鳴雁低雲海漂泊流螢傍竹簾搔首寒燈樓舍悄行藏自曉不須占平江舟中不寐逺水瀟瀟荻葦風月明雲外呌孤鴻丹楓擁被疎蓬底夢斷山深野寺鐘江邊客舍輕寒無賴入征裘野水閒雲總是愁極目逺山横靄外數聲鳴櫓白蘋洲王鎡括之平昌人字介翁宋末官縣尉當祥興播遷時即解綬歸隱工於吟咏宋史載王鎡文集二十卷今所傳月洞詩草特豹斑耳明閩人徐興公極稱之錢塘江凉疎萬栁條秋滿石欄橋呉越興亡事晨昏來去潮雲開天日近水接海山遥望到西陵渡風帆穩自飄塞上曲黄雲連白草萬里有無間霜冷髑髏哭天寒甲胄閒馬嘶經戰地鵰認打圍山移戍腰金印將軍度玉闗馬嘶一聯用唐異句不嫌其同買舟赤欄橋上路幾度卜歸期流水無迴日行人有老時潮來江勢逆月出海門遲風順輕舟駛蒲帆盡夜吹别虞君集瓦瓶擔酒去送客石橋東潮過汀沙上船迴島嶼中桃花三月雨楊栁五更風明日思君處渡頭烟水空送黙然上人歸天台孤雲不定心持鉢度寒林野飯青蒲潔客程黄葉深海風潮水發山雨燒烟沈歸到石橋日應看瀑布吟早行客程因太早却費一更眠落月已歸海殘星猶在天櫓聲荷葉浦螢火荳花田隔㟁誰家起青燈逺樹邊别黄吟隱飲乾分别酒話久未移舟潮水催行客海山生逺愁蟬聲秋浦樹雁影夕陽樓今夜相思夢蘆花第幾洲秋深風露損衣裾秋深懷古廬僕方談夜夢客至得家書子黒石蓮老柿紅霜葉疎今年籬下菊遥憶少人鋤訪翟梅山諸老彫零盡江湖今有誰半生行客慣多難識君遲花屋春風酒梅山雪夜詩莫為名釣出世事正如棋晩春即事雲氣不分明天隂忽又晴喜凉溪鵲浴知雨沼蛙鳴仙藥黄精飯齋蔬白椹羮惜春吟未就閒踏落花行山中榮枯皆定數枉作送窮吟有色非真畫無絃是古琴青松秦世事黄菊晉人心塵外烟蘿客相尋入逺林避亂柯巖緑坡諸公以詩見寄柯括地西東音書乆不通山河隔今古天地老英雄局敗棋難著愁多酒易中花前多少恨無語寄春風感秋寄白雲趙寺丞囊裏不藏金相隨只破琴毎因看月夜長動故人心敗草闗河路秋風楚越砧愁來不成寐壞壁更蛩吟谿村水路隨山轉谿晴踏輭沙斜陽曬魚綱疎竹露人家行蠏上枯㟁飢禽銜落花老翁分石坐閒話到桑麻寄友髮影明寒鏡蕭蕭亦自憐故人難㑹靣行客又經年晴雪添崖瀑春雲雜燒烟相思有書札寫盡夜燈前宿香嚴院地爐煨火柏枝香借宿寒寮到上方山近白雲歸古殿風髙黄葉響空廊敲門僧踏梅花月入夜猿啼楓樹霜夢醒不知窗日上時聞清磬出松堂寄杜北山倦客蕭蕭兩鬢秋栁絲無力絆歸舟曉風落葉辭髙樹夜月行人在别州千里闗河鄉國夢一江烟浪古今愁雁聲過盡青天濶却憶同登望海樓古杭感事國事彫零佳氣衰東南豪傑竟何之雲寒廢殿排班石草臥前朝記事碑沙漲浙江龍去逺天寛北闕鳳歸遲可憐不老呉山月曾照官家寵幸時山居屋頭蘚樹蜕鳴蛩池上溝泉鑿石通香老蒲花春洞影凉生槲葉午窗風泥瓶開酒畱樵客篛笠穿雲訪藥翁雖是一貧清似水定無徭役到山中暮春寄仙洲舍弟去年妍菊醉重陽今日誰知各異鄉落葉石欄霜信早敗荷池屋雨聲凉人情好惡花甘苦世事榮枯草短長别有駿鵰雙翮徤剛風摩透入蒼茫湖山即景次尹綠坡湖山掩映雁潭秋今古詩人説勝遊綠栁影分騎馬路丹楓葉落釣魚舟前坡風起歸樵笛别墅雲藏賣酒樓長記尋梅氷雪裏氊靴駝㡌鷫鸘裘尹緑坡山間吟所苔痕分路見人家犬䕶籬根臥落花一片林塘詩境界四時花果隱生涯鋤山揀日春栽藥汲水和雲夜煮茶耕録有文須㸃看旋揺松露入硃砂寓龍虎山中示張鍊師蓮盂送别萬峰雲龍虎山前過小春草屨慣穿枯嶺葉布衣猶帶舊京塵氊寒不見遊仙夢路逺誰憐倦客貧東望海門歸未得北風吹雪滿唐巾病中鏡裏初疑看不真衰顔只恐是他人醫言㫁酒方除病母戒觀書亦損神臥乆不知黄葉落起來添出白髭新自梳頭髮斜陽下手脱隨風半秃塵春酌酒闌歌罷翠簾遮月栁驚啼子夜鴉多少斷雲心上事結成香夢是梨花西湖南北髙峰呌杜鵑斜陽浮翠斷橋邊畫船歸盡江湖夢一半樓臺楊栁烟秦望山祖龍癡欲望長年却遣君房渡海船枉去蓬山覓丹藥桃源亦自有神仙深春二首夾泥花上燕巢邉翠箔桑空蠶又眠天氣乍晴風候别坐看盆藕出雙錢燕子來時春又休暖風吹緑上枝頭繡簾不隔荼䕷月香影無人自入樓訪庭植上人苔侵坐處石頭青滿屋春雲不用扄入定醒來香印冷一簾花雨濕殘經宿西上竺閒收石上著殘棋山月無聲鶴睡時落葉打忩霜满屋有僧吟得夜寒詩斷橋春望拾翠車閒輦路塵山南山北杜鵑春誰家庭院東風裏吹出桃花不見人漁父吟竹絲籃裏白魚肥日落江頭換酒歸只恐明朝風雪至老妻連夜補蓑衣夀光宫井氣蒸雲濕石欄虬鬚道士自燒丹開門風帶琴聲出一陣松花满醮壇裁衣曲燒罷心香午夜闌玉纎輕稔剪刀寒衣成恐不如郎意獨試燈前照影看花下作字付葉拓山使者花蘚層層潤石牀緑隂多處自生凉閒將筆染荼䕷露寫得春詞滿紙香鄭思肖字所南别號億翁宋亡僑寓姑蘇黍離之痛一飯不忘著有心史以鐵函藏承天寺井中至明崇禎間因淘井得出避暑入古寺避暑入古寺暫爾遣騷屑心静凉於秋倐然適清悦彼哉誰氏子對奕氣爭傑惜其二低手彼此蔑竒著旁觀發冷笑連呼錯錯錯救之不可及流視入寥廓嗟汝二首嗟汝兒女曹至蠢亦孔醜靣笑心揺揺欲進乃却走憨癡弄盲語捧酒祝鬼壽傷哉復傷哉醒眼頻搔首偶背垂衣時萬事暗蒼莽詔汝一世人父亡子焉往良心油然生千載垂清響與道同周流光明塞穹壤苦懷古人立志髙為義不為已今人所見卑獨為貧賤恥不義富貴生寧以餓而死遺體非不重所懼悖於理我稟清淑氣生而秀為士讀書三十年頗知六經㫖質之以人道所言皆如此奚乃滯風塵爾汝弄歡喜菊花歌太極之髓日之精生出天地秋風身萬木揺落百花死正色與秋爭光明背時獨立抱寂寞心香貞烈透寥廓至死不變英氣多舉頭南山髙嵯峨題多景樓英雄登眺處一劒獨來遊男子抱竒氣中原入逺謀江分淮浙土天濶楚呉秋試望斜陽外誰寛西顧憂逢陳宜之行李苦役役相逄古潤州千金一夜醉四海十年遊山静鬼行月宵凉人夢秋近聞邉事急畎畝得無憂越州飛翼樓飛來絶頂上流盻入無垠國土東南濶山川今古新髙樓臨白日平地載青春直欲蓬萊去因風問大鈞山中聞鶴凉夜坐嚴石飛來白鶴鳴星流銀彈過月碾玉輪行萬里思不極一天秋更清欣然有所得長嘯度蓬瀛聴琴洋洋盈耳間一派水潺潺意不隨聲盡心應與物閒宿雲穿竇出飛鳥御風還却喜無人識支頤看逺山别故人拍馬又登程餘酣尚未醒曙蟾消淡白秋漢覆空青江走遊龍勢山蟠睡虎形飄零母感歎天地亦浮萍詠懷三首天命未歸莽大夫空羙新三宫猶萬里一念只孤臣淚盡眼中血心狂夢裏身勿云今已矣舉首即蒼旻未能歸趙璧我不厭干戈萬古青天在三年白骨多春風仍歲月世界自山河寧忍委國難飛身入薜蘿不信夜不曉哀哀鎻暗顰鐵城蹲敗土錦國漲飛塵草泣荒宫雨花羞悄地春少焉開霽色四望一時新晚晴落照開空霽明霞映水鮮乾文縣造化土脈潤山川白滿重圓月青還不翳天定鐘聲更徹通夕喜無眠即事二首棲遲破屋下書史自徜徉道不嫌清苦人皆笑獨狂晩花虧雨露老樹慣風霜莫望閶門北愁雲天外長一説乾坤事無愁鬢亦斑心飛空濶外身墮亂離間日落經何國雲歸識故山憑誰扣㝠漠天道幾時還宿半塘寺一襟清氣足此夜豈人寰醉影松杉下吟身風露間秋縣當殿月雲宿近城山眀發騎鯨去飄然不可攀追奬并序毛惜惜髙郵軍妓也理宗朝榮全據髙郵城叛召惜惜佐酒惜惜怒叱之曰汝本趙官家徤兒何敢反耶吾有死耳不能為反賊行酒榮全以刃裂其口立命臠之誰謂匪人賤猶懷事賊羞挺身持大義正語叱狂囚名在春逾艷骨香花不愁有靈知國事地下笑王侯辛已嵗立春作大辱痛於死含哀弔歲華呌雲聲草檄戀闕夢宣麻地走人形獸春開鬼靣花年年北去婦馬上哭琵琶夏駕湖晩歩懷古豈獨呉王事可憐人生回首總凄然空嗟落日猶如夢不記東風幾換年寳駕跡消前古地菱歌聲斷晩凉船如今城郭都遷變茅屋荒頽草積烟送人之行在歌斷陽闗奏暮笳東風吹客向京華三更舟度淞江月一路春連上苑花地逼星辰黄道近山環宫殿紫雲斜兹遊歸計須宜早莫遣相思夢遶家飄零飄零書劒十年呉又見西風脱盡梧萬頃秋生杯後興數莖雪上鏡中鬚晴天空濶浮雲盡破屋荒凉俗夢無惟有固窮心不改左經右史足清娯醉鄉誰居此域作生涯偏許劉伶畢卓家屋影空空天渺漭燭光閃閃地横斜春紅輭玉頽衣樹秋碧流波漾纈花接壤或通三島路任他苦海事如麻萬里和風眼底回陶陶樂土隔飛埃暖浮花思春初透紅漲霞紋潮正來長駐童顔驅老去不教𤣥鬢受愁催舉頭閶闔手能摸更欲乘風過九垓二礪愁裏髙歌梁父吟猶如金玉戞商音十年勾踐亡吴計七日包胥哭楚心秋送新鴻哀破國晝行飢虎齧空林胸中有誓深於海肯使神州竟陸沈鈞天夢冷紫宸春臣子銜哀社稷屯一縷血忱開白日兩篇心誓哭蒼旻渡江祖逖願興晉蹈海仲連羞帝秦囘首故都宫闕恨满山秋色正愁人弔揚州瓊花并序揚州瓊花天下惟一本后土夫人司之花之盛衰淮境豐歉係焉未南渡前經兵火此花亦死今遭大故丙子歳維揚䧟丁丑嵗此花又死孰謂草木無知乎南土新飛劫火灰瓊仙戀國暗驚猜定應攝向天宫種不忍䧟於秦地開花死青春禽鳥哭城埋黒氣鬼神哀一朝枯枿變髙樹傳得歌聲沸似雷湖上漫賦蘚厓蒼潤雨初乾石罅飛泉噴雪寒啼斷禽聲山更静青松影下倚欄干絶句二首閶門城外水涵空雁影淒凉落照中一望秋風數千里不知何處是行宫草木恩深雨露餘公卿環列漢庭居一朝投閣千年笑却是揚雄不讀書小春花天地無情正北風飛鴻哀咽亂雲中此時縱使開千樹不及東皇一㸃紅春日二首山塘遊舫接荒城縱有笙歌耳不清深憶國家無事日人心和氣是春聲曉來怕上最髙樓春盡時光只似秋草木荒寒生意澀風腥雨膩一天愁劉麟瑞號如村亦有紀忠詩附見其里系未詳忠義總管田公燧鳳守李公實天西戰士競銜枚乘㑹闗山路始開兩蜀金湯隨水逝三秦烽火照天來鳳州文武渾無愧馬嶺英靈只自哀後夜魂歸何處寓隴頭蕭索一枝梅天水知軍時公當可西和總管陳公瑀天水西和兩將强七書貯腹負剛腸魚麗陣布刀如雪馬革屍空骨似霜亷藺昔存秦莫敵闗張今敗蜀終亡輕財得士人猶惜長想英風慨智囊金州守臣和公彦威綂制楊公興福貔貅曾是守饒風扞拓金房未易攻十八谷開通徼外五千兵勁入闗中賀蘭不救雎陽敗諸葛猶存越巂功當日更推楊統制馬傷軍沒箭飛紅同慶知府李公冲偕死節諸公諸公耿耿抱精忠炎運將灰日不東北戍躐陵羣盗衂西陲震蕩列城空香凝燕寢家何在鼎沸魚遊計已窮玉石俱焚天亦泣千年誰為憶髙風援襄都統制張公貴忠勇堂堂貫斗牛英雄端不愧兠鍪鹿門雲合張羅網龍尾坡翻化髑髏雙廟有靈開正祀孤城無援屹中流由來死節男兒事却笑明年有客羞守襄都統制牛公富范公天順元戎志喜𥪡降幡偏將能知大義存頭觸危樓輕烈熖脰經孤館凛忠魂聲沈刁斗摧城影塵掩干將滲血痕世遠事殊遺老盡更無人解説襄樊沙洋堡禆將邊公居誼兵威破竹列城驚誰信偏禆不肯迎兩箭離弦聲霹靂二雄交斃氣崢嶸可憐侯服㣲臣在忍見人間大厦傾萬木凋零風雪裏空餘鐵樹一花明丞相江公萬里知府江公萬頃名重天閽侍太㣲昔年南國秉樞機人歸緑野身猶徤兵滿紅塵世已非止水亭前風淅淅鄱陽城外草依依棣華相映人間瑞節惠隆名世所稀宗室趙公崇源南風不競慘悲聲幙燕泥牛總是驚玉牒名香時巳逝金枝花悴本難榮身明六籍忠仍孝軍滿孤城死亦生後度推敲明月夜江村村外寄幽情端明招討使汪公立信如此竒才正可憐曾陳大計為安邊天存廟社施籌䇿地限籓籬老歳年獨眼明明尋趙地丹心耿耿向淮堧江南寸土聨區脱慟哭髙沙赴九泉湖南安撫知潭州李公芾平楚樓頭矢石驚焚香稽首别宸京盡殱妻子期全節寧死封疆不忍生烟燄張空頽趙壁旌旗倒影下湘城善刀人在同觀化名與澄江一様清江東通判趙公淮妾某氏石頭城昔號金湯岌岌孤墉戰馬場西日突圍逃溧水南冠荷校説維揚血凝漢節誇男子身寄秦淮藉女郎千載妾身貞更潔仰天哭向水雲鄉沙市監鎭司馬公夢求荆水滔滔百尺渾何來淺縮漫潺湲木城聨㟁風輪吼沙磧屯雲火炬燔效死小臣懷緑綬偷生天閫愧朱轓下官名姓君知否涑水先生七世孫參政髙公應松腸斷呉山錦繡叢六更聲絶海潮空千門鎻月移行在八駿乘風想㑹同扈蹕孤臣慙主辱征鞍萬里哭途窮兩宫緩緩趨朝陛回首天南獨死忠蜀帥張公珏玉壘雲浮五十秋闗西虓將勇無儔三呉甑堕猶堅守八柱唇亡不耐愁瀘水㨗收勞騕褭䕫門機伏失兠鍪吾君不負吾寧死遺恨誰憐快敵讐儒士王公士敏此行無復望生還畱取哀吟宇宙間報國有懷追蜀相遺民空自戀呉山明星箕尾英靈在斜日桑榆厯數慳寂寂圜扉終不悔忠魂莫恨左輪殷嗣秀王與檡瑞安守臣方洪派接天潢本近親更生忠節古無倫千軍守禦求閩嶠半歲勤王䕶宋民巷戰血流生不辱劒飛魂逝死能神風流喜遇莆城友攜手泉扄萬古春樞宻張公世傑曾擁貔貅奏凱歌厓山雲暝竟蹉跎地空九有棲荒服寨列千艘保海阿龍躍璽沈天若此鳥鳴矴絶事如何鯨波沃日炎光熄凛凛英魂尚枕戈江東制置使謝公枋得草履麻衣謾蔽形十年賣卜慣零丁願從楚地師龔勝蹔向遼陽友管寧采石吟成期絶粒娥碑讀罷棄餘齡一門盡節均無愧千載西山疉疉青美人朱氏給事中宫已歴年䝉恩扈從赴幽燕賢王索好縁難合烈婦捐生節已全日晏寢門疑鎻鑰宵長驛館泣嬋娟同來小婢猶堪詫一様清風兩地傳梁隆吉原名棟鎮江人以字行宋末登第為小官宋亡與其弟入茅山衣道士服登武林鎮海樓題聞角詩得禍幾不測然以是益為有道所稱從遊日衆為遺民三十載一夕無疾卒淵明攜酒圖淵明無心雲纔出便歸岫東皋半頃秫所種不常有苦恨無酒錢閒却持盃手今朝有一壺攜之訪親友惜無好事人能消幾壺酒區區謀一醉豈望名不朽閒吟籬下菊自傳門前栁試問劉寄奴還識此人不黄葵乾坤有正氣間色皆為臣名葩據中央紅紫誰敢鄰傾日不忘君衛足恐傷身㝠然無知識忠孝出本眞林林天地間戴履而為人明靈秀萬物孰不尊君親嗟嗟叔季後利欲泯天倫邈哉望帝國産此瑞世珍九夏不趨炎三月不争春髙秋風露冷孤標出清塵背時還獨立攬芳淚沾巾久雨有感少年不學稼老大生理拙入山採黄精窮冬一尺雪虎狼正縱横原野有白骨傷心重傷心吾饑何足恤送李北山歸建康二首人生無百年胡為在逺道遊子歸故鄉王孫怨芳草有田歸去來無田歸亦好貧賤有餓死富貴履危機東海不可漁西山采無薇四方已一氣我今將安歸大茅峰杖藜絶頂窮追尋青山世路爭嶇􅋂碧雲遮斷天外眼春風吹老人間心大龍上天寶劒化小龍入海明珠沈無人更守黄帝鼎有客欲問秦皇金顚崖誰念受辛苦古洞未易潛幽深神光不破黒暗腦山鬼空學離騷吟我來俯仰一慨慷山川良昔人民今安得長扛撑日月華陽世界收層隂一聲長嘯下山去草木為我畱清音四禽言不如歸去錦官宮殿迷烟樹天津橋上一兩聲呌破中原無住處不如歸去脫却布袴貧家能有幾尺布織盡寒機無得裁可人不來亷叔度脱却布袴行不得也哥哥湖南湖北春水多九嶷山前呌虞舜奈此乾坤無路何行不得也哥哥提葫蘆年來酒賤頻頻沽衆人皆醉我亦醉哀哉誰問醒三閭提葫蘆金陵廢宫六代俄然又一唐青山坐閲幾興亡心知江左非王業口説中原是帝鄉落日有時登北固春風吹夢過錢塘荆墳檜宅依然在畱與烏衣話短長鳳皇臺白髪久孤鸚鵡杯碧梧自老鳳皇臺管夷吾亦僅如許李謫仙今安在哉城郭是非秋雨外江山形勝暮潮來小畱只等中秋月且放青㝠萬里開白鷺亭荻花蘆葉老風烟獨上秋城思渺然白鷺不知如許事赤烏又隔幾何年六朝往蹟秦淮水一笛晩風江浦船我輩人今竟誰許只堪漁艇夕陽邊贈嘉興徐同年憶昔青龍在戊辰馬蹄同踏杏園春歸田令尹空書晉執㦸郎君盡羙新萬事不醒中酒聖一貧無奈訟錢神相逄莫效窮途泣薇蕨山頭要有人登鎭海樓聞角聲聴徹哀吟獨倚樓碧天無際思悠悠誰知盡是中原恨吹到東南第一州唐涇字清父道州龍山人宋亡有江南紀事詩江南紀事吳山一髪暮雲孤愁向湘纍訊故都鳳去只餘韶樂在雁來還寄帛書無登壇有客陳孤注平隴何人復五銖歌徹黍離風雨惡南山深處呌烏烏閩亡徙東廣逖泉已矣又菇蕕半壁乾坤只恁休頻歳建杓移北斗何人持節救東甌烟蜚檣櫓風濤怒雲鎻樓臺日月愁南望羊城天欲暮可堪回首問神州廣亡徙海箕冠如櫛擁茅旌誰執騂毛㰱晉盟遵海而南闗氣數渡江以北少功名火旗晻靄雲藏闕水陣周遭雪壓城一榻不容人鼾睡那知霧島是神京厓山亡萬里輿圖入朔方揺揺孤注海之陽石尤風惡雲藏軫天駟星沈月掩房島上有人悲義士水濱無處問君王羲和指著烏飛路去去虞淵暮色蒼讀史懷友羞登廣武議英雄匣却吳鈎弢却弓幕下清談王太尉門前白馬褚司空一編衮斧風塵表千古綱常天壤中説與華隂捫虱老何曽正統在江東宋元詩㑹卷五十四
