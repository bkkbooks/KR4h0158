body:
  text: 宋元詩會卷五十八兵部主事陳焯編衲子四人惠崇宋初人工繪事宋子京有過其舊居追悼之作蘇黃集內題詠屢見而詩話中則云崇於詩句慣襲唐人如河分岡勢春入燒痕之類是也然其佳處自不可掩池上鷺用明字雨歇方塘溢遲回不復驚曝翎沙日暖引步島風清照水千尋逈棲烟一㸃明主人池上鳯見爾憶蓬瀛贈文兆偶依京寺住誰復得相尋獨鶴窺朝講鄰僧聽夜琴注瓶沙井逺鳴磬雪房深久與松蘿别空縣王屋心訪楊雲卿淮上别墅地近得頻到相攜向野亭河分岡勢斷春入燒痕青望久人收釣吟餘鶴振翎不愁歸路晚明月上前汀宇昭與魏仲先同時其詩淡雅清醇亦頗得魏之風致曉發山居蓐食小人家寒燈碎落花雞鳴窗半曉路暗月西斜世故欺懷抱風霜老嵗華劇憐詩思苦悽惻向長沙贈魏野别業惟栽竹多閒亦好竒試泉尋寺逺買鶴到家遲藥就全貽母詩髙秖教兒未能終住此共有海山期塞上贈王太尉飛將是嫖姚行營已近遼河氷堅度馬塞雪密藏鵰敗壘殘旗在全軍列帳遙傳呼更號令今夜取天驕寄題武當郡守吏隱亭郡亭傳吏隱閒自使君心卷幕知來客縣燈見宿禽茶烟逢石斷棋響入花深會逐南帆便乘秋寄此吟留題承旨宋侍郎林亭翰苑營嘉致到來山意深會茶多野客啼竹半沙禽雪溜縣危石旗燈射逺林言詩素非苦虛答侍臣心寄保暹師吟會失秋期荒山寄病時客髭生白早叢木落青遲渴狖窺莎井隂蟲占菊籬歸心何以見霜月下天涯幽居即事掃苔人迹外漸老喜深藏路僻閒行逺春晴晝睡長餘花留暮蝶幽草戀殘陽盡日空林下孤禪念石霜道潛道號參寥於潜人哲宗賜名妙總大師蘇軾守杭日卜智果道院居之又為作參寥泉銘嘗稱其詩無一㸃蔬笋氣體製類儲光羲云廬山雜興六首古帝論匡山南國之德鎮爾來得躋攀此語始吾信雄雄壓九江矗矗排萬刃青天落飛瀑白日雷霆震石鏡俄忽開孤光舞而運異花無冬春瑤草亦芳潤逺公初渡江道譽藹東晉劉雷贊髙風遁世各無悶陳迹虎溪頭豫今誰與訊衆峰勢連環萬疊不可窮香爐獨秀拔佳氣常蔥蔥長風卷遊霧曉壁開曈曨招提出其下樓觀排青紅回眸盼五老刻削金芙蓉宜哉謫仙子愛此巢雲松山南信美矣山北尤增竒春風錦繡谷紅素自相依梯空上絶巘雲日驚倒窺崖壁暈祥光五色成玻瓈旁通大林寺松竹短且欹樂天當日遊四月桃始披餘齡願寄此永與人世違龍湫亘三峽草木皆森竒禪餘得支徑别塢行逶迤上人吳門秀邈有方外姿芒鞋襯兩足策策欣相追秋田罷刈穫雲木明空陂雙雙林中禽文彩光陸離雍容事飲啄相顧忘驚飛鮮飈忽騰馥嵒桂飄葳蕤峰端卧落日眷此忘還期霜清玉繩曉澗谷風未號澄潭不可極俯盼驚骨毛豈不有神物于兹能遁逃海日射兩崖餘輝何昭昭游鱗出岸穴翻覆如銀刀偶來殊不惡勝事俄所遭聊為五字詠逺愧謝與陶髙巖吐竒雲倏忽千萬丈援毫欲名貌卷縮非一狀飛仙或遨遊隱隱出其上驚飈忽吹滅轉盼惟清嶂山中勝事多彼俗誰能亮秋日西園秋山夜來雨雲氣朝尚昏禪庭無來轍但見落葉繁石室暗燈火天容開霽痕耳目思逺適曠然啓層軒長謠緩輕策去去窮深源方塘灔清流鳬鴈靜不喧時遭羲皇翁容與諧笑言邈然採真賞嵗晏誰與論子瞻赴守湖州少游與余同載因遊惠山覽唐處士王武陵竇羣朱宿詩追用其韻各賦三首山煙弄滅沒山木含蔥蒼刺舟傍遙岸理策升虛堂周遭屬曽巘矯矯如翺翔下瞰平田流淡然浮日光青簩解初籜洗雨聞清香雖云迫前塗真賞豈易忘松門暗朝雨寂厯無行人隆曦忽穿漏卉木蔚以新階泉瀨石齒照眼光磷磷使君美無度卓犖遺囂塵風標傲竹柏談笑凌穹旻何愧沈冥子卧霞吞結璘揚帆渡江來洗眼驚翠樾雲姿既容裔鳥哢更清絶凌梯訪前蹤琬琰亦未滅嗟我魚目光疇能綴明月狂墨掃琅玕風煙坐中發殊勝區中人茫茫走飛轍和龍直夫祕校細雨二首細雨連阡陌輕雲濕不飛池寒鷗自卧巢冷燕催歸慘淡疑沈樹飄蕭忽近幃簷花霑已久稍欲墮人衣傍砌飄才斷從風强更來斑斑泣蛛網浥浥汗江梅薄日光時漏層隂意未開少陵心易感詩句寫清哀次韻秦太虛夜坐古寺冬蕭瑟天寒色更冥捲幃延素月轉盼失流星爐底眠枯枿忩根立凍瓶談餘焚柏子一燧小煙清廣陵城外野步呈莘老林梢聒聒鳥聲繁積雪初消澗水渾老樹卧波寒影動野煙浮草夕陽昏風回笛響山前路犬吠人行竹外村杖屨不知幽興逺歸來新月在柴門次韻朱伯收主簿觀雪朝來密雪蔽天涯坐目丘園發素華初著敗梧驚擁腫久霑庭竹見欹斜水精不動垂千筯雲母無聲落萬家安得層穹返收拾莫教狼藉渾泥沙次韻姜伯輝朝奉宿九曲池當時樓闕已桑麻陳迹何須置齒牙宛轉頽城圍緑野嶔崟孤塔背明霞山雲度晚飛瓊葉海月生秋墮桂花圓嶠方壺同笑語終宵疑在水仙家次韻子瞻飯别鈴閣追隨半月强葵心菊腦厭甘涼身行異土老多病路憶故山秋易荒西去想難陪蜀芋南來應得共吳薑白雲出處元無定只恐從風入帝鄉夜泊淮上復寄逢原黃沙白草滿淮垠逆旅蕭條思不禁風約亂雲歸隴首角催明月出波心槎頭湧處潮初上斗柄移時夢未沈遙想故人投宿地畫船應在碧榆林夏日龍井二首呈辨才法師兼寄吳興蘇太守并秦少游少游時在越翠櫪髙蘿結晝隂驕陽無地迫吾身石崖細聽紅泉落林果初嘗碧奈新揮麈已欣從惠逺談經終恨少遺民何時暫著登山屐來岸烏紗漉酒巾自憐多病畏炎曦長夏投蹤此最冝青石白沙含淺瀨碧梧蒼竹聒涼颸雲中雞犬聽難辨谷口漁樵問不知斑杖芒鞋隨步逺歸來煙火認茅茨游徑山懷司馬才仲柔桑蔽野麥初齊布穀催耕雨一犁略彴時橫溪上下薔薇間發水東西重尋勝處追前賞無復斯人手共攜回首春風增感慨綿蠻黃鳥更悲啼照閣奉陪辨才老師夜坐懷少游學士猿鳥投林已寂然芭蕉過雨小樓前雲依絶壁中間破月自遙峰缺處圓㷖坐不須紅蠟炬可人唯有蕙爐煙校讐御府圗書客疇昔還同此夜禪次韻東坡居士過嶺一時遷客盡難堪二老髙懷默自甘造物定知還嶺北暮年寧許滯天南安排拄杖尋廬阜斗擻征衣洗瘴嵐他日相逢長夜語殘燈飛燼落毿毿寄王晉卿都尉主第耽耽冠北城位居侯伯固尊榮肻將踏月趨朝腳來伴穿雲渡水行池上紅蕖應漸老山中紫筍尚抽萌嵩陽迤邐川原勝聞說它時卜釣耕同韓子蒼遊黃山觀約髙夀朋張公碩不至駝裘躍馬去翩翩一舍逡巡箭脫絃仙事未須窮傳記勝遊聊為好山川穿林絡石驚寒溜繚白縈青對篆煙惆悵能文二三子操觚安得共周旋次韻才仲山行幕府文書一掃空何妨行樂醉春風想聞笑語千山外正在烟雲萬叠中哢日鳥聲喧細碎照溪花影靜玲瓏苦吟只恐凋肝腎夫子還冝少黜聰絶句髙巖有鳥不知名款語春風入户庭百舌黃鸝方用事汝音雖好復誰聽秋江赤葉楓林落酒旗白沙洲渚夕陽微數聲柔櫓蒼茫外何處江村人夜歸江上秋夜雨暗蒼江晚未晴井梧翻葉動秋聲樓頭夜半風吹斷月在浮雲淺處明春晚曉風池沼水瀾翻春盡淮南麥秀寒院落無人日亭午柳花如雪滿闌干次韻少游學士送龔深之往金陵虎踞龍盤亦漫雄城荒狐兔往來通可人唯有秦淮月出沒涓涓波浪中子瞻席上令歌舞者求詩戲以此贈多謝東山窈窕娘不將幽夢惱襄王禪心已作沾泥絮肯逐春風上下狂與元規話别湖水蒼茫四接天短篷孤榜自回旋想君東海東頭夢猶在汀洲白鳥邉惠洪字覺範江西新昌喻氏子又曰姓彭氏剃染之後以冒故牒責令還俗用張商英奏仍得為僧又以郭天信之請賜號寶覺圎明禪師及張郭得罪惠洪亦坐交結竄崖州未幾赦還建炎初示寂按宋史郭天信傳中稱僧德洪德與惠字畫相近其誤冝也雪霽謁景醇時方築堤捍水修湖山堂和韻築堤蓋南堂雪霰響新瓦我踏雪泥至自攜雙不借愛公有俊氣句法洗凡馬清婉繼彭澤寒陋笑東野願為西崦鄰投名入詩社餘年吾事濟過從有公者何時聞折竹燈火共清夜陪張廓然教授遊山分題得山字先生如梁鴻德耀亦愛山湘西十日留笑語烟雲間弄泉石梅塢喚舟青蘋灣藉草飲松下松風當吹彈二妙生清妍山花插雲鬟粲然起為夀舞袖相翩翩先生墮幘醉頗覺天地寬醉語忽成詩為題蒼壁顔城郭遙相望但見千峰寒送彥周彥周美少年風味映前古令人每見之不敢發鄙語推墜吾法中偃蹇揖佛祖死生人所怖玩之于掌股此生幾離别此别覺酸楚夜寒衆峰髙獨看霜月吐謁狄梁公廟九江浪粘天氣勢必東下萬山勒回之到此竟傾㵼如公廷諍時一快那顧藉君看洗日光正色甚閒暇使唐不敢周誰復如公者古祠蒼烟根碧草上屋瓦我來春雨餘瞻歎香火罷一讀范公碑煩塵看奔馬斯文如貫珠字字光照夜敇正帆更遲留風正不忍挂同彭淵才謁陶淵明祠讀崔鑒碑晉室東渡後主弱祇如寄桓溫弄兵權劉裕竊神器先生于此時潔身良有以袖手歸去來詩眼飽山翠追還聖之清太虛絶塵滓長恨千載心斷絃掩流水懷慧廓然蕭蕭暑雨過空山成夜晴月出東南峰娟娟風露清飛螢自開合寒蟬亦悲鳴興來忽獨往聽此落澗聲永懷西湖上絶景玊壺明松際翛然姿振策自經行即欲呼就語忽隔千里程何時徑尋子夜航過臨平同超然無塵飯柏林寺分題得柏字沙村宿雨餘炊烟淡寒色山墟蠶市休野飯漁舟隔忽逢栁際門知有道人宅叩扉山答響童子出迎客空庭竟何有凍死千嵗柏鐘鳴食時至老僧揖就席香粳定宿舂露葵應曉摘羞饑一飯美何啻萬錢直風軒納山翠引手捫石壁愛此玉崔嵬歲久自崩坼下有洄渦泉甘涼冰齒頰勿輕一脈微去漲萬頃澤吾行無疾徐住佳去亦得欲收有聲畫絶景為摹刻興來勿復緩轉顧成陳迹仁老以墨梅逺景見寄作此謝之荒寒掃橫斜稀疏開未遍烟昏雨毛空標格終微見吳姬風鬢亂睡色餘妬面誰令種性香風味極不淺道人三昧力幻出隨意現塞管玉纎寒無勞寫哀怨居上人自雲居來訪明日告歸作此送之浮雲山盡際花木迎春暉佳人殊方來見之消渴饑藉草坐松影粉香時落衣氣貌秀可掬出語超幽微巖壁鐘聲寂山隂花發稀去袂挽莫留又作甌峰歸送通上人遊廬山少年四方志一杖餘㲲巾朝來過微雨扁舟買南津廬山冠天下况復當青春遙知泊星渚雲開蒼翠新相看發一笑瀑布垂天紳虛漢清月上山空無四鄰應懷千載姿坐榻空埋塵興來得好句録寄北山人奉陪王少監朝請遊南澗宿山寺步月單衣喜和風詩眼愛空翠野亭亦翛然散坐聊倦倚坐久忽聞樵相視一笑喜那知深林外曲折見流水幽光弄紺碧春色潑秀氣去為千頃澤隄栁相嫵媚月光方下徹浮空見頳尾投礫戲驚之撲摝沙禽起歸途望林壑烟靄隔山寺便如斜川遊嵗月亦相似觀山茶過回龍寺示邦基北窗賞新晴睡美正清熟竹雞斷幽夢朦朧不能續卧聞故人家山茶已出屋欣然一命駕妍暖快僮僕千朵鶴頂紅染此叢間緑坐客例能詩秀句抵金玉攜過回龍寺掃壁為君録逸筆作波險欹斜不可讀坐驚殷牀鐘暮邑眩雙目同敦素沈宗師登鍾山酌一人泉鐘山對吾户春曉開烟鬟白雲峰頂泉紺碧生微瀾經年未一酌對客愧在顔兩翁亦超放瘦䇿容躋攀大千寄一瞬境靜情亦閒是時天慘憺佳處多遺刪立談共嘲謔豪氣破天慳臨川冰玉清風流繼東山孤坐巉絶處掉頭不肯還天風吹笑語響落千巖間歸來數清境但覺毛骨寒宿宣妙寺衝虎困頓歸投枕眠爛熳夜晴霜月苦睡美不知旦日髙披曉緑萬事付衰懶百年炊黍久强半得憂患起臨清淺流白髮不可揀此生終一壑形勝已入眼明年定來歸茅屋並崖瞰掩門無營為一味工寢飯次韻道林會規方外湘山半夜雨斷我西湖夢卧看讀書燈花作扶頭重曉窗晴潑眼倒挂聞么鳯起尋殿寒梅小立幽香噴栁絲不勝綰笋庭春脈動春色已如許樂事非一種平生所懷人忽此笑語共雲軒為誰停危坐山衲擁眼髙空叢林志大骨森聳開懷見赤心亹亹飽談誦坐客鶴腦側我亦快心孔袖中出新詩筆力發豪縱風日麗醇釅黃泥初揭甕舌根有滄海潮辨自掀湧何當橫枯藤齧鏃追兩本吾宗欲顛覆支者例闒茸君能為我起逸足王良控我詩如石田疏理終無用朝來强鉏墾禿筆時呵凍摩挲銅鍱腹博君一笑捧贈蔡儒效我家與君鄰屋居君昔未生先長我君髮齊睂我總角竹居讀書供日課君誦盤庚如注瓶我讀孝經如轉磨長老竒君王佐才拭目顒顒觀長大十三環坐同賦詩出語已能驚怯懦風雷繞紙成千篇棄遺不惜如涕唾神思義表文融明清絶如珠肯受涴江左相傳紙價增東坡一讀無復和懷髙識逺不可屈功成回首破甑墮家貧口衆難自安出圗斗粟充饑餓俄聞筆陳掃萬人上國英雄膽先破殿前作賦聲摩空盛名四海爭掀播華裾如蔥馬如龍九衢突若流星過我經憂患早衰微生怕虛名招實禍方衣童首住江村飽飯愛尋閒處卧睡餘信手摸書看會意起來行復坐林泉成趣亦題詩年來藁帙成堆垜仙郎開卷面發光誇我雄詞驚李賀相期他日同此遊先買鄰庵山數朵青松白石聞此言共作廬山二十箇汪履道家觀所蓄煙雨蘆雁圖西湖漠漠生烟雨浦浦圓沙鳬雁聚今日髙堂素壁間忽見西湖最西浦翩翩兩雁方欲下數隻飄然掠波去獨餘一隻方穩眠有夢不成亦驚顧蕭梢碧蘆秋葉赤青沙白石紛無數我本江湖不繫舟爾輩况亦江湖侶令人便欲尋睿郎呼船深入龍山塢李德修以烏蘭河石見示賦此還之豫友李德修少豪逸有美才工文章一時輩流推之聲譽著場屋紹聖初選于廣文至禮部好惡不合有司棄去遊邉往來蘭會甚久晚屏跡田園然視其氣貌精特功名一念未置也政和七年上元前四日過豫袖中出美石一掬大小二十八枚有紅青碧緑色細視之有旋螺紋如人指紋以誇豫曰吾嘗與諸將至古烏蘭大河河中有洲鄰夏國此石得於大河洲中其為我賦之豫為大笑曰君同時輩流皆踐清華為顯仕躍馬食肉久矣獨從豫山中食脫粟玩朽石不亦大迂濶哉然德修頗非豫言為作詩以還其石烏蘭洲塞夏國口大河天來箭激溜排空但聞地喘吼勢撞石壁欲穿透石堅捍之不肯受攧雷濺雪喧夜書千年石骨亦不朽碎為青紅雜怪醜疆場久空爛甲胄舉觴天子千萬夀李侯橫槊千騎後望雲賦詩劔礙肘徐涉河流馬俯嗅下馬得之等瓊玖萬里來歸亦何有出以示我為拊手笑君兒嬉忘白首李侯氣如春在栁大河西國置懷袖君徒自珍世不售敲門那能易升斗功名偶然夢豈久道人乃爾自薄厚此石笑汝汝慚否南昌重會汪彥章彥章退然才中人譏訶唾笑皆奇偉看君落筆挾風雷渙然行文風行水坐令前輩作九原子固精神老坡氣儒生寒酸不上眼此郎要是天下士嗟豫生計等飛鳥翩翩吳頭復楚尾去年興發看京華笑傲清狂人背指君獨折簡坐致我迎門歡笑自契履舊聞牛鳴馬不仰女逐臭夫那有理今年黃花南浦岸忽然見君失聲喜僧房借榻營夜語燈火照人如夢寐懷中卿相且袖手翰墨風流聊戲耳行看上書苫塊中凜凜范公只君是福巖寺夢訪廓然於龍山路中見之山髙夜氣催煩暑竹風為作南軒雨夢隨柔櫓到西興艤舟步入龍山塢蕭蕭松下逢睿郎問信逺來亦良苦覺來但記談笑歡不省歡時竟何語卧看篝燈一㸃明嶺海茫茫隔吳楚安得却如清夢中杖履追隨長爾汝魯直弟稚川作屋峰頂名雲巢只今海上青石牛曽卧天子黃金屋下看朱紫如堵牆上前諸公遭抵觸眼髙四海鏡面空灊山歸來巾一幅慚愧君家小馮君自是河東真鸑鷟文章五色體自然秋水精神出睂目人間不識但聞名水非醴泉石非玉江南一峯獨髙寒時時笑語雲間宿弟兄出處兩相髙故作雲巢對山谷題李訴書像淮隂北面師廣武其氣便可吞項羽君得李祐不肯誅已知元濟在掌股羊公德化行悍夫卧鼓不戰良驕吳公方沈鷙諸將底早笑元濟無頭顱雪中行師等兒戲夜取蔡州藏袖裏逺人信宿猶未知大䫫西平擊朱泚神駒行沙丘牝黃馬已死俗馬千年不能嗣忽生此馬世上行神駿直是沙丘子紫焰爭光夾鏡眸轉顧略前批竹耳雪蹄卓立尾蕭梢天骨權竒生已似緑絲絡頭沫流觜繡帕搭鞍初結尾决驟意態欲騰驤奔逸長鳴抹千里贈許邦基邦基今年方十九美如濯濯春月栁龍章鳯姿絶世無金馬玊堂如故有酒䦨愛捉玉麈尾玉色正同批誥手髙燒銀燭照新妝看君落筆龍蛇走欲驅清景入秀句萬象奔趨不敢後人疑錦繡纒肺腸不然筆端應有口謫仙風流今復見况亦髣佛外塵垢但恐功名纒縛人未放青山挂忩牖謝安道花壇三月江南春不淺謝家池上開花苑層壇迸破碧琉璃嫩蘂蔟成紅婉孌一枝兩枝和霧白素娥月下逢姑射十朵五朵照水紅仙姝並立瑤池東人生遇景須行樂莫使餘香散簾幕白雲難逃鬢上斑金尊且對花前酌時人莫以花為浼大都自是人情改若使人情長似花相看顔色年年在夏日西園晚庭一霎過暑雨髙林相應山蟬鳴南忩夢斷意索寞牀頭書卷空縱橫蔬畦日涉已成趣起來扶杖園中行葵英豆莢小堪摘矮榆髙栁隂初成野禽啄果時落地池塘蓋水新荷平歸來西屋斜陽在原舍尚聞舂簸聲自豫章至南山月下望匡廬扁舟秋晚離南浦片席搖風望星渚揚瀾大浪晴泊天南山窈窕開蓮宇倒檣散䇿一登臨便擬掩關深處住吾生飽食隨東南去亦無求住無取江山得意且題詩從遊况復皆真似青燈灼灼夜忩深對窗卧聽風甌語隔岸廬山金碧開月明尚記曽遊處贈王敦素兼簡正平空山無人舟壑移坐看香燒行篆畦兄弟華軒肯過我墮甑敝帚生光輝著屐登山亦不惡攜被假宿良幽期燈前緑髮映玉頰風流未數崔宗之夜談詞辨出神駿絶塵赤兔真權竒我欲置君帥河朔軍前千騎紅妝隨橫槊吟詩氣慷慨玊帶錦袍英特姿又欲置君玊堂臥霧窗棐几春晝遲醉中草制驟風雨諸公堵立相嗟咨微吟擁鼻笑不語恐未免爾無多辭為君張燈掃東壁他日重來讀此詩浙竹龍孫初長浙江曲疏影蕭蕭濯寒玉平生知愛足風流只有山隂王子猷而今流落蒼崖頂暗換年光鄉路永冰敲雪壓未應衰鸞鳯不棲空故枝堅幹猶堪製長笛最合宫商勝金石為君吹動鏡湖秋驚起雙龍翼小舟郭祐之太尉試新龍團索詩政和官焙雨前貢蒼璧密雲盤小鳯京華誰致建溪春睿思分賜君恩重緑楊院落春晝永碧砌飛花深一寸門下賓朋還畢集碾聲驚破南忩夢髙情愛客手自試春霧腳縈雪花湧我有僧中富貴緣此會風流真法供山寺早秋千本蒼杉俱合抱夕隂相映寒蟬噪殘僧獨歸清入畫秋色滿庭濃可掃霜鐘初歇月未生但覺篝燈一㸃明階除環珮走流水樓閣誦經童子聲讀瑜伽論此生已無纍一席可窮年細嚼寶公飯飽參彌勒禪懶修精進定愛作吉祥眠夜久山空寂唯聞繞砌泉夜坐分題得廊字一雨餞殘暑瘴疴蘇簟涼臥聞山果落起覺斛蘭香幌內水螢入階除露葉光知誰愛清境步屧響修廊早行失枕驚先起人家半夢中聞雞憑早晏占斗辨西東轡濕知行露衣單怯曉風秋陽弄光影忽吐半林紅湘隂馬上和季長見寄小春風埃九十里霧雨濕駝裘雁過回詩眼江寒聚晚愁魂清方怯雪句冷更含秋殘岸連孤嶼依稀似橘洲湘上閒居夜清暑雨過四壁草蟲鳴一枕幽人夢半窗閒月明摧頽𢎞法志老大住山情忽憶陳尊宿編蒲度此身西齊晝臥餘生已無纍古寺寄閒房睡足無來客忩空又夕陽叢蕉髙出屋病葉忽飄廊起探風簷立飛蚊避晚涼秋夕示超然夜色已可掬林光翻欲流一鈎窺隙月數葉攪眠秋清境扶歸夢殘缸替客愁搜詩時畫席忽覺此生浮次韻真覺大師瑞香花淺色映華堂清寒熏夜香應持燕尾剪破此麝臍囊有恨成春睡無人見洗妝故山烟雨裏寂寞為誰芳清明前一日聞杜宇示清道芬籬外花如海閒軒小寢驚最先聞杜宇更覺近清明雲怒知為雨風和拗得晴阿芬甘劣我笑裏恰詩成送僧歸故廬投名身入社卧病偶思歸渡澗脫芒屨扶藤下翠微寒松猶帶雨瘦骨不勝衣若見空鑽紙當施百丈機重會雲叟禪師氣味似前輩見之長眼明閒須研法味老不减詩情草聖因蛇鬭禪枝解虎爭一堂聊寄傲疏快餞餘生次韻衡山道中嶽色墮馬首嵐光忽滿襟眼寒知意適句苦覺愁侵沃野獻新緑殘晴釀晚隂天涯驚去雁料理欲歸心次韻李方叔遊衡山僧舍道鄉見城郭世路謾升沈寺勝增佳氣壁間餘醉吟僧殘過客少山好為誰深寧識通泉尉獨懷經濟心題夢清軒小軒人不到修竹過牆生眼倦經長掩身閒夢亦清微風吹篆縷活火潑茶鐺遙想佳眠夕蕭蕭雨葉聲燈花偶書岑寂一閒僧春宵清興增竹窗催夢雨蘭室對禪燈世事知虛幻人情剪愛憎短長都分定不恨百無能宋元詩會卷五十八
