body:
  text: 宋元詩會卷五十九兵部主事陳焯編恵洪下貲國寺春晩龍鄉戒曉月空斜喚起清圓響絡車燒筍餉田村窕窈拾薪煮繭語諠譁美欣崖蜜嘗新果香識山礬稱意花歸去路迷光已夕浸門春水一池蛙送瑩上人遊衡嶽紫盖峰頭樓閣生朱靈洞口水雲晴盤空路作驚蛇去落日人如凍蟻行重郭老師今健否蔵年珍木但聞名定應自掃巖邉石時發披雲嘯月聲訪友人日暮荒城倚瘦藤江南春思倍添増那知淮水黄塵路忽見廬山白髪僧乞食久辭烟際寺連牀今對夜深燈明年我亦尋君去同陟天池最上層過孜莫翁禹穴朝來散晩參一程隨便達雲巖南山任把浮雲蔽西嶺猶將落日銜幽徑野花開舊菊石牀楸子下髙杉投宵夜永寒無寐良憶真僧衣不蠶大風夕懷道夫敦素病覺春寒花信重起來散策夕陽中方收一霎挂龍雨忽作千秋攧鷂風淮水粘天雲泛浪呉山吐月鏡縁空二豪詩眼應驚絶覔句遙知與我同九日去嵗重陽瘴海濱病拈霜蘂嗅清晨身閒已斷思歸夢山好仍逢稱意人夘飯露葵欣旋摘夜窓風栗共嘗新妙年衲子應相笑痴鈍耽源老應真陳瑩中左司自丹丘欲家豫章至湓浦而止余自九峯往見之二首鴈蕩天台看不足却搬兒女寄篷忩徑來漳水謀三頃偶愛廬山家九江名節逼真如醉白生涯領畧類湘龎向來萬事都休理且聽樓鐘咽夜撞與公靈鷲曽聴法游戲人間知㡬生夏口甕中蔵畫像孤山月下認歌聲翳消已覺花無蔕礦盡今知珠自明逺壑夕陽殘雨後一番飛絮滿江城鞦韆畫架雙裁翠絡偏佳人春戲小樓前飄揚血色裙拖地斷送玉容人上天花板潤霑紅杏雨綵繩斜挂緑楊煙下來閒處從容立疑是蟾宫謫降仙謁靈源塔髙颿駕浪過南溟那料歸來掃此亭桃李成隂春老大谿山好在鬢凋零瓦燈已照宫商石卵塔分蔵服匿瓶春雪尚能知客意蕩除毛孔瘴烟腥次韻宿清修寺湘山也學廬山好落瀑聲飛繡谷風正欲來歸向兒說戲將收拾入詩中浪驚醉枕寒松響春滿茶鐺活火紅清景骨飛嗟未到故應唯許夢魂通次韻渡江有作棄舟植杖首重回隔岸遙聞津皷催淮上梅傳春信至江南山逐笑聲來行瞻瑞霧籠雙闕更看神光發五臺王事幸陪方外樂為君㸃筆走風雷二月大雨江漲晩晴投老歸來楚水濵水清聊可濯衣塵拚心樂事都還汝入手清閒不與人尚有笑談消白晝更無情緒管青春暗驚少日王城外走馬爭先看寳津題翠靄堂虚簷碧瓦臨無地吐月吞風六月寒簾捲煙光搖户牖雨餘嶽色墮䦨干侍兒自炷真龍腦座客同分小鳯團誰謂太平本無象規模堪入畫圗看次韻寧鄉道中夾道傳呼部曲犇遙知秋色動吟魂黄柑緑橘平蕪路剰水殘山夕照林似鏡此心清自逈如雲往事去無痕鐘聲有寺蔵煙翠忽見林間窈窕門十五日立春千年象教唐朝寺雪後新年晴復隂殘僧無事春又至遊客不來山自深長廊掃葉望空翠小閣卷經横水沈三生白業有言說一念淨心無古今晩步歸西崦庭除有路入深壑曳履翛然獨往還布穀風光寒日近摘茶時節亂山間花枝重少人甘老燕子空忙春自閒歸晩斷橋逢野水更能揎手弄潺湲晩秋溪行熟路沿溪過石橋掃除秋晩淨迢迢幽尋忽見蘭芽茁小立仍逢柿葉飄撲摝水飛雙去鳥􅌑瓏山響一聲樵歸來半掩殘經在燕寢香凝碧未消夏日偶書碧縷横斜試水沈紅腮甘冷嚼來禽含風廣殿聞棋響轉日迴廊暗栁隂强撚氷紈除睡色倦憑棐几適閒心攀翻涴衲黄塵事過眼雲蹤不可尋竹爐博山沈水覺塵埃旋斫凌雲緑玉材自拭錦䙀含淚粉要焚銀葉返魂梅意消未掩黄庭卷火冷空餘白雪灰應把熏衣閉深閣流蘓想見畫屏開石臺夜坐故鄉乃有此叢林下板何妨著寂音永與世遺他日志尚嫌山淺暮年心凍雲未放僧窓曉折竹方知夜雪深琢句自應清似玉更冝坡字硬黄臨秋日還廬山故人書因以為寄風葉鳴廊夜色晴隔雲㣲月稍分明下簾徒怯衣裳薄拂榻空驚枕簟清病眼得秋還少睡壯心于世尚多情何時却作廬山去渡水穿雲取次行送軫上人之匡山何處髙人雲路迷相逢忽薦目前機偶逢菜葉隨流水知有茅茨在翠㣲碎瑣夜談皆可聴烟霏秋嶺欲同歸翛然又向諸方去無數山供玉麈揮送敏上人殘林病葉强翻紅已覺清秋夜氣濃懶復小忩邀獨秀却應歸夢挂雙峰水分淮甸當縣席路遶匡山可振笻若見虎溪谿上月為言相憶作衰容次韻超然竹隂秋夕月脇雲行夜未深滿庭風露葉辭林知誰牆外千竿竹分我窻西一􅒪隂山好已無歸國夢老閒猶有讀書心剩題詩句酬幽隠歳月翩翩接翅禽送宗上人歸南泉燈外佳眠試冷齋欲成歸夢暗驚回一軒秋色侵衣重半夜波聲拍枕來江國潮平人獨漉海山家在意徘徊倚藤明日秦淮上看子風帆十幅開上元宿百丈上元獨宿寒巖寺卧看篝燈暎薄紗夜久雪猿啼嶽頂夢回清月在梅花十分春瘦縁何事一掬歸心未到家却憶少年行樂處輭紅香霧噴京華宿鹿苑書松上人房冷齋託宿自攜衾卧聴松風度栗林黄卷青燈紙窓下白灰紅火地爐深夢回清響舂巖溜夜久幽香噴水沈慣作横刀眠下板為君令有住庵心題草衣巖鉏頭為枕草為氊曽與高人說任縁豈料大嫌沽世價未應虛費買山錢閒編木葉輕于紙細葺蘆花輭勝綿石室至今増壯觀可知千載得人傳至筠乞漿問路到筠溪天氣清和得所冝父老相逢班草坐風光初過採茶時摩挲禪榻營春睡想像齋厨辦晩炊白首不知丘壑改壁間來讀舊題詩懷李道夫半篙晩漲綠楊灣接翅鷗歸霧雨殘數疊吴山圍楚夢一番花信釀春寒别時小語依然在隔歳來書展復看補衮胸中五色線只今應作怒蜺蟠效李白湘中體夕光江搖魚尾紅何處扁舟開晩篷雁字初成春有信烟鬟空好雨無蹤荒寒數葦橘洲岸領略半忩湘寺鐘浦口行人已爭渡林下歸僧欣一逢題天王圓證大師房壁閉户不妨依聚落開軒隨分有山林殘經半掩世情斷好鳥一聲村意深籬外風筠森束玉屋頭霜橘欲垂金能營野飯羮紅醬渡水何辭數訪尋題胥大夫欣欣堂議郎和粹色無求繞屋江山秀氣浮弱柳貪眠禽喚起異花含笑草忘憂閉門不放青春返解榻長令佳客留摹冩髙情無好句謾横詩眼付㝠搜送海印奭老住東林湘容嶽色中秋後古寺閒房小寢餘掃徑帚粘新落葉開忩風掩讀殘書吹雲又作他山去種漆何時伴我居洞上閒名猶在世未應容易與人除宿芙蓉峰書方丈壁赤髭病客煙瘴面漆瞳道人氷雪容俯檻夜殘看落月不知脚下有千峰廬山雜興二首幽花疎竹冷梢雲江北江南正小春但得青山常在眼不妨白髪暗隨人白水連空不見村㝠㝠細雨濕黄昏秋山咫尺無由到須信闗人不用門秋晩紫棃紅棗八九樹竹屋柴門三四家機杼聲遲秋日晩遶籬寒菊自開花謝人恵蘆雁圗道林煙雨久不到忽見橘洲蘆雁行笑裏筆端三昧力坐中移我過瀟湘湓江宿舟中琵琶亭下孤舟宿夜靜風清水四圍蝴蝶夢中江月白蘆花鳴笛釣船歸登鄧氏平逺樓望見小廬山作倚欄天際數歸帆春在滄洲數筆間我與小樓俱是書雨中猶復見廬山衲子二十八人真淨號雲菴善學顔平原書其手帖多名流題跋以為不減楊少師而南禪老人猶在其下也寄無為居士世俗事無盡養髙心自閒蔬園通綠野林塢帶青山丹竈忘添火雲菴懶著闗别應修省術七十見朱顔送張簽判遊開先步入青松裏迢迢一徑通漸分華藏界深隠法王宫道與神仙别人非世俗同欲知西祖意庭柏老春風留題紹公寂照軒幽軒名寂照四海坐中閒景物有遷色主人無異顔野泉澄檻外香藹起簷間涼夜誰相問寥寥月滿山送人之南嶽境幽南嶽寺路向碧巖分逺近松相接髙低鐘共聞靈禽時奏樂香石日籠雲想到經行處超然趣不羣仲殊與蘓子瞻為方外友殊性嗜蜜而僧思聰嗜琴故蘓詩有云招得琴聰與蜜殊潤州北固樓前一笛風斷雲飛出建章宫江南二月多芳草春在濛濛細雨中淨端字明表歸安丘氏子肄業吴山解空講院始見人弄獅子發明心要遂詣參翠峰月禪師得游戲三昧云法孫比丘師皎刻其詩文一册行世答陸䝉老枕上浮生過半百短髪毶毶霜様白西溪河上舊家山歳歳故鄉歸似客船頭漸進古松門云是呉筠讀書宅烟雲半嶺望層樓鼇頂崢嶸蘂宫窄有人挂衲歸盤陀稜稜瘦骨真維摩幾年面壁舌不動忽然拍手賡魚歌秋來滿船載明月俄驚雨笠仍烟蓑黄梅渡口水流急五湖深處任風波惟悟字仲晦與楊蟠公濟善蟠通判杭州往來多詩僧而永安天竺諸老皆一時名衲惜其詩不盡傳也聞泉澗泉吾所好山舎寂無喧春脈生雲底夜聲來枕前風休不動竹月起未啼猿石上鳴逾急泠然清夢魂將訪永安東山禪師先寄庵在千株松桂下更無塵事到夫君髙蹤罕過呼猿澗靜思唯看抱石雲日暮燈龕禽影集雪晴崖罅路形分揚雄約我須投宿月裏禪餘怯論文奉和楊公濟宿永安方丈呈東山禪師道安獨繼襄陽踵詩好慵窺霅晝評竹屋數間經㡬載草衣三事傲平生縱陪林下收孤迹難學人間走大名燈火已殘談未倦曉風斜雨打窓聲酬公濟早過天竺呈明智及同遊二老曉過翻經臺下寺與君同謁祖師堂庭前紫桂葉頻脫石上紅梅花正香出洞隂雲開逺影籠松寒日漏清光謝公勸飯須無讓不許非時薦茗湯修睦宿岳陽開元寺竟日凭虚檻何當興歎頻往來人自老今古月常新風逆沈魚唱松疎露鶴身無眠鐘又動幾客在迷津景雲老僧日照西山雪老僧門始開凍瓶黏柱礎宿火陷爐灰童子病歸去鹿麋寒入來齋鐘知漸近枝鳥下生臺子蘭華嚴寺望樊川萬木葉初紅人家樹色中疎鐘搖雨脚積水浸雲容雪磧迴寒雁村燈促夜舂舊山歸未得生計欲何從契嵩字仲靈有鐔津集行世感遇二首山人白玉京去去何縹緲瓊樓十二層􅌑瓏汎雲表銀湟月為波萬頃即池沼秋來宫殿光逗落人間曉空際時澄明烟霞眇青鳥可望不可到所思空杳杳松柏地之靈草莽亦同茂願得區域中人心復純素蒼梧會稽隂纍纍見陵墓六合無知音青山有歸路人生惜朱顔賢哲長還顧昨夜露華臺誰不怨秋暮懷越中兼示山隂諸明士厭見人境喧清遊憶靈越東南千萬山浮青滿寥泬從來鑑中景形勝人間絶月湛換鵝溪雲起蔵書穴客子若飄蓬俄與故人别尺素未及通芳草已云歇所悲行路難俛仰損名節鳴雁欲東飛寄語謝明月早秋吟山家昨夜房櫳冷梧桐一葉飄金井長天如水淨藏雲明月含暉變秋景桂枝花折風飄飄誰在髙樓吹玉簫人間不見槎升漢天上將看鵲作橋年少征人在何處白露霑衣未歸去海畔今無漂母家江南誰與王孫遇浙江晩望暮色看無際秋空水混天片帆飛鳥外新月落潮邉隔越山形小吞吴地勢偏㡬人来往者早晩渡頭船題徑山寺翠㧞羣山外連天勢未休雲迷飛鳥道雨出濺龍湫僧在深雲定香和杳靄浮人間遊不到臺殿自清秋郎侍郎致仕平時獨髙謝道勝欲韜光白髪辭明主青山戀故鄉藥畦容鶴到吟徑恐雲蔵更愛禪林臥時來拂石牀汎若耶溪越水乗春泛船忩掩又開好山沿岸去驟雨落花來榜影樵人渡歌聲浣女回滄浪無限意日暮更悠哉山亭晚春山庭晚来靜林石自巉巉犬去吠人語花飛恣鳥銜晴烟熏茂草照日藹高杉更喜團圎月清光下碧嵒寄懷泐潭山月禪師聞道安禪處松蘿杳隔溪清猿定中發幽鳥坐邉栖雲影朝晡别山峯逺近齊不知誰問法雪夜立江西送客還道中作北郭送之子日斜還舊居路泥侵曉潤晦月逼春餘桑柘雨中綠人烟闗外疎依然見風俗歸興混樵漁入石壁山身似浮雲歳不留塵中擾攘只宜休老來已習青蘿子隠去應追帛道猷直入亂山寧計路俄看落葉始知秋他時谷口人相遇莫問裁詩謝五侯酬楊公濟早過天竺呈明智及同遊二老澗北夜依禪舎宿峰南今訪講師堂初行松路愛清曉及過石溪聞異香日色煖烘諸壑淨晴嵐翠潑幾峰光道標尚客何髙趣更飲吾曺柏葉湯新嵗連雨不止因寄公濟兼簡賢令强公寒郊纔喜嵗華新景物隂隂又一旬雲帶天低垂壓野雨蔵春晝暗迷人寧愁燈火妨明月卻歎詩家惜令辰陶令而今卧江國倚樓吟望更誰親尚顔夷陵即事不難饒白髪相續是灘波避世嫌身晩思家乞夢多暑衣經雪著凍研向陽呵豈意臨岐路還聞聖主過志詮夕歸落日寒蟬鳴獨歸林下寺松扉竟未掩片月隨行屨惟聞犬吠聲又入青蘿去虚中贈栖禪上人巖房髙且靜住此㡬寒暄鹿嗅安禪石猿啼乞食村朝陽生樹罅古路透雲根獨步閒相覓凄涼碧洞門清尚贈樊川長老瘦顔諸骨現滿面雪毫垂坐石鳥疑死出門人謂癡照身潭入楚浸影檜生隋太白曾經夏清風涼四肢希晝書恵崇師房詩名在四方獨此寄閒房故域寒濤濶春城夜夢長禽聲沈逺水花影動回廊幾為分題客殷勤掃石牀寄懷古見說鵬隂僻人烟半雜羌秋深邉日短風動曉笳長樹勢分孤壘河流出逺荒遙知林下客吟苦夜禪忘送嗣端東歸逺念生泉石人中事欲銷卷衣城木落尋寺海山遙帆影迷寒雁經聲隠暮潮後期俱未定况我鬢先凋送可倫赴廣南轉運凌使君見招别語畏殘漏心縣瘴海邉回期無定日去路極遙天苦霧沈山郭寒沙漲隰田㡬宵尋使府清話廢閒眠早春闕下寄觀公客心長念隠早晩得書招看月前期阻論山静會遙微陽生逺道殘雪下中霄坐見青門栁依依又結條保暹宿宇昭師房與我難忘舊多期病此房卧雲歸未得静夜話空長草際沈螢影杉西露月光天明共無寐南去水茫茫早秋閒寄宇公窓虛枕簟明微覺早涼生深院無人語長松滴雨聲詩來禪外得愁入靜中平逺念西林下相思合慰情文兆宿西山精舎西山乗興宿靜稱寂寥心一徑杉松老三更雨雪深草堂僧語息雲閣磬聲沈未遂長棲此雙峰曉待尋送簡長師之洛動静非常態超然西去心水期經洛聴雲約到嵩吟齋訪烟村逺禪依竹寺深秖應風雅道相府是知音行肇郊居吟靜室簾孤捲幽光墜露多徑寒杉影轉窓晩雪聲過茗味沙泉合罏香竹靄和遙懐起深夕舊寺隔滄波送文光上人西逰髙木墜殘霖闗河入逺心嵩遊忘楚夢華近識秦音塔古縣圖認碑荒背燒尋幾思興替事獨上灞陵吟清順字怡然西湖詩僧與可久號逸老者所居皆湖山勝處清順性尤約介不妄交人常致乏食處之泊如也書景舒菴壁大布君能著始知蠶口非冢間容一榻身外只三衣䕶戒避生草淨心觀落暉寂寥能自守今世固應稀偶題竹暗不通日泉聲落如雨春風自有期桃李亂深塢簡長送僧南歸漸老念鄉國先歸獨羨君吴山全接漢江樹半藏雲振錫林烟斷添缾澗月分重棲上方定孤狖雪中聞送行禪師南國山重疊歸心向石門寄禪依鳥道絶食過漁村楚雪黏缾凍江沙濺衲昏白雲深隠處枕上海濤翻贈浩律師浩也毘尼學精于玉帳嚴蟻酣停掃砌燕乳記鈎簾茶鼎敲氷煮花壺漉水添夢回池草綠忍踐綠纎纎惟鳯與行肇師宿廬山棲賢寺水瀑寒侵室圍爐静話長詩心全大雅祖意會諸方磬斷危杉月燈殘古塔霜無眠向遙夕又約去衡陽弔長禪師霜鐘侵漏急相弔晩悲濃海客傳遺偈林僧寫病容潄泉流落葉定石集鳴蛩回首雲門望殘陽下逺峰懐古寺居寄簡長雪苑東山寺山深少往還紅塵無夢想白日自安閒杖履苔痕上香燈樹影間何須更飛錫歸隠沃洲山居天柱山四野豁家庭柴門夜不扄水邉成半偈月下了殘經雖逐諸塵轉終當一念醒未知斯旨者萬役盡勞形智圎贈聞聰師澹然塵慮絶禪外苦風騷性覺眠雲僻名因背俗髙水烟蒸紙帳寒髪澀銅刀幾宿秋江寺閒吟聴夜濤遵式酬伉上人髙卧清閒極誰能更似君山光晴後見瀑響夜深聞拾句書幽石收茶踏亂雲江頭待無事終學棄人羣贈智倫弟溪竹擁疎簾溪雲冷不厭千巖惟虎伴一講許詩兼煮茗敲氷柱㸔經就雪簷有時開静户寒日下峰尖元肇淳熈中人號淮海有語録及淮海詩集行世虎丘滄海何年湧秦傳虎踞丘池空劍光冷墳闕鬼吟愁石礙樓臺側烟深草木浮呉人貪勝槩春盡亦來遊徑山東西兩徑幽嵗晩得同逰壑霽隂猶在溪雲凍不浮鳥驚樵斧重猿挂樹枝柔怕有梅花發因行到水頭善珍山行晩歸藥徑入雲林晩晴扶杖吟照泥星復雨經朔月猶隂樹折憐巢覆泉清見葉沈愛閒自如此不是學灰心春寒松間燈夕過顧影在天涯雪暝迷歸鶴春寒誤早花艱難知世味貧病厭年華故國風塵外無人可問家如璧次韻答呂居仁向來相許濟時功大似頻伽響逺空我已定交木上座君猶求舊管城公文章不療百年老世事能排雙頰紅好貸夜窓三十刻胡牀趺坐究幡風顯萬送炭與湘山西堂恵然師紛紛向火乞兒多獨有君如擇乳鵝萬鍜爐中尋粲可一堆灰裏撥隂何雪欹敗屋閒犀柄草卧空庭任雀羅急送烏薪相煖熱恐隨春夢入南柯可觀入院登座其日重九胸中一寸灰已冷頭上千莖雪未消老步只宜平地去不知何事又登髙恵嚴正覺寺野水痕俱落挐舟日未西斷溝横略彴支徑入招提方廣源深似竹林境可齊徘徊未能返暝色起前溪按汴宋詩僧自參寥覺範外獨以九人著稱所謂九人者淮南恵崇江南宇昭金華寳暹劍南希晝南越文兆天台行肇沃州簡長貴城惟鳯峩眉華台也今於八僧詩各得數章獨闕華上人故附見其名焉宋元詩會卷五十九
