body:
  text: 宋元詩會卷二十八兵部主事陳焯編王存字正仲潤州丹陽人幼善讀書年十二辭親從學於江西五年始歸作古文數十篇鄉先生歎為不及登慶厯六年進士調嘉興主簿擢上虞令除密州推官召為國子監直講歷史館檢討知太常禮院素與王安石厚及論事氐牾遂謝不往元豐元年擢修起居注請復唐貞觀執筆隨宰相入殿故事神宗韙之聽直前奏事以右正言知制誥所條陳多忤執政遷閭直知開封府進密直改兵部尚書轉戶部拜中大夫尚書右丞遷左丞出知揚州以吏部尚書召再與當軸者戾除知大名府改杭州紹聖初致仕卒年七十九覆驗餘杭道中一夫死非命勘驗更兩吏一囚坐法誅三覆與衆棄去年交址敗殺戮無賤貴江淮屢歲眚積殍溝壑穢聖人於赤子愛重若彼至謹小以遺大誰其原帝意王巖叟字彥霖大名人年十八舉明經由涇州推官遷右司諫權給事中時命執政不當輒力諫得寢乃止以直院知齊州召侍講邇英殿拜簽樞密院事為御史鄭雍所擊目為黨人罷知鄭州徙河陽卒延慶寺龍潭龍隱幽潭事已空惟餘翠竹間蒼松路窮西北無他景只有青山一萬重王欽臣字仲至熙寧間由西京縣令召入議法與王安石不合令學士院試賦一篇但賜出身仍歸本任試院題壁二首蜀國相如最有詞武皇深恨不同時凌雲賦就還無用寂寞文園意可知古木隂森白玉堂老年來此試文章日斜奏罷長楊賦閒拂塵埃看畫牆按稗史欽臣試賦畢就院壁題字介甫使人録之乃二詩也為改奏罷長楊賦作奏賦長楊罷云王安石字介甫臨川人少讀書研精善屬文曽鞏攜其文質歐陽修大稱善為延譽登進士上第簽書淮南判官秩滿例許獻文試館職安石獨不進調知鄞縣執政薦召試輒辭提江東刑召修起居注辭八九乃受遷知制誥糾在京刑獄以母憂去終英宗之世不起神宗在潁邸講官韓維吕公著數稱揚之因寤寐其人甫即位召入為翰林學士一見意合遂柄用創法更制欲致國於富彊然堅僻自信以同異為喜怒斤逐正直引用憸邪卒禍天下其為文蒼徑峻整學博識髙終不以相業廢之雜詠三首懷王自墮馬賈傅至死悲古人事一職豈敢茍然為哭死非為生吾心良不欺滔滔聲利間絳灌亦何知先生善鼓瑟齊國好吹竽操竽向齊人雅鄭亦復殊豈不得祿賜歸卧自欷歔寥寥朱絲絃老矣誰與娛日月隨天旋疾遲與天謀寒暑自有常不顧萬物求蜉蝣蔽朝夕蟪蛄疑春秋渺渺上古厯回環今幾周古詩三首少年見青春萬物皆嫵媚身雖不飲酒樂與賔客醉一從鬢上白百不見可喜心腸非故時更覺日月駛聞歡已倦往得飽還思睡春歸只如夢不復悲憔悴寄言少年子努力作春事亦勿怪衰翁衰强自然異散髮一扁舟夜長眠屢起秋水㵼明河迢迢藕花底愛此露的皪復憐雲綺靡諒無與歌絃幽獨亦可喜悲哉孔子沒千歲無麒麟蚩蚩盡鉏商此物誰能珍漢武得一角燔烹誣鬼神更以鑄黃金傳夸後世人叔孫通先生秦博士秦禮頗能熟量主欲有為兩生皆不欲草具一王儀羣豪果知肅黃金既遍賜短衣亦已續儒術自此凋何為反初服楊劉人各有是非犯時為患害唯詩以譎諫言者得無悔汾王昔監謗變雅今尚載末俗忌諱繁此理寧復在南山詠種豆議法過四罪𤣥都戲桃花母子受顛沛疑似已如此况欲諄諄誨事變故不同楊劉可為戒飯祈澤寺駕言東南遊午飯投僧館山白梅蘂長林黃栁芽短笭箵沙際來略彴桑間斷春映一川明雪消千壑漫魚隨竹影浮鳥誤人聲散玩物豈能留干時吾自懶寓言二首遊鯨厭海濁出戲清江湄風濤助翻騰網罟不敢窺失身洲渚間螻蟻乘其機物大苦易窮一窮無所歸猛虎卧草間羣鳥從噪之萬物忌强梁寧獨以其私虎終機械得鳥亦彈丸隨山雞不忤物默與鳯凰期客至當飲酒天提兩輪光環我屋角走自從紅顔時照我至白首纍纍地上土往往平生友少年所種樹磊砢行復朽古人有真意獨在無好醜冥冥誰與論客至當飲酒崑山世傳陸氏家生機雲故名崑山言生玉也玉人生此山山亦傳此名崖風與穴水清越有餘聲悲哉世所珍一出受敧傾不如鶴與猿棲息尚全生田單湣王萬乘齊走死區區燕田單一即墨掃敵如風旋舞鳥怪不測騰牛怒無前飄颻樂毅去磊砢功名傳掘葬與劓降論乃愧儒先深誠可奮士王蠋豈非賢寄吳氏女子伯姬不見我乃今始七齡家書無虛月豈異常歸寧汝夫綴卿官汝兒亦搢珽兒已受師學出藍而更青女復知女功婉嬺有典刑自吾捨汝東中父繼在廷小父數往來吉音汝每聆既嫁遂願懷孰如汝所丁而吾與汝母湯尉幸小停丘園祿一品吏卒給使令膏粱以晚食安步而車軿山泉皋壤間適志多所經汝何思而憂書每說涕零吾廬所封殖歲久愈華菁豈特茂松竹梧楸亦冥冥芰荷美花實瀰漫爭溝涇諸孫肯來遊誰謂川無舲姑示汝我詩知嘉此林坰末有擬寒山覺汝耳目熒因之授汝季季也亦淑靈要望之過我廬念子且行矣要子過我廬汲我山下泉煮我園中蔬知子有仁心不忍釣我魚我池在人境不與獱獺居亦復無蟲蛆出沒爭腐餘食罷往遊觀鱍鱍藻與蒲清波映白日擺尾揚其鬚豈魚有此樂而我與子無擊壤謡聖時自得以為娛車載板二首荒哉我中園珍果所不産朝暮惟有鳥自呼車載板楚人聞此聲莫不笑而莞而我更歌呼與之相往返視遇若摶黍好音而睍睆攘攘生死夢久知無所揀物敝則歸土吾歸其不晚歸歟汝隨我可相蒿里挽鳥有車載板朝暮嘗一至世傳鵩似梟而此與梟似唯此預人死以此有名字疑即賈長沙當時所遭值洛陽本少年擾擾經世意粗䎹方外語便釋形骸纍吾衰久捐書放浪無復事尚自不見我安知汝為異憐汝好毛羽其音亦清麗胡為太多知不默而見忌楚人既憎汝彈射將汝利且長隨我遊吾不汝羮胾謝公墩走馬白門下投鞭謝公墩昔人不可見故物尚或存問樵樵不知問牧牧不言摩挲蒼苔石㸃檢屐齒㾗想此絓長檣想此倚短轅想此玩雲月狼藉盤與樽井徑亦已沒漫然禾黍村摧藏羊曇骨放浪李白魂亦已同山丘緬懷蒔蘭蓀小草戲陳迹甘棠詠遺恩萬事付鬼籙恥榮何足論天機自開闔人理孰畔援公色無懼喜儻知禍福根涕淚對桓伊暮年無乃昏和平甫舟中望九華山楚越千萬山雄竒此山兼盤根雖巨壯其末乃修纎去縣尚百里側身勇前瞻蕭條烟嵐上縹眇浮青尖徐行稍復逼所矚亦已添精神去亹亹氣象來漸漸卸席取近岸移船傍蒼蒹窺觀坐窮晡未覺晷刻淹江空萬物息四面波瀾恬峩然九女鬟爭出一鏡奩卧送秋月沒起看朝陽暹游氛蕩無餘瑣細得盡覘凌空翠纛直照影寒鋩銛冡木立紺髮崖林張紫髯變態生倐忽雖神詎能占當留老吾身少駐誰云饜惜哉秦漢君黃屋上衡灊等之事嬉遊捨此何其亷我疑二后荒神物久已厭埋藏在雲霧不欲登昏憸又疑避褒封蔽匿以為謙或是古史書脫落簡與籖當時備巡遊今不在緗謙終南秦之望泰山魯所詹天王與秩祭爼豆羅䤈鹽茍能澤下民維此逺亦沾方今東南旱土脈燥不黏尚無膚寸功豈免竊食嫌神莽吾難知士病吾能砭文章巧傅會智術工飛箝薦寶互圭璧論材自楩柟茍以飾婦妾謬云活蒼黔豈如幽人樂兹山謝閭閻穴石作戶牖垂泉當門簾尋竒出後徑覽勝倚前簷超然往不返舉世徒呫呫髙興寄日月千秋伴烏蟾遐追商洛翁秦火不能炎近慕楚穆生竟脫楚人鉗吾意竊所尚人謀諒難僉獨卧有懷午鳩鳴春隂獨卧林壑靜微雲過一雨淅瀝生晚聽紅緑紛在眼流芳與時競有懷無與言佇立鍾山暝和吳御史汴渠鄭國欲敝秦渠成秦富彊本始意已陋末流功更長維汴亦如此浚源在淫荒歸作萬世利誰能弛其防夷門築天都橫帶國之陽漕引天下半豈云獨荆揚貨入空外府租輸陳太倉東南一百年寡老無殘糧自宜富京師乃亦窘蓋藏征求過夙昔機巧到莛芒御史閔其然志欲窮舟航此言信有激此水存何傷救世詎無術習傳自先王念非老經綸豈易識其方我懶不足數君聲方雷硠他日聽施設無乃棄篇章驊騮龍德不可係變化誰能謀驊騮亦俊物卓犖地上遊怒行追疾風忽忽跨九州轍迹古所到山川略能周鴻濛無人梯沆漭繞天浮巉巖拔青冥仙聖所止留欲往輒不能視龍乃知羞送裴如晦宰吳江震澤與天杳旁臨無際形他時散髮處最愛垂虹亭飄然平生遊捨我戴吳星欲往獨不得都門看揚舲到縣問疾苦為豫求所經當知耕牧地往往茭蒲青三江斷其二洚水何由寧微子好古者此歌尚誰聽送程公闢守洪州畫船插幟搖秋光鳴鐃傳鼓水洋洋豫章太守吳郡郎行指斗牛先過鄉鄉人出郭航酒漿炮鱉鱠魚炊稻粱芡頭肥大菱腰長釂酬喧呼坐滿牀怪君三年滯瞿塘又驅傳馬登太行纓旄脫盡歸大梁翻然出走天南疆九江左投貢與章揚瀾吹漂浩無旁老蛟戲水風助狂盤渦忽坼千丈强君聞此語悲慨慷迎吏乃前持一觴鄙州厯選多俊良鎮撫時有諸侯王拂天髙閣朱鳥翔西山蟠繞鱗鬛蒼下視城塹真金湯雄樓傑屋鬱相望中户尚有千金藏漂田種粳出穰穰沈檀珠犀雜萬商輸㵼交廣流荆揚輕裙利屣列名倡春風踏謡能斷腸平湖灣塢烟渺茫樹石珍怪花草香幽處往往聞笙簧地靈人秀古所臧勝兵可使酒可嘗十州將吏隨低昻談笑指麾回雨暘非君才髙力方剛豈能跨有此一方無為聽客欲霑裳使君謝吏趣治裝我行樂矣未渠央哭梅聖俞詩行於世先春秋國風變衰始柏舟文辭感激多所憂律吕尚可諧鳴球先王澤竭士已偷紛紛作者始可羞其聲與節急以浮真人當天施再流篤生梅公應時求頌歌文武功業優經竒緯麗散九州衆皆少鋭老則不翁獨辛苦不能休惜無采者人名遒貴人憐公青兩眸吹噓可使髙岑樓坐令隱約不見收空能乞錢助饙餾疑此有物司諸幽栖栖孔孟葬魯鄒後始卓犖稱軻丘聖賢與命相楯矛勢欲强達誠無由詩人况又多窮愁李杜亦不為公侯公窺窮厄以身投坎坷坐老當誰尤吁嗟豈即非善謀虎豹雖死皮終留飄然載喪下隂溝粉書軸幅縣無旒髙堂萬里哀白頭東望使我商聲謳杭州修廣師法喜堂浮屠之法與世殊洗滌萬事求空虛師心以此不挂物一堂收身自有餘堂隂置石雙嵽嵲石腳立竹青扶疏一來已覺肝膽豁况乃宴坐窮朝晡憶初救時勇自許壯大看俗尤﨑嶇豐車肥馬載豪傑少得志願多憂虞始知進退各有理造次未可分賢愚會將築室返耕釣相與此處吟山湖寄贈胡先生并序孔孟去世逺矣信其聖且賢者質諸書焉耳翼之先生與豫並世非若孔孟之逺也䎹薦紳先生所稱述又詳於書不待見而後知其人也歎慕不足故作是詩先生天下豪傑魁胸憶廣博天所開文章事業希孔孟不復睥睨蔡與崔十年留滯東南州飽足藜藿安蒿萊獨鳴道德驚此民民之䎹者源源來髙冠大帶滿門下奮如百蟄乘春雷惡人沮服善者起昔時蹻跖今騫回先生不試乃能爾誠令得志如何哉吾願聖帝營太平補葺廊廟支傾頽披旒發纊廣耳目照徹山谷多遺材先收先生作梁柱以次構架桷與榱羣臣面向帝深拱仰戴堂陛方崔嵬移桃花示俞秀老舍南舍北皆種桃東風一吹數尺髙枝柯蔫綿花爛熳美錦千兩敷亭皋晴溝漲春緑周遭俯視紅影移漁舠山前邂逅武陵客水際髣佛秦人逃攀條弄芳畏晼晚已見黍雪盤中毛仙人愛杏令虎守百年終屬樵蘇手我哀此果復易朽蟲來食根那得久瑶池紺絶誰見有更入花時且追酒君來酩酊相隨否桃源行望夷宫中鹿為馬秦人半死長城下避時不獨商山翁亦有桃源種桃者此來種桃經幾春採花食實枝為薪兒孫生長與世隔雖有父子無君臣漁郎漾舟迷逺近花間相見因相問世上那知古有秦山中豈料今為晉聞道長安吹戰塵春風回首一霑巾重華一去寧復得天下紛紛限南北久雨煤炲著天無寸空白沫上岸吹魚龍羲和推車出不得河伯欲取山為宫城門晝開眠百賈饑孫得糟夜哺翁老人慣事少所怪看屋箕踞歌南風杜甫畫像吾觀少陵詩為與元氣侔力能排天斡九地壯顔毅色不可求浩蕩八極中生物豈不稠醜妍巨細千萬殊竟莫見以何雕鎪惜哉命之窮顛倒不見收青衫老更斥餓走半九州瘦妻僵前子仆後攘攘盜賊森戈矛吟哦當此時不廢朝廷憂常願天子聖大臣各伊周寧令吾廬獨破受凍死不忍四海寒颼颼傷屯悼屈止一身嗟時之人死所羞所以見公像再拜涕泗流惟公之心古亦少願起公死從之遊贈曾子固曾子文章衆無有水之江漢星之斗挾才乘氣不媚柔羣兒謗傷均一口吾語羣兒勿謗傷豈有曾子終皇皇借令不幸賤且死後日猶為班與揚歲晚月映林塘淡風含笑語凉俯窺憐净緑小立佇幽香攜幼尋新菂扶衰坐野航延緣久未已歲晚惜流光定林潄甘凉病齒坐曠息煩襟因脫水邊屨就敷巖上衾但留雲對宿仍值月相尋真樂非無寄悲蟲亦好音送張宣義之官越幕會稽遊宦鄉海物錯句章土潤箭萌美水甘茶串香今君誠暫屈他日恐難忘唯有西興渡靈胥或怒張烏塘地僻居人少山稠伏獸多怒貍朝搏雁饞虎夜窺騾籬落生孫竹門庭上女蘿未應悲寂寞六載一經過欲歸水漾青天暖沙吹白日隂塞垣春錯莫行路老侵尋緑稍還幽草紅應動故林留連一杯酒滿眼欲歸心壬辰寒食客思似楊栁春風千萬條更傾寒食淚欲漲冶城潮巾髮雪爭出鏡顔朱蚤雕未知軒冕樂但欲老漁樵宿雨緑攪寒蕪出紅爭暖樹歸魚吹塘水動雁拂塞垣飛宿雨驚沙盡晴雲晝漏稀却愁春夢短燈火著征衣自白土村入北寺雨過百泉出秋聲連衆山獨尋飛鳥外時渡亂流間坐石偶成歇看雲相與還會須營一畝長此聽潺潺江上潮連風浩蕩沙引客淹留落日更清坐空江無近舟共看葭葦宅聊即稻粱謀未敢嗟艱食凶年半九州秋夜幔逗長風細窗留半月斜浮烟暝緑草泫露冷黃花獨曵緣雲䇿仍尋渡水槎歸時參夜半鄰犬靜中譁過故居􅑴筏開新屋扶輿繞故園事遺心獨寄路翳目空存野果寒林寂蠻花午簟溫難忘舊時處欲宿愧桑門與道原過西莊遂遊寶乘元豐四年十月二十四日桑楊一作麻已零落藻荇亦一作復消沈園宅在人境歲時傷我心强穿西一作南埭路共望北山岑欲覔一作與道人語跨鞍聊一尋旅思此身南北老愁見問征途地大蟠三楚天低入五湖看雲心共逺步月影同孤慷慨秋風起悲歌不為鱸發館陶促轡數殘更時聞雞一鳴春風馬上夢沙路月中行笳鼓逺多思衣裘寒始輕稍知田父穩燈火閉柴荆將次洺州憩漳上漠漠春風裏茸茸緑未齊平田鴉散啄深樹馬迎嘶地入河流曲天隨日去低髙城已在眼聊復解輕齎春日冉冉春行暮菲菲物競華鶯猶求舊友燕不背貧家室有賢人酒門無長者車醉眠聊自適歸夢到天涯寄福公道人帝力護禪林滄洲側布金樓依水月觀門接海潮音開士但軟語遊人多苦吟曾同方丈宿燈火夜沈沈崑山慧聚寺次張祐韻峰嶺互出沒江湖相吐吞園林浮海角臺殿擁山根百里見漁艇萬家藏水村地偏來客少幽興秖桑門次韻致逺木人洲迷子山前漲一洲木人圖志失編收年多但有柳生肘地僻獨無茅蓋頭河側鮑生乾尚立江邊屈子槁將投未妨他日稱居士能使君疑福可求登寶公塔倦童疲馬放松門自把長笻倚石根江月轉空為白晝嶺雲分暝與黃昏鼠搖岑寂聲隨起鴉矯荒寒影對翻當此不知誰客主道人忘我我忘言小姑小姑未嫁與蘭支何恨流傳樂府詩初學水仙騎赤鯉竟尋山鬼從文貍繽紛雲䙱空棠楫綽約烟鬟獨桂旗弄玉有祠終或往飛瓊無夢故難知詳定試卷童子常誇作賦工暮年羞悔有揚雄當時賜帛倡優等今日論才將相中細甚客卿因筆墨卑於爾雅注魚蟲漢家故事真當改新詠知君勝弱翁寄張先郎中留連山水住多時年比馮唐未覺衰篝火尚能書細字郵筒還肯寄新詩胡牀月下知誰對蠻榼花前想自隨投老主恩聊欲報每瞻髙躅恨歸遲上元戲呈貢父車馬紛紛白晝同萬家燈火暖春風别開閶闔壺天外特起蓬萊陸海中盡取繁華供俠少秖分牢落與衰翁不知太乙遊何處定把青藜獨照公寄袁州曹伯玉使君宜春城郭繞樓臺想見登臨把一杯溼溼嶺雲生竹箘冥冥江雨熟楊梅政成定入邦人詠詩就還隨驛使來錯莫風沙愁病眼不知何日為君開次韻平甫金山會宿寄親友天末海門橫北固烟中沙岸似西興已無船舫猶聞笛逺有樓臺秖見燈山月入松金破碎江風吹水雪崩騰飄然欲作乘桴計一到扶桑恨未能葛溪驛缺月昏昏漏未央一燈明滅照秋牀病身最覺風霜蚤歸夢不知山水長坐感歲時歌慷慨起看天地色凄凉鳴蟬更亂行人耳正抱踈桐葉半黃後苑詳定書懷文墨由來妙禁中家傳豈獨賦河東平生聽想風聲蚤數日追隨笑語同御水新如鴨頭緑宫花更有鶴翎紅看花弄水聊為樂不晚朝廷相弱翁次韻祖擇之登紫微閣漠漠秋隂護掖垣青雲秖在兩楹間宫樓唱罷雞人逺門闕朝歸虎士閒華蓋北瞻天帝座蓬萊東想道家山却慙久此隨諸彥文采初無豹一斑和祖仁晚過集禧觀妍暖聊隨馬首東春衫猶未著方空烟霞送色歸瑶島山水分香繞閬風壯髮已輸塵外緑衰顔漫到酒邊紅日斜歸去人間世却記前遊似夢中雨過偶書霈然甘澤洗塵寰南畝東郊共慰顔地望歲功還物外天將生意與人間霽分星斗風雷靜凉入軒窗枕簟閒誰似浮雲知進退才成霖雨便歸山寄余溫卿雲散風流不自禁天涯無路盍朋簮空馳上國青泥信誰和南山白石音平日離愁寬帶眼訖春歸思滿琴心終回一命翩翩駕獨過稽山煆樹隂與舍弟華藏院此君亭詠竹一徑森然四座凉殘隂餘韻去何長人憐直節生來瘦自許髙材老更剛曾與蒿藜同雨露終隨松柏到氷霜煩君惜取根株在欲乞伶倫學鳯凰酬净因長老樓上玩月見懷有疑君魂夢在清都之句道人心與世無求隱几蕭然在此樓坐對髙梧傾曉月看翻清露洗新秋登臨更欲邀元亮披寫還能擬惠休顧我不知天上樂虛疑昨夜夢仙遊送何聖從龍圖射䇿曾稱蜀郡雄朝廷重得漢司空應留賜席丹塗地誤責飛芻紫塞功三徑欲歸無舊業百城先至有清風潞山直與天為黨回首孫髙想見公長干寺梵館清閒側布金小塘回曲翠文深栁條不動千絲直荷葉相依萬蓋隂漠漠岑雲相上下翩翩沙鳥自浮沈羇人樂此忘歸思忍向西風學越吟送復之屯田赴成都盤礴西南江與岷石犀金馬世稱神桑麻接畛餘無地錦繡連城别有春結綬相隨通籍久推車此去辟書新知君不為山川險便忘吾家叱馭人送蕭山錢著作才髙諸彥故無嫌兄弟同時舉孝亷東觀外除方墨綬西州相見已蒼髯靈胥引水清穿市神禹分山翠入簾好去絃歌聊自慰郡人誰敢慢陶潛到舒次韻答平甫夜到江船曉解驂秋成氣象自潭潭山從樹外青爭出水向沙邊緑半涵行問嗇夫多不記坐論公瑾亦能談只愁地僻無賔客舊學從誰得指南舒州七月十一日雨行看野氣來方勇卧聽秋聲落竟慳淅瀝未生羅豆水蒼茫空失皖公山火耕又見無遺種肉食何妨有厚顔巫祝萬端曾不救只疑天賜雨工閒登中茅山翛然杖屨出塵囂雞犬無聲到泬寥欲見五芝莖葉老尚攀三鶴羽翰遙容溪路轉迷橫彴仙几風來得隨樵興罷日斜歸亦懶更磨碑蘚認前朝獨山梅花獨山梅花何所似半開半謝荆棘中美人零落依草木志士憔悴守蒿蓬亭亭孤豔帶寒日漠漠逺香隨野風移栽不得根欲老回首上林顔色空送項判官斷蘆洲渚落楓橋渡口沙長過午潮山鳥自呼泥滑滑行人相對馬蕭蕭十年長自青襟識千里來非白璧招握手祝君能强飯華簮常得從雞翹公闢枉道見過獲聞新詩因叙歎仰青丘神父能為政碧落仙翁好作詩舊事齊兒應尚記新篇楚老得先知懷甎大峴如迎日供帳閶門勝去時若與鴟夷鬬百草錦囊佳麗敵西施送鄆州知府宋諫議盛世千齡合宗工四海瞻天心初籲俊雲翼首離潛德望完圭角儀形壯陛亷徐鳴蒼玉佩盡校碧牙籖綸掖清光注鑾坡茂渥霑廟謨資石畫兵略倚珠鈐坐鎮均勞逸齊居養智恬謳謡喧井邑惠化穆蒼黔進律朝章舊疏恩物議僉通班三殿邃徙部十城兼申甫周之翰龜䝉魯所詹地靈奎宿照野沃汶河漸首路龍旗盛提封虎節嚴賜衣纒紫艾衛甲綴朱綅海谷移文省豁堂燕豆添班春回紺幰問俗卷彤襜舟楫商巖命熊羆渭水占治裝行入覲金鼎重調鹽送王補之行風忽作因題四句於舟中淮口西風急君行定幾時故園今夜月未便照相思江上江水漾西風江花脫晚紅離情被橫笛吹過亂山東梅花牆角數枝梅凌寒獨自開遙知不是雪為有暗香來偶書楊栁鳴蜩緑暗荷花落日紅酣三十六陂春水白頭想見江南出郊川原一片緑交加深樹溟溟不見花風日有情無處著初回光景到桑麻金陵即事昏黑投林曉更驚背人相喚百般鳴柴門長閉春風暖事外還能見鳥情鍾山即事澗水無聲繞竹流竹西花草弄春柔茅簷相對坐終日一鳥不鳴山更幽與北山道人蒔果疏泉帶淺山柴門雖設要常關别開小徑連松路祇與鄰僧約往還泊姚江山如碧浪翻江去水似青天照眼明喚取仙人來住此莫教辛苦上層城王安國字平甫安石弟也幼敏悟未嘗從學而文詞天成年十二逐以文章聞於世舉進士又舉茂才異等以母喪不試廬墓三年熙寧初召試賜及第除西京國子教授官滿至京師上以安石故賜對安國所言皆勸帝務德化民如漢文帝者視有才之主加一等及帝問卿兄秉政外論如何則對曰恨知人不明聚斂太急耳帝默然不悅由是别無恩命止授崇文院校書屢以新法力諫安石因謂其兄當逺侫人蓋指吕惠卿也惠卿銜之及安石罷祠惠卿引鄭俠事陷安國奪官卒年四十七讀魏世家亹亹談先王古今誰有得施為雖緒餘要在情不匿嗟彼三代後淪胥入戰國翟璜䎹一言僶俯慙李克論材稱權衡輕重無物惑吾心能如此乃可任人責夏日獨居二首竹苗敷夏隂蘿蔓蔽朝亮感此節物佳百骸適無恙委蛇投廣厦簫瑟絶遺響稍讐簡編餘俄得冠裾放身雖勢利乖心遂絃歌尚默然想聖賢游世無得喪抱關秉翟間未分棄冗長人生適意難聊各安所鄉晳晳池沼倏緑萍隨下上黳黳堂廡燕白晝容俯仰顧我一宴如環廬花藥長無材助太平得地幸閒曠稍披千古書日覺神明王乘間盼物情自適忘外奬涵濡覆載仁難廢魚麗唱黃塵洮隴戍黑霧荆衡餉奔波暍道邊畢命營邊障吾此獨何為飛潛樂相向何時聞解嚴慰彼西南望當使少陵翁得見亷恥將忘言宋國旌孝子東門毁已斃楚王好細腰後宫餒而殪物情信可憐狥外易生死身存寵可誇已矣安所恃擾擾智驚愚卑卑學阿世吹噓出虹霓頓挫入塵滓愛憎雖人為榮辱乃天使恩無斯須懷怨已塞天地百年呼吸中毫髮誰預已適者默然窺隂陽驅意氣始終本何有一息纍萬世由來適人適夙昔多如此喟余聊自針安得忘言士杭州呈勝之遊觀須知此地佳紛紛人物敵京華林巒臘雪千家水城郭春風二月花彩舫笙歌吹落日畫樓燈燭映殘霞如君援筆宜摹寫付與塵埃北客誇金明池霓旌逺逺拂樓船滿地春風錦繡筵三島路深浮閬苑九霞觴滿奏鈞天仗歸金闕浮雲外人望池臺落日邊最引平生江海趣波瀾一假草如烟和魏道輔雨中見示移病憛憛久雨中鳴騶時聽六街東忽吟佳客詩消暑逺勝前人檄愈風海運我殊慚斥鷃陸沈君合伴翔鴻更酬珠玉思談笑裹飯何須厭屢空黃梅花庾嶺時開媚雪霜梁園春色古中央莫教鶯過毛無色已覺蜂歸蠟有香弄月似浮金屑水飄風如舞麯塵場何人剩著栽培力太液池邊想菊裳送馬子山給事赴揚州都人供帳國門東淮海兵符節制中青瑣議思虛夜月朱轓游衍值秋風侯嗟誰在思張仲民喜重臨得次公內外忘懷能自適何時談笑一樽同春隂似雨非晴意思深宿酲牽率卧春隂苦憐燕子寒相並生怕梨花晚不禁薄薄簾帷欺欲透遙遙歌管壓來沈北園南陌狂無數祇有芳菲會此心元絳字厚之其先臨川危氏遷杭州易姓曰元絳五歲能詩長登進士調江寧推官知永新縣移知通州海門擢江西轉運判官知台州入為度支判官中歷轉運鹽鐵副使知福州徙廣越荆南召為翰林學士參知政事以太子太保致仕絳所至有威名而無特操工於文詞為流輩所許惟諂事王安石父子時論鄙之永新縣春風亭三年到此别無功種得桃花滿縣紅此日不能收拾去一時分付與東風盧秉元豐初官兩浙提㸃刑獄其為江南郡掾時曾題詩驛壁王安石見而稱之力薦于朝不數年致位卿二書驛舍青衫白髮病參軍旋糶黃粱置酒樽但得有錢留客醉也勝騎馬傍人門吕惠卿附字吉甫閩人初導王安石力行新法見上意稍移即叛安石以自解安石罷相退處金陵常書福建子三字於壁間蓋深悔為其所誤也答王逢原晨出趨長司跪坐與之言偶然脫齟齬相送顔色溫歸舍未休鞍簿書隨滿門相仍賔客過敧午僅朝餐平生性懶惰應接非吾真况乃重戕賊良氣能幾存就夜甫得息閲我几上文開卷未及讀睡思已昏昏自知小人歸昭昭復何云每於清夜夢多見夫子魂側耳聽髙議如飲黃金樽覺來不得往欲飛無羽翰昨日得子詩我心子先論怪我書苦遲友道宜所敦豈不旦夕思實苦案牘繁豈無同官賢未免走與奔相見鞅掌間有言無暇陳嗟嗟兹世士無食同所患念我力難任聞子處更艱久知屬之天安敢怨窶貧吾䎹君子仕行義而已焉亦將達吾義肯遂為利牽東海有滄溟西極有崑崙古來到者誰不過數子尊子已具車航吾亦為楫輪欲一送子遊不知何時然宋元詩㑹卷二十八
