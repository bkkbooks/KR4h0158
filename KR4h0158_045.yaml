body:
  text: 宋元詩㑹卷四十五兵部主事陳焯編趙蕃字昌父其先鄭州人祖暘以祕書少監提㸃信州冶坑因僑居玉山蕃用暘恩補州文學為太和主簿受知于楊萬里調辰州司理與郡守爭獄罷官人服其直始蕃受學於劉清之劉守衡州蕃乃求監安仁酒庫及至衡而清之罷蕃即丐祠從清之歸其於師友之際如此理宗即位屢召不赴以直祕閣致仕卒年八十七平生與人樂易而持已剛介不茍丞相周必大與蕃夙契屢加引薦竟不受劉宰嘗歎曰舊家典型巋然獨存者蕃一人而已小園早作今朝欣雨止天氣漸柔和籬落小桃破階除馴雀多占方移果樹帶土濯蔬科農務侵尋及吾寧久卧疴分界鋪愛直驛張安道因杉製名而驛之前有老梅一株不知安道何為捨彼而取此也杉自誰人種梅從何代栽腹空雷故擊根瘦土無培要是百年物曾經幾客來直哉雖見録清矣可遺材送王子遵赴衡陽丞王郎妙人物獨步向江東昔尉既不醉今丞寧肯聾相依唇齒國忽去馬牛風清絶官曹外何年著我同螢火渾忘生朽質直擬暮光輝解燭書幃靜能添列宿稀當風方自表帶雨忽成微變滅多無理榮枯㑹一歸上已朝來一雨快陰晴東郊百鳥間關鳴受風柳條不自惜蘸水桃花可憐生不見山陰蘭亭集况是長安麗人行東西南北俱為客且送江頭返照明劉過字改之為辛稼軒客其詞能倣辛體而詩則别有㑹心過京口放歌金焦兩山相對起不盡中流大江水一樓坐斷天中央收拾淮南數千里西風把酒閒來遊木葉漸脫人間秋關河景物異南北神京不見雙淚流君不見王勃詞華能蓋世當時未遇庸人耳翩然落拓豫章遊滕王閣中悲帝子又不見李白才思真天人時人不省為謫仙一朝放迹金陵去鳯凰臺上望長安我今四海遊將遍東歷蘇杭西漢沔第一江山最上頭天地無人獨登覽樓髙意遠愁緒多樓乎樓乎奈爾何安得李白與王勃名與此樓長突兀舟中扁舟上灘風怒惡舟入深溪雪花落我行無事有底忙且向荻花深處著鄰船乞火炮蛤蜊樽中濁醪把一巵陶陶萬事不復理凍口且吐酸寒詩遊石山信步作幽計有菴如此深佛燈明老屋秋日淡疏林柏樹祖師意松楸老子心十年棄鄉井灑淚一悲吟弔張魏公背水未成韓信陳明星已隕武侯軍平生一㸃不平氣化作祝融峰上雲樓鑰字大防明州鄞縣人隆興元年試南宫考官胡銓稱之曰此翰林才也試教官調溫州教授召入出知溫州光宗嗣位召對除考功郎擢中舍代言得體繳奏無所回避上嚴憚之光宗內禪詔出鑰手一時傳誦朱熹以論事忤韓托胄罷職鑰力爭之趙汝愚曰樓公當今人物也遷吏尚俄以顯謨閣學士提舉江州托胄誅還吏尚兼侍講年過七十精敏絶人除資政殿學士進大學士薨諡宣獻題孟東野聽琴圖因次其韻誰歟住前溪夜深清琴鳴天髙豪氣肅月斜映疏星橡林助蕭瑟泉聲激琮琤彈者人定佳能使東野聽束帶不立朝遙夜甘空庭龍眠發妙思神交窮杳冥不見彈琴人畫出琴外聲郊寒凛如對作詩太瘦生恨不從之遊撫卷空含情跋汪季路所藏修禊序永和歲癸丑羣賢㑹蘭亭流觴各賦詩風流見丹青右軍草禊序文采燦日星選文乃見遺至今恨昭明字畫最得意自言勝平生七傳到永師襲藏過金籯辨才尤祕重名已徹天庭屢詔不肯獻託言墮戎兵妙選蕭御史微服山陰行譎詭殆萬狀徑取歸神京辨才恍如失何異敕六丁文皇好已甚丁寧殉昭陵當時馮趙輩臨寫賜公卿惟此定武本謂出歐率更採擇獨稱善遂以鐫瑶瓊流傳逮五季皆在御寢扄耶律殘石晉睥睨不知名意必希世寶氊裹載輜軿帝豝既北去棄與朽壤并久乃遇知者龕置太守㕔或云政宣間此石歸紹彭又言入內府宣取恐違程焚膏繼短晷拓本手不停疊紙至三四肥瘠遂異形南渡愈難見得者輒相矜汪侯端明子嗜古自弱齡錦囊荷傾倒快覩喜失聲帶流乃古天往往字不成而獨此全好護持如有靈兀王號博雅異論誰與評硬黃極摹寫唐人若無稱贋本滿東南瑣瑣不足呈猶有婺與撫碔砆近璜珩右軍再三作已覺不稱情心摹且手追安能效筆精響搨固近似形似神不清不如參其意到手隨縱橫吳江舟中阿連久矣共一被小别愁生無夜寐風帆將我上征途回首江山日千里小舟橫卧吳江水夢回依約蕭齊裏五更漏急月黃昏鳥散一聲人未起石門洞扁舟百里連城回青山中斷立兩崖清都虎豹隱不見但見閶闔排雲開峰回失喜大飛瀑聲振萬壑驚春雷掀髯目及九霄外玉虹千丈飛空來一冬青女靳天雪不知聚此山之隈傳聞神龍卧其上寶藏擊碎真瓊瑰胸中先自無塵埃到此更覺心崔嵬天風為我噀空翠春水㵼入騷人懷謫仙曾來寫勝句劉郎又為開天台我慚筆無挽牛力醉墨滿紙誰為裁或言龍湫更竒絶佳山髙處深雲頽我方㩦笻往尋訪未知比此何如哉跋李少裴修禊序唐文皇之賜韓王有崔潤甫之題為可放若李重光撥鐙書斷然無能效之者其為真筆何疑朱徐開皇之記則已見少裴之辨開元去正觀未遠潤甫又職校定四部圖書以為最善本則真善矣辨才之本既殉昭陵今世止以定武本為第一又出歐陽率更所臨石本自應在墨蹟之下則知此本信為冠絶蓋希代寶也然考之新舊唐史崔湜弟液滌及從兄淮並有文翰居清要液至殿中侍御史液弟滌明皇用為祕書監出入禁中後賜名澄如此則液為湜之親弟而為祕書監者滌也又宰相世系表博陵安平崔氏仁師相太宗髙宗次子擢擢之子液吏部員外郎第四子挹挹之子湜相中宗湜之弟滌祕書監如此則液為湜之從弟又不為祕書監傳之與表已自不同而滌之親筆乃爾以是知作史與考古之難也因併述之乃賦長句以副少裴好古之意蘭亭修禊永和中羣賢髙㑹俱雍容右軍作序亦偶爾藁草乃致傳無窮自言疑若有神助他日屢書終不同歷代傳寶在祕府尤其甚者唐太宗當時􅊧取極心力摹本一一賜羣公惟此真蹟最竒絶蕭梁開皇有遺踪親御奎文賜元嘉龍蟠虎翥何其工辨才所取祕昭陵此本一洗凡馬空崔家兄弟列清要誨子况復稱龜龍圖書四部資校讐當時尚有正觀風自云此為最善本氷銜臣液題甚恭李王深得撥鐙法筆力絶徑雄江東右軍以來皆妙筆名勝異代如相從病餘扶憊行掃松李君攜來為發䝉平生多有舊墨本一見使我開心胸摩挲歎息不自已至寶盍入明光宫隱居懷寶正不惡異氣或能牛斗衝叩門客至勿傾倒恐有御史來乘驄錢清王千里得王大令保母甎刻為賦長句書家千載稱蘭亭蘭亭真蹟藏昭陵只今定本誇第一正觀臨寫鐫瑶瓊黃閣岡下得寶墨古人燒甎堅於石大令親書保母銘况是當時晉人刻甎雖破裂文多全妙畫遠過蘭亭鐫其間曲水悲夫字駸駸欲度驊騮前我家阿連縛虎手更得退堂方外友王君素出三槐家參坐㑹文真耐久田丁初來獻小硯尋見津津若微溜細看背刻晉獻之永和倣佛在旁右亟訪田家叩所從始知墓崩隨意收大甎支牀得前假掀倒浮屠全尾首字為十行行十二百十有七三字漏交螭方壺不復見貞石摧藏松亦朽我得此碑喜不寐摩挲三歎歎未有興寧甲子十四周更閲三年仍乙丑若非洞曉未來數安知八百餘年後坡翁應未見此志金彈之銘何絶類人知文章有暗合智者所見略相似二王遺蹤無所遺誰知地下此假竒三君共為成勝事至寶呈露端有時越山盤屈獻與羲付與兒孫世守之煩君更為護幽竁或恐意如猶有知徐淵子號竹隱天台人有詩名與戴復古同里復古初從徐學詩再登陸放翁之門其淵源如此九日衰容不似秋容好坐上誰憐老孟嘉牢裹烏紗莫吹却免教白髮見黃花買硯俸餘擬辦買山錢邦買端州古硯甎依舊被他驅使在買山之事定何年戴復古字式之天台黃巖人父號東臯子工詩見前復古奉遺言收拾殘稿遂刻苦聲律繼以詩名東南名山川遊歷幾遍歸老委羽之下所居南塘有石屏遂以自號焉求先人墨蹟呈表兄黃季文我翁本詩仙遊戲滄海上引手掣鯨鯢失腳墮塵網身窮道則腴年髙氣彌壯平生無長物飲盡千斛釀傳家古錦囊自作金玉想篇章久零落人間眇餘響摉求二十年痛淚濕黃壤君家圖書府墨色照青嶂我翁有遺迹數紙古田樣髣佛鍾王體吟句更豪放把玩竹林間風寒凜悽愴昂昂野鶴姿愧無中散狀兒孤襁褓中家隨風掃蕩於兹見筆法可想翁無恙幽居寂寞鄉風月共來往衆醜成獨妍羣瘖怪孤唱一生既蹉跎人琴遂俱喪託君名不朽斯文豈天相舊作忽新傳識者動慨賞嗟豫忝厥嗣朝夕愧俯仰敢墜顯揚思幽光發草莽假此見諸公丐銘松柏壙君其啓惠心慰彼九泉望夢中亦役役半夜羣動息五更百夢殘天雞啼一聲萬枕不遑安一日一百刻能得幾刻閒當其閒睡時作夢更多端窮者夢富貴逹者夢神仙夢中亦役役人生良鮮歡答婦詞舊嘗和彥先婦答夫二首故復賦此篇江山阻且長矯首鄉關隔空閨泣幼婦憔悴失顔色隱閔鸛鳴篇寄彼西飛翼剝封覽情素既喜復悽惻别時梅始花傷今食梅實覽古帝王州結交遊俠窟千金沽美酒一飲連十日春風吹酒醒始知身是客杜宇啼一聲行人淚橫臆衣破誰與紉髮垢孰與櫛勿謂遊子心而不念家室新交握臂行肝膽猶楚越醜婦隔江山千里情弗絶殷勤揮報章歸計何時決今夕知何夕睹此纎纎月此月再圓時門前候歸一作車轍大熱三首天地一大窰陽炭烹六月萬物此陶鎔人何怨炎熱君看百榖秋亦自暑中結田水沸如湯背汗濕如潑農夫方夏耘安坐吾敢食大渴遇甘泉汲多井欲竭入喉化為汗不救胸中熱吾聞三危露逈與衆水别其色瑩琉璃其冷勝氷雪安得一杯來為我解此渴天嗔吾面白晒作鐵色深天能黑我面豈能黑我心我心有氷雪不受暑氣侵推去北窗枕思鼓南風琴千古呌虞舜遺我以好音祝二嚴僕本山野人漁樵共居處小年學父詩用心亦良苦摉索空虛腹綴緝艱辛語糊口走四方白頭無伴侣前年得嚴粲今年得嚴羽我自得二嚴牛鐸諧鍾吕粲也苦吟身束之以簪組遍參百家體終乃師杜甫羽也天姿髙不肯事科舉風雅與騷些歷歷在肺腑持論傷太髙與世或齟齬長歌激古風自立一門户二嚴我所敬二嚴亦我與我老歸故山殘年能幾許平生五百篇無人為之主零落天地間未必是塵土再拜祝二嚴為我收拾取頻酌淮河水有客遊濠梁頻酌淮河水東南水多鹹不知此水美春風吹緑波鬱鬱中原氣莫向北岸汲恐有英雄淚元宵雨窮人不謀歡元夜如常時晴雨均寂寞早與一睡期朱門粲燈火歌舞臨酒池酒闌歡不足九街恣遊嬉前呼驚市人簫鼓逐後隨片雲頭上黑翻得失意歸琵琶行潯陽江頭秋月明黃蘆葉底秋風聲銀龍行酒送歸客丈夫不為兒女情隔船琵琶自愁思何預江州司馬事為渠感激作歌行一寫六百六十字白樂天白樂天平生多為逹者語到此胡為不釋然弗堪謫宦便歸去廬山政接柴桑路不尋黃菊伴淵明忍泣青衫對商婦伏龍山民宋正甫湖山清隱乃唐山人陳陶故圃曾景建作記俾僕賦詩故人昔住金華峰面帶雙溪秋水容故人今住伏龍山陳陶故圃茆三間千載清風徐孺子門前共此一湖水百花洲上萬垂楊白鷗羣裏歌滄浪故人心事孺子髙故人詩句今陳陶短衣飯牛不逢堯何如繡鞍上著錦宫袍瓦盆對客酌松醪何如紫霞觴泛碧葡萄豆萁然火度寒宵何如玉堂夜照金蓮膏吟成禿筆寫芭蕉何如沈香亭北醉揮毫再三問君君不對目送飛鴻楚天外細讀山中招隱篇超然意與烟霞㑹照影湖邉雙鬢皓此計知之悔不早三椽可辦願卜鄰荷鍤相隨種瑶草詰燕去年汝來巢我屋梁間汙泥髙一尺啄腥拋穢不汝厭生長羣雛我護惜家貧惠愛不及人自謂于汝獨有力不望汝如靈蛇銜寶珠雀獻金環來報德春風期汝一相顧對語茅簷慰岑寂如何今年來於我絶蹤跡一貪簾幕畫堂間便視吾廬為棄物寄趙鼎臣學如劉子政不使校書天祿閣文如李太白不使待詔金鑾殿倚樓終日看廬山贏得虛名聞九縣才忌太髙心忌太清平平穩穩為公為卿騏驥可羈乃歸帝間麟鳯莫馴為瑞人間人間為瑞徒能好騏驥可羈終遠到歲寒心事幾人知手把梅花供一笑秋懷紅葉無人掃黃花獨自妍聽談天下事愁到酒樽前水濶終非海樓髙不到天昔人已懷古况復後千年水陸寺長沙沙上寺突兀古樓臺四面水光合一邉山影來靜分僧榻坐晚趂釣船回明日重相約前村訪早梅歲暮呈真翰林歲事朝朝迫家書字字愁頻沽深巷酒獨倚異鄉樓詩骨梅花瘦歸心江水流狂談渺無際忍看大刀頭淮上春日邉寒客衣薄漸喜暖風回社後未聞燕春深方見梅壯懷頻撫劍孤憤强銜杯北望山河語天時不再來題張簽判園林園圃屋東西從君一杖藜雨寒花蕊瘦春重桞絲低亭館常留客軒窗總傍溪摩挲雪色壁安得好詩題劉興伯黃希宋蘇希亮慧力寺避暑何處避炎熱相期過寶坊萬松深處坐六月午時凉鐘磬出深屋江山界短墻醉來歸興懶留宿贊公房黃道士出爻林屋何瀟灑權為羽士家客來多載酒僧至自煎茶試墨題新竹攜笻數落花飲中忙過日無暇問丹砂陳伯可山亭梯險登霞外乘流過竹西寒溪隨雨漲髙閣與雲齊雙鶴有時舞孤猿何處啼清吟無盡興白石可留題沈莊可號菊花山人即其所言老貌非前日清吟似舊時已無藏酒婦幸有讀書兒連歲修茆屋三秋繞菊籬寒儒有竒遇太守為刋詩訪陳與機縣尉于湘潭下攝市清談守風節當官若隱居自稱為漫尉人道是迂儒俸外無炊米公餘但讀書王門多貴戚道眼視如無題趙庶可山臺天造此一景超然闤闠間坐分臺上石看盡越中山松月照今古樵風送往還只愁軒冕出閒却白雲關姪淑遠遊不得書客夢江湖遠窮居骨肉離尺書無寄處中夜不眠時念爾衣裘薄滿懷風露悲狂遊斷消息深負竹林期歸來兒子創小樓以安老者老去知無用歸來得自如幾年眠客舍今日愛吾廬處世無長䇿閒時讀故書但能營一飽渾莫問其餘一笑海曲荒凉地吟邉蹭蹬身時危法當隱年老慣居貧俗客苦戀坐小孫癡弄人等閒成一笑不覺把杯頻題姪孫豈潛家平遠圖好山橫遠碧平野帶林塘四望耕桑地幾年雲水鄉海天龍上下秋日鶴翺翔覩物忽有感無心住草堂舟中艤櫂河梁畔推篷得句新雲為山態度水借月精神密樹藏飛翮平波見躍鱗饑年村落底也有醉歸人送曉山夏肯甫入京歲月頻看鏡功名一據鞍勿言行路惡有志戀家難芳草客程遠落花春夜寒江湖舊時夢相逐到長安辛丑歲暮臘盡無多日吾生有幾年老于人事懶貧覺世情偏獨枕江湖夢閉門風雪天三杯動詩興得句落梅邉姪孫子淵新居落成一區揚子宅中有讀書堂早覺儒風好兼看野趣長藩籬帶花竹里巷接農桑安得茆三架為鄰住汝傍雁山總題此山本朝方顯幾山兼幾水更有幾烟霞不立仙人宅都為釋氏家賔秋多少雁報曉一雙鴉有此山林勝如何在海涯淨明林巒相掩映巖谷獨玲瓏下置維摩室上通龍伯宫靈珠四時雨秋水一簾風甚欲觀新月山高腳力窮新月谷在上高不可登風雨無憀中覽鏡有感作小詩未有斷句適兩姪孫攜詩卷來覽鏡忽增感誰能寫我真崚嶒忍饑面蹭蹬苦吟身風葉飄零夜雨花狼藉春相過慰牢落吾族有詩人壬寅除夜今夕知何夕滿堂燈燭光杜陵分歲了賈島祭詩忙橫笛梅花老傳杯柏葉香明朝賀元日政恐雨相妨送王仲彛制機宰瀏陽一身供世用六月赴官忙當此炎天熱知君心地凉吏能師卓魯縣界接瀟湘試飲瀏陽水清清滋味長訪西澗王深道諸王居處僻古屋滿山坡傳到宋淳祐來從晉永和詩書歷年久名勝結交多一澗流芳潤滔滔秋水波石洲遇陳季申話舊緑樹挂烏帽清波照白頭合隨秋燕去那作賈胡留紅吐檳榔唾香熏茉莉毬樽前話疇昔一笑不能休夜吟呈趙東巖汲泉潄殘酒行吟到夜分一軒清似洗萬籟寂無聞風送迎秋雨天收翳月雲雞鳴庭户白人事又紛紛飲蕭和伯家醉登快閣和揚伯子題分明觀韻醉歸蕭史宅快閣倚西東山斂過雲雨江無起浪風月行銀漢上人在玉壺中天眼照塵世應憐鶴髮翁吳門訪舊去此十三秋重來雪滿頭鏡顔加老醜詩骨帶窮愁鳥語新晴樹人尋舊倚樓藏春門下客一半落山丘鄂州戎治靜憩亭幽亭何處尋巖樹碧森森獨坐生雲石少安輕世心伴人雙鶴立多事一蟬吟提劍翻然起中原秋草深江上江上維舟穩人間行路難數朝花雨細一夜社風寒燕語能留客蛙鳴豈為官苦吟成底事贏得瘦團欒上封樓臺逼霄漢窗戶納雲霓回顧千巖路如登萬仞梯泉從山頂出雪壓樹頭低高絶無人境非僧不可栖世事世事直如夢人生不肯閒利名雙轉轂今古一憑欄春水渡旁渡夕陽山外山吟邊思小范共把此詩看冬日移舟入峽避風櫂入黃蘆浦驚飛白鷺羣霜華濃似雪水氣盛於雲市遠炭增價天寒酒䇿勳同舟有佳士擁被共論文光澤溪上艤櫂西嵒下舟人語夜䦨風林無鳥宿石窟有龍蟠月色連沙白灘聲入夢寒曉來新得句寄與故人看趙景賢送荔枝荔子固多種色香俱不同新來嘗小緑又勝擘輕紅大嚼思千樹分甘僅一籠嘗觀蔡公譜夢想到莆中得古梅兩枝老幹百年久從教花事遲似枯元不死因病反成竒玉破稀疏蘂苔封古怪枝誰能知我意相對歲寒時貧作負恩人為何宏甫作九陌塵中事三生石上身狂為好詩客貧作負恩人十載江村别扁舟塗水濵音書久不至得夢往來頻濠州春日呈趙教授體國桞似眠初起梅雖老可觀氷開春水活風暖雪泥乾得酒忘為客談詩不論官無人知此意一笑對黃冠鄭南夫雲林隱居一來陪勝踐再到惜蹉跎記得山中景行尋竹外坡天寒梅信早海近鴈聲多煙渚蒲洲外時聞欸乃歌見名園荒廢有感喬木無留影殘花尚假妍荒池蛙叫噪破屋燕周旋富貴偏多事風流得幾年墻東有寒士書種世相傳題董侍郎山園行盡芙蓉徑尋秋扣竹關樓高納萬象木落見羣山平野水雲際畫橋煙雨間紅塵城下路只隔一湖灣寄湖州楊伯子監丞宛如公幹卧漳濵枕上窮吟過一春遣病每懷詩眷屬訪醫因問藥君臣鑽龜小卜占灾數覽鏡羸形類别人寄語霅川賢太守新詩莫厭話愁頻梅孤標粲粲壓羣葩獨占春風管歲華幾樹參差江上路數枝裝㸃野人家氷池照影何須月雪岸聞香不見花絶似林間隱君子自從幽處作生涯寄復齊陳寺丞豈說從來用處難出乘五馬看廬山鳯凰覽德下千仞虎豹憎人上九關持論太高天動色憂時未老鬢先斑平生風節誰其似汲黯朱雲伯仲間李季允侍郎舟中憶昨楓橋既語離何期千里又相隨太湖不見鴟夷子秋浦同尋杜牧之燈火船窗深夜話江山客路早冬詩人間草木空無數除却梅花莫我知廬山擁鼻行吟上下廊今宵又宿贊公房松搖半夜風聲壯桂染中秋月色香白石清泉聞笑語名山大澤出文章老夫甘作無名者不逐紛紛舉子忙夜宿田家簦笠相隨走路岐一春不換舊征衣雨行山崦黃泥坂夜扣田家白板扉身在亂蛙聲裏睡心從化蝶夢中歸鄉書十寄九不逹天北天南雁自飛題何季湧江亭勝槩何妨近市㕓紅塵疏處著三椽數重青嶂橫天末一道澄江在眼前海浪浴紅朝出日樹林堆碧晚生烟請君分付堤邊石莫使漁翁來繫船思歸吟詩不換校書郎但欲封侯管醉鄉疏懶無成嵇叔夜清狂似逹賀知章安貧不怕黃金盡既老從教白髮長百計不如歸去好子孫相對說農桑長沙呈趙東巖運使併簡幕中楊唯叔通判諸丈日暮遠塗行未休白頭又作長沙遊湘江一㸃不容俗嶽麓四時皆是秋香草汀洲付騷客紅蓮幕府聚名流吟邊萬象寫不得上有風流趙倚樓諸葛仁叟縣丞極貧能保風節有權貴招之不屑其行時人誰識老聾丞滿口常談杜少陵俗輩衆多吾輩少素交零落利交興權門炙手炎如火詩社投身冷似氷堪笑老天無老眼相知賴有竹林僧飲中布衣肯換錦宫袍刺骨清寒氣自豪腹有别腸能貯酒天生左手慣持螯蠅隨驥尾宜千里鶴在雞羣亦九臯賢似屈平因獨醒不禁憔悴賦離騷癖習平生癖習未全除虛事驚心實事疏為惜落花慵掃地每看修竹欲移居逢人共作亡何飲撥冗時觀未見書爭奈一貧隨我在思量不若把犁鉏括蒼石門瀑布少泊石門觀瀑布明知是水却疑非亂拋雪玉從天下散作雲煙到地飛夜聽蕭蕭洗塵夢風吹細細濕人衣謝公蠟屐經行處聞有留題在翠微滕王閣次韻劉允叔消遣客愁尋勝事酒杯詩卷得同攜當年傑閣棲龍子今日空梁落燕泥斜照浴紅秋水上好山橫碧畫欄西幾人登覽皆磨滅唯有前峰壓不低竹洲諸姪孫小集永嘉蔣子高有詩次韻美景能兼樂事難愁來唯仗酒遮攔昻藏病骨兼詩瘦料峭春風帶臘寒喬木尚疑前輩在好花應笑老人看忍拋明月先歸去輸與諸郎徹夜歡思歸躬耕海上奈無田乍可經營買釣船未有人供令狐米欲從鬼借尉遲錢回頭歸路三千里藉手還鄉五百篇幸遇太平時節好白雲深處了殘年遇張韓伯說邊事每上高樓欲斷魂沿江市井幾家存飛鴻歷歷傳邊信芳草青青補燒㾗北望苦無多世界南來别是一乾坤相逢莫說傷心事且把霜螯薦酒樽聞時事昨報王師奏凱還近聞北顧一時寬淮西勳業歸裴度江右聲名屬謝安夜雨忽晴看月好春風漸老惜花殘事關氣數君知否麥到秋時天又寒靈洲梅花穿林傍水幾平章合有春風到草堂自入冬來多是暖無尋花處却聞香枝南枝北一輪月山後山前兩屐霜直看過年開未了醉吟且放老夫狂湖廣李漕革夫大卿飲客西湘湘亦作湖管領風光此㑹稀坐中賔客總能詩神仙有洞人難見山水當軒看轉竒春不再生陶侃柏人來多打李雍碑因思屈賈傷今古國有忠臣無用時江行借得茅樓一倚欄見成詩句滿江天歸鴉啼處客投宿野鴨飛邊人上船老眼尚嫌隨物轉閒心可惜被貧牽平生錯做功名夢金印何如一作須二頃賢京口遇薛野鶴天下江山第一州可能無地著詩流黃金不愛買官職白髮猶堪上酒樓懊恨牡丹遭雨厄叮嚀芍藥為春留狂吟有禁風騷歇語燕啼鶯代唱酬秋日病餘桂子吹香風露深老夫吟了聽蟬吟秋來賸有行山興病後全無涉世心詩苦積成雙白髮酒豪輕用萬黃金平生意氣今如許獨抱傳家一破琴黃州竹樓呈謝國正每日黃堂事了時一心惟恐上樓遲發揮天地讀周易管領江山歌杜詩切戒吏來呈簿厯常邀客至共琴碁風流太守誰其似半似元之半牧之家居復有江湖之興寒儒家舍只尋常破紙窗邊折竹牀接物罕逢人可語尋春多被雨相妨庭垂竹葉因思酒室有蘭花不炷香到底閉門非我事白鷗心性五湖傍杜仲高相遇約李尉胸中無地著塵埃有手唯堪把酒杯苦恨好山移不得生憎俗客去還來秋風吹老東籬菊春信攙開北嶺梅管領風光須我輩急吹短笛櫂船回送别朱兼僉恰喜相逢又語離愁于江上送君時清談未了風吹斷白髮可憐天不知樗木自肥傷竹瘦海棠偷放笑梅遲黃堂若問癡頑老新有登樓十二詩新安寒食不擬今年到歙州要知行止豈人謀一百五日客懷惡三十六峰春雨愁老矣此身猶道路凄其歸夢繞松楸花瓢仙子無由見千里江山負遠遊鄂渚煙波亭倚遍南樓更鶴樓小亭瀟灑最宜秋接天煙浪來三峽隔岸樓臺又一州豪傑不生機事息古今無盡大江流憑欄日暮懷鄉國崔皓詩中舊日愁湘中遇翁靈舒天台山與雁山鄰只隔中間一片雲一片雲邉不相識三千里外却逢君釣臺萬事無心一釣竿三公不換此江山平生誤識劉文叔惹起虛名滿世間寄後村劉潛夫朝廷不召李功甫翰苑不著劉潛夫天下文章無用處奎星夜夜照江湖宋元詩會卷四十五
