body:
  text: 宋元詩㑹卷二十四兵部主事陳焯編黃庭堅下送舅氏野夫之宣城李莘二首籍甚宣城郡風流數貢毛霜林收鴨腳春網薦琴髙共理須良守今年輟省曹平生割雞手聊試發硎刀試說宣城郡停杯且細聽晚樓明宛水春騎蔟昭亭𥝧稏豐墟户桁楊卧訟庭謝公歌舞處時對換鵝經次韻答髙子勉近日坊選將此詩又入東坡集中君不居郎省還應上諫坡才髙殊未識歲晚喜無它櫪馬羸難出鄰雞凍不歌寒爐餘幾火灰裏撥隂何呻吟齊睡起二首棐几坐清晝博山凝妙香蘭芽依客土柳色過鄰牆巷僻過從少官閒氣味長江南一枕夢髙卧聽鳴榔牆下蓬蒿地兒童課剪除蔓萵隨分種杞菊未須鋤河水傳烽火交州報捷書無能落閒處慙愧飽春蔬次韻王定國揚州見寄清洛思君晝夜流北歸何日片帆收未生白髮猶堪酒垂上青雲却佐州飛雪堆盤鱠魚腹明珠論斗煮雞頭平生行樂自不惡豈有竹西歌吹愁寄黃幾復我居北海君南海寄雁傳書謝不能桃李春風一杯酒江湖夜雨十年燈持家但有四立壁治病不蘄三折肱想得讀書頭已白隔溪猿哭瘴溪藤寄上叔父夷仲少年有功翰墨林中歲作吏幾陸沈庖丁解牛妙世故監市履狶知民心萬里書來兒女瘦十月山行冰雪深夢魂和月繞秦隴漢節落毛何處尋次韻宋楙宗三月十四日到西池都人盛觀出遊金狨繫馬曉鶯邊不比春江上水船人語車聲喧法曲花光樓影倒晴天人間化鶴三千歲海上看羊十九年還作遨頭驚俗眼風流文物屬蘇仙次韻楊君全送酒扶衰却病世無方唯有君家酒未嘗秋入園林花老眼茗摉文字響枯腸醡頭夜雨排簷滴杯靣春風繞鼻香不待澄清遣分送定知佳客對空觴和高仲本喜相見雨昏南浦曾相對雪滿荆州喜再逢有子才如不羈馬知公心是後雕松閒尋書册應多味老傍人門似更慵何日晴軒觀筆硯一尊相屬要從容湖口人李正臣蓄異石九峯東坡先生名曰壺中九華并為作詩後八年自海外歸過湖口石已為好事者所取乃和前篇以為笑實建中靖國元年四月十六日明年當崇寧之元五月二十日庭堅繫舟湖口李正臣持此詩來石既不可復見東坡亦下世矣感歎不足因次前韻有人夜半持山去頓覺浮嵐暖翠空試問安排華屋處何如零落亂雲中能回趙璧人安在已入南柯夢不通賴有霜鐘難席卷袖椎來聽響玲瓏奉答固道平生湖海漁竿手强學來操製錦刀末俗相看終眼白古人不見想山髙未乘春水歸行李倘得閒官去坐曹自是無能欲樂爾煩君錯為歎賢勞次韻公秉子由十六夜憶清虛九陌無塵夜際天兩都風物各依然車馳馬逐燈方閙地靜人閒月自妍佛館醉談懷舊歲齊宮詩思鎖今年但聞公子微行去門外驊騮立繡韉謝王烟之惠茶平生心賞建溪春一丘風味極可人香包解盡寶帶胯黑面碾出明窗塵家園鷹爪改嘔冷官焙龍文常食陳於公歲取壑源足勿遣沙溪來亂真徐孺子祠堂喬木幽人三畝宅生芻一束向誰論藤蘿得意干雲日簫鼓何心進酒樽白屋可能無孺子黃堂不是缺陳蕃古人冷淡今人笑湖水年年到舊痕池口風雨留三日孤城三日風吹雨小市人家只菜蔬水逺山長雙屬玉身閒心苦一舂鋤翁從旁舍來收網我適臨淵不羡魚俯仰之間已陳迹暮窗歸了讀殘書思親汝州作歲晚寒侵遊子衣拘留幕府報官移五更歸夢三百里一日思親十二時車上吐茵元不逐市中有虎竟成疑秋毫得失關何事總為平安書到遲衝雪宿新寨忽忽不樂縣北縣南何日了又來新寨解征鞍山銜斗柄三星沒雲共月明千里寒小吏有時須束帶故人頗問不休官江南長盡梢雲竹歸及春風斬釣竿郭明父作西齊于潁尾請豫賦詩食貧自以官為業聞說西齊意凛然萬卷藏書宜子弟十年種木長風烟未嘗終日不思潁想見先生多好賢安得雍容一樽酒女郎臺下水如天戲詠江南土風十月江南未得霜髙林殘水下寒塘飯香獵户分熊白酒熟漁家擘蟹黃橘摘金苞隨驛使禾舂玉粒送官倉踏歌夜結田神社遊女多隨陌上郎和答孫不愚見贈詩比淮南似小山酒名麴米出雲安且憑詩酒勤春事莫愛兒郎作好官簿領侵尋台相筆風埃蓬勃使星鞍小臣才力堪為掾敢學前人便挂冠次韻裴仲謀同年交蓋春風汝水邉客牀相對卧僧氊舞陽去葉才百里賤子與公俱少年白髮齊生如有種青山好去坐無錢烟沙篁竹江南岸輸與鸕鷀取次眠稚川約晚過進叔次前韻贈稚川并呈進叔人騎一馬鈍如蛙行向城東小隱家道上風埃迷皂白堂前水竹湛清華我歸河曲定寒食公到江南應削瓜樽酒光隂俱可惜端須連夜發園花同世弼韻作寄伯氏在濟南兼呈六舅祠部學士山光掃黛水挼藍聞說樽前愜笑談伯氏清修如舅氏濟南蕭灑似江南屢陪風月乾吟筆不解笙簧醉舞衫只恐使君乘傳去拾遺今日是前銜次韻蓋郎中率郭郎中休官二首仕路風波雙白髮閒曹笑傲兩詩流故人相見自青眼新貴即今多黑頭桃葉柳花明曉市荻芽蒲筍上春洲定知老健休官去酒户家園得自由世態已更千變盡心源不受一塵侵青春白日無公事紫燕黃鸝俱好音付與兒孫知伏臘聽教魚鳥逐飛沈黃公壚下曾知味定是逃襌入少林次韻答柳通叟求田問舍之詩少日心期轉繆悠蛾眉見妒且障羞但令有婦如康子安用生兒似仲謀橫笛牛羊歸晚徑捲簾瓜芋熟西疇功名可致猶回首何况功名不可求謝送宣城筆宣城變樣蹲一作尊雞距諸葛名家埓一作捋鼠鬚一束喜從公處得千金求買市中無漫投墨客摹科斗勝與朱門飽蠧魚愧我初非草𤣥手不將閒寫吏文書次韻寅菴二首兄作新菴接舊居一原風物萃庭隅陸機招隱方𫝊洛張翰思歸正在吳五斗折腰慚僕妾幾年合眼夢鄉閭白雲行處應垂淚黃犬歸時蚤寄書大若塘邉獨網魚小桃源口帶經鋤詩催孺子成雞栅茶約鄰翁掘芋區苦楝狂風寒徹骨黃梅細雨潤如酥此時睡到日三丈自起開關招酒徒和師厚郊居示里中諸君籬邊黃菊關心事窗外青山不世情江橘千頭供歲計秋蛙一部洗朝酲歸鴻往燕競時節宿草新墳多友生身後功名空自重眼前樽酒未宜輕次韻胡彥明同年羇旅京師寄李子飛看除日月坐中銓一歲應無官九遷蔥韭盈盤市門食詩書滿枕客牀氊留連節物孤朋酒惱亂鄰翁謁子錢誰料丹徒布衣侶困窮且忍試新年出迎使客質明放船自瓦窑歸鼓吹喧江雨不開丹楓落葉放船回風行水上如雲過地近嶺南無雁來樓閣人家捲簾幕菰蒲鷗鳥樂灣洄惜無陶謝揮斤手詩句縱橫付酒杯題安福李令朝華亭丹楹刻桷上崢嶸表裏江山落眼平曉日成霞張錦綺青林多露綴珠纓人如旋磨觀羣蟻田似圍碁據一枰對案昏昏迷簿領暫來登覽見髙明寄舒申之戶曹吉州司戶官雖小曾屈詩人杜審言今日宣城讀書客還趨手版傍轅門江山依舊歲時改桃李欲開烟雨昏公退但呼紅袖飲剩傳歌曲教新翻奕碁一首呈任公漸偶無公事客休時席上談兵校一作角兩碁心似蛛絲遊碧落身如蜩甲化枯枝湘東一目誠甘死天下中分尚可持誰謂吾徒猶愛日參橫月落不曾知秋懷秋隂細細壓茅堂吟蟲啾啾作夜凉雨開芭蕉新間舊風撼篔簹宫應商砧聲已急不可緩簷景既短難為長狐裘斷縫棄牆角豈念晏歲多繁霜四月末天氣陡然如秋遂御夾衣遊北沙亭觀江漲沙岸人家報急流船官解纜正夷猶震雷將雨度絶壑逺水粘天吞釣舟甚欲去揮白羽箑可堪更著紫茸裘平生得意無人㑹浩蕩舂鋤且自由趙令許載酒見過玉馬何時破紫苔南溪水滿緑徘徊買魚斫鱠須論網撲杏供盤不數枚廣漢威名知訟少平原樽爼費詩催草𤣥寂寂下簾幕稍得閒時公合來登南禪寺懷裴仲謀茅亭風入葛衣輕坐見山河表裏清歸燕略無三月事殘蟬猶占一枝鳴天高秋樹葉公邑日暮碧雲樊相城别後寄詩能慰我似逃空谷聽人聲夏日夢伯兄寄江南故園相見略雍容睡起南窗日射紅詩酒一年談笑隔江山千里夢魂通河天月暈魚分子槲葉風微鹿養茸幾度白沙青影裏審聽嘶馬自搘笻一作白髮倚門愁絶處可堪衣斷去時縫同孫不愚過昆陽田園恰恰值春忙驅馬悠悠昆水陽古廟藤蘿穿戶牖斷碑風雨碎文章真人寂寞神為社堅壘委蛇女採桑拂帽村帘誇酒好為君聊解一瓢嘗題雙鳬觀飄蕭閲世等虛舟歎息眼前無此流滿地悲風盤翠竹半叢寒日破紅榴青山空在衣冠古白鶴不歸宮殿秋王令平生樽酒地千年萬歲想來遊雪中連日行役戲書簡同僚簡書催出似驅雞聞道饑寒滿屋啼炙背宵眠榾柮火嚼冰晨飯薩波虀風如利劍穿狐腋雪似流沙飲馬蹄官小責輕聊自慰猶勝擐甲去征西客自潭府來稱明因寺僧作靜照堂求豫作客從潭府渡河梁藉甚傳誇靜照堂正苦窮年對塵土坐令合眼夢湖湘市門曉日魚蝦白鄰舍秋風橘柚黃去馬來舟爭歲月老僧元不下繩牀喜念四念八至京朔雪蕭蕭映薄幃夢回空覺淚痕稀驚聞庭樹鳥烏樂知我江湖鴻雁歸拂榻喜開姜季被上堂先著老萊衣酒樽烟火長相近酬勸從今更不違謫居黔南五首相望六千里天地隔江山十書九不到何用一開顔霜降水反壑風落木歸山冉冉歲華晚昆蟲蚤閉關冷淡病心情暄和好時節故園音信斷逺郡親賔絶山郭燈火稀峽天星漢少年光東流水生計南枝鳥𡨕心齊近逺委順隨南北歸去誠可憐天涯住亦得題鄭防畫冊惠崇烟雨歸雁坐我瀟湘洞庭欲喚扁舟歸去故人言是丹青有惠江南帳中香者戲作螺甲割崑崙耳香材屑鷓鴣斑欲雨鳴鳩日永下帷睡鴨春閒病起荆江亭即事六首維摩老子五十七天子大聖初元年傳聞有意用幽側病著不能朝日邉司馬丞相昔登庸招用元老超羣公楊綰當朝天下喜斷碑零落卧秋風文章韓杜無遺恨草詔陸贄傾諸公玉堂端要真學士須得儋州秃鬢翁閉門覓句陳無已對客揮毫秦少游正字不知溫飽未西風吹淚古藤州張子耽酒語蹇吃聞道潁州又陳州形模彌勒一布袋文字江河萬古流魯中狂士邢尚書本意扶日上天衢惇夫若在鐫此老不令平地生﨑嶇謝答聞善二兄二首公擇醉面桃花紅人百忤之無愠容莘老夜闌傾數斗焚香默坐日生東李公擇尚書孫莘老中丞陶令舍中有名酒無夕不為父老傾四坐歡欣觀酒德一燈明暗又詩成戲贈米元章二首萬里風帆水著天麝煤鼠尾過年年滄江靜夜虹貫月定是米家書畫船我有元暉古印章印刓不忍與諸郎虎兒筆力能扛鼎教字元暉繼阿章往歲過廣陵值蚤春嘗作詩云春風十里珠簾捲髣佛三生杜牧之紅葉梢頭初繭栗揚州風動鬢成絲今春有自淮南來者道揚州事戲以前韻寄王定國淮南二十四橋月馬上時時夢見之想得揚州醉年少正圍紅䄂寫烏絲從張仲謀乞蠟梅聞君寺後野梅發香蜜染成官樣黃不擬折來遮老眼欲知春色到池塘雨中登嶽陽樓望君山二首投荒萬死鬢毛斑生入瞿塘灔澦關未到江南先一笑嶽陽樓上對君山滿川風雨獨憑欄綰結湘娥十二鬟可惜不當湖水面銀山堆裏看青山寄賀方回少游醉卧古藤下誰與愁眉唱一杯解作江南斷腸句只今唯有賀方回戲答王子豫送凌風菊病來孤負鸕鷀杓禪板蒲團入眼中浪說閒居愛重九黃花應笑白頭翁和陳君儀讀太真外傳三首扶風喬木夏隂合斜谷鈴聲秋夜深人到愁來無處㑹不關情處總傷心梁州一曲當時事記得曾拈玉笛吹端正樓空春晝永小祧猶學淡燕支髙麗條脫雕紅玉邏逤琵琶撚緑絲蛛網屋煤昏故物一作脂澤歇此生唯有夢來時夜發分寧寄杜澗叟陽關一曲水東流燈火旌陽一釣舟我自只如常日醉滿川風月替人愁春近二首閏後陽和臘裏回濛濛小雨暗樓臺柳條榆莢弄顔色便恐入簾雙燕來梅英欲盡香無賴草色才蘇緑未勻苦竹空將歲寒節又隨官柳到青春胡致隆號蕭灘居士與黃庭堅友善分題賦藕平生冰雪姿七星羅心胸豈無有絲毫上裨天子聰而不自薦達胡為乎泥中沈疴正無賴安得君從容其子亦可憐風味如乃翁落星樓即事葛巾藤杖竹籧篨夜靜江樓縱目初海獸擎山出彭蠡玉龍銜水下匡廬三更雲淨猿啼露十里月寒人捕魚已問湖山借圭角他年來此老樵漁仰山寺山下清泉迸石流山前松竹自春秋猿吟古寺偏深處雲集羣峰最上頭一老有靈飛窣堵二神無語鎖寒湫諸天更在藤蘿外欲踏層巔悵末由洪朋南昌人洪師民子芻之兄也芻進士官諫議大夫著老圃集職方乘按黃山谷四甥時號豫章四洪曰駒父玉父鴻父龜父而龜父詩最溈山谷所賞即朋也春風春風吹桃李歘然滿中園羣動不遑息蝴蝶紛飛翻我亦感兹時步屧繞林間顔色豈不好持久良獨難置酒休其下聊復罄余歡君看桃與李成蹊亦無言獨步懷元中淨盡西山日深行城北村琅璫鳴佛屋薜荔上僧垣時雨慰枵腹夕風清病魂所思渺江水誰與共忘言宿范氏水閣枕水鑿疏櫺雲扉夜不扃灘聲連地籟林影亂天星人靜魚頻躍秋髙露欲零何妨呼我友乘月與揚舲晚登秋屛閣示杜氏兄弟病人湯尉暫時停謾向秋屏臺上行白日忽隨飛鳥去青山斷處落霞明林間嘒嘒寒蟬急江上悠悠烟艇橫冨貴功名付公等嗟豫老矣負平生洪炎字玉父見洪朋傳袁遁翁雲溪居水竹依山住烟霞竝舍分秋添中夜雨冷沒一溪雲洪芻字駒父見洪朋傳廬山紫霄峯有禹刻石室塊視落星石杯觀彭蠡湖荒哉秦漢君抗旌上﨑嶇永懷太史公九江觀禹摹賈收字耘老湖州人有水閣在苕溪上景物清曠沈㑹宋為賦天仙子詞一時傳誦之後作杭州有美堂詩見賞於東坡遂定交焉有美堂自刋宸畫入雲端神物應須護翠巒吳越不藏千里色斗牛常占一天寒四簷望盡回頭懶萬象摉來下筆難誰信靜中踈拙意略無蹤跡到波瀾李彭洪芻兄弟之友集中多倡和詩阻風雨封家市往歲李成寫驟雨萬里古意毫端聚行人深藏鳥不度便覺非復鵝溪素龍眠老阮作陽關北風低草雲堆山行人客子兩愁絶未信蒲萄能解顔二公了了解人意似是畫我封家市戲作新詩排晝睡忽有野雁鳴烟際夢訪友生少年結客長安城妄喜縱酒同章程支離老去一茅屋枕書卧䎹長短更友生相望止百里寒夜寥濶無微聲夢中乘興輒見戴剡溪聊爾扁舟行覺來蘧蘧一榻上不用童僕爭歡迎吹燈弄筆欲書寄窗前白月方亭亭題呂少馮聽雨堂碧澗寒侵屋幽雲夜度牆貪看山入坐怪聽雨鳴廊苦乏隂鏗句聊登孺子牀非君無汲引寄傲學濳郎望西山懷駒父去歲湖湘賦凜秋聞君江國大刀頭百年㑹面知幾遇十事欲言還九休照眼遙岑落懷袖過眉拄杖立汀洲漫言青山淡吾慮誰料却能生許愁楊傑字次公無為人少有名于世元豐中官太常者數任一時禮樂之事皆與討論神宗命祕監劉几禮侍范鎮議禮器几請命傑同議乃陳太樂七失併圖上之鎮不用傑議哲宗即位言樂者又主范鎮傑力言其非鎮說遂格不行元祐中為禮部員外郎出知潤州除兩浙提㸃刑獄卒有集二十卷勿去草勿去草草無惡若比世俗俗浮薄君不見長安公卿家公卿盛時客如麻公卿去後門無車唯有芳草年年加又不見千里萬里江湖濵觸目凄凄無故人唯有芳草隨車輪一日還舊居門前草先除草於主人實無負主人於草宜何如勿去草草無惡若比世俗俗浮薄題吹衣亭馬上衣衫涴塵土斂版權門腰傴僂冷風天上呼不來厚顔如甲汗如雨星郎髙韻凌雲烟天籟喚歸酌流泉人間熱惱醺不到亭上鶴衣飄吹仙君方醉樂人愁絶何如御此登天闕叩天借取衣上風吹下九州作春色南城白雲山悼虎巖上人白雲隨師來師逐白雲止山空師何在木末白雲起楊蟠字公濟章安人舉進士為密和二州推官歐陽修稱其詩蘇軾知杭州蟠時通判州事倡酬居多後知夀州卒就食未知田上勞徒厭鼎中味及與農事接方知食者貴余生寡營求念此豈易致况敢懷寸祿平居但羞愧寄東山禪師髙卧西林月孤閒獨有君杖藜循澗水敧枕看山雲鹿過何人見猿啼只自聞篇章知不少寄我莫辭勤春日獨遊南園天淨鳥飛逺路幽花自香春風吹草木野水滿池塘事去青山在人閒白日長興來搔短髮微意久難忘郡中書事把麾何所往海上有名山潮落魚爭拾雲低雁可攀一城仙島上雙塔畫圖間當路誰知已天應賜老閒和東山禪師南澗傍遊戲呈公濟沖晦澗南一嘯清風發林下重來白日長雲逺石深連鷲嶺水寒沙淺似魚梁漫因野老詢前事閒伴幽人擷衆芳更欲窮源情未巳知君嗔我索歸忙酬仲靈同遊天竺兼呈伯周禪老不問猿崖鳥道深攜笻著屐伴君尋山中桂子驚寒夜雪後梅花逼嵗隂欲住更逢青眼顧相看須盡白頭吟他年倘續髙僧傳未放湯休與道林陪潤州裴如晦學士遊金山回作世上蓬萊第幾洲長雲漠漠鳥飛愁海山亂㸃當軒出江水中分繞檻流天逺樓臺橫北固夜深燈火見揚州迥船却望金陵月獨倚牙旗坐浪頭酬東山禪師喜公濟沖晦過訪作數百招提隱亂峰蒼茫那辨講堂鐘春酣賴得黃鸝報路轉唯尋白鹿蹤菴在月邉長不鎖興來天外忽相逢山人莫笑衣冠客亦有梁鴻待賃舂蚤過天竺呈明智及同遊二老雨過靈峰卧竹牀平明屐齒到雲堂門前雨過新溪滿石上風回舊草香山抱鐘聲圓不散雲鋪瓦面冷無光理公莫怪詩相惱今日偕行總姓湯秦王纜船石色隂長帶雨疑是白雲根欲問東巡事今猶不敢言章楶字質夫浦城人用䕃為孟州司户參軍應舉入京䎹父封對簿干魏棄不就試馳往直其寃還試禮部第一擢知陳留縣歷提舉陜西常平京東轉運判官成都路轉運使入為考功以直龍圖知慶州乘便討夏人屢挫其鋒除知同州徙應天府知廣州轉江淮發運使哲宗訪以邉事對稱㫖命知渭州用其䇿築峽江口好水河二城進奪疆境擊敗夏衆用輕騎夜襲執其統軍夏主震駭上御紫宸殿受賀擢棄密直端明殿學士進階大中大夫所立邊功為四方最徽宗立請老授資政殿學士未幾卒諡莊簡海棠軒珍葩寄幽島正對孤軒植優柔自俯仰紅緑若組織春酣晴日曛坐久濃香逼池面淨可鑑朝霞罩澄碧潺玉亭傍砌釃小渠回環是流水石唇吐珠涎清響醒人耳風微竹影碎月皎波光起颯爽無塵囂靜適心所喜茅菴竹間構圓菴所向自瀟灑珍禽弄巧舌宛是居山野默坐見真心萬緣盡虛假勿陋尋尺地兹焉息意馬水閣架木浮水中略彴通孤島扶疏花影反潑刺跳魚小風月所得多經營信云巧隱几寂無人朱欄萃幽鳥月臺蜀地饒夜雨輕隂多蔽天見月月無幾築臺邀嬋娟髙凝桂影近俯視雲屋連顧盻已塵外欲挹瑤宫仙宋元詩㑹卷二十四
