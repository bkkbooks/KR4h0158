常有道力况此跬步臨幽潺虛室光明白不動寶爐溫養丹將還丈夫出處我巳定馳字早寄孤飛鷴休拘崑崙並漲海遇有勝處同躋攀韓蘄王花園老卒歌蘄王手種紅錦花十載不挂鐵錏煆花園老卒守花樹睡著花磚聞曙鴉白頭白盡身無事古塞沙塵戰餘騎多士如雲足健兒一竒在腹終憔悴青銅萬緡滿地光寶函矯節賜夷王宫粧粉艷去酣酒海珠賝歸壓檣王家舍兒驚吐舌御府珊瑚碎飛雪口猶乳臭却帳前矍鑠一翁嗟棄捐君不見天下英雄本奴魯左鼻成龍右鼻虎頸血淋漓思釁鼓史傳沈埋誰比數花開花落幾風雨此事詳載鶴林玉露須按其始末方得作詩之旨月出東林客窗上疑梅花影朔風何處寒梅發江水悠悠路超忽逢花不語疑見人對影非真却因月縱使無花意自同誰知有影色俱空回頭不見東林樹猶勝羅浮是夢中次韻傅適道虎陂閘舟中少年解唱邯鄲曲惟有垂楊夾堤緑夜來誰抱焦尾琴彈作東風雉登木虎陂閘裏水生煙荆門山頭星照船爭似揚州春十里一雙鸞信待君傳方養心欲遊泰山用前韻作思仙詞復和之浩歌起作遊仙曲黃鶴無期瑶草緑神人結屋泰山巔手拂浮雲攬若木一笑齊州九點煙天風吹斷蓬萊船還上高丘看逺海有書莫遣麻姑傳古祥寺一昔逢寒食行吟採物華風生敲檻竹雨濕墮船花曲塢青龍樹長灘白鷺沙回看江上水直去到君家秋夜效梁簡文宫體二首無奈涼夜永起登樓上頭鵲翻金殿宿螢近玉階流梧桐老葉恨芙蓉新蘂愁媫妤團扇上那得不驚秋曾是昔年寵如今誰與同秋獵長楊苑夜幸猗蘭宫瓊杯香泫露翠袖薄禁風將心與明月流入君帷中一笑一笑長竿折徒憐大海魚文章猶醬瓿塵土只鹽車白日燕臺劍清風禹穴書上林誰獻賦愁絶馬相如歲初喜大人回自嶺南遂攜兒諤北行送之乍喜吾親返還攜稚子行風沙千里道雨露九重城舊泛江潮逺新過嶺瘴清長秋官屬盛去可接簪纓此去知何處飄然惜爾年塵飛馳馬埒雪擁讀書氊日觀躋攀外雲臺獻納邊文園寧久病須奏上林篇次韻吳正傳都城寒食悠悠獨酌舞春衫千障黃塵客未諳鐵騎引駝沙草北雕弧驚雁塞雲南太平天子回中望齊國先生稷下談猶有七香車幾兩曉來風雨定誰驂滄州荒亭貰酒壯心違目極東州霧雨霏百里齊封滄海接千年禹迹濁河微暗塵掉馬呈金轡衰草看羊著錦衣猶記上元鳴鼓夜滿船燈火越歌歸觀唐沈坌續仙傳手展仙書向此朝起豫俗病對芭蕉室間半夜雲璈動巖罅千年雪髓消間説茅龍騎太白遙聞木鶴降仁嬌秦車漢輦窮天下望斷蓬萊並寂寥寄吳正傳日晚天寒攬敝裘西南目盡瀫江流養生有論空成懶招隱無騷却好遊雁鵠吟風燈照几蛟龍躍雪劒鳴韝平生自笑飛騰暮幸矣心猶與道謀憶寄方子清時子清久留吳中一别嗟何處相思撫舊蹊月明施瀨北雲起蠡巗西跋踄舟車動過從笈篋攜鄰光因借燭道味肯吹虀好學螢分照論交雁擇栖丘園心薜荔海國氣鯨鯢卷帙籖翻蠧謳吟研發黳經筌參老易樂府録鐃鼙治法推周稼淳風仰漢綈談玄知野馬考字守家雞土域標鞮象天圖辨斗奎遺文多廢墜妙契極端倪獨樹盤桓久平蕪眺望低霜林紅玳瑁霧雨碧玻璃屛迹依狐兔銷愁對鷺鷖塵書投梵夾美餉挈童鐫槲葉時遮洞藤梢或罥溪龍居瞡雪瀑虎路躡霞梯出入恆聫袂追隨幾杖藜竹山香嶺嶠花島繡湖隄尚義開黌始延儒振席齊生徒修棗脯祭品授葅臡錦石看還數蒼松倚却題吾伊朝屢集渾灝夜同稽自謂菖為歜人疑榖似稊中悁真抑鬱外物總筌蹄嵗序空流邁波濤益慘悽故袍寒擘繭雄劍滑膏鵜緑映牽帆水紅黏曵屧泥娃宫叉鈿拾甫里筆牀齎鶴市歌喉引鱸鄉鱠手􅔊吳趨誇粉黛越産購珠犀富業連橙圃災霖潰稻畦占歸仍浩渺結客重酸嘶彼此身如寄參商夢欲迷蓬飛甘掃軌桂落得通閨俠眼收丹電仙襟化素霓貧期金埒騁賤許玉階躋病矣長憂痼間哉敢恨暌揃除須爾鑷磨刮更豫箆本欲晞王貢兹猶慕阮嵇猖狂疏奏牘軟弱謝耕犂習靜求神悟超羣畏俗擠清琴桑有鯉巨弩跖非鼷教駕傳御轡觀隅識撩枅鋤芝黧受謫抱璞跀聞蹄性命緣窮鬼功名厄嬖奚悠悠鸞與鳯泯泯鹿將麑白谷今安駟青霄古執圭毋寧長隱逸辛苦等黔黎吳師道字正傳婺州蘭溪人自羈丱知學即善記覽工詞章因讀宋儒真德秀遺書慨然有志於為己之學質之同郡許謙謙復之以理一分殊繇是心志益廣造履益深登至治元年進士第授高郵縣丞調寧國路録事遷池州建德縣尹錚然有聲中書左丞吕思誠侍御史孔思立列薦之召為國子助教其為教一本考亭而遵許衡之成法六館諸生咸謂得師以禮部郎中致仕終於家所著有易詩書雜説春秋胡傳辨及文集若干卷賦苕溪漁歌送殷尉之烏程苕溪多漁村渺渺連震澤歸舟聞扣舷清唱煙水隔聲隨晚風長響入秋山碧官曹間無事聽之聊自適翛然滄浪思恨不同泛宅如逢玄真子應問金華客老翁行老翁手插標泣售官道邊自云八口家貨易支凶年婦人二斗粟兒子一餉錢少壯猶有歸老者當棄捐逃生欲他適四境同騷然流尸穢江波纍骨明丘山閩中稍云樂瘴癘多不還逺近一死同去去勿復言春深四野緑流水鳴空田飢魂耿難招日莫愁凄煙聖王養四海災患仍安全骨肉老不分丘墳死相連傷哉見此事慘怛中心酸鴻門宴花膺繡膊帕抹額勇士如雲森劍戟沛公對酒顔如灰主人重瞳光照席重瞳座上身如寄巵酒未吞心巳醉醉酣不辨真天人百萬貔貅眼中睡春融玉帳香風開嗚嗚帳下筝琶哀目前等作萬口計軍聲四面歡如雷沛公唯諾非無意就中暗擊秦天地此時可想聽得異四面軍聲皆漢騎按吳正傳歌行有鴻門宴及姑蘇臺章華朝陽戲馬共五詩其四首巳見之於貢泰甫集內即此一首亦莫定果為吳作否姑存之柬王文學有客空齋歎不歸鄉心二月亂於絲杏花深巷春風夢茅屋荒田夜雨詩天氣未佳冝且住人生行樂竟何時乞君安得千壺酒爛飲狂歌慰别離再和鹿申寺吳存吾韻十年不到雲間寺白石清泉笑俗塵環壁詩存蒼蘚古空山鹿去野花春舊僧零落多歸塔劫火蕭疏近失鄰好事主人能釀酒從今來往不辭頻衢州超化寺南朝老屋半傾欹尚想諸賢會集時閣外雲山天歷歷城頭風雨樹離離渡江匹馬空成夢冒雪孤鴻自足悲賴是同行非俗子僧寮借紙録殘碑寄題留山道館幾處燒丹詫葛翁留山今復見新宫神仙自愛無人識樓館誰令有路通碧水帶花來洞口玉笙隨鶴度雲中更尋履石依稀迹轉覺幽深興未窮佳山水亭百年老屋半蒼苔一日佳哉舊觀回浮世何曽改山水高懷聊復寄亭臺夜深漁艇簷頭宿日落僧窗竹裏開此去京華踏塵土時時還有夢飛來錢舜舉畫卷不向東風開酣霜拒秋冷紅白為誰妍自照滄浪影次韻晉卿北山紀遊一壑風煙自可留十年湖海漫曽遊短衣射虎真堪樂莫恨將軍老不侯宋元詩會卷八十三
