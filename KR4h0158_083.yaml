body:
  text: 宋元詩會卷八十三兵部主事陳焯編吳萊字立夫浦陽人集賢大學士直方子也天資絶人七嵗能屬文讀書目涉成誦嘗往族父家日易漢書一帙以去族父迫扣之萊口誦一字不遺延祐七年以春秋舉上禮部不第退居深裊山中益窮諸書奧旨著尚書標説春秋世變圖傳授譜古職方録樂府類編一百卷唐律刪要三十卷文集六十卷萊於黃柳行輩稍後而二公稱許一則曰絶世之才一則曰非今世之士其推服如此用御史薦調長薌書院山長未上而卒年僅四十有四君子惜之私諡淵穎先生山中人二首白日出復沒胡獨勞我生所務在卒嵗朝夕強營營當春治農器土脈亦殫盈薄言藝黍稷庶以觀其成涼風一披拂場圃如坻京凍戶猶畝首康衢或歌聲於兹尚不給野有菜色氓毋寧拾橡栗起視牀頭瓶貧賤素所有豈辭辛與勤清晨腰我斧往伐西山薪高巖屹巨壑蛇虎氣逼人衣裳既不完出入在荆榛日日一接淅斧甑恆生塵白石幾時爛青煙空滿林家徒四立壁冬令方行春亦有偓佺子翛然為世珍和陶淵明詠貧士三首上天無停曜日月會降婁山林少過轍二鳥鳴相酬亦有五采鳯飛來為岐周姬公世不作白屋多懷憂逢時倘一用華士非吾儔函谷空逐客傅巖乃旁求人生自沈靜豈得意非干宜哉揚執戟三世不徙官窮冬無完褐盡日止一餐美芹終不獻晨曝尚餘寒手種老松樹蒼然霜雪顔政爾有佳思清風吾掩關舉世尚馳騖飄然風中蓬上書爭衒鬻言語自稱工誰歟持清節乃見楚兩龔黃塵隨手拂白日與心同有榮方覺辱無屈豈求通誓追遼海鶴插翅以相從皂角林觀劉錡戰處東都何慘淡南土劇蕭騷往往隳戰鬭於焉出英髦為君竟如寄立國已不高家供敵人賂嵗奉使客艘乾坤忽掀簸城郭皆動搖狡兔手可攖長蛇心更叨精熒金鎖甲翕赩橘紅袍厲矛終抉腕投鞭遽填壕云何大兵壓尚謂和議牢白波橫天險清野捲地毛將營皂林斫軍艦采石鏖大星遽崩殞滄海爭遁逃向非斯人在久矣凄煙蒿龍虎空野競狐狸遂寒嘷信史猶未著竒功果誰褒因之懷舊迹一弔楚江臯大食瓶西南有大石國自波斯傳兹人最解寶厥土善陶埏素瓶一二尺金碧燦相鮮晶瑩龍宫獻錯落鬼斧鐫粟紋起點綴花穟蟠蜿蜒定州讓巧薄卭邑鬭清堅脫指滑欲墜凝瞳冷將穿逖哉賈舶力真致鮫鰐淵常嗟古器物頗為世所捐襆衫易冠衮盤盎改豆籩禮圗日以變戎索豈其然在時茍適用重譯悉來前寰區幸混一四海際幅員縣度縛繩絙娑夷􅲥草船鑿空發使節隨谷混民編漢土堆櫝笥蕃羅塞鞍韀城池信不隔服食奈渠遷輪囷即上據鼎金疇能肩插葩奪豔冶盛酪添馨羶當筵特見異博識無庸詮藏之或論價裹此猶吾氊珊瑚尚可擊磧路徒飛煙彼既歸互市我且置杯圈角貒獨不出記取征西年時儺古人重儺疫時俗事禬禳嵗陽欲改律輿鬼寖耀鋩厲神乃恣肆魃蜮併猖狂侲僮幸成列巫覡陳禁方虎頭眩金目玄製寧赤裳桃弧驅災沴豆礫斃疸剛百靈咸震懾六合高褰張清炳信不容動靜維吾常世塗頗險盩人魅更跳梁狐鼠戴分幘夔魖竊香囊煎熬到膏髓擊剝成疕瘍乘風作國蠧抵隙為民殃自從九鼎沒誰使百怪藏瘃寒服裭帛飢窶食間糧蘆花蔽汝體椓粟饞吾腸地膚竟捲去天孽俱凋傷神荼欲呀啖蟠木蔓不長家倛強顔貌枯竹無耿光聖言謂近戲五祀徒驚惶惜哉六典廢述此時儺章觀隋王度古鏡記後題王家有古鏡軒氏昔鑄成太乙來護冶玄冥與儲精日月鍾璀璨龜蛇助威獰萬靈吐真水全體洞太清綵奩出未半氷片弄光晶寶匣收不動玉麟聞響聲有身尚變化無翼欲飛行恍然百世後流落汾陰城高士觀即賞異僧識還驚金船拭膏澤經碧穿屋楹牆垣照可撤臟腑燭能熒涕泣念鸚鵡悲酸逢豹生一朝忽屛迹六幕黯不明狐狸遞隱現魑魅莽縱橫皮膚峻剖削骨髓窮敲榜雷風儻有作厲虐敢紛更嗟吾幸居山猿鹿與我爭嗟吾願渡海鮫鰐恐並迎楊氏雀環在張公龍劍並因兹訪洞穴得不振冠纓樓彥珍北遊京師豫病不及往餞嵗晚有懷並寄彥昭浚常日晚北風起少年方逺遊徘徊上谷塞眺望黃河流峥嶸十月氷朔色壓九州熒煌大明殿御道接龍樓時巡向灤水臘雪擁薊丘前驅鸞鳯旗後乘貂鼠裘尚食豐宴飫教坊樂箜篌百官散城邑駝馬盡歸休自今帝王都想爾觀覽周却疑書傳間不謂秦漢優何家非許史無客不枚鄒投輪即雨集揮袂遽雲浮東航扶桑陰西笮崑崙陬變化指顧異芻蕘立談收文物彼洛禊土音吾越謳私將竊祿志勇赴隨陽謀隨陽即澤雁竊祿豈梁鶖美玉獻劍彘精金鏤帣韝出門亟裝束行路肯滯留布韋謾老耋鄉里惟田疇功名幸一遇螻蟻尚公侯學問敢強飾黍稷待鋤耰當令竹帛上直與先逹侔毋使螢爝光肅然寸草秋嗟豫久抱疢餞酒弗及芻念爾忽萬里征夢或見求宣生頗俊逸鄭子復綢繆趾高有捷步胸正無昏眸早看拜家慶共許動宸旒傳車定不礙關鑰便若抽杏花開如錦楊栁滿陌頭去時小兒女來詫真驊騮病起讀列子真經三首世間豈有極海外猶齊州日月更出沒江河却同流夸娥追即死章亥步曷周蠓蚋生不久鯤鵬背吾遊神瀵湧滋穴巨鼇戴蓬丘想象或可到徘徊獨懷憂南方祝髮裸北國鞨巾裘逍遙特爾分智者善為謀神巫善相人壺子如濕灰扁鵲巧發藥季良病弗治一形茍脫落純氣固委蛇隨火出石壁泳珠沒淫隈彼或蜩翼得此猶漚鳥疑中心既怵殆外物盡坑溪幹殼即木葉皮膚類嬰孩逺矣列姑射吾為榮啓期此日忽過隙居人恆鮮歡毫毛悉為我體節欲求完大盜竊名爵小廉捨豆簟熊魚徒兩得利義肯兼安馬醫自不辱燕技毋容干時勢茍未至事功良獨難蕭條白麻履慘淡青蘚冠長嘯答鳴鶴北風江水寒夕泛海東尋梅岑山觀音大士洞遂登盤陀石處及東霍山回過翁浦問徐偃王舊城三首起尋千步沙穹石塞行路怒濤所縱擊徒以頑險故卓哉梅子真與世良不遇上書空雪衣燒藥回煙樹玄螭時側行縞鶴一回顧從之招羡門滄海晝多霧茫茫瀛海間海外此孤絶飛泉亂垂纓險洞森削鐵天香固遙聞梵相俄一瞥魚龍互圍繞仙鬼驚變滅舟航米旅遊鐘磬聚禪悅笑撚小白花秋湖落如雪遙觀杳無極宛與東霍鄰悲夫童男女去作魚鱉民紵嶼尚餘聚蓬山寧爾神古棹苔駐迹仙枰竹袪塵短褐徒為拂飛槎邈難親好攜支機石去躍織女津早秋偶然作寄宋景濂四首我病三月久問言此何時山林日搖落草木欲變衰忽來臨青鏡何故摘白髭千里復萬里逺哉鴻雁期西風吹梧桐一葉兩葉積故書翻有塵雄劍挂在壁時違甘窮困事到即輝赫除却雙鹿行門前少人迹悠悠秋夜長夢覺秋月霽有才寧及人無學敢求蛻揮來河水絃削作泰山礪吁嗟祁孔賔得失毫髮際往者東入海飄然任所如大風戕波浪飛雪灑舳艫壯志昔尚少狂遊今併無誓登盤陀石重望扶桑墟西域種羊皮書褥歌寄李仲羽大漠迤西俗能種羊凡屠羊悉留其骨以初冬未日埋地中至春陽季月上未日為吹笳咒語則子羊從土中出凡埋骨一具可得子羊數隻波斯谷中神夜語波斯牧羊供雜闕當道剚刀羊可食土城留種羊脛骨四圍築垣聞杵聲羊子還從脛骨牛青草叢抽臍未斷馬蹄踣鐵繞垣行羊子跳踉却在草鼠王如拳不同老飫肉筵開塞饌肥裁皮褥作書林寶南州俠客遇西人昔得手褥今無倫君不見氷蠶之錦欲盈尺康洽年來貧不貧按釋楚石琦公嘗目見其事曰此四生胎外之化也故有句曰自言羊可種不信繭成絲杜鵑行南山北山啼杜鵑杜鵑花發山欲然千枝萬朵惜未得中有一抹巴陵煙休説銅梁並玉壘搖蕩春光餘淚水五丁鑿路少人行石鏡生塵妖骨死東風青鳥來何處中宫移植鎖魂樹不如歸去便歸家誰其友者揚州花畫馬行涼秋八月霜浩浩白雁驚飛散蓬葆川原蓄牧萬馬來揚鬛攢蹄齕枯草漁陽突騎自有真奚官剪拭傾城闉素絲結轡美無價繡罽披韀驅向人當塗奮擲甚崛壯一旦紛騰入天仗父老東城接鬭雞邊兒內苑隨調象煌煌京洛鳴和鈴奔走萬里如流星筋力追風烏鵲厲精神噴霧蛟龍冥往年踊躍將一跨寂寞而今空見畫黃金鑄式猶峥嶸多少地上騏驎行江南曲寄周公甫東風吹人千萬里青蘋花發前湖水江南女子木蘭舟却採蘋花泛流水水流花發春光好失時不採花應老年少吳儂歌懊惱白晳容顔半枯稿倐然來去雙彩鳬化作汝舄穿雲衢汝珮復解江妃珠龍宫蛟室本不隔相期更有瀟湘客荔枝行寄王善父炎雲六月光陸離人在閩南餐荔枝荔枝日餐三百顆紅線亞林欺衆果絳羅繫樹蠟封蒂尚食擎盤獻青瑣涪州嵗貢與此同意昔移根來漢宫天生尤物不用世沾灑蛋雨吹蠻風蠻風蛋雨振林藪西域蒲萄秋壓酒勸君莫近楊太真傳説驪山塵汙人明月行寄傅嘉父上天有明月來自滄海東蠻潮夜捲馮夷宫海門一線驚欲射江面樓臺聳千尺氷岸雪崖屹不動水犀組練皆勍敵越人善泅技巳癢明月光中吾得賞飛來白鶴晉清角跳出長魚漢疏網北風吹起蘆花秋笑撫錢王鐵箭頭襆衣枕斧此何處烏鵲無枝空繞樹二月六日雨書都城舊事燕南趙北吹黃塵九天宫闕生紫雲十二門開衢路直畫輪驄馬多行客嵗寒殿外栁才青金水河邊氷尚白雞人傳漏放曉朝文石分班押百僚南陽近親最舞蹈京兆耆舊爭歌謡教坊供奉飾玉女鐘能鐘聲鼓能鼓錦來西蜀被玄駝肉出太官餐猛虎初日扶桑稍照人內筵錫燕杏花春沐犢騂牲泰畤祀鸞旗翠蓋驪山巡東風萬里飄寒雨我昔稔聞今不睹快然呼酒擊唾壺茂陵徐生曽上書姑蘇臺歌寄方養心姑蘇臺南閶闔開姑蘇臺北鴻雁來春花秋月幾時好步屧尋香去如掃寃胥憤血空海潮老濞妖妝又煙草少年為客誰我令千里汝猶談一經黃龍挾舟夜有雨白虎司劍天無星山中菖蒲十二節未肯落盡青頭髮姑蘇臺上愁殺人身在勾吳望勾越烈婦行落日沈海雲壓城官軍多載婦女行大弓徑箭自山下顔色如灰愁上馬我生不慣生馬駒存者吾子亡吾夫毋寧完身吐玉雪忍使餒肉當熊貙青楓嶺頭望回浦血指畫巖心獨苦老螭扣地救未及芳草迷天淚零雨卓哉一死可百年此事巳過永泰前黃沙野塞多降骨忠義傳中收不得富春新創關將軍廟成吳子中攜卷索題吳生病起有怪聞夢中識得髯將軍香火乞靈自此揭廟門釃酒棕櫚雲我曽久讀名將傳紫金焰眼頳玉面漢鼎􅏠離強分割楚鋒剽狡輕攻戰天荒地老路不通魂升魄降胔秋蓬神仙負劍乃兵解巫覡傳芭真鬼雄壯夫本合荆州死嚴祀何哉富春里只今江左四祠無狄公髯乎髯乎獨不恨見孫江東題錢舜舉張麗華侍女汲井圖景陽宫中胭脂井手出銀盤牽素綆鉛華不御面生光寶帳垂綃花妬影臨春結綺屹層空璧月瓊枝狎客同鴛鴦戲水池塘雨蛺蝶尋香殿閣風日高歡宴嬌若訴牀腳表章昏不寤吳兒白袍戰鼓死洛土青蓋降船渡井泥無波井欄缺半點胭脂汙緋雪蕙心蘭質吹作塵目斷寒江鎖江鐵白髮詞寄答陳時父昔豫頭燥髮未苗今我頭枯髮先折童心尚在顔貌改滿鬢蒼華點霜雪朝來抱鏡看未真鏡裏相逢類兩人東都貧孟歎孤劍西邸老康悲故茵烏髭每怕不得素素櫛何庸問衰暮楓林葉底變風煙藥草莖邊虛雨露自非神仙劉阮儔世間容有幾春秋情知鸛鶴長朱頂得見鴛鴦會白頭黑海青歌越山山有黑海青長拳快眼健羽翎三年籠養未得飽萬里驍俊猶飛星黃蘆老葦日摧折白鷺文鶬看磔裂腥沾石磧吹逺風髓擊寒岡散輕雪伊人脫手本凡禽嵗晚連條到上林鉗奴素賤多侯骨騎士虛豪即俠心晉宫邸廢身欲死燕國雲銷草如砥嗟非鸞鳯高杳冥望盡狐狸衆披靡當時奉使探逺