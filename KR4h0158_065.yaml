body:
  text: 宋元詩會卷六十五兵部主事陳焯編金詩附張介字介夫彭城人正大元年經義第一人歷鞏榖孰二縣令幼有賦聲為人藴藉讀天寶遺書不但昨非今亦非上皇騎馬淚沾衣曲江死後無忠諫郤憶詞人秋雁飛龎漢字茂𢎞平晉人正大末年進士沈毅有志節待次內鄉北山兵亂遇害終南溪冷雲低壓萬長楊十頃秋隂鎖北堂門外兵塵漲秦楚水邊煙景似湖湘荷翻山雨僧窗晚竹泛溪風客枕涼早晚初平遂真隱繞陂間牧石頭羊神童劉微字伯祥益都人七嵗能文道陵召入宮賦鳯凰來儀二首稱旨賜經童出身係籍太學後登貞祐二年第春栁應制得城字翠鈿圓勻緑線輕著行排立㺯新晴更看三月春風裏散作飛花滿鳯城王世賞字彥功汴人與尹無忌王逸賓趙文孺相周旋明昌中保舉才能德行賜出身釋褐鞏州教授終于鹿邑簿有浚水老人集傳于世立春後十日登樓今日登樓眼風煙倍覺新溪梅初破萼屋雪半融銀雁外天逾碧鷗邊水自春兒曹應見笑吟望獨傷神春雪只謂春天暖寧知雪霰飛龍蛇且深蟄花栁不勝威糝糝凌風細紛紛帶雨稀誰當問穹昊生殺果何機桑之維字之才恩州人蔡丞相伯堅之子壻也以樂府著稱有東皋集傳于世白髮白髮近年見十中三兩莖半因愁儹出多為病添成梳裏有時落鑷餘還又生老知無可避何處是功名馮文叔文叔遼東人客舍禿襟袖褐破書囊十五年來客異鄉生事穽中搖虎尾窮途天上轉羊腸三朝不遇馮唐老半夜悲歌寧戚狂獨倚牛車望遼海西風塵土鬢蒼蒼宗道字雲叟山隂人以足疾不仕有詩云家藏千卷富身得一生間茅屋經年補柴門盡日關其自處可見寶巖僧舍寂寂鐘魚柏滿軒午風輕揚煮茶煙西廊竟日無人到只許山人借榻眠鮮于溥字彥仁宋文臣子駿之後高祖淳淳之子孝標標之子壽吉壽吉之子坦皆擢進士第而仕亦達彥仁坦之子以門資仕終于櫟陽令濟源盤谷天壤佳處坦父子居其間飲酒賦詩翛然塵垢之外至今人以高士目之魯村道中小橋沙路已堪圖更著衰翁跨蹇驢暮靄似催寒日短秋容仍帶遠林疏鵬盤平野黃榆落兔走橫岡白草枯漸喜間身遠朝市一年強半在村墟早發燈前夢斷家千里馬上詩成月一痕晨粥未烹官路遠隔林煙火是漁村郝天挺字晉卿陵川人家世儒素伯父子揚有詩名號東軒老人晉卿少日有賦聲早衰多疾厭于名場遂不復就舉貞祐之兵避于河南往來淇衛間為人有崖岸耿耿自信寧落薄而死終不一傍富兒之門年五十七卒于舞陽臨終浩歌自得不以死生為意其平日自處為可見矣元好問少從晉卿學舉業晉卿教之曰今賦學以速售為功六經百氏分磔綴緝外或篇題句讀之不知幸而得之不免為庸人况一敗塗地者乎又曰讀書不為藝文選官不為利養唯通人能之又曰今世仕宦多用貪墨敗官皆苦于飢凍弗克自堅者耳男子生世不耐飢寒則雖小事不能成子試以吾言求之其所持論如此子思溫字和之孫經字伯常入元為名臣送門生赴省闈青出於藍青愈青小年場屋便馳聲未饒徐淑早求舉郤笑陸機遲得名嗟我早衰空毦矂喜君初筮已崢嶸此行占取鼇頭穩平地煙霄屬後生徐好問字裕之永寧人彭汝實曰徐與遺山同名同字不以為嫌而録其詩前輩胸中廣大類此龍門疏鑿而來道路通行人萬古翠微中南山山寺題詩滿一字何嘗到禹功邢安國字仲祥沁州武鄉人少日有賦聲四十嵗後即不應科舉以詩酒自娛避亂客泌陽十餘年後北歸備極艱苦往往見於詩云楊花細點輕團轉復飄隋家堤岸霸陵橋非綿非絮寒無用如雪如霜暖不消狂惹客衣知有恨巧尋禪榻故相撩陂塘回首浮萍滿依舊春風擺翠條劉豫字彥由阜城人仕宋知濟南府事汴京下立張邦昌為大楚皇帝宋滅楚更立彥由國號齊建元阜昌八年廢為蜀王遷黃龍府改封曹有集十卷行于世雜詩三首風荷柄柄弄清香輕薄沙禽落又翔紅日轉西漁艇散一川山影暮天涼古渡停驂日向沈凄涼歸思梗清吟碧山幾點塞天濶紅葉一林秋意深寒林煙重暝棲鴉遠寺疏鐘送落霞無限嶺雲遮不斷數聲和月到山家虞仲文字質夫世南之裔武州寧逺人仕為遼相歸金授樞密使平章政事封秦國公四嵗作詩賦煎餅有魚目蟬聲之句人以神童目之雪花四嵗作瓊英與玊蘂片片落前池問著花來處東君也不知按元裕之于金相詩內載有張丞相孝純字永錫滕陽人宋宣和末知太原金兵圍城死守踰年人相食幾盡城始下金主憐其忠換以相職詩無足觀故不録而初志可嘉聊記於此耶律履字履道東丹王之七世孫學易通太玄至於隂陽厯數無不精究蔭補國史掾興陵朝纍遷薊州刺史入翰林為修撰歷直學士待制禮部尚書特賜孟宗獻榜進士第俄預淄王定册功拜參知政事明昌元年進右丞薨年六十一興陵嘗問宋名臣孰為優履道以蘇端明軾對上曰吾聞軾與王詵交甚歡至作歌曲戲及姬侍非禮之甚尚何足道耶履道進曰小説傳聞未必可信就使有之戲笑之間亦何得深責世徒知軾之詩文為不可及臣觀其論天下事實經濟良才求之古人陸贄而下未見其比陛下無信小説而忽賢臣之言明日録軾奏議上之詔國子監刋行自號忘言居士有集傳于世三子辨才武廟署令善才工部尚書楚才中書令四孫鈞鉉鏞鑄史院從事日感懷不學知章乞鑑湖不隨老阮醉黃壚試從麟閣諸賢問肯屑蘭臺小史無一戰得侯輸妄尉長身奉粟愧侏儒禁城鍾定燈花落坐拊塵編惜壯圖賈益謙因辨海陵之誣可證金史之謬故於其原傳全録之字亨甫本名守謙避哀宗諱改焉宣宗朝參知政事出知濟南移鎮河中南渡後召拜左丞尋致仕居鄭州哀宗即位史官乞因宣廟實録遂及衛紹王初虎賊既弒逆乃立宣宗宣宗之人至謂衛王失道天命絶之虎實無罪且于主上有推戴之功獨張信甫上章言虎賊大逆不道當用宋文帝誅傅亮徐羡之故事章奏不報爾後舉朝以大安崇慶之事為諱及是謂亨甫大安中嘗拜御史中丞宜知衛王事乃差編修官一人就訪之亨甫知其旨謂來者言知衛王莫如我然我聞海陵被弒而世宗皇帝立大定三十年禁近能暴海陵過惡者得美仕史官修實録誣其淫毒狠鷙遺臭無窮自今觀之百可一信耶衛王勤儉慎惜名器較其行事中材不能及者多矣吾知此而已設欲謂飾言以加吾罪吾亦何惜餘年朝議韙之正大三年八十薨贈答史院從事見説才名自妙年多慙政府舊妨賢物華天寶無今古鳯閣鸞臺孰後先鄭圃道尊何敢望濟南書在子當傳莫言老眼昏花滿及見風鵬上九天楊慥字叔玊代州五臺人承安五年進士歷州縣入為尚書省令史拜監察御史侍御史京西大農司丞京南司農卿户部侍郎權尚書入户曹即有相望事無巨細處之皆有法至於知朝廷大體則又非他人所能及也京城受兵權參知政事明年卒于河平叔玊文工于詩而人不以能文稱特未見其文耳過司竹監有懷王監正之不見嵩丘跨鶴仙才名留得萬人傳春郊漬酒傷今日夜雨論文記昔年宰樹謾縣公子劍高山已絶伯牙絃故居修竹青青在寂莫終南落照邊乾陵牝雞一啄血波流天下何緣不姓周今日阿婆心力盡乾陵禿似老僧頭孟宗獻字友之開封人大定三年鄉府省御四試皆第一供奉翰林曹王府文學兼記室參軍以疾尋醫久之授同知單州軍州事丁母憂哀毁致卒搖搖風影漾寒塘靜裏亭臺日月長不似隋家堤岸上亂鴉殘照管興亡蘇門花塢繞舍雲山尉眼新看花差後洛陽塵從君小築繁香塢不負長腰玊粒春趙攄字子充宛平人自號醉全道人早赴北宮蒼龍雙闕鬱層雲湖水鱗鱗栁色新絶似江行看清曉不知身是趂朝人趙承元字善長先世汴人兵火間旅寓河間遂占籍焉大定十三年詞賦第一人除應奉翰林學士兼曹王府文學以疏俊少撿得罪王府貶廢久之遇赦量敘卒于臨洮探春水底流泉匹練飛麴塵著栁不禁吹杖藜恰到春生處已有人家插酒旗張楫字巨濟其先秦川長春人有官於山隂者遂占籍焉家世貴顯巨濟明昌五年詞賦第一人仕至鎮戍州刺史客中絳脣花不語青眼栁初眠塵去尋芳馬香來載酒船歸期仍雁後野興已鷗邊惆悵無家客春風又一年初夏小園緑筍間朱櫻點綴年華似有情露浥葛巾晨氣潤風隨竹簟晚涼生間窺黠鼠潛身處靜厭飛蚊繞鬢聲安得冷泉幽石畔解衣盤礴樹隂清李著字彥明真定人高才博學詩文得前人體工於字畫頗尚宮言承安二年經義第一人在翰林七年出判定州召為户部員外郎坐大中黨事謫臨洮府判官量移西京路按察司判官遷彰德府治中城再陷避于塔上兵人招降大罵不從掘塔倒而死觀音院書閣曲巷蓬蒿一尺深小軒岑寂似山林鳥聲落枕有高下山色閲人無古今客裏三年侵老境牀頭一易浣塵襟晚涼癡坐忘言裏滿地西風白玊簪王中立字湯臣岢嵐人博學強記問無不知少日治易有聲場屋間家豪于財賓客日滿門所以待之者備極豐腆其自奉則日食淡湯餅而已年四十喪妻遂不更娶亦不就舉選齋居一室枯寂如衲僧如是三四年乃出時人覺其談吐高濶詩筆字畫皆超絶若有物附之者問之不言也臨終預尅死期而逝州將石倫葬之欣州時年五十六中秋素丸東溟來飛上玻璃盆聊揮五輪手撥去萬里隂印透山河影照開天地心人世有昏曉我未嘗古今雜詩二首華山宮殿白雲封想見當年打睡翁貪看終南山色好不知紅日下前峰雲葉粼粼皺碧空笙簫遞響入天風忽驚風浪耳邊急不覺形神來世中王豫可字南雲吉州人父本軍挍南雲亦嘗隸籍年三十許大病後忽發狂久之能把筆作詩文及説世外恍惚事南渡後居上蔡遂平郾城之間在郾城為最久人與之紙落紙數百言或詩或文散漫碎雜無句讀無首尾多六經中語及韻學家古文奇字字或峭徑遇宋諱亦時避之人或問以故事應如響諸所引書皆世所未見談説之際稍若有條貫則又以誕幻語亂之麻知幾張伯玉與之逰最狎説其所作詩以百分為率可曉者才二三耳壬辰兵亂為順天軍將領所得知其名竊議欲挈之北歸館於州之瑞雲觀南雲明日見將領自言云我不能往君家瑞雲觀也不數日病卒後復有見之淮上者馴鶴圖張伯玊家畫慎宫人徐行以手整叉一鶴後隨謂之馴鶴圖伯玊請賦詩欽叔常苦其作詩多不用韻限以叉來苔三字寢處粧鉛未捲叉孤雲花帶月邊來六宫簾幕金鸞冷露濕晨煙啄翠苔王彧字子文洺州人承安中進士資剛決不可犯為尚書省掾知管差除與郎官相可否即棄官去往來登封盧氏山中改名知非字無咎自號照了居士居山中二十年布衣蔬食井臼自親時人哀苦之而知非處之自若也少日為文工于四六詩亦有功和二宋落花韻四首云曽見嬌窺宋玊牆忽驚遺夢到延涼聚塵非分侵凌玊流水無情葬送香錦襪謾拋終隔面綵灰雖吐若為腸蒼苔碧草無窮恨木石癡兒亦自傷可人未厭出鄰牆回首空殘翠幕涼好事只傳懷夢草殊鄉誰致返魂香塵凝燕子慵開眼煙暗馬嵬空斷腸穠李絳桃俱異物為歌薤露寫餘傷緑影浮空只自傷賞心死著未能忘瓊枝不解留春色銀燭空存照夜妝肺腑已傳蜂蜜盡肌膏仍與燕泥香情知青帝回車日合有翔風老退房繁華終竟合凋傷獻笑縈懷忍遽忘露壓不禁昏淚臉風披無奈醉愁妝芳菲頓減園林趣狼藉空餘陌路香郤憶班姬浪辛苦一生都得幾專房既學佛作決定歌禪家以為證道新豐之後無有及者禪頌二首放下情懷觸處安生涯耿耿沒多般褐衣襤褸聊遮赤短髮鬅鬙底用冠一榻省緣資困歇二匙隨分了飢餐也知苦澀人人笑烈日初心不敢謾貞祐末行臺都尉南征獲武經進士李申之于盱眙左右司郎中劉光講達卿潤文官李獻能欽叔愛其才辨欲活之以避嫌不敢也乃託以問事機令軍中羈管之申之作詩贈主囚者云一飯感君無地報寸心許國只天知明朝定作長淮鬼馬革仍煩為裹尸又云胸中萬古橫鍾阜一死鴻毛斷不移又獻書都尉云金國歲歲南侵計所得不能一二州而軍力折耗殆盡今歲此舉亦曽慮人有議其後何以禦之乎為公計者不若待南軍大舉斂兵而退雖屢出無功得全師而返猶可自救不然師老食殫困頓于堅城之下讒間一行則公受禍不久矣某軍敗而死固其所也乞于盱眙城下責以不降之罪以一死見處使人人知之則都尉亦于名教有功書上之明日申之謀遁歸不果乃殺之欽叔説其臨刑回面南向欣然就戮甚嗟惜之豫謂申之胸中萬古橫鍾阜與王知非烈日初心不敢謾皆烈丈夫語故附見于此吾身非我底為情説著塵勞特地驚五九盡時山更好澗泉雲鳥自春聲董文甫字國華潞人承安中進士為人淳質恬于世味於心學有所得人知尊敬之而不知其所以得也子安仁亦學道父子嘗間居寶豐閉户不出以習靜為業朝夕不斷宴如也國華歷金昌府判官禮部員外郎昌武軍節度副使正大中以公事至杞縣佐自知死期作書與家人及同官又作詩貽杞縣令詩畢擲筆于地以扇障面而逝審是堂按劍人人駭夜光蜀雞合道勝鸞凰飛蛾可是無分别直認油燈是太陽文中子續經紛紛述作史才雄聽得秋來百草蟲不是春雷轟蟄窟蚓蛇爭得化成龍元好問嘗以王氏續六經為問文甫云王氏六經以權道設教雖孔子亦然但後人不能知之耳因以此詩示之李俊民字用章澤州人承安中舉進士第一金亡隱居教授元世祖居潛邸以安車召之乞還山明皇擊梧圖不使梨園子弟知太平音在鳯皇枝一朝野鹿銜花去長恨秋風落葉時辛願字敬之福昌人其大父自鳳翔來居縣西南女几山下以力田為業敬之自號女几野人年二十五始知讀書取白氏諷諫集自試一日便能背誦乃聚書環堵中讀之書至伊訓詩至河廣頗若有所省欲罷不能因更致力焉音義有不通者搜訪百至必通而後已由是博極羣書于三傳為精至於內典亦稱該洽杜詩韓筆未嘗一日去其手作文有綱目不亂詩律深嚴而有自得之趣亂後兵去人歸日花開雪霽天川原荒宿草墟落動新煙困鼠鳴虛壁飢烏啄廢田似聞人語亂縣吏已催錢贈劉庵主劉遼貴族密薄軒裳貴高尋綺皓蹤一囊閭里藥六尺水雲笻午枕眠芳景晴簷望遠峰柴門常不掩應得野夫從贈趙宜之夫子今詞伯胡為遠帝京青雲無轍迹白髮有柴荆鬼戲多年病人高四海名麟經方有缺無惜繼丘明同趙長水泛舟洛水秦山晚自澄孤洲煙樹緑相仍波搖朗月浮金鏡嶺隔華星斷玊繩但覺轉船驚白鳥豈煩揮箑怒青蠅風塵浩蕩飄蓬裏愧似林宗陪李膺題遊彥明林園先生未老厭儒冠築屋栽籬守嵗寒經史日長常滿案漁蝦溪近得供盤幽花入室無多種瘦竹關情只數竿瀟灑逺辭車馬迹求官何必近長安函關雙峰高聳大河旁自古函關一戰場紫氣久無傳道叟黃塵那有棄繻郎煙迷短草秋還緑露浥寒花晚更香共説河山雄百二不堪屈指算興亡隆德故宮蛇分鹿死已無秦五十年來漢苑春問著流鶯無一語栁條依舊拂牆新山園嵗暮山園懶再行蘭衰菊悴頗關情青青多少無名草爭向殘陽暖處生李汾字長源平晉人系出雁門曠達不羈好以奇節自許元光末用薦書得從事史館長源素高亢不可一世乃今因斗食致人以府史蓄之殊不自聊未幾忤翰長罷尋入關明年驅數馬來京師日以馬價佐歡道逢怨家則畫地大數而去又明年恆山公先在鄧之西山長源往説之署行尚書省講議官既而恆山與參知政事實勒相異同頗謀自安懼長源言論欲除之遁之泌陽竟為所害州北三首州北光風艷綺羅南來扈從北人多梨園法曲懷奴舞月窟新聲倩女歌紫禁衣冠出金馬青樓阡陌瞰銅駝薄遊郤憶開元日常逐春風醉兩坡琪樹明霞五鳳樓夷門自古帝王州衣冠繁會文昌府旌戟森羅部曲侯美酒名謳陳廣座凝笳咽鼓送華輈秦川王粲何為者憔悴囂塵坐白頭樓外風煙隔紫垣樓頭客子動歸魂飄蕭蓬鬢驚秋色狼藉麻衣涴酒痕天塹波光搖落日太行山色照中原誰知滄海橫流意獨倚牛車哭孝孫上清宮蒼梧雲氣赤城霞錦絡鈞天帝子家仙掌高承九霄露霓旌遙駐五雲車昆明火劫驚人世瀛海風濤撼客槎醉裏忽逢王子晉玊笙吹上碧桃花避亂陳倉南山回望三秦追懷淮隂侯信漫賦長句憑高四顧戰塵昏鶉野山川自吐吞渭水波濤喧隴阪散關形勢軋興元旌旗日落黃雲戍弓劍霜寒白草原一飯悠悠從漂母誰憐國士未酬恩清明鳴珂振轂滿重城春日綿綿老燕鶯人在碧雞坊外住淡隨流水過清明蘇客卿秦遊説諸侯獲上卿賈人脣舌事縱橫可憐一世癡兒女爭羡腰間六印榮馬中令周腳踏長安陌上塵布衣西上欲誰親君王不省常何䇿憔悴新豐一旅人李獻甫字欽用欽叔從弟也兄欽止欽若皆中朝名勝家故將種而同時四進士人門之秀照映一時欽用博通書傳于左氏及地理之學尤精為人有幹局心思所到則絶人逺甚故時人有精神滿腹之稱歷咸陽簿辟行臺掾屬正大初夏人請和金以馮子駿往議欽用預行夏使有口辨馮善人無以折之往復之際至將歲幣為言欽用不能平從旁進曰夏國與敝邑和好百年今雖易君臣之名而為兄弟之國使兄而輸幣寧有據耶曰兄弟且不論宋日曽與吾家二十五萬匹典故具在君獨不知也金朝必欲修舊好非此例不可欽用作色曰使者尚忍言耶宋以嵗幣餌君家而賜之姓岸然以君父自居夏國君臣無一悟者誠謂使者當以為諱乃今公言之使者果能主此議以從賜姓之例敝邑雖嵗損五十萬某請以身任之夏使語塞和議乃定别春辭東皇按轡來何遲人間二月才芳菲六十日春能幾時不如意事常相隨一聲啼鴂花片飛把酒郤與春别離春緩歸聽我歌滔滔歲月如流波貴憂孰與賤樂多吾寧不欲列華鼎馳鳴珂香屏倚妓薦綺羅人生賦分有定在誰能買愁費天和長安市上酒如海跨驢徑上胭脂坡酒酣酣舞雙婆娑春自來去如豫何興慶池書所見短短菰蒲刺水青翠萍開處鑑波明畫船轉過垂楊外水面風來聞樂聲元德明字明德秀容人唐禮部侍郎次山之後自幼讀書世俗鄙事終其身不挂口為人誠實樂易洞見肺腑雖童子以言欺之亦以為誠然也纍舉不第放浪山水間未嘗一日不飲酒賦詩春秋四十有八終于家二子好古好問仙雞詩并序繁畤義興鎮酒家韓氏子畜一雞以善鬭雄其鄉一日敵家用藥飼雞使不知痛求與韓雞對韓雞鬭久果被傷口下頷不收垂死矣一賣藥道人過其門曰我能活此韓欣然使療之里中諸兒隨看者一二十輩皆使向壁立道人以雞置籠中探手良久若摩拊然者已而取瓢水噀之置瓢籠上即出門兒曹怪其久不還竊視之雞喙已復生矣道人希袍草冠腋下縣青囊落魄嗜酒夜宿寺閣上韓氏子與里中人奔走求之并所臥草薦不在矣是時明昌七年仲規弟為此鎮酒官豫亦在焉作仙雞詩以記之老雄健鬭誇擅場韓郎抱歸神色傷豈知黠兒出徼幸毒手一發不得防毳衣散灑尚可養利嘴一哆何由張青囊道人何許來自言救藥吾有方垂髯噀水濯殘血半喙隨手生新黃筠籠乍開聞腷膊草冠已往徒驚忙神仙世有寧虛荒惜哉詭激不可量世人鷙勇天且劓况于物也恣強梁敷榮枯枿變金石未若與世針膏肓何須變化示狡獪知君辦作淮南王蓬萊東望雲茫茫愛而不見心且狂刀圭不願換凡骨且欲共醉無何鄉送德溫同舍赴簾試太常侍祠水蒼珮內相夜下金蓮燭皇家結網未曽疏亦有佳人在空谷一從唐賦變遼律仰視折楊猶雅曲雲臺勳業一青衫被髮操戈踵相屬筋疲力涸僅乃得墨水一升凡幾辱英雄俯首入彀中舉世悉然非子獨子家口衆親又老嵗月旨甘須寸祿薦書聞説過南宮冷暖人情到僮僕我初與子偕計吏人後人前隨碌碌不慙齊客售鼓瑟頗為荆人悲獻玊一詩今日送君行萬里秋風看鴻鵠室人生朝新酒清渾共糟牀洗盞嘗平時唯欲醉此日重難忘容服慙王霸山林得孟光白頭翁與媪萬事聽諸郎秋暮王氏園亭細徑雲林底危亭澗水湄秋先殞黃葉寒未老紅葵嚼句幽禽答尋花晚蝶隨無人共幽興思與野僧期寒食再遊福田寺春山寂寂掩禪扉復嶺盤盤入翠微布襪青鞋供勝踐粥魚齋鼓薦玄機日烘幽徑緑煙暖風定曉枝紅雨稀曽是西堂讀書客不應啼鳥也催歸劉祁字京叔山西渾源人金之遺民著歸潛志古意二首庭前有桂樹緑葉尚離披秋風動地起飄落將安歸高飛入青雲下飛入汙泥貴賤既偶爾孰為喜與悲秋江有芙蓉顏色好鮮潔褰裳欲采折水深不可涉嚴風下飛霜芳艷空凋歇悵望一長嘆臨川無桂楫送雷伯威朔風起天末落木鳴空山冰霜正凝沍遊子百里還山郭送將别徘徊上高原如何暌離情對此芳歲闌壯士志四方不須涕汍瀾人生非山海會面亦不難願子崇明德餘功振文翰長因東南鴻惠我金玊言懷長源涼月夜如水秋風吹紫蘭獨居悵無聊佳人阻河山河山邈千里相望何時已雲橫雁影沈露下蟲聲起烽火照中州西南殺氣浮君居劉山下果若向時不人生有離别但惜知音絶匣內臥青蛇光芒射秋月汴水碧參差葉飛空樹枝如何相憶處還值暮秋時征夫詞頑雲漠漠秋天黑冷雨瀟瀟和雪滴途中騎士衣裳單半夜銜枚赴靈壁中州近嵗雨雪多只因戍馬窺黃河將軍錦帳衣千襲馬上揮鞭傳令急但令飽暖度朝夕一死沙場吾不惜九重日望凱歌歸安知中路行逶迤願將舞女纒頭錦添作征人身上衣征婦詞青燈熒熒照空壁綺窗月上莎雞泣良人塞北遠從軍獨妾深閨長太息憶初癡小嫁君時謂君早晚擁旌麾如何十載尚輿隸東屯西戍長奔馳秋風戎馬臨關路千里持矛關上去公家事急將令嚴兒女私情那得顧恨妾不為金鞞靫在君腰下隨風埃恨妾不為龍泉劍在君手內飛光焰慕君不得逐君行翠袖斑斕空血染君不見重瞳夙駕遊九疑蒼梧望斷猶不歸况今沙場征戰地千人同去幾人回君回不回俱未見妾心如石那可轉南京遇山樓倚天突兀聳高樓樓上家人白玊鉤落日笙歌迷汴水春風燈火似揚州仙人已去名空在豪客同來醉未休獨倚朱闌望明月鸞旌依約認重遊過陳司諫墓鸞坡烏府舊遊空三尺孤墳野寺中猶有憂時心不死墓門昨夜起秋風元好古字敏之性識穎悟讀書能強記無所不窺年二十就科舉再上不中意殊不自聊又娶婦不諧日致惡語遂以得疾未幾沒于北兵之禍年三十一中秋無月佳辰無物慰相思先賞空吟昨夜詩莫怪更深仍坐待密雲或有暫開時讀裕之弟詩藁漫題傳家詩學在諸郎剖腹留書死敢忘先人臨終有剖腹留詩之語背上錦囊三箭在直須千古説穿楊宋元詩會卷六十五
