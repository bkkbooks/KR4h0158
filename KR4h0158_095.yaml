body:
  text: 宋元詩會卷九十五兵部主事陳焯編李祁字一初茶陵人元統元年進士應奉翰林文字歷官江浙提舉丁母憂解職隱居永新山中年七十餘卒有雲陽先生集送非空晦之二上人歸青原青原山氣鬱盤紆去郭連村十里餘洗鉢水香晨粥後讀書燈燼曉鐘初晴天小閣收摩衲暖日輕雲護苾芻願得明年筋力健徑尋溪路訪深居和鍾德恭見寄江湖風浪日蕭蕭鰍蟹魚蝦亂躑跳諸葛有才終復漢管寧無計謾依遼烟消故國川原淨秋入空山草木凋猶恨歸來相見晚暮雲春樹碧天遙和咏海棠韻名花初發愛輕隂翠袖紅妝漸滿林步入錦帷香徑小醉扶銀燭畫堂深妖嬈喜識春風面零落愁關夜雨心多幸鳳皇池上客為抽勞思寫清吟顧德輝字仲瑛一名阿英崑山人輕財結客年三十始折節讀書築别業於茜涇西曰玉山佳處其亭館三十六備極瀟灑記必名宿詩必勝流即篆𨽻二三字亦必選當代名筆風流豪賞著稱東南後來罕有能繼者金粟冡中秋日燕集綽山古佳城左股接昆丘水作青龍來九派盤遭周道人金粟冡在彼山之幽團團青桂樹枝葉相蜷樛石削華表立碑刻金窠鎪人身無百年胡乃三彭仇四大偶一失丸丹不能瘳肉血潰臭腐不朽唯髑髏棄之道路傍行者得溺溲狐狸與蠅蚋食嘬紛相讐欲貽後之人以掩面目羞烏兔互出沒急行不入郵縱有萬丈繩誰能繫之留暖穴競螻蟻凉風滅蜉蝣榮名乃何物汲汲將奚求金谷珊瑚樹天網一夕收美人化黃壤燕子巢空樓大印佩六國散金馳八騶一朝不得志車裂徇九州秦皇與漢武靈藥採仙洲玉棺葬地底金鳬出海陬梨花自寒食夜雨鬼啾啾飛錢化蝴蝶走燐驚鵂鶹混沌鑿不死倐忽何能休丈夫不解事老大傷白頭何如種秫米壓酒日日篘今夕三五夕我已為君謀長瓶置十斛百結青絲兜截江取紫蟹攀樹摘紅榴周垣設茵席矮几陳脯修步登白雲屏待月豁醉眸劃然白蝦蟇抱出黃金毬又若摩尼珠躍出驪龍湫吐吞大地影晃漾東南浮老兔玉杵臼搗作人間秋寶城三千里縮景歸遐摉宫殿魚鱗鶱林木秋雲稠素娥騎彩鸞舞雪翻霓裘手折瓊樹花競拂金精流化為五素芒落我白瑶甌持滿向君語借箸請為籌十載苦國難豪傑紛戈矛鴻門碎玉斗桃園宰烏牛戰血濺野草餓莩填荒溝我時挈妻孥夜泛苕霅舟有兒握兵符承乏萬户侯三年效忠歸身作抱官囚平生萬卷書怒焚遭鬱攸廬墓讀內典守節事清修親友散如雪雲樹空悠悠獨爾數君子艱棘見何由今聞王師出卒伍皆兜鍪弄刀走官馬千里風颼颼桓桓李將軍大旗畫蚩尤去秋奪汴城今復追大酋屯兵泗水上添竈扼賊喉東南貢米粟連綱起歌謳我曹幸無恙坐見恢皇猷酒旗指南斗今兹會綢繆請起各稱壽我亦相勸酬羣才盡敏捷用作釣詩鈎青山忽大笑此意君知否呼童酌大白酹此土一壞他時蓋棺了神隨和氣遊申插空中華撒手鞭蒼蚪東海招若士西池訪阿緱共看麻姑爪當座劈箜篌不必兒女淚暗灑窀穸愁達哉司空圖吾今乃其儔大書勒崖壁永絶生前遊次周履道韻夜泊石湖湖水傍芙蓉露白蒹葭蒼畫船酒行飛急觴美人羅袖隨風揚長檠翠幕髙髙張浩歌起坐秋夜凉明月已在天中央大星小星光煜煌酒酣不記過船去但聽秋聲響疏雨夢中化作蝴蝶飛飛入花間向春語鄰雞喔喔東方曙船尾浪花風起舞為君起和夢中詩水氣如煙度秋渚天寶宫詞寓感四首蓮花池畔暑風凉玉竹回文寶簟光貪倚畫屏調翡翠誤開金鎖放鴛鴦輕綃披霧誇新浴墮髻攲雲衒晚妝笑指女牛私語處長生殿下月中央虢國來朝不動塵障泥一色繡麒麟朱衣小隊髙呵道粉筆新圖遍寫真寶雀玉蟬簪翠髻銀鵝金鳳踏文茵一從羯鼓催春後不信司花别有神五王馬上打毬歸贏得宫花獻貴妃樂起閣門邊奏少禍因臺寺諫書稀侍兒隨幸皆頒紫骰子䝉恩亦賜緋姊妹相從習歌舞何人能製柘黃衣宫衣窄窄小黃門躑躅初開賜縹盆夜月不窺鸚鵡冡春風每憶鳳凰園愛收花露消心渴怕解金荷見爪痕只有椒房老宫監白頭一一話開元夜宿三塔水落南湖不露沙又牽舫子到僧家春浮大斗娟娟酒寒隔虛櫺薄薄紗半夜檐鈴傳梵語一林江月照梅花坐來詩句生枯吻指㸃銀瓶索煮茶自贊儒衣僧帽道人鞋到處青山骨可埋還憶少年豪俠興五陵裘馬洛陽街夜坐金粟池上得凉字翠沼新秋浴夜光畫闌芳樹發天香西風陳陳廉纎雨荷葉荷花不奈凉往鳳陽次虎丘栁條折盡尚東風杼軸人家户户空秪有虎丘山色好不堪又在客愁中黃公望字子久自號大癡常熟人徙富春天姿孤髙少有大志試吏弗遂乃隱西湖筲箕泉歸富春年八十六而終子久博通今古詩效晚唐而畫直接武關同焉和鐡崖竹枝詞水仙祠前湖水深嶽王墳上有猿吟湖船女子唱歌去月落滄波無處尋和竹所詩奉柬顧仲瑛二首花檻香來風入座雕籠影轉月穿櫺鉤軒平野連天碧排闥遙山隔水青竹裏行厨常准備濁醪不用惱比鄰文章尊俎朝朝醉花果園林處處春王䝉字叔明吳興人趙松雪之甥畫山水師巨然得外氏法為文章不尚矩度搖筆數千言可立成隱於黃鶴山自號黃鶴山樵人亦以此稱之元末官理問入明為泰安州知州坐黨禍而死登泰山有引余過奉髙謁嶽祠見郝伯常三詩刻於廡下明日登日觀峰下瞰滄海塵世蒼茫青徐在袵席間耳因成此詩以補郝公之所未道者云飛仙挾我遊天門足躡萬壑雲雷奔凌虛直上數千尺適見混沌分乾坤巨鼇左折蓬萊股鯨波東注扶桑根地髙俯瞰滄海日天近仰叩清都閽古帝何年闢下土九㸃青煙散寰宇翠旍孔蓋此登封盛德神功照今古人間瞬息三萬年七十二君何茫然秦皇漢武踵遺躅鏤玉坎瘞山之巔金宫翠陛苦不樂遣使碧海求神仙羲和龍轡不稍貸豈料海水成桑田試向封中一回首六合坱莽空雲煙千秋誰識當時事五松大夫知此意巖前長揖大夫松數子胡乃干秦封髙標直下魯連節避世不及商山翁雪髯霜幹如屈鐵濤聲瑟瑟吟悲風松本無心偶然耳人情好惡多彌縫欲傾箕潁一瓢水為汝淨洗羞慚容為君解嘲君勿怒萬事轉首成虛空帝子絳節朝丹穹神靈婀娜羣仙從噓呵紫焰開芙蓉光景上屬超鴻濛玉女夜降騎青龍鸞匏鳳笙聲嗈嗈霓裳舞袖飄長虹瓊音間作鳴絲桐白露清謡曲未終冷風命駕歸崆峒千峰萬峰浸明月恍惚身在瑶池宫明朝稽首下山去翠幕突兀青霞中客中感懷十年踪跡厭紅塵功業無成白髮新夢裡不知身是客覺來惟有影隨身夕陽衰草梁園暮細雨閒花楚水春馬足經行今幾度溪山應笑未歸人閒適緑楊堪繫五湖舟袖拂東風上小樓晴樹逺浮青嶂出春江曉帶白雲流古今我愛陶元亮鄉里人稱馬少游不負平生一杯酒相逢花下醉時休宫詞南風吹斷採蓮歌夜雨新添太液波水殿雲廊三十六不知何處月明多仁和俞友仁見此詩歎賞曰此唐人得意句也遂以其妹妻之過姑蘇山圍平野緑煙中江葦蕭蕭兩岸風誰種闔閭門外栁年年飛絮入吳宫門一作域潘純字子素廬州人少有俊才遊京師一時文學貴介爭延致之每宴集輒云潘君不在令人無歡至正間御史大夫納琳開行臺於紹興其子昻阿紿執同知圖沁子素實為畫計乃未幾子素亦罹害焉送杭州經歷李銓代歸東家老人語且悲衰年却憶垂髫時王師百萬若過客青蓋夜出民不知巷南巷北癡兒女把臂牽衣學人語髙樓急管酒旗風小院新聲杏花雨北來官長能相憐民間蛺蝶飛青錢黃金白璧䭾西馬明珠紫貝輸南船繁華消歇如翻掌官中賦斂年年長里巷蕭條去不歸華屋重門結蛛網語終嗚咽不欲聞道傍狼虎方紛紜麒麟鳯皇那復得使我益重髯參軍參軍在官近一考素髮蕭蕭坐成老上官掣肘下吏罵賴有閭閻獨稱好杭州公事天下繁大才處决無留難參軍纍官日益貴何術可使斯民安嶽王墓湖水春來自緑波空林人迹少經過夜寒石馬嘶風雨日落山精笑薜蘿江左長城真自壞鄴中明月竟誰歌惟餘滿地萇𢎞血芳草年深碧更多錢塘懷古海門寒日淡無輝偃月堂深玉漏稀萬竈貔貅江上老兩宫環珮月中歸內園羯鼓催花發小院珠簾看雪飛遺恨至今猶未了至尊行酒著青衣館娃宫故址苧蘿雲物媚修容玉燕金鸞送入宫吳下諫臣終受戮越中國史不言功烏啼月落霜初曉鹿走春風草亦空香徑屧廊隨世換倚巖惟有寺樓紅送金溪道士南歸南州髙士芰荷衣賣藥都門盡不知手種溪頭千樹杏花開正是到家時和鐵崖竹枝詞雲髻髙梳鬢不分掃除虛室事元君新糊白紙屏風上盡畫蓬萊五色雲題宋髙宗劉妃圖秋風落盡故宫槐江上芙蓉並蒂開留得君王不歸去鳳凰山下起樓臺題趙子固畫蘭江上青山日欲晡幽花小紙墨模糊華清宫殿生秋草零落滕王蛺蝶圖陳基字敬初臨海人少與其兄褧受業於黃溍遊京師授經筵檢討因為人草諫章得罪引避歸里值南州用兵起為樞密府都事轉江浙行省郎中以本職參張士信軍事遷學士院學士明初召入預修元史賜金而還秋懷二首梧桐墮金井寒螿栖露叢離居在萬里一夕生秋風秋風忽已暮離居邈何處獨寐在重幃相從乃中路秋水不可涉美人安得從眷彼芙蓉花盈盈秋水中非無舟與楫所畏蛟與龍臨流不能采零落委芳叢寄姚子章聞君又作錢塘客多在青樓少泉石佳人姓蘇名小小占斷西湖好春色沙棠為舟桂為槳驚起鴛鴦飛兩兩有時醉倒百花間不記六橋新月上行樂須當少壯時英雄自古皆堪悲歸來莫負張京兆鸚鵡窗間喚畫睂羣珠碎傷吳帥潘元紹衆妾作潘七妾皆青年絶色善纂組歌詞因潘出軍恐致疑皆自經繡紋刺綺春纎長蘭膏鬌鬢瓊肌香芳年艷質媚花月三三兩兩紅鴛鴦翠靴踏雲雲帖妥海棠露濕胭脂朵冶情紛作蝶戀春新曲從翻玉連瑣畫堂銀燭天沈沈揚睂一笑輕千金明珠買得緑珠心欲揮魚腸掃妖彗主君勿疑心似醉一宵痛擊羣珠碎門前鐵騎嘶寒風竒勳解使歸元戎謝從義參軍自京還言危中書見問且訝無書因寄謝參軍過我夷白菴為言廊廟髙巖巖故人誰為國柱石臨川先生危大參猥䝉問及且見訝十載尺書無一緘憶昔相從客燕趙削去崖岸無猜嫌辱陪五更佐三老勸講六經陳二南御史不容丞相忌司𨽻側目宫臣讒脫身黨籍走吳楚託跡丘園求孔𣆀孰令展禽三見黜自分嵇康七不堪平生不解帶刀劍晚歲强使嫺韜鈐髀消怕騎將軍馬面皺羞著從事衫折衝師旅非夙習奔走戎行真可慚危言重畏速官謗微祿不逮供親甘慰情屢抱鞶絲女與國未辦添丁男胡為長年在道路席不暇暖突不黔幾回乞身向藩省未許曝背歸茅檐終當投劾謝寮友徑去結屋依山嵐鄙夫出處蓋如此為報先生聊口占先生事業則異是論道經邦民具瞻早令四海偃兵甲盡遣百姓趨農蠶時和歲豐我所願功成身退公當諳他年若訪赤松子一笑相逢掀紫髯新郭扁舟夜泊新郭市石湖水深清且泚長笑一聲天地秋萬壑驚風泣山鬼匡廬生玉山子意氣相傾誓終始呼童沽酒烹錦鯉醉入蘆花月如水周郎放歌踏船尾我亦和之聲亹亹明月照我心秋水洗我耳富貴亦何為人生行樂爾城中黃塵眼為眯安得置我丘壑裏送庸田司寶惟善經歷籍甚中朝彥翩然萬里情禮從蓮幕重詩到水曹清未雪辭吳會先春入薊城殷勤黃閣老能不問蒼生闞鄉驛用故翰林宋顯夫韻為問西來使長安去幾何檄書飛僰道征戍動交河鸚鵡承恩舊葡萄入貢多平生二鳥賦感慨未能磨寄玉山人兼柬匡廬外史美人不見已三月日日相思賦角弓興發頗疑詩有助憂來翻訝酒無功未須結客遊樊上却擬移家住瀼東與報匡廬于外史新醅宜壓荔枝紅笠澤有懷碧梧翠竹鬱參差艾納流薰繡幕垂瓊管隔花聞度曲畫屏燒燭看圍碁坐延太乙青藜杖倒著山公白接䍦何日綵舟還蕩槳為判痛飲習家池别後聞入杭賦寄栁洲寺下絲竹繁蘇小墓邊風日暄天開十里水如鏡雨過六橋花欲言畫船夜聽孤山鶴鐵笛曉驚西竺猿歸來相遲桃源上為唱竹枝傾緑尊偶成二首武陵溪水碧灣灣窈窕幽期不可攀戴勝桑間飛自得王睢洲上語相關歌成桃葉臨流和采得蘋花帶月還見說荔枝漿已熟不分涓滴到人間南州五月尚兼衣白苧窗間未脫機青李來禽書不至荔枝盧橘賦多違水晶簾箔圍晴晝艾納罏薰逗夕霏為問上都城裏客菖蒲花發幾時歸賦楊花巷南巷北晝冥冥搖蕩春風未肯停薄命不禁巫峽雨前身曾化楚江萍已於謝女詩中見更向劉郎曲裏聽腸斷不堪回首處並人飛過短長亭次錢伯行韻五月東林水竹凉新荷葉小栁絲長且臨大令鵝羣帖不戀尚書雞舌香楚客謾誇千樹橘杜陵共愛百花莊滿天風露枇杷熟歸奉慈親取次嘗次韻答秦文仲郭羲仲聨句見寄客路尋常江海上春光强半雨聲中習池無酒醉山簡蓮社有心期逺公香燼旋溫婆律火茶煙輕揚石楠風不因二仲聨詩至安得從容一笑同春日邵氏園池寂寞園林帶夕暉昔年曾此戀芳菲桞塘水暖鴛鴦浴花徑風酣蛺蝶飛蔓草拂衣人不剪畫梁無主燕空歸洛陽池館關興廢我欲春山賦采薇寄沈仲說野人籬落並江濆竹裏流泉竹外雲好學槖駝惟種樹莫誇司馬最能文小橋斜接漁樵路落日爭呼雁鶩羣獨憶咏歸亭上客久留城府思紛紛淮隂雜興二首千里相逢淮海濱一枝誰寄嶺梅春老來易感山陽笛年少休輕跨下人失侣雁如秦逐客畏寒花似楚遺民每過百戰瘡痍地立馬西風為損神落木蕭蕭雁度河西風嫋嫋水增波甘羅營裏秋聲急韓信城頭月色多淮市有魚聊可食楚山無桂不須歌古今無限關心事付與當年春夢婆二十九日至淮安城南十五里述懷欲向江湖覓釣磯此心長與事相違添丁未辦盧同計算老空知伯玉非淮甸草肥宛地馬楚州人著漢宫衣將軍奏罷平西捷還許山翁倒載歸分省諸公邀遊西湖宴樂湖上相逢宴屢開紫薇花下釣舟來水光釀緑凝歌袖山色分青入酒杯蛺蝶影隨羅扇動琵琶聲逐畫船回獨憐英骨埋芳草南拱枝頭蜀鳥哀緑波亭眼明忽見此亭新公子詩成思入神坐愛澄波千頃緑夢回芳草一池春每煩鸚鵡留佳客欲採芙蓉寄逺人燕子不來秋巳暮倚欄無語獨逡巡秋日雜興一夜西風木葉飛畫梁落月淡餘輝銀燈夜照還家夢金剪秋裁寄遠衣霜信早隨新雁去素書深訝故人稀無因為謝東曹掾鱸熟蓴香莫便歸八月十三夜泛姚江城畫船撾鼓唱回波皓齒青娥不用歌好月愛看輪未滿清秋莫問夜何如明將織女機絲動寒恐嫦娥白髮多天上清光應更足羽衣安得共婆娑劉永之字仲修臨江人幼從父宦遊四方即以嗜學聞長益孳孳汲古與同郡楊伯謙彭聲之諸賢互相鏃礪其文有唐宋大家之風宋景濂雅愛其人與文見諸所贈詩中嗣子劉奉獲罪縣官竟籍其家以富纍身視唐陳子昂得禍相同為可歎也茅屋讀書圖峨峨蒼山白雲冒之靈液湥漉瀉為清漪帶我林薄環我蓬茨春日載陽卉木華滋呦呦鳴鹿泛泛浮鷖樂此幽獨理我琴冊嗟彼聖賢遺我令則顧瞻周道零露在草駕言從旃中心懆懆澗有蘭茝山有蕨薇逍遙卒歲皓首為期秋懷白日行西陸氣候慘以悽沈沈夜未旦皎皎明月輝寒蛩響隂砌羇鳥鳴髙枝耿耿不能寐攬衣起徘徊天道諒幽逺人理固多違念彼西方人喟然傷我懷翩翩梁間燕矯矯雲中雁南翔復北逝時序倐已換駕言出西郊登髙縱遊觀原野何蕭條流潦方漫漫萇楚有餘悲下泉興永歎安得攜美酒聊以娛今旦幽幽澗裏蘭娟娟常自好秋風厲嚴威零落隨百草芬菲豈不美衰榮順天道嗟我平生友離居心懆懆坐令鬢成素為歡當及早晝夜相代更誰能置懷抱凉飈振庭樹浮雲結重隂中情忽不樂拂几彈鳴琴泠泠多苦調零淚沾衣襟逺懷東都士登彼北邙岑悵然望京洛五噫發哀吟悠悠千載下誰識古人心門有車馬客門有車馬客駕言發西京備諳興廢事具識治亂情天子既神武儲君復神明鐘鳴啓雙闕王侯方雁行要途無貴戚密地有寒英懷柔建六典戡强用五兵西伐踰蔥嶺東征際滄溟北盼讋沙漠南顧定儋瓊金圖啓天祕銀甕發地靈八表既蕩一九有悉來庭鄙人值陽九嗟與厄運并慷慨攜客歎矯首晞太平翠屏山房為羅伯綱賦結構依茂林開軒面青嶂浮嵐變朝采宿雨經池上春陽正和煦生意日條暢徑草緑已繁臯蘭葉初放修翰摩煙霄游鱗泳清漲動息皆自然至理妙無象遺紛便靜觀寂寞諧所尚偃仰丘壑間中情無得喪題匡山石室羣山爭盤紆衆壑盡奔放中峰最竒絶直立數千丈危構倚石壁面勢極𢎞敞心神坐超忽雲雨接惝恍山色晚更佳泉聲靜逾響猶言最絶頂臨眺極所往欲窮千里目更試九節杖楊𢎞中藥室秉志慕冲淡息迹在丘園閒庭遍芳草髙窗見逺山采苓陟松徑煮术散榆煙董生垂往躅嵇子有遺編神宇謝氛濁天倪諒斯全惟當振塵服與子共清言野老看雲圖文湍激幽澗白雲流逺山偃仰長松下延眺一怡顔清風拂素服瑶花落樹間拾薪青煙際煮苓供晚餐耽此丘中賞竟日未言還秋林讀書圖為章光逺賦疏雨稍侵竹輕颸已滿林山窗敞虛寂席户映深沈蠨蛸或陊几蝸牛時觸琴酌酒磐石上把卷髙梧隂披覽未終帙繁思浩盈襟羲皇倐已逺叔季遞荒淫懷哉魯連子輕世有遐心願保金玉體遺以瑶華音行當拂塵服就子碧山岑題煙雲臺祠宫儼肅穆靈貺赫然敷藻井垂珠實素壁繪金圖澗長三花樹林栖九子烏遙峰隱殘照丹霞晚漸舒渺然登雲駕誰謂古今殊山亭宴坐懷西峰諸友荒溪無來軌山亭迥且深清風左右至夏木靄繁隂飛飛雙珍禽喈喈流好音懷君青霞珮歷亂朱絃琴惟應西峰月可以喻同心方壺畫軒岐論道圖為道士何仲旭賦彩筆發神祕仙山開畫圖靈文隱玉笈石扇啓金樞寤寐軒岐術結交蘇董徒羽服繫蘿帶笻杖縣藥壺行當謝塵服從子崑崙墟雪峰詩為蜀人賦岷峨鎮坤維上有太古雪寒光萬壑連皓采千峰列石竇玉泉生琪樹瑶華結拄笏面嶙峋中懷共髙結山澗讀易軒環環碧澗連靡靡蒼山屬初日照林端春餘鳴布榖松深有去雲苔靜無來躅獨把一編書時向窗間讀海屋為蕭君賦結屋青海上弄影蒼江涯手持翡翠竿誤拂珊瑚枝龍噓春霧合鶴度曉雲垂弱流幾清淺為書報安期題枯林蘭猗蘭生逺壑葳㽔粲玉芳白露漙夕景光風轉朝陽吹簫望澧浦鼓枻向沅湘何以貽逺者徘徊雙鳴璫同劉伯髙分韻得羽字僧居謝煩燠蕭條對疏雨碧甃躍金鱗石梁散文羽水氣暗浮窗林煙細縈樹忽憶掉觥船牽荷弄秋渚贈友人之章貢秋雨正冥冥秋風何淅淅對酒送行人憂思坐填積黃鵠不可馴飛蓬易相識幾日對崆峒滄洲渺難極黃士一為余作墨梅效隂何體朝陽耀白雪微月照寒泉玉環承佩結明珠綴組連不愁歌吹闋已向畫圖傳詎是揚州郭偏䝉何遜憐為潘仲翬題定使君所贈馬郎中畫鶴郎中畫鶴稱第一江海十年多見之蘭皋明月照獨舞雪影參差風倒吹滄洲𤣥圃三山上琪樹金芝日應長萬里懷歸惜羽毛中宵怨别流孤響通泉素壁久漂零忽見新圖百感并華亭舊歎傷心切赤壁扁舟入夢驚緑錦池邊飼秋雨驃騎多情每同賦相思欲報故人知為傳一札東飛去田園幽隱圖我家清江縣城北竹梁花埭環深宅鄰屋分燈夜讀書仙山借鹿春耕石蹤跡年來逐轉蓬萬事驚心舊業空無錢買山惟愛畫坐對新圖如夢中柴門茂樹雅相向野水山橋接空曠雨足沙田野犢閒風回茅屋荒雞唱隔林炊黍起新煙接竹穿籬引澗泉傍隄楊栁皆新種近舍松枝不記年題傅商翁觀松瀑圖山風蕭蕭晝寂歷長松落落倚絶壁紫煙乍留青蓋中瀑布迸落蒼崖石山中之人形骨清幅巾藜杖時獨行溪回陡絶去無路坐撫瑶琴摹澗聲我亦平生慕真賞十年誤落江湖上故山蕭條久不歸夜雨秋衾夢長往人生適意無是非雲林久與幽人期九節預裁青竹杖明朝試拂薜蘿衣送羅與敬歸西昌石龍磯畔多芳草遊子憶家春已老水北楊花撲地飛旁人謾道飛花好愛子不忍别送子到水濆青天孤影飛黃鵠落日長風吹斷雲朝發銅塘津暮宿青泥渡帆過孝通祠漸是西昌路金魚洲逺樹青青三顧浮煙生杳冥石扶壞道通髙閣水齧危沙見古城君家正在一方住獨有園廬俯江渚昨夜深閨夢逺人相思定倚櫻桃樹行路難涉水多蛟龍跋山多猛虎荒城荆棘上參天大澤修蛇橫草莽百里慘黯無人烟驅車暝行陷泥滓前車軸折後車來行人不覺旁人哀眼前道路已如此何况太行髙崔嵬為君歌路難請君試一聽位髙金多豈足貴擊鐘鼎食未是榮東溝水流西溝涸昨日花開今日落世事榮枯反覆手七尺之軀安所託古來賢達人與時同卷舒龎公鹿門隱馬生鄉曲居款假聊乘下澤車何用終朝出畏途畦樂園郭南抱甕者久與世情疏砌長龍鬚草林開燕尾渠轆轤花下轉萵苣雨中鋤蔗熟能相寄酬君薤葉書王若水山水谷口寒潮上崖隂宿霧開石橋通窈窕金棧寄崔嵬樹暗茅堂閉波明桂楫回山中花落盡為報豫章臺溪山漁艇圖夕陽延暮景秋色逺冥冥流水雙溪緑寒山九疊青石樓依古木草徑接遙汀釣叟長年在何人問客星和楊伯謙韻酌酒長松下垂蘿拂酒杯異禽窺藥鼎乳鹿臥書臺澗水穿林去山雲帶雨回相期同結屋不厭野人來贈傅元賓兼謝梁徵士百里訪柴荆秋原獨自行屐沾山雨滑衣染澗雲輕賣卜應潛姓工詩不趂名故人枉書札煩為謝髙情玉峽潭陂山莊歲杪涉風烟連村熟芋田路危楓葉斷石險柱根縣鹿柵成山壘漁梁阻澗泉爭心逐時化耕鑿喜安然經湖口縣古縣開湖口髙檣集岸隈山從廬阜起江向武昌來近水皆楊栁荒城半草萊客心原自速更遣曉風催題方方壺畫仁智圖為道士王默淵賦玉簡神仙記瓊臺羽士家軒窗明日月冠佩剪雲霞白鶴窺殘奕青童掃落花憶曾訪丹術楓徑駐輕車周所立江村草堂將軍舊日曾分祿為結茅堂草覆檐過橋栁暗鳥爭樹當户花開燕入簾醉書江石嫌雲冷晚飯山苗帶露甜之子多才空白首獨將詞賦擬江淹雲臥山房為了上人賦空山雲臥杳難尋惟許人間禮磬音龍起鉢中生片影鶴歸山頂結輕隂化為法雨沾衣濕散作天花繞座深去住了然無定著祇應猛虎識禪心仙溪書院為何能舉賦江海歸來兩鬢霜仙源深處築茅堂參差樹映春山逺窈窕橋通碧澗長金匱藏書遺鳥跡石田栽玉起虹光只愁來往迷花嶼預擬藤隂問釣航山居圖世傳隱處祗空聞草斷行踪路不分鬼谷樹深衣濕翠鳳林芝暖石生雲寒泉叠響清琴調白雪飛花逐劍文已約八公攜手去青岑從此謝囂氛淵明入社圖空山樓觀逺蒼蒼路出深深石磴長近瀑飛雲經樹濕穿花流水過橋香髙僧喜識桄榔杖稚子歡迎薜荔裳入社幾時還出社松隂十里到柴桑北澗春日二首青松繞舍間幽篁白板扉髙薜荔牆窗曉禽聲答人語山春蘭氣雜梅香家留渝曲幽居僻草滿臨城舊業荒坐憶交親半淪沒不因鳴笛自沾裳喔喔野雞鳴逺樹瑶琴揮罷思愔愔寒凌山色難生態春入溪雲易合隂畬隴夜燒諳土俗州城晝掩識邊心芳皋杜若相將緑偏覺騷人幽怨深寄淦川友人廢郭浮烟見緑蕪茅茨星散縣樓孤江連戈舫鳴春鸛樹對寒燈起夜烏古硯自磨銅雀瓦坐氊還叠罽賔毺市南美酒梨花白最憶青絲繫玉壺送鎖子堅之袁城雪色征袍拂曙飈宜陽西去思飄飄千峰靜對芙蓉幕三峽遙連螮蝀橋櫂得雀舟衝雨緩借來驄馬向春驕青年書記相知久共按秦筝和玉簫和楊允恭金明橋晚眺韻楊炯多才愛碧流金明橋上對汀洲日沈水屋蒹葭晚凉入山衣薜荔秋草色淺深行處合嵐光明滅望中浮魚鳬零亂扁舟集渾似東湖釣石頭題鄒惟中西樓西樓逺對鼎山斜野客來尋駕鹿車竹嶼暝烟浮翠黛石田秋雨潤銀沙清樽未酌心先醉往事重論鬢欲華肯借溪南三畝宅從君學種邵平瓜題宋能敏青壁軒沓嶂層巒翠幾重神光動處有竒逢霧生深谷藏𤣥豹泉落隂崖化玉龍丹篆曉書朱露濕碧窗晴對白雲封何時攜我青藜杖結屋來依五粒松舟行膠淺晚泊小橋期至豫章而别則咫尺矣即事書懷簡何平子偶遇乘槎侣因辭下澤車客程兼旦暮川路滯風沙石碎愁鵝子汀長怯犬牙急湍騰雪馬淺溜蹙霜花聚舫時連鷁攢篙若鬭蛇去留因地利漂泊任天涯洲指黃牛近山瞻白鶴遐潭烟迷浦溆岸火識人家繫纜安樁杙偎篷宿葦葭中宵漁響歇向曉雁聲譁忽憶别期促還憐光景賒劍愁分紫氣酒喜酌彤霞坎壈身如寄蹉跎鬢欲華相期何處好勾漏問丹砂池閣獨坐懷周伯寧諸公香閣林光合氷簾水霧銷虛池含碧鑑古甃叠青瑶境託祇園迥泉分别圃遙雙桐隂覆地疏竹幹凌霄珍鳥銜珠果金魚䕃翠苕輕颸吹白絮凉露濕紅綃鸚鵡懷深酌箜篌想緩調含情託柔翰幽賞憶清杓緑錦池為定侯賦官沼湛芳泉紅櫳照綺錢藻絲翻玉鯉栁葉曳金蟬日護瑰文麗雲回碧甃圓凌波乘洛佩向月映湘弦樹影浮觴近花隂列籍連鑑湖賓客在共賦緑荷篇新歲有感寄柬席煥章胡居敬積雪蒼茫裏寒山慘淡中艱難經日别漂泊此時同筋力年非壯詩書道未通狼烟春戍火禽語夜溪風心似西橋水滔滔日向東望香爐峰讀孟浩然詩因述移櫂望廬阜香爐舊識名鳥飛千嶂碧日靜片雲青垂瀑長虹下深溪猛虎行松門通佛宇蘿徑繞檐楹業愛逺公白詩欣孟子清余方謝羈束幸此共芳聲酬别宋贊善大夫景濂諸老風流邈不聞誰攜健筆記清芬南宫新賜郎官佩東觀長留太史文聽琴圖為周易題韋帶筠冠白􅂒衣龍唇鶴足軫文犀試看十指風前繞曲裏時聞烏夜啼題郭熙春山紫霧春山緑樹齊水流花嶼亂鶯啼蹇驢烏帽歸來晚恰似成都濯錦溪偶題二首烏絲細寫蠶頭篆白紵新裁燕尾衫雨過西軒苔色淨澗中雲影似江帆五粒松交九節蒲銅瓶分水浸珊瑚小窗閒度遊仙曲吹遍參差白玉竽北澗夏日酒傾蘭勺石泉香衣剪荷盤露氣凉誰料十年江海興閉門疏雨對橫塘夜宴定侯宅醉中口占麾羽堂中畫燭明將軍夜醉水西營青樓小婦新承寵彈得凉州第一聲宋元詩會卷九十五
