body:
  text: 宋元詩會卷九十五兵部主事陳焯編李祁字一初茶陵人元統元年進士應奉翰林文字歴官江淛提舉丁母憂解職隱居永新山中年七十餘卒有雲陽先生集送非空晦之二上人歸青原青原山氣鬱盤紆去郭連村十里餘洗鉢水香晨粥後讀書燈燼曉鐘初晴天小閣收摩衲暖日輕雲䕶苾芻願得明年筋力健徑尋溪路訪深居和鍾德恭見寄江湖風浪日蕭蕭鰍蠏魚蝦亂躑跳諸葛有才終復漢管寧無計謾依遼烟消故國川原浄秋入空山草木凋猶恨歸來相見晩暮雲春樹碧天遥和咏海棠韻名花初發愛輕隂翠袖紅妝漸滿林步入錦帷香徑小醉扶銀燭画堂深妖嬈喜識春風面零落愁關夜雨心多幸鳳皇池上客為抽勞思寫清吟顧德輝字仲瑛一名阿英崑山人輕財結客年三十始折節讀書築别業於茜涇西曰玉山佳處其亭館三十六備極瀟灑記必名宿詩必勝流即篆𨽻二三字亦必選當代名筆風流豪賞著稱東南後來罕有能繼者金粟冡中秋日燕集綽山古佳城左股接昆丘水作青龍來九派盤遭週道人金粟冡在彼山之幽團團青桂樹枝葉相蜷樛石削華表立碑刻金窠鎪人身無百年胡乃三彭仇四大偶一失丸丹不能瘳肉血潰臭腐不朽唯髑髏棄之道路傍行者得溺溲狐狸與蠅蚋食嘬紛相讐欲貽後之人以掩面目羞烏兔互出没急行不入郵縱有萬丈繩誰能繫之留暖穴競螻螘凉風滅蜉蝣榮名乃何物汲汲將奚求金谷珊瑚樹天網一夕收美人化黄壤燕子巢空樓大印佩六國散金馳八騶一朝不得志車裂徇九州秦皇與漢武靈藥採仙洲玉棺葬地底金鳬出海陬梨花自寒食夜雨鬼啾啾飛錢化蝴蝶走燐驚鵂鶹混沌鑿不死倐忽何能休丈夫不解事老大傷白頭何如種秫米壓酒日日篘今夕三五夕我已為君謀長缾置十斛百結青絲兜截江取紫蠏攀樹摘紅榴周垣設茵席矮几陳脯脩步登白雲屏待月豁醉眸劃然白蝦蟇抱出黄金毬又若摩尼珠躍出驪龍湫吐吞大地影晃漾東南浮老兔玉杵臼搗作人間秋寶城三千里縮景歸遐摉宫殿魚鱗鶱林木秋雲稠素娥騎彩鸞舞雪翻霓裘手折瓊樹花競拂金精流化為五素芒落我白瑶甌持滿向君語借箸請為籌十載苦國難豪傑紛戈矛鴻門碎玉斗桃園宰烏牛戰血濺野草餓莩填荒溝我時挈妻孥夜汎苕霅舟有兒握兵符承乏萬户侯三年效忠歸身作抱官囚平生萬卷書怒焚遭鬱攸廬墓讀内典守節事清修親友散如雪雲樹空悠悠獨爾數君子艱棘見何由今聞王師出卒伍皆兜鍪弄刀走官馬千里風颼颼桓桓李將軍大旗画蚩尤去秋奪汴城今復追大酋屯兵泗水上添竈扼賊喉東南貢米粟連綱起歌謳我曹幸無恙坐見恢皇猷酒旗指南斗今兹會綢繆請起各稱壽我亦相勸酬羣才盡敏捷用作釣詩鈎青山忽大笑此意君知否呼童酌大白酹此土一坏他時蓋棺了神隨和氣遊申挿空中華撒手鞭蒼蚪東海招若士西池訪阿緱共看麻姑爪當座劈箜篌不必兒女淚暗灑窀穸愁達哉司空圖吾今乃其儔大書勒崖壁永絶生前遊次周履道韻夜泊石湖湖水傍芙蓉露白蒹葭蒼画船酒行飛急觴美人羅袖隨風揚長檠翠幙髙髙張浩歌起坐秋夜凉明月已在天中央大星小星光煜煌酒酣不記過船去但聽秋聲響疎雨夢中化作蝴蝶飛飛入花間向春語鄰雞喔喔東方曙船尾浪花風起舞為君起和夢中詩水氣如煙度秋渚天寶宫詞寓感四首蓮花池畔暑風凉玉竹迴文寶簟光貪倚画屏調翡翠誤開金鎖放鴛鴦輕綃披霧誇新浴墮髻攲雲衒晩妝笑指女牛私語處長生殿下月中央虢國來朝不動塵障泥一色繡麒麟朱衣小隊髙呵道粉筆新圖徧寫真寶雀玉蟬簪翠髻銀鵝金鳳踏文茵一從羯鼓催春後不信司花别有神五王馬上打毬歸贏得宫花獻貴妃樂起閤門邊奏少禍因臺寺諫書稀侍兒隨幸皆頒紫骰子䝉恩亦賜緋姊妹相從習歌舞何人能製柘黄衣宫衣窄窄小黄門躑躅初開賜縹盆夜月不窺鸚鵡冡春風每憶鳳凰園愛收花露消心渴怕解金荷見爪痕只有椒房老宫監白頭一一話開元夜宿三塔水落南湖不露沙又牽舫子到僧家春浮大斗娟娟酒寒隔虚櫺薄薄紗半夜檐鈴傳梵語一林江月照梅花坐來詩句生枯吻指㸃銀缾索煮茶自贊儒衣僧帽道人鞋到處青山骨可埋還憶少年豪俠興五陵裘馬洛陽街夜坐金粟池上得凉字翠沼新秋浴夜光画闌芳樹發天香西風陣陣廉纎雨荷葉荷花不奈凉往鳳陽次虎丘栁條折盡尚東風杼軸人家户户空秪有虎丘山色好不堪又在客愁中黄公望字子久自號大癡常熟人徙富春天姿孤髙少有大志試吏弗遂乃隱西湖筲箕泉歸富春年八十六而終子久博通今古詩傚晩唐而画直接武闗仝焉和鐡厓竹枝詞水僊祠前湖水深岳王墳上有猿吟湖船女子唱歌去月落滄波無處尋和竹所詩奉柬顧仲瑛二首花檻香來風入座雕籠影轉月穿櫺鉤軒平野連天碧排闥遥山隔水青竹裏行厨常准備濁醪不用惱比鄰文章尊俎朝朝醉花果園林處處春王䝉字叔明吳興人趙松雪之甥画山水師巨然得外氏法為文章不尚矩度揺筆數千言可立成隱於黄鶴山自號黄鶴山樵人亦以此稱之元末官理問入明為泰安州知州坐黨禍而死登泰山有引余過奉髙謁嶽祠見郝伯常三詩刻於廡下明日登日觀峰下瞰滄海塵世蒼茫青徐在袵席間耳因成此詩以補郝公之所未道者云飛仙挾我遊天門足躡萬壑雲雷奔凌虚直上數千尺適見混沌分乾坤鉅鼇左折蓬萊股鯨波東注扶桑根地髙俯瞰滄海日天近仰叩清都閽古帝何年闢下土九㸃青煙散寰宇翠旍孔蓋此登封盛徳神功照今古人間瞬息三萬年七十二君何茫然秦皇漢武踵遺躅鏤玉坎瘞山之巔金宫翠陛苦不樂遣使碧海求神仙羲和龍轡不稍貸豈料海水成桑田試向封中一回首六合坱莽空雲煙千秋誰識當時事五松大夫知此意巖前長揖大夫松數子胡廼干秦封髙標直下魯連節避世不及商山翁雪髯霜幹如屈鐵濤聲瑟瑟吟悲風松本無心偶然耳人情好惡多彌縫欲傾箕潁一瓢水為汝浄洗羞慚容為君解嘲君勿怒萬事轉首成虚空帝子絳節朝丹穹神靈婀娜羣仙從嘘呵紫燄開芙蓉光景上屬超鴻濛玉女夜降騎青龍鸞匏鳳笙聲嗈嗈霓裳舞袖飄長虹瓊音間作鳴絲桐白露清謡曲未終冷風命駕歸崆峒千峰萬峰浸明月恍惚身在瑶池宫明朝稽首下山去翠幙突兀青霞中客中感懷十年踪跡厭紅塵功業無成白髪新夢裡不知身是客覺來惟有影隨身夕陽衰草梁園暮細雨閒花楚水春馬足經行今幾度溪山應笑未歸人閒適綠楊堪繫五湖舟袖拂東風上小樓晴樹逺浮青嶂出春江曉帶白雲流古今我愛陶元亮鄉里人稱馬少游不負平生一杯酒相逢花下醉時休宫詞南風吹斷採蓮歌夜雨新添太液波水殿雲廊三十六不知何處月明多仁和俞友仁見此詩歎賞曰此唐人得意句也遂以其妹妻之過姑蘇山圍平野綠煙中江葦蕭蕭兩㟁風誰種闔閭門外栁年年飛絮入吳宫門一作域潘純字子素廬州人少有俊才遊京師一時文學貴介争延致之毎宴集輒云潘君不在令人無歡至正間御史大夫納琳開行臺於紹興其子昻阿紿執同知圖沁子素實為畫計乃未幾子素亦罹害焉送杭州經歴李銓代歸東家老人語且悲衰年却憶垂髫時王師百萬若過客青蓋夜出民不知巷南巷北癡兒女把臂牽衣學人語髙樓急管酒旗風小院新聲杏花雨北來官長能相憐民間蛺蝶飛青錢黄金白璧䭾西馬明珠紫貝輸南船繁華消歇如翻掌官中賦斂年年長里巷蕭條去不歸華屋重門結蛛網語終嗚咽不欲聞道傍狼虎方紛紜麒麟鳯皇那復得使我益重髯參軍參軍在官近一考素髪蕭蕭坐成老上官掣肘下吏罵賴有閭閻獨稱好杭州公事天下繁大才處决無留難參軍累官日益貴何術可使斯民安岳王墓湖水春來自綠波空林人迹少經過夜寒石馬嘶風雨日落山精笑薜蘿江左長城真自壞鄴中明月竟誰歌惟餘滿地萇𢎞血芳草年深碧更多錢塘懷古海門寒日淡無輝偃月堂深玉漏稀萬竈貔貅江上老兩宫環珮月中歸内園羯鼓催花發小院珠簾看雪飛遺恨至今猶未了至尊行酒着青衣館娃宫故址苧蘿雲物媚修容玉燕金鸞送入宫吳下諫臣終受戮越中國史不言功烏啼月落霜初曉鹿走春風草亦空香徑屧廊隨世換倚巖惟有寺樓紅送金谿道士南歸南州髙士芰荷衣賣藥都門盡不知手種谿頭千樹杏花開正是到家時和鐵厓竹枝詞雲髻髙梳鬢不分埽除虚室事元君新糊白紙屏風上盡画蓬萊五色雲題宋髙宗劉妃圖秋風落盡故宫槐江上芙蓉並蔕開留得君王不歸去鳳凰山下起樓臺題趙子固画蘭江上青山日欲晡幽花小紙墨模糊華清宫殿生秋草零落滕王蛺蝶圖陳基字敬初臨海人少與其兄褧受業於黄溍遊京師授經筵檢討因為人草諫章得罪引避歸里值南州用兵起為樞宻府都事轉江淛行省郎中以本職參張士信軍事遷學士院學士明初召入預修元史賜金而還秋懷二首梧桐墮金井寒螿栖露叢離居在萬里一夕生秋風秋風忽已暮離居邈何處獨寐在重幃相從乃中路秋水不可涉美人安得從眷彼芙蓉花盈盈秋水中非無舟與楫所畏蛟與龍臨流不能采零落委芳叢寄姚子章聞君又作錢塘客多在青樓少泉石佳人姓蘇名小小占斷西湖好春色沙棠為舟桂為槳驚起鴛鴦飛兩兩有時醉倒百花間不記六橋新月上行樂須當少壯時英雄自古皆堪悲歸來莫負張京兆鸚鵡窗間喚画睂羣珠碎傷吳帥潘元紹衆妾作潘七妾皆青年絶色善纂組歌詞因潘出軍恐致疑皆自經繡紋刺綺春纎長蘭膏鬌鬢瓊肌香芳年艷質媚花月三三兩兩紅鴛鴦翠靴踏雲雲帖妥海棠露濕胭脂朶冶情紛作蝶戀春新曲從翻玉連瑣画堂銀燭天沈沈揚睂一笑輕千金明珠買得綠珠心欲揮魚腸掃妖彗主君勿疑心似醉一宵痛撃羣珠碎門前鐵騎嘶寒風竒勲解使歸元戎謝從義㕘軍自京還言危中書見問且訝無書因寄謝參軍過我夷白菴為言廊廟髙巖巖故人誰為國柱石臨川先生危大參猥䝉問及且見訝十載尺書無一緘憶昔相從客燕趙削去崖岸無猜嫌辱陪五更佐三老勸講六經陳二南御史不容丞相忌司𨽻側目宫臣讒脱身黨籍走吳楚託跡丘園求孔𣆀孰令展禽三見黜自分嵇康七不堪平生不解帶刀劍晩歲强使嫺韜鈐髀消怕騎將軍馬面皺羞着從事衫折衝師旅非夙習奔走戎行真可慚危言重畏速官謗微祿不逮供親甘慰情屢抱鞶絲女與國未辦添丁男胡為長年在道路席不暇暖突不黔幾回乞身向藩省未許曝背歸茅檐終當投劾謝寮友徑去結屋依山嵐鄙夫出處蓋如此為報先生聊口占先生事業則異是論道經邦民具瞻早令四海偃兵甲盡遣百姓趨農蠶時和歲豐我所願功成身退公當諳他年若訪赤松子一笑相逢掀紫髯新郭扁舟夜泊新郭市石湖水深清且泚長笑一聲天地秋萬壑驚風泣山鬼匡廬生玉山子意氣相傾誓終始呼童沽酒烹錦鯉醉入蘆花月如水周郎放歌踏船尾我亦和之聲亹亹明月照我心秋水洗我耳富貴亦何為人生行樂爾城中黄塵眼為眯安得置我丘壑裏送庸田司寶惟善經歴籍甚中朝彦翩然萬里情禮從蓮幕重詩到水曹清未雪辭吳會先春入薊城殷勤黄閣老能不問蒼生闞鄉驛用故翰林宋顯夫韻為問西來使長安去幾何檄書飛僰道征戍動交河鸚鵡承恩舊葡萄入貢多平生二鳥賦感慨未能磨寄玉山人兼柬匡廬外史美人不見已三月日日相思賦角弓興發頗疑詩有助憂來翻訝酒無功未須結客遊樊上却儗移家住瀼東與報匡廬于外史新醅宜壓茘