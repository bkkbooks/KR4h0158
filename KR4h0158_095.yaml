且深清風左右至夏木靄繁隂飛飛雙珍禽喈喈流好音懐君青霞珮歴亂朱絃琴惟應西峰月可以喻同心方壺画軒岐論道圖為道士何仲旭賦彩筆發神祕僊山開画圖靈文隱玉笈石扇啟金樞寤寐軒岐術結交蘇董徒羽服繋蘿帶笻杖縣藥壺行當謝塵服從子崑崙墟雪峰詩為蜀人賦岷峨鎮坤維上有太古雪寒光萬壑連皓采千峰列石竇玉泉生琪樹瑶華結拄笏面嶙峋中懐共髙結山澗讀易軒環環碧澗連靡靡蒼山屬初日照林端春餘鳴布榖松深有去雲苔静無來躅獨把一編書時向窗間讀海屋為蕭君賦結屋青海上弄影蒼江涯手持翡翠竿誤拂珊瑚枝龍嘘春霧合鶴度曉雲垂弱流幾清淺為書報安期題枯林蘭猗蘭生逺壑葳㽔粲玉芳白露漙夕景光風轉朝陽吹簫望澧浦鼓枻向沅湘何以貽逺者徘徊雙鳴璫同劉伯髙分韻得羽字僧居謝煩燠蕭條對疎雨碧甃躍金鱗石梁散文羽水氣暗浮窗林煙細縈樹忽憶掉觥船牽荷弄秋渚贈友人之章貢秋雨正㝠㝠秋風何淅淅對酒送行人憂思坐填積黄鵠不可馴飛蓬易相識幾日對崆峒滄洲渺難極黄士一為余作墨梅效隂何體朝陽耀白雪微月照寒泉玉環承佩結明珠綴組連不愁歌吹闋已向画圖傳詎是揚州郭偏䝉何遜憐為潘仲翬題定使君所贈馬郎中画鶴郎中画鶴稱第一江海十年多見之蘭皋明月照獨舞雪影參差風倒吹滄洲𤣥圃三山上琪樹金芝日應長萬里懐歸惜羽毛中宵怨别流孤響通泉素壁久漂零忽見新圖百感并華亭舊歎傷心切赤壁扁舟入夢驚綠錦池邊飼秋雨驃騎多情每同賦相思欲報故人知為傳一札東飛去田園幽隱圖我家清江縣城北竹梁花埭環深宅鄰屋分燈夜讀書仙山借鹿春耕石蹤跡年來逐轉蓬萬事驚心舊業空無錢買山惟愛画坐對新圖如夢中柴門茂樹雅相向野水山橋接空曠雨足沙田野犢閒風回茅屋荒雞唱隔林炊黍起新煙接竹穿籬引澗泉傍隄楊栁皆新種近舍松枝不記年題傅商翁觀松瀑圖山風蕭蕭晝寂歴長松落落倚絶壁紫煙乍留青葢中瀑布迸落蒼厓石山中之人形骨清幅巾藜杖時獨行溪迴陡絶去無路坐撫瑶琴摹澗聲我亦平生慕真賞十年誤落江湖上故山蕭條久不歸夜雨秋衾夢長往人生適意無是非雲林久與幽人期九節預裁青竹杖明朝試拂薜蘿衣送羅與敬歸西昌石龍磯畔多芳草遊子憶家春已老水北楊花撲地飛旁人謾道飛花好愛子不忍别送子到水濆青天孤影飛黄鵠落日長風吹斷雲朝發銅塘津暮宿青泥渡帆過孝通祠漸是西昌路金魚洲逺樹青青三顧浮煙生杳㝠石扶壊道通髙閣水齧危沙見古城君家正在一方住獨有園廬俯江渚昨夜深閨夢逺人相思定倚櫻桃樹行路難涉水多蛟龍䟦山多猛虎荒城荆棘上參天大澤脩蛇横草莽百里慘黯無人烟驅車暝行陷泥滓前車軸折後車來行人不覺旁人哀眼前道路已如此何况太行髙崔嵬為君歌路難請君試一聽位髙金多豈足貴擊鐘鼎食未是榮東溝水流西溝涸昨日花開今日落世事榮枯反覆手七尺之軀安所託古來賢達人與時同卷舒龎公鹿門隱馬生鄉曲居款叚聊乘下澤車何用終朝出畏途畦樂園郭南抱甕者久與世情疎砌長龍鬚草林開燕尾渠轆轤花下轉萵苣雨中鋤蔗熟能相寄酬君薤葉書王若水山水谷口寒潮上厓隂宿霧開石橋通窈窕金棧寄崔嵬樹暗茅堂閉波明桂楫回山中花落盡為報豫章臺溪山漁艇圖夕陽延暮景秋色逺㝠㝠流水雙溪綠寒山九疊青石樓依古木草逕接遥汀釣叟長年在何人問客星和楊伯謙韻酌酒長松下垂蘿拂酒杯異禽窺藥鼎乳鹿臥書臺澗水穿林去山雲帶雨回相期同結屋不厭野人來贈傅元賓兼謝梁徵士百里訪柴荆秋原獨自行屐沾山雨滑衣染澗雲輕賣卜應潛姓工詩不趂名故人枉書札煩為謝髙情玉峽潭陂山莊歲杪涉風烟連村熟芋田路危楓葉斷石險柱根縣鹿柵成山壘漁梁阻澗泉争心逐時化耕鑿喜安然經湖口縣古縣開湖口髙檣集㟁隈山從廬阜起江向武昌來近水皆楊栁荒城半草萊客心原自速更遣曉風催題方方壺画仁智圖為道士王黙淵賦玉簡神仙記瓊臺羽士家軒窗明日月冠佩剪雲霞白鶴窺殘奕青童掃落花憶曾訪丹術楓逕駐輕車周所立江村草堂將軍舊日曾分祿為結茅堂草覆檐過橋栁暗鳥争樹當户花開燕入簾醉書江石嫌雲冷晩飯山苗帶露甜之子多才空白首獨將詞賦擬江淹雲臥山房為了上人賦空山雲臥杳難尋惟許人間禮磬音龍起鉢中生片影鶴歸山頂結輕隂化為法雨沾衣濕散作天花遶座深去住了然無定着祇應猛虎識禪心仙溪書院為何能舉賦江海歸來兩鬢霜仙源深處築茅堂參差樹映春山逺窈窕橋通碧澗長金櫃蔵書遺鳥跡石田栽玉起虹光只愁來往迷花嶼預擬藤隂問釣航山居圖世傳隐處祗空聞草斷行踪路不分鬼谷樹深衣濕翠鳳林芝煖石生雲寒泉叠響清琴調白雪飛花逐劍文已約八公攜手去青岑從此謝囂氛淵明入社圖空山樓觀逺蒼蒼路出深深石磴長近瀑飛雲經樹濕穿花流水過橋香髙僧喜識桄榔杖稚子歡迎薜茘裳入社幾時還出社松隂十里到柴桑北澗春日二首青松遶舍間幽篁白板扉髙薜茘牆窗曉禽聲荅人語山春蘭氣襍梅香家留渝曲幽居僻草滿臨城舊業荒坐憶交親半淪没不因鳴笛自沾裳喔喔野雞鳴逺樹瑶琴揮罷思愔愔寒凌山色難生態春入溪雲易合隂畬隴夜燒諳土俗州城晝掩識邊心芳皋杜若相將綠偏覺騷人幽怨深寄淦川友人廢郭浮烟見綠蕪茅茨星散縣樓孤江連戈舫鳴春鸛樹對寒燈起夜烏古硯自磨銅雀瓦坐氊還叠罽賔毺市南美酒梨花白最憶青絲繋玉壺送鎖子堅之袁城雪色征袍拂曙飈宜陽西去思飄飄千峰静對芙蓉幙三峽遥連螮蝀橋櫂得雀舟衝雨緩借來驄馬向春驕青年書記相知久共按秦筝和玉簫和楊允恭金明橋晩眺韻楊炯多才愛碧流金明橋上對汀洲日沈水屋蒹葭晩凉入山衣薜茘秋草色淺深行處合嵐光明滅望中浮魚鳬零亂扁舟集渾似東湖釣石頭題鄒惟中西樓西樓逺對鼎山斜野客來尋駕鹿車竹嶼暝烟浮翠黛石田秋雨潤銀沙清樽未酌心先醉往事重論鬢欲華肯借溪南三畝宅從君學種邵平𤓰題宋能敏青壁軒沓嶂層巒翠幾重神光動處有竒逢霧生深谷蔵𤣥豹泉落隂厓化玉龍丹篆曉書朱露濕碧窗晴對白雲封何時攜我青藜杖結屋來依五粒松舟行膠淺晩泊小橋期至豫章而别則咫尺矣即事書懐簡何平子偶遇乘槎侣因辭下澤車客程兼旦暮川路滯風沙石碎愁鵝子汀長怯犬牙急湍騰雪馬淺溜蹙霜花聚舫時連鷁攅篙若鬭蛇去留因地利漂泊任天涯洲指黄牛近山瞻白鶴遐潭烟迷浦溆㟁火識人家繋纜安樁杙偎篷宿葦葭中宵漁響歇向曉雁聲譁忽憶别期促還憐光景賒劍愁分紫氣酒喜酌彤霞坎壈身如寄蹉跎鬢欲華相期何處好勾漏問丹砂池閣獨坐懷周伯寜諸公香閣林光合氷簾水霧銷虚池含碧鑑古甃叠青瑶境託祇園迥泉分别圃遥雙桐隂覆地疏竹幹凌霄珍鳥銜珠果金魚䕃翠苕輕颸吹白絮凉露濕紅綃鸚鵡懐深酌箜篌想緩調含情託柔翰幽賞憶清杓綠錦池為定侯賦官沼湛芳泉紅櫳照綺錢藻絲翻玉鯉栁葉曳金蟬日䕶瑰文麗雲迴碧甃圓凌波乘洛佩向月映湘弦樹影浮觴近花隂列籍連鑑湖賓客在共賦綠荷篇新歲有感寄柬席煥章胡居敬積雪蒼茫裏寒山慘淡中艱難經日别漂泊此時同筋力年非壯詩書道未通狼烟春戍火禽語夜溪風心似西橋水滔滔日向東望香爐峰讀孟浩然詩因述移櫂望廬阜香爐舊識名鳥飛千嶂碧日静片雲青垂瀑長虹下深溪猛虎行松門通佛宇蘿逕遶檐楹業愛逺公白詩欣孟子清余方謝羈束幸此共芳聲酬别宋贊善大夫景濂諸老風流邈不聞誰攜健筆記清芬南宫新賜郎官佩東觀長留太史文聽琴圖為周易題韋帶筠冠白􅂒衣龍唇鶴足軫文犀試看十指風前遶曲裏時聞烏夜啼題郭熙春山紫霧春山綠樹齊水流花嶼亂鶯啼蹇驢烏帽歸來晩恰似成都濯錦溪偶題二首烏絲細寫蠶頭篆白紵新裁燕尾衫雨過西軒苔色浄澗中雲影似江帆五粒松交九節蒲銅缾分水浸珊瑚小窗閒度遊仙曲吹徧參差白玉竽北澗夏日酒傾蘭勺石泉香衣剪荷盤露氣凉誰料十年江海興閉門疎雨對横塘夜宴定侯宅醉中口占麾羽堂中画燭明將軍夜醉水西營青樓小婦新承寵彈得凉州第一聲宋元詩會卷九十五
