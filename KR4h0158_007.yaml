body:
  text: 宋元詩㑹卷七兵部主事陳焯編韓琦字稚圭相州安陽人弱冠舉進士名在第二方唱名太史奏日下五色雲見左右皆賀授將作監丞通判淄州入直集賢院監左藏軍歷開封府推官三司度支判官拜右司諫奏罷宰相及參政無能者四人凡事有不便輒極言之由知制誥安撫益州活饑民百九十萬副夏竦為陜西經略招討使尋兼安撫秦鳳與范仲淹威名同重一時天下稱為韓范入為樞密副使以羣小多異議請外任嘉祐元年拜同中書門下平章事封儀國公力請定儲英宗立太后垂簾聽政寺人搆兩宫成隙賴琦調護人情乃安及還政拜右僕射封魏國公再請英宗建儲以安社稷神宗即位進司空兼侍中年六十八薨贈尚書令諡忠獻啄木剝剝復卜卜意若念良木營營求蠧心未獲空我腹或露一襠紅或展雙翅緑捷緣都盧橦響弄羯鼓曲搜索不知疲利觜信摧秃忽爾破奸穴種類無遺族內孽固難辨一發知潛伏彼實害珍材盡殄此非酷直疑天意深不使嗜梁肉專為衆蠧仇待飫弗與足如令知庶味恣擇蟲與粟杞梓任陰賊長喙罷攻觸飽食作羣飛時下泉沼浴歸鳴凉樹陰暮趂高枝宿苦熱皇祐辛卯夏六月朔伏暑始伏之七日大熱極炎苦赫日燒扶桑熖熖指亭午陽烏自焦鑠垂翅不西舉炙翻四海波天地入烹煮蛟龍竄潭穴汗喘不敢雨雷神抱桴逃不顧車裂鼓豈無堂室深氣鬱如炊釡豈無臺榭高風毒如遭蠱直疑萬類繁盡欲變修脯嘗聞崑閬間别有神仙宇雪散滌煩襟玉漿清濁腑吾欲飛而往於義不獨處安得世上人同日生毛羽晝錦堂古人之富貴歸於本郡縣譬若衣錦遊白晝自光絢不則如夜行雖麗胡由見事纍載方冊今復著俚諺或紆太守章或擁使者傳歌樵忘故窮滌器掩前賤所得快恩仇愛惡任驕悁其志止於此士固不足羡兹豫來舊邦意弗在矜衒以疾而量力懼莫稱方面抗表納金節假守翼鄉便帝曰其汝俞建纛往臨殿行路不云非觀歎溢郊甸病軀諧少休先隴遂完繕嵗時存父老伏臘潔親薦恩榮孰與偕衰劣愧獨擅公餘新此堂夫豈事飲燕亦非張美名輕薄詫紳辨重祿許安閒顧巳常兢戰庶一視題榜因念報主眷忠義聳大節匪石烏可轉丹忱難悉陳感泣對筆硯和袁陟節推龍興寺芍藥廣陵芍藥真竒美名與洛花相上下洛花年來品格卑所在隨人趂高價接頭著處騁新妍輕去本根無顧藉不論姚花與魏花只供俗目陪妖姹廣陵之花性絶高得地不宜歸造化大豪大力或強遷費盡擁培無艷冶東君固是花之主千苞萬萼從榮謝似矯東君汛愛心枉殺東風不肯嫁遂令天下走香名髣佛丹青競誇詫以此揚花較洛花自合揚花推定霸其間絶色可粗陳天工著意誠堪訝仙家冠子鏤紅雲金線妝治無匹亞旋心體弱不勝枝寶髻欹斜猶墮馬氷雪肌膚一纈斑新似守宫明似赭雙頭兩兩最多情象物更呈鞍面窊樓子亭亭缺姿媚特有怪狀堪圖寫見者方知畫不真未見直疑傳者詐前賢大欲巧賦詠片言未出心先怕天上人間少其比不似餘芳資假借我來淮海涉三春三訪龍興舊僧舍問得龍興好事僧每嵗看承不敢暇後園栽植雖甚蕃及見花成由取捨出羣標致必驚人方徙矮壇臨大厦客來只見軒檻前國艷天姿相照射因知霛種本自然須憑精識能陶冶君子果有育材心請視維揚種花者按詩內冶韻重押或以音同而義别也答章望之祕校惠詩求古瓦硯魏宫之廢知幾春其間萬事成埃塵惟有昭陽殿瓦不可壞埋沒曠野迷荒榛陶甄之法世莫得但貴美璞踰方珉數百年來取為硯墨光爛發波成輪求之日盛得日少片材無異圭壁珍巧工近嵗知衆寶雜以假僞窺錢緡頭方面凸槩難别千百未有二三真我來本邦責鄴令朝搜暮索勞精神遺基壞地遍刓窟始獲一瓦全元淳蘚斑著骨尚乾翠夜雨㸃漬痕如新當時此復近簷溜印以篆字花其唇磨礱纍日喜成就要完舊質知無倫吾才寡陋不足稱思與好古能文人好古能文今者誰武寧祕書章表民無詩尚欲兩手付何况大雅之奏聞鏗純一作韶鈞寓目擁傳修途倦逢春旅思長逺煙含樹色細雨起塵香隴麥成行緑林鶯並對黃揚鞭聊自慰舉目見韶光春晴霽色破春昏高樓日未曛林梢零舊雨山頂入殘雲醉粉勻花頰風羅皺水紋踏青人誤約芳思幾紛紛春霖咫尺東郊路春霖絶未通銷閒生奕思醒睡費茶功樓迥昏昏霧窗寒霎霎風待晴桑陌上五馬恣璁瓏後園春日并塞園林古春來似不知雨輕成凍易樹老發花遲劇事隨年倦歡悰入病衰芳時期強賞宴鼓揭天捶和春卿學士上元罷燈絲竹沈聲月泛波警宵方喜罷誰何樓深酒密客留易路逺香殘人去多寒燭倚蓮猶結淚淡雲歸隴不停歌那知夢穩瀛洲上正是鈞天九奏和是夕館宿聞宫中奏樂謝丹陽李公素學士惠鶴高籠攜得意何勤玉樹慚無可待君只愛羽毛欺白雪不知魂夢託青雲孤標直好和松畫清唳偏宜帶月聞自有三山歸去路莫辭時暫處雞羣北塘春雨葉葉輕雲帳薄羅坐看膏澤灑庭柯風前芳杏紅香減煙外垂楊緑意多聲落簷牙飛短瀑㸃勻池面起圓波晴來西北憑欄望拂黛遙峰濯萬螺暮春康樂園榆莢紛紛擲亂錢栁花相撲滚新綿一年寂寞頻來地三月芳菲巳過天樹密只喧閒鳥雀臺高猶得好山川病夫不飲時如此徒有詩情益自然春隂馬上正是風和日暖天重陰凌擾苦纒綿蕉心自結憑誰展栁眼慵開只待眠草濕謾鋪留醉席榆寒難擲買春錢幾時霞外氛霾散放出紅輪一丈圓登廣教院閣岑寂禪扉啓晝關公餘為㑹一開顔高臺面疊包平野老柏參天礙逺山花去春叢蝴蝶亂雨勻朝圃桔橰閒徘徊軒檻何時下直待前枝倦鵲還北塘避暑盡室林塘滌暑煩曠然如不在塵寰誰人敢議清風價無樂能過白日閒水鳥得魚常自足嶺雲含雨只空還酒闌何物醒魂夢萬柄蓮香一枕山暮春書事榆莢空飛不算錢韶光歸速置何緣惜春情味過年少戰酒英雄退日前竹筍迸階抽兕角楊花鋪水漲龍涎妖妍萬變成凋謝長養須資大夏權乙卯晝錦堂同賞牡丹從來三月賞芳妍開晚今逢首夏天料得東君私此老且留西子久當筵栁絲偷學傷春緒榆莢爭飛買笑錢我是至和親植者雨中相見似澘然九日水閣池館隳摧古榭荒偶延嘉客㑹重陽雖慚老圃秋容淡且看寒花晚節香酒味巳醇新過熱蟹黃先實不須霜年來飲興衰難強漫有髙吟力尚狂壬子十一月草九日大雪近臘猶慳六出繁忽驚盈尺及民寬萬方䝉澤人人賀通夕無風陳陳乾危石蓋深鹽虎陷老枝擎重玉龍寒欲知靈鷲銀為界試陟高樓一望看和春卿學士栁枝詞五首陌閒宫古緑煙迷惹盡春愁困拂堤卻為多情足離恨故教溝水亦東西淡煙輕日簇誰家微出青旗一帶斜對景似嫌春意老更搖疏影掃殘花畫橋南北水連天才聽鶯聲又晚蟬長使離魂容易斷春風秋月自依然曲江風暖曉陰斜翠色相宜拂鈿車自是春眠慵未起日髙人困又飛花葉葉新長約黛蛾絲絲輕軟任風梭啼鶯便學歌㗋囀知是春來舞意多文彥博字寬夫汾州介休人少與張升髙若訥從潁昌史照學照母異之曰貴人也及進士第知翼城縣通判絳州為監察御史詔置獄河中鞫治黃德和誣劉平降叛得實德和就誅名震中外以直史館遷轉運使知泰州益州召拜樞密副使參知政事出為貝州宣撫使定王則之亂械則送京師拜同中書門下平章事集賢殿大學士以御史唐介劾奏罷為觀文殿大學士出知許州尋復平章事與富弼同拜時以得人為慶至和三年正月仁宗不豫內侍史志聰等詭祕無狀彥博與同列劉沆富弼謀啓醮大慶殿因留宿殿廬帝疾愈彥博等始歸第當是時京師人情洶懼賴此以安久之出判河南府封潞國公英宗即位知其首建立儲之議甚德之彥博遜避不敢當除侍中熙寧間為王安石所惡力引去元豐三年拜太尉復判河南㑹王同老言至和中議儲事神宗追念前勳益加寵遇因請老以太師致仕元祐初命平章軍國重事薨年九十二諡忠烈燕川渡蚤過燕川渡千峰插太虛雲開微見日水淺不侵車風急樵歌響霜嚴木葉疏緣溪東北去巖後有精廬關山月蕩子久行役遼西戍未還佳人怨遙夜清淚浥朱顔蘚晦蘭閨寂塵昏寶鏡閒相思不相見明月下關山送彌陀實師訪積慶西堂順老好去三摩地相逢兩㑹家禪心究實際慧眼絶空花聞在東林日常烹北苑茶願將甘露味餘灑濟河沙端居多暇懷洛成詩家運使兵部俯垂屬和賦謝倦翼念歸林幽懷動越吟更回溪叟信深契野雲心巴里傳高唱英韶繼善音便須傳洛社紙價重千金留守相公寵示東田宴集詩依韻奉和嘗同徐勉構東田花竹成陰雨後天為愛霜臺寬白簡得隨津閣看紅蓮清樽屢釂吟情逸翠袖頻翻舞態妍歸興直須三鼓盡月華應是十分圓留守相公用雅章召赴東樓再次來韻朱樓華閣府園東蝸陋仍依美庇中儉幕深嚴逢緑水楚臺高迥快雄風四絃清切呈新曲雙袖蹁躚試小童况是元規興不淺歸軒爭敢便匆匆知府學士堯夫寄詩曲念衰老依韻和呈幾年洛社盍朋簮照席瓊枝秀出林月夕同遊詩筆健花時共賞酒杯深帝綸中出榮開府使節西馳愴判襟逺寄佳章念衰朽知君最有嵗寒心西歸日瓊林苑賜宴即席竊祿叨榮四紀餘退思僥幸亦無如趨朝再覩新宫省解紱還歸舊里廬報國丹心明皎皎戀軒疲足去徐徐羣公盡出都門祖盛事先於漢二疏臣伏䝉聖恩今月二日就瓊林苑特遣中使寵賜御詩曲推恩禮過奬愚臣感愧之深負荷弗克輒課愚陋恭和聖製老臣為感聖恩殊趣治輕裝覲帝居錫宴便蕃親鳳扆賜章重疊捧龜書康時有志才終短報國無功術已疏身在洛陽心魏闕願傾丹懇上公車送圓明大師歸吳興數曲清琴達舜聰瑤津仙苑助熏風朝端多士知音久霅上故棲歸思濃命服鮮華新爛椹行裝輕簡舊焦桐鄉人若問大檀越盡在名經千部中謝事歸老洛陽留守相公玉汝寵惠佳篇賦答二聖恩深念老臣許從休退樂伊濵重觀景物皆塵迹喜見居留是故人林下放懷無簡束樽前道舊長精神公雖久作東田伴卻佇黃樞秉化鈞野意引得清伊一派通三灣相接勢無窮便成渺渺江湖趣更有蕭蕭蘆葦風西洛當年為勝地東田今日屬衰翁藥園事跡分明在盡見雲鄉舊記中和吳諫議寄題廣化寺淨居高揭四禪天更對伊嵩闢廣軒塔聳千花依鷲嶺舟浮一葉上龍門雲藏古木當危檻風遞疏鐘過逺村我有草堂南澗口但逢西望欲銷魂次韻留守相公玉汝見柬東郊瘠土才千畝繞舍團椒僅百家地接玉泉多草木路經緱嶺少風沙能留過客雖無饌時對清尊亦有花昔日相君曽降顧常憂蝸陋不容車次韻秦帥經略吕通議過洛少留喜過西都暫解鞍尊前不惜醉酡顔推襟道舊從容久落筆成詩頃刻間塞外定知威令肅幕中常得雅歌閒相門出相歸人望瑣闥難淹侍從班奉陪伯溫中散程伯康朝議司馬君從大夫席於所居小園作同甲㑹四人三百十二嵗况是同生丙午年招得梁園工賦客合成商嶺採芝仙清談亹亹風盈席素髮飄飄雪滿肩此㑹從來誠未有洛中應作畫圖傳答龎相許枉過家園不果先以詩來次韻一㕓幽趣斗城西竹映軒窗栁拂堤園吏每誇風物美主人常歎簿書迷碧池荷動觀魚戲朱檻梧傾待鳳棲惟願毗耶長者至莫憂花裏有鶯啼清明日玉津園賜宴即席節應桐華始筵開禁苑新推恩緣舊物加惠及陳人衆樂聞天奏同寅㑹柄臣蘭肴享豐潔桂醑酌芳醇覆育需雲廣涵濡湛露均桑榆垂晚景何路報堯仁遊東田八韻文物平津閣風流太傅山勝遊松島外故迹藥園間霜蔀編為屋寒荆刈作關窗櫺雲漠漠畦竇水潺潺蘆渚炊煙起萍漚釣艇還竹經朝雨翠荷借夕陽殷幽興能招隱高情自愛閒從來行樂處攜手一開顔提舉端明見示三月晦日雨中書懷詩次韻春光垂欲盡夏景漸增添鬱鬱松篁茂蕭蕭風雨兼花心隨絮落屐齒被苔粘巧囀鶯遷木驚飛燕入簾蝦鬚穿曲沼虎爪度前簾坐久香銷炷吟多筆費尖雲容方靄靄日色未炎炎舞鶴傾丹頂遊龜散緑髯命賔常務率出令更須嚴詩詠當階藥書尋傍架籖蘭芬衣可襲露潤草俱沾貴近辭金馬編修賜玉蟾高歡惟自適獨樂未嘗厭赤白曽咨丙丹青每誚閻沖和緣養浩寂寞為安恬身處貧無愧心貪道不廉成文推大手濟用鄙輕縑視履循清節祈恩陋雜占聞韶欣鳳舞在藻愛魚潛鱸鱠思漁艇貂冠望酒帘聖時非吏隱賢業繫民瞻撫事惟公論摛辭乃自謙保躬誠易退康世義難淹纇句慙無取酬言幸不嫌次韻留守相公同遊龍門鑿開青嶂啓天門直㵼伊流淺汝濆八節驚濤鼉振鼓千花寶塔鴈翔雲嵓煨雨過飛泉漲谷口風回墮葉紛龕穴窿穹三像列樓臺葉煥兩崖分方陪茜斾來尋勝不就蒲餐趂茹葷北里笙竽皆擁從東山羅綺半酣醺升堂共覩皤仙貌策杖同尋古士墳喜脫貂冠親野老幸隨熊軾附邦君林巒岑寂真堪賞市井喧譁漸厭聞人度長川猶隱映香銷古殿尚氤氲周生歸後蘭重佩荀令行時蕙更熏曉露未晞珠滴淚秋花爭發錦挑紋羣娃散步塵生襪小舫爭登水濺裙釣叟旁觀皆歎羡禪師迎謁盡歡欣既無冗局羈閒迹忍促回軒背夕曛得向石頭溪上飲從今遂不畏移文耆老㑹詩九老唐賢形繪事元豐今勝㑹昌春垂肩素髮皆詩彥揮塵清談盡席珍染翰不停詩思健飛觴無算酒行頻蘭亭雅集誇修褉洛社英遊忝序賔自愧空疏陪几杖更容欵密奉簮紳當年尚齒尤多幸十二人中第二人憩鶴堂再到靈都訪勝遊青山依舊白雲秋燒丹帝子今何在憩鶴仙人跡尚留題郭熙畫淺水深山曲徑通樵夫涉水出林中可憐畫筆多情思寫入霜紈一扇風答吳幾復君說歸期未有期西風又是鱠鱸時何當㑹集香山伴同赴松窗竹下棋上已阻雨林花脈脈怯朝煙雨隔蘭亭曲水筵欲買春花無定價東風撩亂擲榆錢宫詞體輕浸不勝鸞叉常羡同心上苑梅翠輦未過珠箔卷漆盤猶貯夜明苔張俞字少愚益州郫人少俊偉有大志屢舉不第用薦除祕省校書郎願以授父顯忠而自隱於家文彥博治蜀為築室青城山白雲溪以處之母死再朞鹽酪未嘗入口所持栁杖植墓旁忽生枝葉後至合抱凡六召不起卒其妻蒲氏賢而有文為誄詞甚傳於世府衙新書堂志士營道日築室養賢名鋤荒出幽邃掃室回虛明山嶽凌牆壁溪塘瀉窗楹蘭蘅露景晚松桂秋風生琴瑟􅈺古奏樽罍湛寒清默意馳萬象遊心覽八紘羣經互粲粲百氏紛營營禮樂立制作文章縣凖程唐虞化已逺周禮道尚行師友得正士講論無俗聲邪哆不可入紛華固難傾修辭力工巧厲學逾農耕天爵既自後人文取其榮元侯方作鎮列士爭獻成學校溢都市謳吟洽黎氓寧同稷下議飽食談縱橫宴萬州西山池亭柬魯使君西嶺鬱盤紆寒泉注原隰下有乖龍池何年此殊極復為黿鼉據亂我清泉色松幹已交摧石牙空鬭立魯侯獨窮勝公暇日尋陟蕩滌潢汙流宛如疏鑿力池光復涵徹萬象如鏡入亭觀出浮雲彤彤映邦域左右浮屠宫巋然爭嶪岌昔乃荆棘荒今為蘭蕙襲密樹低華陰嘉禽弄文翼使君池上宴何減襄陽習越公堂越公作隋藩烈烈耀威武駐馬白帝城營營壓巴楚俯瞰萬里流徘徊覽千古鬼工役精魄梓制衒刀斧四阿無欒櫨大厦惟柱礎崢嶸露節角􅂒豁轉檐廡丹漆久磨滅風雲尚吞吐蠶婦昨日到城郭歸途淚滿巾遍身羅綺者不是養蠶人金剛臺霧山環合自雲川户有清溪種玉田萬本桃花不知處幾人曽得問秦年石延年字曼卿由幽州徙家宋城為人跌蕩任氣讀書通大略於詩最工纍舉不第真宗録二舉進士為三班奉職延年恥不就張知白數竒之曰母老乃擇祿耶延年不得已就命以右班殿直改常祝知金鄉縣有治名兩為通判擢館閣校勘歷光祿大理寺丞遷中允判登聞鼓院卒送劉潛歸陶邱丈夫未大用身與仁義間可堪更聚散風塵摧其顔君今歸柯澤路出梁宋間梁宋有吾廬親老待兒還矧復君先歸因之頭益斑春老有時回人老不再少草白有時榮髮白不再好人生不如春髮生不如草送别春草前人意先春老瀑布飛勢挂嶽頂無時向此傾玉虹垂地色銀漢落天聲萬丈寒雲濕千巖暑氣清滄浪何足羡就此濯塵纓金鄉張氏園亭亭館連城敵謝家四時園色鬭明霞窗迎西渭封侯竹地接東陵隱士瓜樂意相關禽對語生香不斷樹交花縱遊㑹約無留事醉待參橫月落斜曹太尉西師仁者雖無敵王師尚有征獨乘金廄馬都領鐵林兵肅氣關河暮屯烟部落晴旗光秋燒合甲色夜江橫士喜擊中鼓敵疑聞後鉦寒踰博望塞春宴隗囂城外使羌心伏旁資帝道平公還如畫像為贊學班生黃亢字清臣建州浦城人少竒穎年十五以文謁學士章得象甚竒之遊錢塘投詩林逋逋尤激賞王隨知杭州奏禁西湖為放生池亢作詩數百言以諷士人爭傳誦焉詩號東溪集臨水人生朝復暮水波流不駐去年此日水今日到何處惆悵雨殘花嫣紅隨水去花落水東流識盡人生事吕夷簡字坦夫其先萊州人徙壽州進士及第補綘縣軍事推官遷大理寺丞通判通州徙濠州歷知濵州擢提㸃兩浙刑獄遷祠部員外郎為建宫觀奏恤工徒真宗曰是有為國愛民之心改刑部員外郎兼侍御史知雜事改起居舍人知制誥進龍圖閣直學士權知開封府有治聲上為書名御屏仁宗即位拜右諫議大夫參知政事進户部侍郎同中書門下平章事罷為武勝軍節度事判陳州蓋出郭皇后意也嵗中夷簡復相遂主廢郭后之議時論少之㑹與王曽廷辨罷知天雄軍未幾以右僕射再入相封許國公以太尉致仕薨諡文靖有集二十卷江南立春日灰律何時應江春昨夜來細風先動栁殘雪不藏梅餘冷迷清管微和發凍醅閉門無客到樽俎為誰開天華寺賀家湖上天華寺一一軒窗向水開不用閉門防俗客愛閒能有幾人來張瓌字唐公洎之孫也舉進士以妻父王欽若嫌召試學士院賜第除祕閣校理同知太常禮院諡錢維演曰文墨其子上訴瓌條對甚切終莫能奪乃賜諡曰思判吏部南曹歷推官轉運使寄題徑山懷郎簡侍郎天地一州渚北平南欹危幽并深以厚江浙清且竒武林頗英秀川滙仍山卑應接殫天巧類非人力為徑山最佳處有巖稱玉芝居防俗士駕地乃賢人宜郎公留名德平時為羽儀引年歸故里不復衣朝衣留侯黃石心白傅香山期結宇名勝外日與塵事違伊豫來東藩濫持使者麾當候秋風高逺造巖下扉浣濯纓上塵散步松間綦未能繼高躅聊用慰所思郎簡字叔廉杭州臨安人幼孤貧借書録之多至成誦進士及第補試祕書省校書郎知寧國縣真宗嘗曰簡歷官無過而無一人薦是必恬於進者改著作佐郎知分宜縣擢祕書少監知廣州入判大理寺以工部侍郎致仕年八十九訪徐沖晦湖上訪髙士徑深行緑苔應聞山犬吠知是野人來岸幘出相接柴門自為開林間清話久薄暮榜舟回曹汝弼歙之休寧人天禧祥符間所謂詩人曹夢得是也有詩一百五十首行世曰海寧集職方舒雅序之其後嗣昌盛舉進士登仕籍者數十人中秋月年年相對賞永夜坐吟牀衆望自疑别孤高非異常園林分淨影臺榭起餘光誰似蟾宫客得攀仙桂香懷寄披雲峰誠上人院髙窮木杪野極靜無言險路通巖頂香泉出石根微風飄磬韻幽鳥啄苔痕常記相留夜秋堂共聽猿再寄江城從别後聞說在松間度日長扄户終年不下山靜為詩所役閒免事相關應喜雲邉客冥摉鬢未班贈披雲峰嶽長老禪外掩松扄閒眠度嵗陰雨侵香篆濕苔長屐痕深水在銅瓶冷雲歸玉磬沈前山有靈藥時策杖藜尋贈僧一從叨命服乘興入天台院接石橋住門臨瀑布開松間應獨坐雪裏更誰來時復攜藜杖看雲上古臺喜友人過隱居忽向初春候閒過隱士家旋收松上雪來煮雨前茶禽換新歌曲梅妝隔嵗花應慚非遁者難久在烟霞富弼字彥國河南人少篤學有大度范仲淹見而竒之曰王佐才也仁宗復制科舉茂才異等授將作監丞簽書河陽判官召知諫院所陳奏皆關中外大利害上多從之以事忤宰相吕夷簡因薦弼報聘出塞意如盧杞之陷顔真卿而弼毅然就道卒能伸國威以全和好遷翰林學士進樞密副使皆固辭不拜上再三示特用之意非為使逺故始受命久之為夏竦所中請外出知鄆州歷京東路安撫使活饑民五十餘萬人至和二年召拜同中書門下平章事與文彥博並命士大夫相慶於朝嘉祐六年以母憂去位詔為特罷春宴英宗立封祁國公進封鄭熙寧二年以左僕射門下侍郎同平章事時王安石柄用弼度不能爭章十上求退加拜司空進封韓國公致仕年八十薨諡文忠定州閲古堂天下十八道惟河北最重河北三十六州軍就其中又析大名府定州真定府高陽關為四路惟定州最要定為一路治所實天下要重之最知是州者兼本路兵馬都部署居則治民出則治兵非夫文武才全望傾於時者不能安疆場屏王室也然自國初已來專以武臣帥諸路慶厯七年甘陵妖賊據城叛河北妖黨相搖以謀應卒驕將懦人心大震天子悟始議選儒臣帥四路以督諸將乃起知鄆州資政殿學士給事中昌黎韓公帥真定以遏亂萌明年春賊誅人安既而夏大雨河決商胡東北入於海河北灾人復不寧流徙失業者四出咸不翅千里僵殍滿道天子恤然且虞他姦遂以公帥定定既要重天下宿兵素多屬傷殘之後官民枵困征賦逃無幾而兵不少減兵襲舊幸歉益驕以悍公夙夜裁整以威以懷兵之驕不從令者捽其首惡斬以狥略為條教餘怗怗就約不敢譁於室至有調發者逺而彌戢如公親臨已而招集逋亡四流爭還如啼孩奔父母惟恐其後至則充然各得其欲農無廢隴賦有餘粒不旁誅橫斂而上下足堙漏補罅一面完固公既擊彊梗之兵又育雕瘵之民左行斧鉞右哺飲食亂者畢治亡者畢存禮法政教向之人所不得聞者今漸濡酣飫無不貫徹自是邉人革其耳目新其肝腸優為而樂從故人易治而功成速也又明年秋天子圖公之功詔加大學士公先嘗表其志幸終三年不願亟易也至天子抑騎召而使即以授姑遂公請亦以慰斯人愛公之心也公惕寵處官雖無事未嘗輒自豫念兵與民之急宜無過者矧臨要重之路憂虞所繫凡是謀畫不可以無法乃擇取歷代賢守良將總若干人行事創大屋以類相次繪於周壁榜之曰閲古堂蓋欲閲古之人所為而為之法也噫公雅文傑武自當視乎古人且天下方遲公入輔以致太平若其安疆場屏王室豈庸考古而後能哉實公沖然不自有其有而歸乎古人也其縣知來者不師繪事而公是師也雖然踏古搜善惠人警已公之意謂其至矣乎公郵問索詩因粗序所致之㫖以志其始而示於後詩曰朔方之兵徑於九土尤徑而奧要惟定武兵徑在馭用則羆虎失馭而徑驕不可舉曰保曰貝閉壁連阻武爵斯守束手就鹵皇帝曰噫汝武曷取有弊必革以勤於撫公來帥定始以威怒有兵悍橫一用干斧連營怛之膽栗腰傴既懼而教如餔如乳以刺以射以鉦以鼓無一不若師師旅旅列城自刺靡不和附陰沴為梗降此大雨大河破泄在河之滸民被黷墊田入汚莽流離蕩析不得其所公戚曰吁豫敢寧處乃大招來乃大保聚乃營帛粟寒衣饑茹民歸而安水下孰禦強弱死生由公復慮曰義曰仁震肅春煦合和蒸天天順以序公境獨稔爰麥爰黍公俗獨樂夫耕妻杼人雖曰康公亦奚豫謂此一方民與兵具務劇任重稽古其裕人皆謂公與古為伍公文化民公武禦侮何思古人公不自許遂擇竒匠繪於堂宇列其行事指掌可數前有古人在我門户後有來者依我牆堵斯堂勿壞有堂有故堂之不存來之曷覩宏乎煥乎千載是矩涵虛閣畫閣髙連百雉城涵虛應不愧標名門前栁色兼旗色座上琴聲雜佩聲肯羡五湖歸范蠡未饒三徑隱淵明我來恰值初晴後山色波光分外清唐介字子方江陵人父沒漳州漳人知其貧合錢以賻介年尚幼悉謝不取擢第為武陵尉調平江令知莫州任丘縣縣當邉使往來素苦誅索介至皆帖伏以去入為監察御史裏行轉殿中侍御史㑹張堯佐除四使論奪其二因劾宰相文彥博守蜀日造竒錦媚宫掖以得執政復用堯佐自固請罷之帝怒貶春州别駕改置英州由是直聲動天下無何復召為御史言事益無所顧他日自請解職連歷外任入為待制復知諫院以論罷陳升之出知洪州治平元年召為御史中丞明年以龍圖閣學士知太原府熙寧元年拜參知政事數與王安石爭論安石強辨而帝主其說介不勝憤疽發於背薨年六十贈禮部尚書諡質肅寄杭州孫資政何人富貴不圖安大抵為臣節欲完手執樞機謀國易心存忠義入時難臨風未覺龍媒老衝斗誰知劍氣寒天子聖神思舊德肯教旌馭久盤桓宋元詩㑹卷七
