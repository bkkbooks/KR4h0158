body:
  text: 宋元詩會卷九十七兵部主事陳焯編錢惟善字思復錢塘人至正辛巳鄉試出羅剎江賦鎖院三千人皆不知錢塘江為曲江惟善援據舊聞鋪敘詳核因此得名官至副提舉張氏據吳遂不仕退居吳江之筒川篆冢歌有序雲間善篆以所書瘞之細林山中題曰篆冢爰來徵詩遂賦長句以寄雲間者朱芾孟辨也又見董佐才詩包羲卦畫龜龍出頡俑造書鬼夜泣俯觀鳥獸迒蹄迹依類象形文字立以迄五代咸東封改易殊體靡有同周官保氏教國子六書大義開羣蒙太史籀文古少異小篆從省由秦始倉頡爰歷博學篇三家著述初傳世秦燔經籍訟獄熾乃當𨽻書趨約易古文雖絶漢章行尉律學童仍課試東閣祭酒太嶽孫夙嘗受業賈氏門憫悼俗圖昧所向博采籀古加討論揭示上下明指事轉注假借形聲意立一為端亥畢終分别部居不雜厠亘千萬古知字原昭若列星麗躔次中興斯學曰陽氷入室操戈何背戾二徐訓釋浩江河仲也祛妄言不頗徐楚金著祛妄辨李陽氷之誤吳興張有爾傑出復古正俗訂舛訛布衣道士錢塘住玩世端如郭忠恕三十六舉僅成篇蟬蛻遺蹤不知處席中如帶惡安西鼓皮離禹良可吁漢家去古尚未遠成皋印文猶重摹雲間苦嗜古手校科蟲辨魚魯明窗靜几風日佳臨模一掃千番楮商彝周鼓真吾師􅝻匾沈著沙畫錐鸞回鳳翥龍夭矯長戈短劍相交馳書草日積充屋楣保愛何啻璧與圭細林山中一壞土緗笈緘縢重閉之於乎禊帖藏玉匣終致溫韜舉耒插亦恐虹光夜燭天定有竊開窺筆法冢頭草鳴寒蛩薶文瘞筆同高風後三千年見白日好事應營馬鬛封送逵公之京龍飛天子中興年使者弓旌集俊賢閶闔早朝班玉筍瀛洲夜直賜金蓮五經同異須劉向三絶才名數鄭虔黼黻當年遺老在長歌黃鵠送樓船題清逸齋神仙官府曾為吏一日乘風即掉頭太白豈惟凌鮑謝元卿只合友羊求門前種樹雲連屋湖上聽潮月滿樓遙憶五經名隱地峨睂高聳蜀天秋送賈元英之照潭照潭遙望九華山弓馬蕭蕭日暮還夢裏無題惟寄內胸中有䇿欲平蠻落花閉戶眠黃犬明月開籠放白鷴絳灌何曾輕賈誼早隨鵷鷺入朝班故宮春望次平禹成韻登臨休賦黍離章千里江流接大荒劍鎖血華空楚舞鏡埋香骨失秦妝薜蘿山鬼啼螢苑荆棘銅駝卧鹿場寂寞萬年枝上月夜深猶照舊宮牆喜白髮為陳師復賦勳業無成散似樗青銅欣見二毛初中郎興動秋風起太傅詩成壯嵗餘皎皎易汙時一沐星星難染漫千梳等間得此無情物自有忘憂滿架書張天英字楠渠溫州人徵為國子助教再調皆不就遊西湖多居吳下武陵春曉曲書於玉山佳處武陵春曉花冥冥漁歌蘭枻搖殘星溪涵山氣緑如酒幽禽啼破松煙青天上時聞鳳皇曲金門飛夢人初醒長嘯銀臺月將落空翠著衣香霧薄忽見安期蓬海東佩劍從風降玄鶴陽烏銜火縣扶桑袖卷紅雲朝帝旁手攬龍車覩天光下視蟻國空千霜金陵行金陵城頭生紫煙金陵水立東風前神山蜿蜒行入海白日化龍飛上天十年不見吹簫侶丹鳳深巢惜毛羽仙子天端騎鳳來衣上斑璘碧桃雨碧桃如霞浮夀觴秦淮之鯉數尺長林鳥回翔集庭樹華峰特立天中央君行出門無百里中道嗷嗷塞人耳霜風灑筆山嶽搖夜半飛章奏天子前有尊酒行送朱秀方之慈溪晴窗一夜梅花開天風拂拂從東來仙人乘風忽相遇飄然便欲歸蓬萊且盡花前一樽酒玉簫瑤瑟重相催與君俱為異鄉客請君當歌共銜杯共銜杯惜君别明日西陵浪如雪思陵石詩黃帝騎龍去不還玉笙鶴上北風寒孤臣獨有心如鐵斷石鐫詩泣露盤夏日寄玉山赤日行天氣欲焚樹根羣蟻正紛紛道人心在羲皇上睡殺青松一枕雲于立字彥威南康之匡廬人學道會稽山中得石室藏書放浪自喜常館顧阿瑛家釣月軒夕息西軒陰頗愜濠上景持此月明鈎投竿釣清影流螢飛暗度幽鳥栖還警遊鱗亦復來露下芙蓉冷至元戊寅四月十九日風雨大作村民以為龍王嫁女豫作詩以紀之西方龍君嫁龍女雷車彭彭載風雨神姦夜邀髑髏語碧草無光愁露渚鮫人獻綃珠淚泣鸞裾行煙翠痕溼阿鬟嬌小不成妝帝與桑田湯沐邑胭脂紫土吹海腥陽侯擊浪玻璃聲湖邉地皮薄如紙長堤捲作長河水夜夢陳敬初與家兄我來與君同作客前年共住江邉宅君騎快馬事遠遊我亦流離去鄉國君家慈親猶未老眼前骨肉仍相保三人兄弟何人強之子文章最稱好我家老兄浙水濵老兄比弟家尤貧五載零落不可見迢迢歸夢還相親人聞夢中相爾汝旁人不知夢中語起來明月滿虛庭丹楓墮影天霜雨秋風江上生白波秋江蕭蕭鴻雁多遲君不來知奈何擁翠堂詩卷幽人結屋江邉住俗聲不到題詩處門前惟有樹扶疏簷間只許雲來去落花如雨東風狂緑陰滿地春茫茫一聲啼鳥驚夢破翠屏淺印煙峰長海綃輕薄煙霏暝空碧無痕湛清影天風吹落竽籟寒嵐光溼透衣裳冷我生已有遺世心便欲長往窮幽尋微茫樓觀不可到雲林冥冥苔碧深秋夕得雨字七月涼颸初破暑秋聲蕭蕭在庭戶清新故人忽見過契濶有懷何足數西夏郎官好詞翰中州美人妙歌舞縣知野衲解談天况有仙人能噀雨金刀削翠藕絲長緑房破繭蓮心苦詩成脫穎或有神酒令分曹聊可賭殷勤素手纍行觴瀟灑清談藉揮麈紛紛市上聚蚊兒昌黎先生歎如土漁莊二月春水生三月春波濶東風楊柳花江上魚吹沫放船直入雲水鄉蘆荻弩芽如指長船頭濯足歌滄浪蘭杜吹作春風香得魚歸來三尺強有酒在壺琴在牀長安市上人如蟻十丈紅塵埋馬耳漁莊之人百不理醉歌長在漁莊底次韻玉山過雨收殘暑西來水似天秋風生柁尾明月落尊前慘淡依山寺欹斜下瀨船清歌不成調思爾枕書眠次韻泊閶門淥水秋風蕩槳船白蘋洲上月初弦清光半入紅窗裏照見羇人夜不眠題墨雁黃沙衰草雪毶毶八月天山冷不堪昨夜朔風吹過影盡將秋色到江南題振轡馬渥注龍馬進來時奮迅長鳴不受羈詔與從官調得好只教隨仗不教騎題墨竹先生舊隱鑑湖曲無數琅玕繞屋生蕭蕭六月動秋思不是風聲即雨聲巴延子中原西域人以祖父任江西遂家於進賢縣判官辛好禮為築宅北山之嘯臺子中官吏部侍郎元亡濳居故山明洪武初以禮徵之作七哀詩飲藥而卒過故居白頭歸故里荒草沒柴門鄉舊仍相見兒童誰復存忠清千古事骨肉一家魂痛哭松楸下雲愁日欲昏春日絶句幾片殘紅點客衣小溪流水鱖魚肥畫橋盡日無人過楊柳青青燕子飛袁華字子英崑山人拜石壇詩仲瑛嘗于東城菴假山廢基得一石上有蘇子瞻題識石理瑩潤類璧雖左旁缺損然尚竒甚博士柯敬仲見而竒之再拜題名而去字曰拜石御史伯頁達兼善為作古篆書之後仲瑛偶得子瞻答維揚王忠玉提刑飲快哉亭帖與石上題識相合仲瑛謂此石即忠玉家快哉亭物也特不知何以至此仲瑛遂為記其事倩朱伯盛刻之他石而與河南陸仁汝南袁華各為詩咏之睂山三蘇宋儒宗長公矯矯人中龍南遷儋耳西赤壁文章光焰超洪濛快哉之亭雪初霽領客登覽山川雄自云平生不解飲胡乃一舉觥船空和詩寬限見真率鑿崖題石摩蒼穹功名富貴一丘土斷碑殘素傳無窮吁嗟異物神所衛玉山合璧俄相逢奎章博士丹丘翁江南放逐驚秋風見之即下米芾拜二顚癡絶將無同築壇山中加愛護樹以松桂連椅桐雨窗雲戶溼寒翠朝闌暮楹開青紅白野御史龍頭客青年獻賦蓬萊宮戲將秃頴寫􅝻匾斷叉折股流星虹只今風塵暗河嶽王侯第宅皆蒿蓬牙籖玉軸映紫素好事獨傳吳顧雍婁東朱圭鐵作畫字字玉屈蟠蝌蟲嗟哉昔人今已矣慘淡故國風煙中如何二子復嗜古䇿勳儒墨收竒功吳訥字克敏休寧人少學兵法習騎射從其父總管吳禮官靖江收復蠻洞至正末用薦授建德路判官兼義兵萬戶屯浙西扎溪源禦明兵戰敗不屈而死時年二十有七遺詩五卷為吳萬戶集破紅巾君不見蘄黃兒紛紛白馬張紅旗去年陷湖北今年陷淮西遂令深山之民皆帶甲四海澒洞含瘡痍堆金積玉亦何有略地攻城徒爾為又不見黃連寨左帶溪山右淮海天兵如日照雪霜百萬紅巾一朝敗親王按劍定中原丞相分兵救吳會邉人不識韓將軍極口爭誇鐵元帥八座東開昱嶺關羣偷欲度愁躋攀竒兵間道絶歸路可憐白骨高如山桂林老臣再徵起坐鎮西垣幾千里昨聞餘黨犯其鋒血作龍沙半江水南方猺獠勇莫當自謂效義收蘄黃賊徒一見驚喪膽堅壁不出知天亡諸君力盡在此舉巢穴不平鼠為虎相期麟閣畫丹青却憶虞廷舞干羽楊鐡崖曰克敏謁豫出其所為詩豫竒其人適垣府相臣招致名士講及三關之事克敏慨然有擊楫中流之思未幾遂統士會諸軍於昱關豫聞而益竒之其才勇忠義實得於天性則知嚮所為詩皆筆牘之餘耳戰昱嶺關鼓角聲雄隊伍齊揚兵曉戰昱關西黃金匣動雙龍出赤羽旗開萬馬嘶露布不煩諸將草詩篇還效古人題沙溪春酒甜如蜜醉卧花隂聽鳥啼張簡字仲簡吳人初師張伯雨為黃冠隱居鴻山元季兵亂以母老歸養仍返儒服顧仲瑛稱其詩簡淡能得陶韋之神送王子充歸金華春入長洲苑東風已及時苑中垂楊樹吹作黃金絲送君出春城艤舟折柔枝以此聊贈遠相别仍相期君歸金華山當逢牧羊兒母因入山去遂爾來遲遲楊柳飛花日待君同賦詩次韻田秀才見寄樹杪青蟲晴揚絲春城風物似年時貧餘許邁餐金法間有陶濳飲酒詩芳草青青連野濶征鴻歷歷度江遲長洲故苑煙花外千里懷人入夢思饒介字介之臨川人自翰林應奉出僉江浙亷訪司事張氏入吳杜門不出士誠慕其名自往造請承制以為淮南行省參政家采蓮涇上日以觴咏為事吳亡俘至京師死焉送秦文仲博士還三沙東望大瀛海影落扶桑弓三洲直如矢正射三山中三山負曉日曉日波浪紅仙人不騎鶴所適多御風秦君家三洲長與仙人通即之不可見忽爾能相面翩翩頭上巾舉舉塵中扇高談清溽暑知子不貧賤間居寡良儔有酒不自薦此日亦足醉况得邦之彥小醉須解酲大醉不用醒平生愼許可秪有一劉伶太湖三萬頃七十二峰青頗怡山水秀閉門修酒經白雲生硯石疏雨灑窗櫺子上三洲去手杯猶未停病中對梅花一株欣然有作録似西孰孟載季迪兩先生一笑病中雅量豈堪論澄水能清撓即渾除却妙香無長物秪應靜坐洗煩言幾叢晚菊今耆舊一樹寒梅老弟昆曾住鍾山安石墅旁人猶恐我爭墩夜坐學默三年漫不譍流光一去意無徵緣如髮白因循染道似山青自在凝猶有形骸生影迹却將文字寄名稱一川月色多于水更著秋霜見底澄陳秀民字庶子溫州人博學善書至正中為武岡城步巡檢知常熟州張氏時為江浙行中書省參知政事翰林學士後莫知所終送強彥栗歸吳薊門秋月白城頭夜啼烏城中良家子半是南征夫或從張都護或屬李輕車道傍别妻子泣下如迸珠自非英雄具孰使禍亂除戎馬暗中國遊子將何趨君歸慰父母繄我獨何如燕京客舍送友歸天台雁鳴沙漠風秋入燕陵樹客子衣裳單寧不畏霜露驅車國東門迢迢懷往路尺璧橫道周誰能一回顧登山豺虎雄入海鯨鯢怒天台隔三江丹霞夾玄霧黃精或可尋胡麻庶當遇明時有遺佚歸哉保貞素我馬病已久東西厭馳騖逸駕如可攀吾將執其御送逺曲誰令車有輪去年載客西入秦誰令馬有蹄今年載客過遼西車輪雙馬蹄四念君獨行無近侍婦人由來不下堂側身西望涕沾裳恨不化為雙玉璫終日和鳴在君旁至嶽州宿嶽陽樓蕩槳􅑴流光登樓望八荒江山出圖畫天地入舟航夜靜星文動秋高月色涼題詩懷李白搔首鬢滄浪山居雜咏好山看不盡遊罷更須登石屋晴猶雨天池夏亦氷尋仙碧霞裏飛步白雲層松花飄滿地歸路喜逢僧邳州青山一髮見邳州落日雲迷故國愁父老空傳黃石在仙人已伴赤松遊乾坤不信無清氣河水胡為尚濁流野樹昏鴉栖未定數聲哀角起高樓寄紹興呂左丞後來江左英賢傳又是淮西保相家見説錦袍酣戰罷不驚越女采荷花輟耕録云張氏據有平江部將呂珍守越參軍陳庶子饒介之在左右一日陳賦此詩饒染翰題扇以寄呂詞翰雙絶呂倩人誦罷大怒曰我為主人血戰守封疆豈愛一女子不忍驚乎見則必殺之劉仁本字德玄天台人以進士業中乙科歷官江浙省左右司郎中至正庚子仁本治師餘姚作雩咏亭集名士四十二人修禊賦詩髣佛蘭亭稱一時盛事戍婦吟二首夫君在邉戍妾身守孤幃欲往備紉櫛不如頻寄衣衣到恐遲遲不到妾不知欲知衣到未明年鴻雁歸將軍功未成持牛勞軍士將軍豈無家為妾語夫主勿為賤妾生寧為將軍死賤妾欲從之軍中無女子蕨萁行東山有蕨萁南山有蕨萁西山有蕨萁北山有蕨萁采采蕨萁晨露未晞荆棘離披筐筥攜持長鑱深入土短褐寒風吹采采蕨萁可以療飢以簸以炊為餳為飴食少不下咽食多傷人脾去年嵗歉食無糜橡栗拾盡民流離今年嵗歉田無稗蕨萁食盡將安之美食大官饌仁心寧汝悲但見昨日奏麥兩岐今日進五色芝呈祥獻瑞無休時載膏載脂驛騎驅馳蕨萁蕨萁官獨不汝知已而已而嵗云暮矣方行字明敏黃巖人官參知政事於江浙行省或以為方谷真子未知是否其詩名東軒集贈虛中上人一室安禪久三生結願頻傳經來帝子送食下天神水月虛空相山雲自在身慈航如可渡應許姓龎人登秦住山此地曾經駐蹕來秦皇遺迹尚崔嵬採窮滄海無靈藥歸到驪宮有劫灰萬里黑風迷鬼國一杯弱水隔蓬萊詩人弔古應多思落日高丘首重回送賈彥德訓導霍山中都會面得從容兩載同聽長樂鐘天近君門嚴虎豹地寬人海混魚龍承恩自合歸宣室論道安能老辟雍江柳春花增别恨白頭何日更相逢趙善瑛字廷璋成都人八嵗能詩長而潛心六籍教授鄉里至正癸卯明氏據蜀隱居樂績山中逮蜀境內附後徙家錦江卒年七十有八錦里卜築詩錦里幽栖處悠然逺俗囂地偏車馬少山近市城遙松竹連蹊徑藤蘿掩屋茅閉門窮典籍修業問芻蕘見小悲蛙窞忘機夢鹿蕉白頭宜此樂青眼莫相嘲種菊開三徑橫琴咏九皋黃葵舒永日紫芋待終朝守道居顔巷嫌喧棄許瓢薄田多種秫平阜廣栽蕎鵝鴨遊深沼牛羊牧近郊芝蘭香滿砌枸杞翠連坳採藥攜輕筥觀蓮從小舠考槃時諷誦得句自推敲丘壑從茲穩弓旌謾逺招茗甌供伏臘土簠薦溪毛牧子吹羌笛仙童品玉簫南山曾採蕨左手慣持螯麋鹿為新侶松筠是故交煙霞情浩浩詩酒樂陶陶寵辱都忘却功名盡已拋唐虞今在宥許我學由巢吳志淳字主一無為州人以父廕歷官靖安都昌二縣簿濠泗兵起徙家豫章又遷居鄞之東湖奏除待制入明初遂不仕以終兒牧牛兒牧牛豐林清潤縱爾遊長鞭短策莫輕舉從渠飲嚙飽即休老幼年年仰衣食耕種田園藉牛力早夜單衣自飯之秪恐春來或牛瘠日日丁寧語牧兒老翁餉爾當及時籠禽吹笛任相學愼勿將牛常苦笞牛不耕田廪無粟淮上三年食人肉夏日園中清暑青山地僻車馬稀一載倦遊歌式微傍溪卜築面流水拂石展簟消炎暉老翁過從就蔬食幼女補綴成絺衣西亭去家苦不逺日暮共逐漁樵歸陸居仁字宅之華亭人以詩經中泰定丙寅鄉試隱居教授自號雲松野褐與楊亷夫錢思復遊殁同葬于山東麓號三高士墓楚人弓楚人弓縣兩石五十萬矢陷疆敵絳人弓箭三隻長歌入關成偉績多箭不如少箭力制敵若在弓矢間鳴條牧野高於山國馬足國馬足吉行五十轡如沃天馬足一日千里更神速國馬天間飽芻粟太行鹽車天馬哭張樞字夢辰陳留人徙家華亭築室曰讀書莊與諸弟唱和為樂兼工行楷陶南村贈詩云幅巾短杖林和靖斗酒長篇李謫仙又云讐書竹簡拈蘚碧臨帖箋藤寫硬黃可想見其風致也貝瓊作傳云夢辰居華亭之城東門日與子弟數十人講春秋或勸之仕不應人是以高之曰林泉民年八十餘乃終送友之戎幕金吾上將開東閣白髮參軍起曲阿嚴武故人唯杜甫馬周知已獨常何龍蛇久鬭纒兵甲鴻雁高飛避網羅慷慨平生兩行淚哀時更比别離多秋興百戰關河血未消將軍誰是霍嫖姚中原版蕩悲周室西楚紛披屬漢朝甲帳珠簾非昨日玉樓金屋麗層霄兵麾滿眼歸無處愁絶秋風柳萬條葉杞字南有京口人讀書負才智初建德守以掾辟不赴兵興後進士及第會李國鳳經略南土密陳時事十條李嘉納所言遙授丹徒縣主簿將别有委任而事權不復自由矣築别墅於吳淞以老焉感𠂻二十四韻貢賦通重譯耕桑被九垓歘驚氛祲滿不謂嵗時催丞相興師出綸音降使開紫泥封五采黃道繞三台奕奕宣光業桓桓李郭才陳雲連朔野廟略定風埃香糯江南餉葡萄隴右醅馬羣金匝匼毳帳雪毰毸劒動彭城潰珠還甓社來長驅危破竹密令疾銜枚王者征無戰羣雄勢欲摧忽聞君命召竟勒將旗回中夏捐雞肋丕基隱鴆媒義聲從此逝鋭氣一時灰天迥威弧弛城孤畫角哀火狐翻嘯聚海鱷復喧豗欵附真遺患除封實戲孩民情猶耿惻天討尚徘徊河漢明如洗崑崙豈易頽孰矜黃鵠志羞上野鷹臺微效寧無念篇詩信漫裁霜清野空濶獨立望蓬萊王澤字叔潤號青霞天台人僑居山隂嘗為縣丞於華亭蓋平涼之屬邑也寄友人我本東海人家住東海頭自從丱角時便向西州遊邇來西遊十九載夜夜思歸夢東海此身厭逐戎馬間落魄唯存壯心在今年始欲向東還便將歸老天台山相隨仙人養雞犬笑弄緑水桃花間况聞溪上桃已熟仙女嬋娟面如玉春風綰結緑雙鬟舞腰解按山薌曲去年羣仙遙見招謂豫自是王子喬山中何嘗識酒禁日日爛醉吹瓊簫昨日才經四明道故人相見驚絶倒間關萬死得生還顔色還同舊時好忽聞天吳落海隅到海要拾明月珠大風三日撼天黑海底吹折紅珊瑚洪濤如山老蛟怒白日江皋塞煙霧仙山咫尺不得歸目送冥冥鳥飛去棹舟惆悵却西回側望仙山心欲摧空懷帝子芙蓉闕遙望中天兩玉臺愁來昏昏枕書睡呼酒狂歌不成醉丈夫出處真可憐往往長遭不如意作詩為謝丹霞仙金堂石室無清緣有心未罷歸來約更待秋風海月圓是時方谷真據溫台叔潤阻兵不得歸故作此詩徽宗畫瓶中桂花玉色官瓶出內家天香誰貯月中花六宮只愛新涼好不道金風捲翠華小遊仙中山千日酒初醒却愛玄都夜景清起坐天門吹玉笛月中珠樹起秋聲董佐才字良用曾膺徵辟負才名其居顔曰釋耕所王逄有題詠見詩集中題華亭朱孟辨篆冢詩卷古初無毫楮羲畫何繇傳孰知文字理已具河圖前神農洎蒼頡俯仰極人天穗書與鳥書創制分後先龜麟錫禹時盤銘著湯年岐陽紀石鼓史籀獨稱賢矯若蛟龍蟠鬱若鎖鈕聨科斗聿行漆形體因自然一從孔壁廢重為經籍憐秦相約籀古撰次蒼頡篇小篆遂名家徑健含姿妍登封及詛神金石紛雕鐫下逮隸八分變化如雲煙漢經煨燼餘文教仍敷宣保氏存六書學僮才九千揚雄纂竒字杜林解探研繼迹非無人意象莫不全偉哉許祭酒搜羅歸簡編墜緒賴復舉後學知相沿陽氷克逺紹鉉鍇造其玄近代郚與周筆勢回奔川華亭朱茂才好古喜欲顚一掃世俗書習篆忘食眠秦望並之罘碧落兼新泉小者案間列大者屋壁縣生平囊槖資多充買碑錢功深學既精齒壯志亦堅池魚染皆黑鐵硯磨將穿摹拓纍萬番期差古人肩師法正在茲什襲比蹄筌孫樵文自祭智永筆忍捐前修不我欺我癖尤難痊嵯峨細林山上與浮雲連譬彼汲冢書函之瘞其巔聚土封若堂劖石表為阡其陽碧樹交其隂書帶緣山靈謹訶護有名如有仙揮灑人間者顯晦名非偏寶劍蕃賈發玉柙蔓草纒何如篆冢光夜夜映星躔錢維善篆冢歌敘云雲間善篆俞允文撰崑山雜咏疑其為陸友仁今據董詩乃知為朱孟辨也高明字則誠永嘉平陽人至正五年中第授處州録事辟丞相掾值浙省亂作解官寓鄞之櫟社入明初召用以老辭卒於家題支離叟錢塘門裏支離叟短髮蕭疏色黧垢雪霜嵗晚結輪囷風雨年深增老醜挫葴糊繲總無能欲與冥靈齊上夀天公怒此怪且孏勑遣神官下搜取勾婁吉利忽飛來虎倒龍顚盡灰朽女蘿飄騰白鶴去琥珀迸裂青羊走繁隂已逐謝仙車枯幹徒存韋偃手邇來好事猶痛惜嘆息形模無復有寧知百年皆夢幻靜看萬變互紛揉榮枯相尋無已時成壞有數元非偶南山誰信梓化特昆侖俄驚柳生肘朝菌何曾閲晦朔棫朴那知避薪槱全軀孰似櫟杜樹潔之百圍今在否人生根蒂不可牢况為草木計近久野客空嘆倚江柟老奴謾泣琅琊柳寒煙落日西湖邉衰草荒廬園數畝不見當時鐵門限春蚓秋蛇徒蚴蟉玄雲飛盡墨池空直寄亭前誰酹酒陳安字鳬盟吳人詩句清逸好遊江湖名流楊顧輩皆稱之高大使吳淞歸興圖楓落吳江白雁飛天涯遊子正思歸香消夜月青綾被涼入秋風白紵衣江浦蒹葭含宿雨驛亭楊柳帶斜暉分明記得西湖上載酒蘭舟近翠微題高理瞻所藏小景圖昔年為客楚江邉雨霽江南二月天楊柳畫橋深淺水桃花春岸往來船新篘白酒浮杯釅旋買青魚出網鮮因見此圖驚舊夢東風吹面鬢蕭然鄭昻字處抑永嘉人次復齋登華蓋山野老憂時淚不乾海天低燕麥風寒秦關土蝕銅牙弩漢殿月明金井闌共喜冦恂重借潁自慚李願未歸盤江山如畫人如玉破帽空悲管幼安林處士幽居山籬短短徑斜斜屋子三間竹半遮嵗饉無僧供菜把天寒有鶴守梅花武陵流水非秦世姑孰青山落謝家共約春暄草芽動杖藜㩦酒踏晴沙李存字明遠一字仲公安仁人通敏淹洽見賞於公卿三舉高蹈丘園皆不起其詩文傳世者曰俟菴集題王氏笑間亭笑者不必間間者不必笑能笑又身間涉世何爾妙利名浩於海好惡險成徼躋攀有亡命憤鬱或大呌癡如蟻旋磨叨若魚上釣不知嵗月往已死復誰誚之子素相聞磊落年尚少構亭頗軒豁勝概得其要幽花淡無媚新葉光相照倚欄皆可樂百事弗前料嗟我玩陳篇兀兀老蓬藋雙睂久不展有臂莫能掉山根晚雲薄誓欲隨荷蓧倘子不疵瑕拂衣共登眺美葛子熙臨川葛生朴且文負擔有力能辛勤家貧妻死母又老短窗挾策長云云忽思句讀送日月曷若江湖勞骨筋高碑大碣處處有篆楷草行兼八分晝長院靜手自打襟袂染煤常若熏旁搜遠取到川陜况乃閩浙江之濆通都大邑逄好事羅列古雅踰璣纁相酬金帛不論直豈比市井爭鈞斤收藏圖書家若府下者秦漢高華勛春初過我因細論絶勝待食如牢豶四方達士一時見野店濁醪常半醺顧余髮齒久希豁脫簡尚閲徒逢藝何當一竹兩芒屩共逐溪山秋半雲早起短髮梳殘月輕裳試曉風無言渾似道多病欲成翁竹簡聊千載藜羮亦萬鍾昻昻非自異瑣瑣得無同甘復字克敬餘干人至正間從張仲舉遊深為所推重入明初高蹈不出同里趙琥刻其集以傳宿山家木落秋滿山窗虗夜涼集風吹海月生露洗苔衣溼野客愛清泠長瓢暝中汲曉出西園由谷中歸披褐涉西園煩襟散清曉微風動高樹零露下芳沼始行幽谷中忽出青林杪流水漂餘花修筠度啼鳥身緣翠石回思逐白雲杳負杖孤賞懷春闌緑陰悄華幼武字彥清無錫人家素饒於財師事陳方子貞為詩戲題華稿曰黃楊謂其愛吟事而牽於家務如黃楊之厄閏而不長也彥清即用黃楊自命其集不以為戲焉寄趙易窗高士慶雲岡上人昨宵風雨釀春寒曉色開晴露未乾棊局定須尋李遠杖藜還肯過蘇端翻經坐榻呼龍守點易虛窗倩鶴看暫假飛鳬挽飛錫樵蘇不㸑罄交歡秋夜有感澤國秋來夜氣涼飄零猶自未還鄉蟪蛄泣露梧桐井絡緯繅風薜荔墻咫尺故園千里夢亂離華髮十年霜仲宣樓上長回首烽火連山欲斷腸陶宗儀字九成原黃巖人徙居松江别號南村﨑嶇亂離每以筆墨自隨晚嵗躬耕作勞之餘時時休於樹下有聞見摘葉書之貯一破盎滿則埋之樹根纍盎十數一日發之編為若干卷曰輟耕録南村雜賦六首屋小長林束村深四水通睡因間處熟愁向醉時空鵝鴨春波緑牛羊晚照紅嵗輸公賦足泚筆紀田功路直華亭谷林藏處士家葵菘浮雨甲粳秫吐晴葩塒羽肥堪縛溪鱗巨易義客來留共酌濁酒不須賒甲第多荒址茅茨獨老翁杖藜山逺近舟楫泖西東暮色蒹葭外秋聲絡緯中郊居端不惡此趣許誰同槿樹成籬落松脂化茯苓間開籠鶴柵時過狎鷗亭汗簡修書史持杯閲酒經塵纓終不縛何愧草堂靈江海謀生拙園田引興長徑分黃菊本池種白魚秧瘞筆營山竁橫琴坐石牀俗氛飛不到一曲水雲鄉草徑牛羊熟雲林鳥雀馴九峰三可覽一室四無鄰世治方為樂身安豈厭貧涼風北窗下未讓葛天民西湖紀興浩浩春波濶冥冥夜雨縣笙歌傳别館燈火隔疏煙作客頻遷次傷時更可憐明朝晴未卜還是醉湖船次韻夏士良戶侯竹裏茅茨白板扉興來隨意卧牛衣天籠平野前山逺水拍危橋過客稀釣罷得魚沽酒去雨餘種豆荷鋤歸故人却在城南住日日清觴四座飛曉起豆苖引蔓上疏籬桐樹吹花落釣磯老我田園間處好故人書疏近來稀挂巾蘿薜看雲起沐髮滄浪待日晞只怪平生詩癖在形骸消瘦不勝衣樂靜草堂為衛叔靜賦屋繞芙蓉九疊屛日長客去掩間庭巗花暖傍疏簾落階草晴分汗簡青溫火試香刪舊譜汲泉煮茗續遺經江南定有徵賢詔太史方占處士星次韻答楊廉夫先生移家正在小斜川新買黃牛學種田奏賦不騎沙苑馬懷歸常夢浙江船窗浮爽氣青山近書染涼陰緑樹圓樂嵗未教瓶有粟全資芋栗應賓筵夜坐披衣散髮坐南榮漏點遲遲欲二更風約沼萍雲影淡月栖徑竹露華明石牀涼意浮珍簟寶鼎沈煙噴玉笙世慮不關心似洗此身只覺在蓬瀛宮詞題王叔明士女大家妝著鬭時宜等候君王看月嬉三十六宮清夜永幽情不許外人知宋元詩會卷九十七
