body:
  text: 宋元詩會卷十六兵部主事陳焯編黃庶洪州分寧人庭堅之父仕宦不達上詩文號青社先生著伐檀集數十卷庶起西崑諸子之後其詩弗以綺麗為能疏朴蒼堅自成風格故集中有和劉子儀作題同而調迥别也人謂涪翁開江西之宗𣲖抑知後海先河猶有阿翁在乎平生亦雅耽臨池觀教兒學書詩可見然則寶山谷之翰墨者固宜識所由來矣對花伊昔甫白在造化困刀尺我生幾年後浪自鐫頑石對花雖把筆好句恨莫得耒陽與采石孤墳沒荆棘幾欲肉白骨再插風雅翼海為一杯酒地為一領席坐吟籠萬物語出埋霹靂乾坤髓可掬鬼神淚可滴人生貴適意身是天地客糟牀不可乾吟紙須強擘花落若解醫有金費千鎰宿趙屯蘆花一曲水弭楫日已暮山間聞雞犬無人見煙樹行逐羊豕迹始識入市路菱芡與魚蟹居人足來去漁家無鄉縣滿船載稚乳鞭笞公私急醉眠聽秋雨此詩與大孤山一首山谷嘗手書刻石于南康星子灣有跋見别集賦小桐小桐才幾尺氣壓百嵗樗雨露意未飽風月韻已孤鳳凰肯寂寞燕雀空踟蹰天地有和氣想為桐之腴我願刳作琴獻上九重居坐使熏風還雖死骨不枯次韻和子儀聞蟬落日挂樹間長我庭下隂園林動秋意高蟬忽微吟清風轉餘響悠然下遙岑微物感時節鏗鍧吐商金古樂久破碎兹蟲抱全音荒忽尚偃蹇激起壯士心願為秋蟬操被之朱絲琴大孤山彭蠡百里南國襟萬頃蒼煙插孤岑不知天星何時落春秋不書不可尋石怪木老鬼所附兹乃與水同浮沈鳴鴟大藤樹下廟祭血不乾年世深舳艫千里罔敢越割牲釃酒來獻斟我行不忍隨人後許國肝膽神所歆落帆夜宿白鳥岸睥睨百繞寒藤隂銀山大浪觸天險比干一片崔嵬心宦逰遠去父母國心病若有山水淫江南畫工今誰在拂拭東絹傾千金右與宿趙屯同在石刻汴河汴都峩峩在平地宋恃其德為金湯先帝始初有深意不使子孫生怠荒萬艘比來食京師汴水遂作東南吭甲兵百萬以為命千里天下之腑腸人心愛惜此流水不啻布帛與稻粱漢唐關中賴輸挽木牛可以腐太倉舟楫利今百于古奈何益見府庫瘡天心正欲醫造化人間豈無針石良窟穴但去錢穀蠧此水何必求桑羊家童來持雙井芽數數飲之輒成詩以示同舍我疑醇醲千古味寂寞散在山茶枝雙井名入天下耳建溪春色無光輝吾鄉茶友若敵國糞土尺璧珍刀圭嗟豫奔走車馬迹塵埃荆棘生喉頤煮雲為腴不可見青泉緑樹應相嗤長鬚前日千里至百芽包裹林巖姿開緘春風若滿手喜氣收拾人恐知江南陽和夜欲試小齋獨與清風期汲得甘泉火亦得混沌不死元氣肥詩書坐對為客主一啜已見沆瀣醨通宵安穩睡物外家夢欲遣不肯歸不信試來與君飲洗出正性還肝脾和象之雨後望少室山白雲塵埃奔趨插手版十年已賣山中間相逢少室若交舊白雲與我開容顔風驅煙塵去蔽幕長天覆碧無瑕瘢我疑嶽神宴天上泛掃伊洛為圖看又疑山鬼有寒稅纊絮萬纍輸隂官色如可餐無厭飽玻璃為甑炊琅玕去去還觀不能已一里回首百據鞍長安許生以畫名間暇拂拭新素紈能求山高水深趣常恐造化在筆端每觀雲泉得意處擬寫人物家其間今對異景慙首鼠愚若犬彘編槽欄君詩託我有深意明月一杯心往還遣懷六載紅蓮客差池又一年無人和白雪有意補青天肝膽論興廢詩書謁聖賢尊中古日月窮達付陶甄寄子蒙授常寧令疏率君堪愛無心宦又高身思眠白屋人勉著青袍號隱疑名福前為寧鄉尉自號吏隱貪歸似姓陶常寧邑雖小應合得牛刀郡廳誦書偶成主人調鼎手千里刃迎虛暗使民如堵能容吏似樗莓苔眠杻械燕雀聽詩書刀筆慙無補身為白蠧魚和子玉病起逰書齋蕭齋久不住筋力試笻初窗户蝸涎瑣塵埃鼠迹書病魔雖已去詩癖竟難除苔地欣重掃徘徊意有餘次韻和雪霽西湖雪會逰人意元朝變物華醉鄉銀作界詩客玉為家魚影紋冰縠禽蹤篆霰沙餘英恐銷盡目斷夕陽霞教繩權學書偶成文事有緣曾弄墨小子生周一嵗先弄墨於晬盤見來官小慰咨嗟聊將筆墨傳生計不尖詩書作世家字識姓名能指點寫因帖妥不傾斜著鞭莫落時人後三十塵埃監汝爺探春雪裏猶能醉落梅好營杯具待春來東風便試新刀尺萬葉千花一手裁登大雲頂區區霸迹欲知小試絶大雲孤頂看老僧指我日上處鏡面㵼出黃金盤青州去海尚踰二百里寺僧云山頂日出時往往見海余靖字安道韶州曲江人少不羈以文學稱鄉里舉進士起家為贑縣尉改將作監知新建縣遷祕書丞數上書論事以救范仲淹落職監筠州酒稅徙監泰州稅知英州遷太常博士復為校理同知禮院擢右正言使朔方進修起居注在職數言事而紏劾大臣夏竦等及爭元昊嵗賜風力尤著會元昊歸欵朔方忌宋詐遣使助兵力破欵局即命靖往報之屈其議而還以作朔語詩被劾出知吉州因請養居曲江再起知虔州丁父憂去會儂智高反詔以廣南西路委靖經制賊平遷尚書工部侍郎徙知潭州又徙青州官至工部尚書卒諡襄靖逰韶石世務常喧囂物外有真賞結友探勝槩放情諧素想韶山南國鎮靈蹤傳自曩雙闕倚天秀一徑尋雲上長江遠縈帶衆巒疑負襁千里眇平視萬形羅怪象日影避崑崙鼇頭冠方丈青螺佛髻高羣玉仙都敞霞城晴煜爚桃源春浩蕩仰攀霄漢近俯瞰神鬼恍澗深流如織巖虛動成響造化與真質妙畫胡能倣賤子生海隅逢辰辱朝奬靡成彛鼎勳甘從丘壑往驚禽戀故林困驥畏羈鞅兹逰得幽深同懷樂清曠世言帝有虞朔南聲教廣丹丘卜巡幸翠華臨蒼莽簫韶曾此奏鍾石無遺像但覺熏風存蕭然天籟爽姬公著治典歷代所遵仗九野奠山川萬靈咸肸蠁醫閭與吳嶽半列遐荒壤四時迎氣祠猶煩禮官掌况乃祝融區羣物資含養來儀威鳳居樂育菁莪長膚寸起成霖崇高一方仰躋之佐衡霍無慙公侯享逰大洞山詩并序豫嘗恨逰觀山川皆前賢所稱圖籍所著者耳未能索幽訪異輿音馬迹之外得古人所遺絶境一寓目焉因狀其名物與好事者傳之無窮也韶之境富于山水而佛剎占勝相望于野其名聲洽于四方者無幾頃間居里舍與上饒從事子元王君擷其遺槩得大洞焉始自州治水行七十里得月華山捨舟楫肩籃輿道樵徑又十五里乃至是山觀其磅礴聳峭秀倚天際絶頂之上千里在目日浮月沉雷驚虹斷隨方下睨晦明異壑則雖丘垤衆山蚊蠓聚落不足喻其高也相與拂幽石翳修林澗聲泠泠清入毛骨真可遺世而絶俗豈獨攄憂賞異而已耶各為詩以志之自漢武帝元鼎六年庚午嵗始平越為郡縣凡一千七十年至皇朝建隆元年庚申嵗始有僧建剎而居之又七十九年始為什方院又二祀康定元年庚辰嵗始有衣冠逰者豈天作地藏有所待哉王君暨同逰本郡布衣李訪月華月羅浮達二禪師咸書名于長老習公方丈壁云十里松檜風萬仞斗峭壁陽崖雷自奔隂壑雪猶積勢爭衡霍雄地控楚越厄胡為千載間名未光圖籍物乃因人彰聞人于在昔不逢巢由高箕山亦頑碧我今共逰覽逍遙非俗格劇論窮古今玄談叩虛寂攀蘿躡孤峰和雲坐幽石濯纓清冷泉留為不朽迹題白蓮菴掩室昔宴居冥心遺萬化菡萏本無染紛華共高謝夜禪杉月落晨齋庭鳥下簷間雲氣浮池面秋香詫演法辭故棲幽蹤賁寒野蠟屐此同逰願結宗雷社題劉太博棲心亭宏構小侯第避權長掩關地分金穴貴人共白雲間野色春牆外池香暮雨間燕申忘萬慮吏隱敵箕山留題龍光禪剎呈周長老尋幽逢勝地方外趣無垠雙澗流寒月千峰集暮雲路盤塵境斷世系祖燈分却愧留題處猶須説見聞送李廷評知福清縣世閥茂儒紳閩甌寵命新縣圖遙盡海鄉樹密藏春祖帳鶯將老登車雉已馴行聞趨召節舊美政如神子規一呌一春殘聲聲萬古寃疏煙明月樹微雨落花村易墮將乾淚能傷欲斷魂名韁慚自束為爾憶家園桂園蚤行聞雞已行邁策馬便徘徊月色依山盡秋聲帶雨來自堪悲玉璞誰復築金臺薄宦空羈束西齋長緑苔山館野館蕭條晚憑軒對竹扉樹藏秋色老禽帶夕陽歸遠岫穿雲翠畬田得雨肥淵明誰送酒殘菊繞牆飛送僧惠勤歸鄉舊國起歸興三江一棹輕夜吟逢月白曉渡趂潮平楚岸雲藏寺吳宫水繞城羡師塵外去何日濯吾纓雙松自古詠連理多為陽艷吟誰知抱高節生處亦同心風至應交響禽棲得並隂嵗寒當共守霜雪漫相侵新息道中遇雪寒深雪壓春去去祗傷神巢穴有歸鳥路岐無住人遠光天共白夜色月相親獨酌不成醉翻嫌名利身靈樹喜長老屬疾見寄次韻酬之鳴韶山下客多病似吾身每想彌天辨誰為問疾人泉清偏照月松瘦不知春未遂尋高論遙遙一水濵湘中送人離謳方揭耳别緒已凄然草蔚湘纍浦花殘蜀魄天疑山晴拂漢啼竹冷澄煙後夜思君意空歌皓月篇慧照大師已向南宗悟尤于外學精士林傳字法僧國主詩盟初地形容古彌天語論清因嗤支遁輩徒擅養鷹名逰水南寺雙剎聳浮雲層軒絶世塵松溪千蓋雨茶圃一旗春夜梵龕燈暗朝香篆火新暫來猶永日堪羡白蓮人暮春草帶全鋪翠花房半墜紅農家揄莢雨江國鯉魚風堤柳綿爭撲山櫻火共烘長安少年客不信有衰翁送嶽師歸贑川千里起歸思翛然物外身海山經處霧梅嶺到時春藥更開新楮庭應長舊筠年衰重方術聊此送行人謹吟五十六字攀送仲求殿丞之任贑川竊惟嚴君國博挂冠歸間而仲求兄弟為鄰部守倅其榮至矣誠欲賦述詞不逮意一門纓組列西雍又見雙旌並訓農三釡親庭交祿養夾河子舍接鄰封酒闌風雪催行色吟際江山助筆鋒我亦思親求郡紱東湖南浦好過從送劉學士知衡州朱轓新命漢諸侯地扼荆湘占上遊醽渌水聲侵古堞祝融峰色入晴樓晝垂三組鄉邦過春擁雙旌嶽寺逰番直星垣歸緩步謫仙通籍著瀛洲送楊學士益州路轉運芝函新命直仙蓬又見岷山叱馭忠玉珮曉班辭日下木牛秋粟轉褒中花時井邑蠶叢富徼外人家棧道通竒技刺文頻詔約此行應更變民風思夀陽寓居高氏園亭嘗借芳園石友家幽棲無復羡紛華敞扉氣爽雲生壁卷箔香微露泫花桂向淮山分月魄桃從秦洞得仙葩别來追想清間境悔褫方袍走棧車和邃卿張學士暑夕危坐空齋暝色低三金才伏火將西煙濛細草流螢度月上疏林倦鵲棲荃葛野裳交羽扇桔橰鄰圃響蔬畦中宵爽氣奪炎熱却笑班姬空慘悽送舒太博通判眉州通守方欣再命新東風疏雨拂行塵封疆遠入魚鳬國岐路正逢蠶市春彭岫曉嵐迎畫隼錦江晴緑照朱輪歸期不待更書至舊有清名在縉紳落花小園斜日照殘芳千里傷春意未忘金谷已空新步障馬嵬徒見舊香囊鶯來似結啼紅怨蝶散應知夢雨狂清賞又成經嵗别却歌團扇寄回腸送張如京知安肅軍賜戟銜恩出斗城塞門迢遞草初青新提司馬臨戎節舊應哀烏近極星叔子戍吳長緩帶單于歸漢已空庭圯橋自得家傳策不問人間太白經和董職方見示初到番禺詩五方殊俗古難并千載猶存故越城客聽潮雞迷蚤夜三更潮上即聞雞鳴人瞻颶母識隂晴波濤洶湧天邊濶犀象斕斒徼外生太守不才當遠寄惟憂南畝廢農耕逰應聖宫驅羸遠遠出嚴闉雲構祠宫絶世塵伴鶴不知龜甲子斸山多見藥君臣雨昏仙穴丹砂井雲映樓居玉洞人只待䇿勳書竹帛抽簪來此卜比鄰西山萬壑千巖鬭物華榰笻間訪道生涯一壇星斗修真館數里雲煙斸藥家魚戲竹溪寒影碎路穿松塢翠隂斜桃源自有神仙宅未信明河八月槎謝孫抗員外惠酒白衣遠遠到江樓報道攜壺助勝逰醉眼便堪終日富離腸先破一春愁梅梢背嶺開猶晚雪片當風舞未休此景滿觴方得意不須千釀敵封侯馬當呼鷗不至偶成呈同行諸官昔年曾泛馬當灣團飯喚鷗篙楫間今日江頭飛不下應知人世足機關端午日寄酒庶回都官龍舟爭快楚江濵弔屈誰知特愴神家釀寄君須酩酊古今嫌見獨醒人五色雀羅浮有五色雀各被方色非時不見若士大夫將逰是山則先入羣翔寺僧以是為候某庚辰嵗謫官來逰將至之夕兹雀亦集感之成詠云五方純色儼衣冠應是山靈寄羽翰多謝相逢殊俗眼謫官猶作貴人看陳堯佐字希元蜀閬中人進士及第為魏縣中牟尉作海喻一篇人竒其志遷祕書郎知真源縣開封府司録參軍事轉府推官坐言事忤旨降通判潮州召還直史館知夀州歷兩浙轉運副使徙河東京西入為三司户部副使擢知制誥史館修撰知通進銀臺入翰林為學士拜樞密副使同中書門下平章事集賢殿大學士以太子太師致仕卒贈司空諡文惠集三十卷昭慶寺湖邊山影裏靜境與僧分一榻坐臨水片心間對雲樹寒時落葉鷗散忽成羣莫問紅塵事林間肯暫聞西湖附郭水連山公餘獨往還疏煙漁艇遠斜日寺樓間繫馬芭蕉外移舟菡蓞間天涯逢此景誰信自開顔吳江平波渺渺煙蒼蒼菰蒲才熟楊柳黃扁舟繫岸不忍去秋風斜日鱸魚香湖州苕溪清淺霅溪斜碧玉光寒照萬家誰向月明終夜聽洞庭漁笛隔蘆花題潮州韓木亭侍郎亭下草離離春色相逢萬事非今日江山當日景多情直擬問斜暉華清宫百首新詩用意精不尤妃子不尤兵須知一向傷心事都為明皇恃太平吕公著字晦叔幼嗜學至忘寢食父夷簡器之曰他日必為公輔登進士第召試館職不就通判潁州入判吏部南曹仁宗奬其恬退除崇文院簡討同判太常進知制誥三辭不拜改待制兼侍讀英宗初加閣直濮議起力言稱皇考之非與執政左乞補外知蔡州神宗立召為翰林學士知銀臺以爭司馬光罷中丞自請解職知開封府青苖法行公著極言其不便且劾吕惠卿姦邪忤王安石出知潁州起知河陽召為翰林學士承旨改端明知審官院移疾去位安撫定州徙揚州加大學士哲宗立以侍讀還朝上十事拜尚書左丞門下侍郎元祐元年拜右僕射兼中書侍郎與司馬光同心輔政三年以司空同平章軍國事宋興宰相用三公平章重事者才四人而公著與父居其二士論榮之薨年七十二贈申國公諡正獻分題得癭壺天地産衆材任材謂之智榱桷與楹杙小大無有棄方者以矩度圓者中規制嗟爾木之癭何異肉有贅生成擁腫姿賦象難取類櫽括所不施鈎繩為爾廢大匠睨而往惻然乃有意孰非造化工而終朽不器刳剔虛其中朱漆為之賁㪺漿挹酒醴施用惟其利犧象非不珍金罍豈不貴設之于楹階十目肯注視幸因左右容反見謂竒異飾陋就其長能通天下志吕公弼附字寶臣司空夷簡仲子公著之兄也先是司空殁仁宗終念之已問知公弼才甚喜識其名於殿柱及擢知成都軍府肅然為羣牧使英宗居藩得賜馬苦劣請易之不可後即位召為三司使曰三司主出納我曩請馬卿不與可守是官矣神宗立進樞密使憤新法之病民將為上力陳其不便草奏成未入而從孫吕嘉問預竊其稿以示王安石安石怒立出公弼於外任吕氏因呼嘉問為家賊云琴臺煙樹重城側琴臺千古餘蚤為梁苑客晚向茂陵居賦給尚書筆歸乘使者車清風覿舊隱長目聳鄉閭吕希哲附公著子字原明少從諸儒講學絶意進取以父蔭入官終父喪始授兵部員外郎其妹壻范祖禹嘗于哲宗前言希哲經術操行可備勸講召為崇政殿説書擢右司諫不拜黨論起以祕閣校理知懷州分司南京居和州徽宗立以祕監召改光祿少卿請外知曹州旋遭崇寧黨祻奪職羈淮泗間十餘年卒其兄希純立朝正直為李清臣所排大雪侍講筵水晶宫殿玉花零點綴宫槐拂素屏特敕下簾延墨客不因風雪廢談經葉清臣字道卿蘇州長洲人天聖二年進士主司竒所對䇿擢第二宋士以䇿擢高第者自清臣始也授奉禮郎簽書蘇州觀察判官事歷通判太平州知秀州入判户部勾院改鹽鐵判官出知宣州纍遷太常丞進直史館知制誥知審官院國子監屢上章言事上謂其才可用擢起居舍人龍圖閣學士權三司使公事宰相陳執中素不悅清臣出知邠州因請對改潭州徙知永興軍會仁宗出手詔求言清臣條對極論時政闕失復召為翰林學士皇祐元年奏備邊之䇿請發大名庫錢以佐邊糴而安撫使賈昌朝格詔不從清臣固爭宰相方欲兩中之徙昌朝鄭州罷清臣知河陽卒贈左諫議大夫集一百六十卷董永董生少失母老父鰥且貧無田事耕稼客作奉晨昏朝推鹿車去大樹為庭藩農家乏甘旨粳籺茍自存父死不得藏粥身奉九原人道孝為本畎畝知所尊傷嗟世教薄至行豈足論廪祿厚妻子楄拊遺其親靳吝一抔土因循三尺墳空令丘壑間凛凛慙英魂憫農五月雨未沛吾民耕固遲中秋霜蚤至我稼颯其萎膏澤歎苦晚芃苖惜遽衰盈疇皆秕稗卒嵗誤京坻國謝三年蓄人悲一頃萁編齊陳牒訴奔走失程期縣籍拘常制官征有定規勞歌不可繼為作憫農詩送梵才大師歸天台江水望不極楊花江面飛春風自無定遠客乂言歸景勝詩逾老心冥語亦稀從來林下意為謝北山薇會致堯南豐人登進士第官西川安撫文集二百卷以孫布貴追封密國公子五人易簡易占最知名而鞏布肇俱易占之子東林寺江南楊柳春日暖地無塵渡口驚新雨夜來生白蘋晴沙鳴乳雁芳草醉逰人向晚前山下誰家賽水神劉氏江樓劉氏江樓雅詩家不易言春風花對岸夜月水當軒朝端友字君成濟州巨野人少傅朝迥四世孫也工於詩其子補之及羣從皆承家學有詩名曾倅杭州時蘇軾為通判故補之年十七即見知於軾云蚤行馬上雞初唱天涯星未稀驚風時墜笠零露暗沾衣山下疏鐘發林梢獨鳥飛遠峰煙靄淡迤邐見朝暉馬處厚席上探得蚤梅嶺梅何處蚤雪裏看芳菲北陸寒猶在南枝春已歸曉妝初見妒殘角未成飛引我江頭夢清香憶滿衣登多景樓樓上無窮景樓前正落暉開軒跨寥廓覽物極纖微雲破孤峰出潮平兩槳飛東溟看月上西渡認僧歸木落吳天遠江寒越舶稀魚龍鄰海窟雞犬隔淮圻草色迷千古波聲蕩四圍廢興懷霸業融結想天機浩浩羣流會沈沈百怪依登臨真偉觀回首重歔欷仲訥字撲翁定陶人景祐元年進士由英州防禦推官擢大理寺丞三遷為尚書屯田員外郎卒年五十五訥喜讀書為古文詞晚尤好為詩其詩有名於世蓋王介甫志之如此送唐御史力犯雷霆衆共危遠投魑魅獨為宜忠州學業真無負高廟神靈固有知自倚聖明容直道未甘憔悴死荒陲滿朝卿相多公議莫把文章作楚詞負暄間眠茅簷晴日暖如春一枕鈞天樂事新滿眼繁華皆得意午眠安穩却無人李師中字誠之楚丘人年十五上封事言時政舉進士知洛川縣用龎籍薦召對轉太子中允知敷政縣主管經略司文字提點廣西刑獄召啓邊釁者難之屈其議境賴以安邊人化之肖像立祠稱為桂州李大夫不敢名還知濟兗二州遷直史館知鳳翔府歷河東都轉運使知秦州持重總大體深得戰守機宜因與王韶議邊事不合忤王安石意出知舒州稍復待制知瀛州再貶和州團練副使卒年六十六師中具王佐才以好大言不容于世王安石知鄞縣時師中即知其能亂天下蓋有過人之識也送唐介之貶所孤忠自許時不與獨立敢言人所難去國一身輕似葉高名千古重如山並逰英俊顔何厚未死姦諛骨已寒天為吾皇扶社稷肻教夫子不生還按裨史唐子方復因潞公薦官於朝無所建白師中從子方索還前詩子方無以報但取詩還之曰我固不用出韻詩也蓋謂山寒二字同押云楊偕字次公坊州中部人少從种放學於終南山舉進士授坊州軍事推官知汧源縣調漢州判官上書論陜西邊事召試不赴即遷著作佐郎為審刑院詳議官歷太常博士殿中侍御史進龍圖閣直學士知河中府屢與陜西經略使夏竦爭募土兵之非彼此交奏不為少屈進樞密直學士知并州所論八陳圖及進神楯劈陳刀朝廷善之下其法於諸路往往賴以破賊遷翰林學士知審官院因議元昊乞和許不稱臣為諫官所劾出知杭州還為右諫議大夫請老以工部侍郎致仕卒有集十卷郡舍偶書偃息鈴齋度歲華著書人盡笑聲牙斯文自信驚天地吾道誰知繫國家獨愛杉篁寒不變更憐江海濶無涯因思朝市爭名地何似優遊刺史衙傅堯俞字欽之本鄆州人徙濟源未冠登第知新息縣遷太常博士歷監察御史於內侍之不法者悉劾之直聲大著英宗即位轉殿中遷起居舍人上書請太后還政逐任守忠皆有力焉知諫院英宗眷遇特厚以濮議不合丐外任出知和州神宗即位徙廬州王安石素與之善欲援以助己虛待制處之堯俞極論新法不便安石怒但授直昭文館俄出為河北轉運使改知江寧府再嵗六移困於道路知不為時所容請提舉崇福宫哲宗立以祕監召纍升御史中丞爭留御史張舜民不聽請知陳州未幾復原職元祐四年拜中書侍郎卒年六十八諡獻簡讀書吾屋雖喧卑頗不甚蕪穢置席屋中間坐卧羣書內橫風吹急雨入屋灑我背展卷殊未知心與古人會有客自外來笑我苦癡昧何致雨侵衣屢問我不對必欲窮所因起答客亦退聊復得此心沾溼寧足異袁陟字遁翁南昌人鹽鐵副使袁抗之子刻勵好學善為詩終殿中丞晚卜居梅嶺之雲溪距郡三十里宿簡寂觀名山崇祕祠終夜得清賞真氣溢空浮流泉隨砌響林巒片月散殿閣高風行天際斗杓直庭中盤石橫即陸高真朝斗之石逸人今何之故嶺不改秀白鶴唳松梢青燈見在竇恍追汗漫駕深悟逍遙言四顧羣動寂置心歸灝元再逰雲居風吹嶺頭樹似欲招行客緣雲過絶頂復見紫霄宅平觀三百里下視八千尺五老鎮相望西岫天與敵可笑培塿羣亦自矜寸碧氛埃轉宇宙雁鶩下川澤危亭據中峰回抱竦天壁沈沈古帝坐左右列夔稷舉頭河漢通直欲攀南極合奏天地籟兩耳清歷歷吁嗟萬類微胡為競朝夕安知太清上我方適所適尚思西巘路去冬躡雙屐高興挹洪崖大句鼓天力到今巖壑間浩浩起金石安得少陵翁物外講新格重來羈靾在欲隱世纍迫多謝受命松長存嵗寒色宴坐巖霜露凝空白松杉斂翠隂泉聲月中冷山色暝來深宋元詩會卷十六
