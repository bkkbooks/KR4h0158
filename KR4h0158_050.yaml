body:
  text: 宋元詩會卷五十兵部主事陳焯編高九萬號竹澗理宗時人與劉後村孫季蕃善後村寄詩云行世有千首買山無一錢其風致可想卜居結屋離黃道開門對白沙一莊千古月三徑四時花客至旋沽酒身間自煮茶相聞蟲鳥外不復聽喧譁春日湖上清波門外放船時盡日輕寒戀客衣花下笑聲人共語柳邊檣影燕初飛曉風不定棠梨瘦夜雨相連薺麥肥最憶故山春正好夜來先遣夢魂歸送方秋崖出都門忠言歷歷未曾行盡載圖書出帝京餘子但知才可忌先生當以去為榮門闌竹石關心久部曲溪山照眼明長嘯歸歟莫惆悵浙江風定自潮平江居晚詠家住清江江上村江雲山影自平分幾回晚起開門看不見青山見白雲過寶蓮山山下為韓王府拂曉官家簿録時未曾吹徹玊參差旁人不忍聽鸚鵡猶向金籠喚太師時托胄賜死玊津園側春情天涯海角水雲寬人在吳頭楚尾間彈徹箜篌難寄恨海棠深院獨憑欄真山民字山民文忠公之孫宋末隱居不仕但自稱山民諱其名氏識者服君才節謂德祐間復出一淵明也幽居雜興松桂小菟裘山扉幽更幽蜂王衙早晚燕子社春秋鬢秃難遮老心寬不貯愁年來把鋤手無復揖公侯光霽閣晚望一閣納萬象危闌俯渺茫白沙難認月黃葉易為霜宿鳥投煙嶼歸樵趂野航孤吟誰是伴漁笛起滄浪興福寺為厭市喧雜攜詩來此吟鳥聲山路靜花影寺門深樓閣莊嚴界池塘清淨心松風亦好事送客出前林修真院訪崔道士竹扉蒼蘚墻林下小丹房風定香煙直月斜簾影長瀹茶泉味别點易露痕香安得棲塵外求師却老方春遊和胡叔芳韻春光潑眼明占勝得新亭棠醉風扶起柳眠鶯喚醒非無杯泛緑安得鬢皆青且事日為樂歌聲莫暫停山亭避暑怕礙清風入丁寧莫下簾地皆宜避暑人自要趨炎竹色水千頃松聲風四簷此中有幽致多取未傷亷三山旅夜獨坐本無况凄涼更旅中檻低簷礙月窗破紙吟風鄰館笛三弄譙樓鼓二通半觴聊自適新荔擘輕紅泊白沙渡日暮片帆落渡頭生暝煙與鷗分渚泊邀月共船眠燈影漁舟外湍聲客枕邉離懷正無奈况復聽啼鵑夜話無上人房蒲團一榻上坐到夜將分窗月燈昏見巖猿雨歇聞茶甌勝飲酒禪語當論文只恐紅塵迹涴師松下雲獨坐寒齋淡無味孤坐思悠悠時事三緘口年光一轉頭有書遮老眼無藥療間愁假使丹心在衰遲也合休曉行山間出門誰是伴只約瘦藤行一二里山徑兩三聲曉鶯亂峰相出沒初日乍隂晴僧舍在何許隔林鐘磬清山間次季芳韻好山多在眼塵事少關心風竹有聲畫石泉無操琴許猿分野果留鶴守雲林不是間邉客誰來此地吟溪行春暖溪西路行吟又幾回水清明白鷺花落失青苔雲過日吞吐樹搖風往來漁歌聽未了欲去又徘徊除夜約張梅境飲今日又除夕君能為我來燭光紅照席酒浪緑搖杯臘帶吟愁去春隨笑臉回相看俱健在莫管歲華催宿寶勝寺苦吟吟未了只向兩廊行月去塔無影風來鐸有聲禪心隨水淨佛眼共燈明安得雲邉住與僧分此情兵後寓舍送春觸景多懷舊憑欄易愴神飛花遊蕩子古木老成人世換山如醉田荒草自新鄉關渺何處回首暗風塵樓居攜書來過此便覺少塵埃簷冷留雲宿窗明報月來間愁山隔斷幽夢鳥呼回湖海元龍氣從渠俗子猜蘭溪舟中一舸下中流西風兩岸秋櫓聲搖客夢帆影挂離愁落日魚蝦市長煙蘆荻洲篙人夜相語明發又嚴州清明清明今日是原上一經過新葬塜無數未來人更多此生曾悟否不樂復如何莫待澆墳土樽前且醉歌臨江晚行茅舍亂雞聲疏林淡見星霜輕留草緑霧暗失山青蹤迹去來燕交遊聚散萍浮生原是客不必恨飄零寄郭月蓬煙波秋草外活計一漁篷淡月明寒葦新霜醉曉楓身雖殊出處道豈有窮通俯仰看人面何如數過鴻舟中峽口亂山如碧玊處處見鵑花水漲傍分港舟行倒走沙宿依沽酒市飯過釣魚家喜脫風波險推篷數暝鴉次韻章劒溪山居想無書赴隴林鶴莫驚猜曵杖雲同出開簾山自來池堪供洗硯籬不礙觀梅靜倚長松立藤花點翆苔宋道士同遊白雲關扶攜方外友來入白雲關八九峰如畫兩三人倚欄棋聲敲竹外簾影落花間一曲瑶琴罷翆隂生晝寒晚春有恨青春老無營白晝長葉新林換緑花落地生香雨意一畨足人家百事忙為儒竟成誤悔不早農桑江樓秋夕樓高古城繞無奈漏聲催幽夢風吹斷新吟月送來江長漁唱遠雲冷雁聲哀明日重陽酒黃花開未開初夏訪劉道士白雲隨杖屨伴我到山房暑薄疑天别林深見路長水芝皆道味花竹亦詩香更待荷開後來分半榻涼春行東風物物新花外步清晨蕉葉卷舒雨鳩聲問答春園林三月景詩酒百年身試數交逰侶如今有幾人秋晚暮色入江郊霜風兩鬢毛笛聲吹月落詩興挾秋高謝絶南柯蟻留連左手螯孤燈竹窗底危坐一歌騷李修伯山居俗子自不到幽扉何必扄苔衣和月卧山雨雜泉聽有髮徒斑白無名入汗青未應間此事尚可掃玄經道逢過軍投宿山寺窮途欲焉往薄暮此相投蟋蟀數聲雨芭蕉一寺秋鄉關來枕畔時事上眉頭長嘆為僧好今逢更説愁春曉雨破曉簷花未放乾披衣和夢倚闌干釀成苔暈地猶溼老盡鶯聲風正寒無客醉敲金鐙響有人睡怯翆衾單牡丹一夜成消瘦下却朱簾不忍看西湖圖兩袖春風一丈藜等間踏破柳橋西雲開逺嶂碧千疉雨過落花紅半溪青斾有情邀我醉黃鶯無恨為誰啼東城正在桃林外多少遊人逐馬蹄隱懷樣不趨時合便休都將往事付東流眼看浮世自今古迹與孤雲同去留泉石定非騎馬路功名不上釣魚舟有時但得句無問只與漁歌互唱酬遊鳯棲寺十載重遊古鳯棲連宫新繞緑楊堤欲談世事佛無語不管客愁禽自啼苔滑空廊妨散步塵昏老壁失留題僧家田地鄰家種菜甲春風緑滿畦漁浦晚秋西風吹夢越中遊剪剪輕寒入短裘鴈字不將鄉信寫蛩聲空和旅吟愁郵亭冷雨孤燈夜漁市斜陽一笛秋是處山川即吾土仲宣何用怯登樓泊舟嚴灘天色微茫入暝鐘嚴陵湍上繫孤篷水禽與我共明月蘆葉同誰吟晚風隔浦人家漁火外滿江愁思笛聲中雲開休望飛鴻影身即天涯一斷鴻題永嘉夢草堂留得斯堂萬古名江山不敢閉英靈池光曾染吟邉墨草色猶如夢裡青南浦詩香流未歇東家魂冷喚難醒當時園柳俱塵迹惟有鳴禽尚可聽連城春夜留别張建溪飛絮遊絲客子心連城那忍遽分襟青燈應見詩情苦濁酒不如交味深一榻暖風棲竹屋半闌淡月立花隂離懷今夜先收拾盡付明朝馬上吟夜坐匹馬平生汗漫遊如今寂寞老林丘小窗半夜青燈雨幽樹一庭黃葉秋懶看世情寧睡去怕傷時事莫吟休寒蛩可是知人意未到莎根只説愁東粵廟頽欄斜照網蛛絲陳迹凄涼萬古悲柘水尚鳴亡國怨山松曾見受封時碑因苔蝕無完字城為田侵失舊基當日東甌知幾戰如今贏得一荒祠歲暮顔不常朱鬢易斑流光難駐雨跳丸一年又是等間過百歲只消如此看把酒何曾長在手種桃能得幾憑欄癡人醉夢不知醒日夜雙眉抵死攢三峰寺寂寞煙林噪亂鴉青鞋步入野僧家雲深不礙鐘聲出日轉還移塔影斜廊下蝸粘沿砌蘚佛前蜂戀插瓶花竹牀紙帳清如水一枕松風聽煮茶江頭春日春暖旗亭煮酒香醉醒始悟是他鄉駕言行邁路千里豈不懷歸天一方春事漸消鶯語老離愁偏勝柳絲長無聊莫向城南宿淡月梨花正斷腸初夏一葉熏風帶暑回雨天濃翠與庭槐不隨春去鶯猶在好競時粧榴又開剪尺旋裁新白苧杯盤聊薦舊青梅篋中敝扇投間久依舊團團入手來幽棲鶴護松扉久不開蒲團端坐思悠哉故交只向夢中見間事不經心上來雙屐躡雲春採藥一笻挂月夜觀梅東風似見山童懶自與幽人掃徑苔讀劉元城言行録一掃權姦九十章七州不憚歷炎荒黃粱富貴百年短青史是非千載長丞相雖存心已死先生既葬骨猶香向令鐡漢常留在天下何緣有靖康秋夜次葉一山韻自笑秋來似轉蓬偶然飛落過山中一燈幽館菊花雨孤枕小樓梧葉風涉世悠悠旋磨蟻懷人杳杳寄書鴻浮生何預光隂事抵死相催作老翁杜鵑花得紅字愁鎖巴雲往事空只將遺恨寄芳叢歸心千古終難白啼血萬山都是紅枝帶翠煙深夜月魂飛錦水舊東風至今染出懷鄉恨長挂行人望眼中客中遇鄉友季芳遠歸省親河梁邂逅話襟期獵獵西風透夾衣酒臉未隨紅葉醉鄉心先逐白雲飛客中送客難為别山上安山胡不歸借使家書君可寄此間無處問庭幃山人家片雲隔斷嶂西風三兩山花屋角紅幾畝桑麻春社後數家雞犬夕陽中拾薪澗底青裙婦倚杖簷間白髮翁我亦願來同隱者種桃早晚趂東風朱溪澗路轉峰回又一村天寒大半掩柴門雲融山脊嵐生翠水嚼沙洲樹出根任擁重裘風亦冷未投荒店月先昏今宵只傍梅花宿贏得清芬入夢魂間中敢咎章縫解誤人甘於間處著間身腹中書在溫仍熟夢裏詩成記不真引鶴徐行三徑曉約梅同醉一壺春今朝有喜誰知得新換銜頭號散民春曉山行風掃連隂作快晴瘦笻伴我出山扄路從初日紅邊過人在野花香裏行古水殊無趨世態幽禽懶作弄春聲棕鞋踏遍山南北只與白雲相送迎梅仙山梅福鍊丹地西都不知夀安用獨長年縱有丹爐在難吹漢火然螢火微蹤一腐草霜重不禁秋想悟浮生短常為秉燭遊吉水夜泊入夜始維舟黃蘆古渡頭眠鷗知讓客飛過蓼花洲草草枯根不死春到又敷榮獨有愁根在非春亦自生水墨海棠不將翆袖捲紗紅怪得陳玄奪化工想是太真春睡足夢魂正在黑甜中遊春嘲年少錦袍朱帶玊花驄著意追歡紫陌東只道春風屬楊柳不知楊柳有秋風山間早春小桃枝上認年華隨分紅開一兩花將謂春風只城市也吹春色到山家三月晦日九十風光能有幾東風遽作遠行人樽前莫惜今朝醉明日鶯聲不是春吳龍翰字君式歙人與方嶽同時同里牛首山觀揚子江巨靈擘破此山石鞭起九龍入空碧山分為兩合不成夾住長江數千尺九道驚湍相擊撞雷聲怒發誰敢當金牛怪獸不可數往往殺氣侵肌涼嗚呼蜀道古來難燒棧能斷人往還一夫可敵百夫勇天險惟有秦函關固知長江當城壁立此界限分南北東南佳氣無窮年此江未必成桑田君不見逆亮百萬鼓腥風海鰍出鬬天掃空書生不能長鎗與大劔只坐帷幄收竒功題國直先伯祖海潮賦後銀山突兀滄海頭夜半鼓噪萬貔貅爭雄角力轉坤軸旋磨塵世偕浮漚朝朝暮暮自消長誰言於此隨海鰍鴟革裹尸已塵土未必怨怒卒不休看公立論屈前輩筆端有力挽萬牛孤峰絶岸氣象古亦復燦燦珊瑚鈎分明掘見隂陽根判斷造化之深幽玄機發泄天帝嗔此文政恐雷電收不然亦似畫鳥迹長夜鬼哭聲啾啾公自騎􅚪去不返滿江明月蘆花秋西湖曲十里風光煙水白嵯峨帝城紫霧隔笛聲吹斷蒲葉風鷺飛界破青山色湖波鱗鱗織成縠翆蓋紅幢機上蔟長安富兒美少年馬蹄踏踏香塵撲畫舫誰家窈窕娘半額鵝黃時樣粧玊手折花嬌無力花枝半折銀絲長隔花躊躇意相屬稍稍談笑聞餘香頽陽西落漢水遠無計問覓雙瓊璫巫山高哉但入夢安得插翮飛其傍君不見吳姬采蓮自唱曲君王尚在舟中宿白紵詞吳宫煙水碧迢迢如鱗金屋凌琅霄北方佳人顔如花素衣濯濯明朝霞雲母屏風真珠箔香銷金鴨春寒薄璧月流光羅綺筵白紵舞殘西月落君看月落夜潮平吳江濶兮越江深吳王醉去越王醒嘉禾沈園景物何其異虛巖人力成清池沈鳥影高樹落蟬聲花日樓臺麗香風簾幕輕客來堪一借莫吝百杯傾感興閉門逃俗客攜酒過禪關竈古茶煙斷碑殘雨蘚瘢秋僧行影瘦夜鶴病翎寒片月隨人到孤琴對佛彈詩境流水環詩境未容塵土侵步迂莎徑曲坐占草堂深秋句蛩分和山杯鳥勸斟好懷無客共相對一瑶琴謾題放曠疏林下清風吹鬢毛傍梅讀周易對酒歌離騷詩思秋雲淡古懷明月高五湖天地别煙水緑平篙夏日書事園林數間屋長掩竹笆籬亭桞拂棋局瓶花落硯池蝶狂如被酒蟬咽似吟詩脫帽挂嵒石涼颸入鬢絲吳越歸秋晚湖海歸來晚園荒菊幾叢秋山吟骨瘦霜葉醉顔紅弔影寒溪上懷人落月中青燈滋味永不用哭途窮春晚郊行芒鞋竹杖出柴關簡點園林腳不間翆幄初張花作局錦繃成列筍為班煙波鷗鷺春風外桑柘牛羊夕照間野興不須邀客共芳樽濁酒對黃山贈劉後村騎却青鸞上禁林巖巖聲價重南金花磚日轉瓊箋暖蓮燭星歸玊漏沉翰墨挈來三昧手絲綸畫出九重心春風已築沙堤路天上虛皇屬意深樂府妾心江岸石千古無變更郎心江上水倏忽風波生殘月小樓西鵑啼思欲迷妾夫在天南何不那邊啼春晚留淮上淮山歷歷春雲淡淮水湯湯夜月輝此處杜鵑啼不到江南行客未成歸久客買舟西還萬里煙波興渺然愁心繫住灞橋邊歸裝詩少不成載自折梅花湊滿船水邊早梅數花黯淡帶寒煙漏泄春光矮屋邊會被清池寫疏影一枝分作兩枝妍宋伯仁字器之湖州人南宋淳祐間為淮南鹺官詩多清婉可誦然觀其所稱執政諸作邪正不分一以贊頌為事其所趨尚如是則發諸心聲者亦可概見矣歲旦居間無賀客早起但如常桃板隨人換梅花隔歲香春風回笑語雲氣卜豐穰柏酒何勞勸心康夀自長久雨暗數春來雨曾無兩日晴樹連山莫辨橋與水俱平閉户惟應懶逢人且問耕海棠花落盡憔悴幾流鶯雪後暖地難為雪春天易得晴落梅狂客意啼鳥故園聲愁樂從他事湖山寄此生願將身與世一葉等相輕悶甚酴醿開已殘窗户尚輕寒往事多因拙清尊強自寬對妻憐病久顧影得心酸更展淵明集從頭一再看妙智庵結屋古山巔源流未有年便非真隱者且喜得安禪石洞雲同卧茶鐺客到煎我來當小憩詩滿夕陽天蘇州有感秋意滿姑蘇扁舟憶五湖鈴聲邉報急帆影客心孤野港青如染遙山淡欲無千年遺迹在過眼只斯須雨中終日翻盆雨池亭晚更涼對琴思古意釃酒惜韶光緑漲便鷗懶殘花笑蝶忙高田皆可插好與報君王春半春到已多時遊人替衲衣柳眠鶯喚醒花瘦雨添肥官事癡能了人情久易非一貧能自守贏得掩柴扉漁父吟小舟如雁鶩穩穩下波心蓑笠幾風雨江山無古今清歌鳴短棹紅葉滿疏林一醉不知世前村月未沉值雨吳陵兩月雨留連來問瓊花落砌邉市酒未銷狂客恨塞鴻先作嫩寒天只憂松下無三徑不管囊中欠一錢揚子江頭風正急未知何日買歸船題象山縣棲霞觀應真亭簡住持張羽士杜鵑聲裏立東風山色應憐鬢已蓬二麥曉寒新雨後一年春事落花中醉斟浮蟻邀仙客笑揖飛鷗問釣翁簷外萬竿君子竹虛心能得幾人同村莊即事青旗獵獵又村莊仙景還他是故鄉叟有七旬頭未白山無重數葉初黃稻畦明月家家酒茆屋清歌處處霜晚菊一籬秋欲老客懷牢落愧重陽登海陵城淮楚年年一畨秋西風慣識古譙樓金湯城壁休清野玊帳英雄未白頭霜草萬家人泠落凍雲千疉雁綢繆中原無計堪修整且對屯兵説近愁出陸吳陵咫尺是維揚徒步方知去路長漁屋試霜蘆葉老酒家留坐豆花香秋光淺淡人同瘦雁影參差客共忙僕子莫嗟行李重擔頭強半舊詩囊邉頭老馬解下韁繩便欲眠絶無筋力可勝鞭霜蹄遍識淮南地夜草猶吞塞北煙怕逐綵旗排偃月寧思金鐙趂朝天華山自有安身處試問將軍更幾年夜過烏鎮望極糢糊古樹林彎彎溪港似難尋荻蘆花重霜初下桑柘隂移月未沉恨别情懷雖戀酒送衣時節怕聞砧夜行船上山歌意説盡還家一片心簡張寄翁秀才徽外琴聲局外棋此心能得幾人知縱橫謾説三千字陶寫須吟百一詩秋到蓼花蟬噪後雨敲荷葉釣歸時西湖儘著張公子定把吟篷逐月移賀鶴林吳尚書赴召隆興鸞翔芝簡下溪堂醉夢驚回午正涼寵報帝俞催宰相宜將州紱召文昌蘋花襟袖宫花近詩草簾櫳諌草香大化一新多吉士卷阿歷歷告成王寓西馬塍十畝荒林屋數間門通小艇水灣灣人行遠路多嫌僻我得安居却稱間樽酒相忘霜後菊一時難盡雨中山何年脫下浮名事只與田翁賸往還呈留耕先生王侍郎夜雨篝燈夢未間十年殊愧屋頭山喜聞鐺腳濤聲起不憚吟髭雪樣斑漁釣醉歌人所願功名心事國相關辟書笑倒梅邉鶴盡在先生指顧間兀坐對坐清清一穗香悄無人語日偏長硯盤數點梅花片暗引遊蜂度粉牆湖上一泓寒玊浸青山粧點樓臺夕照間歌管滿船春未去惜無人伴白鷗間紙鳶弄假如真舞碧空吹噓全在一絲風惟慚尺五天將近猶在兒童掌握中王柏字會之金華人其祖師愈先受業於龜山復從考亭南軒諸公遊淵源有素柏少慕諸葛亮自號長嘯年踰三十始知家學之原更以魯齋聞同邑何基從黃幹得朱熹之傳即往從之授以立志居敬之旨其學日粹於是當路聘為麗澤上蔡兩書院師鄉之耆德皆執弟子禮其卒整衣冠端坐弗少亂也國子祭酒楊文仲請於朝諡曰文獻和葉聖豫小桃源韻二仙何如人夫豈古隱士道成遡泬寥佯卧不再起鸞鶴舞松聲蕭騷快心耳金竈清塵生餘丹不輕委我來桃源遊直窮路所止飛蘿搖春煙素雪噴清泚何時架草堂深入此山裏翛然逃世慮鍊魄繼遐軌送希夷之江西小雨斂輕塵秋聲滿亭驛驅車過南浦别懷徒襞積世道斯陵夷為善不自力一朝魯兩生為人作行色誰知離索悲有甚萬鍾失和寬居見懷北望戲馬臺荆榛滿中路英氣一何多懷古渺難􅑴山河腥日月虎豹沐雨露纍纍楚猴冠異哉天所賦豈無濟川才淹留秋不暮清風從何來灑灑定吾故贈我金琅玕鑿落雙魚素秋熱西風不力征老火未甘退蟬聲亂耳繁癡蚊健始最一雨從天來不復有故態天序自分明人心其少耐題定武蘭亭副本玊華末命昭陵土蘭亭神迹埋千古率更拓本入堅珉闕帝歸裝投定武薛家翻刻愚貴遊舊石宣和龕御府邉塵橫空飛渡河中原荆棘鳴鼙鼓維揚蒼茫駕南轅百年文物不堪補紛紛好事競新模傾欹醜俗亡遺矩如今薛本亦罕見髣佛典刑猶媚嫵清歡盛會何足傳右軍他帖以千數託言此筆不可再慨然陳迹興懷古今昔相視無已時手掩塵編對秋雨舟中和聖豫二首桐江波漸滑霽色午方開香火嚴蘭若煙霞老釣臺崖高微徑險水轉萬山回欲訪先生裔相從買一杯江濶風帆急潮回沙露痕寒林無剩葉茅舍各成村雁落煙波渺鴉歸野色昏未知孤客棹今夜泊誰門野興文字飢難煮為農策最良興來鋤曉月倦後卧斜陽秋稼連千頃春花醉幾場任他名利客車馬逐康莊蘭早受樵人貢春蘭訪舊盟謝庭誇瑞物楚澤擷芳名蒼玊裁圭影紫檀含露英奚奴培護巧苔蘚日菁菁催雨人世如居甑驕陽不可鉏未聞芻作狗安得夢維魚賦斂民生稿干戈國計虛安危關一飽雨意莫躊躇鄭起原名震字叔起號菊山閩連江人屢舉不第晚為安定和靖書院堂長曾伏闕論史嵩之及鄭清之再相起復登門大罵被縶下獄鄭罷相始免詩有清雋集再登南樓客中重上倚層臺天濶雲收八面開鴈帶嶽陽秋曉過浪涵巴峽影西來諸營種柳今何在老子登樓得幾回自是江山雄壯處興亡不必問寒灰爛柯山春風萬古洞門開塵世興亡定幾回碁局至今無處覓樵人于此遇仙來飛梁橫跨丹虹影絶頂平鋪白玊堆天下紛紛無好著斜陽下嶺共徘徊宋元詩會卷五十
