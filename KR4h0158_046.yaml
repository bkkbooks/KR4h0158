body:
  text: 宋元詩會卷四十六兵部主事陳焯編楊簡字敬仲慈溪人乾道五年進士授富陽主簿會陸九淵過富陽問答有所契遂定師弟子之禮為紹興府司理忤其帥引去用薦差浙西撫幹改知嵊縣丁艱服除知樂平縣召為國博以疏救趙汝愚被斥嘉泰四年賜緋衣用朝散郎權發遣全州寧宗立授祕書郎遷著作以旱蝗陳言不用求外補知溫州民愛之如父母咸畫像以祀遷駕部郎歷國吏院編修移疾請去連主宫觀理宗即位加中大夫致仕卒生平著作甚富咸淳間門人即其所居作慈湖書院云撫琴行蕭蕭指下生秋風淅淅幽響颼寒空月明夜氣清人骨何處仙臂搖丁東野鶴驚起舞流水咽復鳴一歎三唱意未已悠悠話出太古情龍吟虎嘯遞神怪千山萬壑風雨晦海濤振蕩林木響亂撒金盤氷雹碎和風回春陽縹眇孤鸞翔三江五湖煙水濶波聲飋飋鳴漁榔悲猿臨澗欲渡不敢渡但聞澗下蕭瑟松風長間雲泄碧落勢去還回薄神仙恍惚無定所微吟似欲止所作馭風一笑歸蓬瀛猶有餘音繞寥廓鳯遊山潮泉妙藏天地祕神斧為誰開水性原流下山靈強勒回戴昺字景明號東野石屏之從孫嘉定乙邜進士官贑州法曹參軍有東野農歌集莫悲秋傷春非貞女悲秋非烈士時運自循環我心如止水剝固復之機榮乃悴之始未識天地妙胡為浪悲喜鷃蓬或數仞鵬海或萬里大小何必齊蒙莊未窮理侍屏翁遊屏山分得水字攜琴入空山修竹翠相倚一曲千古心泠泠寄流水拂雲卧白石冥搜契玄理有時采薪人歌聲隔林起秋日過屏山菴淒切抱葉蟬間關栖樹禽入山本避喧復愛聆此音微颸動夕爽薄雲散秋陰衆籟閴以靜片月生東林逐瘧鬼咄哉瘧鬼何冥愚沈魄猶滯江流居孰云胄出高陽氏而乃不肖如此歟為妖常闖秋令動作威又竊炎官餘今年恣雎逞暴瘧十戶九室聞嗟吁人生一歲一寒暑自有大瘧纒其軀翻手為涼覆手暖笑爾禍福才須臾癡兒騃女或汝怖那能嚇我烈丈夫汝不記少陵詩句有神語子璋髑髏血模糊昌黎譴逐更多術灌毒炷艾揮靈符今來古往共憎疾奈何長惡終不渝胡不學鮫人細織氷綃製雲裾胡不從湘君緩移桂棹搴芙蕖乃甘卑泄賈衆怨厭禳唾罵無時無爾來經旬瞰吾室再三謝遣猶踟蹰吾詩吾酒既不廢汝窮汝技將何如大江秋色正瀟灑明月皎皎風疏疏便須悟悔速歸去嘯儔呼侣相嬉娛夜闌吟徹欲就睡燈花照眼團如珠夢回病思砉然散颯颯風籟生庭梧納涼即事炎蒸欣傍晚掃地坐寬涼入竹風逾冷生荷水亦香蟻行緣食几螢照落書牀聽得農人語今年稻穗長偕兄侍屏翁探梅分得空字踏破登山屐來尋傍水叢眼明千樹底春在數花中格瘦詩難寫香寒酒易空狂歌歸秉燭驚怪走兒童安居安居元自好春晝更遲遲雪涌煎茶鼎雲生浴硯池栽荷填廢沼移竹補疏籬猶有間光景欹眠續舊詩自武林還家由剡中一笻雙不借役役又東還野渡淺深水夕陽高下山光陰虛我老造物靳人間高躅思吾祖鳴琴獨閉關春晚即事春郊農務急野岸水䀶高蒲渚鳴姑惡桑林囀伯勞整欄扶芍藥搴網護櫻桃不改窮居樂何妨見二毛次韻屏翁初夏會芳小集一觴還一咏竟日醉難成坐石驚雲濕臨池愛水平密林宜午蔭啼鳥尚春聲更有櫻桃約明朝且願晴秋晚西風澄曉氣凝觀愜幽情草潤蛩聲滑松涼鶴夢清吟懷依水靜病思得秋輕忽憶登高近循籬看菊英夏曼卿作新樓扁曰瀟湘片景來求拙畫且索亭詩有此一樓足悠然萬慮忘拓開風月地壓斷水雲鄉四野留春色千峰明夕陽眼前無限景何處認瀟湘十日取野菊從酒野徑菊仍好村壚酒亦嘉未應今日蕊便是背時花心在家千里身猶客九華官程難久駐風雨暮山斜從板橋買舟上青陽缷馬板橋西扁舟逆上溪水鎪巖骨斷煙截樹頭齊野鴨驚人起村雞上樹啼老農頭雪白猶自把鉏犁書初考得考雖多幸無功袛自嫌但求官速滿不道老同添卑拙翔蓬鷃艱辛上竹鮎黃花寒更好三嗅憶陶潛謝趙山臺見訪寂寞海東頭殷勤貴客舟如何經歲約袛作數宵留清玩分行篋高吟壓小樓更須謀作會同醉菊花秋僻居地僻塵先遠身間味覺深清池涵竹色老樹帶藤陰引鶴隨安步招蟬伴醉吟有時然古鼎隱几自觀心屏翁領諸孫小集野亭即席次韻結屋新亭好登臨野興長心融八窗白塵隔九衢黃泛菊金英碎嘗粳玉顆香更期梅著蕊來賞小春光山家小憩即景效藥名體柴門通草徑茅屋桂枝間修竹連翹木高松續斷山仰空青蔭密掃石緑花斑傍澗牽牛飲白頭翁自間永嘉薛君自號雲屋來池陽以詩見貽用韻答之清晨聞剝啄喜得薛能詩風月一囊錦江湖兩鬢絲寒城吹角夜孤館擁衾時誰會吟心苦梅花是舊知立春前五日得雪雪作春前瑞銀城擁萬家太婆頭欲白九子頂先華壓麥嘉培本封梅惜損花家童解人意燒鼎問烹茶太婆九子俱山名幽棲幽棲頗喜隔囂喧無客柴門盡日關汲水灌花私雨露臨池疊石幻溪山四時有景常能好一世無人放得間清坐小亭觀衆妙數聲黃鳥緑陰間此生此生畢竟已蹉跎有酒何妨醉且歌人世盡緣愁得老春花偏被雨相魔草欺蘭瘦能香否杏笑梅殘奈俗何誰上東樓看霽景海山無數列青螺春事春事關心常起早愛看景物試憑欄戲魚池面微添緑啼鳥枝頭尚帶寒斬棘重樊新插桞㪺泉頻灌自栽蘭年來賸有園林興每恨廬邊地不寬自况多資徒作守錢奴伏臘無憂便有餘世路本夷休自險人情太密反成疏非圖報施方為善豈為功名始讀書門外良田堪種秫自牽黃犢試犁鉏次君玉弟聞新鴈霜風颯颯荻花洲避北趨南巧自謀倦翮飛殘千里月寒聲催老一天秋乍教騷客驚詩夢莫為征夫寄别愁汝度塞垣應未久新來煙燧已沈不次韻東渠兄觀梅詩眼非梅不可遮三葩五蕊便堪嘉瘦如飯顆逢工部老似磻溪卧子牙水影月香參衆妙弟酬兄倡自成家快篘新醖同清賞莫待枝頭爛熳花七夕感興家家歡笑迓星期我輩相邀只酒巵矯俗何須標牘鼻甘愚不解候蛛絲新秋光彩月來處半夜清涼風起時一曲玉簫塵外意此音除是鶴仙知抵池陽未入關泊于齊山數日因窮巖壑之勝瘦䇿相扶上翠微眼驚竒怪足忘疲三十六洞猶昔者四百餘年無牧之漲水渺瀰春雨後遠山重疊夕陽時幾多江北江南恨問著沙鷗總不知賞茶自汲香泉帶落花漫燒石鼎試新茶緑隂天氣間庭院卧聽黃蜂報晚衙夜過鑑湖推篷四望水連空一片蒲帆正飽風山際白雲雲際月子規聲在白雲中嚴子陵赤伏君王訪舊遊富春男子只羊裘一竿本為逃名去何意虛名上釣鈎里中小漁舟被差防江有感而賦著身平地更多憂一棹思為泛宅謀昨夜西風邊報急防江也要釣魚舟劉宰字平國金壇人既冠入鄉校卓然不茍於去就舉紹熙元年進士調江陵尉遷真州司法時有偽學之禁不讀周程等書者方許與考試宰不奉詔授泰興令決獄多竒中會韓托胄謀用兵宰為浙東倉司幹官職事修舉急引去無復仕進意自是屢召不起端平初朝廷奬用老成一時譽望收召略盡所不能致者宰與崔與之耳尋卒鄉人為之罷市東陽道旁涵碧亭四山委蒼翠一沼湛清漣雲飛松竹礙石墮藤蘿牽泉音亂絲竹鳥語賡笑言斯亭作者誰俯仰四百年簷宇有興廢篇章足流傳官道紛往來此地曠周旋乃知造物意以遺靜者便我來旱暵餘龜兆坼平田攀崖遡源委石竇鳴涓涓摩娑兩石魚變化定何年漫塘觀雪分韻得遠字入臘甫自兹得雪殊不晚凝寒祛厲氣積潤滋麥本清興浩無極步屧忘足蹇扣門呼石交頸縮語猶謇挾攜事登眺南去還北反所向遊目礙僒若虎就圈歸來漫塘上四望與天遠蓑重漁舟歸煙橫樵舍飯稜層敞瑶池燦爛開瓊苑玉龍擁寒城銀海迷疊巘頗喜漫翁貧覽富逾北阮呼兒具杯酌採掇翻蔬畹不辭多酌我自愧飲河鼹少焉斂夕氛桂魄爭婉娩翻思造化工舒卷意難忖崇禧夜坐淮浙千萬山茲山鍾秀異山中四時好雪景更佳耳危樓俯八荒豈無超詣士春遊眩紅紫秋賞挹蒼翠衝寒繚氷崖問訊世能幾山神出竒觀似慰遠來意漫空飛六花匝地掩蕪穢頗疑羣玉府飄墜人間世又疑姑射仙與物洗疵癘意行輒有得曠望了無際更欲呼雲車御風駕六氣舉酒酹初平逍遙聊卒歲夜夢續句乙丑四月四夜夢中得句云昏旦視生死又云不種桃與李覺坐而思豈吾壽不延歟因就枕上足而成詩大化賦羣有修短亦天只彭殤誰得失鵬鷃均適已我今識其然昏旦視生死青青竹籬下不種桃與李老薺怙春柔叢蒿麗芳旨耘鋤藉人力四時自終始屬饜幸朝夕過計胡為爾勿笑趙孟偷甚矣吾衰矣送李秀巖歸蜀平生秀巖翁嘉遁輕朝衣聖朝重特招趣駕不容違我豈匏瓜哉先聖固所希長江一萬里舟行疾如飛東南盛人物十九飫甘肥頗藉子公力寧知伯玉非翁豈好異同曰余起布韋忍比淮之水東下雜於淝論奏了不阿正直鬼神依讒言嗟止棘曰歸詠采薇歲晏江濤平雨雪從霏微懸知到家日花竹繞山扉吳門道歸書懷投間三十年日與木石俱暮景際休明搜羅逮樵漁洪造賜甄收羣公交薦書殷勤奉明詔婉戀辭田廬一寒不自揣五窮暗揶揄行行步京畿迎勞多軒車眼青見故人皆歎此老臞形容不自惜奈此氣昏愚席間迷舊識筆底誤新書十目所共睹一語良非虛儻昧知止戒不反田園居去去入修門蹇步接天衢深虞眩聞見狂易滋發舒籲天寫真情浩歌賦歸與贈九華程君君家九華山山翠常在目雞犬聲相聞山腰幾鄰曲本固枝葉蕃無若君之族當年紫槖翁一念盡親睦俸餘不自有買田遍溪谷計口給之食昏旦常陸續吉凶更資助當使有餘蓄只今大江南盛事君家獨君歸廣此意勝處新卜築周遭植名花中間敞家孰少長驅之學毋間親疏屬庶幾子又孫更衍無窮福亦俾作法人百世流清馥喜客泉物我未忘情無情惟止水底事山中泉客來如有喜悠然鏡面平倐爾魚眼生依焉開笑面似與客逢迎客喜泉豈知泉笑客何有邂逅深山中聊結無情友松風軒晚望遠山迓歸雲近山留夕照澄江橫淨練怒風收衆竅東南佳山水此地宅其要連甍三萬家金碧互輝耀間房列歌舞傑觀富登眺物理會有極却慮成悲嘯我家三茆峰一室倚青峭下有荆溪水水深魚可釣歸歟有成計靜坐觀衆妙功名付公等連茹祗明詔他年問無恙短䇿寄嶺嶠浩歌暢幽懷狂斐君勿誚送魏華甫侍郎謫靖州靖州風物最五溪畬田歲入人不飢淘沙得金遨以嬉瘴煙不逐嶺雲西六花瑞臘春臺熙尤便逐客過往稀理亂黜陟了不知夫子豈欲居九夷要尊主勢扶時危有言不用時我違翻然不受好爵羈向來鄉行誰可晞平生易名慕者誰蘇陳凛凛百世師畏塗萬折甘如飴陽烏當天照隱微直前一疏可忘之江頭後會端有期暗香欲動寒梅枝石翁姥采石江頭風晝息掀天雪浪平如席沿崖小泊客心寬攀蘿曾看望夫石天涯望斷人不歸露寒猶想淚沾衣爭似石翁攜石姥年年對峙夾岡道人歸人去我何心雨沐風餐人自老比翼鳥連理枝年多物化徒爾為長生殿裏知不知寄和趙章泉章泉先生虎豹章餘子駭逐狐藏少陵遊不返衡湘孤吟風月老林塘駕鵝不送置我傍悵望空勞水一方廣文别日天未霜殷勤寄音示無忘新詩寫作鴻雁行憐我病骨猶未康續貂聊復寄歸航宫墻百雉如金湯登門歲月知何當江湖極目煙波蒼送王頴叔分教山陽向來肉食昧遠謀坐談欲復千古讎良平不逐勝缺遊毛錐竟作書生羞楚山蒼蒼楚水流甲光向日金鱗稠酒闌一笑看吳鈎將軍意氣傾九州先生身短智則修百鍊可使繞指柔安邊端藉帷幄籌泮宫還獻馘與囚英聲南來動冕旒貂蟬未必生兜鍪過司徒墓司徒墓荒塜纍纍不知數草中翁仲無復存壟上牛羊自朝暮想見當時百萬松佳城在處鬱蔥蔥車馬時來卿相子鐘魚聲出梵王宫年深事遠無留迹只與耕夫資墾闢萬古同成一斛塵官爵高卑誰汝識發紹興留滯青春晚經行此日初柔條桑著眼短穗麥生鬚竹外雲埋屋花邊水繞渠箇中容我老肯遺子公書馮公嶺地隘人逾峻人勤俗不奢時培石上土更種竹間茶接畛田成篆連筒水濺花征塵如不到老我即東家長林海邊道上海霧曉逾合海風春更寒衰顔欺薄酒老膽傲驚湍叢竹人家近平沙客路寬明朝應更好山翠撲征鞍松江道中久作松江夢重來泛短篷淡雲飛急雪枯葉戰狂風煙末三家市波心一釣翁鴟夷身計耳吳越等成空偶成月下浮舟去雲邊曵杖行物華隨節換人意與秋清小圃蔬逾潤荒叢菊向榮幽尋元自好底用絆浮名天台道中花重朝扉散鳥啼春意深風光自流轉行役負登臨澗水流縈緑山雲捲夕陰病容兼白髮漂泊此時心秋晚木落山呈骨泉空水返源知時秋燕去負日午蜂喧玉粒慳晨甑金英卧晚園歲華今已暮身世兩忘言和韻呈李果州行樂非吾事朋從慰此生劇談忘夜永起立覺晨清黃獨幽人供朱絃太古聲他年盛山集不假退之評感懷寄趙章泉我屋方茅下君家閩楚交鹿門知得計燕幕未安巢澗谷泉從飲山田飯可抄應攜靈壽杖雪蕊嗅梅稍北固山望揚州懷古北固城高萬象秋煙竿一縷認揚州試乘緑漲三篙水要見朱簾十里樓淚濕宫衣朝霧重愁薰寒草夕陽浮隋堤舊事無人問兩兩垂楊繫客舟懷徐表兄一笑相逢句曲天别來十五換流年忍思清渭玫瑰詠無復通泉寶劍篇北渚春回芳樹合西山日暮碧雲連雁來數寄平安信無限離思若箇邉寄潘子善上舍陳少陽率太學生伏闕上書六賊遂退天下快之少陽猶以後書論李邦彥白時中等言不用拂衣去近傳太學伏闕書是歟非歟非山林人所得知獨怪朝廷不用其言諸君仍茍安於學豈以靖康時事視今日緩急異耶為賦一詩質之同志少陽一疏折羣姦拂袖歸來日月間誤國小人猶法從叩閽諸子自賢關是非頗亦通千古義利那能立兩間若向西湖浮畫舫好傾巵酒酹孤山裘萬頃字元量新建人淳熙進士嘉定癸酉除吏部架閣明年遷大理司直疏力丐外敕差江西撫幹以便祿養卒于家有竹溪集行役宿霧鎖山椒落月挂林側﨑嶇歷岡巒髣佛辨阡陌秋高風露寒道遠時序迫安得歸故園篝燈理書册羅溪橋我來從西昌日日困塵土誰知羅溪橋淨若初過雨長松列左右清風奏宫羽薄暮舍籃輿扁舟渡溪去病中聞伯量相訪寄之二首我屋修竹根身間境逾靜維摩本無心誰令示人病夕陽耿疏林影落莓苔徑佇立有所懷高人倘乘興高人在城郭應酬頗紛如憶我煙霞栖遺我一紙書雨餘窗戶涼蛩聲滿階除相過有成言何時命巾車次韻伯仁善利閣小室山林吾所廬夜月但對影焉知江上人一目了萬境褰裳步崇臺有室妍且靜徘徊不能去坐見四山瞑見雪玄冥當語誰餉我一簷雪吾廬本來靜得此更清絶遙憐北海上往往已盈尺齧氊人在否毋陵子卿節出門出門復入門吾行竟安之攜書北窗下翻閲聊自怡有懷千載人掩卷還歔欷采采首陽薇戀戀商山芝一裘或終身欣然釣江湄斯人不可作斯道日湮微目前稻粱謀鳬鴈方齊飛青田寂無音歲晚將疇依慎勿出門去塵埃染人衣菖蒲康廬入吾懷十載馳夢魂踵門者何人遺余以芳蓀歡然得其趣如對五老言幽姿出巖谷常帶氷雪䀶塵容為一洗兩目不復昏忽思三峽流褰衣涉潺湲因仍一寸石浸潤九節根人言可扶老歲易須其蕃兹理諒不誣吾將從綺園從人覓墨梅熏爐束詩魂茗碗驅睡思掩關寂無營翰墨自娛戲山寒溪正清月淡雪初霽橫斜兩三枝見説可人意天機如胸中出手特餘事何時剪氷紈來對病居士題余仲祥松齋芳妍桃李場紛趨歘成蹊長松坐偃蹇遂爾不見知平生異時人不與俗轉移蕭然塵埃中擅此丘壑竒窗空境逾清四壁風來吹抱琴揖蒼髯喜氣掀兩眉臭味既與同相親不相違直期閲歲寒可但忘朝飢夜坐薦福寺同玉成鞭鸞未暇相追逐且向祗園止君宿清談待得月華生窗戶明明耿殘燭誰令泉石墮吾前洗盡人間絲與竹風帆明發君不留此樂只應吾所獨厭原山中曉行碧雞夜半聲啁哳喚起幽人步林樾秋高風露著羣木無數寒花泣明月松篁一徑宛如畫石溜涓涓更清絶山巔便好結茅廬莫待他年鬢成雪贈拂雲主人十年作計須種木一日不可使無竹道人於此得三昧緑霧中間著蒼玉拂雲誰為名其居我亦心同雲捲舒相期直覓飛霞佩不用重拈種樹書雨夜秋事雨已畢秋容晴為妍新香浮䆉稏餘潤溢潺湲機杼蛩聲裏犁鋤鷺影邊吾生一何幸田里又豐年用鄭浮梁韻簡圜師杖屨山蹊窄鐘魚佛界深寒梅殘屋角春薺老墻隂一水元無恙扁舟尚可尋煩師掬清溜為我洗塵心酬胡伯仁山長飛鳥急江濶去帆微唱晚幾漁笛憑高一釣磯從君濯氷雪滿袖得珠璣三嘆不能已歸來吟夕暉送胡仲立入京昔對延英日諸公嘆弗如敢言天下事不負案頭書此去朝雙闕懸知有異除榮途方著腳未用曵長裾贈施真人素鞸方多難丹砂倘一逢勿疑蕉覆鹿會見竹成龍澗水遠仍潔巖花幽更濃行行望仙宇知在最高峯留淺沙故山豈不好蕭寺亦堪居作意多成礙無心始自知鐘魚飽香積枕簟熟華胥但惜詩成後傍無阿買書晚步日落欲閉戶風清聊杖藜千山猶帶雨一徑已無泥㶁㶁水聲急悠悠雲影低催歸緣底事著意傍人啼書朝文元道院集華屋金狨座雕鞍駟馬車才堪誇世俗早已落丘墟此病久沈痼無人解掃除千年子朝子道院有遺書偶成松徑煩風掃柴門為雨扄行攜道院集坐對敬齋銘好事心常記間談耳不聽觀空為世誤無異醉初醒老屋老屋久欹側隨宜聊拄撑吾今且共住緣盡會須行雨打從教壞風搖不用驚世間虛幻相聚散本無情寄題喻高士淡軒世事邯鄲枕生涯老子書能知淡中味雅稱竹間居石徑排雲入霜根帶月鋤紛華不到眼贏得玩清虛題洪內翰爽榭霧閣雲窗天外安懸知幽趣勝人間簾櫳夜月浮銀海桃李春風醉玉山自笑紅塵無暇日浪憑清夢覓商顔何如飛佩隨君後細看匡廬紫翠鬟夜坐爐火篝燈孰與同此心吾欲付冥鴻茅簷已作涉旬雨蕙帳不禁連夜風一假清愁詩句裏十分寒事酒杯中溪雲未用安排雪且聽梅花試小紅玉山道中時赴掌故之命麥苖堆緑菜花黃一簇人家古道旁酒熟不妨邀里巷年豐贏得事農桑世情只説宦遊好客裏那知歸興長我有平生蓑笠在釣絲何日理斜陽端午上饒道中一春留滯在京華午日依前未到家細葛香羅素無望黃塵烏帽亦堪嗟爭舟野渡人如簇立馬郵亭日欲斜遙想塤篪獻親壽綵衣羅拜酌流霞睡起書懷時諸公相勉再出北窗終日廢書眠一枕清風值萬錢雲度茆簷輕苒苒泉生石砌淨涓涓不嫌雨腳花間注要聽秋聲屋外傳三徑初成吾欲老幕中何用泛紅蓮喜范光伯相過章江東下幾灣洄誰伴臞仙夜探梅離别不禁詩社泠遭逢莫放酒船回氷霜滿眼歲將換花栁轉頭春又來安得飛騰九霄外鞭鸞笞鳯日相陪柬黃子益二首青衫日日困塵沙安用浮名與世誇已過半生真似夢未荒三徑且還家恨無沈水紆香穗喜有寒泉瀹茗花袖却西歸遮日手園林幽處看桑麻睡起欣然思慮少病餘猶覺應酬艱招搖風月聊須竹收拾雲煙幸有山但要世緣隨手斷莫憂詩債幾時還追奔富貴非吾事且占林泉一味間題懷秀堂莫教滿地長莓苔杖屨從今日日來曲徑要隨松巷轉柴門須對石橋開墻頭花木因時種案上圖書任意堆幸有林泉可投老忍將雙腳踏塵埃大雪次前韻誰知天巧出玄機但怪飛璚過眼竒暝立風枝寒雀倦愁吟氷谷曉猿飢蘆花洲渚月明夜桞絮池塘春暮時此景人間不長有寫真傳影正須詩次洪內相梅亭人間多是梅開後旋種東籬事故常那得紅簾捲朱戶細看素質傲清霜一生寄興雲山外幾度搔頭江路傍咫尺名園身未到夜窗羞對返魂香入京道中風雨因賦以遂退休新築書堂壁未乾馬蹄催我上長安兒時只道為官好老去方知行路難千里關山千里念一畨風雨一畨寒何如靜坐茅齋下翠竹蒼梧仔細看間居間居最與性相便勤即翻書懶即眠終日閉門真省事有時面壁似耽禪大椿歲籥祈親壽斷簡生涯聽子傳待問洪崖覓丹訣白雲深處引寒泉用韻謝伯量過訪山中勝遊千里笑談中雪片梅花正仲冬肯向席門尋孺子更能草具重茅容春風頓覺生寒谷夜榻惟愁聽曉鐘半世梅坡門下客及今何幸得過從次王成之韻咏梅誰遣氷魂照夕陽搖搖一任北風涼眼前共有幾多蕊鼻觀胡為如此香佳實會須歸列鼎孤標已自壓羣芳濡毫我欲從君賦未害平生鐵石腸送張高安入京青衫十載蟾宫客墨綬三年鳯嶺頭循吏聲名武陽令故家風味富平侯江邊休歎雙鳬去天上行看一網收入簉鵷班立仙仗莫忘回首顧沙鷗題小桃源半月池邊倚瘦藤望仙臺上岸烏巾塵埃一點不到地花木四時長是春載酒豈無好事者爛柯應有著棋人請君更種桃千樹準擬漁郎來問津保福寺對橙菊有感平生愛菊陶彭澤清夜移橙杜草堂千載詩魂招不得獨留風味在僧房次韻松風閣四首飛花數點雨初歇啼鳥一聲春正長讀罷黃庭了無事旋安銀葉試爐香不見詩仙何遜來春風幾度早梅開竹籬茅舍自清絶未用移根東閣栽簷間新燕幾時來簷外間花往歲栽丹杏碧桃渾落盡緑陰底處結青梅無所用心魚在沼居然生子燕成窠誰言春去花事歇萱草石榴情更多九日籬落黃花尚自無白衣况未到吾廬莫令此日負佳節為展淵明采菊圖崔與之字正子廣州人少卓犖有竒節不遠數千里遊太學紹熙四年舉進士授潯州司法參軍調淮西檢法官知建昌新城通判雍州擢廣西提刑風采赫然召為金部員外郎安撫淮東屢上書宰相爭納李全必有後憂在淮守戰兼修敵入無功和議遂寢以祕書少監召力辭不赴尋用煥章閣待制安撫成都開誠布公戎帥協和軍政以立召拜為禮部尚書辭理宗即位屢召俱辭最後授廣東經略兼知廣州叛兵俯伏聽命上於是注想彌切進參知政事力辭乃訪以時政與之條奏懇至上覽嘉歎趣召愈殷控辭至十有三疏始得致仕以觀文殿大學士提舉洞霄宫年八十二薨諡清獻送夔門丁帥赴召議論方前席功名早上坡去帆瓜蔓水遺愛竹枝歌同志星辰少孤愁暮雨多倚風窮望眼碧色渺平莎送范漕赴召獨汲千尋綆推開八面窗相逢俱氣許未語已心降分鎮中邊蜀歸途內外江禁林風雨夜應念鹿門龎送時漕大卿淮西簡法二首卿月高華照楚墟澄清雅意見登車星分屯壘雲中戍風引艅艎塞下儲十二聚民行惠政三千議獄謹刑書最聲烜赫流聰纊聖詔今朝下玉除十年宦海任飄零豈料光華伴使星落魄半生頭已白爬沙一見眼長青天涯明月方依樹淮上長風忽散萍别淚誰能效兒女不堪官桞暗長亭嘉定甲戌分閫東淮時金騎南奔人不願往以君命不敢辭留五年始以少蓬召而病且衰矣艤棹南康夢人告之曰死於廬山之下覺而賦此行到廬山日日陰斜風細雨亂雲深移舟夜壑人間世荷鍤春郊物外心要把封疆安社稷誰教軒冕換山林殷勤招隱吾知矣五老朝來露玉簪姚鏞字希聲剡人戴復古愛其才為忘年友通判吉州以平寇論功擢守章貢春夜曲金魚鎖合蘭缸小酒不支愁尋睡早梨花欲墮風更寒燕子不歸春自老流蘇護帳香雲結三十六簧清吹咽緘書欲寄湘水深城烏啼落花西月題畫壁兩山灌木帶晴鴉泯泯春流漾浦沙隔岸小舟呼不應碧桃花外是誰家寓霅川王戴溪頭小隱山漁翁引上霅溪船幾回倦釣思歸去又為蘋花住一年敖陶孫字器之閩人寧宗時太學生題詩三元樓弔趙汝愚為韓托胄所捕亡命江湖托胄敗始登第佳人佩明月贈俞德章佳人佩明月笑語含春姿手握幽蘭叢照影清漢湄少年冶遊子行樂方及時折苕戲相贈玉色頩自持歸來種白璧日漚文錦絲加幣欲聘子常恐歲月遲終然不可諧翕歘聽所之願言遺薌澤遠慰千里思三元樓題壁弔趙丞相左手旋乾右轉坤如何羣小恣流言狼胡無地居周旦魚腹終天弔屈原一死固知公所欠孤忠幸有史長存九泉若遇韓忠獻休説如今有末孫按三元樓臨安酒肆也韓托胄既逐趙丞相汝愚至衡州暴卒敖聞而弔之適飲酒題詩於壁酒未盡釂其壁已舁去敖知必為托胄所廉急易傭人衣持酒具下樓已遇捕者至問敖上舍在樓否對曰方酣飲急亡命走海隅得免宋元詩會卷四十六
