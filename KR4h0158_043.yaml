body:
  text: 宋元詩會卷四十三兵部主事陳焯編羅願字端良歙州人父任吏部願以世科起家孝宗時官鄂州太守宋史于劉清之傳附載其名明宋濓序其鄂州集推古文為南宋第一人云朱文公甚服膺焉梁寺丞見示過嶺新作凌晨登鬱孤南走韶陽道封疆有申畫山川本懷抱公行度寒嶺殘雪故未掃髙情無南北反謂兹山小頃來我嘗遊亦覺山媚好前賢困逺謫我輩得幽討兩崖瞻欲眩數樹攀且繞想公哦新詩千騎轉林杪參佐候顔色約束軍聲悄韶陽古名郡四十專城早重華已千嵗蒼石在雲表魚龍舞幽壑遺韻蓋可考以兹供撫玩或可薦夀考公餘亦時飲未用絶芳醥行行布恩惠正直神所保和汪伯虞求酒君不見菊潭之水飲可仙酒旗五星空在天此江縠紋奇更絶投以麯米清如泉分甘正擬供低唱要築糟臺須大匠詩人便欲醉千日歡伯僅堪陪一餉曰豫此樂未知之獨愛為瓶居井眉因君飲興亦浩蕩夢隨驂駕觴瑶池昔賢酒盡孤長吸大似竹枯還欲瀝明朝秀句傳滿城笑指空樽臥墻壁望梅亭南安軍未至庾嶺有亭名望梅兄端翔權軍事時所作節物重陽後風煙庾嶺頭休論梅子雨才度菊花秋翠壁堪橫絶幽亭勸小留謀生兄弟拙一一傍南州次韻酬通判劉兄嶽陽樓見懷一首魚龍掀舞後渺莽記空庭地帶三苖濶山傳二女靈客懷光水月詩筆妙丹青少作揚雄悔唯思草一經送雍州吳使君題輿才赴日邊程便擁油幢鎮列城地望素髙唐五管人才今似漢三明時清市駿非無意嵗晏逢花好寄聲太學英名湖海氣此行持論要平平奉柬李叔勤覓茉莉花栽鄆令風流太史家早知茉莉有奇葩生嫌衆色空塵滓遍閲餘香見等差多謝珠璣來坐右好將根蒂到天涯蜀江紅紫紛披後初看東南第一花薛季宣字士龍永嘉人起居舍人徽言之子也幼孤從伯父弼宦遊及見渡江諸老聞靖康後南遷大略喜從老校退卒語得韓嶽兵間事甚悉年十七起從荆南帥辟書寫機宜文字獲事袁溉受伊川之學其于封建井田鄉遂司馬法之制無不研究焉用樞密使王炎薦於朝召為大理寺主簿時江湖大旱淮北民多款塞者宰相白遣季宣往收之以實邊季宣為表廢田相原隰復合肥三十六墟立二十二莊于黃州凡置戶六百八十有五事竣入對語及時弊甚切孝宗稱善恨得季宣之晚而宰相虞允文忌之出知湖州改知常州未上卒年四十有浪語集行世跋東坡詩案南方有佳木逺在漲海涯沈水産其節雞舌生其肌結根松柏場龍腦實離離蛋獠豈知貴斧斤斬欒枝椓為粳粃槽將食犬與豨條枚惡鬈曲芟除棄江湄滄流蕩回波不與朽壤期年代知幾閲愈久乃見奇根株到餘瀝復恐分寸遺終焉盛芬烈蘭蓀謝芳姿二女篇天聖中韓魏公居所生憂從其兄琚守齊安即安國寺西廡為書堂以居恆有二女子夜至衣冠髙古容裝麗甚公恬不以為怪及去二女告曰妾非人也亦非仙人鬼魅遊處再嵗而言不及亂公德士也行矣即推此澤天下豫讀齊安記屈原之死二女孝慈亦于此投江故武昌郡人以五月五日競渡投角黍迎神舟上二女非仙人鬼魅豈靈均二子之精爽耶不然何知人如此之審而後先居者莫之能見為作二女篇姈娉二美人幽間真種性色秀雪窗梅衣冠儷修正巖巖韓稚圭寂寞自清靜虛室掃齋居展禽當季孟神遊問寒暄不得窺信行怪力視茫茫久要交善敬語之非異類安民公有命蓋聞楚靈均汨羅存死證二女終孝慈雙玉澄江映當初黃鄂人蕩槳追遊泳端午化成俗龍舸長奔競事神微有道角黍勞將迎非鬼且非仙世士憑誰偵貴遊行沙堤大蓋何穹窿底人佩玉鞍蒙狨傔如熊虎馬遊龍誰何出入咸陽宫笑刀瓠體顔芙蓉步趨持重為雍容諸侯爰統掌百工調元為職禆九重萬錢一食聲鼓鐘猶言下筯終無從異時粳噉腸不充家徒壁立其室蓬抄撮語麗文雕蟲繪為繡句欺南宫原無萬卷澆胸中脂韋媕婀陳小忠竭民膏髓自為功榻前觸事惟迎逢肯思責難始為恭君王謂賢拜三公門如沸湯賄賂通財侔縣官邑侯封積金猶欲齊灊崈家有錢爐非範銅賣官鬻獄揚成風後房的皪燕支紅皆民女婦來無蹤有憂失得常忡忡殺賢賊能摧英雄汲將同類塞要衝害苖之心饒蝗螽忽彎射羿逢蒙弓怡然自得豁心胸黯如抹漆何赤衷向人自欺吒匪躬髙自標置人盲聾言立便擬稱儒宗學禪逃俗坐談空世間將謂無軻雄言出波流士與農却矜巧宦官既崇笑伊魯儒嗟道窮那知達人節青松視而土苴及蛆蟲古今異時理道同姦邪未必皆令終君不見晉朝失國隳金墉為奴為胔豈惟懷愍墮紫濛遊竹陵善權洞萬古英臺面雲泉響珮環練衣歸洞府澗水倒流入洞香雨落人間蝶舞凝山魄花開想玊顔幾如禪觀適遊魶戲澄灣寺故祝英臺宅洞有白龍今人見鰻魚四足嘗出水面都場正月思雪中石門之遊謝客窮幽處仙宫隱薜蘿二峰峩魏闕雙瀑瀉天河獚應難致猿猴却患多雪中山更好淹嵗定如何讀如廣類猿而緑獚讀黃字去聲類狗而黃惟石門山中有之􅧕花唐玊蘂花介甫謂之瑒花魯直謂之山礬武昌山中多有之其葉可供染事土人用之釀酒􅧕緑吐瑤琨泠然郭外村仙人來玊蘂文士立山礬芳澤留絲素風流付酒樽莫言瑒酷似香處不勝繁讀三國志左角蠻攻觸南柯檀伐槐俳諧記名字人物委塵埃錦里昔曾到樊川今此來遺風不可見觀古意悠哉周將軍廟觀嶽侯石像侯祠初毁道士不忍壞侯像沈荆溪中因得不損萬死何知獄吏尊成名蓋代古難存侯初下大理獄吏執筆請辭大書其紙尾而唾之曰汝觀今世烏有大臣繫獄而生者趣具成案吾為汝書二桃豈是功髙賜一舸不容身退論幾為飲江思道濟繆因圖像削王敦沈碑千古蛟川恨留與無窮斷客魂趙師秀字紫芝溫州永嘉人宋乾淳中所稱永嘉四靈之一也四靈謂翁靈舒徐靈暉靈淵趙靈秀靈非徐趙本稱因與翁靈舒居同里詩同調故世皆以靈目之也四靈中惟師秀嘗登科入仕仕亦不顯葉水心評其詩守格布詞不失唐風而變化秀逸過之觀四靈詩如出一手紫芝尤為之冠云桐柏觀山深地忽平縹眇見殊庭瀑近春風溼松多曉日青石壇遺鶴羽粉壁剝龍形道士王靈寶輕強滿百齡舟行寄翁十輕舟風色好波面去迢迢取爾詩重讀令吾病欲銷江禽停晚樹澗水入秋潮已覺懷人極分攜始一朝縉雲縣宿親知因别久具酒勞經過古邑居人少春寒入夜多雨香仙地藥燭動石橋波稍覺離家逺鄉音一半訛筠州郡庠山亭一來髙處望逺近盡秋容秀氣歸才子清風屬釣翁溪晴分别港山闕見他峯獨憶良宵月無因宿此中延禧觀寂寞古仙宫松林常有風鶴毛兼葉下井氣與雲同背日苔磚紫多年粉壁紅相傳陶縣令曾在此山中石門僧石門幽絶甚獨有一禪僧寺廢餘鐘在房髙過客登山蜂成苦蜜崖澑結空氷如此冬寒月他人住豈能秋色幽人愛秋色祇為屬吟情一片葉初落數聨詩已清瘦便藤杖細涼覺葛衣輕門外蕭蕭徑今年菊自生簡同行翁靈舒久晴灘磧衆舟楫後先行終日不相見與君如各程水禽多雪色野笛忽秋聲必有新成句溪流合讓清靈山閣見二徐舊題一面見溪水三邊皆翠微晚來虛檻外秋近白雲飛重至恰身老同吟感客非靈山自如畫依舊隔斜暉秋屏作凡有闌干處秋來遍往還就中惟此地全得見西山雁洛遙沙小人登廢壘間因憐一州景皆在夕陽間送沈莊可清事貧人占斯言恐是虛與花方作譜為米又持書時節寒相近山林拙未除西江波浪急送子一愁豫巖居僧開扉在石層盡日少人登一鳥過寒水數花搖翠藤茗煎氷下水香炷佛前燈吾亦逃名者何因似此僧壕上逺近人家住過橋路盡通野田行瘦馬淺渚聚羣鴻地靜微泉響天寒落日紅若非身作吏不道是城中月夜懷徐照月色一庭深迢遙千里心湘江連底見秋客與誰吟寒入吹城角光凝宿竹禽亦知同不寢難得夢相尋送倪道士之廬山近方辭地肺本自住天台有鶴相同出無雲作伴回道房隨處借詩板逐時開又説廬山去間看瀑布來德安道中餐餘行數步稍覺一身和蠶月人家閉春山瀑布多鶯啼聲出樹花落片隨波前路東林近慚因捧檄過贈約老一徑入深竹數楹臨古溝更無人共住極喜客來遊白髮長垂領新茶緑滿甌自言門外寺皆是老僧修翠巖寺石巖看不見翠色自重重春雨生松葉山風響鐵鐘碑頑工費墨草嫩鹿添茸住院吳僧老相迎憶舊逢薛氏瓜廬不作封侯念悠然逺世紛惟應種瓜事猶被讀書分野水多于地春山半是雲吾生嫌已老學圃未如君送徐道暉遊湘水春盡雨霏霏春寒猶在衣人尋香草去雁背逺峰歸瀟水添湘濶唐碑入宋稀應知名與姓題寫遍嵒扉劉隱君山居嫌在城中住全家入翠微開松通月過接竹引泉歸慮淡頭無白詩清貌不肥必無車馬至猶掩向巖扉官舍初成為宅傍城牆先求夏日涼鑿池容衆水栽竹斷斜陽官是三年滿身無一事忙不知何補報安坐恐難當會景軒此中非一景欲狀固難名江近秋陰早山多曉氣清斷雲分樹泊飢鶴下田行别擬深更至虛空看月明大慈道青苔生滿路人迹至應稀小寺鳴鐘晚深林透日微野花春後發山鳥澗中飛或有相逢者多因採藥歸扶欄強起扶欄立新寒陡見侵鐘聲諸寺曉栁蔭半池陰病久方憑艾貧深或夢金湖邊好風日孤負幾登臨葛翁小閣樹色對疏櫺橫陳一片清微風楊葉下斜日竹梢明此老無塵事雙姝亦道情客來憐素壁題句不題名訪韓中止不遇題澗上隔澗竹扉深蒼童引客尋雖然乖晤語猶得見園林野蔓時妨步山蟬亦好吟石根泉數斗清冷應人心貴溪夜泊寄趙昌甫蓍草占秋動逢秋早得歸本非為事迫不欲與心違波淨孤螢度宵涼數葉飛逺懷髙卧者微月閉松扉沈洞主案上陰符卷應逢驪母傳無言過永日不食度終年雲覆燒丹竈花浮洗藥泉時聞有玄虎來禮洞門前和鮑縣尉留僧秋閣上身自伴僧間潄齒臨寒水焚香對逺山野禽偷果去童子借經還餘興成詩句髙題屋柱間送奭上人抄化冒寒獨向何方去為建靈山閣未能詩卷帶呈看疏客藥爐留借共房僧夕陽岸上行枯葉瀑布巖前聽折氷事到有緣隨處應回來金碧入雲層暮春書懷寄翁十帝里逢春雨不乾才晴數日又春還桐花半落官河水榆葉全遮客舍山未悔濶疏令事去最憐乏絶礙身間菖蒲九節今堪采思爾逍遙澗谷間移居謝友人賃得民居亦自清病身於此寄飄零筍從壞砌磚中出山在鄰家樹上青有井極甘便試茗無花可插任空瓶巷南巷北相知少感爾詩人逺扣扄簡孫正字空齋兀兀難消日况入中年睡亦疏洗釡煮蔬留客飯卷簾移菊看人鉏秋衣因病全更衲曉髮迎寒半脫梳多謝貴交藝閣裏許令隨意借官書贈鄧漢卿單獨一身長不定亦無書卷得相隨忙過人世當間日老遇朝廷用少時衝雪自言行路苦看松長恨買山遲蕭蕭白髮寒燈下寫就詩篇欲寄誰孤山寒食二月芳菲在水邊旅人消困亦隨緣晴舒蝶翅初勻粉雨壓楊花未放綿有句自題間處壁無錢難買貴時船最憐隱者髙眠地日日春風是管絃寄茅山溫尊師幾度題詩寄入山不知何處得書看莓苔石上秋吟苦星斗壇中夜拜寒鶴改新名呼未至碑逢斷刻打應難憶師每欲尋師去芝术栽成自可餐會宿再送子野又承出郭到貧家一度分攜鬢易華自説印書春可寄獨慚缺酒夜難賒眠遲古鼎銷殘火吟苦寒缸落細花羸病不能親送别夢魂先立渡頭沙病起身如瘦鶴已伶俜一卧兼旬更有零朝客偶知親送藥野僧相保密持經力微尚覺衣裳重才退難徼筆硯靈惟有愛花心未已遍分黃菊插空瓶翁卷字靈舒永嘉四靈中卷齒居長故趙徐以靈舒而并稱靈亦好事者品目之也詩為葦碧軒集送陳郎中知嚴州頻年經虎害人望使君來地重分旄節州清管釣臺涼天星象動吉日印符開帝擢平津䇿曾知有用才寄趙靈秀千山落葉深髙樹不藏禽遊子在何處故人勞此心間燈妨逺夢寒雨亂愁吟僧奭曾相約花時共一尋送人赴沅州任舊貢包茅地中存古意長去程逢嶽雪上事帶春陽露結硃砂氣波流白芷香大夫祠寂寞煩與奠椒漿悼雪菴禪師悟了無生妙歸空若故鄉竹房三尺像石榻一爐香壞衲猶懸樹新松忽過墻僧中留不得幾日為凄涼寄沈洞主想當清夜醮帶月扣仙鐘指上雷霆訣菴前虎豹蹤藥收陽地草薪採故枝松擬即尋師去茅峰疊幾重太平山讀書奉寄城中諸友寥寥鐘磬音永日在空林多見僧家事深便靜者心虛庭雲片泊側徑石根侵此去城闉逺君應懶出尋冬日過道上人舊房已知起衆相假質任成灰房是他僧住門無舊客來氷乾半池水花落一根梅猶自疑行腳何年見却回春日和劉明逺不奈滴簷聲風回昨夜晴一階春草碧幾片落花輕知分貧堪樂無營夢亦清看君話幽隱如我願逃名送薛子舒赴華亭船官君到雲間日應分二陸名縣圖山色少井味海潮并剡局三年印春風半月程野人因買鶴曾向此中行曉對獨對曉來晴天寒景物清梅花分地落井氣隔簾生曽是吟招隱何時遂耦耕蕭疏頭上髮已白二三莖暮春病歸朝朝風景添吾病亦開簾洗藥花前曬傳方壁上黏力微還省語身老更看髯昨日林僧至茶杯始一拈寄永州徐三掾曹聞道居官處千峰近九疑合流皆楚水高石半唐碑香草寒猶緑清猿夜更悲其中多隱者君去得逢誰書隱者所居百事已無機空林不掩扉蜂沾朝露出鶴帶晚雲歸石老苔為貌松寒薜作衣山翁與漁父相過轉依依能仁寺芙蓉峰入天寺與此峯連得見是冬月要來從昔年寒潭盛塔影古木帶厨煙偶值髙僧出禪牀坐默然石門菴山到極深處石門為地名嵐蒸空寺壞雪壓小菴清果洛羣猿拾林昏獨虎行一僧何所得髙坐若無情寶冠寺山多猿鳥羣永日絶囂氛一澗水流出幾房僧共聞拄笻黏落葉拂石動寒雲誰昔來營此尋碑看記文秋日間居呈趙端行間居觀物化幾葉又飛東清氣全歸月寒聲半是風病多憐骨瘦吟苦笑身窮折得鄰家菊還思靖節翁初晴道中初晴殘溼在衆樹碧光鮮幽鷺窺泉立間童跨犢眠依山知有寺過水恨無船石路是誰作姓名巖上鐫題武義趙提幹林亭武陵諸勝狀如列在簷前一郭樓臺日數村桑柘煙鳥啼春滿谷秧緑水平田中有漁樵影吾詩詠不全贈孫季蕃立談飛絮中相遇在吳宫以我為生拙憐君失計同醉酣花落月吟苦竹搖風自作廬山記幽竒欲遍窮按孫惟信字季蕃開封人自號花翁工詩詞有官棄去贈劉髙士靈境康廬上師曽此處家今遊在京國誰為管煙霞覓句行逢鶴持經坐對花笑豫非酒戶相勸滿甌茶送人遊天台暫遊行李少幾日到天台船帶落潮發月從前浦來花源香不斷藥地緑成堆莫學他劉阮經年忘却回宿寺一宿此禪宫身同落髮翁深窗難得月老屋易生風燈冷紗光淡香殘印篆空獨憐吟思苦妨却夢西東鮑使君間居吟樓影在湖波上吟景長從望處生疉石擬成幽嶂色種松移得逺灘聲多諳藥品曽因病却著荷衣欲避名聞説近來心更靜案頭惟有一琴橫山中山中凡事幸相宜第一紅塵免上衣尋藥每同丹客去拾薪多趂牧兒歸鳴泉潄石寒蒲潔宿霧蒸泥早蕨肥不奈鄰峰學禪伴時時來此叩巖扉次韻葛天民接得詩來勝接書憶君情思豁然舒却看城裏誰家竹又鎖湖邊舊住廬曽有退之憐賈島豈無得意薦相如欲知别後豫蹤迹只向此間間釣魚贈陳管轄一拂清風一袖雲紫陽容貌鶴精神詩因道進言辭别丹得師傳火候真廬嶽峰前吟瀑布混儀圖上禮星辰我來暫作間人歇多謝仙翁相訪頻次徐靈淵韻贈趙靈秀一軸黃庭看不厭詩囊茶器每隨身三年在任同仙隱一日還家只舊貧種得溪蒲生似髮教成野鶴舞如人出門便是登山路更要遙山翠色勻徐照字道暉永嘉人自號山民四靈之詩皆尚五言近體而道暉幽眇峭刻思致尤奇卒嘉定四年詩號芳蘭軒集蝗飛髙戰士尸上蟲蟲老生羽翼目怒體甲硬豈非怨氣激櫛櫛北方來橫遮遍天黑戍婦聞我言色變氣咽逆良人進戰死尸骸委砂礫昨夜夢魂歸白騎曉無迹因知天中蝗乃是尸上物仰面久迎視低頭淚雙滴呼兒勿殺害解繫從所適蝗乎若有知飛入妾心臆青鳩詞勞勞復勞勞生人半行客今人行古道古道有行役相逢莫等間相離易疏隔殷勤紅杏花徹宵對芳席明年花開人東西青鳩食花舊處啼宿翁靈舒幽居期趙紫芝不至江城過一宿秋氣入宵濃蛩響移砧石螢光出瓦松月遲將近曉角盡即聞鐘人起行庭際思君恨幾重贈江心寺欽上人客至啓幽戶筍鞋行曲廊潮侵坐禪石雨潤讀經香古硯傳人逺新篁過塔長城中如火熱此地獨清涼送塵老入廣化米開田行李衝氷雪塗程半是船去從人乞米歸要海成田遇景因開畫思茶亦掬泉好風名舶趠相候立江邊宿寺古殿青燈冷虛廊葉掃風掩關人迹外得句佛香中鶴睡應無夢僧談必悟空坐驚窗欲曉片月在林東題江心寺兩寺今為一僧多外國人流來天際水截斷世間塵鴉宿腥林徑龍歸損塔輪却疑成片石坐對謝公身題羅隱故居片水靜無塵青山是四鄰上天如有意此地著詩人吟得物俱盡罰令生世貧因來尋古迹只見石為麟懷如順上人西湖湖上寺一别二三年舊住房長閉新栽樹已圓空多相憶夢不得寄來篇喜見鄰僧説歸期是臘前訪觀公不遇卧犬聞人出門當青櫟林固知多不在自願欲相尋宵短餘香印鄰疏出磬音昨來曾寄茗應念苦吟心石門瀑布一派從天下曾經李白看千年流不盡六月地長寒灑水跳微沫衝崖作怒湍人言深碧處常有老龍蟠題衢州石壁寺岸石橫生脹平林一里溪衆船寒渡集髙寺逺山齊殘磬吹風斷眠禽壓竹低自嫌昏黑至難認壁間題題浯溪知是漫郎宅舟中聞寺鐘小溪通正港髙石壓羣峰緑樹成春蔭荒臺見古蹤唐碑三十本獨免野苔封白石巖一石入遙天千峰疉在前人行不到處仙去未多年竇暗雲生像簷斜日照泉皇朝宣賜物弟子尚能傳壽昌道中碣字芙蓉驛喜行行不難路侵滄海過人得異山看圓石蠔黏滿平途鷺立寒一遊期一月回日必冬殘題翁卷山居空山無一人君此寄間身水上花來逺風中葉動頻蟲行黏壁字茶煮落巢新若有髙人至何妨不裹巾訪僧居客至無他事房門不厭敲好山元帶郭損屋旋鋪茅靜砌生靈藥髙林出逺郊水禽多不見春暖漸營巢永州寄翁靈舒古郡百蠻邊蒼梧九點煙去家疑萬里歸計在明年風順眼聽角樓髙望見船筠州當半道長得秀詩篇題李商叟半村壁一徑蒼苔合連年不出門風髙松有韻溪滿石無痕不自知名重令人覺道尊更憂徵詔至移室向深村送塵老歸舊房數間茅屋殘山外片石崚嶒樹影交給假兩旬秋易盡相尋一舍路非遙盆栽怪木緣能畫池畜珍魚不入庖聞道水松三百步夢隨流水到溪橋會飲鮑使君池亭案上一琴書數卷不須此處有笙歌厭居城市觀天小喜到君家見月多葉滿地飛隨步履鶴於人熟聽吟哦明朝也向山中去手把松枝養太和同劉孝若野步杖履相從步野田坐臨階所和詩篇要看隔水人家菊試借繫門漁父船且緩歸舟知有月不生酒興為無錢寒來莫問家中事才得身間即是仙髙山寺晚望石路近門方失險刺桐疏處見僧歸小坡重疊無平屋四月陰寒尚夾衣山到道州髙莫比水分湘口緑相圍暮雲不隔東南望一片遙兼白鳥飛徐璣字文淵從晉江遷永嘉官建安主簿龍溪丞武當長泰令嘉定七年卒年五十九按璣與照同姓同里同調同時實非兄弟曹能始云二徐倛隱居不仕耽情丘壑以故發之咏歌清真淡逺出於自然亦未嘗言璣為照之弟但璣已歷官丞宰謂之不仕則失考云詩名二薇亭集投楊誠齋名髙身又貴自住小村深清得門如水貧惟帶有金養生非藥餌常語是規針四海為儒者相逢問信音江亭臨眺問得梅花信寒林動晚聲雨來山漸逺潮去水還清寥落尋新句歡娛解宿酲相攜歸路滑燈火近孤城題陳待制湖莊圍無三畝地四面水連天行向樓髙處却如身在船野花春渚外山色海雲邊一任人來往兹懷亦浩然宿寺古木山邊寺深松徑底風獨吟侵夜半枯坐雜禪中殿淨燈光小經殘磬韻空不知清逺夢啼鳥在林東孤坐呈客晨起猶孤坐瓶泉待煮茶寒煙添竹色疏雪亂梅花獨喜忘時事誰知改嵗華多君能過此人里似仙家登信州靈山閣跨鶴臺清遊吾有分渾似昔曾來野屋憑髙住青山到水回欲看靈岫逺須待曉雲開漸漸生愁思鄉心上古臺書翁卷詩集後五字極難精知君合有名磨礲雙鬢改收拾一編成泉落秋嵒潔花開野徑清漸多來學者體法似玄英大龍湫瀑水數千尺何曾貼石流還疑衆山折故使半空浮霧雨初相亂波濤忽自由道場從建後龍去任人遊梅坡淺水低坡幾樹苔冷光搖動玉塵埃橫斜直似安排得古怪多應折損來潔白要從侵夜看飄零却是被春催間行立斷清風影一片飛香落酒杯秋日登玉峰玉琢孤峰壓富沙人行峰頂步雲霞溪流緩去幾回曲樹色幽分無數家翠拂寒煙平似水紅飄霜葉逺如花明朝重向城中望對北一松應不差題東山道院古院嵌崎石作層緑苔芳草近郊坰溪流偶到門前合山色偏來竹裏青靜與黃蜂通戶牖間將白鳥共沙汀道人亦有能琴者一曲清徽最可聽訪湖友城中日日望南湖乞得間來訪隱居漸有秋霖籬菊長才無暑氣渚蓮疏壁間古畫多賢像案上塵編半佛書未見主人逢稚子不通姓字獨踟躇泊馬公嶺維舟拂曉步平沙晚泊雲根第一家新取菜蔬沾野露旋編籬落帶山花門前相對青峰小屋後流來白水斜可愛山翁無一事藤墻西畔看蜂衙酒才傾一盞碧澄澄自是山妻手法成不遣水多防味薄要令麴少得香清涼從荷葉風邊起暖向梅花月裏生世味總無如此味深知此味即淵明過九嶺斷崖橫路水潺潺行到山根又上山眼看别峰雲霧起不知身也在雲間徐致中孝宗乾淳間人與永嘉四靈為唱和友其詩格亦甚相似夏日湖上訪隱士煩暑何能避孤舟訪隱人水鄉菱藕熟晴野稻苗新為學師前輩談空悟宿身鏡湖三百頃不似此湖濵又寄庭深自無暑苔徑復縈紆賔客不長到兒童自可娛荷花晴帶粉蒲葉晚凝珠與我城闉隔茲歡想不殊山居柳竹藏花塢茅茨接草池開門驚燕子汲水得魚兒地僻春猶靜人間日自遲山禽啼忽住飛走又相隨夏日懷人此詩併謝公巖作别本又屬徐璣流水階除靜孤眠得自由月生林欲曉雨過夜如秋逺憶荷花浦誰憐杜若洲良宵恐無夢有夢即俱遊夏夜同靈暉有作奉寄翁趙二友齋居惟少睡露坐得論文涼夜如清水明河似白雲宿禽翻樹覺幽磬渡溪聞欲識他鄉思斯時共憶君初夏遊謝公巖又取紗衣換天時起細風清陰花落後長日鳥啼中水國乘舟樂巖扉有路通州民多到此猶自憶髯公登橫碧軒繼趙昌甫作步陟髙髙寺徐行不用扶青天晴又雨山色有還無句向間中覓茶因醉後呼所懷論未足何乃又征途不食姑惟誦天童呪飲泉能不飢只緣多自譽翻以致人疑賦質全如鶴謀生却似龜緑華通籍後會報女仙知宋元詩會卷四十三
