body:
  text: 宋元詩會卷八十五兵部主事陳焯編余闕字廷心本唐古氏世居武威以父實喇藏布官合肥遂為合肥人母尹氏夢異人至生闕闕墮地時髮盡白其性淡無嗜欲不知肉味惟甘六藝學若飴蜜與京兆張恆遊恆乃吳澄弟子善談文理闕之學因以絶世擢元統癸酉進士第授同知泗州事治聲大著俄召入應奉翰林文字轉中書刑部主事與當路議不合拂衣竟歸復召拜監察御史知無不言言多峭直無忌或勸之稍遜以避禍闕弗答改中書禮部員外郎出為湖廣行省左右司往郎中時右丞實喇卜怙權自用會猺蠻反當帥師討未有行意闕揚言激之始行旋奉召還翰林待制出僉浙東廉訪司事丁母憂歸隱青陽山中至正壬辰天下兵動平章托和爾巴哈統戎淮南承制起闕權淮西宣慰副使分治安慶安慶距城皆盜柵也闕從間道入推赤心置人腹中民翕然歸四方來依者甚衆闕知民可用乃帥之破雙港寨聲威大振諸寨次第請降則益繕城浚濠修戰具力屯政賊至輒敗却之是時淮西皆陷惟安慶巋然獨存轉淮西行省參知政事尋改左丞賜二品服闕益奮勵誓死報國丁酉冬寇大集圍城樵餉路絶兵出數失利戊戌正月七日城陷猶率衆巷戰不勝遂自刎死年五十六其妻蔣氏聞之亦率其子德臣女福童赴水死諸將卒從死者千餘人事聞贈淮南行省平章諡曰忠宣擬古二首昔在西京日縱觀質前聞皇皇九衢裏列第起朱門借問所居誰丞相大將軍平明事遊謁車馬若雲屯芍藥調羮鼎狒狖鑄酒樽頌聲美東魯逸奏出西秦回風薄蘭氣十里揚清芬東家有狂生容顔若中人謬言擬宣尼幽思切玄文著書空自苦名宦乃不振悠悠千載下安有揚子雲昊天轉時律大火西南馳徑商發羣籟白露降嚴威攬衣起視夜明月鑒薄帷翩翩征雁翔唧唧寒蛩悲紅蘭委芳采柏葉亦離披喬喬千丈松孤生泰山隈凝霜裂其膚層氷斷其柢摧殘若傾蓋蒼翠終不移草木有至性明哲宜戒兹白馬誰家子白馬誰家子緑轡縵瑚纓腰間雙寶劍璀璨雪花明甫出金華省還過五鳯城君王賜顔色七寶奉威聲夜入瓊樓飲金樽滿繡楹燕姬陳屢舞楚女奏鳴筝慷慨顧賔從英風四座生一朝富貴盡不如秋草榮黔婁雖貧賤千載有餘名天門山保寧知府楊丹作記揚子博地志名山屢出王但言隱彌深崇冠峙嵩梁井絡通遙甸天經列巨障羣峰如菡萏歷亂發金塘玉壺既嶇崿天門迥開張蜿蜒連紫蓋飛泉濺石牀入門蔭修竹中夏若寒霜靈鳥多異色中林皆妙香耀真啓幽室積石構瑶房萬里祕冥奧千秋阻秩望惟應學仙侣結桂共相羊送劉伯溫之江西廉使祖帳依山館車蓋何繽紛使君驅駟馬衣上繡成文中坐陳綺席羽觴流薄薰情多酒行急意促歌吹殷况我鄉邦友同館復離羣初暘麗神皋遙望澄逺氛回鑣望雙闕五色若卿雲蒼茫嵗年徂東西岐路分道長會日逺何以奉殷勤惟有凌霜柏天寒可贈君秋興亭涉江登危榭引望二川流雙城共臨水兩岸起飛樓漢渚深初緑江皋逈易秋金風揚素浪丹霞麗綵舟登高及佳日能賦命良儔御者奉旨酒庖人供膳羞一為山水媚能令車騎留為語同懷者倘遊即來遊九日鄂渚登高南州理秋祓嘉節協乾陽爰與幕中友臨眺涉崇岡維時天氣肅芬菊已沾霜瑟瑟風振谷凄凄日在房高雲斂楚岫曜景遊川梁微徑出丹林列坐泛金觴佳賔未會合良會安可常英曹幸文雅獻酬寧計行預恐還吹帽煩君戒太康先天觀仙客鍊金地蒼山深幾重至今龍虎氣猶在琵琶峯峯前石路整金澗垂楊嶺萬壑閟阿宫千秋奉丹鼎日日采三秀人人吹玉笙既要王子晉復命董雙成方朔金門步春來多自豫青鳥幾時還銜書寄君去北闕懷美祿南山思逺遊勞心如御水東去復西流題虞邵菴送别圗南州山水麗中田嵗事豐時貞文物粲道合朋輩同濟濟衆君子班坐蔭青松回洲環偃月丹林結綵虹翔鷗方矯矯鳴雁亦嗈嗈即趣情已展染翰思彌工豫亦幽栖者纓冠朝北宫披圗誦佳詠邈爾想高風送黃紹及第歸江西上林花落盡東門餞别初遊絲橫輦道金波溢鏤渠含觴不能飲躑躅此城隅念子正英妙丹泉媚緑蕖翻然阻山岫邈爾問離居藝閣誰同坐蒲編孰共書時應有詞賦為寄北飛魚送胥式南還孟冬寒律應原野降繁霜客子倦遊覽結笥還故鄉驅車出城闕旭日縣晶光綺宫上爛爛翠閣後蒼蒼豈無京華志晞景發清揚冨貴在榮遇貧賤有安行恆恐嵗年迫臯蘭凋紫芳君看沙上雁鶱翮乃隨陽題施氏西嶼書堂中智貴得性得性非易求羡君淠川曲松竹蔽層丘春秋當佳日兄弟各命儔總轡凌晨術展席面清流參差瓊峯出泓澄綺磧周緗荷承繡宇黃鳥響疏樓起坐玩芳帙為樂鮮優遊河陽恥巧宦建春壓旅愁安得周公瑾為館孫仲謀蘭亭奉節過東鄙總轡臨越墟覽此崇山阿亭榭猶晉餘陽林積珍木禊館流鏤渠微風旋輕瀨宛委寫成書秋杪霜露滋清商滿縣隅紅蓮凋綺蘂微瀾見躍魚藉芳泛羽觴視聽良有娛逍遙大化內豈必三月初自集賢嶺入大龍山皖公標楚甸兹嶺孕竒形翠積樅江滸崇冠吕蒙城戒途入中林平岡駐我旌延望失來術周覽多所經峩峩石窗矗窅窅巖岫冥離離雲朝隮粲粲樹敷榮關弓射鳴雁羣谷振弦聲仰憐山人居俯悅洞下耕蒼龍啓春候金虎收光精權家既非學農用或可明願言同載者為爾鑄阿兵安慶郡庠後亭宴董僉事鯨鯢起襄漢郡邑盡燒殘兹城獨完好使者一開顔省風降文囿弭節遵曲干雙池夾行徑纍榭在雲間天淨羣峰出地迥蒼江環霞生射蛟臺雁沒逢龍山開樽華堂上命酌俯危欄主人送瑶爵但云嘉會難豈為杯酒歡樂此罷民安魄淵無恆彩清川有急瀾明晨起驂服相望阻重關送康上人往三城嘗登大龍嶺橫槊視四方原野何蕭條白骨紛交橫維昔休明日兹城冠荆揚芳郊列華屋文纕被五章乘車衣螭繡貴擬金與張此禍誰所為念之五內傷豎儒謬乘障永賴天降康樅陽將解甲皖口寖開疆耕夫緣南畝士女各在桑念子中林士振策亦有行我聞三城美龍嶺在其傍連林積修阻下有澄湖光明當洗甲兵從子臥石牀七哀殷湯誦罙阻周魯歌東征聖哲則有然我何敢留行斬牲祀怒特釁鼓起前旌野布魚麗陳山鳴鐃吹聲函關何用塞受降行已成路逢故鄉人取書寄東京寄言東京友勉樹千載名一身未足惜妻子非無情八月十五日處州分司對月玄武夕始正華月生秋旻金波何穆穆緑桂滿中輪徘徊出西陸照耀此甌閩光流河宿隱氣隨商律振餘輝動軒房紫蘭含微津皇天降嘉嵗五政亦已陳樂哉一巵酒允矣同庶人安南王留宴將命坐藩服式禮奉國賔賢王重意氣延客列華裀肅肅高堂上圎方饋八珍齊優雜趙女歌曲一何新遺響從風發雕梁落素塵中觴每傳滿眷眷難具陳厚往已有愧懷報恐無因黃鶴樓岧嶤黃鵠嶺巋巍構楚材澄江環畫楯連城抗鉛階雕衡朱鳥峙淵井緑荷開隱見長沙渚想望陽雲臺晴霄一仰止輪奐信美哉淮南儻好道日夕化人來龍丘長吟贈程子正戰龍起新室羣鳥亦翩翩偉哉龍丘生抱琴歸故山仰視天際鴻俯弄席上絃清音發疏越逸響遺澗泉悠悠鳯翔漢婉婉虬媚川清風自千古何用能草玄待制張廷美姑阿慶詩葭菼啓望國灼灼詠桃夭操觚染芳藻短髮未勝翹始聆白雪句兼傳黃竹謡蘭萌初映砌春霜已降霄秋榛覆故隴驚蓬颯回飈金樽與瑶席庶足奉嬌嬈一作仁嬌詠古楊沛楊生仕州縣謀國不謀身一朝解印綬歸來但長貧茅茨上穿漏頽垣翳緑榛空牀積風雨蝸牛止其巾辛苦豈足念殺身且成仁大别山柏樹竒樹如蛟蜃盤骫上虛空孤生雖異桂半死反如桐香帶金爐氣色映綺錢中靈從后皇服年隨天地終常瞻北枝翠終古鬱蔥蔥送王關赴泗州行捕提舉蒼茫吳楚會縱橫淮汳流春水未泮渚芳杜己生洲揚旌朱樓前張獵青山幽獻功效大兕亦致公子裘消搖足為樂何嗟晚不侯送李好古之南臺御史都門相送處旭日動蘭暉綺樹鶯初下金溝絮漸飛分驂向逺道把袂戀音徽去去江南陌應看滿路威送霍維肅令尹握手蘭宫外朝光滿禁塗山寒知塞近苑靜覺鶯疏草草離樽既悠悠征輛驅還應軫時念不羡執金吾吕公亭鄂渚江漢會茲亭宅其幽我來窺石鏡兼得眺芳洲逺岫雲中沒春江雨外流何如乘白鶴吹笛過南樓宴晴江山拱北樓漢坻開繡閣蕭然似渚宫晴江華楯外列岫綺錢中樹色芳樽緑荷花粉臉紅賢王敬愛客樂宴意何終詠絶塵軒網軒開翠崿山水下蔥蘢江中寶牀擁樹杪雕欄紅心融二陳滅境靜六塵空應似青蓮葉齊開緑水中壓雪軒軒轅鑄鼎處仙臺成畫圗寒雲生洞渚暝色入蒼梧如霧飄丹閣非煙起玉爐年年漫來此無處挽龍胡竹嶼秋水鏡臺隍孤州入渺茫地如方丈好山接會稽長紫蔓林中合紅蓮葉底香何人酒船裏應是賀知章送危應奉分院上京峽路傳清警金輿夾綵旃還如向姑射詎比幸甘泉逺樹紛成幄關榆始委錢從臣偏寵近載筆幔城邊禎祥菊舊花已萎絶新花乃再芳都緣稟金氣特解傲司藏旖旎生殘馥葳㽔出故房應憐蕙草質戢穎委微霜賦得九里松送吳元振之江浙左丞結駟向青郊松陰九里遙言從天竺寺自度小春橋偃蹇成芝蓋蕭森蔭蘭橈相送將何贈期君保後凋題果囉羅易之四明山水圗窗中望蒼翠春水起晨霏孤嶂才盈尺長松未合圍蕭蕭此仙客日日候巖扉念爾空延佇王孫且未歸祝蕃逺經歷挽詩逸軌無還轍驚川有怨思蒼苔生舊館素簡委空帷龔勝誰相弔虞翻少見知惟應問道者寂寞薦江蘺題蛾眉亭空亭瞰牛渚高高凌紫氛澄江萬里至華崿兩眉分落日兼霞彩流光成綺文憑軒引蘭酌休憶謝將軍南山贈隱者君家南山下南山果何如開闔盡雲路向背凌空虛木客採薜荔怨女詠蘼蕪何當牽白犬見君巖下書賦得慈恩寺塔送李惟中赴西臺侍御祗園開塔廟遐瞰盡三秦雕玉裁文陛金銅結綺輪高標雙闕外流影灞陵津攬轡還登眺題名繼昔人寄題環秀亭在五祖寺宗老來相報黃梅盜已平傳聞一峯下臨眺九江橫象構誰能壞香臺積可成憑詢幾小劫又復到昆明葛編修挽詩景老昔别情何樂今還語向誰幽房通貝闕空館罥蕪絲未過徐公墓徒懷有道碑扁舟望湖曲清淚濕江蘺賦得巨野澤送宋顯夫僉事之南山堤上栁沈沈春蒲泛渚禽濟田東滙濶汶水北流深落日依中沚浮雲積太陰微茫看不盡渾似醉時心夜坐和成太常牽衣表宫雉華星動綺錢沈沈鳷鵲觀悠悠清漏傳無才愧三益虛食念百㕓綿思至中旦莫繼瑶華篇送張有恆赴安慶郡經歷曉路通高嶂春城入大江草生垂釣浦人語讀書窗肅客移茶鼎行田載酒缸幕僚誰得似高步絶紛龎宋祭酒挽歌文章知有數耆舊忽先零東井開圗畫西山閟爽靈司徒虛執饋太史早垂銘悵望平原繡時時問客星送李伯實下第還江西之子不得意南行無怨詞官河人杳杳客路雨絲絲古木淮陰市春城孺子祠悽然千里别為賦小星詩有所思春風起寒色春衣方重薰新裝捲羅幕清唱入行雲艷色若流月芳澤謝蘭芬嬋姢信無度我思何在君長安陌浩浩長安陌瓊樓夾廣㕓鴛鴦御溝上芍藥吹樓前駿馬追韓嫣金尊酌鄭虔功名有時有且得樂當年伯九德興學詩上德撫玄運籲俊尹神京三雍蒸髦士五學訓齊氓登高陳羽葆鸞刀奉麗牲優遊樂清化大道嘉方行送孫教授皇情重聲教宵裝爾載馳邊城南徼外禮殿左江陲揖讓陳椰器絃歌蔭薜帷全勝宜春郭花落閉門時賦得君子泉送彭公權為黃州教授君子沒已久遺井郡齋中本寓思人意兼全澤物功銀牀駁故蘚玉甃薄寒桐幾日趨官舍橫經誦養家賦得春雁送司執中江西憲幕春風起蘋末旅雁尚回翔乳鴨嬌同喋新蒲短可藏應懷洞庭水非避塞垣霜客路頻懷舊題書寄帝鄉題假吉甫助教别墅圖玉署挂新圗如君舊隱居峰高託霞上葉變為秋初遊客看常在溪聲聽却無只此同登望豈必命柴車送王其用隨州省親都門楊栁萬絲垂城下行人駟牡騑宫中近得三年謁篋裏新裁五色衣漢皋秋晚遊娼少夢渚波寒獵火微我有愁心似征雁隨君日日向南飛登太平寺次韻董憲副蕭寺行春望下方城中雲物變凄涼野人籬落通灊口賈客帆檣出漢陽多難漸平堪對酒一樽難盡更焚香憑將使者陽春曲消却征人鬢上霜題假應奉山水圖水如剡溪水山似沃洲山想見鱸魚美扁舟常不還題溪樓溪水緑悠悠高樓在溪上日暮望江南舟中采菱唱别樊時中二首桃花灼灼栁絲柔立馬看君發鄂州懊惱人生是離别不如江漢共東流光祿橋西惜解攜春星欲傍露盤低自來宫栁多離思更著城烏在上啼題光祿主事仲桓君海棠圗沈香羯鼓弄春杯席上才看半作堆爭似君家屛障裏年年嵗嵗有花開題紅梅翠竹圗竹蘂梅花一色春盈盈翠鈿掩丹唇休言畫史無情思却勝宫中剪綵人郭奎字子章淮南人宋濂序其望雲集曰子章曽從余廷心學治經而性尤嗜詩自黃初以降諸名家多嚅嚌其芳腴故剔句鎪詞趣味雋永韻度婉微廷心極稱之集名望雲者志思親也遭亂離悲憤以老于詩外無所表見云擬古贈别孟冬霜露降悴彼荷與蒲青青蕙蘭芳采之將焉如贈君夙昔意聊以慰斯須絃歌厲清響置酒岐路隅親戚念逺行各言勉良圖常恐不為樂日月方其除晨風奮高翼北林多古榆臨岐執子手安得同車驅九日偶成良晨惜難再秋序倐已殫登高啓飛閣望逺俯層巒寒菊正盈把濁醪方共歡微此一日宴客懷殊可歎擬古思友鶡鳴嵗將晏蒹葭淒以霜思君隔山海道路悠且長睇彼參與辰清夜悲未央狂飈西北至一雁方南翔言念疇昔歡與子同衣裳安知異寒暑日月不我將天高則有斗川涉愁無梁憂心隱如惄出户徒倣徨送薑彥英還錢塘東南有高樓華月照綺楹瓊筵列海錯雜以絃歌聲疏簾捲晨夕回瞰蒼江清君今利攸往我獨懷鹿鳴執手望長路駕言出東城嘉會常不足何况臨當行晴郊望樹碧緑渚春蘭生持觴意難盡相思空復情寄李彥端嘉樹藹夏緑清風動虛襟念君有高趣勞我徑寸心佇立東城曲日夕見雲岑以兹世多故忘彼升與沈聊樂在書籍佩玉懷所欽華池散逸步當戶鳴幽禽蘭生已覆井泉響迥出林醉將山口月彈作絃上音明月照别鶴遺音戞南金何當坐松石從爾聽瑶琴次錢子貢蘇門感懷燕支木葉落盧龍秋色來空閨有思婦清夜悲且哀錦書為君寄寶鏡誰人開膏沐不復容緑髮栖浮埃團團皎月輝照彼單于臺馳心在萬里出戶聊徘回雜詩孤月江上明清光泛流水北有愁思婦南有遊蕩子蕩子行未歸思婦安所止姑老在高堂貧賤復如此君行忽逾年膏沐誰為理妾心金石堅不逐浮雲起會合良未期離亂何時己君當復來歸妾當效同死凌風願翺翔揭波詠杭葦再逐平生歡被服紈與綺紀夢忽忽頽芳年搖搖寄行役寢興勞形神鬢髮玄已白驚風響庭樹憂思日常積夢魂清夜歸髣佛舊鄉邑青松在園田桑柘蔭廬室飛鳥雲際還牛羊下來夕澄湖淡微波秋山有佳色雞犬雜比鄰墟煙靄阡陌怡怡兄弟情淒淒丘隴側伐木逢行歌僕夫候馬立臨流濯長纓挂冠坐盤石似慰生平歡覺來異疇昔百年如轉蓬萬物乃遺舄天命良在兹勿復云得失貧女吟猗猗石上蘭青青澤中蒲貧家有美女二八嬌如荼朱顔不自媚貞固操匪渝少為父母惜生長紅羅襦綺樓高且深竊恐行露濡一朝零落盡萍迹湖東隅塵沙陋茅屋水濺氷雪膚鴛鴦懶復織翡翠愁還梳鳴鸞在何處坐惜華芳徂恥作商人婦願奉君子儒妾心擬有託請贈雙明珠遊羅漢寺步出城東門褰裳涉西澨幽尋窮四郊日入未遑已逍遙逺塵蹤夕憩空門裏陰階轉長廊金碧炫晴綺園池清且深水竹淡如洗追念疇昔歡豈謂重來此春日忽載陽百物含芳卉好鳥向我鳴高僧見人起間雲石上生天花覆瑶几信宿方告還行行詎能止春日行春風爾來何無情忽然吹我華髮生淮南三月花滿城金尊海錯羅雕楹美人對坐彈鳴筝酒酣起奏升天行當年歡樂不復得白日為照心未平心未平發長嘯我曹豈是閭閻兒齊東魯連頗同調新豐市過新豐待沽酒雪華當空大如手斷橋荒店無人煙獨有寒梅伴疏栁憶昔江東未搆兵我亦曽經此地行東家槌牛出新釀西家開宴還吹笙春風步障千花錦當壚美人勸客飲形勢雖非漢祖為髣佛咸陽舊陵寢停驂慷慨懷馬周我欲濯髮臨清流斗酒不可得高興良難酬著鞭遙指敬亭路孤雲日暮心悠悠夜坐吟江風蕭蕭吹古樹關月蒼茫海生霧北斗漸落明河傾城頭烏啼天欲曙客子不寐憂無衣東征三年猶未歸蟋蟀在戶嵗將暮洞庭霜白芙蓉稀男兒生當百戰死不執金吾即挾七閉門勿用長夜歌騏驥終能致千里七夕曲天河盈盈一水隔河東美人河西客耕雲織霧兩相望一嵗綢繆在今夕雙龍引車鵲作橋風回桂渚秋葉飄拋梭投杼整環佩金童玉女行相要兩情相合美如舊復恐天雞催曉漏倚屛猶有斷腸言東方未明少停候欲渡不渡河之湄君亦但恨生别離明年七夕還當期不見人間死離别朱顔一去難再歸從軍婦從軍婦良家女新梳北髻學邊語狐皮裁帽紵絲衫馬上佯羞見親故黃巾盜賊亂中華去嵗燒我父母家天朝命將専征伐強兵爭奪顔如花顔如花命如葉此身一失無名節憶昔姑家納采時燈前豫綰同心結嫁夫誓擬齊蛾眉誰知萬里為軍妻木棉帳低風日惡五紋刺繡思深閨思深閨難再得人生莫願多顔色東鄰女伴醜且貧鄉里不出成家室寄衣曲華燈暗室秋夜長吳刀翦綵為衣裳欲縫不縫心惻惻還向姑前較寬窄燕山八月雪苦寒氊褐狐裘俱擘裂明朝驛使催征車白袍絮就愁寫書舅姑已老妾無子願君早曵玉門裾臨行封裹復致意著時莫遣沙塵穢和蔡都事見寄泛泛仙槎逺雲津月未沈水光明使節星采動詞林夙駕江亭迥前瞻浦樹深瑶華如可拾願得繼高吟次劉仲孚地逺孤雲白秋深一雁過淚因明月下心在故鄉多列郡方傳檄連城未息戈羈危萬里思江上逐馳波送孫良玉還同安送君江上去山路雨初晴落日平淮樹春潮帶皖城酒因今夕醉人是故鄉情莫説王孫怨芳洲緑草生春日遊敬亭山冠蓋聫鑣出晴郊北路分我尋何水部誰似鮑參軍芳樹聞啼鳥飛泉隔亂雲題詩兼勸酒聊樂在殷勤郡齋秋日次韻幕府簡書靜一官清自間秋聲在東壁爽氣滿西山叢菊可延夀芳樽聊解顔當軒兩嘉樹好鳥暮知還出暖水向新營山陽暖水地舊是北軍屯一澗雲連棧千峰雪照門奉書觀壁壘馳驛到邊藩為卜歸人信今朝喜鵲喧留水西寺貽季潭上人好山吾所慕今日水西遊花雨千峰瞑松風六月秋龍為人聽法僧共鹿尋幽如此林泉樂榮名安足求秋興龍門疏鑿禹時功江漢滔滔亦滙東萬古山河今異域千年禮樂舊同風忽思鱸鱠慙張翰將學丹砂就葛洪祗恨兵戈猶在目秋來衰鬢對飛蓬答人見寄自傷孤雁影翩翩避弋南來折復旋塞上牧羊幾陷賊山中尋鶴託遊仙黃冠偶倩傍人正寶劍誰為烈士捐華髮秋來垂兩鬢江湖憔悴任吾年早秋旅夕初月涼風夜向闌倚樓愁到笛聲殘天高閶闔銀河白露滴梧桐金井寒多病馬卿猶是客幾時張翰也辭官年年怕近清秋日憶殺湖邊舊釣竿涇縣涇川不減若耶溪况有招提在水西四面雲山當縣合五更星斗落簷低拿舟競訪桓彛廟立馬空慚李白題但願功成身退早桃花潭上結幽棲臘日臘日三年為異客今年霜雪未全饒風塵暗滿淮南路霧雨寒生江上潮鄉夢有時逢骨肉此身何處託漁樵共來吳楚交兵地烽火依稀似六朝次丘太守韻翳翳桑榆晚正宜夕陽山色望中竒鷗盟逺渚誰爭席鶴放長松自擇枝疏廣賜金忘得少陶灊束帶怨歸遲黃花時節牽兒女爛醉籬根且賦詩開嵗臥病多病文園渴未消自從人日遇花朝不知楊栁將春色緑到淮南第幾橋德興山中路入深山忽有村隔溪煙火似桃源漁舟不喚行人渡洞裏春寒靜掩門書所見黃犢飲溪芳草滿青裙挑菜碧芹肥故山好處多如此湖上春風憶我歸劉汶字魯源天厯至順間以能詩名好遊山水而探竒會稽往來尤數郭奎嘗稱其所作故次諸望雲集以見焉贈劉禹玉劉郎方朔徒遊戲紫泥海千年華表非唯有寸心在向來逝河西雄辨吞虹霓手携九節杖東入蓬萊栖我時探禹穴同看山陰雪千人萬人中怪子獨超越朝騎白鼻騧暮逐油壁車得錢即付酒攜妓顔如花踏翻豪俠窟醉狎山人家或嘲狂處士或誚報恩子從渠立名多詎識子竒偉一朝去鄉國北上爭吹噓家無十金産袖有萬言書所陳果何事為國非自計寧遭丞相嗔肯負丈夫志蹉跎十數秋甘與黃冠儔善藏倚天劍未暇摩斗牛幡然走山東隱迹隨壺公還尋岱宗去絶壑凌天風雞鳴上日觀眼亂扶桑紅窺臨事未己逸氣橫萬里行歌齊魯間興為廬山起廬山秀可餐怡此氷雪顔揮毫灑瀑布五老開雲關逺公拍手笑喜見遺民還乃知士不偶正可遊名山去年臥衡嶽聊憩四海腳厭垂君平簾懶賣伯休藥却呼魏夫人共把流霞酌今年與山辭下走湘水湄臨風弔賈傅酬月招湘纍文章本疏蕩強忍終技癢光怪不可收倐忽又千丈有時遇知音朗咏山中吟復恐兒輩覺不得容山林兹晨忽聚首慰我别來久辛勤四十霜所獲竟何有却懷居東時勇以功名期焉知尚漂泊筋力供路岐舉杯置往念此去安所之南窺古雲陽更了山川竒山川固娛目慎勿過幽獨奈何白雲歌再送劉十六乾坤助蒼茫回首眷空谷我將秣其駒乃不受羈束願子無遐心歸哉返初服汪主簿清明不出見寄人情雨中花客情松上煙茍非薛卞門何以歸龍泉附驥知自逺慕羊徒得羶君看長舌人早晚無乾涎所以汲太守穩作淮陽眠昨日出東郭風榆吹緑錢流光一何情去我如郵傳道逢誰家子饌奠號新阡感此不能己戌笳吹晚天癸酉除夕此夕何多感明朝過六旬乾坤又元統人物少咸淳酒厭山杯渌楊傷水國春燈前曽戲綵馬首一沾巾早春述懷春與年年别窮隨日日增眼明貪夜讀事少忘晨興倦鳥猶還木潛魚己涉氷栖遲唯故轍無夢到飛騰宋元詩會卷八十五
