body:
  text: 宋元詩會卷五十五兵部主事陳焯編韓信同字伯循别號古遺與石堂先生同里為及門士宋亡不復仕進為雲莊書院長碁盤仙迹唐山絶頂碁盤石戲局流傳名自昔殷勤細問白髮翁云是仙人曾對奕苔封石磴不敢移竹引清風時拂拭箇中黑白子不留想是仙童為收拾又不聞採樵之人王子質邂逅仙人執手談贏輸未決藏機密貪看柯爛不知時少憩山中方七日誰識囊中日月長歸來塵世無相識此詩為詠石堂山中八景之一嶽王墓妖星墮地芒角赤龍劒悲吼風蕭瑟中原王氣挽不回將軍一死為毛擲秦家小兒真戲劇播弄造化搖樞極指讐為親忠且逆隻手上遮天眼碧九重茫茫隔天日無由下燭臣愚直臣愚萬死不足惜國恥未湔猶憤激古墳埋冤血空瀝風雨年年土花蝕我恐精忠埋不得白日英魂土中泣請將衰骨斷苔痕獻作吾皇補天石彭秋宇宋末人元師南渡有乙亥紀聞併秋興詩附見秋興沙塵破褐客秋風落落親朋半老翁野曠有時聞嘯虎天寬無處寄征鴻四方玉帛燕山北萬里帆檣海水東回首升平歌舞地芳花石礎樹隂中乙亥紀聞二首羽書朝暮漲氛埃天詔勤王起草萊塞上風髙鷹揚去江頭霧暗馬飛來諸賢忠愛謀安出四將英靈喚不回漠漠雲天秋萬里飛鳴無數雁鴻哀西風捲地送凄涼目斷歸帆落日黃雁過江天雲漠漠龍遊滄海水茫茫故人入夢三更月近事驚心兩鬢霜試把濁醪澆磊磈樽中猶帶蘂蘭香世事茫茫世事等浮萍愁緒方濃醉又醒日月雙飛天不老干戈百戰地常腥此時弓馬多秦戍何日簫韶備魯庭宇宙西風愁下盡誰家門巷草青青林景熙字德陽號霽山溫州平陽人咸淳辛未太學釋褐發宋官禮部郎宋亡不仕客居會稽會嘉木揚喇勒智諸陵景熙與友人唐珏潛募義士收其棄骨景熙得髙孝二函併珏所收者葬於蘭亭樹冬青以志之其詩有白石樵唱六卷悲憤悽惋視謝皋羽為一致云南山有孤樹南山有孤樹寒烏夜繞之驚秋啼眇眇風撓無寧枝託身未得所振羽將逝兹髙翔犯霜露卑飛觸茅茨乾坤豈不容顧影空自疑徘徊向殘月欲墮已復支故衣篋中出故衣絡緯聲四壁昔年慈母線一一手所歷眷眷遊子心惻惻虗堂夕逝水不返流孤雲杳無迹空令攬衣人一線淚一滴衣敝耐有時母恩無窮期終憐寸草心何以報春暉朝寒縱砭骨念此不忍披且復返所藏永寄霜露思九日會連雲樓分得落字冉冉海霧深荒荒山日薄登髙集華裾縱目天宇廓落葉悲徂年寒英照深酌心醉乃文字意行非澗壑緬懷斜川遊此道久寂寞胡為吹帽人白首戀賓幕窮途謬行藏異代縣美惡我愛漉酒巾西風不能落訪二陸故居風流懷二陸才名動三吳斯人不可作千載空煙蕪當時騁俊筆萬象爭先驅有如明月璧美價傾鴻都世運有翻覆韞櫝真良圖惜哉去就乖毁此千金軀人生皆有死百年同須臾獨遺文字芳乃與天壤俱凄凄崑山寒冉冉谷水枯白鶴久已寂黃犬誰復呼荒祠挂殘陽扁舟入菰蒲采蓴薦秋風庶以明區區納涼過林氏居出郭已虗曠入門轉蕭森筠樓無六月聊以解我襟紅日不到地白雲時滿林坐久石根冷酒醒荷氣深飄飄黃冠客臨流鼓瑶琴一鼓洗我耳再鼓空我心山髙水復迥倣佛蓬萊音興盡拂衣去城笳吹夕隂曉意僧鐘覺曙鳥紛飛弄林光宿雨漸停霤人起開秋房南山忽入几相對各老蒼流泉送日月危石支興亡問山山無言啼猿起前岡妾薄命盈盈梁家姝奕奕晉朝使解珠不論資得備巾櫛侍一笑金谷春列屋俱斂避豈知錦步溫已復為愁地念主惠妾深緣妾為主纍樓頭風雨深殘花抱春墜酬謝皋羽見寄入山採芝薇豺虎據我丘入海尋蓬萊鯨鯢掀我舟美人渺天末瑶音寄青羽自言招客星寒川釣煙雨行行古臺上仰天哭所思餘哀散林木此意誰能知過風門嶺客來自風門颼颼撼兩袖溪迥衆峰新畈絶一嶺又行行春日微怪禽啼白晝流年感花稀古道表松秀聊此寄小酌餘酣掬山澑新豐道中長飈卷炎埃澄空出秋素迢迢鐵甕城回首隔蒼霧酒簾揚荒市笳鼓發深戍倚篷問舟人云是新豐路籬落雞欲栖野水牛半渡不見抱琴人斜陽在髙樹商婦吟良人滄海上孤帆渺何之十年音信隔安否不得知長憶相送處缺月隨我歸月缺有圓夜人去無回期回期倘終有白首寧怨遲寒蛩苦相弔青燈鑒孤幃妾身不出幃妾夢萬里馳寄周計院海桑變紛紛秀色見孤嶼山林華髮尊黨遂深衣古獨餘鈞天夢翛然在巖户翳翳桂魄灰沈沈槐夢雨江濤豈不深修鱗挂網罟不知義井船秋風繫何許雜詠酬汪鎮卿名鼎平陽人二首百感湊孤夜江樓起呼月秋蟲聲轉悲念此衆芳歇人生非金石青鬢忽已雪踰淮橘心移出山泉性汨猗蘭抱孤芳不受宿莽沒權臣坐偃月棄官如飄蓬及兹顚沛秋翻然挺孤忠一死未得所網羅挂秋鴻渡淮已不食蛻稿夷齊風何人續遷史表為節義雄石翁嫗束艾楚俗愚鑄金秦民怖何年斫雲根偶立此翁嫗千春衣莓苔偕老食風露世人輕結髮覆水或旦暮乃習無情緣永與天壤固父老向我言曾是梁朝墓衣冠化黃土古丘亦成路當年殉金棺兹物獨如故閲世如過客興亡了不悟時借牛礪角敲火戲童豎宴德初書樓樓髙不二尋已作百尺想中有湖海豪開襟納萬象頗延素心人談笑落清響鄰花吹午香簷竹薦秋爽於中了行藏此外斷俯仰西樓富熏天歌鐘樂華敞荒涼風雨餘山夔自來往寄四明陳楙陽髙人謝世氛誅茅在絶壁十年不下山舊路掩深棘出門復踟蹰觸步有崩石下臨千仞淵毒鱗正紛籍腥風鼓洪濤石齒鳴咋咋失勢倘一落萬綆那可及不如息我軀猿鶴與朝夕春感栁花滚雪春冥冥溪風一夜吹為萍萍隨風去渺流水人生無根亦如此故山入夢草芊芊半窗疏雨寒食天曉來白髮稀可數多少朱顔化黃土髙原冉冉青煙斜麥飯灑松能幾家子規呌殘金粟暮繭紙蘭亭已飛去贈泰霞真士時祈雨有驗火旗焰焰燒坤垠蒺藜滿道風揚塵稿苖無花不作榖老農扶杖田頭哭哭聲不為填溝渠室罄何以供官輸檄龍唄佛寂不應􅀈蜴那能擅權柄泰霞真士鞭風霆緑章叩天天亦驚玄雲沛雨起膚寸點點都是盤中飯須臾收斂歸無聲翩然駕虬出山城我聞調元功自古亢為常暘伏常雨廟堂有道司牧良坐看玉燭開金穰淮南捕蝗蝗更在飢蛟齧人陸成海肥羊日日供大官論功乃使專黃冠真士寸田無水旱天機子夜交離坎餞盛景則教授空明仙人朝帝所跨鶴凌虗墮霜羽洞中石髓流不乾聖泉寫入君肺腑潘江陸海一目盡自提修綆汲千古碧芹水冷涵夜燈丹鳳山空鳴曉鼓有時白戰風騷場小巫見之縮雙股飯雖不足仁義腴牆隂老薺羮味苦丈夫出處各有道天地綱常要撑拄俗吏惟知騁刀筆腐儒亦或拘訓詁雲霧窗寒森寶書廣文袖有修月斧離亭酒短秋帆開鴈蕩峰前桂花雨題陸放翁詩卷後天寶詩人詩有史杜鵑再拜淚如水龜堂一老旗鼓雄徑氣往往摩其壘輕裘駿馬成都花氷甌雪碗建溪茶承平麾節半海宇歸來鏡曲盟鷗沙詩墨淋漓不負酒但恨未飲月氐首牀頭孤劒空有聲坐看中原落人手青山一髮愁濛濛干戈已滿天南東來孫却見九州同家祭如何告乃翁冬青花元僧人名嘉木揚喇勒智官釋教總統置署於杭城盡發宋帝諸陵之在越者其骸骨棄草莽中人莫敢收景熙等痛憤不已相率為采藥者至陵上拾而收之又購漁人網得理宗顱骨於湖水中作二函託言佛經葬越山因種冬青識之冬青花花時一日腸九折隔江風雨清影空五月深山護微雪石根雲氣龍所藏尋常螻蟻不敢穴移來此種非人間曾識萬年觴底月蜀魂飛繞百鳥臣夜半一聲山竹裂附唐珏詩冬青花不堪折南風吹涼積香雪遙遙擎蓋萬年枝上有鳳巢下龍穴君不見犬之年羊之月霹靂一聲天地裂時雷震白塔又一首馬箠問髐形南靣欲起語野麏尚屯束何物敢盜取餘花拾飄蕩白日哀后土六合忽怪事蛻龍挂茅宇老天鑒區區千載護風雨送葛居士住栖碧庵越山巉巉越臺孤井中雙鯉曽走吳滿坡叢竹遺舊箭回首霸業空煙蕪詩人訪古凌絶壁危樓竟欲老深碧聲搖孤枕海濤壯影伴瘦笻山月白了然道者亦離塵一龕松下分秋雲秖今虎豹滿平陸鍊骨誰與箋青旻琴心劒氣兩寂寞醉墨淋漓風雨落九十九峰歸夢寒玉笙泠泠跨飛鶴荷珠霞衣蔥珮來珊珊水晶之宮緑玉盤誰與馮夷作戲劇貝闕驅入神瓢翻又疑罷織鮫人泣碧窪融作水銀汁圓或為璧方為圭寒光滉漾不可拾古來欹器戒覆傾真宰之柄常惡盈季倫買笑輕百斛金谷轉首迷榛荆紛紛魚目爭貴惜道眼獨縣諸幻息須臾海霽山日髙緑雲萬柄淨如拭鄭宗仁會宿山中宗仁朴翁也號初心平陽焦下人挑燈懷舊夢移席近春泉共話忽深夜相看非少年斗垂天末樹磷出雨餘田亦有茅簷下飯牛人未眠道中程入江鄉宿新炊飯帶沙亂山愁外笛孤驛夢中家野水平菰葉春風足棟花西來三兩客間説舊京華宿台州城外荒驛丹丘路秋髙酒易醒霜增孤月白江截亂峰青旅鴈如曽識哀猿不可聽到家追此夕三十五郵亭鄭氏西莊不踏紅塵道結廬依水鄉逺峰開宿雨高樹表初陽犢卧野門寂鴈飛秋稻香午橋花竹地回首已凄涼溪竹風髙餘暑盡獨策興悠然野色延幽步秋聲入暮年日斜禽影亂水落樹根縣回首故人逺城笳吹夕煙仙壇寺西林古壇仙鶴杳野鹿自成羣松氣浮清曉經聲出白雲石穿僧屋過水到寺門分人世無窮事山中了不聞寄鄭宗人城南懷舊别谷口寄春耕野鶴巢雲老林僧管瀑清養花疏石髓煉藥伏山精見説孤燈雨年來著易成葛嶺度宗賜賈似道新第於西湖葛嶺不讀霍光傳炫然桃李門湖山變朝市烽火滿乾坤膽落氷天騎魂飛瘴雨村春花吹秀麥誤國竟何言京口月夕書懷山風吹酒醒秋入夜燈涼萬事已華髮百年多異鄉逺城江氣白髙樹月痕蒼忽憶憑樓處淮天鴈呌霜宿七里灘寥落空江上買魚開酒尊亂山含雪意孤艇寄楓根灘近不成夢鴻飛欲斷魂偶呼黃帽語一犬吠前村鹿城晚眺古城仙鹿逺百感赴斜曛海氣千年聚山形九斗分神鴉飢啄蘚宰木蠧藏雲何處鳴鉦發春屯又易軍初夏春歸不知處澗户日初長舊篋題詩扇疏簾讀易香田蛙占水旱海燕語興亡復恐間愁起聽泉過石梁過陶嶺有錢王井又三里有錢王石菴沙井泉初試石菴苔已荒不知更宋代猶自説錢王古塜木根怪春山雲氣香詩成無紙筆駐馬語殘陽客意獨夜愁如此殊鄉老奈何故人經亂少歸夢入秋多衣敝鄰砧動書沈海鴈過燈前空拂劒酒薄不成歌潘山長入括為官轉多事行役到寒氊落日鄰州樹西風逆水船飯牛懷白石訪鶴入青田我欲看行卷仙峰雪瀑邊答陳景賢一劒挂寒壁艱危氣不衰鬢痕朝鏡覺書味夜燈知夢斷潮生枕愁新鴈入詩思君心欲折又負菊花期薛得之之江東寄熊西玉諸公乍逄還又别龍竹葛陂隂野水流春逺江雲入暮深新知滿湖海遺老在山林邂逅如相問憑君道素心古松獨占寬間地不知搖落天山林猶古色風雪自窮年龜伏靈根夀禽巢絶頂仙秦封非所屑幾見海成田崑巖神斧何年鑿南山片石盤玉藏仙笥古翠落縣門寒老木天邊瘦歸雲雨外殘市塵吹不到朝夕靜相看桐角田家無律呂聲寄始華桐碧卷春風老清吹野水空客心寒食後牛背夕陽中不惹林花恨年年送落紅寶林寺圖上追三笑詩中寄七哀孤樓非絶物多難亦成才歲儉米生竹春寒衣上苔不知遼海客化鶴幾時回神仙寺訪僧獨客無清伴髙僧住别村空山卓錫影斷石繫舟痕風細松生籟沙虗竹迸根小亭間坐久落日嘯孤猿趙奧别業已無湖海夢漸老足間情野杖日尋壑家書時到城開池納天影種竹引秋聲亦愛簞瓢樂年來世味輕夜意淡然無一事至樂在書牀老石棲雲定疏松過雨香砧清秋巷迥燈白夜堂涼此意無人會重城醉夢鄉天台隱者俗駕不曾到瘦笻時復攜肺肝清澗飲鬢髮老巖棲野巷猶雞犬春城自鼓鼙未應人世外别有武陵溪新昌道上江湖猶是客嵗月已成翁仙路重雲外人家落木中山痕經燒黑土脈入泉紅又得春風信孤花照驛東越中送徐君寅歸閩此地同為客當秋獨送君斜陽留薄醉逺道惜輕分老淚遺陵木鄉山出海雲天南有回雁音信倘相聞故宫驚風吹雨過歷歷古槐蹤王氣銷南渡僧坊聚北宗煙深凝碧樹草沒景陽鐘愁見花甎月荒秋咽亂蛩辟雍冠帶百年夢昔遊今重嗟璧池春飲馬槐市暝藏鴉堂鼓晨昏寂廊碑風雨斜石經雖不火嵗歲長苔花孤山回首咸平夢清風自滿湖乾坤一士隱身世此山孤鶴去空秋影梅開向舊株耳孫今白髮持酒酹寒蕪舟次吳門懷古心猶壯臨流影自孤湖煙迷檇李城水出姑蘇草暗春驚鹿菰香秋試鱸青樓舊時月無復聽吳歈釣臺曾來天上宿夢不離寒磯宇宙雙臺迥煙波一客歸姓增江郡重墓隔越山微千古登臨意凄涼帶夕暉過北鴈蕩山下驛路入芙蓉秋髙見早鴻蕩雲飛作雨海日射成虹一水通龍穴諸峰盡佛宫如何靈運屐不到此山中禹廟萬國曾朝會羣山尚鬱盤嚴祠鎮玄璧故代守黃冠芝入雲根古梁歸雨氣寒年年送春事來拂蘚碑看荷錢盈盈新疉碧難借栁條穿鑄景菰蒲外買鄰鷗鷺邊炎官初掌柄水國不書年漸長熏風價折筒供酒船訪武伯山居照書雙眼碧天欲壽斯文白髮前朝士青山半屋雲遲花春後見逺瀑夜深聞回首重華夢荒田自鹿麕漁笛楚竹聲何逺蒼茫想釣舟橫當半篷月吹破一江秋落葉紛前浦驚鴻過别洲曲終枕蓑卧無夢到涼州雪夜開簾殘酒醒雪意尚垂垂夜色沈奎久春容變栁遲寒塘鷗自散荒歲雀同飢便欲誅茅隱何山有紫芝山中早行短策穿幽徑山樵半掩扉月斜林影薄石盡水聲微一犬隔籬吠孤僧何處歸相逄松下立風露滿秋衣溪亭清秋有餘思日暮向溪亭髙樹月初白微風酒半醒獨行穿落葉間坐數流螢何處漁歌起孤燈隔逺汀獨夜客鬢雙蓬老拾遺一燈明滅酒醒時百年回首忽成夢萬竅有聲皆是詩殘夜月枝烏未穩故鄉水草鴈多飢夾衣初試新霜冷欲折黃花寄所思答周以農平陽睦源人號稼村一燈細語煮茶香雲影霏霏滿石牀萬里夢魂形獨在十年詩力鬢俱蒼山空絡緯悲秋雨水落蒹葭足夜霜未會漆園觀物意酒闌猶發次公狂歸白石故廬四鄰井竈出荒墟獨鶴歸來認舊廬一徑蒼苔供瘦䇿半簪華髮伴殘書斜陽巷陌語初燕新水池塘生細魚小立春風憐寂寞忽吹花片入襟裾春暮乾坤萬事上眉端寂歷東風獨倚欄白髮餘春能幾醉緑隂細雨不多寒香飄苔徑花誰惜影落沙泉鶴自看碧眼野僧知我意素琴攜就竹西彈酬潘景玉二首喚起離愁落木聲抱飢猶自向書耕江湖有夢追前事天地無根笑此生歲晏斷鴻羇客影夜深殘火故人情幸來相就分岑寂間對梅花酌翠觥讀史雙眸夜炯然一聲江鴈落燈前馬非汗血材終下木或青黃性不全風月未容詩入務乾坤應許酒為年寒城日出無窮事老耳山中獨聽泉答柴主簿間采秋荷自製衣相逄舊雨語依依學窮蝌蚪心空老夢跨蟾蜍肉不飛幾唤江帆和鴈渡長歌巖户見雲歸何須化鶴千年後城郭人民半已非答鄭即翁初陽蒙霧出林遲貧病雖兼氣不衰老愛歸田追靖節狂思入海訪安期春風門巷楊花後舊國山河杜宇時一種間愁無著處酒醒重讀寄來詩雲間懷古熏風短棹水粼粼老鶴疏林寂不聞內史祠荒殘碣雨黃門書冷半堆雲獵場斜日分桑塢馳道深秋走鹿羣寥落一觴誰弔古漁鄉煙景客平分過吳門感前遊回首前遊夢未忘江雲漠漠樹蒼蒼客心空老鶯花月詩貌不肥魚稻鄉白虎氣銷遺瘦石綵虹影冷卧斜陽當時已歎來麋鹿後二千年更斷腸元日得家書爆竹聲殘事事新獨憐臨鏡尚儒巾寒窗琴册燈花曉衰鬢江湖柏酒春道在老天扶客健書來稚子識家貧舊山亦有間風月歸與漁樵作主人次翁秀峰花柳湖西别此翁十年鬢雪忽重逢唐陵愁問永和帖楚水夢聞長樂鐘黃嬭秋燈餘舊癖素侯野服拜新封世情雲雨何時了千古青青太玉峰寄七星人七星山平陽州北五里鄭初心先生隱其中十年疏鬢為誰斑天借儒冠日月間欹枕寒生雙瀑澗開門春滿七星山鶴歸尚覺遼城是鵑老空聞蜀道難欲覓九還憑寄語青牛何日度函關和王德遊夜感小池荷淨雨初晴世念消磨未到僧衣帶長江空北固觚稜舊月隔西興一春空負花前酒獨夜相知竹下燈自笑老來甘鷁退少年雲路健追鵬酬合沙徐君寅合沙福州郡稱歸鶴悠悠渡海遲間來野寺看僧棊鄉心荔子熏風國客路槐花細雨時天地一身愁自語江湖諸老淡相知烏絲醉後淋漓墨片月涓涓照硯池立秋日作苦熱如焚想雪山清商一夕破愁顔炎光斷雨殘虹外涼意平蕪逺樹間忙踏槐花猶入夢老催蒲扇共投間城頭遙望纍纍塜遼海荒寒鶴未還王監簿南墅新樓落成玉珮珊珊不可招眼空塵界等秋毫山林貞白三層迥湖海元龍百尺髙自笑行藏關氣數肯將歌舞換風騷卷簾最愛南山近坐聽松聲起碧濤訪僧鄰菴次韻拂石題詩滿袖嵐尋僧又過竹溪南乾坤浩蕩酒鄉寄山水蒼寒琴意參老燕未歸同是客孤雲無住孰為菴寂寥午夜松風響疑是神仙接麈談新晴偶出琴牀茶鼎淡相依偶為尋僧出竹扉風動松枝山鵲語雪消菜甲野蟲飛看花春入桄榔杖聽瀑寒生薜荔衣古寺無人雲漠漠溪行喚得小船歸雲門即事最愛林中過客稀坐分片石淡忘歸僧間時與雲來往鶴老不知城是非瀟灑山光秋入畫清寒花氣曉侵衣一溪截斷紅塵影西有任公舊釣磯寄林編修名千之平陽人大雅凋零尚此翁醉鄉一笑寄無功衣冠洛社浮雲散弓劍橋山落照空東魯有書藏古壁西湖無樹挽春風巾車莫過青華北城角吹笳送暮鴻喜劉邦瑞遷居采芹坊并鄉聚散笑匆匆歲月無情忽兩翁燈火城南聽夜雨桑麻社曲憶春風百花新意皆歸燕萬里離愁獨寄鴻重約扁舟尋禹穴夕陽疏樹亂雲東讀秦紀琅琊臺上晚雲平虎視耽耽隘八紘萬里不知人半死三山空覺草長生兆來鬼璧沙丘近威動神鞭海石驚書外有書焚不盡一編紀上漢功名項羽里英雄蓋世竟何為故里凄涼越水涯百二勢傾爭逐鹿八千兵散獨乘騅計疏白璧孤臣去淚落烏江後騎追遺廟荒林人酹酒至今春草舞虞姬陪王監簿宴廣寒遊次韻銀橋疑駕海天長丹粟離離照翠觴影浸山河瓊殿冷舞深風露羽衣香亦知廣莫元無野却笑溫柔别有鄉手折一枝驚昨夢素娥憐老授玄霜漁舍觀梅冷雲漠漠護籬隂瀟灑苔枝出竹林影落寒磯和雪釣香浮老瓦帶春斟幾憑水驛傳芳信秖許沙鷗識素心回首西湖千樹逺扁舟寂寞夢中尋虎丘寺突兀僧房倚翠微金精幻虎霸圖非瓊田萬頃山如湧鐵壁千尋澗自飛堂在經聲通老石樓開塔影落秋衣千年幽獨嗟誰氏斷刻苔深帶夕暉鶴林寺流水蒼松石徑斜甕城城外梵王家仙林不返雲巢鶴僧鉢曾移海國花剝落苔碑秋卧草荒涼竹院午敲茶當時一擲乾坤手曾向山忩倚暮霞焦山寺山裹中流水作林寶蓮鼇背翠沈沈半空但覺煙嵐合三靣不知風浪深仙井浴丹開曉日海門浮玉淡秋隂洞深瑶草無人采瘞鶴殘碑浸碧潯寄葛秋巖吳地繁華半劫灰故山秋逺夢頻回琵琶亭老春風棹桑落洲寒夜雨杯嵗月悠悠人幾換關河渺渺雁空來酒酣欲寄登臨眼黃葉斜陽滿廢臺用韻寄陳振先同舍心事凄涼寄雁聲石田苔滿未妨耕西風戍角催年換殘夜江樓見日生煮茗敲氷貧有味看花隔霧老無情湖山猶憶笙歌底笑領春香緑滿觥贈天目吳君實詩興翩翩度雪溪巖雲半護舊留題夢回殘月蒼梧曉家在春風秀麥西萱草堂深衣屢寄桃花觀冷酒重攜故山石鏡無人問空與寒猿照影啼東山渡次胡汲古韻客來持酒灑煙霏空想髙風意欲飛老洞藏雲安石卧孤舟載雪子猷歸一川白鳥自來去千古青山無是非欲上危亭愁逺眺廢陵殘樹隔斜暉家則堂先生生還瀕死孤臣雪滿顚氷氊齧盡偶生全衣冠萬里風塵老名節千年日月縣清唳秋荒遼海鶴古魂春老蜀山鵑歸來親舊驚相問禾黍離離夕照邊題陸大參秀夫廣陵牡丹詩卷後南海英魂呌不醒舊題重展墨香凝當時京洛花無主猶有春風寄廣陵歸自越避寇海濱寒食不得祭掃持酒無因灑墓松禽聲花色慘東風去年此日身為客及到家山又客中山忩新糊有故朝封事藁閲之有感偶伴孤雲宿嶺東四山欲雪地爐紅何人一紙防秋疏却與山窗障北風蘇小小墓錢塘名倡有墓在嘉興縣西南六十步歌扇風流憶舊家一丘落月幾啼鴉芳魂不肯為黃土猶幻燕支半樹花夢中作四首按景熙既造石函瘞宋諸陵骸骨於越山樹冬青識之作冬青花詩矣而復繫以絶句當時不敢明言但託為夢中作然此四首據旴江鄧元錫定為唐珏之詩考唐珏與鄭宗仁皆景熙一時同志圖兹義舉者唐既别有冬青花古體二章而絶句聲調與景熙近且又原載林集內則此詩仍當屬林恐旴江未之深考也珠亡忽震蛟龍睡軒敝寧忘犬馬情親拾寒瓊出幽草四山風雨鬼神驚一壞自築珠丘土雙匣猶傳竺國經獨有春風知此意年年杜宇泣冬青昭陵玉匣走天涯金粟堆前幾暮鴉水到蘭亭轉嗚咽不知真帖落誰家珠鳬玉鴈又成埃斑竹臨江首重回猶憶年時寒食祭天家一騎捧香來葛仙翁石牀鈞天夢破珊瑚枕巖壑春供翡翠屏一卷黃庭雲半席宵深讀與嶺猿聽館娃宫苧羅山女入宫新四壁黃金一笑春步輦醉歸香徑月隔江還有卧薪人聞蟬二首翼綃微動自宫商幾曵殘聲送夕陽喚得槐柯芳夢覺熏風一曲換西涼近交紙薄雲翻手舊夢冠空雪滿顚却憶畫船曾聽處夕陽髙栁斷橋邊夢回夢回荒館月籠秋何處砧聲唤客愁深夜無風蓮葉響水寒更有未眠鷗牟巘字陵陽原蜀人僑居吳興父諱子才諡清忠以直道事理宗為名臣巘官大理少卿於度宗朝即退居不出其子應隆字伯成咸淳丁未進士宋亡元大臣招之不應後起為上元主簿輒致仕父子皆嗜學巘妻鄧夫人李心傳外孫也九日和陶翁媪兩白髮蕭然老江干大兒荆溪遊折腰豈為官諸兒走異縣亦各營一餐别多會靣少端復坐飢寒諸幼且眼前笑語開我顔勿問賢與愚懷抱俱相關送婁伯髙遊吳桃花水暖清明前長隄栁色青如煙男兒年少重意氣春風買醉吳江船西湖三月春更好笙歌錦繡神仙島紫燕樓深翠黛間碧羅天淨楊花老興亡往事置勿論千金不惜酬歌樽酒酣莫作後庭曲遊人思斷江南魂去去知君訪陳迹吳水吳山青歷歷花殘鈿碎館娃空春草年年為誰碧君行正樂我為愁白髮送君思舊遊平生漫浪無似我努力功名須黑頭和趙君實宣慰平生知我一季及别後牢關白版扉偶有客來孤鶴起也無人覺小舟歸從教俗子頻相惱只恐仙禽未肯飛莫怪近來書問絶醉眠林下兩忘機方逄辰號蛟峰浙人宋亡髙隱不赴徴召與何潛齋倡和山水間其猩猩篇雞雛吟極為潛齋所賞送潘翠谷無屋住僧廬無菜挑野草野草風味長僧廬人迹少剝剝誰扣扄訪豫事幽討錢塘有騷翁自號翠谷老匹馬遊南牆要伴松竹好遐思到山人迂尋出詩藁詩無愁苦吟掃退郊與島胸次鮑明逺筆下王逸少我觀隂與陽禪代何時了不能為魯連尚可作商皓長歌黍離篇酹酒問旻昊猩猩歌獵者圍猩猩疑其以衆抗誘曰不取小惟取大與壯衆猩自相仇推擠送其長以次索二三不復推已往四五至于十無一得釋放衆猩怒相目各悔受人誑及早同一心未必軀盡喪吁嗟獸不靈相仇無足嗔胡為豪傑羣不能自相親秦人吞六國諸侯各附秦併力取其一冀不及他人智者欲合從徒自腐舌脣安得先震鄰然後於其身彼先噬其一其次禍亦均早知秦用術六國同一心按此篇與雞雛吟最為世所傳誦但雞雛之作借談良知不免近腐故刪之題盧文峰十二知丞文集驪珠一顆千仞淵漁翁探得遭驪眠一朝吹墮千萬顆恐是蛟驪卧半天駢花儷葉妙天下文賦直追古班馬手抉河漢裂錦章寫在詩歌軋騷雅大篇赤手捕長蛇不須控勒騎生騧短篇任意起忽伏蒼江浩浩濤中差文章妙手壓場屋到底亡羊還得鹿廬陵方買載月舟清談又展朝天軸軍將打門書一封呼起醉夢為醒鬆只怕至寶不肯留山中雷霆風雨取去還蛟龍田父吟清溪渺如斗大邑萬山壁立土磽瘠百分地無一分田九十九分如劍脊一畝之地髙復低節節級級如橫梯畈心一畦可一畝邊旁一畝分數畦大家有田僅百畝三二十畝十八九父母夫妻子婦孫一奴一婢成九口一口日噉米二升茗鹺醯醬菜與新共來日費二三斗尚有輸官七八分小民有田不滿十鐮方放手有菜色曹胥鄉首冬夏臨催科差役星火急年年上熟猶皺眉一年不熟家家飢山中風土多食糜兩兒只肯育一兒只緣人窮怕餓死可悲可弔又如此有司猶曰汝富民手執鞭敲目怒視今年淫雨天作難洶湧澎湃四五番浮尸蔽屋環江下迸山裂地如鯨奔半山都成水澤國平地皆作龍蛇窟水頭晚退早復來屋角朝出夕又沒巋然令丞簿尉衙下視四境無人家水平歸家無屋住有屋住者無生涯農氏拋家認畝隴擔砂翻石肩皆腫百千一畝判晚秧一丘分作兩丘種都來一畝無百千買秧已費半百錢眼前插種已剜肉向後豐歉猶在天晚田再種未可保早田無秧為出草皂衣旦暮來捶門今年苖稅催須早打快織機趂頭綱作急糴米輸苖倉更有一言牢記取斷不許人言災荒題吳氏梅堂聞君家在雪邊住靠盡欄干索盡詩只怕梅花應冷笑清香元不要人知宋元詩會卷五十五
