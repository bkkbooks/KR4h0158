body:
  text: 宋元詩㑹卷九十九兵部主事陳焯編熊澗谷木綿歌秋陽收盡枝頭露烘綻青囊翻白絮田婦攜筐採得歸渾家指作機中布大兒來覓襦小兒來覓袴半擬償私債半擬輸官府竹籠旋著活火熏蠧蟲母子走紛紛尺鐡碾出瑤空雪一弓彈破秋江雲中虛外縱搓成索晝夜踏車聲落落車聲才冷催上機知作誰人身上衣小女背面臨風泣憶曾隨母園中拾劉時中采蓮曲長安女兒淑且濃日日采蓮溪水中笑插荷花照溪水韶容欲與花爭紅溪中荷花深幾許溪上時時聞笑語紅酣緑縟不見人應在荷花更深處歸來夜凉溪水清扣舷踏歌蕩槳行荷葉蓋頭花壓鬢溪上月明潮已平胡尊生聞官伐松大夫去作屋梁材無復清隂護緑苔只恐江頭明月夜誤他千里鶴歸來黃玠碧瀾妾歌感之以誠感必深應之以真應必捷真情一合了弗離聽我長歌碧瀾妾碧瀾亦是諸王孫世殊事異老且貧少陵尚愛燕玉暖况是當時真貴人春衣典盡春寒悄二妾朱顔正姝好忍將羅帶折同心懊恨浮生頭白早珠鈿翠靨幸僅存此時猶及嫁夫君十二樓頭燕子去揮手不可留仙裙去妾相悲兩相約既去猶煩送殽酌主君詎忍覆棄之見此翻令心緒惡一心事天天得知忍著主衣還事誰遂攜衾襆與俱至後君死者當為尼碧瀾堂下雙溪水使客往來豈知此不願新歡戀舊恩千萬人中兩人耳蕭應元初夏半清半和白晝長似無似有緑隂香兒童刻竹記新筍一夜風吹一尺强劉宗逺山中夢母霜月照屋壁霜風湧江波終夕不能寐展轉思懷多忽夢吾母來宛然度山阿但問兒衣薄語短不及他兒寒尚可忍地下知如何徐甫寓言苦樂有冥定結髮與君婚中道棄我去白馬駕華軒燕趙足佳麗吳楚多嬋媛妾自守空房蠨蛸網妾門妾身當自愛敢謂君少恩彭炳明簮明簮倚修筠撫攬自清絶明河夜無聲茅亭四檐月露寒鶴夢醒山花落香雪白雲雖無心今宵倘怡悅持杯欲問之忘言楚天碧渺然思美人芙蓉似顔色乘鸞明月中青霞擁鸞翼苒苒别離時吹簫苦幽咽長絲曲青池秋高霜露繁蘆葉浸水長闌干風吹枯荷雙白鷺池上木落雲漫漫蕭蕭馬鳴燕草殘小窗清砧山夜寒乾坤如繭繅未了古今長絲千萬盤濁酒濁酒歌明月清吟不解愁此心無險薄何處有恩讐春水洄青澗桃花繞白鷗乾坤如小艇罷釣足優游武夷宮仙人眇縹踏春鴻月落青峰第幾重琪樹雪中巢一鶴石壇秋後蟄雙龍古時有冢埋黃帝今日無人見赤松獨愧曾孫幔亭上翠華同醉玉芙蓉懷關中故人長安三月酒如酥花落平隄水滿初楊柳簇門齊下馬九龍池上看文魚小橋落花如雪馬蹄香幾樹黃鸝欲斷腸行到小橋春影碧一溝晴水浸垂楊楚雲曲花梢澑雨溼春泥花底縈愁兩燕低小院玉箏檀柱冷楚雲凝夢上安西劉叔遠寄黃士謙放歌出東村思弄山上雪清風吹湖波驚散波上月美人載美酒舉櫂搖秋霜把酒勸青天青天忽盈觴揚帆挂白雲鷗鷺同飛揚歌罷一長嘯忽然江水長懷君不可見流恨滿瀟湘江垕李陵泣别圖黃雲黯將暮白日寒無暉送客度河梁惆悵難别離胡馬雖善行按轡姑遲遲初心孰豫察後罪甘誅夷君老既堪去我乃無家歸陽春滿皇都長負平生期吳炳古鏡雁去悲銀海螭蟠泣鬼工黃腸迷漢柏野火上秦蓬濃翠疑螺黛鮮硃潰守宮漆添燈暈黑文滅繡奩紅一旦珠還浦千年劍出酆霧餘空黯淡雲在月朦朧伏獸銜絲結䝉絺畫羽蟲粉綿施宛轉臺玉刻玲瓏匪茹曾申誡惟明可保躬他時錫盤鑑來照夢中熊趙半閒止言蘇張舌如㦸危人亦危身期期周御史千載稱直臣清談每敗事諧謔良損神田翁有斗酒招呼聚比鄰所言惟桑麻語語不失真張輿西泠橋紅藕花深逸興饒一雙鸂鶒避鳴橈曉風凉入桃花扇臘酒香分椰子瓢狂客醉欹明月上美人歌斷緑雲消數聲漁笛知何處疑在西泠第一橋白仁夀書事大羮元無味大章本希音音繁入人耳味美適人心是以保身難惴惴如臨深百戰茍一失勇氣未足欽今若不學古後何法于今陳廷言錢塘懷古越水吳山共寂寥已無遺老話前朝海門三日潮聲歇天目千年王氣消夜月烏啼龍井樹春風花落海鮮橋威儀文物今何在回首浮屠倚碧霄孫唐題定海七塔塔影參差倚殿庭好山晴湧屋頭青土龍刳目潭波息藥草成金佛藏靈白鳥破煙江樹曉黑鼉吹雨海雲腥禪房似隔人間世一榻松風晝掩扄王東同鎮陽李先輩登臨川擬峴臺楚塞蕭條客復來已無秋渚藕花開西風曠野孤城出落日空江白浪回山似襄陽非故國地連吳㑹有高臺南遊萬里頻回首潦倒徒傷賈傅才趙春洲感事美人休唱渭城歌芳草依依自碧波可與共言今則少不如意事古來多青天浩月元無礙白日黃塵欲奈何却笑江湖釣鰲手十年留滯負漁蓑李源道燕中懷古荆卿墓上草離離郭隗臺邉對落暉戰國山川秋氣壯中原豪傑曉星稀乾坤納納無人識南北年年有雁飛說似盧溝橋畔柳安排青眼送將歸李隼仙遊山道士余岫雲為虞公于華蓋山作黃茆岡隱居喜而有賦承命次韻曾謁朱衣拱帝關故辭黃閣老人間鼎湖夢斷龍髯逺遼海歸來鶴羽閒教種芝田經雨過看鋤藥圃帶雲還絶憐此日都忘世渾似當年未出山名山自昔伏龍岡勝地今為卧鹿場無復仙人飛羽駕還聞學士結茆堂晴嵐蔽日雲當戶陰瀑吟風雪滿牀已喜閒居親紫蓋不妨幽夢隔奎章送危太朴還京九重閶闔啓朱扉宮樹隂陰晝漏稀東觀日華浮象闕上方雲氣動龍旗平明玉殿傳宣入薄暮金門待詔歸最說相如才調逸賦成三署有光輝宴秦公子宅贈女樂崔供奉曾緣玉貌侍君王供奉金門一一行歌動綵雲飛閣道舞回花月度宮牆城頭夜咽銅龍水帳裏春銷寶鴨香今日還聞天上曲休辭爛醉紫霞觴送鏡上人往廬山雲滿袈裟月滿船匡廬何處定安禪屏風九疊啼猿裏瀑布千尋度鳥邉林下翻經依寶樹花間洗鉢踏金蓮虎溪若見陶居士不說高僧惠逺賢同王元徵宴陸仲開宅吳中花月為誰濃醉殺松江陸士龍綵檻春風圍芍藥畫簾秋水對芙蓉歸時粉黛佳人擁行處軒車上客從不惜千金將宴樂華堂日暮起歌鐘卞宜之鐵笛詩寄楊廉夫一假清氷百鍊剛曾翻宮徵侍虗皇裂開黃鶴磯頭石驚落青鸞鏡裏霜仙子佩環新樂府翰林風月舊文章道人清節磨礲久却笑桓伊獨據牀國王一人陳益稷元史至元中安南王陳益稷來朝仁宗皇慶中加恩制詞曰委質為臣既去逆而效順以爵馭貴宜崇德而報功銀青榮祿大夫安南國王遙授湖廣等處行中書省平章政事陳益稷知畏天者事大期保境以全民慕帝王自有真能見幾而蚤作懼祖宗之不祀特自拔以來歸拯溺救焚從王師凡一再舉授粲適館留湖右幾三十年身歷事於四朝志不渝夫初節是用加新秩以示恩仍舊封而授職可加金紫光祿大夫安南國王依前遙授湖廣等處行中書省平章政事按益稷本閩人其祖奪安南王李氏國則宋嘉定乙酉間事也大明殿侍宴班陪玉筍侍紅雲日表熙熙瑞氣溫萬𣲖朝宗滄海濶衆星環拱紫宸尊雍容湛露歌詩什倣佛鈞天入夢魂孤孽秋毫皆帝力願殫忠赤報深恩挽河南王美人萎矣柱梁傾回首西風涕淚零三世功名今古史百年過客短長亭手扶紅日名猶在身就黃粱夢不醒記取汾陽舊勳業紫薇留種繼芳馨駕畋柳林隨侍仙仗平明擁翠華景陽鐘發海東霞千官捧日臨春殿萬騎屯雲動曉沙白鷂韝翻山霧薄黃龍旗拂柳風斜太平氣象同民樂南北梯航共一家送元復初江流脉脉草離離黃鶴磯頭酒一巵報國寸心憐我老論交半面識君遲正當重鼎調梅日又是長亭折柳時滿載詩書歸路逺鳳城依約更相期秋曉睡覺海水盈盈漏轉籌霜風吹角出譙樓夢回淡月五更曉心遠孤雲萬里秋玉帛幾年賓上國詩書半世老中州平生事業渾如昨無奈青燈照白頭萬嵗山侍宴碧落鳴鸞隔世塵玉京開宴㑹星辰舞回鼇背三山雪酒上龍顔萬國春物被仁風榮御苑水涵聖澤溢天津越南羇旅陪賓列咫尺光瞻日月新謝青宮賜酒黃封星使控麒麟騰踏高風拂路塵仙醴釀成天上露宮壺分賜臘前春恩沾南紀波濤濶氣轉東皇草木新拜徹雍容歌既醉遙瞻鶴禁喜津津巴陵雨中鴉拂平林雁陳空黃花行李老秋風如何一夜江南夢盡在巴陵細雨中羽士二人吳全節别號閒閒居燕都從江南移植梅花護以帷帳扁曰潄芳嘯咏自得時稱為閒閒宗師六月六日早朝寄山中諸友五年四覩六龍飛又領羣仙覲紫薇金殿煙霞浮黼扆瑤階日月麗旌旗羣臣奉璽勤三護國母臨朝重萬幾遙食蟠桃知幾次客星還照釣魚磯送原功大監南歸漸覺文星闕下稀奎章兩見送行詩渭城朝雨歌三疊湘水秋風賦九疑國典紬金藏鳳闕詞臣步玉即龍墀帝前時有蒼生問可向江南久别離送虞伯生使蜀送别應思舊所經秦川花柳短長亭三峰高拊仙人掌萬里先占使者星錦水東流江月白潼關西去蜀山青當年不盡登臨意待爾重鐫劒閣銘獲玉印三茆山道童遇白兔入穴掘之得一玉印乃九老仙都君印宋宣和時物也瑶璚篆刻鎮華陽猶帶宣和雨露香玉兔有靈開地藏金童無意得天章九重臺上增春色萬里書中耿定光喜遇明時薦神瑞三君珍重護宏綱張雨字伯雨錢塘黃冠師宋張九成之裔也别號真居後入華陽洞又號句曲外史以其能詩也故從遊皆一時名士題墨蘭贈别于一山之京師三月愁送客春寒雨如霰冥冥返塞鴻悄悄栖梁燕揚帆五十日蓬萊望中見欲持猗蘭操一奏南熏殿雪齊騎驢吟雪詩煮茶煎雪水何如掃一室置身虗白裏君家有故事高卧殊未已張師䕫畫謝家池塘春風颯然至幽人午夢醒遙見池塘緑不知春草生如何騎馬客亦向夢中行蘭雪齊為金壇王敬賦謫仙有妙語清風灑蘭雪高懷千載下子獨慕芳潔春氷斷瑞花晨露滋奕葉端居味道腴光景庶不滅再賦天池巃嵸古墩丘泓潭浸其股金碧爭蕩磨穿穴稍旁午斬松羅石榻𤣥芝錯神滸遙應玉女盆潤及黃精圃濱洲雲巢圖張彥輔畫蒼山不受寒裹以白兜羅借雲以為暖我意不在多小營丹鶴巢高栖翠雲柯飛仙度鸞笙老人卧雞窠誰能江海去風雨一漁蓑十月十八夜震澤風大作明日大雪異常又明日甲子日出大寒弱齡逃世網一勇以求志折旋四十載竟日坐有纍大拙使為巧小朴使為器用是役於人夫豈足言智飄風鼓具區如我長噫氣追惟年運往通夕遂忘寐聖人罕言命天道殊難致委順待未來餘日敢終棄次韻晉卿翰林贈陳秉彛金華黃太史出為儒臺冠詩文齊六經竒古誰敢傳如掇明月珠妙在九曲穿而子工筆札狗監非所薦挈之登龍門果獲尾時彥孜孜勤執經奕奕形染翰敏手不暇給精華且屢換憐才吾輩事子乃羞自獻由茲數來往無事輒相見湖嶺錯縈紆煙霞爭變幻一夕快雨餘春物已消半言歸天台奧俄頃語離散此手不易執明日柁樓飯迢迢望白雲瀑布聲湍悍赤城跨滄海朝霞以為岸倘遇仙者徒勿易樵牧賤豫衰志求道千載猶暮旦老經三百家一一理殘卷霜毫犯冠籜墨汁滓衣汗何功使願果盡力輪老腕子書能瘦硬捩眼秋隼健唯餘篋中字照我目光爛送子望崕返回目窮海甸春夕豈不短反側移漏箭才夢金庭遊還逐濤江亂洊知家庭樂旭日陰始泮身扶老人杖衣憶慈母線還期當及時遲子秋水觀栖栖寡儔侶孤坐至日晏追步太史作用以申繾綣春山晴靄圖危亭面縣瀑深塢著茅堂羣木相掩薄風披如有香避世真樂土欲往川無梁隱淪倘見招嵗暮從徜徉天池石壁嘗讀枕中記華山閟中吳神泉發其巔青壁繚其隅春風四山來羣緑互紛扶羽觴曲折行浮花與之俱採珠搴薜荔洗玉弄芙蕖漫叟頗好名石壁作魚湖鴻乙志草堂桃煙遂成圖而此滌煩機閲世如摴蒱發興雲林子隻手與我摹居然縮地法挈入壺公壺晉彥博士以詩索和甚愧卒然鑿澗盛春雨新流繞舍前何當留太白相與學思𤣥碧洞無人掃丹梯有路緣催詩古云迫莫笑竦鳶肩輔成觀張上卿墓廬青牛謝車御白鶴嘆人民閣有凌煙像橋無進履身平生玉櫑具此地石麒麟蕩蕩傳宗業中朝倚外臣風雪中得金陵諸公書雪作衆禽驚窗幽亂霰鳴愕然身濩落莫矣嵗崢嶸松竹聊娛拙乾坤苦忌名故人不相貸書札到柴荆天谷菴宣和金壇郎郭高士之居也十三科取士救世豈無方倐送孤鴻舉難追八駿驤金壇猶著號碧落舊為郎劒化丹爐在山寒井水香碧玉菴四明袁氏草四嵒前客能忘賀監居乖龍嗔草檄古象泣遺書把袂風塵表近公氷雪如時來青瑣闥晚節要蘧廬湖寺擁碧軒喧寂一塵隔湖濵出寶坊荷陰分補衲水氣雜燒香書勘烏皮几茵敷白㲲牀從來已公屋詩客許徜徉萬致柔還省親舍僕往候之道中得此數里平岡路仙山迹漸分柴荆來鵲語村落去人羣粉陳松崩雪濤頭日濯雲不緣停僕御直以候夫君寄洞庭王子正洞庭山簇簇銀闕翠芙蓉安得滄浪子同尋縹眇峰魚龍隨水落橘柚待霜濃未必桃源似雲帆躡去蹤孤山晚步寄中庸子瑪瑙坡前立荒陂接葑田試從樵子徑往覔僕夫泉衆草寒猶短羣峰晚更妍誰歟結真隱共老太平年十二月三日雪快雪真無價豐年定有期臘前才一白至後已多時玉展琳琅步花團蛺蝶枝春風在天上飄入萬年池煮石窩仙人白石子服食受竒方王烈猶餐髓初平枉叱羊砂牀收箭鏃玉屑僃糇糧借爾彌明鼎行窩到處將良常草堂圖鄰近方隅洞良常别有天草堂朝看雨藥圃夜舂泉邈矣盧鴻乙竒哉魯仲連君看遺世者若箇是神仙齊居偶興絶澗多靈石中開小洞房醉醒依竹素晴雨看梅黃樹暗鶯聲澀巗虛水韻長未能超賈馬自足上羲皇午日柬楊廉夫客有擁琴至吾寧折簡招足音垂谷口雨氣截山腰酒倩紅泉㵼花為綘節朝不嫌泥濘極一舸假家橋今人呼假橋為斷橋者誤也澗北梅三月始華陰澗殘梅枿臨流一向攲但存孤注在敢恨一生遲凍雨如相照春寒不受吹後時翻見獨宰物遂成私積雨飽聽三峰雨閒題七月詩水深荷意怯田冷稻心遲蛙黽隂爭盛蛟龍勢亦隨蒼茫不可問身外付雲移早秋每嫌新酒少尚喜故交稠籬落三家墅梧桐十日秋月生微顧兔星淡沒牽牛亦欲觀多稼江湖雨未周乙亥元日試筆四日得春自古三朝節子今一笑看問年書亥字獻嵗出辛盤黔突多蒸术紅氷賸浴丹行行追勝事步步掃春寒碧筒飲採緑誰持作羽觴使君亭上晚樽凉玉莖沁露心微苦翠蓋擎雲手亦香飲水龜藏蓮葉小吸川鯨恨藕絲長傾壺誤展琳琅袖笑絶耶溪窈窕娘上京賜宴王睂叟有詩次韻從事何緣過草堂行都遣賜玉壺方逺勞使者紅塵騎爛煮仙家白石羊中聖敢辭千日醉承恩獨許四明狂金莖賸有三清露潤及葵心向太陽天師素華閣仙家樓觀風塵表更築凌空月榭高虛白豈知存夜氣太清還許隔秋毫溪光淡淡氷填壑松響離離雪舞濤此去銀橋通咫尺神山直下有靈鰲自遣一一花栽繞屋廬半春多雨意何如緣詩太瘦終無補與酒全交漸要疏硯席留香非長物齊庖得筍是佳蔬鶴羣催喚同來飲新淥濺濺已滿渠元日雪霽早朝和辛良史草二韻才設中庭燎俄看密霰飄嵗開環甲紀星動指寅杓鳳集天門榜珂鳴月殿橋卿雲同四表和氣集三朝陛級肪初截雲層玉旋雕勾陳分彩隊步輦簇青腰積屑承盤重吹花到笏消逶迤光黼座凌亂綴珠翹樂奏罏煙合班隨翠袖招閬風遊廣漢玉局道逍遙北戲魚龍舞中巗虎豹調旌旗攢贔屭冠劒掠招搖穆滿曾觴母洪崕及見堯萬年臨紫極一白慶璇霄朝㑹儀如此騫騰意頗饒身唯參寂寞世豈絀紛囂姑射消疵癘蓬萊倚泬寥瑶華攙戴勝珠樹引回鑣有術探鴻寶何人識㸑焦竟須窮海岱直擬並松喬書就神牀寫香從别室燒憐君守華省琢句廢春宵書懷二十韻呈虞集賢昭代千齡運斯文一柱功初當延祐日晚識廣陵公朝士因推轂先生猥擊蒙睽乖遺草載寤寐接孤風太史山川彥仙儒館閣崇置身清切上用志杳冥中句法黃初過才名冀北空朔南馳使節江漢借歸篷酒問餘杭姥泉尋六一翁境非秋水觀寺即紫微宮侍坐要王遠移家近葛洪於焉承咳唾足以振罷癃卓爾身為貴胡然老見攻戰肥終道勝德重豈途窮玉趾閒迂步麻衣病鞠躬茶煙窗冉惹墨沼樹玲瓏饑甚無瑶草招來有桂叢論心何落落把袂輒匆匆易進乘軒鶴難追戲海鴻明朝去吳㑹長笑為誰雄東漢高士詠封君達入山服黃連還鄉騎青牛借得一作問五嶽圖一去三千秋左慈老瞞實雄猜乃忌仙者徒鱸魚既可鱠蜀薑不可無向長貴誠不如賤富誠不如貧自無子平易孰悟損益因范丹破甑久生塵短衣不掩骭還渠一斛麥所拾已雜半龎德公卧龍拜牀下劉表安能屈照見採藥踪猶遣鹿門月薊子訓欲追薊先生白雲迷其方驢鞭不可執一作振夀與銅狄長韓康公是伯休耶賣藥價不二却問奪牛翁徵君當過未法真逃名名我隨避名名我追去去南北山與世從此辭奚官洗馬圖曾侍赤墀東天池看浴龍晚凉湖上夢猶立柳陰中明皇按樂圖髯伶識樂句我信曲有誤月白商聲多塵起漁陽戍夜思空山嘈夜雨幽人坐惆悵今夕楚澗泉明日秦淮浪煙梅睡雀墨戲珍偶偏憐瓊樹寒香漠漠紛紛誰見羅浮月黑一枝同夢梨雲妝鏡璧月朝朝瓊樹明星處處阿房不似千秋鏡裏與人能鍳興亡元統元年十一月句曲外史菌山巢居成詩以自見三首望見飛檐松杪花下盤隂洞石聱牙老樵迷路疑一作驚相問若箇江東道士家縹眇洞庭連白雲緑橘黃柑能見分昨日扁舟尋好事明年處士比封君谷中僅有一菴住壇上纍纍白石陳杖隨流水過鄰舍席與長松分主賓松下淵明圖為鄭明德作歸來不為督郵輕自愛松根長茯苓博浪金椎拈不起倚鉏却讀相牛經寄題陳生華山圖二首西祀曾尋箭筈天雲臺石室故依然雪驢嗅地鞭不起一笑太平三百年華嶽秋高不受寒虎頭粉墨意蕭閒赤城别有思仙夢長在明星玉女間海粟松雪酸齊雜書一卷戲題于左長沙老筆混狂瀾一作戲波瀾刮耳鷗波㸃素紈一作松雪慿誰染素紈翰墨風流作三笑最憐白紵一生寒凌波仙春雲如水碧粼粼誰見凌波襪上塵洛浦湘皋都是夢手中花是卷中人吳興墨蘭墨君石友是同參幾葉光風染碧嵐悵望王孫杳何許年年芳草滿江南曩讀葉靜齊草木子中一條云趙仲穆者子昻學士之子宋秀王之後裔也能作蘭木竹石有道士張伯雨題其墨蘭詩曰滋蘭九畹空多種何似墨池三兩花近日國香零落盡王孫芳草遍天涯仲穆見而愧之遂不復作所記與此詩意正合而集中無之因附見于此爛柯圖一局棋殘爛斧柯山中日月竟如何歸來記得神仙著不比人閒局面多讀臨川集班馬文章老琢磨皋䕫心跡半雕訛執鞭願作鍾山吏一袱字書隨白騾東坡書蔡君謨夢中絶句二放營妓絶句三虞伯生題四絶于後真迹藏義興王子明家要豫次韻五首日將公事湖中了醉入重城列炬明自古大藩財賦地古人偏得賦閒情謝女嬌吟雪比鹽北臺馬耳見雙尖衲衣政索歌姬笑不道春寒繡被添寫韻軒中塵不驚與誰同躡鳳凰翎綵鸞可惜情緣重只合清齊寫道經叉頭新緑荔枝紅那與江桃色味同聞道端明新進譜一時殿閣起熏風香辟春寒玉辟塵流蘇斗帳醉和春一雙明月都無價寂寞人間第二人山中一枝石瘦如麟角六出花開似麝臍隨意莓苔一杯酒也勝騎馬聽朝雞李仲賓雪竹斷縑黯淡何人墨四十年前老薊丘向使戴家多種竹雪中那肯便回舟子昻墨寫萱草碧浪湖頭翰墨香山蜂遊趂午陰凉戲拈小筆塗幽草正自無憂得可忘亦有諷意臺掾薩天錫求識豫面而之燕南八月十四夜風雨宿菌閣明日追寄此詩四首李公求識少陵面未聞草堂三日留看君用意古人上却愧無言與獻酬鶴臺道民掩柴扄雁門才子宿寒㕔恰有金華一樽酒且置茅家雙玉瓶巡官畏虎盛前呵驚動燕山薩照磨剪燭對牀詩未穩從渠醉尉問誰何走送蒲衣菴外路歸時望見赤山湖林子求看換鵝帖胡郎傳送捕魚圖緝熙殿御製墨梅詩帖宣和妙賞緇衣句傳在夷門作勝談行殿春風四十載玉妃終老向江南葛嶺雜書小娃小艇無蹤跡只有荷花雨濺裙淨洗一方天水碧不教歌板汚遊雲避暑圖雪藕氷盤斫鱠厨波光簾影帶風蒲蒼生病渴無人問赤日黃埃盡畏途白無咎黃蜀葵金銅仙人雨中立鉛淚恰如辭漢時傾心脉脉何所待願見白日光陸離宋元詩㑹卷九十九
