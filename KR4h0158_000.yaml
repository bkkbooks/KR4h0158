body:
  text: 宋元詩會總集類提要臣等謹案宋元詩會一百卷國朝陳焯撰焯字默公桐城人順治壬辰進士選庶吉士以耳聾告歸不復出覃思著述取所見宋元詩人之作輯為此編每人各紀其爵里本末于下以備考訂雖甄録篇什無多而托拾家數頗為廣備王士禎香祖筆記稱康熙甲子奉使南海次相城焯過其客署二從者背負巨囊揖罷即呼具案顧從者取囊書數十大册羅列案上指示士禎曰此吾二十年來所輯宋元詩會若干卷將待君決擇之然後出而問世云云蓋即指是書而言是其卷帙本極繁富而今刋行之本僅止此數或經士禎鑒别之後焯重加釐定而復為刪繁以就簡者然上下數百年間詩家林立其源流姓氏一一粲然以視吳之振顧嗣立兩家雖浩博不及之而梗概亦已略具矣乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f9589a9ce41f3d57479b38083805618fcae3033bc4adc8b416d5c34810698fbc
