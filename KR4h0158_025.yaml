body:
  text: 宋元詩會卷二十五兵部主事陳焯編陳襄字述古侯官人少孤能自立舉進士調浦城主簿攝令事發姦如神知河陽縣當富弼為郡守一見即禮遇之及入相薦為祕閣校理判祠部出知常州入為開封府推官鹽鐡判官神宗立奉使朔方明年同修起居注知諫院改侍御史知雜事力論青苗法不便乞貶王安石吕惠卿以謝天下又請罷韓絳政府用杜大臣爭利而進者皆不聽召試知制誥辭不就試願補外帝特留修起居注踰年為知制誥安石欲出之帝不許尋直學士院安石益忌之摘其書詔小失出知陳州徙杭州以樞密直學士知通進銀臺司兼侍讀判尚書都省卒年六十四送關都官致仕鴻雁于飛送關公也公能以禮致仕惜其有老成德不衰不養于朝天子不用古禮留之故作是詩也鴻雁于飛歸戾于澤君子于田亦適維則旅力不愆曷云其極庶民之耋職自為愚君子之耋其德有濡旅力不愆曷云其劬有堅松柏君子斧之有實秠稷農夫有之天子有老曷其與歸野有白駒來食我牟君子之往胡為不留我心悠悠為天子之憂洛陽曲有客頓征轡暮宿洛陽堤洛陽繁華地慨然心傷悲憶昔季倫家朱門鼎貴時錦步四十里冠蓋相追隨寵移百琲珠醉擊珊瑚枝一旦委溝壑身隨朝露晞綺樓日顛仆金谷無人歸緑珠千古魂散作香塵飛荒榛塞中道惟有寒螿啼嗟哉百世後驕奢徒爾為荔枝歌番禺地僻嵐煙鎖萬樹纍纍産嘉果漢宫墜落金莖露秦城散起驪山火炎炎六月朱明天映日仙枝紅欲然自古清芬不能遏留得嘉名為椹仙上皇西去楊妃死巒海迢迢千萬里華清宮闕閴無人南來不見紅塵起至今榮植遍閩州離離朱實繁星稠一日為君空變色千里憑誰速置郵可憐錦幄神仙侣為飲凝漿滌煩暑綺筵不惜十千錢酩酊秦樓桂花醑秦樓女子繡羅裳鳯簫嗚咽流宮商醉歌一曲荔枝香席上少年皆斷腸古靈山試茶歌乳源淺淺交寒石松花墮粉愁無色明皇玉女跨神雲鬭剪輕羅縷殘碧我聞巒山二月春方歸苦霧迷天新雪飛仙鼠潭邉蘭草齊霧牙吸盡香龍脂轆轤繩細井花暖香塵散碧琉璃碗玉川冰骨照人寒瑟瑟祥風滿眼前紫屏冷落沈水煙山月堂軒金鴨眠麻姑癡煮丹井泉不識人間有上仙此景晚崿殘霞斷晴空宿靄收緑蕪天共逺明月水同流落葉填秋望孤砧答旅愁提壺伴詩筆獨醉庾公樓幽齋幽徑絶塵蹤莓苔上粉墉秋聲連夜雨寒色一溪松學有書千卷歡無酒萬鐘雲屏孤夢斷寂寞掩巫峰金華山人幽居倚翠巒塵事不相干天地醉來小琴碁靜裏歡雨苔春徑緑風竹夜窗寒若問長生術金爐有寶丹黑崖道中作隂山沙漠外六月苦行人水迸金蓮曉湯回鐡腳春馬飢思苑草僕病卧邊塵夜夢金華阻披衣望北辰舟次巴峽江流何險阻次第入三巴崖斷時無路山深更有家鄰蔬饒竹筍鄉果足枇杷况有荆州醖淹留不用嗟春日賞林亭把酒春亭覽衆芳水精簾箔逗山光孤松冷落千年換野槿紛華一日香緑圃煙深迷蛺蝶曲池波暖睡鴛鴦文園莫惜驦裘費買取宜城作醉鄉寄逺飛鵲翩翩暮欲棲楚天新月射璇題袖中已滅三年字心曲惟通一點犀步障影迷金谷路桃花香隔武陵溪瑶華好折無人寄腸斷江樓百尺梯夜意熏爐香燼蕙煙沈凜冽寒生翡翠衾月國音塵千里絶仙山樓閣五雲深離懷暗耿金壺漏獨夢多驚玉女砧騎省中郎才調逸擬將文筆賦秋心和正辭職方以濬河留滯萬鍤如雲濬禹溝荀卿橋畔艤行舟珠躔合照賢人聚銀漢無波海客留且作東山攜妓樂未應南浦送君愁辛夷花發春醅熟只俟郊原雨少休和徐通判九月望日始見菊花月滿霜飛菊始華幽叢冷落帶煙斜籬邊過却重陽酒澤畔誰憐野草花湖學先生歸解組安州司戶老居家皆因晚節無人用隕涕臨風為爾嗟登雄州南門偶書呈知府張皇城城如銀甕萬兵環悵望孤城野蓼間陂面緑隂通易水樓頭青靄見狼山漁舟掩映江南浦使驛差池古北關雅愛六韜名將後塞垣無事虎貔間使還咸熙館道中作土曠人稀驛路賖山中殊不類中華白沙有露鴛鴦泊芳草無情妯娌花氊館夜燈眠使節石梁秋吹動邊笳歸來覽照看顔色斗覺霜毛兩鬢加重陽閣下和同舍君逢佳節憶還家我亦淹留感歲華清禁讐書驚白髮故園吹帽負黃花謝安行有登山屐揚子居無載酒車何日得歸溪上隱大收圖史作生涯東園觀雪風毛雨絮小園東天幕低垂慘淡空蘋浦萬家雲覆瓦花溪千樹玉雕籠穿林已奪春梅蚤夾隴潛滋夏麥豐湘酌狐衣雖可賦豈無捐瘠在溝中古城蘆葦蕭疏天氣清水含山色照重城緑蕪何處管絃地碧落舊時鐘鼓聲三峽橋邊秋雨過六鼇宫裏夜潮生蕭郎秦女無歸約十二樓臺空月明和子瞻京口憶西湖寒食出遊見寄一首春隂漠漠燕飛飛可惜春光與子違半嶺煙霞紅斾入滿湖風月畫船歸緱笙一闋人何在遼鶴重來事已非猶憶去年題别處鳥啼花落客沾衣送别探得南字謫宦情牢落窮通理更諳讀書不廢事道古亦何慙昔喜鄰州守嘗陪後乘糝西湖遊未厭北海飲方酣躡屐扳雲嶠捫蘿訪竹菴鷺濤千頃雪鷲嶺萬堆藍聲遇時難一暌離歲忽三陪京方接畛歸省會同參士子文宗愈朝廷禮問𥅆好留君左右俄領郡東南嵗旱錢仍貴民飢命不堪下車寬賦役露冕訓田蠶畫舸乘春别新書卜日覃牙旗風發發瑞節虎耽耽龍鳯吳王國煙霞古佛龕荷香輕泛浦桂子靜飄嵐草澤行吟苦蘭陔奉養甘子文無愠色夷甫足清談物外𡨕天籟樽前據石楠惟應憐舊尹漁釣負江潭秦觀字少遊一字太虛髙郵人少豪俊工文詞以黃樓賦見蘇軾於徐州軾稱其有屈宋才登第調定海主簿用軾薦除國博遷祕省正字兼國史編修紹聖初坐黨籍出判杭州言者謂其增損寶録貶監處州酒稅冉削秩徙彬州編管橫州又徙雷州徽宗立復宣德郎放還至藤州出遊華光亭索水欲飲水至笑視之而卒年五十三有文集四十卷春日雜興四首潭潭故邑井猗猗上宮蘭不食自清泄莫服更幽間志士恥弱植卷迹甘飢寒佳晨追長覿觸物懸悲端川途眇回逺經歲曠音翰豈不慕裘馬詭得非所安蟬冕多怵迫繩樞鮮憂患枉尋竟何補方枘誠獨難寢瘵倦文史駕言從遨嬉颸風舉遙溆規日麗清漪含桃粲朱實杜若懷碧滋娉娉弱絮墮圉圉文魴馳明霞廓逺矚哀禽攪離思縟草天際合孤雲川上移寬間絶輪鞅重復多路岐信美難久佇歸歟從所治昔我遊京室交通五陵間主客各英妙𫀆馬相追攀千金具飲啜百金顧吹彈纓辨羅廣席當頭舞交竿鮮妝耀淥酒采纈生風瀾燈燭暗夜艾士女紛相班歡娛易徂歇轉盻如飛翰亹亹負孤願離離銜永歎山鳥窺茗飲簷花笑蔬餐棄捐勿重陳事定須蓋棺藝籍燔祖龍斯文就淪喪帝矜黔首愚諸雋一作雄出相望揚馬操宏綱韓柳激頽浪建安妙謳吟風槩亦超放玉繩帶華月艷艷青𡨕上奕世希末光經緯得無妄兒曹獨何事詆斥幾覆醬原心良自誣猥欲私所尚螳螂拒飛轍精衛填溟漲咄咄徒爾為滄海固無恙鵷鸞日雕滅黃口紛冗長投袂睇層霄兹懷誰與亮寄題傅欽之草堂河陽有洑流經營太行根盛德不終晦發為清濟源斯堂濟源上太行正當門仰視浮雲作俯窺流水奔修竹帶藩籬百禽鳴朝􅚐相望有盤谷李願故居存主人國之老實惟商巖孫班行昔供奉亟進逆耳言天子色為動羣公聲亦吞蕭條冰霜際不改白玉溫出處士所重其微難具論公勿思草堂朝廷待公尊次韻邢敦夫秋懷四首渤海有巨鼇其顛冠嵯峨宿昔常小抃八絃相蕩摩忽遭龍伯入一舉空潮波取皮煎作膠清此崑崙河蝮蛇初螫手壯士斷其腕豈不悲毁傷所恤在軀幹西羌沙鹵地置戍或煩漢雞肋不足云阿瞞妙思算匠氏構明堂百木入斤斧儻非豫章材冗長亦焉取英英范與蘇器識兼文武胡為老一州不用作霖雨憬彼髙句麗來修荒貢職天都富如海勞汝送涓滴舳艫尾相銜逺近困供億止沸當絶薪揚湯百無益同子瞻端午日遊諸寺賦得深字太史抱孤韻暢懷在登臨别乘慙鄒枚佳辰事幽尋參差水石瘦窅窕房櫳深清磬發疏箔妙香橫素襟復登窣堵坡環回矚嶔崟雙溪貫城郭暝色帶孤禽涼飈動爽籟薄雨生微隂塵想淡清漣牢愁洗芳斟揮箑訂往古援毫示來今悔無刻燭敏續此金玉音寄陳季常一鉤五十犗始具任公釣揭竿趨灌瀆與爾不同調先生本西蜀俠氣見英妙哀憐世間兒細點似黃鷂侍童雙擢玉鬢髮光可照駿馬錦障泥相隨窮海嶠平生攜手好十七登廊廟小生相吏耶徒枉尺書召暮年更折節學佛得心要鬻馬放阿樊幅巾對沈燎泠泠屋外泉兀兀原頭燒欲知山中樂萬古同一笑雷陽書事三首駱越風俗殊有疾皆勿藥束帶趨祀房瞽史巫紛若絃歌薦繭栗奴主洽觴酌呻吟殊未央更把雞骨灼一笛一腰鼓鳴聲甚悲涼借問此何為居人朝送殤出郭披莽蒼磨刀向豬羊何須作佳事鬼去百無殃舊傳日南郡野女出成羣此去尚應逺東門已如雲蚩氓託絲布相就通殷勤可憐秋胡子不遇卓文君海康書事十首白髮坐鉤黨南遷瀕海州灌園以糊口身自雜蒼頭籬落秋暑中碧花蔓牽牛誰知把鋤人舊日東陵侯荔子無幾何黃柑遽如許遷臣不惜日恣意移寒暑層巢俯雲水信美非吾土草芳自有時鴨鵊何關汝卜居近流水小集依嶔岑終日數椽間但聞鳥遺音爐香入幽夢海月明孤斟鷦鷯一枝足所恨非故林培塿無松柏駕言出焉遊讀書與意會却掃可忘憂尺蠖以時屈其信亦非求得歸良不惡未歸且淹留粵女市無常所至輒成區一日三四遷處處售蝦魚青裙腳不襪臭味猿與狙孰云風土惡白州生緑珠海康臘已酉不論冬孟仲殺牛撾祭鼓城郭為沸動雖非堯厯頒自我先人用大笑荆楚人嘉平獵雲夢粲粲菴摩勒作湯美無有上客賦驪駒玉奩開素手那知蒼梧野棄置同芻狗荆山玉扺鵲此事繇來久裔土桑柘稀蠶户不紡績吳綃與魯縞取具綱船客一朝南風下家室相咻迫半賈鬻我藏倍稱還君息一雨復一暘蒼茫颶風發怒號兼晝夜山海為顛蹶云何大塊噫乃爾不可遏黎明衆竅虛白日麗空濶合浦古珠池一熟胎如山試問池邊蜒云今纍年間豈無明月珍轉徙溟渤間何關二千石時至自當還右雷陽書事三首海康書事十首曹能始陳仲醇諸君皆以其詩入東坡集中近日坊刻詩鈔則將雷州三首互見東坡淮海二集而海康十首則專屬少遊俾覽者莫適為主焯按宋史兩公遷謫日月又考東坡年譜此十三首皆秦作非蘇詩也蓋蘇公於紹聖丁丑從惠州安置昌化其弟子由亦謫雷州是年五月十一日公過子由於藤因同行至雷六月十一日公别子由渡海屈指在雷未嘗一月淹也且其時公方病痔呻吟何暇詳究雷陽風俗而書之况灌園糊口鷦鷯一枝皆屬久居之事乎少遊從橫州徙雷州終哲宗之世至徽宗改元始得放還宜乎其屬詠之多也幽眠幽眠起常晚冬晷復不長中間數十刻倐如驚燕翔晨餐粗云畢申鼓鳴相望忽忽竟何就念之動中腸天地一逆旅死生猶轉商暫來旋云去遲速乃所常較計亦何補徒然費慨慷不如聽兩行一槩付酒觴北風吹老槐白日轉紙窗布衾一覺睡身世成渺茫宿莽冬不衰蘭茞幽更芳無庸傷局促速此鬢髮霜隕星石蕭然古丘上有石傳隕星胡為霄漢間墜地成此精雖有堅白姿塊然誰汝靈犬眠牛礪角終日蒙羶腥疇昔同列者到今司賞刑森然事芒角次第羅空青俯仰一氣中萬化無常經安知風雲會不復歸青𡨕山陽阻淺一日行一尺十日行一丈豈不歎淹留所幸無波浪悲風動深夜原野渺森爽青天行蟾蜍枯水轉魍魎此時蓬茅下去心劇於癢棄置勿復論通塞如反掌送洪景之循州參軍寒梅不自重輒花桃李先矯枉有佳菊最後衆芳妍各因一時美難以相嗤憐物理固若是士林亦宜然夫子南國俊聲猷推妙年數竒晚方偶參軍古龍川龍川雖云逺風物號清鮮羅浮不相下頡頏巉荒天雲鬢二三子聊足奉周旋行矣試老拳歸歟逺翔鶱茶茶實嘉木英其香乃天育芳不愧杜蘅清堪掩椒菊上客集堂寮圓月探奩盝玉鼎注漫流金碾響杖竹侵尋發美鬯旖旎生乳粟經時不銷歇衣袂帶紛郁幸蒙巾笥藏苦厭龍蘭續願君斥異類使我全芬馥擬孟郊曉風有暴信暮蟬無好聲曉風與暮蟬自與時節爭獨客辭故鄉推車謁梁城梁城道迢遞區區役吾生不如歸舊山藜藿安性情陳令舉妙奴詩西湖水滑多嬌嬙妙奴十二正芬芳肌膚晳白髮腳長含語未發先有香溪上夜燕侍簪裳皎如華月墮滄浪音聲入雲能斷腸不許北客辭酒漿主人藹藹邦之良少年射策謁未央俊詞偉氣森開張玉杓貫斗生怒芒天欲文采老更昌故使斂翮窺羣翔五十僅補尚書郎浩歌騎牛倚徜徉東風戲雨花草狂二溪泱泱青黛光妙奴勿倦侑羽觴主人正欲遊醉鄉和王通叟琵琶夢鶗鴂鳴時衆芳歇草堂夢斷音容絶風驚玉露不成圓一夜芙蕖泣秋月金紋桿面紫檀槽曾把花前送酒舠庾郎江令費珠璧小砑紅箋揮兔毫風流雲散令人瘦忍看麴塵昏錦綬楚水悠悠更不西上天破鑑空依舊輦下春晴樓闕過朝雨參差動霽光衣冠紛禁路雲氣繞宮牆亂絮迷春濶蔫花困日長經旬牽酒伴猶未獻長揚睡起睡起東軒下悠悠春緒長爬搔失幽囀款欠墮危芳蛛網留晴絮蜂房受晚香欲尋初斷夢雲霧已𡨕茫對淮南詔獄淮海行搖落文書亦罷休風霜欺獨宿燈火伴𡨕摉笳動朱樓曉參橫粉堞秋更拚飛鏡破應得大刀頭次韻答米元章嗜好清無滓周旋粲有文揮毫春在手岸幘海生雲花鳥空撩我尊鱸正屬君惟應讀雌霓差不愧王筠宿參寥房鄉國秋行暮房櫳日已暝驚風多犯竹破月不藏星鉤箔簷風動抄書燭燼零非關相見喜自是眼長青次韻傅道自適兼呈都司藝叟學士楚國陳夫子周南久滯留敝袍披稿葉瘦馬兀扁舟藥餌過三伏文書散百憂何人共禪悅居士有浮休謝李安上惠茶故人蚤歲佩飛霞故遣長鬚致茗芽寒槖遽收諸品玉午甌初試一團花著書懶復追鴻漸辨水時能效易牙從此道山春困少黃書剩校兩三家題閻求仁虛樂亭長官平昔嗜林丘僧與開亭待勝遊修竹回環扶碧瓦小池方折轉清流春深鶗鴂催詩句夜靜蟾蜍入釣舟只恐政成留不得縣人空此憶常遊流觴亭次韻卧龍西畔北池頭水擘華堂瑟瑟流幾曲漪漣盤翠帶一峯孤聳落蒼虬香囊近午清無汗素扇生涼爽入秋待喚畫師來貌取圖成便是竹溪遊别程公闢給事人物風流推鎮東夕郎持節作元戎樽前倦客劉師命月下清歌盛小叢裘敝黑貂霜正急書傳黃犬歲將窮買舟江上辭公去迥首蓬萊夢寐通遊龍門山次程公韻路轉橫塘入亂峯遍尋瀟灑興無窮樓臺特起喧卑外村落隨生指點中溪傍五雲清逗玉松分八面翠成宫歸途父老欣相語今日程公昔謝公遊龍瑞宫次韻靈祠真館閟山隈形勢相髙對越臺莓徑翠依屏上轉藕花紅繞鑑中開鶴銜寶箭排煙去龍護金書帶雨來夾道萬星攢騎火滿城爭看使君回酬朱李二君見寄東阡北陌坐淹時偶為髙風振羽儀十丈蓮花開處逺三年楮葉刻成遲鬢毛但速安仁老錢粟難輸曼倩飢尚賴故人遙省憶發揮春色有新詩萬古流空一鳥沈衣冠常苦事違心七行俱下知君舊四者難并笑我今梅已偷春成國色雲猶憑臘造天隂美人緑綺煩遙贈莫致南金增永吟寄題倪敦復北軒倪郎才韻照冰壺北向開軒頗自娛簷度蕙風鳴鴶鵴壁經梅雨畫螔蝓觥籌交錯銀河挂文史縱橫角簟鋪官舍私居同是漫莫嗟三徑就荒蕪次韻子由題摘星亭迷樓舊址崑崙左右兩招提中起孤髙雉堞西不見燒香成宿霧虛傳裁錦作障泥螢流花苑飛星亂蕪滿春城緑髮齊長憶憑欄風雨後斷虹明處海天低遊鑑湖畫舫珠簾出繞牆天風吹到芰荷鄉水光入座杯盤瑩花氣侵人笑語香翡翠側身窺緑酒蜻蜓偷眼避紅妝葡萄力緩單衣怯始信湖中五月涼春日寓直有懷參寥觚稜金爵自岧嶤藏室春深更寂寥捫蝨幽花攲露葉岸巾髙桞轉風條文書几上鬚髯變鞍馬塵中歲月鎖何日一笻江海上與君徐步看生潮顯之襌老許用草菴見處詩以約之橡葉岡頭釋馬銜區中竒觀得窮探崖空飛鼠聲相應江靜羣峰影倒涵居士碧雲裁秀句道人哀玉扣清談偶成二老風流事不是三乘宿草菴和孫莘老遊龍洞葦蕭傅火度𡨕𡨕乍入清都醉魄醒草隱月崖垂鳯尾風生隂穴帶龍腥壁間泉貯千鍾碧門外天橫數尺青更欲仗笻留頃刻却疑朝市已千齡西城宴集元祐七年三月上已詔賜館閣官花酒以中浣日遊金明池瓊林院又會於慶國夫人園會者二十有六人二首春溜泱泱初滿池晨光欲轉萬年枝樓臺四望煙雲合簾幕千家錦繡垂風過忽聞花外笑日長時奏水中嬉太平誰謂全無象寓在羣仙把酒時宜秋門外喜參尋豪竹哀絲發妙音金爵日邉棲壯麗彩虹天際卧清深已煩逸少書陳迹更屬相如賦上林猶恨真人足官府不如魚鳥自飛沈寄題趙侯澄碧軒風流公子四難并更引清漪作小亭潤及玉階春漲雨光浮藻井夜涵星捲簾几硯成圖畫倚檻鬚睂入鏡屏何日解衣容借榻卧聽螭口㵼泠泠贈劉使君景文落落衣冠八尺雄魚符新賜大河東穰苴兵法由司馬曹植詩原出國風拈筆古心生篆刻引觴俠氣上雲空石渠病客君應笑手校黃書兩鬢蓬劉遜父示以寧齋詩二軸次韻還之揚舲偶過海邉州一見名郎破百憂荀氏諸龍俱俊偉河東小鳯最風流明珠白璧堪投報細草幽花入獻酬别駕舊齋何足念文昌新府待公遊次韻宋履中近謁大慶退食館中翠華初到殿中間三館諸儒共一班迎謁曉廷清蹕近退穿春仗綵旓間病來怕飲東西玉老去慚陪大小山知續春明退朝録借觀當奉一鴟還會蓬萊閣冠裳列坐灑清風軒外時聞韻籜龍人面春生紅玉液銀盤煙覆紫駝峰天涵秋色山山共樹攪鄉思葉葉重正欲買船江北去為懷明德更從容秋興擬杜牧之鼓鼙夜戰北窗風霜葉鋪階疊亂紅一假新愁驚枕上幾聲悲雁落雲中眼前時節看馳馬日下生涯寄斷蓬弟妹别來勞夢寐杳無消息過江東秋興擬白樂天不因霜葉辭林去的當山翁未覺秋北里酒錢煩屢索南州詩債懶頻酬欲歌金縷羞紅粉擬插黃花避白頭底事登臨好時節等間收拾許多愁中秋口號雲山簷楯接低空公宴初開氣鬱蔥照海旌幡秋色裏激天鼓吹月明中香槽旋滴珠千顆歌扇驚圍玉一叢二十四橋人望處台星正在廣寒宮還自湯泉十四韻歲晚倦城郭聨驂度嶪峩天黃雲腳亂村黑鳥翎訛潦水侵生路晴天落漫坡澄江練不卷溫井鑑新磨漁火分星逺沙鷗散點多霸祠題玉筯龍窟受金波琬琰存吳事兒童記楚歌孤龕瘦居士雙塔老頭陀飛鼠鳴深穴胡蜂結巧窠晚參團白足昏梵禮青螺雲馭沈荒甃仙舂沒淺莎杖藜從莫逆談笑入無何淡蕩日連霧蕭騷風轉阿華清俄夢斷回首失煙蘿寧浦書事揮汗讀書不已人皆怪我何求我豈更求聞達日長聊以消憂泗州東城晚望渺渺孤城白水環舳艫人語夕霏間林梢一抹青如畫應是淮流轉處山春日金屋舊題煩乙子蜜脾新採賴蜂臣蜻蜓蛺蝶無情思隨例顛忙過一春秋日二首霜落𨝍溝積水清寒星無數傍船明菰蒲深處疑無地忽有人家笑語聲月團新碾瀹花瓷飲罷呼兒課楚詞風定小軒無落葉青蟲相對吐秋絲春日偶題呈錢尚書三年京國鬢如絲又見新花發故枝日典春衣非為酒家貧食粥已多時蚤春黃金蔌蔌滿垂楊尚有春寒到畫堂酒力漸銷歌扇怯入簾飛雪帶梅香無題掃地燒香閉閣眠簟紋如水帳如煙客來夢覺知何處挂起西窗浪接天金山晚眺西津江口月初弦水氣昏昏上接天清渚白沙茫不辨只應燈火是漁船處州間題清酒一杯甜似蜜美人雙鬢黑如鴉莫誇春色欺秋色未信桃花勝菊花口號美酒忘憂之物流光過隙之駒不稱人心十事常居八九得開口笑一月亦無二三莫思身外無窮且賭尊前見在功名富貴何異楚人之弓城郭人民問取遼東之鶴付與香鈿畫鼓盡歡美景良辰欲奏長謠聊陳短韻平原居士今無影鸚鵡空洲誰舉杯猶有漁陽撾鼓在為君醉後作輕雷司馬槱字才仲陜州夏臺人用蘇軾薦應制舉中等為錢塘幕官洛春謠洛陽碧水揚春風銅駝陌上桃花紅髙樓疊栁緑相向綃帳金鸞香霧濃錦裘公子五陵客拳毛赤兔雙蹄白金鈎寶玦逐飛香醉入花叢惱花魄青娥皓齒别吳倡梅粉妝成半額黃羅屏繡幕圍寒玉帳裏吹笙學鳯凰細緑圍紅曉煙溼車馬騑騑雲櫛櫛瓊蘂杯深琥珀濃鴛鴦枕鏤珊瑚澀吹龍笛歌白紵蘭席淋漓日將暮君不見灞陵岸上楊柳枝青青送别傷南浦妾薄命二月東風吹不惡後園桃李先春落髙堂去婦對花愁君恩非輕妾命薄憶昔三星光在天煌煌車馬朱門前結褵幸得事君子願託絲羅千百年履䀶才遍君家地相看已覺君心異門外新歡一破顔室中舊愛雙垂淚妾心比玉自堅貞君眼如星到處明女子暌離泰山重丈夫棄置鴻毛輕莫誇緑髮紅顔好女色由來不長保君不見灞上鑾輿祓禊回阿嬌已向長門老豐稷字相之明州鄞人登第為榖城令以廉明稱使髙麗海舟遇風幾覆衆惶擾莫知所為稷神色自若神宗召對問卿昔遭海風何以不畏對曰仗陛下威靈何畏之有帝悅擢監察御史徙著作佐郎吏部員外郎提點利州成都路刑獄入為殿中侍御史遷右司諫抗言宗王僭侈官吏承奉皆宜紏正改國子司業歷祭酒除刑部侍郎兼侍讀出知潁州江寧府拜吏部侍郎又出知河南府蓋章惇素憾稷欲以道路困之徽宗立召為左諫議大夫首劾蔡京姦狀京遂去翰林時宦官漸盛稷懷唐書仇士良傳讀於帝前曾布將拜相稷約同僚共論之值轉工部尚書布遂相稷謝表有佞臣之語帝問為誰對曰曾布也改禮部帝待之厚欲大用而積忤貴近終不得留竟用密直守越蔡京得政修舊怨貶海州團練副使安置台州卒年七十五建炎中追復學士諡清敏荷花桃杏二三月此花泥滓中人心正畏暑水面獨搖風淨剎如金湧嘉賔照幕紅誰歌采菱曲舟在晚霞東鄭獬字毅夫安陸人少負俊才詞章豪偉峭整流單不敢望舉進士第一通判陳州入直集賢院度支判官修起居注知制誥英宗即位冶永昭山陵悉用乾興制度獬言國用空乏宜飭有司從儉又請申詔中外許令陳言以訪時政得失帝嘉納之出知荆南還判三班院神宗初召獬夕對內東門命草三制賜雙燭送歸舍人院遂拜翰林學士權發遣開封府以不用新法為王安石所惡出知抗州徙貴州引疾乞提舉鴻慶宫卒年五十一採鳬茨朝攜一筐出暮攜一筐歸十指欲流血且急眼前飢官倉豈無粟粒粒藏珠璣一粒不出倉倉中羣鼠肥明皇四海不搖草九重藏禍根十年傲堯舜一笑破乾坤猿狖皆冠冕豺狼盡子孫潼關兵已破會憶老臣言蠡口絶句千重越甲夜城圍戰罷君王醉不知若論破吳功第一黃金印合鑄西施朱長文字伯原吳郡人著書閲古名動京師元祐中召為太學博士遷祕書正字曾著琴史有文集三百卷别號樂圃詠齋偶書呈子通無隱夙志在蕭間獲此遁幽迹喬林無冬春蒼藹異晨夕旁窺疑好峰俯瞰驚峭壁浩然溪山興盡在陶潛宅杖藜行水邉萍際湛空碧良魚不輕遊弱魚猶自惜吟髭不禁霜曉鏡見蚤白古人已深歎信是林園客遣纍假禪鋒陶情任詩格寄聲招友人來看亭前柏柬隱者不愛紛華愛寂寥松風竹月共蕭蕭因隨野鶴過三徑每對江鷗洗一瓢無復塵埃沾短褐尚思煙水泛歸橈道人肯與羲之友飛錫重來莫待招宋元詩會卷二十五
