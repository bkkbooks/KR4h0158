body:
  text: 宋元詩會卷三十九兵部主事陳焯編王十朋字龜齡溫州樂清人少以文行名鄉里聚徒梅溪受業者衆入太學主司異其文適秦檜死上親政策士十朋對策萬餘言上嘉其淹通醇正擢第一學者傳誦擬諸鼂董授紹興府簽判召為祕書郎兼建王府教授時言路久塞十朋與馮方胡憲查籥李浩相繼論事太學生為五賢詩除著作郎遷宗丞請祠歸孝宗立起知嚴州召對稱㫖除起居郎十朋覩上英鋭每見必陳恢拓大計上雖嘉納而親賢遠奸其説不能盡行除吏侍力辭出知饒州移湖州所至布上恩恤民隱民間繪像祠之去則流涕如思父母晩得足疾以龍圖閣學致仕卒年六十諡忠文雜詩二首直道疾伊優壯懷憎靡曼海上豕方牧夜中牛屢飯半生營一名偃蹇未如願青銅忽自照白髪已堪歎斥鷃適蓬蒿大鵬摶九萬物情貴得所奚用求自獻富貴似可喜貧賤亦何怨古書恣掀翻古意薄窺瞰心將遊寂寞語復攻苦淡實淺名寄浮才疎得懲濫守志懼不堅入道恐成暫性天戒戕賊心猿思繫䌫有友頻琢磨無官自校勘澹然學揚雄不恨儲無甔甽畝三首仲尼作春秋垂訓千萬年古者父母讐義不共戴天莊同父何在乃與齊侯田魯國無臣子君親義茫然齊紀不並立諸兒得稱賢善惡不可掩筆削至今傳飛飛古帝魂哀哀寄春怨異鄉節物新故國人事變訴亡誰肻憐啼苦血空濺雲安再拜人傷哉不復見兀兀窗下士筆耕志良苦黄卷對聖賢慷慨深自許一朝出干禄得失戰胸宇曲意阿有司諛言徇人主貪榮無百年貽謗有千古丈夫宜自貴清議重刀斧觀國朝故事三首昔在景徳初旄頭震邊闗朝廷用萊公决策幸澶淵高瓊雖武夫能發忠義言咏詩退敵騎用媿樞相顔鑾輿至北城斷橋示不還一箭斃闕覽夜半歌凱旋至仁不忍殺和好垂百年偉哉澶淵功天子能用賢昔在康定初元昊叛西陲朝廷起韓范節制閫外師二公人中龍材略超等夷胸中百萬兵對面千里機不比大老子而令敵能欺深期復靈夏重勒燕然碑軍中果興謠西賊心胆隳逆節遂稱臣戰士解甲歸社稷安泰山四海絶瘡痍堂堂寧復有為作思賢詩昔在元祐初朝廷用老成元惡首竄殛賢雋偕彚征簾帷八年政内外咸清明四荒各自守天下㡬太平紹聖黨論起宵人壞典刑二蔡倡繼述曲學尊金陵忠良投海島黨籍編姓名春秋亦獲罪學者專三經心術遂大壞風俗從此傾養成前日禍中原厭灰塵我欲著一書善惡深勸懲六賊未足罪禍端首熙寧遊西岑遇雨西岑風物秋更嘉杖藜出郭歡無涯深村有酒隔烟渚共乗小艇穿蘆花羅裠婥約越溪女茅舎迫窄吳儂家牀頭新釀喜正熟千金倒甕傾流霞天公妬我一日樂俄然雨腳來如麻醉歸扶路泥沒股冠巾不整頭鬖髿人生貴在適意耳安能局縮身如蝸杖頭有錢即相覔明日更泛僊源槎西征紹興建元二十二良月壬午時丁未王子辭家遊帝都出門滿眼思親淚鶺鴒送我過原隰朋友攜尊宿蕭寺朝離黄塘惜分别莫宿青江嗟獨自初心滿擬遊鴈山行止非人輙乖異黃嵒留連越三宿故舊過從日沈醉鄭生伴我千里行近古人無此風義皇華亭上一囘首陡覺眉頭起鄉思西江十里浮橋邊把酒登樓吟擁鼻山行初逢建子月入眼梅花已春意前觀三渡覺非舊下視兩灘真可畏渡頭僊人還笑我髭鬚如棘猶名利欲入天台觀石橋行李悤悤未能遂途中邂逅張老丞十五年前樂清尉自嗟吾非沈謝輩面目從來苦難記飛泉枕上夢成魔達旦思家可曽睡細雨濛濛入闗嶺旅邸重尋舊題字雨脚微収過天姥洗出峰巒疊蒼翠劉阮祠荒土猶赤溪山真是神僊地道旁石現小金僊傳舎荒凉誰廢置柘溪竹染兒女痕石嶺松含柱梁器路入南明觀石佛樓閣岧嶤更深邃八年行役兩來遊嵒上題詩記前事乘興剡溪尋故人久别相逢雜悲喜義風吹水送行舟越國江山滿瞻視十四嵗娥孝且烈三百里湖明更媚千巖競秀壑爭流終日貪看趣遙寄西興渡口聲如雷銀浪崔嵬魄驚悸江神為我風色平天闕煌煌瞻象魏賢闗訪舊話酸辛更食虀鹽舊滋味學官欲以職事留自媿非才力辭避觀臺雲物端可書宫線初長日南至龍山僦舎觀大禮儀仗森然典文備人臣貴盛古今無秦公父子俱為使景靈告謝樂聲回鵷鷺花枝侈君賜西遊連日睹天顔和氣氤氲散惟悴嵗云莫矣却歸來捉筆書為于役志柘溪道旁斑竹男兒有淚不染竹當作包胥賈生哭湘源遺種雖可愛節目尚餘兒女態誰能千里移此根出門又恐添啼痕不如還家種慈竹簷前不厭千竿綠遊簫峰蠟屐穿雲去山深喜路通人家煙色裏古寺水聲中金濺星猶在丹成竈已空吹簫人不見臺下想僊風送劉方叔兼簡全之相見無多日依前又索居斷魂梅的皪過眼栁蕭疎匹馬來時路征鴻别後書君歸見温叟為我問何如宿黄巖妙智院問訊開山始于今二百年徑幽微見竹社廢尚遺蓮觀頌思元老遊庵憶舊禪悤悤一宿客未盡滌塵緣宿浮橋落日丹丘下西江十里西浮橋通古道逆旅傍清溪夜靜水聲細曉隂山色迷吾鄉在何處天遠白雲低詠栁東君於此最鍾情粧㸃村村入畫屏向我無言眉自展與人非故眼猶青縈牽别恨絲千尺斷送春光絮一亭葉底黄鸝音更好隔溪煙雨醉時聽寄夢齡昌齡弟老去生涯集百憂一身萍泛剡溪頭釣魚温水同侯喜旅食新豐類馬周長鋏有時思海味短檠終夜照離愁也知四海皆兄弟能似天生羽翼不行香報恩精舎籃輿拂曉出東闗鍾磬聲聞杳靄間心欲報恩頻入院人逢勝已更觀山竹香細細禪房靜江水湯湯野渡閒欲向漁翁問興廢黄鸝隔葉語綿蠻陸游字務觀越州山隂人年十二能詩文䕃補登仕郎以薦名在秦檜孫前為檜所惡檜死始赴福州寧惪簿孝宗即位賜進士出身語觸權貴出判州府范成大帥蜀游為參議官用文字交不拘禮法人議其放遂自號放翁稍遷禮部郎中修孝宗光宗兩朝實錄及三朝史未就詔游權同修國史實錄院同修撰免奉朝請尋兼祕監三年書成陞寳章閣待制封渭南伯致仕卒年八十五秋郊有懷二首楚人固多孱妄謂秋可悲寧知河嶽間氣俗樂此時壯士鳴鵰弓健馬嚼枯萁日馳三百里榆關赴戰期陣雲壓龍庭殺氣搖參旗熾火燎狐倒瀉黄金巵勒銘燕然石千載鎮荒陲安能空山裏凍研哦清詩秋山瘦益竒秋水淺可涉出城西風勁拂㡌吹脱葉新霜拆栗罅宿雨飽豆莢枯栁無鳴蜩寒花有穿蝶郊行得幽曠頗覺耳目愜斷雲北山來欣然與之接挂冠易事爾看鏡歎勛業永懷桑乾河夜渡擁馬鬛醉歌讀書三萬卷仕宦皆束閣學劍四十年木血未染鍔不得為長虹萬丈掃寥廓又不為疾風六月送飛雹戰馬死槽櫪公卿守和約窮邊指淮淝異域視京雒於乎此何心有酒吾忍酌平生為衣食歛版靴兩脚心雖了是非口不給唯諾如今老且病鬢秃牙齒落仰天少吐氣餓死實差樂壯心埋不朽千載猶可作箕卜孟春百草靈古俗迎紫姑厨中取竹箕冐以婦帬襦䜿子夾扶持挿筆祝其書俄若有物憑對畣不須臾豈必考中否一笑聊相娛詩章亦間作酒食隨所須興闌忽辭去誰能執其袪持箕畀竈婢棄筆卧墻隅几席亦已徹狼籍果與蔬紛紛竟何益人鬼均一愚送子龍赴言州掾我老汝遠行知汝非得已駕言當送汝揮涕不能止人誰樂離别坐貧至于此汝行犯胥濤次第過彭蠡波横吞舟魚林嘯獨脚鬼野飯何店炊孤櫂何㟁檥判司比唐時猶幸免笞箠庭參亦何辱負職乃可恥汝為吉州吏但飲吉州水一錢亦分明誰能肆讒毁聚俸嫁阿惜擇士教元禮我食可自營勿用念甘旨衣穿聽露肘履破從見指出門雖被嘲歸舎却睡美益公名位重凜若喬嶽峙汝以通家故或許望燕几得見已足榮切勿有所啟又若楊誠齋清介世莫比一聞俗人言三日歸洗耳汝但問起居餘事勿挂齒希周有世好敬叔乃鄉里豈惟能文辭實亦堅操履相從勉講學事業在積累仁義本何常蹈之則君子汝去三年歸我儻未即死江中有鯉魚頻寄書一紙雜興四首仕宦徧四方每出歸愈貧寒暑更質衣笑倒鄰里人今年作史官坐縻太倉陳無如思歸何日夜望絶麟區區牛馬走齪齪蟣蝨臣恩深老不報肝膽空輪囷觀人如觀玊拙眼喜譏評得失顧在人玊固非所病慶厯嘉祐間人才於斯盛王回僅一招石介棄不聘乃知天下士成敗各有命願君姑安之天定豈不勝魯山粹而博韶美曠且真石渠東觀中久矣無若人飛僊驂鳳鸞豈久混世塵空餘文章在常與日月新我雖不足數疇昔忝交親尚想秋燈下對影欹幅巾君子尚大節又甚惡不情魯連故可人用意終近名千載高夷齊采薇忘其生周公述易象所以貴幽貞去聖雖已逺江左見淵明我讀飲酒詩朱絃有遺聲病後作骨相坐一寒仕宦經百謫晩入文昌省又坐煩言嘖詔書復収召付以大典册期年甫奏篇皇恐亟自劾歸來稽山下三食新穫麥草屨布帬孺徒步老阡陌今年疾屢作怳若將歸客道士言犯土拜章安舎宅巫言神去幹剪紙招魂魄把臂忽自悟此豈屋漏脉盡去囊中藥黙觀鼻端白正氣徐自還鬼子何足磔初秋夢故山覺而有作二首昔我東歸時父老迎船頭開篷相勞苦怪我頷雪稠故山何負君且作數月留豈知席未暖匹馬來南州蠻花四時紅瘴霧日夜浮歸哉不可遲勿與婦子謀杜宇真吾交勸去恨不速忠告輸肝肺厚意均骨肉陋哉鷓鴣語揣我貧念禄竹鷄更鄙淺泥淖憂車軸秋風嚴瀨清春雨戴溪綠行矣勿復疑照影巾一幅石首縣雨中繫舟戲作短歌庚寅去吳西適楚秋晩孤舟泊江渚荒林月黒虎欲行古道人稀鬼相語鬼語亦如人語悲楚國繁華非昔時章華臺前小家住茆屋雨漏秋風吹悲哉秦人真虎狼欺侮六國囚侯王亦知興廢古來有但恨不見秦先亡開窗酹汝一杯酒等為亡國秦更醜驪山冡破已千年至今過者無傷憐風雨中望峽口諸山竒甚戲作短歌白鹽赤甲天下雄拔地突兀摩蒼穹凜然猛士撫長劍空有豪健無雍容不令氣象少渟滀常恨天地無全功今朝忽悟始歎息妙處元在煙雨中太隂殺氣横慘淡元化變態含空濛正如竒材遇事見平日乃與常人同安得朱樓高百尺看此疾雨吹横風岳池農家春深農家耕未足原頭叱叱兩黄犢泥融無塊水初渾雨細有痕秧正緑緑秧分時風日美時平未有差科起買花西舎喜成婚持酒東鄰賀生子誰言農家不入時小姑畫得城中眉一雙素手無人識空村相喚看繅絲農家農家樂復樂不比市朝爭奪惡宦遊所得真幾何我已三年廢東作春愁曲客話成都戲作虙羲至今三十餘萬歲春愁嵗嵗常相似外大瀛海環九州無有一州無此愁我願無愁但歡樂朱顔緑鬢常如昨金丹九轉徒可聞玊千年空擣藥蜀姬雙鬟婭姹嬌醉看恐是海棠妖世間無處無愁到底事難過萬里橋錦亭天公為我齒頰計遣飫黄甘與丹茘又憐狂眼老更狂令看廣陵芍藥蜀海棠周行萬里逐所樂天公於我元不薄貴人不出長安城寶帶華纓真汝縛樂哉今從石湖公大度不計聾丞聾夜宴新亭海棠底紅雲倒吸玻璃鍾琵琶絃繁腰鼓急盤鳳舞衫香霧濕春醪凸盞燭光搖素月中天花影立遊人如雲環玊帳詩未落紙先傳唱此邦句律方一新鳳閣舎人今有様放歌行君不見汾陽富貴近古無二十四考書中書又不見慈明起自布衣中九十五日至三公人生窮達各有命拂衣徑去猶差勝介推焚死終不悔梁鴻寄食吾何病安用隨牒東復西獻諛耐辱希階梯初無公論判涇渭徒使新貴矜雲泥稽山一老貧無食衣破履穿面黧黑誰知快意舉世無南山之南北山北山頭石秋風萬木霣春雨百草生造物初何心時至自枯榮惟有山頭石歲月浩莫測不知四時運常帶太古色老翁一生居此山脚力欲盡猶躋攀時時撫石三歎息安得此身如爾頑貧甚作短歌排悶閒何濶逢諸葛畏人常憂不得活事不諧問文開不蹋權門更可哀即今白髪如霜草一飽茫然身已老惟有躬耕差可為賣劍買牛悔不早年豐米賤身獨饑今朝得米無薪炊地上去天八萬里空自呼天天豈知將進酒我欲挽住北斗杓常指蒼龍無動搖春風日夜吹草木只有榮盛無時凋我欲剗斷日行道陽烏當空月杲杲非惟四海常不夜亦使人生失衰老如山積麴高崔嵬大江釀作蒲萄醅頽然一醉三千杯借問白髪從何來海棠歌我初入蜀鬢未霜南充樊亭看海棠當時已謂目未睹豈知更有碧鷄坊碧鷄海棠天下絶枝枝似染猩猩血蜀姬艶妝肻讓人花前頓覺無顔色扁舟東下八千里桃李真成僕奴爾若使海棠根可移揚州芍藥應羞死風雨春殘杜鵑哭夜夜寒衾夢還蜀何從乞得不死方更看千年未為足短歌行富貴得意如登天自計一跌理不全晝食忘味夜費眠渠過一日如一年春蠶得衣耕得食農功初成各休息賣酒壚邊紛鼓笛我過一年如一日二者求兼勢安可與我周旋寧作我春城桃李豈不妍雪澗未妨松磊砢人生禍福難遽論廟犧烏得為孤豚君不見獵徒父子牽黄犬歲歲秋風上蔡門湖山尋梅鏡湖渺渺煙波白不與人間通地脉騎龍古僊絶火食慣住空山齧冰雪東皇髙之置度外正似人中巢許輩萬木僵死我獨存本來長生非返魂晩雨蕭瑟度橫塘霏微映繚墻壓低塵不動洒急土生香聲入楸梧碎清分枕簞凉囘頭忽陳迹簷角挂斜陽骨相骨相元知薄功名敢自期病侵强健日閒過聖明時形勝輪臺地飛騰瀚海師江湖雖萬里猶擬綴聲詩病中風雨暗江天幽窗起復眠忍窮安晩境留病壓災年客助修琴料僧分買藥錢餘生均逆旅未死且陶然排悶老去知心少流塵鎖斷絃尊空問字酒囊罄作碑錢掃葉供朝爨和泥補漏船胸中元浩浩白眼望青天春殘老墮空山裏春殘白日長庸醫司性命俗子議文章燭映一池墨風飄半篆香此中有佳處袖手看人忙村夜寂寂山村夜悠然醉倚門月昏天有暈風輭水無痕迹為遭䜛遠身由不仕尊敢嗟車馬絶同社自鷄豚遊雲山諸蘭若花過木隂合溪雲生暮凉牛行響白水鷺下㸃青秧古寺宛如昔穉松森已行耆年不下榻童子為燒香夜分不寐起坐園中至旦凉氣蘇衰疾幽情入杖藜月驚孤鵲起天帶衆星西松菊今彭澤山川古會稽清吟殊未愜喔喔巳晨雞春晩雜興二首池面萍初紫墻頭杏已青攜兒撐小艇留客坐孤亭相法無侯骨生平直酒星正須遺萬事莫遣片時醒小市湖橋北幽居石埭西蒲深姑惡哭樹密姊歸啼山茗封青箬村酤坼赤泥平生汗簡手投老慣扶犂晩秋山園即事河岸風檣逺村陂牧笛長短籬圍麂眼幽徑繚羊腸照水鬚眉見搓橙指爪香衣裘又闗念碪杵滿斜陽枕上病叟少安枕驚禽無穩棲慵占賈誼鵩空感祖生雞野勢風號北窗痕月過西元非破賊手只合架牛犂遣興徑遊觀足蝸廬卧起寛垂名千古易無媿寸心難燈火娛清夜風霜變早寒一經家世事吾興未應闌雜書幽居事二首抱瓮窮園叟還山老布衣死邊常得活閙處偶容歸釣恐魚吞餌棋憂客墮機此心君會否洗盡百年非庭曠多延月齋空半貯雲松聲行路共泉脈近鄰分采藥九蒸晒朝真三沐熏林間有叢杞繞屋夜狺狺秋懷秋暑雖猶在晨興氣已清蠻童掃荒徑獠婢滌空鎗病樹有凋葉殘蟬無壯聲書生守故態已復理燈檠寓興窮巷無來客秋風獨浩歌壯年閒處老佳日病中過甚欲攜長鑱仍思擁短蓑逢山皆可隱不必上三峩村居富貴功名不擬論且浮舴艋寄煙村生憎快馬隨鞭影寧作癡人記劍痕樵牧相安欲爭席比鄰漸熟約論婚晨舂夜績吾家事正要遺風付子孫上虞逆旅見舊題嵗月感懷舴艋為家東復西今朝破曉下前溪青山缺處日初上孤店開時鶯亂啼倦枕不成千里夢壞墻閒覔十年題漆園傲吏猶非達物我區區豈足齊晩泊半世無歸似轉蓬今年作夢到巴東身遊萬死一生地路入千峰百嶂中隣舫有時來乞火叢祠無處不祈風晩潮又泊淮南岸落日啼鴉戍堞空雨中泊趙屯有感歸燕羇鴻共斷魂荻花楓葉泊孤村風吹暗浪重添纜雨送新寒半掩門魚市人烟横慘淡龍祠簫鼓閙黄昏此身且健無餘恨行路雖難莫更論馬上殘年流轉似萍根馬上傷春易斷魂烘㬉花無經日蕊漲深水過去年痕迷行每問樵夫路投宿時敲竹寺門不信太平原有象牛羊㸃㸃散煙村果州驛驛前官路堠纍纍歎息何時送我歸池館鶯花春漸老窗扉燈火夜相依孤鸞怯舞愁窺鏡老馬貪行强受鞿到處風塵常撲面豈惟京洛化人衣赴成都泛舟自三泉至益昌謀以明年下三峽詩酒清狂二十年又摩病眼看西川心如老驥常千里身似春蠶已再眠暮雪烏奴停醉㡌秋風白帝放歸船飄零自是闗天命錯被人呼作地僊晩登望雲一出修門又十年輩流多已珥金蟬衰如蠧葉秋先覺愁似鰥魚夜不眠輦路疎槐迎駕處苑城殘日泛湖天君恩未報身今老徙倚危樓一泫然醉中感懷早嵗君王記姓名只今顦顇客邊城青衫猶是鵷行舊白髪新從劍外生古戍旌旗秋慘淡高城刁斗夜分明壯心未許全消盡醉聽檀槽出塞聲登樓從來好境遍人間無奈勞生自欠閒江近時時吹白雨樓高面面看青山歌聲哀怨傳三峽行色凄凉帶百蠻嘉陽近諸蠻流落愛君心未已夢魂猶綴紫宸班快晴地濶天門斗柄回今朝紅日遍池臺新陽蘇醒春前栁輕暖醫治雪後梅瓦屋螺青披霧出錦江鴨緑抱山來衰翁也逐兒童喜旋撥文書近酒杯雨後集湖上野水交流自滿畦芳池新漲恰平堤花藏宻葉多時綻鶯占高枝盡日啼繡袂寶帬催結束金尊翠杓共提攜白頭自喜能狂在笑襞蠻牋落醉題晩登横溪閣樓鼓聲中日又斜憑高愈覺在天涯空桑客土生秋草野渡虚舟集晩鴉瘴霧不開連六詔俚歌相合帶三巴故鄉可望應添淚莫恨雲山萬疊遮小飲房園宦遊到處即忘家况得閒身管物華疎索故人緣病酒折除厚祿為看花泥新高閣初巢燕萍匝荒池已集蛙斟酌人生要行樂燈前起舞落烏紗月下醉題黄鵠飛鳴未免饑此身自笑欲何之閉門種菜英雄老彈鋏思魚富貴遲生擬入山隨李廣死當穿冡近要離一樽强醉南樓月感慨長吟恐過悲和范待制秋興二首策策桐飄已半空啼螿漸覺近房櫳一生不作牛衣泣萬事從渠馬耳風名姓已甘黄紙外光隂全付綠尊中門前剝啄誰相覔賀我今年號放翁睡臉餘痕印枕紋秋衾微潤覆爐熏井桐搖落先霜盡衣杵凄凉帶月聞佛屋紗燈明小像經奩魚蠧蝕真文身如病驥惟思卧誰許能空萬馬羣幽居殊方飄泊向誰論小住僧廬亦所欣得飽罷揮求米帖愛眠新著毁茶文摘蔬籃小霑清露斸藥鉏輕帶濕雲從此生涯足幽事宦遊虚用半生勤悲秋一抛蓑笠雪溪舟八載凉州復益州纔破繁華海棠夢又驚搖落井梧秋曉班無復趨行殿晩境惟思老寢丘病肺經旬疎酒盞愁來惟是上南樓江樓醉中作淋漓百榼宴江樓秉燭揮毫氣尚遒天上但聞星主酒人間寧有地埋憂生希李廣名飛將死慕劉伶贈醉侯戲語佳人頻一笑錦城已是六年留簡譚徳稱幼輿骨相稱山嵒自要閒遊不避䜛錦里先生為老伴玊霄散吏是頭銜探春苑路花篸㡌看月江樓酒滿衫惟恨題詩無逸氣媿君陣馬與風颿閒意柴門雖設不曾開為怕人行損綠苔妍日漸催春意動好風時捲市聲來學經妻問生疎字嘗酒兒斟㶑灔杯安得小園寛半畝黄梅綠李一時栽泊公安縣秦闗蜀道何遼哉公安渡頭今始回無窮江水與天接不斷海風吹月來船窗簾捲螢火閙沙渚露下蘋花開少年許國忽衰老心折柁樓長笛哀登賞心亭蜀棧秦闗歲月遒今年乘興却東遊全家穩下黄牛峽半醉來尋白鷺洲黯黯江雲𤓰步雨蕭蕭木葉石城秋孤臣老抱憂時意欲請遷都涕已流沂谿射的峰前禹廟東短篷三扇卧衰翁閒攜清聖濁賢酒重試朝南暮北風水落痕留紅蓼節雨來聲滿綠蒲叢衝烟莫作悤悤去擬看溪丁下釣筒自雲門之陶山肩輿者失道行亂山中有茅舎小塘極幽邃求見主人不可意其隱者也陂池幽處有茅堂井臼蕭條草樹荒小鴨怯波時聚散病蔬傷蠧半青黄兒童衝雨収魚網婢子聞鐘上佛香我亦暮年思屏跡數椽何計得連墻北窗九陌黄塵早暮忙幽人自愛北窗凉清吟微變舊詩律細字閒鈔新酒方草木扶疎春已去琴書蕭散日初長破𦍑臨罷榰頤久又了銅匜半篆香霜天晩興薄霜門巷不勝清小立湖邊夕照明紅顆帶芒収晩稻緑苞和葉摘新橙閒評琴價留僧話靜聽松聲領鶴行壯志消磨渾欲盡西風莫動玊闗情累日無酒亦不肉食戲作此詩小築精廬剡曲旁枵然蟬腹與龜腸酒錢覔處無司業齋日多來似太常雲碓旋舂菰米滑風爐親候藥苗香明年更入南山去要試囊中服玊方初夏遊凌氏小園水滿池塘葉滿枝曲廊危榭愜幽期風和海燕分泥處日永吳蠶上簇時閒理阮咸尋舊譜細傾白墮賦新詩從來夏淺勝春日兒女紛紛豈得知庾信詩云夏淺却勝春臨安春雨初霽世味年來薄似紗誰令騎馬客京華小樓一夜聽春雨深巷明朝賣杏花短紙斜行閒作草晴窗細乳戲分茶素衣莫起風塵歎猶及清明可到家題齋壁二十餘年此結茆園公谿父日論交風翻半浦亂荷背雨放一林新筍梢隔葉晩鶯啼谷口唼花雛鴨聚塘坳出門行罷還無事借得丹經手自鈔地僻地僻天教養散材流年况著鬢毛催青山目繞孤城去畫角常隨晩照來几淨雙鉤摹古帖甕香小啜試新醅乘槎不是星躔遠無奈先生興盡回北窗閒詠隂隂緑樹雨餘香半捲疎簾置一牀得禄僅償賒酒劵思歸新草乞祠章古琴百衲彈清散名帖雙鉤搨硬黄夜出灞亭雖跌宕也勝歸作老馮唐村居初夏煮酒開時日正長山家隨分畣年光梅青巧配吳鹽白筍美偏宜蜀䜴香風㬉𦂳催蠶上簇雨餘閒看稻移秧老夫見事真成晩浪走人間兩鬢霜七十七十殘年百念枯桑榆元不補東隅但存隱具金鴉觜那夢朝衣玊鹿盧身世蠶眠將作繭形容牛老已垂胡客來莫問先生處不釣娥江即鏡湖正月二十日晨起㺯筆深院窗扉曉色遲新愁宿醉兩參差雨聲欲與夢相入春意不隨人共衰零落殘梅臨小彴縱横野水赴清池物華撩我緣何事似恐頽年漸廢詩題菴壁身似蝸牛麤有廬却緣無用得安居地爐封火欺寒雨紙閣油窗見細書􅘹熟山僧分餺飥船來溪友餉薪樗閉門莫笑衰頽甚讀易論詩亦未疎睡起至園中春風忽已遍天涯老子猶能領物華淺碧細傾家釀酒小紅初試手栽花野人易與輸肝肺俗語誰能挂齒牙更欲世間同省事勾回蟻戰放蜂衙陳阜卿先生為兩浙轉運司考試官時秦丞相孫以右文殿修撰來就試直欲首送阜卿得予文卷擢置第一秦氏大怒予明年既顯黜先生亦幾陷危機偶秦公薨遂已予晩歳料理故書得先生手帖追感平昔作長句以識其事不知衰涕之集也冀北當年浩莫分斯人一顧每空羣國家科第與風漢天下英雄惟使君後進何人知大老横流無地寄斯文自憐衰鈍辜真賞猶竊虚名海内聞按此詩殊未佳而其事可紀故存之枕上作蕭蕭白髪卧扁舟死盡中朝舊輩流萬里闗河孤枕夢五更風雨四山秋鄭䖍自笑窮耽酒李廣何妨老不侯猶有少年風味在吳牋著句寫清愁先少師宣和初有贈晁公以道詩云奴愛才如蕭頴士婢知詩似鄭康成晁公大愛賞今逸全篇偶讀晁公文集泣而足之士不逢時勇退耕閉門自號景迂生逺聞佳士輒心許老見異書猶眼明奴愛才如蕭頴士婢知詩似鄭康成早孤遇事偏多感欲續殘章涕已傾春遊春風隄上草萋萋草輭沙平䕶馬蹄似葢微雲纔障日如絲小雨不成泥千秋觀裏逢新燕九里山前聽午雞追憶舊遊愁滿眼綵船曾繫畫橋西新凉書懷隣曲今年又有年垂髫戴白各欣然先輸官庾無逋賦共賽神祠有社錢退傅寄聲情縝宻連得周丞相書細字滿幅晦翁入夢語蟬聮昨夕夢朱元晦甚歡燈前細與兒曹説蠧簡猶堪數世傳對食戲咏得飽欣逢嵗小穰時憑野餉誑枯腸橙黄出臼金虀美菰脆供盤玊片香客送輪囷霜後蟹僧分磊落社前薑秋來幸是身强健聊為佳時舉一觴冬日室中恰受一蒲團也抵三千世界寛上策莫如扄户坐苦閒猶復取書看蔬青飯輭枝梧老窗白爐新凖備寒堪笑此翁幽獨慣却嫌兒女話團欒舟中作晤語無人與遣愁出門聊復㺯輕舟山穿煙雨參差出水赴陂塘散漫流隔葉雄雌鳴谷鳥傍林子母過呉牛數家清絶如圖畫炊黍何妨得小留村居書事藥物枝梧病漸蘇門前野老笑相呼春深水暖多魚婢雨足年豐少麥奴小飲杯盤隨事具閒行巷陌倩人扶題詩非復荒村句誰與丹青作畫圖示客一㸃昏燈兩部蛙客來相對半甌茶典衣未贖身饒蝨治米無工飯有沙每為采菱浮野艇時因買藥宿山家青鞋到處堪乘興不獨雲門與若耶春晩新緑成隂小雨時幅巾蕭散與閒宜燕歸赴訴經年别鶯晩分疏出谷遲曉枕呼兒投宿酒暮窗留客算殘碁翛然此意風塵表正恐羲皇未必知初歸雜咏小園五畝剪蓬蒿便覺人間迹可逃盡疏珍禽添爾雅更書香草續離騷藥苗可斸攜長鑱黍酒新成壓小槽老入鵷行方徹悟一官何處不徒勞久雨梅天一日㡬隂晴對酒無聊醉不成巧厯莫能知雨㸃孤桐那解寫溪聲林深鳥爵來無數草茂鉏耰去即生明日雲開天萬里御風吾欲過青城午睡梅黄雨足喜初晴投枕華胥夢已成帳底香雲凝未散手中書卷墮無聲簟紋似水飛蠅避鼻息如雷稚子驚癡腹便便竟何有已將嘲㺯付諸生龜堂初暑淪漪一曲遶茆堂葛帔紗巾喜日長多事林鳩管晴雨依人巢燕度炎凉深枝著子纍纍熟幽草開花冉冉香安得此時江海上與君袖手看人忙村夜入春雨雪無休日雨止猶隂未快晴萬竅怒號風不定半輪斜照月微明百年辛苦農桑業五處暌離父子情但得平安已為幸孤燈殘火過三更時子虡調官行在子龍阻風西陵子修在閩子坦在海昌予與子布子遹守舍出遊歸鞍上口占渺渺煙波飛槳去迢迢野徑䇿驢還寄懷楚水吳山外得意唐詩晉帖間每惜好春如我老誰能長日伴人閒世間自是無兼得勛業元非造物慳初夏閒居二首雲液初篘小瓮香風漪乍展北窗凉巢乾燕乳蟲供哺花過蜂閒蜜滿房閉户不知春已去鈔書但覺日方長所嗟詩思年來減虚負奚奴古錦囊川雲漠漠雨㝠㝠濁酒閒傾不滿瓶蠶簇尚寒憂繭薄稻陂初滿喜秧青王師䕶塞方屯甲親詔優民已放丁病起自憐猶健在不須求應少微星恩封渭南伯唐詩人趙嘏為渭南尉當時謂之趙渭南後來將以予為陸渭南乎戲作長句老向人間久倦遊君恩乞與渭川秋虚名定作陳驚坐好句真慙趙倚樓棧豆十年霑病馬煙波萬里著浮鷗就封他日輕裘去應過三峰處處留病中戲咏八十行加二清秋住故山新凉足眠睡舊疾害躋攀雪白紛殘鬢梔黄染病顔疲牛卧斜日羸馬噍枯菅貧廢兒孫學慈生僕妾頑贖衣時已迫貸米嵗方囏齋鉢僧嘲薄盤飱客笑慳從今謝還往惟有掩柴闗六言雜興三首失馬詎知非福亡羊不妨補牢病裏正須周易醉中却要離騷舉足加劉公腹引手捋孫郎鬚士氣日趨委靡賴有二君掃除廣平作梅花賦少陵無海棠詩正自一時偶爾俗人平地生疑飲張功父園戲題扇上寒食清明數日中西園春事又悤悤梅花自避新桃李不為高樓一笛風寄題朱元晦武夷精舎三首先生結屋綠巖邊讀易縣知屢絶編不用采芝驚世俗恐人謗道是神僊蟬蛻巖間果是無世人妄想可憐渠有方為子換凡骨來讀晦菴新著書山如嵩少三十六水似卭郲九折途我老正須閒處著白雲一半肻分無夜讀范至能攬轡錄公卿有黨排宗澤帷幄無人用岳飛遺老不應知此恨亦逢蘇節解沾衣雜感二首志士山棲恨不深人知已是負初心不須先説嚴光輩直自巢由錯到今百年鼎鼎成何事寒暑相催即白頭縱得金丹真不死摩挲銅狄更添愁感昔二首行年三十憶南遊穩駕滄溟萬斛舟常記早秋雷雨霽柁師指㸃說琉球馬瘦行遲自一竒溪山佳處看無遺酒壚强挽人同醉散去何曾識是誰貧甚戲作絶句貸米東村待不回鉢盂過午未曾開饑腸雷動尋常事但誤生臺兩鵲來北齋孤坐破三更庭户無人有月明數種袴襦秋未贖羨他鄰巷搗衣聲糴米歸遲午未炊家人竊閔乃翁饑不知㺯筆東窗下正和淵明乞食詩宋元詩會卷三十九
