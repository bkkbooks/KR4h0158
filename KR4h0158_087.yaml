body:
  text: 宋元詩會卷八十七兵部主事陳焯編傅若金字與礪任廣州教授順帝元統三年出使安南其宿天使館二詩最傳於世有玉樓集若金妻孫惠蘭亦能詩早卒見閨閣中歌風臺黔首厭秦暴龍德奮炎劉英雄乘天誅拔劍起相仇天風墮陵谷飛雲揚九州天下事既定懷土未遑休置酒宴高臺中厨進庶羞悲歌落林木父老皆涕流功臣日葅醢壯士復何求至今豐沛間長顧使人愁故鄉帝所愛零落遺舊丘大運各有終賢聖誰能留焉知萬嵗後魂魄復來遊題宜春鍾清卿清露軒秋氣集太虛夕光團高樹時聞陰液墮暗識商飈度旎旎星動林英英月霏霧涼扄息塵想幽琴寄玄悟寂歷松上聲逍遙丘中趣鈞天淡斜景銀河曖微素古調今所稀大音誰能喻仙人飲沆瀣夀命金石固千嵗不可期空歌徒延慕少年行長衢若平川輕車馳流波上有都人子明肌艷朝霞芳塵揚逺風白日耀舞羅少年輕薄兒調笑相經過狎坐酌美酒日暮酣且歌千金罄一笑豪右焉能加時俗誇朱顔美女恱春華春華豈不好遲暮當如何雜詩四首植蘭彌九畹踵菊被三徑幽芳乃殊姿馨德良可並搴蘭以為美餐菊以資命眷言理蕪穢恆使枝葉淨蕪穢苦易侵枝葉苦不盛豈無桃與李貴此諧野性間夜坐中庭素月流我懷鳴琴發逺思俗音難與諧微颸經前楹徐響正裴回欲歌南風曲聽者良以希願言薦清廟復感鳯來儀異人言種石可以致雙璧千金受玄祕辛苦乃有獲溫其比君子韞櫝良愛惜青蠅易為汙恆恐傷厥德連城不願售思以置君側終嵗無與言持之將安適皎皎素明月娟娟含令姿浮雲遽起滅圓影遂參差山川莽回互天地亦相疑焉知冥昧中明潔終不移弦望有恆運清光寧久虧題淵明漉酒圖淵明性嗜飲所遇適其真漉酒東籬下邈若旁無人捐綬非所吝焉愛頭上巾田園日成趣松竹相與親百年何為爾酩酊及茲辰陶然至和內混沌以為鄰羣雁圖微茫洞庭野隱約瀟湘岸鴻雁將栖息飛鳴求其伴先集良未安後至凄欲斷使我懷弟兄因之中腸亂留連江海逺慘淡秋暉晏常恐隨天風高飛入雲漢題墨梅老樹亞晴空疏花帶寒野風流不自惜淡泊從人寫嵗晏孰相娛空山少來者題衛知事廣衍倉西軒墨竹歌吾聞渭川竹如簀太倉欲致那可得開眼晴煙落戶牖透裳氷雪在胸臆愛之借問作者誰毋乃與竹同標格自是君懷足清致故須好事留真迹陰森雨氣發中林颯爽秋聲赴前席微坡直具百畝意老幹真憑萬鈞力玄豹猶含隱霧章蒼龍已奮千霄翼火雲六月思遠避安得坐我林間石待實誰憐彩鳯飢釣鰲未試長竿直為君歌罷久嘆息羣玉蕭蕭動高壁邯鄲行邯鄲城頭下白日邯鄲市上風蕭瑟故壘空餘鳥雀悲荒垣只見狐狸出何主墳墓對山阿尚憶諸侯爭戰多趙客歸來重毛遂秦軍老去畏廉頗黃塵白草宫前道鬼火如燈夜相照公子秋來不見歌美人月下那聞笑當時冠蓋激浮雲撾鐘考鼓宴青春只今惟有郵亭樹還送年年行路人八十里山行桂林之區猺賊雜處南有八十里之高山絶天綿延開險阻賊人倚之作巢寨劫掠經年勢還大官軍收捕費供給主將逡巡竟何待居民近山晝夜愁四下行人皆白頭况聞良家半為賊官府貪橫仍誅求安得大聚邊頭兵甲鑄田器盡鋤高山作平地高山平猺賊斃銅爵硯歌鄴中文磚天下竒流傳為硯亦堪悲月砌寒傾古臺暮雨犂耕出斷叉時荒涼火燒狐兔窟金棺别葬姦雄骨石麟暗刻魏春秋銅爵空題漢年月可憐此硯依浮世曽見高筵美人醉行迹猶霑舊襪塵啼痕已滅新妝淚向來登踐日紛紛即今磨洗見竒文題詩為弔西陵樹幾片殘霞入雁羣牧牛去題袁慶逺經歷所藏畫牧牛去千山復萬山上山日出愁起晚下山日入苦行難手中鴝鵒牛伴侣養來多日能人語縱牛不牽繩自垂聽他行食毋苦之欲歸尚憂牛不飽更近前溪多水草但願年年牛盡肥主翁足食身足衣農家養牛國所賴惡少城中殺牛賣送楊元成奉旨之徽州過家錢塘緑槐五月高雲冷行人辭闕歸鄉井奎璧秋回帝座深斗牛夜隔天河永君今御命出江關却到新安幾日還天上應須朝絳節湖邊何得愛青山江州社日阻風社日長為客行人總念羣湓江春過雨廬阜晚生雲緑酒洽歡飲清絃送别聞風檣未得動堅坐且論文下邳懷留侯豪傑關休運乾坤屬逺猷自須成漢業豈獨報韓仇黃石嗟長往青山感昔遊同時多草莽事定覔王侯七夕耿耿玉京夜迢迢銀漢流影斜烏鵲樹光隱鳯凰樓雲錦虛張月星房冷閉秋遙憐天帝子辛苦會牽牛賦得天際舟送兵部張孟功治河日下行人發春晨去鷁催纜侵斜月解帆向斷雲開愛鳥窺詩卷垂虹映酒杯尋源不可盡奉使幾時回送金華王琴士還山年少金華客囊琴暫出山忽聞春水滿徑逐暮雲還三洞飄玄鶴雙溪下白鷴應尋牧羊子時過緑蘿關寄題余泰亨隱居聞説幽棲處遙連郁水天徑開移竹地渠引灌花泉坐客留傾釀鄰人訪草玄京華逺遊子那得共盤旋别龍州蕭從事韶二首北極絲綸下南陲政化通靈槎浮度斗瘴草偃隨風殊俗難為别清談喜屢同馳驅不可住心切大明宫使節明金虎腰弓偃畫蛇蠻方趨號令原隰見光華邊樹猶含緑江梅久放花憶君依幕府何日定還家梧州嘉魚亭舟楫回沙驛旌旗駐郡亭江通五管白天落九疑青此日瞻雲氣誰家見客星軍需晝夜急寇盜幾時寧别靜江文學諸公乍見先愁去將行未忍分字期歸後寄歌畏别時聞驛樹過春雨江船隔夜雲馳驅念吾弟羽翼待諸君金陵晚眺金陵古形勝晚望思迢遙白日餘孤塔青山見六朝燕迷花底巷鴉散栁陰橋城下秦淮水年年自落潮京師守嵗日月催時序乾坤隔晦明殘年萬里夢今夕幾人情久客煩朋友雙親倚弟兄深慚須薄祿不得謝浮名韓淮陰廟淮陰千古英雄恨楚樹荒荒夕照殘水夾廢城春草合雲昏迷廟野花寒封齊安用真王印興漢空遺大將壇高帝旌旗俱寂寞斷碑零落後人看送唐子華赴嘉興聞君秋思滿南湖行李今晨發帝都幕府初乘從事馬江城還憶步兵鱸樹浮白日山侵越潮蹴青天海入吳間暇憑高動詩興須成一醉掃新圖和危山曜寄弟故園兄弟總相思久客懷歸屢失期司馬却慚題柱早東方翻恨上書遲都門栁暗愁中見鄉國花殘别後知昨日南橋放春水望雲回首獨多時題畫船入蜀圖送夔州教黃尚質楚客之官泛蜀船畫圗盈尺見山川九江樹色瀟湘外三峽猿聲灧澦前方譯漸通巴俗語國書新得漢人傳豈無好事能攜酒問字時時集講筵王氏相師山莊相師之山雲杳冥千巖萬壑倚空青上方雷雨藏天井南極風煙落洞庭溪客去迷花藹藹野人居愛竹泠泠何時遂買登山屐乘興還來扣石扄過故妻墓湘皋煙草緑紛紛灑淚東風憶細君每恨嫦娥工入月虗疑神女解為雲花陰午坐間金剪竹裏春愁冷翠裙留得舊時殘錦在傷心不忍讀回文按若金妻孫氏惠蘭性慧過人工五言近體年二十三歸傅五月而卒寓殯湘中其詩二首見香奩集汴梁汴上荒城繞故宫山頭危石墮秋風夷門市起聞嘶馬梁苑樵歸見斷鴻鬭草尚餘殘後碧進花無復盛時紅欲登高處腸先斷滿目間愁賦未工送姚子微雙闕除書下玉階三湘回棹拂氷崖天垂銅柱南低海城入金陵北近淮江國雁來秋肅肅驛樓雞動曉喈喈大家定有東征賦鮭菜隨船慰老懷送盧茂實之廣東憲幕仙城近接衆山回憲府遙臨百粵開海上喜通持節使幕中兼得濟時才鮫宫織罷魚龍出蛋戶珠還蚌蛤來預想到官多暇日清詩題遍嶺頭梅徐州斷山數里見浮屠水樹微茫映日疏舟楫遍經危石過人煙稍近白雲居朱陳縣逺思遺俗楚漢臺荒想故墟萬古風帆自來往新詩吟罷獨躊躇雪中次元茂才北闕今晨雪滿墀腐儒憂國畏人知月寒弱水迷三島雲暗蒼梧失九疑瑞木細飄天上葉梅花潛發嶺南杖山陰那得乘佳興起繞前軒自詠詩出郭晴光縹眇泛青春逺色氤氲動紫塵出郭自因芳意早尋溪兼得野情新花邊古寺翔金爵樹底高墳臥石麟却倚層丘望城闕上方雲氣繞龍鱗寄河間趙運使雪盡官河春水生移家還出鳯凰城竹間退食占靈鵲花外題詩聽蚤鶯益井青煙晨縹眇漕溝素月夜分明京華久客遙相憶欲託音書不稱情候友人不至戲作儀真城下菖蒲節晴日江頭錦繡文旗影送船侵樹過笛聲催鼓隔花聞雙龍鏡化間風雨五馬歌沈暗水雲日暮故人期未至誰家看舞石榴裙送趙仲禮御史兼呈王侍郎二首建業城頭烏亂啼知君感古夜聞雞淮揚貢賦元趨冀晉宋文章漸入齊草疏或依松影坐哦詩應就竹陰題書來肯憶京華客日日長衢聽馬嘶賜書南粵初歸日駐楫秦淮欲暮天嘯詠偶經梁舊寺登臨猶憶晉諸賢謝安别墅蟲鳴裏王導新亭鳥去前多謝府中賢侍御别時能作送行篇答何如禮鳯凰城中花若煙客遊多是感流年春生江漢思南國雪盡幽並見北邊逺使豈貪歸有槖微官仍苦坐無氊相逢未恨今晨别滿把驪珠慰目前同孔學敏遊仙遊觀鳯音亭下草如熏誰見仙娥倚翠裙環珮忽疑遊處得笙簫猶想去時聞湘江竹暗連春雨衡嶽花開隔暮雲千古遊人自來往登高回首思紛紛寄方君恕聞君臥疾近如何閉户時應賦短歌安石或能攜妓出子猷常擬棹船過微風倚檻宜修竹落日臨池愛緑荷也念湖邊未歸客秋山回首白雲多送湘中李從事赴郴幕長沙上遊山水窟郴陽自古説名邦天圍翠嶽連三楚地合清湘赴九江歸去收書經石室坐來拄版對雲窗西風慘淡都門别莫愛青樓倒玉缸過興安縣亂峰如劍不知名篁竹蕭蕭送驛程轉粟未休濰水役負戈猶發夜郎兵百蠻日落朱旗暗五嶺風來畫角清空使腐儒多感慨西南羣盜幾時平題安南天使館元統三年頒正朔詔書還到極南開使旌入館青雲動仙蓋臨江白日回諭蜀豈勞司馬檄朝周終見越裳來北歸耆舊仍相問文化如今遍九垓却侍姬夜宿安南天使館主人供帳爛相輝寶香煙起風過席銀燭花偏月照幃王母謾勞青鳥至文簫先放綵鸞歸書生自是心如鐵莫遣行雲亂濕衣陳高字子上平陽人官淮陽值亂離多感時思鄉之句其詩集名存藁南有山思友生也南有山高維虛矣其上伊石不可以輿兮念子之逺莫我愈兮南有水清維流矣其泮伊陸不可以舟兮念子之逺莫我儔兮漢水贈别也瞻彼漢水其流潺湲之子于邁言采其蘭嚶嚶好鳥集于林問娟娟美人可以晤言我思美人在漢之涘秉心允臧威儀楚楚聿求厥德將子是與慎爾優遊成爾譽處南山有玉琢以為琚北山有梓規以為輿君子好修始終弗渝發嵊縣行役苦晝熱戒程當夜闌睡覺呼僕夫出門路漫漫明月照人影疏星挂樹間流螢點衣袂零露濕巾冠潮逺剡溪水俄入新昌山屬兹干戈際愈覺行路難愧無經世資何以濟時艱悒悒抱逺思綿綿起憂端東方忽己白林鳥鳴間關前瞻石嶺峻喟然發長嘆容春軒層軒結搆幽當窗蒔花木簷雲棲夕陰庭鳥鳴晨旭四時景物佳早晚風氣淑主人頗解事灑掃置書軸攜琴來佳賔開樽瀉􅌬醁微酣有餘歡諧笑春意足寧知城南居秋風滿茅屋對菊分韻得須字佳菊性所愛金英霜後敷見之開旅懷移植向庭隅豈無杯中物幽賞與誰俱今晨好友過花下共歡娛西舍新醪熟足以供所須惜别分韻得與字江山無行人天寒况風雨出門辭友生情深别良苦褰衣感繾綣豈不念留處高堂想歸期嵗月不我與停舟且勿迫傾樽出清酤酒短意更長含凄我無語泊館頭步朝發芳林嶺夜依館頭泊厭兹跋涉勞懷哉田園樂生理苦艱難歸耕歎悠邈貧窶何足憂甘旨焉所託栖栖道路中素心負丘壑行年三十餘齒牙半搖落良由筋骨疲豈但質衰弱憂思耿不寐起觀衆星白羣雞鳴江皋已復戒行客晚歸西崦日初沒逺樹生夕陰晚步草露濕獨歸松徑深入室載言笑稚子牽衣襟樽中有濁醪可以酌復斟坐來窗牖白佳月出東林幽情寄觴詠適意忘華簪自得間居理寧憂外患侵同蔣伯威朱德常遊育王山得冷字春晴煙霧開地勝林泉迥杖策隨諸彥尋僧訪幽景古徑人影稀落日松陰冷徜徉谷鳥散臨憩山房靜玄賞誰能忘塵慮從兹屛山居避喧林下居抱病山中臥家貧酒屢空性懶詩慵課禽聲隔樹啼雲影當窗過獨有采樵人時來慰衰惰晚步雨霽野色淨杖䇿步殘陽度橋尋幽徑沿溪繞西莊隴麥生微秀籬菊散清香行吟來復往零露勿沾裳落梅曲梅花開滿枝無奈曉風吹風吹花落盡爭似未開時花開終有落非關曉風惡愁殺愛花人城頭復吹角題山居圖層巒積翠色中有嘉樹林幽人此避世結屋山之陰攜琴出山去獨懷千古心知音不可見歸路白雲深懷友作客黃山下思君漢水濵愁牽清夜夢吟瘦老夫身漂泊誰知我交遊獨此人春來尋小艇江上問通津寒食寓興次黃宗魯二首浩蕩乾坤大羈棲嵗月深他鄉對寒食愁思滿淮陰詩句慚孤詠春花孰共尋相逢同郡子時復一論心去嵗清明節天台看杏花凄涼今日事漂泊野人家淮楚風塵暗鄉山道路賒倚門親白髮反哺愧林鴉獨客獨客悲秋夜高秋託異鄉月侵窗影白風度角聲長野戰生新鬼邊烽照近疆歸耕吾計決不必問行藏贈章以元昆仲相見談經史江樓坐夜闌風聲吹屋響燈影照人寒俗薄交遊盡時危出處難衰年逢二妙亦得悶懷寬送胡希元歸江西落日烏紗帽西風白布裘吏才兼翰墨羇旅亦風流聽雨留僧寺看雲憶故丘他鄉同泛梗那忍送歸舟四月十六寓玉環喜家童來住至數月思家信今朝喜汝來妻兒憐我逺懷抱向誰開山谷多烽燧田園半草萊大軍消息近故里尚堪回病中遣懷臥病玄冬半羈栖碧海邊風塵方滿野戎馬已經年下邑供軍食何時發漕船薄才無寸補自合賦歸田久臥思登聎扶衰謾倚樓山紅斜日映江白晚煙浮行直書空雁帆敧入浦舟病身慚食祿長羡五湖遊懶拙懶拙從人棄行藏與世違陶潛辭米去張翰憶蓴歸垂釣貪春水看花愛夕暉便須開竹徑還製芰荷衣入山入山驚道險山嶺覺天低日礙危峰過雲依翠壁棲幽花如血染怪鳥學兒啼避世須來此桃源路已迷過李家坑鳥道高千丈雲山入萬重汗流愁赤日力倦倚青松羣僕頻相失行人竟不逢田家何處有僧寺隔前峰遊雅山寺上方殊勝地長者給孤園挂壁袈裟靜生階秀草繁樓光凝晚照樹色映前村法食干戈際真知象教尊送别平生幾兩屐丘壑每窮探訪鶴青田曲穿雲雁蕩南老成羣輩服姓氏衆人談相見復相别題詩興不堪橋上落日清溪上涼風梓樹秋北來船竟泊南去水空流宇宙終無極干戈未肯休野人無意緒獨立數歸鷗元日元日風兼雨蕭條野外村過門車轍逺記節酒杯存戰伐看今嵗棲遲且故園兵戈如未息身世豈須論重登近山樓羇旅歸來日危樓得再登山如前嵗好雲向小窗凝種木看今長藏書比舊增題詩成感慨老我愧何能題中峰樓中峰之樓風景幽山花滿屋翠雲流海天日出蓬萊近月夜煙清沆􅒭浮溪上松陰歸晚鶴簷前花樹語春鳩齊川渺渺黃塵裏此日登臨是勝遊獨望獨望東南日向晡風高雪盡雁行孤青山天際連於越白水秋來滿太湖海內干戈猶爛熳舍西園圃近荒蕪文章未必能經世深愧飄蓬嵗月徂自明回溫留寓郡城不得遂歸田之願述懷有作西風落葉送清秋力疾憑欄寄逺愁正慕陶潛歸栗里翻為王粲客荆州山峯近郭東西起江水通潮日夜流景物年年只依舊獨憐華髮鬢邊稠客南塘作江頭無計問歸舟抱病羈栖古寺幽風雨鶯花成寂寞干戈詩酒廢賡酬衰年白日愁邊度故國青山夢裏遊見説王師向淮甸早須傳檄定南州題花竹翎毛棠梨三月吐花齊布榖飛來樹上啼想見小園微雨過春光都在石欄西子昂畫風動秋山日已晡舊時林苑盡荒蕪王孫去國猶無恙解寫江南煙樹圖盧溝曉月圖盧溝橋西車馬多山頭白日照清波氊廬亦有江南婦愁聽金人出塞歌岑安卿字靜能平陽人與李五峯孝光同時其詩為栲栳集偶讀戴帥初先生夀陳太博詩二首依韻感賦貪夫富且夀吉人飢復寒什襲寶燕石白璧泥塗間老成愧茍得童孺羞無官如何羊裘翁不念歸來難謗讟我自致勿怨生不辰蒺藜非所據石卜陷厥身始知膠漆心千載雷與陳蠅矢任黑白頽然自天真百雁圖雍雍鴻雁羣渺渺水雲國白雪剡川藤玄香牧溪迹形真具生意倣佛二百翼四海兄弟情於兹見敘秩前鳴後如應高下低復逆隨陽足稻粱直夜防機弋水寒蘆葉黃霜清葦花白羣遊得所止一氣同悅懌哀哉淮南謡布粟歌斗尺東阿賦豆萁才高終擯斥觀圖適念此翻為古人戚今人猶古人毋為後人惜食新筍黃虀甕已竭枯繡筐亦空老芥長芒刺食久咽為痛山雨折竹胎未入春盤供畦丁適踵門致我親戚送脫綳錦紋散切玉霜刀弄新香噴湯鼎饞涎迸齒縫未倩摉詩腸已破食肉夢參禪誠滑稽煮簀宜笑閧贊寧譜亦佳涪翁句堪誦僻居東海偏斯味時一中山僧應厭餐飽食聽春哢和濟天岸法師約李五峯同遊韻我不識往古誰復知來今彼哉牛山淚祗濕當時襟節序倐代謝秋風生樹林暑氣日已薄涼氣日已深酌我新熟酒鳴我素蓄琴陶然一今古萬事從無心和李宰韻春風吹繁花秋露淨孤月壯年嗜好新對此每傾悅年來百念灰搔首惟短髮流光不我與苔生古人骨常懷却世紛宴坐學龜息從渠鵬去留不問馬得失李侯宦遊蹤來僦海上宅庭蘭茁春芽笑語落霏雪詩文嘗我過老晦資啓發窮思獨善身自獻殊未屑對酒還當歌甘旨共朝夕君心與我懷相對交歎息寄興示諸子田園日蕪穢衰邁不自治童僕肆疏懶子孫習娛嬉良苗雜稂莠瓜瓞纒蒺藜草深狐兔聚水積蛙蚓滋念兹每獨往邈焉起遐思世事亦如此重令我心悲咏范氏池亭虛亭巧結構有此觀魚境碧沼風生紋高林月留影花竹列我前松杉瘦而頴山環翡翠屛水瑩琉璃井書生東海來山水頗深省喜有鄭家湖詩文每相警題太真春睡圖東風吹香蕩晴晝長安宫苑花如繡海棠一夜折輕紅淑氣薰蒸困醇酎太真徙倚沈香亭宿酲未解春冥冥眉峰斂翠翳秋水侍兒夾擁花娉婷玉牀膩滑芙蓉展水沈煙裊金屛暖丹腮融潤珊瑚溫寶叉斜鬌烏雲綰上皇玉笛那敢吹地衣紅皺靴輕移傳令别殿罷歌管流鶯不語遊絲垂漁陽鼙鼓邊塵動臺閣無言卿士懵婦人一睡四海昏主䦣臣諛總如夢翠華西狩九廟隳禍胎未剪三軍疑馬嵬夢醒生死訣一時悔禍人心歸驪山舉燧供歡笑戎馬蹴踏周原草丹青誰寫春睡圗後世不須針大寶和王子英醉後歌至人超六合造物期同逰飄飄無根蓬蕩蕩不繫舟江河罔知返日夕唯東流鳲鳩爾何為戶牖思綢繆人生底用愁如織朝看朱顔暮無色何如生死兩忘懷日月梭飛任交擲君不見秦皇入海求方瞳包括區宇摧羣雄沙丘輼輬鮑魚臭一世萬世今何功又不見班生投筆踰流沙封侯萬里威逺加玉關東望不可入上書祈請心咨嗟我生於人何所為死當身外亦誰悲鳥鳶螻蟻苦分别珠襦玉柙徒光輝不如生前賦詩飲酒放浪山水間死與造物默默還同歸姑蘇臺吳宫築土山為趾俯視水雲三百里臺中歌舞萃華麗金碧巑岏眩珠翠江花泛泛浮鴟夷會稽思霸甘卑辭千金不買西子笑一舸能逐陶朱歸丹砌草深麋鹿臥凄凄棘露沾人衣闔廬丘墓虎為衛至今鐘磬聞餘悲遊人不悟國傾亡松間援筆題真娘朝陽臺巫峯十二青參差石形儼現仙娥姿蒼藤翠木怯凄冷精誠夜感襄王思仙衣縹眇仙裙濕雲影飄颻雨聲急陽臺朝暮不勝情高唐想像愁無極夢中竒遇事杳冥公子雕詞亦胸臆荒涼古廟屹江干臺空不見行雲迹遊人悵望尚徘徊古碑寂寞荒莓苔戲馬臺彭城負劍河為障南屹崇臺勢雄壯重瞳奮迹入秦回諸侯攬轡皆東向酒酣蹙馬升崔嵬鬃翻鬛振雲煙開倚鞭四顧示無敵指揮貔虎心雄哉黃金間行亞父去帳下茫然失謀主楚歌聲合潰重圍昔日名騅空故步千年積恨氣未消繞臺泗水撞飛濤望思臺金莖擎露空崔嵬湖臺築恨心猶哀剖桐殯土事曖昧禍機元自長生來夀踰大耋世已稀越國憸人心險巇盜兵誅佞兩非是屈氂督戰猶驚疑銜寃竟隕鳩泉里壺關三老言非遲向無少卿護病已上林僵栁何緣起空餘老淚滴紋甃斑斑相間苔花紫逢秋高梧脫葉金井寒璧月夜挂朱闌干銀河萬里浸虛白凌風欲訪乘槎仙金壺箭水聲第一畫角梅花聽悽惻三山樓閣碧海涼老鶴不眠清露滴謝季仲容見贈海風立水天空濛瘴雲晝掩蓬萊宫仙人跨鶴天姥東歸來樓閣昏無蹤九仙山高玉為戶廣寒夜訪乘鸞女桂香滴露夢不成看徹霓裳羽衣舞宫袍舞錦花翩翩詩成毛骨生清寒飛章贈我歸剡川推篷月在梅花邊次王敬助見寄韻二首琴書曽逺訪訪我海東濵對酒不成醉看花惟惜春青燈書有味白眼世無人儘有耕桑趣翛然一幸民袐圗留滯日鄉思己凄凄黃卷挑燈閲紅妝掩鏡啼交新情僶俯感舊恨低迷語及深知處應憐獨鶴棲九月三日晚與鄭元秉對坐至日暮小雨後歸宿偶成歸人歸未得天際復生陰小雨濕官道清砧傷客心蕭肥蘭蕙瘦雀語鳯鸞瘖坐對榮陽老空懷正始音和來竺西見寄嵗暮重峰寺詩文喜共論暝雲昏疊嶂寒雨滯孤村别後病翻劇書來身幸存藤枝肯扶老終扣月中門寄易禮弟越客半年住閩溪千里遊山高不礙夢日暮易為愁兄弟終相憶鄉閭非所憂何當先壠側同理釣漁舟送易直縣尹兄赴松溪武夷山水最清佳路轉三衢未覺賒百里絃歌初作宰一官琴鶴早辭家夜涼燈影連書屋溪近松聲雜吏衙遙想政成間暇日錦箋試墨品春茶次鄭元秉陪劉同知謁子陵祠韻畫舫秋江集縉紳公餘來弔故人魂子陵名節千年墓文叔雲仍百世孫高閣清風生玉麈空山涼月墮金尊獨慙老朽無由到只有新詩可共論遊東山寺贈蔚東岡東山景物吾州稀蓮宫璀璨浮春輝過湖人騎白雲馬待客僧立青苔磯花邊舉杯酒一斗石上解衣松十圍最愛東岡老禪伯夜窗為我話禪機遣興去年不死今年活直語半生人不禁老去謗書從滿篋春來樂事總關心觀魚濯足滄浪水聽鳥支笻楊栁陰我已無心呌閶闔玉皇高拱紫雲深重峯寺祈雨後柬李元善麈尾高揮演大乘火雲不散愈崚嶒謾同三島吟詩客間訪重峰醉酒僧翠竹陰移涼夢逺碧蓮香散暮雲凝歸途未即添瓢注猶有長風解鬱蒸送杜洲殷山長歸天台殷肇土茫茫詩歌玄鳥祥建邦思得姓易代復賔王德澤流千古雲仍遍四方深源還輔晉鄖國亦興唐奕奕家聲逺綿綿世胄長天台存舊譜地望著清光教育文詞贍漸摩道義彰移官杜洲曲開講楙山傍曉日皋比暖薰風絳帳涼青襟諸俊彥綵服兩兒郎弟子堪榱桷先生實棟梁羣飛迷蓊鬱駿足識康莊嵗月圖書滿風雲際會良伏龍終偃蹇鳴鶴自翺翔執友陳共帳攜家上小航錦囊詩匼匝蒼玉佩鏗鏘壯志期高翥歸心馳故鄉赤城霞粲粲秀嶺日蒼蒼巾子峰頭月瓊臺石上霜暫伸懷土樂爰整好遊裝下捧薇垣檄遙沾楓陛香公車應薦剡耆德動交章不日看除目何時舉賀觴佳音如我寄魚雁在滄浪宋元詩會卷八十七
