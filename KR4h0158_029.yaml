body:
  text: 宋元詩會卷二十九兵部主事陳焯編張舜民字藝叟邠州人登進士為襄崇令王安石倡新法舜民上書言便民所以窮民强內所以弱內富國所以蹙國時人壯之朝廷討西夏環慶帥髙遵裕辟舜民掌機密王師無功作詩寓諷坐謫赴鄜延詔獄赦還用司馬光薦為監察御史歷殿中進祕少出運陜西知陜潭青三州元符中罷職徽宗立擢諫議大夫居職七日上事已六十章徙吏侍出知同州坐元祐黨謫置商州復殿撰卒舜民善為文自號浮休居士打麥打麥打麥彭彭魄魄聲在山南應山北五月太陽出東北才離海嶠麥尚青轉到天心麥已熟鶡旦催人夜不眠竹雞呼雨雲如墨大婦腰鎌出小婦具筐逐上壠先捋青下壠已成束田家以苦乃為樂敢憚頭枯面焦黑貴人薦廟已嘗新酒醴雍容會所親曲終厭飫勞僮僕豈信田家未入唇盡將精好輸公賦次把斗升求市人麥秋正急又秧禾豐歲自少凶歲多田家辛苦可奈何將此打麥詞兼作插禾歌縱步湘西今朝不易得天晴閒過江西取意行忽然林外見山色又向橋邊聞水聲緑竹長松間桃李天然翠幕圍羅綺日暮歸舟醉不知晚風吹過湘江水聞赦有作擊鼓填街道傳聲過水濵國嚴三歲禮恩洗萬家春舟楫親南斗衣冠拱北辰嶺南並嶺北多少望歸人紈扇紈扇本招風曾將熱時用秋來挂壁上却被風吹動許將字冲元福州閩人舉進士第一歐陽修謂其詞氣似沂公未可量也簽判昭慶軍還當試館職不就通判明州神宗召對除集賢校理纍擢直舍人院判流內銓進知制誥使朔方應對合機宜館伴屈服回知審官院判尚書兵部遷翰林學士權知開封為蔡確舒亶所陷逮入御史府得釋黜知嶄州用待制起知秦揚鄆三州召為兵侍元祐三年冉為翰林學士拜尚書右丞罷為資政殿學士出知定州移楊州又移大名府紹聖初入為吏尚拜左丞中書侍郎居政地十年以中丞朱諤言罷知河南府晚為祐神觀使卒年七十五諡文定成都運司西園亭詩飛閣出方池修曲見空莽低臨花塢近平覺春波長返景澄餘暉夕隂帶浮爽從容觀魚樂不减遊濠上茅茨以為菴環顧蕭然虛內樂茍自足容人即有餘旁依修竹密上翳青松疏勿言此中陋中有君子居東山碧巖亭舊室曽留古岸邊新亭同賞碧巖前日生獅子峰頭木烟伴榴花洞口泉黃葉入秋山出地白雲臨曉海垂天飄然蹤跡今何定别去江湖又一年潘大臨字邠老從黃魯直遊學其為詩吕居仁作江西詩𣲖圖以邠老與韓子蒼謝無逸輩為魯直法嗣云浯溪公泛浯溪春水船繫帆啼鳥青崖邊次山作頌今幾年當時治亂春風前明皇聰明真晚謬乾坤付與哥奴手骨肉齊傷九廟焚蜀山騎騾不回首天下寧知再有唐皇帝紫袍迎上皇神器蒼茫吾敢惜兒不終孝聽五郎父子幾何不豺虎君臣寧能責闕南內凄凉誰得知人間稱家作端午平生不識顔真卿去年不答髙將軍老來讀碑淚橫臆公詩與碑當共行不賞邊功寧有計不殺闕皇猶敢語雨淋日炙字未訛千秋萬歲所鑒多江上晚步白鳥沒飛煙微風逆上船江從樊口轉山自武昌連日月縣終古乾坤别逝川羅浮南斗外黔府古河邊答王立之惠書歸自江南即定居謾勞親友問何如剛腸肯為藜羮轉病骨聊憑竹杖扶南圃膏腴千樹橘東湖春水百金魚明年生計應堪說待倩君侯買異書春日書懷舟楫凌漳水風濤接蠡湖龍媒戒跬步驪頷脫微軀樂土供遊戲深文苦縶拘胸中雖磈磊墻外或歌呼老去嵇康懶歸來寧子愚千鍾真臭腐十畝借膏腴春雨何曾密園花竟自都小橋藏細栁方沼出新蒲酒熟拈巾漉經傳帶雨鋤行盤隨所有坐客幾時無日轉槐隂暮門通鳥徑迂仰頭看哺鷇引手出將雛撫事盆繅繭勞生戶轉樞形骸浮大塊毛髮燎洪爐世論幾膠柱人心盡好竽屠龍非至計射雉屈良圖借箸方隆漢推枰已滅吳從渠畫麟閣吾自著潛夫林敏功字子仁蘄州人下第歸杜門不出者二十年與弟敏修以詩賦相友善當哲宗時世號二林贈趙正之君為稻田官君非力田科我今耕田夫為君奏田歌南畝茨梁稼東郊煙雨簔田家不作苦奈此歲暮何憫憫望有年一失成蹉跎立苖非不疏稊稗常苦多小人剝良善蓬蒿賤嘉禾去惡藉老農芟夷戒駢羅夫君邦之彥妙年加切磋治國與治身此道終靡他人心不相逺如以斧伐柯願君日顯榮吾言期不磨春日有懷風髙收雨急日薄過忩微梅蘂初迎臘春溪欲染衣形容今日是游衍昔人非節物關愁緒歸鴻正北飛林敏修子仁之弟傳見前張牧之竹溪張牧之隱於竹溪不喜與世接客來蔽竹窺之或韻人佳士則呼船載之或自刺舟與語俗子十反不一見怒罵相踵弗顧也人或以少漫郎余獨喜與古人意合乃作竹溪詩幽閒古城隂結屋清溪曲溪流湛回映上有青青竹漫郎欣得之緑髮詠空谷髙風及前修勝趣隨逺矚惡客徒擾人立談非我欲麾去寧汝嗔真意聊自足或言不當爾往往相謗讟答云豈吾私恐作林泉辱源流别涇渭臭味同草木肯當百事勝容此一物俗獨餘嵇阮輩蕩槳戒臣僕濁醪澆古胸日沒還秉燭僕忝瓜葛後意氣頗相屬平生幾兩屐共老三徑菊行年事無定此計諾已宿徑須買牛衣兒亦荷書簏從子竹間遊溪魚刴寒玉孔文仲字經父臨江新喻人少刻苦問學舉進士第一調餘杭尉轉台州推官熙寧初對䇿九千言力論王安石政術之非安石怒啓神宗御批罷歸廷臣交章奏留僅得國子監直講俄出通判保德軍元祐初以祕省郎召進禮部員外遷起居舍人擢諫議改中舍同知貢舉疾甚出院而卒年五十一將至南都途中感舊二首寄錢穆父北風吹雪滿皇州攜手同為落魄遊霄漢路岐騰萬里江湖塵土積千憂世情共逐飛蓬轉人事都如激浪流只待清談慰愁病月明幾夜促歸舟苒苒星霜七換年故人已上碧雲天書憑去鴈雖無便路出名都亦有緣秋晚樓臺風作雪雨餘崎岸栁生烟應煩北道開樽爼又費公庖幾萬錢孔武仲字常父舉進士調穀城主薄直講國子喪二親毁瘠特甚右肱為不舉元祐初歷祕省正字纍遷司業力詆王氏學請以詩賦取士進起居郎拜中舍直學士院擢給事中遷禮侍出知洪州徙宣州坐元祐黨奪職居池州卒年五十七所著經義雜詩文共百餘卷徒步吟嚴風駕雪霜吾轎頗溫燠白日暖郊原吾馬快馳逐二者皆得用翩如兩黃鵠馬驕倦提䇿轎狹厭攣束何以救斯弊奔馳有吾足副之兩革靴隨以一笻竹鳬趨上髙岡虎步出平陸折花得低枝照影臨深谷道逢田間叟時訪以耕牧北音稍入耳俚語俄滿腹行行及前堆小汗已霡霂芳草可為茵吾眠不須褥人生已太佚終歲居華屋醉飽耳目昏軟暖筋骸縮今吾異于此千里干微祿朝隨麏麞騁夜侣鴻雁宿户樞勞乃久金礦煆方熟聊歌以自娛不作楊朱哭祠二廟之明日未得順風呈同行嶽州西祠從古有控帶洞庭湖之口前對隱顯明滅之湘山下接淵淪洶湧之長川茫茫白沙連絶嶼淡淡古木蟠蒼烟昭靈王左安流右翠帳朱幡擁前後鋸牙虎視森兩廂氣骨生獰欲奔走我來纜舟日已昏袍鞾跪聽祠官言伏興進退如法式四顧詭譎驚心魂平明結束舟將解叱吸仍聞北風大焚香奏酒殊無計伏渚藏汀姑有待二王威神世所傳鈐攝鬼怪賔靈仙好風相送勢不難舒卷造化須臾間波回草動似有意舉櫂開帆即千里吟詩賞月嶽陽樓買魚沽酒巴陵市平陽歎壞雲如山壓齊壘六軍顔色如灰死髙郎元自解琵琶萬歲無愁作天子伯升何曾上青天濺血遺痕芳草間長城萬里自推仆駿馬只䭾馮小憐姦臣百計為蟊賊不但妖娥解傾國熊羆哮鬬蹙平陽馮妃對鏡嬌櫳妝死生契濶不相棄雙雙刎頸長安市旅枕旅枕春風底翛然一夢驚漏移清禁逺天入小窗明桂玉梁園費山椒楚客情蕭條過百五猶有賣花聲登湘隂北寺江亭古縣峩新剎孤亭占上頭野苔侵坐緑江水帶天流絲斷湘靈瑟蘋荒帝子洲人寰真似夢頃刻已千秋草石寺寺有潘閬題壁權德輿宴坐記髙士去已久餘踪猶可知竹隂侵宴坐山影在平池塵蝕參軍墨苔侵相國碑漫尋瀟灑趣俯仰愜心期館中夏日珍簟舒明玉凉窗納碧天殿樓傳逺鼓宫井取深泉竹籜風頻脫榴房晚更鮮却驚非故國五月未聞蟬發王務曉隨燈火背千家落盡踈星見逺霞一餉春聲回宿鳥半天寒色在啼鴉臨陂弱栁猶藏葉當路殘梅已盡花賴值時光正妍潤穩看風物到京華和竹元珍夜雨帝城塵土熱如湯喜有殘宵雨送凉旅枕夢雲縈宋玉空階詩思感何郎香迷舊理烟初斷燈倚輕寒焰不長明日御溝應更好一番晴色弄垂楊蘇子瞻雪堂古縣東邊仄徑開先生曾此斸蒿萊鸞凰一去應不返花栁當年皆自栽畫壁蒼茫留水墨朱欄剝落長莓苔鄰翁笑我來何暮檢㸃風烟興盡回湖山亭縣山峻絶有新亭公退時來看洞庭天外微茫二湖合波心縹眇一峰青非時爽氣生雲雨永夜寒光浸斗星千古登臨增健筆投文猶可弔湘靈寄范清老日挂西南有薄輝稜稜霜氣犯寒衣不愁斗柄隨春轉秪怕梅花學雪飛湘浦波光頻送别湓城山色屢思歸髙人只在南坡住好共留錢買釣磯登涵暉亭常時洲鳬隔波瀾故覔君山直上看罨畫園林春减色水晶宫闕晝添寒州城斜引羣峰小湖面平吞數驛寬坐久西風響喬木扁舟思到武陵灘次韻瀛倅鄧慎思見寄官是麟臺却佐州蓬瀛俱稱列仙遊憶分曉色趨天闕想對春風倚郡樓書付塞鴻應易到人如隴水正分流江湖未有歸耕處何日相逢說旅愁介之會徐氏家飲薄暮不歸為詩招之金鞍駿馬照朱門樂會髙張晉楚軍狂客浩歌翻白雪艷姬醉舞轉紅裙花光灼爍筵前錦酒韻氤氲盞上雲爭似竹窗風月夜青燈殘茗細論文孔平仲字毅父登進士第用吕公著薦為祕書丞集賢校理文仲卒歸葬南康詔以平仲判轉運江東護葬事提㸃江浙鑄錢京西刑獄坐元祐黨出知衡州又以提舉劾其違常平法失米價六十萬置獄潭州疏辨得直徙韶州俄責惠州别駕安置英州徽宗立復朝散大夫召為戶金二部郎中出典刑獄俾帥鄜延環慶黨論再起罷管景靈宫卒平仲長史學工文詞所著續世說等書行世二十二日大風發長蘆張帆風尚小出口勢愈急扁舟已中流前後無所及側看岸旋轉白浪若山岌磔砉時有聲百罅水爭入危檣聽欲折柁柄脫操執我有常病妻素羸多不粒及兹益憒亂卧喘氣吸吸婢姥半北人兹險未嘗習蒼皇面深墨嘔噦皆膽汁可憐兒女輩往往相聚泣出門强指揮飛沫濺衣濕江豚踊吾前猵獺作人立意如驁吾巇出沒相百十呼神擲楮泉祈佛啓經襲是時正月尾於節甫驚蟄雲氣作冥晦氣候變寒澀日中僅得止性命危若拾紛然方寸亂魂幹久不集官期幸未迫安用苦汲汲官兵勇貪程一震當少戢何如彼居民生不出井邑吾田雖曠瘠飦粥粗可給勞生默自慨茅舍行且葺讀江淹集煌煌一匹錦爛爛五色筆始知何處得悵此夢中失淹也雖善文葳蕤少筋骨譬人氣不深往往多奄忽晚年既富貴外學仍老佛豈非有所怠寖使天才屈奈何不自尤祕怪疑鬼物我有十丈舟夙期駕溟渤褰霞叩東皇擘浪窺月窟唯憂倦或止視此頗自栗城東作九江非吾土久寓忘羈棲丘墳之所宅舍此亦安歸錢官最閒暇因得治其私松楸鬱在望時復至郊圻駕言上東原藹藹晨霞晞草木新過雨秀色可療饑念此道傍民散居在山蹊方秋百物熟入城各有攜芋迸紫卵壯薑抽紅筍肥檔香憶烹鯉稻白想流匙養生無不有美味仍及時此土遂可老行當結茅茨雲水有深約塵埃無盡期人生適意耳富貴亦何為月夜平生最好月况此秋夜闌長風送蕩漾浩露洗團團仰頭視虛空光采如可餐星辰斂芒角河漢收波瀾更無微雲翳挂此白玉盤六合靜皎皎萬木凉珊珊仍登髙處望歷歷見湖山爽氣集氷雪清心生羽翰便欲御泠然因之遊廣寒一臨天池水沐浴隨飛仙夜坐菴前人定鳥棲息菴前聊倚欄裴回明月上正在修篁端清影氷玉碎疏音環佩寒翛然耳目靜覺此宇宙寬人生甘物役汨沒紅塵間宴坐得俄頃境幽心已閒諒能長無事自可駐朱顔所以學道人類多隱深山乞巧衆人喜乞巧我以巧為憂言巧多欺佞行巧為邪柔學巧競穿穴文巧多雕鎪巧不令如此宜吾之恥求我欲守拙性浩然鎮輕浮盡窒衆巧門化以孔與周此志尚未遂感激在初秋南顧問牛女汝實能巧不費紙吟家貧何所費使紙如使水親交或見遺自買不知幾置之几案間數軸俄空矣作字本不工學書非所喜不知何故盡疑若有神鬼若云隨置郵性復懶箋啓間或强為之皆出不得已橫斜若幡腳齟齬如鴈齒數易僅能成紛紛多廢委叙致失輕重畏慎防觸抵往往已緘封時時又刪洗遂令巾衍竭大半或緣此昔無楮先生云自蔡倫始假令行竹簡秃野未供使人生有知慧不若愚且鄙古來取卿相未必皆經史誰教識㸃畫空耗五斗米咄嗟為此詩又是一張紙讀莊子損此以錙銖益我以千金豈足為輕重徒能勞爾心覆彼以狐狢䝉此以絺綌豈足為厚薄徒能損卿德南山有鷙鳥睥睨天地秋有意橫八極固非守一丘老鴟嚇腐鼠安可施于此鵷雛尚不屑况非鵷雛比常父寄半夏齊州多半夏採自鵲山陽纍纍圓且白千里逺寄將新婦初解包諸子喜若狂皆云已法製無滑可以嘗大兒强占據端坐斥四旁次女出其腋一攫已半亡小女作蟹行乳媪代與攘分頭各咀嚼方愛有所忘須臾被辛螫棄餘不復藏競以手捫舌啼譟滿中堂父至笑且驚亟使啖以薑中宵方稍定久此燈燭光大鈞播萬物不擇窳與良虎掌出深谷鳶頭蔽髙岡春草善殺魚野葛挽人腸各以類自蕃敢問孰主張水玉名雖佳神農録之方其外則皎潔其中慕堅剛奈何藴毒性入口有所傷老兄好服食似此亦可防急難我輩事感惕成此章代小子廣孫寄翁翁爹爹來密州再歲得兩子牙兒秀且厚鄭鄭已生齒翁翁尚未見既見想歡喜廣孫讀書多寫字輒兩紙三三足精神大安能步履翁翁雖舊識伎倆非昔比何時得團聚盡使羅拜跪婆婆到輦下翁翁在省裏大婆八十五寢膳近何似爹爹與妳妳無日不思爾每到時節佳或對飲食美一一俱上心歸期當屈指昨日又開爐連天北風起飲闌却蕭條舉目數千里食桃剪彼十圍木架此百尺梁十圍不加大百尺不加長胡為被錦繡空爾飾文章根斷膚已剝至朽不復昌一作榮食桃棄其核下與糞壤藏一作并雨露之所濡發生乃微芒回首枝幹大冉冉出我牆開花又結子意態何煌煌孤鴈空城夜已寂一鴈度雲端汀洲亦可止何不怯霜寒豈非防暗禍驚矯失自安孤音訴明月天髙路漫漫以鶉置懷袖比汝乏羽翰䝉恩傍溫暖豈念宵征難武宗武宗惟雄俊有臣委用專德裕才略大感恩罄所宣是時巖廊上六合氣可吞論兵决勝負萬里在目前一平回鶻凶再洗上黨昏楊辨不知時乃敢盜太原豈信明光甲遣人斬其元廷謀昧知幾唯有君相然成立三大功慷慨在一言風霆運不測日月朗髙縣李唐勢已去至此岌復纒外內已息兵崇卑定乾坤遂令河北帥弭耳如孤豚事書史册上讀之快心魂千載若信宿凛凛風烈存世人多說劒不見斫伐㾗玩弄反自傷何用飾璵璠迂哉賈生餌果爾房琯奔施為貴實效詎止衒空文南卒坐食者南卒驕與子弟俱負甲則俯僂荷戈不能趨嘈然金鼓鳴氣駭失所圖固無一技良徒有七尺軀吾聞孫子教弱女成武夫吾欲練汝輩使之虓虎如奈何天子詔苦禁蓄兵書軍旅非素習壯士心踟蹰羣蠻屢騷動主將復佐除有急何以報思之可驚吁春暄太早率爾援筆去歲有閏既苦寒今年春早亦太暄清明寒食在二月禁火正如揮箑天桃花零落牡丹發漠漠江頭吹栁綿細蟲打窗夜如雨潤氣蒸礎朝生泉卷簾闢户迎風坐徹縟去屏思簟眠勸君用心慎倉卒萬事轉易如車旋安知明日不凛洌莫以炎凉隨目前述鷗水濵老父忘機關醉眠古石紅蕖間緑波蕩漾意不動白雲往來心與閒有鷗素熟翁如此命侣呼儔就翁喜相親飲啄少畏避自浮自沈不驚起漁人窺之即謀取手攜羅網來翁所羣鷗瞥見皆逺逝千里翩翩一回顧鷗不薄翁勿疑避禍未萌真見幾漁人羅網不在側敢辭旦夕從翁嬉常甫招客望海亭蓬萊釀酒酒已成賀家池上新採菱紫衣侍立烏帽走吾兄招客望海亭歸來為我道客語異事覼縷皆目覩醉中遙指北山下云此白處乃海浦入山迤邐數百山客居乃在一山顛雖非陽侯所窟宅風濤澒洞已拍天餘山亦有人雜居山無桑麻只捕魚海中百怪所會聚海馬海人並海驢或如七十之老翁或如三尺之侏儒手足口眼莫不見鞭磔盡作人號呼千艘競造石首脯雨聲颯颯魚來初截波一網千萬尾櫂歌喜噪翻蓬壺垂鈎忽挂緑鸚鵡探石仍得真珊瑚晚晴蜃結綵霞閣夜黑龍呈明月珠紅漣紫液碧㶑灔頃刻變態世所無我聞此景若在眼便欲駕舶尋天吳昔時管寧亦避地吾祖嘆息思乘桴我今何為不可往誰能俯首甘區區平時此亭景最美自謂清曠更無比一䎹客語心坐馳却上望海汙潢耳嗟哉好惡隨所遷世間萬事多如此于將軍長安遣兵百勝强意氣何有漢中王七軍之心俱猛鷙虎兕插翼將翺翔睥睨荆益可席卷白帝城髙如堵墻秣馬蓐食朝欲戰雷聲殷殷山之陽沈隂苦雨十餘日漢水溢出髙騰驤蒼黃不暇治步伍攀緣蹙踏半死傷計窮豈不欲奔走四望如海皆茫茫鼉鳴魚躍尚恐懼萬一敵至誰敢當遙觀大船載旗鼓關侯凛凛英風揚䝉衝直繞長堤下徑弩强弓無敵者雖有鐵騎何所施排空白浪如奔馬將軍拱手就縶縛咋舌無聲面深赭捷書一日到錦城隻輪不返皆西行將軍疇昔負朋友若缺昌豨猶得生循環報復雖天意壯士所惜惟功名曹瞞相知三十年臨危不及龎明賢歸來頭白已憔悴泣涕頓首尤可憐髙陵畫像何詭譎乃令慚痛入九泉淯水之師勇冠世英雄成敗皆偶然紫髯將軍華容女子哭幽囚吉利如虎入荆州縛其孤雛斂貔貅長驅水步八十萬欲獵于吳吳主憂羣臣勸迎同一說拔刀斫案心膽裂揆彼之量豈我容開門納狼計何拙魯家狂兒䇿最長倡而和者有周郎區區黃蓋乃乞降龍幡遮火燒赤壁東南風急天絳色江中戰舸岸上營烟焰飛騰半焚溺雷鼓大進聲滿川輕鋭迫逐皆崩奔紫髯將軍更歡喜曹公垂翅不得鶱子布元表何齪齪成敗之决在一言君不見甘露寶鼎間典午受禪吳猶存青蓋入洛雖可惜猶勝俯首臣老賊夏日甘寢回風動木葉細雨濕蛛絲心下無閒事人間有此時微凉紗半卷幽夢角徐吹此興惟吾解兒曹莫使知冬夕即席作燭滴緋桃淚香蟠春蚓灰酒花隨暖聚酥蕊帶寒開自有清歌送惟愁畫角催隔簾疑曉色雪壓數枝梅與張子明飲湖亭小艇衝湖過幽亭枕水虛風來荷氣外人在木隂餘濕印篘新酒長茭族貫魚遙看鶴歸處便是謫仙居冬晝作霜隂收欲盡斑駁意初晴漸喜山將出只愁雲更生鳥窺晡後屋雞唱午間城灰折紅爐火微煎傍耳鳴造王館公第馬上作濯濯春容在栁梢野梅相壓吐香苞日邊明晦雲無定雨後寒暄氣欲交抱蕊縣蟲猶帶繭銜枝飛鳥已營巢髙懷不愛三公府白水青山滿近郊呈館公磻溪莘野亦初閒去逐功名遂不還豈有太平辭將相却來髙卧對湖山冥心真出三千界注想長虛第一班踽踽朱門舊時客冒寒衝雨到郊關霽夜寂歷簾櫳深夜明睡回清夢戍牆鈴狂風送雨已何處淡月籠雲猶未醒早有秋聲隨墮葉獨將凉意伴流螢明朝凖擬南軒望洗出廬山萬丈青寓興薄寒初著夾衣裳日景中分不短長池館虛明開水石園林搖落受風霜黃花滿檻金翎秀白酒盈樽玉液香未老不須雲母粉且教絃管奏清商西齊冬夕平生踈野得江湖歲暮西齊擁一爐雨滴空階如自語風吹長木更相呼世間寵辱收碁局樓上光隂入酒壺近日睡時全少夢攀緣狂想自知無小菴初成奉酬元帥伐竹誅茅挂織蒲半規小榻一方爐不隨健鶻摩空去且免窮猿失木呼自有琴書增道氣别開世界在仙壺幽人欲到知何意若說真菴彼豈無送登州太守出城馬上作匆匆送客出城闉霜意方髙日漸曛青嶂倚空先有雪黃沙匝地半和雲旌旗明滅隨車逺鼓角悲凉隔水聞正是無憀一回首兩行白馬映紅裙適值劉從道供奉往信陽鎮用前韻送之君馬匆匆赴信陽雖云同郡似他方村沙卷盡黃昏日海水吹成半夜霜别恨不須青草色歸期當及小桃香閒官冷局遙相望兩覺迢迢歲月長銀河江湖有客卧孤城每見銀河眼亦明萬里長風吹不斷一番微雨洗尤清星辰白石參差亂雲氣飛梁倐忽生織女東西波浪隔夜寒天濶不勝情選官圖口號環合官圖展觀呼象子圓飛騰隨八赤推折在雙𤣥已貴翻投裔將薨却上天須臾文換武俄頃後馳先錯雜賢愚品偏頗造化權望移情欲脫患失膽俱縣愠色觀三已豪心待九遷寧知即罷局榮辱兩茫然寄內試說途中景方知别後心行人日暮少風雪亂山深郭公枉渚潮初落平岡日又西蘆叢深處泊惟有郭公啼禾熟百里西風禾黍香鳴泉落竇榖登場老牛初了耕耘債齧草坡頭卧夕陽登賀園髙亭東武名園數賀家更于髙處望春華深紅淺白知多少直到南山盡是花熙寧口號二首日生明堂講太平時聞深詔下青冥數重遣使詢新法四面興師剪不庭萬户康寧五榖豐江淮相接至山東須知錫福由京邑天子新成太一宫榆錢鏤雪裁綃箇箇圓日斜風定穩如穿憑誰細與東君說買住青春費幾錢毛滂字澤民任推官從蘇子瞻逰秋日書懷秋日吐微明寒葉墮半碧娟娟竹弄影冉冉香引胍窗明棐几净水石涵虛白茶開睡足眼苔上懶行屐屋寒無燕雀豈獨少賔客顧我警露友佇此遼天翮相對雖不言孤髙比三益邇來世外心漸覺眼界窄兒時喜功名今念真戲劇平生翻羮手欲爛誰能炙豈待二頃田初無一㕓宅第當營糟丘努力期百尺頺然寄疏慵坐看駒過隙韓郎食不足苦心定誰惜那知落英繁吾食豈無夕舉手謝飛鳶一鼠何勞嚇下渚湖春渚連天濶春風夾岸香飛花渡水急垂栁向人長逺岫分蒼紫垂波映渺茫此身萍梗爾泊處即吾鄉定光禪院曉出開霜阪饑烏啄麥畦山腰餘雪瘦天面冷雲低寒意梅花北禪心柏子西窗前借殘月照我渡前溪宋元詩㑹卷二十九
