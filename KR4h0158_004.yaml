循度嵗華地將鯨海接路與鳳城賒觸石雲頻起銜山日易斜潮平聚漁市木落見人家吏隱偏知幸民謠豈敢誇無嫌勾漏僻且得養丹砂郡齋西亭即事十韻招麗水殿丞武功從事郡齋退食復何為縱目西亭景物竒疊嶂雨餘泉眼出澄潭風靜釣絲垂城臨古戍寒蕪濶路轉荒村野彴危幾處唱歌聞白紵誰家沽酒見青旗蝶隨遊妓穿花逕犬吠行人隔槿籬桃李成蹊春盡後魚鹽為市日中時桑麻萬頃晴氛散絲竹千門夕照移吟際嶺雲飛冉冉望中壠麥秀離離烟迷喬木鶯遷蚤水滿方塘鷺下遲鶴葢翩然肯相顧主人終宴豈知疲京師故人有以隴西鸚鵡遺余者因畜養之去年出守縉雲提挈而至性靈甚慧觸類能言公退翫之常若不足忽遇疾而逝因命瘞於小園作詩一章聊以追悼識者無罪余以貴畜也隴山秋樹舊巢傾逺向江東逐斾旌去國夢魂應繚繞入春喉舌漸分明一聲警露何慙鶴百囀遷喬肯讓鶯終日雕籠神不王經年丹觜色猶輕思歸悒悒因成疾顧主依依尚有情死葬小園芳草地夜來經雨綠苔生次韻和席衢州憶洛陽春遊十四韻周漢經營跡未遐山川形勝最堪嘉前瞻闕塞千尋出旁逗伊流一派斜子晉鳳笙調夜月宓妃羅襪映朝霞何人貰酒青樓曉幾處尋春紫陌賒駿馬每從金埓試芳叢多展翠帷遮出逢勝境争飛葢歸逼殘陽競走車庭竹惹烟披嫩籜皋蘭裛露長新芽嵩峰崷崪疑摩斗洛水清泠欲見沙萬井閭閻真陸海九重宫闕是天家禁林日暖空啼鳥御苑風㣲自落花闗路行人偏絡繹津橋賈客苦諠譁何當獻賦論遷邑便欲抛官學種𤓰江海三年勞夢想田園二頃有生涯應知父老沾堯化長挈壺漿望翠華大理黃丞使潁州祥刑新佐張廷尉出塞曽隨霍冠軍露版裁書頻倚馬甘泉獻賦舊凌雲幾瞻龍衮堯階側暫駕星軺汝水濆百萬提封周制復三千奏牘漢皇聞依蓮幕府遊從近聚米山川向背分迴日受釐宣室對又應前席動吾君戊申年七夕五首六幕西迴斗轉車鮮雲㸃綴玉鈎斜天孫巳渡黃姑渚阿母還來漢帝家明河左界鵲南飛漢苑髙樓正曝衣一夕匆匆停弄杼誰將錦石暫支機蘭夜沈沈鵲漏移羽車雲幄有佳期應將機上回文縷分作人間乞巧絲神女歡娛一夕休月娥孀獨已千秋爭如靈匹年年㑹莫恨牛津隔鳳輈玉女壺傾笑電頻白榆晴影接星津神光奕奕雲容薄誰見凌波襪起塵顔太初彭城人顔子四十七代孫少博學有雋才慷慨好義善為詩多譏切時事登進士為莒縣尉忤轉運使落職用孔道輔薦召試中書言者擠之改臨晉主簿移應天府户曹參軍南京國子監說書卒有集十卷東州逸黨天之有常度躔次絶乖離地之有常理沈潛無變虧人之有常道髙下遵軌儀三才各定位萬古永不移二儀設有變修徳可以祈人道或反常其亂何由支昔在典午朝國祚方陵夷日向中夜出赫赫來東陲地向太極裂中有蒼鵝飛髙厚災且異人妖亦繁滋始有竹林民怪誕名不羈次有夷甫輩髙談慕無為沈湎多越禮阮籍兼輔之虛名能飾詐光逸與王尼何曽有先見不能救其衰張華徒竭力無以扶厥危至今西晉書讀之堪涕洟邇來歴千年炎宋運重熙東州有逸黨尊大自相推號曰方外友蕩然絶四維六籍被詆訶三皇遭毁訾坑儒愚黔首快哉秦李斯與世立憲度迂哉魯先師流蕩終忘反惡聞有民彝或為童牧飲垂髽以相嬉或作概量歌無非市井辭或作薤露唱發聲令人悲或稱重意氣金帛不為貲或曰外形骸頂踵了無私麀聚復獶雜何者為尊卑遙聞風波民未見如調饑偶逢紳帶士相對如拘縻不知二紀來此風肇自誰都緣極顯地多用寧馨兒鄉老為品狀不以逸為嗤宗伯主計偕不以逸為非家國盡為逸禮法從何施我常病其事中夜起思惟平地三尺限空車發無岐重載歴百仞所來因陵遲萬一染成俗雖悔何由追幸有名教黨可與决雄雌所嗟九品賤不得立文墀賈誼唯慟哭梁鴻空五噫終削南山竹冒死指其疵無使永嘉風敗亂昇平時詠許希鍼工許希下蔡人住梁門西市三十年及天聖中皇躳違豫有内戚達其姓名上召見三進鍼而疾平面授尚藥奉御其賜予不可勝紀謝恩畢西向而拜上詢其故奏曰臣拜本師扁鵲也上惜其用心不忘本給錢五十萬立祠封曰靈應侯因為詩以紀之京城名利塗車馬交驅馳其間取富貴往往輸巫醫前後十數輩身没名已隳獨有許希者藴蓄何瑰竒始自下蔡來所處尤喧卑西市三十年汨汨無人知一朝仗至藝驟登文石墀三鍼愈上疾神速不移時酬以六尚官著籍通端闈旌以三品服佩紫垂金龜於時稱謝畢西向復陳儀當宁驚且問歴歴宣其辭臣傳扁鵲術遇主今得施特此一展謝臣心不自私主上惜其意擊賞為噓唏仍給水衡錢國西命立祠復加靈應號金額照華榱自此輦轂下求禱何祁祁我過慶成坊見之心且悲秦醫術雖妙五腑及四肢所習得其人千齡祀不虧魯聖術至大帝道與民彝所習非其人一朝反相持小吏師荀况竊為辨說資作相勸焚書詐云愚蚩蚩後之為儒者其心皆李斯昔在布衣日動守先王規朝談十二經夕誦三百詩依憑稽古力榮進無他岐及居廟堂上劍長冠峩巍自謂天所賦焉知有宣尼宣尼㫁襲封十經寒暑移他姓為邑官鄉老皆驚疑上章寢不報九重遭面欺諫官不舉失御史不言非盡為許希笑得路忘先師趙湘字巨源華州人舉進士歴彰武永興昭武三軍節度推官遷著作佐郎知新繁縣以吏最擢知興元府入為殿中侍御史上書請封禪禮成命往昇州祠兼問民疾苦改刑部員外郎兼侍御史知雜事官至集賢院學士寄楊塤閉門苔自長春恨極天涯落日山橫水空城雨過花㫁狂曽避蝶多病更愁蛙江上無消息風吹渡栁斜答徐本天逺草離離秋霖寄信遲相思逢葉盡獨坐聴蟬悲岳色寒前見松心雪後知頻招猶未至時復檢清辭春夕偶作一夕衡門獨自開雨陰深巷少塵埃酒醒風傍池邊起坐久月從花上來何處夜歌初欲㫁四鄰春夢未知回因思此興無人共時復孤吟步綠苔鮑當真宗朝進士善為詩及第後為河南府法曹時薛映知府事當失其意將欲罪之乃獻孤雁詩一首映大嗟賞自是禮遇甚優時人謂之鮑孤雁松江夜泊舟閒人已息林際月㣲明一片清江水中涵萬古情孤雁寒多稻粱少萬里孤難進不惜充君庖為帶邊庭信酬阮逸詩卷木有毫端水有源漸成盤錯到潺湲右丞畫筆多平淺平淺應知近自然燕肅字穆之益都人家曹州少孤貧遊學舉進士補鳳翔府觀察推官冦凖知府事薦改著作佐郎知臨卭縣由通判河南府擢監察御史為丁謂所惡出知越州歴直昭文館至禮部侍郎卒喜為詩工畫入妙品僻居茅堂城市逺草徑接魚村白日偶無客青山長對門藥爐留火暖花塢帶烟昏静坐捜新句㝠心傍酒樽宋元詩㑹卷四
