body:
  text: 宋元詩㑹卷四兵部主事陳焯編楊億字大年建州浦城人生有毛被體尺餘經月乃落七嵗能屬文雍熙初太宗聞其名召試詩賦五篇下筆立成深加賞異命内侍送至中書宰相表賀翌日下制曰汝方髫齔不由師訓精爽神助文字生知越長絶塵一日千里深有望於汝也即授祕書省正字賜袍笏俄丁外艱淳化中詣闕獻文命試翰林賜進士第遷光祿寺丞真宗即位超拜左正言預修太宗實錄書成乞外補就養知處州召還知制誥景徳初加通進銀臺司兼門下封駁事俄判史館與王欽若總修冊府元龜億素薄其人欽若銜之又陳彭年方以文學進忌億名出其右相與毁訾上不為動天禧二年拜工部侍郎官至翰林學士四年十二月卒年五十七集一百九十四卷禁直鳳樓鴛瓦蟾波濕衆籟聲沈百蟲蟄仙盤雲表露成霜何人夜半牛衣泣芝泥香熟封詔書河漢西傾移斗車陰風摵摵起庭樹寒澌戛戛鳴宫渠千廬迭唱傳宵警海山鰲背蓬壺頂金釭珠網結綺錢玉井銀牀垂素綆前席受釐詢碩生觀書百行須中程投籖乍應嚴鼓節求衣誤聴蒼蠅聲渇烏漏盡繁星曙魚鑰建章開萬户初日曈曨豔屋梁鳴鞭一聲天下路秋夕池上蓮塘帶弋林清吹滌煩襟泉咽猶鳴玉臺傾舊築金僵桃蟲自蠧怪石蘚交侵此夜悲秋客烟蛩亦伴吟直夜月魄生宵暈風雷送晚凉飛蠅隨鏤管浮蟻溢清觴負郭春耕廢鈞天曉夢長玉籖聲未斷落宿半宫牆偶懐銀燭飛晴霰蘭英湛凍醪年光侵蒜髮春恨寄雲袍燕重銜泥逺鴻驚避弋高平生林壑志誤佩吕䖍刀即目急雨度前軒池荷相對翻峰青雲待族蹊闇李無言捉鼻生愁咏披襟爽醉魂一廛今已廢猶戀漢庭恩霜月月夕露為霜心知厭獨房吟殘猶擁鼻望極自回腸鬢減前秋綠衣消外國香星津誰待報織素未成章夕陽夕籟起汀葭秋空送目賖綠蕪平度鳥紅樹逺連霞水濶迷歸櫂風清咽迥笳高樓未成下天際玉鈎斜槿花宿霧初披縠晨霞暫照梁千金輕一笑七駕未成章塵暗神妃襪衣殘侍史香深情傳寶瑟終古怨清湘禁中庭樹直幹依金闥繁陰覆綺楹纍珠晨露重嘒管夜蟬清霜桂丹丘路星榆北斗城嵗寒徒自許蜀栁笑孤貞宋殿丞廣南東路轉運天子憂南越公卿薦陸生九年須富國萬里便揚旌封部諸蠻接官曺六尚榮交州何日到鼓吹定相迎奉和御製社日詩仙掌凌空沆瀣秋大田多稼似雲浮天邉霽景芙蓉闕江上殘芳杜若洲東觀羣儒宣宴樂南荆遺俗重嬉遊宸章忽降容欣覩疑是神龜負九疇别賦賞花仙山靈沼五城西曉日花光照彩霓露濯氷蠶鋪瑞錦風吹水麝折香臍芳葩散採添蜂蜜紅片狂飄雜燕泥曽識壺中舊春色桃源重到路猶迷偶書朱輪逺守詎成歡薄宦令人意漸闌郡閤政清慵按吏鄉園路近易休官梅花遶檻驚春蚤布水當簷覺夏寒已是三年不聞問何如歸去把漁竿題張濬所居壁三張舊族富英髦仙墅重經散鬱陶深喜太丘家法在須知定國里門高分題每日搖鷄距合宴常時把蟹螯獨感戴侯恩未報徘徊不覺涕沾袍留題黃山院禾黍離離一徑通遊人攬轡即過從趂齋幽鳥聞疎磬出定髙僧記偃松夜半龕燈凝古殿雨餘巖溜迸前峰昔年曽此題名處素壁欹斜翠蘚重梁舍人奉使巴中藥署深嚴纔草詔劍闗迢遞忽乗軺霜天歴歴巴猿苦山路駸駸筰馬驕梁苑寒風吹别袂瞿塘春水送歸橈紫垣遣使非常例應有星文動九霄次韻和盛博士雪霽之什六花新霽白皚皚爽氣颼颼拂面來梁苑酒濃寒力減謝池風細凍文開天邉幾陣聞歸雁江外千家見蚤梅此際何人能訪戴剡溪清景足銜杯閤門廖舍人知袁州駸駸五馬動征塵太守風流世絶倫身事漢庭為小相家傳楚國是騷人烟波莫歎重湖逺桑梓仍將别墅鄰麥穗㣲黃稻苖綠朱輪入境便行春次韻和宗人安期見賀恩命之什分班曉入翔鸞闕直閣旁連浴鳳池綵筆閒批五色詔好風時動萬年枝勒移鍾阜慙歸晚稱疾文園恨思遲何事吾宗心倍喜春塘夢徹寄新詩成都鳳道人遊終南山謁种徵君何年出蜀訪南宗深鎖閒房翠蘚重振錫忽聞遊地肺題門兼得謁人龍供吟一路髙秋月投宿斜陽逺寺鐘到日彌天清論罷行尋紫閣與圭峰王中庸赴河南鞏縣尉春風祖席引香醪白馬驪駒草色袍官舍前臨兩京道居民半雜五陵豪卑飛碌碌猶棲棘餘地恢恢暫鼔刀捧檄初同昔人喜不應搔首歎徒勞王殿丞通判桂州科名得玉向崑丘家世長淮入海流通籍殿中鈎盾省頒條嶺外桂林州漢皇前席期清夜楚客歸帆指素秋父老歡聞鄰郡政壺漿千里待鳴騶慎大詹以呉柑見貺龍陽休說木奴洲震澤黃柑占上流承露玉漿仙掌曙亞霜金顆洞庭秋香黏素手呉娃麗冷滌朝酲楚客愁應似荔枝催入貢隨河飛鳥逐鳴騶祕閣舒職方知舒州西崑册府控千廬鉛筆多年校魯魚厭享雙鷄大官膳貪乗五馬使君車明光畫省辭青鎖天柱仙壇訪紫書只恐政成抛印綬攜家深入白雲居擇良上人歸天台片席然犀經水府幾程登陸望霞標吟情晚日繁雲合歸路秋風宻葉凋行道六時廬嶽漏浮杯千里浙江潮舊房宴坐觀空後香積多年飯頓銷遊王氏東園名園聊得拂塵衣深入春叢一逕㣲萬樹未饒金谷富百畦猶有漢陰機青蘋風暖天鷄出文杏巢乾海燕歸向晚鳴騶九門路栁堤回首獨依依書懐寄劉五風波名路壯心殘三逕荒凉未得還病起東陽衣帶緩愁多騎省鬢毛斑五年書命塵西閣千古移文愧北山獨憶瓊枝苦霜霰清樽嵗宴彊􅋳顔呉待問之䝉城簿西來赴調合闗繻黃綬風塵厭九衢祖席且同開口笑公庭未免折腰趨長安車馬偏欺客魯國衣冠肯戲儒共憶故園歸計晚舊遊烟樹隔重湖休沐述懐寄祕閣錢少卿風號電笑雨平堦紈素㣲凉暗入懐晝枕乍成園吏夢晨蔬聊學太常齋名慙引籍通丹地心愧移文刻翠崖大隱金門猶自適日親方朔聽詼諧始皇衡石量書夜漏深咸陽宫闕杳沈沈滄波沃日虛鞭石白刃凝霜枉鑄金萬里長城穿地脈八方馳道聽車音儒坑未冷驪山火三月青烟遶翠岑漢武蓬萊銀闕浪漫漫弱水回風欲到難光照竹宫勞夜拜露漙金掌費朝餐力通青海求龍種死諱文成食馬肝待詔先生齒編貝那教索米向長安南朝五鼓端門涵漏稀夜籖聲㫁翠華飛繁星曉埭聞鷄度細雨春場射雉歸步試金蓮波濺襪歌翻玉樹涕沾衣龍蟠王氣終三百猶得澄瀾對敞扉唐明皇玉牒開觀檢未封鬭鷄三百逺相從紫雲度曲傳浮世白石標年鑿半峰河朔叛臣驚舞馬渭橋遺老識真龍蓬山鈿合愁通信回首空濤一萬重宋玉蘭臺清吹拂冠緌薙草新居對渺瀰麗賦朝雲無處所羇懐秋氣動齎咨三年送目愁鄰媛七澤迷魂怨楚詞獨有江南哀句在更傳餘恨到黃闕成都五丁力盡蜀川通千古成都綠酎醲白帝倉空蛙在井青天路險劍為峰漫傳西漢祠神馬已見南陽起卧龍張載勒銘堪作戒莫矜函谷一丸封舊將平生苦戰憶山西拊劍臨風氣吐霓㦸户當衢容駟馬降缺遶帳列生犀新豐酒滿清商咽武庫兵銷太白低髀肉漸生衣帶緩蚤朝空聴汝南鷄洞户洞户飛甍接綺寮一春幽恨寄蘭苕書題枉是藏三嵗壺矢誰同賽百嬌水國風霜凋社橘仙山雲霧隔江潮東城劍騎何曽出秖為離愁髀肉消淚寒風易水已成悲亡國何人見黍離枉是荆王疑美璞更令楊子怨多岐胡笳暮應三撾鼓楚舞春臨百子池未抵索居愁翠被圓荷清曉露淋漓赤日赤日亭亭晝正賖長風萬里憶星槎銅盤瑤蘂三危露素綆寒漿五色𤓰蘭室冷光浮玉簟栁營清吹逐金笳翠㣲泉石終南路千古離宫倚曙霞七夕二首金壺漏滴正迢迢靈匹相從在此宵月魄嬋娟烏遶樹河流清淺鵲成橋雲輕天上榆花没風細爐中麝炷飄寂寞堪憐觀渡女無眠耿耿望青霄清淺銀河暝靄收漢宫還起曝衣樓共瞻月樹憐飛鵲誰泛星槎見飲牛弄杼暫應停素手穿針寧待貺明眸匆匆一夕填橋苦不似人間有造舟無題六首曲池波暖蕙風輕頭白鴛鴦占綠萍才㫁歌雲成夢雨斗回笑電作嗔霆湘蘭自古傳幽怨秦鳳何年入杳㝠不待萱蘇蠲薄怒閒堦鬭雀有遺翎合歡蠲忿亦休論夢蝶翩翩逐怨魂秖待傾城終未笑不曽亡國自無言風翻林葉迷歸燕露嫋池荷觸戲鴛湘水東流何日竭烟篁千古見啼痕滿天飛絮罥游絲鈿砌苔錢晦履綦北渚自應流怨淚東鄰誰敢效矉睂姮娥桂獨成幽恨素女弦多有剩悲幾夕空機愁促杼銀河休問報章遲巫陽歸夢隔千峰辟惡香銷翠被空桂魄漸虧愁曉月蕉心不展怨春風遙山黯黯睂長斂一水盈盈語未通謾托鵾絃傳恨意雲鬟日夕似飛蓬銅盤蕙草起青烟斗帳香囊四角縣沈約愁多徒自瘦相如意宻有誰傳金塘雨過猶疑夢翠袖風迴秖恐仙日上秦樓休寄咏東方千騎擁輜軿露冷星翻月上弦幾枝銀燭照金鈿應知韓掾偷香夜猶記潘郎擲果年天際明河雖可望苑中髙栁未經眠鳥啼人散青樓曉堂上清風轉莢錢代意三首夢蘭前事悔成占却羡歸飛拂畫簷錦瑟驚絃愁别鶴星機促杼怨新縑舞腰罷試收紈袖博齒慵開委玉奩幾夕離魂自無寐楚天雲㫁見凉蟾短夢殘妝慘别魂白頭詞苦怨文園誰容五馬傳心曲秖許雙鸞見淚痕易變閒隨南地橘忘憂虛對北堂萱回文信㫁衣香歇猶憶章臺走畫轅路隔仙源不可尋紫牆霜㦸夜沈沈緘情謾託傳書雁換笑空餘取酒金翡翠巢成珠樹宻驪龍睡起玉淵深新知自樂生離苦年少情多豈易禁梨繁花如雪蚤傷春千樹封侯未是貧漢苑漫傳盧橘賦驪山誰識荔枝塵九秋青女霜添味五夜方諸月溜津楚客狂酲朝已解水風猶自獵汀蘋栁絮瓊蘂飄英逐吹繁建章飛舞入千門羗人自怨殘梅曲莊叟還迷夢蝶魂漢苑風光隨獵騎洛城風雪撲離尊錦帆蔽日隋隄逺枉逐東流箭浪翻荷花翠幄飄香映綺襦鈿盤清曉露如珠休啼為近鮫人室欲見誰投玉女壺雲氣乍迴巫峽夢水嬉猶記曲池圖金花却薦何人步枉遣凌波襪縷濡懐人碧樹銀塘接畫樓天人誰肯降瓊輈三山宻信傳青雀五日歸鞭躍紫騮郢酒泛冰星弁側呉歈倚瑟黛蛾愁雲峰得句懐真賞瘦盡東陽沈隱侯休沐端居有懐希聖凝塵滿榻素琴橫岸幘孤吟意未平茗粥露芽銷晝夢蔗漿雲液浣朝酲水沈朱李金瓶澁風獵幽蘭羽扇輕獨憶當筵試湯餅謫仙氷骨照人清館中新蟬碧城青閣好追凉髙栁新聲逐吹長貴伴金貂尊漢相清含珠露怨齊王蘭臺宻侍初成賦河朔歡游正舉觴雲鬢翠緌徒自許先秋楚客已回腸小園秋夕鴻都歸晚禁城賒牆外連營咽暮笳玉井梧傾猶待鳳金塘栁宻更藏鴉心搖雲闕傳疎漏目㫁星津過迥槎已是秋來移帶眼可堪𤣥鬢有霜華寄靈仙觀舒職方學士綠髪深潛不記年却尋丹竈味靈篇華陰學霧還成市彭澤橫琴豈要絃曉案秖應餐沆瀣夜灘誰見弄潺湲須知吏隱金門客待乞刀圭作地仙送客不及青門祖帳曙烟㣲片席乘流鳥共飛曲岸馬嘶風嫋嫋短亭人散栁依依灞陵目㫁猶回望楚水魂銷為送歸秖自河梁傳怨曲洛塵千古化征衣直夜繚垣巍闕雲深處畫燭熏爐對擁衾三殿夜籖傳漏箭九秋霜籟入風琴階前槁葉驚寒雨天際孤鴻答迥砧攲枕便成魚鳥夢豈知名路有機心與啟明越客逃名誤鑿坏漢庭初聘碧鷄才操心四十知無惑削牘三千恥自媒吟苦多年依洛社賦成他日上蘭臺郡齋縣榻流塵滿七見東風落楚梅此夕此夕秋風獵敗荷玉鈎斜影轉庭柯鮫人淚有千珠迸楚客愁添萬斛多錦里琴心誰滌器石城桃葉自橫波程鄉酒薄難成醉帶眼頻移奈瘦何劉校理屬疾北牕風勁雪雲繁移疾端居避世喧載酒誰過揚子宅張羅休署翟公門多才最許飄飄氣小别還銷黯黯魂促爾徘徊憶真賞逺天新月照黃昏勸石集賢飲日上三