body:
  text: 宋元詩㑹卷二十六兵部主事陳焯編孫覺字莘老髙郵人甫冠從胡瑗受學為同學所推登進士調合肥主簿試館職預首選為校勘神宗初以昌王記室擢右正言坐希㫖舉劾大僚落職通判越州徙通州以知諫院召嘗入對神宗言吕惠卿為利之故屈身王安石其交必解後果交惡復奏青苗民所不願出知廣徳軍徙湖州廬州丁祖母憂去服除知蘇州福州入為祕書少監哲宗立遷右諫議大夫進吏侍擢御史中丞移疾提舉舒州靈僊觀卒年六十三介亭真人昔未起奔鹿駭四方連延天目山兩乳百里長有地跨江海無種生侯王中宵燎穹旻列石表壇場朱旗大梁野英氣吞八荒寥寥百年後故物亦已亡所餘彼巉巖峰巔屹相望主人承明老星斗工文章築亭紫霄上坐客蒼株旁攀雲弄明月曉星生扶桑禹山隔波濤簡書永埋藏願逢希夷使水土還故常李廌字方叔其先自鄆徙華廌六歳而孤能自奮立稍長以學問稱鄉里謁蘇軾于黄州䞇其文軾曰子之才萬人敵也鄉舉試禮部軾典貢舉遺之賦詩自責謀諸范祖禹將同薦之㑹相繼去國不果軾亡廌哭之慟作文祭之曰皇天后土鑒一生忠義之心名山大川還萬古英靈之氣讀者悚然卒年五十一文選樓申轅應楚聘鄒枚適梁苑藩侯喜賓客賢賢易鷹犬黄綺遊漢庭羽翼繒繳逺秦府十八公攀附名益顯昭明梁才子文囿俾蒐選髙齋切浮雲雉堞俯晴巘尚應媿河間筆削非大典驪山歌君門如天深九重君王如帝坐法宫人生難處是安穩何為來此驪山中複道連雲接金闕樓觀隱煙横翠紅林深谷暗迷八駿朝東暮西勞六龍六龍西幸峩眉棧悲風便入華清院霓裳蕭散羽衣空麋鹿來遊墟市變我上朝元春半老滿地落花人不掃羯鼓樓髙挂夕陽長生殿古生青草可憐呉楚兩醯雞築臺未就巳堪悲長楊五柞漢幸免江都樓成隋自迷由來流連多喪徳宴安鴆毒因奢惑三風十愆古所戒不必驪山可亡國書侍兒小瑩裙帶旋剪香羅列地垂嬌紅嫩綠寫珠璣花前欲作重重結繫定春光不放歸張耒字文濳淮隂人十三歲能文十七作函闗賦已傳人口遊學于陳學官蘇轍愛之因得從軾遊軾稱其文汪洋冲澹有一唱三歎之致弱冠第進士官主簿尉丞用范純仁薦為祕省正字厯著作郎史館檢討擢起居舍人紹聖初坐黨籍連貶徽宗立召為太常少卿復坐黨籍落職言者謂耒聞蘇軾訃舉哀行服遂貶房州别駕晩監南嶽廟卒年六十一夏日書懐士而懐其居孔子亦云非賢臣事晉侯夜載使逃齊酖毒比燕居君子不可懐樂小必害大安近逺之迷野芻養騏驥當念和鑾馳一飽願即止㡬何非犬雞髙賢意有在汲汲不敢違安能守槽櫪長伴兒曹嬉感遇穰侯擅闗中頗畏諸侯客摉車計已遲終困范公策庸夫吞富貴百計私自惜勢移禍敗至智巧竟何益至公覽英俊苴補乃無隙請看桑林餓亦脱趙子厄斑竹重瞳陟方時二妃葢老人安肯泣路傍洒淚留叢筠頗疑葛陂化㸃㸃留斑鱗慎勿脱水去人世多埃塵糴官粟有感持錢糴官粟日夕擁公門官價雖不髙官倉常苦貧兼并閉囷廩一粒不肯分伺待官粟空騰價邀吾民坐視既不可禁之亦紛紜擾擾田畆中果腹才㡬人我欲究其原宏濶未易陳哀哉天地間生民常苦辛離黄州扁舟發孤城揮手謝送者山回地勢卷天豁江面瀉中流望赤壁石脚揷水下昏昏煙霧嶺歴歴漁樵舎來此實三載鄰里通假借别之豈無情老淚為一洒篙工起鳴鼓輕櫓健如馬聊為過江宿寂寂樊山夜晩歸寄無咎屋東雲移山屋西日半壁餘天一劍青逺雨萬絲白官事癡可了未遭官長責惟應晁夫子不可别頃刻廣化遇雨浮雲蔽髙峰臺殿延晩色風聲轉谷豪雨脚射山白東樓瞰虚明龍甲排檜栢蕭森異人境坐視動神魄撞鐘寺門掩晩霽尚殘滴相攜下山去塵静馬無迹歸來解鞍歇新月如破璧但恐桃花源回舟已青壁贈無咎三首文風還正始磊落有諸君長者進後生亦使我有聞譬如狸與虎偶使並稱文終然不可及困我力空勤觸有羸其角進有跋其胡膏車秣吾馬白日在脩途雖乏無何杯頗多未見書力學致事功良田本深鋤黄子少年時風流勝春栁中年一鉢飯萬事寒木朽室有僧對談房無妾持帚此道人人事誰令余獨不阿几小兒名阿几眉目頗疎明日來書案傍學我讀書聲男兒事業多何必學讀書自古竒男子往往羞為儒阿几笑謂爺薄雲無密雨看爺饑寒姿兒豈合貴富翁家破篋中惟有書與史教兒不讀書更欲作何事寓陳雜詩三首朝雨如棼絲咫尺不相辨俄然晨光漏紺碧出天面天工易明晦頃刻俄屢變今朝事大定雲物卷組練客有北來説蝝生被數縣穀穂無一粒遺稈如立箭卑田成大澤投種哀莫見官人懵不知猶喜輸租辦興懐及鰥寡獨愧吾飽飯秦子死南海旅骨還故墟辛勤一生事空得數篇書琅琅巧言語玉佩聨瓊琚知者能㡬人憎者頗有餘書生事業薄生世苦勤劬持以待後世何足潤槁枯興懐及平昔使我涕漣如道路阻且長悲哉違撫孤開門無客來永日不冠屨客知我老懶投刺輒復去端成兩相忘因得百無慮故人在傍郡書信不能屢興哀東坡公將揜郟山墓不能往一慟名議真有負可能金玉骨亦逐黄壤腐但恐已神僊裂石終飛去寄答參寥我生為文章與衆常不偶出其所為詩不笑即嘲詬少年勇自辯盛氣争可否年來知所避不敢出諸口時時未免作包以十襲厚低心讓兒曹黙黙衆人後見君不能已頗亦陳所有君豈少取之時以佳句授幽絃喜有聽清唱慰孤奏如何瞥然去使我不得友夏日雜感二首羣動入夜息我歸亦安眠脱我身上衣投枕體宴然朝日常營營有生不可閒羲和戢其光幸此須臾閒人生一世中大小無百年胡為不自暇長抱勤苦歎才者勇設施誕者夸死權彼有驅其心欲休諒無緣我本與世疎少慵老成頑何為不引去坎軻行所艱娟娟檐前月雖缺自媚好團團理絲蟲養身恃其巧無能老蝙蝠乗夜出堂奥那能捕飛蚊未解聒耳閙悲歌草間蚓辛苦自鳴噪爾生可以黙何所欲而噪鳴哇訴其渇謂若天可禱瘖蟬死不鳴豈以訴無效悠悠羣動情誰能辨醜好我歌豈徒然亦用自警告冬日放言二首秦人焚詩書意欲遂絶滅六經至今存何曾損豪髪興衰有天理人力自淺拙不憂驪山墓囘首遭發掘元子本豪爽頗復有俗氣孟嘉亦可人乃與較權勢崛强盡百年究竟成何事江左無英雄汝得免徒𨽻潘郎以予生日見過致酒出兩詩東風沛甘雨百物一時好江邊桃李盡紅紫到百草道傍負擔子寒食歸祭禱念我淮上丘三年不躬掃淮陽牡丹窟盛不數伊洛姚黄一枝開衆艶氣如爍亭亭風塵表獨立朝萬蕚誰知臨老眼更復美葵藿于湖曲并序蕪湖令寄示温庭筠湖隂曲其序乃云晉王敦反屯于湖隂帝微行至其營敦夢日遶之覺而追不及故樂府有湖隂曲按晉地志有于湖而無湖隂本紀云敦屯于湖隂察營壘而去余頃遊蕪湖問父老湖隂所在皆莫之知也然則帝至于湖當為斷句乃作于湖曲以遺之使正其是非云武昌雲旗蔽天赤夜築于湖洗鋒鏑巴滇騄駿風作蹄去如滅沒來不嘶日圍萬里纒孤壁兵氣如霜已潛釋蛇矛賤士識天顔玉帳髯奴落妖魄君不見銅駝陌上塵沙起朔騎春來飲瀍水浮江天馬是龍兒蹙踏揚州開帝里王氣尚縣五百秋弄兵老濞空白頭石城戰骨卧秋草更欲君王分上流蘇叔黨吕知止自許下見訪叔黨有詩見贈賦此奉答三年齊安看江山可當中原故人面北來塵埃逢故人眼前却作江山見君似江山定不踈能出吾言世亦無蘇郎下筆妙無敵吕郎與談驚未識鳳雛驥子未宜輕囊空各有千金璧贈君錦繡英瓊瑶報我琅玕金錯刀溪毛横汙未相棄歲暮與君甘緼袍少年行少年賣珠登主門主家千金惜一身綠韝請罪見天子尚得君王呼主人鬬雞走馬長安道豪傑驅來奉談笑漢庭碌碌公與侯畏禍憂誅先白頭代贈洞房飛香作春霧僊人勸酒香中語明眸第二紫雲娘鶯學歌聲栁如舞蹙眉長歌澧有蘭銀勾請君春草篇繁絃髙張燭燒夜玉壺未盡參在天春泥雪消淮上路東風浪欲驚客櫓惱公舊事㡬魂夢過眼相逢一風雨黄流清洛上天漢呉山洞庭藏水府謾題詩句寄歸舟江口風狂那得渡片雪歌瑶池一片孤飛雪風急身輕飛不歇誰將翠袖遮得歸十斛明珠換與誰金龜貴客迎將去玉作輜軿載烟霧人間不解桃李心獨與琵琶自相語主人白頭情不親朱樓夜鎖梨花春願同花落寄流水飄出朱門隨路塵長恐此生空已矣從此失身輕薄子人生但樂兩心知誰是瓊瑶孰泥滓鶯驚中彈花辭樹蝶散蜂稀春日暮風光不斷流水長不知片雪今何處飛螢詞碧梧含風夏夜清林塘五月初飛螢翠屏玉簟起凉思一㸃秋心從此生方池水深溪雨積上下輝輝亂凝碧幸因簾捲到華堂不畏人驚拂瑶席漢宫千門連萬戸夜夜熒煌暗中度光流太液池上波影落金盤月邊露銀闕蒼蒼玉漏遲年年為爾足愁思長門怨妾不成寐團扇美人還賦詩避暑風廊人語笑欄下撲來羅扇小已投幽室自分明更伴殘星碧天曉君不見連昌宫殿洛陽西破瓦頽垣今古悲荒榛腐草無人跡只有秋來熠燿飛偶書三首秋隂漫漫㡬千里赤壁磯前天接水連檣接柁不復行老魚擘波時出戲黄橙紫栗収如積青錢買酒不堪惜北人歲久厭南餐山邊有路何時還窮秋晝夜隂如一夜不見星朝蔽日枯疇已穫大野空怒江未落連州沒長魚撥刺不受釣漁子髙眠守蓬蓽紫髯舊宫誰復遊鼎峙雄心久蕭瑟周郎戰處滄江囘魚龍蕩潏山石摧荆州艨艟莫舉檝走君不勞一炬灰當年雄豪誰復在喬木荒煙忽千載蘄竹截作寸笛材一冩山川萬古哀勞歌暑天三月亢無雨雲頭不合惟飛土深堂無人午睡餘欲動身先汗如雨忽憐街里負重民筋骸長轉十石弩半衲遮背是生涯以力受金飽兒女人家牛馬繫髙木惜恐奔驅犯炎酷天工作民良久難誰知不如牛馬福江南曲江蒲芽白江水綠江頭花開自幽淑人家晨炊欲熟時旋去網魚惟所欲往來送租只用船未省沙泥曽汙足有錢買酒醉鄰里終日數口常在目不學長安貴公卿每遣離心寄朱轂朝遊巖廊暮海島譴人未歸心自逐牧牛兒牧牛兒逺陂牧逺陂牧牛芳草綠兒怒掉鞭牛不觸澗邊柳古南風清麥深蔽目田野平烏犍礪角逐草行老㹀卧噍饑不鳴犢兒跳梁没草去隔林應母時一聲老翁念兒自攜餉出門先上岡頭望日斜驟雨濕蓑衣拍手唱歌尋伴歸逺村放牛風日薄近村牧牛泥水惡珠璣燕趙兒不知兒生但知牛背樂讀中興頌碑玉環妖血無人掃漁陽馬厭長安草潼關戰骨髙於山萬里君王蜀中老金戈鐵馬從西來郭公凛凛英雄才舉旗為風偃為雨洒滌九廟無塵埃元功髙名誰與紀風雅不繼騷人死水部胸中星斗文太師筆下蛟龍字天遣二子傳將來髙山十丈磨蒼崖誰持此碑入我室使我一見昏眸開百年廢興増歎慨當時數子今安在君不見荒凉浯水棄不収時有遊人打碑賣魯直惠洮河緑石作氷壺研次韻洮河之石利劒矛磨刀日解十二牛千年荒徼困沙礫一日見寳來中州黄子文章妙天下獨駕八馬森幢旒平生筆墨萬金直竒煤利翰盈篋収誰持此研參案几風瀾近手寒生秋包持投我棄不惜副以清詩帛加璧明窻試墨吐秀潤端溪歙州無此色野人齋房無玩好慙愧衣冠陳裸國晁侯碧海為文詞盤礴萬頃澄清漪新篇來如徹扎箭勁筆更似畫沙錐知君自足報蒼璧愧我空賦瓊瑰詩福昌秋日效張文昌二首秋野無人秋日白禾黍登場風索索豆田黄時霜已多桑蟲食葉留空柯小蝶翩翩晩花紫野鶉啄粟驚人起洛陽西原君莫行秋光處處傷人情黄桑蕭蕭秋水清田中日午村鷄鳴場邊九月禾黍熟空原雉飛飽新穀棗籬蟲鳴村路曲道邊古墳生野菊人稀田濶草茫茫洛陽秋深能斷腸題韓幹馬圖頭如翔鸞月頰光背如安輿鳬臆方心知不載田舍郎猶帶開元天子紅袍香韓幹寫時國無事綠樹隂低春晝長兩髯執轡儼在傍如瞻馳道黄屋張北風揚塵燕賊狂廐中萬馬歸范陽天子乗騾蜀山路滿川苜蓿為誰芳罔沙阻風大江春風浪如屋客舟迎風罔沙宿連檣接柁古岸傍岸頭無人春草綠船頭日出炊煙起買魚攜菜來就市漁人水惡不出門蕭條野市無雞豚堤邊紙錢灰若雨洗酒賽神巫降語南人艇子不避風横江五兩翩翩去北鄰賣餅兒每五鼓未旦即遶街呼賣雖大寒烈風不廢而時略不少差因為作詩且有所警示秸秬城頭月落霜如雪樓頭五鼓聲欲絶捧盤出户歌一聲市樓東西人未行北風吹衣射我餅不憂衣單憂餅冷業無髙卑志當堅男兒有求安得閒讀蘇子瞻韓幹馬圖我雖不見韓幹馬一讀公詩如見者韓生畫馬常苦肥肉中藏骨以為竒開元有臣善司牧四十萬匹屯山谷養之罕用食之豐力不曾施空長肉韓生圖像無乃然我謂韓生巧未全君不見昔時騏驥人未得饑守鹽車唯有骨昂藏不受塵土侵伯樂未來空佇立騏驥乏食肉常臞韓生不冩瘦馬駒誰能為驥傳之圖不如凡馬飽青芻再和馬圖我年十五遊闗西當時唯揀惡馬騎華州城西鐵駿馬勇士十人不可覊牽來當庭立不定兩足人立迎風嘶我心壯此寧復畏撫鞍躡鐙乗以馳長衢大呼人四走腰穩如植身如飛橋邊爭道挽不止側身逼墮壕中泥縣空十丈才一擲我手失轡猶攅蹄迴頭一躍已在岸但見滿道人嗟咨關中平地草木短盡日散漫游忘歸驅馳寧復受鞭策進止自與人心齊爾來十年我南走此馬嗟嗟入誰手楚鄉水國地卑汙人盡乗船馬如狗我身未老心已衰夢寐時時猶見之想圖思畫忽有感况復慷慨吟公詩達人遇境貴不惑世有尤物常難得寧能使我即無情搔首長歌還歎息郭圃送蕪菁感成長句蕪菁至南皆變菘菘美在上根不食瑶簪玉筍不可見使我每食思故國西鄰老翁知我意盈筐走送如雪白蒸烹氣味元不改今晨一餐和南北孔明用蜀最艱窘百計捃拾無遺策當時此物助軍行渭上褒中有遺植英雄臨事究瑣屑終服竒才屈彊敵想見躬耕自灌畦當時有意誰能測蕭朝散惠石本韓幹馬圖馬亡後足世人怪韓生畫馬身苦肥幹寧忍不畫驥骨當時廐馬君未知開元太平國無事戰馬卷甲飽不騎玉關槖駝通萬里長安第宅連諸姨笙歌錦繡遍一國六龍長閒空食粟霜甜秋草沙苑遊日暖春波渭川浴脽圓腰穩目生光細尾豐膺毛帖肉珠鞍玉鐙驕不行豈有塵埃侵四足韓生丹青寫天廐磊落萬龍無一瘦豈知車下骨如牆饑齧草根刺傷口君家古圖才半身千里騰驤已有神迴身側顧不無意剪騣絡頭嗟失真君不見太宗戰馬拳腹毛身騎此馬縛羣豪龍虎精神金鼓氣豈有閒地供脂膏至今畫圖快胷臆想見虬鬚親破賊那知但愛廐中肥漁陽筯脚蹄如石神駒入水隨煙雲蜀山石路無行人六驥悲鳴足流血騎騾遺事一酸辛奉先寺荒凉城南奉先寺後宫美人官𦵏此角樓相望髙起墳草間栢下多石人秩卑埋骨不作塜青石浮屠當丘墳家家墳上作享亭朱門相向無人聲樹頭土梟作人語月黑風悲鬼揺樹宫中養女作子孫年年犢車來作主廢后陵園官道側家破無人掃陵域官家歲給半千錢街頭買餅作寒食田家野塘積水綠可染舎南新栁齊如剪去冬雪好麥穂長今日雨晴初擇繭東家饋黍西舎迎連臂踏歌村市晩婦騎夫荷兒扶翁月出橋南歸路逺海州道中二首孤舟夜行秋水廣秋風滿帆不揺槳荒田寂寂無人聲水邊跳魚翻水響河邊守罾茅作屋罾頭月明人夜宿船中客覺天未明誰家鞭牛登隴聲秋野蒼蒼秋日黄黄蒿滿田蒼耳長草虫吚吚鳴復咽一秋雨多水滿轍渡頭鳴舂村徑斜悠悠小蝶飛豆花逃屋無人草滿家纍纍秋蔓縣寒𤓰女几祠下山邊白雲閒不掃山下松花龍甲老東風古栢吹暖香廟前土馬荒春草朝霞為裳水為珮守廟千年老龍在清風掃堂神欲還山頭月出溪潺潺從黄仲閔求友于泉炎暑戰已定清秋當抗衡碧雲生雁思幽草見蛩情晒麥村墟静觀書枕簞清誰能酌𤣥酒來破屈原醒贈陳履常勞苦陳夫子欣䎹病肺蘇席門迂次數僧米及時無㫖蓄親庖急青錢藥裹須我場方不給何以縶君駒至安化驛先寄淮陽故人蕭條安化驛倦客思悠哉積水連天濶青山送客來疎籬風捲葉敗屋雨生苔寄語淮陽舊人今放逐回酬同年徐正夫司戸時欲築室嵩洛間少别老相見無言空惘然功名屬多病詩酒樂衰年􅚚厭顔公粥囊須趙壹錢歸裝何日辦嵩少好林泉破幌破幌一㸃白卧知千里明低窻通雪氣喬木尚風聲傳柝軍城静鳴鐘梵刹清髙眠尋斷夢鄰樹已烏驚秋懐三首木落晩風急宵凉侵暑衣有期惟向老無計未成歸只益顛毛脱還從髀肉肥感時仍弔古回首意多違衰鬢不堪洗病軀先覺隂天寒白日短歲暮亂山深薄酒醒無力危絃奏不禁謀身老逾拙三聴洛陽砧清秋萬里興力疾上髙臺歲熟雉兎飽風髙榆栁摧晩篁元自綠幽菊為誰開寂寞無人問鄉書久不來宿銅陵山色日已遠問人歸路長碧天凉後濶秋物雨餘荒人静路傍寺鳥啼林下房銅陵竟何就空死漢呉王冬夜山静寒雲薄天空孤月明霜桐占堦影風葉繞廊聲經濟心難就蹉跎歲屢更㝠鴻本清逺何事亦宵征和西齋山色供開鏡溪光照掩扉暗蟲先夜響萎葉近秋飛灌壠晴蔬出窺籠暮鶴歸鳴琴坐朗月輕露㸃秋衣春寒客舎逢桃李清尊聊自懽夢中驚夜雨醉裏度春寒草色逺還綠鳥聲晴更繁預期多病眼花發莫辭看歲暮書事二首歲晏北風疾山空萬谷號木枯隨意折鴻斷不成髙深屋支蓬戸温爐暖緼袍老天元不寐鳴竹鼓蕭騷原廟依岡起傳為世祖營南陽無雊雉熊耳合投兵霜日蓬原路天風栢殿聲山川英氣在不負昔聞名宿東魯父店郡國何時極覉愁觸處生望隨天不盡春共野兼平煙樹淮南濶漁鹽楚俗輕飄零五年别歎息鬢毛更春望暖日晴熏草清淮濶浸天地卑連逺水城廢入春田目極風燈外愁縣涙臉邊人生苦多感花栁自年年同七兄及崧上人自墳莊還寺和風快人意岸幘晩衿凉日落野㾗碧月生淮際光論詩得靈運静語屬支郎不是耽閒散從來懶性長蔡河漲渾渾雖未巳浩浩竟東歸濶處長天近澄邊一鳥飛西風疎葦亂斜日逺村微淹泊從吾道扁舟伴釣磯泊長平晩望江穩夷猶櫂春歸杳靄天翠深交岸樹綠逺望川田漁酒數家市帆檣何處船登臨一回首無恨亦依然夏日三首蚓壤排晴圃蝸涎印雨堦花鬚嬌帶粉樹角老封苔問字病多忘過隣慵却廻晩凉還盥櫛對竹引清杯細徑依原僻茅蓬四五家山田來雉兎溪雨熟桑麻竹籠辰収果茅菴夜守𤓰頗知農事樂從此問生涯夜色川原合秋聲草木催星辰隨地濶河漢抱山來栖鶴凉先警饑烏夕未回髙樓對斜月鳴笛正清哀冬日雜興三首池館留餘雪西山照夕曛臘催梅蘂迸春向鳥聲新愁思仍當病風光欲近人年年桃李樹相對只傷神南壁蒼崖壯窮冬井落閒風聲先老樹日色避諸山落雁饑相向啼烏夕自還微微寒月影蓬户已深關擊柝山城閉疎燈野店扄疾風鳴夜谷晴水動浮星霜翼歸何晩鄰機織未停短歌時自和愁絶更誰聽建平途次野橋田徑滑官路栁條新流水伴遲日野花留晩春㸃空知去翼衝綠有歸人自笑諳岐路無勞更問津暮春夜雨輕寒拂曉晴牡丹開盡值清明庭前落絮誰家栁葉裏新聲是處鶯白髪欲來如有信青春歸去更無情便當種秫長成酒遠學陶濳過此生夏日雜興墻下溪流清且長夾溪喬木雨蒼蒼䙚風翠菓擎枝重照水圓荷舞葉凉蝸殻已枯黏粉壁燕泥時落汚書牀南山野客閒相過贈我能攜藥滿筐屋東蒼鳩呼雨屋東啼麥穂初長燕子飛竹裏人家雞犬静水邊官舎吏民稀溪聲夜漲寒通枕山色朝晴翠染衣頼有西隣好詩句賡酬終日自忘饑登海州城樓城外滄溟日夜流城南山直到城樓溪田雨足禾先熟海樹風髙葉易秋疎傅里閭詢故老秦皇車甲想東遊客心不待傷千里檻外風煙盡是愁京師廢宅當道朱門白晝扄髙堂歌吹久無聲古窻積雨昏殘畫朽樹輕隂長寄生門下老人時洒掃舊時來客歎平生艶姬驕馬知何處獨有庭花春自榮登城樓沙雨初乾巾褐輕獨披蓑蔓歩髙城天晴海上峰巒出野暗人家燈火明歸鳥各尋芳樹去夕陽微照逺村耕登樓已恨荆州逺况復安仁白髪生送泗州推官王永年致仕還鄉王年四十而致仕士大夫所少也為憶田園便拂衣休官退勇似君稀塵埃擺脱青衫去閭里驚嗟黑髪歸南畆稻糧仍歲熟舊山芝术入秋肥百年從此皆閒日寄語人間浪是非自海至楚途次寄馬全玉蕭蕭晩雨向風斜村逺荒凉三四家野色連雲迷稼穡秋聲催曉出蒹葭愁如夜月長隨客身似飛鴻不記家極目相望何處是海天無際落殘霞夏日黄簾翠幔斷飛蠅午影當軒睡未興枕穩海魚鐫紫石扇凉山雪畫青繒廊隂日轉雕欄樹坐冷風生玉盌氷滿案詩書塵蠧甚故應疎懶過炎蒸遣興和晁應之蓬門鳥雀啅黄昏歸逕牛羊各有羣水濶蛟龍隂後出山空虎豹夜深聞西來谷引秦川雨南去秋連楚澤雲唐漢廢興無處問西風禾黍但丘墳渡洛因泛舟東下數里頗憶淮上沄沄清洛轉山隈渺渺東流不復回輕鳥竟隨青嶂去亂波争泛夕陽來偶驚舟楫鄉心起乍脱塵埃病眼開疑是盱眙郭門外月明帆席過清淮和周亷彦山光不動晩雲垂芳草初長襯馬蹄新月已生飛鳥外落霞更在夕陽西花開有客時攜酒門冷無車出畏泥修禊洛濵期一醉天津春浪綠浮堤春日遣興流光向老惜芳菲搔首悲歌心事違綠野染成延晝永亂紅吹盡放春歸荆榛廢苑人閒牧風雨空城鳥夜飛斷送一番桃李盡可憐桑柘有光輝卧病月餘呈子由風葉鳴窻已復朝喚回歸夢故山遥酒壺暗淡浮塵集藥鼎青熒敗葉燒閉户獨依寒蟋蟀移牀更就雨芭蕉病深欲請安心術長日如年未易消次韻張公逺平淡春雲捧額浮秋光劒㦸近人流無腸可斷方為恨有藥能治不是愁欲待挑琴聊試術未傳驅豆更何謀遥知添得寒窻夢尤在華堂綺席頭雙槐晩秀三月一日初見新葉東皇無處著繁華亦復分張到我家他日老蒼悲敗枿今晨嫩綠出新芽秃翁承弁纎纎髪村婦縈鬟草草花桃李蹊中人迹絶綠隂門巷正藏鴉登山望海鳥去蒼煙古木人歸綠野孤舟信美雖非吾土消愁且復登樓霅溪道至四安鎮苕霅清秋水底天夜帆燈火客髙眠江東可但鱸魚美一看溪山直萬錢上元都下二絶淡薄晴雲放月華晩粧新暈臉邊霞管絃樓上争酤酒巧笑車頭旋買花驕馬金鞭白面郎雙鬟小女坐車箱輪聲轆轆歸何處留得紅籠絳蠟香傷春二首浮雲冉冉送春華怯見輕寒日欲斜半夜雨聲能㡬許曉來落盡一城花嫩紫妖紅惜不得亂隨風雨㸃蓬蒿荒田野草花開晩主管春光屬爾曹春雨中偶成春隂只與睡相宜卧聽鳴禽語復飛一縷斷香浮不散何人深院晝熏衣懐金陵二首壁月瓊枝不復論秦淮半已掠荒村青溪天水相澄映便是臨春閣上魂曾作金陵爛漫遊北歸塵土變衣裘芰荷聲裏孤舟雨卧入江南第一州宋元詩㑹卷二十六
