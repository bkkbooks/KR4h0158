body:
  text: 宋元詩㑹卷九十一兵部主事陳焯編楊維楨字亷夫㑹稽人泰定丁卯進士署天台尹改錢清塲鹽司狷直寡諧十年不調後遷江西儒學提舉未上值兵亂避地富春山徙錢塘張士誠屢招不往又忤達實丞相自蘇徙松江主盟詞壇東南鴻雅造訪其廬户屨恒滿喜戴華陽巾披鶴氅吹鐵笛作梅花㺯因號鐵崖慕之者以為神仙中人也明初徴詣闕廷咨考禮文兼定元史即以白衣乞骸骨歸抵家而卒年七十五所著書數百卷其擬古樂府尤為擅塲赤堇篇呉鈎父悖子楚邪臣逆君曷比赤堇精新鑄雙龍文作世無價寳三鄉何足論倚天落旄頭仰日裂飛雲一怒安天下持以奉至尊海客行海客朱雀航下有五鳯房三月發長干六月下淮揚清絲牽白日羅幕西風凉大姬勸金露小姬彈空桑中姬執藥饌調氷浣肝腸海客睡不起明晏賽神羊驪山曲驪山鬱崔嵬宫闕金銀開月生鳷鵲觀雲遶鳯凰臺宫中紅妝子調笑春風媒青鳥銜巾去乳鹿送花來天王太白次地皇金粟堆石馬動秋色羌笛連暮哀只今瑤池水八駿渴生埃要離塜金昌亭下路春草沒荒丘云是要離塜令人生古愁侏兒三尺幹不佩雙呉鈎中包猛士膽白日照髙秋忍死屠骨肉視身若蜉蝣荆軻不了恨慶忌成身謀如何五噫客死與爾同仇香山篇太湖西濵西施種香之所放舟脂塘曲盤遊湖上雷雷鳴湖雨作還泊香山隈美人鬭香草上有九畹栽美人在何所搴芳招歸來露下荆棘草鹿上姑蘇臺紈扇辭團團合歡扇似此月嬋娟嬋娟有時缺我扇豈長圓秋風落桐葉我扇同棄捐不得如秋葉吹墜在君前虎丘篇路出女墳湖警蹕霸王驅靈池飛霹靂枯塜走於莵老禪猶㸃石仙鬼只疑狐祖龍來發閟銀海翩飛鳬詠古騷雅去已乆宫體争哇淫洛陽風一變枳性隨人心鄉闗思蕭瑟作賦哀江南調入金釵臂亡國有餘音采菱曲箬下清塘好清塘勝若耶鴛鴦飛鏡浦鸂鶒睡銀沙兩槳夾螳臂雙榔交犬牙照波還自惜艷色似荷花袖惹紅萍溼裙牽翠蔓斜大堤東過客背面在蒹葭日落江風起清歌雜笑哇道旁騎春風扇官道官栁黄金條道旁百金騎俠氣争春饒竹間小桃花嫣如董嬌嬈下馬隔花語疑是花中妖梁父吟步出齊城門上陟獨樂峰梁父昻雉堞蕩隂夷鬛封齊相殺三士杵臼不能雄所以梁父吟感歎長嘯翁吁嗟長嘯翁相漢起伏龍闗張比彊冶將相俱和同上帝弃炎祚將星墮營中抱膝和梁父梁父生悲風送客洞庭西送客洞庭西雷堆青兩兩陳殿出空明呉城連蒼莽春隨湖水深風將潮聲長楊栁讀書堂芙蓉采蓮槳懷人故未休望望欲成往夏駕石鼓詞在夏駕山髙一丈徑三尺下有盤石為足諺云石鼓鳴三呉兵周家十圜鼔散落陳倉野猶有夏駕石盤盤駕之下秦鞭血山骨呉獵焦火野夏鼔建不拔石鳴知者寡父老愳䜟言山空石長啞陳祖檜在長興大雄寺檜中空裂為四支垂䕃半庭堅如金石相傳陳髙祖於梁天監年手植於此大雄寺即髙祖之故宅也陳皇有遺宅迺在烏山中當時手所植花木羅青紅獨有左紐樹閲世如龜龍懷哉手植人不見三閣崇後庭種玉樹金井凋秋風勸農篇今日當假我縣守初出郭出郭到誰家田父有新約桑隂抽扊扅石碕度略彴田父喜我來釃酒出杯杓招徠道上氓賣刀買黄犢水南駕魚梁水北築穡屋十分麥上塲兩番蠶上箔丞願吏不妖重願嵗不惡呼婦殺黄雞重話田間樂家仕歎小仕時為農古有當㑹稽豈皆食其官以官養旄倪千金買作郡萬金收滿車三年逓郵傳誰以民為家覽古十二首單父七絃琴為治務感興十金南門木立令務必行單父有成言夜漁若嚴刑南門能徙木不能徙民情以此知巧信不如拙而誠恭儉漢天子取士忌少年未應絳灌徒庭中肯妨賢徒為宣室召復有長沙遷不見馮都尉唐龎眉竟誰憐郭解本大俠睚眦殺人威當其出邑屋獨不殺倨夷屬吏脱踐更卒感肉袒來此事實近道可以俠少之出闗棄繻子南征笑狂生左右無黄髪淫夫挾之行戮殺漢使者君臣起大兵尉佗羈漢綬何曽請長纓子陵江海客本非沮溺倫仁義立奇論豈果忘吾民狂奴作故態飄然歸富春客星犯帝座太史奏天文故人信符䜟三公等浮雲董卓劫慈明荀爽次以及伯喈蔡邕子龍獨何人申屠蟠談笑卻啀啀髙視梁碭上片雲卷而懷古來髙世士塵埃豈能埋襄陽有髙士生産不曽治何以遺妻子鹿門有深期籍籍齒牙論龍鳯名諸兒諸葛拜牀下可是圯橋師汝南許文休喪亂一駑士敢當諸葛拜合受蜀主鄙士論推指南無乃失臧否乃知郡公曹排擯有公是洛陽輕薄子挾彈走春嬉結交金谷友謟事賈午兒蔑棄慈母訓乾沒不知幾感已賦閒居猶以拙自悲我愛王懷祖面壁售人罵不比少掾時瞋目答米價褊中頓有容坦之詎能過桓桓大將軍漢業在出跨韓信卜母地旁置萬人廬郭公卜鄰水長洲偶成墟千秋揚子窆投棄同江魚裸髪何為者厭魅開羣愚孰借神丁火焚郤青囊書鄭州跛男子婁師徳識者惟客師袁客師深沈有容量不為同列知唾面戒其弟俛世一何卑君看白水澗沫額宣駑資按楊鐵崖詩集别本於西湖竹枝詞之尾附見和章十數家而女子薛蘭英乃最後一人也蘭英所和止於絶句而已其後接排覽古諸作仍係鐵崖集内詩近見坊選竟以屬之蘭英此大誤也觀者辨之篳篥吟張猩猩嗜酒復嗜音春雲小宫鸚鵡吟猩猩帳底軋胡琴一雙銀絲紫龍口㵼下驪珠三萬斗劃然大豆爆絶絃尚覺鶯聲在楊栁神絃夢入鬼工秋湘山搖江江倒流玉兎為爾停月臼飛魚為爾躍神舟西來大官坐栲栳羌絲啁啁聴者惱張猩一曲獨當筵乞與五花金線襖春風殘絲二十年江南相見落花天道人春夢飛蝴蝶手弄金瓢合簧葉張猩猩淚如雨面如霞勸爾更盡雙叵羅白頭呉娥年少歌金釭悲啼奈樂何内人阮琴圖為顧瑛作花㸃呉鹽春欲老翡翠飛來翥芳草美人睡起春思深彈絲拊木冩同心茘枝五絃調急緩阮家月琴軸初綰須㬰鈞天雙合樂南熏殿中風動幕棃園樂官樂不鳴宫中之音和且平内人吹篴詞天寳年來教春坊紫雲製曲吹寧王美人何處竊九漏耳譜亦解傳伊凉鵾絃轉斷黄金軸獨據胡牀弄横玊冶情忽逐野鶯飛十指紅蠶迷起伏御溝水暖浴鵁鶄天地乆無征戰聲芙蓉楊栁自搖落豈識黄雲邊塞情西樓今夜月色午内人思仙望河鼓白日蕭條鳯不來井梧風動神烏語内人剖𤓰詞轆轤索褪垂金井水殿風來晩花浄美人睡起袒蟬紗照見臂釵紅肉影茘子漿酸搖左車阿母新進朱陵𤓰侍奴手浴井花冷水冰金盆擎掌窊鸞刀未破圓玉斗斗破紅氷驚落手玊郎渴甚索相嘲可忍食殘團月凹屏風謠瑠璃怯寒翡翠熱芍藥芙蓉四時絶深堂氣候異冬春門外酸風箭入骨匡牀毾㲪踏香雪紅姬扶醉醉眼纈金缸燄燄照羅襪阿瞞嬌郎慎輕劣隙光射人如白日西溪曲西溪溪口東岡道楊栁隂隂春欲老花間繫馬我曽來紅雨傷春迹如掃美人勸我金巵漿玉臺贈以盤龍寳願作西溪一水魚趂爾音顔為予好城南將軍同醉倒殯宫今已生春草湖中女湖中水滑如脂湖中女芙蓉姿湖中小槳蕩蓮葉唱得呉王白雪詞輕裾利屣踏雁足為客髙歌射明目生年不作人家婦東人西人喚恩主主家薄倖恩不終歸來抱瑟彈孤鴻琵琶怨蜀絲鴛鴦織錦縚邏檀鳯凰斷金槽絃抽甕繭五色毫雙成十指聲嘈嘈冡頭青草天山雪眼中紅氷嵬下血哀絃悽斷感精烈池上蕤賔躍方鐵周郎玉笙謠絲竹之器貫古今而聲不可以變者惟笙也潘安仁謂笙總衆清之林衛無所措其邪鄭無所容其淫者是以樂記曰竹聲濫濫以立㑹若笙又立㑹之要者故䕫以儀鳯鳥接浮丘之仙也於虖下俚哇沸笙師之教幾歇矣金華周郎琦獨聰于此余嘗靈巖虎阜間聞其奇哢令人飄飄然有伊洛間意時坐客句曲張真居東海倪元鎮崑丘顧仲瑛雲丘張仲簡呉興郯九成咸名能詩者也余為賦玉笙謠一首且率諸君子同賦余又為引之如此周郎學仙吹玉笙玉笙吹得丹山七十二鳯之和鳴曽侍瑤池阿母讌坐中調笑董雙成謫向人間赤松洞洞口桃花苦迎送南尋二女湘水頭十三哀絃不成哢西洞庭東洞庭相逢鐵笛銅龍精從我吹春玉臺上叢霄不許謝𤣥卿毛女沙丘腥風吹腐龍華隂毛竹藏雙魚叶農宫中雨露不可食啖松啖柏留春容桃花流水迷紅霧十二峰頭度朝暮自是嬋娟有仙骨入海徐郎豈知故衣沐雨鬟櫛風槲葉楚楚山花紅秦樓舊鏡掩明月咸陽目送雙飛鴻羅浮美人海南天空月皜皜三山如拳海如沼緑衣歌舞不動塵海仙騎魚波嫋嫋翩然而來坐芳草皎如白月升林杪洗粧不受瘴烟昏縞袂初逢鴻欲矯手持君山老人笛黄鶴新腔知者少江南吹斷桃葉腸雨聲夜落巫山曉昭君曲塞雁向南飛明妃西嫁幾時歸塞酥入饌損漢食朔風中人裂漢衣朔音不通言語譯分死薄命穹盧域君不見越中美人嫁姑蘇敵國既破還陶朱嗟嗟孤塜緑草碧祇博呼名雙白璧篳篥吟春風吹船下揚州夜聴篴聲江月流故宫搖落楊栁衰客子於邑山陽愁明朝此聲不可求乃知朔客杜寛者手持悲篥尋南遊邊笳拍中愁未休龜兹角筦親編收王門歴盡及五侯翩然鴻飛不可留篴材既訪柯椽鎪更協鳯鳴崑崙丘卷蘆易地鳴隴頭城南思婦歌牽牛欲絶未絶一縷抽劃然石裂千丈湫呌噪鵝鸛飛蛟虬洞庭之水天東浮杜寛杜寛藝絶優藝隠豈比閔張儔為君貰美酒不惜千金裘和我君山鏌邪笛與爾同登黄鶴樓李夫人絶代一佳人美色如洛妃春月為作眉上彀秋水為作眼中陂歌瓊㽔舞玉枝君王有情不自持玊枝一夜摧瓊蕤一朝落君王之心何以樂若有人兮有若無來遲遲兮去促促芙蓉葉上清露結晴光倒射金虹滅山為雲海為雨何得分明夢中語素娥影沒百子池靈風吹散綵霞姿虎威將虎威將何鋒稜曽斬故人雙涕零不隨漢水死樊城歸國欲為秦孟明虎威將謁髙陵不如白馬將先軫賜䇿圖丹青的盧馬大耳主呼阿盧阿盧努力託我千金軀檀溪水深不見底阿盧一躍三丈餘君不見當陽橋沔水渡一雙羽翼真都䕶豈知阿盧論功不在闗張下亂宫奴亂宫奴錦襜褕淫如秦嫪毐驕如馮子都春風永巷花龍駒内家官爵賤如土昨夜宫奴官上柱葦衣篾帶血魂啼石子岡頭天嘯雨桓桓虎將吞熊貔燕席豈受宫奴欺虎將死作椎鬼夢中撃奴奴不起老馬戀棧豆曹􅐩以桓範鄉里老宿特禮之及懿起兵召範範以車駕在外乃南出懿謂蔣濟曰知囊往矣濟曰範則智矣駑馬戀棧豆爾􅐩必不能用也範勸􅐩計皆不從􅐩乃投刀于地曰我亦不失作富家翁範笑曰曹子丹佳人生汝兄弟㹠犢耳何圖今日坐汝族㓕曹真五子皆封侯真字子丹懿圍爽第四角起髙樓令人在上察動静老馬戀棧豆棧豆不多時老駑老待死豈復千里馳哀哀㹠犢子身隨六龍飛老駑空獻䇿㹠犢復何為㹠犢子窟室方聚麀五侯宅前起髙樓智囊乃是都鄉侯夕陽亭夕陽亭馬超超車驅驅問髙貴今何如夕陽亭行且止白沙一信南風起千載髑髏夜生齒項成大府攝鬼豪論功闕剪當塗髙竹書小兒既有罪夕陽老魅誅何逃於乎桐宫空斃金屑斚鴛鴦榼中牛繼馬鳩酒來悲煬帝也鳩酒來酒不來永巷閣門門已開十二小兒衣濺血咫尺抽戈猜阿孩破木衝錦纜斷播郎不到流珠堂蕭娘已逐行春館練帶巾髹榻板七寳焚衣孰長短大健兒唐太宗常曰當今名將惟李勣道宗萬徹而已勣道宗雖不能大勝亦不大敗至萬徹非大勝即大敗徹自建成敗後嘗隠于終南山晩節再出乃為房氏不肖子所䧟君子惜之燉煌有力士自稱大健兒氣吞黄狼纛義扶白鵲旗李家春宫子去逐春宫起海池敵虬髯不識真天子天子親評三大將鴨緑歸來肆驕宕快刀不斫兩牝妖躄足甘為羣䑕葬老荆盜弄金烏丸手持血日夢中還何如短衣疋馬射猛虎老死不出終南山石婦操并引石婦即望夫石也在處有之詩人悲其志與精衛同不必問其主名也予為詞補入琴操云峩峩孤竹岡上有石魯魯山夫折山華嵗嵗山頭歌石婦行人幾時歸東海山頭有時聚行人歸啼石柱石婦岑岑化黄土大數謠梁朝老檜昨夜死海聲已入西門市草中張伯懷璧子丹缾有書誰識此小夫争爵幾時休二十四老前無儔黄金無方鑄髑髏樓船夢過西流洲更生靈香那得偷大樹夜聴聲如牛公無渡河公無渡河河水清兮不見泥公身非水犀狂風黑浪欲何濟公不能濟横帆在河西青頭少婦泣血啼有年不死將誰齊公死河靈伯妾死河靈妻烏夜啼并引古樂府烏夜啼者宋王義慶妓妾報赦之詞予為補之而少見規誡之義云蘢蔥髙樹青門西夜夜栖烏來上啼報君凶報君喜願君髙樹成連理啼夜夜八九子莫使君家髙樹移烏生八九烏散飛眉嫵詞朝畫眉夕畫眉畫眉日日生春姿長安已知京兆嫵有司直奏君王知君王毛舉人間事不咎人間夫婦私胭脂井井無水荒龍椅不得如巴馬子仰天夜見黄姑星水底嘍嘍話紅鬼井中之人不殉死宫人斜在雷塘趾平原君平原君起朱樓美人盈盈樓上居槃跚跛波彼何叟美人一笑槃跚愁門下士引去不可留美人髙價千金直千金不惜美人頭君不見帷中婦女觀跛者一笑五國生戈矛馮家女幷引漢司𨽻馮方之女也避亂揚州袁術見而悦之遂納焉甚愛幸諸婦思害其寵語之曰將軍貴人也有志節當時時涕泣憂愁以長見欽重馮氏從之後諸婦因共絞殺繫之厠術誠以為不得志而死也馮家女緑髪盤雙鴉離亂棄鄉土聘入將軍家將軍愛幸諸婦妬顔色粹美無疵瑕掩鼻襲餘衍淚眼啼春華馮家女昨日堂上人今朝厠中鬼將軍不為疑司𨽻不為理道傍古冡生棘榛千年古憤何由伸嗚呼古憤何由伸金臺篇金臺起朔方金色照天光上有七十二鳯凰金居玊食髙頡頏王不居心獨苦拜師禮士心逾下羣賢起南西東國恥一洗黄金空十年燕雌今日雄君不見姑胥何用黄金屋野鹿穿花豕銜蓐大難日來日大難君不知焦心敝力欲何為早知大難學安期煉煮丹石服靈芝大藥誤死世所嗤不如美酒千日可辟饑美酒不獲暢中腸千嵗而死名為殤白雪詞癡雲蔦日日為黄白光半夜漏東方廣寒兎老玊髪蜕一剪剛風落人世錦宫肉屏香汗溶酒如春江飲如虹彩鸞簾額不受捲酒面洗作梨花風階下獅子積不壞十日璚田換塵界金鉦取挂扶桑曉照見璚田出寒莩柏谷詞柏谷險君勿趨君一趨龍為魚槳長豈識真龍軀賴爾老婦能挽夫論報不賜誅槳長本無辜舉之羽林郎大將軍可奴蹋踘篇二首江南女兒花娟娟五花繡出葵花圓蹋花上下雙文鴛雙文鴛玊連瑣髻斜斜馬初墮金鞭齊停馬上郎落花旋風掃毬場繡輪擲過東家牆東家牆噪雙燕平頭奴握便面邯鄲弄二首邯鄲市上美人家美人小襪青月牙繡靴對著平頭鴉平頭鴉塌場下包銀壺䭾細馬裠翻栁腳垂青空水風吹亂秋芙蓉須㬰氣喘如渴虹如渴虹索銀癭轉轆轤飲金井雉朝飛琴操有雉朝飛多指牧犢子作據揚雄所記則曰雉朝飛者衛女傅母之所作也衛女嫁齊太子中道太子死問傅母曰且往當喪喪畢女不肯歸終之以死傅母悔之取女所自操琴於塜上鼔之忽有雉出墓中傅母撫雉曰女果為雉也言未畢雉飛而起故其操曰雉朝飛予以牧犢子之歎不如衛女之善死有闗世教也故賦以補舊樂府之缺云雉朝飛一雄挾一雌雄死雌誓黄泥歸衛女嫁齊子未及夫與妻青縭綰素結一死與夫齊人言衛女蕩且離焉得塜中有雉飛琴聲鼓之聞者悲貿絲詞鳴鳩毋止棘止棘為摧薪女子母貿絲貿絲為棄人相逢誓作同穴親六禮一失結髮不終身外為狂夫暴内為兄弟哂叶平寄語貿絲女卜語不可信况乃卜非真獨漉篇古樂府獨漉篇為父報仇之作也太白擬之轉為雪國恥之詞予在呉中見有父仇不報而與之同室處者人理之滅甚矣為賦此詞獨漉獨漉惡木濁叶逐仇家當族孝子免汙辱孝子軀幹小勇氣滿九州拔刀鞘中睨父仇父仇未報何面上父丘漆仇頭為飲器臠仇肉為食嘬頭上之天纔可戴桓山禽古樂府有上留田行上留之地有父死而兄不字其弟者鄰人為弟作悲歌以風其兄南俗兄違父命而虐其庻弟於父死之後者往往有焉故賦桓山鳥以繼上留云桓山鳥鳴聲一何悲嚴父戒二子分財無嫡支父死未葬命已違兩枝荆花摧一枝嗚呼桓山鳥鳴聲實堪悲死隔别生流離百鳥聞之為嗟咨結襪子古樂府有結襪子大抵言感恩重而以命相許也太白擬之亦然予以結襪子屬張釋之張釋之天下稱賢故為是詞漢家九陛飛秋霜公卿聚㑹立朝堂王生何人談老黄廷辱廷尉理不當廷尉跪結襪有如壯夫出跨下面無慚色神洋洋君不見黄石公進張良夏侯章低孟嘗長者之名從此敭鍾離鍾離女臼頭深目凹鼻唇皮膚若煙面如塵手有五色之綵線為君補衮成天文漸臺之君荒且悖明朝夷臺作平地太子擇日正儲位鍾離在宫齊國治梁家守藏奴將軍椒房親跋扈闞如虎嗟嗟孫家兒豈識鳶肩主有司夜捕拏藏婢及人母紫金與白珠沒入將軍府吁嗟乎梁家婢何太苦不知將軍妻秦宫婦三主六宫七貴人明曰飛花亂紅雨大唐公主逺嫁行朔方聴鏑忘劬勞外家未必亡飛髇如何異族待同胞丹鳯下與梟為巢君不見大唐公主親嫁辱終唐老鶻來相鈔渡河歸來話涕泣後人猶以昏為交城西美人歌丙戌花朝後一日與客遊長城之靈山宴于城東老人所時偕遊者城西美人靈山秀也酒酣作城西美人歌長城嬉春春半强杏花滿城散餘香城西美人戀春陽引客五馬青絲韁美人有似真珠漿和氣能消氷炭腸前朝丞相靈山堂雙雙石郎立道旁當時門前走犬馬今日丘壟登牛羊美人兮美人舞燕燕歌鸎鸎蜻蜓蛺蝶争飛揚城東老人為我開錦障金柈薦我生梹榔美人兮美人吹玊篴彈紅桑為我再進黄金觴舊時美人已黄土莫惜秉燭添紅妝修月匠歌按酉陽雜俎太和中有王秀才遊嵩山迷道見一人枕幞而卧曰君知月乃七寳合成乎月勢如丸其影則日爍其凸處也常有八萬二千户修之予即一數因作修月匠歌天公弄丸七寳鈿脃如琉璃折如線月宫匠人八萬户勅賜僊㕑瓊屑飯什什伍伍入杳㝠妙手持天輕欲旋千斤寳斧運化鈞混沌皮開精魄見羿家奔娥太輕脱須㬰踏破蓮花瓣十二山河影碎中輪郭重完氷一片縹緲長縣玊臼飛堅牢永絶妖蟇患封詞何用蟣蝨臣功成萬古䝉天眷一歸蘭路不知年兎子花開三萬遍廬山瀑布謠甲申秋八月十六夜予夢與酸齋遊廬山各賦詩酸齋賦彭郎詞予賦瀑布謠銀河忽如瓠子決瀉諸五老之峰前我疑天孫織素練素練脱軸垂青天便欲手把并刀翦翦取一幅玻璃煙相逢雲石子有似捉月僊酒喉無耐夜渴甚騎􅚪吸海枯桑田居然化作十萬丈玊虹倒挂清冷淵三男辭塗山鐵冶家張氏婦一産三男人以為奇事予獨稽諸史傳而有唐檀子之隠憂焉君不見羌人之妻産龍鷲駱家之婦生虎狸造物或好怪癡兒以為奇塗村鐵婦不畫眉健手能運千斤椎懷姙弗知十月期一誕三子如母豨鄰舍來賀子公相出茆茨親戚來賀子車葢生光輝里胥馳走聞有司三豎内有麒麟兒隂陽者流來布推張家瑞鳯三聮枝我聞其言信且疑歴扣古牒如元龜硤石三生未言瑞南昌四孕徒招非有條給乳本句踐五羊十帛胡多儀他日唐檀驗後事不如介葛聞三犧題楊妃春睡圖沈香亭前燕來後三郎鼓中放花栁西宫困人春最先華清溶溶煖如酒雪肢欲透紅薔薇錦襠卸盡流蘇幃小蓮敧擁扶不起翠被卷作梨雲飛蟠龍髻重未勝綰燕釵半落犀梳偃晩漏壺中水聲逺簾外日斜花影轉琵琶未受呼喚促睡重梨腰春正熟不知小䙀思塞酥夢中化作銜花鹿盲老公刺拜珠臺長也戊戌十月二十三日黨海冦用壯士椎殺之穆爾古蘓將黄中禽拜珠盡戮其家盲老公侍御史崇臺半面呼天子白米紅鹽十萬家鳯笙龍管三千指門前養客皆天驕一客解散千黄苗太阿之枋忽倒擲搥殺義鶻招羣梟一客死百客辱萬夫怒一夫獨生縛老盲來作俘百口賤良一日戮獨遣小娥年十五腰金買身潛出户䭾作倡家馬銅將軍刺偽相張士信丁未六月六日為龍井砲撃死銅將軍無目視有凖無耳聴有神髙紗紅㡌鐵篙子南來開府稱藩臣兵强國富結四鄰上禀正朔天王尊阿弟柱國秉國鈞僣逼大兄稱孤君案前大勢十妖嬖後宫春艷千花嬪水犀萬弩填震澤河丁萬鍾輸茅津神愁鬼憤哭萬民銅將軍天假手疾雷一撃粉碎千金身斬妖蔓拔禍根烈火三日燒碧雲鐵篙子面縛西向為呉賔周鐵星張氏亡國亡于其弟士信趣亡於毒斂臣周侲侲山陽鐵冶子以聚斂功至上卿伏誅日曰錢榖鹽鐵籍皆在我汝國欲富當勿殺我主者怒曰亡國賊不知死罪尚敢言是耶速殺之呉人快之或手額謝天曰今日天開眼也周鐵星國上卿談申韓為法經釘箠杖為刑千倉萬庫内外盈十有三賦争科名周鐵星鞭算箕斂無時停開血河築血城血戰艦血軍營刮民膏吸民髓六郡赤骨填芻靈齊雲倚天一日傾鐵星亡國法當烹尚將六郡金谷數死丐萬一充虞衡嗚呼周鐵星十抽一椎百萬釘誓刳爾髏作溺罌鐵星碎地啓瞶天開顭音盲蔡葉行刺倖佞臣蔡彦文葉徳新張氏亡國由大弟致此實由二佞丁未春二佞伏誅於臺城風乾其尸于秤刑者一月君不見偽呉兄弟四六七十年强兵富金榖大兄垂旒不下堂小弟秉鈞獨當國山隂蔡藥師雲陽葉星卜朝坐白玊堂暮宿黄金屋文不談周召武不論頗牧機務託腹心邊䇿憑耳目弄臣什什引膝前骨鯁孤孤納囚牿去年東臺殺普化今年南垣殺鐵木鳯陵剖棺取含珠鯨海刮商劫沈玊鬻官隨地進妖艷籠貨無時滿坑谷西風捲地來六郡下披竹朽索不御六馬奔腐木那支五樓覆大越先罪魁餘殃盡拏戮寄謝悠悠佞倖兒福不盈眦禍連族何如呉門市賣藥賣卜死亦足張按士誠委政於弟士信士信惟務酒色専用黄敬夫及蔡葉三人時民間有十七字謠曰丞相做事業専用黄菜葉一朝西風來乾鱉二月十二日玊山人買百花船泊山塘橋下呼瓊花翠屏二姬招予與張渥叔厚于立彦成遊虎阜俄而雪霰交作未果此行先以此詩寫寄就要諸公各和百華樓船髙八柱主人春遊約春渚山塘橋下風兼雨正值灌壇西海婦桃花衖口小蠻孃腰身楊栁隨風揚翡翠屏深未肯出蹋歌直待踏春陽喜聞晴語聲谷谷明朝豫作花遊曲小蠻約伴合吹笙解調江南有于鵠謝吕敬夫紅牙管歌吕云度廟老宫人所傳物也滄江泰娘葢敬夫席上善倚以和余天忽雷者故詩中及之鐵心道人吹鐵笛大雷怒裂龍門石滄江一夜風雨湍水族干頭嘯悲激樓頭阿泰聚雙蛾手持紫檀不敢歌吕家律吕慘不和換以紅牙尺八之氷柯五絲同心結龍首曽把昭陽玊人手只今流落已百年不省愁中折楊栁道人吹春哀北征宫人斜上草青青呉兒木石悍不驚泰娘苦獨多春情為君清淚滴紅永題伏生受書圖𤓰丘崩科斗藏典墳孰求楚左相金絲未壞孔子堂濟南老生教齊魯綿蕝禮官何足伍挾書嚴禁禁未開盤詰誰能禁齊語百年禮樂當有興天子好文開太平百篇大義喜有託十三女口傳嚘嚶太常掌故親往受百篇僅遺二十九河内女兒還可疑老人屋中有科斗建元博士孔襄孫五十九篇為訓文嘉唐悼桀空有詔孔氏全經誰與論倪家書生能受學一篇薦上元非樸賞官得列中大夫帝軌皇塗未恢擴漢家小康黄老餘烏用司空城旦書葢音闔師言治在何處後世徒走陳農車陳農車漢成帝時人明皇按樂圖大唐天子梨園師金湯重付軋犖兒何人端坐閲樂籍三萬纒頭不足支龜年檀板阿蠻舞花奴手中花如雨鈞天供奉真天人上亦親撾汝陽鼓玊奴檀槽倦無力忽竊寧哥手中笛邊風吹入新貢簫銅池夜夢雙飛翼閤門邊奏塞黈聰耳譜更訪明月宫漁陽一震萬竅聾梨園弟子散如雨惟有舞馬傷春風冬青塜篇老羝夜射錢塘潮天山兩乳王氣消秃妖尚壓龍虎怪浮圖十丈髙岧嶤文山老客智且勇夜舟拔山山不􅏒江南石馬乆不嘶塜上冬青今已拱百年父老憤填胸不知巧手奪天工冬青之木鬱蔥蔥六檟更樹蒲門東鴻門㑹天迷闗地迷户東龍白日西龍雨撞鐘飲酒愁海翻碧火吹巢雙猰㺄暗言范増項莊照天萬古無二烏殘星破月開天餘座中有客天子氣左肱七十二子連明珠軍聲十萬振屋瓦拔劍當人面如赭軍將下馬力排山石破青天撞玊斚警枕詞呉越王錢鏐自少在軍中夜來嘗寐倦極則就圓木小枕或枕大鈴寐熟輙攲而寤名曰警枕置粉盤于卧内有所記則書盤中比老不倦或寢方酣外有白事者令侍女振鈴即寤時彈銅丸于樓牆之外以警直更者嘗微行夜叩北門吏不肯啓闗曰雖大王來亦不啓乃自他門入明日召北門吏厚賜之不睡龍醒復醒珊瑚圓木搖金鈴五花寳簟芙蓉屏銅盤雪粉香淺清樓牆銅彈飛霹靂夜半更奴起辟易圓木功無與敵呉越封疆平地闢四世三王安袵席宋元詩㑹卷九十一
