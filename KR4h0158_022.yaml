body:
  text: 宋元詩會卷二十二兵部主事陳焯編蘇轍字子由年十九與兄軾同登進士科又同策制舉轍極言得失於禁廷之事尤為切至考官胡宿以為不遜請黜之仁宗曰以直言召人而以直棄之天下其謂我何宰相不得已置之下等授商州軍事推官改大名推官神宗立轍上書言事召對延和殿王安石出青苖書使轍熟議曰有不便以告勿疑轍開陳婉切安石頗頷之自此逾月不言青苖會河北轉運判官王廣兼迎合安石意奏請本錢私試其法於陜西自是青苖遂行不復能止轍移書安石力爭之大忤其意賴陳升之解救得為河南推官歷教授陳州掌齊州書記簽判南京坐兄軾以詩得罪謫監筠州酒稅移知績溪縣哲宗立以祕書省校書郎召擢右司諫力排邪正並用之説屏去王人遷中舍進户部侍郎代兄軾為翰林學士權吏部尚書使朔方還為御史中丞拜尚書右丞進門下侍郎紹聖初李淸臣等進用復言熙豐事激怒哲宗落職知汝州再責知袁州未至降少府監住筠州三年責化州别駕安置雷州移循州徽宗即位徙永州嶽州復大中大夫提舉鳳翔太平宫罷祠居許州再復大中大夫致仕政和二年卒年七十四追復端平殿學士諡文定張恕寺丞益齋人生不讀書空洞一無有羡君常齋居散帙滿前後開編試尋繹閲歲行自富從橫畫圖出次第宫商奏汪洋畜江河渺莽包林藪興亡數千歲絡繹皆在口顧念今所知頗覺前日陋我家亦多書早歲嘗竊叩晨耕挂牛角夜燭借鄰牖經年謝賔客飢坐失昏晝堆胸稍蟠屈落筆逢左右樂如聽鈞天醉劇飲醇酎自從厭蓬蓽誤逐功名誘初心一漂蕩舊學皆榛莠失足難遽回撫卷長自詬幸君無事年謂可終身守春耕不厭深秋獲當自受金玉或為災詩書豈相負過九華山南遷私自喜看盡江南山孤舟少僮僕此志還復難局促守破窗聯翩過重巒忽驚九華峯髙拱立我前蕭然九仙人縹眇凌雲煙碧霞為衣裳首冠青琅玕揮手謝世人可望不可攀我行競草草安能拍其肩但聞有髙士卧聽松風眠松根得茯苓壯若千歲黿煮食一朝盡終身棄腥羶腹背生緑毛輕舉如翔鸞相逢欲借問已在長松端同孔常父作張夫人詩女子勿言弱男兒何必強君看張夫人身舉十五喪頭上脫筓珥篋中斥襦裳築墳連丘山松柏鬱蒼蒼親戚不為助涕泣感道傍昔有王氏老身為尚書郎親死棄不葬簮裾日翺翔白骨委廬陵宦遊在岐陽一旦有丈夫軒軒類佯狂相面識心腹開口言災祥嗟汝平生事不了令誰當汝身暖絲綿汝口甘稻粱衣食未嘗廢此事乃可忘一言中肝心投身拜其牀傍人漫不知相視空茫茫終言汝不悛物理久必償兒女病手足相隨就淪亡鄙夫本愚悍過耳風吹牆明年及前期長子憂骭瘍一麾守巴峽雙柩還故鄉弱息雖僅存蹣跚亦非良誰言天地寬綱目固自張古事逺不信近事世所詳企張非求福禍敗當懲王桐軒桐身青琅玕桐葉蒲葵扇落落出軒墀亭亭奉間燕夜聲疏雨滴午影微風轉秋飈一凌亂淅瀝驚蔥蒨朝日失繁隂青苔覆遺片空使坐中人慨然嗟物變和子瞻記夢兄從南山來夢我南山下探懷出詩卷卷卷盈君把詩詞古人似弟則吾弟也相與千里隔安得千里馬攜手上南山不知今乃夜晨雞隔牆唱敧枕窗月亞百語記一詞秋菊悲蛩吒此語鮑謝流平日我不暇我本無此詩嗟此誰所借舟中聽琴江流浩浩羣動息琴聲琅琅中夜鳴水深天濶音響逺仰視牛斗皆縱橫昔有至人愛奇曲學之三歲終無成一朝隨師過滄海留置絶島不復迎終年見怪心自感海水震掉魚龍驚翻回蕩潏有遺韻琴意忽忽從此生師來迎笑問所得撫手無言心已明世人囂囂好絲竹撞鐘擊鼓浪謂榮安知江琴韻超絶擺耳大笑不肯聽巫山廟山中廟堂古神女楚巫婆娑奏歌舞空山日落悲風吹舉手雎盱道神語神仙潔清非世人瓦盎傾醪薦麋脯子知神君竟何自西方真人古王母飄然乘風遊九州朅渡西海薄中土白雲為車駕蒼虬驂乘湘君宓妃御天孫織綃素非素衣裳飄颻薄煙霧泊然沖虛渺無營朝餐屑玉咽瓊乳下視人世安可據超江乘山去無所巫山之下江流清偶然愛之不能去湍崖激作相喧豗白花翻翻龍正怒堯使大禹導九州石隕山隊幾折股山前恐懼久無措稽首山下苦求助丹書玉笈世莫窺指示文字相爾汝擘山泄江幸無苦庚辰虞余實相禹功成事定世莫知空山俄頃千萬古遊城西集慶園送客城西客已逺歸路北池接南苑冰澌片斷水光浮柳線和柔風力軟繚牆朱戶誰家園流水平畦春日淺禁河分澑一池足洛圃移花百金賤飛甍斤斧聲未絶翠柏栽培影初遍傍人笑指高臺處前年適見荒榛滿金錢力奪天地功歲月未多風物换人生富貴無不成都門坐置山林觀暖風遲日時一到早出莫歸應未晚主人最貴稀出城長使憧憧路人看司馬君實端明獨樂園子嗟丘中親藝麻邵平東陵親種瓜公今東去事農圃亦種洛陽千本花修篁繞屋韻寒玉平泉入畦紆卧蛇錦屏奇種斸巖竇嵩髙靈藥移萌芽城中三月花事起肩輿遍入公侯家淺紅深紫相媚好重樓多葉爭矜誇一枝盈尺不論價十千斗酒那須賖歸來曳履苔徑滑醉倒閉門春日斜王詵都尉寶繪堂詞侯家玉食繡羅裳彈絲吹竹喧洞房哀歌妙舞奉清觴白日一醉萬事忘百年將種存慨慷西取庸蜀踐戎場戰袍賜錦盤雕章寶刀玉玦餘風霜功臣子孫白晳長朱門甲第臨康莊生長介胄羞膏粱四方賔客坐華堂何用為樂非笙簧錦囊犀軸堆象牀竿義連幅翻雲光手披橫素風飛揚長林巨石插雕梁清江白浪吹粉牆異花沒骨朝露香徐熙晝花落筆縱橫其子變格以五色染就不見筆迹謂之沒骨鷙禽猛獸舌齶張騰踏騕裊聯驌驦噴振風雨馳平岡前數顧陸後吳王老成雖喪存典常坐客不識視茫洋卷舒終日未用忙遊意淡泊心清涼中秋見月寄子瞻西風吹暑天益高明月耿耿分秋毫彭城閉門青嶂合卧聽百步鳴飛濤使君攜客登燕子月色著人冷如水筵前不設鼓與鐘處處笛聲相應起浮雲卷盡流金丸戲馬臺西山鬱蟠杯中淥酒一時盡衣上白露三更寒湖隂曲老虎穴中卧獵夫不敢窺驊驑服箱驂盜驪巡城三匝漫不知帳中晝夢日繞壁驚起知是黃鬚兒馬鞭七寶留道左猛士徘徊不能過遺矢蜚空去已遙明日神兵下赤霄荒城至今人不住狐兔驚走風蕭蕭贈方子明道人水銀成銀利十倍丹砂為金世無對此人靳術不肯傳闔戶泥牆畏天戒今子何為與我言人生貧富寧非天鉗鎚橐籥枉心力虀鹽布被隨因緣我來江西晚聞道一言契我心所好廓然正若大虛空平生伎倆都除掃子言舊事淨慈師未斷有為非淨慈此術要將救飢耳人人有命何憂飢大秦寺大秦遙可説高處見秦川草木埋深谷牛羊散晚田山平堪種麥僧魯不求禪北望長安市高城逺似煙和北都偶成二首天寶亂已定河壖兵更多故城埋白骨遺俗喜長戈卧獸常思肉奔鯨不受羅緃橫竟安在唯見冡嵯峨禁禦封金殿清河貰石門時平餘古木兵散有空屯形勝山圍濶蕃宣海內尊川原不論頃雲夢可勝吞將出洛城過廣愛寺二首寺古依喬木僧間正莫年為生何寂寞愛客尚留連虛牖羅修竹空厨響細泉坐聽談舊事遍識洛中賢虛室無尋丈青山有百層回峯看不足危石恐將崩聽法來天女依巖老梵僧須彌傳納芥觀此信還曾送董揚休比部知真州奏課西南最分符江海衝往來觀惠術蟠錯試餘鋒文字從堆案樽罍強解容金山只隔水時復聽晨鐘寒食遊南湖二首繞郭春水滿被堤新柳黃官池無禁約野艇得飛揚浪泛歌聲逺花浮酒氣香晚風歸棹急細雨溼紅粧攜手臨池路時逢賣酒壚柳斜低繫纜草偃緑侵壺波蕩春心起風吹酒力無冠裳強包裹半醉遣誰扶覽輝亭城裏最高處坡陀見一城山多來有緒江逺靜無聲歌吹風前度樓臺雨後明風光同楚蜀聊此慰平生庾樓元規多逸興上客有殷生夜半酒將罷公來坐不驚舞翻江月逈談落麈毛輕塵世風流盡高樓空此名題方子明道人東窗閉門何所事毛髮日青青齒折登山屐塵生貰酒瓶調心開貝葉救病讀仙經定起無人見寒燈一點星留滯髙安四年有餘忽得信聞當除官真揚間偶成小詩書于屋壁數間茅屋久蹉跎四見秋風入薜蘿北棹偶然追雁羽南公誰復伴漁蓑三年賈傅驚吾老九歲劉郎愧爾多此去仍家江海上不妨一葉弄清波送張恕朝奉南京簽判楚蟹吳柑初著霜梁園官酒試羔羊老如計相非無齒清似留侯未却糧杖履稍通賔客過殽蔬要遣子孫嘗詔書委曲如公意幕府新除朱紱郎石鼻城千山欲盡垂為鼻百戰皆空但有城虎闖穴中秦地恐龍飛渭上漢江傾雍人未有章邯怨魏將猶存仲達情睥睨陵遲春草滿白羊無數向風鳴樓觀老聃厭世入流沙飄蕩如雲不可遮弟子憐師將去國關門望氣載還家高臺尚有傳經處畫壁空留駕犢車一授遺書無復老不知何苦服胡麻此觀尹喜舊宅神仙傳言尹喜於流沙之西服巨勝實木山引水引水穿牆接竹梢谷藏峰底大容瓢將流旋滴廬山瀑已盡還來海上潮亂點落池驚睡覺半山含潤沃心焦瓦盆一斛何勝滿溢去猶能浸菊苖強君瓦亭君為魏博三年客日有江湖萬里心暫得野亭留馬足強修疏柳步堤隂無人㩦手共吳語得意搖頭時越吟何日東郊過微雨並騎鞍馬去同尋傅欽之學士濟源草堂聞有高居直百金西山南麓北山隂園通濟水池塘好花近洛川顔色深人去節旄分重鎮客來猿鶴感幽吟潩溪雨過西湖漲歸興蕭然定不任欽之時抂許州次韻子瞻雨中督役夜宿水陸寺雲氣連山雨㵼盆莫投僧舍欲關門暫時灑掃寬行役終夕﨑嶇入夢魂煩熱暗消秋簟泠蒸濡未解夜燈昏二年遊宦多勞苦何日相從得細論次韻有美堂歸夜飲闌鐘虡欲移軒香霧猶殘金博山明月飛來松嶺外遊人散落馬蹄間城嚴畫鼓初傳角路暗山花自落鬟清境暫時都不見夜深人盡始來還環波亭南山迤邐入南塘北渚岧嶤枕北牆過盡緑荷橋斷處忽逢朱檻水中央鳬鷖聚散湖光淨魚鱉浮沈花影涼清境不知三伏熱病身唯要一藤牀送青州簽判俞退翁致仕還湖州不作清時言事官海邦那復久盤桓早依蓮社塵緣少新就草堂歸計安富貴暫時朝露過江山故國水精寒宦遊從此知多事收取楞伽靜處看徐正權秀才城西溪亭竹林分徑水通渠真與幽人作隱居溪上路窮惟畫舫城中客至有罾魚東來只為林泉好野外從教簿領疏不識徂徠石夫子兼因女壻覔遺書徐生石介女壻也玉盤孟東蘇武莒公家園中千葉白芍藥子瞻新為此名千葉團團一尺餘揚州絶品舊應無賞傳莒國遷鐘虡移憶胡僧置鉢盂叢底留連傾鑿落瓶中捧擁照浮屠強將綘蠟封紅蕚憔悴無言損玉膚李公擇以慧泉答章子厚新茶無錫銅瓶手自持新芽顧渚近相思故人贈答無千里好事安排巧一時蟹眼煎成聲未老兔毛傾看色尤宜槍旗攜到齊西境更試城南金線奇金線泉在齊州城南聞王鞏還京會客劇飲戲贈聞君歸去便招呼笑語不知清夜徂結束佳人試銀甲留連狂客惱金吾燭花零落玉山倒詩筆敧斜翠袖扶暫醉何年依錦瑟東齋還復卧氍毹次韻張恕春暮秪言城市無佳處亦有南湖幾度遊好雨晴時三月盡啼鶯到後百花休老猿好飲常連臂野馬依人自絡頭不肻低徊池上醉試看生滅水中漚送張耒赴壽安尉魏紅深淺配姚黃洛水家家自作塘遊客賈生多感慨間官白傅足篇章山分少室煙雲老宫廢連昌草木長路出嵩髙應少駐孱顔新過一畨霜九曲池嵇老清彈怨廣陵隋家水調繼哀音可憐九曲遺聲盡惟有一池春水深鳯闕蕭條荒草外龍舟想像緑楊隂都人似有興亡恨每到殘春一度尋簡寂觀山行但覺鳥聲殊漸近神仙簡寂居門外長溪淨客足山腰苦筍助盤蔬喬松定有藏丹處大石仍存拜斗餘弟子蒼髯年八十養生世世受遺書萬杉寺萬木青杉一手栽滿堂白佛九天來仁宗初年有僧手種萬杉特為建此寺仍以禁中佛賜之涓涓石澑供厨足矗矗山屏繞寺開半榻松隂秋簟冷一杯香飯午鐘催安眠飽食平生事不待山僧喚始來白鶴觀五老相㩦欲上天玄猿白鶴盡疑仙浮雲有意藏山頂流水無聲入稻田古木微風時起籟諸峰落日盡生煙歸鞍草草還城市慙愧幽人正醉眠次韻毛君病中菊未開病肺秋深霧雨傷舊繒故絮喜清涼菊花金粟未曾吐桂酒鵝兒空自黃草木未知年有閏風霜漸近月方陽得詩聞示維摩疾欲到毗耶言已忘答溫守李鈞見寄梁苑相從簿領中清風相逐畫船東婆娑江海凌雲鶴飲啄籠樊失渚鴻别後丹砂迷舊訣愁來白髮變衰翁此間詩老仍勍敵正憶高吟酒盞空放榜後毛守見招飽食安眠愧不材疏簾翠帟幸相陪深居正厭銀袍亂失喜初聞鐡鎖開佳句徑蒙探古錦小槽仍報滴新醅諸人欲見風流伯不用招呼亦自來雨後遊大愚風光四月尚春餘淫雨初乾積潦除古寺蕭條仍負郭間官疏散亦肩輿摘茶戶外蒸黃葉掘筍林中間緑蔬一飽人生真易足試營茅屋傍僧居曾子固舍人挽詞少年漂泊馬光祿末路鶱騰朱會稽儒術逺追齊稷下文詞近比漢京西平生碑版無容繼此日銘詩誰為題試數廬陵門下士十年零落曉星低和張安道讀杜集我公才不世晚歲道尤高與物都無著看書未覺勞微言精老易奇韻喜莊騷杜叟詩篇在唐人氣力豪近時無沈宋前輩蔑劉曹天驥精神穩層臺結構牢龍騰非有迹鯨轉自生濤白也空無敵微之豈少褒論文開錦繡賦命委蓬蒿初試中書日旋成鄜畤逃妻孥隔豺虎關輔暗旌旄入蜀營三徑浮江寄一艘投人慙下舍愛酒類東皋漂泊終浮梗迂疏獨釣鼇誤身空有賦掩脛惜無袍卷軸今何益零丁昔未遭相如元並世惠子謾臨濠得失將誰怨憑公付濁醪遺老齋久無叩門聲啄啄問何故田中有人至昨夜盈尺雨大言里中舊獨有陳太丘文若命世人惜哉憂人憂洛陽試院樓上新晴二首嵩少猶藏薄霧中前山迤邐夕陽紅高樓一閉三千日遙憶巖頭種藥翁伊闕遙臨鳯闕前龍門女几氣蒼然唐朝御路依稀在猶想東巡塵暗天逍遙堂會宿二首并引轍幼從子瞻讀書未嘗一日相舍既壯將遊宦四方讀韋蘇州詩至安知風雨夜復此對牀眠惻然感之乃相約早退為間居之樂故子瞻始為鳯翔幕府留詩為别曰夜雨何時聽蕭瑟其後子瞻通守餘杭復移守膠西而轍滯留于淮陽濟南不見者七年熙寧十年二月始復會于澶濮之間相從來徐留百餘日時宿于逍遙堂追感前約為二小詩記之逍遙堂後千尋木長送中宵風雨聲誤喜對牀尋舊約不知漂泊在彭城秋來東閣涼如水客去山公醉似泥困卧北窗呼不起風吹松竹雨淒淒戲贈李朝散江霧霏霏作雪天樽前醉倒不知寒後園桃李春猶晚試覔酥花仔細看代答銀瓶瀉酒正霜天玉麈生風夜更寒下客不辭投轄飲好花猶恐隔簾看以蜜酒送柳真公牀頭釀酒一年餘氣味全非卓氏壚送與幽人試嘗看不應知是百花鬚乾荔支含露迎風惜不嘗故將赤日損容光紅消白瘦香猶在想見當年十八娘米芾字元章吳人以母侍宣仁后籓邸舊恩補臨光尉歷知雍丘縣漣水無為軍召為書畫學博士賜對便殿上其子友仁所作楚山清曉圖擢禮部員外郎卒年四十九芾妙于翰墨尤工臨移至亂真不可辨其性癖異多有足傳笑者以此從仕數困嘗奉詔摹晉人小楷得入宣和殿觀禁內之所藏人以為寵子友仁兵部侍郎敷文閣直學士秋登峴山之作皎皎中天月團團徑千里震澤乃一水所占已過二娑羅即峴山謬云形大地地惟東吳偏山水古佳麗中有皎皎人璚衣玉為珥位推列仙長學與千年對幽操久獨處迢迢願招類金颸帶秋威歘逐雲檣至朝隔輿馭飈暮過光浮袂雲育有風驅蟾餐有刀利亭亭太隂宫無乃瞻星氣興深夷險一理洞軒裳偽紛紛夸俗勞坦坦忘懷易浩浩將我行蠢蠢須公起題多景樓欲雨氣不透庭梧有棲煙回首望北固雲藏淨名天呼童速具輿憑髙覽山川隱見豈不好開霽景固全須臾江風流湛湛清露圓歸途知有伴華月上丹淵寄紹彭蕭李騃子弟不收慰問帖妙迹固通神水火土更劫所存慰問者班班在箱笈使惡乃神護不然無寸札自此輒畫相後人眼徒攝送王渙之彥舟集英春殿鳴捎歇神武天臨光下徹鴻臚初唱第一聲白面王郎年十八神武樂育天下造不使敲枰使傳道衣錦東南第一州棘璧湖山兩清照襄陽野老漁竿客不愛紛華愛泉石相逢不約無逆輿握古圖書同岸幘淫朋嬖黨初相慕濯髮洗心求易慮翩翩遼鶴雲中侣土苴尫鴟那一顧邇來器業何深至湛湛具區無底沚可憐一點終不易枉駕殷勤尋漫士漫士平生四方走多與羣才並肩肘少有俳辭能罵鬼老學鴟夷但存口一官聊具三徑資取捨殊途莫回首題蘇之孟家薛稷二鶴遼海未須顧螻蟻仰霄孤唳留清耳從容雅步在庭除浩蕩間心存萬里乘軒未失入佳談寫真不妄傳詩史好事心靈自不凡臭穢功名皆一戲武功中令應天人束髮寮陽侍帝宸連城照乘詎惜寶皇圖禮誥誰珍真百齡生我欲公起九原蕭蕭松嶷嶷得公遺物非不多賞物懷賢心未巳雜詠揚清歌發皓齒北方佳人東鄰子且吟白紵停淥水長袖拂面為君起寒雲夜卷霜海空朔風吹天飄塞鴻玉顔滿堂樂未終館娃日落歌吹濃絃歌興罷拂衣還棄米何嘗有俸錢恩自大鈞能逐物只應訪藥是優賢余嘗硾越竹光滑如金版在油拳上短截作闕軸入笈畨覆一日數十張學書作詩寄劉薛越筠萬杵如金版安用杭油與池繭髙壓巴郡烏絲欄平欺澤國清華練老無他物適心目天使殘年同筆硯圖書滿室翰墨香劉薛何時眼中見貞娘墓歌何不學仙冡纍纍白楊西郭隂風悲虎丘一叩貞娘墓薜荔援牆委蘭露干歲蒙茸幾樹花夜飄鬼火曉啼鴉向憐挾瑟彈清月猶憶吹簫乘彩霞吳閶少年往來道黛蛾叉燕誰能好酒滴春雲夢不消泉聲幽咽鐘聲老陌上行遊緩緩歸昨日紅顔今日非東望闔閭穿葬處玉鳬欲化湛盧飛寄薛郎中紹彭二首老來書興獨未忘頗得薛老同徜徉天下有識誰鑒定龍宫無術療膏肓淮風吹戟稀訟牒典客閉閣間壺漿吟樹對山風景聚墨池濯硯龜魚藏珠臺寶氣每貫日月觀桂實時飄香銀淮燭天限織女煙海括地生靈光俊兒乃是翰墨侣挾竹不使輿衛將象管鈿軸映瑞錦玉麟棐几鋪雲肪依依煙蘋動勃鬱矯矯龍蛇起混茫持此以為風月伴四時之樂渠未央部刺不糾翰墨病聖恩養在林泉鄉風沙漲天烏帽客胡不東來從此荒歐怪褚妍不自持猶能半蹈古人規公權醜怪惡札祖從兹古法蕩無遺張顛與柳頗同罪鼓吹俗子起亂離懷素獦獠小解事僅趨平淡如盲醫可憐智永硯空臼去本一步呈千媸已矣此生為此困有口能談手不隨誰云存心乃筆到天工自是祕精微二王之前有高古有志欲購亡高資殷勤分貽薛紹彭散金購取重跋題揚州東風何索寞帶雪入揚州尚想遺叉雀重觀上玉鉤真同一夢覺空憶十年遊邂逅逢孫楚酣歌慰滯留將之苕溪戲作呈諸友松竹留因夏溪山去為秋久賡白雪詠更度采菱謳縷玉鱸堆案團金橘滿洲水宫無限景載與謝公遊復借書劉李周三姓二首好懶難辭友知窮豈念通貧非理生拙病覺養心功小圃能留客青冥不厭鴻秋帆尋賀老載酒過江東旅食緣交駐浮家為興來句留荆水話禁向卞峯開過剡如尋戴遊梁定賦枚漁歌堪畫處又有魯公陪潤州甘露寺邑故重重構春歸戶户嵐槎浮龍委骨畫失獸遺耽神護衛公塔天留米老庵柏梁終厭勝會副越人談甘露寺晚眺六代蕭蕭木葉稀樓高北固落殘暉兩州城郭青煙起千里江山白鷺飛海近雲濤驚夜夢天低月露溼秋衣使君肯負時平樂長倒金鍾盡醉歸觀音巖秦驅禹鑿已寥寥却為高人得姓焦鮑餌有時邀楚釣海雲常覺護山樵巖多隂霧龍藏角蛙絓蒼林玉露臕濁氣不侵靈貺下方壇曾駐紫清飈山光寺竹圍山徑晚風清又入山光寺裏行一一過僧談舊事遲遲繞屋認題名仙來石畔懷灰劫鶴語池邊勸後生三十年間成底事空叨薄祿是浮榮望江樓雲間鐵甕近青天縹眇飛樓百尺連三峽江聲流筆底六朝帆影落尊前幾畨畫角催紅日無事滄洲起白煙忽憶賞心何處是春風秋月兩茫然詠潮怒氣號聲送海門州人傳是子胥魂天排雲陳千家吼地擁銀山萬馬奔勢與月輪齊朔望信如壺漏報晨昏吳亡越霸成何事一唱漁歌過逺村濮王宗漢作蘆雁有佳思贈以詩二首偃蹇汀眠鴈蕭梢風觸蘆京塵方滿眼速為喚花奴野趣分苕水風光剪霅湖塵中不作惡為有鄴公圖垂虹亭斷雲一葉洞庭帆玉破鱸魚金破柑好作新詩寄桑苧垂虹秋色滿東南中秋登望海樓目窮淮海滿如銀萬道虹光育蚌珍天上若無修月戶桂枝撑損向西輪郭祥正字功甫當塗人少有詩名梅堯臣極賞之以為太白後身舉進士第知武岡縣奏乞神宗専用王安石安石恥為小臣所薦反詆之遂以殿中丞致仕復出知端州棄去隱于邑之肯山卒蓮根有長絲蓮根有長絲不供貧女織柳梢有飛綿不暖寒者衣朝歌悠悠暮歌短下地沈沈上天逺東生白日還西流志士長懷萬古愁金山行金山杳在滄溟中雪崖冰柱浮仙宫乾坤扶持自今古日月髣佛躔西東我泛靈槎出塵世搜索異境窺神工一朝登臨重太息四時想像何其雄卷簾夜閣挂北斗大鯨駕浪吹長空舟摧崖斷豈足數往往霹靂鎚蛟龍寒蟾八月蕩瑤海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽斷蘆花風蓬萊久聞未成往壯觀絶致遙應同潮生潮落夜還曉物與數會誰能窮百年形影浪自苦便欲此地安微躬白雲南來入我望又起歸興隨征鴻墨染絲繅絲自喜如霜白輸入官家吏嫌黑手持退印競傳呼倐見長絲染深墨墨絲歸織家人衣别買輸官吏嗔遲寄言敵國與三軍汝得豐衣民苦辛禾山英英玉草禾乃是鳯凰食鳯凰殊未來禾生亦何益西村逺近皆僧剎西村八九家得魚無賣處沽酒入蘆花訪隱者一徑沿崖踏蒼壁半塢寒雲抱泉石山翁酒熟不出門殘花滿地無人迹端峽雙峽天開控江水水自牂牁來萬里端州還在雙峽間石室嵩臺壓孤壘清逸樓南昌城中潘令宅清逸樓高二千尺斜飛四角河漢躔密排萬瓦鴛鴦碧環波亭東湖入望晚波平蒲葉圓荷各自青不用更尋徐孺宅編茅搘竹有碑亭宋元詩會卷二十二
