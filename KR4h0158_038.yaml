body:
  text: 宋元詩會卷三十八兵部主事陳焯編尤袤字延之常州無錫人㓜穎異蔣偕呼為竒童紹興十八年登進士第由泰興令召除將作監簿補大宗正丞遷祕書歴著作郎以論張說為所中出知台州有錄其東湖四詩進聞者上讀而賞歎遂以文字受知除淮東常平提舉改江東用吏部郎官召進密院兼諭徳高宗崩前一日拜太常少卿自南渡來恤禮散失凡有討論悉付之袤酌古凖今稱情合典遂以集事權禮侍同修國史兼權中舍光宗即位每於經筵陳正始之道語侵權貴丐祠以歸紹熙初召為給事中屢因陞賞踰格執奏上前多所裁抑除禮部尚書卒年七十諡文簡有集六十卷梅二首不奈雪埋照可堪風漏香天寒無疹粟日暮有嚴妝桃李羞浮艶松筠共老蒼千山愁絶裏獨自占年芳冷艶天然白寒香分外清稍驚春色早又喚客愁生待索巡簷笑嫌聞出塞聲園林多少樹見爾眼偏明蠟梅破臘驚春意凌寒試曉妝應嫌脂粉白故染麴塵黄綴樹蜂縣室排箏雁著行團酥與凝蠟難學是生香雪睡覺不知雪但驚牕户明飛花厚一尺和月照三更草木淺深白丘塍高下平饑民莫咨怨第一念邊兵落梅清溪西畔小橋東落月紛紛水映紅五夜客愁花片裏一年春事角聲中歌殘玊樹人何在舞破香衫曲未終郤憶孤山醉歸路馬蹄殘雪襯東風甲午春前得雪二首寒聲昨夜響蕭蕭逗曉堦庭亦已消殘臘距春無幾日一年飛雪只今朝微陽欲動梅驚萼餘潤纔沾麥放苗天意未能違物意漫留殘白占山腰飛英囘旋逐風飄爽氣令人意欲消荏苒流年春送臘殷勤密雪暮連朝冬回庾嶺花無數煙暖藍田玊有苗一飽自今真可望更看南畝麥齊腰海棠盛開兩株芳蘂傍池隂一笑嫣然抵萬金火齊照林光灼灼彤霞射水影沈沈曉妝無力臙脂重春醉方酣酒暈深定自格高難著句不應工部總無心送晦菴南歸二年摩手撫瘡痍恩與廬山五老齊合侍玊皇香案側郤持華節大江西鼎新白鹿諸生學築就長虹百尺堤待哺饑民偏戀徳老翁猶作小兒啼送呉待制帥襄陽方持紫槖侍西清忽領雄藩向暑行誰謂風流貴公子甘為辛苦一書生詞源筆下三千牘武庫胸中十萬兵從此君王寛北顧山南東道得長城周必大字子充其先鄭州人以祖宦廬陵遂家焉紹興二十年進士試館職高宗讀其策曰掌制手也由祕省正字除監察御史孝宗踐祚遷起居郎上曰朕舊見卿文當以近作進覧尋權中舎侍經筵兼權給事中封駁不避貴倖請祠去久之提刑福建召除秘少領史職草國書使金稱上意曰此大才也尋權兵禮二侍兼直學同修國史以論張說出知建寧府至豐城稱疾而歸三請祠其名益重久之起兵侍再兼直學拜叅知政事俄知密院淳熙十四年拜右丞相明年遷左丞許國公光宗即位拜少保益國公慶元初三上表引年遂以少傅致仕薨年七十有九諡文忠自號平園老叟集二百卷著書八十一種曹能始訐其詩未脫詞科習氣信然已丑二月七日雨中讀漢元帝紀效樂天體昭君顔如花萬里度雞鹿古今罪畫手妍醜亂羣目誰知漢天子袪服自列屋有如公主親尚許穹廬辱况乃嬪嬙微未得當獯鬻奈何㺯文士太息爭度曲生傳琵琶聲死對青塜哭向令老後宫安得載簡牘一時抱微恨千古畱賸馥因嗟當時事賢佞手反覆守道蕭傅死效忠京房戮史臣一張紙此外誰復錄有琴何人操有塜何人宿重色不重徳聊以砭世俗陶淵明有已酉重九詩一首某以此年此日舟次吉水距永和才一程耳輒用其韻先寄諸兄弟王覲十五載歸來稀舊交我鬢昔已華今兹固宜凋去國甫重五還家倐登高永和有兄弟咫尺如煙霄緬懷江東使地遠心更勞遙知上翠微江山勝金焦豈無茱萸酒望望心鬱陶相從會有日永矣非一朝十月十七日大椿堂小集胡從周季懷以予目疾皆許送白酒彌旬不至戲成長韻畏疾甚畏威目昏口止酒爾來時一中免使論薄厚儀康久廢祠釀具散莫糾採藥山已焚種秫時轉後門稀問字客室乏借書缶尚賴金石交每顧貧病叟前時相娛樂如對疏廣受有漿不待乞似騐歲在酉今日掃風軒明日芼園蓛白衣兩不來往往化烏有頗聞繼高會霑醉牛馬走寧忘伐木詩酤胥吝朋友或疑夾西江恥復餉升斗胡不玩易象樽簋納吾牖二義倘未然諾責何為負君兮優阮籍僕也減兗守結交十五年果可不飲否食言能無肥有孚乃免咎速宜倒糟牀走送昔與醙勿學比舎郎夜半招吏部楊廷秀送牛尾狸侑以長句次韻江南十月方肅霜小槽初滴鵝兒黄頗思指動異味嘗門正張羅誰末將披綿强來推不去枯鰕欲進上之戸羊羶豕腥猶可厭肪截脂凝在何處草𤣥子雲黄門郎遺我黒面質白章形之硬語努力强寫以竒字伴史倉愧無纎手色傾國壓糟磨刀走臧獲喜于左手持蟹黄美勝八珍熟熊白古來貍首歌侯門名以牛後真屈君從今玊汝洗俗諺好與紈袖陪梁苑公詩如貂不頻削我續狗尾句空著沈作式署園宫槐分影直官栁著行疎畫蝀飛翬遠晴霞散綺餘池邀山簡馬水勝武昌魚只恐封泥召驂鸞上帝居次韻芮曹國憶去年上元門外人隨月窗前竹動風老便佳節靜病幸綠樽空春至鴻聲北人遙蝶夢東隔年詩有債生理固知窮元宵煑浮圓子前輩似未曾賦此坐間成四韻今夕是何夕團圓事事同湯官尋舊味竈婢詫新功星燦烏雲裏珠浮濁水中歲時編雜詠附此說家風丁維皋園中牡丹未開拙速那能鬭巧遲從教綠暗與紅稀天香未染蜂猶懶日幄先籠蝶已飛羯鼔只應催上苑鶴林誰復倩紅衣請君多釀淮南米縱賞先拚倒載歸柬廣東芮漕時聞其部中㓂退笑酌貪泉為賦詩凛然清節照南陲廏空不納如羊馬才大常嗤捕䑕貍盗已犇秦非地險心遲去魯只天知愛君勤把歸鞍促莫待鸞旗訪具茨戴子微運使出湖北早日逍遙侍從間重來奉引近天顔倦趨北闕晨霜冷思上南樓夜月閒直指不誇新衣繡曲臺猶記舊聨班豈知隔面心仍渴空訝相如下筆慳上巳訪楊廷秀賞牡丹于御書齋其東園僅一畆為術者九名曰三三徑云楊監全勝賀監家賜湖爭比賜書華囘環自斸三三徑頃刻常開七七花門外有田供伏臘望中無處不烟霞郤慚下客非摩詰無畫無詩只謾誇彭孝求以綠野行送芍藥數種鄙句為謝占斷春光及夏初璢璃剪葉朶珊瑚休論花品同而異為詠詩人樂且訏北第莫辭金鑿落南禪爭看玊盤盂彭宣微恙何妨醉自有嬌癡婢子扶次韻廷秀待制玊蘂姑射山前雪照人長安氷畔態尤真步搖翹玊中心碎瓔珞塗金四面勻常笑酴醾藏浪蘂應陪芍藥殿餘春自從唐代來天女直到平園見後陳送韓道希亞卿移漕江中饋餉隨蕭不作難秦淮金峴漢時關天開虎踞龍盤處地近雞翹豹尾間洗印先經三峽寺觀風徧踏九華山盡収竒秀歸詩稿却趂𢋫歌供奉班次韻章茂獻謝茶墨淡名高筆有花胸中五色補皇家諫書夜奏常焚藳講舌時乾每賜茶秘祝重尋丹竈火長生元笑紫河車新詩有味知何似雙井春來試白芽送鄧曹根移帥揚州聞道維揚地望雄風流人物似江東六龍前日臨淮海五馬由來說醉翁碧月㡬橋留夜色珠簾十里待春風遙知九日平山會笑揷茱茰滿鬢紅次韻王少府送蕉坑茶昏然午枕困漳濱醒以清風賴子真初似參禪逢硬語久如味諫得端人王程不趂清明宴野老先分浩蕩春敢向柘羅評綠玊待君同碾試飛塵曾英發運幹攜二詩相過復惠漢唐金石刻次韻道謝君家奕葉播芳馨室有圖書暴兩榮詩什編成風雅頌寶章臨徧草真行興來文陣千軍掃醉後談鋒一坐傾已許春風來過我從今日日聽嚴程遊廬山弔大林上盡諸峰地轉平天低雲近日多隂古來南北通雙徑此去東西啓二林虞世南碑從泯沒白居易序合推尋匡廬第一神仙境忍使如今漸陸沈胡邦衡生日以詩送北苑八銙日注二瓶賀客稱觴滿冠霞樓名縣知酒渴正思茶尚書八餅分閩焙主簿雙瓶揀越芽妙手合調金鼎鉉清風穩到玊皇家明年勅使宣臺餽莫忘幽人賦葉嘉前歲冬至與胡邦衡小語端誠殿道直下舊事今年邦衡舉易緯六日七分之説輒用子美五更三㸃為對因憶去年館中團拜十人今作八處感歎成詩青城小語慶新陽共向紅雲拜玊皇六日七分驚歲月五更三㸃憶班行屬車誰從黄麾仗釣艇還飛白羽觴猶勝去年同館客十人八處更相望魚兒牡丹得之湘中花紅而蕊白狀類雙魚葉與牡丹無異亦以二月開因是得名其榦則芍藥也天教姚魏主芳菲合有宫嬪次列妃玊頸圓瑳宜粉面霞裙深染學翬衣枝頭窈窕魚雙貫風裏蹁躚鳳對飛莫把根苗方芍藥畱春不似送將歸酬楊廷秀待制十年不侍殿東頭臨水登山隱者流一眼瞳方無異相三層句曲有巍樓幸殊王粲非吾土何事龎公不入州至後臘前天欲雪扁舟乘興肎來不望皖公山太婆嶺獨高秋浦皖公山正望龍舒端如牛女隔天漢不似彭郎近小姑范成大字致能吳郡人紹興二十四年進士授户曹監和劑局擢著作佐郎吏部員外被論奉祠起知處州多善政民惪之遷崇政殿説書改起居郎假資政殿大學士充祈請國信使使金瀕行上有面諭受書事而國書不載成大至燕山草私奏具言受書式懷之入及進國書時詞氣慷慨殿上方傾聽間而成大忽搢笏出私奏舉朝大駭左右標起之屹不為動太子欲殺成大越王止之竟達其書而歸遷中書舎人出知廣西靜江府除四川制置使召權吏書拜參知政事加大學士薨成大素有文名尤工於詩有石湖等集行世擬古彎環樓前月掩仰樓上人人月不得語相看兩凝顰西窗囘紋機織徧金字春聊可自持玩何由將寄君刺濆淖濆淖盤渦之大者峽江水壯則有之或大如一間屋相傳水行峽底遇暗石則濆起已而下旋為窩然亦未嘗有定處或無故突然而作叵測也舟行遇水小則欹傾大則顚覆險惡之名䎹天下峽山饒暗石水狀日千變不愁灘瀧來但畏濆淖見人言盤渦耳夷險顧有間仍于非時作未可一理貫安行方熨縠無事忽翻練突如湯鼎沸翕作茶磨旋勢迫中成窪怒霽外始暈已定稍安慰倐作更驚眩漂漂浮沫起疑有灊鯨噀勃勃駭浪騰復恐蟄鼇抃篙師瞪褫魄灘户呀雨汗逡巡怯大敵勇往决鏖戰幸免與齊入還憂似蓬轉驚呼招竿折奔救竹笮斷九死船頭爭萬苦石上牽旁觀兢薄氷撇過㨗飛電前余叱馭來山險固嘗徧今者擊檝誓豈復憚波面澎澎三峽長颭颭一葦亂既微掬指忙又匪科頭慢天子賜之履江神敢吾玩但催疊鼓轟往助雙櫓健河豚歎鯫生藜莧腸食事一飽足腥腐色所難况乃懷酖毒膨亨强名魚殺氣孕慘黷既非養生具宜謝砧几酷吳儂真差事網索不遺育捐生決下箸縮手汗童僕朝來里中子饞吻不待熟濃睡喚不譍已落新鬼籙百年三寸咽水陸富肴蓛一物不登俎未負將軍腹為口忘計身饕死何足哭作俑者誰歟至今走末俗或云先王意除惡如蓺菽逆梟與毒獍歲歲參幣玊芟夷入薦羞蓋欲殱種族死生有定數斷命烏可續適丁是時者未易一理局黿鼎子公怒羊羔華元衂異味古所珍無事苦畏縮駢頭訌此語戒諭祇取瀆聾盲死不悟明知諒已燭九月三日宿胥口始聞雁故人久不見乍見雜悲喜新雁如故人一聲驚我起把酒不能觴送目問行李曾云行路難空濛千萬里塞北多關山江南渺雲水風高吹汝瘦旅伴今餘幾斜行不少駐滅沒蒼煙裏羇遊吾亦倦客程殊未巳扁舟費年華短䌫繫沙尾物性各有役冥心聽行止江郊匝地熟塲圃平如砥歸期且勿念共飽豐年米新嶺瘦馬兀瞢騰荒鷄號蒼莽絲窠罥朝露籬落萬蛛網宿雲拂樹過飛泉擘山響老桑跼潛虬怪蔓挂騰蟒山行何許深空翠滴羈鞅釀愁積雨寒破悶朝日放曈曈赤幟張昱昱金鉦上浮動艸花馥清和野禽唱僕夫有好語沙平路如掌惟憂三溪阻橋斷山水漲古風上知府秘書神仙絶世立功行聞清都玊符賜長生籋雲遊紫虚雞犬爾何知偶䑛藥鼎餘身輕亦仙去罡風與之俱俯視舊籬落𦕈莽如積蘇非無鳳與麟終然似蟲魚微物豈有命政爾謝泥塗時哉適丁是邂逅真良圖初入峽山效孟東野峽山偪而峻峽水湍以碕峽草如毨毛峽樹多樛枝峽禽惟杜鵑血吻日夜啼峽馬類黄狗不能長鳴嘶峽曉虎跡多峽暮人跡稀峽路如登天猿鶴不能梯僕夫負嵎哭我亦呻吟悲悲吟不成章聊𢋫峽哀詩麻線堆峽口驛前大山崛起舊路攀援而上縈紆如線十五年前浮圖徳寶始沿澗伐木作新路不復登山余觀峽路皆未嘗經修感徳寶之事作麻線堆詩一首以風䕫路使者及歸峽二州長吏云雲木盪胷起鬱峨一峰危上有路千折縺縷如縈絲是為麻線堆厥險天下稀偪仄容半足顚墜寧復稽騰猱尚愁苦遊子將安之浮屠徳寶者悲智緒等慈隨山刋古木尋壑得長磯輿梁㨗飛度布石綿階梯自從新路改重趼無齎咨縣有孫少府琬琰劖文詞勿云此事小惟有行人知况觀峽山路由來欠平治官吏既弗跡誰肻深長思天險固自若當令路成蹊土工運畚鍤石工操鑿椎烈火敗磽确築沙填隙巇多用百夫力遠無五旬期但冀米鹽給不煩金幣支非客敢竊議道旁詢旄倪身雖雪山戍亦願助毫釐工費嗟小哉政須賢有司東有管夷陵西有葉秭歸上維沈隱侯䕫臺今吏師下維熊繹孫長材佐州麾豈吾金閨彦不如林下緇縣知議充合了此一段竒舟檝避潢潦置郵疾飛馳憧憧呉蜀客來往當無時仍磨鑽天石大書四賢詩不佞願秉筆遠繼峽口碑曉發飛鳥晨霞滿天少頃大雨吳諺云朝霞不出門暮霞行千里騐之信然戲紀其事朝霞不出門暮霞行千里今晨日未出曉氣散如綺心疑雨再作眼轉雲四起我豈知天道吳農諺云耳古來占霶𩃱說者類恢詭飛雲走羣羊停雲浴三豨月當天畢宿風自少女起爛石燒成香汗礎潤如洗逐婦鳩能拙穴居狸有智蜉蝣强知時商羊與聞計垤鳴東山鸛堂審南柯蟻或加隂石鞭或議陽門閉或云逢庚變或自換甲始刑鵞與象龍聚訟非一理不如老農諺響應㨗如鬼哦詩敢夸博聊用醒午睡重遊南嶽捨舟得馬如馭氣步入青松三十里我從蠻嶺瘴煙來不怕雨雲埋嶽趾憶昔南征疑廟庭往來無恙神所祉當時已有歸田願帝臨此心如白水煌煌南正館于東手握八觚温玊璽駿奔灊霍左右輔好生不殺扶炎紀崇禋竣事曉壇空躋攀小試青鞵底不知雲磴幾千丈但見漫山白虎尾石頭招我上南臺瑞應闌干天半倚福巖鐘聲過橋東髣髴三生如夢裏堂中尊者已先去苔鎖巖扉何日啓竹嫌磽确老愈瘦松畏高寒蟠不起癯儒尚病怕深登幽討未窮行且止我評七十二高峰鬱律穹隆少觀美儼然可瞻不可玩往往雄尊如負扆乃知嶽鎮葢深厚不與他山爭秀偉區區獻狀眩兒童乳洞淡巖真戲耳離堆行殘山狠石雙虎卧斧跡鱗皴中鑿破潭淵油油不敢唾下有猛虎跧鐵鏁自從分流注石門西州秔稻如黄雲封羊五萬大作社春秋伐鼓蒼煙根我昔官稱勸農使年年來激西江水成都火米不論錢絲管相隨看蠶市欵門得得酹清尊椒漿桂酒删羶葷妄欲一語神豈䎹更願愛羊如愛人夜宴曲金麟噴香煙龍蟠玊燈九枝青闌干明瓊押帶湘簾斑風幃繡浪千飛鸞舞娥紫袖如弓彎雲中一笑天解顔衘杯快卷玻璃乾花樓促箭春宵寒二十五聲宫㸃闌韓無咎檢討出示所賦陳季陵户部巫山圖詩仰窺高作歎息久之余嘗攷宋玊談朝雲事漫稱先王時本無據依及襄王夢之命玊為賦但云頩薄怒以自持曾不可乎犯干後世弗察一切溷以媟語曹子建賦宓妃亦感此而作此嘲誰當解者輒用此意次韻和呈瑤姬家山高挿天碧叢竒秀古未傳向來題目經楚客名字經度峨岷前是邪非邪莽難識喬林古廟常秋色暮去行雨朝行雲翠帷瑤席知何人峽船一息且千里五兩竿頭見幡尾仰窺仙館至今疑行人問訊居人指千年遺恨何當申陽臺愁絶如荒村高唐賦裏人如畫玊色頩顔元不嫁後來饑客眼長寒浪傳樂府吹復彈此事牽連到温洛更憐塵襪有無間君不見天孫住在銀濤許塵間猶作兒女語公家春風錦瑟旁莫為此圖虚斷腸倦繡猧兒㺯暖緣堦走花風薰人濃似酒困來如醉復如愁不管低鬟釵燕溜無端心緒向天涯想見檣竿幡脚斜槐隂忽到簾旌上遲郤尋常一線花嶺上紅梅霧雨臙脂照松竹江南春風一枝足滿城桃李各嫣然寂寞傾城在空谷城中惟解惜娉婷遊子路旁空復情花不能言客無語日暮清愁相對生瞿唐行七月十九日至䕫子灔澦徹髪不可犯是夜水漲及山腹詰旦視灔澦則已在水中土人云此青草齊也可以冐險而入遂鼓櫂略其頂而過郡中遣候兵立山上每一舟平安則搖幟以召後舟白鹽赤甲皆峽口大山黄嵌黒石皆峽中至險處入峽西岸有聖泉舟人或向之疾呼曰人渴也泉即迸下杯許復乾余舟過甚急未之試也川霛知我歸有程一夜漲痕千丈生中流擊檝洶作氣夾峰旗鼓呀失聲不知灔澦在船底但覺瞿唐如鏡平鑿峽䟽川狠石破號山索飲飛泉驚白鹽赤甲轉頭失黒石黄嵌拚命輕草齊增肥無泊處竹枝凝葉空餘情人間險路此竒絶客裏驚心吾飽更劒閣翻成蜀道易請歌范子瞿唐行巫山高余舊嘗題陳季陵巫山圖考宋玊賦意辯高唐之事甚詳今過陽臺之下復作樂府一首世傳瑤姬為西王母女嘗佐禹治水廟中石刻在焉濕雲不收煙雨霏峽船作灘梢廟磯杜鵑無聲猿呌斷惟有饑鴉迎客飛西真功高佐禹跡斧鑿鱗皴倚天壁上有瑤簮十二尖下有黄湍三百尺蔓花虯木風煙昏蘚珮翠帷香火寒霛游飄忽定何許時有行人開廟門楚客詞章元是諷紛紛餘子空嘲㺯玊色頩顔不可干人間錯說高唐夢今人多為神女作辯不知皆昔賢所已言耳大丫隘峽行五程無聚落馬頭今日逢耕鑿麥苗疎瘦豆苗稀椒葉尖新柘葉薄家家婦女布纒頭背負小兒領垂瘤山深生理郤不乏人有銀釵一雙挿姑惡姑惡水禽以其聲得名世傳姑虐其婦婦死所化東坡詩云姑惡姑惡姑不惡妾命薄此句可以泣鬼余行苕霅始䎹其聲晝夜哀厲不絶客有惡之以為此必子婦之不孝者余為作後姑惡詩姑惡婦所云恐是婦偏辭姑言婦惡定有之婦言姑惡未可知姑不惡婦不死與人作婦亦大難已死人言尚如此寒食郊行書事隴麥欣欣綠山桃寂寂紅帆邊漁籪浪木末酒旗風信步隨芳草迷途問小童賞心添脚力呼渡過溪東宿義林禪院瞑氣昏如雨禪房冷似冰竹間東嶺月松杪上方燈驚鶻盤金刹流螢拂玊繩明朝窮脚力連夜斬崖藤田舎呼喚攜鉏至安排築圃忙兒童眠落葉鳥雀噪斜陽烟白村聲逺林青野氣香樂哉今歲事天末稻雲黄清明日狸渡道中灑灑霑巾雨披披側㡌風花然山色裏栁卧水聲中石馬立當道紙鳶鳴半空墦間人散後烏鳥正西東次韻温伯城上閉户成癡坐扶藜得意行樓臺浮霽色市井碎春聲雪盡小橋出烟消千嶂生病多無脚力遙羨落鴻輕安鄉縣西晩泊水濶烏鳥倦墟寒童僕饑一灣村縣過百折暮江遲曉夢孤燈見春隂病骨知簡書寧不畏旅力奈先疲道中月冷吟蛩草湖平宿鷺沙客愁無錦字鄉信有燈花蹤跡隨風葉程途犯斗槎君看枝上鵲薄暮亦還家寒食郊行書事野店垂楊步荒祠苦竹叢鷺窺蘆泊水烏啄紙錢風媪引濃妝女兒扶爛醉翁深村時節好應為去年豐病中夜坐村巷秋舂遠禪房夕磬深饑蚊嘗遶鬢暗鼠忽鳴琴薄薄寒相中稜稜瘦不禁時成洛下詠郤似越人吟十二月十二日枕上曉作竹響風成陣窗明雪已花柴扉冷凍犬紙瓦啄饑鴉宿酒欺寒力新詩管歲華日高猶擁被蓐食媿鄰家花山村舎潦退灘灘露沙虚岸岸頽澗聲穿竹去雲影過山來栁菌粘枝住桑花共葉開庵廬少來往門巷濕蒼苔南塘寒食書事埂外新陂綠岡頭宿燒紅裹魚蒸菜把饋鴨鎖筠籠酒侣晨相命歌場夜不空土風并節物不與故鄉同豫章南浦亭泊舟繡檻臨滄渚牙檣挿暮沙浦雲沈斷雁江雨入昏鴉野曠天何近春寒歲未華朝來風一席隨處且浮家醴陵驛綠水橋邊縣門前栁已黄人稀山木壽土瘦水泉香乍脫泥中滑還嗟􅕤子長儲洲何日到鼓枻上滄浪巴東峽口水宿頻欹側徒行又險艱舟危神女峽馬瘦鬼門闗照夜燒畬隴緣雲種笮山催成頭雪白休說鬢絲班初入巫峽鑽火巴東岸樅金峽口船束江崖欲合潄石水多漩卓午三竿日中間一罅天偉哉神禹跡疏鑿此山川巫山縣自此復登陸至䕫門縣前掉石灘最險登岸以過舟謂之盤灘城樓對高唐門此去瞿塘不百里縣人以郭西流石堆為水信流石沒則灔澦如馬矣借馬巫山縣盤舟掉石灘梅肥朝雨細茶老暮烟寒門對高唐起江從灔澦難流堆三尺在旅夢一枝安鞭春微雨旛勝絲絲雨笙歌步步塵一年新樂事萬里未歸人雲薄竟慳雪酒濃先受春送寒東作近慚愧耦耕身二月三日登樓有懷金陵宣城諸友百尺西樓十二欄日遲花影對人閒春光已入片時夢寒食從今數日間折栁故情都望斷落梅新曲與愁闗詩成欲訪江南便千里烟波萬疊山天平先隴道中時將赴新安掾霜橋冰磵凈無塵竹塢梅溪未放春百疊海山鄉夢熟三年江路旅愁新松楸永寄孤窮涙泉石終収漫浪身好住鄰翁各安健歸來相訪說情真趙聖集誇說少年俊遊用前韻記其語戲之京塵紅軟撲雕鞍年少王孫酒量寛倚袖竹風憐翠薄捧杯花露怯金寒黄雲城上栖烏曲綠水池邊鬭鴨欄别後相思惟故物壁煤侵損扇中鸞玊堂寓意摛文窗户九霄中岸幘燒香愧老農上直馬歸催下鑰傳更人唱促鳴鐘金城嶻􅑖雲千雉碧瓦參差月萬重骨冷魂清都不夢王階蕭瑟聽秋蛩初約鄰人至石湖窈窕﨑嶇學種園此生丘壑是前緣隔籬東日浮天水當户南山匝地烟春入葑田蘆綻筍雨傾沙岸竹垂鞭荒寒未辦招君醉且吸湖光當酒泉入秭歸界山根繫馬得漿家深入窮鄉事可嗟蚯蚓惹人能作瘴茱萸隨俗强煎茶幽禽不見但聞語野草無名都著花曲􅔍迢迢殊未艾去程方是問三巴立春日郊行竹擁溪橋麥葢坡土牛行處亦笙歌麴塵欲暗垂垂栁醅面初明淺淺波日滿縣前春市合潮平浦口暮帆多春來不飲兼無句奈此金旛綵勝何復自姑蘇過宛陵至鄧步出陸漿家饋食槿為藩酒市停驂竹廡門紅樹亭亭棲晩照黄茅杳杳被高原飲溪有迹於菟過掠草如飛朴渥翻車軌如溝平地少飽帆天鏡憶江村早發竹下結束晨裝破小寒跨鞍聊得散疲頑行衝薄薄輕輕霧看放重重疊疊山碧穗炊煙當樹直綠紋溪水趂橋灣清禽百囀似吟客正在有情無思間送周子充左史奉祠歸廬陵黄鵠飄然下九關江船載月客俱還名髙豈是孤臣願身退聊開壯士顔傾葢當年真旦暮霑巾明日有河山後期淹速都難料相對猶憐鬢未斑與正夫朋元遊陳侍御園沙際春風轉物華意行聊復到君家年年我是重來客處處梅皆舊識花官減不妨詩事業地寒猶辦醉生涯城中馬上那知此塵滿長裾席㡌斜次韻韓无咎右司上已汎湖休沐良辰不待晴徑稱閒客此閒行春衫欺雨任教冷病眼得山原自明抹黛濃嵐圍坐晩揉藍新淥沒篙清棲鴉未到催歸去想被東風笑薄情宿直玊堂拜賜御酒歸鴉陸續墮宫槐簾幔參差晩不開小雨遂將秋色至長風時送市聲來近瞻北斗璿璣次猶夢西山翠碧堆慚愧君恩來甲夜殿頭宣勸紫金杯李翬知縣作亭西湖上余用東坡語名之曰飲綠遂為勝槩芷葺蓮巢喚客遊蘆鞭席㡌為君留未論吹水堪添酒且要移牀學枕流乍霽郤隂梅釀雨暫暄還冷麥催秋石湖也似西湖好煩向蒼烟問白鷗發荆州初上蓬籠竹笮船始知身是劒南官沙頭沽酒市樓暖徑步買薪江墅寒自古秦吳稱絶國于今歸峽有名灘千山萬水垂垂老只欠天西蜀道難十二月十八日海雲賞山茶追趂新晴管物華馬蹄鬆快㡌簷斜天南臘盡風晞雪冰下春來水潄沙已報主林催市栁仍從掌故問山茶豐年自是驩聲沸更著牙前畫鼓撾有懷石湖舊隱浩蕩沙鷗久倦飛摧頽櫪馬不勝鞿官中風月常虚度夢裏闗山或暫歸橘社十年霜欲飽鱸江一雨水應肥冷雲著地塘蒲晩誰為披簔暖釣磯晩步宣華舊苑喬木如山廢苑西古溝疎水靜鳴池吏兵窸窣番更後樓閣崔嵬欲暝時有露冷螢猶照草無風驚雀自遷枝歸來更了塵書債目𤯝昏花燭穗垂西樓秋晩樓前處處長秋苔俛仰璿杓又欲回殘暑已隨梁燕去小春應為海棠來客愁天遠詩無託吏案山横睡有媒晴日滿窗鳬鶩散巴童閒按鴨爐灰枕上一枕經春似宿酲三衾投曉尚凄清殘更未盡鴉先起虚幌無聲鼠自驚久病厭聞銅鼎沸不眠惟望紙窗明摧頽豈是功名具燒藥爐邊過此生婆羅平仙聖飛行此是家路逢真境但驚呀神農嘗外盡靈藥天女散餘多異花嵐雨逼衣寒似鐵冰泉炊米硬于沙峰頭事事殊塵世缺甃跳梁笑井蛙䕫門即事䕫水不可飲取之卧龍十里之外峽行風物不堪論伴暑驕陽雜瘴氛人入荆南多附贅山從䕫子盡侵雲竹枝舊曲元無調麴米新篘但有聞試覔清泠一杯水筒泉須自卧龍分鄂州南樓誰將玊笛㺯中秋黄鶴飛來識舊遊漢樹有情横北渚蜀江無語抱南樓燭天燈火三更市搖月旌旗萬里舟郤笑鱸江垂釣手武昌魚好便淹留光福塘上指㸃炊煙隔莽蒼午餐應可寄前莊鷄聲人語小家樂木葉草花深巷香春去已空衣尚絮雨來何晩稻初芒祗今農事村村急第一先陂貯水塘致一齋漫述文書煙海困浮沈不覺盤跚百病侵偶問客年驚我老忽聞鸎語歎春深今朝麥粒黄堪麫㡬日秧田綠似針除郤一犂春雨足眼前無物可闗心請息齋書事覆雨翻雲轉手成紛紛輕薄可憐生天無寒暑無時令人不炎凉不世情栩栩算來俱蝶夢喈喈能有㡬鷄鳴冰山側畔紅塵漲不隔瑤臺月露清重陽後菊花二首寂莫東籬濕露華依前金靨照泥沙世情兒女無高韻只看重陽一日花過了登高菊尚新酒徒詩客斷知聞恰如退士垂車後勢利交親不到門續長恨歌四首金盤瀲灔曉妝寒國色天香勝牡丹白鳳詔書來已暮六宫鉛粉半春闌紫微金屋閉春陽石竹山花郤自芳莫道故情無覔處領巾猶有隔生香人似飛花去不歸蘭昌宫殿㡬斜暉百年只有雲容姊畱得當時舊舞衣帝鄉雲馭若為留八景三清好在不玊笛不隨雙鶴去人間猶得聽梁州秦淮不將行李試間關誰信江湖道路難腸斷秦淮三百曲船頭終日見方山五月聞鶯桑隂凈盡麥頭齊江上聞鶯每歲遲不及曉風鵯鵊子迎春啼到送春時釣臺山林城市兩塵埃邂逅人生有往來各向此心安處住釣臺無意壓雲臺餘杭春晩山花各靜芳從教紅紫送韶光忍冬清馥薔薇釅薰滿千村萬落香四十八盤詀曲不前如宦拙欹傾當面似交難若將世路比山路世路更多千萬盤歸州竹枝歌東鄰男兒得湘纍西舎女兒生漢妃城郭如村莫相笑人家閥閱似渠稀䕫州竹枝歌五首五月五日嵐氣開南門競船爭看來雲安酒濃麴米賤家家扶得醉人迴赤甲白鹽碧叢叢半山人家草木風榴花滿山紅似火茘枝天涼未肻紅新城果園連瀼西枇杷壓枝杏子肥半青半黄朝出賣日午買鹽沽酒歸癭婦趂墟城裏來十十五五市南街行人莫笑女麤醜兒郎自與買銀釵白頭老媪篸紅花黑頭女娘三髻了背上兒眠上山去採桑已閒當採茶櫻桃花借暖衝寒不用媒匀朱匀粉最先來玊梅一見憐癡小教向旁邊自在開寶相花誰把桑條夾砌栽壓枝萬朶一時開為君也著詩収拾題作西樓錦被堆妃子園涪陵茘子天寳所貢露葉風枝驛騎傳華清天上一嫣然當時若識陳家紫何處蠻村更有園淳熙五年四月二日直宿玊堂懷舊二絶桂海冰天老歲華直廬重上玊皇家當年曾識青青鬢惟有東墻一架花雪山刁斗不停撾夜把軍書敢顧家珍重玊堂今夜夢靜聞宫漏隔宫花北城梅為雪所厄凍蕊粘枝瘦欲乾新年猶未有春看雪花祗欲欺紅紫不道梅花也怕寒虞姬墓劉項家人總可憐英雄無策庇嬋娟戚姬塟處君知否不及虞兮有墓田最高峰望雪山大面峰頭六月寒神燈収罷曉雲斑浮空忽湧三銀闕云是西天雪嶺山元夕粉痕紅㸃萬花攢玊氣枝光寶月團簾箔通明香似霧東風無處著春寒宋元詩會卷三十八
