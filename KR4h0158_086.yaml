body:
  text: 宋元詩會卷八十六兵部主事陳焯編成廷圭字原常廣陵人元統至正間隱居不仕四方士之過淮東者必主其家所與遊多至尊顯以廷圭性甘隱退亦遂無薦用之者生平讀書好古尤工於詩臨川危素序其居竹軒集云凌雲霞入霄漢粳粃萬物之興發乎至情非所有勉強而為之也同時詩人又有成禮執者曹學佺謂即廷圭别字因合其所作為一編焉送李子威代祀嵩衡淮海羣生望甘澤五嶽雲氣通天香落嵒谷瑞靄春冥濛海潮天際來金碧森萬峰劃落紫翠堆亭亭玉芙蓉古廟絲竹存迎神奏黃鍾空山遞餘響落花舞青童春夜曲芙蓉樓前拜新月寶鴨微薰透銀葉吳山楚水送逺遊不管閨中照離别誰家玉鈎飛上天一似連環舊時缺缺多圎少將奈何方寸愁腸萬里結為郎白苧裁春衣又恐月圎郎未歸戚戚行戚戚復戚戚白頭殘兵向人泣短衣破綻露兩肘自説行年今七十軍裝費盡無一錢舊嵗官糧猶未得朝堂羽書昨日下帥府然燈點軍籍大男荷鍤北開河中男買刀南討賊官中法令有程期笳鼓發行星火急阿婆送子婦送夫行者觀之猶嘆息老身今夕當守城猶自知更月中立射鴨謡阿儂手挽竹枝弓射鴨緑楊湖水東三三五五似學武一箭誤中雙飛鴻前船唱歌後船哭月黑湖中夜潛伏東海健兒不敢過人命幾如几上肉老翁入縣前致詞夜夜全家猶野宿丁寧門戶且勿開明朝又怕官軍來聞中原河決盜起有感中原九月黃河水平陸魚龍吹浪起飛霜肅肅鴻雁來禾黍漂流桑棗死大風怒號揚飛塵白晝剽掠如無人官軍不誅海東賊縣吏乃殺西村民夜聞羽書起丁力老稚嗷嗷向誰泣我當六十將奈何扶杖淮南望淮北送天長教諭孫允誠任滿歸金陵憶昔君方少年日文帝潛宫曽一識龍飛上天不可攀圗畫空餘兩竒石閉户讀書三十秋出門為官才領職天長令尹莫我知苜蓿朝盤勝肉食三年官滿來揚州僦屋正近橫江樓門前車馬日如市談經講易皆公侯公侯滿座即沽酒典却篋內青鼯裘鄉心苦憶長千里明日君當渡煙水中山李桓文中雄乃是君之渭陽氏深衣再拜如母存故宅重歸令客喜豈無舊業問松筠亦有清輝照桑梓青雲熟路君何如白髮滄江吾老矣丁千五歌丁千五一百健兒如猛虎幾年橫行青海頭牛皮作衫桑作弩射陽湖上水賊來白晝殺人何可數將軍宵遁旌旗空倭甲蠻刀賊為主西村月黑妻哭夫東塢山深母尋女屋廬燒盡將奈何往往移家入城府不是丁家諸健兒仗劍誰能剪狐鼠樓頭釃酒齊唱歌爭剖賊心歸釁鼓官中無文立賞功還向山東販鹽去辛卯秋旱八月晦日天大雷雨八月晦日雷怒號大雨如注風蕭騷捷如神鬼撼山嶽湧若江海翻波濤屋茅重捲一重去河水忽漲三尺高驚鴻翅濕飛不起散亂中澤呼其曹雲龍有意洗兵甲下與蒼生舒鬱陶浮雲收斂赤日見天宇廓逺無纎毫嵗年不逢亦偶爾吾將種麥耕東臯雪舟歌為王子中賦王郎不知何許人一舟橫在江之濵風清月霽未肯出滄州獨與天為鄰洞庭煙水兩寂寞十年不見君山春北風三日雪大作挂席張帆以為樂手中鐵笛吹紫鳯身上氅衣如白鶴拍浮滿載百壺酒企足篷窗供獨酌剡中隱者毋相疑乃與戴老同襟期更闌酒盡雪未止趣棹欲返猶遲遲今夕何夕此乘興千載未必無人知悲徐州彭城八月風塵起數郡義兵多戰死良家子女復何辜盡作黃河水中鬼髑髏填海幾時歸千古沈寃無處洗王師一日天上來賊船夜斫浮橋開守橋將軍不敢敵狂瀾倒㵼聲如雷三山回望平如掌野曠猶聞金鼓響軍中少年當封侯爭入轅門請功賞江邊老翁死即休血淚沾襟空白頭題畫史王夢麟卷老翁窮居廣陵市四壁蕭然祗圗史題詩不博一文錢古瓦磨穿空費紙不如鄉里諸妙年翰墨遊戲王公前解衣盤礴作山水一幅寧惜千金捐何人最得滄洲趣麟也于今稱獨步狂吟寄興肯相過畫我東橋竹居處槎山歌為胡雲夫作淮水源出桐柏山東流入海何時還胡君引水種秋秫築室正在槎山間槎山清空白日靜胡君意與雲俱間漢東一夕風塵起雲亦高飛幾千里山間有家不得歸却過揚州飲淮水飲之為洗氷雪腸今我不樂思故鄉驅車明發度逺道廣海乂在天一方思親恨不歸來早夢中祗説槎山好他年歸隱奉親歡白頭同向槎山老送周草窗尊師歸廬山太平宫匡廬之山仙所居銀河倒蘸青芙蕖三十里路昔一往十八社友今何如向來匡君結廬處至今海月縣高樹水流花落春復春洞府蒼茫隔煙霧西風蕭蕭吹短衣賣藥修琴不歸去潯陽潮落海欲枯幾時再得麻姑書御風不跨林下虎回首肯顧盤中魚幸留神物守丹鼎喜近弟子迎飈車世間信有揚州鶴看汝乘之上寥廓晴窗須理白雪絃爽氣仍開紫霞閣袖中寶劍且藏鋒彭蠡小龍方睡著送郭仲安貢察院捧檄上京華清才素共誇封章不起草健筆自生花燕市千金馬天河八月槎看君冠獬豸好為觸姦邪曉出錢塘門出門聊適意草樹碧紛紛一雨破清曉四山生白雲僧樓緣嶺出樵徑過橋分明日重攜酒來澆和靖墳齋居曉起坐終日無人扣竹扉柿因風落早菊為雨開遲稚子能賒酒鄰翁許借詩白頭無别計空負聖明時登望江樓長江不可極岸幘獨登臨潮信自朝暮山光無古今碑亭流水涸輦路積苔深欲寫興亡恨西風萬葉吟寄寅甫山館殘花歇江樓暮雨餘長歌留客和短札倩人書露葉縣青蔓風簾隱碧梧夫君隔河漢涼夜月生初寄慈溪普天澤監縣聞説慈溪縣官間地更偏兩潮來海錯六月刈山田曉塔天童寺春帆日本船何時瓊樹底花夕醉嬋姢秋夜雜詠平居在城市無夢傍江湖世事有今日生平猶故吾抽書逢越絶引曲感吳趨鄰叟邀皆醉歸來不用扶賦林泉民羣居傍城郭獨汝向林泉亂世知誰在荒村只自憐白雲棲晚樹流水界秋田亦有催租吏敲門橫索錢和謝雪波東阡道中作淮楚紛紛際誰憐老逸民一為吳郡客三見洞庭春世路間關久侯門接納頻麻衣猶似雪不敢涴緇塵龎山湖泛舟過寧伯讓莊所湖上足清晝雨餘生緑陰扁舟到城近曲港入村深野叟頻相問郎君不可尋西庵肯分席吾亦老山林寄愚隱智東堂落日太湖上歸舟此磧沙百年同是客兩寺即為家殘竹仍多筍枯藤也自花何時結茅屋相伴老煙霞題慶雲東竹水居水光當戶白竹色照衣青風露涵虛室江潮入淨瓶林梢間挂錫月影靜翻經上觀何聞見秋聲出杳冥秋日遊虎丘逢徑山元上人攀葉樹層層兹遊記得曾到山疑是夢出寺忽逢僧短簿荒祠酒生公舊塔燈留詩駭浮俗山鬼也多能送李斯立南國風塵滿西江道路難鄉人問家信津吏識儒冠短髮何由黑孤心只自丹放歌聊縱酒努力且加餐雪閉門三日雪竹外轉蕭然夜色侵書幌春寒壓篆煙詩題名彥後酒讓老夫光獨臥袁高士清風幾百年夜過吳江聖夀寺宿復中行方丈深夜扣禪扄天寒月在庭鳥驚栖後樹僧掩讀殘經蔓草風吹白枇杷雪洗青對牀聽説法方寸愈惺惺登靈巖山木杪見浮圖盤盤一徑迂倚巖留客坐過嶺倩人扶野色平如削湖光淡若無殘碑不可讀春草沒龜趺送澄上人遊浙東浙水東邊寺禪房處處家千崖無虎豹二月已鶯花曉飯天童筍春泉雪竇茶煩詢夢堂叟面壁幾年華憶遊龍井過南天竺登二老亭曾賦一詩二老題詩處風流不再逢客歸黃葉雨僧住白蓮峰誰謂山無鳯人傳井有龍白頭江海上今夕寄行蹤三月二十五日過上洋徐居士柯莊趂潮深入港風急水西流沙潤輕沾屐橋低欲礙舟孤花餘晚艷芳草亂春愁鷗鷺應相笑衰年尚逺遊吳中五日追念故友李時中李欽嗣有感而作夢繞南岡北嶺雲一杯無計灑松筠世間我豈長貧者地下君為不死人夜雨自荒張祐宅秋風誰障庾公塵于今道友俱凋喪落日江湖淚滿巾八月十六日送張仲舉至秦郵驛是夕邵文卿置酒雲峰臺望月水驛官船晚未開月明乘興且登臺揚州鶴怨山人去甓社珠迎國士來千里何時重命駕百年今夕此銜杯同君盡醉交遊地為問秦郎安在哉送陳景川歸盱眙第一山中風物殊我欲買田來卜居風林把酒聽黃鳥雪港挂罾分白魚富貴不求吾老矣漁樵有約子何如可能久作終焉計北海方修薦鶚書虎溪三笑圖三老風流笑口開山中猿鶴亦驚猜攢眉入社謾多事送客過溪能幾回僧影欲隨秋水去虎聲偏傍石橋來東林絶響今千載撫卷題詩愧乏才寄巴克實尚書憶陪冠蓋集通津下士無由拜後塵曽和淮南招隱曲得從天上謫仙人鵷鸞在列誰堪並鴻鵠高飛不可馴遙想退朝香滿袖題詩還記竹軒春寄烏克遜幹卿參議紫宸奏對出班行畫省論思晝漏長三月不知燒筍味一春還憶煮茶香幾人白髮黃花酒何處青山緑野堂扶植皇綱在今日中原草木仰輝光夜思斗帳方牀一布衾睡餘推枕復長吟青燈細雨三更夢白首殘編萬古心天上不知何嵗月城中誰信有山林哀歌坐待東方白短髮刁騷不滿簪環碧齋面面溪光護石苔軒墀無復有塵埃月涵虛白浮秋去水泛空青入座來漁釣兒孫多質朴嘯歌鷗鷺不驚猜我家亦住滄江曲千箇篔簹繞舍栽蕭萬戶野鶴卷子肯著邊塵涴縞衣當時城郭是耶非自離碧海三山去直過青城萬里飛老去揚州空逸興何人沙苑脫危機丈夫功在麒麟閣莫説仙家有令威送謝芝甫赴山南憲謝庭子弟多佳士荆國山川總勝遊萬里捧書催入幕一朝撾鼓發行舟玄猿啼處巴江夜白雁來時楚甸秋襄漢風流千古意為君長憶仲宣樓柬勾曲外史張伯雨霞珮翩翩出洞天當時倣佛見癯仙幾年南國張公子今日西湖葛稚川滄海塵飛丹幾熟玉堂人去榻空縣林間載酒來相覔乞寫山經與世傳送幹克莊僉憲調淮西道繡斧煌煌擁使軺才名籍籍在中朝甘泉詞客河東賦蓬島仙人海上樵風振紫山迎驛騎雲開金斗見秋雕澄清事業須公等桂樹淮南未易招廣陵嶽宫醮夜觀王淡洲高士蕆事自登瀛橋迎師入黃籙壇濛濛雲氣濕霓旌小隊紅綃鳯蠟明鸞鶴舞隨行道影魚龍出聽步虛聲淮南高士青毛節勾曲仙人碧玉笙一路天風吹不斷此身今夕在蓬瀛送楊士先歸長安落魄麻衣不受塵黃金釋盡只清貧新豐市上酒濯足韋曲城南花惱人豪傑謾嗤秦逐客漁樵能話漢功臣清時未老丹心在姑把長竿釣渭濵阮子華所藏桃源圖桃花流水似天台倣佛三生到此來玉杵玄霜無處覔金堂祕室為誰開滄州一夜生芳草陰洞千年長緑苔何必誑人秦甲子漁郎祗見兩三回嶽宫登瀛橋疊石為橋跨兩涯只如平地入煙霞銀河夜擲仙人杖碧海秋橫奉使槎浴水先迎三島日隔闌遙見十洲花月中時有簫聲過多是山頭聖母家題山居圖石子坡頭松兩株水光嵐氣護幽居山翁被酒愛騎馬溪友放船來捕魚秋色自隨黃葉老野懷常共白雲舒何時卜築如圖畫竹下開軒更讀書瑞雪為劉芝田賦風捲寒溪漾碧沙曉林驚見玉橫斜人間風日不到處天上神仙解種花九地暖回龍有穴三山雲靜鶴無家泛舟來覔芝田叟留作山陰勝事誇寄謝方方壺寫寄遙山古木鬼谷陰陰苔蘚班只除猿鶴伴高間丹光或在藤蘿外劍氣常留水竹間每讀內篇消永日還將生紙寫遙山衰翁可是非仙骨不得相從共往還送孫從義憲史貢部貢名書到拆封開正爾諸曹議選才侍史閣中簾影動尚書天上履聲來階墀伏謁人皆喜符牒鋪張手自裁不有雄聲驚畫省可無清論逹烏臺送余廷心翰林應奉楓葉蕭蕭江已秋吳船三日住揚州靛花深染青綾被雲葉新裁紫綺裘征驛馬嘶風滿樹别筵人散月當樓明年春雁將書去人在蓬瀛第幾洲畫魚生平蹤迹侣魚蝦浦月山風滿客槎曽向春盤登北鮪更從丙穴薦南嘉賞花釣得留詩友折栁穿來覔酒家萬里江湖清夢逺于今空對畫中誇送李唐臣調山南憲幕潮落寒汀水欲氷酌君何惜酒如澠人憐狗監知司馬我喜龍門識李膺爽氣九秋橫楚澤先聲一日到江陵君行自勵青雲志赤鷃終慙九萬鵬夜泊青蒲村黃葉飄飄秋滿天數家茅屋更翛然村中老人不識字溪上小兒能駕船薺菜登盤甘似蜜蘆花紉被暖如綿此中長得無宵警春雨扶犁學種田春日遊上方寺因過别業今日雨晴山亦佳散行聊復寫幽懷田翁入郭買春酒野衲下堂留午齋老去任添新白髮平生能著幾青鞋醉中天地為衾枕却笑劉伶死便埋次李希顔述懷韻八月邊聲草木寒愁來短髮不勝冠諸公莫誚王夷甫我輩終慙管幼安酒劵如山空好客田毛何日再輸官蘭陵溝上松無恙還有孤猿夜夜看登狼山醉題僧壁白狼山頭僧卓庵我躡飛屐窮幽探麻姑又見海深淺女媧不補天東南危枝如龍固矯矯怪石似虎猶耽耽興來捉筆寫狂語此身只合棲雲龕題朱伯禮西村草堂愛汝西村之草堂囂塵不到堂中央夕陽欲下山更好大火未流宵已涼隻屨也能來戶外小舟剛遣繫籬傍豈無百榼揚州酒與子同醉歌滄浪寄崔宗文白髮無家七十翁笻枝漫指任西東不因避地來吳下正愛看山入剡中臺閣故人書信少江湖狂客酒船空老懷無限平生意清話何時一夕同寄蔡彥文掾史鳯凰池上神仙吏却是中郎幾葉孫幕下豈無竒計出牀頭猶有異書存防秋列寨山如戟蒸土為城鐵作門何限民間可憂事老懷那得與君論送陳性之崑山從事只將從事寫前銜省檄風來自拆緘六案更須勞綵筆一官猶未換青衫風生海市朝持酒日落江城暮卸驂我未識君空悵望恍如煙水隔仙凡重遊虎丘寺海湧峯頭行徑微芒鞋欲趂孤雲飛風高木客作人語月出天王騎虎歸傑閣重樓遞隱見寒泉古木相因依荒丘王氣豈消歇干將莫耶千載稀題何德深溪南小隱宰相官之不受招碧梧林巷自逍遙溪頭二月花先發洞裏千年雪未消朝士過門時載酒仙人飛佩夜吹簫社圖誰寫耆英會還肯中間著老樵寒食日松江有懷廣陵老來偏欲惜年華春正濃時不在家江上苦遭寒食雨夢中猶見廣陵花書藏舊篋應無恙酒憶新樓不用賒日暮荒城聞鬼泣東風吹浪滿天涯送秀巖上人歸日本草年中國遊方遍看水看山念念非海眼枯時千劫壞日頭翻處一僧歸黃梅雨打袈裟濕白蜃雲隨錫杖飛富士巖前留語在庭松西長舊禪扉同張仲舉夜宿寒橋柔櫓聲乾破寂寥青山磯下宿寒橋乾坤萬事雙蓬鬢風雨孤舟半夜潮丹鳯不來秋已老玉人何處水空遙幾時重醉秦淮酒細聽漁樵話六朝李子英心逺亭門外黃塵掃不開何由吹得到靈臺間看倦鳥投林去靜愛孤雲出岫來彭澤高人多逸興峩眉仙客有天才祗今誰到悠然處同采秋香共一杯送袁季文赴帥幕少年書劍學從軍幕府于今氣不羣白髮元戎多好武青衫從事最能文帳前草檄花如雨江上維舟水似雲把酒高歌成逺别不知何處又逢君南城暮春南城雨盡午風和二客相從步屧過流水陂塘春事減落花門巷晚愁多銀瓶自㵼沙頭酒寶瑟誰調陌上歌莫寫江南斷腸句賀郎憔悴髮空皤周平叔夜宿崇明寺海雲樓偕羅成之隱君文長老盧隱君以沙頭雙瓶為韻天台老衲兩眉龎自起高樓枕石杠煮茗别開留客處論文多近坐禪窗冥鴻散去猶相逐獨鶴飛來不作雙明發仙舟上霄漢定傳詩話滿滄江丘克莊敞雲樓君家樓外雲如海五色輪囷掃不開每就月明簷下宿更隨秋色座中來瓊臺夜鶴迷蹤迹玉女春衣費剪裁看爾騎鯨朝帝所舉頭西北是蓬萊題玉巖溪山野趣圖流水淙淙石路迂滿庭雲氣欲模糊白鷗溪上秋多少黃葉山中徑有無十月雨深漁屋破三江風急野航孤年來難覔幽居處空向晴窗看畫圗送馬令尹任滿長洲赤子窮無告正賴郎官為撫摩兵後人家猶耒耜日長官社有絃歌越來溪上波聲小魯望祠前月色多自古長才須大用薦書元不待常何送羅成之移居崇明其子季通亦之本州教官先生八月乘煙霧妻子同隨海上槎太守賔筵先肅客廣文官舍即為家波濤浩蕩藏陰火島嶼微茫接太霞聞説三洲多藥草可能無意到丹砂寄靜逸處士顧仲庸環堵蕭然一室寬只除詩酒寄清歡瓶中有粟分寒士袖裏無書上逹官揚子暮年空識字龎公早嵗已遺安先生獨臥風塵表吾欲相從接羽翰欲卜居海上未有定止先作寄紫步劉子彬滿目風塵祗自憐輕裝已辦有行纒也知避亂依城郭更欲移家傍渚田紫步于今無士馬滄溟何處有神仙桃源只在人間世還許漁郎放釣船送傅德潤陪將作同知武昌買馬回京維揚館裏送軺車却算分攜八載餘天使出求沙苑馬星郎厭食武昌魚數鞭已報充華廄上冡無忘過舊廬老我平生無駿骨應從郭隗借吹噓送盛克明辟掾浙東移家吳興十年三送滄江别此日分攜又不同辟掾逺趨青瑣闥移家喜近水晶宫勿論後會知何地且念離羣獨老翁幕府郎官應問訊為言憔悴坐詩窮寄噩禪師四十年前在天寧方丈曽有求賦毛女者短杖輕包歸去來水雲多處少塵埃一春海鳥依簷宿五月溪蓮繞舍開雲外送僧歸日本月中携客過天台衰翁不得瞻圓相猶望新詩託雁回送清淮叟上人遊五臺雁門西畔是靈山山作青螺五髻鬟春日花開殘雪裏僧房人在白雲間善財參問何時遍文暢嬉遊幾日還淮海清公更瀟灑早將聞見動禪關和李克約東皋雜興二首一春開遍雨中花幾向東園管物華老去始知身是客愁來空擬醉為家江樓簾箔霏香霧野寨旌旗絢采霞曵杖歸來還自笑夕陽原上數殘鴉芍藥花開江雨晴幾時重作看花行松間携妓從教俗竹下留賔也自清一夜春愁無處著三分月色為誰明貧家亦有琴堪典好把平生意氣傾甲午除夜有懷孟景章夜窗兒女笑燈前亂世安居又一年鄰甕且分婪尾酒客囊從換折腰錢凍消屋角篔簹雪寒壓爐頭榾柮煙安得重陪孟東海劇談終夜不成眠六月書所見干戈滿地起風塵民物凋零府藏貧黃犢烏犍烹作食雕梁畫柱折為薪江淮經理須賢俊草澤誅求到隱淪謾道寬心應是酒老夫三日未沾唇九月十日自夀余生堪嘆復堪憐喜際明時老市㕓把菊已從前一日種桃猶待後千年但令有子親書帙莫怪無人送酒錢寡欲清心今得矣煉丹何用學神仙時寇未平感時傷事寄張仲舉邊報紛紛日轉頻彭城猶未息風塵中原白骨多新鬼浮世黃金少故人阮籍一生惟縱酒季鷹今日定思蓴河東鶴叟應相憶落日悲笳淚滿巾宿鶴沙張氏草堂草堂借我作行窩杖屨頻煩太史過滿地白雲清晝永隔溪黃鳥緑陰多銀瓶自㵼山中酒鐵笛誰翻小海歌今日逢君須盡醉西家亭館奈愁何寄周平叔先生就求蒼耳子周侯久不通書問夜夜滄江入夢頻五月採來蒼耳子幾時分送白頭人沙頭酒熟田毛足港口船過海錯新南北相望千百里老來幽獨倍傷神送智隱住水月禪寺放船直到栖禪處萬頃湖心一鏡開緑樹鳥驚風落果碧潭龍去水生苔西巖尊宿傳燈在東海高僧杖錫來今夜月明清似水大空無地著纎埃王御史繡榮堂色絲不染胭脂井銀漢繅成五色紋織女機中翻海水諫官衣上繡春雲清嚴地位人誰到錯落天章手自分他日錦歸當白晝江花江草亦欣欣淡香亭幽芳不自媚白日淨依依風露已如此山中人未歸徽廟御畫梔子白頭翁梔子紅時人正愁故宫衰草不勝秋西風吹落青城月啼得山禽也白頭唐明皇吹簫圖寢殿春深晝漏遲榻前侍女立多時玉簫自按霓裳曲賜與梨園弟子吹納延字易之官翰林有前岡詩集送邵元道四首仲連匡世才揮手却秦軍掩袂停白日登車抗浮雲射書誠草草孤城死生分辭榮敦薄俗矯矯離其羣虞卿舌轉丸揣事洞微茫事危見交態窮愁名益彰黃金散逝水白璧凝飛霜丈夫有定志得失非預防梅生一尉微喋喋正天紀洗心洞玄化削迹無妻子龍變誰為馴蟬蛻乃真止松回風泠泠水落石齒齒襄陽孟浩然拂衣歸故山放浪巖壑深流咏遺人間舉袖林花落擊楫江鷗還羊公何墮淚水聲日潺潺次韻元復初春思三首叢薄回青陽羇禽競新哢喧喧人語浮稍稍春事動澄心待芳華小睡足幽夢夢覺天宇新朝光破簷凍遊塵逐平泉秀色翳榛莽彤雲互東西飛霙仍變雨昭蘇在玄功步屧復延佇何當上青冥振翮窮委羽逺客芳草思湛湛天外舟坐令親知濶低徊此淹留古樹擢竒石清流滙芳洲素心諒有在胡不為兹遊李老谷高秋逺行邁入谷雲氣暝稍稍微雨來漸怯衣裳冷縈紆青崦窄香篠煙林迥峰回復開豁夕陽散微影霜葉落清澗寒花媚秋嶺途窮見土屋人煙帶虛井平生愛山癖朅來愜幽靜月落聞子規懷歸心耿耿新月行江南小兒不識愁新月指作白玉鈎家人見月更歡喜捲簾唤我登高樓三年留滯京華裏衮衮黃塵馬頭起一番見月一畨愁歸心夜逐東流水在家不厭賤與貧出門滿眼多故人誰念天涯逺遊客只有新月仍相親豫有山水圖留倪仲愷太史所久未得題一日危太朴謂豫曰昔人曽以酒解酲子曷作詩趣之亦此意也爰成是章野人築室青山底緑篠姢姢映秋水天涯作客想江南乞君題詩畫圖裏畫圖疊嶂雲鈎聨汀花碧草春依然對此令人動歸興却思把釣清溪邊一束殘書挂牛角大笑青天看日落窗下孤燈夜雨聲人間萬事秋雲薄明年我亦去山陰君歸泛雪須相尋草堂下榻看圖畫為君釃酒聽君琴賣鹽婦又有新鄉媪一首與此詩同意刪之賣鹽婦百結青裙走風雨雨花灑鹽鹽作滷背負空筐淚如縷三日破鐺無粟煮老姑飢寒更愁苦道旁行人因問之拭淚吞聲為君語妾身家本住山東夫家名在兵籍中荷戈﨑嶇戍吳越妾亦萬里來相從年來海上風塵起樓船百戰秋濤裏良人賈勇身先死白骨誰知填海水前年大兒征徐州徐州未復軍尚留去年小兒攻高郵可憐血作淮河流中原封裝音信絶官倉不開口糧缺空營木落煙火稀夜雨殘燈泣嗚咽東鄰西舍夫不歸今年嫁作商人妻繡羅裁衣春日低落花飛絮娛深閨妾心如水甘貧賤辛苦賣鹽終不怨得錢糴米供老姑泉下無慚見夫面君不見繡衣使者浙河東采詩想欲觀民風莫棄吾儂賣鹽婦歸朝試奏明光宫二真廟詩東陽杜氏二女子早喪父母鬻餅市中厨人挑之二女憤殺厨人走匿仙居之孟溪夜雨水漲皆溺死其尸閣巨木上蒼藤纒束若殯宫然乃隋大業間也唐仙居宰令狐某封其遺骨為塑像建廟溪上自爾水旱之禱輒有竒徴宋令陳襄碑之今使君東陽陳君元祥督漕入京上其事於中書命太常議封貞惠貞淑二真仙詩以紀之君不見瀟湘江上斑斑竹雨灑疏林淚痕緑又不見金溪縣裏兩嬋娟身化白金金賤復考金溪邑志未載此事且字句疑訛至今九疑山下大江西窅窕祠堂依古木仙居更有杜貞娥千古清風凛相續貞娥鬻餅東陽市厨人相挑憤切齒提刀夜斷賊奴頭勇烈真同丈夫子脫身竄匿來孟溪木食澗飲幽崖棲煢煢姊妹自相保天寒愁聽哀猿啼夜雨奔流溢山趾月黑溪深黯無底嗚呼雙娥同溺死玉骨藤纒高樹裏開元賢令銜餘哀築祠却傍蒼崖開悲風蕭蕭落山葉精靈日暮猶歸來陳侯自是古靈後來宰仙居事非偶瓣香赤腳禱龍湫秋沛甘霖起枯朽去年飛章徹九門紫綾裁詔褒貞魂鸞車孔蓋蔽白日髣佛趨謝朝家恩男兒堂堂軀七尺忍垢含羞汚簡册何如貞惠貞淑兩真仙雙坐神皋長廟食行路難至正已丑夏右相多爾濟拜國王就國遼東左相賀公亦左遷感而有作行路難難行路黃榆蕭蕭白楊暮槍竿嶺上積雪高龍門峽裏秋濤怒斑斑虎豹當天關蒼崖壁立登天難千車朝從赤日發萬馬夜向西風還鑑湖海船苦不早遼東白鶴歸華表夜雨空階碧草深落花滿院行人少世情翻覆如秋雲誓天歃血徒紛紛洛陽爭迎蘇季子淮陰誰識韓將軍行路難難行路白頭總被功名誤高樓昨宵歌舞人丹旐曉出東門去子午谷終南山青松茅屋相對間拂衣高歌上絶頂請看人間行路難送楊待制出守閬州兼寄家兄簪筆三年侍禁林分符還向蜀江潯暮雲盡處峨眉出春雪消時灌口深鈴閣雕盤香冉冉臺門畫戟晝森森錦屛山下多遺迹好覔城南老杜吟會稽代祀歸白頭萬里喜來歸小院深深過客稀睡起無題間錦槖春來多病怯羅衣流鶯亂蹴殘紅溜乳燕連穿散絮飛莫道山房渾寂寞臥聽小女學鳴機春日次王元章韻翠幰金車錦駱駝芙蓉繡褥載雙娥雨晴輦路塵沙少風起春城栁絮多秉燭且留清夜飲倚闌猶聽隔牆歌山翁此日心如水夢斷江南雨一蓑次韻假吉甫助教春日懷江南花底開樽待月圓羅衫半裛酒痕鮮一年湖上春如夢二月江南水似天修禊每懷王逸少聽歌却憶李龜年卜鄰擬住吳山下楊栁橋邊艤畫船宋元詩會卷八十六
