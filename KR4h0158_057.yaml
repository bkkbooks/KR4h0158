body:
  text: 宋元詩會卷五十七兵部主事陳焯編郭震漁者江栁弄風顰翠黛山花著雨濕臙脂却收短櫂拈長笛一葉舠中仰面吹老兵老來弓劍喜離身說著沙場更愴神任使將軍全得勝歸時不盡去時人雲聚散虚空去復還野人閒處倚笻看不知身是無根物蔽月遮星作萬端江為江行越信隔年稀孤舟㡬夢歸月寒花露重江晩水烟微岸直㠶相望沙空鳥並飛何時洞庭上春雨滿蓑衣魯交大雪方象曉一色皓然天地中楚山雲母障漢殿水精宫逺近梅花信髙低栁絮風吟魂清不徹和月上晴空錢昭度野水野水光如璧澄心不覺勞與天無表裏共月見分毫綠好磨長劍清宜汎小舠淡交今已矣惆悵越波濤方中荀虎丘海湧起平田禪扉古木間出城先見塔入寺始登山堂静叅徒散巢喧乳鶴還祖龍求寳劍曽此鑿孱顔楊修三山亭滿目江山異洛陽北人懷土淚千行不如亡國中書令歸老新亭是故鄉蠶室摘繭抽絲女在機茅簷葦箔舊堂扉年年桑柘如雲緑翻織誰家錦地衣齊雲觀上界笙歌下界聞縷金羅袖鬱金裙倚欄紅粉如花面不見巫山空暮雲秦淮一氣東南王斗牛祖龍潜為子孫憂金陵地脈何曽斷不覺真人已姓劉横塘早潮纔過晩潮來一一軒窓照水開鑑面無塵風不動分明倒影見樓臺青溪傾城傾國兩妃嬪此地聞名不見人潛想舊時紅粉面落花風裏步香塵北渠金殿分來玉砌流黑龍湖撒鳳池頭後庭花落恩波斷翻與南唐作御溝半陽湖江南龍節水為鄉水不純隂有半陽一片湖光共深淺兩般泉脈異温良長命洲梁武慈悲不鼎烹䝉恩豢養亦虚名狐狸口腹應潜飽就死多于日放生天闕山牛頭天際碧凝嵐王導無稽示妄談若以逺山爲上闕長安應合指終南白楊路殘枝敗葉幾霑春莫問栽培迹已陳細雨斜風恨無力蕭蕭滿路更愁人洞元觀葛𤣥功行滿三千白日驂鸞上碧天留得舊時壇宇在後人方信有神仙利登雜興我昔此園遊寒梅吐丹艷重來幾何間叢青倏以遍誰云花與葉同樹不相見青陽洞天呈主人曾少裕兩崖蒼蒼峭天柱停䇿崖邉喚舟渡青巾羽客打舟來驚起靈蛇絶溪去千年神漿不自惜萬里晴天安得雨但見飛泉落半空空中此水來何處嵒下猶涵太古泉安知上不通銀浦蒼藤半濕苔蘚昏石罅無根迸孫樹洞門一隙僅通人可惜鑿空開洞府先生朝昏息丹崖萬壑歸心心不語瑤磬一聲天壁寒白雲紫霧驚相顧野農謠去年陽春二月中守令出郊親勸農紅雲一道擁歸騎村村鏤榜粘春風行行蛇蚓字相續野農不識何由讀唯聞今年秋粒顆民不收上堂對妻子炊多糴少饑號啾下堂見官吏稅多輸少喧征求呼官視田吏視釜官去掉頭吏不顧内煎外迫兩無計更以饑軀受笞箠古來丘壠幾多人此日殘生豈難棄今年二月春重見勸農文我勤自鍾惰自釜何用官司勸我氓農亦不必勸文亦不必述但願官民通有無莫令租吏打門呌呼疾或言州家一年三百六十日念及我農惟此日江亭江亭凭望久野色暝蒼蒼古木浮寒霧空山入夕陽水流前夜月風作早來霜却笑垂綸者因漁亦自忙寳陀夙慕展遊願不從心有作寳陀十里路此日想同遊萬古不收雨四時長是秋樹寒煙半擁山濕霧還流我獨思歸苦無因到上頭晩步住在山塘深更深門前落葉與階平髙人聽鶴來相過野老因樵熟識名一水欲流山影去斷雲時傍燒痕生翛然獨步蓮峰夕十里松風秋月明張弋簡周宗聖曠野有芳芷近江無早鶯春詩定多少旬日又清明樹暗憐楊栁花開認橘橙相尋每乖阻夢裏亦愁生送宋謙父之清江因簡希亮吟詩夕陽裏相送上蕭灘前路逢梅處同誰倚櫂看嵗窮風力𦂳江濶雁聲寒持此呈蘇李人生識面難懷章别紫芝吟苦事俱廢拙深貧未除年來如旅鴈秋至即移居古道行黄葉空囊貯素書一生江海恨惟子最知余寄别顔伯竒情深袂怕分豈不欲辭君轉柁方乗曉思山已隔雲菊當前路見雁在半江聞把盞秋纔好遙憐白鷺羣禪林寺寺置蕭梁曽識少今朝蘚磴始經過天低日落江湖逺煙冷風清竹樹多蟲引翠禽行壞屋馬驚白犬吠縣蘿一僧九十形容古嵒下逢余忽浩歌俞汝尚夏日閒居無人到窮巷長日守閒居宿火惟烘藥喜晴還曬書鄰翁伴村酒稚子課園蔬門外蒿萊地從深不用鋤裴說寄邉衣深閨乍冷開香篋玊筯㣲㣲濕紅頰一陣霜風殺栁條濃煙半夜成黄葉重重白練明如雪獨下閒堦轉凄切秖知抱杵搗秋砧不覺髙樓已無月時聞塞雁聲相喚紗窓只有燈相伴㡬展齊紈又懶裁離腸恐逐金刀斷細想儀形執牙尺回刀剪破澄江色愁捻金針信手縫惆悵無人試寛窄時時舉手勻殘淚紅箋漫有千行字書中不盡心中事一半殷勤託邉使程子山􅋯庵釣雪灘待月凝雲館垂竿釣雪灘虚窓堆冷翠傑閣聳髙寒籠養千齡鶴罏燒九轉丹不須論許事心目自清閒陳必復客枕客枕偏饒睡春歸尚擁綿屋深燈易暈漏短夢難圓棲鳥警涼夜閙蛙喧雨天一聲柔櫓過何處上溪船贈張駉駉自號牧隠乍見語相合苦吟心更親老于琴得趣隠與牧為隣一夜簷花雨十年江樹春所交半湖海恨晩識斯人沈說溪樓心逺俗塵隔樓髙野興多稻花黄雀雨山影白鷗波灘澁推船上橋危挽客過日斜闌倚遍無句奈愁何縉雲道中去作京華客離家此月前問程恰中道數日近殘年山雨易成雪村雲疑是烟僕行愁不進添乞酒漿錢馮公嶺曉上馮公嶺艱難見客情雨和殘葉落身逐亂雲行野店山腰出秋泉石隙生若將世途比此路更為平别墅野舍清溪曲連茅接樹隂呼童隣錯應貰酒婦同斟落照收殘雨寒煙出寸岑江湖成夢事投老屬山林黄大受晩步扇小葛衣輕風清草路平水聲逢石怒煙素近山明喚犢牛回顧驚人犬倒行耨夫方到屋月已屋頭生朱繼芳客路閨閤空相憶那知客路艱背人前去鳥迎面逺來山夜泊孤燈悄晨裝片月彎猿聲不知處杳杳白雲間薛嵎天育道中除將吟卷引琴與鶴相隨問寺路猶逺入山僧未知鳥靈巢佛塔猿飲挂藤枝陵谷幾遷變道傍横古碑黄幼張過臨平孤踪逐浪萍幾度過臨平人語水相應帆移山倒行鷺飛秋嶼冷虹飲晩川明不是憑詩句丹青寫不成陳深姑蘇臺晩眺分得髙字殘陽古城曲岌岌崇臺髙不知何年創尚爾結構牢青山擁危楯白水環空濠美哉此山谿慘淡悲雄豪當代一戰霸意氣何矜驕蛾睂坐傾城忠魂隨怒潮空餘故宫苑寒雀飛野蒿佳辰晤良友清眺舒煩勞夕風振叢薄鴻雁中天號永懷五湖客一舸凌雲濤浩歌滄浪詞願言從遊遨李元應折楊栁東風來何時百花已飄零獨有堤上栁慘淡含春榮扁舟復何適延客江上亭顧無青玊案何以送子行攀條欲相贈上有雙流鶯流鶯正求友奈此離别情黄簡招荆江蕩子衝風逐飛雲庭葉紛墮槁蕩子久不歸佳人坐中老蕭蕭楚山晩湛湛江水流經從望夫石那得不回頭黄文雷晩立獨遊得荒谿晩意與心會水聲逺終聞山色静可對鳥語林塘邉犬吠籬落外柴門未須關月在東峰背杜旃綠珠行蜀絲殷空金作谷珊瑚成林珠百斛彼姝千花萬花蔟明月出胎照波緑鏡中飛鸞掌中身夜月春風看不足悲歡倚伏儵禍福西里憐顰東市戮願將舊意奉新人此别它生定難卜君因妾死莫多怨妾死君前君眼見髙樓直下如海深碧玉一碎沙中沈平時感君愛妾貌今日令君知妾心葉茵漁家行湖濱江滸疎疎村村村漁家人子孫為魚不管風波惡出未天明歸黄昏得來魚可數妻兒相對語甕頭有虀熟鍋中無米煮昔日魚多江湖寛今日江湖半屬官釣筒釣車漫百尺團罟帆罟空多般盖簔臘雪楊栁岸籠手西風蘆荻灘嗟嗟蚱蜢千百隻盡向其中仰衣食㡬謀脱離江湖歸犁鉏似聞歳惡農家尤費力促織壁間吟不待秋時吟苦中宵動客悲勸汝不須催婦織家家五月賣新絲張翰膾鱸元不動歸思拂袖西風已見㡬江上如今來往客但言鱸膾不言歸去去去去扁舟對晩暉晴和直欲減綿衣風來一陣蘆花過祇道春殘栁絮飛汪莘開禧元年十二月遷居栁溪上其夜大雪葢宰來訪茅屋凍將壓柴扉寒不開交朋幾竿竹兄弟數枝梅渡口月初出沙頭人正迴客居殊自在歳事亦相催徐作開庵藜莧幽人室丘園隠者居一原青嶂合萬木綠隂疎手把歸田賦腰縣種樹書桑麻連畛秀網罟入溪漁何偁贈王居士三首多羨王居士心閒事事幽山從天末見江近枕邉流春囿千葩秀霜林百果收更能窮物理濠上看魚遊地占松江勝為園不種𤓰幽深清磬響髙下石欄斜花密蜂隨蝶林深雀啅蛇勝如摩詰畫不是季鷹家霜落川原淡風髙木葉丹雲垂千頃白月墮一江寒禮佛因成塔焚香旋築壇竹聲過小院雜珮響珊珊竒童二人李獻可吉水人年數嵗孝宗召入宫中面試一詩立就帝嘉歎不已曰何不作我家兒宫女午睡應制御手指嬋姢青春白晝眠粉勻香汗濕鬢壓翠雲偏栁妬睂間緑桃憎臉上鮮夢魂何處是應繞帝王邉曽澈旴江人睂目疎朗出語必援古今括蒼鮑輗遇諸江右驚問之乃逆旅主人子明年訪之死矣僅得遺詩一首於家九齡行我生九齡氣食牛喑嗚頓挫無匹儔白雲無根起天末一生萬事同悠悠低頭拱手事先覺談笑未了成怨讐一譽不足勝百毁言語起滅如浮漚聖賢可與知者道麟鳳豈在山中遊蘧然夢覺大槐國江花昨夜生涼秋焯有孫文鑑字鹿書幼稟竒慧生三歳能辨四聲七嵗為詩多警句尤工制舉義出應小試輒冠儕偶鄉里呼以神童顧嗜學太勤毎置食飲几案間當抽思正苦忘其寒温過時進之失度愆和釀成痞疾竟以蚤夭有遺詩百首其兄弟録為小帙將授梓人偶讀曽童子九齡行追憶此孫有病魔篇亦十許嵗時作悲咽酸辛情事何甚相類也嗚呼才人無命豈獨子安長吉留恨天壌哉附見於此用誌祝予之痛病魔篇時年十二清童子陳文鑑有一病書生生長在桐邑自度非凡人無端被魔縶住世㡬何年春秋纔過十太丘之耳孫行二又行一名字毋勞問生死尚莫測旦暮長幽憂被魔勢方劇念我毁齒初就塾延師益父指為黄童祖目為李泌豈知命不猶耽思恒廢食踰時或加餐寒温非所擇浸淫脾胃間久之成痞積驅痞亦何難只因魔作孽兹魔幻萬狀覼縷未易悉人生五臟全榮衛本堅實魔能抵其巇朅來據胸臆初發痛有期為期定酉戌厥後苦纒綿不分日與夕魔形大似拳魔氣通於膝髣髴物作聲衝喉半含咽行則聲呱呱坐則聲唧唧七筋握漸稀痛楚百端集家君覓良醫救療意惶迫但得魔驅除酬金誓勿惜醫聞接踵來指脾云痼疾攻補合兼施及時不可失就之詢醫方稜术並巴㦸纔餌遭魔怒奮起與藥敵㳙滴强入喉觸忤致嘔溢魔似膠漆黏不受百草汁元精日銷磨刀圭徒浪擲匍匐叩醫門醫言須改策藥貴力乃專葠附效什伯但服更勿疑服久魔自戢㕮咀動盈把烹煎各如式豈惟不中魔魔意翻自得液甘魔平分味厚魔竊吸金盡藥亦殫魔肥人愈瘠撑蓆骨稜稜無風寒慄慄復有後醫至相看勸勿急治此有祕傳庸師安得識岐黄八法鍼其經著甲乙任督與帶維隨症按腧穴投之得所宜癥瘕無不抉唯唯姑試之銀絲瑩如雪手撚入肌膚初無血痕漬漸刺疼莫勝鋒攅等蠆蠍洞穴非不深魔則已旁匿良久引鍼出衆患仍交作薫蒸雜艾蒳用助鍼芒力鍼灸既迭加魔損未毫末痛哭向魔陳君豈夙世業得非駘沈儔來宅我肝膈有罪應容湔有怨亦堪釋况係他生讐忍向童稚結願悉毁藥囊從君丐隂隲楮鏹千百焚牲醴三日設束茅為君車裁莛為君檝求君暫捨予逍遙信所適貸以一息安㝠報在萬刼灑血託青詞下書年月日羽士二人黄希旦字姬仲邵武人生仁宗景祐二年幼穎拔能文章長而好道禮道士吴惟靖為師盡得其服氣還丹之訣外不立異好事者喜從之遊酣詠自得人皆莫知其所以異也熈寧十年蛻去後有遇諸蜀者和賈鴻舉移竹琳房珠館何虚寂寳砌無塵苔蘚碧仙翁倚檻静吟哦却憶篔簹拂巖石勁節虚心守歳寒未嘗暫變風霜色移來迢遞不辭勞深根訝向瑤臺植漸承春意葉青青時惹天香烟羃羃月籠翠影尚蕭疎露被繁枝纔滴瀝迎風閒夜擬龍吟結實他年期鳳食非才終約老烟霞此際謬當親採擇寄言紅紫莫相猜彼此無情䝉化力逢時剪拂任他人沈去葛陂都咫尺性慵性慵人事拙思向逺山居欲得是非少先宜來往疎善鄰惟水竹良友秖琴書冷淡生涯外逍遙一室虚春日書懷二月又將半閒居興若何芳菲殊未賞泥濘阻相過華砌饒苔蘚柴門長薛蘿韶顔須自惜隨分樂天和采藥采藥山中去扳躋不覺賒深源無俗迹滿地是靈芽巗逈隂留雪溪澄淨見沙可憐名利客應笑此生涯水心亭為愛方池浄危亭此構新寒光搖玊鑑晴色戲金鱗月上驪宫曉蓮開水府春主人能息慮四座絶風塵詠竹生涯何所有滿砌植琳琅瘦影碎秋月健梢横曉霜且從喧鳥雀終待集鸞皇吟遶都忘却誰知此興長寄贈寳幢修山主瑤幢真勝槩晦迹一禪翁語黙呈心印縱横振祖風晝閒人事外夜静月華中若問春來意松青百卉紅竹洞竹洞新開碧玊林徑幽疑入五華深夜篩明月一天静晝擁青雲四座隂剪杖佇看雷雨化迎風時聴鳯皇吟烟霞不用重闗閉塵俗誰能此訪尋謝人恵星冠學道多年尚屈蟠豈勝仙伯贈峩冠曉簮乍覺星攅頂夜戴偏宜月滿壇對鑑寧煩朋友正避時羞為利名彈預思他日雲林下輕罩紗巾鶴髪寒讀方干詩數篇騷雅名雖逺三拜逢迎禮過差補得唇來身已老灌園何苦更咨嗟葛長庚字白叟福之閩清人七嵗能詩賦背誦九經父亡母改適長庚遂從陳泥丸學道號海瓊子至雷州繼白氏又改姓白名玉蟾自受陳泥丸仙訣披髪佯狂徧走名山四方求詩文者户屨常滿紹興壬午伏闕上書言天下事沮不得達因醉執逮京尹一宿乃釋是年十月至臨江軍飲慧月寺之江月亭忽躍身江流中諸從遊者急命舟援之長庚出水面搖手揮去而沒洪都之人皆謂已水解矣未幾見于融州又見于隴蜀云長歌厥初由閥閱吾志在林泉為舜不無地希顔儘有天魚虫猶可佛雞犬皆登仙顧我非碌碌荷天良拳拳幼時氣宇壯長日文彩鮮琴劒㣲暖席江湖動經年異乎三子撰契彼五家禪既已出洙泗從而師偓佺肩依洪崖右道在靈運前所得既天祕與交又國賢可圗大藥資以辦買山錢東訪鼎湖浪西尋蒼梧煙一寸百煉剛半生雙汙纒簮紳非吾欲魚鳥從所便逸興五湖濶虚名四海傳飽餐青精飯細讀黄石編頃自七閩出放焉迷市廛紅塵刺人眼名利交相煎富貴已嘗鼎雲霄當著鞭蹉跎度青春遲暮即華顛光景亦儵忽物華隨變遷仰天時一笑顧影長自憐紫府何㝠邈青鸞何沈綿蓬萊雲渺渺小有月娟娟策足青霞路收功黄芽鉛飄然復何往此去如蛻蟬秋霄辭二首仰觀銀河月千林散寒光佳人今何之逺在天一方秋聲酸我鼻秋色斷我腸夜深倚西風清淚如雨霶世有千里馬可憐無王良孤月明秋空清影跨洞門彼美嬋娟姿的是姮娥魂凄然到書帙惸然入酒樽不歸廣寒家夜遊天子園無人知此懷驚烟籠啼猿述古二首帝子御飛龍鼎湖呌奚為玊京鬱崔嵬銀河汎渺瀰俯首視紅塵萬蟻紛何知乗雲遊八極手翫珊瑚枝湯武事干戈此事矧肯期但聞穆天子八駿會瑤池河水一鏡清中有驪龍舞波心呈寳圖始脈造化祖燧人鑚炎涼炎帝餌甘苦身披獝狨衣口服觳觫乳此時至尊者帝階三尺土嬴政築阿房籛鏗纔傴僂栖霞冷煙纒山腰暗水冽石骨欲風松先鳴未雨苔已滑洞前多琪花洞裏多紫霞髙人得所栖日永蒸胡麻樓前雨霽飛㢘驅鐵騎萬雨飛落地烟淡松自蒼風起竹似醉倚窓横膝琴政有作詩意白鳥忽飛來㸃破一山翠戴月遊西林悄然無人聲但有一杯月誰家鳴乳尨萬籟静不發蒼鬚指前路滿地鋪翠樾清露滴秋衾夜氣飛霰屑遙岑有無中烟渺天空濶劍光衝斗牛長嘯蒼崖裂山行二三里詩腸思酒渴冷雲曳山腰暗水洗石骨勒馬過斷橋枯木冷欲折枝頭驚鳥鵲草根鳴蟋蟀試問夜如何孤猿啼不歇柴門自推敲殘燈更明滅鶴林賞蓮玉洞生翠霧瑤林暎素霞天飛明月英夜浴白蓮花碧水香以浄松聲吹露華衆仙鸞鶴散寂寂五雲家步虚清都五雲天天中飛紫瓊上皆青琳府中有白玊京風露凄且冷蕊宫雲㝠㝠玉童折珊瑚下弄銀河星贈郭承務蘆鴈畫士郭熈畫之冠郭熈去後名未斷其裔復有郭萬里胸中丹青飽無限為誰作此蘆鴈圗傑出南齊宇文煥烟水瀟瀟風捲蘆沙邉鴻鴈暮相呼瀟瀟洞庭此秋景世間此畫知有無幻出棲鴈三四隻八九葉蘆横古磧欲宿未宿嘹淚聲漁舟泊岸山烟黑秋風吹落梧葉黄過鴈往往歸衡陽横空書字人不識飛過有影沈滄浪落霞浸水江村暮數隻翺翔回古渡引領舉喙啄荷花飛越戍樓西畔去雲寒月淡西塞秋㡬聲凄切惹人愁胡東原香錦亭東皇剖破勾芒腹錦心繡腸香馥郁絳都風雨僝僽春花魂無主自精神黄鸝初喚栁開眼海棠枝上春煙暖放出一㸃兩㸃紅牆頭紅腮㣲笑風東原去後花無主春工亦懶施機杼亭前忽遇詩酒仙花亦噴出香龍涎風催雨䟎花不辨滿庭芬芳生爛漫牡丹吐火花欲然日將錦繡鋪苔氊詩狂夢與花神飲酒醉不與花神寢酒闌令我憶東原花木雖在人惻然此詩終不為花作惆悵東原此丘壑而今賞花不見人但見蜂蝶飛閒亭問月臺蘇竹莊同賦千山萬山翠交鎖何處瑤臺天上墮臺前吟久忽登樓樓前開窓天入座留天且莫放天歸問天明月來㡬時青天推月上雲表使我對月自問之試問月中玉妃子人言羿妻無乃是夜夜清風為作媒欲把氷姿嫁誰氏桂子婆娑今㡬秋蘂宫珠殿何年修吴剛執斧胡不休玊兔銀蟾猶更留我聞明皇排空聽天樂又聞李白騎鯨水中捉至今天上弄銀盤依舊萬星攅碧落但見一輪月在天如何千江千月圎月還似水水似月千眼所見皆同然今方得月為詩侣月亦有情但無語延月不久月竟歸我欲乗風遊玉宇行路難寄紫元贈君以丹棘忘憂之草青棠合懽之花馬瑙遊仙之夢枕龍綜辟寒之寳砂天河未翻月未落夜長如年引春酌古人安在空城郭今夕不飲何時樂茶歌栁眼偷看梅花飛百花頭上東風吹壑源春到不知時霹靂一聲驚曉枝枝頭未敢展鎗旗吐玊綴金先獻竒雀舌含春不解語只有曉露晨烟知帶露和烟摘歸去蒸來細搗㡬千杵捏作月團三百片火候調勻文與武碾邉飛絮捲玊塵磨下落珠散金縷首山黄銅鑄小鐺活火新泉自烹煮蠏眼已没魚眼浮松聲送風雨定州紅玉琢花甆瑞雪滿甌浮白乳綠雲入口生香風滿口蘭芷香無窮兩腋颼颼毛竅通洗盡枯腸萬事空君不見孟諫議送茶驚起盧仝睡又不見白居易餽茶喚醒禹錫醉陸羽作茶經曺暉作茶銘文正范公對茶笑紗帽籠頭煎石銚素虚見雨如丹砂㸃作滿盤菖蒲花東坡深得煎水法酒䦨往往覓一呷趙州夢裏見南泉愛結焚香瀹茗縁吾儕烹茶有滋味華池神水先調試丹田一畆自栽培金翁姹女採歸來天爐地鼎依時節煉作黄芽烹白雪味如甘露勝醍醐服之頓覺沈疴甦身輕便欲登天衢不知天上有茶無聴趙髙士彈琴我尋屏跡到猿啼雲滿山前花滿溪髙峯壁立七十二風生兩腋天可梯煉師兩鬢東風黒紺天不流月光白簷牙咬雨昨已晴松幄長空夜瑟瑟興濃抱石𤣥以輕得意七絃横玊繩膝頭指弄響玲玲燦然奪目三十星初如雨滴芭蕉夜久坐梧桐猿嘯罷宛然幽澗聴鳴泉偶雜脩篁戛清夏先疑易水渡荆軻已轉似勸無渡河美人金帳别項籍壯士鐵笛吹孟婆不然雙雉兩南北或者婦牽蘇武服絃中何以湘妃怨指下為甚明妃哭又非林下感蠨蛸更匪邉笳呌晩秋自然鴈聲下遙塞忽覺蟬噪過南樓君休彈終我畏聴滿懷今古興亡病蒼梧雲愁虞舜逺鼎湖雲出軒轅冷一聲一聲復一聲不管世間銀髮生彈盡天涯夕陽影又向山中彈月明胡長卿去已久韓飛瓊無此手玊帝聞未曽人間空白首栁花霏霏滿江城城外海棠紅淚傾恐君餘思更未已為我春晝鳴晴鶯贈蓬壺丁仙人琴瓠巴騎鯨上天去伯牙成連亦千古淺世斷無鍾子期絃中妙意為誰舉春風春雨滿瀟湘人在蓬窓閉竹房竹裏鵑啼喉舌冷花間鶯宿夢魂香客從澧沅下衡岳滿懷詩愁何處著請君拂去水晶塵瀹茗一了撫然作道人問予若為情伊絃凄兮余莫聴一春十病九困酒三月都無二日晴俛首沈吟聲一曲吟狃一罷撚撥續初如雪泉𠻳鳴玉已轉忽如雨􅉡􅉡于中亦有蟠蛸鳴儵忽變作冷猿聲始疑荆軻渡易水乃是湘妃夜涕零昔從撫斷南風了羑里幽人始能曉可嘆壇中苦杏花山髙水寒即聲杳道人此意非人間笑詠洞章鏘佩環能令舞鳯下丹漢雲裏大地垂頭看世間雞蟲互得失只好牧羊坐化石何為兒女謾呢呢候蛩時鳴徒戚戚輸君朝朝在翠㣲鶴已睡去人不知笑思古今一俯仰彈到千山月落時君知否梧桐枝上雙燕語盡將萬事等風絮琴中日月何翛閒肯使事逐孤鴻度有贈我見千家閙管絃金瓶玊水養春妍一朝花落空枝在爨下焦枯亦可憐曽聞李白之詩否以色事人㡬長乆斷蘂殘英尚未衰月明人立黄昏栁筆架山吾是瑤臺翰墨仙操觚弄槧玉皇前翻雲為墨海為硯一片寒空如雪殘兔毫象管用不得倒蘸崑崙醉鈎畫當年染罷八角芒金闕上章求放逸三峯坐斷江南天臨汝城頭蒼蒼然狀如筆架翠起伏與吾閣筆齁齁眠山靈驚呼猨鳥亂清魂復被風吹散起來呌問山前人㡬度松枯白石爛白雲庵宿霧戀喬木落花粘瘦枝鳥聲人静處山色雨來時霽月成相約涼風解見知僧房安一枕海氣濯氷肌順昌即事筆下千機錦胸中一滴金乾坤春甕濶風月夜樓深世絶夫君操人誰梁父吟只尋雲外路誰復聴寒砧五更解酲梅竹之間徘體宿鳥能傳語殘風且㸃心山情憐淡坐月色笑孤斟驚我梅花睡聞他竹葉吟清歸無所得得句貴如金博羅縣驛虎嘯月生海猿啼風撼山夢回三鼓盡身自九天還雲氣浮窓外泉聲入枕間問心宜富貴為復要清閒景泰晩眺海岸孤絶處晴沙露逺汀潮花人鬢白山色佛頭青夕照雌黄筆秋烟水墨屏天空杉月冷鶴夢幾回醒温學士再訪山中炎帝辭朱節清晨立素秋借緋皆木葉脫白滿林丘流水髙山興疎風冷雨愁詩人應自樂歌笑海東州紅梅人賦紅梅少予詩為補遺霞融姑射面酒沁夀陽肌太潔遭時妬獨醒為衆疑漫隨春色媚自保歳寒姿春日道中洞口鳥呼鳥山頭花戴花風篁蒼韻玊烟樹晩籠紗懐白一樽酒邀盧七椀茶春光索彈壓萬象曉排衙梅牕南窓屋數楹一㸃陽和生枝上雪粧瘦牆頭風作清霜天酒自煖夜月夢難成何處人吹笛黄昏送幾聲赤壁不說江山笑老權盡稱造化戲曹瞞飛烏遶樹孤回首斷㦸沈沙怒激湍豪傑已隨霜葉盡興亡儘付浪花翻畫堂莫唱坡仙賦戰骨草中吟夜寒泛舟黄橋歸廬山清風為我送歸船數粒青松起薄烟帆影驚飛秋水鴈櫓聲攪斷夕陽蟬㡬人家在溪頭㟁一片雲生水底天滿眼良朋無好酒此心已挂九江邉留别鐵柱宫葉法師不嫌來往日詩筒春興無窮我欲東一雨放行三尺水萬松回納半帆風且將南浦難題景寄在西山絶頂峰栁處酒家花處寺併留他日款遊從悠然堂一池寒碧浸紅鱗芍藥方花春後春烟閣曉垂天幕静風簾夜上月鈎新閒雲流水無窮意絳闕清都被謫身不向悠然堂上飲篇詩斗酒付何人題甕齋萬軸牙籖聚碧芸數間茅屋鎖閒雲鶯吟芍藥一歌女蟻遶菖蒲萬水軍香穂横窓盤瘦影茗花浮碗鬭清芬琴心三疉晝眠覺熟讀數篇韓栁文題平江府靈巖寺萬松挾嶺壯招提上有琴臺與墨池佛殿尚存今智積娃宫曽館古西施太湖逺水如奩鏡木瀆平田似局棋策杖訪回無際塔日晡聊看草書碑次韻東坡蒲澗寺滿山紅白福桑花蒲澗深中儘可家景泰得泉從卓錫安期種棗說成𤓰豈無仙化羊如石尚有書蹤壁似鵶一飯招提共僧語法華經裏問牛車秋日有懷一㸃秋光寄畫圗秋來吟鬢似楓疎晴烟染樹看何足缺月梳雲狀不如暑退涼生蟬有語水長天逺鴈無書此心直欲鵬南舉不學蜘蛛結網居栁塘送春急雨將雷過栁塘春因底事亦歸忙經時不放荷花葉昨夜盡収梔子香判斷千林成夢去安排一夏納風涼開睂無覓愁來處數筆晴雲盡水鄉寄桂隠指㸃篇書說向誰武侯之後獨公竒許瓢却大堯天小嚴瀨應髙漢座卑夙世已酬霖雨債我身今結水雲知何人桂樹中間隠莫作南陽一睡驪草亭偶書賦罷清都白玉樓不知何事復閻浮琴彈十二欄干月酒洗三千世界秋絳闕瑤臺知有路空青水碧若為求紫皇早晩憐孤憤背土凌虚上去休夢中作醉醒曳杖訪松闗正在黄昏杳靄問既去復來秋後暑似無還有雨中山澗邉幾葉晩花落天際一鈎明月彎自覺餘煙埋屐齒行行印破蘚痕斑呈沈同知三面俱江一面湖古今畫作水晶圗門臨車馬紅塵路身在氷霜碧玊壺何道兩山俱翠紫霅苕二水合清汚岸頭笑與黄冠語為問東林沈在無乞紙寄諸葛桂隠翰墨膏肓二十年纔親筆硯便垂涎東陽魚卵寒霜幅嵊縣溪藤妙雪牋一日禿除千兔穎霎時磨盡萬松煙洛陽市上今無價直欲昻頭寫碧天燕巖遊罷與巖主話别西風吹作此巖遊滿目松筠翠欲流玊燕不飛明月夜石鐘一振曉霜秋惜乎分水便南北忽爾回頭欲去留且向人間辦丹料却來山頂結茆休題上清法堂壁秋雨縣天風作寒冷煙鎖住屋頭山半巖飛鳥一聲過峭壁斷雲千古閒世俗不知幽静處神仙隠在有無間夜來小艇篙脫手醉把霜笻入翠灣宋元詩會卷五十七
