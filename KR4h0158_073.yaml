body:
  text: 宋元詩會卷七十三兵部主事陳焯編許謙字益之其先京兆人徙金華至謙方五世父觥宋淳祐七年進士仕未顯以殁謙生數歲而孤世母陶氏口授孝經論語入耳輒不忘稍長肆力于學取四部書分晝夜讀之雖疾不廢既乃受業金履祥盡得其所傳之奧于是隨所誦讀輒有發明于四書集注則著叢説二十卷于尚書則著叢説六卷于詩傳則著名物鈔八卷其觀史有治忽幾微蓋倣史家年經月緯之法起太皞氏訖宋元祐元年司馬光卒之月備其世數原其興亡以為光卒則中原之治不可復興故附於獲麟之義以致意焉延祐初居東陽入華山四方來學者逺而幽冀齊魯近而荆揚吳越皆不憚百舍相從先後論薦于朝者章數十上鄉闈大比請司衡文皆莫能致學者視其安否為斯道之隆替焉卒年六十八世稱白雲先生由何基王柏金履祥至謙而道益著故推原統系者目謙為考亭之嫡嗣焉詩調平常端人正士之言正不必求諸新異也遣興五首秋日常苦短秋夜不可闌葉鳴迅風晚蟲怨零露寒月白天炯炯振衣起盤桓山川出浮滓翳彼明不完幽興中道絶百感來無端何當誅豐隆致身無羽翰清光亦何私不照方寸丹猗猗澧有蘭馥馥沅有芷獵獵石上蒲泛泛水中芰鮮鮮三徑菊旎旎百畝蕙采掇集衆芳粲爛成雜佩佩服何所從將以待君子蓬生衆麻中不扶能自直寒窗效蠧鑽孤陋寡聞識古來貴尚友萬善在熏炙古人不可見今人豈易得千載遙相思空使我心惻春風榮衆芳秋露悴百草羲和策日月急疾兩飛鳥枯桑號天風俯仰波浩渺氣流物隨化金石不自保人生寄蜉蝣時邁胡不老天地有終窮微渺何足道乾坤無停運清氣日夜生人居覆載間所息能不萌握機養天和持守如捧盈得喪固有命寵辱何足驚一身磐石重萬鍾浮雲輕丈夫有志願誰謂吾無成詠懷朔風漠沙白瘴日越荔丹出門萬里道爭似二頃田拜塵素所薄知命復何言鄙夫競聲利石火寒無煙清風桐江水捷徑終南山丈夫時用舍所貴無泚顔得喪固一瞬芳臭俱百年坦途有覆轍窮哭誰復憐乾坤渺無際我身蝨其間浩氣貫元化漸著豈不關見可乃合道行險祇自殘平生作霖志詎有懷土安風雲有嘉會時至客何難君看激海鵬振翮青霄端酬潘明之鴻鵠凌青霄燕雀巢白屋凌霄志寥廓巢屋亦云足故人渺天涯嵗月如轉燭昔為交手歡今成斷腸曲嵩華日以髙江漢日以卑道異謀不同何用傷别離書成情未盡路逺夢更迷相思溪水頭猶如送君時題曹提領湘靈廟聞樂見燈詩卷重華陟遐方馬斃車折軸娥英失所天往殉行且哭黛凝衡山雲淚染湘江竹夫君不可見異穴嘆同榖廟食三千年境土惠徼福事久竟忘哀幻化驚耳目音響鈞天和光景清夜燭誰熊寫新聲如彼涓在濮贈江行父二首有朋逺方來傾蓋語已契紛紛燕雀間聽此孤鶴唳中扃湛淵水窺測渺無際接人氣雖和自律言頗厲為言君子交相與期晚嵗珠玊生光輝顧我形頗穢海為百川歸流派各有源清濁豈不異皆可觀其瀾威儀動三千意象非一端要知霄壤隔乃在毫釐間畢公勤小物垂訓古不刋潁川趙璉從豫遊逾二載於其行書以贈之宵漏四十餘疾急不可駐役夫昧昏夜戍柝迷夙暮商頌歌悠揚未足發歸趣竹徑流疏螢蕉葉瀉清露咿咿逺雞鳴蠅聲無乃誤送李榮甫知事遷淮西淮水出桐柏浙江發東陽期會至滄海千里遙相望源澄撓不濁水德固可量願將此清泠溥施彼一方放牛圖木葉紅欲落野草青未枯健犢起跳浪脫梏行江隅牧人善防間為擇牧與芻母牛徐掉尾煦嫗鳴相呼阿童得所託靜中樂華胥豈惟置蓑笠乾坤一籧篨茍能物付物拱默湛如愚思逺樓玄樓矗城端簷影墮水涯憑闌對堤草鳴櫓飛浪花舊聞會昌湖一望十里賒藩籬孰定地相入如犬牙河間尋丈波僅可通行槎芙蕖已銷落寒水浮枯葭佳景不及逺興思重咨嗟夫人各有思所異正與邪潮汐蕩漓薄鄭衛生淫哇君子善發慮身通心則遐徘徊興未已古木啼昏鴉中州龍翔興慶寺孤嶼浮中川晝夜汨潮汐何年地維裂中斷洲渚失兩峰峙東西蔽影互朝夕浮屠據稜層梵宇絢金碧飛龍迫風雷曽此一憩息昔時梐枑居今作大士室了師擇靈地為假蛟鼉窟聚沙合舊港連亘如片石山扉夜無關神物便入出亂流攜故老一一訪陳迹軒亭倚葭葦濤浪倚几席豫章號凄風篠蕩翳寒日憑髙慨今古天海相蕩激景在人已非悠悠意何極暮過東津館薄暮下通津灘急舟劇箭漁燈互明滅隴月時隱見清颸從東來涼風襲我面目送兩山青天長淨如練遊鍾山至八功德水悠悠鍾山雲朝夕礙我目褰衣試一往行與雲相逐驅馬出東門十里至山麓幽人昔已古誰能繼芳躅猿鶴乘古林鼪鼯嘯深木彼哉西方人胡為擅斯谷豈云事幽栖政爾炫華屋泓泉抱何德濁熱供一沃巖回屐欲倦小憩倚修竹涼颸自披襟佳興亦云足舟中雜興三首冉冉江上蘆離離路傍草霜露侵衣裳何用涉逺道鴻雁方有序孤飛在林表豈不顧其羣長風翮難矯亭亭嶺上雲玄鶴相與飛俯啄戀故巢不得從雲歸秋風揚黃葉飄颻各何之籯糧事逺遊在昔聞斷機栖鳥辭茂林徘徊更依違悠悠兩江水共此明月輝嵐煙紫崔嵬波月光滉漾星宿縣虛篷雲雨暗逸槳震澤商氣深雄風駕濤浪白鷗與蒼雁來往同簸蕩吳潮海門濶飛雪噴秋響重重越山迎汨汨溪流上舟行歷旬日佳景閲萬狀孤征抱結思所感重悽愴安得同心人詠歌共清賞送胡秋白衢州學正東陽有佳士簪盍鍾山下摛文集風雲論事共樽斚為言諸孫行二妙皆作者有懷不可見情若江流瀉今此逢少君秋月澄霽野儒術久不振屏棄如土苴泮林雖儲材樲棘亂梧檟固當距詖行扶植歸大雅太末古名邦生才今豈寡善性水同趨範模待良冶採藥亭亭北山松宿靄蔭深碧蒼根走虬龍巨幹盤鐵石平生梁柱材不受霜雪厄兔絲得所附裊裊挂千尺流脂入九地千嵗化琥珀我欲掇其英俯仰費搜擲紅爐轉丹砂石髓變金液但恐茫昧間圖驥不可索意長時苦促雙鬢日夜白刀圭或可試習習在兩腋蓬萊三萬里詎謂弱水隔他時來山中故老應不識種松青松如秧針植在山之蹊豈惟娛心目嵗寒以為期未飽雨露恩那識廟廊姿蓬萊塞三徑埋沒誰復知秋風隕百草秀色不少衰雖然咫尺根已見佳種竒君看二十年腰大數十圍雪霜挺堅操雲漢擎髙枝時有白鶴來凡鳥那堪棲兔絲與凌霄冉冉相附依青松本貞固不逐衆物移大器固晚成何用嫌暮遲願言堅汝節黽勉待嵗時對竹主人樹修竹近在桃李場賦性雖不同相友庸何傷陽春被桃李紅白爭低昻無言自成蹊相媚色與香何心伴幽獨徒引蝶蜂忙此君心本虛寧逐春風狂咄嗟桃與李開落那能常寄友人丹鳯止髙岡衆鳥甘戢羽昻昻九皋鶴下土得所附江南竹實多朝陽自軒翥延頸戛然鳴四顧失其侶豈不念相從天濶無處所鳯兮歸何時恥與燕雀伍秋日秋風撼虛林秋水揚素波緩衣踞磐石怡盼庭樹柯芳景良可惜去日亦已多天寒道路逺奈此兩鬢何興來勿引酒醉飲空悲歌丈夫有志適慷慨捫太阿酬潘明之華亭谷深紫煙濕老鶴唳空眼垂碧功名千嵗衣染墨遼陽骨換今幾日華表時來語消息九皋胎化頂未丹海門雲冷髙飛難戛然長鳴飲清湍何當天風吹羽翰方壺圓嶠同盤桓遊龍回寺碧雲有何無適草書蒼鱗作霖回壑裏竟化長岡飛不起何年老僧飛錫來強架簷楹萬山底碧雲石梯如登天俯視竹樹行其巔巖巒起伏呈怪狀壯若羣馬奔吾前何仙仙去不復返滿壁龍蛇驚醉眼可憐一半委塗泥况復阽危混苔蘚山翁摸拓妙入神永和繭紙且逼真勸君勿辭一日力為我留為百世珍君不見二王舊帖皆殘編至今不惜千金傳立秋日寄趙璉蘭皋慘碧煙萋萋徘徊不忍竟與違欲窮目力望江水江風故挾雙舟飛歸來復對呶呶者思才俯首西窗下廏中駿足逐春風執策臨之盡凡馬拂硯挑燈披竹素朝昏總是懷人處有時獨倚西南樓不見冥鴻北征路送諸暨俞州判北風蕭蕭吹江蘆清霜載道冰在鬚奚奴束書催上車政成卷斾歸京都暨陽渺處天一隅里閭凋瘵煩爬梳負戈攘臂衆暴寡探囊胠篋爭捐軀天民秉彛同好德椎牛端為飢寒驅倅州寬惠别淑慝疸惡豈必連妻孥甘棠蔽芾有餘蔭百里寧謐無援桴存心忠孝本天性為政固與常人殊壽昌自樂歸河中希文隱憂居江湖白雲舍近畢至願青霄路迥寧躊躇馮公嶺層巒疊嶂危相倚亂若飄風湧秋水寒松荒草間蒼黃照眼崢嶸三十里初如井底望天門一峰巍然中獨尊縈回百折至絶頂俯視衆嶺來兒孫人言此山插霄漢馬不容鞭僕夫嘆攀援何異蜀道難氣竭神疲背流汗熟視徐行路覺平心寬意適步更輕志須預定自逺到世事豈得終無成我來正值窮冬月倚杖巖前嚼松雪午店煙生野飯香陽坡日近梅花發寄語悠悠行路人乾坤設險君勿嗔胸中芥蒂未盡去須信坦道多荆榛題姑蘇臺姑蘇城上姑蘇臺青山百里蛾睂開平郊如掌思清逺昔人樂極曽生哀大讐未復敵不死壯志消磨侈心起會稽捷甲功自多種蠡深謀誠未已不知佳冶能傾國暮暮朝朝醉春色勳臣抉眼視東門越女還為越人得只今興廢總成空惟餘碧草搖凄風可憐千古臺前水不洗當年甬東恥友人招飲榴花下獰風惡雨消餘春春歸到處成清隂萬枝濃緑幻春色絳葩丹蕊俄森森祝融行部過九地誤縱炬火燒園林艷妝炙日色更好泠泠著雨紅尤深浩歌相對作痛飲有花為伴非孤斟支頤半醉不成夢恍惚錯錯供微吟只愁明日便搖落徘徊欲去還重臨會須秋風折珠實當載樽酒相追尋放棹行安溪湖平行棹多黃頭豎兒倚棹歌梅花照眼送寒色酒暈著臉生春和炎涼世態翻覆手江水長靜風吹波出門一笑天萬里白鷗浩蕩如吾何暮春郊外行行多勝事石竇濺流泉白鳥浮雲外青山落日邊風平花委地野迥草連天春事成牢落人生一夢然遊智者寺風日景颼颼松隂繫紫騮白雲千載寺黃葉四山秋地勝樓臺接林深虎豹遊人生自可樂此外復何求蕭兄臨行索詩即席賦贈相逢嗟久别歸路復匆匆我愧今原憲君非舊阿蒙山風驚落木江日數飛鴻舟揚西流水明朝定向東花溪道中二首板橋橫古渡村墅帶平林野鴨寒塘靜山禽曉樹深雨微風栗烈雲暗雪侵尋安道門前水清遊豈獨吟天寒道路逺此去復何求適意真為樂浮生底用憂雲容低野樹風力逆溪流喜見梅花笑相迎傍驛樓浦川方仲觀入城從學繼入公門今歸侍親求詩百里來為學違親半載餘暮雲飛故里秋露浥行車紅葉蟬聲老黃花雁影疏漢朝尊吏事何必業詩書秋夕月落窗仍暗燈殘卷未收家人催杼柚稚子數更籌冷露蟲摶夜凄風樹怯秋百年一瞬目萬慮幾搔頭過太湖周回萬水入逺近數州環南極疑無地西浮直際山三江歸漢表一徑界河間白浪秋風疾漁舟意尚間贈王斗山骨肉斯文氣味投春風芹藻憶同遊故人别後無青眼此日相逢盡白頭匣劍光橫南斗夜鳯梧隂冷峴山秋惟應且試連鼇手未許江干下直鉤三月十五夜登迎華觀夜深來此倚欄干千里樓臺俯首看月到中天花影正露零平地草光寒氣清更覺山川近意逺從知宇宙寬長嘯一聲雲外落幾家兒女夢初殘青田大鶴洞榕影扶疏路九回仙家那復著塵埃山間田在牛終隱石上巢空鶴下來丹竈無灰惟白草劍鋒遺迹自蒼苔洞中道士今何處三扣雲關杳莫開西山萬象寺亂峰盡處接浮雲東望悠悠萬事陳百里江流縈縞帶滿城居室比魚鱗野僧倚竹嘯留客山鳥穿林啼喚人落曰亭中一杯酒何年復此對晴春九月十七日登清涼寺翠微亭故址梵宇崢嶸枕上頭倚風極目立荒丘黃花覆地初經雨白雁橫雲逺帶秋城郭已非山故在江淮失險水空流衲僧八十仍多病收淚殷勤説故侯次韻王中齋登拱翠樓曽醉危樓坐石坡彈筝擊缶醉婆娑蓬飛已改流年鬢木老猶存舊日柯紅樹參差秋水逺碧山髙下夕陽多此時還縱西風眼共倚闌干起浩歌秋暮有懷十二欄干倚翠微露華寒重逼羅衣碧天連水思空逺衰草滿庭人未歸秋雨樓臺幾寂寞春風院落自芳菲冥鴻應有青霄侶為隔間雲尚獨飛即席用蘇世賢韻送郭子昭二首攬轡春風入駿蹄兩堤煙栁護晴溪黃鶯自有留人意相對殘紅不忍啼落花髙下弄菲菲多少離愁付笛吹别後故人休忘却與君重賦渭城詩宋無字子虛吳郡人明髙季迪評其詩淡蕩遒逸于虞楊范揭外别樹一宗蓋欣賞之至也公莫舞公莫舞公莫舞鴻門王氣歸真主何人睚眥赤龍子手循玉玦目相語令公莫舞公楚舞劒光射日白虹吐人發殺機天不與撞斗帳中唉亞父霸業明朝棄如土妾薄命雲母屏琢春冰鮫女織綃蟬翼輕比妾妾薄命比君君薄情紅綿拭鏡照膽明還疑妾貌非傾城傾城從來有人妬况復君心不如故故人心尚峰九疑新妾那能無故時補天天不髙填海海不深不食蓮菂不知妾心烏夜啼露華洗天天墮水燭光燒雲半空紫西施夜醉芙蓉洲金絲玉簧咽清秋鼙鼓鞭月行春雷洞房花霧酣不回宮中夜夜啼棲烏美人日日歌吳歈吳王國破歌聲絶鬼火青熒生碧血千年壤冢穴狐兔烏銜紙錢挂枯樹髑髏無語滿眼泥曽見吳王歌舞時烏夜啼啼為誰身前歡樂身後悲空留琴怨傳相思烏夜啼啼别離南峰宴坐僧空嵒稿木形入定掩松扄鵲供銜來果猿看誦罷經雲霞埋衲重苔蘚上鞋青只有樵人識曽因採茯苓銅陵五松山中樵聲聞逺林流水隔雲深茅屋在何處桃花無路尋身黃松上鼠頭白竹間禽應有仙家住避秦來至今沙上四望無邊際中浮一片沙人家居釣艇官賦種蘆花渚緑紅蒿短江清白鳥斜垂流欲東去萬里寄生涯寄題無照西園近地棲禪室祇園草木薰鞋香花洞雨衣潤石欄雲松吹和琴雜茶煙到樹分遙知道林輩來此論玄文建業間居春思杜曲芳菲早江城店舍煙雨青榆莢地風白栁花天愁結丁香上酲餘禁酒前病多遊冶少春事亦留連大滌山道士童顔幾寒暑編葉當衣裳琴古面如漆柏枯身有香樹精為老僕石髓作乾糧不語坐松下天風吹髮涼送陳衡中之越見説會稽郡風流如晉時貧惟將母去清不要人知修竹王猷宅春風夏禹祠到官遊有暇好寄剡中詩金陵送倪水西之江陵楚江江上暮雲東萬里春波去意濃桃葉歌殘秣陵酒梨花夢斷景陽鐘沅湘水落瓊瑶合巴蜀山來錦繡重回雁峰前見歸雁相思何處再相逢秣陵晚聎天塹鴻流擁積沙石城虎踞漫雄誇山林青草六朝地巷陌烏衣百姓家紫蓋黃旗消王氣瓊枝璧月弔庭花孤雲更作降幡勢目斷樓船日又斜公子家朱門當道擁髙牙拂曉鳴騶散乳鴉紅叱撥驕金匼匝黑崑崙黠解琵琶姬持銀蠟燒明月犬帶金鈴臥落花不信銅駝荆棘裏百年前是五侯家秋日垂虹亭滿袖玉皇香案煙綵霓背上俯晴川紅黃霜樹珊瑚海黑白雲花玳瑁天京圃空離樓十二丹墀罷對字三千吟毫醉蘸吳江月寫與騎鯨李謫仙春日野步書田家翳日榿隂翠幄遮葑圍髙下奕枰斜陂塘幾曲淺深水桃杏一溪紅白花頳尾自跳魚放子緑頭相並鴨眠沙春郊景物堪圖寫輸與煙樵雨牧家客燕雨懷薊門飛雨布袍泥遊子魂消幾夢歸賦有聲華羞狗監淚無氣概哂牛衣客愁萬斛添杯量春瘦三分減帶圍不似江南煙艇小栁花如雪荻魚肥許山人宅桐君種藥隱衡皋竹祖生孫共養髙茶腳碧雲凝午碗酒聲紅雨滴春槽休糧貌古添清瘦餌术身輕長緑毛仙詔未頒遲拔宅家資猶戀一溪桃春日病起壯懷玉具劍空攜老去金門獻賦遲服藥身軀多病日養花天氣半隂時愁鄉塵積瑶琴嶽夢境寒生翠被池春事幾何公事急劇憐蝴蝶挂蛛絲無題妝淺顰深憑綺疏小郎新拜執金吾絃中言語分明怨裀上腰肢準擬扶翠履鴛寒慵鬭草紅牙馬暖罷摴蒲無人商略心頭事私向花前卜紫姑毛遂兩國從衡倚諍臣誰為脫穎出囊珍縱饒得與銅盆歃十九人皆碌碌人王蠋全齊拱手受燕兵義士能為國重輕七十二城皆北面一時攄憤獨書生甘羅函谷關中富列侯黃童亦僭上卿謀此時園綺猶年少甘隱商山到白頭通子但覓家中梨栗嘗不拈紙筆學文章乃翁臨老投蓮社解舉籃輿亦自強緑珠紅粉捐軀為主家明珠十斛委泥沙年年金谷園中燕銜取香泥葬落花李三郎獨跨青騾棧閣間華清休憶夜鳴鸞空教萬馬盤旋舞不濟﨑嶇蜀道難關盼盼妾未成灰鬢已霜啼紅十載唾茸窗香魂若作樓中燕一世孤飛不肯雙泰娘太守風流寵泰娘歌成樂府屬劉郎一般女子皋橋住底事無人詠孟光馮道亡國降臣固位難癡頑老子幾朝官朝梁暮晉渾間事更舍殘骸與契丹西湖故都日日望回鑾錦繡湖山醉裏看戀著銷金窩子帳龍沙忘却兩宮寒漢宫武帝升霞玉殿空金人夜泣月明中可憐嬪御無行幸猶費丹砂飼守宫金陵懷古宫甎賣盡雨崩牆苜蓿秋紅滿夕陽玊樹後庭花不見北人租地種茴香長信秋長信秋來月自圓夜香猶拜玉階前妾今不願君王寵惟願君王壽萬年山中僧雪頂霜睂齒半稀跏趺苔石看雲歸山童掃葉鶴飛起狼籍松花滿衲衣玉環病齒圖一點春寒入瓠犀海棠花下獨嚬睂內厨幾日無宣喚不向君王索荔枝遊三茅華陽諸洞書滿琅函閉不開雲窗霧閣鎖青苔門前白鹿將麑過定是避秦人引來客夜思親老妻病女去淮西慈母居吳鶴髮衰我獨天涯聽夜雨寒燈三處照相思春歸釀蜜筒香蜂報衙杏梁泥歇燕成家浮萍斷送春歸去盡向風流載落花髮白解嘲吳霜兩鬢早先秋聞道愁多會白頭溪上鷺絲渾似雪想應無那一身愁西湖書所見緑闌干護水鱗鱗蘇小門前栁㺯春聽得語聲嬌不見隔簾佯喚賣花人長卿一病文園渴思深祇應惆悵為鳴琴老來減盡凌雲氣却賦長門易酒金春風東風吹緑上汀洲染出江南一片愁長到春來問芳草不知何地可忘憂老將殺氣消磨暗鐵衣夜看太白劍無輝舊時麾下誰相問半去封侯半不歸老馬瘦蹄生入玉門關病放沙場戰骨間歸齕殘芻應有淚將軍頭白戍天山春愁金雁塵香暗鳯絃紅繩風緊閣秋千園林寂寞無鶯燕一段春愁是杜鵑蘇爾約蘇哈雅字浮岑號酸齋輝和爾人阿爾哈雅孫也父名衮格根初以貫為氏酸齋生而神采秀異膂力絶人年十二三時使健兒驅數生馬疾馳已持槊立道上待馬至騰上之越一跨三運槊風生觀者辟易及長折節讀書仁宗朝拜翰林學士忽興退隱之思移疾居江南賣藥錢塘市中詭姓名易衣冠人無識者詩清麗尤工樂府同時有徐甜齋並以詞曲名世而酸齋淡情榮利早賦遂初其志趨尤為難及桃花巖白兆山桃花巖太白有詩近人建長庚書院來京師時中書平章白雲相其成求詩於詞林李秋谷程雪樓陳北山元復初趙子昻張希孟與僕同賦美人一别三千年思美人兮在我前桃花染雨入白兆信知塵世逃神仙空山亭亭伴朝暮老樹悲啼發紅霧為誰化作靈奧區十丈風煙挂淮浦神遊八極栖此山流水杳然心自間解劍狂歌一壺外知有洞府無人間美人篇仙風雕雪玲瓏溫吳姬剪月纎纎昏行雲補髻翠光滑鳯凰呌落空山月手摘間愁八字分春山恨重畫不伸肌濃汗膩朱粉勻背人揮淚妝無痕霜刃自裂石榴裙閉門不識諸王孫緑煙熏透藍田玊羅帶隨風換妝束飛鳥銜怨過長門芳菲暗綴韶華屋錦香帳冷蘭燈沈落花不入芙蓉衾三山路杳銀河深彩鸞髙訴愁人心君山行北溟魚背幾千里負我大夢遊弱水蓬萊隔眼不盈拳碧落香銷吹不起茜裙女兒懷逺遊逺人不歸明月羞寶叉綰髻翠欲流風鬟十二照暮秋女蝸煉石補天手手拙石開露天醜瓊樓玉宇亦人間直指示君君見不斯須魚去夢亦還白雲與我遊君山别離情吁别離之苦兮蒼梧之野春草青黃陵廟前春水生日暮湘裙動輕翠玉樹亭亭染紅淚又聞垓下虞姬泣斗帳初驚楚歌畢佳人閣淚棄英雄劍血不銷原草碧何物謂之别離情肝腸剝剝如銅聲不如斫其竹翦其草免使人生為情老采石歌采石山頭石頳色采石山下江流雪行客不過水無迹難以斷魂招太白我亦不留白玉堂京華酒淺湘雲長新亭風雨夜來夢千載相思各斷腸蘆花被僕過梁山泊有漁翁織蘆花為被僕尚其清欲易之以紬者翁曰君尚吾清願以詩輸之遂賦果却紬採得蘆花不涴塵翠蓑聊復藉為裀西風刮夢秋無際夜月生香雪滿身毛骨已隨天地老聲名不讓古今貧青綾莫為鴛鴦妬欸乃聲中别有春鳯凰山路隔蒼苔卒未通泉花如髮玉濛濛蛟浮海近雲窗濕蚊怯山寒葛帳空髙枕不知秋水上開門忽見暮帆東物華萬態俱忘我北望惟心一寸紅秋江澄淨秋江一舸輕不堪蹤迹想平生西風兩鬢山河在落日滿船鴻雁聲村酒尚存黃閣醉短檠猶照玉關情料應今夜還鄉夢殘葉蕭蕭月二更蒲劍三尺青青古太阿舞風吹碎一川波長橋有影蛟龍懼流水無聲日夜磨兩岸帶煙生殺氣五更彈雨和漁歌秋來只恐金飈惡銷盡鋒稜恨轉多宋元詩會卷七十三
