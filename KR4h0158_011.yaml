body:
  text: 宋元詩㑹卷十一兵部主事陳焯編歐陽修下河南王尉西齋寒齋日蕭索天外敞簷楹竹雪晴猶覆山窻夜自明禽歸窺野客雲去入重城欲就陶潛飲應須載酒行離彭婆值雨投臨汝驛囘寄張九屯田司録投館野花邊羸驂晩不前山橋斷行路溪雨漲春田樹冷無棲鳥村深起暮烟洛陽山已盡休更問伊川送祝熙載之東陽主簿吳江通海浦畫舸候潮歸疉鼓山間響髙帆鳥外飛孤城秋枕水千室夜鳴機試問還家客遼東今是非勞亭驛孤舟轉山曲豁爾見平川樹杪帆初落峯頭月正圓荒烟幾家聚瘦野一刀田行客愁明發驚灘鳥道前題淨慧大師禪齋巾屨諸方遍莓苔一室前萎花吟次一作處落孤月定中圓齋鉢都人施談機海外傳時應暮鐘響來度禁城烟送孟都官知蜀州名郎出粉闈佳郡古關西幾驛秦亭盡千山蜀鳥啼朱輪照耕野緑芋覆秋畦向闕應東望雲深隴樹迷廣愛寺都人布金地紺宇巋然存山氣蒸經閣鐘聲出國門老杉春自緑古壁雨先昏應有幽人屐來留石蘚痕雨後獨行洛北北闕望南山明嵐雜紫烟歸雲向嵩嶺殘雨過一作迥伊川樹遶芳隄外橋横落照前依依半荒苑行處獨聞蟬智蟾上人遊南嶽終日念雲壑南歸心浩然青山入楚路白水望湖田野渡惟浮鉢山家少施錢到時春尚蚤收茗緑巖前張主簿東齋官舍掩寒扉聊同隱者棲溪流穿竹過一作迥山鳥入城啼賓至髙談勝心㝠外物齊惟應朝枕夢長厭隔鄰一作林鷄春晩同應之偶至普明寺小飲作偶來林下徑共酌竹間亭積雨添方一作芳沼殘花㸃緑萍野隂侵席潤芳氣襲人醒禽鳥休驚顧都忘兀兀形送張如京之安肅軍相逢舊從事新命忽臨戎界上山河壯軍中鼔角雄朔風馳駿馬塞雪射驚鴻試取封侯印何如筆硯功鄭十一先輩赴四明幕梁漢褒斜險夫君畏逺遊家臨月山下帆入海潮頭岸柳行梢盡江蓴歸漸秋故鄉看衣錦寜羨李膺舟送丁元珍峽州判官為客久南方西遊更異鄉江通蜀國逺山閉楚祠荒油幕無軍事清猿斷客腸惟應陪畫諾不費日飛觴送王尚恭隰州幕去國初遊宦從軍苦寂寥愁雲帶一作傍城起畫角向山飄秋勁方馳馬春寒正襲貂遥知為客恨應賴酒杯消送餘姚陳寺丞銅墨佩腰間中流望若一作似仙鳴蟬汴河柳畫鷁越鄉船下瀨逢江雁瞻氛落海鳶山川仍客思盡入隱侯篇初寒多病淹殘嵗初寒悄獨吟雲容乍濃淡秋色半晴隂籬菊催佳節山泉響夜琹自能知此樂何必戀腰金夕照夕照留歌扇餘暉上桂叢霞光晴散錦雨氣晩成虹燕下翻池草烏驚傍井桐無憀照湘水丹色映秋風禁火火禁開何晩春芳半已凋柳風兼絮墜榆雨帶錢飄淚剪蘭膏盡弦虧桂魄消祓觴流水曲游褉一相招閒居即事巷有容車陋門無載酒過池喧蛙怒雨客去雀驚羅握臂如枝骨哀絃繫一作擊筯歌無憀漳浦臥還似詠中阿夜意蕙炷爐熏斷蘭膏燭豔煎夜風多起籟曉月漸虧弦鵲去星低漢烏啼樹暝烟惟應牆外柳三起復三眠送客囘馬上作南浦空波緑西陂夕照寒瑶華傷逺道芳草遶歸鞍翠斂遥山疊氛收古澤寛衰容畏秋色不及楚楓丹小圃桂樹鴛鴦起蘭苕翡翠翔風髙絲引絮雨罷葉生光蝶粉花霑紫蜂茸露溼黄愁酲與消渴容易為春傷旅思調苦歌非樂岐多淚始零羞彈長鋏劍終戀五侯鯖陌草熏沙緑江楓照岸青南陔動歸思蘭葉向春馨留守相公移鎮漢東周郊徹楚坰舊相擁新旌路識青山在人今白首行問農穿稻野候節見梅英腰組人稀識偏應邸吏驚伊川獨遊緑樹遶伊川人行亂石間寒雲依晩日白馬向青山路轉香林出僧歸埜渡閒巖阿誰可訪興盡復空還題張損之學士蘭臯亭碕岸接芳蹊琴觴此自怡林花朝落砌山月夜臨池雨積蛙鳴亂春歸鳥哢移惟應乗興客不待主人知黄溪夜泊楚人自古登臨恨暫到愁腸已九囘萬樹蒼烟三峽暗滿川明月一猿哀非鄉況復驚殘嵗慰客偏宜把酒盃行見江山且吟詠不因遷謫豈能來縣舍不種花惟栽楠木冬青茶竹之類因戲書七言四韻結綬當年仕兩京自憐年少體猶輕伊川洛浦尋芳徧魏紫姚黄照眼明客思病來生白髮山城春至少紅英芳叢宻葉聊須種猶得蕭蕭聽雨聲戲答元珍春風疑不到天涯二月山城未見花殘雪壓枝猶有橘凍雷驚筍欲抽芽夜聞歸雁生鄉思病入新年感物華曽是洛陽花下客野芳雖晩不須嗟夷陵嵗暮書事呈元珍表臣蕭條雞犬亂山中時節崢嶸忽已窮遊女髻鬟風俗古野巫歌舞嵗年豐平時都邑今為陋敵國江山昔最雄荆楚先賢多勝跡不辭攜酒問鄰翁離峽州後回寄元珍表臣經年遷謫厭荆蠻惟有江山興未闌醉裏人歸青草渡夢中船下武牙灘野花零落一作亂風前亂一作舞飛雨蕭條江上寒荻筍時魚方有味恨無佳客共杯盤内直對月寄子華舍人持國廷評禁署一作省沈沈玉漏傳月華雲表溢金盤纎埃不隔光初滿萬物無聲夜向闌蓮燭燒殘愁夢斷蕙爐熏歇覺衣單水晶宫鎖黄金闕故比人間分外寒李留後家聞箏坐上作不聽哀箏二十年忽逢纎指弄鳴絃綿蠻巧囀花間舌鳴咽交流水下泉常謂此聲全已絶問渠從小自誰傳樽前笑我聞彈罷白髮蕭蕭涕泫然和梅聖俞元夕登東樓慿髙寓目偶乗閒袨服遊人見徃還明月正臨雙闕上行歌遥聽九衢間黄金絡一作束馬追朱幰紅燭籠紗照玉顔與世漸一作已疎嗟老矣佳辰樂事豈相關和較藝書事相隨懷詔下天閽一鎖南宫隔幾旬玉麈清談消永日金罇美酒惜餘春杯盤餳粥春風冷池館榆錢夜雨新猶是人間好時節歸休過我莫辭頻出省有日書事凌晨小雨壓塵輕閒意登髙望禁城樹色連雲春泱漭風光著草日晴明看榆吐莢驚將落見鵲移巢忽已成誰向兒童報歸日為翁寒食少一作且留餳和較藝將軍槐栁來時緑未勻開門節物一畨新踏青寒食追遊騎賜火清明忝侍臣拂面蜘蛛占喜事入簾蝴蝶報家人莫嗔年少思歸切白髮衰翁尚惜春唐崇徽公主手痕和韓内翰故鄉飛鳥尚啁啾何況悲笳出塞愁青塜埋魂知不返翠崖遺跡為誰留玉顔自古為身累肉食何人與國謀行路至今空歎息巖花澗草自春秋蚤朝感事疎星牢落曉光㣲殘月蒼龍闕角西玉勒爭門隨仗入牙牌當殿報班齊羽儀雖接鵷兼鷺野性終存鹿與麛笑殺汝隂常處士十年騎馬聽朝音潮雞寄渭州王仲儀龍圖羨君三作臨邊守慣聽悲笳不慘然弓勁秋風鳴畫角帳寒春雪壓青氊威行四境烽烟斷響入千山號令傳翠幕紅燈照羅綺心情何似十年前三日赴宴口占賜飲欣逢禊節佳昆池新漲碧無涯九門寒食多遊騎三月春隂正養花共喜流觴修故事自憐霜鬢惜年華鳳城殘照歸鞍晩禁籞無風柳自斜蘇主簿挽歌洵布衣馳譽入京都丹旐俄驚一作聞反舊閭諸老誰能先賈誼君王猶未識相如三年弟子行喪禮千雨鄉人㑹葬車我獨空齋挂塵榻遺編時閲子雲書戲書示黎教授古郡誰云僻陋邦我來乃值嵗豐穰烏銜棗實園林熟一作宻蜂採檜花村落香世治人方安壠畆興闌吾欲反耕桑若無潁水肥魚蟹終老仙鄉作醉鄉答資政鄧諫議見寄豪横當年氣吐虹蕭條晩節鬢如蓬欲知潁水新居士即是滁山舊醉翁所樂藩籬追尺一作斥鷃敢言寥廓逐㝠鴻期公歸輔巖廊上顧我無忘畎畆中曉詠簾外星辰逐斗移紫河聲轉下雲西九雛烏起城將曙百尺樓髙月易低露裛蘭苕惟有淚秋荒桃李不成蹊西堂吟思無人助草滿池塘夢自迷送目送目衡一作蘅臯望不休江蘋髙下遍汀洲長堤柳曲妨回首小苑花深礙倚樓楚徑蕙風消病渴洛城花雪蕩春愁流杯三日佳期過擲度蘭波負勝遊舟中寄劉昉秀才東南天濶漾歸流西北雲髙斷寸眸明月隨人來逺浦青山答鼓送行舟歸心逐夢成魚鳥夜漢看星識斗牛釅一作騃酒開樽誰共醉清江聊且玩遊鯈即目李徑隂森接翠疇押簾風日澹清秋晩烏藏柳棲殘照逺燕傷風失故樓星漢經年雖可望雲波千疉不緘愁平居革帶頻移孔誰問無憀沈隱侯初至虎牙灘見江類龍門曉鼓潭潭客夢驚虎牙灘上櫂船行山形酷似龍門秀江色不如伊水清平日兩京人少壯今年三峽嵗崢嶸臥聞乳石淙流響疑是香林八節聲贈王介甫翰林風月三千首吏部文章二百年老去自憐心尚在後來誰與子爭先朱門歌舞爭新態緑綺塵埃試拂絃常恨聞名不相識相逢樽酒盍留連酬王君玉中秋席上待月值雨池上雖然無皓魄罇前殊未減清歡緑醅自有寒中力紅粉尤宜燭下看羅綺塵隨歌扇動管絃聲雜雨荷乾客舟閒臥王夫子詩陣教誰主將壇答端明王尚書見寄多病新還太守章歸來白首興何長琴書自是千金産日月閒銷百刻香尚有俸錢沽美酒自栽花圃趂新陽醉翁生計今如此一笑何時共一觴豐樂亭遊春三首緑樹交加山鳥啼晴風蕩漾落花飛鳥歌花舞太守醉明日酒醒春已歸春雲淡淡日輝輝草惹行襟絮拂衣行到亭西逢太守籃輿酩酊挿花歸紅樹青山日欲斜長郊草色緑無涯遊人不管春將老一作盡來徃亭前路落花畫眉鳥百囀千聲隨意移山花紅紫樹髙低始知鎖向金籠聽不及林間自在啼别滁花光濃郁柳輕明酌酒花前送我行我亦且一作秪如常日醉莫教絃管作離聲蔣之竒附字穎叔宜興人舉進士中春秋三傅科擢監察御史轉殿中初之竒為歐陽修所厚附㑹濮議以得御史復懼衆議乃引無根之詞劾修用掩前跡㑹問狀無實貶監道州酒税改宣州厯福建淮東轉運判官副使元祐初進待制知潭州改知廣州徙河北都轉運知瀛州紹聖中拜翰林學士崇寜初出知杭州移疾提舉靈仙觀卒年七十四之竒官内外以治辦稱獨叛歐陽修為清議所薄甘卓壘人家白雪中鳥道青雲裏耕鑿競畬田漁樵喧㑹市繡出羅霄山倒流楊岐水三真不可尋寥寥忽千祀更想用兵時踟蹰甘卓壘萍鄉即事地接長沙近鄉名自古聞毛山千嶂雪玉女一墩雲嘉禾驛旴江清淺見遊鱗百尺飛橋跨碧津行過水南看更好風光駘蕩百花春磨劔池聞説旌陽舊築壇故修浮水一來看至今磨劔池猶在冷浸一天星斗寒孤嶺鮫綃剪下碧雙垂歸挹清流背紫㣲北向更登孤嶺去此身還傍白雲飛謝景初謝絳希深之長子濤之孫也初仕官餘姚令餘姚董役海隄有作五行交相陵海水不潤下處處壞堤防白浪大於馬顧予為其長恐懼敢暫捨董衆完築塞跋履率曠野使人安於生兹不羞民社調和隂與陽自有任責者法喜堂虚堂庇風雨結構不務壯外飾無髹髵置物況容長開篋藥劑靈拈棊白黑抗階花澹亦天庭石碧交向出門鳥雀喧燕處物我喪吳俗夸有素佛徒侈相尚獨能守質靜坐以矯流宕棲之果自喜何須山海上謝伯初文鑑但有姓名未詳爵里考其詩係寄歐陽永叔夷陵而歐在夷陵時亦有長句代書寄謝三舍人當即伯初也許昌公宇書懷呈歐陽永叔韓子華王介甫十年趨競浪求榮因得閒曹減宦情亂種黄花看野景旋移髙竹聽秋聲驅馳賤事猶干禄約勒清狂為近名蚤晚持竿釣鱸鱖雙溪烟雨一舟横走筆寄夷陵歐陽永叔舟行無險似瞿塘蒲峽猿聲斷旅腸萬里更堪人謫宦經年應合鬢成霜長官衫色江波緑學士文華蜀錦張去似長沙非黜辱比於連郡亦遐荒韓退之以言事初貶連州令可能作賦嘲巫渚好為投文吊耒陽杜子美下耒陽路經峽下國難留金馬客新詩傳與竹枝娘才如夢得多為累情甚安仁久悼亡絶境化成儒雅俗逺民爭識校讐郎典詞縣待修青史諫草當來露皂囊不用臨流羨漁者便將纓足濯滄浪王疇字景彞曹州濟隂人父博文官同知樞宻疇以父䕃補將作監主簿登進士第累遷太常博士宋祁提舉諸司庫務薦疇勾當公事時冇宦官同提舉者疇謝不徃用賈昌朝薦改編修唐書累遷給事中於英宗即位後上疏切直所請御朝聽政及仁宗虞祭配享諸大禮皆有禆益帝與執政大臣俱器異之遷翰林學士數月拜樞宻副使在位五十五日卒贈兵部尚書諡忠簡送同年蒲叔範察判杭州監釋之久未調王粲嘗從軍謂言塞垣事壯氣横風雲育材幸明代薦賢無令君如何漢酤冗沈此荆山珍萍氏本幾酒周官有彞倫孝武事攘卻志清天地屯連兵無時已四海蕭然貧官始操釀具𣙜之飽師人利源一以洩頽波蕩無垠糜穀費耒耜良蘖爭清醇酒禁著律令犯笞及其身狂藥乃陷穽傷哉堯舜民炎靈屬我后天資英且仁邦力蚤雄富漢制仍相循嵗賦二千萬經入固已勤大農天下酒科嵗復緡如此彌年擁武節乗邊清國氛雄雄百萬師跨邁聨燕秦仰給傾府庫賞賫圖戎勲加斂猶不足返古當何云杭城東南劇地將湖海鄰𣙜利冠天下旗亭壓重闉彼雖斗筲職亦擇才英臣風露氣已肅溪潭寒彌新沙榜朝泛泛吳濤暮沄沄南州近牛斗氣象雄霜旻汀楓變老枿赤葉晴相紛嘗茶泊幽寺觀魚下輕䑳行當收翹楚寜復混蒸薪無為狎吳叟坐戀秋江蓴李覯字泰伯建昌軍南城人俊辨能文親老以教授自資從學常數十百人皇祜初范仲淹薦為試太學助教上明堂定制圖嘉祐中用國子監奏召為海門主簿太學説書而卒所著有周禮致太平論平土書退居類稿皇祐續稿等書流杯池幽居久不樂心死如溼灰聞言山有池仙客曽流杯披衫向西坐欲望無崇臺何當命遊宴盡聚不羈才顧恐狹隘地未足開吾懷仰手斸河漢决向天南來移舟復轉嶽壅遏成環迴横持北斗柄量盡酒星醅箕踞接下流一歃空千罍八風助吟唱萬怪供嘲諧醉來散髮臥蠅聲視霆雷冷笑勢利子茫茫塵土堆穫稻朝陽過山來下田猶露溼餉婦念兒啼逢人不敢立青黄先後收斷折傴僂拾鳥䑕盈官倉新租喜復入哀老婦里中一老婦行行啼路隅自悼未亡人暮年從二夫寡時十八九嫁時六十餘昔日遺腹兒今兹埀白鬚子豈不欲養母豈不願居徭役及下户財盡無所輸異籍幸可免嫁母乃良圖牽車送出門急如賊盜驅兒孫孫有婦小大攀且呼囘頭與永訣得死無刑誅我時聞此言為之長歎吁天民固有窮鰥寡實其徒吾君務復古旦旦師黄虞赦書褒節婦許與旌門閭州縣莫能察詔㫖徒成虚寄懷二首鳥獸死有用羽角筋革齒輦輓入工師飾作軍國器玉食白如瓠瞑目已腐穢生者不敢留埋藏與螻蟻百年富貴身孰若鳥獸類惟有令人名終古如不死根生但為松翼飛但為鳳王侯尚可輕道義本來重癡兒似婢妾寸步矜恩寵傍人忍笑時佯把衣袪弄江亭醉後平生尚倜儻壯大苦摧折主人能結納佳境為鋪設渺㵿東江來谽谺暮雲裂倡女稍多藝市酒且供啜俠氣復何聊心朋幸相悦解冠從放蕩大呼誰輓掣咄哉千里足嗟呼三寸舌艷唱聲非雅戲譚理當謫帷房笑私昵閭巷嘲瑣屑更鼓莫催睡夜風纔去熱俗士鮮大志于今重小節内家豕在泥外貌犬伏紲吾儕古英豪方寸浴日月被謗肯自疑為歡顧猶拙放飯彼不慙使我無齒決美女篇繁霜毒春木花開苦不蚤愚夫擇利婚美女貧中老曷不治顔色門前車馬道閨房有禮文自衒誰言好俗態競朱粉古心慕蘋藻所期君子恩卒以慰枯槁竹齋題事低齋結空野小竹移孤林齋閒竹淨好日媚幽人心南方夏厭暑獨此留殘隂戛雨挫殘夢穿風摉涼襟長茵展麗蘚亂歌奏歡禽待奴褁村服語客抛塵簪志髙成利讐思爽生詩滛值聖喜盈卷感古悲入琴山迎穩履逺月勸澄杯深榮名雖未染幸亦非堙沈愁熱江湖限南鄙秋令到還稀節換空看厯人閒未趁衣齊紈方得意厦燕莫言歸秖有松筠徑風髙暑氣㣲鑑湖夜泛明月到樽前拏舟古岸邊亂山斜入霧逺水到垂天酒氣熏龍戲歌聲弄鶴眠迴頭嗤李郭此外更無仙閒居無物可勞情空郊日閉扄雨吟春破碎貧飲客凋零世事重江險才名一夢醒同心秖松栢見我尚青青送張鬷嘏人意皆懷土嗟君無故園欲行須盡室此去又他門靜裏文章好貧來節行存振淹知有日倚伏豈虚言寄題廖説䝉亭聖人雖在上君子有窮時自得山居樂何須世俗知夜多松月分涼與水風期只恐亨通去清閒却付誰逺山最能牽病眼天際一山横盡日是秋色無人知地名暗時雲自合缺處路應平才子霑衣涙千秋共此情感秋徙倚重咨嗟非緣惜嵗華關山異鄉客砧杵别人家天冷雲含日溪清水現沙屈魂終不返悲思更無涯次韻答陳殿丞不能隨薄俗非是向深山自喜道無屈所嗟心未閒酒鄉貧更入詩債病猶還一字成虚美通宵只厚顔讀趙氏淳化詩集少年曽誦習誤認古人詩風雅世不重姓名誰得知髙情知隱者薄宦過明時地下尋才鬼應逢陸與皮送李侍禁三載旴江上軍和盗亦殱事煩終不倦貧極始知亷别袖揮寒日歸舟載夜蟾懋功宜有賞天意在官占怡山長慶寺行行金碧裏氣象恍如春不記來時路自嫌衣上塵院香知有佛僧靜似無人十載京華夢相逢一度新南齋咏風懊惱南牕一道風只應天配與貧窮不歸羅綺飄颻處故入松篁冷淡中久坐披襟塵榻穩半醒吹面月帷空城邊菡蓞知多少偷得清香是爾功殘葉一樹摧殘拾作薪欄邊為汝最傷神休翻雨滴寒鳴夜曽抱花枝暖過春影裏有情惟日月愁邊無主足泥塵上陽宫女多詩思莫寄人間取次人早夏偶作閒愁不覺過年光强半精神似醉鄉幾度雨來成驟熱有時雲斷見斜陽古人事業塵空滿故國園林草自長頼得南華憐我病一篇齊物勝醫方篷屋長簷數尺庇堂東疎漏從來只有篷日影碎如秋樹下雨聲初似夜船中竹經蠧後多垂地筍到乾時半捲空此處想非人所競江湖終是屬漁翁野意亭福塘城郭掌中窺旭日登臨到落暉誰在畫簾沽酒處幾多鳴櫓趂潮歸晴時海色依俙辨醉後鄉愁積漸㣲山鳥不知紅粉樂纔聞歌板便驚飛按蔡君謨官閩李泰伯徃訪之時有處士陳烈同坐君謨命營妓佐酒陳素拘禮法纔聞妓樂踰牆而走兹末句蓋嘲處士也别本首句作七閩山水掌中窺乗興登臨對落暉末句作一聲檀板便驚飛明日處士投牒君謨大詬泰伯蔡為一笑解之靈源洞纔出塵來尚未知漸攀藤竹漸臨危伏流似是龍藏處古樹應無春到時誰把石厓齊剗削直教雲氣當簾帷良工畫得猶宜祕莫與凡夫肉眼窺悶書行行四月晦絺綌未能裁天氣疑無定春寒恐再來襲衣從汗浹交扇取風回野秀深成候鑪熏冷作媒年髙情已淡俗薄意多猜李杜今何在芳樽誰與開秦人洞秦人雖甚苛秦吏似猶拙山林不數里便爾逃得脱烏鵲烏鵲翩翩競羽毛南飛無樹過良宵就中管得他人事秖與天孫倩作橋睡起簟卷鱗紋帳繫紗六龍西降樹隂斜秖應夢裏成蝴蝶猶記南園數種花憶錢塘江昔年乗醉挂歸帆隱隱前山日半銜好是滿江流返照水仙齊著淡紅衫送僧遊廬山行非為客住非家此去廬山況不賖要見南朝舊人物池中惟有白蓮花戲題荷花昔人詩筆詠蓮花不嫁春風蚤可嗟今日倚欄添懊惱池臺多是屬僧家陳烈字季慈福州侯官人性介僻篤於孝友仁宗屢召之不起授本州教授國子直講皆不拜元祐初部使者申薦之詔從其尚以宣德郎致仕卒年七十六題福唐津亭溪上龍虎蟠溪水鼓角喧中宵鄉夢破六月夜衾寒風雨生殘木蛟螭喜怒瀾殷勤祝舟子移櫂過前灘題燈富家一椀燈太倉一粒粟貧家一椀燈父子相聚哭風流太守知不知惟恨笙歌無妙曲按此二詩俱為蔡君謨作前以諷其操下之急後以戒其宴遊之奢真諍友也潘興嗣字延之南昌人學士潘修真之孫以祖䕃調德化縣尉同郡許􅀈拜江州守興嗣徃謁踞不為禮遂拂衣歸築室城南足不造請者六十餘年熙寜初公卿交薦弗起自號清逸居士卒年八十七逍遥亭作亭名逍遥此理誠不虚寛於一天下原憲惟桑樞況我卜清曠風雨庇有餘方池容瀲灔小徑足縈紆花木頗窈窕松筠亦扶疎鳴蛙送鼓吹好鳥來笙竽可琴亦可詠可飲亦可娛盤雖無下筯賓食亦有魚恢論或申旦隱几忘移晡因來展足眠醉倒從人扶率爾但欣暢因煩而領無鄴侯三萬軸方朔五車書棄置復棄置任自相賢愚無妨吾逍遥此樂誠何如師道師道久不振小儒咸自私破崖求圭角務出已新竒惻惻去聖逺六經秦火隳不有傳授學涉獵安所為漢儒守一經學者如雲隨承習雖未盡模法有根基薦紳立朝廷開口應萬幾附對皆據經金石確不移熟爛見本末較然非可欺吾願下學官各立一經師務盡道德業不取章句辭庶幾昔人風炳然復在兹龍沙五陵無限人宻視龍沙記龍沙雖未合氣象已靈異昔時蛟龍湫半作桑麻地地形帶江轉洲浮有連勢陵谷豈可常淵竇在何嵗㣲生久慕道安恬輒忘味愧無及物功碌碌恒匏繫生䝉塵土厚未受神仙祕何時與孤鶴冉冉從此逝大梵院蕭蕭竹木風瑟瑟澗下水中梵晚更幽人禽聲亦喜宋元詩㑹卷十一
