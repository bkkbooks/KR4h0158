body:
  text: 宋元詩會卷八十四兵部主事陳焯編杜本字伯原臨江之清江人博學善屬文江浙行省丞宗相呼喇穆爾得其所上救荒策大竒之力薦於武嘗被召至京未㡬歸隠武夷山文宗在南邸時聞其名及即位以幣徴之不起至正三年右丞相托克托以隠士薦召為翰林待制行至杭州復稱疾固辭所著有四經表義六書通編十原等書年七十五卒學者稱為清碧先生寄仲𢎞老来自愛黄叔度少日真期魯仲連高臥獨無田二頃曵裾誰有客三千浪波渺渺浮鷗鳥白日翩翩換嵗年却憶江東楊少尹劇談終夜不成眠用韻贈相士武夷九曲好清流且櫂扁舟試一遊高挽藤蘿捫翠壁緩穿竹樹問丹丘黄金徒貴誰求馬白石空歌自飯牛盛世鳯麟如要識莫耽幽討更遲留題小景秋雲滿地夕陽㣲黄葉蕭蕭雁正飛最是江南好天氣村醪初熟蠏螯肥何中字太虚撫之樂安人少以古學自任𢎞深該博諸先逹皆推服之至順間江西行省平章全岳柱聘為龍興郡學師未㡬卒所著有易類象書傳補遺知非堂藁共三十九卷穆山山中江南有丘壑我生良獨閒秋風二三友朅来遊兹山山深不見寺但見飛泉寒蛇行兩山掖天風鳴珮環青煙從何来墮我前林端未知有徑否鐘磬猶未殘長歌萬谷應仰見數峯攢紆徐縁澗入側步寒雲闗豁然得空曠聊復解破顔殿静蘚花潤松危鶴聲乾僧寶炯數珠相我盤礴觀大開雙白眼應接㡬青鬟烏石山天王寺天王小精廬山角臨城闉古稱藩服雄畢竟環相陳塔影六七枝瓦縫千萬鱗烟明南臺樹潮壯方山津老僧肯前揖似余異人人指㸃壁間畫脩廡行逡廵觀音大自在維摩妙悲顰蒼然古木陰寒山若可親板扉㡬尊者一一皆風神老僧太息言刼餘偶遺珍從今㡬年算此壁終成塵余笑謂老僧子意亦良勤適見俄巳失當悟無還真戊子十一月二十四日拜疊山先生于雙桐驛葢先伯見山同丙辰理宗親擢也先生叙舊好言同心焉明日中賦詩為别吳門白日落孤妾悲洞房徙倚無所歸朔風滿羅裳昔為春栁陰今作秋菊黄芳景不速盡妾心與俱長逝者魂魄在九京共徜徉粲粲河吐水蕭蕭天雨霜出門即逺道死生永相望遊芙蓉山二首十里五里石一歩一長嗟行行山轉高悠悠日将斜縈折抵深谷直下十數家来往自成村桃栁映桑麻崖杉老絳葉石㯶垂枯花陰凝四時雪陽燄一川霞誰令余到此幽意浩無涯行将辦畚鍤来此耕山畬岧岧青芙蓉峻秀琢寒玉危流千丈飛鏗鍧石相觸幽閟魚龍宫荒寒霧雨蓄凄神不可留前登散遐矚參差雜花動香氣汎深谷日照丹霞開萬峯洗晴緑同心有長鑱緩尋靈藥斸葛仙早見招庶得從所欲嵗晩詠懐天霜不停威寒韭日以槁厲飈竟吹脱未許依叢老南山多白石終嵗常皜皜乃知得至静超然全所保妄盡無非天心寜不違道凋落奚足懐鍾山有神草松野即事二首娛心仗老笻細數諸峯影㣲烟過前樹淡日在半嶺幽鳥識歸宿遑恤雲路永㝠鴻各有見日邊半行整出處無定期是非諒難省山窻一叢蕙脩葉吐紫蕤或云斷續花我亦豈敢疑楚澤多芳草真偽奚難知浮俗尊虛名君子傷令姿博觀貴自得清芬良在兹白馬篇㝠㝠子規林蕭蕭緑楊路白馬誰家兒揚鞭西南去去去知何為不辭塗濘苦陰陽速相禪乾坤㡬新故丈夫慎馳騖出門巳難歩悠悠獨鳥沒霧暗連村樹文江夜舟北斗一何渇下飲空江流南雁知何愁相喚不自休東浦征人歸孤燈出籬幽西淵捕魚急飛火走一舟漢皇極寛仁今年租税憂有生一擾擾吾道更悠悠曉發辭夫磯時李泂溉之先行荻暗鷄鳴村平皋下殘月參差隣舫語艣聲帶潮發露華望中白蓬陰散秋髪沙鳥知曙鳴海雲上空滅念我前行友青山巳飛越遲爾及相攜無嗟賞心歇龍潭阻風夜興水宿滯前期前津北風惡林寒燈影深莎雞滿籬落荒忽寄孤迥凄清愧離索年光星河轉夜氣衣裘覺乍駭勁翮翻俄驚大魚躍潮痕侵栁根移船避沙閣早發東阿午經東平晩宿汶上是日雪嚴裝齊地曉投館魯鄉暮天寒客心速雪下車聲遽迷獸出桑畦流人披野路淺靄須城山斜橋汶津樹前聖有遺業惝惘經行處荷蓧與耦耕何其得深趣早起覺来日巳升花梢衆禽語何許白浮萍池間散還聚起見梅花空夜来㡬更雨魚行春到水草暖香在露溪上人語喧樵薪滿沙路菊我耕不半畆黄花列千叢蕭條變衰時一夕萬里風立孤不作難英英異風骨君看牆東客夜寒步霜月春風如少年效程漢翁春風如少年狂逐無定處垂楊曲江堤細草東郊路秪言今似昔不悟新非故流水何時歸殘鶯數聲暮招仙觀逶迤溪南路窅窕招仙谷空堂兩道人殘棋映深竹一葉響疎籬雙鴉啼高屋出門隨歸人逺燒在山麓發新淦金水亭振衣上野航囘首謝山阪日淡秋水空風清片帆逺沙光侵岸發峯影隨人轉前渡烟火深離亭路今緬淮安道中鐘聲起前林悠悠向南客天垂大野高月淡行路白雞犬淮上村雲霞海邊色舊時塞垣地来往人馳驛漢宫春君不見漢宫六六多佳麗露花半染雲裾翠少翁招得夫人魂孤鸞夜啼月波墜趙家姊妹専風流雙蛾不識人生愁芙蓉並蒂欹一朶西風青鳥徒離憂飛龍翩翩上天去雲幕椒房土花雨墮膩埋脂恨未消香魂尚寄寒莖舞人間炎日焦衆芳肯隨葵藿来傾陽柔情幽怨透地脈烟幃寂寞强成妝誰吹舊曲緑雲切寸心婉婉應愁絶緑羅㡬疊御賜衣紅綃半㸃守宫血空留媚臉栖餘妍遥憶羊車望幸年至今一片巫山雨化為飛淚徒澘然故家陵苑孤雲外緑樹如雲草如海殷勤惟有虞美人同向牆陰弄晴靄春怨洛人傾國賞牡丹東家繡轂西家園黄鸝紫燕新得意柔雲如酥花迷魂遊人寂寂歸何處花亦年年占風雨江南却遇李龜年蘇州空感楊開府誰吹玉笛斷人腸斜橋淺淺流水香惟有千年老銅狄看盡人間㡬夕陽冲虛宫景真堂怡山東麓堂静深欲尋真景真難尋華鐘時發貞明韻秀木逓縣天監陰天風飂飂吹余髪戲綰幽藤作條脱騎鳯簫驚烏石雲降龍劍照鼔山月丹爐藥竈長周旋六時采擷三芝鮮蓬莱書札失幽約㡬度歸潮深碧烟秋夜長雲浪流碧虛雨花散前除西風紅葉石欄曲盡併寒聲歸綺疏囘文讀罷雙蛾歛城上啼烏稀漏㸃東家嬌小乍迎郎沈水銀篝殘晩妝燈裏鏡臺閒自照紅顔相似夜偏長高囦春冬歌二首春風東来汎幽谷出門一笑人間緑新雨池塘栁帶鶯嫩雲洲渚沙眠犢一蓑一笠東西村天高地下斯人存歸来醉醒聊隨意翠樹無言花滿門寒鴉萬㸃落葉赤山風蕭蕭野日白池上梅花俱有情林間茅舍元無客人言梅花知嵗寒花亦偶然氷雪間向来羣芳冷欲盡蘭芽巳動春將還幽尋意適可幽尋天空晩氣沈鷗飛一川迥花落五雲深庾子江南恨瓊奴柱下吟野風吹我老鴻雁有餘音晩興雁背霜花落吟悲興自如天虚鱗甲動山老鬢毛疎斷隴暮歸客寒溪人自漁蒼茫閉籬落政爾緩驅車喜雨雲葉来西北風聲乍疾徐㝠㝠天下雨湛湛圃中蔬書傳堪經世乾坤且助鋤欲言無與領獨立看芙蕖竒石竒石争迎立青杉互引前泠泠兩溪水淡淡一峯烟閒作題巖字時逢採藥仙蒼崖忽陡絶松影一蕭然山中何處征徭急兹山水石竒鳥鳴新葉長磴仄斷雲移趺坐天正碧起行風自遲徑穿松罅去巾袂罥蛛絲南居寺閉户未從容出門誰適從聊隨碧溪轉忽與白鷗逢小雨十數㸃淡烟三四峯幽尋趣未巳山寺巳鳴鐘病中感懐多病他鄉外孤懐始覺愁山圍雙露曉門閉一蟬秋遇合馮生鋏勲名季子裘悠悠耦耕者端暇為人謀陳家源二首恐為仙源裏山從洞口開茅簷無客到稚子怪人来塘緑魚迎日林清鳥啄苔欲令幽賞足石道泝縈迴翠霧斷崖側丹霞流水西竹從幽處宻松自古来欹落葉半藏路清風時滿溪仙家元不逺未許衆人知立秋夕作但覺焦原苦何當沛澤流夕風㣲報響古木暗蔵秋生事㝠難測閒心逺作愁亂山高下碧烟靄淡浮浮送人歸臨川金河疎栁外去櫂響流澌為客有歸日送人愁别時寒雲隨雁逺南雪到山遲舊隠書無恙行蔵莫豫期江中挂席亂驚湍曾過此渡難潮歸揚子晩山入秣陵寒聴語知鄉近㤀年計日寛穏行隨夜泊烟火滿江干鄱陽湖中除夕除夕生能㡬誰無骨肉親望鄉偏恨路在逺欲遺身湖雪殘波岸船燈獨夜人淹旬須一月珍重故園春辛亥元夕頑坐故貪黙忽行時自言寒沙梅影路㣲雪酒香村時序鬢髪改人家童稚喧街頭試燈候不到郭西門贈李仲元曾逢偏意悟顔面費追思把酒忽相語計年深自悲亂山蔵路逺秋水去城遲若到寒溪上教兒䕶菊籬别唐仲謙記名長似識相見始慚非每到極言罷却欣幽聴稀日明山氣改江静水痕歸添得今朝别城陰空掩扉水口夜思牢落不成寐荔陰寒石磯潮生灘響盡海近夜凉歸旅思隨時改鄉音逐逓非燕南與粤北祗足費征衣吳仲谷来喜雨山居難適俗到縣動經年偶出成竒事相看各粲然酒深孤榻外燈淡小樓偏草草荀陳夕他時尚有傳除夕歴歴諸除夕蘧廬是處安翻因歸路近始覺到家難浦隔雁聲落篷孤燈影寒家人應共説賔閣尚盤桓送李仲章逺遊風笛無聲笑指空出門誰碍更求通一帆千里客何逺王氣雄圗江自東赤壁驚烏飛夜月衡陽歸雁落秋風人間興廢不須問詩在江潭栁影中秋懐萬壑東歸晝夜流人間自是本無愁不悲白骨塌秋井尚恨華屋歸山丘此事直須一杯酒只今何用萬里侯明朝且可尋黄獨荷鍤徑往西山秋雨中炎夏如秋氣巳遷老天竒變亦多端山横北牖陰雲合人對南山暮雨寒江海窮居無米易古今隨意得詩難巖花落盡幽禽語坐擁千林俯碧欄八月二十八日黄竹哀歌世偶傳佳期應待後千年曲江宫外看蒲栁凝碧池邊聴管絃古往今来人化鶴天長地久帝為鵑蓬莱水淺應聞似徐福歸舟已失仙次韻彭希爽吳景傳約遊穆山穆山祗在白雲隈擘石為門任去来兩澗寒聲通法席數峯秋影散香臺林蔵僧梵含風逺嶺隔山樵戴月囘此地能令高興别中秋時近桂初開舟中竦立去帆波渺渺深籠寒靄樹稀稀象牙潭上風初急龍霧洲前雪亂飛山掩孤鐘分響到沙明叢雁逐行歸雕房熾炭行時令阿那痴漁擁斷磯題崔伯明詩卷海底珊瑚不易收俄然在手醒雙眸媧皇煉石天無縫織女機絲月共秋一草作花生自别三年刻楮巧堪羞客窻燈影誰為伴雨響空欄徹夜流酬揭曼碩贈别来日君還在我前歸時我獨占君先氷寒斷道鳴駝外雪暗空村落雁邊畫省諸公扶日月南州孤客記山川松聲多處黄精好舉手青霞始學仙秋夜獨立有懐秋老谿貧獨夜時邛枝移徧響蟲飛山城鼓疊月生海林屋燈寒風動扉帶雪闗河人别久隔天書札雁来稀㤀情每有難㤀者黄葉一庭霜滿衣偶成初啼山鳥篆香斜荏苒明時翫嵗華三日雨深春在水一林烟濕暖生花尋盟舊卷鈎簾展開禁新醅隔竹賒却憶去年歸漸近半篷殘雪上寒沙陳虚一尊師山房雨後一片閒心倚石壇千峯向背碧當軒海門雨氣縣虹影洞府香風粲鶴言絶艷槿花深映户生紅荔子宻圍村早知千里移家近久辦黄岡十畆園新淦阪步作松筠色潤翠成圍鵞鴨聲多水漸肥隔縣販人争野路迎年浣女試新衣暖烟黄栁知春到殘雪青山伴客歸茅屋酒旗隨處有悠悠世事儘相違閤早山兩崖松竹緑蕭蕭時聴巖陰響野樵鶴信蚤歸題籙客蜂房分綴鍊丹寮晉時月在淦源淺粤國雲通勾漏遥仙馭肯㤀橋鼎地鳯笙清夜落璿霄夕陽斜陽盡入笛聲中兩岸樵漁一水通楊栁巳疎楓漸落黄花渾未識秋風㣲雨一天㣲雨濕芳塵紅緑相依㡬處春家在海棠花下住傷心長是未歸人洪希文仙游人其父名巖虎字徳章宋咸淳丁卯貢士工詩有軒渠集希文其仲子也希文詩學得諸家傳故以續軒渠名集薊子列傳曰兒識父母軒渠笑悅希文從父匿萬山中倡和朝晩燒芋咬菜人或不知無愠色也生前至元庚辰卒至正乙巳夀八十有六實與元代相終始云送林景惠興化教諭朝遊夾漈山漈水何漣漪暮登石門山山石亦差差水石太古色山人去何之君今遊此山為余訪頽基多謝炊藜翁七略今有歸矧兹十室邑文獻猶庶㡬君子樂育才薪槱理不遺白袍久延佇獨立風披披煦之以惠風暢若春陽熈前程雖云邁来者猶可期貧甚食草具作赤莧赤如脂苦蕒甘如飴盤登惡草具味等薇與芝賢哲逝巳逺昧昧余所思伊人既㤀世此外皆若遺梁肉世豈乏飽死黄脗兒千金洼渥種嵗晩鳴枯萁尚餘耽書癖不與塵土緇此樂豈在外簟瓢猶山雌龜洋僧越浦造寜海東際橋姪清甫為求詩以壯其事我昔攜二客涉此春江潯春江渺無際下有魚龍吟行客日巳晩夾岸菰蒲陰滄江見舟子招招勞予心我家山之陽我友山之岑懐哉不得往黄鳥鳴空林向㣲塵外人慨此將焉任欲立萬嵗功豈憚嵗月深刺手斸巨鼇纍址重淵涔雲濤鼓韶濩共爾澆煩襟吾鄉鄒魯鄉人物多華簪寥寥䜟緯語桓譚非所欽為謝金仙子氣化無古今逝將紀江漢相國生自闕續聶夷中傷田家貿貿丘麥秀蝡蝡吳蠶生㣲行執懿筐亦既受厥明上焉給王賦下焉紓官征豈為饑寒念所念瘡痏平哀哀生理窄了了無餘贏惻怛夷中詩萬古田舍情題聖墩妃宫湄洲嶼我昔䌫舟謁江干曽覿帝子瓊華顔雲濤激射雷電集殿閣硉兀魚龍間此洲仙島誰所構面勢軒豁規層瀾壺山峙秀倒影入乾坤擺脱呈倪端粉牆丹桂輝掩映華表聳突過飛巒湘君小水幻靈骨虞帝跡逺何由攀銀樓玉閣足官府忠孝許入巫咸班帝憐遐陬雜鯨鰐柄授水府司人寰五雲殿䆳嚴侍衛仙衣法駕朝天闗危檣出火海浪破神鬼役使㤀險難靈旗毿㲚廣樂振長風萬里翔孔鸞平洲逺嶼天所劃古廟不獨誇黄灣至人何心戀桑梓如水在地行曲盤升階再拜薦脯藻不以菲薄羞儒酸日談書史得少暇石橋潛度凭雕欄詩成不覺肝膽醒松檜蓊薈鳴玦環騎鯨散髪出長嘯追逐縹緲乘風還春寒無炭古人坐客寒無氊我今為客寒無烟東風兼領𤣥㝠權今年春寒過去年梅子含酸實未堅薺麥雖茂胎未全海棠羞澀開紫綿山南山北無杜鵑詩翁縮頸聳兩肩元龜守殻凍不前吟成呵硯氷尚堅毛頴蹇劣非張顛喚起石鼎句再聫倚牆道士鼻息喧此時得酒真解仙博取一醉尚可憐君不見雲安斗水直萬錢杜陵雖老性命縣畫灰對雪思悄然忍寒披絮夜不眠牛頭何日雙錦纒飯牛歌牛吒吒蹏趵趵枯萁囓盡芳草緑自晡薄夜不滿腹擷菜作糜荳作粥飼饑飲渇兩巳足脫紖解銜就茅屋不愁饑腸當轆轆風簷獨抱牛衣宿丁男長大牛有犢明年添種南山曲惜春吟去年醉倒百花傍旁人拍手笑我狂從今花酒兩無分一春正坐讐書忙先生讐書未肯出詠栁題花閒度日朝来着步花巳空搔首東風長太息聴琴歌疎簾曲檻蘋風凉細腰美人藕絲裳神閒氣定丰度逺玉指纎纎彈履霜喬林鶯囀日卓午幽澗泉鳴夜未央孤鸞别鶴生暗恨毋以氷炭置我腸曉行途中書事㝠發昧所適東西覺惘然門敲村店酒鐘落客津船猿呌荒山月雞號墟里烟囘思在家日日晏尚高眠穫稻雲散水㣲茫千畦萬隴黄罄腰勞日少鼓腹樂時長處處聞雞犬家家足稻粱太平本無象新釀甕頭香夀峯翫月素娥准勅六丁擎下照塵寰似水晶河漢無雲天萬里溪山不夜月三更蓬莱弱水何曽隔玉宇瓊樓只此明今夜夀峯峯絶頂與君端坐細推評清明遊陳氏園亭村村花栁豔晴川百五時光不暫延緑暗園林尚佳節清明亭館自新烟喜逢熟食傳遺老怕着新衣學少年惆悵東欄花似雪人生底處勝樽前春晩同數客遊靈巖廣化寺書所見塔外青山匝四圍澗邊流水繞松扉白雲一塢僧長住紅杏數枝春漸稀雨足人牛耕曠野山深鳥雀哢晴暉長廊響屧皆明禁口自㤀言心自非盧琦字希韓惠安人至正二年進士十二年稍遷至永春縣尹賑饑減歛勸農興學其邑大治鄰境仙遊盗發琦適在其縣盗遥見之羅拜曰此永春大夫也為大夫百姓者何幸之大乎吾邑長用暴毒驅我故至此耳琦立馬喻以禍福衆皆拔刃請縛其酋以自新琦許之酋至械送帥府自是威惠行於境外安溪賊數萬来襲永春琦召邑民喻之曰汝等能戰則與之戰不能戰則我當獨死之耳衆皆感憤曰使君何言也使君父母我民赤子其忍以父母畀賊耶因踴躍争奮大破之賊遁去時列郡多䧟於賊獨永春宴然十六年改調寜徳縣尹題待月亭卷郡西古招提樓臺跨城邑小亭僅數椽日斜晩凉入君侯魯此遊徘徊松下立開樽待明月月来海風急俗韻忽巳消素光良可挹天容萬里浄露氣千松濕酒䦨賔客歡詩就鬼神泣蹇余塵土蹤驅馳慚靡及時来弄清暉每擬續佳什文園多病早浣花百憂集願言問嬋娟何當謝羈縶題陳允中山居山妍雨初暗洞窈雲常暝琤琤碧澗流落落青松影遊咏有高人誅茅臨複嶺開窻嵐翠香展卷白日永興来即吟詩客至但烹茗抱琴戒出遊蕙帳夜深冷贈白雲白雲亦何閒竟日不下山時從脩竹裏相伴一僧還悠悠覆松頂渺渺歸岫間奔走塵俗者視君何厚顔白雲精舍幽齋白雲裏苔徑隠林樾空堦落葉多深竹書聲歇嵐光翠以流爐烟暝常結凉飈拂長林猶疑絃吹發蒋阜叢林沈沈青蓮宇隠隠聞疎鐘桂殿荒蘚碧蘭堦落葉紅水聲出溪竹石瀬鳴寒松東林有佳興解綬来相從禪巖夕照空巖夕照沒寒棲野僧定歸鳥帶殘光連雲下蘿逕禪房掩暮山楓林起烟磬幽人獨去来高軒足清興鞦韆緑窻美人閉深院燕語鶯啼春事半畫欄睡足四無人空與東君説幽怨綵繩嬝嬝挂青烟羅襪纎纎翻翠袖紅妝高出牆頭花繡帶斜飛亭際栁香風蕩漾春誰主願學飛仙飛不去黄昏溪月浸梨花背立鞦韆悄無語秋蚊茉莉堂前月華吐飛蚊擾擾晴雷怒深閨小玉焚椒蘭繡幙穿簾栁花度芙蓉夜臥銀燭滅緑紗如烟罩香雪潛身飛入羅扇風耳畔營營宵不絶瓊肌一咂雨夢囘玉腕斜批守宫血屋外寒蟬自清素夜夜長吟飲花露練湖曲練湖七月凉雨過白水蕩蕩紅芙蓉芙蓉紅盡早霜下鴛鴦飛去何匆匆茜裙女兒弄虚碧鳴榔聲斷無消息清波小藻出銀魚落日銀山秋欲滴望湖接山雲茫茫鳥飛不盡青天蒼丹陽使者坐白日小吏開甕春酒香倚欄半醉風吹醒萬頃湖光落天影挂冠何日隠江南短褐綸竿上漁艇寄張子震南浦多芳草東風又落花相思頻入夢見説欲囘家竒字從人問新醅為客賒自慚羇旅者猶滯錦江涯答王經歴庭訓數日不相見文園病若何山城春事晩竹屋雨聲多幕府官如水門庭雀可羅東家有賀老杖屨肯相過遊吳廷用南荘公事多餘暇看山到逺村雲荘依竹見樵徑過橋分野水晴舂碓巖松晝掩門所欣花縣邇歸路任黄昏和韻答白明之君厭區區簿領勞詩人相對便揮毫幽居最喜青山色熟睡不知紅日高夜雨江湖談舊事秋風庭院試新袍笑他名利途中客一似扁舟駕海濤汀州道中七閩窮處古汀州萬壑千巖草樹稠嵐氣滿林晴亦雨溪聲近驛夜如秋雲間僧舍時聞犬兵後人家盡買牛但得龔黄為太守邊方從此永無憂臨河城外别丁景文六月騎馬奔出郭故人相送高洋橋百年古郡千峰遶萬頃平田十里遥客懐欲别且須酒溪月自来何待招後夜相思定何處羣山疊疊雨瀟瀟贈片雲上人曽憶相逢月臺下清談猶自帶烟霞避喧却愛山中寺訪舊還尋海上槎石鼎烹茶分野水紙窻敲燭看簷花定知歸去松蘿宻猶向雲間採藥芽依韻答歐士中客舍凄凉生緑蕪經年祗傍野人居樽空但買鄰家酒巷僻應回長者車白鳥夢殘楓樹冷黄花香老竹籬疎相逢且莫談離别一别如今十載餘病中懐王徳輝憶與故人分袂日遊魚吹浪動新荷一年又見黄花老兩地相思白髪多月落千峰霜滿樹雨餘溪上水生波知君囊底詩偏好寄與茅齋敵病魔和朱仲綱赴杭韻客中送子西陵渡落日寒烟滿翠㣲美玉無瑕和氏泣蓴鱸有興季鷹歸江城雁過秋生樹野店雞鳴月在衣壯嵗功名須努力只今搜士到柴扉松江道中兩袖西風此地過清秋八月滿烟波秔田萬頃連天逺茅屋千家近水多買得鱸魚供晩餉聴殘稚子唱吳歌年来自笑行蔵拙獨立篷窻對素娥題元符宫東秀軒又名日觀茅山山下種玉地道士闢為東秀軒五色彩雲開日觀萬株秋露濕雲根竹園筍出牛穿角松樹年深鶴長孫一道天河横屋過奎光垂地映堂門山行雜詠拂拂輕風穀雨初緑楊堤上步紆徐竹林生筍長過母巢燕撲蟲歸哺雛雨散溪流平㟁漲雲開巖樹倚天孤憑誰喚起王摩詰寫入秋毫作畫圗再遊南莊飛鳯山南樹色蒼疎籬野屋對蒲塘巖雲掩日收殘暑溪雨迴風生午凉手種晩菘盈圃嫩飯炊新稻滿厨香叩門休認催租吏願借竹林飛羽觴題全安莊野老尋真幽更幽僧知敬客喜来遊疎鐘㡬杵江山暮落雁一聲天地秋野鳥有情憐我去林花濺淚為誰愁而今惆悵滄洲别不識重來有日不寒夜懐京和韻帝京别久夢相通鬱蔥佳氣凌青空石麟銅雀動凉月玉樓珠箔来天風宫壺龍滴曉漏盡玉階馬滑春雪融錦衣高唱少年子銀甕索酒蒲萄宫宋元詩會卷八十四
