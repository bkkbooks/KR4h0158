body:
  text: 宋元詩㑹卷七十四兵部主事陳焯編虞集字伯生宋丞相允文五世孫也宋亡父汲以黃岡尉罷職僑居臨川崇仁與吳澄為友娶國子祭酒楊文仲女文仲守衡為汲禱於南嶽而生集集三歲即知讀書母楊氏口授諸經輒能暗誦及就外傳則凡宜習者皆已先通大義矣左丞董士選任南行臺中丞延集家孰大德初用薦授大都路儒學教授遷國子助教時吳澄為司業於學制欲有所更張集力贊之㑹有為異論者澄投劾去集亦以病免未幾除太常博士丞相拜珠從集問禮器祭義歎息久之益信儒者為有用遷集賢修撰翰林待制國史院編修官仁宗嘗對左右曰儒者皆用矣惟虞伯生未顯擢耳英宗即位集以丁艱南歸遣使召入泰定初除國子司業祕書少監帝每幸上都命集與王結執經以從拜翰林直學士俄兼國子祭酒文宗立命集仍兼經筵除奎章閣侍書學士有㫖修經世大典命集與趙世延同任總裁再閲嵗乃成以目疾辭職不允馬祖常為御史中丞欲集薦其所知集拒之祖常不樂文宗崩集在告謀歸弗果幼君繼崩大臣將立托歡特穆爾太子祖常使人告集曰御史有言矣遂謝病歸臨川蓋文宗在上都日將立其子為太子而引托歡特穆爾乳母夫言明宗在日自言太子非其子俾集書詔播告中外故御史諷集速去然順帝顧心知之侍臣有言及此者輒不懌曰此我家事豈由彼書生耶至正八年卒年七十有七平生為文萬篇藁存者十僅二三嘗題其書室曰邵菴故世稱邵菴先生云赤城館雷起龍門山雨灑赤城觀蕭騷山木疏浩蕩塵路斷魚龍喜新波燕雀集虛幔開户微風起倚杖衆雲散同閣學士賦金鴨燒香黃金鑄為鴨焚蘭夕殿中窈窕轉斜月逶迤動微風綺席列珠樹華燈連玉虹無眠待顧問不知清夜終題儋耳東坡載酒堂翳翳儋耳城歷歷桄榔樹百年遺故丘新堂設賓阼清風海上至朝陽在庭户丹山五色鳯覽德屢來下甘辛熟桂酒羅列雜薯蕷苻黎多子孫食飲祭先具蛟龍波浪深歸來風雨遽賦茅山道士雲松巢昔年李供奉廬山思結巢褰雲自天上和鶴止松梢道士潘閒逺髙居古大茅誦經門臥虎看劒石眠蛟飛步脫鳬舄長吟吹鳯匏九江攬秀色許爾作神交上京有感翰音迎日轂儀羽集雲路寂寞就書閣老大長郎署為山望成岑織錦待盈度我行起視夜星漢非故處寄子昻春風動崇蘭庭户光陸離言收竹上露石角挂練衣車行不擇路芣苡何楚楚遊子憺忘歸徘徊嵗云暮至治壬戌八月十五日榆林對月日落次榆林東望待月出大星何煜煜芒角在昴畢草樹風不起蛩蜩絶啁唧天髙露如霜客子衣盡白羸驂齕餘棧婺婦泣幽室行吟毛骨寒坐見星河沒驛人告晨征曈曈曉光發題商德符華山圖昔祠雲臺館行穿御階柏夕隂嵐氣深重碧照行客獨訪張超谷漸覺岩險迫冰生玉井頭日射仙掌側豈無鐵鎖縣翻身若飛鶻恐煩華隂令不奈昌黎伯王事况有程車馬何忽忽流觀終南山周覽天府國爾來十七年欲往不再得山河想邈悠傷殘轉蕭索摩挲商老圖倣佛希夷宅髙哉蓮華峰白雲淡秋色送張兵部孟功巡河分韻得屋上烏花發上陽春門開未央曙城柝起羣栖流光散朝羽息影須近檐結巢願當戶轆轤轉金井終日灌嘉樹書上京國子監壁神京極髙寒幽居了晨夜雷風無時發零雨每飄灑炎光不到地蕭爽度長夏大化漠無宰豈必事陶冶揚雄不曉事守道棲棲者𤣥經百無徴白髮謾盈把酬上清道士鈔隂何詩殘雪松上落輕冰硯裏生寫詩過半夜欹枕又天明少陵愛何遜太白侶隂鏗不愁勞弱翰亦足助髙情題水木清華亭中流泛蘭枻望彼嘉樹林落日蕩野水浮雲生夕隂魚游戀芳藻鳥鳴在幽岑為樂恐易老吾將脫朝簪白翎雀歌烏桓城下白翎雀雌雄相呼以為樂平沙無樹託營巢八月雪深黃草薄君不見舊時飛燕在昭陽沈沈宫殿鎖鴛鴦芙蓉露冷秋宵永芍藥風暄春晝長寫廬山圖上憶昔繫船桑落洲洲前五老當船頭風吹雲氣迷谷起霜隊楓葉令人愁髙人祗在第九疊太白一去三千秋石橋二客如有待裹茶試泉春巖幽吳郡陸友仁得白玉方印其文曰衛青臨川王順伯定以為漢物求賦此詩將軍騎從公主時豈意刻玉為文章珠襦已隨黃土化此物還同金雁翔軍中只識長平侯西風木葉茂陵秋人生卑微何可忽碌碌姓名誰見收題濼陽胡氏雪溪卷積雪平沙山隂道射虎殘年不知老豈識船如天上坐翠竹為帷樹為葆昔乞鏡湖苦不早白髮如絲照清潦他年此地若相逢應著漁蓑脫貂帽金人出塞圖海風吹沙如捲濤髙為陀磧深為壕築壘其上嚴周遭名王專居氣振豪肉食湩飲田為遨八月草白風颼颾馬食草實輕骨毛扣弦試弓復置櫜今日不樂心慅慅什什伍伍呼其曹銀黃兔鶻明繡袍鷓鴣小管隨鳴鞉背孤向虛出北皋海東之鷙馴不驕錦鞲金簇紅絨絛按習久蓄思一超是時皛清天翳絶駕鵝東去雲帖帖去地萬仞只一瞥離婁屬望目力竭微如聞音鷙上掣束身直去不回折遂使孤飛入片雲頃刻平蕪灑毛血爭誇得雋頓足悅旌旗先歸向城闕落日悲風起蕭屑烟塵滿城鼓微咽大戶要王具甘啜王亦欣然沃焦熱閼支出迎騎小鐵琵琶兩姬紅顴頰舞歌迭進醉燭滅穹廬斜轉氍毹月為達兼善御史題墨竹蜀道荒涼多古木篔簹千丈相因依少年慣見今白髮杜宇夜啼愁不歸老可嘗作陵州守古墨蛟龍多入手春雷每恐破壁去神鼎空令䕫魅走丹丘越人不到蜀修葉何以能縱橫內府人家爛縵寫使可見之心亦驚江南御史龍頭客暫别那能不相憶知君深識篆籀文故作寒泉溜崖石子昻墨竹吳興畫竹不欲工腕指所至生秋風古來篆籀法已絶止有木葉雕蠶蟲黃金錯刀交屈鐵大隂作雨山石裂蛟龍起陸真宰愁雲暗蒼梧泣湘血吳興之竹乃非竹吳興昔年面如玉波濤浩蕩江海空落月年年照秋屋題花鳥圖吳中女兒顔色好洗面看花花為悄調朱㺯粉不自施寫作窗間雪衣鳥緑窗沈沈春晝遲半生心事花鳥知花殘鳥去人不歸細雨梅酸愁畫睂畫鶴薛公少保昔畫鶴毛羽蕭條向寥廓通泉縣壁久微茫故物都非况城郭長鳴濶步貌閒暇解寫髙情亦竒作田中芝草日應長石上松花晚猶落赤壁江深孤月小白雲野迥秋霄薄羣帝相從絳節朝八公許製黃金藥誤嬰塵網跡易迷移召中州夢如昨借懸素壁憶真侶忽有微風動林壑碧虛寥寥積雪髙直過蕭臺絶栖泊林皋亭九月天氣肅鶴鳴在林隂使君甚好客來者總能吟紅樹秋山近黃華夕露深鄰翁八九十有酒即相尋送先隴二鄰僧還吳二首蘭若背山隂松筠夾徑深門閒容虎臥湖近聽龍吟雨過泉添澗風飄磬出林衲衣皆舊識一一謝幽岑東崦憶招提幽尋日未西過山隨虎跡倚石待猿啼雲外催歸錫松間覓舊題卜鄰吾欲老母惜伴扶藜雪谷早行積雪擁柴門行人稍出村溪頭或遇虎木末不聞猿接棧回山閣支橋就樹根驅車上重坂回首見朝暾送人之劎閣倅往年登劎閣騎馬著春衫設險懷前賦摩崖覓舊劖鄉人遊雪界郡倅試冰銜歸道觀新政春江不挂帆漫興雨閣添衣潤風簾隱几髙白頭更事少病目向書勞南客傳音信東家問酒醪江邊茅屋破歸楫若為操寄丁卯進士薩天錫江上新詩好亦知公事閒投壺深竹裏繫馬古松間夜月多臨海秋風或在山玉堂蕭爽地思爾佩珊珊送長沙守白髮長沙守循良又好文近辭金馬去逺有玉魚分對竹聽湘雨開簾看嶽雲漢庭思賈誼一飯莫忘君寄莆田先生縣榻塵生席深居晝下帷齊睂安饋食擁髻近歌詩藥裹須湩乳書題憶荔支白頭吟更苦何必蜀人思鄭谷圖道士徐太虛生紙畫山居林壑春烟裏桑麻夜雨餘過橋九節杖連屋一牀書似是子真谷歸耕三月初題沈肩吾縣令贈行卷縣庭都禁謁祇許見諸生接壤皆興學遊民亦願耕絃歌居室迥山水畫圖清千載雲巖石能留令尹名戲作試問堂前石試問堂前石來今幾十年衰顔空雨雪幽致自風烟微醉寒堪倚孤吟靜更眠舊湖春水長誰繫釣魚船送魯子翬亷使之漢中封上頒臺禮輕車入漢中節毛吹渭雨木葉動秦風把酒臺基古馳書嵗事豐朝回倚西閣日日數歸鴻立春夜試墨輕雪作春花飛來入鬢斜紫貂迎曉霧絳蠟炫清霞書詔頻趨閣思歸即借車幾時將稚子隨意踏江沙送王照磨之官雲南遺廟珍珠浦歸舟僰道溪飛鳶愁暑雨走馬畏山泥宮署尊丹鷲祠官勝碧雞題詩逺相送紅日五雲西八月八日有感題視草堂壁載筆趨藝閣探囊索緼袍坐銷秋日淨心折夜風髙識字頭先白謀生計轉勞文園多病渴常想賜蒲萄贈鐵菴道士二首昔遊雲臺觀山色上衣青松花春雨落柏葉秋露零饑來煮白石睡起看黃庭人間忽已老莫問少微星海上别妻子山中求茯苓白虎戲𤣥渚蒼龍護緑扄燒香招五老行厨庖六丁從子似非逺丹霞粲華星送袁伯長扈從上京日色蒼涼映赭袍時巡毋乃聖躬勞天連閣道晨留輦星散周廬夜屬櫜白馬錦韉來窈窕紫駝銀甕出蒲萄從官車騎多如雨祇有揚雄賦最髙代祀西嶽至成都作我到成都才十日駟馬橋下春水生渡江相送荷主意過家不留非我情鸕鷀輕筏下溪足鸚鵡小窗知客名賴得郫筒酒易醉夜深衝雨漢州城贈星上人歸湘中潭北湘花無影樹一花吹度海門潮天香滿室足初起雲氣上衣身欲飄寶月夜寒龍在鉢銀河秋近鵲成橋豈無半箇卭州竹與爾松根共寂寥歐陽原功待制入院後僕以兼領成均辰酉甚嚴絶不得相見今夜當同宿齊宫賦此先寄并柬謝敬德修撰學省初兼禁直稀故人同署郤相違食餘苜蓿承朝日坐候棠梨過夕暉預喜奉祠秋寺燭定知催襆早朝衣今晨瘦馬經門巷想擁青綾尚掩扉次韻張蔡國公淡菴青山寺詩相國觀山負夙期聖恩祗許暫相違身隨雲影留三宿心了泉聲絶百非開士談空依寶樹野人耕雨薦山薇雙龍深護安禪處繞坐諸天近紫微題南野亭門外烟塵接帝扃坐中春色自幽亭雲橫北極知天近日轉東華覺地靈前澗魚遊留客釣上林鶯囀把杯聽莫嗟韋曲花無賴留擅終南雨後青賦碭山成簡卿心逺亭作亭臨河河水渾草樹繞屋啼鳥聞夢回枕上彭城雨目送檐間芒碭雲歸來黃菊有佳色坐老青山無垢氛但願樽中長得酒曲阿休問舊參軍次韻朱本初訪李溉之學士不遇城南城北暖塵飛伐木相求苦未歸吟到碧桃還細雨行尋芳草又斜暉綺窗綵筆題詩遍斗帳沈香入袖微共載小車馳紫陌重遊莫待曉紅稀寄題子敬平章山居聞道乘閒入翠微猶愁嵐氣濕人衣道傍野樹飛花盡溪上春雲作雨歸故舊釣絲輕在手仙人棋局靜忘機赤松曽許同千載擬向髙秋傍鶴飛寄來鶴亭主人二首德清舊館何時到雨後春泉定滿池緑字久無𢎞景信紫苔長應少霞碑數峰烟樹天垂野千頃鷗波雨散絲海內交遊多老去為誰溪上放船遲荔子枝頭火向紅髙堂紈扇坐熏風湘筠簟冷魚波合海柏梁深燕雨通絡緯豈知秋袂薄扊扅長憶曉餐同入城來看花如錦誰道清霜解惱公寫韻軒二首翩翩仙子藥王山明月髙樓遂不還天外修睂塵鏡掩窗中遺墨夜燈闌雪深黃竹歸無所雨暗蒼梧淚更斑何啻浮雲相契合窅然餘迹謾人間仙人本自好樓居深下重簾寫韻書江上數峰千仞表硯中微露九秋餘下方鐘鼓塵初靜絶世文章事不虛最愛夜涼天闕近綺窗留得玉蟾蜍滕王閣三首髙閣城頭户牖開江中影見碧崔嵬文章誰復三王後雲氣長從五老來畫角數聲南斗落白鹽萬斛北風回洲頭原有蛟龍窟怪得詩成急雨催天寒江閣立蒼茫百尺闌干送夕陽歲久魚龍非故物春深蛺蝶是何王帆檣星斗通南極車蓋風雲擁豫章燈火夜歸湖上雨隔鄰呼酒說干將危樓百尺倚闌干滿目青山不厭看空翠逺疑江樹小落霞飛送酒杯乾千年劍氣侵牛斗半夜天香下廣寒我欲乘鸞朝帝闕五雲深處是長安贈僧一初江頭說與老禪知玩水看山豈定期白髮自來無處所黃花更老不嫌遲爐烟繞座寒留宿缺月窺禪夜誦詩惟有峽中三石壑十年幾度見遊時鐵柱宫老翁無意㺯新波化作鳬翁倚柱歌㸃石神方寧復得沈沙遺㦸不堪磨汾隂鼎鼐千年出海底珊瑚百尺過誰在蓬萊期劫外下騎黃鶴一摩挲按此詩初出人皆未喻其㫖蓋言此柱未敢必為旌陽之物故詩意皆設疑詞以問之焯見鐵柱宫題詠多矣惟道園與熊與可詩超出衆作以其不泥陳跡也神鳯琴鳴鳥人間久不聞遺絃欲託斷琴紋曽看土鼓歌朝日亦共陶樽醉夜分五色雲中迎太乙九疑山下望湘君采詩應被唐風譜早晚樓船或祀汾謝書巢送宣和瀘石硯巢翁新得瀘州硯拂拭塵埃送老樵毁璧復完知故物沈沙俄出認前朝毫翻夜雨天垂藻墨泛春冰地應潮恐召相如令草檄為懷諸葛渡軍遙題暖翠亭老去唯思臥白雲一亭萬竹喜初聞波回曉日鴛鴦並沙散晴烟翡翠分把釣左泉歸衛女乘舟北渚望湘君誰能獨采薇盈袖却道髙寒思不羣題張希孟中丞送畢中達提㸃卷後十年七聘不還朝起為饑民夜駕軺嘉樹百年誰忍伐生芻一束不能招西州華屋交遊少北海清尊意氣消欲寫濟南名士傳泉聲山影晚蕭蕭寄泉南三老人春城連海樹扶疏中有幽人八十餘庾信流傳江左賦伏生零落濟南書鄰翁社舞尊多酒弟子晨炊饌有魚前代衣冠今絶少欲看三老載安車甲戌四月十七日至臨川沖雲寺郭西寺門雙石頭水檻相對林塘幽白花過雨落松暝黃鳥隔溪鳴麥秋衰朽虛䝉宣室問淹遲實愛小山留為貪佛日同僧話滿袖香烟念舊遊李伯宗録詩老去逢春祗謾吟敢煩彩筆為追尋玉堂天上成塵夢茅舍山中稱野心萬里雲霄歸鳥盡孤村風雨落花深文章傳世知何用空使髙情慨古今鶴豫家有薛少保鶴圖一大軸先尚書自蜀攜至此邑以為珍玩先參政晚歲失之不知所在當時極惋歎今三十餘年集妻姪浚儀趙德莊從好事家重購得之欲集識其故而藏諸篋笥為賦此吾家舊物薛公鶴老氣崢嶸壓九皋鐵石鬬身修足脛雪霜依骨淺翎毛通泉久失千年璧杜甫空吟一世豪老去思鄉歸未得時時借看倚秋髙費無隱丹室碧雲雙引樹重重除却丹經户牖空一徑緑隂三月雨數聲啼鳥百花風年深不記栽桃客夜靜長留賣藥翁幾度到來渾不語獨依秋色數歸鴻寄澄湛堂月中桂子落嵒阿想在林間閲貝多持足地神衣拂石獻珠天女襪凌波香因結願留龍受水為烹茶喚虎䭾寄到竹西無孔笛吹成動地太平歌賦雪洲江上經年憶雪多長洲化作玉坡陀舊時射虎迷蹲石薄暮歸漁認擁蓑河伯作宫龍獻璧湘靈遺珮鳯停梭鳬鷖容與江花發更待春來生水波送胡古愚仙館醉餘千石酒上林吟遍百花風拾遺徒步頭雖白供奉歸來錦更紅晚下紫薇憐病鶴春生緑水送冥鴻故人江上如相見為借扁舟候禿翁挽文山丞相徒把金戈挽落暉南冠無奈北風吹子房本為韓仇出諸葛寧知漢祚移雲暗鼎湖龍去逺月明華表鶴歸遲不須更上新亭望大不如前灑淚時贈無塵道人雲霧為衣月作裳天壇獨自禮虛皇龍收古劍沈秋水鶴識神丹起夜光金井有聲惟墜露玉階無色乍凝霜無端下界松風動又欲飄然上鳯凰王庶山水蜀人偏愛蜀江山圖畫蒼茫咫尺間駟馬橋邊車蓋合百花潭上釣魚閒亦知杜甫貧能賦應嘆揚雄老不還花重錦官難得見杜鵑啼處雨班班仁壽寺僧報生瑞竹聞道故園生瑞竹令人歸興滿江干扁舟不畏瞿塘險匹馬誰云蜀道難杜甫溪頭花匼匝孔明廟裏柏闌珊新堂題作歸歟字定得臨江把釣竿還鄉還鄉思速去鄉遲王事相縻敢後期里父留看題壁字山僧打送捨田碑胡桃笻竹南方要盧橘枇杷上國知此日君親俱在望徘徊三顧欲何如正月十一日朝回即事宮樹春隂合霓旌拂曙來天光臨閣道雲氣轉蓬萊晝漏沈沈鼓晨樽灔灔杯香霏簾底霧樂殷殿前雷祥瑞儀曹奏珍醇尚食催舞庭分鷺序效獻過龍媒融雪微生草輕風不動埃老人南極至王母上方回玉色何多喜金菙得重陪裁詩賀新雨西閣待門開御溝詩次宋顯夫韻御溝雪融三月初鳬鷖鴻雁總來居蒲萄水緑可為酒楊栁條青堪貫魚逶迤天河起箕尾滉漾雲海浮青徐舟前花落傍飛燕隄上風來濕舞裾翠輦時留金騕裊錦波不著玉芙蕖臨流宋玉偏能賦莫待東都客問豫宣和墨竹寒雀灑墨寫明玕深宫春晝閒蕭條數枝雪不似紇干山雙鴛圖戢翼石梁隂秋風日夜深使君莫行野江水蕩人心題敬仲雜畫三首雨過黃陵廟蒼梧雲正愁何時倚虛幌對此滿林秋峽口春雲重江南夜雨多水深桃葉渡風急竹枝歌蒼涼初出日黃落早知秋不遇采芝客寧知叢桂幽青山白雲圖獨向山中訪隱君行窮千澗水沄沄仙家更在空青外祇許人間禮白雲竹塢沙頭鸂鶒蝴蝶飛來石竹叢羅襦曽試繡文重荷花啼鳥銀屏外臥看窗間唾碧茸題蔡端明蘇東坡墨蹟後二首祗今誰是錢塘守頗解湖中宿畫船曉起鬭茶龍井月花開陌上載嬋娟三生石上舊精魂邂逅相逢莫重論縱有繡囊留别恨已無明鏡著啼痕臘日偶題舊時燕子尾毿毿重覓新巢冷未堪為報道人歸去也杏花春雨在江南題扇與周幹臣玉疊松花密餅香龍珠星顆露盤涼遙知環碧樓中坐翠竹蒼松夏日長李孟字道復潞州上黨人曽祖仕金祖父入元皆任外職因徙居漢中孟七嵗能文倜儻有大志談古今治亂娓娓如親出其間至元中以事至京師中書右丞楊吉丁一見竒之薦於東宫未及用成宗立又因薦者用為太子師傅大德元年武宗撫軍北方仁宗留宮中孟日陳善言多所進益成宗崩安西王謀繼大統國事幾危孟力佐仁宗定內難以迎武宗功在社稷忽逃去不知所之至大二年仁宗為皇太子侍帝同太后內宴從容述孟前事帝感其言遣使搜訪得之特授中書平章政事集賢大學士同知樞密院事仁宗嗣立以舊學委任益專拜中書平章政事進階光祿大夫賜爵秦國公親授印章孟辭國公印奏三上始允延祐元年進金紫上柱國改封韓國公乞解政歸里許之英宗立為姦相所搆賴上保全讒不得行然猶奪其封拜前後制命至治九年卒御史纍章辨誣詔復原官進封魏國公諡文忠進詩十年陪顧問一旦決安危自合成功去應慚見事遲長城何自壞孤注莫相疑辟穀求仙者髙明百世師曹元用字子貞世居阿城徙汶上元用資稟俊爽幼嗜書一經目輒成誦夜讀每達曙父憂其成疾止之乃以衣蔽窗默觀弗輟承㫖閻復於天下士少所許可及見元用出所為文示之元用輒指其疵復大竒之薦為國史院編修元用初不習吏事及辟掾御史臺見事明決吏反倚以為師轉中書省右司掾除應奉翰林文字遷禮部主事建議上纍朝皇后徽號自是始免稱名改尚書省右司都事轉員外郎退居任城久之齊魯間從學者甚衆延祐六年授太常禮儀院經歷於祀事多所裁定㑹仁宗崩英宗召禮官議太廟寢室惟元用議稱㫖授翰林待制升直學士泰定二年授太子贊善轉禮部尚書兼經筵官再拜翰林侍講學士天厯二年代祀曲阜孔子廟還俄卒賜鈔五千緡追封東平郡公諡文獻有詩文四十卷號超然集次韻馬伯庸欒水橋邊御道西酒旗閒挂暮簷低春從緑樹隂中老雲補青山闕處齊畫㦸遙臨青瑣闥紫騮解惜錦障泥鸞凰自為明時出宜傍上林髙處栖秋懷沙磧秋髙宛馬肥哀笳一曲塞雲飛南鄉兒女應相念過盡征鴻猶未歸熊太古豫章人朋來之季子也兄曰承先象先而太古熊世其家學送復上人遊吳二月鍾陵花滿烟袈裟東上木蘭船地浮彭蠡江聲轉山入姑蘇海氣連千里從師應未晚五湖為客謾多年遙知後夜相思處坐看中天好月圓韓性字明善紹興人其先居安陽宋忠獻王稚圭其八世祖也髙祖扈從南渡遂家于越性天資警敏七嵗讀書數行俱下九歲通小戴禮作大義操筆立就及長博綜羣籍為詩文自成一家四方問字者户屨至無所容延祐初詔用科舉取士凡以文法請益者得其心傳義理自勝輒掇巍科憲府嘗舉性為教官謝曰幸有先人之薄田可具饘粥讀書砥行無愧古人足矣祿仕非所願也年七十有六卒所著有禮記說詩音釋書辨疑郡志及文集共二十餘卷宛委山秦山幾千仞翠入蓬萊城城中望山色明暗分隂晴老夫散䇿山前路為愛看雲不歸去仰看驚怪鷺飛來回頭忽見雲生處崦中孤起如炊烟乘風騰上蒼崖巔崖巔宿雲喜迎接橫空一幅兜羅綿天風吹散銀千縷淡處是烟濃是雨雲師拗怒不肯回露出峰頭尺來許一雨三日溪水肥老夫欲歸不成歸雲師知我慘不樂故出小譎相娛嬉老夫作詩一笑領舉袖收雲散空迥倚松叫絶山下人仰看雲峰起山頂陽明洞洞天深窅行客疑飈輪碧簡誰能稽倚松長嘯巖壑動放懷未必今人非石氣盤空散成霧檜子無風落青雨草間欲問苗龍壇薜荔鱗鱗絡銅虎謝端字敬德蜀之遂寧人宋末避兵江陵因家焉端五嵗能吟詩十嵗作賦稍長與宋本齊名時號謝宋荆南宣尉史杠薦之姚樞樞與論文竒之每語人曰後二十年若謝端者豈易得哉延祐五年擢進士乙科援承事郎同知湘隂州事歲滿入為國子博士遷太常博士尋除翰林修撰升待制國子司業翰林直學士至順元統以來制册多出其手預修文宗明宗寧宗三朝實録時稱其有史才年六十二卒題滋溪子書堂趙之川滹浸淶易恆􅋤泜洨各異出惟滋有溪亦是匹或伏或見乃不容不能百里滹是從混混千里俱朝宗豫曩涉河觀大江踔雲蕩日怒擊撞歸視子滋嶺之瀧是滋名揚子所始有田有廬水之涘有堂三楹庳非侈中經子史堂右左髙曽遺子以自課子乃善繼志不惰搜今托古抉怪竒泓涵演迤吐為詞副墨往往傳京師籯金青紫來亦偶滋溪有源子有後斯堂斯書可世守烏雅子敬本輝和爾人僑涿郡以字行官平章雅耽詞翰有别業在山中極水木亭榭之勝見虞伯生所題詩題李龍眠青宜結三馬圖古人畫馬形與骨今人畫馬色與肉唐有韓幹筆意髙宋有龍眠可相續今朝偶見西馬圖眼如圓鈴膝團麯短騣兩耳雙竹批風入四蹄如鐵踣宗伯老蘇亦閒雅贊以詩文過金玉嗚呼安得九方皋見此應須少回矚宋元詩㑹卷七十四
