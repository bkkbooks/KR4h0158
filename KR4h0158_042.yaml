body:
  text: 宋元詩㑹卷四十二兵部主事陳焯編姜䕫字堯章居苕溪與白石洞天為鄰潘徳久號之曰白石道人與石湖放翁倡酧最多按黄巖亦號白石時人目為雙白其詩學皆得自蕭干巖海藻而姜則蕭之壻也春日書懐垂楊大别寺春草郎官湖此鄉有石友合幷不得呼瘦藤倚花樹花片藉氷壺老鄭談絶妙辛楊句敷腴平生子姚子貌古心甚儒時邀野僧語間與琴工俱酒闌興未了左轉城南隅大江圍楚碧烟水入𤣥虚流落不自恨惟嗟故人疎一月三見夢夢中相與娛日日潮風起悵望武昌魚夏日寄朴翁時在靈隠風吹松樹枝懐我松間友雲從北山來令我屢囘首山雲夜夜起山雨侵人衣遙知竹窗裏自吟新雨詩太湖茫茫復茫茫中有山蒼蒼大哉夫差國坐占天一方夫差醉蓮宫巨浪搖不醒越兵従何來奪我三萬頃年年亭上秋一笛千古愁誰能知往事飛下雙白鷗范大參入覲頗愛鄙作以詩謝之問句石湖老如將日指標枯中說滋味髙處戒虚驕頗喜唐音近寧論漢道遙正聲今在耳萬樂聽簫韶小孫納婦慶事集朋親孫枝喜氣新歌雲停碧落舞雪眩青春暖日花君子清樽酒聖人一春行樂地不負牡丹辰呈方叔聱牙落魄一閒官職事何嘗見一斑不是論松須說劒若非尋壑即觀山閒看落葉隨風去冷笑奔雲送雨還更有劉巖楊處士伴渠癡坐老花間夏日天台青天揮箑臥藤牀翠袖攜壺過酒漿蝟腹出波烹芡實褭蹄和露擘蓮房招呼時入雞豚社獨坐曾無雁鶩行便是赤城真隠吏不須劉阮更相將冬夜不寐宵柝迢迢警睡魔靜思甘分老林坡忍饑但有嵇康嬾扣角曾無甯戚歌不起妄心思世事只將閒意養天和時人休說長生術學著長生事轉多負暄不是羲和德澤流寒鄉何處覓温柔絶憐天上黄綿襖大勝人間紫綺裘旋挾藜牀隨影轉更攜書卷與閒謀天和妙處誰能㑹欲獻君王却自羞和陸放翁見寄遙知三徑長荒苔解組東歸亦快哉津岸紛紛羣吏去船頭衮衮好山來平時佳客應相過勝日清樽想屢開若許詩篇數還往直須追挽古風囘送朝天集歸楊誠齋翰墨塲中老斵輪縦横一筆掃千軍年年花月無閒日處處江山怕見君箭在的中非爾力風行水面偶成文先生只可三千首囘施江東日暮雲京口留别張思順伯勞飛燕若為忙還憶東齋夜共牀别後無書非棄我春前㑹面却他鄉連宵為話經憂患異日相逢各老蒼更欲少留天不許曉風吹艇入垂楊吳江舟中自譜新詞韻最嬌小紅低唱我吹簫曲江過盡松陵路迴首煙波十里橋琵琶洲松尾颼颼石浪寒塞吟蕃曲轉聲酸人間無此春風手應是江妃夜夜彈吳趨夜泊夜暗歸雲繞柁牙江涵星影雁團沙行人悵望蘇臺栁曾與吳王掃落花林光朝字謙之興化莆田人少従陸子正授尹焞之學得伊洛正傳四方就學者甚衆年五十進士及第為孝宗隆興元年調袁州司户叅軍用大臣薦得館職歴著作佐郎兼禮部官進司業以不往賀張說出為廣西提刑召拜祭酒乾道間帝幸學命講中庸大稱善面賜金紫不數日除中書舍人㑹謝廓然除侍御史光朝繳還詞頭因請外任出知婺州引疾予祠卒年六十五有艾軒詩集送别湖北漕李祕監仁甫文字渺煙雲過眼徒浩浩所有未見書惜哉吾已老子雲客長安陳迹如一掃同叔向來人我生苦不早亦聞青城山斯翁為有道瞿塘不可上秋夢長顛倒白日來西崑一見自應好縦譚百代前至竟非枯槁多為開口笑明月生懐抱黄鶴有髙樓怳如事幽討攬轡逢道州聽書下下考周南勿留滯掇拾供史藁分手重酸辛璠璵衆所寶十日不得面何為太草草資中行奉寄臨邛守宇文郎銅駝陌上生秋草前者刻石今如掃儋邊半紙半糢糊下牀三日成悲惱倉史萌芽何可見要從筆意生秦漢欲將奇字問何人所守一家如小篆是中變幻隨形模鐘鎛鼎鬲匜盤盂如何西京到魏晉搜盡蒼崖惟此書即今原隷見顛末仍于畫上分錙銖燕然有年固可紀筆勢豈得先黄初中郎袖手欲無作正始不逮况其餘幸哉一見俱抵掌翩翩如反古石渠且說金陵佛屋何年燈晉分隋張猶青熒忽聽荒雞還自起資中之刻不徒爾鞭春行轆轤罥寒田雀饑江梅落蛀脚肥枯腸一夜轉雙轂眼光吹上蝦蟇衣巖腹新晴山鬼哭女媧墳外春風歸繭村紙簾大如席柝柝杖藜金雀飛次韻奉酬趙校書子直雁塔新題墨未乾去年燈火向秋闌趣看天祿青藜杖怕著王孫紫綺冠好在三山尋浩渺何如一紙問平安觚稜皎月無人到玊糝初成許共餐送别傅郎中安道持節閩中忽然鄉思若為收莫到三茆最上頭二月東甌看負弩一天南蕩想行舟過家上冢從今數落絮飛花合晝遊料得甘泉來奏計定應前席莫遲留閏月九日登越王臺次韻經畧敷文所寄詩閒陪小隊出山椒為有吳歌雜楚謠縦道菊花如昨日要看湯餅作三朝千重嶺海供横槊一帶風煙聽采樵憑仗折衝如此好不應東去更乗軺前嵗過真陽初識子欽今道出曲江不忍遽分偶成長句志别秋崖一夕卷炎蒸那更揮斤為斵氷碧落舊尋燒藥竈白芒長對讀書燈相期大庾何多日似出浮屠向上層縦有分張吾未老定從臺閣看飛騰賀丘國鎮致仕桃花流水是家鄉洛下才名四十強自有赤松堪辟穀那能白首更為郎案頭貝葉㤀言久江上蓴羮引興長解后却成香火社好將詩句細商量送陳侍郎應求知泉州百片牙旗水面長蔡邕題在刺桐鄉十年杯酒開雲榭一樣官銜過洛陽我亦攜家緣送客誰能掃地自焚香野橋衝臘寒梅白莫要登臨憶侍郎甲午仙掌秋容媚銅樓曉色遲猗蘭成漢殿苞竹入周詩鼎卜卿雲合郊禖彩仗移隆興乾道日建武永平時詹事開新府長秋綴舊儀禮經猶下問易道本生知世子家為法文王我所師誕彌重海潤漬賞一天慈九月黄金蘂千齡白玊巵遙開三殿喜髙頌走天涯李昻英進士畨禺人未詳何官仕在南宋孝光間諡忠簡宋史不載其詩見於石倉選中送鄭雪屋歸里征衣㸃落紅君去與春同貧到歸時見吟多醉後工不應冠尚鶡自許氣如虹急著看山眼飛帆吸快風武夷觀閒乘石罅船又到浙江邊囘向初心地皈依古洞天成丹呼鶴舞噴酒起龍眠雨意偏留客茶𤓰定宿緣景泰寺樹合疑山盡攀緣有路通逺鴉追夕照低雁壓西風瀑勢雷虚壑松聲浪半空凭欄僧指似漲霧是城中觀穫負郭平田濶秋深穫課勤短鎌行缺月多稼剪黄雲舊臘占三白今年稔十分太平村舍裡墮穗飽雞羣白雲登閣白雲峯擁到危巔傑閣翬飛倚半天谷響頗疑吟木客潮囘坐見變桑田幾重山隔幾重海一日身閒一日仙真樂無如㑹心處林花野鳥亦欣然登峽山疾風甚雨長風吹裂碧雲堆捲取銀河瀉下來雨攪犀潭千尺浪煙遮龍壑一聲雷松翁偃葢嵒隈立猿女穿羅洞裏囘舊事蘭亭好拈出婆娑溪曲共流杯西樵巖巨石卷阿駕半天樵山風景豈虚傳水簾不捲四時雨丹竈空凝萬古煙印石尚存烏利跡問誰曾識紫姑仙我來遊徧登雲谷更借山僧半榻眠送舶使孫叔諧東歸蓴鱸髙興趂新秋帆腹吞風湧去舟萬寳集登天子庫諸蠻遮泣海山樓世間顛倒是非夢達者逍遙得失侯歸到家林定重九團欒杯酒菊花浮宴鳴珮亭和趙漕韻數尺飛泉漏隔城寒嵒坳處落琮琤縣知勝境無塵到却訝晴天作雨聲一㰱不容貪者飲兩峯宜著醉翁行此泉千載因人重曾識光風霽月清蒲澗滴水嵒觀瀑與可人遊五四幷快風吹面洗炎蒸鹿巡夾道千章木猿挂垂嵒百尺藤石室横琴清振玊壺瓢酌水冷調氷簾雨後籠山濶不許塵埃俗耳聽送鑒師往靈洲寺少年芹泮頂儒冠猛志緇袍出世難孤島一燈開佛屋長身七尺占僧單鐘鳴魚叩隨緣過櫂舞鷗飛取次看亭下聽經人在否石欄搖影碧波寒贈海珠湛老也曾叅破動風旛坐得形枯鬢早斑衲子指為真鐵漢江神幻出小金山葉亭浪急翻船入蔥嶺雲深挈履還香燼未寒行道處蕭森翠竹䕶禪關羅浮洞長寶谷王寧素送藥瓢久矣深山煉鶴形聞呼洞長又逃名斷崖怪木人稀跡亂石奔泉澗有聲劒定通神收古匣奕聊供玩戲紋枰藥瓢解贈寧無意重到孤庵論養生送舶使周申堂堂山立舊朝簪久屈清流督獻琛風送連艘出獅國浪吹殘句到雞林平生不隔同袍面中嵗難禁惜别心歸見耆英定相問秖言閉戸萬山㴱陳造字唐卿高郵人年四十三登第調繁昌尉改平江府敎授累官安撫司叅議范石湖陸放翁俱極稱其詩有江湖長翁集魏帝廟佛貍嵗未卯志欲吞宇縣當年江飲馬腥血浸淮甸無人飯耕牛有井巢歸燕至今閱遺史為汝空飲恨緬想瓜步留殺氣纒吳分云何此山椒遺像儼髙殿無乃甘事讐吳俗昧所見或復綿歴久後嗣忘敵怨㝠漠彼有識福汝吾敢信君看趙與薛徇國冒禍釁魏侯繼前躅長呼死白刃胡不尸祝之香火均逺近豈但祈神休抑使頑懦奮誰令決從違引手適我願長蘆寺昔年望長蘆去江逾百步垣宇呀已缺浮圖欹欲仆僧徒噬肎留日有沈溺懼重來舒望眼佛刹非故處安衆得亢爽定遷醻夙素似聞瓶錫侣復作醯蚋聚居人禱蠶麥行客乞泉布營者肆夸侈施者不顧慮百堵煥金碧奚翅復其故往往豪雋人四壁有未具彼徒創寺意取鎮湍濤怒向來梵唄所倐為蛟螭據在已不自保誘俗說依怙波流置不省此理吾未諭繁昌早發客行固厪身留滯如捩翼及茲祖禮竟蓐食理帆席風停浪未蟄天曙月正白版磯滙湍殺荻港煙樹碧杖䇿丁家洲徙倚容少息無酒問山店憶鱸聽村笛鳥烏啼松竹鴈鴇下沙磧囘柁投曲澳又寄糝潭夕情疎或易合不作淮楚隔纍然槁項翁輭語慰行役泊小姑山楚山屹兩姑我見乃其稚聞名詩卷間識面客舟次玊刻極端麗簪植暝蒼翠姢月上天角相與詫嫵媚怒風將我西未憗卜晩憩山足舟可艤山木纜可繫山外正風波獨此佳食寐斷知有神物主此勝絶地明朝捐行槖可無答神賜白鵝雪為肪綠蟻香馥鼻舟穏風又熟無乃契神意未暇訪彭郎辭費辨非是命書命書唐濫觴委源傅吕後有倡莫為遏波蕩今不救字育叵數計八字詎所囿甲子動垓億舉一百萬漏荒唐無稽据誦言指休咎奈何聰達人頗復安此謬懐刺曳長裾偃蹇文士右夸詡走干謁薦墨不待叩士有待濡沫百請不一售我昔遊江淮知識間新舊文士不到眼此輩日交簉辭章輕盃水羨彼行槖富鰓鰓問利祿吾儒所深陋自笑與世違迂論取排詬布穀吟人以布穀為催耕其聲曰脫了潑袴淮農傳其言云郭嫂打婆浙人解云一百八箇鳥何與人事人人以意測之是非皆不同為作此潑袴不容脫鳥語徒慇懃輸租質農器有袴那解新官中催科吏如虎告時趣耕爾能許即今春種未入田安得縣胥知愧汝卑栖俛啄良易謀聒聒彊任田家憂啼時未旦夜不休班班血痕銜口頭人將近似測禽語汝意真解憂農不或傳悍妻天所怒姑不可撾渠不顧罰為此鳥聲曩愆警世毋為郭家婦南方諛佛古到今人持數珠家梵音區區說似一百八譏訶勸相知何心浙風淮俗隔江水意解禽言乃如此蘇黄妙句誰嗣之兩地流傳併須紀世間儒墨紛相攻巨細彼此臧穀同爭如痛飲卧長晝付渠馬耳謝東風識村翁語勸耕淨居村翁老而健問其夀云山居淡食乃爾昔一村叟一野僧皆壽百二守杜郎中史丞相呼之致敬厚設而歸即逝二人壽未必止此厚味非野人所饗也其言有契予心作此記之山僧一生饜山䔩溪叟所仰纔魚菽漫入侯家與相家珍膳不應填汝腹百二嵗翁清且羸茵坐鼎食寧其宜焉知暫飽博長往穀神震怒脾媪悲官家顆粒皆民力此祿食之須此骨兩翁妄食壽弗延當念無功暴天物我雖不偶猶餐錢車行肉飽隷後先食功揣已懼不稱因翁有言呼使前盤几畢識翁所言望夫山亭亭碧山椒依約凝黛立何年蕩子婦登此望行役君行斷音信妾恨無終極堅誠不磨滅化作山上石煙悲復雲慘髣髴見精魄野花徒自好江月為誰白亦知江南與江北紅樓無處無傾國妾身為石良不惜君心為石那可得山居三首山間有好事時肯問何如束送筯頭薤鮮分匙面魚披襟偕我飽攬髪為君梳一笑塵勞外都無病可袪忽作斷過訪經旬閒瘦笻慵添和詩債病減灌園功石鼎褭輕碧庭柯零細紅竹君如見慰竟日嘯窗風鳥息我亦倦行行取徑㣲石稜妨錯足藤蔓每鉤衣森木各天籟連山同夕暉推門吟袖冷滿帶野風歸香雲寺山月明空隙庭柯下槁乾沈沈僧夜淨漠漠鴈天寒夢境愁偏隔詩情老易䦨未容辭水厄聊復踞蒲團圩上小村山影裏山脚水明沙春事初移栁人家未摘茶生兒了門戸饌客有中鰕笑我塵埃者奔馳鬢易華丁酉道中暮春去家如昨日節物轉頭非風處綠自舞雨餘紅頓稀野橋平水過村路躡花歸趂得酴醾在箏琶拂舊衣得姪消息甚喜年穀熟仍聞佳食眠郡人新過此鄉信得真傳社酒浮蛆淥湖魚割玉鮮平時計安穏莫靳里胥錢金地寺側徑﨑嶇去飛蘿次第捫山横欲無地路轉却逢村竹栢圍荒寺莓苔上繚垣殘僧不知客芋火老雲根陪盱眙王使君東遊二首錦席浮波影牙檣轉霧霏飛花窺碧酒舞蝶傍紅衣野日歌前淡雲峰望處㣲遊魚應與樂啼鳥莫催歸纜解鷗飛處船移栁影中林廬桃李月浦溆蕙蘭風酒淺能無醉歌長惜有終賦詩聊泚筆寓意未須工雜詠三首淮汴朝宗地孤埤只眼前譙樓西日淡戌鼓北風傳破竹非無計澆瓜亦自賢客愁渾幾許撫劒倚吳天天外纎雲盡山巔望眼遙平淮剪綠野白塔界晴霄客裏風光異吟邊物象驕功名他日事囘首興蕭條關塞凄涼處青徐指顧邊如何漢正朔不盡禹山川將略輕三捷天威重萬全諸公不愒日老子判留年次𤓰州雲曀平山塔煙明老濞城客行判費日舟泊細論程閘水清兼濁潮天雨復晴未須歸有夢午枕愜涼生髙頭山小駐緣雲脚居然睡眼醒楚田銜樹濶漢水挾山青蹀躞初㤀倦巉巖已飽經川原方啖蔗不擬嘆漂零書懐俛仰人間世纔為一笑資百年羊胛熟萬事虎頭癡文字聊遮眼功名浪朶頤浮生如此爾况復病餘衰縣西一徑斜穿犖确行身閒尤覺馬蹄輕坡頭嘉樹千幢立煙際長江匹練横茶鼓適敲靈鷲院夕陽欲壓赭圻城三春簿領沈迷裏野鳥山花眼最明七夕龍旌鳳扇一相迎知費青禽幾寄聲天上經年纔舊約人間轉盼便深更涼河只向樽前落㣲月偏來酒面明後夜玉琴彈别鶴獨應乾鵲夢魂驚夏夜飲客矻矻官曹興易窮得閒何惜一樽同傍愁邊到無惡客從竹間來皆好風勝日詩狂輸酒聖轉頭渭北復江東雕鞍未作扶攜去更放蘭缸子夜紅寄陳居仁尚記誅茅栁外隄水光搖霧潤窗扉桑間曾是僧三宿海上能㤀鶴一歸野店樽罍醅脚釅北鄰雞鶩稿頭肥解顔一醉平生事更向行藏計是非贈仲國美三閲春光一建瓴依然歸櫂泊危亭烏迎客子各頭白栁學故人俱眼青曽是縦談僵婢僕又成豪飲臥罍瓶明朝小話前溪别分付溪風管醉醒贈趙秀才平生心事釣漁舟解后青衫映白頭肯為功名戲雕虎不留顔面對沙鷗露漙青葢髙荷曉風約黄陂小麥秋入眼斜川歸趣好此身何處不莬裘宿野人家步尋松篠款谽谺忽到孤山處士家十頃蒼鱗漾墻角一鉤寒玉挿簷牙杯行不乏紅絲鱠飯了仍供白露芽把臂傾舒吾已怯又分離緒上歸槎重九山陽儀真兩使君送酒酒會文期興尚濃佳辰一笑坐天窮兩州各遣六從事九日俄成一病翁詩不受催空急雨帽無緣落任西風明朝晴徑通行屐却漫支笻遶菊叢次韻髙賓王見投二首病念還家可奈愁客中日月急梭投土花暈壁迎梅雨海燕將雛送麥秋霑袖正憐珠隕睫關門能復玉為舟搘頭閤膝髙舂臥黄妳青奴共此樓魚辟清澄鳥愛昬陶翁歸計酒盈樽山田雨足鳩呼婦籬苑春㴱竹有孫百首旋編新賦詠三生猶憶舊精魂小摩他日紅塵眼閒送蜚雲過海門林亦之字月漁福清人受業於林光朝四方従游者戸屨恒滿惟樂軒陳藻能紹其傳有網山集行世丁亥九月十六夜偕李監倉宿臥龍山中聽雨旋復月出相喚此山來狂風吹我衣把酒桂花下山雲片段飛掩門雨初滴開門月旋上倚樹看月明半山聞雨響人間有佳景詩句頗發越何曽似今夕聽雨還看月奉題林稚春菊花枕子歌故人所說菊花枕似把氷丸月下飲秋水一雙明炯炯數在青囊第一品狂風江上吹蒹葭往往得之嵇阮家閉門誦書二十載眼睛損盡生空花建陽小作箸頭書殘更燈火亂蟲魚石渠文字大如斗場屋嵗月又不偶却來南山青草邊東西盡為菊花田手提長筐向山曲一下收拾三百斛昨者昬迷才起來解把蝇頭小字讀乃知妙物通羣仙一切藥裏應棄捐九日遊龍臥山留一夕明日值雨坐超上人房偶題野興更周遭應遲問大刀山房逢雨好人意與秋髙多謝烹鮮乳還令厭濁醪重來須累少款款聽蕭騷陳文煥秀才所宅近市憑樓一望西山宛然西山簷外見何必鹿門行近晩江聲合疎簾野意生終朝如此好初月更多情却媿才華鈍三年句不成奉寄雲安安撫寳文少卿林黄中泥封款款下青㝠却許麾幢換使軿夔子城池開幕府杜陵詩卷作圖經十年去國未歸夢萬里看山憑短亭可信明時好人物亂猿啼處是州㕔滕王閣懐古奉呈撫州别駕兼簡戸曹城邊帝子閣西頭水遶南昌故郡流浦曲天長鷗侣小夜深雲淨月華浮澹臺墓暗竹根古孺子亭荒荷葉秋漠漠滄江無了日哦詩休接古人愁題嚴子陵釣臺莫向金門傲冕旒歸來却要著羊裘乾坤不是劉文叔那得長竿到白頭重陽次日登城山城山飲罷冷侵衣湖上重來月滿巵未愛疎籬黄菊日最憐秋水白雲時呂定字仲安以武職顯孝宗朝葢丞相正惠公端之裔因宦籍而家新昌者也爵至殿前都指揮龍虎上將軍能詩有說劍集其詩腴秀風流居然大雅明松溪宰吕繼梗其遠孫也序而傳之懐古我昔遊海上東望三神山風波幾萬里蒼茫雲靄間魚龍自掀舞天空日月閒神僊渺無跡徐福去不還空餘蓬萊閣千載留人寰追和蘇子瞻遊峽山寺韻山迴寶華閣水遶金鎖灣塵慮頓焉息于茲開我顔疎鐘日夕動老僧林下還天風吹白雲悠悠滿松關歸猿有餘悲月明嘯空山僊人自何來翺翔八極間手把玉芙蓉吟笑鏘珮環歌罷忽飛去千峯堆翠鬟赴京太白樓前雨乍收畫船撾鼓上皇州肯因離别牽愁思要把勛名事壯遊千里關河旗帶月一天星斗劍横秋胸中賸有安邊䇿此去應當獻冕旒奉天門朝賀曉日初臨萬嵗山寶幢華葢列朝班九重天上來僊樂五色雲中識聖顔深殿捲簾香霧裊近臣傳制珮聲還嵩呼齊視恩如海散作陽和滿世間班師紫塞囘鑾雪正晴王師百萬擁連營馬嘶大地山河壯旗捲長空日月明龍虎臺髙千嶂聳鳳凰城近五雲生聖顔有喜天心順中外歡聞奏凱聲登東岳海内名山孰與齊清風掖我上丹梯鵬程九萬扶搖近世界三千指顧低瀑挂天門驚霹靂雨蒸日觀出虹霓太平會見東封盛玉簡金書煥紫泥雪夜漠漠同雲徧海涯曉風寒逼綠窗紗飛揚鱗甲三千界粧㸃樓臺百萬家何處妙歌金帳酒誰人清對玉梅花便應石鼎融氷水烏帽籠頭自煑茶望岱岱宗東望鬱嵯峨萬丈僊橋鳥外過秦樹千年空老大漢碑終古不消磨天壇夜靜垂星斗石磴春深長薜蘿記得舊遊曾載酒頽然峯頂放長歌登彭城樓項王臺上白雲秋亞父墳前草樹稠山色不隨人事改水聲長近戍城流空餘夜月龍神廟無復春風燕子樓楚漢興亾俱土壤不須懐古重夷猶戲馬臺據鞍揮指八千兵昔日中原幾戰爭逐鹿已無秦社稷逝騅方歎楚歌聲英雄事往人何在寂寞臺空草自生囘首雲山青矗矗黄流依舊遶彭城金陵旅夜一雨皇都萬象明東風嬌囀上林鶯火煙亭館春多少鐘鼓樓臺夜幾更枕上故園蝴蝶夢枝頭斜月杜鵑聲銀箋欲寫長相憶滚滚江流不盡情遊匡廬欲向匡廬觀瀑布便從彭蠡驟樓船一聲長嘯來丹壑千丈飛流下碧天洞裏樓臺無嵗月雲中雞犬有神仙憑誰呼起巢松者醉擁宫袍對酒眠度大庾嶺鑿破鴻濛一竅通至今傳說九齡功天垂瘴雨蠻煙外路入炎荒火樹中萬里關河瞻北極兩行旌斾過南雄鷓鴣聲裏端陽近榕樹青青茘子紅浴日亭和蘇學士韻危亭突兀倚青山坐對扶桑碧海灣紫霧欲生龍伯廟洪濤先湧虎門關光搖宇宙花生眼影動欄干酒上顔遙望蓬萊宫闕曉一輪飛挂碧雲間王炎字晦叔婺源人受學張南軒登乾道進士官著作佐郎出守湖州年八十餘卒有雙溪集題徐商叟所藏李伯時四天王圖龍眠有巧手幻出汗血駒老衲或戒之囘向心地初遂畫白衣仙蘄與梵釋俱北方四天王亦附瞿曇居雜以馬龍像宿習終未除四王名字異且復形狀殊信者謂其有疑者意其無蕩蕩天門髙誰能凌空虚何以信不疑取諸貝葉書過浯溪讀中興碑日光玉潔元子辭銀鈎鐵畫顔公書百金不憚買墨本摩挲石刻今見之猗那清廟久不作其末變為王黍離春秋一經事多貶魯頌四篇文無譏漁陽鼙鼓入潼華公卿徒步從六飛朔方天子扶九廟京師父老迎千麾紫袍再拜謁道左上皇萬里旋鑾輿牝咮鳴晨有悍婦孽狐嗥夜有老奴扶桑杲杲未翳蝕但歌大業吾何疵首章義正語未婉前輩不辨來者疑正須細讀史克頌未用苦說涪翁詩許張勁節震金石李郭壯武如虎貔㫁崖蒼石有時泐諸公萬古聲烈垂天憐倦客有所恨雨溼江寒催解維神州北望三歎息翰墨是非何議為胡道士草庵清風颼颼竹萬箇白日寂寂茅三間春深只有鳥呼夢地僻畧無人叩關豈但壺中堪避世也勝圖上可遊山出門囘首不能住輸與道人閒復閒解官到郡諸丈置酒岳陽樓招炎為客鄧巴陵索詩重上危樓覽洞庭故人一笑對飛觥君山只似􅀈山綠江水不如湘水清半日勝遊成樂事三年俗宦損詩情天涯解后還離别莫惜尊前底裏傾和陸簿九日風露蕭蕭木半黄老來淡薄似秋陽一樽冷落思佳客九日凄涼在異鄉採菊何心追靖節哦詩無語答仇香危臺戲馬今安在休惹清愁攪石腸出郊雜詠閉戸不知春色佳栁梢欲暗可藏鴉鴨頭新綠齊腰水女頰輕紅刺眼花晩憩田家家書未到鵲先喜春事無多鸎又啼偶對好山留客坐綠陰遮屋日將西雙溪種花二首雙溪漸有雜花開每日扶笻到一囘勝似名園空鎖閉主人至老不歸來蒼頭為我斸西山扶病移花強自寛縦不為花長作主何妨留與後人看周文璞孝宗時人與姜䕫友善姜有夏日寄朴翁靈隠詩或云即文璞也銅雀硯君王有遺令婢子守空臺遙望西陵下漆燈照鴆杯玉顔闕釵澤松栢生悲哀低吟短歌行想像奸雄才清泉沈金彩古煙凝紫灰零落故瓦在雕鐫若陶坏為人作書硯詞章出詼諧上下千載間流轉何悠哉那知墟中人天命不復來齊昏亦披猖增土築崔嵬年年漳河頭野棠如雪開金牛洞凌兢下危梯俯傴坐㴱穴囘身避雲霧偃面視日月藥苗䕶谽谺竹節截嶭嵂安知幽谿下有此大奇絶金牛鏟光景仙牒尚可閲岡頭春已半枸杞如㸃血便恐顛風興横吹石崖裂堯章金銅佛塔歌白石招我入書齋使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相饑鷹餓虎紛相向拈起靈山受記偈龍天帝釋紛惆悵形模逺自流沙至鑄出今囘更精緻錢王納土歸京師流落多在西湖寺錢王本是英雄人白蓮花現國主身蛇鄉虎落狗脚朕何如紅袍玉帶稱功臣天封拆開即退聽兩浙不聞笳鼓競歸來佛子作䕶持太師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地罏山芋羮何曽薰陸綺牀供但見相輪銅綠明哦詩禮塔猶未畢蘆葉低飛山雨溼戴敏字敏才號東皋子天台人生乾道間攻詩自適不事制舉終窮無悔其子復古後亦繼父志以詩名家西溪陳居士家來訪西巖老家居水竹村紫鱗遊鏡曲黄犢卧雲根自昔好賓客相傳到子孫不行亭下路䕶筍别開門鄭公家門墻多古意耕釣作生涯菽米散魚子蓮根拔虎牙弄孫時擲果留客旋煎茶頗動詩人興滿園蕎麥花小園小園無事日徘徊頻報家人送酒來惜樹不磨修月斧愛花須築避風臺引些渠水添池滿移箇柴門傍竹開多謝有情雙白鷺暫時飛去又飛囘約黄董二親與桂堂諸姪避暑世間無處避炎蒸欲叫西風叫不譍恨乏由檀除熱惱心思赤脚踏層氷醉遊河朔誰同往表借明光愧不能聞有山林最深處清涼境界著髙僧遊張園乳鴨池塘水淺深熟梅天氣半晴陰東園載酒西園醉摘盡枇杷一樹金林夢英字叔虎原籍閩清徙撫州為臨川人登淳熈二年進士知武岡軍遷祕書丞筆架山謂天髙髙由積氣謂山髙髙由積翠山中雲霧皆寶衣天上星辰有奇字相傳筆架幾千年此是仙樓三十二落霞孤鶩近西江青帶瑤簪如八桂宋元詩㑹卷四十二
