body:
  text: 宋元詩㑹卷七十一兵部主事陳焯編姚燧字端甫其世系見樞傳燧生三嵗而孤育於伯父樞年十三見許衡於蘇門十八始受學長安二十四讀韓退之文欣然有得試習為之人皆謂有作者風閒就正於衡衡亦賞其詞但戒以務韜晦勿為名髙也年三十八籍秦王府文學未㡬授奉議大夫提舉川陜等路學校凡三奉命使蜀皆稱職至元十七年授漢中道提刑按察司副使調山南湖北道按部澧州先後以明決著聲二十四年為翰林直學士又三年授大司農丞元貞元年以翰林學士召修世祖實録大徳五年授中憲大夫江西亷訪使大徳九年拜江西行省參知政事至大元年召為太子賓客除承㫖學士尋拜太子少傅辭不受明年授榮禄大夫翰林學士承㫖四年得告南歸明年卒年七十六諡曰文所著有牧菴文集五十卷行世讌按姚牧菴有逸事可紀者當為承㫖時翰林公歌妓羅列中有一人微操閩音舉止殊衆牧菴心異之問其履歴乃建寧人真西山之後也以父賈朔方折閲賣入營籍言訖流涕不已姚遂詣丞相三寶努求為落籍俾小掾黃埭娶之資遣甚厚而嘉興貝闕作詩詩無足觀因其事以傳遂得附見姚嗣輝南榿堂彼榿有土性生植惟峩岷欒欒干雲姿才與樗散隣匠石過不睨煬夫取蒸薪所貴故山樹寧計世莫珍一别十畆隂清溪俄㡬春筆名堂楣上如對故鄉親請事小弁詩桑梓亦惟寅盛德古自卑木惡何闗人不見樗里疾智囊終相秦舟達黃溪草木隨寒暑殊方榮悴同葦華兼露白檉葉未霜紅日月雙飛鳥江湖一病翁晚來沙嶼上愁坐獨書空發舟青神縣青神開百丈江㟁轉荒涼薜茘緣松起蒹葭並竹長深披豺虎徑毒犯虺蛇鄉何莫非王事牽夫可惋傷感事致位丞疑地䕫龍伯仲間星當朝北斗日已薄西山取謗因讐惡貪權失丐閒此行雖鐵甲未足比慙顔輿病高座道中役役乾坤逺栖栖道路頻五年三入蜀十夢九歸秦瘧鬼偏凌客山花定笑人母勞問前渡祇覺白頭新癸丑九日去歳君山孤櫂遊如今盡室石城州明年白髮桑榆日何地青山萸菊秋客氣已為强弩末宦情空遶大刀頭果成問舎求田策未讓元龍百尺樓宋陸秀夫抱衛王入海圖紫宸黃閣共樓船海氣昏昏日月偏平地已無行在所丹心猶數中興年生藏魚腹不見水死挽龍髥直上天板蕩純臣有如此流芳千古更無前貝闕附贖難女紀事斷絲棄道邊何日緣長松墮羽别炎洲不復巢梧桐昔在至元日六合車書同玉堂盛文士燕集來雍雍金刀手割鮮酒給蒲萄濃坐有一枝春秀色不可雙叶娉婷劉碧玉婥約商玲瓏寶釧金雀釵已覺燕趙空或聞操南音未解歌北風上客驚且疑姓字初未通問之慚復泣乃起陳始終妾本建寧女逺出西山翁父母生妾時謂是金母童梨花鎖院落燕子窺簾櫳迢迢旅朔方貨盡食不充稱貸忤富人桎梧加父躬鬻女以自贖白璧淪泥中秋娘教歌舞屢入明光宮永為娼家婦逐屬梨園工京華多少年門外嘶青驄不如孟光醜猶得嫁梁鴻自傷妾薄命失落似秋蓬客聞為三歎天道何懵懵遣使白宰相削籍歸舊宗小吏十八九勿恨相如窮配爾執箕帚今夕看乘龍鴛鴦並玉樹鸚鵡開金籠棄汝桃花扇紅牙不復從提瓮自汲水絺綌自御冬時多困輱軻事或欣遭逢安知百尺井忽登羣玊峰借問為者誰内相姚文公李兩山至元間官禮部侍郎見陳孚詩同登憫忠寺閣兩山其號而名不傳元音及體要二選中所稱謂彊半如此非有别考亦姑仍之鬻孫謡白頭老翁髮垂領牽孫與客摩孫頂翁年八十死無恤憐汝孩童困饑饉去年雖旱猶禾熟今年飛霜先殺菽去年饑饉猶餔糜今年饑饉無餘粟客謝老翁將孫去淚下如絲不能語零丁老病惟一身獨臥茅簷夜深雨夢囘猶自誤呼孫縣吏催租正打門信州糧謡信州糧糧何艱十鍾一石萬里間朝發錢王隄暮過嚴子灘柁尾白浪如銀山朝渡蘭谿縣暮泊龍丘灣峻如牽車上鬼闗督吏持檄夜如箭布帆無風河水乾去年糧船未及㟁今年仍運八百萬只知欲救彼地荒不知浙東天亦旱禾黍今年收不足浙東又移何郡粟趙孟頫字子昻宋太祖子秦王徳芳之後也家湖州幼秉絶慧年十四用父䕃補官宋亡家居自力於學至元二十三年行臺御史程鉅夫奉詔訪遺逸于江南得孟頫以之入見世祖顧之喜使坐右丞葉李上寵任日隆將欲大用議者以宋宗室故難之授兵部郎中遷集賢直學士時丞相僧格網利害民無敢言者孟頫因地震與諤爾根薩里籌弭天變所必大赦天下盡與蠲除而後可諤爾根入奏一如言帝從之民始獲蘇至元二十九年出同知濟南路總管府事遷知汾州未上有㫖留書金字藏經除集賢直學士提舉江浙儒學延祐元年除翰林侍講學士遷集賢三年拜翰林學士承㫖仁宗眷之甚厚以字呼之六年得請南歸卒年六十九追封魏國公諡文敏古風八首詩亡春秋作仲尼益苦心空言恐難託指事著以深大義炳如日萬古仰照臨鳯鳥久不至楚狂乃知音愁來不得語起坐彈吾琴周衰有戰國紛紜蹈荆榛黃金聘辯士駟馬迎從人朝為刻骨讐莫作歃血親終然智力屈奉身俱入秦絶代有佳人被服綺與紈蛾睂秀聮娟吐詞馥若蘭清歌啟皓齒瑶琴發哀彈一彈再三歎聽者涕汍瀾借問誰家子為言本邯鄲秋風吹庭樹故葉紛以墜明月耿夜長草蟲促經緯四序苦不淹少壯何足貴展轉復展轉寤辟不能寐昔為閨中秀今作市門鄙豈無膏與沐甘心待憔悴山深多悲風日莫愁我心𤣥雲降寒雨松柏自哀吟人生百年後奄然閟重隂念此每不樂天路何由尋仙人偓佺輩逍遥在青岑奈何不爾思委命重黃金海中有奇樹粲粲珊瑚枝由來植物性無脛可推移如何石氏子樹之白玉墀洛陽經幾戰金谷乆荒夷空令千載下聞者為傷悲烈風號枯條落葉滿周道原野何蕭索川流亦浩浩離居日以逺懐思令人老功名㑹有時生世苦不早顧瞻靡所騁憂心惄如擣浮雲何方來不知竟安之飄飄隨風去汗漫以為期自昔功名士往往事驅馳白駒空谷中誰能加縶維皎皎難見容翻受世妍􅑦虚名誠無益不見斗與箕歳莫和剛父雜詩二首驚飈吹白日流光忽蹉跎登山采衆芳荆榛一何多迷途幸未逺迴車且委蛇黃鵠志四海雀鷃將如何肥馬黄金鞍輕裘華且鮮朅來從橫馳意氣何翩翩朝為人所慕夕已為世憐此道固應爾禍福非虚言生當稱善人死當諡為賢勿羨夸毗子狂馳終百年贈道隆上人辟俗無所之步尋招提遊頺垣蔽蓬艾破屋壊不修老僧俗念淨靜坐百不憂浮雲有逸態止水無急流乃知我輩人苦受世累囚朅來得此地稍覺心休休窗前㡬藂菊青蕊亦已稠愛之不忍采留作山房秋何當移四松伴汝清靄浮南岡與北領路近頗易求他年風雨夜來聽龍吟幽桐廬道中歴歴山水郡行行襟𫀆清南崖束滄江扁舟此宵征臥聞灘聲壯起見渚烟橫西風林木淨落日沙水明高旻衆星出東嶺素月生舟子櫂歌發含詞感人情人情苦不逺東山有遺聲豈不懐燕居簡書趣期程優游恐不免驅馳竟何成我生悠悠者何日遂歸耕罪出在山為逺志出山為小草古語已云然見事苦不早平生獨往願丘壑寄懐抱圖書時自娯野性期自保誰令墮塵網宛轉受纒繞昔為水中鷗今如籠中鳥哀鳴誰復顧毛羽日摧槁向非親友贈蔬食常不飽病妻抱弱子逺去萬里道骨肉生别離丘隴闕拜掃愁深無一語目斷南雲杳慟哭悲風來如何訴穹昊題歸去來圖生世各有時出處非偶然淵明賦歸來佳處未易言後人多慕之效顰惑媸妍終然不能去俛仰塵埃間斯人真有道名與日月懸青松卓然操黃華霜中鮮棄官亦易耳忍窮北窗眠撫卷常三歎世久無此賢慶壽僧舎即事白雨映青松蕭颯洒朱閣稍覺暑氣銷微涼度疎箔客居秋寺古心跡俱寂寞夕蟲鳴階砌孤螢炯叢薄展轉懐故鄉時聞風鳴鐸幽獨獨坐不自聊披草尋微逕夕陽在高林籬落有餘映依依増逺想歴歴生晚聽涼蟬軋鳴箏候蟲撃清磬大小皆有從雄雌各相應沈吟復躊躇忽覺西山暝題西溪圖贈鮮于伯㡬山林忽然在我眼攬袂欲遊嗟已逺長松謖謖含蒼烟平川茫茫際曽巘大梁繁華天下稀走馬鬬鷄夜忘歸君獨胡為甘寂寞坐對山水娛清暉西溪先生奇崛士正可著之巖石裏數間茅屋破不修中有神光發奇字綠蘋齊葉白芒生送君江南空復情相思萬里不可見時對此圖雙眼明烈婦行客車何焞焞夫挽婦為推問君將安去言往棗陽戍官事有程宿車下夜半可憐逢猛虎夫命縣虎口婦怒髮指天十步之内血相濺夫難再得虎可前寧與夫死母與虎生呼兒取刀力與爭虎死夫活心始平男兒節義有如許萬歳千秋事明主馮婦卞莊安足數送高仁卿還湖州昔年東呉望幽燕長路北走如登天捉來官府竟何𥙷還望故鄉心惘然江南冬暖花亂發朔方苦寒氣又偏木皮三寸冰六尺面額欲裂凍折弦宦遊逺客非所習狐貉不具綈袍穿京師宜富不宜薄青衫駿馬爭騰騫南鄰吹笙厭粱肉北里鼓瑟羅姝妍淒涼朝士有何意瘦童羸騎鷄鳴前太倉粟陳未易糴中都俸薄難裹纒邇來方士頗向用讀書不若燒丹鉛故人聞之應見笑如此不歸殊可憐長林豐草我所愛羈靮未脱無由緣高侯逺來肯顧我裹茗抱被來同眠青燈耿耿照土屋白酒薄薄無葷羶破愁為笑出輭語寄書妻孥無一錢江湖浩渺足春水鳬雁滅沒橫秋烟何當乞身歸故里圖書堆裏消殘年孔道輔撃蛇笏以笏撃蛇有孔公義與叚公撃賊同事之鉅細雖有異正氣憤激生于中偉哉孔公聖人裔豈聽妖邪亂民志即今槐木一尺彊氣象凛凜含風霜子孫守之慎寶藏絶勝象牙堆滿牀春寒夜雨鳴高枕春寒入敝袍時光自花栁吾意豈蓬蒿失色黃金盡知音白雪高山林隠未得空覺此生勞雪後同子俊遊何山四首同是清閒客俱為放浪遊晴山依雪壯野水帶冰流風急松杉亂年登薺麥收生涯雖未老吾欲覓菟裘步履行危磴憑闌得妙峰鳥飛迷故道人去想遺蹤掩冉風前竹支離澗底松山僧飯不足不是忘鳴鐘兵革時猶動山林日就荒子真思隠遁詹尹卜行藏有意隨三飯無人饋五漿逺山湖外白立馬見微茫湍駛波翻雪風生地出雷薄醪隨意盡寒氣逼人來更欲明朝去何妨迫暮囘自憐非李廣醉尉勿相猜重遊弁山竹色迷行徑松聲洶座隅水清花自照風暖鳥相呼飲罷思棋局歌長缺唾壺重來瀟洒地聊足慰須臾次韻陳無逸中秋月食風雨不見谿月當圓夜看雲起暮愁層隂連積水伏雨暗清秋白璧難容玷明珠不可求每因觀節物轉覺此生浮秋興興逐秋風發愁隨秋夜長繋書陽鳥逺促織候蟲忙世已無劉表家徒有孟光故衣寒未補發篋動幽香送楊幼澄教授歸江西兼寄呉幼清客裏相從久愁中欲别難此行登仕版未覺負儒冠北度憐江總東歸憶幼安著書應滿屋妙處共誰看送李青甫由御史出按四川蜀道青天上繡衣驄馬行霜威御史府春色錦官城萬里平安報三年菽水清相逢一杯酒似為别離傾食粥杲杲西流日滔滔東逝波春光薊丘晚栁色上林多不道含香賤其如食粥何明時無小補郎署漫蹉跎和周景逺見寄四海多兄弟交情子獨親方將尋蚱蜢何意畫麒麟簿領淹豪士江湖著散人相看俱老大喜見二毛新謝日林贈湖石次其韻怪石曽聽法來從不二門玲瓏浮磬韻斑駁古苔痕池月巖邊上春雲水面屯微君能輒贈此意向誰論胡穆仲先生挽詩我有三益友對之如古人布衣甘陋巷書册老遺民淚落黔婁被神傷郭泰巾請為千字誄書刻上堅珉大都遇平江龍興寺僧話唐綦毋潛宿寺詩因次其韻聞説龍興寺多年未款扉風林發松籟雨砌長苔衣殿古燈光定房深磬韻微秋風動歸興一錫向空飛次韻觀復表兄見簡寒雨何時已停雲不肯開難陪山簡醉空憶謫仙才梅蘂枝枝發幽禽日日來可能無過我真復要詩催和姚子敬秋懐四首銅雀春深漢苑空邯鄲月冷照秦宮烟花樓閣西風裏錦繡湖山落照中河水南來非禹迹冀方北去有唐風溪城秋色催遲暮愁對黃雲沒斷鴻落日孤城動鼔鼙愁中畫角不勝吹山川蕭瑟秋雲淨草木凋傷暮雨悲多病馬卿聊假日數奇李廣不逢時卷簾白水青山外隠几無言有所思搔首風塵雙短鬢側身天地一儒冠中原人物思王猛江左功名愧謝安首蓿秋髙戎馬健江湖日短白鷗寒金尊緑酒無錢共安得愁中却暫歡呉宮烟冷水空流慘澹風雲暗九秋禾黍故基曽駐輦芙蓉高閣逈添愁繡楹錦柱蛟龍泣金沓瑶階鹿豕遊宋玊平生最蕭索欲將九辯賦離憂聞擣衣露下碧梧秋滿天砧聲不斷思綿綿北來風俗猶存古南度衣冠不及前首蓿總肥宛騕褭琵琶曽泣漢嬋娟人間俯仰成今古何待他年始惘然題岳王墓岳王墳上草離離秋色荒涼石獸危南渡君臣輕社稷中原父老望旌旗英雄一死嗟何及天下中分遂不支莫向西湖歌此曲水光山色不勝悲溪上溪上春風吹栁花溪頭春水淨無沙白鷗自信無機事𤣥鳥猶知有嵗華錦纜牙檣非昨夢鳯笙龍管是誰家令人苦憶東陵子擬問田園學種𤓰次韻剛父無逸遊南山作絶頂清秋凌翠烟登臨應費酒如川平生能著㡬兩屐負郭何須二頃田初日出雲光射地雙溪入湖波接天升髙望逺我所愛青壁有路何當緣次韻本齋先生即事重攬衣裘敝更寛徂年欲暮氣先寒雨中百草難為綠霜後黃花尚耐看千古清真耆舊傳半生辛苦腐儒冠便應築室山阿去嘉與斯人賦考槃次韻信仲晚興蕭蕭殘照晚當樓寒葉疎雲亂客愁歳月蹉跎星北指乾坤浩蕩水東流古來人物俱黃土少日心情在一丘獨立無言風滿袖青山相對共悠悠次韻王時觀相思呉越動經年一見情深重惘然草木變衰人易老江湖牢落鴈難前秦山半出青天上禹穴遥臨古道邊欲説舊遊渾似夢何時重上剡溪船紀舊遊二月江南鸎亂飛百花滿樹栁依依落紅無數迷歌扇嫩緑多情妬舞衣金鴨焚香川上暝畫船撾鼓月中歸如今寂寞東風裏把酒無言對夕暉次韻章得一同原父姪遊蘭澤緑樹隂隂草接天已愁春盡更聞鵑落花飛絮都成恨痛飲狂歌渾欲顛起舞有人如謝尚著書無意似伶𤣥繡筵寶瑟何時㑹割錦纒頭不計錢見章得一詩因次其韻二首水色青漣月色黃棃花淡白栁花香即看時節催人事更覺春愁惱客腸無酒難供陶令飲從人皆笑酈生狂城南風暖遊人少自在晴絲百尺長片片花飛欲送春萋萋碧草正愁人黃蜂釀蜜經營急紫燕銜泥來去頻才似茂陵非晚遇美如曲逆不長貧久知求富都無益但喜論詩若有神奉和帥初雨中見贈二首隂雨凄凄生夏寒故人望望惜清歡停雲底事能相阻后土何時可得乾無事甘為犀首飲切雲聊著屈平冠閒門客散且髙臥户外泥深沒馬鞍正坐清談與世違交情如子定應稀圖書跌宕心猶在裘馬清狂意已非黃鶴未知何日返饑烏故作傍人飛谿南流水清如玊終擬歸休理釣磯多景樓層顛官閣㡬時修遶檻長江萬古流白露已零秋草綠斜陽雖好暮雲稠平南籌策張華得治内人才葛亮優景物未窮登覽興角聲初起甕城秋東陽八詠樓山城秋色凈朝暉極目登臨未擬歸羽士曽聞遼鶴語征人又見塞鴻飛西流二水玻璃合南去千峰紫翠圍如此山川良不惡休文何事弗勝衣送繆秀才教授真州髥生别我將安適言向真州作教官但使清風生絳帳何妨朝日照空槃東園草木因人勝北固江山隔岸看才近中年已傷别可看南望送歸鞍趵突泉濼水發源天下無平地湧出白玊壺谷虚久恐元氣泄嵗旱不愁東海枯雲霧潤蒸華不注波濤聲震大明湖時來泉上濯塵土冰雪滿懐清興孤和鄭鵬南書懐豈不懐歸苦未閒宦情羇思不成歡可能治郡如龔遂只合臨流似幼安棋局懶從先處著醫方留取用時看夜來夢到苕溪上一枕清風五月寒題山堂手選青松一萬栽山堂留得翠屏隈推窗綠樹排簷入臨水紅桃對鏡開山雉雊迎朝日去野禽啼傍夕陽來老妻亦有幽棲意數日遲留不肯囘歳晚偶成致君澤物已無由夢想田園霅水頭老子難同非子傳齊人終困楚人咻濯纓久欲隨漁父束帶寧堪見督郵準擬新年棄官去百無拘繋似沙鷗送𤓰爾佳分省陜西憶從長楊獵于時始識公堂堂九尺幹落落萬夫雄補衮彌縫密能書㸃畫工勞謙延士類豈弟到兒童黃閣歸人望青雲有父風驅馳常扈從奏對每留中暫輟尚書履榮分陜右弓秦山依晝錦燕雪感秋蓬粉署趨承舊瀛洲忝竊同因公動鄉思飛夢過江東秋日即事今日秋色好天髙景不暄清飈動林薄涼意滿丘樊俗客無因至幽禽時自言露濃金盞側香逺玊簪繁誰辦東山妓空餘北海尊莫吟招隠賦桂樹可攀援題太白酒船圖載酒向何處稽山鏡水邊若為無賀老興盡便囘船長廊巖脩嵒如長廊下有流泉注山中古仙人步月自來去玊簾泉飛泉如玊簾直下數千尺新月橫簾鉤遥遥掛空碧一線天醯鷄舞甕中井蛙居坎底莫作一線看開眼九萬里題孤山放鶴圖西湖清且漣漪扁舟時蕩晴暉處處青山獨往翩翩白鶴迎歸題王子慶所藏大年墨鴈鴻雁栖栖遵渚黃蘆索索鳴秋羨殺承平公子筆端萬里滄洲清勝軒小草幽香動碧池暖風晴日長新荑南窗晝倚綠隂靜聽盡行人過馬蹄戲題僧惟堯墨梅瀟洒孤山半樹春素衣誰遣化緇塵何如澹月微雲夜照影西湖自寫真題秋胡戲妻圖相逢桑下説黃金料得秋胡用計深不是别來渾未識黃金聊試别來心絶句春寒惻惻掩重門金鴨香殘火尚温燕子不來花又落一庭風雨自黃昏簡王摶霄乞杏花杏花枝上紅千葉偏得春饒惱殺人早與折來供一醉東風如此恐成塵金山江水西來接太空中流突兀湧鼇宮妙髙臺上一迴首看盡世途風浪中題畫贈鶴皋翠袖盈盈不受扶天風縹緲降麻姑便應從此東呉去㡬見蓬萊弱水枯題孫登長嘯圖在澗幽人樂考槃南山白石夜漫漫空林無風萬籟寂長嘯一聲山月寒李材字子構京兆人年十七與趙承㫖同遊海子上即事賦詩膾炙人口客有賦十月桃者材信口云劉郎再來歳云暮王母一笑天囘春衆皆輟筆亦奇句也縣瓠城歌我經縣瓠城試作縣瓠歌殘灰五百載縣瓠失巍峩有唐中葉失馭將退辱進危多詆謗淮西孽雛手指天百萬官兵不敢傍長安市上晝殺人司隸走藏魂膽喪晉公一語破紛紜意斷心謀神莫抗諫書不到雙闕下詔撿初成九天上煌煌日月煥斧節慘慘風雲動鞬䩨殿前虓虎神策軍愬武通顏分玊帳夜長雪花大如璧縣瓠城頭血埋仗寒威方勁弓百鈞靜影不摇旗十丈已囚䝟貐山更沸再戮鯨鯢海無浪蔡人不識緋衣兒劍氣摩天大丞相方城大將拜道左犀甲金戈光炫晃兇嚚狡衆五十秋白日青天破昏障兒童不遣避介胄婦女爭來沽醁釀入朝論功功有差晉公之功無與讓英雄事往名器虚栗斯嚅唲競相尙外藩跋扈驕將侮中禁深嚴嬖臣誑山東何啻百少陽秦苑洛陽隨板蕩我歌縣瓠詞歌聲頗悲壯嗚呼唐之覆車将誰尤後人弔古徒哀愴縣瓠城下汝水流縣瓠城邊牧笛唱縣瓠歌歌已終君不見豐碑野火化為土悵望文公及晉公過黃陵廟黃陵廟前湘水緑天寒漁郎唱巴曲沙棠舟上月蒼蒼翠蛟白蜃江茫茫似聞清愁五十柱萬里鴻飛楓葉暮神鴉翻舞祠門開珠裳玊袖霑莓苔𤣥猿晝啼蘿薜影赤鱗夜去芙蓉冷北渚淚痕斑竹紋南風哀思蒼梧雲山頭古桂秋露碧山下江流豈終極荒涼揭車雜杜蘅靈風自吹烟霧旌輕帆晚向芳洲泊聊薦蘋羞奠蘭酌沅有汜兮湘有沱洞庭木落生層波裴囘獨詠騷人歌泊舟湘㟁長沙今在眼青草舊知名二月風檣疾三湘雪浪平藤深帝子廟花發定王城莫艤江南㟁啼鵑處處聲遊山寺行行行復止行到白雲間見客意不俗逢僧心便閒細泉分别澗小逕入他山擬借禪房榻追遊信宿還禁城秋夕絳宫星淡海無波九陌猶聞動玉珂閶闔微雲藏夕漏建章明月挂秋河此身天地流萍逺故國闗山落木多欲聽鈞天塵夢隔紫簫吹盡桂婆娑元日賀裴都事朝囘海上璚樓接五城人間歌吹近蓬瀛雲移豹尾旌旗動日射螭頭劍佩明拜舞盡隨仙仗入退歸遥認玉珂鳴欣欣百草含春意得傍東君暖處生和王御史春懐鶯啼燕語花漸稀天明海碧涵晴暉洛陽臺榭春色在山隂衣冠昔人非夢雲何處讌瑶席舞雪誰家裁紵衣獨有倚闌無限思迢迢烟草暮鴻飛送省郎楊耀卿使雲南飄颻使節出金閨郭隗臺前暫解攜天入五溪無鴈到地經三峽有猿啼子雲舊里風烟在太尉家聲日月齊後夜客槎何處望秋河迢遞碧雲低席上賦老松怪柏圖仙人解衣盤礴坐造化慘澹秋毫端枝柯千仞入層漢笙籟萬壑鳴驚湍堂中日月不可老壁上雷雨何時乾我來醉臥北窗下夢跨黃鵠天風寒程鉅夫名文海以字行其先徽州人叔父飛卿為宋建昌通判世祖時以城降鉅夫入為質子授管軍千户每召問條對甚悉帝奇之授應奉翰林文字進修撰屢遷集賢直學士兼祕書少監至元二十九年奏陳五事多采行之賜第京師加翰林集賢學士二十四年立尚書省詔為參知政事固辭俄拜侍御史行御史臺事奉詔求賢於江南得二十餘人皆擢置清要二十六年入朝具疏力攻僧格㡬危得免復還行臺二十九年召赴闕明年出為閩海道肅政亷訪使遷江南湖北道召拜翰林學士至大四年擢翰林學士承㫖皇慶二年詔偕平章政事三月乞歸特授光禄大夫給驛南還卒年七十追封楚國公諡文獻緝熙殿御題紫薇花扇面壽立卿中丞江南十里花茫茫紫薇晝對中書堂天工㑹得無窮意一枝宛轉留芬芳緝熙殿裏日月長御筆落處蛟龍翔花前未覺風流逺扇底猶含雨露香烏府先生黃閣老高敞新齋坐霜昊聊題此畫託千年從今永伴中書考阿房宮智力有窮天不老秦帝山河迹如掃參差忽落書圖間白髮朝臣驚欲倒咸陽初起阿房宫六籍已焚兵已鎔渭水函闗萬年固終南泰華五雲中複閣重樓鬱相望翠幄橫鋪九天上上容萬人常有餘下建大旗知㡬丈霞騰霧散天日迷山童野赭民睽睽窮奢極麗猶未愜謂海可梁天可梯蓬萊何處樓船逺上蔡東門歎黃犬六國樓臺春草長千門歌舞斜陽轉遊觀未畢化埃塵宮樹凄涼野鹿馴至今世上丹青手留與千年作諫臣題李宗師所藏李仲實李雪菴趙子昂墨竹李侯遊戲竹三昧葉葉枝枝分向背却憶王猷徑造時一㸃清風驚百代雪菴筆力老且堅神藏氣密如枯禪繁霜凋林雪積野虚空宴坐方寂然最後數竿更森竦髙節猶含老龍種一枝欲費百金求松雪道人世所重二君一朝得三絶五月對之若冰雪我但從君覓竹栽滿植中庭貯秋月題許仲仁詩卷殘雪詞林退食時小窗開巻鬢如絲音傳正始誰同調氣逼元和稍自持文字不隨前輩盡風流却許後人知霜清日冷梅花瘦獨對熏爐看欲癡王結字儀伯易州定興人徙家中山年二十餘遊京師上執政書言時事聞者韙之仁宗在潛邸或薦結充宿衞大悳十一年授東宮典牧大監仁宗即位遷集賢直學士出為順悳路總管遷揚州寧國又改東昌路至治二年參議中書省事泰定改元廷試充讀卷官遷集賢侍讀學士除浙西㢘訪使以疾還歳餘拜遼陽行省參知政事文宗即位改陕西明年拜中書參知政事被讒罷政元統初除浙西㢘訪未行召拜翰林學士知制詔同修國史歴中書左丞至元元年詔復入翰林以養疾不能應詔明年卒年六十二追封太原郡公諡文忠有詩文十五卷泗濱堂為蓋善長賦乘槎􅑴河源崑崙高不極揚舲浮沅湘重華阻靈覿興言遊汗漫千里一瞬息靈氛訢吉占嵗宴果何適遄歸泗水濱築堂俯晴碧優遊弦誦餘燕坐儼澄寂川流映天光翔泳咸自得悠悠千載心寥寥竟誰識遼陽髙節婦天東長白近蓬瀛縹緲仙人玉雪清鳯去紫簫聲已斷青鸞獨跨上瑶京宋元詩㑹卷七十一
