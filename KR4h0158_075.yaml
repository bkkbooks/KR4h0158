body:
  text: 宋元詩㑹卷七十五兵部主事陳焯編馬祖常字伯庸世為永古特部居靖州天山其高祖實喇濟蘇于金季任鳯翔兵馬判官子孫俱以馬為氏曽祖烏呼訥從世祖征宋留汴轉餉遂家于光州祖常七嵗知學得錢即以市書既長從蜀儒張䇓受業䇓甚器之延祐初鄉貢㑹試皆中第一廷試第二授應奉翰林文字拜監察御史直聲震一時㑹特們德爾専政祖常率同列劾其十罪仁宗黜之姦臣復相左遷開平縣尹將欲中傷之遂退居光州姦臣死除翰林待制擢典寶少監太子左贊善尋兼翰林直學士升禮部尚書丁祖母憂起仍原官天厯初兩知貢舉一為讀卷官號稱得人厯參議中書省江南行臺中丞同知徽政院事遂拜御史中丞樞密副使辭職歸光州自是屢詔皆不起至元四年卒年六十追封魏郡公諡文貞祖常工文章尤致力于詩圎密清麗大篇短章無不可誦可傳有集行世古詩凌晨視園蔬緑色承露英命婦自採摘終朝掬不盈持以充庖厨豈療饑腸鳴婆娑秋菘葉不受魚肉腥朝暾煦寒畦中心含素馨舟中望鄒嶧山魯雲偃車蓋汶水流魚鱗操舟返任濟川梁號通津東望鄒嶧山六丁鑿嶙峋靈巖溜泉乳仙遊道霞軿石髓如可食吾將託茲身齊宿太社署朱門屹南起金水經北流繚垣外旁達周屋內廣修圭玉承璅藉碧鏤飾衣篝中壇土五色夏松露浮浮改容事眀神豈謂茲淹留齊宫蔚清華前榮寫方壺右礎石芙蓉日景射銅鋪嘉木蔭長夏階草宜露濡兵衛限囂雜簷網縣蜘蛛署書督粢盛設吏視茅苴端居見博士希武循庭除度居庸關次繼學韻飛鞚陟雲巘決眥盡圖畫天氣吹髙寒山雨灑長夏冥冥白鳥去寂寂松子下陸行石當頭水舂泉繞舍髙與蜀道齊深乃盤谷亞筍輿約重來羸馬苦常跨朋從詠連疊酬應給閒暇得見王子喬吾將驂鶴駕西方濼魯郊秋已深西濼多蒲魚日暮積靄重維舟月生初露涼水禽宿雨晴艷芙蕖擷花結楚佩宛若湘南居苦寒二首肅肅嵗已晏冽冽氷霰集寒雲光不流槁木鳴日夕挾纊處南户嚴稜坐相襲端然成離居念念稚陽復褰裳居重户驚飈沓書帷穴地篝石火持酒得氷澌杲杲日出光萬物待彼施豈無陽和節嵗序非爾私淵明東籬圖畫史謝文字託意在粉繪高人蹈古道終造𤣥淡㑹涉世情豈真採菊心若寄持酒每自慰悠悠似相契擬古崇臺拂繁雲阿閣蔭廣路上有彈琴女文采被煙霧玉食薦翠盤渴飲瑤草露鄙薄貧士妻終嵗弄機杼送衛大隱卜者飲馬盧溝河水寒傷馬骨牧羊居庸關草短餓羊腹君行苦匆匆我且無握粟陟岡望髙雲東南有黃鵠初日初日照我樹我樹日華滋檀欒緑陰合四顧無曲枝盛暑熾煩歊其中有涼颸成林蔭千畝棲息任所宜種桃種桃南山麓三嵗不得實種瓜東郊園擷之在百日豈不思遲暮終焉有常食如何植瑤草千嵗始一獲端午效六朝體修篁發秀林新荷疊芳池綵絲擷霧縷紗縠含風漪㽔賓應樂律端陽正嵗時馥馥蘭湯浴灔灔蒲酒持漢宫鬭草戲楚船張水嬉江心鑄龍鏡好用照湘纍留别沂州張君仲揚舲下彭城分帆上沂水與子作别離眷言重徙倚曩在京華居連室同井里出則鑣御聨入則衣袂比茲晨各散去相顧意未已我操田器歸子執州符仕慎勿輕此身期以善自止移梅幽屏逐魚鳥沈跡儔隱淪所欣在林藪嘉植日以親眷言江介品紛葩號南珍遇我好竒服移根得良因井井十畝園菁茅蔭澗濱縞裳被玉質宜此空山春田間中田蒔柔桑周垣列菀栁居然成農耕林廬頗完厚朋從時往來牀頭出樽酒意氣每酣適仰視北有斗豈知念湘纍那復嘆魯叟丈夫貴立志文字託永久古意秋羅畫雙蝶涼颸透鮫綃攀紆翠襞積騰拏鳳盤翹公子高宴集水閣芙蓉搖來禽丹砂紅石蜜春氷消歡情光景洽壯意風雲飄所期國士知豈謂虞人招上京書懷燕子泥融蘭葉短疊疊荷錢水初滿人家時節近端陽繡袂羅衫雙佩光共笑江南五雜組畫鷁浮波供角黍沙苑射栁追風駒古來此地為名區所過寧王玉笛吹鳳凰桐花秋露宫晝長開元天子忽思武手中金箭照眼光何物羣婢出後房羽林孤兒射殺將坐中凛凛無漁陽李夫人未央天子香醺骨夫人不貯黃金屋水銅無光澀秋月留得當年舊蛾緑瑤臺夜佩聲闌珊沈雲呌雁沙泉寒二十五絃彈鳳凰玉叉小燕飛春山題織錦回文圖桃葉渡江不用楫織女烏鵲填河白合歡樹下宜男草色色不及羅裙好織錦度曲聲亦柔黃龍塞是契丹州夫君戍歸定何日樂府陳娘歌第一秋意張良廟前流水聲歌風臺下曉雞鳴行人舟中寐復起此生亦欲成功名白髮可憐升斗祿持歸不足求田屋揮杯看劔獨長嘯萬里朝雲見晴旭湖北驛中偶成江田稻花露始零浦中蓮子青復青楚船祠龍來買酒十幅蒲帆上洞庭羅衣熏香錢滿篋身是揚州販鹽客明年載米入長安妻封縣君身有官李後主圖澤國中寒嵗年晏沙嶼潮痕明石棧風吹半樹野梅發天上書來問春雁江南後主丹鉛手畫盡冰絲世無有宫中長晝諌囊稀嫵媚吳娃雙進酒送周南翁之官池陽霏微桂叢緑霧深集仙書殿秋沈沈九華山影墮酒盞便欲起挹青楓林青楓林髙霜葉赤遙遙連雲雁行急蜀麻吳鹽來往時閒坐城樓聽江笛題明皇端箭圖銀牀墮露下髙桐竹練含氷留麝籠蒲萄酒作碼瑙紅湘娥江邉採芙蓉月華流影天漢東素商凄清揚微風草根知秋有鳴蛩過文著作家誰住街西屋文昌著作臣茶甌宜客靜書帙覺豫親栽竹應棲鳳操觚定獲麟青藜明夜半北極動星辰送王睂叟真人秋暉上寒竹白鶴立蒼苔石洞松花落雲房澗水來彈琴翻道曲搗藥應猿哀别浦回船急孤山看早梅送人之陜省幕和韻綬帶驚沙鶴紗巾逐海鷗驪山泉未冷華嶽樹先秋路出汾陽里衣仍晏子裘風流蓮幕美君豈歎淹留送蘇子寧赴嶺北省幕雞塞鳴啾哳龍沙列夜營賜衣俱魯縞給餉盡吳粳野井氷生夏寒天雪沒晴藩垣資贊畫幕府正知名謁告書懷先子桐鄉地年來憶舊遊山春花競發沙旭水閒流石屋青霞夜藤牀碧樹秋防身龍具在强欲問吳鈎泗州塔梵塔層層出雲間見象輪金光動淮水鐸語召川神負載坤多力莊嚴佛有因埏陶千萬億穹石刻銘新舟中叢薄縈雲曲岡巒引霧霪舟輕風燕疾衣薄水螢侵夜久江喧瀨秋清竹滿林閒情任飄泊到處欲登臨海子槗二首朝馬秋塵急天潢晚鏡舒影圎雲度鳥波靜藻依魚石棧通星漢銀河落水渠無人洗寒露為我媚芙蕖南望蓬萊觀行人隔苑牆有時馴象浴不見狎鷗翔宫樹飄秋葉江船認石梁辟雍真可作擬賦獻文王送符鎮撫之官金符傳拜將白羽看麾軍吹角弓橫月開旗馬望雲舅家書盡讀新府令初聞油幕風流盛吾歸詫隱君贈里人别因寄祖義祖烈萬里天南地逢君似到鄉欲同觀海嶼忽别上河梁楚樹思題葉淮僧憶借航歸時報兄弟莫遣石田荒再從浙入閩二首江外淹留久那堪去復回水生客星瀨日出偃王臺烓竈茶甌至筠籠橘顆來春雲又成雨著意落寒梅積雨關河溼今朝日始晴浮船下夜瀨覓酒近春城鵝鴨將雛出牛羊傍母行獨憐無似客萬里又南征遊華嚴寺化國日遲遲招提獨往時鶴馴看梵磬猫定護齊糜貝葉翻經譯沙牆應制詩庭前雙樹好長夏得風吹出都長城懷古處身在日華東水出盧龍塞山連碣石宫沙鷗終自白霜樹忽然紅雲海鴻濛氣歸帆杳靄中贈楊洞天道人我自不入俗君今又欲仙鳥啼百花裏屋住萬山邉密樹雲難過空潭月易圎題詩秋卷了為說小行年次韻咏石老石何年有依稀滿路旁無人愁飲羽有客坐亡羊戒世能言晉傳書豈姓黃補天成五色何獨柱眀堂用樂天韻因效其題詠閒意繅絲車響雨來稀罨畫圖中住翠微村北村南桑扈呌家前家後竹雞飛青憐藤蔓春牽屋緑愛荷盤夏剪衣更憶江天家萬里行逢僧子借船歸夀郝大參退傳歸來髮尚青角巾閒對老人星鳳凰池上辭松閣鸚鵡洲邉買竹亭留客只談三里霧見人寧問五侯鯖慚無剛卯為公夀他日淮南種茯苓九日在告青山到屋三十里瘦馬不能閒一過欲趁重陽浮菊蘂翻愁落葉下巖阿南鴻帶雨秋飛急北谷來霜夜杵多病裏題詩遣野興何人攜手與高歌題若谷擊劒酣歌白日迷高情邈邈見天倪石潭藻舞魚深泳花嶼春明鳥自啼架上道書研宇宙篋中衣帶剪虹霓洞房清晝奩香轉坐聽東街馬過泥錢塘潮石橋西畔竹棚斜閒日浮舟閲嵗華金鑿縣崕開佛國玉分飛瀑過人家風杉鸛下春鳴垤雨樹猿啼暝踏花欲賃茭田來此住東南更望赤城霞蓋善長御史泗濱堂泗水千年碧似藍泗濱華屋締楩柟人從魯北耕春雨山自徂徠供夕嵐方印只今垂組紐長檠猶獨近書龕天邉倦客滄洲逺卷裏題詩興未堪治書再和復次韻西南春巷杏花牆索米長安漢㦸郎市裏忽聞雞吐綬海邉還報鳥含香月移桂樹通階石芝發銅池謝井牀襆直閣門休沐晚新詩刻燭賦千章鄢陵别南客層層林表白浮圖古鄢城高旅望孤秋雨喜沾梁土麥暝烟愁合楚田蕪行人北上隨沙雁歸客南還對渚鳬溱洧波清饒草樹百年生聚尚繩樞寄𢎞長老雲山曙雨初生蹛蝀槗梵山吟唄不移朝曽分禪榻春盤礴更想雲山夜寂寥繭紙題詩尋伴少郫筒沽酒入城遙佛龕千丈金銀界照世酥燈弟子燒送安慶路教王中夫南國煙花一萬重船浮春水正溶溶舒州城壯山偏護博士官清印自封夜誦挑燈吟蟋蟀秋行攜酒采芙蓉仙人李白今應在問訊時時過宿松送蘇州卜者幾嵗京華賃屋居得官猶苦食無魚成都誰問君平卜江左人知郭璞書春水浮空波緩緩秋機織字錦舒舒虎丘剩飲千鍾酒醉裏高歌唱闔閭奉陪薦食英宗神御殿用繼學韻乘石松陰偃翠虬先皇曽此駐龍輈茂陵弓劒隨天御原廟衣冠奉月遊藉玉已行周制度酹金那罰漢諸侯百馨水陸修葅醢望拜孤臣涕莫收送王參政上京奏選二首滇池細馬踏龍沙宰相朝天路不賖峽裏琴泉春作乳月中珠樹夜成花三千禮樂尊儒術百二山河壯帝家魚上禹門無㸃額直郎宣奏日當衙千官吉日聽宣麻白髮文臣帝汝嘉池鳳有毛皆五色蘂珠無樹不三花緑綈詔底書分雨紅錦囊中字剪霞天路北盤三十六歸時秋月滿京華送胡震亨巡簡獵獵雙弓騎氣張古來逢掖試穿楊清江鑄鏡芙蓉月緑酒筵開玳瑁堂稻熟萬塍初下水橘垂千樹已經霜藍袍包裹迎丞簿莫負尚書薦鶚章送毛真人還山朱提仙印碧霞裳賜履承恩自尚方雨灑石壇苔錦滑日穿油幌竹書光葉鳬此日還滄海漢鵠當年下建章琪樹萬叢芝萬本江南歸路水雲鄉雜詠二首百丈牽船泝上流清淮從古有三洲浮山堰逐降王去淝水波因小謝收紅樹有霜還可騎白蘋無雨更宜舟平生自是多行役莫信吾家馬少游濠梁無客更觀魚遊子行過莫問書潮落沙痕鷗泛少風回雲影雁行疏歸帆夜宿山前寺從槖秋辭仗外車俯仰此身天地內滄洲重去帶經鋤西山鳳城西去玉泉頭楊栁堤長馬上遊六月熏風吹别殿半天飛雨灑重樓山浮樹蓋連雲動露滴荷盤並水流艤岸龍舟能北望翠華來日正清秋石城縣尉石城縣尉坐寒㕔日有新詩寫後屏官小不騎沙苑馬書多空識楚江萍老兵束矢除階草佐吏休衙罷閣鈴兄弟幾年為我友何時同舍究殘經無題三湘瀟灑恨無潮鳥鵲填河願有槗丹穴鳳來龍樹逺海門魚去蜃樓遙已知京兆誇高髻不信章華鬭細腰船尾橫江春水急長年無事恨吹簫次韻李行齊集賢英聲籍甚著天門詩句年來與我論沙磧翳雲歌北塞稻畦分水夢東屯秋風八月推茅屋夜雨三更注酒盆明日桑乾須繫馬翠華過處看承恩寄姚參政上都南熏清暑上京居六月涼亭正打魚雨嶺火明山芍藥風田金動草芙蕖甘泉曉仗臨前殿京兆秋塵待屬車侍從文臣行不送舊寮淹蹇意何如寄贈揚州王鍊師仙客吹笙踏月輪因遊淮海誤尋真松花搗月分貧士柿葉題詩寄逺人清水有潮留載酒春雲不雨取裁巾江都千樹隋宫栁曽見先生緑髮新挽何得之先生手織烏紗日賣錢全家移住五雲邉伏生有女書空在伯道無兒世共憐北市行歌花爛漫西亭坐嘯月嬋姢少微光氣今年暗知是詩隨過海船開平事金馬東門畫省西千官花覆曙光低九莖芝蓋雲衣合百石銅盤露顆齊鹿栅已營修竹塢燕巢還補落花泥上林伏日金桃熟鸚鵡來時不敢棲還過龍門紫塞秋髙鳳輦回龍門有客去還來蕩摩日月崑崙坼吐納風雲混沌開天帝有神司主宰地靈無力載崔嵬誰吹石瀨成飛雨不使時人汚酒杯光山縣孔宰豳風亭光山近在故山西樹滿岡頭稻滿畦鄰屋讀書相教授社祠酣酒共提攜水牛礪角嫌耕淺野繭抽絲喜價低春雨行田無從吏獨騎羸馬畏青泥次韻進士宋顯夫海岸春行靈沼春波殿影高行人苑外望蟠桃街塵曙雨沈紅霧宫瓦晴飛動翠濤鳥度鏡中還避彈魚跳船尾不因篙曲江别有新承宴笑我官曹似馬曹菊枕東籬采采數枝霜包裹西風入夢涼半夜歸心三徑逺一囊秋色四屏香牀頭未覺黃金盡鏡底難教白髮長幾度醉來消不得臥收清氣入詩腸登雨花臺積翠生層巘凝光浴巨濤吳城花覆井楚舸竹裁篙地近魚龍逼天空鶴鸛髙野槗皆螮蝀溪水盡蒲萄雨石逢芝箭風林得鳳毛胭脂兒女小罨畫鬼神叨六代都銜璧三山尚戴鼇故宫猶荏苒古樹漫周遭仙洞歌瑤草人家宴碧桃飯香非接淅酒好不篘糟緑霧春連閣丹霞曉映袍攀躋歡境勝跋涉憚人勞老我才還劣清資愧重叨采詩今有使問俗似無曹佳麗千年最聲名一世豪嵗時休浣日攜手足遊遨求趙伯顯畫家山圖用唐李中韻春雁南來後家書一紙無山花應向日陂水計通湖羸㹀衣資絮生蠶薄藉蘆久宜拂白石強此伏青蒲琴客分抄譜仙翁許借壺園紅榴火煉沼緑芡盤鋪嵐氣飄簷隙煙光鬱座隅呼雲橫蹛蝀問月看蟾蜍倚杖心何逸觀魚興不孤新開竹林徑併乞寫成圖猗緑園殖産吾何取開林我獨能縛船嘗取竹搗紙每移藤池曲波濤小花繁霧雨蒸春雲同礎潤秋月共江澄鳳下非因食魚來不可罾寫經還道士裹飯乞行僧筍屨新青折荷衣舊翠凝浮甌茶有乳溢甕酒無氷香灺留文篆書囊剩繚綾清晨餐玉罷東坐日初升泉南孫氏園亭鑿石通歸汐浮梁看浴暾鴨闌萍上甃鹿栅蘚生垣薝蔔乘栀子篔簹長竹孫書香藝辟蠧席暖錦裁鵷交客登仙籍承家荷帝恩氷甌蜂蜜溜酒榼荔漿翻吹籥花圍屋彈琴鶴舞園海雲春有態閩雪夜無痕誰謂衣裳懶豫今杖屨煩捋鬚歌月地翹首望天門楊妃墓漢廟衣冠照碧燐唐陵翁仲作黃塵馬嵬坡上棠梨樹猶占秦原幾日春驪山玉女泉邉翠藻多石池涵影媚宫娥可憐繡嶺啼春鳥猶似梨園弟子歌送胡古愚還越越江秋水得霜清夜夜天南婺女明客子布衣風又急世間無用是才名閩浙之交路入閩中盡翠微家家蕉葛作秋衣石牆遮竹松圍屋時有丹禽哺子歸趙氏宗室畫水石生平已識趙王孫竹素何年畫石根萬里南雲秋似水直容艇子到柴門和史參政韻五雲天近晝香殘紅白花枝滿藥欄一夜東風吹小雨殿頭持卷隔簾看流鶯喬木繁陰晝景舒檀桑緑色滿階除京都三月花飛盡才聽流鶯一囀初蔡琰圖邉月還如漢月圎龍堆沙水咽哀絃文姬此夕穹廬夢應到春閨舊鏡前代悼亡為陳云嶠作燕子樓空花不開繡簾天晚月初來手痕留在紅牙板猶有餘香妬落梅王士熙字繼學東平人任浙東肅政亷訪司厯官中丞其父構官翰林承㫖贈大司徒魯國公諡文肅玉環引送伯庸北上崑山有美璞昆吾有寶刀堆雪漉寒氷凝此英瓊瑤團團月長滿晶晶白雲淺似環環無窮寥寥人意逺有美天山人皎潔同精神禁垣青春多大佩垂朝紳腰無大羽箭肘有如斗印結束上京行騮駒驟長靷不采珊瑚鈎海深安可求不執水蒼璧朔廷羅公侯愛此玲瓏質題詩贈與客百金一朝傾三年不可得不得只空行山泉琴峽鳴摩挲龍門石憶憶應留情天風北極髙歸途踏霜草不惜玉環分只願君歸早早朝行石城啼鳥翻曙光千門萬户開未央丞相珂馬沙堤長奏章催喚東曹郎燕山驛騎朝來到雨澤十分九州報輦金䭾帛分逺行龍沙士飽無鼓聲閣中龍牀琢白玉瑟瑟圍屏海波緑曲欄四月櫻桃紅舜琴日日彈熏風送蘇公赴嶺北行省郎中居庸關頭亂山積李陵臺西白沙磧畫省郎官貂帽側飛雪皚皚馬韉濕馬蹄雪深遲遲行冷月悽雲塞垣明鐵甲無光烽不驚萬營角聲如水清明年四月新草生征人賣劍隴頭耕思君遙遙隔髙城南風城樓來雁鳴玩芳亭何處春來好城南尺五天地幽迷曉樹花重壓春煙上客拋羅袂佳人舞畫筵晚來清興熟移坐曲池邉題鮮于伯機與仇廉訪帖三生文采趙公子四海聲名仇使君彈琴不作廣陵散焚香遙駐博山雲玉署春來鶯漫語繡衣人去雁空聞龍蛇兩紙光如玉即是安西與右軍其帖曰魏公子眀日外過寒舍亷訪能一來焚香彈琴亦甚佳公子子昻也送巨德新渭城秋水泛紅蓮白雪梁園作賦年金馬朝回門似水碧雞人去路如天揚雄宅古平蕪雨諸葛祠空老樹煙小隊出遊春色裏滿溪花朵正姢姢夀劉邢公詔下金鑾第一㕔春風湛露宴趨庭嘉辰又緩蒼龍角仙侣同驂白鶴翎衛武髙年猶入相韋賢老日只傳經崆峒别有長生訣杖几凝香酒半醒送袁道士二首五公舊譜漢庭傳之子飄飄去學仙山裏牧羊成白石臺間騎鶴上青天黃庭夜月吟三疊緑綺秋風度七絃拂袖京塵留不住别離可奈落花前軒轅雲裔越公家學道青山幾嵗華仙覓安期曽授棗詩成湘子解開花金砂擬煉長生藥銀海初回逺使槎二十四巖眀月夜簫聲何處落烟霞寄上都僚友天上風清暑盡消尚方仙隊按雲韶白鵝海水生鷹獵紅藥山岡詐馬朝涼入賜衣飄細葛醉題歌扇溼輕綃河堤楊栁休傷别八月星槎到鵲橋題節婦寒窗機杼泣秋風鏡影鉛雲不汝同明月有光生夜白貞松無夢妒春紅羅襦舊繡天吳折緑綺離弦海鶴空陌上行人指華表閉門疏雨落梧桐驪山宫圖翠嶺餘煙曉仗催五家車騎入朝來千峰雲散歌樓合十月霜晴浴殿開烽火髙堂留草樹荔支長路認塵埃月中人去青山在始信昆明有劫灰送袁德平歸越平湖如鏡靜秋波禹穴西風捲緑蘿狂客有船都載酒道人無字不籠鵝牀頭書笏青雲近窗下殘編白雪多燕市塵深拂衣去海門何處問漁蓑寄武夷思學齊武夷山色清於水君築髙齊第幾峰北苑鶯啼春煮茗西風鶴語夜巢松田家送酒芝香瀉道士留書石髓封聞說牙籖三萬軸欲憑南雁約相從送朱真一住西山官河新栁雪初融仙客歸舟背楚鴻鐵柱晝閒山似玉石樓人靜水如空煮茶榻畔延徐孺采藥爐邉覓葛洪天上雲多白鶴去子規何事怨東風上京次馬伯庸韻侍臣催講御階西雲靜觚稜曉色低天闢神州卑兩漢地連碣石轉三齊含香晝永閒青瑣視草堂幽溼紫泥最憶東山老松樹秋風應有鶴來棲王在中代祀秦蜀山川太華雲連蜀棧低栁花三月紫騮嘶香浮曉露金奩溼幡拂春煙絳節齊䇿牘當年登桂苑詞林後夜趣芝泥長安遊客應無數誰共王褒頌碧雞和馬伯庸寄袁學士白雪賡歌少朱絃詠歎長天池鵾獨運霧谷豹深藏舊地收華㦸新田買石房閒情齊綺皓時論佇班揚瑚璉登周廟宗彞畫舜裳西昆分皓氣南斗避寒芒六月灤陽扇三秋鏡水航彈琴無俗曲辟穀有仙方玉海羞麟脯金莖饋露漿書空忘咄咄文障拂堂堂翰府聨芳逺樞庭奕葉光名山留史䇿鳥國售詩章節擬芝田鶴音諧律管凰寫經酬道士立塔禮空王藉草連裙碧分觥注酒黃竹牀吟几小紗幘鬢絲涼離别三生夢歸依一瓣香升堂乖笑語在野愧才良雲擁鄞山雨潮生定海洋何時宣室召四馬驟康莊李宫人琵琶引三首瓊花春鳥百花香太液池邉夜色涼一曲六么天上譜君王為進紫霞觴鑾輿三月幸龍岡宣喚新詩促曉妝撥斷氷絃秋滿眼塞天雲碧草茫茫一入湥宫嵗月長承恩曾得侍昭陽檀槽按出新翻曲五色雲中落鳳凰宋本字誠夫大都人幼從父禎官江陵聞王奎文眀性理之學本往質所得造詣日深善為古文詞名播荆楚年四十始還燕至治元年廷試第一人及第授翰林修撰泰定元年春除監察御史糾劾權要無少鯁避于地震直陳時事致災詞氣奮激衆皆聳聽移兵部員外郎轉中書左司都事遷禮部郎中升吏部侍郎改禮部文宗開奎章閣擢為學士進禮部尚書卒年五十四所著有至治集四十卷行于世大都雜詩四首拋却漁竿滄海邉拂衣來看九重天畫欄九陌橋如月緑影千門樹似煙南國佳人王幼玉中朝才子杜樊川紫雲樓上如澠酒孤負春風二十年繡錯繁華遍九衢上林詞賦漢西都朱門細婢金條脫紫禁材官玉鹿盧萬里星辰開上界四朝冠蓋翊皇圖東鄰白面生紈綺笑殺揚雄臥一區蘆溝曉月墮蒼煙十一門開日色鮮海上神山無弱水人間平地有鈞天寶幢珠珞瞿曇寺豪竹哀絲玳瑁筵春雨如膏三萬里盡將嵩呼祝堯年形勢全燕擁地靈梯航萬國走王城狗屠已仕明天子牛相寧知别太平𤣥武鈎陳騰王氣白麟赤雁入新聲近來朝報多如雨不見河南召賈生舶上謠送伯庸以番貨事奉使閩浙十首江華江月要才情多病堪憐馬長卿莫向都門折楊栁帝鄉春色不南行琉球真蠟接闍婆日本辰韓濊貊倭番舶去時遺矴石年年到處海無波朱張死去十年過海寇凋零海賈多南風六月到岸酒花鼓篙丁奈樂何湧金門外是西湖隄上垂楊盡姓蘇作得吳趨阿誰唱小卿墳上露蘭枯舊時家近黑橋街三十餘年不往來憑仗使君一問訊楊梅銀杏幾回開閩中父老白髭鬚老子風流記得無昔日郎君騎竹馬如今使者駕軺車伯庸之先嘗仕閩中素馨華畔十八娘炎雲瑞露酌天漿一日供厨三百顆使君館券莫支羊薰陸胡椒腽肭齊明珠象齒駭雞犀世間莫作珍竒看解使英雄價盡低東海澄清南海涼公厨海錯照壺觴郎君鮝好江瑤脆水母綿明烏賊香明年歸路踏陽和雕胯輕衫剪越羅春風通惠河頭路還與官家得寶歌顧琛字淵白嘉興人恃才傲物嘗入京獻燕都賦翰林元復初斥之日今天下一家燕乃戰國之名何足稱也慚恨而歸晚年官嶽陽教授題錢舜舉畫漁翁牽罾圖苕溪道人溪上居一生只慣觀打魚吳兒打魚當耕織意匠别出絲綸餘緯葭縛竹直水口承以密罟防其逋卒然一掣勢莫禦紫鱗躍出金芙蕖蓬窗草屋色色具茶瓶酒碗尋常俱船頭青山立突兀船後緑樹搖扶疏人間名利不可汚煙水為席天為廬西塞山前晚風急醉踏船舷浪花入漁翁心事道人知日暮來看倚笻立回頭却捉秋兔毫寫入生綃半猶溼令人展卷心茫然辛苦微官悔何及吳松江上鱸魚肥秋風落葉滿魚磯何不買舟徑東歸何不買舟徑東歸宋元詩㑹卷七十五
