body:
  text: 宋元詩㑹卷四十四兵部主事陳焯編劉爚字晦伯建陽人乾道八年進士調山陽主簿通判潭州未上丁艱時偽學禁起爚從朱熹講道武夷築雲莊山房為終老之計調贑州坑冶書管文字歴知徳慶府提舉廣東常平遷尚左郎官國子司業乞罷偽學之詔請以朱熹白鹿洞規頒示太學兼編修檢討官進國子祭酒權工部尚書仍兼諭徳每講讀至經史所陳聲色嗜欲之戒懇切再三進讀詩之說覽者為吐舌云卒贈光禄大夫諡文簡送王子文宰昭武二首百錬成繞指粹白俄成緇有初諒非難其難在終之道心𦕈絲粟易為羣物移不有專一功誰能勝安危願言保令德嵗晏以為期平時州縣間上下意苦異善書肘後掣有志奚由遂子今得所從展布有餘地兩賢更戮力萬物應吐氣相期召杜功奕奕昭來世上陳縣尹舊尹龔熊負令名至今天日共清明案頭未有人稱屈村裏全無吏敢行滿院茶香敲句穏一簾花影韻琴清後來踵武誰其似又說陳公政有聲金國賀正旦使人到闕錫宴紫宸殿榆關玉塞靜無塵嘉定于今第四春兩國交馳通好使八方同作太平人翠鼉鼓奏娛嘉客白獸樽浮賞諫臣聖厯従兹天共逺年年玊帛㑹楓宸瑞慶聖節應制皇家卜世過周唐天啓真人應運翔抱日預占恭邸夢飛龍曾報皖山祥翠雲影外來金母紅霧香中擁玊皇樂府賦工無以祝願將金鑑代珠囊葉適字正則永嘉人為文藻思英發擢淳熈五年進士第二人授平江節度推官少保史浩薦於朝召之不至改浙西提刑幹辦用執政龔茂良薦召為太學正遷博士因輪對敷奏剉切上慘然久之除常博兼實錄檢討㑹朱熹除兵部郎官未就職為侍郎林栗所糾適上疏力爭不報光宗嗣位出知蘄州入為尚書郎官是時帝以疾不朝重華宫適力言父子天性浮疑私畏何得阻定省之歡帝因兩詣重華都人大恱孝宗崩光宗不能執喪其内禪寜宗適與趙汝愚實主始謀焉寜宗立韓侂冑冀得節鉞適勸趙汝愚當與之汝愚不聽適歎曰禍自此始矣遂求補外未幾亦為御史所紏罷主宫觀起判湖南轉運歴知泉州召權兵侍而侂胄欲立功固位將啟兵端欲藉適草詔以動中外特兼直學士適引疾力辭侂胄軍敗除適知建康府兼沿江制置適經理堡寨漸有成績及侂胄已誅中丞雷孝友劾適附侂胄罷歸卒年七十四靈巖穹窿右俛眉天平左垂鬢吳人宅沮洳兹山抑其鎮陡起為表著突兀數尋仞樛松頗堅瘦立石乃榮潤兼有千里陂杳靄來逺韻宜乎登椒丘擺落思奮迅吳主未亾時絶色館孤峻歌聲妙欵乃爼品窮蛤蜃援琴固停晷解甲仍轉瞬終歸寂寞人破釡煑枯堇陳迹不足弔新締何勞問北齋人情無終極匪陋則求佳寢處既少安遊燕豈不懐惟思舊酒務糟酵荒榛埋破瓶聚隆垤新甃連長堦種竹夾超然移花遶北齋及爾風露清忽感意象諧幽深容浪蘂潤澤長芳荄亭亭兩髙梧買自婁門街俟以嵗屢寒窅若萬仞崖吾留能幾日齪齪強安排方嫌樹影瘦復慮地勢􅏠世間香味恱每與腥羶偕雅故使鄭淆法語仍進俳俯同侏儒笑但恐好惡乖莫窮有限物徇此未腐骸張氏東園送王恭父得殿字燕鴻不相須進趨自求便余來君其館乃復當我餞一春三月雨亭樹鬱霧澱絮重厄飛揚花蔫堆紫茜縦有百壺清何能一笑遣為郎昔同甲四海初㑹面凜然抱英特霜宇搏温霰雄詞推落筆一語不可選重來更純粹玉琢金就鍊漢家闡道術四達詔羣彦談經石渠觀㑹議白虎殿通方要歸宿立異豈夸衒子行若微罪天意委深眷以其今固辭可信非始戀楚􅉯宜縐絺峽漲難短牽囘舟泊書林及此未掩卷奉賦德修西充大夫成都新園詠歸堂浣花炫春澨濯錦絢晴浦成都信繁㑹此水工媚嫵豈無濠上亭蹙歩難仰俯誓言違市朝卜宅近幽阻沃沃葵莧畦焰焰棠杏塢朝曦溼淺瀨暮色生逺渚循涯詠未厭引流絡其圃蘋荇依籬樊鳬雁宿庭戸長松百里外物象爭𣺌莽時平乏隠淪蓑笠自歌舞岷江志東向激射走吳楚胡為滯淫之習坎聖所許宿石門好溪瀉百壑南北傾萬峰山凡堆阜俗映岸羞為容石門忽秀出老幹蔭渟洪捨舟從口入便已離塵中衆芳拱窟宅環峒獻奇穠藤蘿異態度尺寸疑施功錦茵翠織成照耀無春冬水行千丈髙歕薄不可窮更有洗頭盆雲深霧常封昔年謝康樂築居待其終繼作者丘裴語言亦稱雄栖栖三羽衣日晏齋廚空來遊百世後歎息騷人風露星亭斗杓㸃翠為此城四郊環拱來遙青知君欲覽衆山小取塼磨就天上亭身心合於高處著萬象不語森湊泊古今日色遞淺深志士可惜虚光陰趙成父築亭上饒即用東里舊圃牓曰魚計秦僑洛寓隨南公新條復欲無開封亭名若有土斷法鄭圃豈在章泉中舊魚遙應化龍去今魚且復波間住人為魚計魚不知今樂莫㤀昔日悲題鄭大惠詩卷憶從草廬赴鄰炊澁雪攪筵糟涌糜要當醺酣活膚凑不許雕刻妨肝脾何年兒生錦䙀裂金塗門扉玊為切吟中得眼萬象通浪吹狂歌總休歇兩家至今住連墻讀書聞鷄夜相將經明先入韋平室句好還升李杜堂送鄭丈赴建寧清廟圖書寶熙朝雅頌音頻繁三節召荏苒二毛侵衣食家纔足丘園意亦深臥聽牀下士時作武侯吟送鄧諫從制幹援引亦未力聲名空復傳終攜太平䇿還上蜀江船帆色挂曉月櫓音穿夕煙滄波不盡興收拾浣花邊送謝希孟白頭趍幕府蚤已負平生未放鵬舒翼應須驥斂程驛梅催凍蘂柁雨送春聲為語常平使開懐待子荆送包通判兼寄滕季度風雨逍遙地衙排印簏新鈿車分路濶寶瑟聽歌頻燈市曉侵月花田晚占春郤過張翰宅方信有閒人贈盧次夔家住東郊深能詩人共尋氷梭間道錦玉軫斷文琴城漏宵添滴牕花晝減陰新涼白頭句清甚費悲吟施翔公掌敎長沙蓍蔡羲前識簫韶舜後音追囘賈誼貶喚起屈原沈湘水汀烟濶梅花署雪深余行陳迹久因子一微吟西山對面吳橋港西山幾一家有林皆橘樹無水不荷花竹下晴垂釣松間雨試茶更瞻東序綵空翠落朝霞送曹器逺曹子苦心懐百憂古人逺矣思同流平生未得雄豪力今日便肎卑微休麻源洞裏瓊葉雨南草市上蘆花秋十年老語為誰了西望滄江空白頭送潘德久每攜瘦竹身長隠忽引文藤令頗嚴聞道將軍如郤縠不妨幕府有陶潛江當濶處水新漲春到極頭花倍添未有羽書吟自好全提白下入詩奩陳薻字元潔福唐人網軒林亦之髙弟也網軒固貧而元潔之貧尤甚居無片瓦諸學子聚館俸為買田數畝輒被人奪去僑居福清縣之横塘忍饑絃誦泊如也因以樂自名其軒所著有樂軒集姚晉卿溪閣行南院觀溪心已清縈紆更上閣中行西横車馬市橋合東眺逺山霞霧生日斜沙石淺可數半夜轟雷驅猛雨農圃嘈嘈春水多誰得身閒延客歌醉後下堦齊拍手長株矮樹排花柳主人更要雙眸寛去年拄杖尋長安一行一處狂呼去日日芳園大如許買地此多直幾金千屏萬障為墻堵丹井懐叔達喜稱吾子賦羞道少年時别去休論易愁來欲寄詩夕陽書不到殘月夢相隨晩嵗傷心事松峬獨語誰歸入古田界作步入溪山勝橋亭古劒風土宜歸茘子村塢盡油桐南店炊初滑西舟石漸窮豈知旬日外便訪去時蹤虎溪四圍山木合百磴屋簷重古穴成幽井疎林散曉峰響泉那更月啼鳥此無冬臺上朝朝看天邊有怪松自題海漁亭二首波濤生長處土地屬東隅樹樹縣漁網村村叫鷓鴣酒旗孤嶼見書卷一山無欲趂鷄豚社因慚身業儒屋舍髙低住比鄰活計同笭箵嫌月白螃蟹要霜紅吠犬隨村落賣魚成老翁地鹹耕種少海熟抵年豐海口吟按圖自古無人到二百年來户口添架屋上山成市井張官近海課魚鹽估客趂潮撐米入沒人忍凍采蠔粘仲尼有廟塵誰掃寺觀崢嶸香火嚴題融州城樓除郤譙樓環廨舍蕭條市井客懐悲高高下下山無數淺淺深深江有時大布紅裙猺女著半規白扇野人持城中昨夜亾羊豕聞得誰家虎入籬客中書事千載蠻風尚有存此來聞見不堪論猪膏澤髮湘南婦牛渤塗門嶺右村行客下牀調瘴藥吏人提甕灌蔬園豈無佳麗堪娛目别有凄涼只斷魂真仙洞洞裏清溪可汎舟入觀洞府出髙丘老聃尸解今還在黄帝生前有此不滴乳解添無數幻攜燈何用不曾幽乾坤自大人身小拳石空中作勝遊城山雲霧成佳景天明又幾囘忽攜詩句入别放畫圖開逺樹沈如立行歌去似來小船衝雨過髙柳接湖栽月傍孤青樹名呼怪石臺故園無夢想近擬築嵒隈夜宿延平水東浮橋暫折阻狂瀾懶問津船趂往還雙劒廟前酤酒醉水西燈火水東看戲題宏仲飲亭酒肆老去雖貧有酒壚秫田親種暫時沽閨中不解為慳婦閒問劉郎燕客無盧北山元夕社屋相㤀鼓笛鳴空村步月興堪乘何須更要鼇山立野燒天邊勝著燈送黄欽之赴廣州鹽稅地氣周遭逐處流五羊漸已似中州海風吹斷山無瘴炎月何妨作宦遊陳傅良字君舉溫州瑞安人初患科舉程文之弊思有以矯之其為文章自成一家遂以文名擅當世及入太學與張栻吕祖謙友善東萊為言本朝文獻之序南軒則益以主敬集義之功自是四方受業者愈衆登進士甲科敎授泰州用薦改太學錄通判福州為豪强所中罷官凡五年起知桂陽軍光宗立稍遷提舉常平轉運判官轉浙西提㸃刑獄召為吏部員外郎去朝四十年至是始歸鬚髮盡白都人聚觀嗟歎號陳老郎中因輪對首以寛民力為言帝嘉納且勞之日卿昔安在不見久矣其以所著書示朕退而上周禮說十三篇擢祕監歴檢討實録起居中書舍人㑹光宗不朝重華傅良力諫帝將従之及出至御屏皇后挽帝囘傅良遂趨上引裾后叱之傅良哭於廷后益怒𫝊良下殿徑行改修撰不受寧宗即位召為直院詔與朱熹在外宫觀傅良執奏繳還詞頭為中丞謝㴱甫所劾出提舉興國宫嘉泰二年進寶謨閣待制終于家年六十七諡文節其著述有詩解詁周禮說春秋後傅等書遊白石巖地向東南傾石際滄海立蛟鼉限波濤鷄犬得城邑居然通國望跋莫他山及道人獨有之置屋三四級幾看星月爛卻聽風雨急于今二百年我共㝠鴻集晤語夕陽低對酒秋旻溼送葉正則赴浙西憲幕頻年送行客酒罄詩不工冣晩與君别奈此百感叢岐山有鳴鳳雅頌移豳風于時二老生出處海上同曹劉對匕箸失色一語中明朝蜀江水不與灞滻通人心起毫末世故關鴻濛乃知貧賤交不下王霸功霜根宿病驥雲帆背蜚鴻秋水能隔人白蘋况連空相從自束髪各去隨轉蓬今懐欣有合後㑹苦未重鱸魚直萬錢羊酪倍一鍾願君養盛年我友半已翁借書一首别薛子長曲阿著柴扉陋甚誰盤桓美人此何求巨竹數十竿日閱書百篇尚覺目力寛欲從我借書我書何足觀辛勤抱遺經及此鬢髮斑一語未領㑹累日不自安雖更聖人手亦恐衆説漫况復秦漢下曾莫修與刪致之獲麟前存者今若干我無所取裁望洋久空歎讀書固匪易窮理良獨難昨夜荷堤上嘗試及孟韓此語如涓埃此道如丘山張漕行部過湘岸有作因次其韻春晩得新霽草木日夜綠陽光初蔽虧野暝或單複美人浮湘波領此入蓬屋故放歸帆遲更呼漁火續窮探物精華盡付詩凡目憶昨欣晤對令我㤀休沐劇談酒行希危坐兵衛肅相思正倚樓所寄忽累幅瑰辭買堪貧軼韻和難屬自従楚騷興悲些逮差玉後來數唐人欵乃巖隈宿世無梁昭明斯文又誰錄送郭希呂我門閉重重我徑阻且深梅花獨相依聊以慰我心美人從何來﨑嶇自幽尋亦于琢氷中而和南風琴菜甲尚可羮新篘足同斟不知嵗已華歸興生霜砧欲别復少住棲鳥歸月林客去鳥翾飛落花滿墻陰送趙叔靜敎授閩中讀書須讀經學文須學古青衫故不換白髮早可數我亦窶人子風雨蔽蓬戸胡為數相過夜話恒過午簡友人南去有五嶺北來有重湖水清石益奇往往中州無在昔宦遊者越若韓張徒胡然自衡陽隻雁亦不徂和張倅唐英詠梅二首種梅欲百畝垂老意未渝有山在堂背有溪在庭除我危坐中央花以寘坐隅人固不可親花亦不可疎花芳以養性花蔭以休影更欲從㫄謀種秫可半頃衝寒時一觴我醉花獨醒醉醒兩相㤀久矣繫歸艇春晩書懐奉簡陳益之百舌喜太甚杜鵑恨何深睍睆斯黄鸝律中宫之音物情自不齊天運初無心道人獨領㑹杖藜立芳隂讀范文正公神道碑有感佚事武侯不可致蜀主造其廬公在衰絰中乃上時政書維時君臣定事與草昧殊出處千載同豈必名迹如行伍拔大將寒饑得名儒推轂天下士百年用其餘生平慕河汾未許王魏俱殷勤八司馬意獨何區區自古朋黨論消復莽無期誰令羣疑亾韓富及有為惜哉公不見功名止西陲送謝希孟歸黄巖四首紛紛竹帛傳浩浩金石刻淪亾已無限存亦誰愛惜如何伏羲氏文字二三畫姬孔豈不聖用以演周易法令如牛毛斯鞅信手成簿書積丘山趙張眼愈明萬人立下風國勢尊且榮未省三代前誰獨有此名圭璧襲繅藉山龍飾衣裳不聞燧古初而興自虞唐毁車崇騎射𨽻作篆籀藏至今人便之秦亦忽以亾累觴以為歡班荆以為儀交際貴如此勿使至意虧頗常怪小雅鹿鳴至魚麗賓主禮百拜六經似支離送鮑清卿敎授莆中閩中豈不好莆中况多儒其山有丹茘其水有子魚艾軒諸老生典則故所餘堂堂退傅門海内欲曳裾宦游得此樂餞者酒滿車我亦勸君酒我意獨未舒嘗聞入林獵不可背水漁背水漁尚可背時更崎嶇方今朝廷尊紳笏日走趍官多豈勝記勢逺復易疎媒身衆所同藉口誰不如奈何但溫飽去向天一隅平生拙自謀蓬巷嵗月除更事亦既熟畫此未必愚豈有服茝蘭佩之以瓊琚令人愛不見搔首空踟蹰夷門歌送修德還闕萬古江入海吳蜀有不通不通誰使然人自為異同昔在李孟錢士各懐土封靜言彼何尤亦各徇所忠恭惟宋受命三姓皆朝宗斯文已百年名世纔數公眉山與金陵奈何不相容大雅如關洛亦復互詆攻朋分文字間禍起師友中四郊忽戎馬塵滿夷門宫往事已覆轍後事如飄蓬一飯㤀苦饑一褐㤀苦冬身謀每不長王事靡有終有客獨惻惻萬里興深衷相過話離合歴歴繇熈豐我久世慮薄念之涕無從貧賤將安歸功名在其逢有能用斯人可使百阻空西人不為西東人不為東送范憲東叔帥潼川相從意氣豪相知鬢毛斑細說竟昨非淺斟始今歡每懐吾黨多未救此世難一則琢氷雪再則紉芝蘭騷人絶芳潔孰與風人寛水仙花江梅丈人行嵗寒固天姿蠟梅微著色標致亦背時胡然此柔嘉支本僅自持迺以平地尺氣與松篁夷粹然金玉相承以翠羽儀獨立萬槁中氷膠雪垂垂水仙誰强名相宜未相知刻畫近脂粉而况山谷詩吾聞抱太和未易形似窺當其自英華造物且霽威平生恨剛褊未老齒髪衰掇花寘膽瓶吾今得吾師送同年林多益丞寧海同里衣冠近濶疎同年齒髮多衰變美人宜在玉筍班隠吏亦隨花雨縣有杭一葦逢迎可每食雙魚甘㫖便顧瞻周道竟何如善為身謀吾豈願清廟笙鏞濟濟陳碧梧鸞鵠深深見由來盛事嵗月晩誰到修途肝膽健楊花吹水酒搖波一請加餐再無倦赴桂陽道中喜晴書事十日九雨垂垂雪馬僵僕病泥乘橇披衣闖戸得星月耳根久與朝雞别熟睡八年謀未拙乞米作糜䝉被啜客來午漏家僮出如今兒噭妻愁絶我縦喜晴心已折可以藝麻多筍蕨茍有一丘吾計决柰何諸公厮役皆豪傑尚愛舂陵老元結送宋國博叅議江東分韻得夜字前年上幸學一時同舍今去略盡為之悵然南門供帳江上亭北門觴酒湖邊榭兩年出餞略可數往往行人半同舍憶昔翠華臨璧海儒先一日爭聲價蘇君舌掉巫峽水楊君氣奪幽并夜黄君石矻不可轉夫子居然古彞斚艾軒風流天下少獨奏咸韶無濩夏黄粱未熟事如許白髮不生心亦怕古來賢俊多坎軻道與世違胡足詫武皇好少臣已老孟子尊王君尚霸嗟乎夫子幸遭時諸公滚滚皆流亞德尊不過五品薄嵗晚曾無一飯暇君恩豈必間湖海家事姑惟問桑稼此行端可振頽俗令我短轅今欲駕送沈元誠赴臨漳主簿誰說鄉先進能無沈隠侯青衫今適越白髪竟依劉道固為名累人當與命謀三台行漸近且勿問歸舟和張孟阜嵗旦韻白髮朝看鏡青燈夜數更文章輸善宦名字誤浮生廢學兒鼾睡安貧婦饁耕従今定逢吉吾已卜先庚月夜書懐二首送客門初掩收書室更虚新篁髙過瓦涼月下臨除婦病纔扶杖兒饞或饋魚今朝吾已過莫問夜何如道德吾何敢功名代有人蒼黄恒畏咎斑白總憂貧細字書全廢深杯酒勿親靜言空自愛萬古亦泯泯送鄭少卿景望知建寧屏廢誠愚分牢愁更索居若逢知巳問猶解課兒書地僻門長閉年饑菜自鉏相望無一字不是故情疎沈元誠歸自臨漳喜而奉寄茘圃班班熟蠔房箇箇肥我雖緣此誤公亦為何歸吏事生衣垢家山減帶圍不無華衮字卿月更光輝村居野衣農圃雜華髮弟兄同佚老便居僻貪閒喜命窮習成杯酌少脫落語言工危坐看流景新萌又落紅牡丹和潘養大韻看花喜極飜愁人京洛久矣為黄塵還知姚魏輩何在但有歐蔡名不泯夕陽為我作初霽佳節過此無多春更燒銀燭飲花露五陵佳氣今方新湖樓送客即事誰家喧騎盍朋簪屋壓城頭水照簷橘柚兩山香盡處蒲荷十里淨相兼愁將久雨春無賴别在明朝酒未厭甚欲去同三四友鱸風更捲一江簾丁端叔送海錯以詩來用韻酬之澤魚山豕各㤀年味可勝窮總所便堪笑荆梧相爼豆遂令蠻觸自矛鋋食無誤蟹車同軌貢不徵蚶澤漏泉我在窮山人迹罕亦䝉惟錯饋甘鮮戊申臘桂陽喜雪月不能明雨郤稀山容野色夜輝輝清霄下際雙瓊闕仙仗前驅萬玉妃亘古嶺㫄冬不到從今湖外嵗無饑來年此日吾何適蓑笠寒江一釣磯遊南嶽天作之山曷為哉遙知閶闔正南開兩川文武長江下百粤車書五嶺來柴望久為周墜典牢愁多見楚遺才不知崧岱還何似我欲將書寄雁囘登祝融峰喜霽仰止扶藜鬢髮蒼恰當風雨暗三湘為誰一闢天無際及我重來日未央江過數州多曲折山緣長畝半青黄老僧耐得從頭問問到呉門竟渺茫和沈帥持要張漕季長韻欲杭一葦近聲光恨不先期燕子涼舊學甘盤聊此日倦遊司馬尚他鄉别從滄海山横斗來自岷峨水濫觴不謂偶成三楚客得為蘭杜附諸香登祝融峰觀日出星月凋零萬象昏誰能先我見朝暾東南已得乾坤正蠻觸方知夜旦分但覺滄溟浮佛屋卻㤀衡嶽近天閽迢迢下憩山腰寺人世浮雲尚吐吞喜雨天顧于人略有情片時收盡越山青老農望外扶犂立倦客愁邊擁被聽塵翳欲清閶闔道井花已上轆轤亭㝠㝠直待黄梅熟未要風池看約萍除夜宿處州天寧寺人言老去不如初我愛初心老轉無懶向門前題鬱壘喜從人後飲屠蘇杯盤甚簡眠須早禮數多寛拜要扶况復齁齁僧紙帳雞人不聽禁庭呼已未上已清明霖霪故作落花天佳節重重倍悵然雖有庭除臨曲水更無尊爼試新烟酴醿雅欲延春賞杜宇還能破晝眠賴得二昆同一客蕨芽蒲筍短檠邊挽尤延之尚書留宿江湖長孫子行藏節節耐人看及為侍從身垂老欲試平生事轉難書就僅題前太史功成方記舊甘盤令人長恨經綸意歴事三朝見一斑和丁少詹明月隋珠忽墮前坐令衰颯意飄然無端太史頭搶地安得揚雄賦上天前輩門墻餘幾在他時竹帛竟誰傳落花流水君愁不南渡于今六十年楊伯子持其尊人誠齋南海集為贈以詩奉酬得與門墻冣不遲白頭方誦嶺南詩文從嘉祐今三變人在廬陵此一時細數儒先能幾見獨憐嵗晩欲何之瀟湘直下長江去得望蓬萊郤更疑送辛卿幼安帥閩長才自昔恨平時三入修門兩鬢絲瓮下可能長夜飲花間卻學晩唐詞澘然北顧關河永簡在西清日月遲乘雁雙鳬滄海上與君從此恐差池幼安詞妙一世而詩句不𫝊良恨事也重陽日寄瑞安劉宰宰以是日宴新第人落帽沾衣總失真追隨茰菊亦勞神酒無肴核依然好家有溪山豈是貧沆瀣從空來夜氣青冥隨處際秋旻不知此是登髙否為問慈恩塔上人上閩帥梁丞相生日二十二韻炎正維中葉皇圖再造年天潢流少海星緯粲台躔臣主嘗難並乾坤豈偶然千齡開厯數一氣付陶甄黄屋傳神器彤庭領衆仙風雲従此㑹日月更誰先昔者求侵地何人賦甫田吳兒感抵掌噲等欲差肩廟論惟多士戎功不在邊一麾分赤社萬事屬青編吾道誠難用諸儒亦自偏才名多濩落經術失拘攣洛蜀何嗟及熈豐竟禍延㫄羅兼雁鶩平步忽貂蟬甚矣知當宁凄其望濟川年來羣老去公在萬民縣定作鹽梅夢行歌杕杜還滄溟宗柱石衡嶽倚蒼𤣥要使垂身後無為慰眼前管絃無算爵桃李未央天魯燕雖堪頌閩山不足鐫中原康濟事彞鼎願聨翩方信孺字孚若興化軍人未冠能文周必大楊萬里見而異之用父蔭補番禺縣尉㑹韓侂胄啟邊釁上意尋悔金亦厭兵乃遣韓元靚來使缺命使往報難其人近臣薦信孺可使自蕭山丞召赴都假宻院參謀官持督帥張巖書通問金廷金帥止于獄中露刃環守之絶其薪水要以五字信孺見左丞相完顔宗浩持辯益力宗浩授以報書而還時年三十仕途偃蹇屢起屢躓自放於詩酒以終題龍隠巖春波飽微綠斗柄函空明方舟貫巖腹鵞鸛相酬鳴仰窺穹窿頂宛轉百怪呈僅餘鱗甲碎不見頭角獰不闖清泠淵演迤萬頃澄但同魚鳥參勿遣蛟龍驚抉苔撫竒篆倚櫂看題名三將標殊勲自與山不傾誰歟贅小築正恐山靈嗔南澗更幽絶仙佛依崢嶸太虚可為室豈復資欒楹乳泉助茗椀中有氷雪清何須驂鸞去此即白玉京鼎來不速客抱琴忽遲迎愛此無絃曲巖溜同一聲為君洗塵耳喚我詩魂醒秖愁白衣到好句無繇成桂州黄潭舜祠西風攪桂樹落日明楓林遊子懐歸期余悲渺登臨虞山一何髙湘水一何深英皇僅枯冢寂寞熏兮琴我欲奏古曲俗耳便哇淫古器不可見聊作相思吟相思長相思相思無古今一歌衆鳥聽再歌萬籟瘖推手君勿歌有酒且孤斟落落此時意寥寥千載心五絃毋庸絶四海誰知音龍隠即事石門元不鎖巖屋本無基九夏花猶在千年樹倒垂僧閒方定起客到每歸遲甚欲眠蓬葉沿崖續斷碑玩珠巖歸舟多載小江春重訪東巖舊履痕挿水峭崖猶有路垂天怪石本無根金華仙伯真知巳薏苡將軍足斷魂安得北山公可作倩渠移取向家園山行二首愛山那惜走千囘生怕前驅後騎催石上參差鱗甲動眼中在處畫圖開驂鸞未辨乘風去浮鷁何妨載雨來人事百年俱變滅秖應題字不塵埃雨脚初收魚尾霞滿溪流水半溪花尋源曾識武陵洞泛宅如浮苕霅家但得嵌空元有路何如峭絶不容車道人辛苦經雲水成塔從來是劫沙遊中隠巖至新洞作尋徧洞天三十六蒼靈獨秘此巖扉旋除野草鉏新逕遮莫寒藤刺客衣嵗月偶同題壁字煙霞似不放人歸把茅欲作開山主已落瞿曇第二機呂聲之字太亨新昌人寜宗朝與陳君舉蔡行之在師友間皆以學行著用恩授平陽丞轉節度推官有沃州雁山草題南巖寺誰把長竿釣巨魚至今蹲石倚空虚蜂房愛向山厓結鳥跡疑從海島居入座翠嵐生晝寂夾川紅樹照春餘任公此去三千載為看芳碑一嘅吁寄太湖黄縣尉立頃談餘袂輒分乖離數數異朋羣君如天揭行空日我亦風吹過嶺雲不許范張同飯黍空慙李杜共論文暌違動涉經年裏碁壘詩壇要䇿勲舒城道中還轅天作十分晴瀉出秋光一𣲖清走筆欲題人到跡揚鞭不住馬嘶聲頃禾晩熟黄雲色籬菊朝含白露英得似淵明便歸去候門童稚出歡迎重陽桐城道中萬古長淮一帶流從來戰地不容休間關千里軍前餉牢落重陽客裏秋悵望白衣來送酒了無黄菊與簪頭何人早斷樓蘭首試解君王宵旰憂西寺留題白石孤雲自在閒紅塵一事不相關寺遮翠靄青蘿外人到落花流水閒欲取錦囊收勝槩慚無玉帶鎮名山白蓮喜結當年社未厭朝來暮便還題龍翔觀曾到龍翔不記年兩峰巍壓水中天潮生潮落青蕪外人去人來白鷺邊四接逺遊僧萬笠重新舊觀屋千椽東南送目秋無際隔㟁人家問釣船桂花獨占三秋壓衆芳何誇橘綠與橙黄自從分下月中種果若飄來天際香清影不嫌秋露白新叢偏帶晩煙蒼髙枝已斷郤生手萬斛竒芬貯錦囊宋元詩㑹卷四十四
