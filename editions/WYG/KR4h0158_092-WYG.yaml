body:
  text: 宋元詩㑹卷九十二兵部主事陳焯編楊維禎下寄韓李二御史同年揚子十年官不調豈無詞賦列時髦青㝠逺隔新持斧雨露猶同舊賜袍共喜諸公當北道却容獨客卧東皋斗牛清夜能回首一道豐城劍氣髙翡翠巢羅浮花使先春到來傍玊樓深處巢舞雪艷翻楊栁絮歌雲輕壓海棠梢屏開時露鴉頭襪絃斷應銜鳯觜膠却笑雪衣娘太劣雕籠深鎖未全教多景樓極目心情獨倚樓荻花楓葉滿江秋地雄呉楚東南㑹水接荆揚上下流鐵甕百年春雨夢銅駝萬里夕陽愁西風歴歴來征雁又帶邊聲過石頭至正二十三年四月淮南王左相微行淞江步謁草𤣥閣夜移酒船宴閣所微行誰識王丞相草履過門如野人太史遙遙瞻紫氣老夫急急裹烏巾子陵故友終辭漢張禄先生又入秦休説五湖天様濶扁舟何處不容身送貢尚書入閩繡衣經略南來後漕運尚書又入閩萬里銅鹽開越嶠千艘升斗買蕃人香薫茉莉春酲重葉撰梹榔曉饌頻海道東歸閒未得法冠重戴髪如銀和盧養元書事中原煙火半丘墟樓櫓相望白下孤蕃厮夜歌銅鈷䥈蠻姬春醉錦廜㢝北征解賦盧才子西事時談劇霸都莫上姓名丞相府老夫著論學潛夫嬉春體五首錢塘湖上作今朝立春好天氣况是太平朝野時走向南鄰覓酒伴還從西墅買花枝陶令乆辭彭澤縣山公祇愛習家池宜春帖子題贈爾日日春遊日日宜西子湖頭春色濃望湖樓下水連空栁條千樹僧眼碧桃花一株人面紅天氣渾如曲江節野客正是杜陵翁得錢沽酒勿復較如此好懷誰與同何處被花惱不徹嬉春最好是湖邊不須東家借騎馬自可西津買蹋船燕子繞林紅雨亂鳬雛衝岸浪花圓叚家橋頭猩色酒重典春衣沽十千今人呼叚橋為斷橋可知其非矣入山十里清凉國三百樓臺迤􅆔開岳王墳前弔東渡隠君寺裏話西來接果黄猿呼一箇探花白鹿走千迴風流文采湖山主坡白應須屬有才楊子休官日日閒桐江新櫂酒船還叮嚀舊客兼新客漫浪南山與北山好懷急就一斗飲佳人能作五絃彈君看此地經遊輩彷彿春風夢未殘又湖州作三首三月三日雨新晴相邀春伴冶西城即倩山妻紗㡌辦更煩小將犢車輕好語啼春秦吉了僊姿當酒董雙成憑君多唱嬉春曲老子江南最有情五十狂夫心尚孩未受俗物相嗔豗興來自控玊蹄馬醉後不辭金當杯海燕來時芹葉小野鶯啼處菜花開春衫已備紅油葢豈怕城南小雨催長城小姬如可憐紅絲新上琵琶絃可人座上三珠樹美酒沙頭雙玊船小洞桃花落香屑大堤楊栁掃晴煙明朝紗㡌青藜杖更訪東林十八僊無題效商隠體二首二月皇都花滿城美人多病苦多情一雙孔雀銜青綬十二飛鴻上錦筝酒掬珍珠傳玊掌羮分甘露倒銀罌不堪容易少年事争遣狂夫作後生一作不堪容易潘郎老争遣施朱作後生天街如水夜初凉照室銅盤璧月光别院三千紅芍藥洞房七十紫鴛鴦繡靴蹋踘誇新技羅帕垂彎鬭艷妝願爾康强好眠食百年歡樂未渠央寄小蓬萊主者聞梅磵并簡沈元方宇文仲美賢主賔羅浮主者是僊才東老諸孫亦俊哉風雨春城花落盡江山故國燕歸來酒盟自有烏巾在笑口應隨皓齒開十八僊人重㑹處劫灰不到小蓬萊次韻奉答倪元鎮坐斷深林事不聞西窓風日愛餘曛舊經髙赤尋三傳新咏山王削五君翠篠侵牀落蒼雪石池洗硯動𤣥雲東鄰書屋最相憶莫遣草堂移浪文富春夜泊寄張伯雨春江大汛潮水長布帆一日上桐廬客星門巷赤松底野市江郊浄雪初柱宿雞籠山頂鶴斗量鮆網壩一作沙頭魚來青小閣在林表故人張燈修夜書懷家揚雄有宅鄭里莊閒丘野水舊耕桑碧山學士銀魚棄錦里先生烏角藏自是秦人齊指鹿未能楚客廢屠羊王侯螘穴一夢覺歸作槐隂審雨堂遊開元寺憇緑隂堂韋郎句中尋晝寂劫灰不盡緑層層鴻文重記青城客内典新傳瀑布僧石佛浮江輕似葉神珠照鉢隠如燈桫欏樹子風前落吹傍恩公舊㲩􅚊音榻登西域毛席大牀前小榻以上香者咏白塔天山乳鳯飛來小東渡衣冠又六朝劫火不焚楊璉塔箭鋒猶抵伍胥潮燐光夜附山精出龍氣春隨海霧消獨有宫人斜畔月多情猶自照吹簫丹鳯樓十二危樓百尺梯飛飛丹鳯五雲齊天垂翠葢東皇近地拂銀河北斗低花靨秋空戎馬静神燈夜燭海雞啼僊童與報麻姑㑹應説蓬萊水叉西夜坐雨過虚亭生夜凉朦朧素月照芳塘螢穿溼竹流星暗魚動輕荷墜露香起舞劉琨肝膽在驚秋潘岳鬢毛蒼候蟲先報砧聲近不待蓴鱸憶故鄉闗山月長城飲馬窟欽馬馬還驚寧知嗚咽水猶作寳刀鳴聞雁篇樓頭聞過雁隻影不成雙一夜狂夫夢相隨到九江歸客誤夜聞歸客騎玊轡鳴匼啑喚婦開西窓秋風響桐葉自君之出矣秋風吹羅幃玊郎思寄衣多情雙絡緯啼近妾寒機燕子詞二首燕子將雛春又深不堪春思似秋心東郊春入車前草蕩子馬蹄何處尋燕子來時春雨香燕子去時秋雨凉鴛鴦一生不作客夜夜不離雙井塘小遊僊二首麻姑今夜過青丘玉醴催斟白玊舟莫向外人矜指爪酒酣為我擘箜篌蓮葉舟髙河漢垂黄姑玊女會佳期玊清乆入衙城洞莫遣成都賣卜知班婕妤長門不用買多才紈扇炎凉善自裁五鬼一言能寤主秋飌愁殺望思臺趙昭儀通僊門裏春晝長侍兒新擁試蘭湯君王空散黄金餅不見宫中赤鳯凰馮小憐前山校獵御同車一笑平陽等戰蝸換得侯衣纔上馬琵琶已屬代王家盼盼塜上白楊今十年樓頭燕子尚流連銅臺多少叮寧恨誰向西陵望墓田西湖竹枝詞四首家住西湖新婦磯勸郎不唱縷金衣琵琶原是韓憑木彈出鴛鴦一處飛勸郎莫上南髙峰勸郎莫上北髙峰南髙峰雲北峰雨雲雨相催愁殺儂石新户下水連空飛來峰前山萬重不辭妾作望夫石望郎或似飛來峰望郎一朝又一朝信郎信似浙江潮浙江潮候有時失臂上守宫無日消呉詠五首曽侍虚皇第二筵鐵僊輕脱故依然江州坐上初相見還識人中孟萬年杜牧尋君苦未遲水晶宫裏舊題詩小鬟莫詠腰如束善唱白家楊栁枝淮南八月雁初過奉使槎迴烏鵲河十里揚州花底散五陵年少已無多江上梅花鐵石心江南腸斷越人吟南垣閣老多情甚才見花開便抱琴黄菊初華客未歸登髙自試苧羅衣真娘墓下好紅葉伍伯祠前多翠微宫詞十二首宫詞詩家之大香奩也不許村學究語為本朝宫詞者多矣或拘於用典故又或拘於用國語皆損詩體天厯間余同年薩天錫善為宫詞且索余和什通和二十章今存十二章雞人報曉五門開鹵簿千官泊帝臺天上駕鵝先有信九重鸞駕上都迴每嵗此禽先駕往迈開國遺音樂府傳白翎飛下十三絃大金優諫闗卿在伊尹扶湯進劇編海内車書混一時奎章御筆寫烏絲朝來中貴傳宣急南國宫娥拱鳯池薫風殿閣日初長南貢新來茘子香西邸阿環方病齒金籠分賜雪衣娘宫錦裁衣錫聖恩朝來金榜揭天門老娥元是南州女私喜南人擢殿元北幸和林幄殿寛句麗女侍婕妤官君王自賦昭君曲敕賜琵琶馬上彈后土璚僊屬内家揚州從此絶名花君王題品容誰並萼緑宫中萼緑􅏞十二璚樓浸月􅏞桐花移影上窓紗檐前不挿鹽枝竹卧聴金羊引小車金屋秋深露氣凉宫監乆不到西廂丁寧莫竊寧哥笛鸚姆無情説短長露氣夜生鳷鵲樓井梧葉葉已知秋君王只禁宫中蠱不禁流紅出御溝十三宫中善詞章長立君王玊几傍阿婉有才還有累宫中鸚鵡啄條桑蛾眉矉處不勝秋長帶芙蓉小苑秋肯為君王通一笑羽書烽火誤諸侯冶春口號二首今年臘底無殘雪却是年前十日春騎馬行春橋上路寒梅花發更撩人呉下逢春春思濃不堪花發館娃宫呉山青青呉水白愁殺江南盛小叢書扇寄玊嵒在瑤芳所書是日食金桃昨日追隨阿母遊錦袍人在紫雲樓譜傳玊笛俄相許果出金桃不外求先生以洪武庚戌夏五月辛丑卒此詩其絶筆也張憲字思亷㑹稽人自號玊笥山人因名其集曰玊笥明成化間全椒黄􅚇特為鏤版所作序言儗諸李杜復出詞雖溢美而詩清新典雅實有可觀荆卿歎白虹貫赤日易水生凄風燕人盡悲憤相送冀城中筑聲何慘慽歌意哀無窮豈不念即往立揕嬴政胸徘徊有所待匪畏秦帝雄自恨劍術疎未易了君事秣馬膏吾車我客乆不至奈何遽相促苦未知人意丈夫重然諾斷臂死不辭但憐樊將軍九泉終見疑咄彼死灰兒曷足同等夷巫蠱使禪襹步搖冠曲裾紗縠衣偉哉燕趙士借問此為誰謁帝登犬臺利口興禍階能令親父子恩愛一朝乖血濺長安城屍横泉鳩里雖族佞臣家不益儲君死望思思不歸至今天下悲請聴三老議兒罪只當笞銅雀妓陵樹曰沈西秋風石馬嘶芳樽傾繐帳詎意溼黄泥慘慘笙歌合遙遙望眼迷玊人脆如草能得幾回啼薄命妾少長深閨裏面不識風吹自為薄情婦懶塗紅玊脂花軒背春睡月樹惱秋思不嫁張京兆敢煩郎畫眉胡姬年十五擬劉越石胡姬年十五芍藥正含葩何處相逢好并州賣酒家面開春月滿眉抹逺山斜一笑既相許何須羅扇遮緑水謠今宵何處月南浦木蘭船半夜凉風起荷花如錦鮮莫剪莖上葉水珠有時圓且留泥下藕要使根株連鴛鴦不並翅好事琉璃脆解佩擲真珠少酬交甫意賣卜翁三月長安道雨過街樹緑下有賣卜翁危坐營握粟舉口講仁義旋式推禍福不學賈大夫憂來方賦鵩雙廟詞睢陽戰敗血漂杵力屈猶思為厲鬼𤣥元祠前哭一聲朝食愛姬暮羅䑕唐家宫殿秋草生二十一陵如掌平獨遺雙廟門前石日有行人來繋牲唐五王撃毬圖興慶宫前春正熱緑楊夾道花如雪毬門風起日西斜五馬歸來汗成血潞州别駕醉眼纈雙袖傾攲擁岐薛申王按鞚宋王馳杖撲毬囊手親挈草平如掌馬力均玊鞭十里不動塵黄門扶入五花帳大衾長枕姁家人花萼相輝雨氣寒樓中歌管漸䦨殘紫騮不踏毬場路萬里青騾蜀道難中秋碧雲師送蟹天風吹綻黄金粟檐前老兎飛寒玊客窓不記是中秋但覺鄰家酒漿熟泖田秋霽稲未鎌葦箔竹籪収團尖紅膏溢齒嫩乳滑脆美簇簇橙絲甜無腸公子誇钁鑠兩㦸前驅終受縛靨心晝煖白玊臍䕫牟夜泣紅銅殻麯生風度亦可憐且對霜娥供大嚼酒後髙歌繞碧雲九峰一夜霜華落青山白雲圖青山青青白雲白一尺小溪千里隔扁舟艤㟁不見人雞聲何處秦人宅桃花流水春粼粼不識人間有戰塵待得紫芝如掌大歸來甘作太平民李嵩宋宫觀潮圖磁州夜走泥馬駒卧牛城中生緑蕪炎精炯炯照呉㑹大築錢塘作汴都玊殿珠樓連翠閣七寳簾櫳敞雲幙生移艮岳過江南不數東京舊時樂茂樹盤盤迷緑雲龍飛鳯舞峰巒奔玊牀下壓大江小海水正入東華門木樨花開秋可數紞紞靈鼉振天鼔海門一線截江來雪壁銀城晝飛舞呉商楚估千萬艘黄龍戰船頭尾髙豈無海道走中土長驅逐北乗風濤煙霧蒼蒼繞城郭屋瓦魚鱗互參錯百萬驕民事醉醺坐使中原盡剗削因循六帝不復讐西風八月凭江樓攢宫人飲白骨恨洪波不洗青衣羞邦基削盡師臣逐軹道人降子嬰哭繡胸文頸踏浪兒反首誰能報君辱廟子沙頭卓大旗天呉縮頸不敢馳行人指塔話楊璉三十六宫秋草飛棲鶴峰遼東失却丁令威赤壁夢裏横江飛明河洲頭槎已爛千嵗去家今始歸晴峰歴歴入雲小獨立秋空望華表華陽真逸上清來鐵笛一聲山月曉蘜潭為顧子順賦盤龍塘下潭如井百尺甘泉氷雪冷瓊英一勺露生香能黒華顛駐光景九月十月天雨霜七十二種分秋芳粼粼曉碧卓倒景白者白玊黄金黄咀蘜之英飲潭緑不數南陽舊甘谷童子開門濯帽紗報道新醅夜來熟周昉横笛圖一婦跨鐙如習騎一婦鵠立類勇士一婦横笛坐胡牀容貌衣裳略相似蓬鬆雲髻作懶妝了鬟手擎紅錦囊人言天寳宫中女我意梨園舊樂倡憶昔承平生内荒宫中消息漸難藏昨宵一曲寧哥笛明日新聲滿教坊春嬌滿眼情脉脉喚起紅桃親按拍不將三弄作伊凉潛把閒情訴秦虢聲悽調低承索索􅒂然有聲如裂帛月落長安天四更六宫一夜梨雲白太真明皇並笛圖黒奴絃索花奴鼔譂奴撫掌閹奴舞阿環自品玊玲瓏御手夷猶親按譜風生龍爪玊星香露溼櫻唇金縷長莫倚花深人不見李謩側足傍宫牆鴻門㑹雲成龍氣成虎椎鼔撞鐘宴真主披帷壯士髪指冠側盾當筵請公舞白髪老臣心獨苦玊玦三看君不語五星東井夜聮珠天狗欃槍落如雨鴻溝咫尺接鴻門千里神騅一夜奔君不見龍泉影裏重瞳瞽玉斗聲中五體分朱虚侯行酒歌長樂宫中女天子盛設賔筵懽戚里百官侍坐莫敢違諸吕諠闐笑聲起御史中丞不紏儀叔孫制作成虚禮朱虚奉勅起行觴手提三尺昆吾鋼田歌聲振野雞伏頸血光寒漢道昌玩鞭亭畸烏壓營營作聲紅光紫電圍金鉦黄鬚小龍馬上笑白首饑豺夢裏驚老奴怒擲珊瑚枕追兵起合琉璃井巴馬東歸疾似風道傍遺糞如氷冷健兒空玩七寳鞭荆臺老姥功誰傳胭脂井胭脂井馮瑙甃琉璃欄黄金轆轤銀綆寒桃花小波下無底雌龍吞怨沈紅水妖姬不作井中鬼玉樹飛花落如雨送鐵崖先生歸錢塘團花染累呉蠶繭五色文綾出金剪海風吹度滕王宫南浦西山畫簾捲天狗夜吠聲如雷東奎西壁昏煤炲上洲自可駕黄犢鐵箸何用畫寒灰牛酥煼花春未老湖上同誰剪芳草真珠酒瀉紫蒲萄金錯刀鐫紅瑪瑙六橋楊栁香霧深呉娃一笑千黄金莫邪不作老龍舞鐵管自成丹鳯吟輭輿就别湖源道江花照人日杲杲長風吹送書畫船先生眼空方醉眠岳鄂王歌君不見南熏門鐵爐歩神矛八丈舞長蛇雙練銀光如雨注又不見鐵浮屠拐子馬斫踁鋼刀飛白霜貫陣背嵬紛解瓦義旗所指人不驚王師到處壺漿迎兩河忠義望風附襄鄧荆湖唾手寧朱僊鎮上馬如虎百戰經營心獨苦賜環竟壞迴天功捲旆歸來卧樞府錢塘宫殿春風輕嬌兒安宴醉未醒徒令功臣三十六舞女歌兒樂太平虎頭將軍面如鐵義膽忠肝向誰説只將和議兩封書往拭先皇目中血將軍將軍通軍術君命不受未為失大夫出疆事從權鐵馬長驅功可必功成解甲面赤墀拜表謝罪死不遲惜哉忠義重山岳智不及此良可悲嗚呼肆讒言加毒手申王心循王口蘄王湖上乘驢走五國城頭帝鬼啼金人相酌平安酒瑤池曲曼倩啼饑桃未熟綺窓珠樹層隂緑上清童子晝臨闗鸞尾掃雲方種玉芙蓉畫䦨春晝長簫韶一𣲖起回廊八龍未暇送周穆三鳥遽能迎漢皇風雨蒼蒼隔𤣥圃不勞西望祠王母贈君桃核大如杯歸植茂陵陵上土玉帶生歌玉帶生端人也事文丞相為文墨賔與同館謝先生翺友善宋革丞相殉國死訃聞生與翺哭於西臺之下復憫宋諸陵暴露私相蓋覆識以冬青木而去後翺道卒生今歸於㑹稽抱遺老人與秋聲子輩為寮中七客初宋上皇以丞相恩賜生紫衣玊帶今不改其舊稱云鸞刀夜割墨龍尾碾作端溪蒼玉砥花鑌鐵面一尺方紫霧文光上書几銀絲雙纒玉腰圍翡翠青斑繡紫衣金星鴝眼不敢現案上墨花皆倒飛景炎丞相魁龍榜撫玩不殊珠在掌背銘刻骨四十四血録至今猶可想謝公古文今所師西臺一慟神血垂獨持老瓦出門去冬青樹邊書憤詞天翻地覆神鬼怒九廟成灰陵暴露廬陵忠魄上騎箕流落端生何所寓抱遺老人生計拙愛把文章寫忠烈霜臺一夜電光飛不必矮桑重鑄鐵寄天香師圓帽頂紅毳方袍搭絳紗海龍邀早飯山鹿進秋花試墨探倭紙尋泉鬭建茶時抛紅豆粒竹下喚頻伽贈西僧西離五印度東渡獨繩橋海若擎雙足天花上七條番經函貝葉飯鉢繋椰瓢回首流沙路程途十萬遙燈下有懷憶昔童婆店髙屯生夕曛樹聲呼出月石角礙回雲野雉穿花見清猿隔澗聞馬頭三四子曾縛故將軍取青樓夜飲戲葉子肅酒令傳觴急燈花囓燭低山人清似水老子醉如泥天黒月墮地水寒星在溪猶吹赤蹄紙照道畫樓西顧野王讀書堆昔聞野王宅今上讀書堆篁竹最深處菊花時自開天風響鐘磬海氣結樓臺回首梁陳事悲歌付一杯寄中山隠講師問訊山中隠中山第幾重風廊巡夜虎雲鉢聴經龍流水千溪月寒巖一樹松無因淨塵滓來共上堂鐘柬顧明府水國差徭重江城廬舍稀曉星縣印出春雨勸農歸官馬哦新月公庭散夕暉欲知通守瘦但視野人肥立仗馬照夜玉狻猊霜毛鐵鑿蹄春風金絡腦小雨錦障泥御駕馳天上軍封受海西日供三品料緘口不聞嘶春登永安寺宿雨忽開霧凭髙散旅愁野煙啼翠鳥庭草卧青牛怪石尖於劍長杉髙過樓尚懷登絶頂東北望杭州天寳詞林甫當朝日韓休罷相時新臺初納婦興慶又生兒玉柵籠鸚鵡金盤進茘枝内前車馬棘無地避諸姨井西丹房葛井西頭更向西丹房髙與白雲齊鉛田虎下飛紅電汞海龍沈結紫泥山鬼俯欄窺火候爐神伏地乞刀圭飲餘一醆中黄酒坐聴鵑聲樹上啼席上得搖字翠館行厨雪乍消牆頭新栁又垂條珊瑚枕煖人初醉鸚鵡籠寒舌未調座上綵鸞珠挿鬢掌中飛燕玉圍腰海棠一夜東風輭落盡雲邊金步搖柬衛處士傍山依水作幽居未減南陽諸葛廬卓行自成髙士傳浮滎不用辟書除烏絲小楷春題畫青簡長編夜著書愧我紅塵走官馬計偕空詣漢公車贈軒轅道士子是彌明幾代孫姓名方使世人聞坐驚星斗生雷劍動使煙霞繞練裙月裏白鸞招子晉山前青虎借茅君長春酒熟朝朝醉髙枕瑤琴卧碧雲留别賽景初暖雲將雨驟隂晴四月羅衣尚未成萬㸃愁心飛絮影五更殘夢賣花聲方空越白承恩厚繡袦諸缺照道明自笑窮途不歸去空懷漫刺闔閭城良宵良宵情緒不堪題立遍䦨千意欲迷鐵撥頓敲壺口破金刀頻剪燭心齊綠分楊栁湘簾細紅壓櫻桃斗帳低彷彿第三橋畔宿月明珠樹夜烏啼次韻江鍊師道人容貌似嬰孩手抉天罡步斗魁拄杖神遊却月觀乘風夜上鍊丹臺劍横秋水蒼龍化衣染春雲玉女裁聞道蓬萊隔東海芙蓉三朶翠成堆投贈周元帥十韻玊帳臨江近金城鎮海遙鼔聲秋動地劍氣夜衝霄露下星河白風髙草木凋山寒旗獵獵沙淨馬蕭蕭左廣初傳駕西船已畏燒五離纔散䑕六博又成梟豪傑乘時奮賢材早見招紫樞虚上座黄闥待清朝㑹見擒奸操歸來醉小喬恩波門外栁長拂富春潮林塘幽十四韻勝境愜幽尋芳塘漾茂林浸天驚滉漾拔地見蕭森隔水時聞磬穿花或聴琴青浮鰲弁小黒直蜃宫深躍藻翻珍鯉争枝墜野禽風回微作籟雲去尚留隂鶴起如迎客龍歸若獻琛蘿房依䕃芘寳筏渡迷沈春雨移舟坐秋霜倚杖吟興惟便枕簟懶欲棄冠簪住乆將忘世觀來已悟心埃塵猶不到榮辱豈能侵天樂朝朝下神燈夜夜臨閻浮那有此大士現潮音佘山道中老樹排雲石逕斜炊煙起處有人家一聲啼鳥春成夏新緑滿汀浮栁花題集賢枯木竹石槎牙老樹響天風寂歴幽篁泣露叢惆悵玉堂舊公子故家陵廟月明中王翰字用文仕元為總管至正末隠閩之永福縣觀獵山聞大明一統詔至自縊死因改呼官烈其子檢討王偁字孟敭亦隠於此有讀書堂在龍泉山小雄澗後父子俱葬此山題潮州􅇿學東亭虚亭倚危磯蒼莽澹無跡幽人時往還濯足坐苔石芰荷露涓涓浦葦風淅淅物性機盡忘上下皆自適遙峰敞空翠落日洞深碧悠然一舒嘯造化亘今昔聖門竟淵邃世路何偪仄遐哉古人心日暮坐相憶送銷子堅北上亂象既無已中心恒不夷翩翩南林鳥厲翮無所依念子將焉如慷慨與我辭西北有名將世秉仁義麾壯哉國士心嘉㑹良在兹江漢有舟檝梁楚多旌旗時焉不我與言念渴與饑明良際昌運允稱平生期題菊我憶故園時遶籬種佳菊交葉長青蔥餘英吐芳馥别來二十載粲粲抱幽獨豈無桃李顔嵗晩同草木及兹覩餘芳使我淚盈掬離披已欲摧瀟灑猶在目雨露豈所偏嵗月不可復歸去來南山粲英坐空谷秋懷縣門扶桑弧丈夫四方績奈何中險艱零落苦相失凉風天際來庭草凄以碧嗷嗷雙飛鴻宵征度寥閴物性既如此予兹念何適寒聲在衣巾心煩百憂集美人隔天涯佳期阻良夕鼎湖詎可招巫咸已難即孤憤不自聊長歌振巖石送别劉子中執手寒江濵慷慨難為别豈無楊栁枝零亂不堪折鴻雁西北來嗷嗷唳晴雪陽和忽已暮旅况轉凄切誰憐蘇子卿天涯持漢節與和仲古心飲分得詩字淵明歸去時不作兒女悲視世如浮雲出處得所宜有酒但歡飲戚戚欲奚為斯人不可見載歌停雲詩題棘石圖烈風號中林極目盡荆棘離離寒月秋莽莽古原夕㝠鴻振髙翮鷦鷯翳深跡奈此貞固姿蒼茫更秋色寫望雲圖寄温陵劉子中開窓見停雲美人别經載以兹一時意聊寄千里佩曖曖春復深悠悠嵗云邁遲爾浩蕩心空山日相待月夜坐悠然軒有懷明月照我懷開窓共幽賞泠泠萬籟秋静夜發清響山川日脩阻之子獨云往長歌耿不寐相思發遐想自决昔在潮陽我欲死宗嗣如絲我無子彼時我死作忠臣覆祀絶宗良可恥今年辟書親到門丁男屋下三人存寸刀在手顧不惜一死了却君親恩送陳同僉馬首出城東將軍膽氣雄旌旗明慘雪笳鼔動悲風早釋三邊恨寧誇百戰功相期春草色處處凱歌同送張子方之江西掾吏自脱京華服知君歎索居海隅清宦在天上故人疎挂壁空長劍探囊得素書更陪驄馬去西望復何如遊枕煙寺石磴招提古松蘿暝不分排雲雙樹轉隔水一鐘聞林影疑殘雨山光倚夕曛醉來歸路逺秋思正紛紛夜宿洪塘舟中次劉子中韻勝地標孤塔遙津集百船㟁回孤嶼火風度隔村煙樹色迷芳渚漁歌起暮天客愁無處寫相對未成眠山房秋夜寄魯客寂寞山居悄相思望轉迷江空寒鴈落樹盡暮雲低生事悲秋草交情憶剡溪西齋愁不寐風雨共凄凄題畫小景萬籟秋聲近雙峰宿靄收江涵林影碎野接曙光浮蘿薜連書幌鶯花避釣舟由來揚子宅寂寞閉丹丘龍湖夜泊小舟眠不得起坐待潮生漏淺壺觴盡江澄巾屨清沿沙除鳥跡隔水逓鐘聲悄似金山夜相看月正明晩眺次林公偉韻偶信東山屐尋幽到翠微白雲空野樹紅葉戀斜暉㟁落潮初滿天寒鴈未歸風塵江海徧不上野人衣靈源洞旭日照髙岑天風振逺林不分滄海色那識白雲心瑤樹空香滿珠林積翠深坐來明月上何處起潮音春日雨中即事京洛繁華事已違懷人竟曰掩空扉望迷楚岫聞啼鴂思入秦川怨落暉野館蕭條芳草合寒江寂寞暮雲飛落花片片隨流水惆悵闗河淚滿衣鴈湖鴈去湖空野水深秋風吹客上遙岑丹楓盡逐孤臣淚黄菊空憐處士心雨後諸峰浮夕靄霜前一葉送寒音停車欲問當年事尺素何由到上林王偁附官烈山晨光照墟里屋下春泉鳴驅牛出東阡且作農事耕不惜筋力劬但願禾黍成遐哉鹿門意千古斯能并遊小雄澗隂島變殘雪新流吐溶溶偶尋一徑徹獨與采樵同兩崖溼花霧泉竅吟天風雲根濯苔髪亂篠相㝠濛盤巖折磴道似覺㝠摉窮石門忽中斷曠望開煙叢蘿雨澤巾屨松桂清心胸了然青川霞照此龍潭空始知人境外别有僊路通宋元詩㑹卷九十二
