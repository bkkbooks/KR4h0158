body:
  text: 宋元詩㑹卷二十三兵部主事陳焯編劉敞字原父臨江新喻人舉慶厯進士廷試第一以編排官王堯臣親嫌改第二通判蔡州直集賢院判尚書考功紏改夏竦謚及爭中貴人議樂時論韙之懽度支判官徙三司使勸帝收攬威權以消天變用同修起居注擢知制誥奉使朔方素習知山川道徑每指㸃致譯者駭服乂能辨彼中異獸朔人敬之如神使還求知揚州多善政嘉祐大袷羣臣議上尊號敞奏止之拜翰林侍讀學士侍英宗講讀每用孝友規上上竦聴改容皇太后聞之亦大喜病眩瞀予告少間求外得汝州旋改集賢院學士判南京御史臺卒年五十敞學問淵博朝廷每有禮樂之事必就取决焉尤長于春秋為書四十卷雜詩效玉川體三首毁巢鳯不至竭澤龍不游賢者有所歸得非龍鳯儔周公下白屋聖德被九州趙禹謝賔客漢朝以為憂澆淳不相襲用舍何其繆茍循一身利不為萬姓謀哀彼杕杜詩死生遺道周鑿井取泉飲上山採薇食豈不信憔悴所願竭我力泉也非難致薇也不易得志士恥徒飽衆人茍所獲犧牲畏芻豢樊籠害羽翼晤理宜在蚤無為晩更惑道薄德亦散功名為時須用力世所賢守正衆云愚智者競蒿目小人復邇圖悠悠三季後此風益已渝安知治未病䑛痔而多車堯舜無能名越哉已矣夫今古路出門道路多縱横不可測我今欲逺行須問曾行客徐徐逢路人借問青松側客曰今何往答之遊京國客乃指要路而言行有益古路雖大道不如今路直伹行今人路猶如假羽翼彼客别我去獨自躊躇立為見今古路信乃無苦忒今路足輪蹄古路多荆棘欲行今人路恐背古人跡欲行古人路今人笑迂僻又儗不出門奈何寒饑逼哀哀此時路悠悠蒼天色不避今人嫌路須行古陌古陌雖然逺且保無蹶失勉哉自勉哉前去難之適不獲見楊朱萬古凝愁魄小孤山驚波觸南崖反怒射北壁蒼山與相排所謂小孤石蟠根萬仞淵聳角千丈碧祠堂豁精嚴行旅進粉澤或云婦女神肹蠁頗有迹吾知定名意似欲旌介特流俗失其真傳聞莫開釋先王秩山川禮典有廟食奈何媚於竈屈已忘正直吾欲為小孤作書解行客復恐不見從嗟哉世多惑示張直温築山必使髙鑿井必使深百工戒淺近盛德羞浮沈焉有尺寸枝能棲垂天禽焉有升斗泉能容横江鱘借兹諭物理足以開君心陋在容不足弱在力不任大道如路然固無古與今雜詩齊有梁丘據晉有樂王鮒據能愛晏嬰鮒欲殘叔譽二臣嬖兩朝事君為悅豫景有尚賢志據逆以為助平失宥善心鮒乃速其去母以據為賢易地則同趣丈夫處世間必有遇不遇豈無覺者乎正色君亦悟區區嬖幸徒何忍就朋附此詩别本作劉攽荒田行大農棄田避征役小農挈家就兵籍良田茫茫少耕者秋來雨止生荆棘縣官募兵有著令募兵如足官胥慶從今無復官勸農還逐魚鹽作亡命漁翁白頭老翁披敗蓑求魚終日罩淮波波深水濶望不絶網目雖繁能㡬何大魚鱣鱏入淵底小魚鯤鯢登網裏手皸足趼吁可憐何不為網大如天過翟方進墓持法雖深上不疑蕭疎何事觸刑機主恩未改天心改使者空乘白馬歸玉津園垂楊冉冉籠清禦細草茸茸覆路沙長閉園門人不見禁渠流出雨殘花李斯墓二世三公何足論憶牽黄犬出東門天心忌滿由來事枉恃沙丘有舊恩劉攽字貢父敞弟也與兄同登科仕州縣二十年始為國子監直講歐陽修薦試館職為中丞王陶所排僅得校勘熙寧中判尚書考功同知太常禮院時詔封太祖諸孫行尊者奉太祖後攽言禮諸侯不得祖天子當自奉其國之祖宜崇德昭德芳之後世世勿降爵使在宗廟祭祀之位即所以尊藝祖也詔如其議考試開封舉人與同院王介爭詈為御史所劾罷禮院又詒王安石書論新法不便斥判泰州稍遷京東轉運使黜監衡州哲宗初入為祕書少監以疾求去蘇軾等奏留之不得加龍圖閣知蔡州數月召拜中書舍人病弗能起卒年六十七攽著書百卷尤邃史學為人疎儁喜諧謔數召怨侮終不能改齊魯齊魯大儒師專門盛章句應物非已長何因責成務乃其忠孝心足以事君父不如商利徒反道趨詭遇剝牀已及膚泉貨山嶽聚賜金再百斤封邑成千戸若無天事變豈不厚且固商鞅既誅夷桑羊亦刀鋸寄言縫衣人施施幸安步上書行仕不至二千石賈不至五百萬此事夸者憂而非志士歎君不見下邳少年受書起幄中運籌制千里功成不受二萬户拂衣歸從赤松子君不見計倪半策誅强呉鴟夷扁舟浮五湖三致千金不自擅至今籍籍宗陶朱大賢富貴不為已心事邈與常人殊逢時致身如反手雲蒸龍變無時無君勿愛上書獻賦稱賢豪刺繡倚市相矜髙丈夫昔曾笑徒勞商賈旦旦爭錐刀茂陵徐生歌茂陵徐生老且迂一心區區長信書拜章北闕三待報意欲霍氏安無虞那知世主心不同積惡未極難為功徙薪曲突事不爾壯侯㡬人當受封髙岸為谷丘淵移魯酒之薄邯鄲圍人生快已各以時舊意望君君不思熙州行帝家將軍勇無敵謀如轉圜心匪席精誠動天天不隔鑿空借籌皆碩畫賈生屬國試五餌買臣邊方發十策偏師倐然盡西海一月三捷猶餘力百蠻解刀慕禮樂五􅇿掃地開城壁蔥嶺陂陀蒲䫫深回笑秦并與禹績尚書論功易等差御史行封自明白武功貤爵十萬金徹侯印組丈二尺奮行過望理自爾少從進熟來無極憶昔漢武開西域天下騷然苦征役哀痛輪臺置肥美割棄造陽損斗僻豈知洮河宜種稻此去凉州皆白麥女桑被野水泉甘呉兒力耕秦婦織行子雖為萬里程居人坐盈九年食熙州歡娯軍事息天王聖明丞相直過淳于髠墓微言動相國大笑絶冠纓流轉有餘智滑稽全姓名師儒空稷下衡蓋盡南荆贅壻不為辱旅墳知客卿金陵懷古次韻虎踞羣山帶遶江為誰興國為誰降髙臺麋鹿看無數廢苑鳬鷖去自雙萬事朝雲隨逝水百年西日照虚牕白門酒美東風快笑數英雄盡一缸和王正仲熙寧郊祀二十韻駿命膺長發鴻圖本慎徽八方星拱極四海日升暉舊典增咸秩彌文示表微聖時均玉燭天統正璿璣南極迎陽復隂泉候氣歸積髙常眷顧昭孝每無違羽衞來雙闕和鑾竝六飛風霆齊命令龍虎㑹旌旂帳殿層城暮金波列宿稀嚴更虚夜鼜雕輦下彤闈廣樂千人唱升烟萬目晞衆神知受記象物競來依陟降兼明察圓方比範圍送音仍鬻鬻畀福想霏霏霈澤蘇羣動春陽暢墐扉慶深周掲厲感極至歔欷多士參鳴玉微生厠皂衣肅雍瞻帝武奉引近天威儒館鵷鸞舊長謠錦繡輝因知子雲賦何足頌巍巍春草春草綿綿未有名水邊原上亂抽縈似嫌車馬繁華地纔入城門便不生詠史自古邊功縁底事多因嬖倖欲封侯不如直與黄金印借取沙場白髑髏寄王荆公青苗助役兩妨農天下嗷嗷怨相公惟有蝗蟲知感德却隨車騎過江東出判泰州題館壁璧門金闕倚天開五見宫花落井槐明日扁舟滄海去却從雲氣望蓬萊黄庭堅上字魯直洪州分寜人幼警悟其舅李常取庭堅架上書問之無不通驚為一日千里舉進士調葉縣尉教授北京國子監留守文彦博才之蘇軾見其文以為獨立物表由是聲名始振哲宗立召為校書郎檢討神宗實録遷著作佐郎擢起居舍人丁母憂哀毁得疾㡬殆服除為祕書丞紹聖初出知宣州改鄂州章惇蔡卞與其黨論實録多誣俾前史官分居畿邑以待問摘既而院吏考閲悉有據依庭堅逢有問則直詞以對聞者壯之貶涪州别駕改黔州再移戎州庭堅恬不介意蜀士從之遊講學不倦徽宗立起知舒州以吏部員外郎召辭不行丐􅇿得太平州尋為執政趙挺之所構羈管宜州徙永州未聞命而卒年六十一初逰􅈞皖山谷寺石牛洞樂之因自號山谷道人云按田河氷積崢嶸山雪晴索寞幽齋怯寒威况復出城郭馬為蝟毛縮人歎狐裘薄淤泥虎跡交叢社烏聲樂橋經野燒斷崖值天風落洩雲迷鴻濛戴石瘦犖嶨攀縁若登天扶服如入槖窮幽至河麋落日更盤礴新民數十家飄寓初棲託壯産無惰農荒榛盡開鑿臨流遣官丁悉使呼老弱恩言諭官意鄣水陂可作春秧百頃秔秋報千倉穫掉頭笑應儂吾麥自不惡麥苗不為稻誠恐非民瘼不知肉食者何必苦改作我行疲鞍馬且用休羈絡艱難相顧歎共道折腰錯勢窮不得已來自取束縛月明夜蕭蕭解衣寛帶索卧看雲行天北斗挂屋角析薪爨酒鼎興至且相酌發舒州向皖口道中作寄李德叟黑雲平屋簷晨夜隔星月曉裝商旅前冰底泥活活野人攘畔耕蹇馬不能滑駝裘惜䝉茸俱落水塘缺孤村小蝸舍乞火乾履襪前登極崢嶸一作髙寒他日飛鳥沒寒花委亂草耐凍鳴風葉江形篆平沙分派囘勁筆髯弟不俱來得句漫剞􅕻一作漫得句奇崛却望同安城唯有松鬱鬱遙知浦口晴諸峰見明雪庚寅乙未舟泊大雷口廣原嘷終風發怒土囊口萬艘萍無根迺知積水厚龍鱗火熒熒鞭笞雷霆走公私連檣休森如束春韭倚笻蒹葭灣垂楊欲生肘雄文酬江山惜無韓與柳五言呻吟内慚愧陶謝手送菜煩鄰船買魚熟溪友兒童報晦𡨕正晝見箕斗吾方廢書眠鼻鼾韝囊吼猶防盜窺家嚴鼔申夜守冶城謝公墩牛渚蕩子婦何時快登臨篙師分牛酒乙未移舟出口畏風濤復入遂宿焉同行有劉三班善射沙夾遇盜劉手殺三人江湖吞天胸蛟龍垂涎口養軀無干金特為親故厚本心非華軒而與馬爭走聘婦緝落毛教兒耨蔥韭衣食端須㡬將老猶掣肘安能詭隨人曲折作杞柳桓公甕盎癭楚國不龜手生涯但如此那問託婚友久隂快夜晴天文若科斗村南鬼火寒村北風虎吼野人驅鷄豚縛落堅纒守劉郎弓石八猛氣壓馮婦一試金僕姑歸飲輭臂酒曉放汴舟秋聲滿山河行李在梁宋川塗事鷄鳴身亦逐羣動霜清魚下流橘柚入包貢又持三十口去作江南夢奉和文潛贈無咎四首龜以靈故焦雉以文故翳本心如日月利欲食之既後生玩華藻照影終沒世安得八紘罝以道獵衆智北寺鎖齋房陳鑰時一啓晁張跫然來連璧照書几庭栢鬱蔥蔥紅榴罅多子時䝉吐佳句幽處萬籟起荆公六藝學妙處端不朽諸生用其短頗復鑿戸牖譬如學捧心初不悟已醜玉石恐俱焚公為區别不吾友陳師道抱獨門掃軌晁張作薦書射雉用一矢吾聞舉逸民故得天下喜兩公陣堂堂此士可摩壘子瞻詩句妙一世乃云效庭堅體蓋退之戲效孟郊樊宗師之比以文滑稽耳恐後生不解故以韻道之我詩如曹鄶淺陋不成邦公如大國楚吞五湖三江赤壁風月笛玉堂雲霧牕句法提一律堅城受我降枯松倒澗壑波濤所舂撞萬牛挽不前公乃獨力扛諸人方嗤㸃渠非晁張雙但懷相識察牀下拜老龎小兒未可知客或許敦龎誠堪壻阿巽買紅纒酒缸贑上食蓮有感蓮實大如指分甘念母慈共房頭􅋾􅋾更深兄弟思實中有么荷拳如小兒手令我憶衆雛迎門索梨棗蓮心政自苦食苦何能甘甘餐恐腊毒素食則懷慙蓮生淤泥中不與泥同調食蓮誰不甘知味良獨少吾家雙井塘十里秋風香安得同裘子歸製芙蓉裳次韻子瞻送顧子敦按河北今代顧虎頭骨相自雄偉不令長天官亦合丞御史能貧安四壁無愠可三已昨來立清班國士相顧喜何因將使節風日按千里汲黯不居中似非朝廷美大任録萬事御坐留諫紙發政恐傷民天步簿冰履蒼生憂其魚南畆多被水公行圖安集信目勿信耳次韻答秦少章乞酒覯朝事鞍馬蚤吏曹文墨拘初無尺寸補但於朋友疎豈知簞瓢子卧起一牀書炙背道堯舜雪屋相與娛步出城東門野鳥吟廢墟頗知富貴事勢窮心亦舒詩來獻窮狀水餅嚼冰蔬斗酒得醉否枵腹如瓠壺亦可召西舍侯嬴非博徒贈秦少儀覿汝南許文休馬磨自衣食但聞􅇿功曹滿世名籍籍渠命有顯晦非人作通塞秦氏多英俊少游眉最白頗聞鴻雁行筆皆萬人敵吾蚤知有覯而不知有覿少儀袖詩來剖蚌珠的皪乃能持一鏃與我箭鋒直自吾得此詩三日卧向壁挽來不能寸推去輒數尺才難不其然有亦未易識次韻謝斌老送墨竹十二韻古今作生竹能者未十輩呉生勒枝葉筌寀逺不逮江南鐵鉤鎖最許誠縣㑹燕公灑墨成落落與時背譬如刳心松中有歳寒在湖州三百年筆與前哲配規摹轉銀鈎幽賞非俗愛披圗風雨入咫尺莽蒼外吾子學湖州師逸功已倍有來竹四幅冬夏生變態預知更入神後出遂無對吾詩被壓倒物固不兩大䟦子瞻和陶詩子瞻謫嶺南時宰欲殺之飽喫惠州飯細和淵明詩彭澤千載人東坡百世士出處雖不同風味乃相似次韻答斌老病起獨遊東園主人心安樂花竹有和氣時從物外賞自益酒中味斸枯蟻改穴掃籜筍迸地萬籟寂中生乃見風雨至顔徒貧樂二首衡門低首過環堵容膝坐四傍無給侍百衲自纒裹論事直如絃觀書曲肱卧饑來或乞食有道無不可小山作友朋義重子輿桑香草當姬妾不須珠翠妝鳥烏窺凍硯星月入幽房兒報無炊米浩歌繞屋梁以椰子茶缾寄德孺炎丘椰木實入用隨茗椀譬如楛石砮但貴從來逺往時萬里物今在籬落間知君一拂拭想我瘴霧顔同宋景瞻分題汴上行東風何時來堤柳芳且柔河冰日已銷漫漫春水流寒梅未破萼芳草緑猶稠歳月不我還念此人生浮髙車無完輪積水有覆舟鹿門不返者誰得從之遊林為之送筆戲贈閻生作三副規摹宣城葛外貎雖銑澤毫心或粗糲巧將希栗尾拙迺成棗核李慶縛散卓含墨能不洩病在惜白毫往往半巧拙小字亦周旋大字難曲折時時一毛亂迺似逆梳髪張鼎徒有表徐偃元無骨模畫記姓名亦可應倉卒為之街南居時通鈴下謁晴軒坐風凉怪我把枯筆開囊撲蠧魚遣奴送一束洗硯磨松煤揮灑至日沒蚤年學屠龍適用固疎濶廣文困虀鹽烹茶對秋月略無人問字况有客投轄文章寄呻吟講授費頰舌閒無用心處雌黃到筆墨時不與人遊孔子尚愛日作詩當鳴鼔聊自攻短闕過家絡緯聲轉急田車寒不運兒時手種柳上與雲霧近舍傍舊傭保少換老欲盡宰木鬱蒼蒼田園變畦畛招延屈父黨勞問走婚親歸來翻作客顧影良自哂一生萍託水萬事雪侵鬢夜闌風隕霜乾葉落成陣燈花何故喜大是報書信親年當喜懼兒齒欲毁齓繫船三百里去夢無一寸過致政屯田劉公隱廬兒時拜公牀眼碧眉紫烟舍前架茅茨爐香坐僧禪女奴煑甖栗石盆㵼機泉今來掃門巷竹間翁蜕蟬堂堂列五老勝氣失江山石盆爛黄土茅齋薪壞椽女奴為民妻又瘞蒿里園當年笑語地華屋轉朱欄課兒種松子􅏛蓋上參天投策數去日木行天再環先生古人風鐵膽石肺肝眼前不可意壯日挂其冠解衣廬君峰洗耳瀑布源霧豹藏文章驚世時一斑衆人初易之久逺乃見難憶昔子政在為翁數解顔五兵森武庫河漢落舌端王陽已富貴塵冠不肻彈呻吟刋十史凡例墨新乾宰木忽拱把相望風隧寒百楹書萬卷少子似翁賢次韻子瞻題郭熙畫秋山黄州逐客未賜環江南江北飽看山玉堂卧對郭熙畫發興已在青林間郭熙官畫但荒逺短紙曲折開秋晚江村烟外雨脚明歸雁行邊餘疊巘坐思黄柑洞庭霜恨身不如雁隨陽熙今頭白有眼力尚能弄筆映牕光畫取江南好風日慰此將老鏡中髪但熙肻畫寛作程五日十日一水石次韻子瞻和子由觀韓幹馬因論伯時畫天馬于闐花驄龍八尺看雲不受絡頭絲西河驄作葡萄錦雙瞳夾鏡耳卓錐長楸落日試天步知有四極無由馳電行山立氣深穩可耐珠韉白玉羈李侯一顧歎絶足領略古法生新奇一日真龍入圖畫在坰羣雄望風雌曹霸弟子沙苑丞喜作肥馬人笑之李侯論幹獨不爾妙盡骨相遺毛皮翰林評書乃如此賤肥貴瘦渠未知况我平生賞神駿僧中云是道林師常父答詩有煎點徑須煩緑珠之句次韻戲答小鬟雖醜巧妝梳掃地如鏡能檢書欲買娉婷供煑茗我無一斛明月珠知公家亦闕掃除但有文君對相如政當為公乞如願作牋逺寄宫亭湖戲呈孔毅父平仲管城子無食肉相孔方兄有絶交書文章功用不經世何異絲窠綴露珠校書著作頻詔除猶能上車問何如忽憶僧牀同野飯夢隨秋雁到東湖以團茶洮州緑石研贈無咎文潛晁子智囊可以括四海張子筆端可以回萬牛自我得二士意氣傾九州道山延閣委竹帛清都太微望冕旒貝宫胎寒弄明月天網下罩一日收此地要須無不有紫皇訪問富春秋晁無咎贈君越侯所貢蒼玉璧可烹玉塵試春色澆君胷中過秦論斟酌古今來活國張文潛贈君洮州緑石含風漪能淬筆鋒利如錐請書元祐開皇極第入思齊訪落詩謝送碾賜壑源揀芽矞雲從龍小蒼璧元豐至今人未識壑源包貢第一春緗匳碾香供玉食睿思殿東金井欄甘露薦椀天開顔橋山事嚴庀百局補袞諸公省中宿中人傳賜夜未央雨露恩光照宫燭左丞似是李元禮好事風流有涇渭肻憐天禄校書郎親敕家庭遣分似春風飽識大官羊不慣腐儒湯餅腸摉攪十年燈火讀令我胸中書傳香已戒應門老馬走客來問字莫載酒聽宋宗儒摘阮歌翰林尚書宋公子文采風流今尚爾自疑耆域是前身囊中探丸起人一作九死貌如千歲枯松枝落魄酒中無定止得錢百萬送酒家一笑不問今餘㡬手揮阮咸送飛鴻促絃聒醉驚客起寒蟲催織月籠秋獨雁呌羣天拍水楚國羇臣放十年漢宫佳人嫁千里深閨洞房語恩怨紫燕黄鸝韻桃李楚狂行歌驚市人漁父挐舟在葭葦問君枯木著朱繩何能道人意中事君言此物傳數姓𤣥璧庚庚有横理閉門三月傳國工身今親見阮仲容我有江南一丘壑安得與君醉其中曲肱聽君寫松風答黄冕仲索煎雙井并簡揚休江夏無雙乃吾宗同舍頗似王安豐能澆茗椀湔祓我風袂欲挹浮丘翁吾宗落筆賞幽事秋月下照澄江空家山鷹爪是小茶敢與好賜雲龍同不嫌水厄幸來辱寒泉湯鼎聽松風夜堂朱墨小燈籠惜無纎纎來捧椀唯倚新詩可傳本出城送客過故人東平侯趙景珍墓令璸朱顔苦欲作留不肻住白髪政爾欺得人嬋娟去作誰家妾意氣都成一聚塵今日牛羊上丘壟當時近前左右嗔花開鳥啼荆棘裏誰與平章作好春王充道送水仙花五十枝欣然㑹心為之作詠淩波仙子生塵襪水上輕盈步微月是誰招此斷腸魂種作寒花寄愁絶含香體素欲傾城山礬是弟梅是兄坐對真成被花惱出門一笑大江横武昌松風閣依山築閣見平川夜闌箕斗挿屋椽我來名之意適然老松魁梧數百年斧斤所赦今參天風鳴媧皇五十絃洗耳不須菩薩泉嘉二三子甚好賢力貧買酒醉此筵夜雨鳴廊到曉縣相看不歸卧僧氊泉枯石燥復潺湲山川光輝為我妍野僧蚤饑不能饘曉見寒谿有炊烟東坡道人已沈泉張侯何時到眼前釣臺驚濤可晝眠怡亭看篆蛟龍纒安得此身脫拘攣舟載諸友長周旋書磨崖碑後春風吹船著浯溪扶藜上讀中興碑平生半世看墨本摩挲石刻鬢成絲明皇不作苞桑計顛倒四海由禄兒九廟不守乘輿西萬官已作烏擇棲撫軍監國太子事何乃趣取大物為事有至難天幸爾上皇跼蹐還京師内間張后色可否外間李父頤指揮南内淒涼㡬茍活髙將軍去事尤危臣結舂陵二三策臣甫杜鵑再拜詩安知忠臣痛至骨世上但賞瓊琚詞同來野僧六七輩亦有文士相追隨斷崖蒼蘚對立久凍雨為洗前朝悲送王郎酌君以蒲城桑落之酒泛君以湘纍秋菊之英贈君以黟川㸃漆之墨送君以陽關墮淚之聲酒澆胸中之磊塊菊制短世之頽齡墨以傳千古文章之印歌以冩一家兄弟之情江山萬里頭俱白骨肉十年眼終青連牀夜語鷄戒曉書囊無底談未了有功翰墨乃如此何恨逺别音書少炒沙作糜終不飽鏤冰文章費工巧須要心地收汗馬孔孟行世日杲杲有弟有弟力持家婦能養姑供珍鮭兒大詩書女絲麻公但讀書煑春茶伯時彭蠡春牧圖岳陽樓上春已歸湖中鴻雁拍波飛布帆天濶隨鳥道石林風晩吹人衣春水初生及馬腹浮灘欲上西山麓遙看絶嶺秀雲松上有垂蘿暗溪谷沙眠草嚙性不驕側身注目鳴相招林間瞥過星爍爍原上獨立風蕭蕭君不見中原真種邊塵沒南行市骨何倉卒秖收力健載征夫肻向時危辨奇骨即今貢馬西北來東西坊監屯雲開紛然駑驥同一秣爾可不憂四蹄脱戲贈彦深李原字彦深厚之弟居南陽李髯家徒立四壁未嘗一飯能留客春寒茅屋交相風倚牆捫蝨讀書策老妻甘貧能養姑寧剪髪鬟不典書大兒得餐不索魚小兒得袴不索襦庾郎鮭菜二十七太常齋日三百餘上下分膰一飽飯藏神夢訴羊蹴蔬世傳寒士有食籍一生當飯百甕葅㝠㝠主張審如此附郭小圃宜勤鋤蔥秧青青葵甲緑蚤韭晩菘羮糝熟充虚解戰賴湯餅芼以䓑虀與甘菊㡬日憐槐已著花一心呪筍莫成竹羣兒笑髯窮百巧我謂勝人飯重肉羣兒笑髯不若人我獨愛髯無事貧君不見猛虎即人厭麋鹿人還寢皮食其肉濡需終與豕俱焦飫肥擇甘果非福蟲蟻無知不足驚横目之民萬物靈請食熊蹯楚千乘立死山壁漢公卿李髯作人有佳處李髯作詩有佳句雖無厚禄故人書門外猶多長者車我讀揚雄逐貧賦斯人用意未全疎和謝公定征南謠傳聞交州初陸梁東連五溪西氐羌軍行不斷蠻標質謀主皆收漢畔亡合浦譙門腥血沸晉興城下白骨荒謀臣異時坐致冦守臣今日愧苞桑已遣戈船下灘水更分樓船浮豫章頗聞師出三鵶路盡是中屯六􅇿良漢南食麥如食玉湖南驅人如驅羊營平請穀三百萬祁連引兵九千里少府私錢不可知大農計歳今餘㡬土兵番馬貔虎同蝮蛇毒草篁竹中未論芻粟捐金費直愁瘴癘連營空我思荆州李太守欲募蠻丁令自攻至今民歌尹殺我州􅇿擇人誠見功張喬祝良不難得誰借前筯開天聰詔書哀痛言語切為民一洗横尸血摧鋒陷堅賞萬戸塹山堙谷窮三穴南平舊時頗臣順欲獻封疆請旄節廟謀猶計病中原豈知一朝更屠滅天道從來不爭勝功臣好為可喜説交州雞肋安足貪漢開九􅇿勞臣監呂嘉不肻佩銀印徴側持戈敵百男君不見往年瀕海未􅇿縣趙地閉闗罷朝獻老翁竊帝聊自娛白頭抱孫思事漢孝文親遣勞苦書稽首請去黄屋車得一亡十終不忍太宗之仁千古無次韻子瞻春菜北方春蔬嚼冰雪妍㬉思采南山蕨韮苗水餅姑置之苦菜黃鷄羮糝滑蓴絲色紫菰首白蔞蒿牙甜蔊頭辣生葅入湯翻手成芼以薑橙誇縷抹驚雷菌子出萬釘白鵝截掌鼈解甲琅玕林深未飄籜輭炊香秔煨短茁萬錢自是宰相事一飯且從吾黨説公如端為苦筍歸明日青衫誠可脱彫陂彫陂之水清且泚屈為印文三百里呼船載過七十餘褰裳亂流初不記竹輿嘔啞山徑凉僕姑呼婦聲相倚篁中猶道泥滑滑僕夫慘慘耕夫喜窮山為吏如漫郎安能為人作嚆矢老僧迎謁喜我來吾以王事篤行李知民虛實應縣官我寧信目不信耳僧言生長八十餘縣令未曾身到此長句謝陳適用惠送呉南雄所贈紙廬陵政事無全牛恐是漢時陳太丘書記姓名不肻學得紙無異夏得裘琢詩包紙送贈我自狀明月非暗投詩句縱横剪宫錦惜無阿買書銀鈎蠻溪切藤卷盈百側釐羞滑繭羞白想當鳴杵砧面平桄榔葉風溪水碧千里鵝毛意不輕瘴衣腥膩北歸客君侯謙虛不自供胡不贈世文章伯一涔之水容牛蹄識字有數我自知小時雙鈎學楷法至今兒子憎家鷄雖然嘉惠敢虚辱煑泥續尾成大軸寫心與君心莫傳平生落魄不問天樽前花底幸好戲為君絶筆謝風烟已無商頌猗那手請續南華内外篇和曹子方雜言正月尾垂雲如覆盂雁作斜行書三十六陂浸烟水想對西江彭蠡湖人言春色濃如酒不見挿秧呉女手冷卿小塢頗藏春張侯官居柳對門當風横笛留三弄燒燭圍棋覆九軍盡是向來行樂事每見琵琶憶朝雲只今不舉蛾眉酒紅牙捍撥網蛛塵曹侯束書丞太僕試説相馬猶可人照夜白真乘黄萬馬同秣隨低昻一矢射落皁雕雙張侯猶思在戎行横山虎北開漢疆冷卿智多髪蒼浪牛刀發硎思一邦政成十綴舞紅妝兩侯不如曹子方朶頤論詩蝟毛張龜藏六用中有光何時端能俱過我掃除北寺讀書堂菊苗煑餅深注湯更碾盤龍不入香奉謝劉景文送團茶劉侯惠我大𤣥璧上有雌雄雙鳯跡鵝溪水練落春雪粟面一杯增目力劉侯惠我小𤣥璧自裁半璧煑瓊糜收藏殘月惜未碾直待阿衡來説詩綘囊團團餘㡬璧因來送我公莫惜箇中渇羌飽湯餅鷄蘇胡麻煑同喫謝景文惠浩然所作廷珪墨廷珪贗墨出蘇家麝煤添澤紋烏鞾柳枝瘦龍印香字十襲一日三摩挱劉侯愛我如桃李揮贈要我書萬紙不意神禹治水圭忽然入我懐袖裏吾不能手抄五車書亦不能寫論付官奴便當閉門學水墨灑作江南驟雨圖阻水泊舟竹山下竹山蟲鳥朋友語討論隂晴怕風雨丁寧相敎防禍機草動塵驚忽飛去提壺歸去意甚真柳暗花濃亦半春北風㡬日銅官縣欲過五松無主人和舍弟中秋月髙秋搖落四十五清都蚤霜凋桂叢纎塵不隔四維淨寒光獨照萬象中少年氣與節物競詩豪酒聖難爭鋒桓伊老􅂹思千里尚能三弄當清風廣文陋儒嬾於事浩歌不眠倚梧桐百憂生火作内熱何時心與此月同後生晩出不勉學從漢至今無揚雄天馬權奇大宛種吾家阿熊風骨聳言詩已出靈運前行身未聞孟軻勇明牕文字不取讀蜘蛛結網塵堆壅少壯㡬時夏已秋待而成人吾木拱憐汝起予秋月篇我衰安得筆如椽但使樽中常有酒不辭座上更無氊把詩問字為汝説便當侯家歌舞筵韓信為黄㡬復作韓生髙才跨一世劉項存亡翻手耳終然不忍負沛公頗似從容得天意成皋日夜望救兵取齊自重身已輕躡足封王能蚤寤豈恨淮隂食千戸雖知天下有所歸獨憐身與噲等齊蒯通狂説不足撼陳狶孺子胡能為予嘗貰酒淮隂市韓信廟前木十圍千年事與浮雲去想見留侯决是非丈夫出身佐明主用舍行藏可自知功名邂逅軒天地萬事當觀失意時以右軍書數種贈丘十四丘郎氣如春景晴風暄百果草木生眼如霜鶻齒玉冰擁書環坐愛牕明松花泛硯摹真行字身藏穎秀勁清問誰學之果蘭亭我昔頗復戲墨卿銀鈎蠆尾爛箱籯贈君舖案黏曲屏小字莫作癡凍蠅樂毅論勝遺敎經大字無過瘞鶴銘官奴作草欺伯英隨人作計終後人自成一家始逼真卿家小女名阿潛睂目似翁有精神試留此書他日學往往不減衞夫人宋元詩㑹卷二十三
