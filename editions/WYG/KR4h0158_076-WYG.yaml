body:
  text: 宋元詩㑹卷七十六兵部主事陳焯編楊載字仲𢎞建之浦城人後寓杭因占籍焉載少孤博涉羣書為文有跌蕩氣年四十不仕户部賈國英數薦於朝以布衣召入翰林授國史院編修調管領海船萬户府照磨延祐初仁宗設科取士載首應詔遂登進士第授饒州路同知浮梁州事遷寧國路總管府推官以卒載所撰述人多傳誦之其於詩尤有法嘗語學者曰詩當取材漢魏而音節則以唐為宗故同時作者得其指授為多焉偶題叢生園中草蔚蔚媚幽姿乗時各敷榮皓色被緑枝似有微香發秋風輒吹之入人襟袖中亦復可憐兹詰朝步荒畦莖葉稍離披飄零即已矣霜露不爾私榮悴既有時小大何異而幸愛七尺軀天道不可誣題文丞相書梅堂大厦就傾覆難以一木支惟公抱忠義挺然出天姿死既得所處自顧乃不疑惻愴大江南名與日月垂我行見遺墨再拜墮涕洟名堂有深意亦惟嵗寒枝可知平昔心慷慨非一時峨峨著檐宇昭昭示民彞勿使風雨敗永慰千古思次韻袁伯長盤盤海底石並樹青琅玕至陽生至陰龍宫常苦寒揚光炫朝彩吐氣蒸微瀾根株歴千載莫測榮悴端端如巢居子草木皮衣冠超然去人羣取友蹄與翰日誦黄帝言浩歌淚䦨干奈何天下治必以雲為官佩紉黄金環咀丹白玉盤自聞至人徳積熱生肺肝黄塵日暮起對面不相看三山在何處使我師王韓聊歌紫芝曲倚君清夜彈靈龜篇為陳渭叟作馬尊師所畫芝龜也蒼龜生中山深阻絶中道不飲亦不食靈和中自抱嵗久凝神液巖上産芝草支干集五采相射顔色好彼遊江海上作計苦不早一罹豫且網性命莫能保歸遺宋元君天意資探討築宫修祠祭相承以為寶神者固如斯遺骨易枯槁吾聞䝉莊氏苦語欲相曉持為衛生經千載長不老次韻景逺學士立春日三首古來有道士聲利不寘懐顧於草木微而愛松若梅茲辰閱庭户適逢數花開芳意未渠央是足銜吾杯人事重名實趨嚮盡百端丈夫負雄氣動欲追古賢於意少不惬自放江海邉登髙望八極雲氣生我前萬事何足問所須唯酒錢﨑嶇既山曲迢逓亦水濱幸見蓬葦士輒復忘為勤得之眉睫間我遇固以神所善但樓䕶豈暇從若人贈執中允上人南方多白雲澶漫塞崖谷中有龎眉叟寂寞臥林屋前門樹高松後户植幽竹梵文五千卷誦說盡精熟時時發清唱鏗鏘擊金玉伊余走海内一見輒歎服願言從之遊淡泊心自足古牆行建炎白馬南渡時循王以身任安危疏圃治第壯輿衞縮板載榦由偏裨下鍤江城但沙鹵往夷赤山取焦土帳前親兵力如虎一日連雲興百堵引錐試之鐵石堅長城在此勢屹然上功幕府分金錢讙聲如雷動地傳爾來瞬息踰百年高崖為谷驚推遷華堂寂寞散文礎喬木慘淡栖寒煙我入荒園訪遺古所見唯存丈尋許廢壊終嗟麋鹿遊飄零不記商羊舞王孫欲言淚如雨為言王孫毋自苦子孫再世隳門户英公尚及觀房杜如君百不一二數人生富貴當自取況有長才文甚武公侯之後必復初好把家聲繼其祖李伯時畫浴馬圖古稱難畫莫如馬近朝唯數李伯時不至天閑觀帝服如此骨相何由知頭類渴烏尖挿耳竟度流沙輕萬里圉人牽浴恒凛然復恐化龍奔入水貧居里巷無馬騎徒步出入多傷悲大脛薄蹄何足願退立道旁塵滿面題華岳江城圖華岳能詩世有名學畫丹青亦豪放此圖以寫安慶城雉堞樓臺儼相向北風將至江面黒千艘萬艘爭避匿滄溟涌溢水倒流南嶽動搖天柱側蛟龍戲落秋潭底素練平鋪八千里時清好作釣魚翁閒弄輕舟煙霧裏神馬歌次韻陳元之神馬來自崑崙西有足未始行沙泥朝趨欲出飛鳥上夕逝直與奔星齊緑鬃半散挿雙耳赤汗交流攅四蹄風神秀猛陿天地豈顧燕蔡并渠黎時時牽浴臨清溪對人誇殺黄鬚奚玉沙之禾中芻秣不嚙堤頭枯草稊與君側耳聴長嘶凡馬不聞生駃騠古劒歌為吴真人作閒閒真人蔵古劒敬之如神不敢忽賓客如來求一觀輒有悲風起倉卒人言此是金鐵精良工鍜煉久始成動搖天地合變化摩蕩日月含光精昔年有蛟起江中口吐烈焰燒長空下民昏溺上帝怒雷電往擊皆無功嘗持此劒斬蛟首流血滔滔浸廬阜傳記傳聞時既久不意世間今尚有吾過下里多惡氛魍魎魑魅能食人請君為我絶此怪一洗宇宙長清新次韻虞彦髙遊陽明洞憶昔神禹奠九州茲山㑹計功始休諸侯玉帛渺何許但見萬水從東流衣冠永閉陽明洞夜聞鬼哭巖之幽珠宫貝闕號龍瑞天造地設非人謀槎牙怪樹凍不死化作千丈蒼玉虬丹洞呀然僊掌裂翠峰巧矣蛾眉脩梅梁飛去鐵鎖斷往往雷雨生靈湫軒轅緱神極秘幻海上笙鶴時相投平生閉門讀史記子乃探穴先吾遊明當挾子騎汗漫題詩更在最上頭不妨山水樂吾樂豈有饑溺憂民憂故家喬木尚可求有子有孫百世留臥横玉簫汎歸舟吹散萬斛江南愁梅梁歌酬鄭集之大禹之功及天地廟有梅梁何足異奈何過用鐵索纒太祝為之欲徼利每言變化失其所去作老龍治風雨一聲霹靂震巖扉千尺蜿蜒辭殿户七月槁苖沾塊土憂殺村中老農户買羊沽酒祭梅梁祭罷祠官傳好語吁嗟老農無爾愚大禹有神焉可誣汝曹淫祀欲求福此物為妖當伏誅題秋雨長吟圖雨暗秋天黒如墨窮居茅屋出不得終日長吟復短吟吟罷令人轉凄惻饑猿抱樹屈雙肘病鶴拕泥垂兩翼何當䇿杖過溪頭要看南山新翠色題信州先天觀圖髙林褰翠氣虚谷散虹光道士多騎虎僊人自牧羊澗泉通地逺山嶺際天長戴子文為記流傳示不忘寄劉師魯想君遊宦處正值洞庭湖落日波濤壯晴天島嶼孤舟航通漢沔風物覽衡巫天下文章弊非君孰起予蠧簡往古韋編在何年始汗青蠧蟲深卜宅蝌蚪少成形泯滅阽秦火􅊧羅出漢廷斯文天未喪不敢望全經斷碑摩挲不成讀上有蘚苔斑字畫鍾王輩文章漢魏間龜趺凋贔屭螭首落孱顔渤海神明逺今同磑石頑初陽臺望月彩雲相羃䍥華露笑嬋姢在水渾疑墮當空孰使縣潜虬精魄動宿鶴羽毛鮮寂寂丹臺夜相從訝得僊送屠存博君往金陵郡於予亦有聞海環平野盡山出大江分未召元司馬誰憐鄭廣文自今師道立章薦必紛紛渡江寄俞仲連舟楫大江濆中流日欲曛鹵翻沙際雪潮落渡頭雲鯨躍常知候鴻飛不亂羣頗思論勝槩把酒莫如君奉題伯父雙峰樵隠二首山出雙峰秀溪流一派清土風存禮讓人事省將迎路逐髙低過田隨早晩耕家林有如此南望每闗情石樹盤根瘦沙溪激浪清竹閒看犢臥木末見人行穯事常分力樵歌輒和聲往來攜杖處不礙白雲生贈胡汲仲先生惟達道久已樂山林致聘無雙璧為家過十金身閒雲出岫髮短雪盈簮遯世原吾志同盟欲自今題拱北樓殷地鼓鞞迎日出倚天梁桷與雲浮北瞻帝闕三千里南控臣藩二百州江海無波沈㒺象旌旗垂野聴貔貅鸞囘麗榜多深意繡衮于今有魏牟題本齋王公畫像詩禮傳家公望隆一門三世拜三公五營帶甲軍容盛九府流泉國賦充房魏素懐尊主術龔黄先奏養民功欲將恵澤量深淺楚浸洋洋與海通錢塘懐古四首山囘禁籞入雲長無復陳兵衞兩廂千古金鍾埋野草萬年珠樹落秋霜龍文不徙陽人聚鳥篆終降枳道旁九市塵埃來袞衮一江波浪正茫茫西湖清濁自天開鴻雁鳬鷗日往來黄道星辰環太乙紫雲宫殿擁蓬萊論文競奏王褒頌獻夀深傾阿母杯九域輿圖今混一百年耆舊獨興衰斜界鉤陳通大道中分魏闕對層巒雲生殿上金爐暗露下庭前玉井寒江漢飛龍俄杳杳滄溟泛鷁竟漫漫中天㑹合寧非數坐見蒼生枕簟安化人宫闕被層阿殿宇髙低若湧波翠石文章題日月寶珠光燄燭山河空桑說法黄龍聴貝葉翻經白馬䭾誰謂一無超衆有只今塵土重來過送袁伯長扈駕罕畢前驅盛國容黄麾僊仗衛重重星流曠野飛蒼鶻日麗層霄馭赤龍耀武邉陲須北狩合祛天地待東封論才孰可銘休烈扈蹕還宜祀岱宗送羅雲叔歸山黄石山原風物幽賤子往年曽一遊舊行檿柘已成徑新藝麻禾應滿疇馮衍能㤀白首歎謝安須為蒼生憂餘杭溪上明日發愁殺楊花吹客舟夀饒國公可樂無如父母全既賢既貴又長年金壺賜出青雲上玉佩朝辭白日邉楚木論春猶五百蟠桃稱夀必三千佀聞黄綺歸來後長向山中作隠僊贈同院諸公詔編國史有程期正是諸郎儤直時虎士守門宫杳杳雞人傳箭漏遲遲忩間夜雨銷銀燭城上春雲壓彩旗才大名稱天下選書成當繼古人為送吴真人具嚴威命領祠官歴祀名山不厭難上帝乗龍遊下土真人騎鶴降靈壇已刋白玉為封檢更鑄黄金作祭冠國夀延洪千萬嵗願祈穀熟小民安寄吏部尚書張公復喜清朝用大賢玉音俄對廣庭宣姚崇已託君臣契李泌終持將相權此日經綸須展布他時簡䇿要流傳淵眀有待公田米可念江湖久棄捐歐陽𤣥字原功其先家廬陵與宋文忠公同所自出曽祖新始遷居瀏陽故𤣥為瀏陽人幼岐嶷母李氏親授孝經論語小學諸書甫八嵗能成誦十嵗從張貫之學即知屬文稍長試庠序輒占高等延祐二年登進士第授岳州路平江同知調太平路蕪湖縣尹改武岡縣尹皆著能聲召為國子博士遷監丞拜翰林待制兼國史院編修官凡制詔書檄皆出其手及奎章閣啟又置藝文監𨽻焉支宗親署𤣥為藝文少監改僉太常禮儀院事歴翰林直學士國子祭酒翰林學士總裁遼金宋三史書成超授承㫖進階光禄大夫以病卒於官年八十五追封楚國公諡曰文有圭齋集若干卷送振先宗丈歸祖庭歐公孫子多擘派以為四暮年歸潁陰非無首丘志乞洪不得請由是懈歸計攷公生平言亦頗憾先世先世多才賢生適逢五季幅員政分裂盡瘁于所事竟乏垂世名盖亦限地勢況復公少孤坎壈蜀漢裔身當混一秋代逢承平際擇里審所安實邇輦轂地子孫託畿内宦轍亦云易人情茍免爾公豈溺聲利詎知汴虡移南北尋暌異一枝先南邁司造有深意沙溪標徳里瀧岡重塋祭至今青原冡十世祀不替振先吾宗英守正恥骫骳誾誾保家法處約不少懟嘉樹無甹枝嘉穀無穂滯原本既不凡時需諒無棄矧今掄俊髦往往論根器老夫辭册府多病久憔悴徒懐薦士心言莫足軒輊賦詩當推轂自愧辭已費憧憧青雲友誰如古人誼為所性姪題小景林廬淡疎煙歸㠶泊沙渚披圖得空濶總是經行處寒屋茒簷古疎烟野樹春遙遙濟川者應是此中人和李溉之舞姬脫鞋吟宫袍繡蹙金花綺紅綃𦂳襯雙鸞尾盈盈漫服舞腰輕綵雲飛處香風起藕絲掣㫁春雲鬆瑞蓮雙結並頭紅夭夭曲曲玉彎卷翠鳬翔空迷近逺玉階秀茁蘭筍長瓊砂迸出蘆芽淺徘徊困倚東風力溼砌香雲墜無跡無限嬌羞不自持君王喚起扶花立題紫㣲老人大字歌紫㣲老人射生手挽强竟取黄金斗驃騎營中拜驍勇鳳凰池上稱耆舊時平腕力無所施筋骨猶能學顔栁縱横戎略結構體殺活兵機屈伸肘山莊劉氏得最多當日襜褕駐應久高樓大扁曰明逺況有愛山并尚友我來後公五十年主人酌我樓中酒平田野水鳬雁集重岡複嶺蛟龍走登高欲賦乏佳興忽覩台躔照牕牖家藏有此希世珍取酒當為主人夀想當洗研弢筆時羽筈生風劍龍吼焉知今人正傳玩名與麒麟同不朽道吳山道吴山頭龍自臥疊嶂重岡深紫邏靈湫瀑布千尺長古寺神杉十圍大崇祠坎坎風雨來樵徑丁丁鴻雁過郡人夜望北斗魁下有突兀青蓮座大圍山大圍山髙髙幾許絶頂嵯峨戴林塢石隙花開自夏春地爐僧擁無寒暑清流白鷴滌羽毛緑樹黄熊引筋膂山腰日午嬰兒啼知有雷公出行雨大明殿早朝扶搖萬里上青霄鳳閣龍池覲帝迢駝背負琛金絡索象身備駕玉逍遙衣冠俯伏傳呼嶽干羽低回看舞韶湖海布衣傳盛事他時田野夢天朝相臺負郭東南裴相臺縁溪一徑踏蒼苔此日城闉少人到當時公府棄官來禪牀象屋留光雨書沼蛙聲噤鞠灰坐待氛塵純斂淨舉頭應解識三台至正壬午十一月十三日祭初祖墓白髮甘泉忝從官歸來曳履上吟壇故山虎豹多文采白水蛟螭有屈蟠謁客及門容屨滿䞇文盈篋借燈看百年省墓償初志心憶先親已痛難送李宜忠之寧州教授廣文家住白芒原唐世忠臣閥閱存寧郡喜迎新博士邦人特重舊王孫楊花絳帳春雲陣苔蘚丹書暮雨痕向使汾陽晞曖在應慚詩禮在名門竹澗圖青林翠巘俯江郊谷口湍流巨石㘭戛玉萬竿鳴水樂垂紳雙瀑盪雲旓風漪靜浸蒼龍影月瀨光搖紫鳳巢歌罷商巖採芝曲兩翁翰墨定神交接花木園丁妙手即花神換葉移枝偽脱真刀剪豈能傷化力色香無復記前身春深自有鸞膠續嵗乆行看鶴膝伸堪笑微生亦如此任呼牛馬定誰人寄有壬許參政京華白髮染塵埃喜見文場閉復開自是曹參當繼相不然王式肯輕來上躬藻火慚無補衆論鹽梅屬有材素志已酬歸欲早相期濁酒坐莓苔西眀道人武昌堤上水雲身三十年來識道人只為漫遊相見少故知臨别贈言頻憧憧車馬紅塵老靡靡江山白髮新邂逅一回頻唱和錦囊千首未為貧昌山昌山峽口日西斜蘭渚維舟近酒家水潄樹根龍露爪石排江㟁虎交牙路迴佛寺藏深塢風動漁舟掃落花再拜靈均獻蘋藻月明環珮下汀沙早飲聴秋居士園池碧池流水緑潺潺髙下樓臺紫翠間阮籍才華勝南族謝安清致滿東山標名花塢鶯爭道集句桃符鹿守闗灑掃園丁今白髮秋翁化鶴幾時還題所貴姪梅老樹縱横出幾條一枝還又亞牆腰西湖湖上掀篷看一夜吹香滿六橋陳摶睡圖陳橋一夜柘袍黄天下都無鼾睡方贏得墜驢閒老子為君眠斷白雲鄉閒展山水手卷十年京國看圖畫半幅雲煙亦惱儂今日身行屏障裏却思移住最高峰東山春景春光澹澹日遲遲正是名園撲蝶時却憶小橋流水過東山春色在桃枝范梈字亨甫一字徳機清江人家貧早孤母熊氏守志不他適長而教之梈聰慧所誦讀輒記憶癯然清寒若不勝衣於流俗中克自樹立固窮守節竭力以養親耽詩工文用力精深人罕知者年三十六始客京師有聲諸公間用朝臣薦授翰林院編修官秩滿擢海南海北道廉訪司照磨遷江西湖東選充翰林供奉改福建閩海道知事閩俗素汚文繡局取良家子為繡工無别尤甚梈作歌詩一篇述其弊廉訪使取以上聞皆罷遣之未幾移疾歸天厯二年詔起用以養親辭是嵗嬰母喪甫朞梈亦得疾卒年五十九所著詩文多行於世節婦王氏妾年時二三始識月團圎十二學女工刺繡如鴛鸞十九嫁夫家事姑施衿鞶夫壻良家兒世籍為王官雖聨朱紫貴不習綺與紈過庭執詩禮開口若驚湍風儀在一時爭作玉人看天地忽降毒摧折青瓊玕囘首四十春景光若流丸貞心守松柏芳性軼芝蘭落月簾帷曙西風機杼寒沈思往昔事淚下紅闌干豪客至茅屋舉家竄林巒入房衛病姑身死白刃攅相向義憐釋視死色無難親知為歎息保社為辛酸欲與上州府為妾旌門闌妾實無所願唯願在所安婦人往從人阿母涕汍瀾送行遺之語敬順無違歡匹偶固有時寧知憂患端辛苦蹈物變豈羡身獨完殷勤謝舊故聞者摧肺肝贈别張清夫還吴新雨不作泥鉤輈樹上啼征夫懐逺路家在太湖西别家今幾度楊栁江邉樹念鄉車輪下漸是中年路萬事中年尚可期人生且莫長别離長别離向何方九河落花青蒲香王睢斑斑鳬乳黄南望不見三髙堂奈此遊子思故鄉我家朱公濟時早功成身退合天道當時未必知者賢挽之不回臥煙島後來閱盡虧成事始識從初去時好我不能赤手縛虹蜺又豈能委身同草木生逢有道世肯受泥塗辱昨者誤奮龍門雷蝘蜓嘲之自云足憂來舉觴酬白日唯有皇天照空谷張公子吴江生我有千載意不羨身後名為君寫作送行曲曲中鏗戛難為情明日買船櫂秋聲亦欲東下窺滄瀛飄然始去白玉京須君禹穴相逢迎相迎不見須相待客行雖遲心不改王氏能逺樓遊莫羨天池鵬歸莫問遼東鶴人生萬事須自為跬步江山即寥廓請君得酒勿少留為我痛酌能逺之髙樓醉捧句吴匣中劒斫斷千秋萬古愁滄溟朝旭射燕甸桑枝正搭虚忩面崑崙池上碧桃花舞盡東風千萬片千萬片落誰家願傾海水溢流霞寄謝尊前望鄉客底須惆悵惜天涯轆轤怨門前水揚聲似雨幽人當牕碧絃語東里征夫去不歸一雙蛾眉鏡中舞年年井上攀轆轤勞心只恐秋葵枯他年種得長生草梅花落盡青青好雲林歌為貢供奉作朝望宣城夕企雲林掃花釣月清我閒心城東之山倚天碧手捫南斗近咫尺幽人築堂面山坐絶似謝公故時宅謝公今何在蒼苔剪行跡調笙誦新詩流水照白石看水作明鏡年光靜來往夜深敬亭雨坐見南湖長清風被長陂鳥度菱葭響雲之林兮不可攀中有青􅆐白鶴相盤桓林之雲兮不可縛時來宿我青檐端昻藏老僊人抱琴臥山側憶在中華時相逢鬢未白問之不笑亦不言阿家中子瀛洲客却起遺我寶字書依稀攝精縛魂魄相期後天無極年笑爾守之合自然御氣還得同飛僊未登雲林堂試作雲林歌嗟我久客意衰邁雲林雲林奈爾何掘塜歌昨日舊塜掘今朝新塜成塜前兩翁仲送舊還迎新舊魂未出新魂入舊魂還對新魂泣舊魂丁寧語新魂好地不用多子孫子孫綿綿如不絶曽孫不掘𤣥孫掘我今掘矣良可悲不知君掘又何時贈别徐教授之欽州冉冉嵗月莫悠悠闗塞長歌鐘凝旅宴舞袖拂征艎到日梅花亂來春蕙草芳南金自昔重寄贈可能㤀和李溉之園居襍咏三首書劍上青霄鄉闗雨雪遙年華侵水竹客思墮山苗㑹想商嵒綺將從鄭里僑文詞誠小技秖比俗情饒豈是幽棲地飛騰亦未量城根分鼠壤池面合魚梁名久喧郎署歌時感女桑畏卿音調苦疇復貴相㤀圃色依簾障天光切户庭草生連夜雨花落遍池星未遂翔寥廓真堪託晦㝠逢時須紫燕得意拂青萍辛酉嵗元日西山千仞鬱崔嵬山下樓臺紫翠開玉帛㑹同來萬國璣衡縣運屬三台嘗聞海客談金鼎更見祠官進玉杯慚愧詞臣今白首久無賦頌獻蓬萊四月十六日東華門奉迎香輿天香曉報出宫城已辦螭頭合樂迎黄鳥低斜衝隊過紫騮疎蕩著班行百王盛祀無遺典萬乗深居有至情最喜快傳湯沐賜禮官識姓未知名送白無咎太守之郡瀟灑中書舊省郎排雲曽攬舜衣裳一麾況復守名郡萬事不如歸故鄉馬首漸違燕闕雨雁聲欲度晉城霜漢廷擇相皆良吏蚤奉潘輿謁建章寄上甘肅吴右丞二首要使明時化逺覃玉門闗下屈征驂多憂總為民心苦有喜唯聞郡姓甘日晩邉沙黄逸逸天晴隴樹碧􅆴􅆴國風不繫秦州外自此西人識召南塞上孤鷹白雪毛塞門風物靜蕭騷黄河西去從天下泰華東來拔地髙枸杞莫將如薏苡醍醐足飲勝蒲萄遙瞻圭袞還舟日正屬江湖心緒勞寄題集賢周司直番陽東下萬山圍魁閣崢嶸面翠微雲接大荒迴古色波涵落木動晴暉宦情靜與遊魚逝詩思長隨夕鳥飛久待倚䦨成獨酌癡兒了事各須歸張留公母山風遙引紫雲車樓閣春深阿母家更五十周重甲子後三千嵗一桃花綵衣故綰封留印白璧新隨使蜀槎見說麻姑舊行處至今源上有丹砂開嵗自違北極向南辰重見東皇似故人合席管絃方殿歳殊鄉花栁覺先春水歸楚澤魚俱化天覆周郊獸亦仁薄宦於時無補報且須康濟百年身草堂草堂不在萬山峰時有幽人步往蹤雨壓牆煙籠薜茘石行渠水鑑芙蓉清名豈讓陶貞白共住猶強陸士龍勿憶雁行天外去歸來期向粤城中送毛鍊師奉祠禮成還京僊官持節下青㝠海瀆嚴祠衛百靈行為治平循禹服禮從禋祀想虞廷東風到處隨神雨南極歸來奏夀星致福要當宣室問鶴書先報白雲扃送别周儀之官錢塘并柬李四秘書武帝龍飛第一春京華相送各沾巾詎知邂逅文身地同是栖遲皓首人山驛蛟眠星滿洞水鄉雁起月迷津若逢李謫南天竺為說前書感謝頻將赴雷陽送羅提舉之任廣東松滋暫泊薊門船復指番禺路幾千茉莉香深和酒露桄榔葉暗煮鹽煙齊人舊算無遺䇿漢史新藏有剰錢莫為遐荒心力怠朱崖更在海南邉以瓊扇一握奉致黄明府拾得炎州月一團殷勤持贈比琅玕情知已是秋風後留作明年九夏寒鍾陵夜宿聞鐘中年江海夢虚皇夜半聞鐘似上陽一百八聲猶未已更兼雲外雁啼霜渡端州峽濯郎得便泝清流忽報舟前曉霧收蠻語酬人翻自苦好山不敢問何州聞東鄰夜歌促拍繁歌沸不停月髙絃語轉明星莫令知有西鄰客獨坐挑燈睂六經薛漢字宗海詩名象峰集擬古二首皎皎機上絲織為遊子衣遊子蕩風塵素衣化成緇風塵不可避四顧将何之豈不念潔白徒重墨子悲勗哉加澣濯河水清且漪娉婷閨中女天質知自愛空懐蘋藻心日月苦行邁蹇修意良勤遲遲如有待未嫁庸何傷失身墜東海送牟伯厚還霅西風起雙鴻渺渺度萬山空林霜霰落各念飲啄難中途忽相失獨留諒無歡極目送㝠飛風雲逸翛翰低囘守羅網自顧形影單奮翅念逺舉天路浩漫漫空想五湖水東風漲波瀾寄余希聲寄語中林友相思又幾朝書雖為路阻夢不怕山遙風定落花慢雨深青草驕人情諒難必不似往來潮枉渚枉渚倚孤櫂意行隨杖藜鷗邉漁艇小牛後牧童低秋色多因樹寒聲半是溪何當買茅屋此地卜幽棲湖上一舸泛霜晴湖波寒更清平堤連野色逺市合春聲塵土浪終日山林負半生囘頭夕陽外煙渚白鷗輕搖落搖落嵗華晩蕭條門巷空黄花數㸃雨紅葉五更風挽鏡徒催老耽書漫得窮親朋頓乖隔幽意若為同送栁湯佐太行盤踞勢嚴嚴五馬初行衆具瞻他日去思應借寇此時來暮正歌廉七賢舊竹風流在萬善新茶嵗貢兼莫謂名邦天稍逺飛龍曽向此中潜送趙虚一降香至南海廬山㑹稽天香分下殿西頭處士今乗使者騶曽是騎麟驂北斗真成跨鶴過揚州山中五老應相識海上三神亦易求勾越東南僊柱觀神光依舊貫林丘睡起巻簾春色上苔衣新水相看近竹扉風動樹枝鳴宿鳥雲收山崦放晴暉舉杯竹葉歸愁去欹枕楊花約夢飛腸斷碧苔溪上路暖風斜日釣魚磯和馬中丞無題詩三首乗槎凖擬逐秋潮却訪成都萬里橋滄海有山皆縹緲青雲無路不迢遙閒居潘岳驚斑鬢歸去陶潜瀨折腰後夜相期明月上露臺髙處弄笙簫驥服鹽車兩耳垂臂無九折未成醫欲尋箕潁終逃世苦恨章逢不入時金井蛩鳴知露冷銀橋鵲度見星移長貧乆客應無補擬挹滄浪塞漏巵良人執㦸侍明光誰與金爐共夕香妝鏡曉寒凝蝶粉舞衣春暖卸鶯簧渡江桃葉應憐我照水荷花宛見郎太息蹇脩無復理空思摻手又縫裳陸景龍字徳陽請名湖峰集榾柮窩安樂窩中興澹然靈根斫得自樵僊地爐伏火春如海雪屋圍風夜似年香透玉酥和芋撥脂流琥珀帶松然任他沈水燒金鴨吹徹參差惱醉眠紙帳溪藤搗雪浄無瑕素箔圍風絶可誇夢入清虚眀月照倦遊廣漢白雲遮繭窩春暖浮銀色鮫室宵分散玉華驚鶴一聲天已豁老夫詩思繞梅花宋元詩㑹卷七十六
