body:
  text: 宋元詩㑹卷五十一兵部主事陳焯編文天祥字宋瑞又字履善吉水人自童子時見學宫所祠鄉先生皆諡忠即欣然慕之年二十舉進士對䇿集英殿一揮萬言文不起草理宗親㧞為第一丁父憂服闋為寧海軍節度判官遷刑部郎中出守瑞州改江西提刑入為尚書左司郎權直學士以草制忤賈似道罷歸遂請致仕時年三十七耳咸淳九年起湖南提刑明年改知贑州德祐初結義兵勤王至臨安除知平江府元兵破常州入獨松關天祥退守餘杭明年正月除知杭州府旋拜右丞相兼樞宻使如軍中講和與巴延抗論􅆏亭山拘之使北行至鎮江天祥夜亾入眞州苖再成迎之商用兩淮兵為興復計㑹有行反間者淮帥疑之其事中阻天祥乃航海達温州行在拜右丞相與陳宜中等議不合乃以同都督出江西収兵入汀州再移漳州進復贑屬諸縣俄而兵潰天祥妻妾子女皆被執天祥収殘兵奔循州屯麗江㑹益王殂衛王繼立天祥上表自劾乞入朝不許因加天祥少保信國公進屯潮陽元帥張𢎞範兵突至執之天祥吞腦子不死𢎞範委曲誘降弗得遂遣使䕶送至燕坐臥小樓三年不屈死年四十七天祥忠義動天地泣鬼神其載宋史本傳者出時宰手多失實惟考指南録庶幾得之山中感興三首載酒之東郊東郊草新緑一雨生江波洲渚失其足青春豈不惜行樂非所欲采芝復采芝終朝不盈掬大風從何來竒響振空谷我馬何𤣥黄息我西山麓山中有流水霜降石自出驟雨東南來消長不終日故人書問至爲言北風急山深人不知塞馬誰得失挑燈看古史感淚縱横發幸生聖明時漁樵以自適桃花何夭夭楊柳何依依去年白鳥集今年黄鵠飛昔爲江上潮今爲山中雲江上潮有聲山中雲無情一年足自念况復百年長但存松栢心天地眞茫茫送行中齋二首秋氣晩正烈客衣早知寒把衣不能别更盡此日歡出門一萬里風沙浩漫漫豈無兒女情爲君思汍瀾百年有時盡千載無殊觀明明君臣義公獨爲其難寧受百折苦願持一寸丹㑹須撫卷人孤燈起長歎神龍蕩失水馴擾終未得威鳯雖在藪肎顧鷄鶩食所以古至人受變心不易亳鼎已遷周西山竟肌瘠豫子身自漆萇𢎞血成碧何嘗怨廢興而或二心跡堅白不在緇羔裘良自惜此義公素明俗見或未識題宣州疉嶂樓初日㷖高樓輕煙在疎樹峨峨遠岫出泯泯清江去簷隙委殘霤屋隅連宿霧薈蔚互低昂熹微分散聚城郭諒非昔山川儼如故童鬢已零落姝顔慰遲暮沉沉澹忘歸欲歸重囘顧東方有一士萬金結遊俠千金買歌舞丹青映第宅從者塞衢路身爲他人役名聲落塵土他人一何傷富貴還自苦東方有一士敗垣半風雨不識絲與竹飛雀滿庭户晨餐或不飽夜夢無驚寤此事古來多難與俗人語送劉其發入蜀秋風凄已寒蜀道阻且長虎狼伏原野欲濟川無梁客從何處來云我之西方蕭蕭驌驦鳴熠熠湛盧光昔時榮蕐地今爲争戰塲將軍揚天戈壯士發戎行江南有羈鳥悠悠懐故鄉駕言與子遊雲天何茫茫發魚臺晨炊發魚臺碎雨飛擊面團團四野周㝠冥萬象變疑是江南山煙霧昬不見豈知此中原今古經百戰英雄化爲土飛霜酒郊甸天寒日欲短遊子淚如霰發陵州中原似滄海萬頃與雲連朝暾欲東出皎月正在天逺樹亂如㸃桑麻鬱蒼煙一雁入高空千鴉落平田我行天地中如蟻磨上旋雨痕留故衣霜氣襲重氊健馬嘶北風潛魚樂深淵噫哉南方人囘首空自憐贈許柏溪惟一長風吹飛藿蜻蛚吟野草流光速代謝興懐令人老遊子中夜起悠悠酣且歌明月委清㷖江湖秋渉多豈無臨淄魚亦有邯鄲酒懐古招王孫登高重囘首正氣歌余囚北庭坐一土室室廣八尺深可四尋單扉低小白間短窄汙下而幽暗當此夏日諸氣萃然雨潦四集浮動牀几時則爲水氣塗泥半朝蒸漚歴瀾時則爲土氣乍晴㬥熱風道四塞時則爲日氣簷隂薪㸑助長炎虐時則爲火氣倉腐寄頓陳陳逼人時則爲米氣駢肩雜遝腥臊汙垢時則爲人氣或圊溷浮屍或腐䑕雜出時則爲穢氣疉是數氣當者鮮不爲厲而余以孱弱俯仰其間于兹二年矣是殆有養致然爾然亦安知所飬何哉孟子曰我善養吾浩然之氣彼氣有七吾氣有一以一敵七吾何患焉况浩然者乃天地之正氣也作正氣歌一首天地有正氣雜然賦流形下則爲河嶽上則爲日星于人曰浩然沛乎塞蒼冥皇路當清夷含和吐明庭時窮節乃見一一垂丹青在齊太史簡在晉董狐筆在秦張良椎在漢蘇武節爲嚴將軍頭爲嵇侍中血爲張雎陽髯爲顔常山舌或爲遼東㡌清操厲氷雪或爲出師表鬼神泣壯烈或爲渡江楫慷慨吞狼穴或爲擊賊笏逆竪頭破裂是氣所磅薄凛烈萬古存當其貫日月死生安足論地維頼以立天柱頼以尊三綱寔係命道義爲之根嗟余遘陽九𨽻也寔不力楚囚纓其冠傳車送窮北鼎鑊甘如飴求之不可得隂房閴鬼火春院閟天黒牛驥同一皁雞栖鳯凰食一朝䝉霧露分作溝中瘠如此再寒暑百沴自辟易嗟哉沮洳場爲我安樂國豈有他繆巧隂陽不能賊顧此耿耿存仰視浮雲白悠悠我心悲蒼天曷有極哲人日已逺典刑在夙昔風簷展書讀古道照顔色贈蜀醫鍾正甫有感炎皇覽衆艸異種多西州爲君望岷峨使我雙淚流向來秦越人朝洛夕邯鄲子持鵲經來自西亦徂南江南有羈羽豈不懐故營何當同皇風六氣和且平有感石郎草草割山川一落人手三百年八州風雨暗連天三皇五帝如飛煙人人野祭伊水邉春秋斷爛不復傳白頭潦倒今魯連夜深危坐日晏眠青原寺二首鐘魚閒日月竹樹老風煙一逕溪流滿四山天影圓無言都是趣有想便成緣夢破啼􅆐雨開元六百年空庭横螮蝀斷碣偃龍蛇活火叅禪筍清泉透佛茶晚鐘何處雨春水滿城花夜影燈前客江西七祖家翠玊樓昏鴉何處落野渡少人行黄葉聲在地青山影入城江湖行客夢風雨故鄉情試問東南信梅花三兩英皁蓋樓一水樓臺遶半空圖畫開蝸涎行薜荔雀影上莓苔碧落人千載青山酒一杯晚煙看不盡明日卻歸來長溪道中和張自山韻夜静呉歌咽春深蜀血流向來蘇武節今日子長遊海角雲爲㟁江心石作洲丈夫竟何事底用泣神州即事去年傷北使今日歎南馳雲溼山如動天低雨欲垂征夫行未已遊子去何之正好王師出崆峒麥熟時英德道中海近山如沃林深屋半蕪乾坤正風雨軒冕總泥途自歎鳶肩薄誰憐鶴影孤少年狂不醒夜夜夢伊吾建康金陵古㑹府南渡舊陪京山勢猶盤礴江流已變更健兒徙幽土新鬼哭臺城一片清溪月偏于客有情眞州驛山川如識我故舊更無人俯仰干戈跡往來車馬塵英雄遺算晚天地暗愁新北首燕山路凄凉夜向晨送曹大著知廣德軍暫屈瀛洲客來臨汭水民山川歸史記岳收屬詞人舘舍朋簪舊都門祖帳新儒林官可紀何止吏稱循題呉城山龍行人鬼外神在地天間彭蠡石砮出洞庭商舶還秋風黄鵠逺春雨白鷗閒雲際青如粟河流接海山文山即事宇宙風煙濶山林日月長開灘通燕尾伐石割羊腸盤谷堪居李廬山乆姓匡知名總閒事一醉櫂滄浪山居和韻白扇揮殘暑青鞋踏嫩晴花牀尋小隱石鼎引長鳴紗㡌有時去酒壺惟意傾山僧痴與坐閒卻瘦彌明病中驟雨知何處一溪秋水生苦吟肩鶴瘦多病耳蟬鳴隱几惟便睡挑書正倦行山深明月夜丐我半窗清别謝愛山君今拂衣去我獨枕書眠一片過林雨數聲當户蟬情長空有恨吟苦不成篇後㑹知何日西風老雁天病愈簡劉小村倦餘心似醉病起首如蓬黄竹斷橋雨白蘋長笛風仙仙鷗屢舞咄咄雁書空孤負秋來眼閒挑㸑下桐曉起逺寺鳴金鐸疎窗試寳熏秋聲江一片曙影月三分倦鶴行黄葉痴猿坐白雲道人無别事抱膝看囘文别里中諸友青山重囘首風雨暗啼猿楊桞溪頭釣梅花石上尊故人無復見烈士尚誰言長有歸來夢衣冠滿故園拜羅氏百歲母之明日主人舉酒客賦詩喜而趂韻翆㣲三島近畫閣五雲横春水鷗聲滑夕陽鴉背明尊前持一笑花下臥餘酲曾見瑶池母不爲虛此生醉清湖上三日存叟獨不在坐即席有懐石鼎吟方透瑶觴醉未䦨疎林花宻綴舊壘燕新安春半湖山好夜深江海寒王孫隔芳草初月正相看題楚觀樓西風吹感慨曉氣薄登臨半壁楚雲立一川湘雨深乾坤横笛影江海倚樓心遺恨飛鴻外南來訪逺音余題鬱孤泉五湖翁姚濓爲之和翁官滿歸里因韻贄别巢龜君住好涌翆我來遲夜雨呼三韭春風試一旗飛花行客夢芳草故人思何日五湖上同看浴海曦天台杜滸字貴卿號梅壑糾合四千人欲救王室當國者不知省正月十三日見余于西湖上余喜其有志頗奬異之十九日客贊余使北梅壑斷斷不可客逐之去余果爲北所留後二十日驅余北行諸客皆散梅壑憐余孤苦慨然相從天下義士也朝㫖特改宣敎郎除禮兵架閣文字仗節辭王室悠悠萬里轅諸君皆雨别一士獨星言啼鳥亂人意落花銷客魂東坡愛巢谷頗恨晚登門聞雞軍中二十日此夕始聞雞塵暗天街静沙長海路迷銅駞隨雨落鐡騎向風嘶曉起呼詹尹何時脫蒺藜平江府樓臺俯舟楫城郭滿干戈故吏歸心少遺民出涕多鳩居無鵲在魚網有鴻過使遂雎陽志安危今若何沈頥家余囘京口北人欵之府中余不得離岸上得沈頥家坐臥北不意余爲遁計也孤舟霜月逈曉起入柴門斷岸行簪影荒畦落履痕江山渾在眼宇宙付無言昨夜三更夢春風滿故園余自皋亭山爲北所留深悔一出之誤聞故人劉小村陳蒲塘引兵而南流涕不自堪只把初心看休將近事論誓爲天出力疑有鬼迷魂明月夜推枕春風晝閉門故人萬山外俯仰向誰言來此持論太烈北愈疑憚不得歸闕將校官屬日有叛去者可歎悠悠天地濶世事與誰論清夜爲揮涕白雲空斷魂死生蘇子節貴賤翟公門前輩如瓶戒無言勝有言發東阿東原深處所時或見人煙秋雨桑麻地春風桃李天貪程頻問堠快馬緩加鞭多少飛檣過噫吁是北船海上天邊青鳥逝海上白鷗馴王濟非痴叔陶潛豈醉人得當須報國可隱即逃秦身世何時定挑燈看劒頻除夜門揜千山黑孤燈伴不眠故鄉在何處今夕是窮年住世眞無係爲囚已自然勞勞空歲月得死似登仙元日慙愧雲臺客飄零雪滿氊不圖朱鳥影猶見白蛇年宫殿荒烟隔門庭宿艸連乾坤自春色囘首一潸然泰和書生曾擁碧油幢恥與羣兒共􅆆降漢節幾囘登快閣楚囚今度過澄江丹心不改君臣誼清淚難忘父母邦莫訝鄉人知我瘦經旬絕粒坐篷窗和中齋韻功業飄零五丈原如今局促傍誰轅俛眉北去明妃涙啼血南飛望帝魂骨肉凋殘惟我在形容變盡只聲存江流千古英雄恨蘭作行舟柳作樊山中即事攜壺藉草醉斜陽白鶴飛來月下雙蘆葉西風驚别浦芭蕉夜雨隔疎窗千年帝子朱簾夢一曲仙人鐡笛腔苦問山翁還瘦否手持漁竹下寒江和韻送逸軒劉民章少日屠龍事已勞送人千里發江濤蓬萊地近風方細閶闔門開日正髙春裏看花須欵欵雨中剪韭且陶陶金吾已辦長安月雙鳯扶雲立海鰲送人往湖南雁拕寒月洞庭邊客路凄凉野菊天雲隔秋樽横北海風吹藜杖落西川夜深鬼火千山雪春後鵑花一樹煙爲我祝融峰上看朝暾白處禮蓬仙和蕭安撫平林送行韻得失元來付塞翁何心桃李問東風人皆有喜榮三仕我尚無文謝五窮秘苑固知朋可正畏途猶恐甲方𠂻欲酬長者殷勤祝坎止流行學四忠過萬安縣青山共折水天平不是南征是北征舉世更無巡逺死當年誰道甫申生遙知嶺外相思處不見灘頭惶恐聲傳語故園猿鶴好夢囘江路月凄清覺海院闍黎鐘後訪團蒲江色漫漫晝欲晡一笛樓邊河滿子千蓑蘆外筆頭奴急風吹雁還家未新雨生濤到海無本是白鷗隨浩蕩野田漂泊不爲孤禪關秋風吹日上禪關路入松花第一彎只願四時煙霧少滿城樓閣見青山雲端半空夭矯起層臺傳到劉安車馬來山上自晴山下雨倚欄平立看風雷陳文龍興化人度宗龍飛之歲擢廷魁第一元兵至興化不屈死有與仲子訣别詩讀者悲之元兵俘至合沙詩寄仲子斗壘孤危勢不支書生守志定難移自經溝瀆非吾事臣死封疆是此時須信纍囚堪釁鼓未聞烈士樹降旗一門百指淪胥盡惟有丹𠂻天地知鄧光薦名剡以字行廬陵人宋亾避兵于廣東香山縣有題烏巖山詩又考其所居在本邑西南七十里遭土㓂妻子俱焚死光薦脫􅋅之烏巖與文天祥同舟唱和信國因序其東海集此宋史所未載者按此邑又有馬南寳者宋景炎二年端宗過此以其家爲行宫南寳竭力保衛宋亾悲憤不食嘗作詩有目撃厓門天地改寸心難與夜潮消之句後聞祥興尚在占城糾兵往迎遇元兵被執不屈而死題烏巖山歲云暮矣可奈何雲愁雨溼隂風多林壑摧殘海驚波慘澹一色無山河哀鴻嗷嗷舊枝柯飛天不容憂虞羅深山短景孤鳥過㑹看明午風日和鷓鴣詞行不得也哥哥瘦妻弱子羸牸䭾天長地濶多網羅南音漸少北語多肉飛不起可奈何行不得也哥哥謝枋得字君直信州弋陽人爲人豪爽觀書五行俱下一覽終身不忘少以忠義自任寳祐中舉進士對䇿極攻宦官奏名乙科除撫州司户參軍即棄去明年復出試敎官中兼經科呉潛宣撫江東西辟差幹辦公事團結民兵以捍饒信因試士䇿問忤賈似道謫居興國軍咸淳三年赦歸德祐元年呂文煥導元兵東下枋得以提刑知信州信州不守乃變姓名入建寧已而賣卜建陽市中有求卜者惟取米屨不受一錢乆之程文海以人材薦辭不起行省參政魏天祐強之而北至京師問謝太后攢所及瀛國公所在再拜痛哭不食死謝劉純父惠木綿布嘉樹種木綿天何厚八閩厥土不宜桑蠶事殊艱辛木綿収千株八口不憂貧江東易此種亦可致富殷奈何來瘴癘或者畏蒼旻吾知饒信間蠶月如岐邠兒童皆衣帛豈但奉老親婦女賤羅綺賣絲買金銀角齒不兼與天道斯平均所以木綿利不畀江東人避秦衣木葉矧肎羞縣鶉天下有元德孔融願卜鄰綈袍望不及共裘志自仁贈我以兩端物意皆可珍㓗白如雪積麗宻過錦純羔縫不足貴狐腋難擬倫絺纊皆作貢此物不薦陳豈非神禹意隱匿遺小民詩多草木名箋疏欲諄諄國家無楚越欲識固無因剪裁為大裘窮冬勝三春拜嘉重感激觸物尤酸辛吁嗟彼寒谷鄒律今不神三宫坐穹廬雨雪或一旬安得遣此惠飛到君王身塞上寒墮指挾纊誰為温人各賜兩端費銀二萬斤大軍四十萬談笑卻邊塵感君道義交何異骨肉親可與知者道衆人笑且嗔玊案未能報瓊琚情則真春秋二百年幣交幾君臣季札有贈好千古尚如新黄禪師華巖分供食有作十兆九萬拜求道心如惔毗盧頂上珠直欲一手探天㕑送誰饌衆腹豈敢貪君有維摩心作繭憐呉蠶八萬四千供只須丈室函昔我聞晨鐘今載草堂柵流年急如梭長歌愧仙籃勇尋趙州關何畏白髮鬖願為䕶法輪金甲持長錟又恐囘道人晚遇黄龍南菖蒲歌有石竒峭天琢成有草夭夭冬夏青人言菖蒲非一種上品九節通仙靈異根不帶塵埃氣孤操愛結泉石盟明窗净几有宿契花林草砌無交情夜深不嫌清露重晨光疑有白雲生嫩如秦時童女登蓬瀛手攜緑玊杖徐行瘦如天台山上聖賢僧休糧絕粒孤鶴形勁如五百義士從田横英氣凛凛摩青冥清如三千弟子立孔庭囘琴㸃瑟天機鳴堂前不入紅粉意席上常聽詩書聲怪石篠簜皆充貢此物舜廟當共登神農多智入本草靈均蔽賢遺騷經幽人耽翫發仙興方士服餌延脩齡綵鸞紫鳯琪花苑赤虬玊麟芙蓉城上界真人好清净見此靈苗當大驚我欲攜之朝上帝太清瑤草不敢專芳馨玉皇一笑留香案賜與有道者長生人間千花萬草儘榮艶未必敢與此草爭高名荆棘中杏花牆東荒蹊抱溪斜荆棘狼籍盤根芽何年丹杏此留種小紅濈濈争春華野人慣見漫不省獨有詩客来咨嗟天眞不到鉛粉筆富艶自是宫闈花曲池芳逕非宿昔蒼苔濁酒同天涯京師惜花如惜玊曉擔賣徹東西家杏花看紅不㸔白十曰忙殺遊春車誰家園裏有此樹鄭重已着重幃遮阿嬌新寵貯金屋明妃逺嫁愁悲笳落花縈簾拂牀席亦有飄泊沾泥沙天公無心物自物得意未用相陵誇黄昏人歸花不語惟有落月啼棲鴉崇眞院絶粒偶書付兒熙之定之并呈張蒼峯劉洞齋華甫西漢有臣龔勝卒閉口不食四十日我今半月忍渴饑求死不死更無術精神常與天徃来不知飲食為何物若非功行積未成便是業債償未畢太清羣仙宴㑹多鳯簫龍笛鳴瑶瑟豈無道兄相提攜騎龍直上寥天一求紙衾避世知無地危身只信天寕持龔勝扇不着挺之綿飬性眞同道知心有宿縁紙衾加罣絮晴日臥雲邉送張子髙歸延平亂世讀書少前人教子難青燈嘗合席紅葉趂歸鞭梅自知春近松應耐嵗寒樓髙新月好後夜與誰看示兒二首門户興衰豈自由樂天知命我無憂大兒安得孔文舉生子何如孫仲謀天上麒麟元有數人間豚犬不湏愁飬男失教父之過莫視詩書如㓂讐千古興亡我盡知一家消息又何疑古来聖哲少才子世亂英雄多義兒靖節少陵能自觧孔明王猛使人悲只虞錯改金根字焉用城南勸學詩題東觀壁二首觀外好看船徃廻觀中㡬度見桃開常瞻紫氣青牛去又帯白雲黄鶴来天地無情搔短髮古今多變付殘盃醉中尚有醒時眼不信玉山人可推老樹猶能識道囬好懐長對碧天開青山緑水何人管明月清風要我来少日曾聞黄石教平生幾擲左慈盃道兄慣見人間事快抱棋枰信手推和曹東谷韻萬古綱常擔上肩脊梁鐵硬對皇天人生芳穢有千載世上榮枯無百年此日識公知有道何時與我詠遊仙不為蘇武即龔勝萬一同歸拜杜鵑魏参政執拘投北行有期死有日詩别妻子良友良朋雪中松柏愈青青扶植綱常在此行天下久無龔勝㓗人間何獨伯夷清義髙便覺生堪捨禮重方知死甚輕南八男兒終不屈皇天上帝眼分明和道士陳天隱豈不逍遥自采眞世間何地可容身碧潭秋月元無物麗日祥風只愛春天上儘多知已友塵中安得見心人赤虬一躍蓬莱近又恐丹丘有宿因題龜峰三十二峰峯最髙脚踏髙處眞人豪近觀靈山一㟝嶁俯視彭蠡無波濤眼明始見滄海濶心逸卻憐人世勞後百千年誰獨立萬古一覽皆秋毫按靈山一名靈鷲在廣信府城西髙七千餘丈送程楚翁逺遊近日人傳庾嶺梅南枝盡落北枝開長安舊日元無此盡是江南人送来春日聞杜宇杜鵑日日勸人歸一片歸心誰得知望帝有神如可問謂余何日是歸期竹新篁娟娟如緑玊瀟然出塵澹無欲清風明月誰主張留得此君在空谷扇蒲葵也觧歸掌握紈素未應捐篋中莫把暗塵涴明月好驅大暑來清風菊淵明豈但隱逸人淵明素懐諸葛志清香不獨占秋天菊潭一滴三千嵗松喬松磊磊多竒節冬無霜雪夏無熱根頭更有千嵗苓知誰可語長生訣花影重重疊疊上瑶䑓㡬度呼童掃不開剛被太陽収拾去又教明月送將来絶粒偶書二首丹府金童善主家百神聽命静無譁從今何必餐松柏但吸日精吐月華龜銜甘露争先到鳯吸醴泉隨後来投在太清仙酒甕道人日飲兩三盃瑞應宫眞人何代結幽棲累世奎章煥紫泥日月髙奔黄道近衡廬旁出玊䋲低江萬里字子逺都昌人少神雋有鋒頴連舉於郷入太學有文聲理宗在潛邸嘗書其姓名於几上以舍選出身教授池州累遷著作郎歴侍御史至權参知政事為賈似道所忌丐祠歸聞樊㐮失守鑿池芝山扁曰止水人莫喻其意及元兵渡江萬里七十六隠草野間為遊騎所執竟赴止水死事聞贈太傅益國公後諡文忠龍虎山鑿開風月長生地占郤煙霞不老身虚靖當年仙去後未知丹訣付何人附天地間集宋末流傳此帙合十七人存詩二十首專為一集題曰天地間集或取詩卷長留之意耶諸人行蹟無從盡考然其篇什得附文謝與則堂先生後又經謝髙士鑒定則平日風尚諒皆可觀故仍之則堂家鉉翁寄江南故人曾向錢塘住聞鵑憶蜀鄉不知今夕夣到蜀到錢唐文山文天祥再見南華山北行近千里廻復迷西東行行望南華忽忽如夢中佛化知幾塵患乃與吾同有形終歸滅不滅惟真空笑看曹溪水門前坐春風逢有道者誰知真患難悟此大光明雲散天仍在風休水自清功名㡬滅性忠孝太勞生此意如能㑹神仙亦可成本心文及翁山中夜坐悠悠天地間草木獻竒怪投老一蒲團山中大自在疊山謝枋得再見武夷山中十年無夢得還家獨立青峰野水涯天地寂寥山雨歇㡬生修得到梅花南谷鄭協溪橋晚興寂寞亭基野渡邊春流平岸草芊芊一川晚照人閒立滿袖楊花聼杜鵑錢塘晚望錢塘江上夜潮過秋靜寒烟白露多呉越青山明月裏舟人齊唱異鄉歌歸田柴望月夜溪莊訪舊山山明月露何處認梅花石色冷疑水溪流白是沙清吟幽客夢華髪故人家相見即歸去已應河漢斜古為徐直方觀水滄江無盡水夜夜隨潮去若復作潮來滄江止不住橫舟何新之秋夜泛舟飛星曵寒影野水淡碧空人生定何物扁舟空影中何年有宇宙生此木末風有力不向上難到蓬萊宫空攀棲鶻巢搔首如飛蓬俯仰慨今昔此懷安可窮石髓王仲素歸去詞種松雨濯髪折筍春墮指長嘯歸去來滄江一天水草堂謝鑰翫月有感入夜茶甌苦上眉眼花推落石牀棊舉頭却恨天邉月顛倒山河作樹枝雲西陸壑退宫人破篋猶存舊賜香輕將魂夢别昭陽只知鏡裏春難駐誰道人間夜更長父母家貧容不得君王恩重死難忘東風二月垂楊柳猶解飛花入禁墻菊屋何天定散䇿獨坐忽不樂出門聊散行溪喧亂人語樹偃碍農耕雨徑莓苔積陽坡草木明道逢九十老相對話承平野䖏王曼之春日郊行出門逢桞色忽過野橋西坐石看潮長隔花聞鳥啼地隨芳草盡樹與夕陽齊不是桃源路行人亦自迷西窻西窻枕寒池池邉老松樹渇猿下偷泉見影忽驚去觀山范協年年年年如燕一還家又訪幽居過水涯風雨滿城春欲暮山中猶有碧桃花東窻吳子文訪隱者不遇道人入山訪道人山深俗朴雞犬馴道人不見道人去􅧑􅆴草木無邉春竹坡韓某采菊擷我百結衣為君采東籬半日不盈掬明朝還滿枝悠然何處是千古正如斯曉山林景怡曉起天雞㺯喔咿殘星在斜漢整衣出幽扉山城漏初斷㣲微水風生冉冉田露散此時遊葛天淡然空百羡海色上寒梢漸識梅花面右附文謝詩十五人内家鉉翁號則堂當元師南下次臯亭宋朝納降時吳堅為左相家鉉翁為叅政賈餘慶劉岊為祈請使北行至北則鉉翁獨得全節拘留河間至元成宗即位之初始賜衣服遣還鄉里年逾八十矣又文及翁字時學號本心綿州人與文山公通譜由進士守淮郡素著清名宋元詩會卷五十一
