body:
  text: 宋元詩㑹卷五十六兵部主事陳焯編谷音集王澮字元佐遼東人澮博學醇行博州刺史迎為師表教授弟子百餘金貞祐中就拜宣撫遼東宰相累書請澮之鎮澮不應浮海遯去河之坊矣河之坊矣截截其平豈曰不力言持其盈國慨覆矣視爾夢夢云胡昊天不終惠我生云胡昊天疾威堂堂輾轉翫日四國卒荒偃仰在位不知匪臧不顧其行有粟有粟亦集於缶則不敢饘抑餬余口誶曰哲矣孰秉其咎知我懮懮不知我疚陟彼南山石其扁矣戒爾勿傷足其趼矣􅊱􅊱㖧㖧顔之靦矣倚余何言涕之泫矣民之種種具曰贅疣弗於爾躬曷云能瘳朂哉夫子保爾有位慎爾為猶感遇四首迅景走北陸髙木交朔風衆情悦妖冶豈云惠其終萬事無不有流轉大化中古來論成敗咄咄魚為龍牛車竄下國勢異情則同蒲姚本狙擊桓桓湯武功彼美二三子一笑清酤空兩虎鬭中野利乃歸衡虞血肉相蹂躪鼓吹行通衢獨倚剛膂力箕踞傾百壺未必非禍福凡百持爾軀吾聞畏虎羆吹竹不枝梧光風蕩繁囿丹緑綴柔柯遊子去萬里空閨歛翠蛾行雲落江水酒盡不成歌雞飛與狗走妾命獨奈何槁梧䝉紱冕崢嶸化侯王􅊡餌先百牢蘭烟浮玉房兒女何所見拜跪色甚莊四海正聾瞽威靈爾翕張哀哉杞梓材棄捐官道傍贈叚十相識風塵下斯文伯仲間騎驢逄聖日捫虱對秋山忠信偏成拙支離最得閒秦川貴公子早計失荆蠻程自修字忘吾洛陽人自修性孝友讀書城東門翰林元裕之上其言行除禮部郎中自修聞之棄家南去獨坐終南在吾目秋色逺接應誰招天外翠來作忩中靚娟娟初畫眉盈盈獨臨鏡雲去物象空月出心源瑩我欲往從之有客誇㨗徑洗耳復洗耳松風入清聴歲云暮矣歲云暮矣百工休獨持千古供素遊丈夫磊落如天日促促胡為升斗謀望塵下拜乃東市山中茹芝可白頭嗚呼此道棄如土眼中歴歴聖賢蠧鄉里小兒紇那歌前輩先生八風舞欲挽東流無萬牛抱膝長吟聴更雨痛哭日射石虬鱗甲開草色又換青春囘精靈聚散豈拘束山鬼呌呼松栢哀當時沸天簫鼓動今日悲風陵上來悤悤今古誠傳舎人生有情淚如把乾坤誤落腐儒手但遣空言當汗馬西晉風流絶可愁悵望千秋共瀟灑王猛墓男兒有才須有識死葬荒陲眞可惜君不見渴虎不飲盗泉水始吾虞君今已矣歸龍門來往空書札行藏但布衣直為知已用可惜轉頭非歲月百憂集江山一笑歸禰生狂到死君子要知幾出城束帶供人事扶藜强病身誅求非上意盗賊本良民濕翠山藏雨輕黄栁帶春小兒隨白首行坐各沾巾送元吉歸河東獨憐風格困塵埃敢料天涯共酒杯花鳥偏于前輩好江山更有後人哀顔回盜跖終歸命諸葛曹丕豈論才正自别離愁未透更教栁色帶青來冉琇字温季瑯琊人琇好縱横談業漁獵世為李氏客難且作琇累書止之不聴乃南走渡江聞璮滅東向三哭伏劍遄臺遊目遄臺上烟色秋曖曃當時駐文輿君臣良宴㑹歌鐘正喧喧華纓接飛葢行樂遞未央已見顔色改爽鳩焉可知齊景尚何在世運如日月朝夕還相代秦吉了有鳥秦吉了鳴聲一何悲自言承主恩十載供提攜雕籠閒羽翼繫之雙華絲一朝不終惠零落投荒陲自傷去中土豈不懷南枝誠堪利主家生死不敢辭努力萬里風寄此長相思蓬萊閣倚闌吟不就看劍老相催鳥逐孤雲沒帆從别國囘魯連惟有死王粲不勝哀為問依依栁秋聲何處來海州波濤起天末舟檝滿城隅管晏非王佐田韓有霸圖何門堪趿履吾道欲乘桴倚杖春風近含愁向綠蕪宿京口推篷在京口山色對秋眠搔首半帆落懷人孤月縣形骸成獨往風物媿流年隨處逃名姓烏啼又發船獨立獨立春將晩周遊道正窮江山千古後形影百年中士論元無的人生各有終臨危負知已淚落海雲東元吉字文中河東人吉太原大俠也報仇市上吏來捕更殺吏走太行谷中㑹赦歸乃絶嘗與遊者三年通左氏史記家益貧入元甲子從戍開平道卒自葫蘿河至居庸闗男兒不成名命也負羈絏投袂出門去浩蕩破邊色飛沙白盪胸落葉黄沒膝㣲陽割層暝山骨𦂳格格抉眼已崢嶸置身何突兀徤鵰勢欲落老馬志亦屈氣岸勇枝梧脈絡大包括物候秋冬交土風中外隔懷歸畏簡書欲往投鬼蜮無言答酸楚有血灑寥閴古來䘮亂中天地坐跼蹐形骸盡則已烈士裹馬革上黨怒山出老拳寒色頑贔屭城根挿沙水斗絶虎相視憶昔宣武兵最强合圍歩驟如搤吭那知一叱立破散誰道亞子口尚黄嗚呼皇天肯悔禍豈有盗賊稱天王要畱千古論曲直故壘依稀榆葉赤陪翟三遊平州東城老境逄春色平州聚徳星不堪歌勅勒并欲案丁零雪泥殘年白山呈太古青殊方更分手暮角若為聴早發博州落落空城在蕭蕭獨客歸古今殊未了心迹毎相違魏國山河美唐家節度非偷生慚宿鳥霜月上征衣夜坐森森夜氣落寒櫩閒把離騷酒正酣忽憶梅花不成語夢中風雪在江南孟鯁字介甫曲阜人鯁沈毅雄略歲癸亥山東兵欲起刼鯁計事甲者三至鯁不肯遂遇害徐州徐州壓城霜木赭可能回首風塵下當年縞素從西來仰天伏地聲嗚啞君臣大義日月白牧馬鳴條此其亞帝王氣象佳蔥蔥舉止却類田舎翁美人瓊玉是糞土四海正在水火中如龍如虎尚蹉跌况乃豎子貪天功猛虎猛虎被束縛皮肉不相保人生到錯迕天地亦草草古來割據何代無可憐百萬殉匹夫漁陽突騎如風火青州城門鐵作樞丈夫好在識時務座上赤龍公莫舞沙海荒荒魂不歸莫説青州淚如雨南京惜愔坊陌傍深春活活溪流雨過痕花鳥幾時充貢賦牛羊今日上丘原猶傳栁七工詞翰不見朱三有子孫我亦前生梁楚士獨持心事過夷門折花怨悤悤杯酒又天涯晴日牆東呌賣花可惜同生不同死却隨春色去誰家安如山字汝止廣漢人如山善擊劍左右射讀經史百氏之書端平甲午安撫曹友聞辟掌書記不起友聞戰死三泉如山往收其骨藏諸其先人之側乃東下老于㑹稽曹將軍將軍精悍姿齒齒碎鐵石在昔童稚中但聞飽經術縱横騁柔翰丹雘間金碧有司塞明詔敝邑屈詞伯芹香春水生冠玉侍重席脱略章句陋搜抉窮理窟未及文化成其如王土窄丈夫報主願豈必䝉清秩蒼皇請去位滿靣秋栗烈紏合熊虎羣旌斾揚廣陌正當摩厲間一鼓㧞勍敵屯兵沔水源千里斧截截浩蕩排煙旻西極安嵲屼奈何國無人腐儒秉旄鉞賞予入私門金湯授盜賊公時奮臂爭反遭獻玉刖三軍視馬首慟哭下天壁功成坐齟齬憤怒鬚揷㦸中宵㧞劍起肅肅整勁翮吐氣風雲生搴旗䧟堅列貫穿死生地蹀血天地黒勢雖衆寡縣形未雌雄决路窮斷首尾衆盡乃手格豈知龍虎逝黯淡山川色百萬尚震驚嗚呼死諸葛長城但自壞千古痛稠結肉食無逺謀野史有直筆酒酣歌節士皛皛霜日白下瞿塘去去如奔馬來來無盡船人心似江水日夜向呉天王翥字一飛成都人翥篤學尚氣吳曦謀反來請翥翥陽病風瘖潛往安丙謀誅曦事定匿巴中爲農終身灌口秋漲所向愁無地窮源欲上天蛟龍胡爾怒鷗鷺更誰憐萬里朝宗意羣兇䟦扈年生涯秋色裏獨立問漁船憶舎弟藥物吾仍病花時汝未歸不眠愁月落獨立看雲飛詩禮自持律飢寒誰解圍遥知理舟檝西望涕沾衣浮世浮世惟髙枕平生有敝裘江花中酒日巴雨落帆秋老矣英雄事愚哉盜賊謀啼猿長自在一笑下滄洲呉宣撫故宅社稷疲奔命乾坤服至誠扶持三蜀在出入兩朝榮豚犬有遺恨麒麟空復情家聲隤已盡國法用猶輕成季翻無後花卿浪得名門庭黄鳥語几杖緑苔生威福何偏重精神恐不平庶幾䝉世美凡百愼持盈送張判官歸巴州回首三巴曲平生萬里橋衣冠無賴客花月可憐宵師嚴字道立襄陽人嚴讀書識大義善槊射自圍中㧞身走行在所上書論事不報拂衣去客死武陵大閲長江天險設荆州國西門幕前仗斧鉞赫赫齊晉尊熊羆在掌握百萬不敢喧固列厓嶠立動色虹蜺翻雖云缺亦是明主恩髙秋鼓角壯慘淡傷精魂山南正困戹血肉連川原由來多壘辱豈不在大藩既同事王室於義如弟昆朂哉從簡書卹鄰古所敦藺五見訪漢隂美人青兕裘獨騎瘦馬尋荒丘花前下馬迎一笑珠玉在側形骸羞酒酣散髮箕踞坐錦帶爛熳縣呉鈎斷蛟刺虎好身手碧瞳如水涵清秋惜哉科目大脫略壯士豈為章句囚中原格鬭困不已江波木落寒悠悠渡江鹿門山人滄浪客灑淚已枯眼見骨風塵崢嶸萬里空不知何處營三窟城中性命湯火近路窮援斷無消息鼠竊狗偷何足憂都將十指漫天日大言濶歩好公卿三百年餘涵養成已聞鄭五但搔首復道龎涓豎子名平時肉食誇果决誰信臨危䟦疐行白頭面皺牙齒落萬事已矣秋風生庚午三月五日朱尚書席上醉歌天風浩蕩何處來荆南府中好春酒我公此日盛賓佐但飲無勞問升斗座中十萬無下箸烏㡌朱衣牛馬走妙舞清歌如有神翠爛金明各回首人生行樂須壯年小人再拜為主夀滿堂淚落起挽鬚臨饋三歎成鬱紆干戈未定郡國破亂臣賊子何代無主憂臣辱坐感激忍對花鳥調歡娛近聞士卒願一戰猛氣正倚風塵麄丈夫行事動千古快意一飽非雄圖武陵客居浩蕩千年調飢寒八尺身不愁逄魍魎可笑繫麒麟殘雪江村路空山澗水春時危終逺去道在豈全貧公安早發去國秦公子窮途阮歩兵别離如昨日豪俠異平生江月為誰好巴船何處行高秋伴揺落早發若為情張琰字汝玉廣陵人琰身七尺長髯倜儻有節槩補州牙兵隨制置李庭芝潰圍南赴行在所追者及之麾下鳥獸散琰獨鬭死出塞曲四首腰間揷雄劍中夜龍虎吼平明登前途萬里不回首男兒當野死豈為印如斗忠誠表壯節燦爛千古後朝發山陽去莫宿清水頭上馬左右射㨗下如獼猴先發服勇决手提血髑髏兵家互勝負凡百慎前籌驅馬飲淮水千里黄草平種榖郤流血痛哭秋風生寡妻出租税孤兒荷戈行武威既不足願見和親成軍中日奏凱鼓行遼海東當宁怡玉色千金勞成功焉知昨日地袒甲去如空邊人不敢語將軍益褒崇官栁不見橋東黄布帘樹猶如此我何堪裊裊亭亭忒無賴又將春色誤江南汪涯字萬頃漢陽人涯家貧事母孝宣撫賈似道請為客當作露布獻㨗涯瞋目曰㗖人以利而退其師又兒弄主上似道大怒撾殺之其母曰汝以直死我則不辱可以下報先君矣亦自沈采石獨酌欲落不落月在手百年幾何持釣綸不知春色萬象表緑烟漠漠入江濱天翻地覆有今日酒熟詩温無可人向來談笑成黄土墮淚未了雞司晨江帆江帆去去可腸斷千古萬古越王臺掃空黄葉晩風定飛盡碧天晴鳥回半生無成坐筆硯萬事不理問樽罍年年看梅今白首已矣英雄畱七哀江行江陵白魚如斫玉挂席獨去風日寒封題兩甕寄白髮兒涯不是作魚官秋光蕩漾滿行色鄰舟吹笛不堪聞洞庭濯足一尊酒夫君不來空白雲詹本字道生建安人本温言正行丞相江萬里薦為郎先致書本本方坐門前石上釣使者至問本居本不答即持竿渡溪去莫知所終春日攜客遊武夷山脚徤枝梧百里揷蒼峭粼粼石可把曙色坐逺釣風水眞笙竽歴落太古調衣冠帶莽蒼山鬼驚二妙雲月正忘年花鳥更索笑迴船翠凌亂吾道付長嘯宿天台風泉隔西屋獨夜寒自生開忩失山色白雲壓前楹累盡得瀟灑去住俱不驚鼻息叅僧鐘霜露入殘更閒中萬事問不知山中一樽酒埽石坐松風緑隂滿巾袖皇甫明子字東生四明人明子性豪宕乘小舟挂布帆載琴尊書籍釣具徃來江湖入元丙子發狂痛哭蹈海海口窮島迷孤青􅄓風盪頑寒不知是海口萬里空波瀾蛟龍恃幽沈怒氣雄屈蟠崢嶸抉秋隂挂席潮如山熒惑表南紀天去何時還雲旗方慘澹腰下青琅玕誰能居甬東一死諒非難嗚呼朝宗意㑹見桑土乾京口行京口兵可用酒可飲一語參差族成血忠賊相持各凛凛豈知好醜隔形骸父為孔鸞子為鳩人衆天定理則那遺臭流芳且髙枕水國水國凄凉住秋宵爛熳眠歸雲猶帶雨墮月忽明船社稷資長算髭鬚近暮年亂離棲不定百口託浮田丁開字復見長沙人開負氣敢言安撫向士璧被問開獨詣闕上疏具陳士璧功大軍府小費不宜推䆒書奏羈管揚州歲餘卒漂泊岳陽遇張中行因汎舟洞庭晩宿君山聯句元氣無根株開地脈有斷絶中行日月互吞吐開雲霧自生滅中行楚妃結幽想開巴客答清吷中行寧知莽蒼中不假巨鼇力勢閲南紀浮開思隨西風發形影寄孤舟中行吾道成鴃舌笑談正凌傲開俯仰不偪側每與景物㑹中行未省歡娛畢疉翠晩愔愔開墮黄秋的的魚龍負贔屭中行獨鳥去不息曠原𦕈周抱開異境超慌惚徑度萬頃空中行忽得一拳碧稍稍雞犬近開依依鍾梵夕推門月微墮中行煮茗香初歇衣裳識霜信開瓶鉢了禪悦事定心源清中行夢回斗柄直周遊興欲盡開長徃計未决出門更回首中行沙水盪虛白美哉神禹功開已矣三苖國山川長不朽中行愚智俱可惜神交正㝠㝠開指㸃空歴歴愼勿語俗人中行桃源恐相失開可惜日者今何及天乎有不平功髙人共嫉事定我當烹父老俱嗚咽天王本聖明不愁罹黨禍攜淚向孤城揚州歲暮萬國春回日層城晩眺餘江聲隔吳楚原色到邳徐大閲軍容壯狂歌客禮疎百年寒荻裏風雨憶吾廬建業誰遣凄凉滿眼中蘋花渺渺又秋風龍蹲虎踞江山大馬去牛來社稷空縱有千人惟諾諾本無百歲更悤悤乾坤顚倒孤舟在聊復殘生伴釣翁鮑輗字以行括蒼人輗嗜酒授簡萬言教授得錢悉送酒家遇客盡飲乃去晩益傲誕衲衣髽結遊青城不返天馬天馬抱竒相𦂳骨瞳方明出入百萬中有如一鳥輕宇宙莽超踏風雲慘經營獨倚雄傑態蕭蕭隨北征朝飲南海頭夕秣乃幽并失主坐黯淡别羣奮長鳴豈無輕俠兒金羈縣朱纓但感束帛義不忍負死生低頭為君老喑喑萬里情襄陽行今日何日春氣柔東城騎馬花綢繆為君停馬一呼酒花前倒披紫綺裘玉脂汎濫魚鳥飲歌舞倦矣蛾眉愁千金萬夀好賓主今我不樂歳如流豈比世上狂馳子一語不合行掉頭嗚呼天倫古所定非有大故寧相尤重到錢塘五首生死雙飛正可憐若為白髮上征船未應分手江南去更有春光七十年無賴山光疉疊青玉魚金盌早飄零冷思禹穴真竒事千古衣冠託杳㝠萬家歌舞送浮生曽有涓埃答太平猿鶴沙蟲天始定不須辛苦怨南征聞道深春雪打圍誰憐身上藕絲衣莫憂白璧成塵土解逐南風萬里歸惟有寒潮不世情朝朝莫莫過空城百年車馬閶門外獨獨春風草又生崔璆字子玉京口人璆美風儀善談論晩病狂攜大瓢貯酒行市拍掌歌笑未死十日自表石曰醉鄉伯崔璆之墓攜戣鉞汎江酒星落江口化為崔子玉孤舟載壺觴水花紅映肉小兒唱銅斗大兒倒醽醁一笑不知年浩蕩天地屋慎勿臨竇呼人生隨轉燭嗣宗禮法仇鍾㑹被殺戮咄咄咄咄復咄咄小兒成老翁么微各形色追琢元化工不知春風去又見千緑叢主人美客懷載酒行溪東一歩一回首十歩尊已空靈均與太白醒醉同所終願見化蠛蠓生死託壺中今日一何好今日一何好花下醉狼籍醉中有竒事夢見生八翼浩蕩排虚空靈君好顔色朱衣持大篆授我醉鄉伯頓首玉墀下臣璆才蟣蝨封此抑何功請陳愚頑臆臣家京口東門前大江碧臣願駕長風吹作酒萬石萬象各千鍾拍拍大庭國推枕在山中紙衾霜曉月魚潛字徳昭姑孰人潛敦重和易推分澹泊不忤於物所居環堵埽地焚香彈琴讀書養鵞鴨百頭以給食終八十餘古意二首青青陵上柏落落勁不催人生百年内朝夕變所懷斗酒命同好萬里不顧囘聞有昌國君談笑黄金臺柔言更長跪信是富貴媒但恐氣習移古今不同才寄言去國者歳晩有餘哀權衡豈公平天駟但伏櫪東井不救湯倉庫何時實元工肯假借名器其可惜如何萬萬古不行督責術楊白花楊白花誰敎度簾幙揺蕩春風能幾何不比無情自漂泊人生秪合作支離長秋鵶啼江水落送鄭祕書南歸垂老乃如此憑髙俱惘然空能正幾字好去作千年童子歌鴝鵒幽人拜杜鵑江花獨爛熳春去得誰憐聴歌行雲流水出名姝酒盡花前雙玉壺此曲江南都忘却春風轉調小單于柯芝字士先瑞陽人芝早通五經善詞賦又詣行在所見章袐書求讀書省中益通諸家教授生徒著書百餘卷子茂謙耳耳耳耳非佳語陸陸難為顔我生胡不淑多戚長鮮歡揺落復已綠春風滿江干曜靈起予興欲言骨肉酸園桑摧為薪桃李亦半殘翹蕘企晴燠九室十更寒飛錢如美色乃入貴者闌丘閭有糓賣窮櫩朝無饘不售信成隱徒手良抱歎宛轉愒餘息溝壑分寸間吾輩正不免遑暇卹彼瘝餘髮餘髮蕭蕭白垂領十年一拙門庭冷來頻沙鳥頗相識起晩鄰雞已三請形骸拄樹豈復好心緒如蓬不能整平生幾緉空馺􅤥老去一盃先酩酊俗言祗虞方鑿迕人事但愜幽居屏聖賢未必盡芻狗天地何堪共鼃黽若為苴履曾足芥幸不栁衫真欲癭一聲樵響何處來獨立看雲發深省横江横江一片碧攜鶴上漁船收綸不成下却抱釣竿眠柯茂謙字退子魯港十年回首付霑襟斷甲沈沙齒齒深可惜使船如使馬不聞聲鼓但聲金人歌鬼哭都堪歎木落江空正獨吟遺老蕭條漸無語酒旗颭颭出蘆林江行早發陶鐺煮孤影寒燈沸青花氷開數江樹月落失人家邵定字中立廬陵人定温粹博雅通周易春秋宅邊植梅竹蘭桂蓮菊各十餘本深衣大帶婆娑其間自稱六薌老人山中白日看雲坐清秋對雨眠眉頭無一事筆下有千年漁家漁家臨水住春盡無花開年年謝流水流得好花來熊與和字天樂豫章人與和性介澹無妻不食肉通經史百氏之書布衣草屨遨遊諸名山尤嗜彈琴草書木平飼龍亭次韻方巨山眼見何如得耳聞山根磅礴極初分浮漚起滅自潭影大地晴隂空嶺雲何處老人來聴講他年少府有移文由來清調須吾輩幸不山王愧五君唐𤣥宗鐵像巍冠攅疉碧雲花坐閲山中幾歳華莫把金丹輕㸃化正愁生死困安家晏乂字明粲宜春人乂風度秀整主趙崇澭後澭逮繫乂自請詣獄俱以瘐死夢中春樹年年少寒雲浦浦連片帆髙浪起斗酒夕陽偏沙市懷司馬州城哭老邊太平冠葢盡爾敢望諸賢訪吳平生一語不肯吐浩然披髮行西林美人十日跨驢出黄葉堆門雲雪深孫璉字器之大庾人璉家貧益嗜書不應選舉躬耕織屨以食終百歳述懷二首少也不諧俗老去益美閒百草生已緑春雨滿南山朝朝荷鋤去既夕驅牛還生長茒簷下貧賤良獨安但願桑麻長優游足歳年坐倦秋樹根攝衣歩前丘横河澹如練破月西南流獨持一尊酒悠悠發清謳俯仰無不足吾生焉所求楊應登字幼平臨江人應登寛厚長者有徳行言辭七試國子不第退就耕牧老于南塘孫雯寄趙梅州江城雁呌天如水寒色蒼蒼草木死哀歌未斷月東出有才無命可流涕今我不樂思梅州束帶深衣百僚底天下規矩見卓絶龍章麟角諸公子白頭時節得蠻府歸來閉門呼不起惆悵平生狗馬病風后力牧長已矣為公問酒日日酤薰門富貴憂患始水宿水宿逄今雨春歸及故園聖朝臣巳老往事客何言乞米分鄰里看書到子孫蒼茫不可會一笑了清樽揚雯字天章迢迢空同山迢迢空同山乃在西極巔玉泉䕃靈芝上有千歲仙安得凌風翼相從白雲間神仙本㝠漠天運仍推遷不如酌我酒或得成自然田父要我語飲者亦非賢願君長獨醒加餐足髙年宋武帝廟溪聲答松風巨石出老拳古樹不知名岌岌蛟龍纒夕隂互出沒秋華帶芳鮮蔥蔥帝王氣基宇垂千年虎賁秉霜㦸慘澹生雲烟宫人翠龍駕手持玉連蜷昌明坐慌惚精神雷在天大呼司雍間旬月無秦燕昔為萬夫特今受衆目憐石馬亦埋沒歲時草芊芊小臣異代士見之淚迸泉齊人思爽鳩蜀人哀杜鵑江東舊正朔禮奉敢不䖍但願君王心不忘載荻船下山又再拜白日當空縣宿峽市人烟正揺落樓笛頗清圓老樹依山驛東風上峽船江湖萬里外燈火十年前世路能令老吾生且醉眠早春不知何處碧雲鄉冉冉平生可斷腸怪底乾坤惟理在老來歳月更心長城頭急鼓千家夢江上殘梅一水香自作醉侯開醉國笑人奔走為誰狂客北客相催發一日舉千帆遥憐庾開府歲晩望江南番陽布衣以下無名氏五人有書中山驛云回首萬里歲晚何言云云番陽布衣題回頭四十五年非無賴秋光滿客衣可惜吳中蓴菜好陸機張翰不同歸瀟湘漁父崔璆晚泊湘江淡烟微月有客歌而過之追問居與名置其釣竿長嘯而去髙枕形骸外空江何限情落葉不成調半夜起秋聲古碑文揭大中云或漁于潭得片石字十數行率磨沒僅識得二十八字意幽人憤士之作不合於時故沈之以俟知者乾淳老人氣岳岳破冠穿履行帶索撑腸拄肚書萬卷臨風欲言牙齒落閩清野人僧惠了行閩清谷中三日到一空舎稍憩有一人荷鋤來便向熟睡僧既尋路還他日再往已焚其舎惟斫樹白而書云偶與雲水㑹不與雲水同雲散水流去杳然天地空羅浮狂客趙孟柔云柔録事惠州聞羅浮道士言咸淳中客有戴烏㡌著靴往來山中見人輒大笑反走三年不言姓名他日醉歸忽取煤書壁上云云長揖渡海去雲意不知滄海春光欲上翠微人間欲墮千刦猶探梅花未歸右俱宋末髙人詩採清江杜本原編合為一卷宋元詩㑹卷五十六
