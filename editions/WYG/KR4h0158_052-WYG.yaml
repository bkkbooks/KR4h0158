body:
  text: 宋元詩㑹卷五十二兵部主事陳焯編陳普字尚徳寕德人生宋末入元為遺民學者稱石堂先生擬古二首東方有樂國開闢先柏皇鸞鳯為鷄鶩麒麟為馬羊晨霞作朝食太和為酒漿土無干戈禍人夀千年長下視禹九州有土皆戰場白日虎狼行青天蛟龍翔我欲為逺遊滄海渺無梁何年夸娥氏移置天中央同根一味草時命嗟異遇風月芳香合兩地隔周楚爾生麟趾家朝夕沐玊露我在雲夢林百草相䝉妬白璧終不緇惸惸亦良苦壬辰日蝕憶昔度宗皇帝時十年十三日食之似道贔屭湖海曲天子宫庭耽樂嬉滿朝翕翕皆婦人禍来照鏡方畫眉北軍順流日食既兩國正爾争雄雌興亡豈必皆有數百年以来士氣衰文臣髀肉不識馬武士驚魄怕見旗凭闌髙豁乾坤眼山青縁雨収夕陽流水遶荒草白雲浮柳䕃小溪側樵歌古渡頭凭虗發清嘯安得仲宣樓徳陽林梅麓太守輓章殷士皆周祼南音獨楚冠寢車人更怒負爼我何安義合雍容就名應久逺看梅花眞鐡石耐得許多寒野燒雜沓平原起電紅慿陵勢欲逼青峰草茅不問新開甲蟄户尤憐乍啟封何暇𦙍侯分玊石稍如伯益逐蛇龍際天逸徳無人識獨倚髙樓到晚鐘懐古世事悠悠一轉頭斷雲荒草古今愁青山北去黄河隔白日西飛滄海流秦有金牛開劔閣楚無熊虎割鴻溝多情蕭寺峰前月幾夜蛩聲影半樓答友人雲作交遊山作賔道心為主自安貧柴門無鑰見同物竹帛有名終累人緑水一潭澄静性青山萬疊裹閒身紛紛望拜馬蹄下不見胸中萬斛塵秋日即事五首夜牀轉輾恨明遲曉髮梳寒倚竹扉樹影紙忩風作色蛩聲壁罅月流輝三杯白酒窮年客滿箧紅塵隔嵗衣遥想白鷗江上路蓼花楓葉雨霏霏玊露金莖曉髪寒秋風仍作去年看蛩聲踈雨長為客㕍影殘蟬獨倚欄鐡硯窻櫺雲影淡丹楓溪曲水㾗乾西風曽與黄花約擬掇繁英貰酒餐二尺書檠對影居西風吹雪上吟鬚雲邉月色人千里竹裏秋聲酒半壺客思邇来紅葉亂雁聲南去白雲孤季鷹自是知幾者一念蓴鱸便到吳書餘飲水枕長肱四壁啼蛩訴不平月色滿忩詩骨冷露華方枕夢魂清西風嵗嵗長堤桞流水朝朝大海萍紅葉山深無雁過殘砧幾處搗秋聲遊絲閃閃挂虗簷翔集號寒華嶽尖白髪束来閒㸃易烏衣歸去寂鈎簾三千客路飛楓葉四五人家賣酒帘魚笛水寒江上晩荒叢荳葉雨纎纎鼓瑟滿樓明月調雲和五十絃中急雨過彩鳯拂衣鳴翠竹素鱗鼓鬛出寒波凄凉楚客新愁斷清切湘靈舊怨多一曲更沈人已静江頭雲挂緑嵯峨七夕但把凡身小品論寕湏搨額問星辰女郎戀别淚如雨遑取金針度與人四皓長樂巵前露雪眉嵒花亂笑出山時有人拍手𤓰田裏來徃青門總不知李廣李陵茂陵無奈太倉陳槐里家傳本助秦萬落千村荆杞滿隴西桃李亦成薪賈生落日長沙被鵩驚愁来強把死生輕洛陽才子多流涕太息沾襟過一生武帝商車不足筭緡來桑孔咸陽悉茂材一撮茂陵無覔處建章門户至今開荀彧亂離揀得一枝棲得道争知却是迷曹操若逢諸葛亮暮年當作漢征西謝翺字臯羽福之長溪人文丞相開府延平翺以布衣諮議參軍天祥卒亡匿無恒䖏嘗持酒祭嚴子陵釣䑓設天祥主號哭為招魂詞以竹如意擊石歌之詳西䑓慟哭記後徃来杭睦間以肺疾終其詩曰晞髮集格律蒼老直追古人宋鐃歌鼔吹曲太祖嘗微時歌日出其後卒平僭亂證於日為日離海日離海青曈曨沃以積水涵蒼穹神光隱豹霧空氣呼吸為蛇龍赤雲衣紫霓從吹白衆宿歌大風天吳遁清海宫宋既受天命為下所推戴懲五季亂誓將整師秋毫無所犯為天馬黄天馬黄産異方龍為馬白照夜氣汗雲聲嘒野偹法衣引宸駕騰天垠倐變化閠之餘劘以霸閲八姓瞬代謝驅祥靈入罟擭皇上帝監於下誓無譁出既禡市日中不易賈坐明堂朝諸夏賚萬方錫純嘏汴京既定李筠懐不軌據壺關以叛王師討平之為征黎黎之壄彌蒼莽迤壺關屬上黨有雄矯徤曰餘宿將於故之思泣示厥像倚孽缺勢方張辯臣獻議勸下太行趨懐孟虎牢計之上爭洛邑以東鄉王師奄至扼其吭帝授方略中厥狀獸窮駭突死卒以焬脅從已逮孥肆放凱歌回皇威暢上親征李重進至廣陵臨其城㧞之為上臨墉上臨墉戈耀日韎韋指顧流電疾辠止其魁不及卒其魁則頑曰予虢自出坐於轅門斧以率歸子徃諭泣股栗語中其肝至畢述侍不及屏沮回遹鞠投於燎甘所即皇仁閔下焉止蹕貔貅徹竈歸數實獲其棘矢納世室湖湘亂命將拯之至江陵周保權已平賊出軍澧南以拒卒取滅亡為軍澧南軍澧南潰飛鳥鷹隼北來龍蛇夭矯帝有初命奉致討臨於荆妖孽既掃急驅而孕雉入蒼莽以保王旅長馳颯振槁以仁易暴戒擊剽惟荆衡及郴士如林磔其節蟊春葩秋隂我有造於南式敷徳音王師拯湖湘道渚宫髙繼冲懼出迎悉以其版籍來上為鄰之震鄰之震震於户戒登陴徹守御神威掩至不及拒沿楚以南菁茅宿莽獻於王吏奉厥土天子有詔侯西楚自南北東皆我疆籠旗虎莭拜降王秦戈鞏甲期韜藏玉几肅穆垂衣裳蜀主㫤懼隂結太原獲其諜六師征之㫤至以母託上許歸母數日㫤卒母以酒酹地因不食亦卒為母思悲母思悲母於歸母聞帝語妾歸無所妾生并土蜀壄茫茫奄失其疆初帝謂母子㫤來小者侯大者王有痍其肌載粟於倉畢有下土方歸母於鄉天不女奪朕言不忘劉鋹亂嶺南為象陳以拒王師象奔踶反踐俘鋹以獻為象之奔象之奔斯惟迹蹶蹶魚麗駕空雲鳥潰南草浮浮順於貔貅焚其帑實棄厥陬皇風播平轂瞀星辰起皆北走唐季以來逆雛來咮嶺海肅清無留後於汴獻囚凱歌奏上命將平南唐誓城陷毋得輙戮一人衆咸聼命為征誓帝命將臣誓師於征禡牙於庭曰無劉我人曲阿惟唐以及豫章孽於南國楚粤是疆我師孔武聿禽其王始怒頟頟將臣不懌曰如上命即起予疾弓韜於衣刃以不血收其石程焚其侈滛視於丁寜筈羽不飲取其鎛磬以獻於京於京告成垓埏既平錢氏奄有吳越朝㑹貢獻不絶於道至是以版圖歸職方為版圖歸版圖歸歸職方昔服跗注偹戎行帝鍚之斾龍鳥章酧獻命與胥今上及秦王外臣拜稽首笑頷帝色康畢同軌来於梁寵靈奕奕敷重光願止劔履覲帯裳四海臣妾配虞唐陳洪進初𨽻南唐﨑嶇得逹於天子至是籍其國封略来獻為附庸畢清源無諸邦力弱臣秣陵間道遣進表九門望日旌願齒鄒與郳自達天子庭四鄰彫覇業國除洗天兵皇靈暢遐外蜑俗邇聲明歸其所𨽻州乞身奉朝請音清帝命得陪祀湯沐在王城從兹附庸畢歌以頌河清宋祖征河東班師以伐功遺太宗卒成其志為上之囘上之囘舞干戚鳴鑾在鑣士飽力桴鼓轟騰罕山北餘刃恢恢軍容肅穆王畿主辰參後服神繼聖伐功卒扼以偏師斷北脅矢菆鳴房蝟集的質子援絶新銜璧并俗嚬嚬附於化以安得其屈産歸帝閑重譯君長來稱藩籥節僸樂示子孫騎吹曲親征雲屯列竈驅貔貅殿前殺馬祭蚩尤勾陳蒼蒼太白溼賊帳夢驚繞營日軍呼萬嵗摧太行驊騮東抹流霓光重華繼堯坐垂拱并土再駕無葛疆廻鑾曲建隆親征回鑾徂暑黎陽車駕歸掃清氛翳兵更衣江都朔雲車駕出凱歌消氷供尚食都人引領望翠華征人一月俱還家開寳親征回鑾長堤夜幸士素飽孤城沈竈無飛鳥從征鹵簿拜上恩太常朝上回鑾表太平興國回鑾都人望氣歸瑶闕星掃茸頭落参伐西人冉冉留紫雲六飛擁日歌回軍遣將曲平荆湖遣將天門雷動開風雲内前盡給羽林軍聖人神武授廟算斬將搴旗各駿奔王師所過如時雨洗濯焦枯嚮荆楚重宣徳意弔遺黎素服軍前釋俘部全家到闕拜上恩詔書為築先臣墓下劔門遣將神風流霆驅偃草天兵夜下西南道虎賁長㦸来鳯州歸峽銜枚疾如掃廟謨萬里諗諸將山川曲折圖形狀天同鬼授契若符坐㓕罘罳鹵供帳歸來論功授莭鎭鐃鼓殿前歌破陣歸朝曲南平王歸朝荆南萬里朝天道巫女雲荒産芳草錦韉道賜帯盤鵰方物南來進龍腦願陪郊祀依日光供帳歸朝親奉表勲階邑食及𨽻人移鎭徐戎作家廟人生富貴侯與王四海為家皆故郷吴越王妃歸朝勾吴月令牽牛中妃以開寳九年五月隨王入朝翟茀乗風来閟宫隨王劔履朝上殿黄門夜趣長春宴昭容引班入内朝龍衮當中開雉扇宴罷朝辭坐局促詔賜離宫作湯沐先王烝嘗澤有差上恩許歌陌上花諭歸朝曲淮南草溼網蟲露家在先朝父尚主眞人御極四海歸偃蹇不朝稱節度夜持鐵劵為爾賜上恩特遣儀鑾使神離魄奪取族夷功臣效命錫龍旂李侍中妾歌李筠愛將唯儋珪羙人姓劉筠侍兒城危搶撥不得力雨損鉛華帳下啼擁髻前言馬有幾猶説閨中那問此赤龍從東乗日車火繞城門内蛇死英雄際㑹風雲奔婦人思報羅裳恩孟蜀李夫人詞春荒曲薄蠶叢土屈狄歸朝辭廟主官家呼母恩許歸劔閣并門無處所故衣升屋棺四繞出門哭子汴州道回腸酹酒三致辭巴蜀如歸化啼鳥老身不食追爾魂鹵簿臨門拜上恩南唐奉使曲孤城圍中拜右史侍書猶對重瞳子請行慷慨期緩師奉命日馳三百里河流遡風車北首便殿䝉恩入天袖臣肝有血不濺衣寸舌欲存建王後竒胷如江湧崔嵬慟哭不得天顔回伎女洗藍曲後庭朱黄作衣裏伎女帳帷青曵地碧緑夜挂寒不收縁此洗藍渟露水外間學染因得名不省歸朝為國氏他年寄生産鴟尾空憶宫中鳥銜子邸吏謁故主曲嶺南使鶴日教戰巫女才人謔相見南橈欲載逺遊冠衞士盗船去不還夢見隨俘上江邸道謁凄凉唯故吏自言置邸本先王方物入朝縁此至聞言含咽涕灑江况乃園人舊姓龎淚辭嶺南無歸處䝉恩秪向江陵住以上二十六首俱紀宋初事倣樂府另為一體不入古今詩中翠鏁亭避雨亭有魏王妃所題字尚新王嘗以皇子成徳軍莭度使鎮南故妃至其處客有遊山衣著久如薜荔行行萬翠亭忽作風雨憇仰面無所覩梁間有題字問此何人書婉娩有弱氣云昔魏王妃學書似李衛乗雲到此山灑墨在空翠塵風吹土花倐忽景物異疑此夢與仙不類人間世鐵蛇嶺長耳僧嶺上有神僧風吹堅両耳云昔垂至肩手提忽然起遊方得至術来此制蛇虺衣縫獨繭絲裂縫蛇盡死至今山下草食之蠱可已客去勿復言海隅多幻詭九日前子善來㑹山中朝尋寒露枝莫摘不盈把風吹西南雲幽情誰與冩有客來縉州遺我古盞斚中有鴛鴦文色如銅雀瓦浮以鬱金蕤蒼蘚藉其下此物寧足感聊用助歌者但懐郢曲悲豈計所知寡九日禺中登沃州放鶴峰南望天台諸山鏡面小蓬島入剡脱我驂舍櫂来沃州下嶺見精藍脩眉浮天姥天台在其南良遊愛九日巾墮髪不􅌨醉浮秋夕英饑食决明實逺尋竺僧迹俯仰千載陳狂呼許𤣥度王謝十八人彷彿川谷應草禾皆㝠㝠便欲即之語又疑物所馮閉目遊泰初寥廓以為隣因北遊者寄峨眉家先生先生曽宰建之浦城故末童及之靈關髙縹緲縹緲出層城其上盤紫雲倐忽牛馬形交青不栖樹浴彼清泠泓惟有孤鸑鷟銜命此山靈迎風遡寥廓杳杳西北征羽毛中道折六月霜霰零囬首靈關雲淚下如縣纓擬古寄何大卿四首空山産桐梓擬作膝上琴琴成不他飾種漆江之潯獨無徽將軫何以發商音但得獨繭蠶飼之扶桑隂烹魚腹有膠不患海水深雄雌雙碧鷄所食琪樹蘤来棲藥洞中當春怕乳子其雌秋别時守此唯雄耳可憐銜子歸萬里渡海水流来山中花紺碧三百里漪漪歙硯雲含風入秋水五芝與八石徃徃産其沚豈獨袐靈文亦復隱竒士不見施家郎詩詞獨清泚一朝控白鸞吹笙洗塵滓山人食木實竹實以飼鳯聞此来空煙三載脱塵鞚不見玉笙音唯聞溪鳥弄西臺憶故人野祭忽如夢仰視浮雲馳不覺哭之慟效孟郊體四首閒庭生柏影荇藻交行路忽忽如有人起視不見處牽牛秋正中海白夜疑曙野風吹空巢波濤在孤樹落葉昔日雨地上僅可數今雨落葉處可數還在樹不愁繞樹飛愁有空枝垂天涯風雨心涕零無所之寒花飄夕暉羙人啼秋衣不染根與髪良藥空爾為越禽惜羽毛不向惡木棲木奴重踰淮愛爾巢其枝巢枝不食實中有二老棊乳子明月中夢繞東南飛閨中玻黎盆貯水看落月看月復看日日月從此出愛此日與月傾㵼入妾懐疑此一掬水中涵濟與淮淚落水中影見妾頭上釵逺遊篇寄府教景熙朝遊扶桑根不折拂日枝莫食楚萍實掬海見虹霓黄鵠别我影目盡漢水湄况復銜其子風露何當歸飄蕭入桂叢零落紫苔衣夢魂知爾處落羽在瑶池古釵嘆刑徒鬼火去飄忽息婦堆前殯齊發白烟淚溼樵叟来拾得慈獻陵中髪青長七尺光照地髪下宛轉金釵二持歸薫沐置髙堂包裹恐為神所將妻兒朝拜復莫拜冉冉臥病不得瘥省知天物厭凡庸夜送白龍潭水中叩頭郤顧祈免死永入幽宫伴龍子秋風海上曲秋風吹水龍上天龍女抱珠海底眠水花生雲起如葑神龍下宿藕絲孔巨鼇贔屭鼉鼓隨赤魚鱗鬛陳旍旗海人見此失􅍾網歸對妻兒月下紡自言移家来磧中十載秋風潮不上老夫一人語門前見此已是開皇年陌上桑旭日曈曨颺拂羽落葚空條生曉霧人生顔色逐春妍夏葉餵蠶少絲縷蘭膏照繭未登簇露溼頭梳惟水沐郤憐鄰女學鍊眞藥爐七過煮桑薪縱逢蕭史上天去甕盆生苔愁殺人種葵蒲萄下戎葵花種蒲萄下年年葉長見花謝蒲萄漸宻花漸遲開時及見蒲萄垂㣲風揺曳架上枝隂雲凝碧行琉璃天人下飲蒲萄露花神夜泣向天訴謝爾蒲萄數尺隂不如寸草同此心古别離仙人别母母哭啼遺以神藥乃醉之醒来哭定記兒語食此庭前雙橘樹葉能禦饑病能愈豈似當時逐兒去鄰翁有女立我前取刀剖腹爾勿憐但爾嫁夫能治田生子不願生神仙書畵梅花水僊卷風吹韈露明㣲照芳雲弱植仙姝廟髻鬟零亂在枕函月裏羅浮夢中到鮫綃拂塵蟬翼隔忩霧凝寒唯影入曉来坐對殘空標翠翎不見額黄溼小元祐歌寄劉君鼎前甲子小元祐句章祲黒權臣死端平天子初改紀襲芳泰陵種蘭芷當秋淮甸枯草黄彎弧北向射天狼是年南海無波浪月溼珠胎君以降只今六十空白頭獨騎麒麟補春秋天回星周羙惡復人世更傳蔡州録避暑城西觀吴道子畵老君像溼煙挂龍天海頭角城溽暑如炎州白氛翳景失樓閣蓬莱縹緲不可求觧衣揮塵子城下地湧青蓮隣古社卷簾看畵人猶龍矯首見龍還見畵碧瞳雪髪垂過耳弄筆者誰吴氏子有洗舊誥綾作青色鬻者以紺繒易得之作手卷賦小樂章求好事書其後吴宫輦路傷行客繭氷壓雲凝曉色門前新掃染家鄰借人鋪設殘衣帛官花翦綾連院號覆取翻青成一道織紋宛轉勅字新知是初誰六尺誥城霞失彩宫蘚病中與海圖上衣領改顔倖售縁所遭褪藥𤣥香洗藍影青綢易得淚承睫撃筑楚歌無故發歌殘求書好事人異代儻傳誥綾帖廣惜徃日崈真院絶粒示兒宋禮部侍郎謝枋得所作也粤人謝翺用其語為楚歌以節之其詞曰漢有臣兮龔勝卒噤不食兮四十日今忍饑兮我復渴道間關兮踰半月幸求死兮得死茍不得兮無術鳯笙兮龍笛燕羣仙兮日將夕風吹衣兮珮蕭瑟駿龍兮寥天行成兮緣畢瓊花引后土祠前車馬道天人種花無瑤草英雲蕊珠欲上天夜半黄門催進表酒香浮春露泥泥二十四橋色如洗隂風吹雪月墮地幾人不得揚州死孤貞抱一不再識夜歸閬風曉無蹟蒼苔染根烟雨泣嵗久遊魂化為碧賦得北府酒北府酒吹溼宫城桞柳枝着地春垂垂秪管人間新别離離情欲斷江水語女兒連臂歌白紵淮南神仙来酒坊甲馬獵獵羽林郎百年風物烟塵蒼老兵對月猶舉觴青帘淚溼女牆下曽我行軍舊司馬烏棲曲擬張司業吴宫草深四五月破楚門開烏啼歇羙人軍裝多在船歸来把弓墮弓弦越羅如粟越王獻宫中飬蠶不作線轆轤出屋井水淺梔樹花萎子如繭烏栖烏啼宫燭秋越女入宫吴女愁鴻門讌火雲屬地汗流宇杯影龍蛇分漢楚楚人起舞本為楚中有楚人為漢舞鸊鵜淬光雌不語楚國孤臣泣俘旅他年疽背怒發眥芒碭雲歸作風雨君看楚舞如楚何楚舞未終聞楚歌虞羙人草詞髑髏起語鴟呌嘯山精夜啼楚王廟渡淮風雨八千人叱咤向天成白道身輕百戰轉危亡狼藉悲歌出漢堡夜帳天寒抱玉泣血變草青烟曉溼他年辟仇春草生吴中草死無妾名自從為草生西楚得到吴中猶楚舞樊夫人上昇詞四明山樊榭即漢劉綱與夫人樊氏上昇處石蠔粘窻秋見海山雞夜啼弄花彩王孫吹笙導夫人青髪凌風素霞在雨塵離地白浩浩河西種星榆樹老海桑童童日出歸衣溼上池洗頭草後瓊花引揚州城門夜塞雪揚州城中哭明月墮枝溼雲故鬼愁西来隂風無健鶻神鴉愁空衆芳歇一夕蒼苔變華髮宫花織簾塵掩襪玉華無因進吴越灕灕淮水山央央誰其死者李與姜冬青樹引别玉潛冬青樹山南陲九日靈禽居上枝知君種年星在尾根到九泉䕶龍髓恒星晝霣夜不見七度山南與鬼戰願君此心無所移此樹終有花開時山南金粟見離離白衣人拜樹下起靈禽啄粟枝上飛此事詳見林景熈與唐珏詩中極目二首南雁去來盡音書不可憑應過蠻嶺瘴聞拊楚臣膺滄海沈秦璧愁雲起舜陵可堪夢魂在囘首舊觚稜月離孤嶂雨尋夢下山川野塜埋鸚鵡殘碑哭杜鵑妓收中使客民買内醫田到此聞鄰笛離情重惘然槿樹白犬吠行人西風杵臼新洗香澄宿水曝髪向秋鄰野草依溝盡宫花入㡌頻人家小門徑憐爾獨相親元日讀老子望瀑作空山無轍迹縣水下分洪醉醒聽猶在寒暄色不同異書天姥秘靈物乳池空祗憶殘年雨先流到海中雨中觀海棠風吹簾網動對爾惜芳菲蜀雨何人在呉宫祗燕歸燭消春粉盡淚濕野香微抱蘤殘青子鳥銜隨處飛哭所知總戎臨百粤花鳥瘴江村落日失滄海寒風上薊門雨青餘化血林黒見歸魂欲哭山陽笛隣人亦不存九日韶卿子善有約不至子静亦歸桐廬與景雲飲瀑下揉藍染釣緡欲老此江濵九日寒泉水他年白髮身隣州曽約客别業未歸人嗅菊知吾事那能更問津呈王尚書應麟寒風吹鬢影客淚溼衣塵千里見積水滿城無故人船歌甌雪盡劔舞越花新獨憶絲綸老相從話所親山隂道中呈鄭正樸翁楊柳逺天色野風來水涯異郷同夢客今雨故人家越樹夜啼鳥禹陵冬落花悠悠江海意為爾鬢先華哭肯齋李先生落日夢江海呼天野水涯百年唯此死孤劔託全家血染楚花碧魂歸蜀日斜能令感恩者狼籍慰荒遐八詠樓江山此愁絶寒角夢中吹飛鳥過帆影遊塵空㦸枝水交明月動槎洑故州移已薄齊梁士猶吟沈約詩至日憶山中客山村雲物外至朔閏年愁獨客語茅屋樵人共白頭驛花殘楚水烽火到交州欲隠裂裳帛春来重結裘哭廣信謝公自爾逃名姓終䘮哭水濵海僧疑見貌山鬼舊為隣客死留衣物囊空出告身他年越鄉値賣卜有斯人莫春感興天涯芳草夢此意未應冺獨對風烟老虚為江海人漁樵分落日櫻筍過殘春舉世無知已他生應逐臣送道士歸赤松閒身可得仙諸妄覺他年夜氣浮秋井隂花冷碧田禮星逢鶴下咒食待人眠叩齒通𤣥觧祠堂山影邉西䑓哭所思殘年哭知已白日下荒䑓淚落吳江水隨潮到海廻故衣猶染碧后土不憐才未老山中客唯應賦八哀題翁徴君集後樵獵識冠裳何言志四方離秦風日冷過楚薜蘿長野夢違徴詔衰年枉薦章故山唐室晩應種术為糧夜坐呈韶卿修行吴楚間鶴去杳難攀衰世已如此愁身更入山巢居避太嵗藥飯救羸顔故友在江海相思不得還寄育王賢上人於今秪老身從昔少埃塵失蜀年為客居山石作鄰南遊宗竺法西語問巴人閉户藤花落多浮茗椀春海亭夜坐孤身滯海垠暑溽上南雲歸日喜秋近愁人畏夜分坐凉依井氣眠溼動星文故友在山北音書不得聞江上别友相看仍慟哭欲學晋諸賢戍近風鳴柝江空雨送船朔雲侵别色南雪憶歸年擬共鋤青术無為俗事牽憶過徐偃王祠下作徐王遺跡地花落舊巖阿山鬼下茅屋野雞啼苧蘿别祠江路見疑冡草間多寒食思家客空村記所過雨中感懐幽齋蒲稗裏夜色入柴荆坐久雨聲絶水深荷刺生聽猿思楚宿失鶴夢南征白屋青山下何年返舊耕寺南小池寺南疏小沼堤隱獺行踪杉影動寒水夕陽藏半峰清涵落鳥毳寒却病僧容聞說初開日鉢盂盛養龍巳丑除夜鬢絲殘雪影况復在塵埃暮色隨鐘盡年光逐水來隣逋燈下索鄉夢戍邉囘明日聽春雨渡江登越臺野望心遊太古後轉覺此生浮天外知何物山中着得愁岸花低草色潮水逆江流消長盈虗裏令人白盡頭商人婦抱兒來拜月去日爾初生已自滿三嵗無人問五行孤燈寒杵石殘夢逺鐘聲夜夜鄰家女吹簫到二更悼古季清典刑前一輩言語尚風流詩律縛不住梅花惱得愁雲烟今變滅老病總宜休喚醒菟裘夢嚴城山雨秋雪後湖堤歩歸無求如有得散策隄邊行山碧眼花亂水寒毛孔生窮冬疑有雨一雪却成晴勞謝天涯月相隨歩入城書文山卷後魂飛萬里程天地隔幽明死不從公死生如無此生丹心渾未化碧血已先成無處堪揮淚吾今變姓名青蒻亭青山何處似疑是剡溪傍採蒻無人到生莎滿徑荒水交難辨色花和不同香歸路逢樵子麻衣草結裳沙岸登舟五里兒女歩虛沙映斷笻雲支半山石帆席上溪風數雁憐身隻聞鵑願耳聾市橋東畔塔側影夕陽中僧房疥壁松樹落釵肢曉行猶見燈圓亭方井水老寺少年僧澗響夜疑雨雲寒春欲層山童錯相認應道我來曾叠山礧磈復崔嵬晴雲撥不開鐘聞上界響石自太湖來靈草擣為藥寒松燼作煤欲窮登覽興未到已徘徊嵗月嵗月記不得曾行此處村目欹眠石影樹長食藤根晩羡棲猿鳥春來問子孫勞生空可說不是欲㤀言送汪十多年隱賣漿此去結山房掃菌侵花落種松如草長老期秋欲至貧味水初嘗嵗晚逢樵獵音書定不㤀悼南上人翻經卷未終聞打寂時鐘盡說他身在惟應外國逢錫聲歸後夜琴意滿諸峰憶昨安禪處湖雲起白龍送毛耳翁之湘南湘草碧於水王孫尚此留一身行萬里雙鬢集諸愁月落衡雲曙龍逃海雨秋可能無事業相見竟悠悠别子静郤送之霅獨徃知吾事語離何所求故家無别業殘夢下扁舟積葉吴宫冷吟猿顧渚秋那能不相待羇旅負清遊懐峨眉家先生露下溼百草病思生積愁窟泉春洗屐氊雪暮過樓魂夢来巴峽衣冠老代州平生仗忠信心世豈相仇遊釣䑓古䑓臨釣渚遺像在蒼烟有客隨槎到無僧依樹禅風塵侵祭噐樵獵避兵船應有前朝蹟看碑數漢年早春寄嶺海流人短褐隨南賈衰年異壮遊龍旂虗左个鴻影别中州晚避髙麗使春乗百濟舟王孫與芳草相憶可能留送人還蜀白髪夢鄉國君歸路不迷洑槎秋見草荒棧夜聞雞月過秦凉北星流河漢西何因到却返吴語話分攜憶梁禮部椅閒庭芳桂叢相憶曙雲空文字能娱老莓苔此興同青山明月下家口少㣲東嵗晚西莊路柴門語自工孤山又冐晴絲向水涯寒雲冉冉䕶巾紗能知緑鬢幾回至欲作黄冠此䖏家已把掖垣等茅舍不愁封禅對梅花晚風吹袂過船去看鶴上天衝碧霞中秋憶山中人兹夕發清嘯為君楚舞終西風五陵夢凉露九霄中野邏煙常起溪流榜不通天隂無乳兔林盡見飛鴻溼溼雲垂髪芁芁樹偃弓劒歌𤣥武莫塵語白鷗空秪有淮南淚應沾青桂叢雨宿太白城中家斧氷此地絶炎蒸天食青童捧龍居白氣升暗燈猶宿火寢服尚𠂻繒客話從前事書傳入内僧風流今獨盡雲物老相仍浄榻搜凉卧危欄入醉凭雨師行下界鳥夢識中乗明發甬南去他山逢智𢎞採藥候潮山宿山頂精藍夜中望海蛟門南去鳥此地望迢迢積溼侵旛黒生寒入夢飄見燈歸舶夜聞偈觧衣朝土植皆為藥山枝不滿樵暗光珠母徙秋影石花消擬候槎回漢寕甘客老遼郤尋徐福島因問秦皇橋於彼看日出羽旌焉可招仙華山招隠軒后悲蒼劒神娥下玉簫攀髯初失夢遺蜕尚凌歊碧墮升棺影青分産桂苖山精依鹿竹天雨溼雞翹有約成孤憤無人重久要豢龍因姓氏使鶴語軒軺冉冉將終老冥㝠不可招無書寄青雀有恨在中條友人自杭囬建寄别三首同來不同去離别暗銷魂閩浙若同水扁舟送到門潮信到嚴瀬水色過衢城寄潮不寄水潮去有回程水到衢城盡梅花上嶺生不如寄明月歩歩送君行過杭州故宫二首禾黍何人為守閽落花䑓殿暗消魂朝元閣下歸来燕不見前頭鸚鵡言紫雲樓閣讌流霞今日凄凉佛子家殘照下山花霧散萬年枝上挂袈裟重過二首複道垂楊草欲交武林無樹着凌霄野猿引子移来住覆盡花枝翡翠巢隔江風雨動諸陵無主園池草自春聞説就中誰最泣女冠猶有舊宫人春閨詞手觸殘紅頭懶梳香隨蝴蝶上衣裾暖風吹睡無言語又向牀頭看夢書四皓冷却秦灰鬢已翁紫芝歌罷落花風若教一出無遺恨莫入留侯凖儗中蠟梅冷艶清香受雪知雨中誰把蠟為衣蜜房做就花枝色留得寒蜂宿不歸題酒家壁緑隂深䖏問天涯黄鳥聲中覔酒家樹上老猿摘殘果向来纔見是春花方鳯淛人字韶卿由太學生授零州教授陳宜中當國禮下之同郡黄溍栁貫夙遊其門宋亡與謝翺吴思齊同志髙蹈不問當世事思齊字子善永康人陳龍川外孫也仙華山仙華矗萬仞我乃廬其東日夕與山對今兹踏岑巃起左信奔鹿當前任啼狨大嘯崖石裂一覽天宇空蒼松飽風雨絶壑挂老龍樵斧不得睨撫根憇吾躬邈哉軒轅氏問道由崆峒龍髯一以逺千載悲遺弓猶傳少女靈錬玉於馬宫山林重帝胄香火明民衷我来重懐古攬涕臨西風何當速刺飛一洗磊塊胷宋元詩㑹卷五十二
