body:
  text: 宋元詩㑹卷六十二兵部主事陳焯編金詩附蔡珪字正甫金丞相松年之子也七嵗賦菊詩語意驚人日授數千言天德三年進士擢第後不赴選調求未見書讀之其辨博為天下第一歷澄州軍事判官三河簿正隆三年銅禁行官得三代以來鼎鐘彞器無慮千數禮部官以正甫博物且識古今奇字辟為編類官丁父憂起復翰林修撰同知制誥改户部員外郎太常丞北廷稽古禮文之事取其議論為多大定十四年由禮部郎中出守濰州道卒感寓九官名世人制作歸一䕫達樂不達禮漢儒言足嗤古人寓意耳結氂持鍜鎚俗子未易識絶藝聊相推坐令編簡門亦以專門奇堂堂張長史楷妙世莫知謂予言不信願視郎官碑奇疑作期霫川道中扇底無殘暑西風日夕佳雲山藏客路烟樹記人家小渡一聲櫓斷霞千㸃鴉詩成鞍馬上不覺在天涯出居庸亂石妨車轂深沙困馬蹄天分斗南北人問日東西側腳柴荆短平頭土舎低山花兩三樹笑殺武陵溪秋日和張温中韻琴裏忘憂盡日彈百憂俱息夜初闌青燈把巻逢真味綠酒傾尊破薄寒月色半留梧影上露華應到菊花團在家須信貧猶好夢想人間行路難馬定國字子卿荏平人唐中令馬周之裔孫少日志趣不凡宣政末題詩酒家壁有蘇黄不作文章伯童蔡翻為社稷臣之句用是得罪亦用是得名阜昌初遊歴下亭以詩撼齊王豫豫召與語大悦授監察御史仕至翰林學士石鼓自唐以來無定論子卿以字畫考之云是宇文周時所造作辯萬餘言出入傳記引據甚明學者比蔡正甫燕王墓辯其初學詩未有入處夢父與方寸白筆從是文章大進自號薺堂先生有集傳於世雨晴離開化寺澗谷流秋水樓臺入暮寒連城遭雨積一日得泥乾利劍青鯊室名駒白鐵鞍囘頭棲隠地風樹響珊珊送王松年之汶上去去東平道飛轅不可攀地鄰邾子國天近穆陵闗問俗徴前事移家卜好山溪堂醉花月春興㡬時還清平道中棘林苦苣野花黃一馬駸駸渡漯陽别墅酒旗依古栁㸃溪花片落新香伏波事業空歸漢都䕶田園不記唐今日清明過寒食又將書劍客他鄉登歴下亭有感男子當為四海遊又攜書劍客東州烟橫北渚芰荷晚木落南山鴻雁秋富國桑麻連魯甸用兵形勢接營丘傷哉不見桓公業千古遶城空水流招康元質此生一著定如何不傍田疇即釣蓑北阜平蕪隨鳥遠東湖新漲與天多詩成重墨題飛葉睡起輕芒踏輭莎猶有客愁銷不盡風軒茶竈待君過題崇子中菴羨君高節似陶潛五畝園林老不添遯世人情雖淡薄開門秋色自清嚴案頭黃卷香終日砌下蒼苔雨一簷後夜中秋更應好隔窗雲木看飛蟾香嚴病中九州四海盡行路萬户千門非我家金彈不徒驚燕雀春雷終待起龍蛇郢州城西秋江白水浪花麤墟落人歸鳥自呼新月高城三百雉角聲吹徹小單于宣政末所作二首蘇黃不作文章伯童蔡翻為社稷臣三十年來無定論到頭姦黨是何人山杏山桃取次開紅紅白白上樓臺移將海底珊瑚樹乞與人家也不栽張子羽字叔翔東阿人馬定國薺堂集載其師友六人叔翔亦其一也定國謂叔翔于文章無所不能甞仕金官洛陽云壽張和滑益之理髮秋庭趂夕陽静中誰可共傳觴雲橫故國三年别水遶孤村六月涼病眼只貪書味永渴心頻夢橘奴香魚山早有終焉計少日應容解印章朱自牧字好謙棣州厭次人於皇統年間南選宋端卿榜登科大定初以同知晉寧軍事卒官有詩云寒天展碧供飛鳥落日留紅與斷霞又云水禽孤影白霜果半腮紅海氣升孤月巖姿起暝烟山雪尋崖斷林烟逐樹低燈殘星在壁霜重水漫衾句法之工類如此訪山寺僧踏破蒼苔叩竹扄晚晴夜院有餘清幡腰落日紅千颭簷際遙岑翠一橫種秫公田聊卒嵗栽蓮僧社擬投名從今興熟頻來往未信齋鐘午後鳴謝呉堡知寨安巨濟贈紙百幅百幅溪牋遠見羞故人佳餉若為酬幸將晚節收魚網未得良工起鳯樓柿葉學書差足慰芸香辟蠧㑹須求揮毫不見雲烟落愚賈操金愧暗投晚泊濟陽江北秋隂一半晴晚涼留與客襟清水邊畫角孤城暮雲底殘陽遠樹明旅鴈為誰來有信斷蓬如我去無程寥寥天地孰知已村酒悠然只獨傾郊行緩轡尋春水一涯最憐朝雨浥輕沙小溪烟重偏宜栁平野雲垂不礙花青眼步兵元好酒黑頭江令未還家興長不覺歸來晚過盡城頭陣陣鴉劉汲字伯深南山翁之子天德三年進士釋褐慶州軍事判官入翰林為供奉自號西巖老人有西巖集傳于家題西巖人愛名與利我愛水與山人樂紛而競我樂靜而閒所以西嵒地千古無人看雖看亦不愛雖賞亦不歡欣然㑹予心卜築於其間有峰極峭屼有泉極清寒流觴與祓禊終日堪盤桓此樂為我設信哉居之安劉瞻字巖老亳州人天德三年南榜登科大定初召為史館編修卒官春郊桑芽粒粒破春青小葉迎風未展成寒食歸寧紅䄂女外家紙上看蠶生所見傾欹石片插漣漪上有蕭蕭楊栁枝藻荇半浮苔半濕浣紗人去不多時郝俁字子玉太原人正隆二年進士仕至河東北路轉運使子居簡字仲寛進士不第有詩名太原平陽間居中字仲純樞密院令史出身嘗刺坊州人物楚楚所謂文獻不足猶超人羣者也蝸室草草生涯付短椽身隨到處即安然功名角上無多地風月壺中自一天世路久諳甘縮首麴車才值便流涎一生笑我林鳩拙辛苦營巢二十年奉陪太守遊南湖同郭令賦翠幄千章䕃晚空年華心賞兩無窮雲頭欲落催詩雨池面微生解愠風經笥使君談似綺僊舟令尹飲如虹娵隅自適清池樂不信參軍是郝隆寺樓晴望詰曲闌干面翠微蔥蘢窗户溢清暉雨侵斜日明邊過雲望山前缺處歸多病過春猶止酒薄寒向晚却添衣宦名不負滄波願羞見陂田白鳥飛任詢字君謨易州軍市人父貴有才幹善畫喜談兵以宣政間遊江浙君謨生於處州為人慷慨多大節書法為當時第一畫亦入妙品評者謂畫高于書書高于詩詩高于文然王内翰子端獨以其才具許之君謨正隆二年進士歴省掾大名總幕益都都司判官北京鹽使課殿降州佐時無借力者故連蹇不進六十四致仕優游鄉里家所藏法書名畫數百軸日夕展玩不知老之將至年七十卒西湖西湖環武林澄澄大圓鏡仰看湖上寺即是鏡中影湖光與天色一碧千萬頃堤徑截烟來樓臺自昏暝庚辰十二月十九日雪馮夷剪水翻銀璣北風浩浩如兵威瓊臺玊樹壓金碧三十六宮明月輝五更待漏雞人唱近衞臚傳九天上須臾龍馭踏飛瑤萬户千門寂相向皓齒才人宮袖窄巧畫長睂梅半額含嚬一笑競春妍繡勒錦韉生羽翮城外雪深迴馬首别殿傳觴燈作晝歡聲一曲借春謠半夜西園滿花栁霑濡已見盈阡陌况是隆冬見三白帝力如天人得知今慶明年好春澤馮子翼字士美大定人正隆二年進士性剛果與物多忤用是仕宦不進以同知臨海軍節度使事致仕居真定有詩樂府傳于世三月七日登龍尾山寺古寺尋龍尾山城送馬蹄花濃香腽肭泉瑩冷玻璃寒食春無㡬催歸日欲西春風吹病眼烟樹逺凄迷佑德觀試經林館清深小雪殘釀梅天氣不多寒客窗竟日無人到只有蕭蕭竹數竿邊元鼎字德舉豐州人兄元勲元恕俱有時名號三邊德舉十歳能詩天德三年第進士以事停銓世宗即位張太師浩表薦供奉翰林出為邢州幕官復坐誣累遂不復仕帝城帝城囘想夢魂中秋月春花在處同朱雀橋邊三月草鳯皇樓上四更風錦囊别後吟箋少玊笛閒來酒醆空贏得當時舊標格九分憔悴入青銅新香新香終比舊香濃只是相逢久不容繡被瞥同巫峽夢銀鞍多負景陽鐘寶檀烟斷閒金獸玉鎖聲傳惱睡龍簾影漸分風又起一塘秋水落芙蓉閒題十年一夢到灰心歸鬢吳霜漸欲侵物外少逢稀有鳥冶中仍作不祥金閒雲閣雨終何事枯木因風亦自吟却歎淵明非達道無絃猶是未忘琴偶見二首牛女佳期歳一過都縁迢遞隔金河可憐馬上香車畔只隔珠簾更不多輕蓮素質澹蕭蕭葉密溪深未可招雨暗蘭舟人去後却容白鷺逞風標李晏字致美高平人唐順宗第十六子福王綰之苗裔也父森字彦實工于詩致美皇統二年經義進士釋褐臨汾丞時張太師浩判河陽一見愛其才為之延譽稍遷遼陽幕官與興陵有藩邸之舊入翰林為學士高文大冊號稱獨步拜御史中丞明昌初為禮部尚書分諸道府試復經義設經童科皆自致美發之贈燕王謝堂前燕秋風又送歸向人如惜别入户更低飛海濶迷烟島樓高近落暉不知從此去㡬日到烏衣高麗平州中和館後草亭藤花滿地香仍在松影拂雲寒不收山鳥似嫌遊客到一聲啼破小亭幽王寂字元老薊州玉田人系出三槐父礎字鎮之國初名士仕至歸德府判官元老天德三年進士興陵朝以文章事業顯終于中都路轉運使壽六十七諡文肅有拙軒集北遷録傳于世送張仲謀使三韓照海旌幢出樂浪過家上冢路生光鴨江桃葉朝迎渡岊嶺松花夜煮湯恩詔肅將芝檢重醉鞭低裊玉鞘長遺民笑指天車道酷似南陽異姓王高麗稱中原使節皆曰天車某官事見閻子秀鴨江行記奉題少保張公曲阿别墅鍾湖亭下水淙淙緑野平原未易雙十里藕花紅步幛一軒松䕃碧油幢洛中獨樂有司馬天下不名知曲江紙尾欲煩賢宅相雨蓑添我坐蓬窗劉仲尹字致君葢州人後遷沃州正隆二年登進士第以潞州節度副使召為都水監丞卒致君家世豪侈而能折節讀書詩樂府俱極藴藉有龍山集甞於其外孫欽叔處見之參涪翁而得法者也秋盡利禄蝸涎壁年華蟻夢槐秋隨庭樹老寒逐雁聲來養性論三適分愁咏七哀閉門人客少書籍遶牀堆墨梅二首瘦損昭陽鏡裏春漢家公主奉烏孫淚痕滴盡穹廬月誰道神香解返魂生憎施粉與施朱換骨𤣥都亦自殊疎影冷香題不到夢驚烟雨暗西湖劉迎字無黨東萊人初以䕃試部掾於大定十三年用薦書對䇿為當時第一明年登進士第除豳王府記室改太子司經顯宗特親重之二十年從駕涼陘以疾卒章宗即位録舊學之勞賜其子國樞進士第無黨自號無諍居士有詩文樂府號山林長語詔國學刋行河防行南州一雨六十日所至川原皆汎溢黃河適及秋水時夜來決破陳河堤河神憑陵雨師借晚未及晴昏復下傳聞一百五十村蕩盡田園及廬舎我聞禹時播河為九河一河既滿還之他川平地迥勢隨弱安流是以無驚波秖今茫茫餘故迹未易區區議疏闢三山橋壊勢益南所過泥沙若山積大梁今世為陪京財賦百萬資甲兵高談泥古不須爾且要築堤三百里鄭為頭汴為尾準備他時漲河水雲中君圖衣若新沐蘭湯薫靈巫拜舞方迎神恍然相見帝者服九歌昔咏雲中君畫史亦可人妙入造化域羽衣玉麈美且閑此意不知何處得空明倐忽紛溟濛胡為眷眷臨壽宮飄然來下復遠舉想像決去隨飛龍祠空人散秋蕭瑟落日猿聲喚秋色湘天極目青茫茫憑高一望無南北梁忠信平遠山水憶昔西遊大梁苑玉堂門閉花隂晚壁間曽見郭熙畫江南秋山小平遠别來南北今十年塵埃滿目不見山烏靴席帽動千里只慣馬蹄車轍間明窗短幅來何處亂㸃依稀涴寒具煥然神明頓還我似向白玉堂中住濛濛烟靄樹老蒼上方樓閣山夕陽一千頃碧照秋色三十六峰凝曉光題十睂圖寶箱拂塵金􅘫膝周昉丹青見真筆春風曽解賦妖嬈人共畫圖成十一燭奴香底花光凝錚錚鐵響聞三更車聲雷動不通語眼態波橫空送情蠻雲盤鶴遼天濶犀玉依依對書札人生何處不相逢還醉武陵溪上月沙漫漫沙漫漫草斑斑南山北山相對看我行乃在山之間行人仰不見飛鳥樹木足知邊塞少沙漫漫草斑斑我行欲趂西風還僕夫汝莫愁衣單我但著衣思汝寒車轣轆馬虺隤牛觳觫山行縈紆車轣轆路傍指㸃是官人老矣一翁雙鬢秃汝牛幸可耕汝馬幸可騎有此可載琴書歸胡為奔走東西道白髮刁騷被人笑海上潮蹙三山島烟橫萬里沙蜃樓春作市鼉鼓暮催衙一曲水僊操片帆漁父家安期定何處試問棗如𤓰秋郊秋水四五尺暮山三兩峰浮雲白毫相落日紫金容蓑笠前村笛樓臺古寺鐘殷勤小平遠圖畫憶渠儂代人憶舊緩步素絲障微吟紫綺裘醉便風側帽歌愛月明樓犀軸題春恨銅荷滴夜愁風流十年夢燈火漫揚州彥美生朝壯日里閭俠臂彎雙角弓繡韉紅匼匝貂袖紫䝉茸雲態自蒼狗玊輝猶白虹為君占壽骨綽起有清風寄題安巖起官舎北溟一軒高占鳳麟洲要作人間汗漫遊海國風烟自朝暮洞天日月㡬春秋夢魂欲拂三花樹生計聊隨一葉舟待我丹成訪君去閬風佳處卜菟裘和人七夕韻今古良宵此㑹同望穿雲物有無中人間鈿合三山隔天上靈槎一水通鳷鵲樓空紈扇月鴛鴦機冷苧蘿風不須更乞蛛絲巧久矣人生百巧窮代王簿上梁孟容副公二首妙年椽筆賦長楊一日聲名滿四方天上風流青瑣客人間嘉慶綠衣郎錦囊看讀金花誥畫㦸閒凝燕寢香預恐政成趨急詔海沂無計駐王祥自笑微官馬骨高十年霜鬢雪刁騷長林豐草未適性尖帽短鞾安得豪名宦真同一鷄肋簿書空束兩牛腰故園清興湖山裏歸去經營一把茅清明前十日作雨餘天氣動朝寒寒食都來數日間羯鼓催開小桃李畫屏圍出好溪山塵埃老我真堪笑風物撩人欲破慳梅雪已殘春過半一樽何處與公閒㑹客普照繼呈此詩去及𤓰不數日矣室中呼起散花天來伴維摩到處禪百刻篆香消晝永一番花雨破春妍雲山真欲追聱叟風腋何妨借玉川他日相思共明月舊遊應説禁烟前觀古作者梅詩戲成一章翠袖佳人脩竹傍風姿婥約破湖光靜中慣識形神影妙處誰知色味香觀想有靈通水月孤音無伴挾冰霜故人愁絶今何許烟雨霏霏子半黃聞彦美服藥以詩問訊耳邊塵事且無喧聽我歸耕郭外村賤子自藏蝸殻舎故人誰並雀羅門書窗共作三年計樽酒相逢一笑温不信家山不堪隠仇池今在古銅盆次劉元直韻二首一秋何事憶歸頻正以家無妬婦津未許桂枝招隠士不妨桃葉贈行人夢魂歴歴家山遠客宦悠悠五斗貧犀箸鸞刀許何日歸來舉案得紛綸半年歸夢别離間只有音書雁足還羅幕翠橫秋掩冉玉壺紅濕淚斕斑天明不作霧非霧月破可憐山復山準擬春風對眉嫵一樽相對洗愁顏和曹次仲韻因以自感自笑區區學道難未容香火訪名山因循憂患餘生裏收斂光芒窘步間白社祝公今日始丹丘容我㡬時還相從願結翻經㑹共過壺中日月閒陪諸友登三山亭半濠清淺芰荷凋落日登臨未寂寥山色逼秋渾作市海聲迎暮欲吞潮沙頭白鳥疑相熟木末青旗苦見招不似常時對官府可無閒話及漁樵題歸去來圖筆端奇處發天藏事逺懐人涕泗滂餘子風流追魏晉上人談笑自羲皇折腰五斗㡬錢直去國十年三徑荒安得一堂重寫照為公桂酒瀉蕉黃昌邑道中屋角鷄號夜向晨客牀相對話悲辛流離僅脱噲等伍老大空為濟上人却掃欲安無事貴累人猶説立錐貧故山鄰里今安否歸去同尋筍蕨春寄題孔德通東園花木隂隂一畆宮平生高興與誰同樽罍北海無虚日鄉里東家有故風先業固知衣鉢在大門應惜槖奩空襄陽耆舊今誰識尚喜風流見阿戎題仲山枝巢鏡中青鬢入霜皤歳月從交落魄過物理不容人過分生涯休歎我無多百年竟似蠅鑽紙萬事終同鼠飲河秖恐徐公宿緣在東風時夢海棠窠梅誰道江梅驛信遲碧琅玕裏見橫枝為尋疎影暗香處獨立嫩寒清曉時嚼蘂不妨浮白飲認桃休賦比紅詩平生東閣風流在何遜而今鬢欲絲城南菴故鄉歸思白雲邊缾鉢東來想浩然桑下久無三宿戀室中今許一燈傳夢驚城郭風塵窟興寄湖山雪月船老矣重遊恐難得平生四海與彌天寄題薊丘僧房道人休去白雲邊老矣分明懶瓚然參學誰能知許事退休聊得息諸緣忘形馬跡車塵外適意山光水影前想得松根憩寂寞壊殘雲衲半垂肩聞丘丈晚集慶壽作詩戲之桃李欲開風雨多花時猶得屢經過緩聽一曲玉連瑣滿汎十分金卷荷紅燭影紗聞喚馬翠羅承韈見凌波杜陵老矣孤春事奈此詩愁惱亂何河橋桃李香中八九家青旗高挂綠楊斜晚來風色渡頭急滿地蕭蕭楊白花過闗渡水圖短車無復駕青牛散策方來對白鷗烟水從容許君獨暫須分我一船秋歸來圖戲作雲髻春風一尺高笑攜兒女候歸橈須知一首閒情賦合為微官懶折腰党懐英字世傑宋太尉党進之十一代孫也父純睦自馮翊來以從仕郎為泰安軍録事參軍卒官妻子不能歸遂為奉符人懷英之在孕也母夫人夢道士吳筠來託宿及公生儀觀秀整如神僊然少穎悟日授千餘言師亳社劉巖老濟南辛幼安其同舎生也甞試東府取解魁是後困于名場遂不以世務嬰懐放浪山水間詩酒自娛簟瓢屢空宴如也夫人石氏徂徠先生之後亦能安貧守分既久鄉豪傑有知公者稍料理之大定十年擢進士甲科調成陽軍事判官汝隂令入為史館編修應奉翰林學士出為大定軍節度使為政寛簡不言而人化召為翰林學士承㫖大安三年九月年七十八終于家諡曰文獻瓊花木后土像皇媧化萬象賦受無奇偏胡為堕愛境亦為尤物牽煌煌靈祠花玊蘂冠春妍婉如傾國姝獨立江湖邊顧惜怨奪移含秀梁宫烟青黃竟自冦始信擁腫全珍材歸好事肌理緻且堅瑑刻方寸餘遺像規汾壖願言税靈馭要復安所憐神遊妙難詰豈以大小懸槐根開夢國橘實遊碁僊靜想寶龕中坐納東南天况有大者存指顧超八埏西湖晚菊重湖滙城曲佳菊被水涯高寒逼素秋無人自芳菲祥飈散幽馥晴露堕餘滋蹊荒綠苔合采采歎後時古缾貯清泚芳樽湔塵霏遠懐淵明賢獨往誰與期裵囘東籬月歳晏有餘悲西湖芙蓉林飈振危柯野露委荒蔓孤芳為誰妍一笑聊自獻明妝炫朝麗醉態羞晚困脈脈懐春情悄悄驚秋怨豈無桃李媒不嫁惜嬋媛悠哉清霜暮共抱蘭菊恨晚菊芙蓉詩未見風致而遺山極賞併舉王子端獄中賦萱作追配栁州芍藥東坡長春毋乃過乎趙飛燕寫真昭陽宮裏千蛾睂中有一人輕欲飛姊妹夤緣恃新寵六宮鉛粉無光輝春囘太液花如繡花底輕風扶翠袖君恩不許作飛僊襞積宮裙留淺皺君王貪宴温柔鄉掖門不省搖倉琅避風臺成略今古空使遺妒驚霓裳當年傾城復傾國誰寫餘妍入丹碧背燈擁髻一澘然不應尚有樊通德楚清之畫樂天小娃撐小艇偷採白蓮囘不解藏蹤跡浮萍一道開詩因題其後樂天歸臥湖山邊閒買池塘娯暮年小蠻已老樊素去心地玲瓏如白蓮室中誰遣散花女故㸃禪衣香破禪鴛鴦為報竊花處題詩要戲小嬋娟紅妝秋水照明蠲清之粉本清且妍道人無心被花惱對畫作詩真適然君不見元亮投名蓮社裏不妨更賦閒情篇王庭筠字子端熊岳人父名遵古字仲元以正隆五年進士仕為翰林直學士才行兼備道陵所謂昔人君子者也子端早有重名大定十六年甲科文采風流照映一時歴州縣用薦得供奉翰林承安中為言事者所累謫州幕府未㡬復應奉稍遷修撰卒獄中賦萱沙麓百戰場舄鹵不敏樹况復幽圄中萬古結愁霧寸根不擇地于此生意具婆娑綠雲杪金鳯掣未去晚雨沾濡之向我泫如訴忘憂定謾説相對清淚雨舎利墖蒼山亭亭如覆盎佛塔東西屹相向林頭朝日射重檐黃金丹砂􅈌生光中華此塔第十五圖記所傳知不妄智慧薰成舎利羅夜半奇芒時一放想見當時阿育王麾叱神工鞭鬼匠雲車瘴海挽炎沙沙底黃腸三萬丈石排方面蔑石段鐵錮瘦中腰鼓樣工夫精密業長久位置尊嚴氣高張地皮浮水膚寸許旱溢與之俱下上崧山歸山夏秋雨雨潦從衡歳相盪天龍圍䕶夜叉守終刼不敢生波浪塔前樹秀老不死樹下水流多益壯再拜初甞一勺甘洗我三生煩惱障銅雀瓦歌袁輔之得鄴城注雨瓦筒用以支琴予因作詩紀之鄴城城南青雀來五樓突兀肩三臺胡桃萬瓦凈如水春隂不敢生莓苔檐雨闌干三百尺多年雨齧空堦石繁華已逐水東流斷甓時從耕者得可憐此物得君手愛之不啻連城璧錫花如雪錯髮華小字興和猶可識晴窗拂拭支桐君上下一般蛇蚹文哀彈遽止不成㺯千古愁聲誰忍聞送士選山東外臺判官秋天寥廓使星明光動山東七十城玉署文章厭閒冷繡衣風采試澄清人随白鴈霜前到詩遶青山馬上成才力如君君未老只愁無地避功名韓陵道中石頭犖确兩坡間不記秋來㡬往還日暮蹇驢鞭不動天教仔細數前山黃華山四絶句帝遣名山䕶此邦千家瑟瑟嵌西窗山僧乞與山前地招客先開四十雙王母祠東古佛堂人傳檐宇自隋皇年深寺廢無僧住滿谷西風栗葉黃手拄一條青竹杖真成日挂百錢遊夕陽欲下山更好深林無人不可留挂鏡臺前挂玉龍半山飛雪舞天風寒雲直上三千尺人道高歡避暑宮趙秉文字周臣滏陽人閒閒其自號也幼穎悟讀書若夙習大定二十五年進士應奉翰林文字坐譏訕免官未㡬起為同知岢嵐軍州事轉北京路轉運司度支判官承安五年冬十月隂晦連日宰相萬公入對上顧謂萬公曰卿昨言天日晦㝠亦猶人君用人邪正不分者極有理趙秉文曩以言事降授聞其人有才藻工書翰又且敢言朕非棄不用以北邊軍興姑試之耳泰和二年改户部主事翰林修撰出為寧邊州刺史二年改平定州治化清淨所去人思之貞祐初國中仍歳被兵公建言時事可行者三一遷都二導河三封建廷議略施行之四年除翰林侍講學士明年轉侍讀興定中拜禮部尚書兼侍讀同修國史知集賢院開興正月京師戒嚴時公已老日以時事為憂雖食息頃不能忘每聞一事可便民一士可擢用大則拜章小則為當路者言殷勤鄭重不能自已竟用是得疾薨年四十七雜詠猗猗南山竹並生凡卉叢歳晏多霜雪見别蕭艾中我欲食鵷雛千嵗不一逢留之和律呂截作嶰谷筒一變為清商日暮來悲風清泉溉石根上有白雲封虚心抱靜節知音為誰容不如歸去來一竿釣清灃和陶淵明擬古四首小智多自私大方乃無隅一毫納萬象萬象非卷舒日月為我牖天地為我廬曲士窘拘囚一身無容居我夢登日觀青天入平蕪俯視但一氣二豪彼何如昔日穆天子侈心窮八荒崑崙入馬蹄蘧廬視明堂王母為之謠白雲何茫茫憑高俯九州塊如螻蟻場歸來越河闗萬象壓崧邙遂令學僊者聞風為激昂漢武千秋露淮南八公方至今瑤池宴空為後代傷吾道無緇磷萬古常如兹奈何中智下謂彼不知時與世頗殊好譬彼澠與淄我欲質所從登高望九疑路逢古漁父長歌滄浪辭出門異所見退坐還自思當時固殊古古人不我欺翩翩出林鳥日暮將何之倚檐送歸盡聊欲絃吾詩西北有佳人樓上拊雲和一鼓别鶴操再㺯求凰歌絃聲㡬欲絶哀響何其多昔為掌中珍今為路傍花壯年不再得華落將如何和陶飲酒三首鷙鳥閉籠中舉翮觸四隅騏驥駕鹽車跼䠞困中途雖然遭識拔未免為人驅傍觀信美矣自愧良有餘不如兩無累還我田園居幽居淡無事雅志了𤣥經眼花憎文字悠悠竟無成中夜起不寐披衣守寒更梅竹散清影素月流廣庭孤鶴閟逸響切切寒蟲鳴拊卷長歎息慷慨惻中情漢儒傳注學未為世所得秦火少完書豈免烏焉惑後儒補罅漏聖道少開塞俗士喜持戈又一秦相國且共歡一觴多言不如黙白雁波淨影逾白霜清鳴更哀乾坤雙鬢老風雪一聲來林迥隱猶見天長去復囘物情嫌太潔莫使羽毛摧寄王學士子端寄語雪溪王處士年來多病復何如浮雲世態紛紛變秋草人情日日疎李白一杯人影月鄭䖍三絶畫詩書情知不得文章力乞與黃華作隠居靈感寺徒河岸北白蓮東法鼓驚飛碣石鴻塔上風烟高鳥路山頭雲雨化人宮松林礙日蜂房冷石砌頽沙蟻穴空欲盡休公揮麈樂鬢絲羞對落花風謁北嶽四大坤儀一羣山太茂尊奠方荒冀宅視禮配天孫西送虞淵暮東瞻碣石暾寶符臨代􅇿鐡甕扼并門控趙襟形壯包燕氣象渾九河探禹跡萬里呌虞魂在昔登封始前驅羽衞繁千家駢部曲萬騎隘山樊卜地恒陽曲移祠泰始元晉移祠曲陽荒碑刓歳月飛石􅗟乾坤帝秩加黃屋宮居象紫垣雲楣朽芝瑞雨砌裂槐根聖籙長桑洞僊巖張果村卜居如可近重整北山轅春遊無數飛花送小舟蜻蜓款立釣絲頭一溪春水闗何事皺作風前萬疊愁暮歸貪看孤鳥入重雲不覺青林雨氣昏行過斷橋沙路黑忽從電影得前村周昻字德卿真定人父伯禄字天錫師事𤣥真先生禇承亮大定初第進士仕至同知沁南軍節度使事德卿年二十一擢第釋褐南和簿有異政遷良鄉令入拜監察御史為人所擠竟坐詩得罪謫東海上十數年始入翰林言事愈切出佐三司非所好從宗室承裕軍承裕失利跳走上谷衆欲逕歸德卿獨不可城䧟與其從子嗣明同死于難定按禇承亮字茂先宋宣和六年登第金兵破真拘境内進士試䇿獨承亮長揖而出帥府甚重之曉望曉樹雲重隠春城日半隂蒼茫塵土眼恍惚嵗時心流落隨南北才華閲古今柴荆生事窄寧憶二疏金雨過雨映高檐過山開晚日明動雲方潰擁號水未休爭沙岸黿鼉出荒庭鶴鸛行草泥沾屐齒搘䇿有餘清晚步鬱鬱孤城隘飄飄絶塞遊短衣忘逺步高興㑹清秋白水深樵谷黃雲古戍樓居人半裘毯橫管暮生愁秋夜高閣鐘初殷層城月未光凈空含宇大臥斗帶星長暗覺巢烏動清聞露菊香誰家砧杵急應怯暮天涼宿西藍聞道西藍好能來定有縁青山避喬木流水信平田步屧迷深竹題詩惜暮烟塵心厭翻倒一室暫安禪夜步撃柝隣居靜開門宿鳥驚西風秋半急北斗夜深明獨立乾坤大徐行杖履輕遙憐漢官闕重露濕金莖望山中松地險蟠根古人稀小徑消雨皴開白雪風響入青霄未畏斧斤逼惟愁霹靂燒解鞍那避逺冷色故相招翠屏口四首去歳翠屏下東流看湧波愁將新鬢髮還對舊闗河健翮翻秋隼峰高并晚駝草深饒虎跡夜黑欲誰過地擁河山壯營闗劍甲重馬牛來細路燈火出寒松刁斗方嚴夜羔裘欲禦冬可憐天設險不入漢提封玉帳初鳴鼓金鞍半偃弓傷心看塞水對面隔炎風山去何時斷雲來本自通不須驚異域曽在版圖中萬里來崩豁終年氣慘悽地窮青澗斷天近玉繩低勃窟黃沙北崑崙白雪西故園何處覓搔首意空迷新秋畏日經時暑清秋一夕涼真堪近燈火不復病衣裳宋玉悲搖落安仁愧老蒼鄙夫那及此睡美百憂忘家園五畆園連竹三間屋向陽氣和春浩蕩心靜日舒長花鳥成相識琴書付兩忘陶然一尊酒誰復記羲皇香山山林朝市兩茫然紅葉黃花自一川野水趂人如有約長松閲世不知年千篇未暇償詩債一飯聊從結淨緣欲問安心心已了手書誰識是生前宋文貞公廟開元四荒不動塵柱石中原有老臣襄土一丘松栢暗長安三日荔枝新讀陳後山詩子美神功接混茫人間無路可升堂一斑管内時時見賺得陳郎兩鬢蒼趙渢字文孺第進士明昌末終于禮部郎中性冲澹學道有得黄山其自號也閒閒趙公云黃山正書體兼顔蘇行草備諸家體超放處又似楊凝式當在黃魯直蘇才翁伯仲間党承㫖篆陽冰以來一人而已而以黃山配之至今人謂之党趙有黃山集行於世澗上逺逕留殘照疎林出小園山川半豺虎歳月且琴尊杜老新雞栅龎公舊鹿門不才真忝竊人道典刑存中秋應制秋氣平分月正明蘂珠宮闕對蓬瀛已驅急雨消殘暑不遣微雲㸃太清簾外清風飄桂子夜深涼露滴金莖聖朝不奏霓裳曲四海謳歌即樂聲史舜元甞從文孺學詩説道陵中秋賞月瑤光樓召文孺對御賦詩以清字為韻道陵讀至落句大加賞異手酌金鍾以賜且字之曰文孺以此鍾賜汝作酒直士林榮之漢高祖言吾不如子房君父字呼臣下不為無故事也黃山道中小穀城荒路屈蟠石根寒碧漲秋灣千章木秀黃公廟一㸃雲飛白墖山好景落誰詩句裏蹇驢駝我畫圖間膏肓泉石真吾事莫厭乘閒數往還晚宿山寺松門明月佛前燈菴在孤雲最上層犬吠一山秋意靜敲門時有夜歸僧過蓚縣董大夫廟漢朝原不用真儒豈信忠言益帝圖賈誼長沙鼂錯死未須獨恨老江都劉昻字之昻興州人大定十九年進士曽高而下以科名相踵者七世矣昻天資警悟律賦自成一家輕便巧麗為場屋捷法作詩得晚唐體尤工絶句張秦娥者頗能小詩其賦逺山云秋水一抹碧殘霞㡬縷紅水窮霞盡處隠隠兩三峰其後流落之昻贈詩云逺山句好畫難成栁眼才多總是情今日衰顔人不識倚爐空聽煮茶聲又云二頃山田半欲蕪子孫零落一身孤寒窗昨夜蕭蕭雨紅日花梢入夢無娥為泣下屏山外傳記之昻早得仕年三十三省掾考滿受平涼路轉運副使人謂卿相可坐致矣術士有言之昻官止五品者之昻不信也俄丁母憂為當途所忌連蹇十年卜居洛陽有薦其才于道陵者泰和初自司業擢左司郎中將大用矣㑹遼陽闕大中欲搖執政賈鉉為言者所劾辭連之昻道陵震怒一時聞人皆譴逐之鉉尋亦罷政之昻降上京留守判官道卒竟如術者之言醉後禪僧勸讀傳燈録道士教行進火功今日興來俱破戒黃花籬落醉西風山中雨嵩高山下逢秋雨破繖遮頭過野橋此景此時誰㑹得清如窗下聽芭蕉即事二首雨洗明河畫扇收胡床露冷藥闌秋牆隂未得中庭月一㸃螢光草際流山花山雨相兼落溪水溪雲一樣閒野店無人問春事酒旗風外鳥闗闗宋元詩㑹卷六十二
