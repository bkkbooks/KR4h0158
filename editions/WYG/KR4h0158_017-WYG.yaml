body:
  text: 宋元詩㑹卷十七兵部主事陳焯編蘇洵字明允眉州眉山人年二十七始發憤為學嵗餘應舉不中悉焚常所為文閉户益讀書遂通六經百家之説下筆頃刻數千言至和嘉祐間與其二子軾轍皆至京師翰林學士歐陽修上其所著書二十二篇既出士大夫争傳之一時學者競效蘇氏為文章矣宰相韓琦請於朝召試舍人院辭疾不至遂除秘省校書郎復以霸州文安縣主簿同修太常院禮書書成方奏未報卒特贈光禄寺丞有文集二十卷諡法三卷有驥在野有驥在野百過不呻子不我良豈無他人縶我于廐乃不我駕遇我不終不如在野秃毛于霜寄肉于狼寧彼我傷寧人不我顧無子我忘朝日載昇朝日載昇薨薨伊氓于室有績于野有耕于塗有商于邊有征天生斯民相養以寧嗟我何為踽踽無營初孰與我今孰主我我將往問安所處我我客至止我客至止我迎于門來升我堂來飲我罇羞鼈不時詈我不勤求我何多請辭不能客謂主人唯子我然求子之多責子之深期子于賢顔書任君北方來手出邠州碑為是魯公寫遺我我不辭魯公實豪傑慷慨忠義姿憶在天寶末變起漁陽師猛士不敢當儒生横義旗感激數十郡連衡鬭羗兒新造勢尚弱胡為力先衰用兵竟不勝歎息眞數竒杲兄死常山烈士淚滿頤魯公不死敵天下皆熙熙柰何不愛死再使踏鯨鰭公固不畏死吾實悲當時緬邈念高誼惜哉生我遲近日見異説不知作者誰云公本不死此事亦已竒大抵天下心人人屬公思加以不死狀慰此苦歎悲我欲哭公墓莽莽不可知愛其平生迹往往或孑遺此字出公手一見減歎咨使公不善書筆墨分訛癡思其平生事豈忍棄路岐况此字頗怪堂堂偉形儀駿極有深穏骨老成支離㸃畫廼應和闗連不相違有如一人身鼻口耳目眉彼此異狀貌各自相結維離離天上星分如不相持左右自綴㑹或作斗與箕骨嚴體端重安置無欹危篆鼎兀大腹高屋無弱楣古器合尺度法物應矩規想其始下筆莊重不自卑虞柳豈不好結束煩馽羈一車㑹百木斤斧所易為團團彼明月欲畫形終非誰知忠義心餘力尚及斯因此數幅紙使我重吁嘻歐陽永叔白飛鷹摶平原禽獸亂衰草蒼茫就擒執顚倒莫能保白不忍殺歎息愛其老獨生遂長拘野性始驚矯貴人織筠籠馴擾漸可抱誰知山林寛穴處頗自好高飈動槁葉羣竄迹如掃異質不自藏照野明暠暠獵夫指之笑自匿苦不早何當騎蟾蜍靈杵手自搗送陸權叔提舉茶税君家本江湖南行即鄰里税茶雖冗繁漸喜官資美嗟君本篤學寤寐好文字往年在巴蜀憶見春秋始名家亂如髮棼錯費尋理今來未五嵗新傳兩盈几人言欲治易雜説書萬紙君心不可測日夜湧如水何年重相逢祗益使余畏但恐茶事多亂子易中意茶易兩無妨知君足才思丙申嵗余在京師郷人陳景回自南來弃其官得太子中允景回舊有地在蔡今將治園囿於其間以自老余嘗有意於嵩山之下洛水之上買地築室以為休息之館而未果今景回欲余詩遂道此意景回志余言異日可以知之非戲云爾岷山之陽土良腴江水清滑多鯉魚古人居之富者衆我獨厭倦思移居平川如手山水蹙恐我後世鄙且愚經行天下愛嵩嶽遂欲買地居妻孥晴原漫漫望不盡山色照野光如濡民生舒緩無夭札衣冠堂堂偉丈夫吾今隠居未有所更後十載不可無聞君厭蜀樂上蔡占地百頃無邊隅草深野濶足狐水種陸取身不劬誰知李斯顧秦寵不獲牽犬追黄狐今君南去已足老行看嵩少當吾廬送王吏部知徐州東徐三齊之南鄰夫子豈是三齊人辭囂乞静得此守走入藪魚投津徐州絶勝不湏問請問項籍何去秦江山雄豪不相下衣錦逰戲欲及晨霸王事業今已矣但有太守朱兩輪還鄉據勢與古並豈有漢㦸窺城闉論安較利乃公勝行矣正及汴水春文同字與可梓潼人漢文翁之後方口秀眉以學名世操韻高潔自號笑笑先生善詩文篆𨽻行草尤工畫竹文彦博守成都竒其才司馬光蘇軾尤相敬重軾固同之中表弟也舉進士官集賢校理知陵州洋州元豐初知湖州至陳州宛邱驛忽留不行沐浴衣冠正坐而卒起夜來曉牕明緑紗蜀錦壓春卧横腮虎魄冷驚起新夢破玲瓏轉條脱縹緲梳倭墮高軸響銀牀時誤君車過積雨京師値積雨浮淖皆滿城况當淘決時左右羅深坑有客南河居旦夕隄上行病僕挾羸馬十歩八九傾職事有出入長抱落膽驚都人素豪恣小官常見輕排闢要穏道歛避不敢争試欲效呵止圜目根姓名往往被濺汚直落舌與睛歸來事洗濯袍袴分縱横仰首問天公春澤當早晴幸有好日月何惜施光明西岡僦居出官在秦蜀始末凡十年所治得公宇靡不完且堅中堂與夾廊角翼相鈎聯領屬僅十口出處皆安便冬夏惡風日侵薄曾無縁今年歸中都職事叨磨鉛未免僦屋住敢謂須華鮮西岡頗幽僻愛此遠市㕓問得王氏居十楹月四千牀榻案几外空處無一椽匽溷及井竈坼壁皆相連經卑湏俛首過隘常側肩所謂十口者日繞蝸殻旋前時大暑中幾不禁袢延鬱若鼎釡炊局如狴犴攣走蝎過亂蟻飛蚊劇羣蟬今日幸過之復畏明日然喜見白露節相賀肌肉全如何下淫雨曉夕常綿綿瓦破榱桷漏柱䧟墻垣穿惟供改席坐豈暇安枕眠中庭止數歩深已可載船盡室徒跣行一起復一顚京師費耗地居止實重遷俸料計月入外得無幾錢却思已過分僅免親犁田自望于古人若地而升天小廬焦生高陋巷顔子賢引之諭妻孥吾道宜此焉猶勝比鄰者寒突無晨煙翡翠清晨有珍禽翩翩下魚梁其形不盈握毛羽鮮且光天人裁碧霞為爾縫衣裳晶熒炫我目非世之青黄愛之坐良久常恐瞥爾翔忽然投清漪得食如針鋩如是者三四厭飫已一肮既飽且自嬉翻身度回塘飛鳴逐佳匹相和音琅琅是時鳬與鴈狼藉島嶼旁滿腹釀腥穢紛紛晒晴陽鶖鶬最麤惡觜大脚脛長入水捕蛇鱓淤泥亦銜將想其見爾時一喙亦爾傷其心肻謂爾被體凝華章勸爾愼所止好醜難同鄉行當事澡刷帝圃參鸞凰貧居繩牀擁敝裯初起髮未櫛南牕展書卷就暖讀寒日門前絶車馬薄暮垂片席短牆挂纎蔓幽鳥啄紅實羣蝸惡積雨繚繞篆空壁男兒處貧賤舉首宇宙窄翩翻搶榆鳩宛轉匿絮蝨妻奴競相笑憔悴守文筆冷缾海南有陶器質狀矮而橢云初日炙就鍜鑠不以火水壺醜突兀酒甒肥磥砢山罍頸微腫石鼎足已跛圓如䲭夷形大比康瓠顆華元腹且皤王莽口何哆外貢入中原萬里隨大舸攜之五芉市巾匱費包裹侏㒧講其效㵼辯若炙輠課以沸泉沃冰雪變立可炎歊療中渴其用豈么麽君凡幾錢得不惜持遺我曾將對佳客屢試輒亦果勿云遠且陋幸可置之左織婦怨擲梭兩手卷踏繭雙足趼三日不住織一疋纔可剪織處畏風日剪時謹刀尺皆言邊幅好自愛經緯密昨朝持入庫何事監官怒大字雕印文濃和油墨汚父母抱歸舍抛向中門下相看各無語淚迸若傾㵼質錢解衣服賈絲添上軸不敢輒下機連宵停火燭當須了租賦豈暇恤襦袴前知寒切骨甘心肩骭露里胥踞門限呌罵嗔納晚安得織婦心變作監官眼採蓮曲緑纈襠紅繡裳衫盤蜂蝶裙鴛鴦雕瑰錯寶垂鬢長紫冐翠葢行新粧蹁躚曲堤下回塘畫橈送入波中央羅袖卷起金釧光揺輕撼脆敲短芒丹瓊紺玉低復昻霑裛薄粉撲嫩黄蠶腰蛛腹輕飄揚列坐綵舫求比方笑聲吃吃動明璫挨蒲拂蓼次岸旁風吹落霞供晚凉西城鵶鵶啼女牆歸來索酒酌滿觴呉屏蜀帳圍象牀困卧不起燈燭張琉璃盎缶叢生香朱櫻桃金衣珍禽弄深樾禁蘌朱櫻斑若纈上幸離宫促薦新藤籃寶籠貂璫發凝霞作丸珠尚輭油露成津蜜初割君王日午坐猗蘭翡翠一盤紅靺鞨惜花㳺蜂採花花氣薄黄鳥啄花花蘂落林風吹花花片亂池水浸花花色惡少年惜花㑹花意晴張青幃雨油幕勸君直須為花飲明日春歸空晚蕚採藥歸晚因宿野人草舍東陟隂深崖巘古夾澗埀泉結鵝乳我來採藥晚忘歸試宿荆扉問雞黍春風滿林燈火冷一夜不眠山月苦平明攜䇿下青蒼松葉紛紛灑新雨蒲生鍾馗寒風酸號月慘苦梟飛狐鳴滿墟墓叢棘亂礓翳野霧古社禿剥倒枯樹下有三鬼相嘯聚初行誰家作疰忤痛熱腫痒快嘔吐塞噎咽喉脹臍肚呼巫召覡使咒詛翁驚嫗忙設賽具茅盤草船置五路飯盂炙串狼藉布相共收歛各執去方此危坐歠且哺忽爾相視生畏怖有神傑然駕巨牯前呵後擁役二䜿此神噉鬼充旦暮其腹尚餒色躁怒鬼遥見之悉失措竄匿不暇相告諭酒傾肉落雜穢汙魂魄飛蕩身偃仆一入木底只四據一尚把盞愕以顧一自隠蔽捩眦覷神用氣攝縛束固前死入吻無十歩計之嚼嚙或味飫蒲生胡為適爾遇畫之滿卷無一悞筆墨醜怪實可懼持以贈余子何故揺手不取一錢賂他日乞詩者尤屢試為言之冩其故往年寄子平即子瞻往年記得歸在京日日訪子來西城雖然對坐兩寂寞亦有大笑時相轟顧子心力苦未老猶弄故態如狂生書牕畫壁恣掀倒脱㡌褫帶隨縱横諠詉歌詩嘂文字蕩突不管鄰人驚更呼老卒立臺下使抱短簫吹月明清歡居此僅數月夜夜放去常三更别來七年在鄉里已忝三度移雙旌今兹惛惛意思倦加以跕跕疾病嬰每思此樂一絶後更不逢人如夜行遣興效樂天君莫學楊虞卿奉李宗閔宗閔權勢豈能久君莫學劉栖楚附李逢吉逢吉禄位寧長守雖然一時身暫好其奈千古名常醜丈夫讀書要知道所信不篤被其誘大張富貴作羅網愚者紛紛以身就左纒右繞不可脱誅竄還當逐其後君不見虞卿須遇李固言君不見栖楚終遭韋處厚一朝摧折靈氣盡龍如蛇兮虎如狗勸君聖賢術内好潛心勸君邪佞黨中休入手豈不知潞州處士田佐時喚與美官嫌不受田舍園林曉氣清籬巷夕陽明石竇聞寒碓煙坡見晚耕豚蹄供禱賽龜殻問隂晴欲識豐年樂村村雞犬聲春閨枕帶縈春意牕紗漏曉光蠨蛸傷遠别鶗鵙感流芳粧匣蒸殘紛熏爐試舊香洞房燈燭外只有夢悠揚書隠者壁枳棘分三徑猨猱結四鄰茂林脩竹地枕石漱流人看雨搘藤杖迎風卸葛巾我來懐愧甚衣上有紅塵彭山縣居公館静寥寥園亭景物饒溪光明短彴樹影䕃危譙山鳥忽雙下池魚時一跳主人王事簡文酒日逍遥屬疾梧軒高梧覆新葉滿院發華滋白日一何永清隂閒自移暖蟲埀到地晴鳥語多時病肘倚枯榻泊然忘所思睡起寥寥公館静門掩似山家竹簟屢移枕石盤頻浸花閒多新得䇿事少早休衙一覺高舂睡誰來伴試茶過友人谿居籬巷接菰蒲間扉掩自娯水蟲行揷岸林鳥過提壺白浪揺秋艇青煙葢晚厨主人誇野飯為我煮新蘆極寒燈火宜冬杪圖書稱夜長簾鈎挂新月牕紙漏飛霜酒醴慙孤宦皮毛逐異鄉誰知舊山下梅艷滿東牆六月十日中伏玉峰園避暑値雨南園避中伏意適晚忘歸牆外谷雲起簷前山雨飛興餘思秉燭坐久欲添衣為愛東嵓下泉聲通翠微訪李奐山人隠居多暇無所適故來尋隠君搴開壓屋樹觸散擁門雲狀貌不妨古言談何太文令人重高趣歸去每斜曛面川亭幽亭最孤絶直入亂叢間近晚獨來此有誰相與閒卷簾通大野臨檻數前山便欲教攜酒陶然踏月還山堂偶書幾日無公事山堂興頗清和詩防積壓丸藥趂晴明斸石新稜出澆蔬晚甲生此皆忙外得低首笑塵纓寄子駿運使西鄉巴嶺下險道入孱顔使騎到荒驛野禽啼亂山問民青靄裏訪古白雲間幾日南充路新詩滿軸還宜禄昭仁寺後軒危欄憑絶壑欲奈此時何但有夕陽處就中秋色多與誰同徙倚空自發吟哦便覺成羈旅歸心逐雁過寄楞嚴大師錦官城裏寺一室若雲峰水縮秋吟鼎霜低夜講松住齋塵入鉢出定蘚生笻曾聽三摩義居常夢曉鐘臨闤閣絶壑迎朱檻高林拂畫楹卷簾千嶂遠入座一川平峴采縁雲斷霞光射水明不須誇曠望為語謝宣城東谷茅齋野徑轉深密静無車馬痕松花金粉墮茗葉翠茸翻蟲鳥春音雜煙雲晚色昏俗塵何處入長是掩谿門梅寒梅引舊枝映竹復臨池朶露深開處香聞瞥過時凌兢侵臘雪散漫入春詩贈我嵗寒色憐君冰玉姿宿雲屏山寺翠嶺聳雲端巉巉走復蟠客從塵外入僧向畫中看月上千嵓碧風生萬木寒平明惜歸去猶待一凭欄野逕山圃饒秋色林亭近晚晴禽蟲依月令藥草帶人名排石鋪衣坐看雲緩歩行官閒惟此樂與世欲無營寄張郎中常媿無才動有權十年鄉里但留連養成答颯人應笑學得支離自謂賢三館舊逰層漢上一麾今守亂峰前幸逢别駕如張軌免對蘇章説二天送楊山人歸綿竹一别江梅十度花相逢重為講胡麻火鈴未降眞君宅金鈕曾盟大帝家道氣滿簪凝緑髮神光飛鼎䕶黄芽青騾不肯留歸馭又入無為嚥曉霞依韻和張推官元夕山郡上元榮樂事大開金地作遨塲煙雲向曉誰教霽燈燭乘春自有香紫陌熒煌隨歩遠綵棚佳麗鬭眉長逰人莫惜酬高直買取銀蟾一寸光紅樹萬葉驚風盡卷收獨餘紅樹擬禁秋已疑斷燒生前嶺更共殘霞入遠樓楓岸最深霜未落柿園渾變雨初休勸君莫上青山道裝㸃行人分外愁送王恪司門知絳州絳守園池天下誇紹述有記詞聲牙蒼官青士左右樹神君仙人高下花遠水依然尚鈎帶舊門想已無鞾檛自憐俗狀不能到此去羡君專宴衙送張宗益工部知相州學術深沈久未施晚登臺省世方知詩章好奏周文廟字法宜摩魏武碑禁掖便當提大筆名藩猶自擁高麾應憐共試金坡者答颯渾如鄭鮮之依韻和蒲誠之春日即事輕煙漠漠雨斜斜無事常教放兩衙問客江邊求好石倩人山裏覓竒花新蔬宛宛生晴圃淺溜涓涓出暖沙入夏盃盤須准備繞畦親灌邵平𤓰北齋雨後小庭幽圃絶清佳愛此常教放吏衙雨後雙禽來占竹秋深一蝶下尋花喚人掃壁開呉畫留客臨軒試越茶野興漸多公事少宛如當日在山家送潘司理秘校已自多時賦式微五峰佳景夢長飛四年遠地為官去萬里高堂喜客歸下馬便呈新授勅開箱争認舊縫衣鄉人覓次來相賀蓴菜鱸魚正輭肥山城秋日野望感事書懐詩呈呉龍圖已是秋隂更夕曛亂山高下起寒雲危樓願見客何處遠笛不知人厭聞身外流年波渺渺眼前生事葉紛紛此愁萬斛誰量得直為重拈庾信文成都楊氏江亭汀洲煙雨卷輕霏遥望軒牕隠翠圍萬嶺西來供曉色一江南下載晴暉鳬鷗慣入䦨干宿魚蟹長隨蚱蜢歸我亦舊多滄海思幾時如此傍苔磯晚至村家高原磽确石徑微籬巷明滅餘殘暉舊裾飄風採桑去白袷卷水秧稻歸深葭繞澗牛散卧積麥滿場雞亂飛前谿後谷暝煙起稚子各出闗柴扉早晴至報恩山寺山石巉巉磴道微拂松穿竹露沾衣煙開遠水雙鷗落日照高林一雉飛大麥未收治平聲圃晚小蠶猶卧斫桑稀暮煙已合牛羊下信馬林間歩月歸運判南園瞻民閣青都高與紫霄通獨此危欄望不窮萬嶺廹雲秋色裏一峰擎雪夕陽中櫩楹曉落天倉月牕户晴吹石闕風民吏安閒財賦足管絃時復在層空觀音院怪松怪松屢見無如此每度來觀説向僧若遇風雷宜守䕶恐生頭角便飛騰秋聲遶殿隨齋磬夜影侵廊對佛燈韋偃畢宏今不在欲求人畫有誰能提葫蘆花開已堪摘酒熟正好沽山禽㑹人意勸我提葫蘆獨坐不報門前賔客已收案上文書獨坐水邊林下宛如故里閒居鷺鷥避雨竹間㸃㸃迎風柳下翩翩静依寒蓼如畫獨立晴沙可憐北郭繞樹垂蘿䕃曲堤暖煙深處亂禽啼何人來此共攜酒可惜拒霜花一谿詠史不得滎陽遂失秦始知成敗盡由人可憐一擲贏天下只使黄金四萬斤郡學鏁宿長栢高柟䕃廣庭夜凉人静夢魂清不知山月幾時落每到曉鐘聞雨聲長舉驛樓爽氣浮空紫翠濃隔江無限有竒峰君如要識營丘畫請看東頭第五重折楊柳埀楊百尺臨池水風定煙濃盤不起欲折長條寄遠行想到君邊已憔悴楊甲字鼎卿四川重慶府昌州人今大足縣所著有六經圖藏州學中出東郭見山二年不見山見之喜不休舉手三揖之山遠不頷頭疑我墜塵土已與俗同儔稍稍望雲脚下見八九丘近前與之笑顔色漸和柔迎我以松風與我相獻酬憐我不識路導以溪水流豈其終愛予為此世所仇一官最下策包裹辱與羞百年在平地亦有一日憂誰能無饑渴往與青山謀合江泛舟莫踏街頭塵寧飲城東水江邊放船去葦間問漁子岸深魚有家鳬雁在中沚得酒可以歌得樹可以艤年年舟中客顔色不相似風波無前期逰者亦如此短篙醉時䇿遠山卧後几老我不奈醒日落西風起謁朱眞人祠一濯巖下溪再拜巖中庭清風瀟然來吹我衣上腥仙人芙蓉冠乘月下雲軿山空雜佩響静夜朝百靈寂寥古壇外但見斗與星青山無行迹露雨空㝠㝠逰長松寺宿石門僧舎疾風吹輕衣駕我雲脊路人間一回首驚絶不敢顧鳥投虚無底渺渺不知處蜂窠蟻丘垤與世同所騖試看一蒼莽誰有不平慮尚憐野僧屋佛靣荒苔蠧斷崖劃呀吻洶洶崩石怒我來得竒觀拄杖叩巖樹青山有驕色斯客不能句平生二三子慰我一相遇娟娟松間月幽夕亦可度夜䦨更小語風逼遺響去酌君無多酒繼以木蘭露臘日逰梅龍得樹字年年看梅水西路白頭溪翁眼如故重來攀髯老不死我亦風埃憶歸去酒酣百怪入我腸夜半恍惚與龍遇醉騎一尾天上歸陳迹江頭不知處梅花勸汝一杯酒千嵗寒凝眞旦暮欲將老大傲風雪穴蟻窠蟲已無數成都萬事更竒古石筍猶疑卿相墓孔明廟前栢千尺神物翛翛泣幽樹他時滅壊亦同歸人生誰能一長顧靈泉山中五首小縣相籠合濛濛數百家果蔬争晚市樵牧亂晴沙落日平江迥青山細路賖偶居無事在隨意問桑麻勝地仙靈宅微官也謫居焚香他日夢隠几向來書小睡便山雨長齋稱野蔬逢人問無恙滿意説樵漁何處長松寺雨花雲外臺山從百曲轉路入九闗回老檜成龍盡殘柯借鶴來人間斤斧亂風壑夜聲哀野色山圍盡風煙更可憐客情牛鐸外農事藕花前聚汲松根井寛愁石底泉雲安須斗水詩興亦超然日下叢林薄芊芊肅晚暉閉門成小隠飲水亦生肥醉著溪藤杖歸來木葉衣狂歌有虎兕吾道只應非何耕字道夫任潼州提刑詩見四川名勝志青羊宫一再官錦城咫尺望琳宫未始得得來正坐役役中今朝弄晴雨策蹇隨春風頗愛意象古停驂小從容縹緲百尺臺突起凌半空憑欄俯修竹决眥明孤鴻信哉神仙宅不受塵垢䝉稽首五千言衆妙一以通静觀萬物復豈假九轉功區區立訓詁亦哂河上公癡人慕羽化心外求鴻濛要騎白鶴背往訪青羊蹤題郭信可隠居雲溪幽居定何如頗恨未見之主人向我言喜色融雙眉修篁流翠隂寒溪漾清漪領略非一狀幽妍發餘姿龍淵門前大江何渺漫昔人飲牛水為乾水乾龍逝亦其理近在咫尺聊泥蟠魚蝦玩侮獱獺笑縱有靈怪誰當看徳人問舍壓吾境便爾築室相遮攔坐令異類皆屏伏恃有此耳差少安却紆朱紱去監郡遣我守舍良獨難昨來過門恍如夢龍致此語催歸鞍先生不信反不笑謂我饒舌狂豐干虛舟君不見江臯車馬紛相送巨艑峩峩盈載重西南使者解官歸水淺著沙牽不動如君材具豈多得合侍明光參法從胡為淺瀬著虛舟頗肖胸中太空洞問君此意竟安在欲説向人誰與共山林鐘鼎本同轍繫岸截江隨所用八牕窅窅净無塵一水泠泠清可弄何當抱被過君眠分破江天幽夜夢自合江亭過渡觀趙氏園亭喚舟芳草渡繫馬緑楊隂歩入莓苔徑門開花竹林王孫隨蝶遠婺女隠雲深想見西南望悠悠空賞心春日二首寂寞城南寺三年寄索居折花修佛供持鉢乞僧餘竟日無車騎依時認鼓魚九衢塵一尺吾自有華胥門前無俗物城上亦竒觀花浪東流穏雲山西望寒身凌塵外遠目極境中寛最愛風標客晴沙理素翰寒碧亭憑欄日日俯清湍洗竹年年斬惡竿十頃琉璃秋色静一林竽籟曉聲寒凉風有意生天末明月無邊照水端誰謂過清難久處愚溪元自不相安遠色閣小小樓居著散仙淵明眞趣本悠然招呼雲月欄干曲顧揖江山柱杖前獨鳥倦歸翻落日誰家晨爨起疎煙根塵應接無留礙笑殺西來面壁禪龍華大像葢冀國夫人所作因成兩絶慧性元從戒定熏百花潭水浣僧裙箇中力量眞超絶故老猶傳娘子軍生男箇箇欲如狼婦女軍中氣不揚試問争功嗔目士幾人能敵浣花娘宋元詩㑹卷十七
