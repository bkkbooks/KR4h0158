body:
  text: 宋元詩㑹卷十八兵部主事陳焯編司馬光字君實陜州夏縣人父池天章閣待制光生七嵗儼然如成人聞講左氏春秋退為家人述之即了其大㫖自是手不釋卷寳元初中進士甲科除奉禮郎簽蘓州判官丁内外艱毁瘠如禮服除簽判武成軍改理評補國子直講以館閣校勘同知禮院從龎籍辟通判州進直祕閣開封府推官修起居注判禮部同知諫院時國嗣未立天下寒心光與范鎮首發其議復面請再三仁宗感悟遂立英宗為皇子加天章閣待制英宗立以議濮王典禮不合請與諸御史同貶神宗即位擢為翰林學士光辭甚力不允未幾任御史中丞所彈劾皆内侍及政本仍還學士遇大事必建言無所避王安石行新法光抗論排之與吕惠卿廷辯切中事情帝雖心是其言阻于安石不能用也以端明殿學士知永興軍請判西京御史臺歸洛編資治通鑑成加資政殿學士哲宗初起知陳州留為門下侍郎請罷新法從之拜尚書左僕射卒年六十有八京師為之罷市光以一身繫天下之望所謂兒童頌君實走卒知司馬使得享年如文潞公宋運之興猶未艾也同錢君倚過梅聖俞王畿天下樞簿領日填積自非奉朝請九衢未嘗識今兹到東城胥靡暫逃役近指聖俞君安能不往覿一室静蕭然昏碑貼古壁叩堦讀新詩迷闇得指摘笑言殊未足黯然日將夕呼馬陟歸塗燈火已歴歴又知幾何時更有重來迹小雨雲日互出沒數朝飛雨清瞳矓似欲止廉纎還未晴映空輕絲亂著物細珠明葉端危不隕荷心重忽傾喜涼髙燕舞便溼羣蛙鳴于余亦有得藥畹胡麻生秋意呈鄰幾沖卿新涼入閭巷舊暑何人掃筠籠賣紅蓮莎堦墜丹棗蕉衫日以疎紈扇安能好蟬悲西風樹燕亂斜陽草此意屬淵明籬邊幾樽倒春塘冰春塘含薄冰淅瀝隠隈曲晴日射寒芒柔風折哀玉草樹曾未知波光已先緑八月十五夜懷君貺昔公在洛師未嘗棄佳節今宵秋半分空羨西樓月天色湛澄清風聲吟騷屑笑言不可親引領望金闕再柬友人故人音信絶對月動相思清露滴梧葉此懷當告誰秋風廣陵郭正是望濤時寒溪石穹石正嶄巖寒流更清激霜飛黄葉擁波濺蒼苔溼谿水勿劇來沙鶴方孤立噴玉泉蒼崖雙起秋雲齊亂峯迸出如攢犀石稜澁不容馬蹄下馬步入荆榛蹊瀑泉沃雪拖白霓落潭横引成清溪老木長藤咫尺迷興䦨欲出忘東西楚宫行楚王宫中夜未央清歌祕舞㑹華堂木蘭為柱桂為梁隋珠和璧爛同光横吹乍鳴秋竹裂繁絃初度春雨歇九微火樹垂垂滅羅衣紛紛玉纓絶滿朝冠劍東方明宫門未啟君朝醒秦闗日夜出竒兵武安烽火照夷陵夜意清夜四無譁深嚴上帝家星翻珠網白斗挂玉樓斜風静虚成韻霜輕未作花還疑漢津客浩蕩寄流槎金山寺香刹冠嵯峨松門挂薜蘿風髙塵不到岸濶鳥難過欲雨江容怒新晴海氣多停舟何所事回望隔烟波寓泊鄭圃寄獻昌言舍人旅食緇衣館飄蓬怳自迷樹横寒霧逺山隠古原低愁暮空庭雀驚晨别墅雞故人何處在依約玉繩西和宋復古小園書事飽食復閒眠風清雨霽天葉深時墜果岸曲乍藏蓮波面秋光浄林梢夕照鮮東家近亦富滿地布苔錢晚春病起呈檡之治臣風日正和柔身輕喜病瘳懶抛殘蠧簡暖脱敝貂裘值客開青眼逢花忘白頭家家好春色何處可同遊春日思景仁去嵗洛城中嬉遊處處同從離崿嶺北常夢潩泉東草遶春街碧花繁夕市紅臨風黙惆悵想像白眉翁送趙書記衆之官華州車馬出城外瀟瀟未有塵辭梁猶帶雪過洛漸生春幕府斜依嶽闗山四抱秦曩來棄繻者今日復何人送華亭沈主簿執袂青門道蕭蕭馬欲東暮雲零落翠逺樹淺深紅楚澤吟聲裏吳山醉眼中相思杳何許野鶴唳髙風送僧聰歸蜀翠柏老精舍紅塵倦帝城千山一錫逺萬里片雲輕江棧紆還直天星縱復横聽猿應更喜還是故鄉聲送張寺丞覲知富順縣漢家五尺道直吏撫南夷欲使文翁教兼令孟獲知盤羞蒟醬實歌雜竹枝辭取酒須勤醉鄉闗不可思送吕濟叔李公素使北雲愁雪欲零四牡出郊坰古塞烟華紫寒沙日氣青金門祕雞樹朱節耀龍庭幾夜天街北遥瞻漢使星送謝都官顗知光化軍廐吏整車馬悤悤辦曉裝青緺出閶闔朱斾指滄浪野店杏初發津亭柳已黄行行不可駐猶及勸耕桑送劉觀察從廣知洛州漢家英俊士衮衮出金閭久襲通侯籍新腰太守章畛封連故趙廬井帶清漳春色迎鐃吹應忘道路長送李尉以監丞致仕歸閩行行歌式微浩歎返荆扉卻著登山屐盡焚趨府衣溪清魚影亂竹闇筍芽肥應悔浮名誤空將白髪歸送瀛州簽判蘓祕丞宷髙隂十萬兵幕府籍時英塞上風猶勁闗南春末生投壺邊柝静倚馬檄書成不忘塵中客征鴻可寄聲送章伯鎮知湖州江外饒佳郡吳興天下稀蓴羮紫絲滑鱸鱠雪花肥星斗寒相照烟波碧四圍柳侯還作牧草樹轉清輝送王伯初通判婺州煜爚屏星駕迢遥婺女區嵐光晴向背溪溜暖瀠紆萬室鳴機杼千艘隘舶艫若逢耆舊問能説隠侯無送程端明戡知成都髙陽將幕開濯錦使旌來欲識闗頭雪正如江上梅宵衣矜逺俗露冕寄良才豈待三年最脩梧茂帝臺郭氏園送張仲通刺棣州名園送嘉客冠葢去傾朝小雨塵微歛輕寒酒易消鴈歸春近塞日上海生潮北道平如掌東風五馬驕送裴中舍士傑赴太原幕府元戎台鼎舊大府節旄新邊堠正無事賓筵斯得人山寒大行曉水碧晉祠春乍釀葡萄酒飛觴不厭頻送雲卿知衛州汗簡成新令褰帷刺劇州韋平家法在召杜治聲優野竹交淇水秋𤓰蔓帝丘三年歸奉計肯顧石渠遊送魏寺丞廣赴辟秦州判官征西大府開後乗得髙才區脱風烟静渠摉職貢來隴雲低玉帳羌舞奉金罍信美從軍樂寧煩王粲哀次韻和江鄰幾九月五日省直羣騶布路散瘦馬解鞍迴雨闋蟲聲樂秋深菊意催圖書紛自適僚友邈誰陪何以消寒夜殘醪不滿杯華清宫新豐雞犬稀薊北馬秋肥金殿翠華去玉堦紅葉飛荒林上路廢温谷舊流微嗟此前人事何須問是非觀僧室畫山水畫清禪室冷方暑久徘徊不盡林端雪長青石上苔心閒對巖岫目淨失塵埃坐久清風至疑從翠澗來歸田松竹陶潛宅蓬蒿仲蔚家行遊笻杖瘦嘯傲幅巾斜屋小疎茅覆門深亂柳遮村童迎客至曵帚掃桃花酪羮軍㕑重羊酪饗士舊風傳不數紫蓴滑徒誇素鮪鮮􅪈蠡煩桐取勺藥助烹煎莫與吳兒説還令笑茂先野菊野菊未嘗種秋花何處來羞隨衆草沒故犯蚤霜開寒蝶舞不去夜蟲吟更哀幽人自移席小摘泛清杯秋夜城上調秋角烟間發暝鐘風枝揺宿烏霜草覆寒蟲久負觀書樂端愁束帶恭暫因羣吏散還得遂幽慵六月十八日夜大暑老柳蜩螗噪荒庭熠燿流人情正苦暑物態已經秋月下濯寒水風前梳白頭如何夜半客束帶謁公侯漢宫詞苜蓿花猶短葡萄葉未齊更衣過柏谷走馬宿棠梨逆旅聊懷璽田間共鬭雞猶思飲雲露髙舉出虹蜺客思客思倦飄泊居然感物華闗頭望紅葉馬上見黄花薄宦終無定閒愁詎有涯今朝書至否幾夜夢還家送李益之侍郎致政歸廬山儒業金章貴歸心白鶴孤江山依舊在冕軒曏來無嘯詠誰當共登臨未索扶浩然知此樂迥與世人殊送昭逺兄歸陜種種親頭白帝城難少留倚門應有望列鼎本無求清夜多歸夢紅塵壓舊遊此行殊捧檄轅下五驊騮史館任祠部轉運河東聞望簪紳舊恩華雨露重圖書周内史汾澮晉全封秀發千尋壁寒生百鍊鋒歸時門有㦸惜别更從容送羅郎中登管勾玉局觀官名為玉局已使俗塵疎鐘出寒松迥香凝古殿虚鄉閭非甚逺俸禄豈無餘誰道神仙樂神仙恐不如奉和始平公憶東平相印東臨汶水陽兩看春葉與秋霜登山置酒延鄒湛上馬回鞭問葛彊谿竹低垂寒滴翠露荷相倚浄交香宵衣深念長城固肯待從容傲醉鄉和運使舍人北園餞别行憩三交僧舍冒雪宿百井闗見寄驪駒北上雪孱顔韊矢前驅度漢闗僧室松杉青照眼驛亭煙火迥依山馬銜邊草枯猶瘦鴈怯燕雲冷未還賤子不須回首問鬢毛蕭颯簿書間和景仁西湖泛舟滿船歌吹沸春灣天外晴霞水底斑誰信飛觴臨綺席獨能回首望青山東門車馬匆匆别西洛風煙寂寂閒疊石溪頭應更好祗輸野叟坐林間酬宋叔逹卜居洛城見寄離羣四十一春風縱有相思似夢中幸得遭逢作鄰舍惟嗟彼此是衰翁漢文前席人將去庾信誅茆橐未充悵望金隄碧蕪闊杖藜攜手幾時同夕宿獨樂園詰朝將歸賦詩平曉何人汲井華轆轤聲發散春鵶開園更有四五日映葉尚餘三兩花宿病岑岑猶帶酒無眠耿耿不禁茶自嫌行樂妨年少遽索籃輿且向家和邵堯夫年老逢春二首年老逢春春莫咍朱顔未肯似春回酒因多病無心醉花不解愁隨意開荒徑倦遊滋碧草空庭慵掃自蒼苔相過談笑猶能在坐待巾車陌上來年老逢春猶解狂行歌南陌上東岡晴雲髙鳥各自得白日游絲相與長草色無情盈眼緑花林多思襲人香吾儕幸免簪裾累痛飲閒吟樂未央酬邵堯夫見示安樂窩中吟安樂窩中自在身猶嫌名字落紅塵醉吟終日不知老經史滿堂誰道貧長掩柴扉避寒暑只將花卉記冬春料非空處閒吟客乃是清朝避世人和伯常見寄誅茆宋玉宅邊人知醉宜春幾甕春細雨短蓑漁向市孤邨極浦鼔迎神徧遊七澤身忘倦更賦千篇意轉新不必滄浪美清泚向來纓上已無塵二月三十日與同舍宴李氏園晚歸馬上賦詩門前蹀躞金羈滿座上連翩玉斚飛數尺游絲留客醉一行垂柳送人歸同邀勝友時難得再到名園花已稀莫惜芳春賸行樂無端風雨横相違和吳省副中復字中庶梅花半開招􅑀由張司封飲伯玉字公逵帝鄉春色嶺頭梅髙壓年華犯雪開正與嘉賓思共醉不須芳物重相催從軍貯酒傳呼出側弁簪花倒載迴風雨難期王事劇未知休沐幾旬來和子華招潞公暑飲朱門近在府園東杖屨過從跬步中避暑連翩投轄宴析酲瀟灑入懷風閒來清韻渾如鶴醉裏朱顔忽變童剪燭添香歡未極但驚銅漏太匆匆和君貺宴張氏梅臺京洛春何蚤憑髙種嶺梅紛披百株宻爛熳一朝開青女工黏綴霜娥巧剪裁崑山雪滿谷蓬渚浪成堆勢擁樽前合香從席下來蜺旌羾天起練甲洗兵回不使光風散曾無夜色催人稠衣馥郁地狹舞徘徊民服召公化時推何遜才淹留文酒樂璧月上瑶臺送張少卿學士子憲知洪州相府典型在朝閨望實髙袖書榮史觀典樂重卿曹夷路迎飛鞚桑林應奏刀家籯傳舊學廟鼎刻前勞袨服屯千騎連檣閲萬艘劍芒衝夜氣閣影動秋濤風色傳花信烟嵐拂酒膏使君專問俗無意在遊遨清明上已兩泛洛川和君貺繁華兩佳節邂逅適同時雅俗共為樂風光如有期曉烟新里巷春服衒津涯已散漢宫燭仍浮洛水巵占花分設席愛柳就張帷華轂爭門去疎簾夾路垂一川雲錦爛四座玉山疊鼓傳遥吹輕鐃破直漪清談何衮衮和氣益熙熙想見周南俗當年播逸詩范鎮字景仁成都華陽人薛奎守蜀一見愛之俾子弟從學及還朝載之入汴舉進士禮部奏名第一及廷唱例得越次自陳而鎮獨不然同列異之調新安主簿召試學士院當得館閣校理主司妄以為失韻抑補校勘鎮處之泊如用宰相薦超授直祕閣擢起居舍人知諫院疏陳軍國大計深切時弊時仁宗在位久未有繼嗣廷臣莫敢先言者鎮首上章而執政日為希名干進鎭貽書抗折之因見上面陳至于流涕司馬光贊之遂定策立英宗即位遷翰林學士坐濮議不合出知陳州神宗初復為翰林學士知通進銀臺司極言青苖為唐衰世之政不足法民猶魚也財猶水也養民而竭其財猶養魚而竭其水也疏五上痛詆王安石安石大怒持其疏至手顫自草制俾以户部侍郎致仕哲宗立拜端明殿學士且以為門下侍郎鎮固辭加銀青光禄大夫再致仕累封蜀郡公薨年八十一諡忠文武侯廟栢滿葉是清霜培根無沃土恥作秦皇松寧為馮異樹英靈自有風䕃蔚長如雨可憐青青姿不知人事古淨衆寺新禪院金地西郊外一來煩惱攄凡逢似仙境鮮不屬僧居岸緑見翹鷺溪清無隠魚殘陽已周覽欲去幾躊躇送羅勝卿同年提舉玉局觀疋馬西歸去知君得意偏人情重鄉里官職更神仙曉後無衙鼔旬頭有俸錢何須駕白鶴辛苦上青天送羅郎中登管勾玉局五門門裏觀松檜日蕭疎道話忘心境仙歌作步虚壇塲髙突兀廊廡曲紆餘世事多紛擾君心定了如韓太丞同守成都次韻二首盛府佳招貴嚴宸雅寄深輿題仲舉至闕挂子牟心漢竹分新契潘花過舊隂當年百里驥方此試駸駸春色草將深春寒柳未隂青天指行棧渌水蕩離襟後乗何為託前旌喻此心南枝倦飛翼憑為寄歸音遊昭覺寺炎蒸無處避此地忽如寒松砌行無際石房禪自安鴛鴦秋沼漲蝙蝠晚庭寛登眺見田舍衡茅半不完和閻寺丞海雲寺春日金田驩且譁始因民俗好紛奢管絃齊奏喧聞野鶯鷰髙飛不在花雕檻凭時見城郭迴廊行處有烟霞方塘靈石從來信不獨當年太守誇登崇聖閣金地環迴半錦城累年斤斧不停聲逺村民舍烟未起滿寺僧筵鐘盡鳴欄檻髙低資眺覽市㕓言笑尚分明阿房昔日徒虚語壯麗應誇此畫楹和成都吳仲庶見寄來韻嵗華今緩昔如流舊日樊籠可自由官事了時無盡極人生安處且閒休愚忠皎皎丹心老歸思綿綿兩鬢秋縱使海棠時節過急行須及浣花遊遊學射山幾年魂夢寄西州春晩歸逢學射遊十里香風塵不動半山晴日雨初收指麾赤隊呈飛騎次第紅妝數勝籌夾道綺羅瞻望處管絃旌斾擁遨頭送程端明再鎮成都成都一都㑹千里帶坤維自昔公坐嘯至今人去思朝廷慎東注方面要安綏遂爾重藩屏因之職殿帷龍光出劍外謳頌走江湄曉雪離都馭春風入境旗壺漿故父老竹馬舊童兒疉足相歡躍同心仰福禧邦人顧若此邑子更何期㑹講中和化重為樂職詩孟縣萬艘潭私船官運渡縱横萬貨相通繞近城燈火夜凉人未散古潭宜復萬艘名范祖禹字淳甫一字夢得共生也母夢一偉丈夫自稱鄧禹入寢室遂以為名幼孤叔祖鎮撫育如巳子登進士從司馬光編通鑑于洛十五年不仕用光薦為祕省正字王安石當國尤愛重之祖禹竟不往謁神宗崩哲宗方幼祖禹屢上書宣仁后期以保聖躬育聖徳反復拳拳及宣仁崩祖禹慮小人乗間害政又力請辨析是非深拒邪説章數上不報而章惇用事出知陜州連貶徙賓化卒年五十有八有按廣東化州范祖禹墳資州路東津寺山行無晨暮日暝崖谷昏哀猿落客淚永路驚旅魂憑陵髙山巔俯視大江奔迴環島嶼合瀠轉洲渚屯行雲赴炎火飛鳥下蜀門地遐怪蛇聚寺古深殿存憶昔李氏末烟塵暗中原姦雄競草竊割據窮海根干戈百年後見此敗屋垣我來屬清秋登覽無俗喧山深虎豹歸水静蛟鼉騫臨風獨嘯叱浩蕩欲飛翻月夜船行入資川憶昨臥碧山蒼蒼叢桂間白雲為屏石為枕緑蘿長挂明月閒忽乗輕舟泛江水山月隨人還在此白鷺驚飛宿靄閒青山倒卧蒼波底此時孤櫂發中流川後停波聽櫂謳不學子猷中夜返欲乗明月向資州多病多病心牢落經秋鬢颯然風乾桐葉地雨冷菊花天舊隠荒江漢新居俯澗瀍西都長夢想何日賦歸田韓維字持國開封雍丘人忠獻韓億第五子以進士奏名禮部方億輔政不肯試大廷父歿閉門不仕宰相薦其嗜學恬退召試學士院辭不就授檢討知太常禮院於議陳執中諡公直不阿乞罷禮院通判涇州神宗封王兩為記室㕘軍召同修起居注侍講邇英殿進知制誥知通進銀臺司遇人才進退多所執諍神宗即位除龍圗閣直學士以議王陶吳奎事求去知汝州數月召兼侍講判太常寺熙寧二年遷翰林學士知開封府明年為御史中丞以兄綘在樞府力辭之王安石亦惡其言保甲事復使為開封俄兼侍讀學士充羣牧司安石益惡之因請郡出知襄州許州七年二月入為學士承旨加端明殿學士再出知郡請提舉崇福宫元祐初拜門下侍郎復罷知郡久之以太子少傅致仕紹聖中坐元祐黨謫崇信軍節度卒年八十二億子綘維縝皆位公府史稱綘適於同縝適於嚴而維適於正維其賢哉綘縝亦俱能詩世無傳本惟得綘一首附後舟中夜坐晴霜落波底斗柄挿堤外扁舟燈火明樽酒夜相對臨歡意暫遣念離心已痗篙師喜氷拆理檝事晨邁服除送兄弟還都日月忽已逺再見新穀升喪期有常數吉我襟與纓俯仰自悲吒淚下肝腸崩尚惟立身報未即冺餘生肅肅忠獻公秉徳輔休明報國有遺意訓言獨自聽況承主恩厚兄弟秩王廷一朝出門去事業各有營上當報君仁下以為親榮獨余抱疴瘵謝喧守柴荆掃塚奉時祭復田課春耕既無公家責聊狥狷者情出處雖云殊要以道為程覽梅聖俞詩編夙昔誦佳句跂予慕髙風何意憂艱餘邂逅此相逢君初應府辟奉檄來自東引車窮簷下眷然顧㣲躬姿表穆以秀純德信内充乃知文章作中與性情通煌煌新詩章垂光照昏䝉啟櫝挹荆璞引莛撞景鐘髙篇屢云闋逺思殊未終譬如巧琴師哀彈發絲桐中有沖淡意要以心志窮顧惟昧者聽莫辨徴與宫安得牙曠手提耳發其聰鋤園上天浩無私衆草同一榮青青十步間薫臭相雜并卉藥數不多十百其品名蔓者善縁附結隂在髙甍脩竹雖自立已復困纒縈其餘叢與株蕪沒不自呈隂蟲穴其下日夜百種鳴紛然亂耳眼我意初不平朝鋤忽以盡暮雨且復生自念疲病者莫與地力爭盛衰固物理安用勞我形答象之謝惠黄精之什仙經著靈藥兹品上不刋服之嵗月久衰羸反童顔巖居有幽子乗時斸蒼山溪泉濯之潔秋陽暴而乾九蒸達晨夜候火不敢安持之洛城市誰復著眼看富貴異所嗜口腹窮甘酸貧賤固不暇錐刀乃其干坐使至靈物委棄同草菅惟君沖曠士敦然守髙閒食之易為力天和中自完故以此為饋其容幾一簞報我三百言浩浩馳波瀾何以諭珍重如獲不死丹方當煩燠時把玩毛骨寒他年靈氣成與子驂雙鸞晚過葆光亭步月浮沈閭里間放志謝維縶行貪月色静歸犯霜華溼寒鼔出城重飛星過樓急却想竹庭下主人猶獨立和永叔小飲懷同州江十學士翰林文章伯好古名一世家無金璧儲所寳書與器北堂冬日明有朋聨騎至新樽布几案二鼎屹先置大鼎葛所銘小鼎澤而淬坐恐至神物光怪發非次羣賢刻金石墨本來四裔紛攘羅卷軸指擿辨分𨽻其中石贊藏家法非一二精莊與飄逸兩自有餘意興來輙長歌歡至遂沈醉顔饑足簞瓢韓飲尚文字乃知内可樂不必鐘鼔貴温温江馮翊兹理久所詣賦詩多雅言嗜酒見淳氣嵗宴不在席使我增歎喟遺吳沖卿大饗碑文蒼碑剝龍螭突兀古殿側世變文字異嵗久苔蘚蝕諒非好事者塵土未嘗拭我來仰首看百過不自息曩者魏方盛帝丕託威徳馳驅百萬衆南指斗牛域誓將殄氛䘲飲馬長江邑翠華鬱回翔髙㑹誇故國肅肅環珮響煌煌羽旄飾鼓鐘何鏜鎝淮漢為震仄罷饗示得意摛文永鑱勒從臣梁孟皇𨽻法當世特奉詔無與讓淋漓奮其墨爾來幾千歳卓卓見筋力端坐九鼎重勁挺羣珪植威儀商山老氣象漢庭直惟昔銘栒戈先儒固難迹況我鄙陋極視此空歎息常恐日磨滅不辨㸃與畫呼工模於紙一掃見白黒緘包比瓊瑶把玩廢寢食于時大經九有詔講謬忒刋之太學中為後代法式沖卿邦家彦學問古今積辭端海鯨運筆力霜鷙撃況兹服儒官灑翰固其職楷模所流傳厯世動千百自非體法正徒使觀者惑厥初篆草𨽻根本君已極聊持釘張翫庶以㕘得失弔杜少陵墓三尺孤墳在空留萬古名風騷誰是主天地太無情入夜月虚白逢春草自生耒陽江色迥憑弔恨難平西墅城居不為愜言適西陂岡雀噪野堂静鷄鳴春日長書棚落幽蠧佛幔掩餘香釋子廬巖至清談殊未央春朝燕語聞多日蠶眠過幾宵花深不辨蝶柳暗欲迷橋便面金環重障泥玉勒驕黄公酒壚上誰貰阮孚貂象之以山藥見贈龍山有游客贈藥滿筠籠葉漬沙泉碧苗分石竇紅斸應侵曉露來喜及春風却笑丹砂逺辛勤勾漏翁自静教院晚步潩上雪盡岡頭路風和臘後天人安閒散内鳥下寂寥前凍水晴初浪荒城晚自烟西橋車馬急歸意尚留連和景仁元夕月上朱樓角風揺翠篠層傳聲回步輦滿目爛行燈簫鼔千門沸弓刀萬馬騰詩翁懷盛事眉雪慘霜稜奉和喬年館宿蓬萊仙構斗魁旁遞直初登漢署郎雲向城頭收暝色月從樓角放寒光行看砌菊嗟殘艶坐對書芸襲暗香景物過清渾不寐素經讐罷得新章時喬年校醫書寄題蘓子美滄浪亭聞君買宅洞庭傍白水千畦挿稻秧生事已能支伏臘歳華全得屬文章鶱飛靈鳳知何暮蟠蟄蛟龍未可量莫以江山足清尚便收才業傲虞唐寒食出郊都門氣象雨餘佳壓盡風塵見草芽日薄風和近郊路朱紅粉白逺林花堤閒獨去媻姗女栁下相逢輕􅣗車絲鬢未催樽酒在不須辛苦問年華城西繡鞅金羈千里塵共傳恩詔樂芳辰千重翠木開珍囿百尺朱樓壓寳津御栁初長遮雊雉宫花未識駭遊人自憐窮僻看山眼來對天池禁籞春和詹叔遊廬山見寄香爐峯色壓羣山仰眺頻欹使者冠江面烟波揺紫翠佛宫金碧照清寒宻藏幽谷梅千樹散走鳴泉竹萬竿今日頓驚塵慮盡一章佳句雪中看和朱主簿遊園白首昏昏度歳年忽聞春至便開顔溪頭凍水晴初漲竹下名園晝不闗旋得歌詞教妓唱逺尋梅艶喚人攀如今尚有官拘束解組歸來始是閒登湖光亭雪盡塵消徑露沙公家池館似山家翠㾗滿地初生草紅氣通林未放花匝岸平波清照鴈壓城危榭斗回鴉自慚白首猶圭組此地年年賞物華和子華沈隂消盡見春和初放扁舟泝緑波水際踏青憐日暖林間舉白為花多狂從田婦窺籬㸔醉任家童刮鼓歌年少縱歡饒㸃檢老懷終不挂誰何和謝主簿游西湖雲隂開剝日光穿和氣隨風近酒船湖面波清渾見底樓頭山碧自生烟興長不忍回孤櫂歌懶才能逐緩絃因子樽前話歸計醉魂先到峴山邊景仁招況之聞用歌舞望門而反作詩戲之一夜嚴風結素波盍簪寧避曉寒多范滂攬轡方清俗墨子回車豈惡歌雲外鴈寒驚嵗晚林間鴉語弄春和知君不久承寛詔始奈紅裙緑酒何襄柑分惠景仁以詩將之荆州解綬十經春迴夢青林遶漢濱霜氣輕寒催紺實渚波餘潤作甘津僧園採掇寧論數客路奔馳竟占新雪意垂收髙㑹缺分金聊助席間珍謝堯夫寄新酒故人一别兩重腸每欲從之道路長有客忽傳龍坂至開樽如對馬軍嘗嘗怪杜詩曰先盞開嘗對馬軍及得錦屏山題名有寄河南府使馬軍送新酒者然後躍然定將瓊液都為色疑有金英宻借香却笑當年彭澤令籬邊終日歎空觴寄秦川馬從事往嵗游西謁季長隴雲秦樹勝風光分題紅葉蠻牋膩對舉流霞綵袖香宴洽翠娥連象榻夜寒嬌鳯泥銀簧未知蚤晩重攜手惆悵而今鬢已蒼春霽憶洛陽少年結客洛陽時閒傍東風駐馬蹄山色逺饒潘岳宅波光輕撼窈娘堤花繁到處紅如堵酒好尋常醉似泥賴有金臺舊知已應憐魂斷虎牢西晩春春暉東去月收弦却拂凝埃敞北軒幾曲雲屏空白晝一簾花雨自黄昏庭蕪碧合隂蟲息牕樹紅稀鬭雀喧細憶舊歡都入夢習家池上子山園酴醿花細蓓繁英次第開攀條盡日未能回不如醉臥春風底時使清香拂面來洛城雜詩上東門外春三月桑葉隂隂覆菜花宻竹亂流行逕絶桔橰鳴處是人家和杜孝錫展江亭二首斜日低雲動水光偶尋佳處閲羣芳城闉不隔和風度吹過千花百草香驚鷺飛鳴避畫橈游人笑語過朱橋賈家園裏花應謝緑遍墻頭野杏梢韓絳附字于華維之兄也性尚奔競附王安石以保禄位愧持國多矣官階雖崇概無足紀遊鴻慶院久旱雨初足樂遊春正深喧闐觀士女清曠入山林佛界雲成寳僧園地布金方塘探子石髙閣盍朋簪沙水通溪白松筠逐徑隂紛華從滿目幽寂自虚心印組端為累巖扄得暫尋晩風吹緑野歸騎已駸駸蔡確附晉江人其父徙居於陳確生而多智不謹細行第進士調邠州司理參軍以賄聞韓絳宣撫陜西見所製樂語才之薦於弟開封尹維辟為掾屬用王安石鄧綰薦浸致通顯確善察人主意當為御史時知神宗已厭安石輒疏其過以賈直名每劾去一人即奪其位居之士大夫交口唾罵而確自知制誥至參知政事皆用此術得官揚揚然自謂愉快也元豐五年拜尚書右僕射兼中書侍郎哲宗立轉左僕射兼門下詭譎傾險積不為公論所容元祐元年罷知陳州明年坐弟碩事徙安州又徙鄧州其在安陸遊車葢亭賦詩十章知漢陽軍呉處厚上之以為皆涉譏訕其用郝處俊上元間諫唐髙宗欲傳位天后事語尤刻毒遂責英州别駕安置新州卒貶所新州悼侍兒鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸夏日登車葢亭公事無多客亦稀朱衣小吏不須隨溪潭直上虚亭裏臥展柴桑處士詩一川佳景疎簾外四面凉風曲檻頭緑野平流來逺櫂青天白雨起靈湫静中自足勝炎蒸入眼兼無俗物憎何處機心驚白鳥誰人怒劍逐青蠅紙屏石枕竹方牀手倦抛書午夢長睡起莞然成獨笑數聲漁笛在滄浪西山彷彿見松筠日日來看色轉新聞說桃花巖石畔讀書曾有謫仙人風揺熟果時聞落雨滴餘花亦自香葉底出巢黄口閙波間逐隊小魚忙來結芳廬向翠微自持盃酒對清暉水趨夢澤悠悠過雲抱西山冉冉飛矯矯名臣郝甑山忠言直節上元間古人不見清風在歎息思公俯碧灣溪中曾有戈船士溪上今無佩犢人病守翛然唯坐嘯白鷗紅鶴伴閒身喧豗六月浩無津行見沙洲束兩濱如帶溪流何足道沈沈滄海㑹揚塵宋元詩㑹卷十八
