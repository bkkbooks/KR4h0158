四年卒年六十七屬疾李白羮初美相如渇漸瘳八磚非性嬾三昧減心憂筆苑多批鳳詞鋒勝解牛舊山疑鶴怨畏日想雲愁廣内勞揮翰通中羡枕流使君方屢降客轄未容投好奏倪寛議何須莊舄謳朝衣薰歇不侍史待仙洲李繼景徳間户部員外郎直集賢院詩見西崑酬倡集霜月銀牀葉暗飄霜月夜迢迢寒極金難辟憂多酒漫消荀爐殘更換湘瑟罷仍調誰道河流淺盈盈萬里遙懐希聖銀闕琳房視草餘龍門岑寂㫁軒車彩毫閒試金壺墨青案時看玉字書王儉風流希謝傅子雲詞賦敵相如瓊枝不見蕭齋晚蕙草烟㣲度綺疏王左丞新菊青規前席暇歸沐興何長北第秋將晚東籬菊正芳幽叢霏薄霧桂色艷輕霜巳近黃金印兼臨白玉堂甘疑掩萍實秀肯讓芝房有佞還應指無憂可要忘蘂浮丞相酒氣馥令君香好固松椿壽仙經識祕方宋元詩㑹卷五
