body:
  text: 宋元詩㑹卷五兵部主事陳焯編劉筠字子儀大名人舉進士為館陶縣尉㑹詔試選人校太清樓書楊億擢筠第一以大理評事為祕閣校理真宗垂意篇籍筠預修圖經及冊府元龜推為精敏書成進左正言直史館遷左司諫知制誥進翰林學士初筠嘗草丁謂罷相制及謂復留令别草制筠不奉詔乃更召晏殊殊遇筠出院側面而過不敢揖葢有所媿也帝疾謂浸擅權筠遂請外補知廬州仁宗即位召為翰林學士俄拜御史中丞進承㫖判尚書都省再知廬州卒筠初為楊億所識㧞後遂與之齊名時號楊劉晚為同姓富人奏求恩澤士論少之所著凡七集赴郡之初尋屬愆亢有司舉舊典取湫水徵巫覡以致禱而涉旬靡應農事方急遣罷去越翊日乃雨優詔將州任視政纔旬時田畯訴炎暵坐虞多稼萎雲將掉頭去波臣涸轍悲行部殊未及隨車杳難期往慙神父化鮑惪守南陽吏民號為神父今取旱母嗤蕭雅所至必赤地大旱人號為旱母諸曹白事者雩典舉舊規郡北岐棘山上有三湫池衙吏潔齊往汲水置縹瓷朝服領巫覡詰旦迓諸岐承以結綵輿奉於五龍祠自是率賔介寅午款於斯紛敷薦楮鏹浸漬灑楊枝瓦罏松香鈍瓢樽黍酌醨四壁繪神變正筵塑靈儀怖若葉公牖怪甚葛仙陂老覡十數輩勃屑頭如魌童巫及伶倡貌寢語嘍囇但多罋盎質曽乏婉孌姿交手操鈴拂合譟屢僛僛喧塵著蓬髪穢汗落粉頤一聞且一嘔掩鼻以攢睂隮蔚朝待族敗革震散之㢲飄暮欲息竅竹呼復來慢黷固巳甚誕妄相馮隨如是者浹日僅得沾服滋嗟予政無狀百拜胡敢辭矧夫民習俗姑用慰齎咨神道貴得一何乃託邪師遽俾送湫勺撤役勤繭絲申明恤刑詔撻重捨輕疑從此四五日油霈洽封圻周官地官職皇舞雖有祈道經涖天下傷民誠弗為惟神稟聰正逺鬼務肅秖願守有常惪可戒興妖思禁中庭樹紫闥分陰地丹條擢秀時髙枝接温樹密葉覆辛夷夜影瑤光接晨英玉露滋乘春好封植為賦角弓詩槿花紫霧函燈檠彤霞逼綺寮呉宫何薄命楚夢不終朝半被曽羞問鄰牆却悔招莫移風雨怨更囑鵲為橋即目地僻無車轍心灰欲坐忘疾雷徒破柱幽草不迎凉日烈蟬遺蛻花休蜜滿房覆觴知已久寧有次公狂夕陽二首夕陽堪極目况復近秋殘塞迥橫烟紫江清照葉丹伍胥嗟路逺潘子念行難更有蕪城恨城空逼夜寒瓊蘂滋晨飲青縑擁夜衾萬年宫省樹五色帝家禽詔草裁藤角薫爐燼水沈浴堂還獨對鳴佩有清音偶懐不才甘客難多病豈旬休可待乘軒寵終慚䑛痔求渚蘭薫露夕江橘富霜秋養拙寧無地千波一葉舟寄靈仙觀舒職方學士石渠仙署久離羣抗迹丹臺世絶倫揚子不甘嘲尚白漆園終許自全真紫烟深處鸞雙舞朱髓成來鳥共伸若向雲中見鷄犬可能渾忘姓劉人題林處士淝上新屋壁久厭侯鯖盡室來卜居鄰近釣魚臺舊山鶴怨無錢買新竹僧同過宅栽斗酒誰從揚子學扁舟空訪戴逵回抽毫有汚東陽望但惜明時老澗才始皇利觜由來得擅塲盡遷豪富入咸陽屬車夜出迷雲雨峻令朝行劇虎狼前殿建旗臨紫極東門立石見扶桑侍臣嘉頌徒虛美不奈盧生䜟國亡漢武漢武天臺接絳河半涵飛霧鬱嵯峨桑田凖待他年變瓠子先成此日歌夏鼎幾遷空象物秦橋未就已沈波相如作賦徒能諷却助飄飄逸氣多南朝華林酒滿勸長星青漆樓高未稱情麝壁燈迴偏照日雀航波漲欲浮城鐘聲但恐嚴妝晚衣帶那知敵國輕千古風流佳麗地盡賒哀思與蘭成唐明皇嵗嵗南山見壽星百蠻回首奉威靈梨園法部兼胡部玉輦長亭復短亭河鼔暗期隨日轉馬嵬恨血染塵腥西歸重按臨波舞故老相看但涕零宋玉楚國荒驕日已深山川朝暮劇登臨曽傷積毁亡師道秖託㣲辭蕩主心江草東西多恨色峽雲髙下結層隂潘郎千載聞遺韻又說經秋思不任成都鏤膚剽俗恣遊遨種得蹲鴟號富饒井絡共知天與險蠶叢無奈世興妖杜鵑積恨花如血諸葛遺靈栢半燒才似文園何足道一生琴意秖成痟舊將幾年鏖套復征蠻分閫功成兩鬢斑新畫儀容當漢閣舊銘勲業在燕山龍泉照步文犀澁馬埒堆金駿足閒時泰無因問充國曉牕風雪夢陽闗公子油壁香車隔渭橋黃山路逺苦相邀行庖爨蠟雕胡熟永埒鋪金汗血驕别館橫陳張静婉期門長揖霍嫖姚注鈎握槊曽無憚綠桂膏濃曉未銷洞户百尺青樓大道邊五陵游騎曉翩翩不思夜魄過三五秖問春醪賞十千密鎖香雲深處户亂飄梨雪晚來天愁睂豈待歌成後咫尺河陽信未傳淚二首雍門琴罷已浪浪更上牛山半夕陽楚澤雲迷千里目薊門歌㫁九迴腸寒梅帶雨飄雜席尺素停燈作報章湘水未乾終未盡豈徒萬㸃寄疎篁含酸寤歎幾傷神嗚咽交流動滿巾建業江山非故國灞陵風雨又殘春虞歌訣别知亡楚燕酒初酣待報秦欲訴青天消積恨月娥孀苦更愁人直夜二首雞人肅唱發章溝漢殿重重虎㦸稠翠羽欲樐温室樹金波先上結璘樓風來太液聞鳴鶴露卷明河見飲牛萬國表章頻奏瑞手批天語思如流嘉木清音接綺牕謫仙風骨凛氷霜堯厨萐脯分珍膳漢廟含桃和酪漿磴道神行通碣石井榦雲構俯瑤光金釭璧月相暉映獸口時飄侍史香無題二首曽許千金答浣沙越溪浪淺不通槎曉樓簾卷還凝霧外苑牆低却映花滿目離愁頻駐馬一春幽夢祇驚鴉柔桑蔽日南城路懊恨羅敷自有家星爚銀鞍狹路逢長裾連帶任流風身輕近識呉宫燕目斷還驚洛浦鴻未許香囊安肘後獨憐丹枕在房中南園蝴蝶飛無限一一雌隨一一雄請急懐希聖䡾䡾風檐乳燕翔浴蘭衣綌簟流黃雲容倐變千峰險草色相沿百帶長旋製紫荷供槖筆暗移神蔡忍搘牀思君只欲傾家釀待漏同誰賦栢梁秋夕枳落莎渠急夜蟲翛然平子四愁中栗林忽感雕陵鵲雲表初過代嶺鴻阮籍卧帷疎鑒月馬融橫笛逺含風即兼吏隱前賢事猶勝楊岐泣㫁蓬問人疾撫枕悽然掩北軒漢庭誰問馬文園風簷鴟嘯厨烟絶月樹烏驚藥杵喧戲習五禽成妙術學虧一簣阻㣲言不因九奏清塵起天路應迷簡子魂燈夕寄懐千輪佛火照層城九陌香車擊迅霆簡子心知天帝樂孟家惟信紫姑靈金徒抱箭催壺水玉宇來風滿砌蓂簾卷文疏蓮燭燼通中枕上獨聞鈴艷體二首走馬章臺冒雨歸後門猶待滯前期荷心出水終無定蘿蔓從風莫自持複帳麝輕難辟惡曲房蠶嬾不成絲漸漸隴麥藏鳴雉更恨如皋一箭遲簾聲燭影浪多疑仙榖何能為解迷藻井風髙蛛壊網杏梁春晚燕占泥更看山逺堆凝黛縱許犀靈秖駭雞枉裂霜繒幾千尺紅蘭終夕露珠啼代意華池阿閣不相容濁水清塵恨莫竆明月自新班女扇行雲無奈楚臺風乳鶯啼曉銷蘭炷媚蝶傷春失蕙叢縱使多才如子建秖能援筆賦驚鴻李舍人獨直卿靄重重覆碧門獨揮鴻筆坐西垣誠明自有中和氣潤色還多郁穆言内苑朱櫻和酪賜前階紅藥任風翻紫絲新履回翔地應笑東方避世喧初秋屬疾秋陰凄淡隔重城一畆居仍近禁營漢苑樓臺沈暮影謝家鼔吹發新聲烟昏露井殘桃墜葉下凉波獨鳥驚節物變衰吟更苦可堪漳浦卧劉楨暑夜芒熛盛惪正渾儀休問探湯向小兒盡日羽陵開蠧簡幾人河朔飲芳巵堯厨萐脯頻搖處漢殿相風未轉時争得琴髙借雙鯉暫遊姑射對氷姿與啟明秦痔從來易得車邵枝今比我何如垂天借喻齊諧志握火尋盟越絶書旭日西清雲幄密朔風南陌葦衣疎故山夜鶴空多怨金屋人争誦子虛秋夕池上殺青和墨度流年飽食無功鬢颯然却憶侯封安邑棗不能兄事魯褒錢千峰月白烏啼樹六幕風髙鶚在天招隱詩成誰擊節願傾家釀載漁船送客不及日上旗亭第五重百壺春釀與誰同黃山逺隔奔霄騎紫塞孤飛避弋鴻湘竹幾時休染淚楚旌終日自搖風此情不及歌楊栁一尺魚書萬水中送許洞歸呉欲折瑤華向綠疇風光滿目盡離愁茂林脩竹多嘉客萬壑千巖憶舊遊漢詔巳聞求泛駕禰狂無自屈岑牟荆山待價何憂晚龜手猶期裂地酬七夕靈匹迢迢駕七襄暫陳雲幄對星潢已看素魄過三譲何用華燈更九光玉腕雙絲輕宛轉霞衣雜佩暗丁當誰言巧意能勝拙秖見鳩閒鵲自忙館中新蟬庭中嘉樹發華滋可要螳螂共此時翼薄乍舒宫女鬢蛻輕全解羽人尸風來玉女烏先轉露下金莖鶴未知日永聲長兼夜息肯容潘岳到秋悲暑詠寄梅翁石渠岌嶪亘垂虹𤣥蔭清流接桂宫玉女壺欹天未笑羲和轡緩日方中孝先便腹無寜誚痀僂承蜩敢衒功蠲渇欲來飛雪散南昌世胄有仙風懐舊居毛竹千叢蔽野亭曉猨驚後亂峰青漢庭巳奏三千牘周室仍繙十二經紫殿深沈頻視草緇帷寂寞自飛螢振衣本為蒼生起肯向荀家秖聚星鶴碧樹陰濃釦砌平華亭歸夢曉頻驚仙經若未標竒相琴操何因寄恨聲養氣自憐雞善勝全身却許雁能鳴芝田玉水春雲伴可得乘軒是所榮苦熱六幕雲收萬籟沈結瑤千尺倦登臨七盤妙舞頻揮汗五色嘉𤓰互鎮心極目嶺梅寧止渇拂波宫栁漫垂隂祇憂火解神仙骨賴有泉聲發素琴栁絮半減依依學轉蓬斑騅無奈恣西東平沙千里經春雪廣陌三條盡日風北斗城髙連蠛蠓甘泉樹宻蔽青蔥漢家舊苑眠應足豈覺黃金萬縷空梨𤣥光仙樹阻丹梯御宿嘉名近可齊真定蚤寒霜葉薄樊川初曉露枝低先時櫻熟煩羊酪逺信梅酸損瓠犀宋玉有情終未識蔗漿無奈楚魂迷纂修述懐良弼論思暇英才視草餘西清承宻㫖東觀類羣書左氏先經日征南發例初編年終顯惪歴帝自几蘧一覽無前古三長豈後予宏綱提要妙至論絶籧篨訛謬刋三豕公平喜衆狙菁英咸采掇疣贅悉消除組織千章合研竆萬象書胡為參也魯亦造仲尼居處末加駢拇于中或輔車乘軒思衛鶴努力訪劉驢見彈曽求炙臨川復羡魚孰云貂可續自愧鶚難如蚤入希東郭先知服子輿直非頭似筆知謝里名樗蝸舍遊從寡鶉衣禮貌疎寸陰嗟荏苒十駕敢躊蹰天祿揚雄閣承明嚴助廬時陪折俎宴頓異帶經鉏繫日親函丈他門絶曳裾卓錐雖有地擔石尚無儲獵犬方勞指神龜可避漁屠門誇大嚼䑕壤鄙餘蔬闕里辭難措漳濵病且祛學勤徒力爾性拙奈天歟大道今興起先生意卷舒正為王者瑞何羡使君旟暗室欣觀火頽波賴決渠當仁如退讓末跡定淪胥夜讌玳押風簾薄金徒漏箭長食魚齊上客置醴漢元王芥醬辛初和蓱虀冷乍嘗巢笙傳曲沃操鼔發漁陽吟燭惟憂盡杯籌豈易防齒犀融嵰雪栢麝薦荀香笑逐呼盧勝歌隨解佩狂遺簪兼墮珥流盼復回腸綵鳳尋仙吏斑騅待陸郎主歡殊未巳投轄在銀牀别墅盛槩復風流交通遍五侯鳴鐘平樂宴擊鞠茂陵遊狡兔方多穴蒼鷹始下韝鉗奴藏廣栁劍騎騁長楸雲際尋橦伎花間笑甓樓害先除白額夢已應黃頭燕酒惟増氣秦箏漫送愁鴻毛輕一死秖待報私讐致齋太乙宫紫館天神貴綸闈地望清齋宫奉蠲潔攝事罄誠明殿翼如軒翥壇垓類削成直官琳札宻太宰繡衣輕薜荔羅芳席虹蜺曳綵旌星陳五帝佐醴薦一元牲蒼駟回風馭珍禽警露聲丹霞升曉氣若木競新英挹袂寧無友凌霄自放情受釐宣室對賈傅異諸生宣曲八月收民算三千異典章天機從此淺國艷或非良玉户銅為沓羅幬象作牀驪姬初悔泣飛燕近專房蓮小才承歩梅新競試妝盡知春可樂終歎夜何長取酒臨卭逺吞聲息國亡難銷守宫血易㫁舞鸞腸百草兼花鬭雙鈎映燭藏金人須手鑄虎圈更身當步輦回長樂飛除接未央琳珉飭歡館薻繡裛周牆厭火雙魚尾鳴弦小雁行雲甍澄灝氣綺井激回光路有斯須隔憂難頃刻忘新聲來樂府别寢近温湯虹跨層臺晚螢飛下苑凉錦帷迎七夕蓬餌薦重陽九畹蘭承露三江橘帶霜方資裂繒笑可要盪舟狂並釣池魚小重衾穴鳳翔珊