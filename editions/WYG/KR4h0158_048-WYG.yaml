body:
  text: 宋元詩㑹卷四十八兵部主事陳焯編杜範字成之黄巖人其從祖熚受學朱熹範得從祖之傳家學益著登嘉定元年進士由金壇令累遷祕書監拜監察御史又以御史累遷至樞宻院同知官至右丞相其讜論直道多見於為御史時範恥言不行而徒冐遷擢之榮故屢疏求罷理宗心知其賢但優之以爵位䆒莫能盡從其言也年未八旬卒贈少傅諡清獻有詩五卷夏夜雲月不明有感天色未清霽浮雲翳層空朦朧玉盤質髣髴擘絮中瓊宇本瑩徹一髮不可容胡為受掩葢萬象歸㝠䝉誰能召風伯掃氛建膚功中天縣清光娟娟萬里同募兵召募古來有今者何其艱文書急如雨取辦都保間百夫不當十一夫費千鐶恐彼嗜利徒無能禦國患老母與少婦蓬頭走江干挽之不得留悲泣聲徹天母曰我壯子婦曰我徤夫衣裳破無補田園荒未鋤一朝棄我去饑寒我何如我欲從汝行生死同一隅抑恐惰軍氣累汝重汝辜今業已分離把袂立須臾拭淚為汝言汝亦無我虞戮力濟王功期剪兔與狐良月遊水樂久矣聞水樂邂逅作此遊林立攢萬石曲逕穿深幽谽谺開古洞下有清淺流惜哉非古音噴薄皆人謀流觴飲山緑風鬢吹颼颼欲歸興未盡攜手湖上樓斜陽獻萬狀浩以百目收白鳥去復還翩翩良自由我本山林人對此多慚憂歲月不我與宴閒其可偷便合作歸計老矣安所投世事皆漫爾政恐空白頭詠芙蓉與菊花秋光濃欲滴結束東籬花糝糝紛㸃綴戢戢相參差淵明太好事言樂酌流霞誰云制頽齡為與霜爭華映水開芙蓉麗色如春葩謾以拒為名青女不能加持此問淵明何乃吝齒牙門外風如箭黄落滿天涯送趙寛堂兩片南山雲偶爾連空飛一去向空谷一留伴殘暉招招浙江渡激激風吹衣仰頭有鴻鵠孰使心事違何時黄山畔把酒話昨非再次沈節推送春韻子規泣訴春山頭芳草連天不盡愁紫陌遊人在何處空有顰眉人倚樓溪上悠悠櫂木蘭溪邉落紅紛斑斑嗟哉片片逐流水新篁忽長千琅玕多少閒愁推不去欲問春歸杳無處少年知已負心期尊酒從今樂事稀次鄭府判金字韻巇嶇來北固邂逅識南金未覺人間役欣同物外心燈花殘夜半桂子落秋深細聽朱絃曲寥寥大雅音途中官身驚昨夢山店是回程郡事關新舊人心屬送迎塵衫纔幸脱野服要須成世路如川險歸途却自平水簾谷巨崖森四立谺洞露前簷鳥道穿危磴虬松奮老髯巖高全似砌水小不成簾雖倦猶貪看中宵澗雨添徐鹿卿字德夫隆興豐城人博通經史以文學名於鄉嘉定十六年進士調南安軍教授重申周程之學辟福建安撫司幹辦公事改知尤溪事㑹真德秀守泉辟宰南安邑以大治遷國子監主簿入對陳六事上嘉納之改密院編修值右史方大琮編修劉克莊正字王邁以言事黜鹿卿為詩贈之亦坐貶太學諸生作四賢頌出知建昌軍歴江東運判代岳珂提舉太平茶鹽提刑淛東用檄衢州推官馮惟説决婺獄觸忤當路自劾罷歸八召不起宰相杜範遺書力趣之鹿卿乃出擢太府少卿歴崇政説書權吏侍兼侍講引年致仕卒諡清正士友見和七月七日曝書依韻謝之寒儒家世𣲖南州天遣芹宫竝俊遊劎水章江千里月天孫河鼓一畨秋晒書舊事聊同郝聯句新聲恐類侯隔歲槐黄頻入夢曽知山角已生不湛泉酌餞黎丈屬和其詩幾人林下賦歸休公獨翩然汗漫遊味道不妨寒似水入時須用曲如鉤從來鄰父邀皆去底事官曹挽不留後夜相從那復得月明千里故山秋陳府判邀遊梅關庾嶺蒼蒼古復今公餘杖履愜幽尋兩崖峭壁風霜骨一片清泉佛祖心靜浣世縁揮酒椀更添春色上梅林㝠摉翻覺詩情拙滿眼皆詩祗用吟勸農竹馬兒童喜欲狂循良太守似龔黄倉庚百囀蠶桑啟布榖一聲稉稻香耕饁盡陶邠國化嬉遊已徧舜民鄉文書便合登高閣為説東郊入務忙劉克莊字潛夫莆陽人從學真西山用䕃補官令建陽移仙都以詩禍中錮十年端平初召對賜進士出身直史館出為福建提刑卒其詩號後邨集象奕一首呈葉潛仲小藝無難精上智有未解君看橘中戲玅不出局外屹肰兩國立限以大河界連營禀中權四壁設堅械三十二子者一一具變態先登如挑敵分布如僃塞盡鋭鼓吾勇持重伺彼怠或遲如圍莒或速如入蔡遠砲勿虗發冗卒要精汰負非繇寡少勝豈繫彊大昆陽以象奔陳陶以車敗匹馬郭令來一士汲黯在獻俘將策勲得雋衆稱快我欲築壇場誰可建旗蓋葉侯天機深臨陣識向背縱未及國手其高亦可對狃㨗敢饒先諱輸每索再寧為握節死安肯屈膝拜有時横槊吟句法尤雄邁愚慮僅一得君才乃十倍霸圖務并弱兵志貴攻昧雖然屢克獲詎可自侈汰吕䝉能馘髯衛瓘足縛艾南師未宜輕夜半防砍寨荔支巖洞内小石如荔支者無數異境閟神竒一罅通深阻呀然張蟾吻光怪腹中貯始來尚覿面稍進但聆語廻頭失塵世束緼行里所石房容十客石柱徑丈許眠獒若將吠墮果疑可咀平生聞化城今見玉樓櫓陟高既趫㨗循狹或傴僂忽逢路窮處淺浪隔洲渚心知仙聖居欲到無飛羽向非薪燭力往還何異瞽重遊儻未卜聊向詩中覩棲霞洞往聞耆老言茲洞深無際闇中或識路塵外别有世幾思絶人事齎糧窮所詣棋終出易迷炬絶入難繼孤亭渺雲端于焉小休憇憑高眺城闕擾擾如聚蚋盡捐滓穢念遂有飛舉勢山靈􅎱清遊雨意來極鋭濛濛濕莎草浥浥凉松桂暝色不可留惟望巖扉閉五月二十七日遊諸洞來南百慮拙所得惟幽尋矧余玉雪友共此丘壑心江亭俯虗曠穴室窮䆳深是時薄雨收白靄籠青岑棄輿追野歩却扇開風襟炎方豈必好差遠鼙鼓音且願海氛息莫問神州沈徘徊惜景短留滯畏老侵昨遊感鶯哢今至聞蟬吟常恐官事縶佳日妨登臨譬如逃學兒汲汲貪寸陰何因釋膠擾把臂偕入林戴秀巖戴秀者兵卒也得道于此茲巖視諸峰厥壯尤崢嶸舊為碧蘚封新有朱棧横縻腰尚恐墮束炬差可行外狹中乃寛始闇俄忽明仰窺神魄悸俯顧形殻輕遂覽丹爐基微聞玉鼓聲源深足力盡路黒雲氣生不辨晝夜分恍疑世代更嘗言學神仙所得由專精豈無諸名士羡彼一老兵欣然約同志嗣此將尋盟安知無白鹿絶頂來相迎和太白潯陽紫極宫感秋翰林兩仙人偶來聽風竹蕭蕭玉千竿采采緑一掬少時負不羣中歲乃見獨嗟余長十年所至戀三宿徑當還笏歸奚俟揲蓍卜夜郎與儋耳老大費往復宜州殿其後路險車又覆山中采芝去舍下炊梁熟上已與客遊水月洞分韻得事字勝踐造物慳貧交世情棄昔戒十客來旦無一人至惟余暨兩君鼎足坐水次歡言天氣佳誰謂風土異高吟雜騷選序酌逮髫穉滌厓去惡詩捫石認缺字古來幾禊飲傳者纔一二蘭亭感慨多未了生死事杜陵更酸辛窮眼眩珠翠㫖哉兹日遊超然遺塵累消遙千載後尚有浴沂意巖扉滑如玉歲月可鐫識答李泉州元善平生陳無已白首欠吟債未嘗交馬吕况肎見章蔡附熱生可鄙中寒死亦快吾方尚此友巾車與同載前瞻有膺滂却顧有融泰要當堅一壁詎可立兩界恕乎行誼虧希也名節壞史君惠良箴下走敢不拜懷哉道義交異彼姑息愛明皇按樂圖鶯啼花開春晝遲掖庭無事方遨嬉廣平策免曲江去十郎談笑居台司屏間無逸不復覩教雞能鬭馬能舞戲呼寧哥吹玉笛催喚花奴打羯鼓南衙羣臣朝見疎老伶巨璫前後趨阿瞞半醉倚玉座袖有曲譜無諌書金盆皇孫真龍種浴罷六宫競圍擁惜哉傍有錦綳兒蹴破咸秦跳河隴古來治亂本無常東封未了西幸忙輦邊貴人亦何罪禍胎似在偃月堂今人不識前朝事但見斷縑粧束異豈知當日亂離人説著開元總垂淚築城行萬夫喧喧不停杵杵聲丁丁驚后土徧村開田起窰竈望青斫木作樓櫓天寒日短工役急白棒訶責如風雨漢家丞相方憂邊築城功高除美官舊時廣野無城處而今烽火列屯戍君不見高城齾齾如魚鱗城中蕭疎空無人運糧行極邊官軍守戰塲次邊丁壯俱運糧縣符旁午催調發大車小車聲軋軋霜寒晷短路又滑擔夫肩穿牛蹄脱嗚呼漢軍何日屯渭濵營中子弟皆耕人和南塘食荔歎君欲和詩無悤悤唱首天下文章公今年荔子况倍熟亭亭錦葢高張空猿偷鴉啄牧童采林間殘顆猶殷紅在昔唐家充歲貢吟諷何止杜陵翁南窮交州西蜀土快馬䭾送如飛龍絳裳氷肌初照眼玉環一笑恩光濃惟閩以遠幸免涴一顆不到温泉宫自從陳紫無真本皺玉晩出尤稱雄邇來雞舌擅瑰瑋贊香譽味萬喙同麟臺仙人親題品天為此果開遭逢乃知微物似有數聲價亦與時汙隆列聖儉德被華戎微如淮白不敢供奈何置驛奉私室安得木鐸觀民風山蹊谷塹日力窮血肩踠足馳筠籠請公移此食荔歎置在薰風殿閣中宿莊家茆茨迷詰曲度谷復踰陂世上事如許山中人不知牛羊晴卧野鵝鶩晩歸池粗識為農意秋輸每及時夜過瑞香庵作夜深捫絶頂童子旋開扉問客來何暮云僧去未歸山空聞瀑瀉林黑見螢飛此境惟予愛他人到想稀贈川郭川郭顛狂甚平生挾術遊老猶攜侍女貧不謟公侯用藥多投病酬錢或掉頭金陵官酒貴應典舊貂裘送鄒景仁衝寒何處去新戍尚來年客勸休辭幕君言已買船霜清江有蟹葉脱木無蟬若過東林寺攜家往問禪二將石侯韓仔二將同時死路人聞亦哀力窮鏖轉急圍厚突難開戰骨尋應在殘兵間有廻傷心郵遞裏隔日㨗書來穴蟻穴蟻能防患常于未雨移聚如營洛日散似去邠時繼續緣高壁周遭避淺池誰為謀國者見事反傷遲野性野性無羈束人間毁譽輕客言詩惹謗妻諫酒傷生窻納鄰峰碧瓢分遠澗清近來尤少睡打坐到鐘聲全州寂寂全州路家家荻竹扉異僧留塔在過客入城稀傳舍臨清泚官亭占翠微沙頭泊船者多自嶺南歸贈高九萬并寄孫季蕃諸人凋落盡高叟亦中年行世有千首買山無一錢紫髯長拂地白眼冷看天古道微如綫吾儕各勉旃贈翁卷非止擅唐風尤于選體工有時千載事袛在一聯中世自輕前輩天猶活此翁江湖不相見纔見又西東哭李景温架閣挾策説荆州那知亦闇投漫招温處士幾殺杜參謀出幕有清議還鄉空白頭人間容不得下與阿翁遊建寧丞相其祖也送趙叔愚赴潯州理掾未奉三雍對聊為五筦行鄉書踰嶺少詩思入湘清遠宦身差穩中州事日生向來幾離别此别最關情白鶴故居天稔中原禍朝分黨部爭當年誰宰相此地著先生故國難歸去新巢甫落成如何鯨浸外更遣打包行唐博士祠博士位尤卑投名入黨碑今觀名世作多在謫官時太史沅湘筆儀曹永柳詩新祠綿蕞爾未盡復遺基送陳霆之官連州地接湖南境孤城若箇邊茆寮愁問宿峽石善驚船官小無迎吏詩工有續編古人高妙處不過覽山川張麗華墓臺上栢蕭蕭空堂閉寂寥芳魂三尺土往事幾廻潮墮翠尋難見埋紅恨未銷猶勝江令在白首入隋朝勝業寺寺創于何代問僧皆不知槎牙夏后栢殘缺柳侯碑雪過禪堂冷氷餘嶽路危上封猶未到太息負心期嚴關新洞羽客初尋見因于此葺廬未能平險峻先擬架空虗磴路樵相引山名尉自書看來臨驛道未必有仙居送范守仲冶放逐諳時態惟侯意味長醴為狂客設羮許老人嘗南國留棠舍西郊閉草堂臨岐先作惡未可倚剛腸早行店媪明燈送前村認未真山頭雲似雪陌上樹如人漸覺高星少纔分遠燒新寧須看堠子來往暗知津近日杜于皇濬有早行一首可敵是作其詩云早發柘皋鎮出門疑五更池光先作曉山路幾時平後騎風相逐前人影漸明翻愁羣動起亂我百蟲聲暝色暝色千村靜遥峰帶淺霞荷鋤歸别墅乞火到鄰家戍鼓聞更遠昏燈見字斜小軒風露冷自起灌蘭花郭璞墓先生精數學卜穴未應疎因捋虎鬚死還尋魚腹居如何師鬼谷却去友靈胥此理憑誰説人方寶葬書堯廟帝與天同大天存帝亦存桑麻通絶徼簫鼓出深村水至孤亭合山居列岫尊尚餘土階意樵牧踐籬藩客中漂泊何須遠離鄉即旅人炊薪嘗海品書刺謁田鄰婦寄寒衣少山來曉夢頻小兒仍病瘧詩句竟無神别敖器之名陶孫即題詩三元樓者舊説閩人苦節稀先生獨抱歲寒姿老年綘帳聊開講當日烏臺要勘詩東閣不遊緣有氣草堂未架為無貲輕煙小雪孤行路折賸梅花寄一枝老歎肘後竒書懶更開只今年鬢已相催但聞方士騰空去不見童男入海廻無藥能留炎帝在有人曾哭老􅅨來醉鄉一路差堪向終擬劉伶冡畔埋答友生讀易叅禪事事竒高情已恨挂冠遲清于楚客滋蘭日貧似唐人乞米時家為買琴添舊債厨因養鶴减晨炊君看江表英雄傳何似孤山一卷詩小村人家生來拙性嗜清幽因過山家為小留頂笠兒歸行樹杪提瓶婦去汲溪頭參天老竹當門碧盡日寒泉遶舍流我料草堂猶未架規模已被野人偷𤓰洲城先朝築此要防邊不遣邊兒見戰船遮斷難傳河朔檄修來大費水衡錢書生空抱聞雞志故老能言飲馬年慚愧戍兵身手徤箔樓各占一間眠新亭此是晉人遊集處當時風景與今同不干鐡鎻樓船力似是蒲葵麈柄功幾簇旌旗秋色裏百年陵闕淚㾗中興亡畢竟縁何事專罪清談恐未公送周監門一領青衫似敗荷奈君母老秩卑何三年幕府無人薦常日柴門有客過身畔擔輕藏俸少江頭船重載書多故人若問軍中事為説防秋夜枕戈戲孫季蕃少日逢春一味癡輕鞭小袖趂芳時常過茶邸租船出或在禪林借枕欹名妓難呼多占定好花易落况開遲身今憔悴投空谷悔不當年秉燭嬉紫澤觀修持盡是女黄冠自小辭家學住山簾影靜垂斜日裏磬聲徐出落花間祭星緑簡親書字避客青衣宻揜關最愛粉墻堪試筆苦無才思又空還方寺丞新第一生不蓄買田錢華屋何心亦偶然客至多逢僧在坐釣歸惟許鶴隨船按行花木皆僚友主掌湖山即事權京洛貴人金谷裏安知世上有林泉方寺丞艇子初成船成莫厭野人過久欲從公具釣蓑積雨晴來湖面濶殘花落盡樹陰多新營小店皆依桞舊有危亭尚隔荷所恨前峰含暝色不然和月宿煙波燈夕千炬金梔映玉渠臺城昨夢又年餘斷無絃索鳴華屋惟見炊煙起草廬兒報瓶空因止酒婢言油盡暫停書蓬窻亦有精勤士何必然藜向石渠觀元祐黨籍碑嶺外瘴魂多不返冡中枯骨亦加刑稍寛末後因奎宿暫仆中間得彗星蚤日大程知反覆莫年小范要調停書生幾㸃殘碑淚一弔諸賢地下靈募兵調發年多籍半空虎符招補至閩中莊農戎服來操㦸太守儒裝學挽弓去日初辭鄉樹緑到時愁見戍旗紅募金莫作纒頭費留製衣袍禦北風書事人道山東入職方書生膽小慮空長遺民似蟻饑難給俠士如鷹飽易颺未見馳車修寢廟先聞鑄印拜侯王青齊父老應流涕何日鸞旗駐路旁身在身在樵村釣瀬行秋毫不與市朝爭目云嗜酒相繩急謗到吟詩所犯輕沉水一銖銷永晝蠧書數葉伴殘更閉門孤學無窮味笑殺韓公接後生感昔二首談攻説守漫多端誰把先朝事細看棄夏西陲忘險要失燕北面受風寒傍無公議扶种李中有流言沮范韓寄語深衣揮麈者身經目擊始知難先皇立國用文儒竒士多為筆墨拘澶水歸來邊奏少熈河㨗外戰功無生前上亦知彊至死後人方誄尹洙螻蟻小臣孤憤意夜窻和淚看輿圖得曾景建書聞君别後買傾城酒戒中年亦放行遠使忽來知病起近書全未説丹成莫嫌身去依劉表曾有人甘殺禰衡何日斷原荒澗畔一間茅屋對寒檠被酒酒戸當年頗著聲可堪病起困飛觥醉呼禇令為傖父狂喚桓公作老兵舊有崢嶸皆鏟去新無磊塊可澆平投牀懶取騷經看只喚梨花解宿酲贈徐相師許負遺書果是非子憑何處説精微使君豈必如椰大丞相元來要瓠肥袖濶日常籠短刺肩寒春未換單衣半頭布袋挑詩卷也道遊方賣術歸哭黄直卿寺丞當年出塞共臨戎箭滿行營戍火紅督府凱旋先請去堅城築就獨無功身謀彼此皆迂濶國事中間偶異同莫怪些詞含哽噎在時曾賞小詩工崇化麻沙道中經行愛此人煙好面俯清溪背負山半艇何妨呼渡去小橋不礙負薪還遠聞清磬來林杪忽有朱欄出竹間深處安知無隱者卜鄰容我設柴關真隱寺出郭斜陽已在山夜深乘月到江干奴敲小店牢扄戸僧借虗堂徑挂單駭浪急回因膽薄逆風小住為心寛投牀一枕瀟湘夢無奈霜鐘苦喚殘挽方孚若寺丞使君神雋似龍麟行地飛空不可馴詩裏得朋卿與我酒邊爭霸世無人寶釵去盡中年病珠履來疎晩節貧昔共誅茅聽瀑處溪雲谷月亦悲辛為圃衰病歸來占把茅譬如僧葺退居寮因存橘樹斜通徑怕礙荷花小著橋古有功名興釣築今無物色到漁樵可憐歲晩閒雙手種罷蕪菁擷菊苖寒食清明寂寂柴門村落裏也教挿桞記年華禁煙不到粤人國上冡亦攜龎老家漢寢唐陵無麥飯山蹊野徑有梨花一尊徑藉青苔卧莫管城頭奏暮笳題趙子固詩卷紫芝仲白俱仙去晩秀惟君擅士林字肖率更新手作詩疑賈島後身吟九成合奏音方僃三染為纁色始深老去尤于朋友篤未忘几研琢磨心送王實之邁欲去還留每自憐竟為吾子著先鞭孤忠盡見萬言疏十口同登一葉船屈法相傳煩聖主上書俱貶愧前賢南歸定過西山下細把行藏告墓阡寄徐真翁侍郎憶昨紛紛衆喙鳴怪君噤齘久無聲得非家客留廷尉或是閨人沮仲卿白璧㣲瑕終古在黄金横帶霎時榮從來公議無情甚莫遣䝉齋獨擅名次韻實之孤臣去國四經春跡遠安知罪尚新蚤亦曾譏秦氏者纔為與議濮園人懶箋光範干時宰且伴田家賽社神醉倒不能愁世事倩他煙桞替含顰題小室二首已向深林卓小庵是中僅可著禪龕士師何止三無愠中散居然七不堪一去重華那復得方當盛漢勿多談近來弟子俱行脚誰伴山僧面壁叅阡陌東西山北南半生常帶散人銜何曾雲夢芥八九一任狙公芧四三閤上大夫投欲死甕間吏部寢方酣可憐子駿無家法下見先人面有慚送表弟方時父棄置空村飽世情高軒乃肎顧柴荆韓甥殷浩貧親戚李益盧綸外弟兄兩鬢蕭疎驚老大一燈明滅話平生刺桐花下逢予季多致詩人未害清夢方孚若寤寐中原獨著鞭往來絶域幾餐氊封侯反出李蔡下成佛却居靈運先八百里烹饗軍䏑九千縑輦作碑錢秖今誰是田横客回首荒丘一慨然寄趙昌父世上久無遺逸禮此翁白首不彈冠一生官職監南嶽四海詩名主玉山經歲著書人少見有時入郭俗爭看何由樵服供薪水得附高名野史間按章泉詩苦不多即今所傳亦無奇句而一時名人慕悦如此則以其志趣超然為難及耳雪衰同梧葉報蕭颼卧聽窻聲作許愁檠暗冷光侵研几瓦疎飛片落香篝病思結客遊梁苑狂愛提軍入蔡州也待訪梅湖畔去黄塵滿袖欲盟鷗遇雨與客同登萬仞崖蔽天風雨驀然來六丁白晝誅炎魃百怪蒼淵起蟄雷毒蟒噴時林盡黑怒龍裂處石中開吾生不及觀河決得賦斯遊亦壯哉漁梁春泥滑滑雨絲絲一路陰寒少霽時水入陂渠喧似瀑雲從山崦上如炊燎衣去傍田家火炙燭來看野店詩落盡梅花心事惡獨搔蓬鬢繞殘枝鄭寧示邊報走筆戲贈曾客嫖姚與伏波慣騎生馬擁琱戈金臺有命終須築鐡硯無功亦且磨見説帛書來汝洛又傳氊帳廹淮河只今西北多機㑹吾子南歸竟若何醴陵客店野郭依稀隔渡頭解鞍來倚店家樓欲攀桂樹吟招隱因看梅花賦遠遊市上俚音多楚語橋邊碧色是湘流直南鄉國幾千里目送羇鴻起暮愁落梅二首一片能教一斷腸可堪平砌更堆墻飄如遷客來過嶺墜似騷人去赴湘亂㸃莓苔多莫數偶粘衣袖久仍香東風謬掌花權柄却忌孤高不主張按君以末二語竟遭詩祻所謂却被梅花累十年真堪一笑也昨夜尖風幾陣寒心知清物久留難枝疎似被金刀剪片細疑經玉杵殘痛叱山童持帚去苛留野客坐苔看月中徙倚憑空樹也勝吳兒賞牡丹老馬脊瘡蹄蹇瘦闌干火印年深字已漫野澗有氷朝洗怯破坊無壁夜嘶寒身同退卒支殘料眼見新駒鞁寶鞍昔走塞垣如抹電安知末路出門難老妓籍中歌舞昔馳聲顦顇猶存態與情愛説舊官當日寵偏呼狎客小時名薄鬟已脱梳難就半被常空睡不成却羡鄰姬門户熱隔墻張燭到天明老奴少賤腸枵破褐單傍人門户活饑寒自從毁齒初成劵直至長鬚尚不冠冷炙時霑筵上餕秃芒旋掃臼邊殘他時縱取封侯印僅得君王踞厠看老妾傷春感舊似中酲樂器全抛曲譜生自少抱衾無怨色閒時擁髻尚風情曾陪太尉斟還唱猶記司空眼與聲著主衣裳為主壽莫如琴客别宜城丙辰元日免隨賀旦趂南衙五見空村換嵗華旋遣厨人挑薺莱虚勞座客頌椒花不施行馬均編户雖飲屠蘓殿一家二十宦遊今七十却于身外復何加宿千歲庵聽泉因愛庵前一脉泉襆衾來此借房眠驟聞將謂溪當戸久聽翻疑屋是船變作怒聲猶壯烈滴成細㸃更清圓君看昔日蘭亭帖亦把湍流替管絃南浦亭寄所思只是從前瘦病身官卑活計太清貧買來晉帖多成贗吟得唐詩轉逼真生擬棄家尋劒客死當移冡近騷人秋風爛熳吹雙鬢目送停雲欲愴神烏石山客子家山亦此峰可堪投宿聽疎鐘旋沽村酒開霜柿欲訪禪扉隔暮松鄉信寫成無便寄寒衣著綻倩人縫遠來只為營𤓰圃不是貪渠萬戸封鳯凰臺晩眺經月疎行臺上路秣陵城郭忽秋風馬嘶衛霍空營裏螢起齊梁廢苑中野寺舊曾開玉帳翠華久不幸離宫小儒記得隆興事閒對山僧説魏公去春去春烽火照江邊曾草軍書夕廢眼萬里旌旗真屬命一丘耕釣且隨縁偶然謝客原非病間亦尋僧不為禪尚有惜花情味在銅瓶終日玩芳妍送李用之察院赴潮州烏府名臣暫擁麾霜稜聊復變春熈行人猶謂驄當避聖世初無鱷可移粤俗相攜看上日韓祠配食付他時極知不作周南滯禁闥須君補闕遺訪李鋼草堂不遇細路縈紆入野田遥瞻竹樹已欣然青苔地滑跌盧老蒼耳林深迷謫仙不羡玉堂在天上徑須茆屋占雲邊極知謝客非為亢貪看林花聽澗泉西山絶頂遙知有隱君餐芝種术鹿為羣多應午竈茶煙起山下看來是白雲歸至武陽渡作夾岸盲風掃楝花高城已近被雲遮遮時留取城西塔篷底歸人要認家再贈錢道人拙貌慚君仔細看鏡中我自覺神寒直從杜甫編排起幾箇吟人作大官久旱即事二首晹烏下飲百川空民自祠龍禱社公豈是長官渾忘却水車聲不到城中輸租常占一村先不望明時舉力田老畏里胥如畏虎敗人詩思攪人眠湘潭道中即事儺鼓鼕鼕匝廟門可憐楚俗至今存屈原章句無人誦别有山歌侑桂尊出城二絶日日銅瓶挿數枝瓶空頗訝折來稀出城忽見櫻桃熟始信無花可買歸小憇城西賣酒家緑陰深處有啼鴉主人嘆息官來晩謝了酴醿一架花病後訪梅二首夢得因桃數左遷長源為桞忤當權幸然不識桃兼桞却被梅花累十年和靖林間欬嗽時一邊覓句一邊饑而今始㑹天公意不惜功名只惜詩羅湖異境微茫在半霄僊人垂手下相招老來尚有君親念未敢相陪過鐡橋扶胥一陣東風掃曀霾天容海色豁然開何須更網珊瑚樹秪讀韓碑也合來再題六如亭昔人喜説墜樓姬前輩尤高斷臂妃肎伴主君來過嶺不妨扶起六如碑宫詞二首凉殿吹笙露滿天木犀花發月初圓君王少御珊瑚枕多就宫人玉臂眠先帝宫人總道粧遥瞻靈栢淚成行舊恩恰似薔薇水滴在羅衣到死香書壁緑衣蒲屨小綸巾四壁清風一榻塵誰謂先生貧到骨百金新聘竹夫人宋元詩會卷四十八
