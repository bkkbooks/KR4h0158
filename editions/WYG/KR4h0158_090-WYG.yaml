body:
  text: 宋元詩㑹卷九十兵部主事陳焯編倪瓚字元鎮無錫人本大家子元季知天下將亂盡散其貲材逍遙吟諷兼寓意畫圖遂稱名手所居有清閟閣雲林堂而清閟尤勝古墨妙彛器悉藏其中晩年避亂來徃江湖多寓琳宮梵刹明洪武甲寅年六十八始歸鄉里時已無家寄居鄒氏而卒春日雲林齋居池泉春漲㴱逕苔夕隂滿諷咏紫霞篇馳情􅏞陽館晴嵐拂書幌飛花浮茗盌階下松粉黄窗間雲氣暖石梁蘿蔦垂翳翳行踪斷非與世相違㝠栖久忘返𤣥文館讀書真館何沈沈寥廓神明居陽庭肅宏敞丹林鬱扶疎睠言兹遊息脱屣榮利區檐榱初日麗池臺涼雨餘焚香破幽寐飲水聊舒徐潛心觀道妙諷咏古人書懐澄神自怡意愜理無遺誰云黄虞逺泊然天地初迴首撫八荒紛攘蚍蜉如願從逍遙遊何許崑崙墟蕭閒道館聴袁南宮彈琴是日風雨蕭然有感而作玉琴轉清亮風雨更飄颻疎桐䕃高館朱槿耀芳條生物曷可遏撫事發長謠弱齡陪清讌櫛髮想垂髫相見日已老離居夢且遙秋江渺雲水去鶴影搖搖夜泊芙蓉洲走筆寄鍊師芙蓉猶滿渚疎桐已殞霜泊舟菰蒲中吳山隠㣲陽因懐靜默士竹林閟𤣥房煮茗汲寒澗燒丹生夜光憶與鄭郯輩閒詠步脩廓時予有所思顧瞻重徜徉庭下生苔蘚牖間繙詩章奕勢鄭老勝酒榼郯生將雅歌雜詼諧列坐飛羽觴子歸日已晩棗栗亦傾筐别本止此揮手輒謝别暮宿荒城傍遲明趨所期待子鄭公堂晨往遂至昏企望徒倀倀乃嗟仙真馭固非世所望惻惻理歸櫂泛泛秋浦長還尋甫里陸㪅醉山隂王素冠斯馳贈喜知終未忘余兹將逺適旅泊猶彷徨㣲風動虚碧初月照石梁曠望對清景賦詩託陳郎茯苓思同煮夜雨共匡牀和答呉寅夫對雨見懐溽雲變隂晦零雨隨風濤的皪集蓮池飄颻洒蘭皋朱絲緩瑤瑟綠錢生寳刀撫事増慨慷端居倦遊遨處世每慚柳懐人徒咏陶脆質愛靈藥閒情宣弱毫述懐讀書衡茅下秋深黄葉多原上見逺山被褐起行歌依依墟里間農叟荷蓧過華林散清月寒水淡無波遐哉栖遁情身外豈有他人生行樂耳富貴將如何早春對雨寄懐張外史林外苦泥雨憂來不可絶掀帷望天際春風吹木末飛蘿散成霧細草緑如髮念子獨高世南山修隠訣撫弄無絃琴招邀青天月神安形不凋跡髙行自潔思之不可見饑渴何由歇願為鸞鵠翔南遊拂松雪走筆次陶蓬韻送葉參謀歸金華手把玉芙蓉青天騎白龍出入人間世飛鴻踏雪踪瑤草粲可拾羣峰森玉立璧月挂天南離離星斗濕君昔在山時玉韞山有輝因同白雲出更與白雲歸白雲無定處詎只山中住河漢共縈紆經天復東注金華牧羊人遊戯不生嗔笑拂巖前石行看海底塵手調白羽箭陋彼磨銅硯一語不投機歸歟寧再見用士始郭隗全趙終相如項王疑亞父竟爾龍為魚擾擾何時已百年聊寄耳良也報仇歸言從赤松子去山今幾年還山大學仙天台司馬宅雲氣近相連戊寅十二月丹丘柯博士過林下賦詩次韻以答積雪被長坂卧疴守中林山川雖云阻舟楫肯見尋傾葢何必舊相知亦已深驚風飄枯條清池冒重隂聨翩雙黄鵠飛鳴緑水潯顧望思鬱紆徘徊發悲吟願言齊羽翮金石固其心歡樂何由替黄髮期滿簪古詩送友仁賢良之京師吳山朝靄外闔門春雨餘超忽孤帆逺天末浮雲舒君今北闕遊我栖南山廬荷鋤事耕作閉户詠詩書髙林鳴禽曙青苔行迹疎還期茅簷下一枉故人車贈惟寅陳汝秩髙士隠几方熟睡故人來扣扉一笑無言説清坐澹忘機衣上松蘿雨袖中南澗薇知爾山中來山中無是非三十不娶妻四十不出仕消搖岩岫間翳名以自肆何曽問理亂豈復陳美刺高懐如漢隂終老無機事送惟寅春江煙靄緑逺樹明清旭歸雁影斜斜鳴聲斷復續陳君挂帆去似與雁相逐水際白雲度山中甘雨足安得從耦耕柴門蓺松菊去去且入城懐抱向誰傾姚公有古道希夷多逺情俾爾遂髙隠狂歌樂幽貞聴錢文則彈琴牛鳴野窌中雞登山木上黄鍾雜姑洗舂容以清亮别鵠暮鳴飛流水春演漾愛爾絃手㤀令我形神暢憶昔擅能事宋袁余所向錢君生獨後超軼絶塵鞅操琴晩聞道月斧揮天匠杳如清廟瑟朱絃聴歎唱古道乆寂寥古音亦淪喪促軫淚沾纓歌詩重悲悵為張來儀賦匡山讀書處廬山鬱岧嶤上有香爐峰影落碧天外翠玉琢芙蓉牽蘿讀書處雲磴無行踪猶遺石巖苔花開紫丰茸愁心飛春雪寳劔沈雙龍應化蘇耽鶴歸栖千嵗松仙嵒採芝叟乆别倘相逢題驪山圖校獵上林苑洗馬昆明池霜威肅笳鼓雲氣画車旗馬班陳賦咏衛霍綏蠻夷王風既未逺文明方在兹逶迤霄漢上鳳凰尚來儀送馬生送子淮南行繫舟江㟁栁翠影舞晴煙落我盃中酒舉盃向落日春水浮天碧時見白鷗飛雪光翻綺席應笑披羊裘獨釣溪邉石黄本中書齋為寫寄傲忩圖庭樹緑交䕃時鳥語清綿春竹羅逕筍夏花敷沼蓮慨然三季後契彼羲農前古井汲脩綆空齋絙素絃長歌歸去來悟彼陶公賢終尋桃源崦息景竆幽𤣥為徐有常画葉湖别墅葉湖水淪漪松陵在其西望見呉門山波上翠睂低白蘋晚風起寒煙逺樹齊水蕉籠筆格露栁罩金堤居貞寧汲汲旅泊自栖栖屏處觀魚鳥風雨夜烏啼煑石山房汲澗煑白石雲栖南澗隈敲石發新火荆薪藉餘灰坐候升降理靜觀寒燠媒遂㤀石鼎沸乍疑山雨來丹成同此術鶴化詎能猜我亦餐金液清淺笑蓬萊九日過彦行用韻一首蕩舟煙景晩舉杯當素秋黄花忽在眼白髪仍滿頭臨流發悲悼援琴歌楚調罷席更淹留明月波間照何事鹿皮翁逃名隠屠釣題趙若巖龍山精舍我生倦馳騖無機如漢隂重遊古蘭若對山開我襟風流李謫仙賞静諧夙心琅然哦新詩如聞大雅音回首石林晩白雲花雨深蕭閒館夜坐隠几忽不寐竹露丁泠泠青燈淡斜月薄帷張寒㕔躁煩息中動希静無外聆杳然𤣥虚際詎知有身形雙蛾精舍新秋追和戎昱長安秋夕秋暑晩差涼茗餘眠獨早清風振庭柯寒蛩吟露草晨興面流水西望呉門道不知人事劇但見青山好偶成積雪不肯休蕭條使人愁哀吟四壁静病卧百蟲秋開門望原野江湖漭交流誰能載美酒為我散煩憂送章鍊師并寄鄭有道良覿忽云阻桐花今亦繁落日滿洲渚揚舲念孤鶱因懐息機叟藴真從灌園晨掃石上雲佇子接清言冬日忩上水影日池浮湛淡霞牖上縈迴敷腴三素雲照耀青蓮臺高流輝自下含漪斂復開尸坐以默觀静極自春囘雲泉為王光大賦高齋面絶壁林宻徑難尋風落松上雪零亂幽磵隂皓潔映鶴氅清圓和瑤琴閒咏以自樂聊用㤀華簪懐寄强行之常州學官君在西溪上年年楊柳春提壺坐栁下邀我見情真青葉已垂帶白花還覆蘋别來今見柳思爾采芳芹已卯正月十八日與申屠彦徳遊虎丘得客字余適偶入城本是山中客舟經二王宅弔古覽陳迹松隂如亭午嵐氣忽斂夕欲去仍徘徊題詩滿苔石杜真人聴松軒計籌白石頂聞有丹丘生和玉飲晨露搴林餐絳英止鶴眠松警螢火照書明為善得仙道翛然不近名泊舟泊舟嘉樹下開牖碧江潯慨然念黄落景憩惜清隂多暇觀魚鳥容與一登臨蜕迹塵喧乆欲寡天機深貞松白雪軒分韻境静塵慮清雨餘山光變池館閟虛閒琴樽申繾綣蔚哉春木榮憩我飛翮倦石間有題字苔蝕已難辨寄楊廉夫吳松江水春汀洲多緑蘋彈琴吹鐵篴中有古衣巾我欲載美酒長歌東問津漁舟狎鷗鳥花下訪秦人寄李隠者南洲新月色照見水中蘋便欲乗清影沿源訪隠淪君住鈿山湖緑酒松花春夢披寒雪去疑是剡溪濵寄韓介石江上雨雲歇夕陽歌吹濛朱絃彈緑綺令我終韓憶魚戱弱藻下鳥飛明鏡中夢乘清浦月直過霅溪東贈友生春林積雨晴江渚煙波緑谷鳥語綿蠻澗泉聲斷續蘿逕無來踪空山聞伐木時援清琴坐還同白雲宿龍門茶屋圖龍門秋月影茶屋白雲泉不與世人賞瑤草自年年上有天池水松風舞淪漣何當躡飛鳬去采池中蓮尋友人不遇洲渚多落英􅑴流尋逺山輕舟載美酒搖蕩緑波間俯詠拾瑤草遐思隘塵寰夤縁忽失遇悵望遂空還次張仲舉韻秧疇蒔已遍午饁休中林忽聞軺車至攬衣欣慨深遂尋脩竹下共憩西澗隂汲泉以煮茗遐哉遺世心池蓮詠迴翔波間風的歴葉上露清池結素彩華月映微步雲隂花房斂雨歇芳氣度欲去拾明璫踟蹰惜遲暮徐氏南園對雨櫻桃花欲落風雨暮凄迷忽憶郊園日竹林通澗西弱蔓滋野援蘭葉長芳畦念我當時犮蒿萊没舊蹊與張貞居雲林堂宴集分韻得春字青苔網庭除曠然無俗塵依㣲樵逕接曲宻農圃鄰鳴禽忽變夏疎花尚駐春坐對盈樽酒欣從心所親奉謝張天民先生鳴雁將北歸裴囘舊棲處江湖春水多欲去仍囘顧稻粱豈予謀繒繳非所慮猶為氣機使暄冷逐來去寥寥天宇寛彼此同一寓風萍無定踪易散聊為聚君看網中魚在疚猶相煦丙子嵗十月八日夜泊閶門將還溪上有懐友仁陸徴君明發辭吳㑹移舟夜淹泊空宇垂繁星微雲暝前郭沈沈抱沖素悄悄傷離索歸掃松逕苔遲君踐幽約雨中寄孟集英英西山雲翳翳終日雨清池散圓文空林絶行屨野性夙所賦好懐誰共語燒香對長松相與成賔主次韻姑蘇錢塘懐古二首釀酒劔池水玉壺清若無揮盃送落月山鬼共歌呼松間燈如漆白骨漫寒蕪江山國破後弔古一經行輦路苔花碧御溝菰葉生古跡今寧有新城江上横題王元用秋水軒秋水如玉涵緑蒲玉壺美酒清若無佳人倚忩調錦瑟文君勸酒坐當壚昔年種柳遶漢南樹今搖落人何堪惟有年年秋水至翠煙石黛漾晴嵐開軒清映臨秋水斜日荷花淡相倚凌波㣲步襪生塵交甫凝情珮還委餘不溪詞開𤣥館在餘不溪濵距溪無百步上清王真人所立溪流冬夏盈演玉光澄映與他水特異故為名焉庚午嵗春因市藥過浙江趨便道將歸梅里俯斯水而悦之沂流閒詠盥濯平津顧瞻壇宇近在東麓遂舍舟造其下真人為出酒脯燕嘯巖洞竟日乃返悠悠徂嵗忽已十有七寒暑矣余既為農畎畆身依稼穡復爾政繁奔走州里欲為昔遊其可得乎鍊師下鶱物表閒情夷朗周覽宇宙將還真館余因仿像疇昔之所覩極道山之清婉追賦短章以餞斯别餘不溪水緑生薲放舟演漾當青春舟隨鶴影忽行逺洞口桃花飛接人雲松蔽虧煙蘿席儼在溪東之石壁羽人垂衣坐鼔簧饋我晨餐芝菌香從兹更發洞庭渚濯髮咸池臨故鄉嵗已酉八月十四日寓甫里之野人居劉君元暉邀余酌酒快雪齋中對月理咏因賦長句涼月紛紛疑積雪凝暉散彩白于銀此時獨酌開軒坐便欲剡溪尋隠淪爾營茅齋名快雪我醉行吟踏秋月河漢無聲風露寒心境泠然一髙潔送潭州魯總管翽翽文鵷飛渡淮葳蕤五采下天階西疇昨夜雨初徧田父謳歌有好懐湘潭山色隨輕轂談笑來為此州牧隔岸桐林散綺霞三月洞庭春水緑趙千里扇上冩山用鄭山人韻題誰見解衣作盤礴卷懐雲煙歸掌握春雨㝠㝠江水波竹間日暮衣裳薄零落王孫翰墨餘越王臺殿久荒蕪要知人好画亦好愛比當年屋上烏送徐君玉閩江之水清漣漪隔江名園多茘枝閩中女兒天下白越波飛槳逐鳬鷖櫂歌清綿洲渚濶蕩槳落日令人悲蠻煙怪雨忽㝠宻蔣芽蒲葉相參差此中勝事不為少徐郎逺遊牽我思醉歌行次韻酬李徴君春日過草堂昔聞杜陵之茅屋汀花㝠㝠汀樹緑舊題新詠荅年華種木行椒繞山麓石牀丹竈青琅玕春渠流水夜潺湲當年寳劔淪黄土空餘山月照波間今我不樂懐往古短世紛紛誰比數花下欣逢李白來汀鳥溪童亦歌舞酒酣長嘯五情熱軒冕何榮築巖説邈然抗節餓首陽何異佯狂抱貞潔君歌已竟歌我詩賢愚榮悴百年期少文豈愛壁間画老疾俱來難命駕仰視翕忽浮雲馳安得乘螭與雲化楊花縈夢滿晴天迸壑春雷驚醉眠李侯神清色不動手敲茶雪落輕煙相逢為樂誠草草竟欲攜君卧烟島城郭秋風白鶴飛海上餐霞不知老至正十三年三月四日同章鍊師過張先生山齋壁間見柯敬仲墨竹因懐其人其詩文書畵鑒賞古跡皆自許為當代所少狂逸有高海岳之風但目力稍恕耳今日乃可得耶柯公鑑書奎章閣吟詩作画亦不惡圖書寳玉尊鼎觶文彩珊瑚光錯落自許才名今獨步身後遺名將誰託蕭蕭烟雨一枝寒呼爾同遊如可作贈顧定之輕薄紛紛新少年論詩作賦如湧泉為雲為雨手翻覆背面傾擠當面憐阿翁七十仍踰四與我同心生並世高卧白雲餐絳霞草堂門對靈巖寺贈陶得和製墨麋膠萬杵搗𤣥霜螺製初成龍井莊悟得廷珪張遇法古松烟細色蒼蒼桐花烟出潘衡後依舊井龍栁枝瘦請看陶法妙非常一㸃濃雲瓊楮透送呂養浩之紹興賀監宅前路荷花今亦無空餘湖上月照見水中蒲送爾作官幽絶處錢塘江頭飛柳絮聴事臨堤滿夕嵐時有沙鷗自來去題張氏叢竹軒高軒自虚曠幽竹亦叢生苔石寒依玉風泉夜炙笙治冠輕可着醖酒緑因名好折青鸞尾仙壇掃月明秋日贈張茂實乆客東海上秋風吹練裠放言愛莊叟笑癖如陸雲采藥清晨出哦詩靜夜聞滄浪可濯足吾與爾為羣為文舉画泖山圖因題華亭西畔路來訪舊時踪月浸半江水蓮開九朶峰酒杯時可把林叟或相從興盡泠然去雲濤起壑松次韻酬彛齋見詒荆溪丘壑逺暇日得躋攀野客時相過高人意自閒敲門看脩竹卜宅近青山勝事今寧有幽吟一解顔送僧聞説四明道山川似若耶去依阿育塔還宿梵王家野井封殘雪江船聚晩沙光公强健否持底作生涯寄徐仲清巖谷採靈藥蕭條栖遁情白雲簷下宿海鶴階前鳴燕俎登春菌晨餐脯竹萌時凴五泄水好過蘭陵城画竹贈王光大荆溪王隠士相見每從容借地仍栽竹巢雲獨傍松青苔盤石浄嘉樹緑隂重約我同栖遁嵩髙第幾峰題漁樵友卷釣渚復樵山逃名宇宙間一篙春水浄半畆落花閒鷗鳥時親狎松雲共往還厭聞塵世事緬邈不相關題元朴上人壁蕭條江上寺迢逓白雲横坐待高僧乆時聞落葉聲䲭夷懐往事張翰有餘情獨櫂扁舟去門前潮未生寄王叔明能詩何水部愛石米南宮允矣英才最居然外祖風釣絲烟霧外船影畵圖中他日千金積陶朱術偶同外祖謂子昻也悼項山清上人幽曠山中樂飄颻物外踪梵餘閒憩石定起獨哦松花落春衣静雲垂澗户重依依種蓮處林暝只聞鐘高進道水竹居我愛髙隠士移居水竹邉白雲行鏡裏翠雨落階前獨坐敷書席相過趂釣船何當重來此為醉酒如川賦雪篷手把玉麈尾身披素綺裘梨花縈夜月柳絮入虚舟不作饑鳶咏其如載酒遊因懐剡溪興烟水暮悠悠甫里甫里林居靜江湖逺浸山漁舟衝雨出巢鶴帶雲還漉酒松肪滑敷茵楮雪閒春風一來過似泊武陵灣荒村踽踽荒村客悠悠逺遁情竹梧秋雨碧荷芰晩波明穴䑕能人拱池鵞類鶴鳴蕭條阮遙集幾屐了餘生寄虞子賢天濶海漫漫崑山望眼寛桃源迷晉世松樹受秦官雨蘚鹿迒遍霜梧鸞影寒封題數行字聊問竹平安酬彛齋秋氣入幽居堦前樹影疎筋骸渾懶慢服食轉清虚薄晩魚潛渚新晴溜繞除茯苓期共煮悵望苦吟餘聴雨樓上看春雨玉笙悲逺天辛夷紅蘸水楊柳緑搖烟冉冉侵書幌㝠㝠溼釣船新愁嫌㸃滴自不到鷗邊題丘氏壁我愛丘君宅蕭然隠者風石邊䝉細篠井上植髙桐墨沼鵞羣白雲忩藥蕋紅咏歌當上巳修禊樂融融貽文舉波光浮翠閣苔色上春衣楊柳鶯啼䆳櫻桃鳥啄稀榮名非所慕登覽意忘歸泖水宜修禊重來坐釣磯賦得機徴君荆南精舍圖結廬溪水南勝處足幽探夏果落山雨春衣染夕嵐石攲招鶴磴門俯射蛟潭日日縈歸夢蕭條雪滿簪寄王叔明幾夢山隂王右軍筆精墨妙最能文每將竹影摹秋月更愛山居冩白雲秘笈封題饒古跡雅懐蕭散逸人羣今年七夕聞多事曝畵繙書到夕曛八月三日與劉道益連牀夜話風雨凄然五日開霽道益賦詩見貽次韻扁舟小泊菰蒲雨𤣥論郤消身意塵空寂室中無侍者蕭條雲外不羈人酒杯畏病寧復舉燈火新涼差可親嫋嫋秋風振庭樹緑波芳草似初春春日送别余秀才翼翼髙帆開逺天緑波芳草隨煙綿春林風雨集憂思茅屋琴書移晝眠文采由來庾信少草聖近誇張旭顛百年聚散如落葉行客居人誰可憐春日試筆喜看新酒似鵞黄已有春風拂草堂二月江南初破栁扁舟晩下獨鳴榔苔生不碍山人屐花發應連野老牆㺯酒已􅂸千日醉莫將時事攪愁腸用王叔明韻題畫王郎筆力追前輩海岳新圖入卧遊獨鶴眠松猶警露孤猿挂樹忽驚秋陶潛宅畔五株柳范蠡湖中一葉舟同煮茯苓期嵗暮殘生此外更何求居竹軒翠竹如雲江水春結茅依竹住江濵階前迸筍從侵逕雨後垂隂欲覆鄰映葉黄鸝還自語傍人白鶴自能馴遙知靜者㤀聲色滿屋清風未覺貧送杭州謝總管南省迢遙阻北京張公開府任豪英守臣視爵等侯伯僕射親民如父兄錢廟有碑刓夜雨岳墳無樹着秋聲好將飲食濡饑渴何待三年報政成寄熈本明白首遥知得道餘不聞詩思近何如高齋夜雪同誰話古木寒山獨自居夢裏只尋行去路愁時聊讀寄來書夕陽溪上多飛鳥若箇能看影是虚送徐子素山館留君才一月梅花無數倚霜晴垂簾幽閣團雲影貯火茶爐作雨聲深竹每容馴鹿卧青山時與道人行歸舟載得梁溪雪惆悵鄰鷄月四更三月一日自松陵過華亭竹西鶯語太丁寧斜日山光澹翠屏春與繁花俱欲謝人如中酒不能醒鷗明野水孤帆影鶻没長天逺樹青舟楫何堪更留滯待竆幽賞過華亭顧仲䞇來聞徐生病差室裏維摩病已瘳竹爐藥鼎雨聲秋一畦杞菊為供具滿壁江山入卧遊舟外鷗波情浩蕩忩間蝶夢思綢繆虎頭癡絶從談謔煮茗聊為半日留西野對雨有懐明本諸公怪雨顛風裂芰荷鷗飛歴亂水驚波便須掃地焚香坐豈有髙人載酒過笠澤至今能養鴨山隂何處更籠鵞重隂忽霽猶斜日惆悵思君奈老何奉和虞學士寄張外史華陽上館誰曽到知有高人避世深當户春雲團紫葢洗空花雨散青林丹臺篆迹龍蛇動經閣松聲鸞鶴吟念子離居消息逺幾將書札寄遙岑杭人有傳余死者貞居聞之愴然因賦此以寄果園橘熟誰分餉茅屋詩成嬾寄將衰謝皆傳余已死迂疎真與世相㤀夜分風雨鷄鳴急天濶江湖雁影長寥落百年能幾面論文猶及重銜觴次張伯雨潘子素酬唱韻團團桂樹覆巖阿茅屋歸來雪一窩髙卧丘園竒氣在倦遊江海故人多楚山白雁遵寒渚練水長魚出素波去去南州書問少寂寥誰和紫芝歌寄張徳常身世蕭蕭一羽輕白螺盃裏酌滄瀛逍遙自足忘鵬鷃漫浪何須記姓名石鼎煮雲聴澗雨玉笙吹月和松聲凴君為問張公子曽到良常夢亦清上巳日感懐石梁破屋路攲斜僻似華陽道士家漠漠春雲飛别鶴潺潺夜雨雜鳴蛙閒看稚子飜書葉時有鄰翁汲井花日暮傷心江水緑共舟人已躡飛霞三月廿二日雨懐荆溪勝遊寄原道我昔繋舟尋杜牧荆溪流水落川光春茶已放仙人掌露蘚渾侵玉女牀酒䦨更踏花間月舞罷猶彈陌上桑此日狂遊㤀旦暮十年囘首意茫茫謝伯理東還訪之不遇謝朓宅前山黛濃山雲飛墮墨池中攜家又作它鄉夢歸櫂還隨落葉風鶴入暝烟愁浩渺鷗浮逺水思清空尋君不遇成惆悵江草青青岸蓼紅東林隠所寄陸徵士侵扉桃李晝隂隂耕鑿居人有逺心一夜池塘春草緑孤村風雨落花深不嗔野老羣爭席時有遊魚出聴琴白髮多情陸徴士松間石上續幽吟送僧遊天台用張外史韻四明山水名天下師去那知客路遥雪霽驚麕騰宿莽月明寒鵲集疎條坐尋雲頂千峰石歸趂江頭八月潮説與住山光老子送賔也合過溪橋過許生茅屋看竹舟過山西已夕曛許生茅屋逺人羣鑿池數尺通野水開牖一規留白雲煮藥烟輕衝竈出碓茶聲逺隔溪聞可憐亦有王猷興堦下新移見此君失鶴啄粟巢松泰華峰直將天地作樊籠不聞丁令歸華表應馭王喬入太空行迹縱横苔石上寒棲依舊竹林中清齋我亦厭腥腐長歎思乘萬里風中秋脾疾不飲有感經旬卧病掩山扉巖穴潛神似伏龜身世浮雲度流水生涯煮豆㸑枯萁紅螺捲碧應無分白髮悲秋不自支莫負尊前今夜月長吟桂影一伸眉北里舍北舍南來往少自無人覓野夫家鳩鳴桑上還催種人語烟中始焙茶池水雲籠芳草氣井牀露净碧桐花練衣挂石生幽夢睡起行吟到日斜山園春水鳬鷖野外堂山園細落橘花香栖栖身世畫盈篋漠漠風烟酒一觴豈為任真無禮法也須從俗着冠裳不營産業人應笑竹本桃栽已就行林下遣興眼見藤梢已過牆手拈書卷復堆牀閒臨水檻親魚鳥欲出柴門畏虎狼冠製不嫌龜殻小衣裾新剪鶴翎長從來任拙唯疎懶一月秋隂不下堂二月十日𤣥文館聴雨卧聴夜雨鳴高屋忽憶陂塘春水生何意逺林饑獨鶴若為幽谷滯流鶯成叢枸杞還堪采滿樹櫻桃空復情二月江頭風浪急無機鷗鳥亦頻驚雪後過陳子貞隠居陶公卜宅南村裏快雪初晴思一遊樹辨㣲茫來獨鶴櫓搖攲側散輕鷗墨池繞溜春氷滿塵榻繙書夕照収相見惘然如有失掉頭吟咏出林丘贈别益以道書記一笑相逢豈有期因懐西崦話移時李公祠畔空餘月陸子泉頭舊有詩旅思悽悽非中酒人情落落似殘棋雲濤眼底三生夢鷗影秋汀又逺離寄張貞居不但入城踪跡少南鄰野老見猶稀狂歌衰鳯聊自慰舊學屠龍良已非蒼蘚渾封麋鹿逕白雲新補薜蘿衣羊君筆札誰能繼欲讀靈文一扣扉題孫氏雪林小隠圖天地飄摇一短篷小忩虚白地爐紅翛然忽起梨雲夢不定仍因柳絮風鶴影䙰褷簷上下鹿迒散漫屋西東杜門我自無干請閒冩芭蕉入畫中思歸乆客懐歸思惘然松間茅屋女蘿牽三杯桃李春風酒一榻菰蒲夜雨船鴻迹偶曽留雪渚鶴情原只在芝田他鄉未若還家樂緑樹年年呌杜鵑夜作古木怪石因題夜遊西園渚初月光炯炯徙倚巖石下愛此林中影題秋亭曉色圖園林夏雨歇旭日照蒼苔誰見竹亭裏孤坐興悠哉題良常草堂圖結屋正臨流水開門巧對長松為待神芝三秀移居華蓋西峯田舍山鳥下窺忩牖春風時拂蓬蒿避世何須鄭谷作書已絶山濤雲溪佳處誰覔雲溪佳處渚花汀竹迷藏去鶴原邊倚杖浮鷗波上鳴榔謾題田父聊同爾汝狂夫從問如何昔日揮金豪俠今朝苦行頭陀水仙花曉夢盈盈湘水春翠虬白鳯照江濵香魂莫逐冷風散儗學黄初賦洛神追和戎昱寄鍊師雲霧軒忩倚半空少霞銘處識新宫遙看一片秋山色鶴影徘徊明月中雙井院前小立山色㣲茫好放船秋蕖野水夕陽邊西風更洒菰蒲雨羨爾沙鷗自在眠次韻曹都水夜寒館裏挑燈宿山罽重敷六尺牀隠几蕭條聴塢雨竹林煙幕煮茶香次韻春雨黯黯春雲映户輕緑蕪斜日忽開晴依㣲野徑泉侵盡風落桐花逺思生絶句醉喚吳姬舞踏筵風欄花陣亦囘旋愁生細雨寒煙外詩在青蘋白鳥邊别潘先輩君來煙草正凄迷君去溪頭柳葉齊挂席中流竟東上莫重囘首向荆溪寄友二月江水清接天楊栁隔江搖緑煙一夜愁心似春雪隨風舞影落君前竹枝詞春愁如雪不能消又見清明賣栁條傷心玉照堂前月空照錢塘夜夜潮題畫樓閣參差霞綺開峰巒重複水縈迴赤欄橋外垂楊下步月吹笙向此來六月五日偶成坐看青苔欲上衣一池春水靄餘暉荒村盡日無車馬時有殘雲伴鶴歸二月十五日雨作風軒紅杏散餘霞堤草青青桃欲花寒食清明看又近滿川煙雨亂鳴蛙題畫贈崔子文性癖居幽每起遲一來溪口意凄迷林亭曉色蒼茫裏目送風帆過水西贈曹徳昭谷口桐林落綘霞仙帆初泊野人家蕭閒館裏青苔合看到階前芍藥花客舍詠牽牛花小盤承露淨鉛華玉顆依稀染碧霞弱質幽姿娛我老傍人籬落蔓秋花清明後題野棠花落又清明楊柳青青人耦耕春物䦨珊成底事半江疎雨暮潮平追和蘇文忠墨蹟卷中詩韻奎章閣下掌絲綸清淺蓬萊又幾春三十六宮秋寂寂金盤冷露泣仙人聞竹枝歌因效其聲鈿山湖影接松江橘葉青青柿葉黄要冩新詩寄音信西風斷雁不成行看花士女圖畫圖常識春風面雲霧衣裳楚楚裁為問人間春幾許石欄西畔牡丹開剖𤓰士女圖月彎分破翠團團六月人間風露寒誰覓東陵故侯去但知華屋薦金盤煙雨煙雨空濛逺樹齊人家樹底自成蹊只應二月吳松尾渚際維舟聴竹雞蘇臺懐古望中煙草古長洲不見當年糜鹿游滿目越來溪上水流將春夢過杭州宋元詩㑹卷九十
