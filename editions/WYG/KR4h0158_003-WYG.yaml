body:
  text: 宋元詩會卷三兵部主事陳焯編張詠字復之濮州鄄城人太平興國五年郡舉進士議以詠首薦有夙儒張覃者未第詠與冦凖致書郡將薦覃為首衆許其能讓是嵗詠登進士乙科授大理評事知崇陽縣用蘇易簡薦入為太子中允歴知麟相二州改濮州知浚儀縣擢荆湖北路轉運使太宗聞其强幹召還超拜虞部郎中賜金紫進樞宻直學士同知銀臺通進封駁司出知益州恩威並行蜀民畏而戴之真宗即位加左諫議大夫入拜給事中改御史中丞同知貢舉會奏彈丞相酒過出知杭州未幾復命知益州歸朝掌三班領登聞檢院因患腦瘍乞解任命知并州大中祥符三年召還抗言丁謂王欽若當誅章三上出知陳州卒年七十贈左僕射謚忠定有集十卷悼蜀四十韻蜀國富且庻風俗矜浮薄奢僣極珠貝狂佚務娱樂虹橋吐飛泉煙栁閉朱閣燭影逐星沈歌聲和月落鬭雞破百萬呼盧縱大噱游女白玉璫驕馬黄金絡酒肆夜不扃花市春漸作禾稼暮雲連紈繡淑氣錯熈熈三十年光景倐如昨天道本害盈侈極禍必作當時布政者罔思救民瘼不能宣淳化移風復儉約情性非方直多為聲色著從欲竊虚譽隨心縱貪攫􅅙食生靈肌作威恣暴虐佞罔天子聼所利惟剝削一方忿恨興千里攘臂躍火氣烘寒空雪采揮蓮鍔無人能卻敵何暇施擊柝害物黷貨輩皆為白刃爍瓦礫積臺榭荆棘迷城郭里第鎖苔蕪庭軒喧鳥雀斗粟金帛酬束芻綺羅博悲夫驕奢民不能飽葵藿朝廷命元戎帥師盪兇惡虎旅一以至梟巢一何弱燎毛焰晶熒破竹鋒熠爚兵驕不可戢殺人如戲謔悼耄皆麗誅玉石何所度未能剪强暴爭先謀剽掠民生計空賒死心愁隕穫四野搆豺狼五畝孰耕鑿出師不以律餘孽何由卻鄙夫識蜂蠆寡術能籠絡邉郵未肅清何顔食天爵世方尚奔馳誰復振蹇諤黄屋逺萬里九重髙寥廓時稱多英雄才豈無衛霍近聞命良臣拭目觀奇略縣齋秋夕才薄難勝任空銷懶惰情公堂羣吏散苔地亂蟲聲隔嵗鄉書絶新寒酒病生方今聖明代不敢話辭榮登麟州城樓莫問戎庭苦髙欄日夕攀時清官事少邉靜戍人閒雉堞臨寒水穹廬倚亂山皇恩正無外不擬更移還送别蘇寺丞公身多不定何路慰飄離莫以㣲言合苦將幽思悲山程朝醉少雪屋夜眠遲即問逢春約芳菲折贈誰登黄鶴樓重重軒檻與雲平一度登臨萬想生黄鶴信移煙樹老碧雲魂亂晩風清何年紫陌紅塵息終日空江白浪聲莫道安邦是髙致此身終約到蓬瀛金陵郡齋述懷傍人徃徃羨清途野逸情懐亦自扶官舎四邊多種竹潮溝一面近生蘆病嫌見客低徊甚老覺臨官氣味麤不信浮名是身累有時閒撚白髭鬚遊趙氏西園蜀中春豔世間疎比並陳園恐未如數里花光浮煖日六街塵靜見香車翻空雅樂催歡處入格新詩上板初方信承平無一事淮陽閒殺老尚書歸越東舊隠留别秦中知巳客亭楊栁葉初殘歌咽秋空慘别顔吟愛好峯歸越路醉衝寒雨出秦闗煙蘿庭户重棲倚漁浦人家舊徃還縱使功名無分得免教心在怨尤間再會傅逸人分到知心死不輕幾年曽是愴離情㣲風吹雨雁初下落葉滿堦蟲正鳴燈盡苦嫌論劍畧簟凉頻喜轉琴聲從來共約雲泉老肯向人間占好名郊居寄朝中知巳年來流水壊平田客徑窮愁自可憐汀葦亂搖寒夜雨沙鷗閒弄夕陽天狂嫌濁酒難成醉冷笑清詩不直錢碧落故人知我否幾囘相憶上漁船舟中晩望桃源山仙山初指眼初明倚棹因妨半日程雲裏未忘尋去路世間爭合有浮名嵓空闇老松千尺天靜時聞鶴一聲更謝暮霞憐惜别滿波紅影照崢嶸貽傅逸人少年名節動人羣避俗身居積水濆幾為典衣留逺客半乗欹枕看閒雲門連酒舎青苔滑路近沙汀白鳥分誰道無情活黎庶數篇新咏帶南薰按史公㓜與傅霖同學既貴之後求霖三十年不可得晩知陳州一日霖忽來謁公問昔何隠今何出霖曰子將行矣來報子爾翼日辭去後一月而公卒據此則傅霖乃學道通仙術者然公屢有㑹傅逸人詩其踪跡未嘗疎濶即此作云門連酒舎留客典衣亦非逃世絶俗之流也史所載殆出於小説固未深考歟雙龍寺未踏關陽巳見山木鯨時吼翠㣲間老僧隨隊看雲起居士忘機共鶴閒入眼煙光依砌濕倚空霧氣傍一作繞山環三朝寳訓神明䕶大讀經章祝玉顔鶴共憐潔白本天姿縱枉泥塵性不卑况是稻粱厭足日好尋煙月卻歸時跡參詩雅何年始名係仙經四海知應到昆丘指來歴曽陪鵷鷺浴華池新蟬脱塵還與比仙遊露腹何妨近品流嫩殻半遺紅藥地細聲偏傍綠楊樓詩家取象吟難盡畫格偷真意不休正好儒林擬緌拂馮唐無苦預悲秋過華山懐白雲陳先生性愚不肯林泉住强要清流擬致君今日星馳劍南去囘頭慚愧華山雲雨夜二首四簷風雨滴秋聲醉起重挑背壁燈世事不窮身不定令人閒憶虎溪僧簾幕蕭蕭竹院深客懐孤寂伴燈吟無端一夜空階雨滴破思鄉萬里心寄傅逸人當年失腳下漁磯苦為明時未得歸寄語巢由莫相笑此心不是愛輕肥送别王秘丞帝鄉三十年前别江外相逢鬢已衰清論未窮行計速為君臨水立多時聞鷓鴣畫中曽見曲中聞不是傷情即斷魂北客南來心未穩數聲相應在前村錢易字希白俶之從子年十七舉進士試崇政殿三篇日未中而就自此以才藻知名太宗嘗嘆世無李白蘇易簡曰今進士錢易其人也欲召置翰林不果真宗朝再舉進士以第二人中第除秘書丞通判信州改太常博士直集賢院遷尚書祠部員外郎擢知制誥官至翰林學士儤直未滿卒仁宗憐之召其妻盛氏人禁中賜以冠帔有集一百五十卷温泉詩悲哉天寳時帝耄政不修寵幸尊婦人隂極陽巳柔外戚盛本枝櫛比封列侯丞相大將軍備位甚悠悠天下安既久積漸力不周車服金玉煥黎庶饑寒愁驪山温泉宫晝幸與夜遊一游百司備萬費一日休誰能心自快化作社稷憂國忠恣吞噬林甫懐姦偷缺雛據太原鐘鼓無許收黄塵滿長安慘黷九廟羞唐天未使絶返正知疾瘳自兹遊賞地荆棘生荒秋舊物悉巳廢蜘蛛挂重樓覧者咸寒心一過三迴頭因知帝王業堅固宣鴻猷豈可信嗜欲侮弄生瘡疣西遊曲花銷秋老白日短敗紅荒綠迷空館擬將清血灑昭陵幽谷蛇啼半山晩十年辭家勤獻書王孫不許延公車江頭柤廟祭無日重門生草寒離離我有黄金三尺劍姦骨餘㾗古波艶佩入函闗無故人玉握凋零七星暗南兵曽見南兵苦征遼事一如金瘡寒長肉紙甲雨生蛆山小虀霜骨河枯膾腐魚黎元無處哭丁户日相疎韓丕字太簡華州鄭人㓜孤貧有志操年長始學文太平興國三年進士嘗著孟母碑返魯頌人多誦之授大理評事通判衡州用石熈載薦試中書擢著作佐郎直史館歴知制誥丕文思艱澁宰相以其稽緩書命常加督責積不能平乃表求外郡出知虢州太宗嘉其冲澹自處召為翰林學士終以遲鈍不敏難任禁近三出典州就加禮部侍郎大中祥符二年卒寄岳陽劉從事秋來憶故人寓目臨大野逺近聞清商依稀奏􅃎雅經霜樹半紅無風葉自下一片洞庭心聊憑塞鴻寫菊冷淡花枝寂寂闌只緣開晩少人看若教總似陶潜眼肯向芳春艶牡丹唐異文鑑載詩而履歴莫考但其警句在宋中葉時巳盛傳自是前輩勝流未可與茫無籍里者同論也塞上作防秋人不到萬里絶妖氛馬放䧏來地鵰盤戰後雲月依孤壘没燒逐逺荒分未省為邉客宵笳懶欲聞閒居書事幽居輕宿雨屐齒偏林塘一境無過客千山自夕陽晝禽多獨語夏木有餘凉招隠詩慵寄時清誰肯忘羅處約字思純益州華陽人父濟仕蜀歸朝至太常丞處約登太平興國中進士知吴縣時王禹偁知長洲縣日以詩篇唱和蘇杭間多傳誦後並召直史館處約終荆湖路巡撫年三十三泛太湖三萬六千頃湖侵海内田逢山方得地見月始知天南國吞將盡東溟勢欲連何當灑為雨無處不豐年潘閬字逍遙錢塘人與王禹偁孫何魏野輩游處最歡放懐湖山吟詠自適人以謫仙擬之叙吟髙吟見太平不恥老無成髪任莖莖白詩須字字清搜疑滄海竭得恐鬼神驚此外非闗念人間萬事輕夏日宿西禪此地絶炎蒸深疑到不能夜凉知有雨院靜若無僧枕潤連雲榻牕明照佛燈浮生多賤骨時日恐難勝嵗暮自桐廬歸錢塘晩泊漁浦久客見華髪孤櫂桐廬歸新月無朗照落日有餘輝漁浦風浪急龍山煙火㣲時驚沙上雁一一背南飛落葉片片復落落園林漸向空幾番經夜雨一半是秋風靜擁莎階下閒堆蘚徑中谷松與巖檜寧與此時同渭上秋夕秋色滿晴川登臨渭水邉殘陽初過雨何樹不鳴蟬極浦涵新月孤帆没逺煙漁人空老盡誰似太公賢望華山髙愛三峯挿太虚昂頭吟望倒騎驢旁人大笑從他笑終擬全家向上居宋太宗晩年燒丹閬曽獻方書及帝升遐懼罪乃變姓名匿舒州􅈞山寺為行者後真宗赦其罪以為滁州叅軍卒路振字子發永州祁陽人淳化中進士試巵言日出賦太宗嘉其典贍擢置甲科由通判邠州召直史館大中祥符初使北歸撰乘軺錄以獻擢左司諌知制誥振文詞温麗屢奏賦頌為時輩所稱尤長詩詠卒平五十八伐棘篇伐棘何所山之巔秋風颾颾棘子丹折根破柢堅且頑斸夫趦趄汗汚顔攅鋒束芒趨道還之森森繚長藩暮冬號風雪暗天漏寒不鳴守犬眠主人堂上多金錢東陵暴客來窺垣舉手觸鋒身隕顛千矛萬㦸爭後先襟袖結裂不可揎蹠破指傷流血殷神離氣沮走蹁躚數尺之墻弗復攀無知小醜騷河壖朔方屯師連七年木波馬領沙填填氣脈不絶如喉咽官軍虎怒思吼軒强弩一發山河穿將不叶謀空即安翫養蟻㓂成兇顛推芻挽粟徒喧喧邉臣無心靖國艱為余諷此伐棘篇种放字明逸河南洛陽人性沉黙好學少志山林奉母隠終南豹林谷用張齊賢薦召赴闕授司諫進右諫議大夫真宗眷遇特厚始終不衰晩節耽名利時論薄之夏日山居隂隂林木靜寂寂無人境紅綻紫葳香嵐沈玉膏冷看雲時獨坐慎事常中省何客馭風來新篁動疎影諭蒙詩大瀛卑百瀆自成浮天潯崇丘下累塊竟為蔽日深王者在謙小夙推堯禹心拜言尊賢仁慎徳棄珠金自滿九族散匪驕百善尋炳兹夏商鑒滅國因誇淫酬陳齋民見寄竹扉常晝掩幽僻置身安自委漁樵分因思出處難周庭方設燎漢將尚封壇莫問煙霞意人寰事萬端冦準字平仲華州人太平興國中登進士時年十九淳熈五年參知政事定策立真宗為太子景徳元年拜平章政事决親征之策封萊國公以丁謂之譛貶雷州司户卒謚忠愍暇日遊建平三閭故里廟貌荒凉慘動耳目噫賢者之祀世不絶享郡無正人遺棄若是感事傷俗因留斯句人生若逺遊多是悲登眺况復念三閭遺蹤良可吊道直出章華才髙逐邉徼寃聲噴夜江愁色迷煙嶠斷碑没敗莎古木吟荒廟祠破少薦馨㟁峻稀停櫂神容漬老苔壊壁通殘照舊徑失朱門空庭起寒燒餘基雖索寞清問長光耀旌賢誰再興勿使過者誚水閣晨起板閣長晏眠偶獨起清旦月落簷鳥語煙開客船散長江色自澄汀樹聲空亂羣動又復然勞勞可長歎晩望有感出門望寒野四顧惟椒坡憶昔楚大夫還此情如何殘陽半明雨水落西風多因同下蔡恨不覺増悲歌長郊雨餘逺樹減翠新蟬忽鳴激耳嘹唳久客孤坐情如何哉形之於文聊以自遣遙山夏雨歇逺樹凉風至憑欄偶開襟新蟬動秋思沙溪潔細流庭木驚踈翠節候又復然幽憂斯所萃芳嵗若奔流羲光不停轡感物悼前期誰知此時意江南春波渺渺栁依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸春日登樓懐歸髙樓聊引望杳杳一川平逺水無人渡孤舟盡日横荒村生斷靄深樹語流鶯舊業通清渭沈思忽自驚再歸秦川阮路何方盡西歸興未勞河流經陜狹山色入秦髙返照明秋壘孤村接暮濤還如丁令至故里滿蓬蒿秋夜勉友西風驚萬木危坐思悠哉故國經年别秋鴻半夜來人應多棄善天豈不憐才休學嚴夫子荒凉老釣臺秋日原上蕭蕭古原上景物感離腸逺嶠收殘雨寒林帶夕陽溪聲迷竹韻野色混秋光吟罷還西望平沙起雁行秦中感懐寄江外知已念子隔江海浩然時已秋蟬鳴闗外樹人在水邉樓髪白猶搜句時清尚旅遊遙思當永夜不寐向孤舟水村即事虚齋臨逺水吟釣度朝晡葦岸秋聲合莎亭鶴影孤片雲藏疊巘野燒起寒蕪獨步時吟望離人隔五湖冬夜旅思年少嗟羇旅煙霄進未能江樓千里月雪屋一龕燈逺信憑邉雁孤吟寄嶽僧爐灰愁擁坐硯水巳成氷感興寄蓮嶽一二詩禪友西風傷逺别前計竟成非芳草此時暮故山何日歸禪應同雅道貧合長天機飜憶雲浮侣無憀對夕暉湖上作極目望南浦望中生逺思雁沈芳草渡燒斷夕陽陂嵗月寒萍梗江山念别離惟餘清夜夢暫與白雲期楚江夜懐西風生逺水蕭颯度吟臺明月夜還滿故人秋未來寒蛩啼暗壁敗葉下蒼苔誰念空江外年年首重迴送人客亭殘照裏歌闋獨南行芳草無斷色旅人多别情逺塗方不極長笛更飛聲莫動鄉闗念徒令白髪生巴東驛秋日晩望楚驛獨閒望山村秋暮天數峯横夕照孤笛起江船遣恨須言命㝠心漸學禪遲遲未囘首深谷暗寒煙東歸再經峽中復命經三峽波瀾極目愁片雲生斷壁孤石礙中流道路連巴塞風煙接楚丘重來登望處因念昔年遊荆南秋望西風吹户牖獨自客荆蠻積水浮秋漢㣲陽淡逺山蟬稀疎葉盡雨歇片雲閒何日忘簮紱深居石室間夜泊江上嵗暮峽中村維舟古樹根羣峯初落月後夜獨聞猿流水自無盡客愁那可論平明離楚㟁迢逓指吴門應制賦牡丹花時正言直館栽培終得近天家獨有芳名出衆花香逓暖風飄御座葉籠輕靄襯明霞縱吟宜把紅牋擘留賞惟張翠幄遮深覺侍臣千載幸許隨仙仗看穠華巴東寒食春雨蕭蕭寒食天逺行猶在楚江邉人思故國迷殘照鳥隔深花語斷煙薄宦未能酬壯節良時空自感流年因循未學陶潜興長見孤雲倍黯然過霧山青燈古殿枕寒溪門外天垂斗柄低啼鳥不知春向背落花依舊水東西半橋霜月光相照一帶松煙色未齊誰料百年榛莽地香雲今日繞輪蹄南浦春色入垂楊煙波漲南浦日落動離魂江花泣㣲雨送轉運梅學士進邉郡悵飲惜離羣窮邉去路分雪深山館夜孤雁背燈聞初夏雨中綠樹新隂暗井桐雜英當砌墜疎紅重門寂寂經初夏盡日垂簾細雨中歸州留别傅君楊栁如絲拂畫橋此中留語欲魂銷還愁别後巴東館獨聼空江半夜潮栁曉帶輕煙間杏花晩凝深翠拂平沙長條别有風流處宻映錢塘蘇小家無題金甲珠襦鏁繡扄杜城殘月葬娥英春風候館花如雪空有鶯傳度曲聲南平驛心隨流水還鄉國身向青山上屈盤逺夢不成秋雨細西風一夜客亭寒舂陵聞雁危欄秋盡偶來凭霜落秋山爽氣澄誰道衡陽無雁過數聲殘日下舂陵秋日栁衰蟬噪寒煙没地逈山遙暮雨收宛是昔年秋氣味只添多病與離愁輦下春日雨餘宫闕麗春隂三月花光照上林誰倚青樓望歸騎日斜南陌栁煙深錢惟演字希聖吴越王俶之子從俶歸朝為神武軍將軍博學能文詞召試學士院以笏起草立就真宗稱善改太僕少卿歴知制誥給事中翰林學士遷尚書工部侍郎仁宗即位進兵部初附丁謂以傾冦凖後復擠謂自解宰相馮拯惡其為人罷為鎮國軍節度改武勝軍節度使雅冀柄用抑鬱不得志而卒太常張瓌請謚文墨詔覆議改謚曰思惟演文詞清麗與揚億劉筠相上下所著典懿集三十卷槿花綺霞初結處珠露未晞時寳樹寧三尺華燈更九枝亭亭方自喜黯黯卻成悲欲作飛煙散猶憐返照遲秋夕池上珪月上金塘煙容帶水光朱華接蘭坂綠荇溢魚防叢暗禽棲宻林疎露下凉秋懐巳潘鬢無奈更啼螿始皇天極周環百二都六王鐘鐻接流蘇金椎漫築甘泉道匕首還隨督亢圖已覺副車驚博浪更攜連弩望蓬壺不將寸土封諸子劉項繇來是匹夫漢武一曲横汾鼓吹迴侍臣髙㑹柏梁臺金芝霅煜凌晨見青雀軒翔白晝來立堠東溟邀鶴駕窮兵西極待龍媒甘泉祭罷神光滅更遣人間識玉杯南朝結綺臨春暎夕霏景陽鐘動曙星稀潘妃寳釧光如畫江令花牋落似飛蚱蜢臨波朱火度觚稜拂漢紫煙㣲自從飲馬秦淮水蜀栁無因對殿幃詠唐天寳間事山上湯泉架玉梁雲中複道吐瑤光絲囊暗合三危露翠幰時遺百和香任走金雞親便坐更抛珠被掩方牀匆匆一曲梁州罷萬里橋邉見夕陽成都武侯千載有餘靈壘石刀㾗尚未平巴婦自饒丹穴富漢庭還責碧砮征雨經蜀市應和酒琴到臨卭别寄情知有忠臣能叱馭不論雲棧尚崢嶸公子蓮勺交衢接沁園來時十里一開筵歌翻南國桃根曲馬過章臺杏葉韉别殿對迴雙綬貴後門歸夜九枝然閒隨翠幰歌烏㡌紫陌三條入栁煙宋玉章華清宴重遊陪已有㣲詞更有才神女夢靈因賦感屈平魂怨待招迴悲秋千古情難盡障袂何時望可來袛用大言君自許景差無計上蘭臺寄靈仙觀舒職方學士方瞳𤣥髪粉闈郎絳闕齋心奉紫皇徴士髙懐雲在嶺騷人秋思水周堂閒園露草開三徑靈宇華燈燭九光知有美田堪種玉幾時春渚逐歸航無題誤語成疑意已傷春山低斂翠眉長鄂君繡被朝猶掩荀令薰爐冷自香有恨豈因燕鳯去無言寧為息侯亡合歡不驗丁香結秪得凄凉對燭房苦熱赫赫烘霞鬭曉光雙紋枕簟碧牙牀頻傾蜜勺寧蠲渇久捧氷壺未覺凉雪嶺卻思隨博望風牕猶欲傲羲皇更憐乳燕翻飛處深入盧家白玉堂秋日小園碧簟凉生白袷衣廋園秋晩得幽期千房嫩菊金螢亂百葉衰荷鈿扇敧日薄蘚花沿素壁雨淫蛙鼔占清池翛然自合蒙莊趣誰識無心似標枝休沐有懐雕盤瓊蕋冰去聲寒澌宻樹蟬嘶下直時更賦新詩荅靈運不將團扇隔元規經旬綠草沿堦上盡日流風轉蕙遲秪待觚稜照初旭横經還集絳紗帷艷體三首絳縷初分麝氣濃絃聲不動意潜通圓蟾可見還歸海媚蝶多驚欲御風紈扇寄情雖自潔玉壺盛淚秖凝紅春牕亦有心知夢未到鳴鐘巳旋空耿耿寒燈照醉羅看朱成碧意如何虎頭辟惡無妨枕犀角凉心更待磨惟有幽蘭啼月露可將尺素託雲波山屏六曲歸來夜秪恐重投折齒梭香歇環沈無限猜春隂濃淡畫簾開有時盤馬看猶懶盡日投壺笑未迴蝶怨豈能重傅粉雉驕疑待更求媒啼妝不治金翹闇腸斷温郎玉照臺直夜千廬徼道發傳呼帝宇沈沈璧月孤重燎秖聞喧鬬䑕危枝誰見遶驚烏石螭霜重連鈎盾玉虎氷消下轆轤素髪自憐同騎省一竿何日釣秋鱸涙家在河陽路入秦樓頭相望秖酸辛江南滿目新亭宴塞外傷心故國春仙掌倚天頻滴露方諸待月自涵津荆王未辨連城價腸斷區區抱璧人送許洞歸吴草薰風暖接長亭一曲驪歌倒醁醽懐古更投𤣥石賦艤舟聞采紫莖萍醉抛隋岸楊花白吟過淮山桂樹青可使長離終鎩羽淵雲詞藻出天庭初秋屬疾蜜脾初滿石榴紅秋意先侵玉井桐薤簟自憑南郭几縠巾猶領北牕風雲迷候雁辭遙塞露濕飛螢起暗叢病巳不須傳七發粉牋香墨寄詩筒懐舊居武祀仙壇接里閭琴堂水閣半凌虚竹林舊享銅盤食門巷今容駟馬車楚國大言登宋玉漢家答詔用相如未知笳鼓歸何日空鏁鱣庭春草疎小園秋夕潘鬢秋來已自傷庾園時物更荒凉紫梨半熟連紅樹碧蘚初圓亂縹墻月露暗從孤桂滴水風猶獵敗荷香滑稽還喜鴟夷在欲取臨卭美酒嘗與客啟明越溪㣲霰灑寒梅家近嚴陵古釣臺夢欲成魚通夕去書曽憑犬隔秋迴干時不為侏儒粟樂聖猶銜叔夜杯帝右豈無楊得意漢宫須薦長卿才送客不及橋濶川長恨巳多斑騅嘶斷隔雲羅遙山幾疊迷朱斾芳草經時駐玉珂髙鳥可能追夕照綠楊空自拂㣲波短轅白鼻何由得目送層樓一雁過再次韻和大年雲變危峯萬里横簟鋪湘水一牀平紅蘭受露消晨渇綠蕙翻風析夜酲逸少偶書葵扇貴羊欣閒臥練裠輕無妨天下芝泥熟獨看瑤光近太清館中新蟬習習光風泛紫蘭新聲含怨日將殘自憐伴省成團扇誰許迎秋集武冠委蜕亭臯隨木葉飛緌雲表拂仙盤青蔥玉樹連金爵不覺醯雞競羽翰梨紫花青蒂壓枝繁秋實離離出上闌東海圎珪無奈碧嵰山甜雪不勝寒已憂仙佩懸珠重更恐金刀切玉難自與相如解消渇何須瓊蕋作朝餐栁絮三月江南花漸稀春隂漠漠雪霏霏章臺街裏翻輕吹灞水橋邉送落暉陸凱傳情梅暗落韓憑遺恨蝶爭飛不知化作萍飄否惟見紛紛上客衣再賦荷花玉甃引清泉風髙露白天盈盈臨一水羃羃隔長煙巳分蘭芝溺仍憂趙后仙鮫絲衣更宻珠蚌淚長圎瑟怨來湘浦鴻驚近洛川金塘正斜照誰倚木蘭船上已玉津園賜宴漢家傳洛飲楚俗泛蘭泉玉液初頒酒金盤屢擊鮮珥彤尋竹籞傾葢集芝㕓錦羽翻晴旭霞英落暖煙雅音和舜樂睿澤洽堯天更聼承雲曲同歌在鎬年致齋太乙宫齋潔奉惟馨瑤臺獨自升樓迷五里霧壇燭九枝燈珠館來青雀璇題射玉繩疎鐘平野濶古柏夕霏凝鶴扇真窺月仙衣可鏤氷春茶泛雲液曉飯薦蘭蒸鍊藥疑洪井藏書類羽陵囘瞻大帝室飛檻更長憑夜讌昨夜宴南堂華燈燭九光削青爭落筆舉白鬭飛觴祇覺輝裴玉寧思夢謝塘解煩憑蜜勺藉俎半蘭房促席風絃怨開簾月露凉酡顔君莫訴西北轉銀潢宣曲絳縷初分後銀環未解時巳障紈扇笑猶捧玉壺悲乞巧長生殿迎風太液池雕屏涵火齊寳帳隔琉璃欲買詞人賦空傳狎客詩蔗漿消内熱瓊蕋療朝饑綺蒂桃初熟紅心草欲披凌波渡羅襪向日翳華芝素臉分甘柰香津滴紫梨龍梭隨振素獺髓補凝脂蓬餌重陽節金針七夕期玉膏當淧溢翠葢逐葳蕤弦急哀隨指歌長恨入眉青鸞惟有舞赤鳯可能疑下蔡迷還易平陽破未知髻髙釵自墜腰細佩長垂出恐嚴鐘晩歸嫌細幰遲轆轤驚曉夢鸚鵡漏春思魂怨惟愁斷腸柔巳自危壁璫螢影度瓊户蘚花滋掩鼻讒難訴披圖悔豈追秖應金帶枕聊為達㣲詞别墅别館斗城傍斜軒映曲房蒼頭冠綠幘中婦織流黄複道登平樂期門集未央意錢梁冀宅挾瑟莫愁堂走馬章臺栁停車陌上桑彀弓隨寳帳投轄付銀牀出戴繁星急歸衝細雨忙曽過阿君宿醉舞起跳梁清風溽暑迎秋盡凉飈逗曉迴墜桐侵玉井拂栁度章臺已覺雲翹動還驚月幌開鮫簾移亂影瑤瑟泛餘哀扇掩藏鸞羽荷傾側露杯正當河左界不待雨東來自好傳垂翼寧勞起死灰楚宫誰第賦宋玉最多才屬疾積日勞無補彌天疾未瘳馬卿非避事盛憲自多憂目眩花成果心驚蟻鬬牛􅃎氷那浣熱洛笛更生愁拂枕牕風度穿簾隙日流唾壺從巳缺博齒亦慵投發篋尋桐籙支頤動越謳平生江海志夕夢繞滄洲荷花水濶雨蕭蕭風㣲影自搖徐孃羞半面楚女妬纎腰别恨抛深浦遺香逐畫橈華燈連霧夕鈿合映霞朝淚有鮫人見魂須宋玉招淩波終未渡疑待鵲為橋戊申年七夕烏鵲飛來接斷雲秪貪清淺渡星津不知一夜支機石卻屬乗槎上漢人玉露金河顥氣凉辛夷車轉桂旗香姮娥可是多猜忌不駐瓊輪放夜長一歳佳期一夕過羽旗雲葢涉㣲波明朝若寄相思淚玉枕金莖得最多青鳥當時下紫雲綺囊書秘露桃新莫嫌夜半移牀逺朱雀牕中别有人驪阜凌雲對玉鈎千門髙切絳河秋欲聞天語猶嫌逺更結三層乞巧樓宋元詩㑹卷三
