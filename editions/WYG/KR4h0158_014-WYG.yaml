body:
  text: 宋元詩㑹卷十四兵部主事陳焯編梅堯臣下同尹子漸玉幾道訪郭三别墅不遇秋野已成曠偶然幽興多茨居隔寒水柴户䕃喬柯看竹曾留鳳攜朋不為鵝人歸碧苔徑應識屐痕過送環州通判張殿丞亢欲向蕭闗外窮隂雪暗沙磧寒鴻雁少冰合水泉賖自有從軍樂應無去國嗟春風曾不到吹角寄梅花新秋雨夜西齋文㑹夜色際隂霾燈青謝客齋梧桐生静思絡緯動秋懐小酌寜辭醉清言不厭諧誰憐何水部吟苦怨空堦送弟良臣歸宣城喬木句溪邊秋光幾曲連將歸三畝宅遠寄下江船伴爾惟征雁悲余有暮蟬親朋如見問貧外似當年鄭戭及第東歸後赴洋州幕郤生方得桂王粲始從戎一舸辭呉㑹單車入漢中亂山雲木古側徑野泉通欲識風烟美心知故國同明州推官鄭先輩應幕海邊郡秋風千里歸隨潮呉榜駛轉浦楚山微野橘霜前熟江螯露下肥還家候靈鵲人想罷鳴機僧可眞東歸因謁范蘇州仲淹姑蘇臺畔去雲壑付清機野策過寒水山童䕶衲衣松門正投宿竹笠帶餘暉誰愛杼山句使君應姓韋廖秀才歸衡山縣千里倦為客秋歸烏榜輕過林湘橘暗收潦楚江清晚泊親鷗鷺殘芳襲杜蘅長沙幾日到天際見高城池州進士陳君惠然見過不日且行因以詩贈别呼童具雞黍頗識故人期竹館忽停駕山樽聊解頤醉歌返北郭春雨生東陂便與千峰隔登高空復思春隂濃淡雲無定凄微氣宇寒鳩鳴桑葉吐村暗杏花殘客子行裘薄春塘野水寛輕雷欣已發謬作採茶官訪礦坑老僧山深無外事日夕愛潺湲趺坐樹間石力畊谿上田解言南國事能詠碧雲篇莫貰遠公酒深慚陶令賢詠官妓從人少為輕薄誤失行落優倡去作小家婦願同貧里裝無心歌子夜有意學流黄他日東郊上誰人見採桑送蔡侍禁赴長沙寒葉下瀟湘之官逐雁行水經菱浦晚船過橘洲香二女竹林外三閭楓葉傍平時息戎律物景助才章送余駕部江州内史九江行潦收波已清何時鷁舟上遠見爐峰迎野色連葭菼秋香薦橘橙寒潮如特送不肻過湓城送張秀才之淮南聊為楚客唱一送淮南行出汴遠心喜移舟孤岫横危帆將進浦寒霧不分城枚乘舊居處向來秋草生送李康伯赴武當都監城下漢江流滄波照鬢秋山川包楚塞風物似荆州試聽清砧發何如畫角愁遥知絶戎事水味别槎頭登許昌城望西湖試望許西偏湖光浸曉烟岸痕添宿雨草色際平田夏木隂猶薄朱荷出未圓人閒緑波静幽鷺挿頭眠赴霅任君有詩相送仍懐舊賞因次其韻湖山饒邃處曾省牧之逰雁落葑田濶船過菱渚秋野烟昏古寺波影動危樓到日㝷題墨多應舊壁留送劉比部青山夜來雨溪水已潺湲侵曉桂旗動傷離蘋渚前百壺臨祖道兩槳破春烟舊業西河上歸心落日邊擬張九齡詠燕𦕈𦕈飛來燕長年與社違任從新厯改只向舊巢歸永日當人語輕寒逆雨飛自親文杏慣不識海鷗機送徐君章秘丞知梁山軍蒼壁束江流孤軍水上頭蛟龍驚鼓角雲霧裛衣裘午市巴姑集危灘楚客愁使君才筆健當似白忠州十三日雪後晚過天漢橋堤上行堤上殘風雪橋邊盛酒樓據鞍衰意盡倚檻艷歌留海月開金鑑河冰卧玉虬當年洛陽醉偏憶董糟丘送李閣使知冀州騕褭黄金絡春風北渡河將軍守漢法壯士發燕歌緑水塘蒲短晴天塞雁多家聲復年少矍鑠笑廉頗與道損仲文子華陪泛西湖冰消湖已緑渺渺鴨頭春船學呉兒刺吟希楚老新對山憐去鳥隔樹識逰人誰念滄江上風柔採白蘋送陶太博通判廣信軍平時易水頭不復起邊愁壯士去已久寒波空自流臨塘遺鷺羽隔戍見氊裘半似江南美軍和賸宴㳺與夏侯繹張唐民逰蜀岡大明寺秋葉已多蠧古原看更荒廢城無馬入破冡有狐藏寒日稍清迥羣山分漭蒼田衣指白水此下是雷塘泊淮上清淮渺然去白浪勢如奔同發已先遠獨行將向昏洲長寜辨路夜泊偶依村稍覺燈光亂應聞人語喧宣州雜詩昭亭萬仞山古廟半山間賽雨使君去釣潭漁父閒蕨肥巖向日竹暗壠連闗北望高樓上南飛鳥自還覽顯忠上人詩昔讀遠公傳頗聞高行僧廬山將欲雪瀑布結成冰㝷迹數百載歴危千萬層師來笑賈島只解詠嘉陵和才叔岸傍古廟樹老垂纓亂祠荒向水開偶人經雨踣古屋為風摧野鳥棲塵坐漁郎奠竹杯欲傳山鬼曲無奈楚辭哀和元輿逰春韻乗閒多遠興信馬與君行碧樹斜通市清流曲抱城山花高下色春鳥短長聲日暮吾廬近還歌空復情離蕪湖至觀頭橋江口泊來久長蒲長舊苖争雛洲鵲鬭遺子浦魚跳宿岸欣逢戍歸船競趂潮時時望鄉樹已恨白雲遥送馬廷評之餘姚越鄉知勝楚君去莫辭遥曉日魚鰕市新霜橘柚橋河流通海道山井應江潮近邑逢鷗鳥先應避畫橈送張子野祕丞知鹿邑忽作五年别相逢雙鬢疎不知從此去當見復何如公秫時為酒晨庖日有魚沛譙風物美聊以樂琴書送何遯山人歸蜀春風入樹緑童稚望柴扉遠壑杜鵑響前山蜀客歸到家逢社燕下馬澣征衣終日自臨水應知已息機魯山山行適與野情愜千山高復低好峰隨處改幽徑獨行迷霜落熊升樹林空鹿飲溪人家在何許雲外一聲雞舟次朱家曲寄許下故人藹藹桑柘岸喧喧雞犬村晚雲連雨黑秋水帶沙渾稍聽鄰船語初分異土言雖嗟遠朋友日喜近田園送崔主簿赴睦州清溪舟輕不畏險逆上子陵灘七里峽天翠千重雲水寒古祠鳴野鳥亂石激春湍正與高懐愜寧歌行路難辛著作知西京永寧躍馬西畿令家塋在洛陽衣霑寒食雨花發故宫牆冷淡鳩鳴屋寛閒水滿塘送君悲漸老空憶釣伊魴十五日雪二首寒令奪春令六花侵百花塘冰膠燕觜野水澁芹牙擁柱輕於絮吹墀浄若沙乳禽饑啄木誰誤撥琵琶新雷奮蛇甲密雪鬭鵝毛正欲裁輕縠重令著敝袍沙泉流復凍烟萼坼還韜只待鄰醅熟微聲聽酒槽送番禺杜主簿行識桄榔樹初窺翡翠巢地蒸蠻雨接山潤海雲交訟少通華語蟲多入膳庖不須思朔雪梅吐臘前梢春寒春晝自隂隂雲隂薄更深蝶寒方歛翅花冷不開心亞樹青帘動依山片雨臨未嘗辜景物多病不能㝷洛陽牡丹古來多貴色殁去定何歸清魄不應散艷花還所依紅棲金谷妓黄値洛川妃朱紫亦皆附可言人世稀古鏡古鏡得荒塜土花全未磨背菱尖尚在鼻獸角微訛月暗蝦䗫蝕塵昏魍魎過但令光彩發表裏是山河岸貧無能事耕穫亦不有雞豚燒蚌􅵠槎沫織蓑依樹根野蘆編作室青蔓與為門稚子將荷葉還充犢鼻禈村豪日擊收田鼔時稱大有年爛傾新釀酒包載下江船女髻銀釵滿童袍毳㲲鮮里胥休借問不信有官權潁公遺碧霄峰茗到山春已晚何更有新茶峰頂應多雨天寒始發芽採時林狖静蒸處石泉嘉持作衣囊祕分來五柳家蚤發大信口犬吠知船解村墟尚閉門霜泥粘纜尾冰水閣潮痕撇撇鸊鵜去纎纎蚱蜢昏梅湖到不遠寄信向田園閒居讀易忘饑倦東牕盡日開庭花昏自歛野蝶晝還來謾數過籬筍遥窺隔葉梅惟愁車馬入門外起塵埃將赴表臣㑹呈杜挺之莫怪去遲遲予心君亦知膝前嬌小女眼底寧馨兒學語渠渠問牽裳歩歩隨出門雖不遠情愛未能移哭孫明復殿丞自古春秋學皆知不可過生前恩禮少殁後薦章多妻子將焉託田園有幾何汶陽秋樹裏黄鳥謾聽歌歐陽寺丞桐城宰葉落淮南樹青山徧馬頭人烟將近郭松竹不知秋夜虎林間嘯溪泉舍下流門前仲卿廟遺跡待君求寺丞宰桐見梅詩諒非凡品而邑乘不載其姓名惜哉餘姚令陳寺丞試邑來勾越風烟復上㳺江潮自迎客山月亦隨舟海貨通閭市漁歌入縣樓絃琴無外事坐見浦帆收任適尉烏程俛作程鄉尉折腰還自甘弁峰晴照黛霅水曉澄藍葑上春田闢蘆中走吏參到時蘋葉長柳惲蓋江南金山寺呉客獨來後楚橈歸夕曛山形無地接寺界與波分巢鶻寜窺物馴鷗自作羣老僧忘嵗月石上看江雲依韻和武平九月十五日夜北樓望太湖東呉臨海若看月上青㝠河漢微分練星辰淡布螢細烟沉遠水重露裛空庭孤坐饒清興惟將影對形送余中舍知漢州徳陽匹馬易為秣單車長是輕秋風來棧道宿雨度闗城石上樹林暗山根江水明桐花鳳何似歸日為將行送鮮于祕丞侁通判黔州壺頭山下俗巴婦曲中聽汲井熬鹽白燒田種榖青巖風來虎嘯江雨過龍腥事簡能談者揚雄所草經送河清賈主簿歸任不遠水雲間悠悠泝鷁還分亭接雞犬舉酒對河山殘雪依荒磧寒烟入暝灣昔人鸞枳歎一併在離顔新霽望岌笠山謝紫微坐中賦北望直百里峩峩千仞青斷虹迎日盡飛雨帶龍腥隂壑烟雲畜陽崖草木靈登臨終不厭時許到兹亭魏屯田知楚州淮南木葉驚淮上使君行天外高帆出沙頭候吏迎夜潮通廢埭秋月滿孤城正遲文翁化從來楚俗輕田家高樹䕃柴扉青苔照落暉荷鋤山月上㝷徑野烟微老叟扶童望羸牛帶犢歸燈前飯何有白薤露中肥悼亡每出身如夢逢人强意多歸來仍寂寞欲語向誰何牕冷孤螢入宵長一雁過世間無最苦精爽此銷磨送臨江軍監酒李太博三江卑濕地北客宦逰稀霧氣多成雨雲蒸易損衣白醪燒甕美黄雀下田肥未辨殊方語山歌半是非除夜雪撃鼔人驅鬼漫天雪送寒臘從今日盡花作舊年看著樹多還墮隨風葉更乾明朝預王㑹畏溼兩梁冠同諸韓及孫曼叔晚逰西湖晚日城頭落輕鞍果下凉野蜂銜水沫舟子剥菱黄木老識秋氣徑幽聞草香幅巾聊去檢不作楚人狂夢後寄歐陽永叔不趂常參久安眠向舊溪五更千里夢殘月一城雞適往言猶是浮生理可齊山王今已貴肻聽竹禽啼夏日晚霽與崔子登周襄故城雨脚收不盡斜陽半古城獨攜幽客歩閒閲老農耕寶氣無人發隂蟲入夜鳴余非避喧者坐愛遠風清題松林院静邃無塵地青熒續熖燈木魚傳飯鼔山衲見歸僧野色寒多霧溪痕夜閣冰吾非謝康樂獨往亦何能郡閣閲書投壺和呈相國晏公較量人世無窮樂羅列平生未見書聊奉投壺祭征虜休言撃劍馬相如畫樓晚去聞寒角縹帙春來落蠧魚日奉誨言猶未飽不慙貧賤帶經鋤依韻和秋夜對月陳王苑裏望空虚呉客風前憶具區横閣漸看河影轉繞枝還見鵲驚無蟲催織婦機成素露逼鮫人淚作珠才比陶潛無用處角巾時任酒沾濡依韻和武平别後見寄溪遠檣微一望遥此焉悽絶府中僚已同雁鶩依清淺共看鸞皇上泬寥别岸無端縈細柳廻舟不忍過新橋醉來事事能生感誰道愁腸酒易銷寄洪州致仕李國博湖上悠然度幾春勇抛榮禄遂天眞青蒲翠竹圍華屋白酒黄雞命里人果下有時乘小駟兒曹方見擁朱輪田園歳入千鍾美肯似疏家苦畏貧送少卿張學士知洪州朱旗畫舸一百尺五月長江水拍天穏去先應望廬岳暫來誰復見龍泉閣經吏部重為記山識呉王舊鑄錢往迹可㝷軍事少賸書遺逸附青編送邵郎中知潭州長鐃疊吹洞庭外縁虎帶刀蠻帥迎且諭漢家綏撫厚莫言湘守事權輕木奴洲近霜包熟斑竹林昏野鳥鳴賈誼宅邊寒井在暫留千騎潄餘清送王察推縝之鄧州昔向南陽憶洛陽秋橙初熟半林黄車過白水沙痕濶雁落鉗盧稻穟長廢壘漢碑金刻字古原秦冡石為羊太平羽檄何曾有賔主相歡菊薦觴送石昌言學士混混拍堤𤓰蔓水軒軒銜尾桂檣船使君東下只朝夕父老走迎無後先古堞秋耕拾銅鏃長淮瀑雨入壕蓮鳴猿舞鶴仍持去不憶承明夜直眠送樂職方知泗州長堤凍柳不堪折窮臘使君單騎行蘇合輕裘霜莫犯銅牙大弩吏先迎山傍楚賈連檣泊水上禹書寒磬清試向郡樓東北望烟波千里月臨城和王景彛正月十四日夜有感燈光暖熱夜催春天半樓開飲近臣馳道横頭起山岳露臺周匝簇車輪隔簾艷色多相照下馬輕裘各競新我已暮年殊趣嚮濃油一盞案邊身小村淮濶洲多忽有村棘籬疎敗漫為門寒雞得食自呼伴老叟無衣猶抱孫野艇鳥翹唯斷纜枯桑水齧只危根嗟哉生計一如此繆入王民版籍論依韻和呉正仲冬至流年冉冉即衰遲物趣廻還似轉規長景已知今日至孤懐不比少年時偶陪上閣鵷鸞後且與南州父老期况有舂禾新酒熟百分休放手中巵朝木鏁初開水上城竹籬深閉日光生青苔井畔雀兒鬭烏臼樹頭鴉舅鳴世事但知開口笑俗情休要若心行是非不道任佻達唯憶當時阮歩兵東溪行到東溪看水時坐臨孤嶼發船遲野鳬眠岸有閒意老樹著花無醜枝短短蒲茸齊似翦平平沙石浄於篩情雖不厭住不得薄暮歸來車馬疲送呉正仲婺倅歸梅谿待闕山水東陽去未去朋親苕霅朝復朝更無越相逃名舸猶看呉王送女潮海燕歸齊聲滿屋谿梅開過子生條明年十月吏迎處七里灘前櫂奏簫和孫都官河上春望河上風烟愛此邦呉艘越舸不相降魚腥矗矗橋邊市花暗深深竹裏牕蹴踘漸知寒食近鞦韆將立小鬟雙年光取次須偷賞何用功名節與幢重送周都官水上朱樓戍角鳴濛濛雨裏榜舟輕未逢甫里先生謁多見呉興太守迎荷葉半黄蓮子老霜苞微緑橘林明十年不到風烟改君去將詩與畫評送李戴之殿丞赴海州𣙜務𤓰蔓水生風雨多呉船發櫂唱呉歌槎從秋漢下應快人憶故園歸奈何世事静思同轉轂物華催老劇飛梭茶官别有清閒味海月團團入酒蠃和楚屯田同曾子固陸子履觀予堂前石榴花堂下一匹鄭䖍馬欄邊兩株安石榴但能有酒邀佳客亦任狂花落素甌俗女紅裙無好色主人白髮自侵頭欲歌翠樹芳條曲已去洛陽三十秋依韻和永叔久在病告近方赴直道懐見寄浴堂深殿近皇居秋夕詞臣直宿初宫女穿針争落月官奴持燭看殘書萬家乞巧心無盡斜漢飛光望有餘枕上江山夢猶熟五更寒雨過簾疎江鄰幾暫來相見去後戲寄低頭拜我蒼髯翁來如飛鳥去如風一夕共飲斗柄北平明已向函闗東衆中舊騎跛鼈馬塞下新買連錢驄疾驅似逐鄧林日不肻暫住行何窮和韓欽聖學士襄陽聞喜亭亭欄下望漢江水浄緑無風冩鏡明日脚穿雲射洲影槎頭擺子出潭聲檣帆落處遠鄉思砧杵動時歸客情使者徘徊有佳興高吟不減謝宣城送余少卿知睦州青山峽裏桐廬郡七里灘頭太守船雲霧未開藏宿鳥坡原將近見燒田養茶摘蘂新春後種橘收包小雪前民事蕭條官政簡家書時問霅溪邊寄題徐都官新居假山太湖萬穴古山骨共結峰嵐勢不孤苔徑三層平木末河流一道接牆隅已知谷口多花藥祗欠林間落狖鼯誰侍巾褠此逰樂里中遺老肻相呼送趙簡議知徐州及鹿車幾兩馬幾匹軫建朱幡騎彀弓雨過短亭雲斷續鶯啼高柳路西東吕梁水注千㝷險大澤龍歸萬古空莫問前朝張僕射毬塲細草緑䝉䝉送李中舍襲之宰南鄭莫問褒中道路難襄陽直上幾重灘蒼烟古栢漢高廟落日荒茅韓信壇出水槎頭一絲挂穿虹雨脚兩橋殘土風大抵如南國期㑹先時俗自安送馬行之都官昭亭山下送君時不畏西行劍棧危笮馬跨來身更健呉船乘去計非遲錢塘湖上㝷雲屋巾子峰前種槿籬此趣已高天下士不須功業似鴟夷寄許主客昨日山光寺前雨今朝邵伯堰頭風野雲不散低侵水魚艇無依尚葢篷藕味初能消酒渴蓼芳猶愛照波紅揚州有使急廻去敢此寄聲非塞鴻聞永叔出守同州寄之冕旒高拱元元上左右無非唯唯臣獨以至公持國法豈將孤直犯龍鱗茱萸欲把人留楚苜蓿方枯馬入秦訪古㝷碑可銷日秋風原上足麒麟寄西京通判宋次道當時交友都無幾欲問歡娯亦異今花接上林新木變水分清洛舊池深嵯峨嵩色雲常在窈窕宫牆草又侵修竹千竿白家寺昔年題處可能㝷送唐紫微知蘇臺洞庭五月水生寒盧橘楊梅已滿盤㤗伯廟前看走馬闔閭城下見驂鸞呉娃結束迎新守府吏趨蹡拜上官曾過揚州能慣否劉郎盞底勸須寛右丞李相公自洛移鎮河陽侯服齊三輔天臺聳百僚新章刻銅虎舊徳冠金貂已作歌襦化方期執玉朝雙鞬辭洛宅千騎向河橋鼔角春城暮鶯花故苑遥𤓰亭猶接畛棠茇自敷條夾道都人擁迎風四牡驕莫隨文學乘空望斾旗飄望許昌西湖晚晴新晴萬柳齊鶯度水東西城上明殘照雲間挂斷霓烟蒲勻若剪沙岸浄無泥果壓繁枝重人乘小駟低嵐光開翡翠湖色浸玻瓈惹袖朱藤密如過罨畫谿次韻和永叔對雪紛紛何亂日凛凛自開門著莫風難定侵凌物已繁裝成新樹色没盡古苔痕冷入梁王苑清乗衛國軒欺貧凍蓬蓽增險怯轘轅小隙皆能及洪爐逼不溫雲衣隨處積水甲等閒屯團戲為丸轉堆雕作獸蹲豈愁穿破履幸喜有清樽誰問諸公子高樓與後園金明池遊三月天池上都人袨服多水明揺碧玉岸響集靈鼉畫舸龍延尾長橋霓飲波苑花光粲粲女齒笑瑳瑳行袂相朋接㳺肩與踐摩津樓金間采幄殿錦交窠挈榼車傍綴歸郎馬上歌川魚應望幸幾日翠華過送李端明知河中府才業人終服聰明帝所聞來希叚干木去識大馮君金絡鳴津口朱旗㸃雁羣山河虞舊國簫鼓漢横汾古堞臨秋月高樓等白雲應同羊叔子緩帶隔囂氛代書寄歐陽永叔四十韻始謫夷陵日當居建徳年一書寃逐客四詠繼前賢自謂臨江徼相逢莫我先白醪封畫榼素鯉養泓泉戒吏收山栗呼童惜沼蓮只期東浦過共醉小溪邊日日占風勢時時到水堧安知貪挂席不肻暫廻船自爾皆無定歸歟亦未然指程幾一月􅑴險歴三千魚鳥都難問音塵杳莫傳因之走羸僕試與訪南遷比及過牛峽還聞近璧田報言雖不獲吉語喜多全我解歸堯闕君移近漢淵問途曾未遠命駕亦何縁衰野今行矣隆中有待焉鄉亭𤓰接畛風化蟻同羶即欲朋簪盍翻為俗事牽愛嬰嬌啞啞嗜寢腹便便雞黍煩為具輪轅豈得前寄聲勤以謝幸子恕而憐來貺誠為望論情恐未捐常親馬南郡果謁謝臨川遂得窺顔色重忻論簡編聊資别後著大出篋中篇問傳輕何學言詩詆鄭箋飄流信窮厄探討愈精專道舊終忘倦評文欲廢眠寜知主人貴但見左魚懸所至同風月相歡憶澗瀍清歌嗟在耳素髮怪侵顚翠堞時登眺芳洲屢溯㳂難醒撥醅醁殊厭落頭鮮坐竹聽啼鳥臨流聒嘒蟬孤亭起歸夢南陌去揚鞭出餞陪雙斾方蘄歴廣􅆵始生山吏敬頗識利途邅㑹面辭何吐離膺事已塡空餘郡樓望野色際平烟和春日偶書甕面春醅壓嫩藍盤中鵝炙亦肥甘正宜醉夢輕為蝶苦怕酬詩密似蠶病起羊公方隠几歸來陶令只乘籃河堤古木欣欣暗野水新秧拍拍渰已向官資隨分足莫將忠憤等閒談况於世上諸般厭不作人間一例貪陋巷自知當退縮權門誰解更趨叅高低趣向難為合冷暖情懐固飽諳免意妻兒猶茍禄强顔冠冕未抽簪唯公恩遇留連召頻對樽罍也負慙和禁烟述事狂風暴雨已頻過近水棠梨著未多窈窕踏歌相把袂輕浮賭勝各飛堶閒牽白日游絲颺細驀黄金舞帶拕小苑芳菲花鬭蘂華堂嘲哳燕争窠西州駿馬頭如剥南國佳人頸似瑳結客追隨傾畫榼分棚逰樂藉清莎鞦韆競打遺鈿翠芍藥將開翦纈羅我病乞求新火炙無心更聽打枝歌雜詩絶句四首蛙行動萍葉誤觀作逰魚稍稍引兩股已變科斗書青青老鏡葉下有繁實尖浪頭撥船女刺手終不嫌前時雙鴛鴦失䳄鳴不已今更作雙來還悲舊流水河畔有釣翁團泥為甕缶坐想秦人聲思傾杜陵酒七月二十一日夜聞韓玉汝宿城北馬舖暗樹秋風擺葉鳴桃枝竹簟冷逾清孤燈淡淡短亭客半夜蕭蕭聞雨聲京師逢賣梅花二首北土只知看杏蘂大梁亦復賣梅花此心還似庾開府不惜金錢買取誇驛使前時走馬廻北人初試越人梅清香莫把荼䕷比只欠溪頭月下杯對雪憶往嵗錢塘西湖訪林逋處士二首昔乘野艇向湖上泊岸去㝷高士初折竹壓籬曾礙過却穿松下到茅廬樵童野犬迎人後山葛棠梨案酒時不畏尖風吹入牖更教牀畔覓鴟夷黄鶯内家初上翠微宫樹裏窺人在半空笑語漸高無約束侍臣偷望向雲中宋元詩㑹卷十四
