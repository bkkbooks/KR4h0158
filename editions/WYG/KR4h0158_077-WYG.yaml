body:
  text: 宋元詩㑹卷七十七兵部主事陳焯編揭傒斯字曼碩龍興富州人父來成宋鄉貢進士傒斯幼貧讀書尤刻苦晝夜不懈繇是貫通百氏大悳間游湘漢程鉅夫盧摰先後為湖南憲長咸器重之鉅夫因妻以從妹延祐間程盧列薦於朝特授翰林國史院編修官時平章李孟監修國史讀其所撰功臣列傳歎曰是方可名史筆若他人直謄吏牘耳陞應奉遷國子助教再入翰林天厯初開奎章閣首擢授經郎文宗時幸閣中奏對稱㫖恒呼字而不名每中書奏用儒臣必問曰其材視揭曼碩何如與修經世大典授藝文監丞參簡較書籍事元統初遷翰林待制集賢學士代祠北嶽還擢奎章閣供奉學士改翰林直學士陞侍講學士同知經筵至正三年年七十請老不許詔修遼金宋三史以傒斯為總裁四年遼史成未幾得寒疾七日卒追封豫章郡公諡文安遊麻姑山雲關君子荷初服恩至若無榮穆穆芳雨散悠悠蒼山行危闗擁霧黒飛術縁雲青苔蘚滑如積松杉杳㝠㝠時逢負芝翁忽聞流水聲舉足向益高矯然欲遐征徒𨽻各㤀倦矧彼髙人情黄鶴山聴雨得清字𤣥扃息深構虚館含餘清瀟洒松上來瑟縮花間鳴遙兼夜柝警細與寒更并懐親感離别撫物愧生成土思浩方殷春聲耿逾明幸及朋知好達此旦暮情北展非窮轅南山夢歸耕何言託毫素聊與欵平生湖南憲使盧學士移病歸潁舟次武昌辱問不肖姓名奉寄我本耕牧豎結廬章江涘微生屬休明世尚猶典禮驚飈卷飛轍寥落從此始三年江漢春萬事隨逝水既昧理生術復慚遊方㫖豈無青山歸亦有桑與梓何為苦留滯眷眷存君子君子諒不然東皋畢耘耔麻姑壇嵯峨仙都觀遙望丹霞天後有千嵗松前有百頃田風日夏颯沓煙雲晝蔥芊羣彦一時集安知非列仙持觴起相酬罷琴接髙言天道信悠邈人情何拘攣靈君不可致落景詎少延仰雖慚㝠㝠俯實憂元元主人顧坐客此中可㤀年正月十二日尋盧學士船至漢口留詩為别晴江澹微瀾曳雲在層巘參差連舫出散漫羣鷗逺始知遵漢廣遙睇髙斾卷懐賢每㤀賤臨流亦㤀蹇蒼茫景將入杳渺春猶淺新知遽相違餘悰何由展重餞李九時毅賦得南樓月姢姢臨古戍晃晃辭煙樹寒通雲夢深白映蒼祠暮胡牀看逾近楚酒愁難駐雁背欲成霜林梢初泫露故人明夜泊相望定何處且照東海歸行送歸舟去過江州遙瞻九江樹已踏西江土落日照庾樓驚風滿湓浦寒鷗迎櫂起逺岫依城吐悵然感羇遊澹爾成賓主白頭釣魚叟赤足浣紗女未識居者歡安知行者苦春日雜言羃䍥楊栁枝䝉茸春草齊夭夭誰家婦采桑臨路岐零露沾其裳蛛絲卷其衣樹髙身苦弱蠶饑行復遲辛苦事姑嫜宿昔减容輝見者皆歎息此心獨誰知良人日暮至嗔問汝何為三月三日奉陪憲使程公遊麻源第三谷宴藏書山房白雪樓明公富暇豫勝日懐登臨蹀躞驄馬行窈窕幽人心縣崖響晴雨奔流濯春陰雲門轉絶壑畫橋貫長林拂石慨往運聞鐘知古音耆松有百圍突嶂踰萬尋小憩釣魚臺聿瞻華子岑捫蘿入縹緲側徑臨蕭森上有百尺樓下有孤猿吟初筵俯層巔微風蕩危襟笑語信㤀我觥籌浩難任豈不念永留惘然歸思深遊禪林寺喜得昌上人靈皋獨懐往危軒泊閒寂偶與塵事違況值禪林客深苔上脩玉輕霏澹凝碧驀見飛鳥還靜聞寒溜滴空明㑹真賞漂流得良覿常恐心跡乖無由展平昔淵明歸興圖家貧無酒飲聊欲試絃歌去家百餘里邈若異山河江上日多風浩浩水増波門前五栁樹繁蔭空婆娑秫田已收成歸計當如何雜詩青青孤生松髙出浮雲中下有嘉樹林上有萬里風俯視原上草秀色何丰茸自顧豈不髙獨立難為容常恐本根蠧委此蒿與蓬送袁先輩之盱江賤貧戀知已親愛畏離别雨罷江色黄扁舟此時發煙綿緑蕪逺杳渺孤禽沒行雲滿西原麻姑在天末送華尊師以天夀節奉詔祀武當靈畤嚴漢祠神峰標楚甸羽人丹丘伯承詔貤嘉薦華渚曜玉虹條風舞𤣥燕長淮雨中瀉喬嶽雲間獻涉甸厯峻址梯空答𢎞願授簡香始升揭䖍帝如眷天清翼軫動地肅𤣥武見飛響迥相聞竒祥靜逾絢是中有真侣早接諸方援胼胝負畚鍤鑿翠蓄雷電金芝産齋房璚雲冠巗殿祈禠無嵗年㑹節方紛衍既協時若降又樂明祀徧聖厯齊堪輿豐澤周㝢縣還歸報天子獨往奚所羨春暮閒居寄城西程漢翁十五韻迢迢層城阿峩峩鳳凰山下有隠淪士能為河漢言兩日一寓音五日一承顔每談經濟事恒及離亂間言詞多慷慨文字少凋殘不歎東逝川但憶南山田寧與無心遊不受衆目憐褰衣必峻崿散步亦名園卷舒信在襟蕭寂固所安經春窘疾痗撫時増懦孱羣書亂藥裹髙臥掩荆闗蹇予屬久要朝詣常暮還醜劣愧高情焉知君所觀日出衆鳥語蒼岑滿樓端申章寫深詣謭薄何由宣去婦詞江東有一士子留都下三年適娶一貴人女為妻久乃知其已有妻子矣一夕逃去因託去婦為之詩非徒欲傳其事抑以示風戒云爾輕合鮮義終茍容希禮遇逺結萬里婚多為才名誤始與君結好不知君有婦有女嫁他人俱懐託遲暮青青牆下草生死牆下路姢姢道傍花零落無處所女子失其身何以保貞素既乖百年意百年誰能度對鏡空悲唶中心良難訴浮萍難為託一木無兩附棄舊屬新歡新歡漸成故寧當中路拆莫被他人去寧老阿母傍不受他人妬騰身出房闥兩絶無復顧豈願嫁他人甘心西山樹贈王郎王郎楚狂士意氣飛秋霜讀書盡萬卷下筆數千行富貴視浮雲況肯矜文章十五恥里居掉臂辭故鄉夜宿東海月朝買西州航瞑目王公前結客少年塲一飲或一石一醉或一觴寧揖屠狗人不與俗士當千金不易笑嵗暮單衣裳阮籍在窮途英聲連四方鸞鵠有時鎩反愧燕雀翔世無劇孟交不及青樓倡燕趙如花人翠袂黄金璫不識豪俊士空媚癡與狂王郎逺過我坐我枯藜牀終夕無酒飯撫髀歌慨慷平明别我去極目空茫茫登祝融峰贈星上人洞庭南桂嶺北衡山連延瀟湘黒中有祝融如髻鬟嵯峨七十二峰間祝融不自知千山萬山如迴環面面芙蓉粧儼如天仙朝紫皇千官百辟遙相望半夜每瞻東海日六月常飛滿樹霜龍拏鳳攫熊虎躑雲生霧滅何時極我來正值太平時況有山僧似疇昔憑高一覽四海空草間培塿安足雄盤盤羅漢臺翕翕炎帝宫復恐九天上視我如井中朔風日夜相騰蹙谷老崖堅松柏秃古來鐵瓦盡飄揚山上至今猶板屋山僧勸我歌我歌徒自傷天下五嶽嵩中央此山與我俱南疆我今三十始一見北望中原天更長送黄五舅得武陵較官還辰州寓居省侍寧上山頭種禾黍莫向他鄉作羇旅山田得雨尚有年他鄉憔悴何人憐一身千里家何在全家更在沅湘外獨樹雞鳴楓葉飛荒村雁落蘆花碎親在窮途望子還子在長途衣復單居無寸田出無僕明年作官當食禄望葛市有懐故人盧子儀順流無風江更急嵗暮歸人浩難縶所思只隔江上村亂樹參差不容入憶昨扁舟􅑴雲夢觸熱千里能相送我來悵望竟空還一樽知是何年共樊山蒼蒼赤壁暮武昌對㟁黄州路連聲大笑櫓如飛回頭獨送孤雲去題邢先輩西壁山水圖邢家蒼蒼西屋壁萬壑千巗動寒色大江忽轉天地迴浮雲孤飛日月白參差樓觀照林紅松檜凄迷起朔風崑崙蓬萊不可到赤城白帝遙相通賤子平生尚竒偉南極衡湘北幽冀復從大駕上灤京始投邢君多意氣君昔扈從戎馬間少壯不知行路難月明飲馬長城窟雪深射虎祁連山萬里歸來太平日坐我江山百憂失平明萬騎出天門又駕官車就行役研山詩山石出靈壁其大不盈尺高半之中隔絶澗前後五十五峰東南有飛磴横出方平可二寸許鑿以為硯號曰研山在唐已有名後歸於李後主主亾歸于宋米芾元章刻其下述所由來甚詳宋之季歸于天台戴運使覺民後又歸其族人宰相賈似道求之弗與㩦持兵亂間寝處與俱乃獲全大都太乙崇福宫張真人本戴氏子今年春貽書得之請予賦詩其詞曰何年靈壁一拳石五十五峰不盈尺峰峰相向如削鐵祝融紫盖列前後東南一泓尤可愛白晝𤣥雲生霮䨴在唐已著羣玉賦入宋更受元章拜天台澒洞雲海連戴氏蔵之餘百年䕶持不涴權貴手離亂獨與身俱全帝傍真人乗紫霞尺書招之若還家陰崖洞壑寒􅞛􅞛宛轉細路通褒斜崑崙蓬萊與方壺坐臥相對神僊居硬黄從寫黄庭帖汗青或抄鴻寶書秦淮咽咽金陵道此物幸不隨秋草願君谷神長不老浄几明牕永相保題百丈輝長老所蔵李仲賓之孫嵗寒圖豫章西南百丈峰下有大竹多長松巢雲貯霧翻飛淙縁崕繞澗迷春冬馬駒踏人有龍象東陽老輝在百丈西江瀉入半甌茶臥竹眠松九天上薊丘丈人子又孫筆入造化春無痕清風瀟瀟上界聞夜闌疎鐘啼斷猿白楊河看月白楊河上看明月昔人曽照今人别茅屋數家河上村化作三山白銀闕波平風靜櫂歌來萬頃沖融鏡面開今夜江南憶遊子空瞻雲漢上昭囘茫茫萬里燕齊路北斗縱横泰階曙黄河東逝月西流明日南風過洪去大信晩泊呈舟中諸公千家楊栁江當門東梁西梁兩岸蹲連牆大艦集日昏摐金伐鼓海上聞小江更出采石後前人立功後人守大信花采石酒陌上相逢莫囘首李宫人琵琶引鄠縣亢主簿言有李宫人者善琵琶至元十九年以良家子入宫得幸比之王昭君至大中入事興聖宫縁有足疾乃得賜歸侍母給内俸如故因亢且乞詩於予為作李宫人琵琶引其詞曰茫茫青塜春風裏嵗嵗寒風吹不起傳得琵琶馬上聲古今只有王與李李氏昔在至元中少小辭家來入宫一見世皇稱藝絶珠歌翠舞忽如空君王豈為紅顔惜自是衆人彈不得玉觴未舉樂未停一曲便覺千金直廣寒殿裏月流輝太液池頭花發時舊曲未終新解譜新聲萬變縂相宜三十六年如一日長得君王賜顔色形容漸改病相尋獨抱琵琶空歎息興聖宫中愛更深承恩始得遂歸心時時尚被宫中召彊理琵琶絃上音琵琶調終聲轉澀堂上慈親還佇立囘看舊賜滿牀頭落花飛絮春風急祖生詩浦城孝子身姓祖自憐性命如糞土生才五嵗遭亂離有母更被官軍擄零丁二十八春秋母縱得生何處求天地茫茫明月恨江山漠漠白雲愁忽得母書驚母在看書未盡淚先流書云流落河南縣河南蹋遍無由見唐州境上忽相逢白髮蕭蕭霜滿面誰知喜極情轉悲傍人更問初别時千生萬死到今日始為母子東南歸東南迢遞闗山路入門猶記堦前樹居人傳説盡相看雞黍提攜竟朝暮祖生母子真可憐少壯離别老大還同時鄉井被兵者幾人骨肉能生全願生母子長夀考四海昇平永相保居庸行昔望居庸南今出居庸北巗巒爭吞吐風水清且激逶迤數千里曲折殊未息闗門兩向當天開馬如流水車如雷荒雞一鳴闗吏起列宿慘淡雲徘徊山盤盤石圉圉山如龍石如虎龍怒欲騰虎欲舞太行劒勢猶如許昔不容單車今馬列十伍聖人有道闗門開闗門開千萬古長風沙夜泊長風沙風沙不斷行人嗟行人嗟奈君何南風正髙北風起大船初灣小船喜移船更近大船頭不獨風沙夜可憂但祝行人好心事長江何處是安流茅舍參差數株栁時平尚置官軍守青裙老嫗詫鮮魚白髮殘兵賣私酒夏五月武昌舟中觸目兩髯背立鳴雙櫓短蓑開合滄江雨青山如龍入雲去白髮何人並沙語船頭放歌船尾和篷上雨鳴篷下坐推篷不省是何鄉但見雙雙白鷗過題明皇出遊圖應制明皇八駿爭馳道還是開元是天寶長安花發萬年枝不識年華醉中老奎章閣下文書靜衮衣高拱唐虞聖莫言此畫徒爾為千載君王作金鏡黄尊師高軒觀鵞因留宿開軒南嶽下世事未曽聞落葉常疑雨方池半是雲偶尋騎鶴侣來此看鵞羣一夜潺湲裏秋光得細分飲張氏别墅楚國多才俊張家好弟兄出門湖水碧留客野堂清微雨鳴疎竹寒烟覆古城園人隔畦語嵗暮此中行以事蹔如武昌發臨川江轉欲無路山迴忽似圍客程秋共逺物色晩多違稍稍沙鷗集悤悤野樹稀武昌今夜夢定遇故人非過南康夜泊聞廬阜鐘聲廬山三百寺何處叩層雲宿鳥月中起歸人湖上聞入空應更迥近瀑正難分遙想諸僧定香爐上夕熏喜趙順昌官滿來歸七載卑栖邑孤標浩蕩中去時惟自信歸日幾人同平世難為澤高人不計功黄河萬里道洗楫待春風寄題永豐劉氏暖翠亭二首孤亭萬竹中危坐自生風近與山光合遙連野氣通鳥啼深不見泉響靜偏聰東帛休相汚先生道未窮雞山俯鷲溪亭子畫堂西流水茭蒲合陽林竹樹齊耕桑烟外集賓客雨中攜萬事俱塵土詩成手自題送陳教授赴郴州君向郴州去迢迢千里餘年侵别後鬢客問講殘書斷雁秋風外啼猿落日初興文今日意慎莫愛吾廬出三洪峽積水羣山裏行舟亂石間地偏疑隔世峽怒欲藏闗獨鳥啼深樹斜陽下急灘千憂逢一快未覺此生孱山莊晩立有懐舍姪沆督穫臨川䔩䔩黄桑葉蒼蒼白竹峰居人爭野碓歸客背村鐘路暗縁溪濕山寒著露濃阿戎收稻米辛苦缺相從望嶽岱宗齊魯間萬古統羣山日向夜中見雲從海外還蓄靈深屛翰空翠滿河闗盡日臨清霽巗巗不可攀寄題太子文學張希孟凝雲石聞說張文學家藏石一拳斷痕分淺黛古色亂輕煙潤想猶懐玉幽疑欲迸泉應從少海得宿昔滿桑田石鼓孔廟頽牆下周宣石鼓眠苔分敲火迹雨洗篆蝸涎野老偷為臼居人打賣錢有形終亦盡流落謾堪憐銅儀宋沈存中所鑄法像坤儀重來從汴水遷飛龍纒四極黄道界中天望絶秋毫末循環太古前荒臺明月夜應有淚潺湲趙道士山水圖悄愴寒山曉凄迷野水昏長橋通古寺小艇背衡門路盡雙松上雲生亂石根如行南嶽暮遙見祝融尊大駕既還獨候驛傳未得和陳真人見示供奉闗山逺淹留日月長鄉書迷楚越鄰笛亂伊涼秋水流成字晴雲去作行寸心縣帳殿應似雁隨陽沈逸人東觀招飲山館野館青山下晴軒積雨餘招尋䝉逺客寂寞愧閒居空翠沾杯冷殘雲度谷虚從兹結朋好隨處問何如參禪圖圖寫洞賓黄龍東坡佛印兩山從兩禪異代各談𤣥絶壁浮春樹空山響夜泉共遺行住想俱斷去來縁此日開圖畫焚香亦爽然和傅與礪近日何多念頻年不肯還河流無故道春色是他山棐几看雲凭衡門罷月關無情寒與暑偏解鑄衰顔送秦從事巗卿赴遷安令聲名藉藉秦著作不見郎君出宰時路入北平黄葉盡夢囘西掖白雲移罷氓舊塞猶耕種野老深村幾亂離遙想此行前未有來時嗟晩去思遲楚山秋晩山人何處抱琴歸遙想樓臺隔翠微老樹風生舟正泊空江日落雁初飛豈無賦客能招隠亦有漁翁醉息機一幅秋光舒復卷誰教塵土涴人衣子陵獨釣圖何事𤣥纁入里閭羊裘蹔脫就安居空令太史驚同寝猶把狂奴視報書一出聊為天子重諸公莫道故人疎朝廷自足中興士且放桐江著老漁石門峽長安峽裏子規啼峭壁蒼蒼北斗低雲氣倒連山影合石稜斜闞浪聲齊南風盡日迎歸櫂落月空江夢故棲一室十人分數郡百年幾處候晨雞夢黄鶴樓黄鶴樓前鸚鵡洲夢中渾似昔時遊蒼山斜入三湘路落日平鋪七澤流鼓角沈雄遙動地帆檣髙下亂維舟故人雖在多分散獨向南池看白鷗送詹尊師歸廬山香爐峰色紫生煙一入京華路杳然雲碓秋閒舂藥水雨犂春臥種芝田書憑海鶴來時寄劒自潭蛟去後縣忽報歸期驚倦客獨憐微禄負中年送大名安治中守沔陽展澨猶穿魏郡花分符忽指竟陵𤓰行瞻禹跡過三峽帶擁羲文望五華春雨蠶桑無曠土秋風魚稻滿貧家亦知王政仁為本莫厭公田飯有沙憶昨三首宫草蔥茸禁樹稀日趨廷顥對凝輝朝迎步輦花間出暮送囘鑾栁下歸碧殿東浮蒼巘合金河北引玉泉肥幾囘𢎞慶門前路春氣濛濛欲染衣已巳羣倫映璧奎端陽侍燕寶慈西線分學士親臣送詩賜黄姑御手題注酒含春瑤露重承塵轉午錦雲低日斜共出西門道既醉猶能散馬蹄奎章分署隔窗紗不斷香風别殿花留守日頒中賜果宣徽月送上供茶諸生講罷仍番直學士詩成每自誇五載光陰如過客九疑無處望重華按客有問於虞伯生曰楊仲𢎞詩如何曰如百戰健兒范徳機詩如何曰如唐臨晉帖揭曼碩詩如何曰如三日新婦先生詩如何笑曰集乃漢廷老吏也揭聞之不悦故此首中聯有學士詩成每自誇之句伯生得詩謂門人曰揭公才力竭矣因荅以詩云故人不肯宿山家夜半驅車踏月華寄語旁人休大笑詩成端的向誰誇併題其後云今日新婦老矣和張太一秋興二首翩翩公子五雲中風骨雖殊意氣同道徳淵源行地逺神明臺觀與天通欲隨穆滿賓王母更擬軒轅相大鴻南國正秋憂旱暵誰驅列缺起豐隆蓬萊金闕赤囘闌龍虎神君禹步寛朝嚥日華當食穀夜迎天仗識鳴鑾露飛仙掌金莖凍月滿𤣥都玉佩寒遙想西齋清似水吟詩聴到漏聲殘送李掾自北囘歸省長沙因簡趙宣慰張徵士吕宗二判官萬里風沙斷三湘日夜流名成親白首嵗暮客扁舟黄鵠延歸思丹楓替别愁眼穿迴處雁心静狎餘鷗細雨黄陵廟殘陽杜若洲漸深桑梓敬翻畏友朋留送逺慚羇旅臨分憶舊遊鐘聲衡岳曙帆影洞庭秋風壤通蠻徼煙霞拂帝丘交歌明月市傾斾壓雲樓訪菊逢徴士行𤓰識故侯為言憔悴客敝盡黒貂裘曉出順城門有懐何太虚步出城南門悵望江南路前日風雨中故人從此去和歐陽南陽月夜思月出照中園鄰家猶未眠不嫌風露冷看到樹陰圓題鴈圖寒向江南暖饑向江南飽物物是江南不道江南好何失燕人世以織紗縠為業與張進忠製筆齊名失獨工詩為士夫所敬重揭傒斯贈詩云心事巢由上文章陶阮間感興渥洼騏驥兒自有絶塵足錦帳過都門飛采射衆目歎彼轅下姿亦非駑駘物世乏伯樂儔誰識千金骨所以荷蓑士煙水自淪沒對酒古人不我俟不共此酒醇此酒復易盡不能俟後人並世有不察異代若為親茫茫宇宙間此抱難具陳惟應空中月分留大江濱莫吟獨老朝朝出或醉莫未歸高樹挂新月山妻候柴扉飲伴更相送欲辟意難違感此鄉曲情淚下忽霑衣書懐野性長便雲水居城中有屋不如無慳時因記人來往多少紅塵汗白鬚燕都雜題一夜春陰徹曉寒玉山無奈酒杯乾青娥知有愁多少狼藉殘妝懶對㸔雅勒呼字玉卿伊嚕勒昆人唐宫題葉彩毫將恨付霜紅恨自綿綿水自東金屋有闗嚴虎豹玉書無路託鱗鴻秋期暗度驚催織春信潜通誤守宫莫道銀河消息杳明年錦樹又西風崔徽寫真舞鸞妝鏡拭鉛華毫素無聲散彩霞夜月影寒分桂魄春氷暈薄映桃花夢隨圖去憑青鳥愁逐書來㸃墨鴉未得離魂如倩女衰容先我到君家洛神鄴宫簷瓦似鴛飄蘭渚鳴鸞去國遙謾説君王留寶枕不聞仙子和瓊簫驚鴻易沒青天月沈鯉難憑碧海潮腸斷洛川東去水野煙汀草共蕭蕭二喬珊樹交加玉樹重鴛鴦難偶雪難容共思漢事隨流水各對吴儂蹙逺峰洛賦未成梁月墮羌笳已斷塞雲濃人間流落渾相似猶勝凄凉泣暮蛩寄南臺御史達兼善二首昔年奎壁聚星圖文彩虚稱二妙俱秖有蒹葭依玉樹初無薏苡似明珠鳳凰臺上天光近烏鵲枝邉月影孤壯志未消知已在敢煩音問慰窮途白溝秋水帝城邉曉發河南使者船契濶山川將萬里飄零嵗月又三年雲間快覩㝠㝠鳳海上愁㸔跕跕鳶經術匡君須我輩莫將離恨染華顛送蘇伯修御史之南臺天上詞臣夐莫雙乗驄此日莅南邦梅花路近宜逢雪桃葉波平好渡江千里蒼生瞻繡斧十州使者避旌幢同袍知已如相問已許閒身老北窻汴梁懐古花石岡前麋鹿過中原秋色動闗河欲詢故國傷心事忍聴前朝皓齒歌蔓草有風嘶石馬荆榛無月泣銅駝人間富貴皆如夢不獨興亾感慨多酬江夏友人見寄四海元龍眼界空平生豪習竟誰雄早知黔首成秦贅悔學蛾眉入漢宫曲水疎篁秋色裏小山叢桂月明中故人嵗晩能招隠便買扁舟向漢東送趙秉彞親迎江夏之官臨川婀娜新衣錦繡重美人今夕過湖東一聲鐵笛千家月十幅蒲帆萬里風孔雀畫屏占貴客甘棠嘉樹詠先公墨池光動凌雲筆春滿花封賦更雄送䝉古學教授之邛州玉貫珠聯我國音亂山深處變巴吟蒼虬挂屋寒筇瘦白鶴縣巢古棧深座冷一氊知宦況書來萬里見鄉心文翁課最同文盛應譯嘉謨寄上林二月梅去年呵筆賦寒梅又見山家二月開不是使君留客醉肯教仙女逐春囘梨花院落為雲夢栁絮池塘作雪猜東閣如今清興减羅浮誰與寄香來京師上元夜華月澄澄宿霧收萬家燈火見皇州天閽虎豹依霄漢人海魚龍混斗牛公子錦韉鳴玉勒内家珠箔控銀鈎道傍亦有揚雄宅寂寞芸忩冷似秋送袁果山經歴之潮陽潮陽贊府之官去猶是薇垣白髮郎天上故人縣夜榻海邉候吏促春装翠綃卷雨蕉花老火齊然雲茘子香終日韓山對簾幙只愁簡牘破詩忙留别凱烈彦卿學士十年帝里共鳴珂别後悲歡事幾多汗竹有編歸太史雨花無迹染維摩湘江夜雨生青草淮海秋風起白波明日扁舟又南去天涯相望意如何登越王釣龍臺自古甌閩國富雄南琛不與職方通江流禹畫縱横外山入秦封蒼莽中逐鹿師還神器定屠龍人去釣臺空海門望裏潮頭急何處繁華是故宫段天佑字吉甫河南人官江浙提舉送妓入道歌舞當年第一流洗妝今日别青樓便從南岳夫人去肯為蘇州刺史留琳館月明簫鳳下鎖牕花老鏡鸞收却憐愁絶潯陽婦嫁得商人已白頭謝宗可金陵人為詩長於詠物其聲調效薩藕花風舞罷紅衣起未休水雲香裏冷颼颼三更清逼銀塘曉六月涼生玉井秋颭浪低翻霞影亂凌波輕漾錦香浮莫教吹醒鴛鴦夢好送真人一葉舟曉色逺似煙霏近又空非明非夜雨朦朧一天清露洗難盡幾樹暗雲遮不窮斷角樓臺濃澹裏殘燈院落有無中蒼茫半逐雞聲散又被朝陽染作紅睡燕補巢銜得落花泥困倚東風倦翅低金屋晝閒隨蝶化玉堂春靜怕鶯啼魂飛漢殿人應逺夢入烏衣路欲迷却被捲簾人喚醒小橋流水夕陽西筆陣授䇿登壇拜墨卿霜毫不用鐵為兵戰酣已拔三都壘奏捷還攻五字城怒捲龍蛇雲霧泣長驅風雨鬼神驚攀蟾獨掃千軍退功奪中書第一名走馬燈飈輪擁轉駕炎精飛繞人間不夜城風鬛追星低弄影霜蹄逐電去無聲秦軍夜潰咸陽火吴炬宵馳赤壁兵更憶雕鞍年少客章臺踏碎月華明詩瓢雨蔓霜條老翠壺吟邉不是酒葫蘆剖開句裏玲瓏玉著盡胸中錯落珠滿貯苦心留宇宙深藏清氣付江湖誰家半腹能千首為問山人果在無蓮葉舟穏櫂紅衣汎渺茫風帆浪楫水雲鄉曉撑泰華半峰月夜載西湖十里香藕放雪絲應作纜荷敧翠柄若為檣不須更捧金仙足太乙真人夢正涼無絃琴獨繭長繅底用抽蛇紋空鎖鳳枝秋落星有色寒光斷凍瀑無聲練影收别鶴那聞風外泣孤鸞不向月中愁多情只有柴桑老寂寂山髙水自流紙帳清縣四壁剡溪霜高臥梅花月半牀繭甕有天春不老瑤臺無雪夜生香覺來虚白神光發睡去清閒好夢長一枕總無塵土氣何妨留我白雲鄉塵人海深藏混沌中非煙非霧逺空濛六街錦繡迷香紫九陌笙簫踏輭紅微步緩隨羅襪起清歌飛繞畫梁空南來一騎蛾睂笑又送長安荔入宫蟠梅縈青絆碧裂蒼苔晩嵗寒香宛轉來蛟舞凍雲氷骨瘦龍眠夜月玉鱗開風霜氣勢從千折鐵石心腸亦九迴袛為東君甘自屈不教虚占百花魁紅梅梨雲無夢倚黄昏薄倩朱鉛蝕淚痕宿酒破寒熏玉骨仙丹偷暖返氷魂茜裠影露羅衣捲霞佩香封縞袂温囘首孤山斜照外尋春誤入杏花村宋元詩㑹卷七十七
