body:
  text: 宋元詩㑹卷五十三兵部主事陳焯編劉壎南豐人號水邨宋亡有忠義集以詩補史紀殉難諸公補史十忠詩知潭州湖南安撫使李公芾三已甘退休十連起遲暮伊誰急求子流落乃不怒黑雲來如山殺氣震平楚恭惟君父命封疆以身䕶闔門義不辱呼卒汝善處飛魂隨劒光自已投火去天泣鬼神愁地揺山嶽仆吾非莒柱厲敢以死醜主正自常事耳命義逃安所冲逺誰與儔雎陽有張許池州通判權州事趙公夘發昌州人妻雍氏若人作何狀立節乃殊偉人言此蜀珍位卑名未起坐分秋浦月攝此千里寄沙頭風色惡寒城凜𢎞峙吾聞開闗迎棄遁亦復恥兹惟城郭臣大義吾知已間道走帛書灑血别玉季細君絶可人雙飛同一死南八彼男兒此婦乃如此骨朽香不廢吾詩當青史丞相都督信國公文公天祥時平輒棄置事廹甘前驅嗚呼忠義臣匪直科目儒江寒朔吹急列城同一趨豈不寄便安綱常乃當扶移檄倡諸鎮奮袂躬援枹川决莫我回萬險棲海隅天乎復不濟道窮竟成俘一死事乃了吾頭任模糊悠悠譏好名責人無已夫三衢有魁相投老作尚書謂畱夢炎也參政行丞相事陸公秀夫天地無託足海天同隰光明知復何為不忍隳三綱祼薦覬少延謳歌寧逺亡或者莒在齊聊且帝一方竭蹷竟委頓臣謀非不臧運去天莫畱力盡心彌强終不負吾主名義天地長懷璽隨龍遊舉室水中央斯人文華士乃爾百鍊鋼機雲儻通譜應羞朝洛陽前左丞相江文忠公萬里弟萬頃匡廬雲錦屏鴻儒産其下風神儼如龍夭矯莫可駕卷懷經濟具婆娑洛中社怪事玉牀揺清晝天忽夜突騎從何來隂風飄屋瓦大臣義有死欲避吾不暇庭前環止水萬事付一捨從容友靈均朝野動悲吒愍章極哀榮汗簡誰記者倘有南董書季方足堪亞江西制置司都統宻公侑臣有致身義豈計官崇卑偏將知死忠不曰天下竒漢節既披靡失位趨江西閫帳駐臨汝招徠樂其歸雪寒南浦愁羽檄蘄濟師一將奮風虎鼓行亟飈馳踰嶺疾戰苦裹瘡呼健兒坐縛膝不屈伏鑕甘如飴小臣禆校耳職也宜死綏廬州大將在白首􅆆䧏旗淮東制置使知揚州李公庭芝淮海接風塵何乃似鐵壁臥䕶有天人十載藉福力重來人未老愁絶事如昔苦戰孤城危痛哭天柱拆夢遊三山上人倫浮海出突圍志南征吾欲重建極天弗鑒忠臣㝠㝠墮叢棘先軫面如生萇𢎞血化碧臣死誰復知臣忠終不易一將更大事嚼舌死罵敵樞宻閩廣宣撫使陳公文龍戊辰狀元淳熙名宰孫比徳粹如玉决科魁羣英駸駸廌冠肅䫫田煩諫疏相嗔俄嗾逐補郡仍免歸黄流已漫陸天族日光薄力疾支顛覆蹉跎南冠縶道病死不辱往昔五峰堂傾葢語䟦燭斯人眞偉人哀哉慳厚禄長揖丙辰魁各天並黄鵠不有二忠存千古笑科目少傅樞宻使張公世傑士有守節死豈以責武夫武夫尚能竒消得銀管書何許熊虎英鐵靣美髯鬚䕶塞乆枕戈赴難甘殞軀金山定活著志願嗟違初江心集羣䇿炎精回一嘘間闗障海嶺萬死存趙孤時也可奈何北風散檣烏漂漂竟何之無乃膏鯨魚渭濵多貴將反笑斯人迂四川制置使知重慶府張公珏坤維拓提封形勝古天府血戰五十秋零落餘八柱江南傳箭急誰暇此回顧落日古渝城杖鉞乃甚武天東甑雖墮吾自强支拄渡瀘躬討逆歸來戰彌苦蕭條下夔門機穽伏中路咄咄快敵仇誰歟掩坏土哀哉闗西雄國亡猶不負同時督軍將腰金插雙虎許月卿字太空婺源人㓜從考亭門人遊又受學魏鶴山勵志操行才足經世舉進士授司戸叅軍率三學訟權相史嵩之不報官府學教授再上書忤執政幾蹈不測㑹執政免得畱稍遷提舉江西常平厯浙西運幹召試館職又忤賈似道罷歸宋亡屏居一室閔墨不言者幾十年而卒其大節固無愧文謝云京城看月幾千萬里碧琉璃中有一圓光照之更無一物可與對部勒星宿光陸離憶昔看月大江頭天地中間風吹衣凡客無縁相賔主獨攜杯酒獨吟詩秪今千門萬户閉良夜京華無人知似我清快更有誰故山今宵月更竒明日懶人眞箇歸題明皇貴妃上馬圖開元天寳號太平快活三郎偏縱情帝閑天驥雲雷駛回首絶憐妃子醉海棠酣春睡未足扶上馬時頽山玉二璫兩邉扶蹋􅌱羣姬爭扶不用命萬花叢玉山花花朝王醉牡丹共立馬前黄幡綽獻笑容顔似嘲㖸三郎勒馬頻回頭兩手按膝雙凝眸夾立兩旁御弓箭帶御器械如行殿二璫相語儼相向貴妃未至龍顔望龍顔不怡吾曹憂眤眤私語雙燕秋御前兩驥立仗俟御龍整暇聊緩轡卷中何止數十人十人眼只在一身朕能墜馬替妃子不忍花飛驚玉體三郎但念妃子醉豈知身醉誤國事無鹽為后能彊齊夙夜警戒雞鳴詩花鈿安得紛委地馬嵬安得有墜時雲邉雲邊人種麥天際客歸舟月色輕寒夜笛聲何處樓乆晴人渴雨倦仕我思休髙士傳閒看東籬花正幽同滕推遊朱緋堂當日朱緋夢荒烟化鶴城斜陽邊草色深樹裏禽聲欲雨路㣲濕出雲山半青神遊應故里只欠愛翁亭捧硯姬空翠二首捧硯姬空翠隨琴鶴曉烟夕陽更山外流水自樓前芳草垂楊地和風麗日天戲遊看處處明媚自年年看山車放慢過水馬爭先須信一年景無如三月天露花如此好烟樹十分圓客醉不須去竹牀相對眠次韻雲嵒權輿於我屋渠渠久敬如君世莫如明月清風詩滿案好天良夜酒連車樽前逺韻輕盈菊醉後分題爛熳書凡此坐中人十九鈞樞玉帶客金魚追賦暮遊余以庚子冬離廣陵將肄奉常試業於京師舟泊無錫日已暮與王希聖微服遊南禪葢訪古也參寥題名壁無恙寺記有碑碑隂結字甚偉視之蔡京也出門烟樹蒼然數僧偶語而已余與希聖却立四顧曰此佳景也當冩之為詩而舉子業亂其中不能就暇日追想宛在其目因賦寄希聖其明年冬十一月也歳月驅人又可一慨錫山舟泊似荒村㣲服南禪古跡存壁上姓名今已逺碑隂人物了能言薄遊草草月侵岫逺思悠悠風滿軒攜手出門烟樹宻數僧離立語黄昏滿城風雨近重陽滿城風雨近重陽一舸煙波入醉鄉心事已同鷗鳥白眼界空有雲山蒼酒安能管興亡事菊亦頗復時世粧何似長歌明月裏月明天濶地更長春日閒賦數行竹樹鳴春雨一簇人家帶曉煙省事山丹自籬落親人海燕並庭簷樓高思逺天無極酒罷歌闌月正圓新茗一甌香一篆與君清坐看風簾何夢桂字巖叟淳安人咸淳乙丑第三人及第判台州軍事累遷大理寺卿移疾歸入元屢徴不起杜門學易自號潛齋擬古三首生為結髪婚死為同穴鬼豈意氷上縁淪沒隔萬里半鏡隨塵沙嫁衣在巾笥紅絲倘未絶白首尚歸止心隨碣石雲淚落銅盤水雲飛㑹南來水流還北注此生不可期心期朂來世萬馬蕭蕭來萬矢的的鳴蛾眉逐羈馽淚盡眦血零偷生愧夫天寧死化鬼憐昭質誓不汚九死志靡徴紅玉隨劍光晶熒貫列星遺胔葬螻蟻冡墓高媧陵封狼邈萬里風雪饒隂山地荒走蛇豕俘縶去不還髙門誰氏子受驅牧猳貄去時紈袴敝氊毳不蔽寒夜夜望北斗不逐南箕旋父母生我初拊我掌股間豈意越在茲撫身空自憐愚石歌大塊初分生怪石曾與不周山作骨山崩地缺天柱摧片石耆姿轉竒崛媧皇煉石補天工化作五星成五色地下為石天上星頑質變化生神靈一朝天狼齧蝕五星隕隕石宋野猶有光晶熒何人夜負入海嶼錯雜昆吾無覓處中間塊石獨􅏟嶔住在錦溪溪上滸石潤可以硯石紋可以屏贔屭或刳鼎亷栗或劖銘不然雲母與紫英否則丹砂和空青爾材於用百不適空有千尺髙稜層暴流沒馬不加減霜降石出不加增火不焦水不凝刻桐扣不鳴飲羽射不驚世間至智不能化而我安敢逃愚名人聞愚惡聞智喜君謂我愚眞知已築室招子願結交更請栁溪作愚記寄王南叟寓江鄉歌盡驪駒落日寒相思無處問平安客愁白髪三千丈世路青泥百八盤夜月梅花頻入夢秋風菰米强加餐髙山如故絲絃在懶向旁人取次彈弔維揚瓊花雙鶴揚州問故家一樽后土弔瓊花人間驚破霓裳舞天上徴回玉女車死櫱記曾霑雨露落英誓不汚泥沙後庭玉樹今誰主猶得臺城葬麗華丁亥清明和昭徳姪孫韻風吹苦楝結輕寒乾石青精屋半間潑火雨收春樹綠踏青人出畫簾閒紅顔白髪悲歡事舊日新年夢覺闗滿地落花啼鳥急天涯遊子幾時還招隱二首别後頻驚束帶寛相逢亦復笑蒼顔秪今歳月青牛老何處烟波白鳥閒千古心期寒綠綺十年世事墮黄間脩簧倚徧空江暮枉殺招呼費小山回頭五十九年非千里乘風翼倦飛門外黄塵時事改樽前白髪故人稀金河沙煖春鴻去朱雀橋空海燕歸惟有嚴陵灘下路年年潮水上漁磯李郎中有詩謝寄藤杖仍次韻答之海南覓得古藤枝持與詩人杜牧之紫貝斑文鞭更爛赤龍蒼骨蜕尤竒路無夷險終全節用有行藏一任時非但與君扶脚力鏦蛟剸虎要支持和酈僉事見寄韻詩書無用戲侏儒兩序今猶見璧圖末路弟兄知已少中原人物似君無曲終湘水絲繩絶書入昭陵筆硯蕪珍重江南春信早暗隨梅萼到西湖挽寧谷居士何公鼠遶枯藤齧未休得如此老死何求翁踰八十媪黄髮孫見曾𤣥兒白頭身世幅巾歸繭室歳時盂飯灑孤丘百年心事無人識分付黄花满地秋感寓二首西風落日怕登樓倚徧闌千萬古愁衰漢竟成三國誤秣陵不改六朝羞江山有恨畱青史天地無情送白頭擊碎唾壺歌不盡荒臺殘雨夢揚州試向昆明問劫灰幾看麋鹿上蘇臺閒中厯日生青草夢裏乾坤化大槐塞雁南歸春又去江潮東下暮還來臨平山盡啼鵑歇可是征人喚不回挽太學正節先生徐應鑣國破君亡一死宜絶憐兒女死如飴龍池竟負媧皇誓蛙坎空遺烈士悲洗骨不汚唐六館瀝心無愧趙孤兒北行多少生還客休向梯雲讀墓碑題川無竭寄傲窗南山有路滑如苔多少人從半嶺回不是老僧空傲世世人自不上山來贈雲菴董道人一塢寒雲暝不開茅簷低壓半蒼苔近來雲出不成雨莫遣無心出岫來汪元量字大有錢塘人以善琴事謝后王昭儀宋亡隨三宮入北庭久之請為黄冠南歸幼主與王昭儀及諸降臣皆有詩餞之自是往來江湖無定跡所作詩皆紀亡國降元之事詩而兼史與所南鐵函長存天壤可也元量别號水雲其詩為水雲集北征北帥有嚴程挽我投燕京挾此萬卷書明發萬里行出門隔山嶽未知死與生三宫錦帆張粉陣吹鸞笙遺民拜路傍哭號皆失聲吳山何青青呉水何泠泠山水豈有極天地終無情囘首呌重華蒼梧雲正横幽州除夜醉歌燕姬壓酒春宵永列炬揺光拂紅影銀鴨香烘雲母屏綺窗繡閣流芳馨晚管聲含蘭氣嬌鳳釵拕頸烏雲飄錦瑟無端促絃急纎娥歛翠翻成泣雕龍啁唽雞鳴早一笑紅顔鏡中老夷山醉歌二首楚狂醉歌歌正發更上梁臺望明月西風獵獵吹我衣絶代佳人皎如雪搥羯鼓彈箜篌烹羊宰牛坐糟丘一笑再笑揚清謳遥看汴水波聲小錦纜忘還事多少昨日金明池上來艮嶽凄凉麋鹿遶麥青青黍離離萬年枝上鴉亂啼二龍北狩不復返六龍南渡無還期金銅淚迸露盤濕畵闌桂柱酸風急鳩居鵲構蒼隼入蛇出燕巢白狐立東南地䧟妖氛黑雙鳳高飛海南陌呉山日落天沈沈母子同行向天北闗河萬里雨露深小儒何必悲苦辛歸來耳熱忘頭白買笑揮金莫相失呼奚奴吹篳篥美人縱復横今夕是何夕楚狂醉歌歌欲輟老猿為我啼竹裂嗚呼再歌兮花滿臺好月為我光徘徊人生在世不滿百紛華過眼皆成灰夷山青青汴水緑西北髙樓咽絲竹美人十指纎如玉為我行觴歌一曲含宫嚼徴當窗牖露脚斜飛濕楊栁就中有客話陳橋如此山河落人手客且住聴我語楚漢中分兩丘土七雄爭戰總塵埃三國鶯花浩無主咸陽宫殿不復都華清池沼温泉枯世間興廢奔如電滄海桑田幾回變人生得意且盡歡何須苦苦為髙官人生有命且行樂何必區區歎牢落遮莫金章與玉珂何如桐江披釣蓑遮莫貂蟬貴此身何如柴桑漉酒巾君不見海上看羊手持節饑來和雪扣氊齧又不見飯顆山頭人見嗤愁吟痛飲眞吾師美人勸我酒有客有客聴我歌須臾客醉美人睡我亦不知天與地嗚呼再歌兮無人聴月自落兮酒未醒孫殿帥從魏公出師我宋麒麟閣功當向上名出師休背主誓死莫偷生社稷逢今日英雄在此行勿為兒女態一笑欲傾城杭州二首有客回陽九無人握髪三闗中新約法江左舊清談鐵騎來天北樓􅊑過海南一枝巢越鳥八繭熟吳蠶天也今如此人乎可奈何臺邊西子去宮裏北人過玉樹歌方息金銅涙已多旌旗遮御路舟楫滿官河杭州雜詠和林石田十二首石田林處士唫鏡静無塵亂後長如醉愁來不為貧飯蔬畱好客筆硯老斯人近法秦州體篇篇妙入神先生忘富貴久客幸平安髮已千莖白心猶一寸丹衣冠前進士家世舊郎官醉入烏程里吟登李杜壇蠋也吞聲哭潛行到水頭人誰包馬革子獨取羊裘北靣生何益南冠死則休百年如過翼撫掌笑孫劉一春雲幕幕三月雨淋淋魚菜不歸市鶯花空滿林人行官巷口兵蔟御街心老子猖狂甚猶歌梁父吟躡足封韓信剖心眞比干河山千古涙風雨一番寒世指鹿為馬人呼鳥作鸞江頭潮洶洶城脚水漫漫吟身春共瘦獨立望江亭越水荒荒白吳山了了青軍降欣解甲民喜罷抽丁拍碎欄干曲吞聲血涙零陵廟成焦土宫牆沒野蒿亡秦皆趙李佐漢獨蕭曹國子乘黄貴山人衣白髙飛埃猶黯黯逝水正滔滔靜看縱横士翻成買賣兒禁中驚戰鼓城上出降旗魏操非無漢唐高不有隋從兹更革後寧復太平期偶出西湖上新蒲緑未齊攜來鯿縮項買得蟹團臍問酒入新店喚船行舊堤亂離多殺戮水畔幾人啼日月往來轂乾坤生殺機江春蛟妾舞塞煖雁奴歸送客詩添債愁城酒破圍如何秦相國昨夜酖韓非世變摩訶曲時更短後衣魏庭翁仲泣唐殿子孫非樹秃鴉爭集梁空燕自歸斷橋春已莫無限栁花飛竟夕柴門掩無心接縉紳山中多樂事世上少全人諸呂幾亡漢商翁不仕秦柴桑深僻處亦有晉遺民太皇謝太后挽章二首笳鼓喧呉越傷心國破時雨闌花洒涙烟苑栁顰眉事去千年速愁來一死遲舊臣相弔後寒月墮臙脂大漠隂風起羇孤血涙縣忽聞天下母已赴月中仙哀樂浮雲外榮枯逝水前遺書乞骸骨歸葬越山邊江陵月到荆江上輕帆莫逺揚水揺龍影動風送雁聲長北斗回秋柄南辰耿夜光徘徊舒一嘯詩興落瀟湘錢塘躑躅吞聲淚暗傾杖藜徐步浙江行平蕪古路人煙斷緑樹新墟鬼火明事去玉環沈絶域愁來金盌出佳城十年草木都麋爛畱得南枝照淺清酬王昭儀愁到濃時酒自斟挑燈看劒淚㾗深黄金臺愧少知已碧玉調高空好音萬葉秋風孤館夢一燈夜雨故鄉心庭前昨夜梧桐語勁氣蕭蕭入短襟御宴蓬萊島曉日重闈對冕旒内家開宴擁歌謳駝峰縷割分金盌馬乳時傾泛玉甌禁苑風生亭北曲寢園月轉殿西頭山前山後花如錦一朶紅雲侍輦遊潼闗蔽日烏雲撥不開昏昏勒馬度闗來綠蕪逕路人千里黄葉郵亭酒一杯事去空垂悲國淚愁來莫上望鄉臺桃林塞外愁烟起大漠天寒鬼哭哀石頭城石頭城上小徘徊世換僧殘寺已灰地接汴淮山北去江吞呉越水東來徤魚奮鬛隨蛟舞快鶻翻身獵雁回一片降旗千古淚前人留與後人哀揚州重到揚州十載餘畵橋雨過月模糊后皇廟裏花何在煬帝堤邉栁亦枯陂麥青青嘶亂馬城蕪冉冉落羣烏人生聚散愁無盡且小停鞭向酒壚長沙洞庭纔過浪猶髙河伯欣然止怒濤傍㟁買魚仍問米登樓呼酒更持螯湘汀暮雨幽蘭濕野渡寒風古樹號詩到巴陵吟不得屈原千古有離騷湖州歌七十四首丙子正月十有三撾鞞伐鼓下江南皋亭山下青烟起宰執相㸔似醉酣萬馬如雲在外間玉階僊仗罷趨班三宫北靣議方定遣使臯亭欵伯顔殿上羣臣嘿不言伯顔丞相趣降箋三宫共在珠簾下萬騎虬鬚遶殿前謝了天恩出内門駕前喝道上將軍白旄黄鉞分行立一㸃猩紅似幼君一匊吳山在眼中樓臺疊疊間青紅錦帆後夜烟江上手抱琵琶憶故宫北望燕雲不盡頭大江東去水悠悠夕陽一片寒鴉外目斷東西四百州十數年來國事乖大臣無計逐時挨三宫今日燕山去春草凄凄上玉階錦帆髙揭繡簾開鼉鼓聲悲鳳管哀月子纎纎雲裏見呉江不盡莫潮來一出宫門上畫船紅紅白白艷神僊山長水逺愁無那又見江南月上絃太湖風起浪頭髙錦柁揺揺坐不牢靠著篷窗垂兩目船頭船尾爛弓刀昨夜三更淚濕腮伍胥何事夢中來三宫從此相分别自勒潮頭白馬迴受降城下草離離寒食清明只自悲漢寢秦陵何處在鶯花無主雨如絲金陵昨夜有降書更説揚州一戰輸淮北淮南清未了又添軍馬下東呉鐵甕城頭馬亂嘶金陵城下砲如飛黑風捲地鼓鼙急昨夜常州又受圍曉來宫櫂去如飛掠髮鬟雲淺畫眉風雨凄凄能自遣三三五五坐彈碁曉鬢鬅鬆懶不梳忽聴人說是南徐手中明鏡抛船上半揭篷窗看打魚京口沿河賣酒家東邊楊栁北邊花栁揺花謝人分散一向天涯一海涯一片淮山落照中開船忽遇打頭風行軍元帥傳言語别撥官軍下浙東不堪回首淚盈盈萬里淮河聴雨聲莫問萍虀併豆粥且餐麥飯與魚羮宰執連鑣向北行淮西夜夜鬼燈青雖然適意無南北生死難逃篩下星兩淮極目草芊芊野渡灰餘屋數椽兵馬渡江人走盡民船拘歛作官船宫人清夜按瑶琴不識明妃出塞心十八拍中無限恨轉絃又奏廣陵音清天澹澹月荒荒兩㟁淮田盡戰塲宫女不眠開眼坐更聴人唱哭襄陽翠鬟半嚲倦梳妝楊栁風前陣陣凉絃索懶拈縮纎手龍涎猶嚼口脂香鳳管龍笙處處吹都民歡樂太平時宫娥不識興亡事猶唱宣和御製詞丞相催人急放舟舟中兒女淚交流淮南漸逺波聲小猶見揚州望火樓一半淮江半浙江怒潮日夜自相撞揚州昨夜軍書至説道淮安未肯降曉來潮信暫相畱滿耳驚濤愁復愁月殿不知何處在錦帆揺曳到揚州九尺瓊花一夜開無雙亭曲小徘徊可憐后土空祠宇望斷韋郎不見來兩淮戰鼓不停撾萬騎精兵賽夜义破陣焚舟彈指頃南人猶懼夏爺爺官軍兩岸䕶龍舟麥飯魚羮進不休宫女垂頭空作惡暗抛珠淚落船頭太皇太后過江都遥指淮山是畫圖抛却故家風雨外夜來歸夢遶西湖蘆荻颼颼風亂吹戰塲白骨㬥沙泥淮南兵後人烟絶新雨燈前醉玉妃篷窗倚坐酒㣲酣淮水無波似蔚藍雙櫓咿啞揺不住望中猶自是江南銷金帳下忽天明夢裏無情亦有情何處亂山可堆骨暫時相對坐調笙絲雨綿雲五月寒淮堧遺老笑儒冠行軍元帥來相探折送駝峰炙一盤使臣開閘過髙郵楊栁絲絲拂去舟宫女推篷猶自笑閒抛金彈打沙鷗邵伯津頭閘未開山城鼔角不勝哀一川霞錦供行客且掬荷香進酒杯北風吹雨入篷間宫女腰肢瘦怯寒阿監隔船相借問計程今日到淮安寳應城南栁數株葭牆艾席是民居眼前境逆無詩興忽有小舟來賣魚船泊邳州古㟁傍斜風細雨送昏黄美人一一船中坐猶把金猊注好香徐州城上覓黄樓四壁詩章讀不休更欲登臺看戲馬州官攜酒共嬉遊歌風臺畔水沄沄地靣官人餽酒葷宫女上船嬉一霎不禁塵土汚衣裙新濟州來舊濟州栁門西畔兩三鷗酒邊笑謔消長日弄竹彈絲盡勝流琵琶切切更嘈嘈髙栁羣蟬逐不號一片夕陽無限好汶河西上酒樓高錦帆百幅礙斜陽遥望陵州里許長車馬爭馳迎把盞走來船上看花娘兀兀篷窗坐似禪景州城外更凄然官河宛轉無風力馬曵驢拖鼓子船船到滄州且少畱客來同上酒家樓沿河樹折棗初剥滿地藤枯瓜未收日中轉柁到河間萬里羇人强自寛此夜此歌如此酒臨安月色好誰看長蘆轉柁是通津盡是東西南北人日暮煙花簫鼔閙紅樓爛醉楚州春恰到楊邨舊馬頭北風吹雨便成秋嗚嗚鬼物敗人興掩却篷窗且睡休滿朝宰相出通州迎接三宮宴不休六十里天圍錦帳素車白馬月中遊㑹同館裏紫䝉茸蘭麝飄來陣陣風簫鼓沸天迴雁舞黄羅帳幔燕三宫皇帝初開第一筵天顔問勞意綿綿大元皇后同茶飯宴罷歸來月滿天第二筵開入九重君王把酒勸三宫駝峰割罷行酥酪又進椒盤剥嫩蔥第三筵席在蓬萊丞相行杯不放杯割馬燒羊熬解粥三宫宴罷謝恩迴第四筵開在廣寒葡萄酒釀色如丹并刀細割天雞肉宴罷歸來月滿鞍第五華筵正大宫轆轤引酒吸長虹金盤堆起綿羊肉樂指三千響碧空第六筵開在禁庭蒸麋燒鹿薦杯行三宫滿飲天顔喜月下笙歌入舊城第七筵排極整齊三宫遊處輭輿提杏奬新沃燒熊肉更進鵪鶉野雉雞第八筵開在北亭三宫豐燕已恩榮諸行百戲都呈藝樂局伶官呌㸃名第九筵開進帝妃三宫端坐受金巵須臾殿上都酣醉拍手髙歌舞雁兒第十瓊筵敞禁庭兩邊丞相把壺瓶君王自勸三宫酒更送天香近玉屏一人不殺謝乾坤萬里來來謁帝閽髙下受官隨品從九流藝術亦沾恩僧道恩榮已受封上庠儒者亦恩隆福王又拜平原郡幼主新封瀛國公金屋妝成物色新三宫日用御厨珍其餘宫女千餘箇分嫁幽州老斵輪每月支糧萬石鈞日支羊肉六千斤御厨請給葡萄酒别賜天鵝與野麕三宫寢室異香飄貂鼠氊簾錦繡標花毯褥裀三萬件織金鳳被八千條客中忽忽又重陽滿酌葡萄當菊觴謝后已叨新聖㫖謝家田土免輸糧三殿加餐强自寛内家日日問平安大元皇后來相探特賜絲紬二百單萬里脩途似夢中天家賜予意無窮昭儀别館香雲煖自把詩書授國公江南􅇿守列金階内裏華筵日日排文武官僚多二品還鄉盡帶虎頭牌四川昝帥尚麤豪萬馬來燕貢一遭奏授虎符三百靣内家更賜織金袍曉望燕雲正雪天閉門氊帳恣髙眠内家遺鈔三千錠添賜三宫日用錢越州歌十首淮南四畔草離離萬檝千艘水上飛旗幟蔽江金鼓震伯顔丞相過江時東南半壁日昏昏萬騎臨軒趣幼君三十六宫隨輦去不堪囘首望呉雲西峰雲鎻幾時開昨夜京城戰鼓哀漁父生來載歌舞滿頭白髮見兵來魯港當年傀儡塲六軍盡笑賈平章三聲鑼響三更後不見人呼大魏王脱却黄袍心莫欺魏王事業止于斯孤舟走過揚州去表奏朝廷乞太師賈廟巍巍盡勅封秦齊兩國受恩同木綿菴下無依鬼合策麒麟第一功羣臣上疏納忠言國害分明在目前只論平章行不法分田之後又私田甲子初秋栁宿乖皇天無雨只空雷正當七月初三夜帝勸長星酒一杯月夜湖歌歌正長船來船去水茫茫上塘歌了下塘唱更唱呉王與越王苦夢呉山列御筵三千宫女燭金蓮而今莫説夢中夢夢裏呉山只自憐醉歌十首呂將軍在守襄陽十載襄陽鐵脊梁望斷援兵無信息聲聲罵殺賈平章援兵不遣事堪哀食肉權臣大不才見説襄樊投拜了千軍萬馬過江來淮襄州郡盡歸降鞞鼓喧天入古杭國母已無心聴政書生空有淚成行六宫宫女淚漣漣事主誰知不盡年太后宣傳許降國伯顔丞相到簾前亂㸃連聲殺六更熒熒庭燎待天明侍臣已冩歸降表臣妾簽名謝道清衣冠不改只如先闗㑹通行滿市廛北客南人成買賣京城依舊使時錢北師要討撒花銀官府行移逼市民丞相伯顔猶有語學中須揀秀才人湧金門外雨晴初多少紅船上下趨龍管鳳笙無韻調却撾戰鼓下西湖南苑西宫棘露牙萬年枝上亂啼鴉北人環立闌干曲手指紅梅作杏花伯顔丞相吕将軍收了江南不殺人昨日太皇請茶飯滿朝朱紫盡降臣戎州三首錦荔戎州第一竒大如雞子壓枝垂金刀剪下三千顆對客從容把酒巵害馬勞生事已灰長安無復使人來滿園蓊蔚千千樹盡是楊妃死後裁錦殻中間玉一團樹髙數丈實難攀瀘戎顆顆甜如宻夔梓纍纍味薄酸鳳州歌去路迢迢入兩當三千三百到華陽黄花川上黄花驛千百猿聲斷客腸宋元詩會卷五十三
