body:
  text: 宋元詩會卷七十八兵部主事陳焯編周權字衡之括蒼人延祐間遊京師以此山集受知於翰林袁桷桷序其詩曰意度簡逺議論雄深法蘓黄之凖繩達騷選之㫖趣盖深與之擬古二首東溟躍羲和西海沈望舒迭運不遑息汲汲司晨晡人生百年間有如涉長途途長日苦短何以寧其軀白露沾我衣衆芳忽萎枯逝將躡飛霞駐景凌方壺山中有孤松託根在深澗磊落多節目偃蹇嵗云晏豈無干雲心亦有傲雪榦蕭颼起清奏可挹不可玩大雅久寂寥古瑟絃已斷美哉遺音存佇立為三歎讀淵明傳淵明任疎散出處皆逍遙悠然解縣組不折五斗腰晴川風日佳歸舟喜搖搖及門對妻子不覺衣囊枵居貧道則腴念澹迹巳超時復會田家興至不待邀種豆在南山種苗在東皋投閒偶成趣心逸身匪勞孤懐託素琴萬事付濁醪樂天以乗化内適何陶陶若人渺何許世逺不可招千載東籬花寒香翳叢蒿采采不盈掬佇立秋風高紫鳯吟楚客青綺裘售我紫鳳圗且言覩祥瑞與子縣座隅裴回感客意因以致我詞不能嗚朝陽髙翔碧梧枝惜哉五章備乃向縑素施我圖已在揭顛倒隨天吴殷勤謝客去玩目非所娯古樂府妾有嫁時鏡皎皎無纎滓照妾芳華年塗澤如花美郎行向天涯嵗月忽踰紀空閨生逺愁妾容為誰理妾容匪金石寧復昔時比重拂故匣看炯炯光不已人情重顔色反目如覆水願郎待妾心明與鏡相似原上楓青青原上楓春至暢柔葉雨餘似膏沐幽蔽深澗合昨日原上行寒林淨如削此時澗中松偃蹇睨氷雪牧童詞我牧不憚逺牧多良苦辛所幸牧已狎馴擾無敗羣平原濕春煙碧草何披紛大牛隠重坡小牛飲芳津旦出露未晞及歸景常曛時復叩角歌歌俚全吾真取樂田野間世事非所聞桃栁詞灼灼絳桃花裊裊黄栁絲風流少年場妖冶不自持春風日夜變㸃拂辭故枝飄紅惹飛絮流水同天涯美人麗南國蘭蕙熏柔姿青春妬娉婷笑盻生光輝素絲感清鏡朱粉難為施奈何桃柳質歳晏徒傷悲懐别青桑蔽繁隂𤣥鳥春將暮東風老松花長林翳黄霧俛首事鉛簡流光暗中度淮水日夜流美人邈難晤賓鴻盡北歸誰與達書素長歌復徘徊晴川渺煙樹暮春衆芳麗春輝夭冶眩紅紫紛紛兒女情圍香醉羅綺笙簫夜嗚嗚申旦歡未巳鶗鴂何處嗚繁華總流水誰知搖落時可以觀物理遊山寺空林淨如掃石徑穿嶺細紺廬出深樹飛湍下雲際偶逢赤髭侶囑我聴真諦菘肥齋鉢豐樾古佛燈翳遶檐棘籬短野枳香入袂夕磬兩三聲半巖花雨霽幽居索居簡人事與世意空投柴荆已就理嵗功念西疇落落雞犬墟隠隠漁樵洲嘯傲一壺綠聊復寫我憂及辰遇沖賞獨策還經丘向夕山景霽延矚明川流白雲息空谷歸鳥鳴林幽人生亦委化汲汲將焉求秋原晴煙淡秋原枯梢翳殘葉蘭芷徒自妍芳馨誰採掇豈無同心人嵗月念飄忽咏思河水深迢迢暮雲合謝僧茗餅僧達無生機寂念若氷冷汲來石根泉瀹以雲腴餅舌端味枯禪了然發深省歸念石林空清颸下松頂次韻張洞雲張子湖海襟乃復喜崖壑朝餐進芝髓夜誦然松節深雲暗幽洞仲夏欲飛雪下舂炫餘景林水互明滅款客垂磬室頗感十年别攜琴意已消酌茗石蘿月楮澗月道人澹無為懶散忘盥櫛掃石秋樹根楮澗濯殘月袖浥水光潤屐帶山翠滑虚闌倚雲歌清猿共孤絶湘中天寒楚雲淨木落湘山幽空江夜来雨水滿蘆花洲西風何渺渺滄波日悠悠有懐誰與言注目孤鴻秋次韻幽居晨興啟衡門見此溪南山山光入溪淥水底明青鬟熈熙自漁樵清歌時往還莞爾發永悟寘我丹青間相逢吟客從郢中來抗志青雲表持螯共拍浮江逺孤舟小寒夜潮氣白楚樹晴烏早酒闌起推篷落月在西島明妃曲逝水無回波去箭無反筈十載昭陽春萬里龍荒月風沙滿宫衣慘淡餘香歇哀絃溼絲淚淚盡絲亦絶寄語漢飛將此計誠太拙蛾睂豈長好不久為枯骨贈雷紫崖髙士曽築室於華山紫崖髙人頭欲雪神清貌古髯過膝秃蛟入硯生雲煙叱咤風雷鬼神泣清宵幽夢回瑤壇鼎中龍虎催九還飄然晞髪太華頂醉睨海浪天風寒朅來訪我蒼溪滸白石清泉不堪煑共譚世事兩茫然竹屋青燈夜深雨牧羝行朔風吹沙浩漫漫冷光射目愁雲昏茫茫大漠亘萬里何處有路通中原羣羝牧老草枯死倚節自誓無生還餐氊嚙雪氣自倍婉孌兒女懐饑寒夜長空望漢月白㡬度弔影憐羇單已將傲兀壓憂患獨仗大義排堅頑此生自信羝不乳豈意雁足傳間闗歸來屬國豈不厚區區一飯皆君恩紀信歎沛中龍奮硭碭雲咸陽楚炬三月焚兩雄角起鹿在野三户有楚無强秦貔貅百萬紛如雪戈矛盡染英雄血旗旄曉蔽大河雲兵塵夜暗中原月滎陽數載戰不休重圍食盡漢亦憂將軍詐帝出降楚脫帝虎口真良籌無何諸將已平楚事定論功裂茅土獨無旌美到將軍不得褒名紀盟府男兒死節志已酬瞑目地下夫何求吁嗟功怨俱悠悠漢庭雍齒還封侯子陵釣圗東都熱官手可炙吴儂面似秋江色平生落拓一羊裘七葉貂蟬不堪易功臣盡在雲臺中丹青化作灰塵空先生遺貌乃在此釣竿尚裊桐江風悠悠世事江雲白過眼輕帆自朝夕人間萬古仰孤風天上有星猶是客清溪張埽雲不嗜酒肉工詩安貧所作少年行因次其韻五陵年少風流客花間開晏春壺碧豹胎熊掌羅玳筵犀筯逡巡萬錢值綺羅吹香圍肉屏棖棖銀甲喧瑤箏髙燒紅蠟作長夜白日過眼如流星可憐氣岸如山阜雨散雲飄不能久繁華富貴總成夢昨日朱顔今白首爭如芝田野老衣縣鶉飲饌芝术餐芳辛新詩日富不厭貧少無佚樂老無戚尺澤自可潜幽鱗誰知清溪有鶴不可馴白雲浩蕩青林春焦山寺赤霞夜出扶桑東海雲捲浪凌虚空剛風浩浩吹不去崔嵬化作青蓮宫萬衲月寒清梵寂四面沈沈皆海色鐘聲不許到人間自送潮音落寒碧採蓮曲越溪女郎十五六翠綰香雲雙鳳蹙嫣然一笑似花妍艶試新妝照湖綠羅衣露浥紅芳秋少年陌上情綢繆蘭橈容與隔花語驚散鴛鴦生晩愁蓮花莫折莖有刺藕絲易斷針難度清歌一曲入湖煙空載香風滿船去甓社湖碧天如幕沈雲影飛亷不怒銀濤静驪龍正睡貝宫寒一鏡光凝青黛冷數聲玉笛來何處白鳥雙雙忽飛度夜深明月生孤篷人在廣寒卧風露八里莊渡淮入黄河水渾不可飲過徐入清河水方澄潔信筆閒記河流汨汨如涇水濁浪崩騰疾馳駛一石中膠數斗泥舟客居民皆飲此黄河不復行故道下注清淮通海涘十人度索上一洪寸寸强弓挽難起屹然趺坐如僧禪日與篙師同愠喜青山一髪認邳州蕭條暮上魚豚市酒邉一笑我何為獨冒驚濤行萬里争如林下混漁樵俛仰嘯歌行復止回頭寄語北山雲征塵待向風泉洗雞鳴臺横空陣氣長雲黑戈鋋照耀旌旗色龍跳虎躍鬼神愁漢楚存亾一絲隔相持兩地皆雄據楚力疑非漢能拒瑞起炎圗硭碭雲悲歌霸業烏江路空餘故壘傳遺跡離合山河㡬勍敵戰塵吹盡水東流落日沙場春草碧謫僊樓大羅僊子李太白秋水疎蓮浮玉色一來金馬玉堂中詩酒猖狂天子客飄飄豪氣秋風起登樓曽醉東山市放浪形骸宮錦袍榮華富貴東流水酒酣揮灑翻河筆險語能令鬼神泣至今光焰照塵寰一字堪償雙白璧我來懐古空悽愴風月千年尚無恙何時相見崑崙丘汗漫從遊九天上蒲萄酒翠虬夭矯飛不去頷下明珠脫寒露纍纍千斛晝夜舂列甕滿浸秋泉紅數宵醖月清光轉穠腴芳髓蒸霞暖酒成快瀉宫壺香春風吹凍玻瓈光甘逾瑞露濃欺乳麯生風味難通譜縱教典却鷫鸘裘不將一斗博涼州長城長城峩峩起洮水盤踞蜿蜒九千里朔雲浩浩天茫茫悲笳落日腥風起猶傳鬼神風雨夕知是當時苦苛役征人白骨掩寒沙化作年年春草碧祖龍為謀真過計自成限域非天意力窮城杵怨聲沈禍起蕭牆險難恃豈知一朝貔虎來闗東咸陽宫殿三月紅冷泉亭昔人來自天竺國縹緲孤雲伴飛錫天風吹落凝不去化作奇峰聳空碧至今裂峡餘雲髓桂冷松香流未巳翠光圍住玉壺秋不放晴雷度山趾道人晏坐無生滅炯炯層胸照氷雪夜深出定汲清泠寒猿啼斷西嵒月曙巖上人巖扉人不到竹色滿僧䦨林雨添經潤窓雲入硯寒夜龕猫占卧晨鉢鶴分餐客至無餘事敲氷煮月團野趣地偏居自穩石路接平田雲合茅檐樹雨添花澗泉空山晴滴翠逺水綠生煙喚酒青林渡斜陽繫客船贈别南雁飛應盡攜書始問程别離情易惡貧賤意難明樹巴春城暗鐘聲曉寺清孤燈山驛酒後夜共誰傾倦遊萬事雙蓬鬢江山賦倦遊斷猿明月曙疎雨碧梧秋道路中年感琵琶後夜愁客懷無處寫離思滿滄洲郭外郭外人家少漁村颺酒旗江雲低壓樹沙竹細穿籬地暖梅花早天寒潮信遲夕陽煙景外倚杖立移時社日端居㤀節序物化静中觀逺岫春雲澹深村社雨寒溪花紅暎屋堦樹綠平䦨喧醉田間叟雞豚日暮歡客中送張歸雲相逢俱是客對酒感流年落日沙頭雁清風樹杪蟬山鐘隔林寺江火趂潮船何日茆檐下清燈話霅川次韻村居秋日瓜芋芃芃綠滿疇村居容易樂深幽白雲僧屋開孤嶂疎竹人家帶淺流半榻清燈初耿夜一聲長笛欲横秋何時歸把滄洲釣已㰱閒盟向白鷗村行風落漁歌隔浦聞前村獨樹正斜曛誰家桃李迷荒棘半隴牛羊卧古墳橋斷春堤多積雨溪深野碓自舂雲青旗搖曳疎林處剰把閒題與客分張氏新居小雨東風拂袖寒神仙華屋畫圗間茶香入座午煙歇花影壓簾春晝閒翠竹白沙泉細細朱䦨綠樹鳥闗闗客來一笑推棋局坐占溪南十里山秋日石脈泉花蘸眼明竹根沙路舊經行雲歸天際山容澹日落江頭雁影横梧葉庭除秋漸老豆花籬落晩初晴客行迢遞歸心逺煙火蒼茫起暮程次韻閒居鍾鼎山林有命存遊心物外已忘言希夷太華煙霞室處士孤山水月村齪齪可憐雞舞甕昻昻未羨鶴乘軒不須對客談餘事笑領琴歌竹下樽秋望暮鴉歸處斷霞明搔首風前萬里情烟抹山光翠屏冷水􅇽天影玉壺清蟲鳴沙逕宵初永雁落蘆汀月未生何事數聲江上笛吹將離恨滿孤城訪陳子髙徳星堂短策輕衫借晩涼偶來談笑徳星堂竹深四壁生虚籟山近半村無夕陽池折泉聲歸座爽松蒸雲氣溼衣香蕭然門巷無輪鞅隠几觀書味更長次韻孟韶卿知道龎公不出山因為訪鶴借山看海棠開盡雨方歇燕子來遲春尚寒一塢煙霞隨步屧千峰紫翠入憑䦨掉頭巢父成何事謾向珊瑚拂釣竿送友東歸東華厭逐輭紅塵一見潘郎興味真落落孤松林壑志昻昻野鶴水雲身闗山客夢三更月驛路梅花十里春誰唱渭城朝雨曲座中愁絶未歸人山齋娟娟萬竹照清溪約住閒雲作伴栖隣曲樵人曽結社樽前詩客偶分題東風一樹棠梨老落日千山謝豹啼閒向静中參物化人間岐路任東西毗陵數家煙火自成隣寂寞荒祠野水濱壊屋有基餘瓦礫古墳無主自荆榛暄風綠樹鶯聲老曉雨青郊虎跡新四月三山山下路野田猶殿菜花春次韻令尹解官歸九江滿眼山河落木秋逺遊時復賦登樓解官彭澤如元亮呼酒新豐似馬周嵗月駸尋人易老乾坤浩蕩水空流輸公已了公家事臥對廬山雪滿頭懶菴講主得九江餅茶鄧同知分餉其半汲泉試之解組歸來萬事輕日長門巷澹無營團香小餅分僧供折足茶鐺對客烹色捲空雲春雪湧影沈江月夜潮生一甌洗却紅塵夢坐愛風前晩笛横信題已識浮雲似世情歳寒老硯是心朋平生不貸監河粟自擷香芹煮澗氷晩渡離離野樹綠生煙灼灼山花爛欲然沽酒人歸春渡寂栁根閒繫夕陽船許有壬字可用湯隂人幼穎悟讀書一目五行年二十暢師文薦入翰林不報延祐二年登進士第授同知遼川事為政輒有聲除山北亷訪經厯遷吏部主事轉江南行臺御史劾貪除暴部内肅然拜監察御史英宗崩賊臣特克實將作亂有壬首疏其罪及特克實伏誅泰定帝自上都至復上章言特們徳爾之子索諾木與聞大逆乞正典刑於䝉難諸臣俱請雪寃復職元年立詹事院選有壬為中議改中書左司貟外郎陞右司郎中天厯三年擢兩淮鹽司至順二年召參議中書省事元統甲戌拜治書侍御史轉奎章閣侍書學士歴中書參知政事會平章徹爾特穆爾挾私憾奏罷科目有壬力爭之不得遂稱疾在告帝强起之至正改元轉中書左丞明年以浮言移疾歸屢召不赴六年誣白召為翰林學士承㫖御史中丞復辭歸十三年起拜河南行省左丞遷集賢大學士中書左丞階至光祿大夫卒年七十八所著有至正集諡文忠神山避暑晩行田間用陶詩為韻三首田塍晩獨策及此時雨晴東畦與西疃決決流水聲豐年已足歡清風復多情歸來藉草坐濁酒還自傾寧用澆磈磊我懐無不平寢迹非絶世雅志便林丘青山足一至勝處靡不遊意適輒忘返茲焉夏已秋遙遙目力窮青青盡田疇迷復幸不逺歸與無異謀昔人植松柏映蔚彌崇岡不為朝夕利千載當自長植槿非不榮我圃因之荒白髪走畏途途脩馬非良桑榆賴非晩此樂且無央宿臨湘贈誠之監縣北風櫓聲乾晩泊斷磯下雲岫浮脩蛾霜空入平野鳴雁無處尋落日不可畫重岡䕶巖邑百里寄民社藉甚賢大夫居然魯恭化豐年足粳稻沃壤盈桑柘我如無心雲底事勞候迓爛醉得詩歸江山非傳舎題友人所藏明妃圗臂香骨沁守宫虐金鎖重門怨銀鑰深宫有眼不識春晝長時聴雲間樂平生所見惟監宮今朝豈期見畫工君王知畫不知妾薄命已分如秋蓬黄沙漫漫天無極驚飈吹老紅芙蓉穹廬明日又何處此生遂負南歸鴻和親納侮號上策建議始謀婁敬責妾身雖苦免主憂猶勝專寵亾人國闗山寥落夢亦迷嫁雞正爾隨雞飛人間生女莫望貴只可近作田家妻琵琶聲斷霜天月青塜至今青不歇後來却有蔡文姬千古邉笳動哀拍喜逢口灤陽驛東北四十里有雙塜世傳昔有久戍不歸者其殳求之適相遇此山下相抱大笑喜極而死遂葬于是俗因謂之喜逢口亦猶望夫之有石也雖莫究其世代姓氏而其言有足感人者故作是以紀之兒寒解衣重撫摩兒饑推食孰忍訶長城與國負逺戈一去不返當如何去時云戍東北鄙直出榆闗度遼水白頭老翁形影俱豈憚山川千萬里天教此地適相逢父曰從天墮吾子笑疲樂極俱殞身誰謂情鍾遽如此官家開邉方未已同生又别寧同死山雲漠漠風颼颼山頭雙塜知㡬秋當時不忍一朝喜今日翻飛千載愁猶勝貞女化為石終古孤身雙不得清江寒影日悠悠行人一去無消息田家對雪野老能留客柴門便反關落梅㸃衣上飛雪墜杯間地僻偏宜竹窓幽更對山自憐真野逸瓶罄不知還夜至魯港桴鼓逺銅龍前驅列炬紅星芒寒拂地江影静浮空聴語漁村近連航水驛通不才慚傳食鮭菜足為供荻港早行水國宜秋晩羇愁感歳華清霜醉楓葉淡月隠蘆花漲落髙低路川平逺近沙炊煙村不斷山崦有人家神山雨山中日日雨松竹早知秋清響自深夜逸人無逺愁忩虚聞葉落林暗見螢流對景因懐杜江村事事幽登後山觀湖漲時隂雨忽霽世去重華逺名偕二石存溪寒清見底榕老亂垂根野色偏宜晩民居僅似村曲江人已矣楚些擬招魂横浦登舟南征殊不惡樂事總相闗馬上行思句舟中卧看山盡收煙景去滿載月明還何往不自得浩歌天地間白菜土羔新且嫩筐筥薦紛披可作青精飯仍攜玉版師清風牙頰響真味士夫知南俗稱秋末投簪要及時地椒凍雨催花紫輕風散野香刺沙尖葉細敷地亂條長楚客收成裹奚童擷滿筐行厨供草具調鼎爾非良尋梅何以慰吾衰梅花秀發時晩香傳逺樹春雪避南枝林静來差早溪深行獨遲與君謀一醉及此未披離九日陪闔臺諸公登石頭城一江環抱四山圍酬節追歡剰費詩雁影不移雲盡處秋光都在雨晴時當年玉樹人空歎明日黄花蝶豈知便駐髙軒􅂸醉倒絶勝無酒繞東籬神山即事京塵汨沒已華顛恰是山居第一年松月照窓詩入聖竹風吹榻夢遊僊隨人久作悠悠者處世方知綽綽然尚愧未能忘口腹時勞昆季致肥鮮和謝敬徳學士見寄平生疎懶是天姿今歳春來起亦遲好酒或如陶靖節杜門深愧鄭當時向來事業惟供笑如此韶光忍廢詩館閣真才試枚舉鵲山陪預恐難期登岳陽樓半空輪奐壯巴丘消得騷人一繫舟雲氣逺攜湘雨至湖光寒入蜀江流山川信美非吾土天地無窮有此樓三十四年如夢過可憐華髪賦重遊過湘潭江邉楊栁翠縈洄栁外人家罨畫開一夜東風花落盡千年華表鶴歸來暮雲山出逺浮黛春雨水添濃潑醅莫艤扁舟訪陳迹白頭懐抱易生哀閒居雜詩二首半山雲樹接􅁱篁鎮日無塵到草堂瓮牖風來書葉亂膽瓶花落硯池香壺觴自酌教㣲醉松菊猶存及未荒䕶果灌園常不暇誰知閒裏更多忙鵠山東北接郊墟郭影嵐光畫不如九十日春朝暮雨兩三間屋古今書庭花紅礙經行處園樹青回剪伐餘滿地蒼苔愁踏破年來深喜故人疎和傅汝礪寄来韻江水舟航日夜東故人音問得常通君才能挽千鈞力我老惟懐一􅒪宫自古山林容小隠只今臺省有諸公欲知别後詩成處都在花香竹影中和康里子山韻洞深春早透蘭芽忩曉雲香亂海霞萬丈紅塵飛不到紫簫吹綻碧桃花行縣書所見春雨初晴漲稻畦石渠分水灌麻池醉翁社散忘歸路行過柴門尚不知次黎東山鳳栖别墅韻風漪舞翠躬耕稻雲錦紅酣手種花策杖尋君迷不得有書聲處是君家蘓彦良西埜堂蒼苔滿逕樹連村中有幽人屐齒痕此去客來宜定約無詩無酒不開門李洞字溉之滕州人生有異質姚燧見其少作深歎賞之薦於朝授翰林國史院編修官及考除集賢院都事轉太常博士監修國史長史歴秘監著作禮儀院經歴擢奎章閣學士超遷翰林直學士泂以奏對稱㫖見知文宗因著輔治篇以進帝嘉納之朝廷大議必使與聞詔同修經世大典書成謁告以歸遣使召之疾不能起卒年五十九有文集四十卷題漢陽郎官湖山翁薄暮醉酒歸杖藜迷却髙陽池清風吹花綠隂倒我笑謂是秋雲移還乗貫月槎夜過郎官湖峥嶸星斗入江漢蕩漾槎影如鯨魚九華之真人邀我倒玉壺麒麟擘脯供行厨依稀仙樂在空際碧山四暎寒蟾孤舉酒酌寒蟾明月下飲姮娥俱霓裳拂雲錦萬荷露㵼瓊瑤枝麾幢晻靄羅煙空乃有玉皇所授之玉童風前飄飄曳廣帶對立十二秋芙蓉清香九曲銀河通真人綠髪披春風錦袍玉雪照天地口說姓字安南公是公多逸氣略與古昔賢豪同時能掃月色延我石室煙蘿中又言昔同張謂所遊地長笑一覆丹霞鍾風吹仙樂度溪去我已醉卧香爐峰我本山人素志丘壑獲歸名山為願畢矣爰以四月十一日離京師是夜抵潞陽慨然賦詩遙慰匡廬隠者併似金門諸公為一噱云野馬脫羈鞅倐疑天地寛臨風一長鳴風吹散入青㝠間頗如魯仲連蹈海不復還又如安期生長留一舄令人看江南浩蕩忽如海落日照耀浮雲闗既不能低睂伏氣摧心顔詭遇特達驚㝠頑又不能抱書挾䇿干萬乗調笑日月相迴盤匡廬迢迢接仙山仙翁汎若秋雲間長松之隂引孤鶴望我不見空長歎采鉛天池津飲渌桃花灣蒼梧倒影三湘寒赤城霞氣生微瀾鯨鯢翻空海波赤曉色欲上扶桑難人間之樂不足恃何如歸卧棲嵒巒棲嵒巒兮卧雲穴夜半天風吹酒醒猶有西樓萬年月月夜過采石呈樵隠學士兄空江偃仰見明月月向天心散氷雪捫天恍惚與之語桂樹瓊枝紛糾結倐疑枯槎泛河漢又似山隂理歸楫美人不來江水深獨對風鐘正愁絶欲愁絶兮奈此懐征帆茫茫江上開黄蘆風起鳥聲至千里一望銀山來銀山嵯峨隔滄海海上羣僊復誰在巨鼇已謝三山沈扶桑蕭條失光彩丹砂不逐兒童歸曠懐更為秦人悲英雄立國彼其志想儀金罫空葳蕤笑呼白雲觴我酒疊翠連山作忩牖夜風吹月落西去水氣㝠㝠澹星斗夜深忽見峨睂亭紫鱗欲去江潮生只愁新詩幻出金碧龍虎文翩然收我日月元氣歸滄溟寄吴源可不謂相疎亦自猜空山舊雨入莓苔江湖機熟鷗忘去吴楚年荒雁不來豪傑何心猶用世乾坤自古少憐才向來共醉梅花下昨夜一枝寒自開龍從雲字子高詩名魚軒集明皇秋宫夜晏圖金莖滴露秋滿衣玉樓商葉吟參差六宫沈沈度清樂月在華清池上芙蓉枝虹橋錦步上龍尾十八宫娥舞相對玉環吹笛背銀燈百歡媚得君王醉君王醉卧倚龍屏羯鼓嗷嘈尚未停祿山含笑林甫喜但願君王醉不醒雪花曲苦篁漠漠吹北風黄河水流凝不通天孫手持白鸞尾盡埽琪花舞碧空崑山欲削瓊樓裂老龍起舞驚明月應是遊魂不覺寒醉吟紙帳春雲熱東家嬌娘厭桃李學繡宫花瑣窓裏冷把擎來欲細觀隔簾火氣催成水鶴骨笛九臯聲斷楚天秋玉頂丹砂一夕休枯朽挽回生死調凄清吹盡古今愁魂歸遼海身如寄曲破江城月滿樓惆悵主人三弄罷杳無消息到揚州美人紗帶滿眼春嬌倚繡牀玉鈎新綰藕絲長鴛鴦機上舒晴雪翡翠簾前蹴曉霜拾翠不知羅襪潤踏花猶隔繡鞋香㡬回暗憶吹簫侣背立東風咏鳳凰僊壇碧壇纛影䕃龍蛇騎鶴歸來棗似𤓰僊語風前飄玉屑道衣天上散雲霞寒潭六月猶無暑老木千年尚有花采藥青童來借問蒼煙起處是誰家王廓中州人字廓然官長沙不得志投劾徑歸有寥天集行世小孤山江上青山一劍孤氣虹夜貫斗牛墟寒藤古祠神所居謾說彭郎迎小姑俚言不經聴者愚舉世孰與明其誣山下長江通蜀吴飛亷怒鎖千舳艫乾坤變色慘不舒竿摧纜絶愁萬夫初疑破塜遇老狐又訝伏波留賈湖陽侯負弩雄前驅馮夷擊鼓嚴後車六鼇掣釣軒蓬壺八駿鞍轡鞭龍魚神靈怪駭千萬殊縱有健筆難窮書一官長沙賦歸歟三年卧病南陽廬故交新貴一字無扁舟夢鱠松江鱸行或止之不可虞呼童取酒聊自娯短歌激烈驚樵漁掀鬚一笑誰和予隣商去住依祝巫盤餐拜祠檣上烏百錢之利衆所趨浪走不待晨雞呼進銳退速中乗除未要冒險爭前途江山正自不我疎我亦樂與江山俱安得匹素百尺餘他年寫我東遊圗黄陵曲黄陵磯頭煙樹簇黄陵廟前煙草綠來朝時接洞庭君驚浪掀空駕銀屋雨風吹散魚龍腥天空落日波㝠㝠君王龍馭夜臺冷雲晩蒼梧山更青月華二十五絃秋聲斷白蘋江自流竹花遍淒野林血地老天荒蛾黛愁嬪虞雙笄虞已老雲鏡芙蓉怨秋槁天子巡遊后不從秖益神明楚詞好千㠶萬櫓香火足古木蒼藤鴉鷺宿夜寒星斗滿晴川漁郎時唱湘靈曲孫轍字履常臨川人幼孤母蔡親教之即警策自勵長而學行純篤以孝聞家居教授四方問業者户屨恒滿監司屢辟皆不就呉澄盛稱其文擬古次楊志行韻三首沙江采芙蓉江水何澄鮮朱華映朝旭窈窕熏風前相望不盈咫風波良獨艱攬之置懐袖撫玩空長歎春榮衆所慕泯黙無復言孟冬寒氣至盻彼庭中樹忽得故人書中有相思句故人隔異縣相望良獨苦候蟲鳴廣除落葉被衢路凄其對搖落登髙詎能賦白髪生鏡中荏苒流年度故人歳寒姿亦有濟勝具相期佩飛霞共飲金莖露青青河畔草春至不復腓延縁被坡陀飽彼牛羊饑荏苒時序遷王孫終未歸西風一蕭瑟楚客空傷悲安知壯士心金石乃不移隂陽無停運垂栁生金絲鳥鳴百花開迴首乃爾為丈夫貴自朂千載以為期宋元詩會卷七十八
