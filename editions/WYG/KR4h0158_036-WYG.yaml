body:
  text: 宋元詩㑹卷三十六兵部主事陳焯編胡銓字邦衡廬陵人建炎二年高宗策士淮海見其對策竒之將以冠多士為忌者改寘第五授撫州判官未上以䕶隆祐太后募鄉丁於贑州論賞轉承直郎用薦除樞密院編修㑹和議起上疏請斬秦檜除名編管昭州再貶新州將以謗訕怨望鍜錬致死㑹檜死始量移衡州聽自便居住孝宗即位復奉議郎知饒州召對除吏部郎轉祕少擢起居郎兼侍講編修力請上都建康詔議行幸不果其忠義之氣久而愈厲上雖韙之未能從也乾道七年以敷文閣直學士予祠進資政殿學士致仕卒有澹菴集一百卷行世潭石巖此處山皆石他山盡不如固非從地出疑是補天餘下陋一拳小高凌千仞虚竒章應未見名豈下中書柬陽春邑宰縣古杉楓老人居水竹間化民無訟獄留客有江山路逺旅愁積病多詩思慳多君情好篤不飲愧吾顔登南恩望海臺君恩寛逐客萬里聽歸來未上凌烟閣先登望海臺山為翠浪湧湖拓碧天開目斷雲飛處終身愧老萊和林和靖梅花詠三首風亭小立夢初殘步步凌空對廣寒照眼雙明清可掬閒情一味澹相看曉縈瑞霧黏初潤晴映高雲薄未乾三嗅臨風思無限蘂宫遥夜酒初䦨當年曾見鳳城頭入骨貪看興未休小摘欲論千種恨微吟先喚一番愁每嫌俗物熏心醉長願清芬滿世留穠李倚風梨帶雨比方應合面騂羞縞裠練帨照釵荆霜竹寒松秀色并八詠格高凌太白千林地迥切西清著枝有味知深意欹屋無言似薄情日暮水邉空悵望渾如湘浦見皇英和李參政泰發送行韻落網端從一念差崖州前定復何嗟萬山行盡逄黎母雙井渾疑到若耶山鬼可人曽入夢相君談易更名家此行所得誠多矣更願從公北泛槎雷州和朱彧秀才時欲渡海何人著眼覷征驂賴有新詩作指南螺髻層層明晚照蜃樓隠隠倚晴嵐仲連蹈海徒虚語魯叟乗桴亦謾談爭似澹菴憑興往銀山千疊酒微酣遊白龍洞縣厓怪石俯潺潺神物知宜隠此間窮勝不妨歸險洞尋春那止看羣山攀龍行即天邉去躍馬聊同野外還好景良辰適相㑹一樽欣共水雲閒和王民瞻送行詩二首巖耕名已震京關未信終身袖手閒萬卷不移顔氏樂一生無愧伯夷班致君自許唐虞上待我誰能季孟間宗社年來欠元老蒼生拭目看來還士氣波流勢莫支逄時言行欲俱危不因湖外三年謫安得江南一叚竒匪我獨清縁世濁此心誰識只天知萬牛囘首須公起大厦將顚要力持買愁村北往常思聞喜縣南來怕入買愁村區區萬里天涯路野草芳烟正斷魂王庭珪字民瞻安福人政和間進士官茶陵丞棄去築室盧溪因以自號紹興中胡銓為樞密編修官乞斬秦檜連貶新州庭珪以詩送之檜黨目為謗訕流辰州檜死得自便之命孝宗召赴闕除直祕閣一子扶掖上殿年已九十餘矣舟次白沙朝發螺浦湄暮宿白沙口初為夜行計有物應掣肘山雲四面起風濤半江吼落帆危石磯就枕不敢乆林深鳴鸛鵲村逺聞鷄狗夢覺如月明破篷見斗牛起視天色清解䌫欲放溜浪頭聒天響掀簸入我牖蒲帆未及張篙師復囘首渡頭有古祠壁画雜怪醜舟人相與言勸我酬神酒出處本細事隂晴亦常有我固不問天豈問土木偶遊貢游洞竄身楚西極幽竒頗窮歴况此古道傍横天竦蒼壁何年始開鑿工如鬼鑱刻飛空數百丈突出青鯨額那知風雨時雲雷非窟宅事跡墮渺茫探討失圖籍豈無高世士于此煉金液不能久徘徊上馬空歎息題宣和御画玉鎖宫扉三十六誰識連昌滿宫竹内苑寒梅欲放春龍池水暖鴛鴦浴宣和殿後新雨晴兩鵲飛來東向鳴當時妙手貌不成君王筆下春風生長安老人眼曽見萬嵗山頭翠華轉恨臣不及宣政初痛哭天涯觀画圖觀駱元直進江南形勢圖異時漢網疎天討射雕馬齧江南草石頭重戍豈無兵將軍未識丹陽道至今戰骨堆秋霜傷心不忍問耆老龍蟠虎踞昔何雄赤壁濡須在眼中潯陽江水射蛟處旌旗拂天來向東艨艟塞川不敢下昔人曾此破曹公横江九道波翻屋試請輕兵渡淮曲夜入長安人不知應見画圖心已熟他日將軍按此圖鼓行而西如破竹和劉美中尚書聽寳月彈桃源春曉何年鑿源開混茫桃花兩岸吹紅香烟消逺浦生微陽漁舟誤行溪水長溪囘岸轉山隙光疑有絳闕仙人房居民爭出羅酒漿花間笑語音琅琅抱琴釋子眉髪蒼響泉韻磬鳴長廊能談往事悲孟嘗昔時臺沼今耕桑又如勇士赴敵場坐令遊子思故鄉清猿抱木號鴻荒孤吟劃見丹鳳翔曲終待月西南廂重調十指初不忙如見古画秦衣裳春天百鳥爭頡頏桃源歸來今已忘彈到落花空斷腸麗人行讀大業拾遺作桃葉山前宫漏遲宫人傍輦持花枝君王喜憑絳仙立殿脚爭画雙長眉欲把琵琶彈出塞結綺臨春時事改井邉忽見張麗華忍聽後庭歌一再蚤行羣雞鼓翼天欲光井上梧桐生微凉殘星爛爛或出没初日淡淡開青蒼楚妃臺邉曉雲碧伏波廟前秋草黄騷人辛苦拾何物沅有芷兮今已香和韻胡敦實少年行酒酣坐待東方高臂鷹走逐城南豪彎弓射殺白額虎醉騎歸馬雪花毛日暮黄雲動天色易水迷魂招不得莫學并州遊俠兒徒費黄金飾韀勒題劉端禮步芳橋橋上画欄低壓水青龍影落芙蕖底欲渡芙蕖望翠微波面紅雲映屐齒洛浦清流古有神羅襪凌波生暗塵東昏戯作錦地茵金蓮襯步如花人而今此事墮渺莽但有荷花開蕩漾試穿芒屩踏風烟安用紫絲連步障送謝夢叟昆仲之湘江蠟屐訪窮巷脂車戴曉星哦詩添些語望岳挿青㝠烽火連蠻徼樓船壯洞庭瀟湘多夜雨羡爾對牀聽送客東門楊柳陌車騎散林坰草緑古今道馬嘶長短亭人歸天北闕使動斗南星送客何年了春蘋又滿汀春日遊鴿湖山風起羣木末花開兩壁香山深雲影變人静鳥聲長紺殿横崖起飛泉噴玉光扣門僧出定彈指下禪牀送劉禹錫之官五羊南海千山外東風幾驛催嶺頭梅雨歇旗尾瘴烟開蠻徼無塵起中原有使來時應問消息㑹向日邉囘春日山行緩鞚青絲馬不嘶春山草長静柴扉迸林新筍斑斑出隔水幽禽款款飛雨過泉聲鳴嶺背日長花氣撲人衣雲藏逺岫茶烟起知有僧居在翠微題郭秀才釣亭野濶江寒一雁飛碧蘆花老鱖魚肥遶欄緑水秋初净滿櫂白蘋人未歸醉任狂風掲茅屋卧聽殘雪打蓑衣他年欲訪沙頭路㑹自攜竿扣竹扉送胡邦衡之新州貶所二首囊封初上九重關是日清都虎豹閒百辟動容觀奏牘幾人囘首愧朝班名高北斗星辰上身墮南州瘴海間不待他年公議出漢廷行召賈生還大厦元非一木支欲將獨力拄傾危癡兒不了公家事男子要為天下竒當日姦諛皆膽落平生忠義只心知端能飽喫新州飯在處江山足䕶持再過東岡物色江寒楓葉凋江邉微雨暮瀟瀟白沙翠竹舊行路碧水朱欄新渡橋盡室當時避征戰十年閒事付漁樵如今傑屋明人眼一笑端能覆酒瓢别葛德裕主簿官冷身閒簿領稀時從物外赴襟期憑君少緩青絲鞚為我聊傾碧玉巵野寺石泉秋煑茗松牕雪屋夜論詩縣知别後東風近先寄寒梅第一枝次韻楊廷秀求近詩聞説學詩如學仙怪來詩思渺無邉自憐猶裹癡人骨豈意妄得麻姑鞭勇似千軍初入陣清于三峽夜流泉只今老鈍無新語楓落吳江恐誤傳王主簿清暑閣褦襶趨程作熱官何如避暑得清安輕隂画出三湘境爽氣能為六月寒自有熏風生屋角不須纎手捧氷盤欄干半倚紅塵外卧聽江聲㵼碧湍江亭即事江水磨銅鏡面寒釣魚人在蓼花灣雲開貪看初生月不覺小舟流下灘葉夢得字少藴吳縣人嗜學蚤成多識前言往行登紹聖四年進士由教授召為編修官用蔡京薦召對遷祠部郎累遷翰林學士㑹將以童貫宣撫陜西取青唐夢得見蔡京力諍之京有慚色未幾出知汝州尋予宫觀踰年起用拜學士戸部尚書與宰相朱勝非不合退歸湖州紹興初起知建康進安撫制置司練兵籌餉屢却敵兵加觀文殿大學士安撫福建復平海冦上章請老以崇信軍節度致仕卒赴建康過京口呈劉季高客路重經黄鵠前故人仍得暫留連長鎗大劍笑安用白髪蒼顔空自憐照野已驚横雉堞蔽江行見下樓船灞陵醉尉無人識謾對雲峰説去年蔡子因相過留踰月解作江山一月留仲文儒雅更風流欲知爵躍心能喜正愛蟬連語不休築室君方論並舍子因約同居霅上歸山我已辦扁舟交親四海今餘幾萬事傷心付白頭徐敦濟書報嘗過余石林繞澗新添數百竿故人書為報平安似聞謖謖山風響正想隂隂夏簟寒老去不能窮蠧簡歸來便擬挂塵冠一杯且覔林間約莫枉山王廢舊歡東園作草堂新成官舍如何有草堂野人熟處自難忘池開月映千山迥檻静風生六月凉幽徑也從穿别浦小舟還似過横塘深知幕府文書省盡付甘眠亦未妨胡宏字仁仲建寕崇安人文定公安國子也㓜事楊時侯仲良究所傳者父之學也優游衡山下二十餘年玩心神明不舍晝夜張栻師事之紹興初上書以良心聳動高宗謂其顧慮畏懼忘父兄之困辱而北面冦讐葢由良心之不察也高閌為國子司業請幸太學宏見其表作書責之謂閌欺天罔人阿諛柄臣求舉太平之典秦檜當國貽書宏兄寅問其二弟意欲用之宏致書詞甚厲人問之宏曰正恐其召故示以不可召之端檜死宏被召竟以疾辭卒於家著書曰知言張栻謂其言約義精道學之樞要制治之蓍龜也有五峯詩文集五卷皇王大紀八十卷題上峰寺百年身似客浩蕩世間遊入望青山好夢魂偏我留我家巫山十二峯浮江直過巴陵東瀟湘水與蒼梧通環遶衡嶽青㝠中扁舟白雲不可度杖藜蠟屐乗春風山光浮動可攬結雲舒霞卷飛烟虹深巖大壑翠巘巘足力已到心無窮羣峰迤邐勢不競上盡祝融五千仞祝融峰高天更高太空人世如牛毛風雲萬變一瞬息紅塵奔走眞徒勞西林寺廓然堂有懷超然峰頭秋風清廓然堂延秋月明我乗清秋弄明月中有所感思㝠㝠峰勢凌蒼穹上有烟林封去天不盈尺路斷心忡忡虚名過耳如松風同伯氏還鄉江村沙暖蔞蒿長味比枸杞新甘香茁茁荻芽生近渚紫花臺菜初未嘗白羊烏狶俱在牧茅舍竹籬眞故鄉人生未必須富貴萬事且願身康强徑買官場舊醅酒共醉春風殊未央桃源行北歸已過沅湘渡騎馬東風武陵路山花無限不關心惟愛桃花古來樹聞説桃花更有源居人共得仙家趣之子漁舟安在哉我欲乗之望源去川源逺近蒸霞開一片隨水從東來及晨徧覽三春色莫使風雨空莓苔題法輪寺春色初収夏氣清路分松檜入峥嶸深盤岣嶁千峰下逺抱瀟湘一綫明大衆總迷身在處三關除却道方平山林若是有情住何異紅塵爭利名劉子翬字彦冲贈太師韐之仲子以父任承務郎辟眞定府幕屬韐死靖康之難子翬痛憤幾無以為生廬墓三年服除通判興化軍因毁瘠不堪吏責辭歸武夷山不出者十七年與籍溪胡憲白水劉勉之交相得每講學外無雜言所與遊皆知名士而期以任重致逺者惟新安朱熹一人也熹父松且死以熹託子翬佩其教成名儒焉卒年四十七學者稱屏山先生建康六感吳龍翔大耳兒虎視捉刀人風雲競追逐逸軌誰能遵大帝負英材沈潛歘求伸一呼定南國再戰威强鄰抗魏既揺岳攘劉亦披鱗組練繞平隰艨艟蔽通津偉哉人物盛成功豈無因代祀已飄忽風流久彌新停橈眺迥陸裂蔓登層闉卧龍昔來遊萬古懷清塵晉日昃無全照南遷事倉忙龍謡方協瑞星禍已告亡凌遲百年運凛凛危莫將向來問鼎人項背常相望環宫白羽列面闕鳴弦張膺圖未躋泰卜世豈在長獨憐短轅公推刃殺忠良百身嗟莫贖一慟鬢成蒼時移事亦更為宋復為梁惟有采石潮年年到前岡宋寄奴眞偉人落拓龍潛地據筵呼五木已有吞世氣世期値陽九天綱日淪替偏邦或跨州卑號猶稱帝匪乗艱棘運英姿疇能濟南戡奠番禺西狩澄涇渭功雖與世隆道亦同人廢緬懷揖讓風黄屋身如寄頽波日奔廹夜壑遷神器巢由獨賢哉高蹤邈難繼齊堯宫不剪茨禹室無崇壤巍巍天步隆萬代猶可仰荒哉二三君經營務華敞落柹滿清江飛斤殷遥響疏淵引瀾澳築圃遷林莽筋力斃民軀貲財傾國帑雄心獨未倦矯首生遐想時徂陵谷變無事猶悲曩殷憂易興懷逸樂難終享過客問青樓荒畦棘花長梁開圖屬英睿失國由昏愞斯人異前修撥亂旋致亂輕刑下益肆厚爵臣彌叛聰明馳萬幾精苦徒宵旰鳳冕敬方袍鸞旗游彼岸悠然棄從懷臨機復難斷那知千佛力不紓一冦難酒色覆商周神仙蕩秦漢趨亡固多軌荒迷卒同貫微聖常鮮終撫册三慨歎陳悲風嘯荒垣歌斷庭花曲璧月夜沈輝瓊樹春銷馥郊圻遊從盛想像猶經目麗景明新妝清波映鮮服承恩屬令姿被選皆華族朝從結綺遊暮向臨春宿意高時忽謝步逺塗方促榮華事不長哀樂情難足悠悠六朝事轉盻風驚燭永懷興亡端斯文慚麗縟夜飲良宵樂未央促席團欒坐佳人意慇懃倡歌屬余和幽期貴濶畧醉語多叢脞沈沈玉巵酒量淺難負荷豈不懷極懽恐重賔友過褰帷望明河山月銜半破囘軒互追奔繖拂簷瓦墮種菜傍舍植柔蔬攜鋤理荒穢桔槔勤俯仰一雨功百倍朝來緑映土新葉揺肺肺牛羊勿踐畦肉食屠爾輩下灘作青山鎖連環白澗走鳴瀨迷津毫髪間舟與危石㑹囘淵聚浮沫斷壁餘澎湃玩竒心若驚覽鏡目不逮悠然一囘首孤驛已茫昧停橈念經厯履地猶旋憒悲風嘯枯林暮野雲相葢隔船聞和歌沽酒慰疲怠棄竹夫人愛憎情易遷感物思鬱紆念昔未棄捐常侍君子居煩襟一披豁雅抱何清虚蹉跎怨時暮凉德竟見疎飛霜皓中庭枵然委牆隅的皪珠幃深熒煌錦茵鋪豈不懷舊恩君心已非初當年紈扇謡抱恨同區區宿省軒夜空合一寂擾擾息萬勞幽懷耿不寐孤燈側殘膏稍知山雨來聲在横林高凄然郤成夢夢泛秋江濤遊龍潭四客同笑言一僧陪杖屨徜徉山水窟適意忘晨暮疎鐘巖北寺細竹溪南路中流石參錯不礙潺湲􅑴泓澄小龍潭潤氣金碧聚時驚木葉墜俯見鯈鱗度斯遊非預期偶爾造佳處㓜輿丘壑情陶令琴觴趣淹留慰所願惟以賔友故夕陽淡寒山遲囘不能去不忍行二首草邉飛騎如烟滅拉獸摧斑食其血此時疾首念鑾輿玉體能勝饑渇無危城屑麴驚雲擾簠簋無光天座杳奮戈儻未雪深讐我食雖甘何忍飽黄河鑿鑿氷成路人語寒空氣成霧此時泣血念鑾輿玉體能勝凛冽無蒼黄天步䝉塵去畫衮飄零傷嵗暮飛書倘未伐姦謀我服雖華何忍御望京謡雙鑾北狩淹歸轂寂寞梁園春草緑猶傳故老守孤城官軍不到黄河曲連雲樓櫓已灰燼更倚牕扉防箭鏃招兵大半出羣盗繡䘿䝉衣屢翻覆前宗後社力誅鋤白刃如霜挂人肉州橋燈火夜無光夾道狐狸晝相逐往時汴泗絶行舟市糶十千塵滿斛衣冠避地多在南宛馬却食江南粟謀臣武士力俱困海角飄揺轉黄屋盤庚五遷方擇利昆陽一戰何當卜夕烽明處望千門孤臣祗欲吞聲哭兼道攜古墨來墨面龍紋墨背識云保㤗九年奉勑造長春殿供御龍印香煤旁又識云墨務官臣庭圭監官臣夷中臣子和臣卞等進葢江南李氏物也感之為作此詩長春殿古生荆薈猶有前朝遺物在錦囊珍重出𤣥圭雙虬刻作蜿蜒態枯皮剥裂弄幾刓斷玦精堅磨不殺吾聞李氏據江左文采風流高一代當時好玩不獨此器用往往窮奢汰徵工選技填御府不惜千金為賞賚治兵唐推英衛精治民漢許龔黄最惜哉取士不知術妙手獨得庭珪輩眞主驅馳八極中荒王逸樂孤城内汗青得失更誰論尤物競為人寶愛嗟余視此眞糞土事有至微猶足戒投文欲往弔江流幽魂未泯應慚悔劉兼道獵劉侯好獵親馳逐指呼雙犬如奴僕朝衝唐石亂雲來暮聽潭溪流水宿何如著鞭走大梁我亦與子同翺翔今年獵内醢彭越明年獵外羓徳光次韻蔡學士梅詩梅梢破白香清切清雨含春不成雪瑶池髣髴萬妃遊縞裠練帨何鮮潔凌晨燦爛忽驚眼客中又過嘉平月年年見梅非昔地海角尋芳更愁絶多情欲伴曉雲飛有恨只教啼鳥説兵㕑况是酒如澠東閣喜聽談吐屑飄零使我歡意盡山城暮角聲嗚咽庭邉一樹春最晚照影遥憐水方折暫忙不到今幾時南北枝頭開又歇新辭婉媚發春妍未害廣平心似鐵荔子歌炎精孕秀多靈植荔子佳名聞自昔絳囊剖雪出琱盤尋常百果無顔色閩天六月雨初晴星火熒煌曜川澤歘如彩鳳戲翺翔爛若彤雲堆翕爀我聞二和全盛時貢輸不減開元日繡衣中使動輶車黄紙封林遍阡陌浮航走轍空四郡妙品人間無復得似聞供御只纎毫往往盡入公侯宅驪山廢苑狐静艮嶽新宫鼙鼓急繁華今古共凄凉遶樹行吟悲野客法石見李漢老叅政我識今朝李翰林十年隔絶飛寸心素書每逄雙鯉得雲路欲倚長梯尋翰林昔叅建炎政想見中興人物盛方圓齟齬不足論角巾雅有江湖興玉堂草詔禠兇魄丹陛陳謨發天聽介圭便合趣公還只今密勿才稀並自憐隨牒東南奔假道因得登龍門怪余髯面益老矣一笑問勞情彌敦僧坊蕭蕭逺闤闠豈料飄零獲清對此行尚憶王相宅曩日交游幾人在濁酒青燈夢寐間九州四海烟塵内區區王事今有程暫見復别難為情長亭喚馬一悽斷璧月曉墮桐花城夢仙謡并引劉致明夢與七客游仙胡原仲與焉其事甚異致明清修純實非夸誕人也因為作謡以記之他時二人凌太虛誦此謡當懷所謂病翁者耶鵝子峰前波色清劉郎看山無俗情癯儒自昔有仙骨夜夢體飛如葉輕雲中不識朝天路雙童導我凌空去側身度巖隈盤盤復囘囘翛然意往形不礙石窟蘚竇俄天開乗槎夜泛牛女渡鞭鸞曉入金銀臺花深不逄人時聞佩環聲仙翁睡起方結襪見客坦易無崖垠撃䝉冀垂矜叩妙獲一言駐紅却白非難事貪生慮死眞愚計當時同遊七姓俱但記古月成胡字塵縁未斷不得留海風吹過蓬瀛洲覺來牕户㝠曚曉玉鏡晶晶墮松杪清江行漁翁一櫂老清波稚子學語能漁歌日暮沙頭寒爇竹雨餘船角亂堆蓑鬻殘小鮮仍自鱠湖海茫茫醉鄉内夜闌酒渴潄寒流月照蘆花上篷背井泉石井水濺濺寒莎映碧鮮雨聲添溜急天影入波圓曉汲連山寺春耕潤野田杖藜三嚥罷毛髪更蕭然巖桂凉颸振逺村寂寞度清芬山路不知處月牕時夜聞孤根寒抱石落子半飄雲袖手空延佇無才可賦君策杖策杖農家去蕭條絶四鄰空田依壠峻斷藁布窠勻地薄惟供税年豐尚苦貧平生飽官粟愧爾力耕人泊舟莽奔荒茨岸囘囘亂石灘雨寒収市蚤風急泊舟難㝢縣兵猶鬭乾坤網正寛慇懃囑龍劍莫乆卧波瀾途中小市猶依海横橋欲跨汀雨餘榕徑冷春晚苧田青薄宦低豪氣浮生惜壯齡急流歸亦好憂患飽曽經與原仲至交溪橋倦憇春橋午囘環翠碧重亂溪流背海新柳色欺松厭市常思野為官不及農喜逄湖上客談話得從容寄蜀有客傳歸信愁懷得暫寛兒童占鵲喜鄰里借書看離蜀秋方半浮湘嵗欲䦨柴門頻灑掃夢想見征鞍野墅野墅驚秋晚殘年忽忽過海潮通井淺林日到牕多酒盡鄰翁餉詩成稚子哦人生行樂耳軒冕奈余何晚飲招提聊駐屐却去白雲堆老眼看山倦餘懷向酒開晚凉微雨送秋意一蟬催醉裏揮犀妙方知有逸才道中微風収宿靄細路遶平皋石亂春溪急山寒曉月高鳥聲時出樹花氣欲侵袍行役兼清賞驅馳未覺勞次長河壁間韻竄鼠驚殘夢蕭蕭老屋虚風聲傳逺瀨寒意入秋蔬客路漂揺久歸身憔悴餘西牕滿殘照髣髴似吾廬過鄴中逐鹿營營一夢驚事隨流水去無聲黄沙日傍荒臺落緑樹人穿廢苑行遺恨分香憐晚節勝遊飛葢尚高情我來不暇論興廢一㸃西山入眼明酴醿顚風急雨退花晨翠葉銀苞照眼新高架攀縁雖得地長條盤屈總由人横釵數朶開猶小撲酒餘香韻絶倫唯有金沙顔色好年年相伴殿殘春送原仲之荆南風急塵埃滿漢關送君行處路漫漫不知争戰幾時定常恐别離相見難三逕舊游松竹老五湖新隠水雲寛交朋日覺知音少緑綺從今莫浪彈原仲温其彦藻彦符致明集敝廬清樽勸客且留連亂後相從亦偶然三徑生涯鄉社裏一秋心事菊花前向來憂喜皆陳迹老去光隂逐斷弦懷抱故人今有幾只因情話可忘年宿雲際偶題榖雨都無十日閒落紅棲草已斑斑曉烟未放屋頭樹春漲欲浮天際山翠葢縈風沈逺坂漁舟驚浪落前灣鐘聲認得林邉寺嵗嵗籃輿獨往還秋意又見庭梧一葉飛物華心事兩差池百年未半老相逼四序平分秋獨悲過岸山川雲漠漠殘燈院落雨絲絲客懷料理須杯酒哭向窮途定是癡屏跡屏跡山樊避世喧晚風落日静柴門寒泉遶竹通幽圃小徑穿田入别村散策微吟霜葉脱鈎簾宴坐碧雲翻閒中興味知何晚絶口名途不更言次韻温其元日詩曉來飛雨挾風顚洗出韶容換故年花動一紅明屋角山涵亂碧到樽前病如夜鶴孤還警老似春蠶飽即眠賴有故人開寂寞錦囊詩句許時傳山寺見牡丹倦遊曽向洛陽城幾見芳菲照眼新載酒屢穿卿相圃傍花時値綺羅人十年客路驚華髪囘首中原隔戰塵今日尋芳意蕭索山房數朶弄殘春蚤行村雞已報晨曉月漸無色行人馬上去殘燈照空驛清湖驟雨快雨不相期平湖忽蕭颯坐乆日明簷繁聲靜中滅汴京紀事十首内苑珍林蔚絳霄圍城不復禁芻蕘舳艫嵗嵗銜清汴纔足都人幾炬燒空嗟覆鼎誤前朝骨朽人間罵未銷夜月池臺王傅宅春風楊柳太師橋神霄宫殿五雲間羽服黄冠綴曉班詔許羣臣親受籙步虚聲裏認龍顔宫娃控馬紫茸袍笑撚金丸彈翠毛鳳輦北遊今未返蓬蓬艮嶽内中高篤蓐清香步障遮並桃冠子玉簪斜一時風物堪魂斷機女猶挑韻字紗雲芝九幹麥雙岐合有嘉生瑞聖時玉殿稱觴聞好語時教張補撰宫詞橋上遊人度鏡光五花殿裏奏笙簧日曛未放龍舟泊中使傳宣趣鄆王巨石曽聞受國封承恩不與幸臣同時危運作高城礟猶解捐軀立戰功蒼黄禁陌夜飛戈南去人稀北去多自古黄沙埋皓齒不堪重唱蓬蓬歌輦轂繁華事可傷師師垂老過湖湘縷衣檀板無顔色一曲當時動帝王景陽鐘二首景陽鐘動曉寒清度柳穿花隠隠聲三十六宫梳洗罷却吹殘燭待天明一鈎殘月淡觚稜遥望林梢曉色升寂寞小簾風露冷玉盆脂水已生氷朱槔字逄年韋齋弟也有詩曰玉瀾堂集梁溪尤袤為序極稱之三山次潘静之升書記韻客路那知嵗月長掀眉一笑苾蒭房且傾徐邈聖賢酒不問陳登上下牀雲影翻空迷海嶠秋聲隨夢到江鄉明朝各聽船牕雨猶憶枯棊戰四郎老兵種菊以詩謝之蔬畦雨徑策勲時徙種鄰牆菊兩枝九日無人過朱放十分舉酒酌王尼花裁栗玉秋風健香近龍涎曉夢知負口不應還負眼長鑱煩爾鎮相隨九日與客語慨然有廬山之興九日黄花笑白頭分將牢落付荒丘半川暝色聊償夢别嶺秋聲旋寄愁江國經年多浪語匡廬入手是眞休未能免俗須登陟睨視元龍百尺樓寓居南軒雲氣披猖月意孤冬青倒影上庭隅燈横老薺蛾方去書掩新芸蠧已無一世盡知關魯酒十年不擬歎齊竽支頤坐覺疎星没獨扣龍頭瀉酪奴僕自以四月十四日自延平歸所寓之南軒積雨隂濕體中不佳二十五日夜夢至一處流水被道色清絶若有欄檻而無屋宇有筆硯皆浸水中予驚問何地旁有應者曰此玉瀾堂也夢中欲取水中筆硯作詩詩未成而覺意緒蕭爽殆不類人世雞已一再鳴矣因賦此蘧蘧飛夢過雲鄉物色清輝眼界長閶闔未招金馬士蓬萊先立玉瀾堂千尋濯足衣裘冷六字哦詩筆硯香當與瑶池作同社紅巾青鳥兩相忘六月二十日次日立秋天涯明日見秋風錯莫誰驚碧樹空豈意楚山招隠處盡歸蜀客廣騷中釣魚聊爾針方直乞米茫然帖自工獨卧南軒聽南澗蠻花猶作杜鵑紅馮時行字當可蜀巴縣人宋南渡初官奉禮郎力抗和議至引漢高分羮之事上曰此言朕不忍聞忤秦檜罷歸所著有縉雲集縉雲山借問禪林景若何半天樓殿冠嵯峨莫言暑氣此中少自是清風高處多岌岌九峰晴有霧瀰瀰一水逺無波我來游覽便歸去不必吟成證道歌寶華寺宿雨初収草木濃羣鴉飛去法堂空長廊無事僧歸晚盡日門前只看松宋元詩㑹卷三十六
