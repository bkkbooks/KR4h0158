body:
  text: 宋元詩㑹卷六兵部主事陳焯編王旦字子明大名莘人父祜宋初名臣嘗植三槐於庭曰子孫必有為三公者旦幼沈嘿好學登太平興國五年進士知平江縣用薦召試擢知制誥真宗即位同知樞宻院進參知政事澶淵之役旦權留守東京未幾拜同平章事凡柄用十八年為相一紀國有大事待以取决惟於天書封禪不敢為異議則其相業之累云年六十薨諡文正十洲閣山川如幻閣長秋一島飛來伴九洲不礙漁樵雙槳過何妨羅綺四時遊雲疑泰華分張去水憶蓬瀛散漫浮禁苑未知湖海樂生綃寫取獻中州李迪字復古幽州人少攜其文見栁開開竒之曰公輔材也舉進士第一授將作監丞通判徐兖二州改祕書省著作郎直史館歴陜西都轉運使入為翰斯林學士請發内藏庫佐國用其料曹瑋之勝嘉勒賚皆卓識可辦大事帝甚重之天禧中拜給事中參知政事於周懐政之誅力䕶太子及冦凖罷真宗欲相迪迪固辭一日對滋福殿皇太子出拜以得相為賀帝顧迪曰尚可辭耶遂以吏部侍郎同中書門下平章事㑹丁謂擅權迪請與謂俱罷謂出迪知鄆州謂敗仁宗起為祕書監屢典州郡太后崩召為資政殿學士未幾復同中書門下平章事再出領郡以太子太傅致仕年七十七薨諡文定題河陽後城平嵩閣南指嵩髙北太行大河中出貫霛長君王不恃金湯險自有仁恩結萬方王曽字孝先青州益都人咸平中由鄉貢試禮部廷對皆第一以將作監丞通判濟州召試授祕書省著作郎直史館遷翰林學士真宗晩坐承明殿召對久之既退使内侍諭曽曰曏思卿甚故不及朝服見卿卿勿以我為慢也其見尊禮如此遷主客郎中歴右諫議大夫參知政事為王欽若所排出知應天府未幾復參知政事仁宗立遷吏部尚書以裁抑太后姻家通請謁者復出領郡景祐二年拜右僕射兼門下侍郎同平章事封沂國公年六十一薨諡文正立春帖子北陸凝陰盡千門淑氣新年年金殿裏寶字帖宜春蚤梅石畔籬根取次栽小園春意覺先來雪中勿問和羮事且向百花頭上開杜衍字世昌越州山陰人擢進士甲科補揚州觀察推官改知平遙縣通判晉州歴知乾州鳳翔河東陜西轉運使召為樞宻直學士出知天雄軍仁宗特以御史中丞召兼判流内銓聲動京師寶元二年拜同知樞宻院事改副使凡内降恩多封還詔㫖寢格不行進同平章事薦引賢能阻抑僥倖小人多不悦出知兖州慶厯七年以太子少師致仕自是屢召不起封祁國公卒年八十諡正獻新居感詠無似老且病惟恐歸田遲一旦得引年九天還聴卑尚霑二品祿俾盡百年期恩深淪骨髓感極橫涕洟始營菟裘地來向濉水湄城隅最窮僻匠者寧求竒卜築悉由巳軒牖亦隨宜外㠯庇風雨内以安妻兒燕雀莫羣噪鷦鷯才一枝因念古聖賢名為千古垂何嘗廣居室儉為後人師亞聖樂簞食寢丘無立錐文終防勢奪景相恥家為文園四壁立鄭公小殿移伊余具員者適㑹承平時無術毘萬務無才撫四夷為郡亦齪齪勞心徒孜孜保身巳天幸拊巳宜自知開卷顔間厚復懼來者嗤勗哉知止足清白猶可追幽居即事寂寂復寂寂告老閒居日徑草髙於人林鳥熟如客黃卷不釋手清風常滿室内顧平生心無過此時適雨中荷花翠葢佳人臨水立檀粉不勻香汗濕一陣風來碧浪翻珍珠零落難收拾晏殊字同叔撫州臨川人七嵗以神童薦召試援筆立成帝嘉賞賜同進士出身擢祕書省正字祕閣讀書遷光祿寺丞丁内外艱皆奪服起之以左正言直史館久之為翰林學士仁宗即位太后聴政大臣丁謂曹利用各欲獨見奏事殊建言當垂簾聴奏羣臣無請見理議遂定預修真宗實錄進禮部侍郎樞宻副使上疏論張耆忤太后㫖出知應天府延范仲淹以教生徒學校之重興實自殊始召拜御史中丞歴參知政事尚書左丞康定初進同中書門下平章事為權倖所排出知潁州數徙知河南府引疾請歸京師疾平留侍經筵薨於位贈司空兼侍中諡元獻文集二百四十卷和王校勘中夏東園東園何所樂所樂非塵事野竹亂無行幽花晚多思閒窺魚尾赤暗辨蜂腰細樹影宻遮林藤梢枉罥袂潘蔬足登膳陶秫徑取醉幸獲我汝交都忘今昔世歡言捧瑤佩願以疎麻繼列子有力命王􅂶論衡有命祿極言必定之致覽之有感大鈞播羣物零茂歸自然黙定自有初不為智力遷禦冦導其流仲任派其源智愚信自我通塞當由天宰世曰皋伊迷邦有顔原吾道誠一槩彼途鍾百端卷之入纎毫舒之盈八埏進退得其宜夸榮非所先朝聞可夕隕吾奉聖師言西園示張寺丞元巳清明假未開小園幽逕獨徘徊春寒不定斑斑雨宿醉難禁灔灧杯無可奈何花落去似曽相識燕歸來游梁賦客多風味莫惜青錢萬選才初秋宿直絳河星斗夜闌干禁署沈沈閉九闗上帝冊書羣玉府仙人宫闕巨鰲山凉蟾影度秋隂薄促漏聲來夜唱閒擁鼻吟多欲愁絶嚴鐘凄㫁樹烏還安昌侯蓮勺移家近七遷一編經訓世相傳闗中沃壤通涇渭堂上繁音逐管絃身服儒衣同蔡義日將巵酒對彭宣髙墳丈五陽陵外千古朱雲氣凛然崇因寺捲簾山色眼前見入夜濤聲枕上聞苔徑雨餘堆落葉石樓風静鎖寒雲雪中平臺千里渇商霖内史憂民望最深衣上六花非所好畆間盈尺是吾心題琵琶亭流光過眼如車轂薄宦拘人似馬銜若遇琵琶應大笑何須􅋞淚濕青衫詠竿戲題中書壁百尺竿頭裊裊身脚騰跟倒駭傍人漢陰有叟君知否抱甕區區亦未貧狄遵度字元規長沙人父棐龍圖閣直學士遵度用父蔭為襄縣主簿居數月棄去好為古文著春秋雜說多所發明尤嗜杜甫詩嘗讚其集一夕夢見甫為誦已作乃世所未見者亡何卒有集十二卷白雲秋風吹白雲觸處自何谷初猶半洞門歘出遍巖腹零落依水湄片叚挂枯木餘影透㣲白滅跡混空綠烟蘿自蘙薈島漵徒縈曲安知蒼梧野下覆猿鳥哭誰能久徘徊返顧視黃鵠和渙之深秋月夜書事洞庭葉下凉颼颼銀河頑白凝不流圓月擬缺不忍缺輕露欲浮終未浮憶吹朱籟鳳軿上更採紫芝雲嶠陬玉樓天半幾千尺珠樹玲瓏縣上頭雨髙林風黒雨聲怒小閣燈青人語闌誰知雲外月髙照定是葉間鶯最寒時覺急飄愁未巳似聞徐滴喜初翻驪駒北首榆闗路天晴烟樹沙磧寛登樓羣山南走失所往百川東逝兹其窮天低水國疑將壓人過月塘愁欲空莎青石細淺見底天空雲淡無一毫波間圓月照不動海上清風來最髙林逋字君復錢塘人少孤性恬淡好古結廬西湖之孤山二十年不入城市真宗聞其名賜粟帛詔長吏嵗時勞問自為墓於其廬側既卒州為上聞仁宗嗟悼賜諡和靖先生閔師見寫陋容以詩奉答顧我丘壑人煩師與之寫北山終日縣風調一何野林僧忽焉至欲揖頃方罷復有松上猿驚窺未遑下送牛秀才之山陽省兄之子詠陟岡别我嵗時晏後夜失羣鶴高天著行雁楚山逺近出江樹青紅間尊酒無足辭離愁滿行盻湖樓晚望湖水混空碧憑闌凝睇勞夕寒山翠重秋凈雁行高逺意極千里浮生輕一毫叢林數未遍杳靄隔漁舠上湖閒泛艤舟石函因過下湖小墅平皋望不極雲樹逺依依及向扁舟泊還尋下瀨歸青山連石埭春水入柴扉多謝提壺鳥留人到落暉湖村晚興滄洲白鳥飛山影落晴暉映竹犬初吠弄船人合歸水波隨月動林翠帶烟㣲寺近疎鐘起蕭然還掩扉湖山小隱三首猿鳥分清絶林蘿擁翠㣲步穿僧逕出肩撘道衣歸水墅香菰熟烟崖蚤筍肥功名無一㸃何處更忘機園井夾蕭森紅芳墮翠陰晝嵓松䑕靜春塹竹雞深嵗課非無秫家藏􅍦有琴顔原遺事在千古壯閒心衡門鄰晚島環堵背寒岡片月通蘿逕幽雲在石牀客遊抛鄠杜漁事擬滄浪管樂非吾尚昻頭肯自方中峰中峰一徑分盤折上幽雲夕照前村見秋濤隔嶺聞長松含古翠衰藥動㣲薰自愛蘇門嘯懐賢思不羣小圃春日岸幘倚㣲風柴籬春色中草長團粉蝶林暖墜青蟲載酒為誰子移花獨乃翁於陵偕隱事清尚未相同郊園避暑柴門鮮人事氛垢頗相忘愛彼林間靜復兹池上凉託心時散帙遲客預攜觴况有陶籬趣歸禽語夕陽山村冬暮衡茅林麓下春色巳㣲茫雪竹堆寒翠風梅落晚香樵期多獨往茶事不全忙雙鷺有時起橫飛過野塘出曹州詩懐動歎嗟驢立帽陰斜雨濼生新鹻茅樷夾舊槎午烟昏獨店岡路透誰家幾日江南興扁舟泊岸沙留題李頡林亭無琴枕鶴經盡日卧林亭啼鳥舊相語幽人誰欲聴半闌花藉白一徑草盤青何必對樽酒此中堪獨醒翠㣲亭亭在江干寺清凉更翠㣲秋階響松子雨壁上苔衣絶境長難得浮生不擬歸旅懐何計是西崦入斜暉埜城寺水亭金井前朝事林僧問不知綠苔欺破閣白鳥占閒池清楚曽經晉荒唐直到隋南廊一聲磬斜照獨凝思聞葉初秀才東歸高鴻多北向極目雨餘天春滿呉山樹人登汴水船吟生千里月醉盡一囊錢肯便懐鄉邑時清復少年和梅聖俞雪中同虛白上人來訪湖上玩佳雪相將惟道林蚤烟村意逺春漲岸痕深地僻過三徑人閒試五禽歸橈有餘興寧復比山陰和朱仲方送然社師無為還歴陽歸客過東闗行行一錫閒破林霜後月孤寺水邊山頂笠衝殘葉腰裝歇暮灣香燈舊吟社清思逐師還夏日寺居和酬葉次公午日猛如焚清凉愛寺軒鶴毛橫蘚陣蟻穴入莎根社信題茶角樓衣笐酒痕中餐不勞問筍菊淨盤罇送長吉上人囊集暮雲篇行行肻廢禪青山買未暇朱闕且隨緣茗試幽人井香焚賈客船淮流遲新月吟翫想忘眠春日送袁成進士北歸春潮上海門歸雁逺行分千里倦行客片帆還送君酒波欺碧草歌疊褭晴雲來嵗東堂桂聊酬一戰勛送史殿省典封州馬援疎蠻邑銅標何可窮人烟時亦有海色自如空髭髮梅分白旌旗瘴減紅惟應蒔藥罷埋照酒醪中送王舍人罷兩浙憲赴闕上問還旌節明廷覲冕旒清溪傾綺席蠧簡壓歸舟越俗今無訟閒田亦有秋公期論爵賞當拜富民侯送昱師赴請姑蘇同載闔閭人衣囊覆㲲巾新烟赤岸暝融雪太湖春鐘逺移齋候香遲上定身當知舉如意寶地雨花頻送皎師歸越林間久離索忽忽望西陵靜户初聞扣歸舟又說登野烟含樹色春浪疊沙稜幸謝雲門路同尋苦未能送思齊上人之宣城林嶺藹春暉程程入翠㣲泉聲落坐石花氣上行衣詩正情懐淡禪髙論語稀蕭閒水西寺駐錫莫忘歸洞霄宫大滌山相向華陽路暗通風霜唐碣久草木漢祠空劍石苔花碧丹池水氣紅幽人天柱側茅屋灑松風送僧休復之京師金錫指歸鴻田衣獵曉風春江片席逺松月一房空新句别離後舊山魂夢中到京當袖刺館閣盡名公寄錢紫㣲晞髪晨初起中丘謝病身空持白雲意遙贈紫㣲人畫轂坊門逺蒼苔掖署春元和舊文體當許繼清塵淮甸城居寄任刺史擾擾非吾事深居㫁俗情石莎無雨瘦秋竹共蟬清劍在慵閒拂詩難憶細評寥然獨榰枕淮月上山城寄茂才馮彭年異代甘泉賦誰當頌太㣲無如摛薻妙所惜賞音稀漸逺鄉闗樹方單客子衣扁舟艤何許霰雪暮霏霏湖山小隱二首道著權名便絶交一峰春翠濕衡茆莊生巳憤鴟鳶嚇揚子休譏蝘蜓嘲潏潏藥泉來石竇霏霏茶靄出松梢琴僧近借南熏譜且併閒工仔細抄閒搭綸巾擁縹囊此心隨分識興亡黑頭為相雖無謂白眼看人亦未妨雲噴石花生劍壁雨敲松子落琴牀清猿幽鳥遙相呌數筆湖山又夕陽湖上初春偶作梅花開盡臘亦盡春暖便如寒食天氣色半歸湖岸栁人家多上郭門船文禽相並映芳草翠㶑欲生浮嫩烟幾處酒旗山影下細風時巳弄繁絃西湖春日爭得才如杜牧之試來湖上輒題詩春烟寺院敲齋鼔夕照樓臺卓酒旗濃吐雜芳薰巘崿濕飛雙翠破漣漪人間幸有蓑兼笠且上漁舟作釣師小園春日草烟橫碧露華㣲乘興春園懶欲歸聚散有情輸蛺蝶淺深無色比薔薇浮名莫惜千鍾貴急景須防百嵗稀一事不堪身衣褐且偷閒眼看芳菲夏日池上蓮香如綺細濛濛翡翠窺魚䙚水葓卷箔未生單簟月凭闌初過一襟風橫欹片石安琴薦獨倚新篁看鶴籠沈李凍醪無寄與可憐瀟灑興誰同西巖夏日蕙帳蕭閒掩敝廬子真巖石坐來初為驚野鳥巢間乳懶過鄰僧竹裡居新溜迸凉侵靜語晚雲浮潤上殘書何煩彊捉白團扇一柄青松自有餘秋日湖西晚歸舟中書事水痕秋落蟹螯肥閒過黃公酒舍歸魚覺船行沈草岸犬聞人語出柴扉蒼山半帶寒烟重丹葉疎分夕照㣲卻憶清谿謝太傅當時未解惜蓑衣深居雜興五首四壁垣衣釣具腥巳甘衡泌號沈㝠伶倫近日無侯白奴僕當時有衛青花月病懐看酒譜雲蘿幽信寄茶經茅君使者清閒甚獨理叢毛向户庭冉冉秋雲抱嘯臺一丘松竹是閒媒誰聞濟北傳兵略枉說山東出相才樵褐短長披榼膝丹爐髙下疊縣胎三千功行無圭角可望虛皇九錫來松竹封侯尚未尊石為公輔亦云云清華自合論閒客𤣥黙何妨事靜君鶴料免慚尸厚祿茶功兼儗策元勲幽人不作山中相且擁圖書卧白雲湖上山林畫不如霜天時候屬園廬梯斜晩樹收紅柿筒直寒流得白魚石上琹尊苔㸃淨籬陰鷄犬竹叢疎一闗兼是和雲掩敢道門無卿相車掉臂何妨入隱淪髙賢應總貴全真次山有以稱聲叟魯望兼之傳散人拂水逺天孤榜晚夾村㣲雨一犁春不知圖畫誰名手狀取江湖太古民孤山寺雲峰水樹南朝寺秖隔樷篁作並鄰破殿靜披虀臼古齋房閒試酪奴春白公睡閣幽如畫張祐詩牌妙入神乘興醉來拖木屐翠苔蒼蘚石磷磷西湖混元神巧本無形匠出西湖作畫屏春水淨如僧眼碧晚山濃似佛頭青欒櫨粉堵搖魚影蘭杜烟叢閣鷺翎往往鳴榔與橫笛細風斜雨不堪聴平居遣興有甚餘閒得解嘲髙慵時把几桯敲卑孜晚鳥沈幽語歴刺疎篁露病梢草野交遊披褐見神仙書史㸃朱抄皇朝不是甘逃遁爭奈心嘉許與巢池陽山居數家村店蔟山傍下馬危橋巳夕陽驚鳥忽衝谿靄破暗花閒墮塹風香時間盤泊心猶戀日後尋思興必狂可惜回頭一聲笛酒旗斜曳出疎篁無為軍掩映軍城隔水鄉人烟景物共蒼蒼酒家樓閣搖風斾茶客舟船蔟雨檣殘笛逺砧聞野墅老苔寒檜看僧房狎鷗更有江湖興珍重江頭白一行出泉水驛曉城寒水共蕭蕭濕碧吹青路一條烟靄濃間出山驛林蘿深裏過溪橋閒情謾㑹吟兼畫隱事猶輸釣與樵多謝孤村人落外酒旗風急更相招耿濟口舟行環迴幾合似江干刺眼詩幽盡狀難沙觜半平春晚濕水痕無底照秋寛老霜蒲葦交千刃怕雨鳬鷗著一攢擬就孤峰寄蓑笠舊鄉漁業久凋殘園廬柴闗寒井對蕭辰自愛棲遲近古人閒草徧庭終勝俗好書堆案轉甘貧橋邊野水通漁路籬外青山見寺鄰懶為躬耕詠梁父吾生巳是太平民雪瓦溝如粉疊樓腰髙㑹誰能解酒貂清夾曉林初落索冷和春雨轉飄蕭堪憐雀避來閒地最愛僧衝過短橋獨有閉闗孤隱者一軒貧病在顔瓢春陰似雨非晴意思深宿酲牽引卧春陰苦憐燕子寒相並生怕梨花晚不禁薄薄簾幃欺欲透遙遙歌管壓來沈北園南陌狂無數只有芳菲㑹此心山園小梅三首衆芳搖落􅍦暄妍占盡風情向小園疎影橫斜水清淺暗香浮動月黃昏霜禽欲下先偷眼粉蝶如知合㫁魂幸有㣲吟可相狎不須檀板共金樽剪綃零碎㸃酥乾向背稀稠畫亦難日薄縱甘春至晚霜深應怯夜來寒澄鮮祇共鄰僧惜冷落猶嫌俗客看憶著江南舊行路酒旗斜拂墮吟鞍吟懐長恨負芳時為見梅花輒入詩雪後園林纔半樹水邊籬落忽橫枝人憐紅艷多應俗天與清香似有私堪笑羌鄉亦風味解將聲調角中吹蝶細睂雙聳敵秋毫冉冉芳園日幾遭清宿露花應自得暖爭風絮欲相髙情人没後魂猶在傲吏齊來夢亦勞閒掩遺編苦堪恨不并香草入離騷送范希文寺丞林中蕭寂款吾廬亹亹猶欣接緒餘去櫂看當辨江樹離尊聊為摘園蔬馬卿才大常能賦梅福官卑數上書黼座垂精正求治何時條對召公車送馬程知江州惪安酒酣無復耿離腸一路之官盡水鄉公廨寒生對廬阜客帆風定泊潯陽陂涵洲渚初收潦露浥兼葭未作霜到日何人先刺謁二林開士在琹堂寄宣城宗言姪春水涵波綠渺瀰江南芳草又離離謝家元住青山郭郤氏近攀丹桂枝衣下香囊非爾好牀頭詩卷媿吾癡中林獨處仍多病蚤晚能來慰所思寄太白李山人顔如童子髪如黳卜築深當太白西身上只衣麤直裰馬前長帶古偏提鵾鵬懶擊三千水龍虎閒封六乙泥幾度枕肱人跡外半牕松雪論天倪歴陽寄金陵衍上人蘚暈莎樷古石旁寺和松竹背秋岡騷吟未㫁雲生壑梵偈重開月照香五老舊遊應悄黙六朝閒事肯悲凉西州獨客心搖甚抹碧江天鳥一行寄題歴陽馬文仲水軒占得幽居近郭西水軒風景獨難齊烟含晚樹人家逺雨濕春風燕子低紅燭酒醒多聚㑹粉牋詩敵幾招攜旅遊今日堪搔首搖落山城困馬蹄暮春寄懐曹南通守任寺丞跌蕩情懐毎事同十年曹社醉春風彈弓園圃陰森下碁子㕔堂寂靜中赤脚我猶無一婢黒頭君合作三公江湖今日還勞結目送歸飛㸃㸃鴻和陳湜贈希社師瘦靠闌干撘梵襟綠荷堦面雨花深迢迢海寺浮杯興杳杳秋空放鶴心齋磬冷搖松吹雜定燈孤坐竹風侵鏘然更有金書偈秖許神龍聽靜吟集賢李建中工部嘗以七言長韻見寄感存懐殁因用追和清絶門牆冷似氷野人懐刺昔曽登新題對雨分蕭寺舊夢經秋說杜陵貧典郡符資月給老持臺憲減秋稜開元文字鍾王筆惆悵臨風一燼燈讀王黃州詩集坐吟行看對清秋懶架仍移近枕頭放達有唐惟白傅縱橫吾宋是黃州左遷商嶺題無數三入承明筆未休紅藥紫薇足千古又添揚子伴牢愁孤山隱居書壁山水未深猿鳥少此生猶擬别移居直過天竺溪流上獨樹為橋小結廬池上作蔟蔟菰蒲映蓼花水痕天影蘸秋霞分明似箇屏風上飛起鵁鶄一道斜葑田淤泥肥黑稻秧青濶葢清流旋旋生擬倩湖君書版籍水仙今佃老農耕山中寒食氣象纔過一百五且持春酒養衰年中林不是不禁火其奈山櫻發欲然秋江寫望蒼茫沙觜鷺鷥眠片水無痕浸碧天最愛蘆花經雨後一篷烟火飯漁船詠諸葛退筆神功雖缺力終存架琢珊瑚欠策勛日暮閒牕何所似灞陵憔悴故將軍答潘司理庭柯雪壓已如春乘興山陰亦少人岑寂園廬何所對酒中賢聖藥君臣即席送江夏茂才與君未别且酣飲别後令人空倚樓一㸃風帆若為望海門平濶鷺濤秋貍奴纎鈎時得小溪魚飽卧花陰興有餘自是䑕嫌貧不到莫慚尸素在吾廬自作壽堂因書一絶以誌之湖上青山對結廬墳前秋色亦蕭疎茂陵他日求遺稿猶喜曽無封禪書宋元詩㑹卷六
