body:
  text: 宋元詩㑹卷十五兵部主事陳焯編王琪字君玉珪之從兄也起進士調江都主簿上時務十二事仁宗嘉之除館閣校勘集賢校理出通判舒州知復州累遷知制誥以使朔方感疾道還謫團練副使久之加龍圖閣待制知潤州徙江寜歴鄧州揚州入判太常寺出知杭州以禮部侍郎致仕年七十二秋日白鷺亭向夕風晦有作白鷺敞西軒檐宇窮爽塏千峰若聯環翠色不可解是時天雨曠六幕無纎靄金斗熨秋江素練横衣帶乾坤清且歛氣象朝昏改蘆花作雪風飛舞來滄海九霄汀鷺起萬里檣烏快月上三山頭鳥没横塘外滄茫洲渚寒銀錯星斗大開樽屏絲竹披襟向簫籟余生本江湖偃蹇欣所㑹清興雖自發苦嗜亦吾累魚龍憑夜濤四面忽滂湃安得犀燈然煌煌發水怪呉中曉寒曲大澤穹天莽同色碧瓦閶門曉花白石巖左右斷行人洞庭一夜冰千尺曾持使節龍沙壘北風如刀割人耳知憐凍足苦霜催一生不向邊庭履憑誰贈我紫綺裘中呉風土清且柔令嚴氣正天地肅長歌白苧臨寒流玉蘭酒熟金醅溢大白連雲尚缺克書牕半掩晝始開幾日紅梅斷消息清輝殿觀唐明皇山水石字歌皇家四葉恢聖功天臨日燭清寰中漢條静治洽柔教老心稽古開神聰有唐英主稱好文仙毫灑落驅風雲壯哉山水有竒字煥乎八法存翠珉自從棄置咸陽道蘚駮煙滋委宫草天開神贊㑹休辰甄收再作皇居寶如何淪廢三百春迎逢睿鑒來紫宸奎鈎粲粲光華動羣玉森森氣象新丹籞春妍瑞靄深文梁藻井結芳林鴻翔鳳翥徑方丈杯流泉涌䝉親臨鯫臣榮幸從金輿袖拂魂驚拭目初多慙攬筆非青鏤唯慶千齡際帝圖九曲池越調隋家曲當年亦九成哀音已亡國廢沼尚留名儀鳳終沈影鳴蛙祗沸聲凄凉不可問落日背蕪城金陵賞心亭千里秦淮在玉壺江山清麗壯呉都昔人已化遼天鶴舊畫難㝷卧雪圖冉冉流年去京國蕭蕭華髮老江湖殘蟬不㑹登臨意又噪西風入座隅答永叔問月斑斑疎雨寒無定皎皎圓蟾望欲闌應在浮雲最深處更憑絲竹一催看按石林詩話晏元獻守南都王君玉時為僉判中秋夕隂晦無月欲張醼未果君玉作詩呈元獻曰只在浮雲最深處試憑絃管一吹開公從枕上得詩大喜急索衣起召客治具笙歌甫作雲散月出遂同參佐劇飲為達旦之歡豈即移用此句耶張先字子野呉興人天聖八年進士詩人張維子也少以樂府馳名其詞有雲破月來花弄影浮萍斷處見山影隔牆送過鞦韆影為平生最得意句當時號曰三影尚書年八十餘尚蓄聲伎蘇東坡嘗作詩戲之野按同時又有一張先亦字子已附辨於維詩之後巢烏烏啼東南林危巢雛五六心在安巢枝一日千往復脱網得羣食入口不入腹窮生俾反哺豈能報成育題花下無相院西溪積水涵虚上下清幾家門静岸痕平浮萍破處見山影小艇歸時聞草聲入郭僧㝷塵裏去過橋人似鑑中行已憑輭語添秋色莫放修蘆礙目生潤州甘露寺丞相高齋半草萊舊時風月滿亭臺地從日月生時見眼到江山盡處回三國是非春夢斷六朝城闕野花開心隨潮水漫漫去流徧煙村半日來呉江春後銀魚霜下鱸遠人曾到合思呉欲圖江色不上筆静覔鳥聲深在蘆落日未昏聞市散青天都浄見山孤牆南水漲虹垂影清夜燈光照太湖贈妓兜娘十載芳洲撫白蘋移舟弄水賞青春當時自倚青春力不信東風解誤人蘓舜欽字子美叅知政事易簡之孫狀貎竒怪少有大志天聖中文體卑弱仍五代舊習獨舜欽與河南穆修好為古文時賢多從之逰初用䕃補太廟齋郎調榮陽縣尉㝷舉進士改光禄寺主簿歴大理評事監在京店宅務范仲淹薦其才召為集賢校理監進奏院是時杜衍與仲淹富弼在政府引用正人多所更張中丞王拱辰等頗嫉之而舜欽杜衍壻也㑹進奏院祠神舜欽與同官鬻故紙以公錢置讌㑹拱辰㢘得之諷其屬魚周詢核奏意在揺動衍等事下開封府核治於是舜欽與同㑹十餘人皆落職舜欽放廢寓呉中後得湖州長史卒感興三首後寢藏衣冠前廟宅神主吾聞諸禮經此制出中古秦嬴食先法乃復祭於墓漢衣以月逰於道葢無取宣帝尊祖廟失制徧九土孝元酌前文一旦悉除去魏帝樂銅臺遺令置歌舞昬嗣竟從之此事狂夫阻唐制益紛華諸陵銷嬪御曠女日哀吟於先亦奚補吾朝三聖人乗雲不可睹威靈已霄漢嗣皇念宗祖繪事移天光刻象肖神武徧勑舊逰地輸材起宫宇階墄釦以金牆壁衣之黼功既即奉迎法仗疊簫鼓玩好擇珍竒目奪不可數三京佛老家已有十數處朝家雖奉先越禮古不許君不祭臣僕父不祭支庶丹楹豈非孝聖貶甚蕭斧大祀當以時寢廟即其所惜哉共儉徳乃為侈所盬痛乎神聖姿遂與缺為侣蒼生何其愚瞻歎走旁午賤子私自嗟傷時淚如雨昔在帝舜日光宅闢四門所貴無凶邪徳教日益敦末世多濫姦九重嚴大閽扞掫主譏察誰何辨語言一闗百力士列名甃石溫設官按尺籍唱號於宋昏唐末稍懈怠嘗値外使奔京城凶豪兒奮劒闖帝藩狂呼嘯虎豹便欲傾乾坤頼有宰相在不然神器翻我朝講制度門籍反不存近知賤丈夫突入犯赤軒陛官未暇執呶呶何其喧祖宗創業難愼重在後昆勇夫猶重閉况乃天子尊何羅猶宜察况乃外宼屯興語一及此舌出反自捫吾家本寒微世受朝廷恩欲奏䲭鴞詩當塗誰薦論瞽説聖所擇愚謀帝不罪况乎言有文白黑時利害前日林書生自謂胸臆大潛心摭世病䇿成謂可賣投顙觸諫函獻言何耿介云昨見凶星上帝下警戒意若曰昏㭬出處恣蜂蠆安坐弄神器開門納珍賄宗支若繋囚親親禮日殺大臣尸其柄咋舌希龍拜速速伐虎叢無使自沈瘵陛下幸察之聰明即不壞如忽賤臣言不瞬防禍敗一封朝飛入羣目已眦睚力夫暮塞門執縛不容喟十手捽其胡如負殺人債幽居死牢中繋灼若龜蔡亦既下風指黥面播諸海長塗萬餘里一錢不得帶必令朝夕閒渴饑死於械從前有口者縮脰氣如憊獨夫已去除易若吹糠稗奈何上帝明非徳不可葢倐忽未十旬炎官下其怪乙夜紫禁中一燎不存芥天王下牀走倉猝畏挂礙連延舊寢廷頓失若空塞明朝黄紙出大赦徧中外嗟乎林書生生命不可再翻令凶惡囚纍纍受恩貸林書生頼此詩以存又逸其名愈足悲矣興慶池餘潤漲龍渠疏溜連清滻助曉遠昏山浮秋明刮眼漁歸别浦閒雁下滄波晚岸北有高臺離魂蕩無限蜀士蜀國天下險竒怪生中間有士賈其姓抱才東入闗獻䇿叩諫鼓其言蔚可觀願以微賤軀一得至上前掉舌滅西宼畫地收幽燕且云太平久兵戰無人言臣嘗學其法自集數百篇治亂與成敗密然不可刪三獻輒罷去志屈心悲酸將相門户深欲往復見攔負販冐日熱引重衝雪寒羈苦輦轂下以圖晨夕餐如此三嵗餘夜夜抱膝歎義者或賑給遂復歸巴川嗟乎區宇大此徒亦已繁城市與巖穴隠黙孰辨㫋幸得出自鬻何惜置末班吾相柄天下處事當機先古之設爵位葢欲英雄纒次第立名級不使智慮閒稍有才器者必以禄仕牽所患在不出既出那棄捐放蛟入大水驅虎還深山失一故無害其類莫可攀獵狐篇老狐宅城隅涵養體豐大不知窟穴處草木但奄藹秋食承露禾夏飲灌園派暮夜出旁舍雞畜遭横害晚登埤堄鳴呼吸召百怪或為嬰兒啼或變艷婦態不知幾十年出處頗安㤗古語比社䑕葢亦有恃頼邑中年少兒耽獵若沈瘵遠郊盡雉兎近水殱鱗介養犬號青鶻逐獸馳不再勇聞此老狐取必將自快縱犬索幽邃張人作疆界兹時頗窘急迸出赤電駭羣小助嘑嘷奔馳數顚沛所向不能入有類狼失狽鈎牙咋巨顙髓血相潰沫喘呌遂死矣争觀若期㑹何暇正首丘腥臊滿蓬艾數穴相穿通城堞幾隳壊久此縱凶妖一旦果禍敗皮為榻上藉肉作盤中膾觀此為之吟書以為警戒舟中感懷寄館中諸君時得告之山陽挈家扁舟迎春色東下淮楚鄉側身風波地回首英俊場顧我本俗材百事無一長濫迹入冊府舉動初不皇乍脱泥滓底稍見日月光峻閣鬱前起隠嶙天中央春風花竹明曉雨宫殿凉溢目盡圖史接翼皆鸞凰明牕置刀筆大案羅縑緗文字雖㓜學鈍慵今廢忘不能溫舊習考古評興亡靦顔於其間汗下如流漿徒然日飽食出入隨羣行朝廷此多事亦合彊激昻况有詔書在爛然貼北牆奮舌説利害以救民膏盲不然棄硯席挺身赴邊疆喋血鏖羌氐胷膽森開張彎弓射欃槍躍馬埽大荒功勲入丹青名迹萬世香是亦丈夫事不為䑕子量數事皆不能徒只飽腹腸有如鳬雁兒唼唼守稻粱嵗月今逝矣齒揺髪已蒼於時既無益自合早退藏諸君天下選才業吁異常願當發䇿慮坐使國富强三辰期順軌四海無災殃莫效不肖者所嚮皆荒唐又不耐羞恥但欲歸滄浪濡毫備歌詠仰首看翶翔舟中稍無事思念益以詳恨無一稜田可以足糟糠出處皆未决語黙兩弗臧莽不知所為大呌欲發狂作詩寄諸君鄙懐實所望依韻和勝之暑飲九夏苦炎烈入伏氣候惡况兹大旱時其酷甚炮烙争得羿復生射此赤日落欲擘青天開騰身出寥廓狂走無處逃坐恐肝腦涸不如以酒澆庶可免焦爍相呼坐僧居頃刻釂百酌佳𤓰判青膚熟李吹絳膜尚嫌味不爽更與冰雪嚼裂耳發浩歌解顔縱善謔逕趨無何鄉回覺萬事錯不知余中虚外冷得所託眞氣潛遁亡半夜忽發霍嘔洩不暫停迸筋走兩脚初如巨繩纒忽似秋蚓躍委頓體不支藜牀為穿鑿君言暑飲佳但得一餉樂艱難逾旬時僅飲數斗藥快意事皆然遺殃愼無作答梅聖俞見贈自嗟處身拙與世常齟齬至於作文章實亦少精趣低摧朝市間所向觸謗怒夫子與衆殊琢飾貺佳句􅟚然紙上動讀畢恐飛去自覺異平居恍惚忘世故逈如出泥塗熏滌失臭汚衣之青霞裾飲以紫蕊露輶軒駕飛黄蹀躞上雲路古貴知者希流俗豈足顧雅言雖可珍三復未敢賦退慙百不堪尚恐君悔誤頂破二山詩北邑有頂山下潛子母虬其子去為雨以救鄉人憂前擘穹峰開化出百丈湫後因號破山致祠獻庶羞嵗來省其母風雹六月秋烟雲騰踏去不復經月留邑民頼其靈雖旱嵗有收因成兩佛宇幽邃稱勝逰磵前走鸞車松柱擁石樓夜堂人噤滲隂壁風颼颼近年返暴雨頗亦傷田疇老農務祈禱梵唄日不休常為釋徒利乃作生民讐嗚呼二虬者其説何悠悠中秋夜呉江亭上對月懐前宰張子野及寄君謨蔡大獨坐對月心悠悠故人不見使我愁古今共傳惜今夕况在松江亭上頭可憐節物㑹人意十日隂雨此夜收不惟人間重此月天亦有意於中秋長空無瑕露表裏拂拂漸上寒光流江平萬頃正碧色上下清澈雙璧浮自視直欲見筋脉無所逃遁魚龍憂不疑身世在地上祗恐查去觸斗牛景清境勝反不足歎息此地無交游心魂冷烈曉不寢勉為筆此傳中州城南歸値大風雪一夜大雪風喧豗未明跨馬城南回四方迷惑共一色揮鞭欲進還徘徊舊時崖谷不復見縱有直道令人猜低頭搶朔風兩眼不肻開時時偷看問南北但見白羽之箭紛紛來既以脂粉傅我面乂以珠玉綴我顋天公似憐我貌古巧意裝㸃使莫偕欲令學此兒女態免使埋没隨灰埃據鞍照水失舊惡容質潔白如嬰孩雖然外飾得暫好自覺面目如刀裁不知胷中肝膽挂鐵石安能柔輭隨良媒世人飾詐我尚笑今乃復見天公乖應時降雪故大好愼勿改易吾形骸依韻和伯鎭中秋見月九日遇雨之作衆皆愛春發枯荄我知惟動兒女懐天地昏酣醉夢裏人有爽思皆沈埋豈如秋風勁利劇刀劍刮破天膜清光開衰根危蒂埽除盡辨别松竹并蒿萊青娥供霜洗夜月兼以皓露驅纖埃當年此夕或隂晦今嵗澄澈特快哉是時呼賔賞此景漸見照我白玉杯清輝向人若有意經歴牕户猶徘徊放歌狂飲不知曉爛熳酌客山嶽頽時節飄流晦朔轉已覺九日來相催北軒隙地破蒼蘚帶花移得黄金栽倒冠露頂坐狂客擷香咀蕊浮新醅最憐小雨灑疎竹爽籟颯颯吹醉顋君時傳詩頗精麗意苦泥淖不得來開緘文采自飛動欲和但愧頑無才久之黽勉强為答嫌春愛秋眞可咍永叔石月屏圖日月行上天下照萬物根向之生榮背則死故為萬物生死門東西兩交征晝夜不暫停胡為虢山石留此皎月痕常存桂樹散疎隂有若圖畫成永叔得之不得曉作歌使我窮其原且疑月入此石中分此兩曜三處明或云蟾兎好溪山逃遁出月不可闗浮波穴石恣所樂嫦娥孤坐初不覺玉杵夜無聲無物來擣藥嫦娥驚推輪下天自㝷捉遶地掀江踏山岳二物驚奔不復見留此玉輪之迹在青壁風雨不可剥此説亦詭異予知未精確物有無情自相感不間幽微與高邈老蚌向月月降胎海犀望星星入角彤霞爍石變靈砂白虹貫巖生美璞此乃西山石久為月照著嵗久光不滅遂有團團月寒輝籠籠出輕霧坐對不復嗟殘缺蝦蟇縱汝惡觜吻可能食此清光没玉川子若在見必喜不徹此雖隠石中時有靈光發土怪山鬼不敢近照之僵仆肝膽裂有如君上明下燭萬類無遁形光艷百世無􅉻盈田家詞南風霏霏麥花落豆田漠漠初垂角山邊夜半一犂雨田父高歌待收穫雨多蕭蕭蠶簇寒蠶婦低眉憂繭單人生多求復多怨天公供爾良獨難和石曼卿明河詠八月銀河好天高夜自明樓臺通逈意風露得餘清幾為浮雲亂都宜小雨晴離人彊回首耿耿邈無情静勝堂夏日呈王尉虚堂吏事稀吟卧欲忘機牕静蜂迷出簾輕燕誤飛煩心傾晚簟倦體快風衣更想霜雲外同君看翠微黎生下第還鄉人云之子賢文采出巴川失意聲名在還家嵗月遷離懐春色裏歸路夕陽邊無廢青箱學窮愁古亦然和解生中秋月不為人間意居然節物清銀堂通夜白金餅隔林明醉客樽前倒棲烏露下驚悲歡古今事寂寂墮荒城獨游輞川行穿翠靄中絶磵落疎鐘數里踏亂石一川環碧峰暗林麋養角當路虎留蹤隠逸何曾見孤吟對古松望秦陵雄心雖葢世竟亦棄羣臣役重傾天下時危啟聖人石麟空舉首銀海罷流春隴闕今無復應深行路塵晚出潤州東門京口古雄處昔年嘗此過風流看石獸人事共江波河轉路疑盡日斜山更多城樓鬱天半回首恣吟哦離京後作春風柰别何一櫂逐驚波去國丹心折流年白髪多脱身離網罟含笑入煙蘿窮達皆常事難忘對酒歌淮亭小飲山氣復清淮亭臨亂石開旅愁無處避春色為誰來酒頼啼鶯送歌隨去雁哀相攜聊一醉休使壯心摧過泗水五年六經此仰首歎勞生山是往時色人皆今日情機心去國少塵眼向淮明物理吾俱曉漂流安足驚秋雨隂風攪林壑驟雨到江湖白日不覺没繁雲何處無樓吟凉筆硯溪夢亂菰蒲聞説金華甚汚泥入敝廬詩僧則暉求詩全呉氣象豪詩思各翹翹風雅久零落江山應寂寥㑹將趨古澹先可去浮囂好約長吟處霜天看怒潮游洛中舊内洛陽宫闕鬱嵯峨千古榮華逐逝波别殿秋高風淅瀝後園春老樹婆娑露凝碧瓦寒光滿日轉觚稜暖艷多早晚金輿此㳺幸鳳樓前後看山河送家静及第後赴官清水幾年塵土客京華一日春乗犯斗槎夢好夜歸全蜀道眼明朝宴上林花白頭佐邑非為晚藍綬還鄉亦可誇况有雄圖看悟主莫傷孤宦向天涯宿太平宫驅車長道久塵勞一宿清宫醒骨毛古檜有風天自籟石壇多露鶴争嘷星河耿耿秋還逈樓觀澄澄夜更高吟對疎鐘俗機盡已疑身世屬仙曹春暮初晴自御宿川之華嚴寺春暮曾無屬物心野行聊得據鞍吟路經廢苑情通古水遶蒼山意共深殘日花間浮暖艷斷雲樓外卷輕隂騷人自昔傷鶗鴂休向風前送好音望太湖杳杳波濤閲古今四無邊際莫知深潤通曉月為清露氣入霜天作暝隂笠澤鱸肥人膾玉洞庭柑熟客分金風煙觸目相招引聊為停橈一楚吟松江長橋未明觀漁曙光東向欲朧明漁艇縱横映遠汀濤面白煙昏落月嶺頭殘燒混疎星鳴榔莫觸蛟龍睡舉網時聞魚鼈腥我實宦游無况者擬來隨爾帶笭箵夀陽閒望有感維舟亭下偶登臨下蔡風流古至今遠嶺抱淮隨曲折亂雲行野乍晴隂幽人憔悴搔白首啼鳥哀鳴思故林觸處塗窮何足慟直回天地入悲吟春睡别院簾昏掩竹扉朝酲未解接春暉身如蟬蜕一榻上夢似楊花千里飛㗳爾暫能離世網陶然直欲見天機此中有徳堪為頌絶勝人間較是非中秋松江新橋對月和柳令之作月晃長江上下同畫橋横絶冷光中雲頭豔豔開金餅水面沈沈卧綵虹佛氏解為銀色界仙家多在玉華宫地雄景勝言不盡但欲追隨乘曉風和彦猷晚宴明月樓二篇溪聲來從一氣外樓角揷在蒼霞中艷歌横飛送落日哀筝自響吹霜風低昂黛色四山黯凌亂纈紋疎樹紅憑欄揮手問世俗何人得到蟾蜍宫向晚天邊燕席開溪山相照絶纖埃緑楊有意簷前舞凉月多情海上來香穗縈斜凝畫閣酒鱗環合起金罍自疑身是乘槎客泛徹銀河却欲回秋宿虎丘寺數夕執中以詩見貺因次原韻生事飄然付一舟呉山蕭寺且淹留白雲已有終身約醁酒聊驅萬古愁峽束蒼淵深貯月巗排紅樹巧裝秋裴回欲出向城市引領煙蘿還自羞晚泊龜山南灣晚泊一裴回小徑山間佛寺開石勢向人森劒㦸灘光和月㵼瓊瑰每傷道路銷時序但屈心情入酒杯夜籟不喧羣動息長吟聊以寄餘哀滄浪静吟獨遶虚亭步石矼静中情味世無雙山蟬帶響穿疎户野蔓盤青入破牕二子逢時猶死餓三閭遭逐便沈江我今飽食高眠外唯恨澄醪不滿缸丹陽子高得逸少瘞鶴銘於焦山之下及梁唐諸賢四石刻共作一亭以寶墨名之集賢伯鎮為之作記遠來求詩因作長句以寄山隂不見換鵝經京口今存瘞鶴銘瀟灑集賢來作記風流太守為開亭兩篇玉蕊塵初滌四體銀鈎蘚尚青我久臨池無所得願觀遺法快沈㝠闗都官孤山四照閣勢壓蒼崖險可驚攀雲半日到軒楹旁觀竹樹回環翠下視湖山表裏清漸覺愁隨煙霧散只疑身有羽翰生他年君掛朱幡後蠟屐笻枝伴此行清軒誰鑿幽軒刮眼清湖中嘉處更禪扃龍聽夜講寒生席鷗伴晨齋暖戲庭水月澄明應作觀雲山濃淡自開屏我公亦為留竒句此地人間合有靈某為世所棄困居于蘇平生交游過門不顧長安侍讀葉文不以秦呉之遠高下之隔閔此窮悴特貺以詩然韻險句竒不可攀續仰酬高誼彊抉蕪音公鎮西都擁劇權遠嗟窮苦寄新篇氣雄逈出闗河外句險空驚魚鳥前玉帳夜嚴兵似水茅齋春静草如煙才愚榮悴皆殊絶自笑相酬更斐然寄題趙叔平嘉樹亭嘉樹名亭古意同拂簷圍砌更青葱午隂閒淡茶煙外曉韻蕭疎睡雨中開户常時對君子遶軒終日是清風盤根得地年年盛豈學春林一餉紅秋夕懷南中故人向夕依欄念昔逰蕭條節物更他州池光不動天深碧月色無情人獨愁千里江山幽信絶一塲風露敗荷秋征鴻急急知何事斷續哀鳴過不休聞京尹范希文謫鄱陽尹十二師魯以黨人貶郢中歐陽九永叔移書責諫官不論救而謫夷陵令因成此詩以寄且寛其遠邁也朝野蔚多士褎然良可羞伊人秉直節許國有深謀大議揺巖石危言犯采旒蒼黄出京府憔悴謫南州引黨俄嗟尹移書遽竄歐安慙言得罪要避曲如鈎郢路幾束馬荆川還泝舟傷心衆山集舉目大江流遠動家公念師魯父作牧於東川深貽夀母憂永叔有母埀老横身罹禍難當路積仇讐衛上寧無術亢宗非所優吾君思正士莫賦畔牢愁秋懐年華冉冉催人老風物蕭蕭又變秋家在鳳凰城闕下江山何事苦相留初晴遊滄浪亭夜雨連明春水生嬌雲濃暖弄微晴簾虚日薄花竹静時有乳鳩相對鳴冬日偶書謾走聲名三十年亦曾文采動君前玉顔皓齒他人樂獨守殘燈理斷編小酌寒雀喧喧滿竹枝驚風淅瀝玉花飛霜柑糖蟹新醅美醉覺人生萬事非江休復字鄰幾陳留人少彊學為文淳雅尤善于詩進士起家為藍山尉騎驢之官每據鞍讀書致迷失道家人求得之舉書判拔萃改大理寺丞判尚書刑部坐與蘇舜欽祠神㑹落職稍起知奉符縣累遷至尚書刑部郎中卒有文集二十卷秋懐西風萬里至曠然天地秋暮雨生夕凉百蟲鳴啾啾楚山曉蒼蒼楚水亦悠悠騷人試登臨感物增離憂所思在遐方欲往路阻修香草有蕙茞嘉樹有梧楸白露委芳馨彫零使我愁窮年倦羈窘江湖思舊逰紉蘭製芰荷飄泛一葉舟肆情雲水間意適何所求同持國宿太學官舍翳翳雲月薄冷冷雪風清學省夜岑寂天街斷人行廣庭層閣隂㝷廊歩餘明松篠遞遥響如聞絃誦聲悠悠子佩詩講坐塵埃生廻就直舍休亹亹談道精心㑹境物融泯然遺世營寒眠屢展轉寤言冩素誠牟駞岡閲馬牧馬散近坰閲視乘高秋駞岡似沙苑堆峊帶川洲坡陁故梁城縈薄西南陬連棚映林樾星羅倚層丘回風吹陣雲奔騰歘來㳺野性脱羈馽飲齕遂所求腹幹頗肥張鬱怒何彪休羣敺驟麋鹿逸勢凌蛟虬軍戎選輕㨗和鑾御調柔毛物有千名衆美歸驊騮梁王愁思臺佛刹居上頭朅來一憑眺遺墟莽悠悠信陵骨已朽巖穴誰見收當時英豪軰事逐東波流置酒臨風軒聊以紓煩憂宋元詩㑹卷十五
