body:
  text: 宋元詩㑹卷九兵部主事陳焯編邵雍字堯夫其先范陽人徙共城年二十遊河南葬其親伊水上遂為河南人雍少時自雄其才欲樹功名于書無所不讀長而涉厯四方久之幡然來歸曰道在是矣事共城令李之才受河圖洛書及六十四卦圖象妙悟神契洞澈藴奥及其學益老德益邵玩心髙明以觀天地之運化觸類深通著書十萬言囊括三才夐絶今古河南程顥聞其論議退而歎曰内聖外王之業也雍知慮過人遇事能前知伊川曰其心虚明自能知之當時學者髙其所為謂于凡物聲氣之所感輒能推動極變于是摭事之已然者皆以雍言先之雍盖未必爾也嘉祐中舉逸士屢授職皆不之官卒年六十七贈祕書省著作郎賜諡康節先生鳳州郡樓上書所見楊柳垂青青風動如飛盖危樓思不窮盡日閒相對鳥去林自空雲移山不礙畫角時斷續層崖遞明晦殘陽挂雙虹逺水生㣲瀨久客屬東望意與孤鴻㑹天津幽居予家洛城裏况復在天津日近先知曉天低易得春時光優化國景物厚幽人自可輕軒冕閒中老此身閒吟平生雖不仕隨分亦風波所損無紀極曰歸仍蹉跎既乖經世志尚可全天和樽中時有酒且飲行復歌秋懐二首晴牕日初曛幽庭雨乍洗紅藥靜自披緑竹閒相倚榮利浮若雲懷情淡如水身非天外人意從天外起斷續蟬聲外稀疎雁影前年光空逝矣人事亦蕭然洗竹留新筍翻書得舊編誰知養心者肯與世爭權秋夜浮雲一消散星斗燦長天碧蘚墜丹果清香生白蓮體凉猶衣葛耳靜已無蟬坐久羣動息秋空惟寂然和張二少卿丈白菊籬下曉凝霜疎枝殿顥商自知能潔白誰念獨芬芳豈為瓊無艶還驚雪有香素英浮玉液一色混瑶觴登朝元閣繡嶺岌層巒岧嶤十九盤霏㣲輕雨後杳靄出雲端徃事金輿邈遺踪玉像殘至今臨渭水依舊見長安閒行園圃正蕭然行吟遶澤邊風驚初社後葉墜未霜前衰草襯斜日暮雲扶逺天何當溯真趣止可入無言天津閒步天子舊神州蔥蔥氣象浮園林閒近水殿閣逺横秋浪雪暑猶在橋虹晴不收人間無事日此地好淹留依韻和王不疑少卿招飲經難憶浮丘吾鄕足勝遊風前驚白髮雨後快新秋仕宦情雖薄登臨興未休人間憂喜事都不到心頭小圃逢春隨分亭欄亦弄妍不妨閒傍酒罏邊夜簷靜透花間月晝户晴生竹外烟事到悟來同偶爾天教間去豈徒然壺中日月長多少爛占風光十二年芳草短吟花間水畔緑如茵興廢曽經漢與秦占斷山川無限地愁傷今古幾何人嚴霜殺盡還逢雨野火燒殘又遇春不那路傍多此物王孫歸去苦迷津謝富丞相招出仕欲遂終焉閒老計未知天意果如何幾重軒冕酬身貴得似雲山到眼多好景未嘗無嘯詠壯心都已入消磨鵷鴻自有江湖樂安用區區設網羅秋遊七月芙蕖正爛開東南園近日徘徊有時風向池心過無限香從水面來罨畫溪深方誤入洞庭湖晚未成迴坐來一霎蕭蕭雨又送清凉到酒盃後園即事太平身老復何憂景愛家園自在遊幾樹緑楊隂乍合數聲幽鳥語方休竹侵舊徑髙低迸水滿春渠左右流借問主人何所樂答云殊不異封侯春遊洛陽春色浩無涯况此城東景復嘉風力緩揺千樹柳烟光輕盪半川花天晴翡翠飛平岸日暖鴛鴦下淺沙不見君王西幸久遊人但感鬢空華十四日留題福昌縣宇之東軒洛川秋入景猶嘉㣲雨初過徑路斜水竹洞中藏縣宇烟嵐塢裏住人家霜餘紅間千重葉天外晴排數縷霞溪淺溪深清㶑灔峯髙峯下碧查牙鳥因擇木飛還逺雲為無心去更賖盖世功名多齟齬出羣才業足咨嗟浮生日月仍須惜半老筋骸莫强誇就此巖邊宜築室樂吾真樂趣無涯天津感事自古别都多隙地參天喬木亂昏鴉荒垣壞堵人畊處半是前朝卿相家謝君實端明惠牡丹霜臺何處得竒葩分送天津小隱家初訝山妻忽驚走尋常只慣挿葵花二色桃施朱施粉色俱好傾國傾城艶不同疑是蘂宫雙姊妹一時俱肯嫁春風天津感事鳳樓深處鎖雲烟一鎖雲烟又百年痛惜汾隂西祀後翠華辜負上陽天春日登石閣滿洛城中將相家廣栽桃李作生涯年年二月凭髙處不見人家只見花春暮吟有意楊花空學雪無情榆莢漫堆錢窮愁不服春辜負酒病依還似去年和富公道堂閒話儘多時塵外杯觴不亂飛初上小車人已識醉和風雨夜深歸謝濤陽夏人其父懿文為鹽官令葬富陽遂為富陽人濤以文行稱舉進士為梓州𣙜鹽院判官以平李順論功遷觀察推官知華陽縣改祕書省著作佐郎知興國軍改知曹州進直昭文館累官至太子賓客讀史百年竒特幾張紙千古英雄一窖塵惟有炳然周孔在至今遺澤浸生民司馬池字和中晉安平獻王孚之後其祖有葬安邑者遂為夏縣人舉進士當試殿廷聞母病號痛而歸後中第授永寜主簿由郫縣尉調鄭州防禦判官知光山縣用盛度薦改著作佐郎監安豐酒税徙知小溪縣嵗餘為郡牧判官忤内侍皇甫繼明罷知耀州擢利州轉運使知鳳翔府召知諫院懇辭不拜加直史館復知鳳翔累遷兵部員外郎兼侍御史知雜事出典州郡長子旦次子光行色冷於陂水澹於秋逺陌初窮見渡頭賴得丹青無畫處畫成應遣一生愁陶弼字商翁永州人少俶儻放宕吳中行山間有雙鯉戯溪水上弼竚觀之旁有老父顧曰此龍也行且鬭君當亟去去百步許雷大震而兩岸圯矣丁謂一見妻以宗女因從學兵法慶厯中楊畋討湖南猺弼上謁授之兵使徃襲力破之以功得陽朔主簿儂賊犯南海弼為安撫使參謀累擢知賓容欽三州換崇儀使知邕州綏輯惠養邊境大治徙鼎州辰州轉康州團練使晚知順州弼久於南荒恩威並著終弼之世交人無敢犯邊者加束上閣門使未拜而卒有詩集行世兵器五代乏真主奸雄紛僭偽横磨濶刀劍白日相簒弑我宋皇太祖潛德動天意神物既有歸乃即皇帝位不惠兆民樂不怒諸侯畏顛倒執玉帛奔走恐後至獨有隂山魁時時思畧地天子赫斯怒大警巡澶衞射却大當户遂斷撑犁臂狼心帖然服結好同昆弟卒閒喜夜歌將老貪春睡自此為太平恍逾三十嵗元昊乗我間南馳賀蘭騎陽關久夜開樞朽不可閉陣雲起秦雍殺氣横涇渭使臣股慄奏宰相嗔目議僉曰亟發兵豎子坑甚易倉皇築邊壘未戰力先瘁逼邊開庫兵土蝕鋒鋩脆防秋採舊屯推轂謀新寄舊屯老且死少者無實藝良由不訓練手足迷擊刺新寄將家子從小生富貴六韜未嘗讀口但知肉味師復從中御進退由閽寺權輕號令冗兩戰無遺類曹公棄七軍晉人獲三帥吾兵自此喪有詔新其製此器不預設一旦何從致朝廷急郡縣郡縣急官吏官吏無他術下責蚩蚩輩耕牛拔筋角飛鳥秃翎翅簳截㑹稽空鐵烹堇山悴供億稍後期鞭扑異他罪愁氛擁太虚霽景晝㝠晦我聞郭汾陽料敵多竒異單箠論堅壘羅拜膝雙墜又聞李西平臨戎有英氣身著紅錦袍懐光肝膽碎是知用兵術在人不在器君耳舜髙聽君目舜明視願採謀畧長勿倚干戈鋭送趙樞寺丞宰䖍化縣路入䖍雲去如何輕解攜人烟五嶺北星斗大江西暖雪梅花樹晴雷贛石溪青衫欲無淚不奈鷓鴣啼出嶺題石灰舖馬渡嚴關口生歸喜復嗟天文離卷舌人影背含沙江勢一再曲梅梢三四花登髙休問路雲際是吾家東湖寜越佳山水東湖帶郡城月天髙寺影春雨一橋聲石上清蒲合沙中白鳥横天涯正寥落獨徃若為情西湖寜越佳山水西湖似浙城桂多天竺子潮欠海門聲路向林梢轉天隨野色横從兹棲泊者無復渡江情題霞溪驛全州歌聲野色中人樂嵗時豐暑雨隂陽雜秋田蚤晚同嶺雲無烈日江樹足涼風自指香山語前村有路通登崑崙臺落照古城隅邊風動隼旟久閒忘戰畧多病熟醫書白髮隨年短新情與世疎桃花春水起還釣舊溪魚起一作暖秋日登南城臺江國家書少秋臺寒草生無人來逺渡盡日上髙城落照縣漁市孤烟起戍營東籬故園菊又向酒中傾過思明幾年來瘴外此夜宿溪中照枕殘雞月吹燈落葉風盧循猶偽國楊僕已衰翁起戴寒星去村前燒影紅題陽朔縣舍石壁髙深遶縣衙不離牀袵自烟霞民耕紫芋為朝食僧煑黄精代晚茶瀑布聲中窺案牘女蘿隂裏勸桑麻欲知言偃絃歌化水墨屏風數百家皂閣萬仭天然皂閣形隂陽不似衆山青一區海上神仙宅數曲人間水墨屏華表鶴歸春谷響玉京龍起夜潭腥可憐張葛無人繼三級髙壇拂杳㝠天涯亭雨色絲絲風色驕天涯亭上覺魂銷一家生意付秋瘴萬里歸心隨暮潮兵送逺人還海界吏申遷客入津橋山公對此聊酣飲怕見醒來兩鬢凋對花有感得意欣欣失意悲古今人事若花枝桃紅李白薔薇紫問著春風自不知尹洙字師魯河南人少與兄源俱以文學知名舉進士調正平縣主簿歴知光澤縣改伊陽縣有能名用大臣薦召試為館閣校勘㑹范仲淹貶洙上奏以茍免朋黨為恥落職知康州酒税趙元昊反朝廷以范仲淹韓琦為副安撫使復以洙為判官進集賢校理未幾韓琦知秦州辟洙通判州事上書極言時政得失仁宗嘉納之改太常丞知涇州尋以右司諫知渭州兼領涇原路經畧公事㑹總管鄭戩欲城水洛洙力爭謂不可為戩所中徙慶州董士亷復上書訟洙御史劉湜文致其罪再貶崇信軍節度副使徙監筠州酒税未至而卒年四十七有集二十七卷皇雅十首天監受命也自梁至於周兵難不息宋受命統一萬方焉天監下民亂靡有定甚武且仁祚厥真聖仁實懐徠武以執競匪䖍匪劉拯我大命自昔外禪月經日營令以挾制政以隂傾帝初治兵志勤于征奄受神器匪謀而成淮潞弗䖍卒汙叛迹戎輅戒嚴皇威有赫彼冦詿民吾勇其百殄厥渠魁貸其反側帝朝法宫左右宗公忮夫悍士以雍以容爾居爾室爾工爾農既息既養惟天子功西師征蜀也王用西師岷梁弗賔匪曰負固實交晉人予訓予誓合我將臣正厥有罪無庸傷民矯矯虎士載摧其壁于嗟孟侯亦果其策迎師而降靡抗鋒鏑豈獨身謀完是宗國蜀都既平將臣失律此衆悍驕彼民危慄當塗呌呶合萬為一匪懷則威帝心是恤帝曰將臣予嘉乃庸廢命毒民爾弗有終邦典用疑惟罪惟功靡殛而削協于厥中帝曰孟侯受封于楚斿旂琱戈備物異數俾爾族姻及乃文武服在王庭靡不有序蜀民呼歌天子威靈保我者封暴我者刑匪功是和匪弱是陵天子惠民疇敢不承耆武受俘也命將伐南海平金陵俘二王以獻耆武定功時惟二方淮服其義海南遂荒孰孱而盭孰暴而猖自底不譓乃終滅亡帝戒二俘同即爾誅予惟民無辜休息是圖時其輯矣寜威獨夫帝嗟汙邦久罹于兵或暴下以征或敷虐以刑予命中典協于國經民服德音室家以寜憲古令守臣也削其附庸以强帝室焉帝懷永圖治古是憲四方守臣惟屏惟翰在昔艱難弗惠訓典跨都連城髙牙以建有土有民肆乃征繕以息以容終焉叛渙凡今帥臣狃厥聞見匪革亂原曷清多難帝告庶邦式是典彛元侯顯父戚臣宗支正乃封圻予一人是毗凡曰附城罔爾俾之畜兵厚賦靡爾得私毋凶而國作福作威天子有命疇敢不祗子孫承承唯萬世規大鹵王師討晉罪也冀州之疆粤惟大鹵晉地俗忮而專地扼而固協比幽都蕩揺邊圉三垂既摧兇威弗沮帝御六師百萬貔虎剪其附庸至于城下鋒鏑始交梯衝如舞蠢爾孱王請附降土我士奮揚願究吾武皇帝曰吁念彼黎庶匪鯨匪鯢復為王士晉郊既平九區以寜陳功太廟告假威靈在昔武王于商觀兵惟我藝祖亦勤于征匪貸晉罪俟厥貫盈聖作聖繼巍巍相承皇矣二后功莫與京帝籍修故典也躬耕以勸農焉帝籍于郊典儀具陳務農以訓供祀以勤祀在于誠匪勤于人訓農以實匪訓以文帝謹二物乃躬乃親公侯卿士暨厥庶民千甸有制飭哉惟寅帝賚髙年式宴且喜種種黄髮族丘而議我生艱難暴亂以繼耳狃金鼓目狎戎器皇其我圖親講農事有子有孫力田孝悌鼓舞至仁薰焉如醉庶工任賢也帝咨庶工疇其輔予俊乂以登厥勞乃圖匪忘舊勲非賢勿俞巍巍衮台盛德以居任賢伊何昌言是庸勉告爾猷罔恤廼躬豈無直辭怫于予衷予不爾疵爾無面從始時從官戎容揚揚今帝左右儒冠煌煌朝廷以尊文物典章得人之盛弈世重光帝制北方請盟也帝制萬邦罔有弗賔蠢爾化外羈焉勿臣威格三方稽顙獻珍匪茹革心願交使人帝謀公卿列侯庶校咸曰彼心暴戾隂狡既擾我疆復利吾寶無若勵兵襲其還道皇曰有衆予實念兹戰無必勝矧其歸師借曰大獲疇能盡之益俾餘醜毒吾朔陲乃俞其盟北州以綏在漢世宗抗威速攻暴農算商經用弗充中區震騷漢南始空降及後世猶稱厥功於穆聖考德無與偕匪勤于兵荒服遂來逮是三紀逺俗以懐生民休息嗚呼仁哉皇治恤刑也帝仁於明刑在位者以寛恤為治焉皇底其治欽哉惟刑在疑而宥罔察為明愛怒弗肆孰為重輕母一弗辜惟典之平前世理官倚法以刻匪彼為仇蓋曰任職今之蔽獄務正其辟鑒于前人繄我仁德皇德在仁寖而成風公侯卿士靡不率從麛卵萌生咸保厥終不鄙不夭樂哉融融太平封祀告成功也噫太平無象兮世烏得而知維盛德可迹兮其封祀之儀東岱宗兮西汾脽禮上帝兮賔地祗皇有征兮吾民以嬉皇有祈兮吾民是私天敷佑兮俾皇之釐永世億寜兮無疆之基孫復字明復晉州平陽人舉進士不第退居泰山學春秋著尊王發㣲十二篇年四十不娶宰相李廸知其賢以其弟之子妻之用范仲淹富弼薦除祕省校書郎國子直講出知州縣稍遷殿中丞卒復與胡瑗不合在太學彼此相避瑗治經不如復而教養諸生蓋過之也復弟子石介最知名蠟燭六龍西走入崦嵫寂寂華堂漏轉時一寸丹心如見用便為灰燼亦無辭石介字守道兖州奉符人進士及第厯鄆州南京推官篤學有志尚樂善疾惡遇事敢為丁父母憂耕徂徠山下魯人號徂徠先生入為國子直講作慶厯聖德詩為夏竦所深恨出判濮州未赴卒幾有斵棺之禍頼諸大臣保䕶得免慶厯聖德頌於維慶厯三年三月皇帝龍興徐出闈闥晨坐太極晝開閶闔躬攬賢英手鋤姦枿大聲渢渢震揺六合如乾之動如雷之發昆蟲躑躅妖怪藏滅同明道初天地嘉吉初聞皇帝蹙然言曰予父予祖付予大業予恐失墜實頼輔弼汝得象殊重慎㣲宻君相予久予嘉君伐君仍相予笙鏞斯協昌朝儒者學聞皆洽與予論政傅以經術汝貳二相庶績咸秩惟汝仲淹汝誠予察太后乗勢湯沸水熱汝時小臣危言嶪嶪為予司諫正予門闑為予京兆堲予讒説賊叛于夏徃予式遏六月酷日大冬積雪汝暑汝寒同於士卒予聞辛酸汝不告乏予晩得弼予心慰悦弼每見予無有私謁以道輔予弼言深切予不堯舜弼自笞罰諫官一年奏疏滿篋侍從週嵗忠力盡竭北丹亡義檮杌饕餮敢侮大國其辭慢悖弼將予命不畏不懾卒復舊好民得食褐沙磧萬里死生一節視弼之膚霜剥風裂觀弼之心鍊金煆鐵寵名大官以酬勞渴弼辭不受其志莫奪惟仲淹弼一䕫一契天實賚予予其敢忽並來弼予民無瘥札曰衍汝來汝予黄髮事予二紀毛秃齒豁心如一兮率履弗越遂長樞府兵政無蹶予蚤識琦琦有竒骨其器魁礨豈視扂楔其人渾璞不施剞劂可屬大事敦厚如勃琦汝副衍知人予哲惟修惟靖立朝讞讞言論磥砢忠誠特達禄㣲身賤其志不怯嘗詆大臣亟遭貶黜萬里歸來剛氣不折屢進直言以補予闕素相之後含忠履潔昔為御史幾叩予榻至今諫疏在于箱匣襄雖小臣名聞于徹亦嘗獻言箴予之失剛守粹慤與修儔匹並為諫官正色在列予過汝言無鉗汝舌皇帝明聖忠邪辨别舉擢俊良掃除妖魃衆賢之進如茅斯㧞大姦之去如距斯脱上倚輔弼司予調燮下賴諫諍維予紀法左右正人無有邪孽予望太平日不逾浹皇帝嗣位二十二年神武不殺其黙如淵聖人不測其動以天賞罰在予不失其權恭已南面退姦進賢知賢不易非明不得去邪惟艱惟斷乃克明則不貳斷則不惑既明且斷惟皇之德羣下踧踖重足屏息交相告語曰惟正直毋作側僻皇帝汝殛諸侯危慄墮玉失舄交相告語皇帝神明四時朝覲謹修臣職逺人走馬墜鐙遺䇿交相告語皇帝神武解兵修貢永為屬國皇帝一舉羣臣懾焉諸侯畏焉遐荒服焉臣願陛下夀萬千年汴渠隋帝荒宴遊厚地刳為溝萬舸東南行四海困横流義旗舉晉陽錦帆入揚州揚州竟不返京邑為墟丘吁哉汴渠水至今病不瘳世言汴水利我為汴水憂利害我豈知吾試言其由汴水濬且長汴水湍且遒千里瀉地氣萬世勞人謀舳艫相屬進餽運曾無休一人奉口腹百姓渴膏油民力輸公家斗粟不敢收州侯共王都尺租不敢留太倉粟峩峩冗兵食無羞上林錢朽貫婪官求要優吾欲塞汴水吾欲壞官舟請君簡賜予請君節財求王畿方千里邦國用足周盡省轉運使重封富民侯天下無移粟一州食一州贈張績禹功李唐元和間文人如蠭起李翺與李觀言雄破姦宄孟郊及張籍詩苦動天地持正不退讓子厚稱絶偉元白雖小道爭名愈弗已卒能霸斯文昌黎韓夫子吾宋興國來文人如櫛比黄州才專勝漢公氣全粹晦之號絶羣平地走虎兕謂之雖駁雜亦文中騏驥白稹洎盧震江沱自為水朱巖兼孫僅培塿對嶽峙卒能霸斯文河東柳開氏嗟吁河東殁斯文乃屯否泊泊三十年淫哇滿人耳粤從景祐後大儒復唱始文人如麻立樅樅攢戰騎徂徠山磊砢生民實頑鄙容貌不動人心膽無有比不度蹄涔㣲直欲觸鯨鯉有慕韓愈節有肩柳開志今讀禹功文矛㦸寒相倚寶光千里髙飛出破屋裏龍音萬丈長拔出重淵底雷霆皆藏聲日星皆失次我慙年老大才力漸衰矣禹功氣奔壯今方二十二前去吾之年猶有十四嵗今讀禹功文魂魄已驚悸更加十四年世應絶儔類卒能霸斯文吾恐不在已禹功幸勉㫋當仁勿讓爾過魏東郊全魏地千里雄大視區宇黄河為血脉太行為筋膂地靈育聖賢土厚含文武堂堂柳先生生下如猛虎十三斷賊指聞者皆震怖十七著野史才俊凌遷固二十補亡書辭深續堯禹六經皆自曉不看注與疏述作慕仲淹文章肩韓愈下唐二百年先生固獨步投篇動范杲落筆驚王祜四方交豪傑羣公走聲譽一上中髙第數年編士伍五命為御史連出守方土事業幾臯䕫才能堪相輔鳳皇世不容衆鳥競嘲訴獄中饑不死特地生爪距貔貅十萬師盟津直北渡塞上諸猛將低頭若首䑕渴憶海為漿饑思鼇為脯兩手拏人肝大牀横斗肚一飲酒一石賊來不怕懼帳下立孫吳樽前坐伊吕笑談韜鈐間出入經綸務蜀道自勉潮陽障烟黑去京路八千吏部有大功得罪斥守藩朝衝江霧行夜枕江濤眠蛟蜃作怪變時時攀船舷魚龍吐火燄徃徃出波間故為相恐怖倐忽千萬端道在安可劫處之自宴然我乏尺寸效月食二萬錢自請西南來此行非竄遷蜀山險可升蜀路髙可縁上無嵐氣蒸下無波濤翻步覺閣道穩身履劍門安惟懐吏部節不知蜀道難感興村居何所適種木樹桑梓田園繞家舍逺不逾十里欵段足乗騎代步而已矣但識畜駑駘安知有騏驥臘月北風寒太行山色紫君命急如火城頭見烽燧雲深馬僵倒十夫扶不起軍法有明訓後期者誅死倚鞍思駿骨撫轡念騄駬求之不可得觳觫滿眼淚旁聞負薪叟竊語相譏刺居安常念危在險如處易臨難始求濟狼狽徒勞爾有備則無患古人垂深㫖平居無事時華廐深祕䆳善穀與豐草秣飼十廐吏駑駘飽相枕素餐不知愧伯樂能識馬每來加勸説飛兔與騕褭日牽在都市為愛千金資貪悋不肯置今日臨艱難勞力自勉勵偶作晉公平淮西兵出速如神崇韜伐西川六十日請臣太祖初受命諸侯未盡賔蜀廣號敵國荆潭為彊鄰王師討有罪不聞逾十旬元昊誠螻蟻有地長一畛詎足汚斧鉞尋當投荆榛是何逾嵗月務行含貸仁豈兹將帥間逈無晉公倫張旗發一號豈無李處耘提戈出一戰豈無王全斌容兹盈寸蟹蕩漾於流津平生讀詩書胸中貯經綸薄田四五畝甘心耕耨勤倚鉏西北望涕淚空沾巾送李唐病歸春風汶水温曉日徂徠寒之子銜病歸請予開一言予知去病術為子陳大端予嘗學聖人試將道比論道病非一日善醫惟孔韓賞罰絶于周孔筆誅其姦春秋十二經王道復全完佛老熾于唐韓刀斷其根原道千餘言生民復眠餐道病由有弊邪偽容其閒身病猶有隙風邪來相干子欲治斯道絶弊道乃存子欲治子身杜隙身乃安此理近古醫吾言有本源麥熟有感去年經春頻肆赦拜赦人忙走如馬五月不雨麥苖死赦頻不能活窮寡今年經春無赦書十日一雨及時下五月麥熟人民飽一麥勝如四度赦吾願吾君與吾相調和隂陽運元化隂陽無病元氣活風雨調順麥多稼使麥長熟人不饑肆𤯝空文奚為者讀詔書關中有山生虎狼虎狼性虣不可當去嵗食人十有一無辜被此惡物傷守臣具事奏聖帝聖帝讀之惻上意乃詔天下捕虎狼意欲斯民無枉死吾君仁覆如天地只知虎狼有牙齒害人不獨在虎狼臣請勿捕捕貪吏乙亥冬富春先生以老儒醇師居我東齋濟北張洞明逺楚宫李温仲淵皆服道就義與介同執弟子之禮北面受其業因作百八十二言相勉鳳凰飛來衆鳥隨神龍遊處羣魚嬉先生道德如韓孟四方學者爭奔馳濟北張洞壯且勇楚丘李温少而竒二子磊落頗驚俗泰山石介更過之三人堂堂負英氣胸中拳攣蟠蛟螭道可服兮身可屈北面受業尊為師先生晨起坐堂上口諷大易春秋辭洪音琅琅響齒牙鼔簧孔子興宓羲先生居前三子後恂恂如在汾河湄續作六經豈必讓焉無房杜廊廟資吁嗟斯文敝已久天生吾輩同扶持二子勉㫋吾不惰先生大用終有時當以斯文施天下豈徒玩書心神疲聞子規月上半峯峯樹碧子規啼苦月無色壯士耳邊都不聞兒女眼中淚自滴古人出處非關身處兮事親出事君服勤至死不敢倦避勞擇逸豈所聞我看蜀道誠為難嗟爾子規何云云王尊九折竟叱馭班超萬里圖立勲乗危蹈險盡臣節二人至今揚清芬我本魯國一男子少小氣志凌浮雲精誠許國貫白日有心致主為華勲位卑身賤難自達滿腹帝典與皇墳有時憤懣吐一言小人謗議已紛紛宰相寛容天子慈八年之中三從軍從軍官清吾何苦嘉州路逺爾勿語地不為我易其險我豈守道不能固子規子規漫啼絶斷無清淚灑向汝蝦蟇夏雨下數尺流水滿池泓蝦蟇為得時晝夜鳴不停幾日飽欲死腹圓如瓶罌鉅吻自開闔頭項或縮盈時於土坎間突出兩眼睛是何癡形骸能吐惡音聲嗟哉爾肉膻不中為犧牲嗟哉爾聲麤不中和人情殊不自量力更欲睥睨横海之鱣鯨自謂天地間獨馳善鳴名萬物聒皆聾不知鐘鼓欽欽雷霆閎閎應龍戢腦入海底鳳凰舉翼摩青㝠此時各黙黙以避蝦蟇鳴何時雨歇水澤涸青臭泥中露醜形失水無能為兩脚不解行乾渴以至死盡把枯殻填土坑訪田公不遇主人何處去門外草萋萋獨犬睡不吠幽禽閒自啼老猿偷果實稚子弄鋤犁日暮園林悄春風吹藥畦蘇唐詢秀才晩學於予告歸以四韻勉之憐我山中卧半年相伴吟道傳諸子後易得數爻深㸑或經年絶書猶竟日尋惜哉未終業親老忽霑襟嵗晏村居嵗晏有餘糧盃盤氣味長天寒雨脚落春近臛頭香菜色青仍短茶芽嫩復黄此中得深趣真不羨膏粱送奉符縣監酒税孟執中借職東西兩處各天涯去國還鄉喜又嗟鄒嶧山藏孟子宅海棠花落蜀王家深知周道非彞酒可罪唐臣乞税茶三載此心無一事聞經絳帳日常斜寄元均君為儒者豈知兵何事欣隨璧馬行裴度樽前坐韓愈趙成帳下立荀卿禦戎誰道全無䇿對壘寜防下一枰須信乾坤養不肖年三十七卧柴荆赴任嘉州初登棧道寄題姜潛至之讀易堂我不辭官君下第其間險易兩何如連雲棧外四千里讀易堂中一帙書慈母含飴垂秃髮先生懐道接茅廬莫將青淚頻頻灑蜀道之難欲上初士廷評相㑹梓州道視荀揚雖未至分如管鮑已知深一千二百日離别五十六驛外相尋重欲同君注周易且來共我聽胡琴月留屋角不下去似與清風憐苦吟留題敏夫隱居幾迴到此尋逋客杯案蕭疎滋味長山飯半甌橡子熟春蔬一筯术苖香四時泉石應無夏滿谷雲霞别是鄉終待共君結鄰里竹間相並兩間房訪竹溪呈孟節兼有懷熙道到頭泉石是吾家坐石聽泉日已斜一片青衫非富貴千竿緑竹是生涯君曽覽照頭皆雪我試看書眼亦花便好結為山伴侶教他䕫益佐勲華村居幽居一畝枕溪稜堦下杉松纒古藤常愛園林深似隱不嫌門户冷如僧麥宜過社猶催種山近經秋却懶登已把壯心閒頓置少年休用苦相憎送馮司理之任彭州李白詩中蜀道難把詩試讀淚汍瀾江形詰曲千迴折嶺路崚嶒萬屈盤登陟去年腰僅折追思今日鼻猶酸此行君不同屯蹇五馬相知舊長官赴任嘉州待闕左綿七十日通判吕國博日相從吟酌至嘉陽因成韻寄之鼎來豈敢道能詩一見何因便解頤鄉國三千里離别杯盤七十日相知送人江外馬䭾妓垂釣寺中魚竭池别後中秋又重九與誰賞月詠東籬燕枝板浣花箋寄合州徐文職方合州太守鬢將絲聞説歡情尚不衰板與歌娘拍新調牋供狎客寫芳辭木成文理差差動花映溪光瑟瑟竒名得只從嘉郡樹樣傳仍自薛濤時竒章磊磊馳聲價江令翩翩落酒巵幾首詩成卷魚子誰人唱罷泣燕枝紅牙管好同牀置紫竹笙宜一處施願助風流向樽席杏花况是未離披夏竦附江州人性敏好學以文章名世舉賢良方正累遷右正言知制誥坐事出知黄州仁宗即位徙洪州竦材術過人急於進取喜交結任智數傾側反覆時論目為奸邪依中人張懐德得復原官遂改參知政事未幾罷知襄州及范仲淹與富弼同心輔政而太子中允石介撰慶厯聖德詩以美之語頗侵竦竦銜怨刺骨又欲傾陷弼等乃使婦女隂習石介書偽作奏記上弼責以行伊霍之事復冐為廢立詔云出介手代弼屬草者用飛語上聞致弼與仲淹不安其位先後請外介亦通判濮州竦恨介不已及介死言其北走敵國請發棺檢勘㑹大臣力爭之乃止其奸詭忮忍類如此云應廷試殿上衮衣明日月硯中旗影動龍蛇縱横禮樂三千字獨對丹墀日未斜海雁橋海雁橋邊春水深畧無塵土到花隂忘機不問人知否自有沙鷗信此心觀藏珠敏手機心頗自安遮藏有路巧千般主公當面無由見只怕旁人冷眼看宋元詩㑹卷九
