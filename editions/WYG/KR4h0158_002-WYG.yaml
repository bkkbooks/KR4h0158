body:
  text: 宋元詩會卷二兵部主事陳焯編鄭文寳字仲賢初仕江南用父䕃授奉禮郎入宋李煜以環衛奉朝請文寳左右其間太平興國八年登進士第除修武主簿轉光祿寺丞獻所著文改著作佐郎通判潁州歴殿中丞陜西轉運副使李順亂蜀文寳有平賊功太宗召至闕下喜其奏對㨗辯加工部員外郎以興復營田於賀蘭山下擾民無功又奏減解州鹽價嵗虧課額為二司所發貶藍山令真宗即位召還授殿中丞歴河東轉運使卒年六十一有集二十卷談苑二十卷江表志三卷送枝江秦長官罷秩衆論才名外親人似古人官嫌容易達家愛等閒貧解印詩權在移風澤國春政聲誣不得慙見數鄉民送曹緯劉鼎二秀才旦夕春風老離心共黯然小舟聞笛夜㣲雨養花天手筆人皆有曹劉世所賢郴侯重才子從此看鶯遷温泉潺湲如燎嶺雲隂玉石魚龍換古今只見開元無事久不知貞觀用功深籠無解語衣無雪堆有黄沙粟有金惆悵羌渠負恩澤始尤夷甫未經心讀江總傳行人慵過景陽宫宫畔離離禾黍風庭玉有花空怨白井蓮無步莫愁紅吟詩功業才雖大亡國君臣道最同爭忍暮年歸故里綸竿迴避釣魚翁赴闕日過石子鎮得罪先朝出粉闈五原功業更誰知年深放逐無人識白雪闗頭一望時孫僅字鄰幾上蔡人咸平元年舉進士第一官知制誥勘書儒家無外事招客勘青編筆墨東西置朱黄次第研頻憂傷㸃竄細恐誤流傳改易文辭正増加字數全目因繁處倦心向注中專端坐窮今古披襟見聖賢疲勞時舉白遊息或談𤣥得興忘昏旭題名記嵗年棲毫思確解廢卷恨亡篇魚魯皆刋定誰人敢間然張維吴興人以詩名江湖間即子野尚書之父也卒年九十一孫莘老序其詩云自得而無怨懟之語瀟灑而有沉澹之思孤帆江心雲破處遙見去帆孤浪濶疑升漢風髙若泛湖依㣲過逺嶼彷彿落平蕪莫問乗舟客利名同一途庭鶴戢翼盤桓傍小庭不無清夜夢烟汀靜翹月色一團素閒啄苔錢數㸃青終日稻粱聊自足滿前雞鶩漫相形巳隨秋意歸詩筆更與幽棲上畫屏玉蝴蝶花雪朶中間蓓蕾齊驟開尤覺繡工遲品髙多説瓊花似曲妙誰將玉笛吹散舞不休零晚樹團飛無定撼風枝漆園如有須為夢若在藍田種更宜聞砧遙野空林砧杵聲淺沙棲雁自相鳴西風送響暝色靜久客感秋愁思生何處征人移塞帳即時新月落江城不知今夜搗衣曲欲寫深閨多少情宿後陳莊臘凍初開苕水清煙村逺郭漫行吟灘頭斜日鳬鷖隊枕上西風鼓角聲一櫂寒燈隨夜釣滿犁膏雨趂春耕誰言五福仍須富九十年餘樂太平周宻齊東野語云宋有兩張先皆字子野其一博州人天聖三年進士歐陽公為作墓誌其一天聖八年進士則吴興人也二人名姓偶同又適同時不可不知也陳振孫詩曰平生聞説張三影十詠誰知有乃翁遐想盛時生恨晚恍如身在畫圖中十詠有宿清江小舎一首破損僅存一句菰葉青青綠荇齊云李沆字太初洺州肥鄉人太平興國五年舉進士為將作監丞通判潭州遷右賛善轉著作郎歴補闕知制誥入翰林為學士嘗侍宴太宗目送之曰風度端凝真貴人也淳化三年參知政事真宗即位拜户部侍郎咸平初以本官同平章事上北幸命沆留守京師肅然累加門下侍郎尚書右僕射嘗言居相位愧無補當時惟中外所陳利害一切報罷之此少以報國耳景徳元年七月薨年五十八贈太尉中書令謚文靖王旦於沆殁後歎其先識之逺曰李文靖真聖人也平陽侯為臣固不易為相良獨難孰是弼萬幾而茍懷自安䣜侯佐漢祖規橅洵可觀其時在開創詎云擘畫殫垂死薦平陽相倚定後艱既憚牝雞鷙復慮幼主孱參也急調劑饑恐弗及餐奈何不事事醇酒以為眈后意愈無忌帝肉曽未寒寵姬與愛子身命恣摧殘少主憂入地吕勢積滔天藉非平與勃漢祚誰當全參實沗相位昧者稱其賢王禹偁字元之濟州鉅野人世為農家九歳能文畢士安見而器之太平興國八年登進士授成武主簿徙知長洲縣時同年生羅處約宰吴縣日與賦詠人多傳誦太宗聞其名召試擢右拾遺直史館賜緋即日獻端拱箴以寓規諷未幾判大理寺緣妖尼道安誣訟徐鉉偁論道安反坐貶商州團練副使稍遷拜左正言歴翰林學士知審官院通進銀臺封駁司又以議禮坐謗訕出知滁州真宗即位遷秩刑部召還復知制誥咸平初預修太祖實錄與宰相不恊出知黄州徙蘄州卒年四十八訃聞上甚悼之有小畜集二十卷酬种放徴君一百韻太歳在辛夘九月萬木落是時太隂虧占云臣道剥王生出紫薇譴逐走商洛扶親又抱子迤􅆔過京索敝車載詩史病馬懸囊槖西都不敢住空負香山約閿鄉正南路秦嶺峭如削肩輿礙巨石十步三四却妻孥亦徒步磧礫不容脚山店葢木皮煙火渾薰灼夜深聞贙虎合家屢驚戄山泉何瀠洄切裂無橋彴卸鞍引羸蹄解襪事芒屩晨瀾髪可鑒朝涉脛如斮商山六百里天設皆碞崿上洛在其中狴牢曽未若逐臣自可死何必在逺惡刺史不我顧古寺聊淹泊卜居雜民甿致養無精糳知道由自寛有親彊為樂側聞种先生終南臥雲壑長沮既躬耕元禮仍開學王績婦未娶介潔翹孤鶴之推母偕隠教誨修天爵詩情亦嗜酒道氣不服藥田衣剪荷芰野飯烹茝葯霧豹澤文彩㝠鴻避矰繳肯從羔雁聘唯恐簮裾縛如何宋右史斥鷃議鵰鶚起居舎人宋維翰奏种放隠居終南乞量才錄用頗為識者所笑𤣥纁與丹詔恩禮誠非薄仍勑京兆府敦諭辭恭恪先生戀板輿純孝心堅確散髪走煙巒拜章謝恩渥巨材猶在澗大玉不出璞使者遂空囘軟輪何寂寞賢母召徴君庭責詞嗃嗃胡為事章句漏名入街郭府縣汚我山胥徒譟吾幄以兹近聲利安得成髙邈誓將徙窮谷庶可逃喧濁先生拜引過為夀開樽杓陶陶又熈熈何啻聞竽籥人傳到遷客面目頓慚怍器小識不逺當年事頭角遭時得一第遊宦何齷齪逐羶甚蚍蜉鬭耀向熠爚宰邑乏絃歌諫垣無謇諤便蕃朱紫綬僭忝絲綸閣方號騤騤龍巳困狺狺㹱待罪始知非咄哉昧先覺一聆髙世行罪髪庸可擢忍恥賦三章塵埃寄一作望寥廓明年㑹恩宥量移井蛙躍靡暇謁南山征途望西嶽黄河波洶湧白徑苔斑駁中條圍解懸五老煙矗矗此焉為郡副烏敢事隕穫籠禽幸未死尚且謀飲啄米呼村婢舂樵顧山童斫飼馬捽寒蕪看書爇秋籜信口亦吟哦放心無適莫君恩巳絶望人事終難度相府一張紙喚起久屈蠖誠知有梁柱未忍棄榱桷五城天上開三殿雲間卓重取正衣冠籠裹山猱玃病翼得風雲壊墻勞赭堊諌官與史氏舊職聊羈絡舉袖拂石螭凝眸睨金雀㝠心想前事一夢何揮霍長恐先生聞倚松成大噱闗中朋友來遺我神仙作繁華逺容綺錚鏦美金錯古澹啜鉶羮大雅鏗木鐸千言距百韻㫖趣何綽綽孰念氣如虹翻然輕抵鵲俊甚麻姑爪快比屠門嚼渾金豈在鎔尺璧寧施琢愈風齊捧檄忘味同聞樂置之向懐袖日夕芬蘭若褒我塵俗韻鉛刀化干鏌同聲必有應過實還疑謔盛夸山中事雲屋張霞幕蘭茆含露採石髓和煙酌巢由泉滌耳園綺芝盈握有時上絶頂星斗近可摸下視塵世人營營似螶􅨑男兒既束髪出處岐路各茍非秉陶鈞即去持矛槊致主比唐虞安邉如衛霍不爾為逸人深居返吾朴胡然自碌碌名節亦銷爍行年過半世功業無圭勺無術鑄五兵使民興錢鎛無才統六師逐冦開沙漠空言説王道肆目㸔人瘼多慚指佞草虚效傾心藿一覽大雅文起予亦何博况兹山野性謨畫昧方畧搔首謝朝簮行將返耕鑿不見陽城驛并序余為兒童時覽元白集唱和陽城驛詩時稹貶江陵過南山感陽道州而作是詩也且改驛為避賢郵不忍呼其諱也樂天在翰林得而和之又見杜紫薇富水驛詩題下解云富水驛舊名與陽諫議同卒章曰驛名不合輕移改留警朝天擁傳人淳化二年九月余自西掖左官商於訪其驛則無有也撿之圖經求之郡境則富水地存而驛廢陽城之號遂莫知矣因作古風詩申明三賢之作且以不見陽城驛為首句至於道州之行事元詩盡之矣此不復云不見陽城驛空吟昔人詩誰改避賢郵唱首元㣲之㣲之謫江陵顦顇為判司路道商山驛一夕見嗟咨所嗟陽道州抗直貞元時時亦被斥逐南荒終一麾題詩改驛名格力何髙奇樂天在翰林亦和遷客詞遂使道州名光與日月齊是後數十年借問經者誰留題富水驛始見杜紫薇紫薇言驛名不合輕改移欲遣朝天者惕然知在兹一以諱事神名呼不忍為一以名警衆名存教可施為善雖不同同歸化之基邇來又百稔編集空鱗差我遷上洛郡罪譴身縶維舊詩猶可誦古驛殊無遺富水地雖在陽城名豈知空想數君子貫若珠累累三章詩未冺千古名亦垂徳音茍不嗣吾道當巳而前賢尚如此今我復何悲題此商於驛吟之聊自怡竹䶉商嶺多脩篁蒼翠連山谷有䑕生其中薦食無厭足春筍齧生犀秋筠折寒玉飫飽致肥腯優游恣蕃肓林宻鳶不攫穴深犬難逐鳯凰餓欲死彼實無一掬唯此竹間䶉琅玕長滿腹暖戯綠叢隂舉頭傲鴻鵠不知商山民愛爾身上肉有鍤利其鋒有錐銛於鏃開穴窘如囚洞胸聲似哭膏血尚淋漓攜來入市鬻竹也比賢良䑕兮類商俗所食既非宜所禍誠知速吁嗟狡小人乗時竊君祿貴依社樹神俸盗太倉粟笙簧佞舌鳴藥石嘉言伏朝見秉大權夕聞罹顯戮李斯具五刑趙髙夷三族信有司殺者在暗明如燭彼狡無害賢彼䑕無食竹聞鴞有序滁淮地也郡堞之上鴟鴞巢焉永夕鳴嘯不巳妻子驚死或終夜不寐因作詩喻之元精自萬彚羽族何茫茫為怪有鴟鴞為瑞稱鳯凰鳯凰不時出未識五色章吾生在鄒魯風土殊逺方鳴鳩隨乳燕日夕巢吾梁翩翾雜鳥雀比屋率為常又從筮仕來五年居帝鄉更直入承明侍宴夜未央上林聞鶯囀巧舌如笙簧鴟鴞徒知名聞見實未嘗頃年謫商山聼之已悲凉今兹出内庭罸郡來永陽誰知爾鸋鴂營巢在城墻年加睡漸少秋盡漏且長鳴嘯殊不已歴歴含㣲霜孺人泣我右稚子啼我傍吾心非達士詎免亦悵悵人生縱百歳忽若石火光其間有窮通幽昧難自量我愛臯與䕫峩冠虞舜堂簫韶聞九成丹穴來鏘鏘又愛閎與散陳力遇文王鸑鷟聼岐山多士周道昌嗟嗟漢賈誼年少謫南荒故有鵩鳥賦倚伏理甚詳郇公暨鄴侯放逐同一邦夜深聞此鳥韋公涕沾裳李侯舉酒令斯音非不祥坐客如不聞罰之以巨觴遂使惡聲鳥聼之無所傷天寳中韋郇公謫守蘄州時李鄴侯亦以處士放逐因夜飲聞鴟鴞韋公泣下李公曰此鳥人以為惡其聲可聼乃令坐客有不聞其聲者罰以大杯由是聼之不厭賛皇貶袁州懐鴞義亦臧李太尉有懐鴞賦乃知昔賢哲未免亦悽惶况余不肖者邀寵在朝行報國惟直道謀身昧周防四年兩度黜鬢髪已蒼蒼雖得五品官銷盡百錬鋼何當解印綬歸田謝膏粱教兒勤稼穡與妻甘糟糠鳯來非我慶鴞集非我殃優游盡天年身世俱可忘和楊遂賀雨我罷内廷職出臨永陽民永陽民雖庶未免多饑貧富之既無術齪齪為謹身不堪今夏旱如燎復如焚厥田本塗泥坐見生塵氛稚老無所訴嗷嗷望穹旻食祿憂人憂蚤夜眉不伸從决獄中囚徧禱境内神楚辭有山鬼廟貌羅水濵佛法有浮圖寺宇連城闉齋莊命寮寀供給抽俸緡鼓笛迎湫水香花照金輪誠知非典故且慰旱熯人偶與天雨㑹滂沱四郊勻挿秧復修堰野叟何欣欣可辦官府調亦免農艱辛爕調賴時相感應由聖君於吾復何有敢望歌頌云清流楊水部徳與我為鄰仇香官位屈何遜詩格新見投賀雨詩言自人口聞夫君葢私我過實豈相親為霖非我事職業惟詞臣若有民謠起當知帝澤春庶使採詩官入奏助南薰對雪示嘉祐去年㸔雪在商州使君命我山寺頭峯巒草樹六百里饑鼯凍鳥聲啾啾山城窮陋無妓樂何以銷得騷人愁抱缾自㵼不待勸乘興一引連十甌晩歸上馬頗自適狂吟醉舞夜不休今年看雪在帝里瑤臺瓊樹佳氣浮朝囘攬轡聊四望移下五城十二樓樽中有酒翻不飲鬱鬱不快非怨尤吾兒嬌騃未曉事問我胡不私獻酧因令把筆冩我意為渠吟作雪中謳昔為副使不理事待罪且免憂人憂今為諌官非冗長拾遺三館俸入優秋來連㴻百日雨禾黍飃溺多不收如今行潦占南畝農夫失望無來麰爾看門外饑餓者徃徃殭殕填渠溝峩冠旅進又旅退曽無一事禆皇猷俸錢一月數家賦朝衣一襲幾人裘安邊不學趙充國富民不作田千秋胡為碌碌事文筆歌時頌聖如俳優一家衣食仰在我縱得飽暖如狗偷况我眼昏頭漸白安能隠几勤校讐何時提汝歸田去賣馬可易數隻牛深耕淺種茍自給藜羮豆粥充饑喉黍畦鋤理學元亮𤓰田澆灌師秦侯素餐免作疲人蠧開卷免對古人羞未行此志吾戚戚對酒不飲抑有由斯言不敢向人道語爾小子為詒謀和馬中允爐邉偶作誰為東君掌青律故將春日連人日春日雨絲暖融融人日雪花寒慄慄雨雪寒暖苦不同可比交情去就中仲咸擁爐發歌詠古風激破澆漓風人情離合古來有召公初亦疑周公汾陽臨淮本仇隙一旦分兵若親戚四公翻覆人不譏各各操心為邦國此外譸張多為已反掌背面如千里張耳陳餘不忍言魏其武安何足齒我愛中允君子心心與人交淡如水别有人間勢利徒一去一就隨榮枯西漢董賢方佞倖孔光迎拜卑如奴是時揚雄在東觀投閣欲死無人扶有唐力士夫人死朝士執喪如喪妣是時李白放江邉憔悴無人供酒錢小人之性何所似真如蜂蝶并螻蟻尋香逐臭茍朝昏豈願松篁與蘭茝重君誓心一何極澗底松兮陵上栢澗松陵栢有朽時我約君心無改易拍板謠麻姑親採扶桑木鏤脆排焦其數六雙成捧立王母前曽按瑤池白雲曲幾時流落來人間梨園部中齊管絃管絃纔動我能應知音審樂功何全吴宫女兒手如筍執向玳筵為樂凖數聲慢仙人屐齒下雲棧老狐臘月渡黄河緩步輕輕踏氷片數聲急空江雹打漁翁笠鮫人泣對水晶盤滿把珠璣連瀉入劃然一聲送曲徹由基射透七重札金罍冷落閴無聞隴頭凍後泉聲絶律吕與我數自齊絲竹望我為宗師總驅節奏在術内歌舞之人無我欺所以唐相牛僧孺為文命之為樂句筵上狂詩送侍棊衣襖天使昔事先皇叨近侍北門西掖華清地太宗多材復多藝萬幾餘暇翻棊勢對面千里為第一獨飛天蛾為第二第三海底取明珠三陣堂堂皆御製中侍宣來示近臣天機秘宻通鬼神乃知棊法通軍法既戒貪心又嫌怯惟宜靜勝守封疆不樂窮兵用戈甲先皇三勢有深㫖豈獨一枰而巳矣當時受賜感君恩藏於篋笥傳子孫至道年中出滁上失脚青雲空悵望移典維揚日望還軒轅鼎成飛上天龍髯忽斷攀不得舊朝衣上淚潺湲吾皇曲念先朝物徴歸再掌西垣筆悲凉忽見紅藥開哭臨空隨梓宫出去年領郡得齊安山州僻陋在江干黄民誰識舊學士白頭猶任老郎官昨日江邉天使到隨例霑恩著衣襖皇華本是江南客久侍先皇對棊奕筵中偶説當年事三勢分明皆記得我從失職别上臺御書深鎖不將來遙想棊圖在私室天香散盡空塵埃今日因君聊話及翻作停杯向隅泣人生不易逢聖朝君恩未報雙鬢凋金鑾殿花春灼灼永熈陵樹夜蕭蕭空歎拖腸在泥土不如䑛鼎升煙霄多病相如猶未死追思徃事欲魂消星使今辰逥馬首彊對離筵滿傾酒悲歌一曲從事書唱與朝中舊知友還楊遂蜀中集上蒼茫昧胡為乎施設吾道生吾徒否多泰少是天意生有述作死不虚聖人憂患方演易賢者窮愁始著書盡令富貴䧟逸樂蠢蠢戢戢如雞猪冺然無物作時瑞誰識鳯凰與騶虞經史子集燦今古粉繪帝道張皇謨一言可採即不朽名姓張與日月俱乃知天心厚我輩窮辱不足形悲呼夫君擢秀在江左國小而逼何區區科名始得值兵火金陵坐見成丘墟入朝纔得一賛善黜降重為縣大夫彰明僻逺在蜀道又遇袄賊攻成都徒行抱印向隴氐乞食村落何崎嶇歸來朝責作主簿朱衣黯淡鬢毛疎昨朝投我蜀中作錚然一集如瓊琚杜甫遭竄吟不輟庾信悲哀情有餘我逢聖代自多難謾誇三入承明廬近令編綴小畜集文筆詩賦何紛如才名官職不兩立真宰析刻分毫銖郎官疎逺既未貴縣吏禮數不足拘相逢且説文章樂為君酌酒焚枯魚成武縣作釋褐來成武初官且自彊位卑松在澗俸薄葉經霜雨菌生書案饑禽啄印牀猶驚寫秋卷枕砌落花黄除夜寄羅評事同年歳暮洞庭山知君思浩然年侵曉色盡人枕夜濤眠移櫂風搖浪開牕雪滿天無因一乗興同醉太湖船五更睡數載直承明寵深還若驚趂朝雞喚起殘夢馬䭾行左宦離雙闕髙眠盡五更如將閒比貴此味敵公卿寧公新拜首座因贈著書新奏御優詔及禪扉首座名雖貴家山老未歸磬聲寒繞枕塔影靜侵衣終憶西湖上秋風白鳥飛寄碭山主簿朱九齡忽思蓬島會羣仙二百同年最少年利市襴衫抛白紵風流名紙寫紅牋歌樓夜宴停銀燭栁巷春泥汚錦韉今日折腰塵土裏共君追想好凄然寄金鄉張賛善年少辭榮自古稀朝衣不著著斑衣北堂侍膳侵星起南畝催耕冐雨歸種竹野塘春筍脆採蘭幽澗露芽肥伊余自是徒勞者未得同尋舊釣磯遊虎丘山寺寺墻圍著碧孱顔曽是當年海湧山盡把好峯藏院裏不教幽景落人間劍池草色經冬在石座苔花自古斑珍重晉朝吾祖宅一囘來此便忘還寄潤州趙舎人二首南徐城古樹蒼蒼衙府樓臺盡枕江甘露鐘聲清醉榻海門山色滴吟牕直廬久負題紅藥出鎮何妨擁碧幢聞説秋來自髙尚道装笻竹鶴成雙記言彩筆罷摛華郡閣髙閒似道家琴院坐聼江寺磬郡樓吟見海山霞春園遺母親燒筍夜榻留僧自煮茶應笑陶潜未歸去折腰奔走在泥沙寄毗陵劉博士毗陵古郡接江堧赴任琴書共一船下岸且尋甘露寺到城先問惠山泉秋蟾吐檻供吟興野鶴偎牀伴醉眠官散道孤詩筆老不應雙鬢更皤然中元夜宿餘杭山仙泉寺留題祭廟迴來畧問禪蘚牆沙徑碧山前風疏逺磬秋開講水響寒車夜救田藍綬有香花菡蓞竹牕無寐月嬋娟自慚政術貽枯旱忍臥松隂潄石泉再泛吴江二年為吏住江濵重到江頭照病身滿眼碧波輸野鳥一蓑疎雨屬漁人隨船曉月孤輪白入座晴山數㸃青張翰精靈還笑我綠袍依舊惹埃塵和郡寮題李中舎公署樹影池光映曉霞綠楊隂下吏排衙閒拖屐齒妨横筍靜拂琴牀有落花地脈暗分吴苑水厨煙時煮洞庭茶青宫詞客多閒暇按曲飛觴待歳華題張處士溪居雲裏寒溪竹裏橋野人居處絶塵囂病來芳草生漁艇睡起殘花落酒瓢閒把道書尋晩逕靜攜茶鼎洗春潮長洲懶吏頻過此為愛盤餐有藥苗送羅著作奉使湖湘使星躔次入長沙曉别延英去路賖數刻漏中承宻㫖幾重湖外奉皇華山行馬拂湘川石寺宿僧供嶽麓茶迴日期君直西掖當階紅藥正開花送馮學士入蜀錦川宜共少年期四十風情去未遲蠶市夜歌欹枕處峨眉春雪倚樓時休誇上直吟紅藥多羨乘軺聼子規莫學當初杜工部因循不賦海棠詩賀將作孔監致仕泣辭明主竟抽簮便約幽雲老舊林朝請罷來頻典笏田園歸去只攜琴焚香靜院當山色晒藥空庭避竹隂一子得官三品祿未饒疏傅有黄金和陳州田舎人留别演綸多暇每封章暫去頒條道更光郡吏好排紅粉妓使君曽是紫薇郎樓臺有月新詩出囹圄無人綠草長地接清淮足佳致水村煙塢是魚鄉囘襄陽周奉禮同年因題紙尾武闗西畔路巉巖兩月勞君寄兩緘鏡裏想添新白髪篋中猶貯舊青衫扶頭酒好無辭醉縮項魚多且放饞譬似元和張太祝十年不改舊官銜寒食今年寒食在商山山裏風光亦可憐稚子就花拈蛺蝶人家依樹繫鞦韆郊原曉綠初經雨巷陌春隂乍禁煙副使官閒莫惆悵酒錢猶有撰碑錢南郊大禮詩二首聖君重卜祀南郊仗擁黄麾間白旄仙吹冷翻蒼玉佩曉霞晴透絳紗袍天開兠率齋宫靜海湧蓬萊帳殿髙遷客生還知有望商山不敢讀離騷嚴禋禮退一陽生抃賀歡呼動四溟聖夀久長南至日寳圖髙大北辰星九重城闕天將曙百萬人家户不扄知有化工無棄物海波分細一浮萍新秋即事宦途流落似長沙賴有詩情遣歳華吟弄淺波臨釣渚醉披殘照入僧家石挨苦竹旁抽筍雨打戎葵臥放花安得君恩許歸去東陵閒種一園瓜前賦村居雜興詩二首間半嵗不復省視因長男嘉祐讀杜工部集見語意頗有相類者咨於余且意余竊之也余喜而作詩聊以自賀命屈由來道日新詩家權柄敵陶鈞任無功業調金鼎且有篇章到古人本與樂天為後進敢期子美是前身從今莫厭閒官職主管風騷勝要津贈衛尉宋卿二十二丈謫宦歸來髪更斑徊翔猶得寺卿閒幾多僚友三台上大半生徒兩制間舊賜錦袍多貰酒新裁紗㡌欲歸山東垣小諌龍鍾甚空媿洪爐蚤鑄顔送融州任巽户曹撰越王愛姬墓誌得罪御前曽取好科名一掾如何萬里行身落蠻方人共惜罪因文學自為榮吏供版籍多魚税民種山田見象耕君看咸通十司户投荒終久是公卿幕次閒吟江蘺吟盡鬢成霜謫宦歸來夢一場每日祗窺丹鳯案被人猶喚紫薇郎齋宫獨坐風翻幕客舎閒吟葉滿牀若是承明容再入未曽荒廢舊文章送張監察通判餘杭郡城瀟灑浙江濵暫輟乗驄慰逺民莫放霜威誇御史且收風景屬詩人雪侵樓上迎潮眼花擁湖中泛月身盡是公餘吟咏處好飛佳句寄詞臣書齋年年賃宅住閒坊也構幽齋作道裝守靜便為生白室著書兼是草𤣥堂屏山獨臥千峯雪御札時開一炷香莫笑未歸田里去宦途機巧盡能忘滁州官舎忽從天上謫人間知向山州住幾年俸外不教收果實公餘多愛入林泉朝簮未解雖妨道宦路無機即是禪鈴閣悄然私自問郡齋何異玉堂前臘月臘月滁州始覺寒年豐嵗暮郡齋閒官供好酒何憂雪天與新詩合看山日照野塘梅欲綻燒迴荒徑草猶斑吏人散後無公事門㦸森森夕鳥還寄杭州昭慶寺華嚴社主省常上人夢幻吾身是偶然勞生四十又三年任誇西掖吟紅藥何似東林種白蓮入定雪龕燈焰直講經霜殿磬聲圓謫官不得餘杭郡空寄髙僧結社篇嵗暮感懐嵗暮山城放逐臣老從霄漢委泥塵公卿别後全無信兄弟書來秪説貧眼看青山休未得鬢垂華髪摘空頻文章氣概成何事霑惹虚名誤此身芍藥詩牡丹落盡正凄凉紅藥開時醉一場羽客諳傳尸解術仙家重爇返魂香蜂尋檀口論前事露濕穠英試曉粧曽忝掖垣真舊物多情應認紫薇郎贈省欽師師善八分書太宗召於殿上書數行得賜紫衣舊隠何年别翠㣲瀑泉聲外鎖禪扉御前能寫八分字天上曽宣三事衣燈照夜寒霜後冷鼎烹秋菌雨中肥終歸五老峯邉去杯渡長江一錫飛贈狀元先輩孫僅病中何事忽開顔記得詩稱小狀元余淳化辛夘嵗贈君詩云明年再就堯階試應被人呼小狀元粉壁乍懸龍虎榜錦標終屬鶺鴒原青雲隨步登花塔紅雪飄衣醉御園還有一條遺恨處不教英俊在吾門謫居感事一百六十韻重内綏字維字俱押遷謫獨熈熈襟懐自坦夷孤寒明主信清直上天知消息還依道生涯只在詩惟當喻山木詎敢詠江籬偶歎勞生事因思志學詩讀書方覩奧下筆便搜竒賦格驚鸚鵡儒冠薄鵕䴊耕桑都不事園井未曽窺必欲縑緗富寧教杼軸紕光隂常矻矻交友盡偲偲步驟依班馬根源法孔姬收螢秋不倦刻鵠夜忘疲流輩多相許時賢亦見推叨榮偕計吏濫吹謁春司僕瘦途中病驢寒雪裏騎空拳入場屋拭目看京師技癢初調箾鋒銛欲試錐甲科登漢制太平興國八年余首中甲科内殿識堯眉數刻愁晡矣三題亦勉之先鳴輸俊彦上第遂參差罷舉身何託還家命自奇惟慚親倚戶敢望嫂停炊竭力求甘㫖終朝走路岐貪希仲由米多廢董生帷丹桂何時折孤篷逐吹移知憐無國士志氣自男兒季子貂裘敝狂生刺字隳廣場重考覆蹇步載驅馳明代寧甘退青雲暗有期禮闈冠多士御試拜丹墀澤霧寜慚豹摶風肯伏雌重瞳念孤迹一第忝鴻私得告還鄉貴除官佐邑卑折腰稱小吏矩步慎初資解褐得主簿枳棘心何恨松筠操自持及親家有養事長禮無虧銅墨官常改煙霄兩露垂縣花聊主管寺棘且羈縻九年授大理評事知蘇州長洲縣吴郡包山側長洲巨海湄萬家呼父母百里撫惸嫠敢起徒勞歎長憂竊祿嗤宦途甘碌碌官業亦孜孜政事還多暇優游甚不羈村尋魯望宅寺認館娃基西子留香逕吴王有劍池狂歌殊不厭酒興最相宜草織登山履蒲紉平聲挽舫綏果酸嘗橄欖花好挿酴醾震澤柑包火松江鱠縷絲三年無異政一篋有新詞多戀南園臥俄從北闕追雍熈四年奉召赴闕呈材真樸􅈪召對立茅茨載筆居三館登朝忝拾遺紫泥天上降朱紱御前披侍從殊為貴圖書頗自怡史才媿班固諫筆謝辛毗擬把㣲軀報慚將厚祿尸安邉上章疏端拱獻箴規精鑒逢英主心知是伯䕫余論邉事特為趙許公所器賡歌才不稱掌誥筆難摛是嵗䝉上召余殿上作歌遂有西掖之拜制厯多無事閣下有制厯當直舎人如無除目書名而出詞頭每怯遲繁隂温室樹清吹萬年枝青鎖霞光透蒼苔露片萎御香飄硯席宫葉落纓緌看浴池心鳯閒捫殿角螭上林花掩映仙掌露淋漓對近瞻旒冕班清辟虎貔宫簾垂翡翠御水動漣漪紀號年淳化朝元月建寅叶移攝官捧寳冊祝夀執樽彞表案行低折時余又押諸方表案宫懸聼肅祇徳音王澤潤謙柄斗杓移貴接臯䕫步深窺龍鳯姿策勲何炫赫賜紫更萎蕤是日加柱國謝日面賜金紫蚊力山難負鵜梁翼易滋論功慙八柱受服欲三褫音遲祗慮殃將至曽無事可禆趨朝空俯傴退食自逶迤更直當春好横行隔宿咨每休假三日後謂之横行於正衙參假院吏隔夜報内朝長得對駕幸每教隨瓊苑觀雲稼金明閱水嬉賞花臨鳯沼侍釣立魚坻拂面黄金栁􅋳顔白玉巵分題宣險韻翻勢得仙碁上嘗賜兩制碁勢圖竟舉窺天管爭燃煮豆萁恨無才應副空有表虔祈每有御製詩韻難并新碁勢但上表免和訴不曉而巳睿睠偏稱賞天顔極撫綏中官賜文字院吏捧巾綦遭遇誠堪惜功名竊自思請纓無壯志視草亦胡為未獻東封頌空鐫北嶽碑深慚專俎豆長欲議邉陲但可懐驕子何須斬谷蠡胸中貯兵甲堂上有熊罷成敗觀千古弛張在四維兼磨斷佞劍擬樹直言旗遇事難緘黙平居疾喔咿無權逐鳥雀俛首任狐狸廷尉專刑殺以制誥舎人兼大理寺事詞臣益等衰五花儀久廢三尺法聊施書命猶無諂評刑肯有欺厚誣凌近侍内亂疾妖尼妖尼道安誣告徐騎省丹筆當無赦金科了不疑拜章期悟主仆法更防維萋菲終無巳雷霆遂赫斯如弦傷訐直投杵覓瑕疵衆鑠金須化羣排柱不支佞權迴北斗讒舌簸南箕闕下羊腸險朝端虎尾危道孤貽衆怒責薄頼宸慈西掖除三字南山佐一麾蒼黄塵滿面揮灑淚交頤目斷九重闕魂銷八達衢尊親逺扶侍兄弟盡流離秦嶺偏巉絶商於更嶮巇吾廬何處是我馬忽長辭六里山蒼翠丹河浪渺瀰分封思魏鞅割地憶張儀懶讀三閭傳空尋四皓祠畬煙濃似瘴松雪白如梨壊舎牀鋪月寒牕硯結澌振書衫作拂解帶竹為揓呼僕泥茶竈從僧借藥篩鐘愁上寺起角怨水門吹舊友誰青眼新秋出白髭煙嵐晴鬱鬱風雨夜颸颸我過徒三省吾生自百罹初來聞旅雁不覺見黄鸝市井攜山菜房廊葢木皮商州民多以木皮葢屋野花紅爛縵山草碧䙰褷副使官資冷商州酒味醨尾因求食掉角為觸藩羸有夢思紅藥無心採紫芝瘦妻容慘戚稚子淚漣洏暖怯􅉬穿壁昏憂虎入籬松根然夜燭山蕨助朝饑豈獨堂虧飬還憂地乏醫跡飄萍渤海親老日崦嵫閣下辭巢鳯山中伴野麋風欺秀林木雲隔向陽葵屈産遭駑馬丹山困嚇鴟悔須分黑白本合混妍媸自此韜餘刄終當學鈍鎚窮通皆有數得喪又奚悲自顧才何有空憐道在兹宣尼猶削伐大禹亦胼胝運去當如䑕投來且禦魑避風聊戢翼得水會揚鬐琴酒圖三樂詩章效四蚩白公有四蚩詩魚須從典賣貂尾任傾欹兀兀拖腸䑕悠悠曳尾龜北牕尋蛺蝶南岸看鸕鷀山翠樓頻上雲生杖獨榰簟閒留曉魄簷暖負冬曦松柏寒仍翠瓊瑤湼不緇望誰分曲直秪自仰神祗吾道寧窮矣斯文未巳而狂吟何所益孤憤洩黄陂商山海棠錦里名雖盛商山豔更繁别疑天與態不類土生根淺著紅蘭染深於絳雪噴待開先釀酒怕落預呼魂香裏無勍敵花中是至尊桂須辭月窟桃合避仙源浮動冠頻側霓裳袖忽翻望夫臨水石窺客出墻垣贈别難饒栁忘憂肯讓萱輕輕飛燕舞脈脈息媯言蕙陋虚侵逕梨凡浪占園論心留蝶宿低面厭鶯喧不忝神仙品何辜造化恩自期栽御苑誰使擲山村綺季荒祠畔仙娥古洞門煙愁思舊夢雨泣怨新婚畫恐明妃恨移同卓氏奔秪教三月見不得四時存繡被堆籠勢臙脂浥淚痕貳車春未去應得伴芳罇茶園十二韻勤王修歳貢晩駕過郊原蔽芾餘千本青蔥共一園牙新撐老葉土軟迸新根舌小侔黄雀毛獰摘綠猿出蒸香更别入焙火㣲温採近桐花節生無穀雨㾗緘縢防逺道進獻趂頭番待破華胥夢先經閶闔門汲泉鳴玉甃開宴壓瑤罇茂育知天意甄收荷主恩沃心同直諌苦口類嘉言未復金鑾召年年奉至尊山僧雨中送牡丹數枝香帶雨霏霏雨裏攜來叩竹扉擬戴却休成悵望御園曽挿滿頭歸春居雜興兩株桃杏映籬斜妝㸃商山副使家何事春風容不得和鶯吹折數枝花杏花三首暖映垂楊曲檻邉一堆紅雪罩春煙春來自得風流伴榆莢休抛買笑錢長愁風雨暗離披醉遶吟看得幾時只有流鶯偏稱意夜來偷宿最繁枝陌上紛披枝上稀多情猶解撲人衣雙成灑道迎王母十里濛濛絳雪飛别丹水曽經爛漫濯吾纓忍别潺湲月夜聲便入紅塵染詩思吟魂猶合數年清芍藥開花憶牡丹風雨無情落牡丹翻堦紅藥滿朱欄明皇幸蜀楊妃死縱有嬪嬙不喜看后土廟瓊花詩二首揚州后土廟有花一株潔白可愛樹細而花繁不知實何木也俗謂之瓊花因賦詩以狀其態誰移琪樹下仙鄉二月輕氷八月霜若使夀陽公主在自當羞見落梅妝春氷薄薄壓枝柯分與清香是月娥忽似暑天深澗底老松擎雪白婆娑曹緯見鄭文寳集有送曹緯劉鼎二秀才詩其弟即元寵也緯詩文名秋浦集山行日出過山頭日入宿山下我行山亦行隠隠似奔馬朝昏山送迎山意自傾冩借問征途間誰如此山者自齋山借舟泛湖還家十里平湖漫不流晩風吹浪打行舟定知歸得侵燈火家在菰蒲最盡頭曹組字元寵緯之弟也兄弟俱以文名組六舉不第著鐵硯篇以自見後有寵於徽宗授睿思殿待制夜歸曲饑烏啞啞啼暮寒囘風急雪飄朱䦨瑣牕繡閣艶紅獸書幙金泥揺彩鸞吴妝秀色攅眉綠能唱襄陽大堤曲酒酣横笛咽孤吹吹裂柯亭傲霜竹逺空寒雪渾不動老狐應被黄河凍暗囘㣲暖入江梅何處荒榛挂么鳯歸來穩跨青連錢貂耳擁鼻行翩翩籠紗宻炬照飛霰十二玉樓人未眠李至字言幾真定人生七嵗而孤育於飛龍使李知審家幼沈靜好學屬文典贍舉進士授將作監通判鄂州擢著作郎遷右補闕知制誥歴翰林學士參知政事雍熈初議親征范陽至上疏力止聞者韙之以目疾累表求解機政進秩吏部會建秘閣命兼秘書監總三館書至道初詔太子師事之真宗即位拜工部尚書參知政事咸平元年復以目疾求解政授武信軍節度徙知河南府卒年五十五贈侍中桃花犬歌宫中有犬桃花名絳繒圍頸懸金鈴先皇為愛馴且異指顧之間知上意珠簾未卷扇未開桃花揺尾常先至夜靜不離香砌眠朝饑秪傍御牀餧彩雲路熟不勞牽瑤草風㣲有時吠無何軒后鑄鼎成忽遺弓劍葉寰瀛迢迢松闕伊川上逺逐龍輴十數程兩眥漣漣似垂淚骨見毛寒頓憔悴萬人見者倍傷心㣲物感恩猶若是韓盧備獵何足嘉西旅充庭豈為瑞聞君奉詔修實錄一字為褒應不曲白魚赤雁且勿書願君書此懲浮俗宋元詩會卷二
