body:
  text: 宋元詩㑹卷七十二兵部主事陳焯編李鳯字翔卿東明人幼嗜學從鄉先生孫曼慶學詩詩輒工長而究心伊洛之書至忘寒暑由廣平學正除國子助教調臨胊主簿未久即去官延祐八年卒子好文雎陽懐古雎陽城郭刼灰餘風景蕭條市井疎堤接汴梁分驛路地連齊魯㡬兵車張巡戰壘沙沈㦸閼伯提封草滿墟珍重開元遺寺在石幢猶刻魯公書李昶字士都幼穎悟過人讀書如夙習金興定二年同父世弼廷對以春秋中二甲第二父三甲第三時人以比向歆正大改元授儒林郎鄭州河隂簿調漕運提舉元兵下河南奉親還鄉里行臺嚴實辟授都事改行軍萬户府知事已未世祖伐宋次濮州召見問治國用兵之要條對甚悉上嘉納之及即位眷遇益隆厯官翰林侍讀學士吏禮部尚書年八十七卒所著春秋左氏遺意二十卷孟子權衡五卷寄王總管華陽東下古梁州五馬旌旗擁上游腸斷寒江衣帶水令人空望鎮南樓過故縣垻憲宗皇帝射臺髙氣壓蠻江萬丈濤玉輦不歸巗樹冷白雲何處醉蟠桃張經至元中官監察御史歴湖北按察史岳陽樓巴陵形勝甲天下郡治西南有樓曰岳陽盡得巴陵之勝至元丙戌余以監察御史按臨長沙道出巴陵往返不暇一登甲午夏備員湖北憲司分司于辰始得以酬平昔之志噫湖山如此造物者何其靳耶因留數語以識歳月云洞庭一水七百里烟朝月夕皆經過豈知斜陽萬里更有一佳處君山十二盤青螺乾坤有此樓萬古髙嵯峨憶昨長江咫尺限南北風烟畫本一日千摩挲今朝快一登怳若驅沈痾生平所羨鑑湖清乃今更覺君恩多湘靈也似知我至時令白鳥來婆娑鐵笛紫荆曲春草黃陵歌江山一醉漫不省悲風落日生白波愛山愛水亦非癖奈此日月如飛梭彭蠡銀山堆碧海青銅磨武昌雲間歎黃鶴采石天外愁青娥詩家割據㡬今古元氣發泄天不訶扁舟歸來月一蓑僊槎已候三山阿吾欲乘興觀銀河富珠哩翀字子翬其先隆安人祖悳從憲宗南征因家鄧之順陽以功封南陽郡侯父居謙辟掾江西以家自隨生翀贑江舟中時釜鳴者三人以為異翀稍長即勤學父殁歸順陽復往江西從新喻蕭克翁學克翁甞夜夢大鳥止其所居出視之沖天而去明日翀至克翁為改是名蓋翀始名思温字伯和也大悳十一年用薦者授襄陽縣儒學教諭陞汴梁路儒學正㑹修世祖實録姚燧首遂薦翀至大四年授翰林國史院編修官延祐二年擢河東道亷訪司經歴遷陜西行臺監察御史五年拜監察御史除右司都事時相特們徳爾專事刑戮翀因避去頃之擢翰林修撰歴國子司業自是外補内召皆稱其官文宗之入也翀建白近漢文故事上眷注呼子翬而不名久之亷訪漢中召僉太禧院遷國子祭酒㑹命朝臣郊迎帝師翀獨平立不拜衆為慄然元統二年參知江浙行省以遷葬歸鄉里再召以疾辭卒年六十追封南陽郡公諡文靖有文集六十卷范墳詩宋蜀􅇿開國公范鎮景仁諡忠文盛德偉烈光著史册人固知之葬在襄城汝安鄉推賢里載東坡集中甚詳襄城故隸汝州翀來訪問故老其墳儼然尚在已為野夫豪農耕為禾黍之區矣范氏當金季猶有居墳左者自經兵燼不知所存拊事歎閔故為作詩以紀其概幸在官君子知其為先賢遺壠庶有以處之忠文峩睂英始也跡甚微堂堂薛簡肅旟隼西南飛其人古亷守肯持蒟醬歸所得一偉人天下大布衣引以賓王家光映春官闈昭陵宋仁主前星久無輝犯諱言所難雷電每霽威雄哉鍊石手妙補天巍巍丞相江南來雲掩扶桑暉舊德陳苦辭往往阨謗譏諸賢抗章疏弱卒攻堅陴公力斡禹鼎正氣射黃扉荆舒憤至骨斥語筆自揮贈之以蕙蘭何往無芳菲時公與司馬聲諧玊琴徽解冠挂神武甘老西山薇九㝢日瞀瞀赤子將疇依兩公幸無恙起拯或庶㡬嗣君元祐初痛洗前人非民望屬司馬欲遯天為鞿帝命起公臥門絶車馬騑君實了吾事此外何所希清風溢寰海不啻嚴陵磯公既晚家許道德人所師襄城卜封竁汝潁皆京圻我來訪遺壠名姓存依稀雲仍散兵燼雨雪無留霏公名在天下豈逐薤露晞誰能禁耕牧盛事為德基吾力不足振感歎徒歔欷閲故唐宫錦佩走滅淮海波虬髥起操湯武戈盪民瘡痏六朝下天開百二秦山河我來徬徨舊宫土細麥繁花忽誰主終南王氣三百年僊李春風一千古春風吹夢天茫茫玉樓金殿春風香開元舞馬散㝠寞紇干凍雀含悲涼世態倉皇㡬烟霧秦漢英靈不知處崑崙河脈自西來湘浦雁行令北去鄧文原字善之綿州人父漳徙錢塘文原年十五通春秋在宋時以流寓試浙西魁四川士至元二十七年行中書省辟為杭州路儒學正大悳二年調崇悳州教授擢應奉翰林文字陞修撰謁告還江南至大元年復為修撰預修成宗實録授江浙儒學提舉入為國子司業陞翰林待制出僉江浙肅政亷訪斷疑獄如神至治二年召為集賢直學士明年兼國子祭酒泰定元年充經筵官以疾乞致仕召拜翰林侍講學士㢘訪嶺北湖南道俱不赴卒年七十一有文集及内制集若干卷藏於家雨中雜興窮巷積隂雨離居寡歡情安得􅅽埃風逍遥余上征長日有逝川春花無晚榮永懐山澤居好遯潛英聲於陵方灌園龎公不入城此意豈忘世咏歌以濯清今我夢江國噭噭鶗鴂鳴不憂芳草歇但恐白髮生歸休企前哲矢言著貞誠悠悠莫識察思子攜手行題丁氏松澗圖天目之峰凌紫烟下周林壑紆長川清池斗絶涵倒影神運直自疏鑿先彼美幽貞廬閒房曲奥辛夷荃蒼官手植經㡬年靈虯夭矯今參天門前朝流暮流水但聞激石瀉瀨鳴濺濺山人養真衡茅下有書可讀琴可絃意行清澗曲長嘯松風前山月出林髙溪花㺯春妍僊人欲來夜將半天空鶴唳山凄然飈塵大笑狂馳子口誦丹訣傳真𤣥我欲從之結隣屋得疏藥圃謀芝田陪髙彦敬遊南山不到南山又二年離離秋草映寒泉東林蕭散開蓮社西晉風流櫂酒船古寺雲烟終日合長松風雨半空縣謝公未了登臨興故向禪房借榻眠都中送元傑道士南歸授節僊山得過家都門津栁動春華還鄉近似千年鶴奉使榮於八月槎古井雲封丹竈藥舊松風掃石壇花道人冠劍鳴瑶珮豈必髙車晝錦誇題小薛王畫鹿禮樂河間雅好儒曽陪校獵奉鑾輿晝長靈囿觀遊後政暇嘉賓燕集餘蛺蝶圖工人去乆騶虞詩好化行初宗藩翰墨留珍賞慿仗相如賦子虚題謝氏通濟橋涔陽川上壓雲濤迥若僊山駕巨鼇甃石不愁僧路滑傾金寧計鬼工勞泛槎客去銀河近題柱人歸玊壘髙此地通津足佳興楚歌明月放輕舠送李彥謙西臺霜風十月長安道健鶻凌空淨羽毛地控函闗西極重星連執法太微髙鑄金古鼎奸先伏發刃新硎用欲韜雅志澄清付公等我懐江漢放漁舠送鮮于伯機之官浙東衣冠文獻參諸老臺閣功名負此公十載黃塵看去馬萬山青眼送飛鴻揮毫對客風生座載酒論詩月滿篷昭代需才公論定起分春雨浙江東送張綱父教官我友白蘋洲畔客忽凌風雪問征途南州歳晚尋髙士西塞烟深憶釣徒呼酒江船春水動讀書山館雨聲孤無錢自愧蘇司業聊賦驪駒為子娯送白君舉崑崙西日水東溟何處清風起獨醒逺道雲烟今古樹行人朝暮短長亭草鋪平野春如剪花落重門晝自扃不有茅茨容嘯傲終南山色為誰青正旦有感干戈短景去匆匆囘首南朝已夢中世事盡隨天道北春正依舊斗杓東一時玉燭堪調燮萬國車書想混同寂寞荒山老松樹看渠梅栁競春風清明省墓短櫂呉歌花滿川春帆愁斷蓼莪篇小溪蘋藻墦間祭春雨桑麻墓下田黃壤有靈終異土青山無樹半荒阡傷哉巴峽松楸路狐兔蒼寒六十年奉題延祐宸翰有序欽惟仁宗上承祖武蒐羅俊彦求治匪寧尤尊禮儒臣務敦風化由是治書侍御史臣郭貫擢禮部尚書凡在選者六人惟貫進秩有加親灑宸翰昭示龍光忝備臣僚咸増鼔舞集賢直學士臣鄧文原謹拜手稽首而作詩曰宵旰需賢表薦紳秩宗首選贊華勛官聮天府璇璣象帝闡河圖琬琰文曽聽簫韶瞻曉日仰攀弓劍泣秋雲小臣作頌稱仁聖湛露承恩未足云送姚利用入京雪晴川淨駕飛桅舟入河冰二月開壯士不緣彈鋏去故山曽見爛柯來上林淑氣催花栁盛代英雄擢草萊青眼諸賢如問訊為言衰病懶登臺子昻畫馬奔騰駿骨雲路長瀟灑神鬃風露涼沙場春牧草肥雨野徼秋嘶楓隕霜三闗戰士黃金甲五陵俠客紅絲韁朝羈暮絡祗腸斷華山烟樹遥蒼蒼題陶淵明像詩中甲子春秋筆籬下黃花雨露枝便向斜川頻載酒風光不似義熙時尚野字文蔚滿城人幼穎異祖母劉厚資之使就學至元十八年以處士徴為國史院編修兼興文署丞出為汝州判官遷南陽縣尹改懐孟河渠副使大悳六年遷國子助教陞博士仁宗在東官野為太子文學多所禆益至大元年除國子司業四年拜翰林直學士知制誥同修國史皇慶元年陞翰林侍講學士延祐初改集賢侍講學士兼國子祭酒移疾歸卒年七十六追封上黨郡公諡文懿淵明歸來圖羲皇上人鄉里兒田園將蕪非所思楚聲雖託絶怨懟髙情千古歸來詞歸來忽復河山移忠憤意切語益微白雲遥遥望不極東籬舊菊西山薇夷齊奚疑怨耶非况乃貌此遺世資文行圭璧照方册飄然髣髴空同時盧亘字彦威武宗朝知制誥有含雪集送鄧善之提舉江淛四首春秋嚴筆削凛若執𤣥鉞君獨抱遺經結髮飽剞劂明剖是非心微探義理窟下視羣兒愚爭端王正月朅來奮直筆浩然心思竭王功與帝德昭昭日月揭胡為厭詞林擬欲觀溟渤榮華若浮烟汗簡青不滅離離天星髙皓皓雲月光候雁過楚澤蟋蟀鳴中堂天時諒難測徒然多感傷念子去意逺沈憂結衷腸憶昔初奉歡露白春蘭芳清尊罷新製妙趣深濠梁飛景急西匿川流浩蕩蕩𤣥髮凄嵗晚不脱天雨霜蔓草豈容惜松柏在髙岡暘谷上寒日影射扶桑枝瞬息及中天流光迅難持人生百年内昻昻何所施孤鴻東南征浮雲西北馳可憐萬感身㑹合須臾期安得㺯明月皎皎逺憂疑折花芙蓉浦蕩槳江漢涯優㳺以卒嵗身名良不隳遊雲蒼鱗窮閶闔不可呌徒令虎豹闗日月近輝耀濛濛八表塵隠隠萬彚竅泯然一歸途伊誰執其要栖栖聖哲徒禮樂懐窈𦕈閉門忍朝饑風雨深蓬蓼今年江海去光景短螢爝禾黍滿故墟閭巷餘返照揮絃送飛鴻古今入長嘯過黃陵廟此詩已見李材集中而潘選復屬盧亘姑兩存之然李多遊湘南作則題黃陵廟固其宜也黃陵廟前湘水緑天寒漁郎唱巴曲沙棠舟上月蒼蒼翠蛟白蜃江茫茫似聞清愁五十柱萬里鴻飛楓葉暮神鴉翻舞祠門開珠裳玉袖霑莓苔𤣥猿晝啼薜蘿影赤鱗夜去芙蓉冷北渚淚痕斑竹紋南風哀思蒼梧雲山頭古桂秋露碧山下江流豈終極荒涼揭車雜杜蘅靈風自吹烟霧旌輕帆晚向芳洲泊聊薦蘋羞奠蘭酌沅有氾兮湘有沱洞庭木落生層波裴囘獨咏騷人歌和春詩鶯啼燕語花漸稀天明海碧涵晴暉洛陽臺榭春色在山隂衣冠昔人非夢雲何處燕瑶席舞雪誰家裁苧衣獨有倚樓無限意年年烟草暮鴻飛鮮于樞字伯機中歳刻苦讀書因號困學官太常以詩翰名世元史職官儒學皆不載而藝林盛傳其人甞書幅云登公卿之門不見公卿之面一辱也見公卿之面不知公卿之心二辱也知公卿之心而公卿不知我之心三辱也大丈夫寧甘萬死不可一辱其風致如此子必仁字去矜亦有才名感寓六首吾愛東方朔髙揖金馬門向非玩六合安肯來崑崙昻昻九尺身談辯黃河翻誰知上書意蛾睂非自㛰不見馬相如俛首狗監恩人生非桃李何故不自言吾愛李太白玩世如游龍自知天上謫何必人間容海風吹緑髮蕭蕭臥雲松我昔夢見之遺以金芙蓉清輝怪在眼月落峨睂峰春風如緑波淡蕩浴楊栁髙樓語錦瑟落花泛樽酒何人白鼻騧䝉茸紫貂袖一字或未識銀章縣兩肘煌煌貝宫珠迺落緯蕭手誰知草𤣥者窮巷閉白首宇宙忽空濶飲馬萬里流平生負兩眼及此行寓州天清健鶻運木脱饑鷹投長風吹海雨濯我紫綺裘相逢半遊俠把酒髥如虬慷慨説史記歴今山川秋向來衣帶水日短河無舟西風桂花落我上天台山僊子扶我手冷然蒼水環乘鸞者誰子飛烟渺難攀三生此遊戲㺯影銀河灣空山忽飛瀑四顧鳴潺湲長揖馬子微此豈非人間船頭書千乘船尾酒百壺酒盡書在眼落月如明珠忽悟八陣法縱橫如河圖惜哉經世士未肯窺唐虞季子相六國所見惟隂符以上感寓詩潘是仁編為丁鶴年作凡六首而元音僅録三首以屬鮮于樞未知孰是然近日錢氏列朝選中所載元末丁髙士詩甚夥未甞及此詩一句則六首皆鮮于作元音特選其三耳過桐廬漏巷灘驚流激長灘百折怒未已篙師與水爭退尺進纔咫技窮解衣下力排過乃止維時春冬交冰雪寒墮趾我時卧舟中起視顙有泚迂疎一何補辛苦愧舟子水荒子歌二首水荒子日日悲歌向城市詞危調苦不忍聞妻孥散盡餘一身城中米貴丐者衆崎嶇一飽經千門城中昔食城外米城外人今食城裏耕者漸少田漸荒政恐明年亦如此水荒子行歌乞食良不惡猶勝㺯兵獄中死水荒子聽我語忍死休離故鄉土江中風浪大如山蛟鱷垂涎寧貰汝路傍暴客掠人賣性命由他還更苦北風吹霜水返壑稍稍人烟動墟落賑濟欲下逋負除此著當年苦為樂水荒子區區吏弊何時無及早還鄉事東作湖上曲淛省廣濟庫每嵗用富户司出納延祐間有富户侵用官錢莫償者府判王某素殘忍乃拘繋其妻女以小舟載之勒趂遊客于西湖收纒頭入官鮮于伯機感作是詩湖邊蕩槳誰家女緑慘紅愁問無語低囘忍淚並人船貪得纒頭强歌舞玉壺美酒不消憂魚腹熊蹯棄如土陽臺夢短匆匆去鴛鎖生寒愁日暮安得義士擲千金坐令桑濮歌行露退宮人引駝絨繡㡌紅顴頰素髮微連細紗結出宮嫁作海商妻裙腰尚帶河西摺少年十五二十時中官教得行步齊春羅朝剪繡花帖堦前夜舞髙䕫麗寵姬當前翠衿小便覺中原美人少金蓮斜抱捧珠龍玉籠倒挂收香鳥年年宮中春日長小車銀甕蒲萄香香殿吹簫鳯皇語一日再宴諸侯王舞困樓蘭過三十内家别選蛾睂入雖名伴送半無家旋賣珠環問親戚一為商婦始自憐十年不見囘畨船多年不記教坊曲時時尋撥相思絃題董北苑山水愛山不得山中住長自空吟憶山句偶然見此虚堂間頓教還我滄洲趣隂厓絶壑雷雨黒蒼藤老樹蛟龍怒岸石犖确溪澗濶知有人家入無路一重一掩深復深危橋古木依雲林是中宜有避世者我欲徑去投華簪源也世本膏粱子胷中丘壑肯如此後來僅見僧巨然筆墨雖工氣難似想當解衣盤礴初意匠妙與造化俱官閒飽飯日無事吮墨含毫時自娯誰憐齷齪百僚底雙鬢塵埃對此圖建德溪行山截溪將斷川迴路忽通鳥飛青嶂裏人語翠微中𤣥圃參差是桃源想像同平生苦行役翻愛石尤風題許仁仲卷殘雪詞林退食時小窗開卷鬢如絲音傳正始誰同調氣逼元和稍自持文字不隨前輩盡風流只許後人知霜清月冷梅花瘦獨對熏爐看欲癡石橋山留題旁通日月上星辰有路遥應接玉京僊奕未終人物換秦鞭不到海波平當時混沌知誰鑿他日崆峒强自名枯樹重榮事尤異欲從樵者問長生遊智者寺四圍松是祗園樹三面山開舎衞城遊子心隨仙境化老禪詩似石根清㡬人邂逅有今日半載趦趄成此行安得盡抛身外事長年來此學無生袁桷字伯長慶元人為童子時詩已著聲大悳初閻復程文海王構薦為國史院簡閲官陞應奉翰林文字同知制誥兼國史院編修請購求遼金宋三史遺書歴兩考遷待制拜集賢直學士移疾去官未㡬復以原官召入改翰林直學士知制誥同修國史至治元年遷侍講學士泰定初辭歸桷在詞林朝廷制冊多出其手所著有易説春秋説清容居士集卒年六十一贈中奉大夫追封陳留郡公諡文清按元明善為袁夫人墓誌袁四明人家世通顯桷四代以上皆宋大臣飲酒雜詩五首春至舊疾作晝眠聽禽聲總角耽六籍萬化何縱橫觀象太極初始悟無虧成環中秘靈根羣動一以貞吾欲乘彩鳯截篁吹為笙上窮崑崙渾下探渤澥清京師二十載酒中有深歡大雨即閉户朔風常解鞍客至輙笑之是豈宜居官振容筮神蓍鴻飛漸于磐百嵗苦世短萬鍾非我干所以東方生吏隠神益完陽烏乘南雲飄飄振竒翮迫此粱稻謀居移遂成客愧我食京塵誓墓志未獲雙峰十丈松下有千載魄當年侍蓬瀛香芸森寳冊髙齋集遺編朱墨猶手澤戰兢愧匪承永念在行役少欲觀滄海下取珊瑚枝穹龜負𤣥文靈鰌揚朱鬐盪舟不能往寶氣時紛披有客方壺來授簡雲差差一以參太極九以師庖犧振衣海神泣舉觴山鬼移載觀五嶽形五性各有殊神州養深知百靈受驅馳申申安樂翁定洛為中居神京屹金臺五雲玉芙蕖始知天經旋積氣為堪輿嵯峨白雲阡種松在山腰散之不盈掬離離如麥苗迎陽潄靈津參差拂雲霄露重碧天淨𤣥鶴時來巢俛仰二十年鬢齒日以凋寄聲謝𤣥鶴相期躡岧嶤次韻虞伯生夜坐炎晶爍草露木末望西顥靜躁誰為尸翕忽紛寸抱志士法天運炳燭不在老羣經固其郛積神以為寶陋彼多言生希名太𤣥草山林詎心違歳月付幽討擾擾徒為名努力在此道度淮寄養浩竹清寒房靜殘月在西壁悄悄燈景微尸坐棄枕席井華飲蟾蜍𤣥雲成五色明知非世謀精詣在六籍我行長淮浪凍樹挾春碧夢子白紵寛雙眸炯空激書來屢在手此意何的的數面不成歡逺别迺復惻歸雁臨風翔先之寄深臆懐伯生春雨消路塵春風散林纈蕩蕩長安門客子千萬轍城隂有一士淡食羮不啜采彼松上露煮石化晴雪沈㝠獲真性觴至那復説向來舌本談今作耳根熱維南有樛枝嵒溜滋百結在德良自防居屯詎為折念之長夜深寒光吐殘月史氏報春堂白雲在屋角凱風生樹端下有慈竹叢低昻候平安盈盈玉雪母光若赤瑛盤朝奉鶴禁恩暮承龜臺歡教兒誦經史清言消綺紈築堂深且明朱光映庭蘭寸心諒匪石寵辱非所干世故疾危岌奉盈身愈完願言樹明德朝夕應加餐煮茶圖一卷倣石窗史處州燕居故事也石窗山樵晉公子獨鶴蕭蕭烟竹裏月湖萬傾碧瑠璃髙築虚堂水中沚堂深六月如深秋萬柄風揺紅旖旎遵南更有山澤姿對面晴峰插天倚憶昔王門豪盛時甲第如雲總朱紫曉趨黃閣袖香塵俯首脂韋喪厥美一官逺去長安門德色欣欣對知已豈如髙懐脱榮辱妙出清言洗紈綺郡符一試不挂意㟁幘看雲卧林墅平生嗜茗苦有癖古井汲泉和石髓風囘翠碾落晴花湯響雲鐺滚珠蕋齒寒意冷復三咽萬事無言歸坎止何人丹青悟天巧落筆毫芒研妙理黃粱初炊夢未古舊事凄零誰復紀展圖縹緲憶遺蹤玉佩珊珊響秋水送蘇子寧赴嶺北行省郎中二首貂帽䕶寒沙冰天閲歳華斷溪駝聽水密雪犬行車雲盡難尋雁春深不見花昔人竒絶處八月解乘槎往歳經遊地寒蕪碧燐深雲開山後陣水咽隴頭吟雪白氊房重天青羽檄沈重華新雨露悲喜候車音書懐寄從子瑛越公舊築鄞江宅風捲飛花刼火新子竟尋真餐白石我方修史玩青春金張螭綬元欺世王謝烏衣亦可人誓墓政須堅晚歳雙峰擁髻碧嶙峋次韻天童岫禪師太白峰髙積翠明老禪的的寄深情相思沙礫惟懐璉獨立鄉臺近子卿舊業久荒松露立浮名空眩槿朝榮定須結社修真隠寒月深燈了梵經送雪竇長老校經囘里翠鎖公闗疊疊髙坐看明月負金鼇已將禪板傳心印暫下繩牀衣毳袍聖諦無聲機獨露經筌有誤目難逃塵中白髮誰消得歸掩山寮聽雪濤五月二十日甘雨如注江南呼為分龍雨平疇龜坼禱龍君百頃青黃兩界分匝㟁已霑三尺雨隔溪惟見一川雲誰家襏襫涼如水此地祗禂火欲焚共道神功有南北老農元不廢耕耘送華山隠者黑髮詞官佩水蒼萬松深處響琳瑯黃柑有法能為酒紫术無饑可代糧招鶴舞空山月冷檄龍吹雨海風涼瑶池欲問長生訣碧澗研朱寫綠章次周侍御囘朝蛾睂班肅整皇皇匼匝松隂陋午光舞翿當軒催進酒册函登陛促傳香六龍捧御雲中日三象輸琛海外洋欲識兩宫清淨理熏風殿角漏初長碧筩飲甘露無聲墜玉盤中天飛影動琅玕壚頭太白塵埃熱石眼空青冰雪寒水泄尾閭來瀚海手扶砥柱障狂瀾麯生不用忙傾葢吸盡清香見肺肝寄子昻故國王孫佩楚蘭春雲涼月倚朱欄玉簫曲趂鶯聲囀金鼎香隨蝶夢殘碧沚波清堪把釣黃塵風急倦彈冠外家文物惟君在笑我冰姿跨曉鞍送王繼學二首玉京髙處雪流脂連插雞冠緑鬢垂蹀躞有泥歌獨漉琵琶無夢説相思黑河舊樂催填譜白海名花擬進詞羽獵上林俱罷賦卿雲何以報明時淺波平疊磧漫漫拂嶺青帘罨畫看氊屋起營羊胛熟土房催頓馬挏乾祠宮走驛傳金椀氷正分奩貯玊盤莫上鄉臺望南北白雲微處是長安觀物黃河不信從天下濟水那知有伏流自古乾坤合神化空將簡牘費㝠摉張華博物身終死鄒衍談天舌竟休我亦從今銷綺語春風碧眼玩沙鷗寄開元奎律師雙塔亭亭透夕陽芭蕉深處碧窗涼江神夜聽光明偈天女朝分解脱香齋鉢午空烏守樹經堂雲冷鶴歸房平生欲結西方社似笑淵明作吏忙無題次馬伯庸韻四首金縷歌殘月滿江玉顔曽憶侍油幢象牀雲重恩專一鯨錦波翻賜疊雙春淺正宜氊作幕夜凉深恨魫為窗浣紗可是無虚匹側足寒溪濺石淙翠簾匝匝䕶朱光千葉宮桃滿院香閬苑有鸞通尺素虚橋無鵲寄流黃上林賦罷歸巴蜀興慶詞工謫夜郎不是月中親度曲世人那解聽霓裳相期來似石城潮日望晴虹結綵橋却月睂愁歌漸逺凌波步近意非遥抽琴有恨迴青角疊袖無塵轉緑腰㺯玉最憐隨鳯去秋來誰與伴吹簫白髮詞臣兩耳垂華腴堆笏陋牛醫宮娥引燭催麻日院吏傳更寫制時蠟撚化生秋夕賜翠標疊勝歳華移低頭欲説唐朝舊願侍虚皇進玉巵以上八首潘是仁編為貫雲石作曹選於袁貫兩存之然考次伯庸無題詩在文類中久已屬袁其餘皆袁作無疑矣潘編多耳食附㑹而能始亦草率如此豈未讀文類耶翰林故事莫盛於唐宋聊述舊聞擬宫詞五首禁鐘初動趣傳宣衣袖薫香到御前漸近宮門扶下馬内官分引導金蓮御筆圓封草相麻龍箋香透擁金花儀鸞敕設庭前候賜酪方終更進茶制草塗鴉未敢刪内璫宣引侍龍顔已分筆格金蟾滴更賜端溪紫硯山春帖分裁閣分多宮娥爭餽纈綃羅青絲菜餅銀盤送幡勝新題墨旋磨清馥香温玉酒巵祝文新撰報都知夜來奉㫖傳丞相五朶雲濃押省咨葛僊翁移居圖翁媪相攜入翠微轉頭猶有可憐兒丹砂不是神仙藥勾漏歸來鬢已絲宮女度曲圖望瀛法曲紫霞觴更按伊州奉玉皇翠竹涼深宮院密新聲那得過宮牆同恕字寛甫其先太原人後遷秦中奉元祖昇父繼先皆博學熊文恕安靜端凝羈丱如成人年十三以書經魁鄉校仁宗踐阼即其家拜國子司業三召不起陜西行臺侍御史趙世延請即奉元置魯齋書院中書奏恕領教事制可之延祐設科再主鄉試人服其公致和元年拜集賢侍讀學士以老疾辭恕家無儋石儲而聚書數萬卷扁所居曰榘菴卒年七十八有榘菴集二十卷愁來時容易去何遲半在胸中半在睂門掩落花春去後窗涵殘月酒醒時濃如野外連天草亂似空中惹地絲除却五侯歌舞地人間何境不相隨程文字以文徽州人平生介持以著述為事不事造請年踰六十始擢國史編修官調國子助教拜南臺御史遷禮部員外郎有集三十卷送文仲德之臨洮帥府經歴吾聞洮州緑石堪為硯能淬筆鋒如淬劍地靈天寶愁鬼工埋沒塵沙羞自獻羌童目悍手足鮮挂弓走馬唯臨邊雄藩令嚴烽燧息鼔角晝静旌旗縣幕官姓文不好武要使西羌化東魯詩書盈案夜生輝親寫封章上天府豪猪之靴青兕裘時平不願萬戸侯但得洮州緑硯石歸來泚筆立螭頭歳寒問答辭二首松柏杉何槃槃毫末小排雲端不作梁柱守歳寒曽不如桃李花朝榮暮謝得實升金盤昻藏千百年一待鳯與鸞松柏杉何槃槃古來材大用則難君勿言時則然受命既獨賦性偏髙枝中梁柱小枝可以為車船材見識全吾天鳯鸞不巢且任百鳥喧寧同歳寒老不與春風妍君勿言時則然大匠一過肯棄捐髙克恭字彦叔房山人官尚書善繪事題道院二首緑隂無際壓蒼苔為愛幽深手自栽風月早知煩耳目不教春筍過牆來草色琅玕逼兩楹蚤隂才過午隂清斜陽又送西軒影一枕移牀待月生無錫山中留題山深自昔無車馬道在何曽畏虎狼祗恐閒人來看竹淋漓醉墨汚新牆即事古木隂中生白烟忽從石上見流泉閒隨屈曲尋源去直到人家竹塢邊過弋陽雷聲驅雨過山西山腹雲根似削齊日暮牧兒歸不得料應白水漲前溪過信州二千里地佳山水無數海棠官道傍風送落紅攙馬過春光更比路人忙宋元詩㑹卷七十二
