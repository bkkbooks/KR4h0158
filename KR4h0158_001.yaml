body:
  text: 宋元詩㑹卷一兵部主事陳焯編宋太祖稗史載宋師圍金陵南唐使徐鉉來欲用口舌解圍鉉盛稱其主博學多藝有聖人之能因誦所為秋月詩宋祖大笑曰此寒士語耳吾不道也鉉未心服因以上請侍臣皆驚懼相目宋祖徐曰吾微時自秦中歸道華山下醉臥田間覺而月出有句曰未離海底千山黑才到天中萬國明鉉大驚殿上稱夀夫開創之主神智過人區區吟事固無足道然以一人而肇數百載文明之治其氣象聲口得諸英分函蓋一世有不期然而然者漢龍準大風之歌明髙皇神鳯慈烏之操後先一揆雲漢天章自非刻鏤組織所能幾也初日詩太陽初出光赫赫千山萬山如火發一輪頃刻上天衢逐退羣星與殘月宋仁宗帝於進士聞喜宴必製詩以賜之如恩袍草色動仙籍桂香浮皆警旬也嘉祐初梅龍圖摯出守杭州亦拜賜章凡數首其首篇曰地有吳山美東南第一州則見之歐文有美堂記餘惜不盡傳爾賞花釣魚晴旭輝輝苑籞開氤氲花氣好風來游絲罥絮縈行仗墮蕊飄香入酒杯魚躍文波時潑剌鶯留深樹久徘徊青春朝野方無事故許遊觀近侍陪賜劉沆挽章早富經綸業終成輔弼功立朝無黨比為國盡公忠此日悲遺直誰人嗣匪躬深嗟亡一鏡何以慰豫衷宋神宗神宗深於風雅頗自韜晦未嘗輕露其能而結構完密藴義纒綿如挽大公主三章則直詩人之詩不得以帝王篇什目之也蓋汴宋慶厯嘉祐間當人文之極盛臣下製作傳聞宫禁名章秀句服習宏多雖曰聰睿性成亦薰染陶汰之力有以致之乃論者比諸周穆漢祖其風調為不侔矣秦國大公主挽章三首海濶三山路香輪定不歸帳深空翡翠珮冷失珠璣明月留歌扇殘霞散舞衣都門送車返宿草自芳菲曉望城西道靈車去漸遙春風空魯館明月斷秦簫塵入羅衣暗香隨玉篆銷芳魂飛北渚那復可為招慶自天源發恩從國愛申歌鐘雖在館桃李不成春水折徒還沁樓髙巳隔秦區區會稽市無復獻珠人宋徽宗道君無所不能何有於詩然靡靡之音識者知其不競藝林所録惟禁苑荔枝一首音節稍壯顧紅塵一騎害馬勞生唐室妖風奚堪髣佛而未年之䜟早寓於此存詩者所以志戒也若其篇什則無取焉禁苑荔枝結實賜燕帥王安中葆和殿下荔枝丹文武衣冠被百蠻思與近臣同此味紅塵飛鞚過燕山幸徐常廬人生何事厭囂塵泛宅浮家冬復春今日暫來猿鶴語他年應召白雲人宋孝宗宋南渡令主惟一孝宗其見諸歌吟者雄緊清厲氣概岸然雖上抑於德夀下沮於僉人而厥志為可尚矣說者謂在藩邸時得力於尹焞朱震輩之講習豈不然乎春晴春風歸草木曉日麗山河物滯欣逢泰時豐自此多神州應未逺當繼沛中歌題宫中泠泉堂孰云人力非自然千巖萬壑藏雲烟上有崢嶸倚空之翠壁下有潺湲潄玉之飛泉一堂虛敞臨佳沼密䕃交加森翠葆山頭草木四時芳閲盡歲寒常不老玉津園賜和洪邁春郊柔緑遍桑麻小駐芳園覽物華應信吾心非暇逸頓回晴意絶咨嗟每思富庶將同樂敢務漁畋謾自誇不似華清當日事五家車騎爛如花新秋過雨述懷平生雄武心覽鏡朱顔在豈惜常憂勤規恢須廣大金山寺屹然天立枕中流彈壓東南二百州狂敵來臨須破膽何勞平地戰貔貅范質字文素大名宗城人生之夕母夢神人授以五色筆後唐長興四年舉進士為忠武軍節度推官歷官翰林學士知制誥周祖征叛每覽其誥敕處分軍事輒歎曰宰相器也周廣順初加拜中書侍郎平章事集賢殿大學士兼知樞密院事進位左僕射世宗不豫入受顧命恭帝即位加開府儀同三司封蕭國公及宋太祖北征至陳橋為六師推戴質率王溥等遂降階稱臣焉加兼侍中罷知樞密乾德初帝將有事圜丘以質為大禮使進封魯國公卒年五十四質亷介自持兩朝皆任宰輔不事生産太宗嘗稱之曰近時宰相清慎無出質右者惜缺周世宗一死耳有集三十卷戒兒姪八百字昨得謝課書希於京秩之中更與遷轉余以諸兒姪輩生長以來未諳外事艱難損益懵然莫辨抒古詩一章曉之去年初釋褐一命到蓬丘謂謝課青袍春草色白紵棄如仇適會龍飛慶王澤天下流爾得六品階無乃太為優凡登進士第四選升校讐歷官十五考叙階與爾儔如何志未滿意欲凌雲遊若言品位卑寄書來我求省之再三歎不覺淚盈眸吾家本寒素門地寡公侯先子有令德樂道尚優游生逢世多僻委順信沉浮仕宦不喜逹吏隱同莊周積善有餘慶清白為貽謀伊余奉家訓孜孜務進修夙夜事勤肅言行思悔尤出門擇交友防慎畏薰蕕省躬常懼玷恐掇庭闈羞童年志於學不墮為箕裘二十中甲科頳尾化為虬二十三進士及第今舉全數三十入翰苑時三十三步武向瀛州四十登宰輔年四十一貂冠侍冕旒備位行一紀將何助帝猷既非救旱雨豈是濟川舟天子未遐棄日益素餐憂黃河潤九里草木皆寖漬吾宗凡九人繼踵升官次門內無白丁森森朱緑紫鵷行洎內職亞尹州從事府掾監省官髙低皆清美悉由僥幸升不因資考致朝廷懸爵秩命之曰公器才者祿及身功者賞於世非才及非功安得專厚利寒衣內府帛飢食太倉米不蠶復不穡未嘗勤四體雖然一家榮豈塞衆人議顒顒十目窺齪齪千人指借問爾與吾如何不自愧戒爾學立身莫若先孝弟怡怡奉親長不敢生驕易戰戰復兢兢造次必於是戒爾學干祿莫若勤道藝常聞諸格言學而優則仕不患人不知惟患學不至戒爾逺恥辱恭則近乎禮自卑而尊人先彼而後已相鼠與茅鴟宜鑑詩人刺戒爾勿放曠放曠非端士周孔垂名教齊梁尚清議南朝稱八逹千載穢青史戒爾勿嗜酒狂藥非佳味能移謹厚性化為凶險類古今傾敗者歷歷皆可記戒爾勿多言多言者衆忌茍不慎樞機災危從此始是非毁譽間適足為身纍舉世重交游擬結金蘭契忿怨容易生風波當時起所以君子心汪汪淡如水舉世好承奉昂昂增意氣不知承奉者以爾為玩戲所以古人疾籧篨與戚施舉世重任俠俗呼為氣義為人赴急難往往陷刑死所以馬援書殷勤戒諸子舉世賤清素奉身好華侈肥馬衣輕裘揚揚過閭里雖得市童憐還為識者鄙我本羇旅臣遭逢堯舜理位重才不充戚戚懷憂畏深淵與薄冰蹈之惟恐墜爾曹當憫我勿使增罪戾閉門斂蹤跡縮首避名勢名勢不久居畢竟何足恃物盛必有衰有隆還有替速成不堅牢亟走多顛躓灼灼園中花早發還先萎遲遲澗畔松鬱鬱含晚翠賦命有疾徐青雲難力致寄語謝諸郎躁進徒為耳徐鉉字鼎臣揚州廣陵人十歲能屬文不妄遊處與韓熙載齊名仕吳為校書郎又仕南唐李景父子宋師圍金陵李煜遣鉉求緩兵及隨煜入覲太祖責之聲甚厲鉉對曰臣為江南大臣國亡罪當死不當問其他太祖歎曰忠臣也事我當如李氏命為太子率更令太平興國初直學士院從征太原師還加給事中八年出為右散騎常侍遷左常侍淳化二年坐尼道安誣以姦私貶靜難行軍司馬卒年七十六寒食日作厨冷烟初禁門閒日更斜東風不好事吹落滿庭花過社紛紛燕新晴淡淡霞京都盛遊觀誰訪子雲家中書相公溪亭閒宴依韻李建勳雨霽秋光晚亭虛野興回沙鷗掠岸去溪水上階來客傲風欹幘筵香菊在杯東山長許醉何事憶天台和州酬江中丞見寄賈傅南遷久江關道路遙北來空見雁西去不如潮鼠穴依城社鴻飛在泬寥髙低各有處不擬更相招泰州道中却寄東京故人風緊雨凄凄川回岸漸低吳州林外近隋苑霧中迷聚散紛如此悲歡豈易齊料君殘酒醒還聼子規啼送髙先輩南歸鄉國悲前事風光屬後生名從天上得身入故都行草色初裁綬鵬飛不算程自憐枯朽思相送剩含情送龔明府九江歸寧茂宰隨官去扁舟著綵衣湓城春酒熟廬阜野花稀解纜垂楊緑開帆宿鷺飛一朝吾道泰還逐落潮歸和致仕張尚書新創道院梓澤成新致金丹有舊情挂冠朝睡足隱几暮江清藥圃分輕緑松忩起細聲養髙寧厭病默坐對諸生尚書時有瘖疾京口江際弄水退公求靜獨臨川揚子江南二月天百尺翠屏甘露閣數帆晴日海門船波澄瀨石寒如玉草接汀蘋緑似烟安得乘槎更東去十洲風外弄潺湲宿蔣帝廟明日遊山南諸寺便返城闉意未甘更從山北到山南花枝似雪春雖半桂魄如眉日始三松蓋遮門寒黯黯栁絲妨路翠毶毶登臨莫怪偏留戀遊宦多年事事諳和殷舍人蕭員外春雪萬里春隂乍履端廣庭風起玉塵乾梅花嶺上連天白蕙草階前特地寒晴去便為經嵗别興來何惜徹宵看此時鵷侣皆閒暇贈答詩成禁漏殘秋日雨中與蕭贊善訪殷舍人於翰林座中作野出西垣步步遲秋光如水雨如絲銅龍樓下逢閒客紅藥階前訪舊知亂㸃半滋承露處碎聲因想滴篷時銀臺鎖入須歸去不惜餘歡盡酒巵除夜寒燈耿耿漏遲遲送故迎新了不欺往事并隨殘厯日春風寧識舊容儀預慙歲酒難先飲更對鄉儺羡小兒吟罷明朝贈知巳便須題作去年詩正初答鍾郎中見寄髙齊遲景雪初晴風拂喬枝待早鶯南省郎官名籍籍東鄰妓女字英英流年倐忽成陳事春物依稀有舊情新嵗相思自過訪不煩虛左逺相迎賀殷游二舍人入翰林江給事拜中丞清晨待漏獨徘徊霄漢懸心不易裁閣老深嚴歸翰苑夕郎威望拜霜臺青綾對覆蓬壺晚赤棒前驅道路開猶有西垣㕔記在莫忘同草紫泥來送歐陽太監遊廬山家家門外廬山路惟有夫君乞假遊案牘乍拋公署晚林泉巳近洞天秋海潮盡處逢陶石江月圎時上庾樓此去蕭然好長往人間何事不悠悠和蕭郎中小雪日作征西府裡日西斜獨試新爐自煮茶籬菊盡來低覆水塞鴻飛去逺連霞寂寥小雪閒中過斑駁輕霜鬢上加算得流年無奈處莫將詩句祝蒼華宣威苗將軍貶官後重經故宅將山南望近西坊亭館依然鎖院墻天子未嘗過細栁將軍尋巳戍燉煌史萬嵗嘗謫戍燉煌欹傾怪石山無色零落圎荷水不香為將為儒皆寂寞門前愁殺馬中郎送應之道人歸江西曾騎竹馬傍洪涯二十餘年變物華客夢等閒過驛閣歸帆遙羡指龍沙名題小篆矜垂露詩作吳吟對綺霞嵗暮定知回未得信來憑為寄梅花寄江州蕭給事夕郎憂國不憂身今向天涯作逐臣魂夢暗馳龍闕曙嘯吟閒繞虎溪春朝車載酒過山寺諫紙題詩寄野人惆悵懦夫何足道自離羣後巳同塵陪王庶子遊後湖涵虛閣東宫園縣圃清虛乍過秋看山尋水上兹樓輕鷗的的飛難沒紅葉紛紛晚更稠風卷微雲分逺岫浪搖晴日照中洲躋攀况有承華客如在南皮奉勝遊王三十七自京垂訪作此送之失鄉遷客在天涯門掩苔垣向水斜只就鱗鴻求逺信敢言車馬訪貧家烟生栁岸將垂縷雪壓梅園半是花惆悵明朝樽酒散夢魂相送到京華寄外甥苗仲武放逐今來瘴海邉親情多在鳯臺前且將聚散為閒事須信華枯是偶然蟬噪疏林村倚郭鳥飛殘照水連天此中惟缺韓康伯共對秋風詠數篇送楊郎中唐員外奉使湖南江邉微雨栁條新握節含香二使臣兩綬對懸雲夢日方舟齊泛洞庭春今朝草木逢新律昨日山川滿戰塵同是多情懷古客不妨為賦吊靈均和表弟包穎見寄平生中表最情親浮世那堪聚散頻謝朓却令歸省閣劉楨猶自臥漳濵舊遊半似前生事要路多逢後進人且喜新吟報强健明年相望杏園春送彭秀才賈生去國巳三年短褐閒行皖水邉盡日野雲生舍下有時京信到門前無人與和投湘賦愧子來浮訪戴船滿袖新詩好回去莫隨騷客醉林泉和蕭郎中午日見寄細雨輕風采藥時搴簾隱几更何為豈知澤畔紉蘭客來赴城中角黍期多罪靜思如銼蘗赦書才聼似含飴謝公制勝常閒暇願接西川敵手碁和翰長聞西樞赴鄰居夜宴開筵别有鄰居興卜夜應憐禁漏長舊友不期先命駕新姬憑寵剩傳觴香烟結霧籠金鴨燭焰成花照杏梁京邑衣冠多勝賞鱸魚爭敢道思鄉和蕭少卿見慶新居湘浦懷沙已不疑京城賜第豈前期鼓聲到晚知坊逺山色來多與靜宜簮履尚應憐故物稻粱空自愧華池新詩問我偏饒思還念鷦鷯得一枝題紫陽觀南朝名士富仙才追步東卿遂不回丹井自深桐暗老祠宫長在鶴頻來巖邉桂樹攀仍倚洞口桃花落復開惆悵霓裳太平事一函真跡鎖昭臺贈奚道士名含象奚生曾有洞天期猶傍天壇摘紫芝處世自能心混沌全真誰見德支離玉霄壁閉人長在金鼎功成俗未知他日飈輪謁茅許願同雞犬去相隨九日落星山登髙秋暮天髙稻穗成落星山上㑹諸賔黃花泛酒依流俗白髮滿頭思古人巖影晚看雲出岫湖光遙見客垂綸風烟不改年長度終待林泉老此身十日和張少監重陽髙會古平臺吟遍秋光始下來黃菊後期香未減新詩捧得眼還開每因佳節知身老却憶前歡似夢回且喜清時屢行樂是非名利盡悠哉陳侍郎宅觀花燭今夜銀河萬里秋人言織女嫁牽牛珮聲嘹亮和金奏燭影熒煌映玉鈎座客亦從天子賜更籌須為主人留世間盛事君知否朝下鸞臺夕鳯樓栁枝辭陌上朱門栁映花簾鈎半捲緑隂斜憑郎暫駐青驄馬此是錢塘小小家水閣春來乍減寒曉粧初罷倚䦨干長條亂拂春波動不許佳人照影看趙普字則平幽州薊人周顯德間永興軍節度劉詞辟為從事遺表薦普於朝宋太祖拔滁州宰相范質奏為軍事判官太祖嘗與語奇之陳橋之役以佐命功授右諌議大夫充樞密直學士乾德二年范質等罷相以普為門下侍郎平章事集賢殿大學士普既拜相上視如左右手事無大小悉咨决焉五年春加右僕射昭文館大學士上屢幸其第自是頗專朝政廷臣忌之會有攻其短者恩禮漸疏太平興國初入朝上書自陳預聞顧託之事太宗感悟召見慰諭拜司徒兼侍中封梁國公八年出為武勝軍節度用陳王元僖言復拜太保兼侍中未幾被疾求致仕上勉從之卒年七十一追封韓王雪中駕幸敝廬恭紀貞元重數策滕六劇霏葩漠漠初濡砌皚皚欲聚沙閭閻銀作界宫闕玉為家調鼎慚鹽撒沾溫覺絮加瑞凝三殿瓦欣動五雲車氷柱撐茅屋瓊枝擁翠華微行停蹕警冷漏靜街譁具野曽無隗蟠溪豈問牙公然門駐輦那信室蟠蝸積素堪麟畫飛黃想兔罝一庭堪曳練十道趣宣麻戎索籌先後雄材辨等差神威殷地軸御指落天花袁臥甘朝穩裴功敢夜誇雪山行獻琯早晚到星槎張齊賢曹州寃句人生三嵗值晉亂徙家洛陽孤貧力學少慕唐李大亮之為人故字師亮太祖幸西都齊賢以布衣獻䇿及還語太宗曰吾兹行惟得一張齊賢耳我不欲官之異時可輔汝為相也太宗擢進士因齊賢名稍後一榜盡與京官以大理評事通判衡州遷祕書丞改著作佐郎直史館俄改左拾遺策兵事多竒中出為江南西路轉運使召拜樞密直學士遷左諫議大夫雍熙三年大舉北伐齊賢請行即授給事中知代州以軍功拜工部侍郎淳化二年參知政事同中書門下平章事真宗即位加兵部尚書進左僕射年七十二薨贈司徒諡文定豫章胡氏華林書堂一百年來烟爨同衣冠江左慕家風兒孫歌舞詩書內鄉黨優游揖讓中孝弟筠編爭紀録門閭天語賜褒崇莫將六闕方朱氏朱敬則家門孝友三葉旌表門標六闕葉葉蒸蒸奉始終午橋新居午橋今得晉公廬水竹烟花興有餘師亮白頭心巳足四登兩府九尚書李昉字明逺深州饒陽人漢乾祐舉進士為祕書郎周世宗愛其文章擢史館修撰進翰林學士宋初加中書舍人開寶二年直學士院太宗即位加户部侍郎歷參知政事淳化五年以特進司空致仕年七十二薨諡文正生平為詩文慕白居易淺近易曉有集五十卷題岱宗無字碑巨石來從十八盤離宫復道滿千山不因封禪窮民力漢祖何緣便入關永昌陵挽詞丹青史筆敢虛張功德巍然軼漢唐奠玉四回朝上帝御樓三度納降王錢若水字淡成河南新安人幼聰悟十嵗能屬文雍熙中舉進士授同州觀察推官用寇準薦試翰林擢祕書監直史館嵗餘遷右正言知制誥同知貢舉以奏邉事稱㫖進翰林學士以右諌議同知樞密院事真宗即位加工部侍郎從幸大名陳禦敵安邉之策未幾知開封府上出手札訪以兵事改知天雄軍節制部署深為戎將推服上謂左右曰若水儒臣中知兵者也因遣巡撫陜西還拜鄧州觀察使代經略使知并州事病辛年四十四有集二十卷濟源縣裴公亭裴相亭成未退身空煩舞袖與歌塵至今亭下瀟瀟竹似對秋風怨主人賈黃中字媧民滄州南皮人七嵗能屬文十五舉進士授校書郎集賢校理遷左拾遺歷補闕開寶八年逋判定州判太常禮院未幾採訪嶺南太宗即位遷禮部員外郎知升州上李氏宫閣中遺物計直數百萬上嘉其亷其五年召歸闕拜駕部員外郎知制誥屢知貢舉加中書舍人兼史館修撰淳化二年參知政事俄罷知襄州以母老乞留京改知潭州拜禮部侍郎兼祕書監卒年五十六黃中性畏愼過當雖知政事無所建明故時論不之許有文集三十卷桂林還珠洞赫赫威聲震百蠻肯擕筐筥溷溪山無人為起文淵問端的珠還意苡還曹翰大名人少為郡小吏好使氣陵人不容於鄉里乾祐初周太祖鎮鄴與語奇之以𨽻世宗帳下及即位補供奉官改德州刺史宋初從征澤潞還改濟州刺史移刺均州兼西南轉運使充成都平劍南屢著戰功遷蔡州團練使歷桂州觀察使太平興國四年從征太原又從征幽州拜威塞軍節度後坐罪當棄市削官免死雍熙二年起為左千牛上將軍淳化三年卒年六十九翰雖武人頗知詩律宋史載其所作退將詩感動人主有曹景宗競病之風焉內宴應制三十年前學六韜英名嘗得預時髦曽因國難披金甲不為家貧賣寶刀臂健尚嫌弓力軟眼明猶識陳雲髙庭前昨夜秋風起羞見團花舊戰袍栁開字仲塗開寶進士端拱元年知廣西全州招撫蠻洞甚得其心作詩鑑一篇示之按宋史稱開為宋初文學耆儒未及其吏事即詩亦不入文鑑中因閲廣西名勝志得律詩二章併悉其治全州惠政亦一快也人開自稱無礙道捲煙閣古寺聳山椒公堂去不遙尋僧忘俗慮盤道出塵囂疏箔捲煙霧明眸望泬寥漁翁江上立指我在雲霄楚南樓洗盡蠻煙几案空登臨直見楚山雄坐當鴻鵠髙飛處身在乾坤灝氣中木落有情瞻北闕霜輕無夢入西風憑欄自是蓬瀛客獨對瀟湘興未窮蕭貫江西新喻人登祥符八年進士與兄賀弟賁皆以文名貫未第時嘗感疾夢至帝所命賦曉寒歌宮人授之簡曰此衍波箋也禁中曉寒歌寶獸宫扉三十六宫樹迎霜紅簇簇翠紗盤鳯珠網垂百刻香殘隕蓮燭炭猊呀焰壁椒馥轆轤欲轉霏紅玉渴烏涓涓不相續十二嶢關隱宫緑長廊四注簾旋濡海牛壓檐風不入文鞾侍嬪當宸闈壺箭傳呼鑰魚濕尚衣次進入堵墻千門萬户聞天香九龍鼓氣號寒螿晬容澤玉輝晨光綵衣佩魚無左璫兩兩趨走瞻扶桑紅萍半規出波面熠爚觚稜九霞絢鳴鞘一聲天上來長劍髙冠滿前殿吕䝉正字聖功洛陽人太平興國二年進士第一由通判升州歷知制誥拜參知政事同平章事封許國公卒年六十八諡文穆罷相歸贈隱者昔作儒生謁鎖闈今提相印出黃扉九重鵷鷺醉中别萬里烟霄逹後歸鄰叟盡垂新白髮故人猶著舊麻衣雒陽漫詫多才子自嘆遭時似我稀讀書龍門山八灘風起浪花飛手把漁竿傍釣磯自是鈎頭香餌别此心終待得魚歸蘇易簡字太簡梓州銅山人少慧勤學年踰弱冠舉進士初仕將作監丞逋判升州遷贊善以右拾遺知制誥進秩祠部員外郎同知貢舉以妻弟匿喪充貢坐罷知制誥俄復官淳化二年同知京朝官考課遷中書舍人充承㫖續李肇翰林志二卷以獻上賜詩嘉之遷給事中參知政事緣與同官趙昌言不協忿爭上前出知鄧州移陳州卒有文集二十卷誦聖製大言賦聖人興兮告成功登崑崙兮展升中芳席地兮饗祖宗天籟起兮調笙鏞日烏月兔耀文明參旗井鉞武衛森挹北斗兮注醴盞削西華兮為石䃭飛雲湧霞炮脤膰刳鯨臘鵬代鰈鶼迅雷三動山呼發紫電三流爟火赫四時一同兮萬八千年泰山融兮溟海乾圎蓋偃兮方輿穿樂史字永言原京兆人徙居崇仁宋初官著作郎賜緋魚袋卒年七十八著書十二種惟寰宇記傳於世子黃裳黃中黃目黃庭俱先後登進士黃目歷仕最久官通進銀臺兼門下封駁事鍾山寺千峯夾一徑一徑花枕泉聼泉復看竹行到鍾山前古寺雲生屋髙僧月伴禪自慚留一宿匹馬又朝天楊朴字契𤣥鄭州人太宗朝用畢士安薦召見賦詩應制賦蓑衣軟緑柔藍著勝衣依船吟釣正相宜蒹葭影裏和烟臥菡蓞香中帶雨披狂脫酒家春醉後亂堆漁舍晚晴時直饒紫綬金章貴未肯輕輕博換伊魏野字仲先陜州陜人也世為農母嘗夢引袂月中承鬼得之因有妊生野及長嗜吟咏不求聞達真宗祀汾隂野與李瀆同被薦遣陜令招之辭不至天禧三年無疾而卒年六十冬日書事十月天不暖前村到豈能閒聞啄木鳥疑是打門僧壞砌平山雪空堂照瀑氷晚來因出户差可暫攜藤書友人屋壁達人輕祿位居處傍林泉洗硯魚吞墨烹茶鶴避煙閒惟歌聖代老不恨流年靜想閒來者還應我最偏述懷東郊魏仲先生計只隨緣任懶自掃地更貧誰怨天有名閒富貴無事小神仙不覺流光速身將半百年春日春暖出茅亭攜笻傍水行易諳馴鹿性難辨鬭雞情妻喜栽花活兒誇賽草贏翻嫌我慵拙不解彊謀生暮秋閒望水閣閒登望郊原欲刈禾壞檐巢燕少積雨病蟬多砧隔寒溪搗鐘隨曉吹過扁舟何日去江上負烟蓑啄木爪利觜還剛殘陽啄更忙千林蠧如盡一腹餒何妨形小過槐陌聲髙近草堂豈能同燕雀惟解占髙梁閒居書事無才動聖君養拙住山村臨事知閒貴澄心覺道尊成家書滿屋添口鶴生孫仍喜多時雨經春免灌園秋霽草堂閒望草堂髙迥勝危樓時節殘陽向晚秋野色青黃禾半熟雲容黑白雨初收依依永巷聞村笛隱隱長河認客舟正是詩家好風景懶隨前輩却悲愁秋日登樓客次懷張覃進士聞說飄零亦異鄉登樓吟望益悲凉當時欲别言難盡他日相逢語更長蟬噪水村千萬樹雁過雲岫兩三行明朝策蹇還無定空倚危欄到夕陽蚤起夜長久待得晨興耽睡童猶喚不譍燒葉爐中無宿火讀書窗下有殘燈臨階短髮梳和月傍岸衰容洗帶氷應被巢禽相怪訝尋常日午起庸能上知府寇相公文武禀全才何人更可陪有官居鼎鼐無地起樓臺聖主詩方和親王狀始回鎮臨求二陜調燮輟三台鳯閣頒重去龍旌暫擁來下車三度雨上事數聲雷未暇瞻圭璧先䝉話草萊幾思趨相府恐懼復徘徊陜州平陸縣寒食花藏縣重陽菊繞灣一聲離岸櫓數㸃别州山上王相公聖朝宰相年年出公在中書十二秋西祀東封俱巳了好來相伴赤松遊尋逸者不遇尋真誤入蓬萊島香風不動松花老探芝何處未歸來白雲滿地無人掃酬萊公世情冷暖由分别何必區區較異同但得常將紅袖拂也應勝似碧紗籠王操太平興國初官太子中允獻南郊頌喜故人至地僻無賔侣柴門晝始開溪山寒葉落江國故人來話舊驚霜鬢論詩滯酒杯相留喜同宿不寐曙光回送人南歸相送當搖落孤舟泛渺瀰去帆看已逺臨水立多時别浦寒鴻下空山夜鶴移他年重會面吟鬢共成絲上李昉相公弱冠登龍入粉闈少年清貴古來稀袖中詔草朝天去頭上宫花侍宴歸卓筆玉堂寒漏迥捲簾池館水禽飛三台位近猶多遜閒聼秋霖憶翠微朝苑優游數十春文章敵手更無人對揚旒冕如僚友下直門䦨似隱淪倚檻白雲供醉望榰笻黃葉落吟身年來得意知難喻大半門生作侍臣宋元詩會卷一
