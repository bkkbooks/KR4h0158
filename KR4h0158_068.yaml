body:
  text: 宋元詩會卷六十八兵部主事陳焯編趙復字仁甫德安人元太宗乙未歲命太子科綽帥師伐宋德安以嘗逆戰其民盡被俘戮時姚樞奉詔即軍中求儒道釋及醫卜之士凡儒生挂俘籍者輒脫之以歸復在其中以九族俱殘不欲北樞知其為竒士留帳中夜逸行及水際將投身焉樞躡挽之多方曉譬謂徒死無益身存則先祀可延隨吾而北當保其無他復勉從之先是南北道絶載籍久不相通自復至燕始取所記程朱諸撰著盡録付樞從復學者浸廣其教日益有聞世祖在潛邸嘗召見咨以伐宋事對曰宋吾父母國也未有導他人伐吾父母者世祖義之因不強之仕楊惟中聞復論深嗜其學與樞謀建太極書院請復講授其中復作傳道圖别著伊洛發揮標其宗旨學者稱之曰江漢先生覃懷春日江南江北半浮生蹤迹居然水上萍竹雞啼罷山雨黑蠶子生時桑柘青按楊元耶姚諸公皆起家中都以入元初自當為元詩眉目而是卷首江漢容城兩先生蓋於義例各有取焉劉因字夢吉保定容城人世為儒家父述年四十無子夢神人馬載一兒至其家曰善養之既覺而因生乃名曰駰字夢驥後改名及字云因天資絶人三歲識書日記千百言過目不忘甫弱冠才器超邁作希聖解初為經學究訓詁之説輒嘆曰聖人精義殆不止此及得周程張邵朱呂之書一見能發其微曰我固謂當有是也因性不茍合家居教授師道尊嚴雖甚貧非其義一介不取公卿聞名往謁因多遜避或以為傲弗惜也至元十九年以布呼密薦擢承德郎右贊善大夫未幾念母疾辭歸明年丁內艱二十八年用集賢學士再徵以疾固辭且上書宰相詞意哀婉帝聞之曰豈古所謂不召之臣歟年四十五卒贈翰林學士諡文靖所著有四書精要三十卷文集十餘卷詩五卷號丁亥集燕平學仙臺碣石際海隅西南奄全燕中有學仙臺燕平欲升天燕平骨已朽遺臺猶相傳雖復生青松歲久摧為煙極目望海波不見三山巔三山巨鼇簪山人蟣蝨然使無不足論信有亦可憐大塊與洪爐金石難久堅天地會有盡何物為神仙空山無笙鶴落日下飢鳶今古非一臺浩歎秋風前黃金臺燕山不改色易水無新聲誰知數尺臺中有萬古情區區後世人猶愛黃金名黃金亦何物能為賢重輕德輝照九仞鳳鳥才一鳴伊誰腐鼠棄坐見飢鳶爭周道日東漸二老皆西行養民以致賢王業自此成黃金與山平不救兵縱橫落日下荒臺山水有餘清張燕公讀書堂隂壁下寒泉陽崖隱深洞想像張幽州當年此絃誦遐情納方寸灝露驚宵夢既有真積功豈無致時用不然起絶學猶當垂後統濟濟唐開元儒臣相伯仲文雖數燕許名不並姚宋遂令百世下煙霞抱餘痛尋幽縱步貪懷古清歌送緬思百鹿翁眼中見連棟兹山有道氣會遇或天縱聊以永今朝白雲不可種種松萬牛來丘山大厦髙崔嵬當年誰辛苦遺此千歲材手持百松子與之俱傾頽殷勤囑造物為護荒山隈今來見毫末喜溢蒼煙堆十年望根立百年排風雷自此千萬歲再見明堂開東家十年計戢戢千頭栽豈不早有望求此良悠哉和詠二疏委質義有歸乞骸老當去豈無戀闕心難忘首丘趣在禮此常典末世成髙舉漢庭多公卿圖畫兩疏傅至今秦中吟感嘆東門路目覩霍將軍功髙擅恩顧一朝履危機千載損英譽仲翁幸及年安肯嬰世務聖主賜臣金奉養行厥素造物佚我老餘齡今自悟田園付子孫身後復無慮神交冥漠中樂境尚森著和詠三良江山錯如繡死與敝屣遺安用親愛人共此丘土微秦人多尚氣宜無兒女私乃亦如當塗區區戀衣帷因傷秦政惡三嘆王綱虧殉人已可誅而况收良歸坐令百夫特含恨與世違秖應墓前柏直幹千年希遙知作俑戒為感詩人悲重吟黃鳥章淚下霑人衣燕歌行薊門來悲風易水生寒波雲物改何色遊子唱燕歌燕歌在何處鬱鬱西山阿武陽燕下都歲晚獨經過青丘遙相連風雨墮嵯峨七十齊郡邑百二秦山河學術有管樂道義無丘軻蚩蚩魚肉民誰與休干戈遊雲水庵乘春奮幽潛觀化登丘山哀淙聞逺壑息駕思雲關墾石密松桂結屋深茅菅生煙紛漠漠激流散潺潺山石浮夀色澗木榮歡顔覽物有真意撫節驚循環悠然千載情儼若盤石間眷焉欲晤語古人何當還泛舟西溪萬山倒滄浪一葉凌嵯峨嵯峨為飛舞翠影如婆娑輕隂散雨足淨緑生圓波人間碧海幻老眼青銅磨風雲幾千古辦此雨中蓑溪南有幽人鼓棹前山阿煙深渺無處月色浮松蘿和九日間居深居忘晦朔好事惟侯生偶因菊酒至喜聞佳節名香醪泛寥廓醉境還空明青天凛危帽浩蕩來秋聲緬懷長沙孫生氣流千齡乾坤一東籬南山久亦傾回看聲利徒僅比秋花榮撫時感遺事可見萬古情孤雲孤雲生幾時冉冉何所適豈無崑華髙路逺嗟獨力徘徊天中央明月為顔色下有幽棲士歲晏倚青壁朝飲澗下泉暮拂松間石相對淡忘情倒影寒潭碧遊源泉叢祠鬱蒼翠萬木藏清幽冷然石上足不逐蒼波流長風索我御欲舉仍遲留白雲何山來相對亦悠悠玊溪精廬居然山四頽危檻俯晴春川氣生不極翠潤流衣巾林隂起薄暮酒色生微醺歌聲忽落谷驚歸欲飛雲白蓮氷華謝風塵素質更深靜灝露凝幽香皎月散清景誰並絶世姿淡然水中影青房生苦心秋風逼涼冷安得同愛人共此良夜永潄霞巖丹霞凌日觀餘津浩難收蒼涼蘇病骨醉暈浮巖幽萬象春意融頽然得歸休擾擾路傍子無勞歌逺遊經古城我行常山尾髙城下吾前按轡覽形勢依依見全燕易水開前襟飛狐連右肩遙想豪傑場撫已增慨然薪人過我傍一笑如相憐指城前問余考古今幾年沈思未及答行歌入蒼煙月下獨酌佳月靜可飲一天明水寒餘光泛不極徘徊尊爼間但覺涼露下不知清夜闌醉眠吾有興君當下西山飛泉亭崦嵫多露草秋空把飛泉胸中玊芙蓉滿意清泠淵火食因煩鬱下顧心茫然何當分一杯灑落齊州煙六華峰入山採靈芝濯足東澗濵白雲不可招丹霞有餘津長風忽絶頂悠哉凌翠氛舉手問浮世此子何今人蜀葵蜀葵落秋子已能成小叢如何同枝花隱隱才含紅一氣有先後萬物誰窮通伊誰歎遲暮來此樽酒同翟節婦昔金源氏之南遷也河朔土崩天理蕩然西山乃有婦人翟氏年二十餘其夫從軍死於所事婦匍匐數百里以其尸歸負土而葬之遂自經墓側鄰里救而復蘇始終一節今年八十餘矣豫為作詩兵塵浩然際烈士難自全婦人無九首志欲不二天燕山翟氏女既嫁夫防邊一朝聞死事健婦增慨然生有如此夫早寡非所憐求尸白刃中負土家山前事去哀益深義盡身可捐無兒欲何為所依惟黃泉鄉鄰救引決烈日丹𠂻縣誰倣節孝翁重表濉陽賢桃源行六王掃地阿房起桃源與秦分一水小國寡民君所憐賦役多慙負天子天家正朔不得知手種桃枝辨四時遺風百世尚不泯俗無君長人熙熙漁舟載入人間世却悔桃花露蹤迹曾聞父老説秦強不信而今解亡國畫圖曾識武陵溪飛鴻滅沒天之西但恨于今又千載不聞再有漁人迷明妃曲初聞丹青寫明眸明妃私喜六宫羞再聞北使選絶色六宮無慮明妃愁妾身只有愁可必萬里今從漢宫出悔不别君未識時免使君心憐玊質君心有愛在逺方寧恨妾身辭椒房飛鴻不解琵琶語秖帶離愁歸故鄉續十二辰詩飢鳶嚇鼠驚不起牛背髙眠有如此江山虎踞千里來才辦荆州兔穴爾魚龍入海浩無涯幻境等是杯中蛇馬耳秋風去無迹羊腸蜀道早還家何必髙門沐猴舞豚穽雞栖皆樂土柴門狗吠報鄰翁約買神豬謝春雨清江曲清江芙蕖玉可憐岸花汀草自年年來鴻去燕不相識曉露無聲香暗泣江樓縹眇如花人望欲見之不可親無限晴雲錦樹新愁眉只向遙山顰遙山一千里長在愁眉底鏡裏繁華過眼空遙山鑄向青銅中遙山遙復遙芙蕖霜早凋明日愁眉為誰掃月白江清天未曉宋徽宗賜周凖人馬圖筆底金鞍自蕭爽誰云不博降王長汴梁門外若雲屯畫本相看應自賞十載青衣夢故都經營慘淡欲何如只除金粟呼風裊曾見昭陵鐵騎趨宋髙宗題李唐秋江圖秋江吞天雲拍水濤借西風挾不起斷雲分雨入江村回首龍沙幾千里淡菴老筆搖江聲髣佛阿唐慘淡情千秋萬古青山恨不見歸舟一葉橫明河秋夕圖明河淡淡縱復橫行雲悠悠度疏星鳳媒不來烏夜驚瓊枝玉佩遲所託畫中隱隱有機聲秋來秋去今猶古此恨不隨天宇青崑崙西頭風浪平辦我一舟蓮葉輕浩歌中流擊明月九原喚起嚴君平人間此水何時清明逺堂賞蓮醉賦畫堂香逺凝清秋宛如坐我南湖舟主人愛客情亦重謂我無語花應羞荷香繞筆詩自健滿紙已覺清江流平生老氣回萬牛為君傾倒元龍樓舉杯喚起謝安石我醉不省蒼生憂除夕百歲三分一初心漫慨然空囊難避節青鏡不留年靜閲無窮世間觀已定天履端思後月四鼓未成眠登武陽朝遊樊子館晚上武陽城潮接滄溟近山從碣石生斷虹雲淡白返照雨疏明且莫悲吟發樵歌已愴情書堂旅夜淹留已半載去住意何深月色一千里愁人方寸心秋聲助搖落生理歎浮沈松桂清霜滿哀歌動故林秋望病骨秋偏早單衣露亦寒微雲生水際暝色起林端地迥月遲下樓髙山易殘輕風吹欲舉醉袖拂層巒重渡滹沱遙臨滹水岸回望土門關秋色巉巖上川形拱抱間分疆人自隘設險地誰慳欲問前朝渡江鷗故意間寒夜肝膽了無寐襟懷誰與同更長頭可白燭暗火逾紅硯滴氷生癭星流氣吐虹林鴉先我起鳴噪竟何功寄子東太守一夕西山客頻年往事非黃塵驚我老青眼似君稀别浦秋容靜離亭草色微殷勤重寄謝後會不應違登雄州城樓古戍寒雲接渺茫故鄉遊子動悲涼江山自古有佳客煙雨為誰留太行野色分將愁外緑物華呈出夜來霜海門何處秋聲急極目滄波空夕陽新晴小雨新晴草色蘇家園生理未全疏埋盆欲學魚千里試地先栽芋一區時與老農談稼穡不因間客罷琴書乾坤妙處無人會卧看牆隂雀哺雛夢鎮州潭園昨夜分明是鎮州溪潭先子舊曾遊魂來千里太行碧夢覺滿庭煙水秋古淡園林無限意登臨今昔幾人愁當年猿鶴應無恙爭信書郎漫白頭自適久矣黃塵絶往還惟餘風月到柴關清霜烈日從渠畏野鶴孤雲迥自間天上銀河連碧落人間秋色對南山髙吟大醉堯夫老只有豪誇不易刪老崖老崖隂隂雲樹清柴門寂寂緑苔生空明萬象隨月出水墨四山因雨成千古心期破茅屋百年人事短燈檠道民不是悲秋客聽盡疏蛩夜夜聲夏日即事迂疏爭笑近清狂多病筋骸可預防久乏園蔬因種藥不留窗紙為抄方間從鳥雀分晴晝靜與蠜蛩共晚涼莫道幽人好標致陶廬原自有羲皇夜雨夢覺呼童問幾更未譍先作案頭鳴山深六月有秋意夜靜滿城惟雨聲四海虛名此身愧百年浮世寸心驚誰教簷溜如愁思欲斷還連直到明過徐橋老岸危欄曙色分只疑身是入山雲十年往事不回顧百里清泉如可聞人世誰教有長路坤靈終亦化塵氛興亡更遣陂塘在幾欲悲秋酒正醺秋郊行過青林徑欲還誰家茅屋在林間雲初湧出半含雨風漸吹開微露山世味嘗來知懶貴韶華老盡覺秋間天教勝境為詩敵未許幽人穩閉關反垂栁短吟偃蹇髙松雪漫飛最憐憔悴緑楊枝青絲曾識鶯聲軟黃葉俄驚馬足遲有分只偷春色早無心要結歲寒知不應再得東風力更與行人管别離遂城道中鐵城秋色接西垣逺客還鄉易斷魂霸業可憐燕太子戰樓誰弔漢公孫冷煙衰草千家塜流水斜陽一點村慰眼西風猶有物太行依舊壓中原石螺碧筒和露捲晴霞錦浪隨鯨落晚沙風趂歌聲來弄葉酒知人意要浮花胸中壁立三峰玉醉裏神遊太一家明日清霜看紅翠人生容易鬢成華逺山筆架得痕字何物能支筆萬鈞案頭依約逺山痕燈橫煙影隱猶見秋入霜毫勢欲吞掌上三峰看太華人間一髮是中原祕書未免從髙閣不向林泉怨少恩秋蓮子瘦影亭亭不自容淡香杳杳欲誰通不堪翠減紅銷際更在清江冷月中擬欲青房全晚節那知白露已秋風盛衰老眼依然在莫放扁舟酒易空村居雜興鄰翁走相報隔窗呼我起數日不見山今朝翠如洗白樂天琵琶行圖冀馬嘶寒風逐臣念鄉國江浦聞哀絃長吟望南北臘盡小雪初晴臘盡時無窮梅栁怨開遲人間不覺春日早只有吾家布被知銅雀瓦硯諸侯負漢已堪憐直筆何為亦魏編却愛曹瞞臺上瓦至今猶屬建安年新居雪擁間門儘未除小齋人道似禪居年來日厯無多事只有求方與借書山家馬蹄踏水亂明霞醉袖迎風受落花怪見溪童出門望鵲聲先我到山家宋理宗南樓風月橫披一首試聽隂山敕勒歌朔風悲壯動山河南樓煙月無多景緩步微吟奈爾何安熙字敬仲真定藁城人祖滔父松皆以學行淑其鄉人熙既承家學及聞保定劉因之名心嚮慕焉藁城距因所居不十舍因亦聞熙力於為學深許與之熙方造門而因已殁乃從因門人烏叔備聞其緒論一以朱氏為宗自是益從事下學之功平實切密簡靚和易四方來學者多所成就遭時承平不屑仕進家居教授垂四十年殁後鄉人為立祠於藁城之西管鎮其門人蘇天爵輯熙遺文而虞集為序焉擬古鬱鬱巖下柏青青水中蒲巖前有幽人壯歲常獨居獨居亦何為不羡春華敷十年掩關卧門庭盡荒蕪美人殊不來日夕聽軒車人生有定分所貴能樂天自輕失所守欲進安敢前思君重思君此情誰與宣舉頭見明月顧影徒自憐終當謝塵世洗心聞澗泉書事野性原孤潔無朋獨嘯歌業荒聞道淺靜久閲人多靈鳳寧棲枳𡨕鴻本避羅南遊有髙興何處是滄波次韻答友見贈髙山流水趣何深萬古千秋一素琴白石清泉成雅志光風霽月負初心伏龍應羡雲生谷獨鶴不驚鴉滿林無用野夫宜揣分商家元自有甘霖杏花初開小酌生紅和露滴胭脂又到芳春寂寞時便擬提壺花下醉却愁羞殺背陽枝杖藜吟繞去還來收拾春光入酒杯自是風花要題品等間蜂蝶莫相催龍仁夫字觀復號麟洲永新人以學行稱與同郡劉詵劉嶽申齊名而仁夫之文尤竒逸流麗所著周易多發先儒所未及至元間用薦者授江浙儒學副提舉不就詩文多散失惟兩絶句流傳至今蓋其命題託興足見髙風固非求工於詞調也琵琶亭老大蛾眉負所天忍將離怨付哀絃江心正好看明月又抱琵琶過别船應小玉帶索詩菡蓞池邊風滿衣木樨亭下雨霏霏老夫記得坡仙語病體難禁玊帶圍劉會孟字辰翁别號須溪廬陵人於唐宋諸大家詩皆有批點又評世説新語皆為士林所稱而同時張孟浩贈以詩云首陽餓夫甘一死叩馬何曾罪辛巳淵明頭上漉酒巾義熙以後為全人蓋宋亡之後須溪竟不出仕也文姬歸漢圖鵲巢覆絶孔文舉錦衾裹葬楊德祖銅雀春風歌舞長獨復悽然故人女故人有女勝無兒滿腹興亡身屬誰琴燒笛折筝灰冷閭巷草深歸鶴飢美人用事單于國細馬馱金為向北曾從過雁借書看又託枯魚寄聲得塞笳日聽心自哀天遣前朝漢使來穹廬抱子送于野欲去欲住真難哉大兒牽衣小兒乳割乳分攜淚如雨馬駛兒啼漸不聞腸斷一如初遇闕畫圖巧盡但無聲不畫賢王子母情踟蹰拳局各有態未必日暮分馳能天長地久何終極事已不堪回首覓草無南北是青青雲有朝昏長羃羃琵琶恨絶妬難消海上羝兒夢豈遙入見玉關天似錦歸從金馬曉當朝容儀憔悴餘雞骨記問荒唐存又殁衛郎去我墓何所魏史親人禮難越當時一女贖元身亂代流離更可聞天南地北有歸路四海九州無故人春晴二首江栁長天草色齊新晴何物不芳菲無因化作千蝴蝶西蜀東吳款款歸新燕池塘緑雨肥初晴未暖日光微角巾猶帶花梢濕才倚闌干見絮飛李冶字仁卿真定欒城人登金進士第辟知鈞州歲壬辰城潰冶微服北渡流落欣崞間世祖在濳邸聞其賢遣使召之且曰素聞仁卿學優才贍久欲一見其勿他辭既至問河南居官者孰賢冶惟以完顔仲德對又薦魏璠王鶚李獻卿蘭光庭等七人皆有用之才及世祖詢治道則曰立法度正紀綱而已上嘉納之晚家元氏買田封龍山下授徒講道及世祖即位復聘之不起至元二年再以學士召引老病期月輒去官歸卒於家年八十八所著有敬齋文集壁書藂削泛説古今難益古衍疑測圓鏡海等書觀主人植槐主人有佳樹移植庭之隅繁柯雖剪去不敢觸根株朝溉復夕灌乳井幾成枯諷誦角弓詩古人能起豫愛樹尚如此愛士當何如楊白花帝家迷樓春晝長紫笙吹破百花香葡萄凝碧琥珀光燕語鶯啼空斷腸枕帷紅淚灑瀟湘玉鏡臺前添午妝茜羅緩帶雙鴛鴦蝴蝶趂雪上叉梁千里萬里雲茫茫姑蘇臺吳王宴罷歌臺晚斜日清江映欄檻臺上西施醉捧心江邊東越愁嘗膽鴟夷裹尸去不還麋鹿散迹遊其間秋深明月照髙樹驚烏啼落丹楓寒功名獨羡陶朱子一葉扁舟弄雲水瀟湘夜雨逺寺孤舟墮渺茫雨聲一夜滿瀟湘黃陵渡口風波暗多少征人説故鄉墨海棠漢宫愁絶冷胭脂一醮劉郎兩鬢絲甲帳夜寒錦燭短六銖雲帔獨來時胡長孺字汲仲永康人家世通顯至長孺其學益大振九經諸史下逮百氏無不包羅而揆序之宋咸淳間從外舅宦蜀舉蜀銓試第一名授迪功郎宋亡退棲永康至元二十五年詔下求賢有司強起之拜集賢修撰改教授揚州移建昌轉寧海主簿擢兩浙都運鹽使司階將仕郎以病辭不赴隱杭之武林山以終長孺初師青田余學古學古師王夢松夢松亦青田人傳龍泉葉味道之學味道則朱元晦弟子也其淵源極正而涵養足以充之卒年七十五所著書有瓦缶編南昌集寧海漫抄顔樂齋稿行於世題段郁文雪石白雲飛來著石空翕霍變化生竒峰朝曦照耀舒復卷碧華忽擁玻璃宫秋潮初壯明于雪千雷動地吳山裂濤頭出海夕陽微百鍊青銅浮玉玦雲容濤勢偉且竒乍出乍沒須臾時乾篤雪山白盈尺晴天萬里窺蛾眉似識詩翁作詩苦獨擁清妍照環堵河翻月落夜未央如虹光氣飛屋梁許衡字仲平懷之河內人家世為農父通避地河南以泰和九年九月生衡於新鄭縣幼有異質長嗜學如飢渴家貧無書從日者家手抄書疏義繼得王輔嗣易説夜思晝誦身體而力踐之轉魯留魏人見其有德稍稍信從居三年還懷從栁城姚樞得程朱遺書益大有得居蘇門與樞及竇默相講習凡喪祭嫁娶必徵於禮以倡其鄉人學者寖盛人有所遺一毫弗義弗受也甲寅世祖出王秦中以姚樞為勸農使因召衡為京兆提學中統元年世祖即位召至京師時王文統以言利進為平章政事衡無意立朝授太子太保不拜改國子祭酒未幾謝病歸至元二年復召至京師命議事中書省衡力陳立國規模凡數千言帝皆嘉納四年移疾歸懷五年復召還六年命與太常卿徐世隆定朝儀併定官制俱稱旨亡何阿哈瑪特為中書平章政事勢傾朝野銜衡不附已薦為中書左丞欲中以法衡辭免從幸上京乃論列阿哈瑪特專權罔上諸事不報即日解機務歸後召為集賢大學士兼國子祭酒領太史院事至元十八年辛年七十三諡文正訓子干戈恣爛熳無人救時屯中原竟失鹿滄海變飛塵我躬揣何能僅存亂後身遺芳藉祖德隂理出先人俯仰意油然此樂誰與倫家無儋石儲心有天地春况對汝二子豈復知吾貧願汝學古人古道淳且真勿憚攻苦辛當思過乃親身在畎畝間不忘君與民功名戒乘捷以此書諸紳有感二首嬌兒未成人病苦不肯退憂傷動中懷慘慘心欲碎老妻情更惡中夜泣相對何如早還鄉山陽墳隴在平生所願心展轉不得遂十年誤同遊回首只多愧病連肝肺深愁覺妻子纍悠悠故鄉情滴滴眼中淚歸興不可遏歸程待何時悠悠故鄉心一夕千里馳西風動霄漢慘慘令人悲况我多病身天涯久棲遲交遊義難忘豈忍輕别離重念丘隴逺嬌兒正愚癡因循死異邑後世將安遺所願經營日及此未全衰樹桑牆以下開畦水之湄既得舒困難且可為鎡基别西山大山如蹲龍小山如踞虎煙嵐鬱蒼翠逺近互吞吐我來蘇門居遨遊成樂土䇿杖望朝雲捲簾看暮雨佳意豁塵腥勝槩入談麈使我鬱陶消不覺勞瘵愈生平鄙吝心一洗出千古回首聲利人何殊坐囹圄逺役非素懷况兼跋涉苦吟鞭裊春風遲遲如去魯芳菲二三月追遊盛桃塢歸來願無違一樽相對舉又一首所愛林慮山不處要路津兹焉幾千古絶彼朝市塵我來成素交淡淡日益親形骸兩相忘誰主誰復賔充然樂我飢怡然棲我神朝光連暮色佳意含餘春心境一融會世味殊非真奕奕草木光熙熙禽鳥馴衆物欣有託吾廬行亦新和吳行甫雨雹韻青山偃蹇與世疏只將秀色供吾徒知君如我有山癖深探逺討吾不如金燈峰山詩千首挂鏡臺前一杯酒人間萬事盡浮雲故人曾為相思否雲邊鸞鳳玊鞭鳴跛鱉蹣跚疊繭生天末碧雲凝逺思夕陽無語下西城北門觀漲雨水添新漲陂湖沒舊痕人迷堤口路船上樹頭村歲事知前誤秋耕未可論誰憐徭役苦天亦吝深恩不寐秋宵初感慨展轉不成眠老况青燈外羇愁白髮邊蹉跎嗟往事安穩憶歸年却起開門望霜清月滿天别友人良朋不易得此去復誰羣别酒無勞勸濃愁已自醺間關花外鳥冷淡日邊雲莫唱陽關徹離聲忍更聞趙氏南莊曉起北窗涼清談戢羽觴入簾花氣重落地燕泥香夢裏青山小吟邊白日長秋風載書籍相對築茅堂登東城步屧上東城秋風晚更清亂雲隨日下荒草過堤平野迥寬凝佇詩成促後生何當常似此慰我病中情遊北觀扶杖古城荒飄然意可傷道宫煙鎖樹農舍雨頽牆捕吏翻疑寇平人却笑狂長吁空仰首天際正蒼蒼喜晴曙色開晴望春風吹客顔緑紆東去水青起北來山魏府方期往共城已夢還芳菲梅塢盛留醉竹花間病中雜言二首磊落青山萬仞髙虛崖絶險駭猿猱從誰得上巖龕住免我從來俗事勞曉日煙霞明澗壑霽天霏靄散林臯休言只好寬凝佇滿地干戈學善逃春來秋去客中情轉首光隂十歲經學苦煉成心下赤愁多消却鬢邊青眼前世事翻棋局夢裏家山憶畫屏何日歸同林下友笑談書史復忘形題武郎中桃溪歸隱圖門外鞦韆擺翠煙籬邊雞犬亦間間更教爛熳花千樹對著縈紆水一灣好景已憑摩詰畫他年重約長卿還尋思此世人心别又愛功名又愛山中秋不見月繼竇先生韻撥去塵機得暫間秋蟾思比去年看誰知黯黯隂雲合故作凄凄夜色寒好友不來誰酩酊詩人徒想自闌干世間萬事渾難定付與無心却較安晚步西溪拉友西溪往步聨溪邊佳景麗秋天日回林影蒼煙外風轉灘聲白鳥前迅走雙輪機磨巧連安獨木小橋偏老年活計尋幽隱須擬為氓置一㕓宋元詩會卷六十八
