body:
  text: 宋元詩㑹卷三十五兵部主事陳焯編高登字彦先漳浦人少孤力學宣和間為太學生汴京被圍登與陳東等上書乞斬六賊及奪李綱兵柄再詣闕争之欽宗即位相吳敏張邦昌將復用李邦彦登力陳為不可不報紹興初廷對直切授富川主簿尋兼賀州學事秩滿士民匄留不獲相率饋錢以助其裝登辭之不可遂買書置學宫而去召赴都堂審察上疏萬言帝覧而善之秦檜惡其譏已授静江府古縣令縣乃檜父舊治檜生于此郡帥胡舜陟諭當建祠登曰檜為相無狀祠不可立舜陟大怒摭他事去登且誣以専殺之罪詔送府獄登航海上書求納官贖罪帝憫之㑹有為檜誘登往見者登不從檜怒仍送府獄幸舜陟先死其事得白廣漕辟為歸善令又用考試策題侵檜檜復坐以前事編管容州將置之死僅而得免謫居授徒以終還山招陳希韓乾坤莾囘互日月相盪摩百年纔瞬息萬類總么麽是身非我有造物如吾何觸事㑹心少幽棲發興多眷言意所適樂此山之阿脩篁擢新幹老木榮舊柯谷聲傳地籟松韻答天和獨石介而安寒泉淡無波園蔬掇纎嫩名菓仍駢羅細蔫著雨花碧卷受風荷隨意坐莓苔絺衣掛薜蘿得酒即酩酊作詩共吟哦嘯長情浩蕩舞短影婆娑妻孥鹿門趣黄綺商山歌﨑嶇路辭遥迢逓誰見過交親憶同調出處矢靡他每憐傷弓禽因感赴燭蛾自覺此身浮相看雙鬢皤人事何時休歸來勿蹉跎冒寒行風雨有感號風撼枯枿凍雨凝路塵乾坤秘日月八荒同一雲遥知沙漠寒黯淡愁殺人天涯望不極流淚滿衣巾中秋對月繡江再見中秋月嵗去月圓人尚缺相望千里共嬋娟苦恨亭亭照離别今夕一樽誰與同孟光舉案對梁鴻衆雛立侍儼成列以次持杯夀乃翁乃翁看月揩病目手足傾頽頭髪秃但願團欒三十秋不計東西與南北杜門故人方謝客為問意如何午枕清風足夜窗明月多易招惟酒聖難遣是詩魔一榻君家事何妨獨我過夢遊故山風際氅披鶴雲根杖策鳩幽棲知好在歸夢故難留山放數峰出泉分一𣲖流把茆何日辦縛屋䕶松楸送元泰但得身長健何妨鬢已華胸藏惟錦繡筆走是龍蛇作掾只三語讀書空五車卷懷已良計去去卧煙霞水漲謝邑宰送米心知一字不堪煮矻矻窮年黄卷中食粥由來未為拙儲瓶况乃嗟屢空令君好賢嫓韓愈賤子受賜慙盧仝春水從教遶舍北癡兒寧復啼門東乞米臣饑欲死侏儒飽方朔誰憐是嵗星館下諸生笑豐腹江頭漁父誚獨醒魯公已作乞米帖陶令旋尋儲粟缾親舊依然眼相向故應特地為吾青小源欲歸潮頰香醪暈醉紅鐙敲歸路勒青驄水涵萬頃曾孫稼月逗盈衿少女風大誤平生縁画足無聊中夜祗書空擬將方寸難論事直扣天門問化工夜行道中黄茒時節瘴煙濃人在山凹第幾重梁竦負才徒感慨嵇康賦性本疎慵此生自斷天休問吾道當年世不容㑹脱幘巾還舊隠鹿門妻子慣相從九日塞雁南飛度戍樓一聲天地有餘秋家連滄海難窮目人在蠻荒欲盡頭莫効涓涘禆國計况無毫髪為身謀所須菽水能多少踪跡飄然不繫舟歐陽澈字德明崇仁人年少負氣慷慨談時事不少屈其憂國憫時出于天性靖康初上禦敵十策既又論列十事皆不報高宗即位徒步走行在上封事極詆用事大臣為黄潛善所殺重遊寥陽洞有感尋眞曾到寥陽殿小立廊腰花影轉飛瓊仙子下瑶臺婥約雲鬟眼波剪水沈煙斷一簾秋醉睡海棠紅玉輭武陵歸去探年華揚州夢覺江波逺重來風物恰依然愛日融融素煙卷洞門寂歴鎖長春異木槎枒挿天半霞衣苒苒媚東風緑鎖窗前重識面酒酣春筍理琵琶曲終依約含幽怨人間名利幾時休馬蹄不駐空留戀桃花流水古猶今囘首碧雲人不見秋試下即事有感寄國鎮籬菊金英噴異香杜門岑絶獨持觴風掀脱葉横斜舞雲襯平林淺淡黄塞管有情増哽噎野花無緒伴凄凉不禁景物撩秋眼剰與新篇付錦囊戲促朝宗酒約雨収雲海湧金盆簾捲香絲破篆紋雙陸無心酬白璧十千有約醉紅裙哦詩誤許聨師服載酒眞當過子雲待遣秋娘呈妙舞春山已把水沈薫陳欽若時寓盤龍作詩寄之凛凛氷霜嚼齒牙沈沈清夜詠簷花摩雲氣逸干星斗落帋詞妍帶綺霞醉掃麝煤奔渴驥困紆象管引秋蛇擬尋紅樹賡詩社却日揮戈不許斜歸途遣興借朝宗韻簡敦仁緩著歸鞭水石鄉息鞍箕踞小橋傍煙滋竹葉雙叢玉秋著蘆花一岸霜潑眼溪山増爽氣襲人蘭蕙破幽香擬提吟筆扛洪鼎反笑蚍蜉不自量謝人惠紫竹杖王猷珍重惠龍孫策險扶危價莫論爛醉縣錢過酒肆狂吟步月打僧門虛心尚有凌雲操勁節元無染淚㾗應向香山居士道朱藤雖好未為尊臨川戲留友人山童澤涸欲金流小雨廉纎陡變秋河朔飲徒方快意鱸魚歸興不如休歌姝况有飛瓊侣結客當為擲菓遊一曲陽關腸斷盡未應聞此不遲留和子賢夏日晚望溪山潑墨水雲秋似綺餘霞次第収燦燦拒霜鋪蓼岸雙雙屬玉舞蘋洲杳無錦字來憑雁擬滅機心試狎鷗望裏碧雲還又合數峰江上忍凝眸洪皓字光弼鄱陽人少有竒節負經畧四方志登政和五年進士王黼朱勔皆欲婚之力辭宣和中為秀州司録拯水災活十數萬人攝寧海令蠲貧弱四千八百户税時號洪佛子建炎三年充北庭通問使至彼被執其副使龔璹竟事劉豫公節愈厲致窘辱百端移太原遷雲中逓冷山金大臣有烏舍者延公訓子而衣食不給宴如也淹留十五年放歸高宗欲大用之又以忤秦檜通判饒州責濠州團練安置英州徙南雄卒年六十八諡忠宣有文集五十卷子适遵邁皆以文學致顯仕葢忠義之報云奉使留金金臣烏舍求詩口占漫答久持使節傍門庭薄命猶賒五鼎烹羝乳何心占北海鴈書隨夢到京城莫言地廣頻修怨應念民勞早戢兵國寳善鄰君寳信坐膺難老見昇平向子諲字伯恭臨江人敏中𤣥孫欽聖憲肅皇后再從姪也元符三年用后復辟恩補承奉郎三遷知開封府厯京畿轉運副使建炎之亂康王次濟州子諲遣助軍費張邦昌使其甥劉逹齎手書通問子諲焚書不啟因械繫劉逹于獄中力請康王率諸將渡河出其不意以救二帝遷江淮發運以素善李綱為黄潛善所惡斥知襲慶府道梗不得行紹興元年移鄂州主管安撫荆湖東路單騎入賊營諭降被執俄釋囘詔提舉江州太平宫再除户部侍郎因潘良貴叱其奏對煩凟上怒良貴而子諲亦與同貶及和議起力排之忤秦檜致仕卒年六十八題王文孺臞菴仙翁五十鬢猶青高卧柴門晝亦扄茅舍已忘鐘鼎夢蒲輪休過薜蘿亭隂森門巷先生柳寂寞江天處士星晩嵗田家農事了閒抄寗戚相牛經陳與義字去非洛人兒時即能作文登政和三年上舍甲科官教授遷太學博士高宗南遷避亂轉徙召為兵部員外郎歴翰林學士知制誥紹興七年拜叅知政事惟思用道德以輔朝廷尊主威正綱紀丞相趙鼎毎于上前陳恢復之論與義必助之無何出知湖州遂請祠卒年四十九所賦墨梅詩最為徽宗所賞云休日早起曨曨窗影來稍稍禽聲集開門知有雨老樹半身濕劇讀了無味逺遊非所急蒲團著身寛安取萬户邑開鏡白雲度捲簾秋光入飽受今日閒明朝復羈縶夜步堤上旋買青芒鞵去踏沙頭月争教冠葢地著此影􅊳兀樹寒栖鳥動風轉孤管發月色夜夜佳人生事如髪夢中續清遊濃露濕銀闕連雨書事九月逄連雨蕭蕭穏送秋龍公無乃倦客子不勝愁雲氣昏城壁鐘聲咽寺樓年年授衣節牢落向他州寒食草草隨時事蕭蕭傍水門濃隂花照野寒食栁圍村客袂空佳節鶯聲忽故園不知何處笛吹恨滿清樽雨沙岸殘春雨茅簷古鎮官一時花迸淚萬里客憑欄日晚薔薇重樓高燕子寒惜無陶謝手盡可破憂端雨中北客霜侵鬢南州雨送年未聞兵革定徒使嵗時遷古澤生春靄高空落暮鳶山川含萬古鬱鬱在樽前將次葉城道中荒野少人跡竹輿伊軋聲晴雲秋更白野水暮還明寂寞信吾道淹留諳物情王喬有餘舄借我一東征宿資聖院閣暮投山崦寺高處絶人羣逺岫林間見微泉舍後聞閣虛雲亂入江濶野横分欲與僧為記今年懶作文道中寒食二首飛絮春猶冷離家食更寒能供幾嵗月不辦了悲歡刺史蔔萄酒先生苜蓿盤一官違壯節百慮集征鞍斗粟淹吾駕浮雲笑此生有詩酬嵗月無夢到功名客裏逄歸雁愁邉有亂鶯楊花不解事更作倚風輕岸幘岸幘立清曉山頭生薄隂亂雲交翠壁細雨濕青林花落客心碎鳥啼春意深窮鄉愁節換時得一閒吟别吕伯恭樽酒相逄地江楓欲盡時猶能十日客共出數年詩供世無筋力驚心有别離好為南極柱深慰旅人悲䎹王道濟䧟賊海内堂堂友如今在賊圍虚傳袁盎脱不見華元歸浮世身難料危途計易非雲孤馬息嶺老涕不勝揮立春雨衡山縣下春日雨逺映青山絲様斜容易江邉欺客况分明沙際濕年華竹林路隔生新水古渡船空集亂鴉未暇獨憂巾一角西溪當有續開花清明雨晴閒步澗邉沙行入荒林聞亂鴉寒食清明驚節序暖風遲日醉棃花書生投老王官谷壯士偷生漂母家不用鞦韆與蹴踘只將詩句答年華龍門未到龍門十載彊斷崖依舊立斜陽金銀佛寺浮佳氣花木禪房接上方羸馬乍來還竟去流鶯多處最難忘老僧不作留人意看水看山白髪長雨晴天缺西南江面清纎雲不動小灘横墻頭語雀衣猶濕樓外殘雷氣未平盡取微凉供穏睡急搜竒句報新晴今宵絶勝無人共卧看星河盡意明眼疾天公嗔我眼常白故置昏昏阿堵中不怪參軍騎瞎馬但妨中散送飛鴻著籬令惡誰能對損讀方竒定有功九惱從來為佛種㑹知那律證圓通秋夜中庭淡月照三更白露澄空河漢明莫遣西風吹葉盡却愁無處著秋聲清明街頭女兒雙髻鴉隨蜂趂蝶學妖邪東風也作清明節開徧來禽一樹花芙蓉洲殘年不復徙他邦長與兩禪同夜釭坐到更深都寂寞雪花無數落天窗牡丹一自黄沙入玉關十年伊洛路漫漫青墩溪畔龍鍾客獨立東風看牡丹汪藻字彦章饒州德興人㓜頴異入太學中進士第由婺州推官遷江西提舉學事徽宗親製君臣慶㑹閣詩惟藻和篇稱最時胡伸亦有文名人為之語曰江左二寳胡伸汪藻遷著作佐郎與王黼不合罷去欽宗即位三遷為起居舍人高宗以中舍召時次揚州藻多陳奏宰相黄潛善惡之出主宫觀明年復召用拜翰林學士帝親書白團扇紫誥仍兼綰黄麻似六經十字賜之自是詔令多出其手紹興二年出知湖州六年詔賜史館餐錢聽辟所屬就纂日厯八年上所修書六百六十五卷升顯謨閣學士以言者奪職居永州二十四年卒古鏡行我有辟邪鏡得之咸陽宫其隂為天池一母將九龍㫄書負圖字土蝕如旋蟲緘以駭雞珍妙極倕之工清光照逺近千里秋毫空豈不鑒脂澤所貴肝膽通問誰為此器太古非人功客聞重歎息意欲窺靈蹤高臺不辭倚恐客難稱容繩窮匣半啟四室來悲風日車當晝留羞澁如頑銅森然髪上指凛若臨霜鋒我還撫客手此豈世寳同揮淚兩無言掩鏡鞶囊中避地函亭野步今日幸無雨天空出遥岑行行不知疲遂至春江潯汲路轉籬落人家在桑隂平疇漲清波隴麥如人深溝畎戲鳬鶩新蒲映浮沈我生本樵漁對此諧初心景物豈不好悲來自難任風塵暗中原四海如驚禽黄屋狩萬里兩宫隔辰參龍移螻螘窺月晦蟾蜍侵宇宙有傾覆茲遊豈嶇􅋂銷憂賴濁醪太息誰能斟庚午嵗屏居零陵暑退潦亦収瀟湘浄如染時觀自跳魚衝破青琬琰纎纎初弦月不受薄雲揜近村應漸寒已有鴉數㸃桃源行祖龍門外神傳璧方士猶言仙可得東行欲與羡門親咫尺蓬萊滄海隔那知平地有青雲只屬尋常避世人關中日月空萬古花下山川長一身中原别後無消息聞説𤓰分因感昔誰教晉鼎判東西却愧秦城限南北人間萬事愈可憐此地當時亦偶然何事區區漢天子種桃辛苦望長年過吳明叟新居誰開大屋沈沈者門外垂楊拂車馬主人四十持節歸高卧緑隂啼鳥下㝠㝠一徑傍花入忽有清池照深夏魚吹落日知鏡净荷受微風看珠㵼夫君少多湖海氣欲騁驊騮無地跨故將能事驚世人坐向雲端差萬瓦稍培幽桂出窗前時放青山來竹罅人言此興極不淺天遣公忙那肯暇要須便作輞川圖他日思歸聊對画阻風雨辟邪渡寄王仲成渡頭急雨鳴森木木杪顚風飛大屋没腰寒水稻生芽滿眼青泥車折軸山行値雨舟値風窮愁日日煩天公不如歸卧澗壑底世事一掃春煙空别君兩年重此别喜君胸次渾氷雪擬將身作賈胡留無奈事如空鳥滅挽我不囘君怒嗔交情把握成參辰相隨百里還相見只有西山似故人過臨平二首一别九霄路風煙長滿衣已成身老大無復世輕肥天濶鳥雙下山寒人獨歸曉來何事雨春水半巗扉睡起凉生岸鈎簾坐小窗麥風能起柁梅雨不鳴江往事心長折歸途影自雙依然蒲栁地不待早秋降次韻向君受感秋且欲相隨苜蓿盤不須多問沐猴冠菊花有意浮杯酒桐葉無聲下井欄千里江山漁笛晚十年燈火客氊寒男兒幾許功名事華髪催人不少寛醉别季高侍郎疇昔追隨翰墨塲功名今日愧劉郎英姿合上凌煙閣巧譖曽遭偃月堂雙槳又乗清夜去一樽聊發少年狂歸來却共燈花語騎省看成滿鏡霜書寧州驛壁過眼空花一餉休坐狂猶得佐名州雖遭瀧吏嗤韓子却喜溪神識柳侯盡日野田行䆉稏有時雲嶠聽鈎輈㑹將新濯滄浪足踏遍千巗萬壑秋晚發吳城山風埽陽侯雪陣平雨催摩詰画圖成氣吞浦溆重林盡秋著江湖去鳥明厚禄故人無一字長年三老伴餘生㑹須滿意開懷抱到眼廬山不世情李彌遜字似之蘇州吳縣人登大觀三年進士調單州司户擢編修以封事剴切廢斥八載靖康初知瑞州徙知饒州以召對首奏勘亂大計排斥奸言帝嘉其讜直欲留之為時相所忌知吉州紹興七年遷起居郎論事益鯁切無所避和議起胡銓范如圭曽開以忤秦檜相繼貶逐彌遜復抗争之檜大怒嗾言官論彌遜與趙鼎王庶同沮和議落職十餘年卒朝廷思其忠節追復敷文閣待制有詩十卷同天隠少章遊嵩山懷元明秦公我輩士早踏翰墨塲萬言若投石十年猶枯囊苦欲泛江海有親在高堂牢落京華春門無一壺漿長鞭策瘦馬送我古道傍憐我値險艱赤心寫摧傷鏗鏘五字句勢與鵰鶚翔感此坐矯首星星鬢成蒼西風小揺落雨洗煙嵐光嶂曉露孤秀野隂栖暗芳更攜鮑謝流履盡千巗霜搜竒得幽深訪古到渺茫月落潭影空清吟殊未央緬懷紫芝宇百憂繞廻腸三歎已晡食十起中夜牀雲埋長安日魂夢不敢驤茂苑富山水結廬余所嘗我欲放船下卜鄰俯滄浪耦耕種秫田共掃三逕荒頭白青山裏長歌樂嵗觴承天寺宿雨洗蒼骨峰巒發新秀尋幽躡竒蹤騰踏衆山囿層林鎖巗隈突兀見危構空高望浮黎静聖逼靈鷲我來風雨秋白露欲昏晝但聞百川赴鳴玉㵼寒竇岳示閟嵲峨路絶不得簉攀縁仰脇息坐石俯長溜帶露摘山芎披榛覓仙酎山光晚逾清雲壑若相授終期爛漫遊陽烏欲囘咮更約十日留之子緩蹄輳法王東庵吾宗丘壑資耿耿抱幽獨結構祗洹家縈迴轉巗腹前川布黄金合嶂來蒼玉步出覺華天乗凌眩生目雲間起層林林際縣高屋斷砌滴疎泉微蹤隠深木堂空貝葉昏苔盛半堦緑朱幡久不來哀猨響秋谷秋居雜咏二首青春背我去白日不吾謀霜飈驚草木寒威戒衣裘寓形復幾時四序忽一周世路伏劒㦸中懷孕螟蟊營營事長久頽齡如置郵丘園倘未卜悟悦心自休窮秋雜花逺眷此霜下傑明金委珞瓔寳璐綴環玦依依風轉蘭皓皓日穿雪苦無夭冶姿不受衆目悦銜觴泛其英攬之腸為結誰能踵高門持以浣中熱宿揚州城外舟行遶城郭缺月疎林杪窈窕一溪深微茫衆星小忘言對詩書適意親魚鳥幸此絶紛華行歌閲昏曉遊黄蘗寺苦為捫蘿行正坐愛山癖振衣雲中樹洗耳泉上石稍尋優鉢林偶傍瞿曇宅溪横走羊腸山轉迴龍脊兩難伴搘笻二老共飛錫望迷落葉秋坐斷蒲團夕雲歸繞窗明香盡出簷碧希聲發巖竇妙觀生牆壁塵縁掃不開勝事成今昔行路難江心蟠石蒼虬立山激江流浪頭急風昏月暗魚龍愁電掣雲奔鬼神入船頭星斗天為低夜潮生寒洲渚移鳴舷鼓枻驚楚子危檣逺䌫號吳兒篙師咄咄自相語明朝扁舟繫何許半月江行十日風寸步家山隔秦楚黄衫年少金雕鞍日高華屋春夢殘挿花走馬咸陽道世上空嗟行路難虞仲通判以溪聲名軒約同賦山根出泉㵼鳴玉上有蒼崖擎佛屋無風水石自撞觸不盡潮音發寒谷宰官豈是雲間陸舊識南泉生處熟當軒大㮄與名目平地重翻偃溪曲曲中時轉三妙語一一聲音談佛祖喧豗噫視十方鼓萬壑風雷送煙雨此聲不屬聞中取六鑿相攘竟誰主後來紛紛何足數五乳峰頭曽賺舉山翁有耳百不聞團蒲曲几窮朝昏何時沿溪掬寒緑掃葉煎茶睡初足遊龍潭秦山破碎天上來女媧仙去空崔嵬中縣鳴玉三千尺下有百仞青銅開居龍變化出嘘吸雨暗雲昏鬼神入我來坐石秋水間雲影扶疎落空濕浮丘容成不可俟摩挲青壁著名字兩翁下遊㑹有時訪我鍾陵五松寺山行遇雨滄溟四乾青虬立碧雲摩霄高嶫岋六丁夜挽天河傾石骨無塵露蒼濕長風吹雨不成絲飛鞚衝山帶煙入羲和囘馭還青㝠布榖催耕喚春急獨宿昭亭山寺山寒六月飛霜雪樓殿夜深鐘鼓歇琅玕無風萬㦸閒屋角明河掛天闕龍牙七尺玉壺氷炯炯神清夢不成可憐幽絶無人共卧看雲頭璧月生發光林寺朝發光林寺﨑嶇渡復攀樞衣縁翠濕側足下蒼頑急雨欲平澗斷雲時見山祗應超勝地行路不知艱久雨阻遊昭亭有作浪跡隨方寄窮途觸事諳雨逄春甲子江滿地東南客鬢霜前落詩情酒外酣上方愁獨往藜杖許同參春日雜詠二首幽栖足春事晴日苦相催屐齒穿沙穏笻鬚礙竹囘光風初轉蕙殘雪欲欺梅自是經過少柴門日日開二月忽已破一春彊半過提壺工喚客布榖巧當歌得酒先愁盡惜花翻恨多逄辰不為樂明日復如何池亭詩月輕雷不成雨風砌旋搘牀山亂雲行曲樓高月路長柴門非故國戎馬尚他鄉笳皷悲清暝關河思不忘散策散策北岡路牛羊歸徑深水窮人小立山静客微吟㸃㸃稻花雨團團榕葉隂田翁罷争席明日共幽尋與公序避暑石盎方晝欲寢聞林間禽鳴甚樂因得小詩一林啼鳥不知名應怪山翁此地行化蝶與周俱是夢遊魚知我久忘情胷中丘壑眞餘事世上功名畏後生但得盈樽供自酌何妨人境卧淵明渡橫溪百尺滄浪兩岸沙肩輿徒涉步欹斜溪聲猶帶夜來雨山色漸分雲外霞岸曲斷林開鳥道水邉疎竹近人家塵埃何處尋眞境試逐寒流認落花次韻學士兄富陽道中長江送客静波瀾路入囘溪第一灣石瀨橫陳潮力減風檣圜轉櫓聲閒驅除方寸無窮事領略平生未識山自笑疎慵似中散政宜寥落水雲間德甫知丞過筠莊谿亭為待月之㑹戲呈席上諸友載酒何人過子雲傳呼雞犬亦驚奔門無車馬苔侵逕坐近池臺竹覆尊好月邀人留晚照疾雷催雨過前村獨醒楚子眞多事共醉愚溪百尺渾自連江赴守鄱陽黃原道中作海角三年一夢成北來重聽偃溪聲凝雲帶雨留愁住茂樹隨山送客行税稻沿崖畦上下茒茨枕谷路縱橫莫從馬腹消雙髀此地眞堪老此生題趙幹江行初雪圖𤓰步西頭水拍天白鷗波上寄長年箇中認得江南手十里黃蘆雪打船朱松字喬年徽州婺源人中進士第胡世將謝克家薦之除祕書省正字趙鼎都督川陜荆襄兵馬招松為屬辭之鼎再相除校書郎遷著作郎再用常同薦除度支員外史館校勘厯司勲吏部郎秦檜决䇿議和松與同列上章極言其不可檜怒諷御史論松懐異自賢出知饒州未上卒子熹題蘆雁屏征鴻坐何事天遣南北飛蕭然如旅人無情自相依孤葦吹欲折秋風不勝威㝠㝠一高雁空費弋者機寒聲落煙渚相應不暫違嗟余識此情納手空歎欷於潛道中山行厭犖确理策扶欹危緑野三兩家一息知可期冉冉層林端炊煙褭晴暉其民豐且樂恐是太古遺那知都邑間百索困鞭笞繁華今何有半作道傍羸度芙蓉嶺幽泉端為誰放溜雜琴筑山深春未老泛泛浪蘂馥娟娟菖蒲花可玩不可觸枯根盤翠岸老作蛇蚓蹙蹇裳踏下流濯此塵土足何當餌香節净洗心眼肉餘功到方書萬卷不再讀晚嵗窮名山靈苖縱穿斸坐睡坐久睡屢兀手失未了書清風脱然至心醒得我娛起看孤隙光了不移錙銖云何短夢中萬境生須臾嗟彼市朝子百巧營其軀安知非夢境過眼滅無餘戲答胡汝能我生苦中狹與世枘鑿乖平生素心人耿耿不滿懷汝能伯始後遊世如嬰孩相逄握手語便作塤箎諧時時笑謂我如子患未涯執古以稽今求合誠難哉涉世幸未逺子車尚可囘不見山巨源雍容居鼎台寥寥嵇中散絶交良可哀謁吳公路許借論衡復留一日戲作幽獨不自得駕言款齋廬殷勤主人意投轄恐囘車世途早已涉此去將焉如惟憂酒錢盡使我詩腸枯㑹合曾幾何可復自為疎更當留一夕帳中搜異書書窗對月天公自厭雨一夕開寒晴霜風净曠野揺落有餘聲饑鴉得林静霽月縈窗生故人千里餘濁壺誰與傾遥知勸影醉共此通夕情明年溪上路來餉雨中耕春日與卓民表陳國器步出北郊灼灼桃吐華濯濯栁垂縷芳菲挽人出春工乃如許嗟余閉門久佳節過不數伴擬山隂勝詩作斜川語誰言一尊酒妙指合千古歸來讀殘書耿耿霜月苦空餘流落心三歎非吾土和謝綽中觀瀾亭方塘灔宿漲曲澗來飛湍光涵蔚藍天澒洞碧玉寛小亭塵土外瓦影浮朱欄霜渚冩秋色煙林養漁竿佳人秋霞衣皎皎明月冠欲濯且無塵隠几得妙觀海若眩河伯等在蝸角端那知坳堂上盃水生濤瀾答保安江師送米不見道人久天涯嵗云除朝來食指動忽接送米書念師折脚鐺五合未省餘雖無覆餗禍尚有乞食逋云何憐孤客日受饑火驅未曾貸監河矧肻索缺奴嗟余事筆耕輕棄南畆鋤慁煩方外客此計良已疎何時事粗了歸葺五畆居生涯寄緯竹豈即非良圖久雨短句呈夢得身閒書有味吏傲俗不親小窗據物表掃盡心眼塵令尹垂珠玉敲門喚行春作意向芳物吾車曽未巾愁隂入病骨鳩婦聲亦嗔㝠㝠三日雨桃李迹已陳眼中醉鄉路風味良獨醇流光不容玩尺璧何足珍漓俗益可厭願言勤問津菖蒲東山在眉宇未到心鬱紆流泉撞哀玉清冽生菖蒲聞有嬋娟子棄家來結廬窈窕雲霧窗參差冰玉膚絶粒餌香節仙姿清且腴邇來隠身去冷落愁臞儒靈方無由乞石斗移根鬚相看意已消何必見子都中秋夜雨秋雲定何心忍翳今夕月尚嫌微㸃綴况乃都漫滅他時任氛霾此際望清澈倦投衲子窗竹雨聽騷屑對牀不成夢有酒那能設螢飛矜意氣蟲語轉幽咽心知層隂表皎皎玉輪潔何當凌倒景徙倚玩飛轍曉過吳縣舟行有嚴程越國常曉發雙櫓兀殘夢起坐窺落月人家㟁野水霧雨籠䆳闥遥憐瑣窗人欹枕聽嘔軋秋懷四首秋風未幾日我髪白已多千林了未覺奈此一葉何安坐惜流光斜盻寄庭柯寒蟲獨何者唧唧夜自歌月林疎愈明露草净可拭飛飛螢逓照軋軋蟲自織移燈檢書讀千載如經夕微言契夙心妙解失陳迹文章事雕琢囘視眞兒劇世無揚子雲此理誰見直林皋片葉脱静士最先知自我抱兹獨悠然星氣馳乾坤一逆旅鼎鼎竟何為枯榮俯仰中兒輩浪自悲青雲渺難必白髪不可辭得飽良已㤗雨畦瓜芋肥市朝富危機匹夫死慿河何如狎鷗子烟雨一滄波行藏各有趣不在相詆訶我師陋巷人千古冠四科送志宏西上九州眼一槩餘子眞瑣瑣嶽立培塿中喜此高岋硪如公我輩人取友亦到我揮毫賦垂天風雨卷蓬顆相期八表遊未覺夙心左解龜醉江閣酒面山月墮起瞻帝鄉雲感歎不成坐何須飛霞佩自辦凌風舸瀛州渺溟渤萬里一掀簸月桂花窗前小桂叢著花無曠月月行晦朔周一再開復歇初如醉肌紅忽作絳裙色誰人相料理耿耿自開落有如貧家女信美乏風格春風木芍藥穠艶傾一國芳根雖無恙嵗晚但枯枿飲梅花下贈客憶挽梅花與君别終年夢掛南臺月天涯谿上一尊酒依舊風枝舞香雪高情絶艶兩無言玉笛氷灘自幽咽且當醉倒此花前猶勝相思寄愁絶淮南道中微雪密密雲隂合斜斜雪態妍似欺春力淺故傍客愁邉宿鳥投村暝寒梅抱蘂鮮無人命尊酒清絶裊茶烟東陽社日泛舟觀競渡誰喚思家客來為蕩槳嬉鬢華羞照水雨意解催詩疊鼓飛文鷁香鬟出短籬醉歸眞夢覺猶憶湔裙時解汳舟上國經年客春流一櫂波已醒離帳酒猶記客亭歌野枕殘歸夢霜衾擁獨哦蓬窗横落月作意傍人多西湖泛舟望湖樓下照衰顔羞見塵埃兩鬢斑風艇縱看山轉側烟堤儘逐水囘還喚人歸去城鐘急觸處相親嶺月彎不用新詩摹絶境定知長到夢魂間贈言命張生俛仰塵埃的自羞稍看寒餓復誰憂小兒造物巧相戲窮鬼逐人殊未休我所不知煩子算世如無取更何求服箱挹酒眞么麽那用區區問斗牛贈僧知有叢林特地過幅巾迎笑出巖阿杖藜同覔牛羊路濯足來分鷗鷺波豈不倦遊貪斗粟坐令歸思動漁蓑他年㑹有相逢日稍食吾言聴子呵答卓民表送茶攪雲飛雪一番新誰念幽人尚食陳髣髴三生玉川子破除千餅建谿春喚囘窈窈清都夢洗盡蓬蓬渇肺塵便欲乗風度芹水郤愁狡獪得君嗔答人留别之什家在大江東復東去君一舍碧流通那知臨水登山處同寄飛蓬斷梗中愁絶盃中千里月夢縈江上一帆風只今且作須臾意更典雲裘醉小叢招友生雨収天氣欲清明猶有餘寒在粥餳馬隊客勤貪晝永鱣堂人病想身輕讀書有味虀鹽好對境無情夢寐清欲話此懷須我輩一來蠟屐伴春行送藺廷彦之衡州墻東新徑去年開二老扶笻便往來數面何曾三日别離懷都寄十分杯客亭繫馬梅争落官舍裁書雁欲囘見説雲霄有知已那須卜築向蒿萊曽幾字吉甫其先贑州人徙河南府㓜有識度母死蔬食十五年入太學有聲用兄弼䕃授將仕郎試吏部優等賜上舍出身擢國子正靖康初提舉淮東茶鹽高宗即位累遷浙西提刑坐兄開與秦檜力争和議牽連落職僑居上饒七年檜死起知台州以賀允中薦得召對稱㫖授秘書少監厯敷文閣待制乾道二年卒年八十二諡文清有文集三十卷嶺梅蠻煙無處洗梅蘂不勝清顧我已頭白見渠猶眼明折來知韻勝落去得愁生坐入江南夢園林雪正晴鄧帥寄梅併山堂酒甓社湖邉路詩筒得報囘舊時雲液酒新嵗雨肥梅不是園官送眞成驛使來鬢毛都白盡更著此花催謝人送壑源絶品云九重所賜也三伏汗如雨終朝霑我裳誰分金掌露來作玉溪凉别甑輭炊飯小爐深炷香麯生何等物不與汝同鄉述姪餉日鑄茶寳銙自不乏山芽安可無子能來日鑄吾得具風爐夏木囀黄鳥僧窗行白駒談多喚坐睡此味政時須次韻雪中積雪何所待冷雲終未開有時聞㵼竹無路去尋梅只欲關門卧誰能蕩槳來辟寒須底物正合麯君才種竹近郊宜竹樹手植滿庭隅餘子不足數此君安可無風來當一笑雪壓要相扶莫作封侯想生成鄙木奴巖桂粟玉粘枝細青雲剪葉齊團團巖下桂表表木中犀江樹風蕭瑟園花氣慘凄濃薫不如此何以慰幽棲即事似病原非病求閒方得閒殘僧六七輩敗屋兩三間野外無供給城中斷送還同行木上座相與往茶山清波雜志云宋高士寓上饒者則有徐師川吕居仁鄭顧道曽宏父吉父諸公嘉祐中狀元劉煇嘗欲編玉溪唱酬集以誌其盛因循未成焯按吕本中字居仁紹興間官中書舍人秦檜既相私有引用意本中封還除目檜隨風御史劾罷之因屏居茶山寺以殁鄭望之字顧道彭城人少有文名官吏部侍郎弟資之字深道亦吏部侍郎僑居上饒扁其室曰寓屋師川名俯詩見前卷居仁於南宋稱雅宗其全集不傳僅從石倉詩風中録得數首而已宏甫名開與鄭君詩皆無從見惜哉長至日述懷兼寄十七兄老來逾覺白駒忙眼看重陽又一陽心似死灰飛不起愁如寒日短初長厭看賔客空投謁强對妻孥略舉觴囘首山隂酬勸地應憐鴻雁不成行壬戍嵗除作明朝六十嵗矣禪榻蕭然丈室空薫銷火冷閉門中光隂大似燭見䟦問學只如船逆風一嵗臨分驚老大五更相守笑兒童休言四十明朝過看取霜髯六十翁謝人分餉洞庭柑黃柑送似得嘗新坐我松江震澤濵想見霜林三百顆夢成羅帕一雙珍流雲噀霧眞成酒帶葉連枝絶可人莫向君家樊素口瓠犀微齼逺山顰此詩一作謝宏父餉柑然宏父其兄也不應有君家句荔子異方風物鬢成斑荔子嘗新得破顔蘭蕙香浮襟解後雪霜膚在酒酣間絶知高韻傾瑶柱未覺豐肌病玉環似是看來終不近寄聲龍目漫追攀避冦遷居郭内風雨凄然鄭簡道餉酒烟雨昬昬二月梅全家避冦寄城隈欲尋碧落侍郎去遽沐青州從事來令我妻孥爭洗盞想公伯仲正傳杯安能鬱鬱乆居此且傍茶山松逕囘雪作卧聞堆霰却無聲起看堦前又不能一夜紙窗明似月多年布被冷于氷屐穿過我柴門客笠重歸來竹院僧三白自佳清亦好諸山粉黛見層層雪中登王正中書閣對雪誰堪語登樓似欲仙人家修月户丈室散花天峰疊鈎簾外江横隠几前寒深落雁渚清集釣魚船解病從摩詰消愁得仲宣展書明細字烹茗濕疎烟月好還同夢詩成已下弦明年倘相憶為一到關邉宋元詩㑹卷三十五
