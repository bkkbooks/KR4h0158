body:
  text: 宋元詩㑹卷三十四兵部主事陳焯編李綱字伯紀邵武人自其祖始居無錫父䕫終龍圖閣待制綱登政和二年進士自為御史時所條論即係宗社存亡弱主惑於庸輔委任不専屢進輙退以致國已安而復危功垂成而復隳百世之下考其行事跡其遇合未有不掩卷傷心者官終荆湖南路安撫大使薨年五十八贈少師諡忠定按公謫居雷州之遂溪縣有僧琮者時來周旋官僚欲見之即飄然而去葢非凡僧也同叔易季言遊虎丘寺邂逅何得之理櫂適閩粤虎丘聊艤航霜林正揺落翠栢森成行入門躡磴道喬木間疎篁秦帝試劍石破𤓰分路傍生公雨花臺説法今不忘蒼蘚衣峭壁枯荷響廻塘遂遊劍池上毛髪森以張沈沈下無底疑有虬龍藏鐫削露天巧胚胎勞混茫清竒儼圖畫祕怪叵測量薜荔疊秀色枇杷吐幽香行行造梵宇金碧相熒煌危脊聳古殿長腰曼脩廊慿虗架雲閣鑿險通禪房開軒俯吳㑹蜂窠繚池隍列岫靄遥碧平湖湛孤光追尋殊未倦策杖登崇岡幽獨詩句苦闔廬丘塜荒五聖瞻象設羽泉酌甘芳西菴何閴寂脩竹自蒼蒼脱履足生繭解衣汗如漿却攜二三子置酒白雲堂念舊已凄惻感時增慨慷况我方逺涉狷介懷剛腸一杯且相屬世事都茫茫冠冕志已冷山林興偏長逝將脱羈束超然傲羲皇斯遊信清絶去去何時忘寓瓊山逺華館一夕夢遊山間小堂松竹環合有道士坐堂上誦李太白送人遊桃源序中有良田名池竹果森然三十六洞别為一天之語覺而異之今假道容惠當遊勾漏都嶠白石羅浮皆洞天也豈神者先告將有所遇耶賦詩以紀之神清遂仙遊境寂恣遐躅羽人入我夢軒戸靄松竹高吟謫仙文逸韻響金玉覺來殘燈熒敞怳猶在目歸途歴容惠問津非素卜將遊四洞天就彼白雲宿豈無葛稚川妙論資灌沃試求龍虎丹一使鬢毛緑斯言儻可信長揖謝浮俗却笑昌黎翁强項寧詰曲渡浙江理櫂適桐江隨潮過漁浦山寒雪猶積江迥月初吐御氣凌烟霄乗槎渡星渚空䝉老龍吟髣髴翠蛟舞境清人自愁夜静氣尤古獨坐不成眠霜晴聽津鼓建炎行有序千言從省弗載敵騎初犯闕太嵗在丙午殊恩擢樞廷愧乏涓埃補兩河未奠枕杖鉞出宣撫乞身縁謗讒竄謫旅湘溆明年丁未夏被命尹天府頓聞環京畿四面盡豺虎金湯雖可恃憂在人不禦見危思致命入援秉義旅旌麾亘江湄畏景觸隆暑忽傳元帥檄果有城破語鑾輿幸龍沙妃后辭禁籞皇孫與帝子取索及稚乳禮文包旂裳樂器載簨虡金繒罄公私技巧到機杼空餘宗廟存無復薦簋簠凄凉蒼龍闕寂寞玉華廡疇能供御粟誰與獻肥羜無從執羈靮安得生翅羽號慟絶復蘇灑涙作翻雨繼聞宣赦書寳位登九五神明有依歸率土盡呼舞皆言湯武姿勇智天所與向來使北營氣讋大當戸建牙出危城帝命纘鴻緒不然艱難中何以脱䝟貐兹讐不戴天兄弟及父母嘗膽思報吳枕薦懲在莒齊侯何足稱勾踐不須數姬炎獲再興眞人定神武願言覲行在玉色親黻黼丹誠遂披陳祕策得宣吐謀身計雖拙許國心獨苦片言儻有合丐骨歸壠畆飛帆過金陵鼓柁適淮浦遥傳告大廷命相比申甫顧兹斗筲器何以動堯禹深惟特逹知感慨激肺腑如何日月光可以螢爝助舍舟行汴堤驅車赴延佇傷心兵火餘民物亦凋庾中使乗驛來茶藥寵賜予拜恩丘山重坐使瘵癘愈行行近南都戈甲震金鼓將佐迎路傍往往多舊部冠葢如雲屯賜宴金粟圃謝免徑造朝涙落濕殿礎初稱宗社危天地同憤怒次陳國多難實啓宣光主末言樗散材初不堪梁柱鼎顚將覆餗榱折必傾宇况兹扶顚危正頼肱與股大舜舉臯陶小白相仲父耕莘與釣渭端不乏伊吕惟當博詢訪考慎作心膂封章屢懇辭帝曰莫如女往作礪與舟不復容傴僂叩額宸扆前臣敢論偽楚易姓建大號厥罪在砧斧奈何坐廟堂乃與臣等伍更效老獵師十事聽裁處天子亮精誠一一皆可許因陳禦氛策用此敢予侮河外須救援屏蔽資捍拒問誰可驅策因薦亮與所京師當一到九廟陳鼎爼却為巡幸計不可去中㝢南陽光武興形勢亦險阻西通關陜區東與江淮距三巴及嶺海寳貨可運取據要争權衡黠狡謀必沮募兵益貔貅買馬増牧圉號令新幟旗仗械飭干櫓軍容久不振整頓就規矩潢池盗弄兵羣惡相嘯聚偏師命剪除快若猫捕䑕餘冦悉欵降分𨽻歸籍簿蒐裒將帥材賞罰頗有序經營年嵗間庶可事大舉蕩氛還兩宫雪恥示千古却隆太平基不愧宗與祖豈知肘腋間乃有椒蘭妬含沙初射影聚毒隂中蠱規模欲破碎謀議漸齟齬固知鯁峭姿自不敵媚嫵恨無囘天力剔此木中蠧安能破銅山但志然郿塢時危敢尸禄抗疏願引去涕泗對冕旒非不戀軒宁君臣以義合無使赭舂杵帝度不可留乃聽上印組扁舟返東吳却理梁谿艣多言更萋菲貝錦成罪罟尚荷皇天慈薄譴居鄂渚我來雪霏霏及此嵗將暮﨑嶇山谷間避冦如避弩行盡江南山始踏湖北土風烟愁浩蕩鴻雁析儔侣沈吟白雲飛悵望黄鶴翥晴川俯漢陽葭菼滿鸚鵡家山渺安在幽夢到别墅三年再謫官繚絡萬里路浮游幻境中塵跡歎仰俯翠華尚䝉塵吾敢避憂癙但嗟機㑹失事勢契先覩今年敵益横春夏蹂京輔萬騎掠秦關餘毒被陳汝五陵氣蔥蔥中原鬱膴膴棄置不復論彌望皆莾鹵旌斾滿江淮冦抄連齊魯六飛竟何從秋晚尚江滸何時包干戈禮瑞奠璜琥斯民安田疇餘榖棲廪庾四方道路通舟車走商賈吁嗟呼蒼天乃爾艱國歩譬猶大厦傾著力事撐拄居然聽頽覆此身何所措又如抱羸瘵邪氣久已痼不能親藥石乃復甘粔黍膏肓骨髓間性命若絲縷安得和緩徒舉手為摩拊馴致海宇康蒼生有環堵哭宗留守汝霖有序從省時危念人傑濟物須材雄尋常齷齪姿詎可収竒功英英宗夫子邈與古人同抱器實磊落秉心鬱精忠彯纓仕州縣山立不妄從青松雖未高已足凌蒿蓬涉世多齟齬失官久龍鍾擢居河朔郡烟塵正昏䝉今上在藩邸奉使邉庭中力争不可往高牙建元戎王室遂再造廊廟當醻庸同朝共排媢一麾江漢東見我論世故慨慷涙霑胸薦之守留鑰付以節制隆惠政拊疲瘵威聲懾奸兇金湯治城塹櫓樓歘以崇出師京洛間屢挫黠䑕鋒邦畿千里寧誇説百嵗翁抗疏請還闕北伐歸兩宫辭直志骾亮天子為動容奸諛更切齒恨未能關弓乃同歸巢人感憤殞厥躬皇天不憗遺吾道何其窮驊騮竟委離冀北羣遂空梁摧大厦傾誰與扶穹窿安能百身贖坐為四海恫人亡國殄瘁天意眞懵懵中原氣蕭瑟灑涕臨西風張子公以圓鑑見寄作詩報之我觀大圓鑑瑩澈靡瑕垢清光溢寒蟾碧井窺古甃氷池絶塵埃玉璧遜好肉不知何年鑄款識雜篆籀冷然照肝膽况燭鬚眉秀英英張子公輟贈意獨厚使我正衣冠更以别妍陋嗟予罹百憂半世困馳驟蒼浪齒髪衰已覺成老醜幸兹置安閒閉户念往咎冠欹與珮落顚倒聽襟䄂平生遭謗讒白黒坐分剖逝將杜德機漸可塞智竇豈徒齊美惡端欲一昏晝鑑焉何所施無乃虛授受聊持戲鳳匣藏此蟠螭鈕題邵平種𤓰圖君不見伯成子高讓侯爵在野終年自耕穫下風趨問禮徒勤俋俋田間事無落又不見於陵仲子推相位為人灌園刈葵藿抱甕區區同漢隂不糝藜羮有餘樂古來賢逹有如此志趣未可常情度力辭富貴居賤貧凛若霜風隕輕籜邵平本自侯東陵秦破國除休一壑當時漢祖疑酇侯置衛増封意非薄衆賔皆賀平獨弔一言轉禍推先覺以兹智略佐風雲復取故封何所怍歸來種𤓰青門外灌溉鋤耘甘寂寞長安之東壤尤美翠蔓離離照城郭秋陽正熾𤓰正肥解衣摘實如俛鶴兒童玉立形骨清挈笠攜筐助操作遂令世美東陵𤓰身後高名動寥廓屠販曽聞封絳灌奴僕後來興衛霍高鳥已盡良弓藏更有韓彭辱囚縛何如終老守𤓰畦自飽飽他眞不惡龍眠也是可憐人畫此端令事如昨世間如畫畫如夢聊為作歌資一噱食橘洞庭一夜天雨霜橘林緑苞朝已黄逺題書後三百顆入手便覺秋風香黄金為膚白玉瓤沆瀣深貯甘且芳雕盤初劈噀清露氷齒乍嚼流瓊漿色香氣味紛可喜下視衆果皆茫茫嗟余平生愛種此木奴千樹梁谿傍只今蒿艾已埋没豈敢向日争熒煌蓬萊雲氣久寂寞漢殿無復羅瀟湘厥包縱有盡酸澁剖之蠧朽安足嘗乃知汝病是天意坐使玉食無輝光荒山乃爾飫佳品安得騕褭置錦堂君不見杜陵野老歌病橘蕭蕭半死誠可傷彭蠡神禹治水江為最邐迤逶蛇鍾作滙泓澄不獨陽鳥居浩蕩端使羣川㑹羣川已㑹江不湍朝宗到海東南安烟収雲斂望無際眼界始知天宇寛世傳揚瀾并左蠡無風白浪如山起我今謫宦此中行何事恬然風浪止陽侯也自可憐生不學世人皆世情好風已借一帆便霽色更増雙眼明晚來畫舸鳴六艫超忽千山如脱波心突兀見星宫雲際峥嶸望廬阜世間此景良不多洞庭三峽眞么麽共浮大白期一醉對此不飲當如何過苦竹嶺今日江湖境雙眸嶺上明山光隨地好秋氣逼人清隴水初分處雲鴻欲别情離離古來有歎息未休兵冬日閒居遣興僻處掩松門知非更念恩庭空從鳥啅山煖覺蜂喧木葉静如掃茶花開正繁蕭條嵗云暮倚杖自忘言通衢驛夜坐有感永夜發孤嘯起看河漢流羣山湧翠浪纎月挂瓊鈎豈謂艱難日翻成汗漫遊虛舟今不繫暮景付滄洲道巴陵登岳陽樓用孟襄陽韻重湖望不極秋色靄殘陽洲渚雲沙白菰蒲霜葉黄飛帆適沅澧廻雁過瀟湘楚客經行處依然蘭芷香雜興暮天來逺色行客尚貪行櫂急浪花碎月高雲縷輕巢禽棲更起漁火暗還明獨寢不成夢夜寒聞雁聲簡寂觀陸修静故居高士不可見雲鄉空舊居烟嵐飛瀑外露石禮星餘松老來歸鶴沼深時見魚何人覓丹訣應有枕中書善權即事山崦溪灣三四家竹籬茅舍暮烟斜仙村自種田田玉梅徑疑開處處花近渚水消迷浴鷺逺林烟暝數棲鵶年年値雪長為客對此悽然感嵗華詠草夢覺池塘碧草萋風揺烟濕已菲菲緜聯山色不知逺惆悵王孫何日歸微質亦知煩雨露寸心終欲報春暉芳根縱腐猶能化舞蝶流螢到處飛六如亭松林葬玉近禪扄便把伽陀當勒銘居士已亡三昧火侍兒空有六如亭玉環約指無消息巫峽行雲更杳㝠萬法本來皆夢幻春風幾度草青青雜興日出霜晴鳥雀呼束装還復戒征途黃牛傍岸將孤犢花鴨浮溪引衆雛橋斷水寒尋野艇路迷山曲問田夫逺遊看盡川原景待向龍津畫作圖幔亭峯燕罷虹橋絶世氛曾孫誰見武夷君更無裀幕空中舉時有笙竽静處聞猿鳥夜啼千嶂月松篁寒鎖一溪雲洞天杳杳知何處翠石蒼崖日欲曛次貴州今貴縣也在粤西潯州府屬青楓夾道鷓鴣啼古郡荒凉接島夷陸續故城依石巘葛洪遺竈俯江湄光風苒苒吹香草烟雨濛濛濕荔枝欲作終焉卜居計自應句僂不吾欺自蒲圻臨湘趨岳陽道中作屈身任道復何求去國翻成汗漫遊處世久師齊物論攄懷聊賦畔牢愁霜清日薄寒光急雲慘天高隂氣浮嫋嫋西風洞庭濶可堪更上岳陽樓㯽榔疎林滄海上結實已纍纍烟濕頳虬卵風揺翠羽旗飛翔金鸑鷟掩映籜龍兒濩落咍椰子勻圓訝荔枝當茶銷瘴速如酒醉人遲蔞葉偏相稱蠃灰亦漫為乍餐顔愧渥頻嚼齒愁疲飲啄隨風土端憂化島黎謁冦忠愍祠堂鑿井得泉今尚美挂錢挿竹後成林精忠感動無情物不解潛銷䜛妬心岳飛字鵬舉相州湯隂人世力農父和行義鄉里稱厚德飛生時有大禽若鵠飛鳴屋上因以為名未彌月值河决水忽至母姚抱飛坐甕中衝濤及岸得免人咸異之少負氣節沈重寡言家貧力學尤好左氏春秋孫吳兵法生有神力未冠挽弓三百斤學射於周同盡其術同死朔望設祭於其家父義之曰汝若為時用殆殉國死義乎飛應募以行伍起家累功至太尉封開國公威震遐荒紹興初年受命北伐大功指日可成秦檜主和隳於一旦竟坐䜛死此天壤無窮之恨不待紀述而知者獨其於詩道興至立成沈摯蒼凉駕曹景宗競病而上世或罕見急宜采掇為懐古者助欣慨焉鄱陽龍居寺巍石山前寺林泉勝復幽紫金諸佛相白雪老僧頭潭水寒生月松風夜帶秋我來囑龍語為雨濟民憂池州翠光亭愛此倚䦨干誰同寓目閒輕隂弄晴日秀色隠空山巖樹蕭騷外征帆杳靄間吾雖江上老心羡白雲關寄浮圖慧海湓浦廬山幾度秋長江萬折向東流男兒立志扶王室聖主專師奠百州功業要刋燕石上歸休終伴赤松遊丁寧寄語東林老蓮社從今著再修池州翠微亭經年塵土滿征衣特特尋芳上翠微好水好山看不足馬蹄催趂月明歸題新淦蕭寺壁雄氣堂堂貫斗牛誓將直節報君讐芟除大敵還車駕不問登壇萬戸侯華嚴院手持卭杖訪黄龍舊穴空遺虎子蹤雲鎖㫁巖無覓處半山松竹撼秋風宗澤字汝霖義烏人自㓜豪爽有大志登元祐六年進士廷對極陳時弊考官惡其直置末甲調大名館陶尉令衢州龍游改趙城令知萊州掖縣通判登州時廷議禦外失計澤曰天下自此多事矣因退居東陽山中靖康初用中丞陳過庭等列薦起知磁州磁經亂民散廪空澤繕城浚湟為固守計除河北都總管大破敵兵適康王再奉使北行澤力挽之囘相州有詔以澤為副元帥從王起兵入援屢奏竒㨗自是澤兵所至敵畏如虎每請戰則廷議目之為狂㑹二帝北行張邦昌僭位澤請王急行天討數上書勸進與李綱同入對涕泗交流上欲留澤又為黄潛善所阻以李綱薦俾守開封府河南京西巨冦次第歸降京師復見太平因上疏請帝急歸開封前後二十餘奏皆為汪黄等所抑憂憤疽發於背臨死無一語及家事但呼過河者三都人號痛後贈觀文殿學士諡忠簡前發憤行卿士辱多壘天王憤䝉塵禦戎要虓將謀國須雋臣百戰取封侯未必亡其身懷姦廢忠義胡顔以為人吁嗟世道衰大僇加搢紳平居事奔競梁汴紛雲屯一旦國步艱四迸如星繁輔相已擇棲守令仍踰藩冠葢陸西竄舳艫水南奔鄙夫用慨然䇿馬趨修門勤王羞尺柄悟主期片言時來倘雲龍峩冠拜臨軒逶迤上玉除造膝陳元元措世于㤗寧歸來守丘樊王黼已投逺裔而京貫未䝉顯誅慨然有作四罪不誅舜不聖兩觀不誅魯不盛先王諱殺懼滛逞懲一警百乃仁政滔天之罪姦臣黼儇佞無知竊魁柄敗盟結禍致憑陵虐民斂怨仍兇横罪當葅醢賊閹貫億萬蒼生隕其命力開湟鄯取空虛妄買燕雲稱撫定渠魁巨蠧京其首啟亂懷姦窺我聖星文示變折狡謀固寵招權邦以罄結盤滋蔓二十載衮繡金珠古無竝敵兵犯闕主嬰城挈寳攜孥歘星迸黼投逺裔禦螭魅郵置風傳士相慶貫要輿駕渡重江未臠閹軀禍方孕而京宴然號陳魯尚戴頭顱假視聽怨連遐裔怒西兵曷日具聞典刑正願天亟下咫尺詔斬首以梟仍以狥始初清明必孝治昭洗上皇仁且聖怨銷怒解各歡呼國勢自强兵自勁後發憤行翁擁麾幢我為兒剽聞竊睹皆兵機其中襲擊不容瞬飈行電掣猶逶迤邉馬長驅越大河天下震驚宫闕危肉食之謀殊未臧我憤切骨其誰知慨然奏疏金馬門力陳盟賂損國威嚴尤下䇿尤可笑鼂錯上書亦奚為道路荆棘初剪除花如步障吾東之八年閉户尺蠖屈一旦渡關匹馬馳行行側身聽戎㨗忽聞募士詔遣歸濃書大墨榜教詔曰敵悔過今退師羽檄向來召貔虎乃詠出車歌杕杜櫜兵銷刃兵猶怒却把鋤犁農鼓舞君王神武今藝祖爾賊不歸汙我斧題獨樂園范公之樂後天下維師温公乃獨樂二老致意出處間殊塗同歸兩不惡鄙夫杖藜訪公隠步無石砌登無閣堂卑不受有美奪地僻寧遭景華拓始知前輩稽古力晏子蕭何非妄作細讀𨽻碑増慷慨端正似之宜再拜種藥作畦醫國手澆花成林膏澤大見山臺上飛塵多高山仰止如公在雨晴渡關二首燕北静邉塵河南濯我兵風雲朝㑹合天地晝清明泣涕収横潰焦枯頼發生不辭關路逺辛苦向都城蕩滌眞成快氛霾不敢隂萬方恩澤渥二麥寵光深地勢瞻仙掌河流識帝心馬頭迎霽色詩句日邉尋華隂道中二首烟遮晃白初疑雪日暎斑斕却是花馬渡急流行小埯栁絲如織映人家菅茅作屋幾家居雲碓風帘路不紆坡側杏花溪畔栁分明摩詰輞川圖至洛都人士女各紛華列肆飛樓事事嘉政恐皇都無此致萬家流水一城花鄧肅字志宏南劍沙縣人少警敏能文美風儀善談論李綱見而竒之相倡和為忘年交欽宗召對便殿補承務郎授鴻臚寺簿金師圍汴肅被命詣敵營留五十日而還張邦昌僭位肅義不屈奔走南京擢左正言因為上言曩在金營密覘其支賞之數不過八萬人但其信賞必罰不假文字故人各用命今朝廷賞罰不明誰肯自勸凡朝臣受偽命者請分三等定罪上以肅在圍城中知其姓名令分别具奏所擬輕重上皆從之在諌垣未三月抗疏二千言皆切至㑹李綱罷肅力争忤執政落職歸紹興二年避冦福唐以疾卒題梅齋江邉蘆葦風颼颼東君一㸃破寒愁牕間疎影横春瘦枕上冷香尋夢幽夜深竹折驚殘雪捲簾醉起千山日洗空肺腑龍麝腥落筆天香鬭清絶大雨夜夜隂雲如潑墨雨勢欲挽銀河竭春工十八落泥塗驟雨誰云不終日魏紫姚黄業已空嬉遊何足介心胷只恐年年禾黍地浸滛盡入陽侯宫憑誰為我呼少女掃空隂翳開天宇光風霽日暖層霄坐令六合同歌舞龍興避難傍山怪石如蹲虎絶頂去天無尺五却披叢棘下山腰晶熒照空飛紺宇道人蓬戸厭塵勞避世祗嫌山不高那知行空老曼倩竊食當年王母桃松檜參天門晝閉碧玉擷蔬飫炊雪百年冷坐無車音一旦偕來眞惡客當知喧寂豈殊觀出世何妨在世間能致吾人師作古龍興今日始開山送丹霞禪師山壓濃隂勢欲頽阿香推車振不開君來論時風四起挽出羲和照九垓别居八年驚電掃霜髭已失童顔好逝者任從造物流吾人一笑初不老明朝飛錫過平津浩歌歸耕隴上雲巖竇不應藏一滴要須化作無邉春分嵗餘臘羇人少共歡那堪飛雪集雲端四時欲盡三更漏六出翻成兩嵗寒壓卷嶺梅殘艶薄敲殘亭竹碎聲乾公卿休掃黌堂下留與來朝執玉看戲洪丞萬里歸來雲水鄉逄春得酒且徬徨好賢誰似雙松吏使我時終一石狂忽與高唐來䑕目却令朱戸鎖梅妝先生取瑟吾知已安得從今不舉觴别陳少卿平生盃酒百無憂四海風流説太丘據景筆端凌鮑謝當年門下得伊周那知避世嶔􅲝迹也許從公汗漫遊聞説片帆今又舉三山無處著人愁程俱字致道衢州開化人以外祖鄧潤甫恩補吳江主簿宣和二年進頌賜上舍出身建炎中為太常少卿知秀州㑹高宗臨幸賜對俱所陳皆嘉納之紹興初召為祕省少監預修日厯俱摭三館舊聞比次為書名曰麟臺故事擢中書舍人兼侍講以言者罷去久之除徽猷閣待制晩病風痺有召皆力辭卒年六十七雜興四首誤㸃成駁牛妙技有餘賞作意畫蛇足至今猶撫掌君看人間事類此或往往浩歎可奈何悠然起遐想濯濯簷下溜刁刁樹間鳴蟲號百鳥閙小大各有聲聲多不留礙響振元無形何殊百千炬光影各自明戎葵向晨照日引一尺長松栽四五年擢幹未出牆漙漙露方晞惜此顔色芳各留一寸心試待九月霜春鳩一何拙社燕一何巧天隂逐其婦飲啄聊自了銜泥亦綢繆託此華厦好物生固有分巧拙均一飽穹窿葬事囘邑有感生别萬里餘㑹面終有期死别不轉眸一朝千古非白日光在天𤣥隂閟泉扉盈盈閨中秀土化成枯骴冠笄共甘苦謂見素髪垂那知死生變不待桑䕃移室有病時茵篋有嫁時衣了了眼中事閒妝静容儀垂楊手曾折為我當春稀迅流無迴波落英無還枝空房閴無迹新墳草離離傷心北門道同來不同歸送崔閒歸廬山二首琅琊山中水韻入三尺桐琅然醉翁操發自玉澗翁流泉不成音冩寄十二宫醉翁不可見妙語聊形容嘗聞三峽泉上與天漢通請君記餘響相彼玉珮風此聲倘可繼那復有此公吾友胡少汲結廬皖公城灊山有小隠背負紫翠屏前臨一溪水可以濯我纓欲分青山半留我谷口耕信美非吾鄉翩然遂宵征聞君草堂處亦復占地靈虚簷倚蒼崖下有玉澗鳴樂哉不可到因君懷友生春日冩懷春風遍芳華一國盡狂醉窮閭獨不知但見長蒿薺秋飈起蘋末一葉初未墜幽懷獨先覺意象已凄厲故知春與秋初不為我計危絃自應悲寒木終易脆要之夢中夢憂樂同一寐翻然詠軒丘心量浩無際豁然閣雲霞墮西山飛帆拂天鏡誰開一牕明納此千頃静寒蟾發澹白一雨破孤迥時邀竹林交或盡剡溪興扁舟還北城隠隠聞鐘磬寄開化李令光我行阡陌間苖麥已復青茅茨間新稿雞犬有和聲不見吏索錢田家得其生雞犬亦肥字不遭無事烹於斯可觀政豈在赫赫名父老亦相語驩然就春耕官租及時了卒嵗樂無營自仲嘉云亡未始見夢舟行夜入吳興境有夢如平生感而賦詩諸人久不死而使武子先斯言太癡絶愛惡無乃偏君看雅正情播在三百篇秦人哀三良百身寧可捐相䑕有深刺嗟哉胡不遄此豈惑者歟加膝墜諸淵乃知孫楚狂未必非公言自寛吟戲效白樂天體武陵謫九年下惠仕三已或窘如拘囚或了無愠喜吾生憂患餘年忽及耆指偏痱未全安抱病更五禩進為心已灰棄置甘如薺坐狂合投閒佚老宜知止向令身安健不過如是耳每思古窮人我幸亦多矣照鄰嬰惡疾羈卧空山裏纒綿竟不堪抱恨赴潁水文昌兩目盲無復見天地簡編既長辭游覽永無冀吾今雖抱病蹇曳非頓委時時扶杖行積步可數里較之卧牀席欲坐不能起雖扶不能行懸絶安可比時從親故談亦不廢書史右臂故依然運筆亦持匕籃輿時出遊初不廢牢醴况無他證候色脉若無異詳觀動息間儻有全安理侍祠了無庸竊禄愧索米借居浮屠宫非村亦非市廷堂甚爽塏高屋敞牕几郊林接溪流眼界頗清美嘗聞天地間禍福更伏倚藉令衰蹇身終老只如此何須苦嗟咨未必非受祉形如支離疏飽食逸終世目盲如宋人全生免徭使平生歎逺遊今我在桑梓田園本家山區處及耘耔平生困鞅掌今我恬無事寢興縱所如出處不違已病來益尊生對境空相似永無貪欲過稍習衛生㫖不為六賊牽豈受三彭毁人言病壓身往往延夀紀大鈞黙乗除萬一理如是安全固自佳蹇廢亦可爾死生猶寤寐况此一支體細思安否間相去亦無幾如何不釋然萬事付疑始夜半聞横管秋風夜攬浮雲起幽夢歸來度寒水一聲横玉静穿雲響振疎林葉空委曲終時引斷腸聲中有千秋萬古情金谷草生無限思樓邉斜月為誰明望九華船發大雲倉五十里許顧江南衆山中有數峰竒爽特異一見即知其為九華問篙人果然因知禇季野於廣坐中識孟萬年正應如此作詩一首卷簾對坐江南山掠眼送青來亹亹雲泉肺腸久厭飫挂頰悠然聊復爾竒峰逺澹忽四五爽秀駸駸逼牕几平生九華夢遊中一見定知眞是矣非關目力覩天奥正覺羣山如聚米好山如人有高韻不獨江州孟公子直縁佳處無仕逕落莫道邉同苦李大是忘年耐久交藜杖青鞵結終始有美一人三首時鄒志完在昭州曾子開在汀州陳瑩中在合浦有美一人在昭平藕絲為衣蘭作裙君初顧言淑且貞直欲載以黄金輪人心變化如浮雲明妝覺暗笑作顰何當還之承華茵令君宴寢凝清芬有美一人在烟汀朱顔朝滌玉壺氷素手暮理朱絲繩語言窈窕丹鳳鳴坐持紈扇睇秋螢何當還之翡翠屏為君把鏡整衿纓有美一人在南浦月明採珠光照渚瑶衣被體金索縷獨抱幽寒沫烟雨何當置之白玉宇為君歌陽春激楚戲呈虞君明察院謩三仕三已心如空一壑一丘吾固窮門施雀羅正可樂車如雞栖良不惡胸中九華初欲成綵衣玉斧雙鬟青世間何樂復過此不失清都左右卿初到書局以萬七千錢得一老馬盲右目戲作古句自嘲蹄間三尋汗流赭九逵雷雹争飛灑我窮那得騁追風正擬虺尵行果下平生畏塗飽經歷夜半臨深無馭者故應造物巧相戲却比盲人騎瞎馬李南知音當促步廣漢騰嘲不相假執鞭良稱塞翁兒並轡聊從杜陵夏厖然病顙豈其類老矣問途那可捨徑煩一夫事刷秣似桂新芻不盈把向來伯厚亦安在結駟雞棲同土苴他年東去把撩風縱爾逍遥汴東野罷吏客郡城滯留忽已嵗暮浩然興歎一行作吏向吳城五見娵隅上薄氷魏覬三章堪自約殷源百尺敢言登揶揄秪送人為郡噤喟初非我負丞鞅掌棲遲俱害性不知鬚鬢欲侵凌謝江仲舉惠酒山城無物可忘憂但有平原病督郵知我囊中無白水煩君若下出青州芳甘未謝三年醖傲兀能消萬古愁㑹待東郊春意動鳴鞭乗興草堂遊窮居苦雨慢膚便腹轉疎慵睡足茅簷目過鴻墨客縱令三尺喙木奴何似十年功門前羅雀非吾病竈底生蛙不世窮舊雨未乾新雨漲可憐愁絶力田翁旅舍半世江湖寄此身氷墟何意及陽春離騷痛飲非名士款叚還鄉亦善人病木作花眞强活長魚沈陸恐摧鱗清時英俊如麻葦敢歎長年甑有塵沈與求字必先湖州德清人政和五年進士由明州通判用薦除監察御史上在㑹稽或勸幸饒信與求請都建康以圖恢拓復論范宗尹年少難任相位出知台州宗尹罷再以御史召遷中丞所奏皆軍國大計其言切直有敵以下不能堪者出為荆湖南路安撫召除叅知政事因力贊上親征與張浚牴牾丐祠以去復遷知宻院薨諡忠敏夜坐感事沈沈夜氣歸虚堂閉深寂孤燈灺餘花寒梧韻殘滴醖釀萬斛愁感慨一人敵何當棄短檠隂山叱鳴鏑夜書山驛天寒夜向䦨月出山更静風露揺青空萬象光耿耿啼螿泣幽草賔鴻度前嶺歸來坐孤牕松竹舞清影觀網魚暗雨垂垂梅欲黄春山吐源春漲狂雪鱗頳尾泝流上吹濤噴浪能奔忙魚師布網名白大萬目井井連重綱聯艘絶流勢甚武遮羅初若無留藏大魚已得小魚棄要使遺育充陂塘鰥鮞安用誤囘避蝦蟹亦復虚跳梁寧知不比綸索手欲以巧餌空滄浪何子楚為范明倫賦九疑石石吾不及見也讀詩可以知其狀吾累十峰石為小寒林興寄不淺用其韻并及之峩弁千峰倚天碧上有脩筠材可篴月明三弄面巉巖驚起哀猨啼峭壁兒童斲石攢青瑶寒林蕭蕭吹墮樵坐令結習落幽夢芒鞵竹杖歸路遥覺來隻影徒相守哦子清詩筆如口眼中何必小玲瓏仿彿九疑當户牖神丹已失大江漘誰與安期追後塵分天隔日不可到使我目斷蒼梧雲劉行簡見借詩稿以長句歸之文章偏忌聲名蚤富貴政須門第好了知二物不相關風月膏粱兼者少劉郎天韻眞不凡飛騰宜在蓬萊島年來窮愁已到骨只有珠璣落殘稿紛紛餘子何能追定向詩壇分六纛造物小兒亦薄相浪付繁華給揮掃却令徑坐詩人窮只與清泠消熱惱向來狗監非同邑渇盡文園尚傭保九原千古忽可作如君自是不枯槁茅齋夜誦誰得聞咄咄空能訴穹昊請君更作昇天行勿使貧兒彊知寳溪上見梅晴溪漲渌如隂苔晴日挿影相瀠洄畫船疊鼓順流下波光浩蕩征帆開灘縈岸繚柁牙轉水石互激如奔雷須臾已復過絶壁歸路漸近嚴陵臺山重溪複境彌迥暗香忽自空中來日斜正見叢棘外炯炯疎片飄寒梅槎牙一種獨愁絶含情不語明巖隈凌波疑是水仙出縞衣素質行徘徊下窺深淺一笑粲坐使凡卉俱塵埃山谷之儒已臞甚龜腸鶴骨世所咍相逄頓覺百憂釋不嫁春風誰與媒舟行易逺空囘首角聲吹夢心悠哉錢塘賦水母疾風吹雨囘江城艣牙嘔啞潮欲平客居喜無人事攖相與環坐臨前楹眼中水怪狀莫名出没沙觜如浮罌復如緇笠絶兩纓渾沌七竅俱未形塊然背負羣鰕行嗟其巧以怪自呈凝月𢥠視相將迎老漁㫄睨笑發聲曰此水母官何驚江流如奔絶滄瀛潮汐往來月為程藏納衆汚無滿盈浮埃沈滓溷九清結成此物宜昏盲使鰕導迷作雙睛乃能接迹蚌與蟶亦猶巨蛩二體并離則無目為光精江天八月霜葉鳴罟師得鰕供水征水母棄擲羅縱横試令収拾輸庖丁絳礬収涎體紆縈飛刀鏤切武火烹花甆飣餖粲白英不殊氷盤堆水晶稻醯韲寒芼香橙入齒已復能解酲遣漁止矣勿復評嗟哉此性愚不更定矜故態招三彭且摩枵腹甘藜羮到吳三載故鄉别歸帆恰到吳食寒新火換天濶斷雲孤酒市仍依岸漁村逺帶湖碧山千萬疊翻憶夢﨑嶇旦日趨府紫簫吹夢斷起視斗䦨干瘦馬踏殘月單衣中薄寒錦囊那復佩革帶頓成寛浪逐官曹底聞雞敢自安舟行即事逗帆風借力入坐水浮光村落知多少郵亭自短長跳魚吹暗浪浴鷺耿殘陽又是吾廬逺相看思渺茫舟次吳松江櫂發鱸鄉晚頻經桂子秋懶投青玉案政敝黒貂裘水落喧魚市雲微辨橘洲五湖烟浪静誰復泛扁舟秋懷庭柯脱翳葉歸翼斷經過水檻清漁罟風櫺響藥羅傲霜荷柄少團露橘叢多秋色遂如此愁城今幾何得家書國步猶艱棘不堪頻問家霜毛失翠葆蒿目亂𤣥花孤客知時節殊方度嵗華干戈就休息歸理邵平𤓰新城道中馬蹄隨意到囘首隔南岡日落鳥猶語春歸花自香殘紅媚幽谷新緑漲囘塘假榻知何地昏鐘出上方次韻避冦宦遊成屢郤戎壘悵頻遭聞詔趨吳㑹經途事董逃心期紓國難力欲挽人豪漂泊多危涕眞成失木猱劉希顔持節按縣招維心舟中小酌次韻故國眞如寄餘生宛若浮巢鳩不䕶鵲池鳳肯容鶖老木低春水孤花帶晚洲杯行應酹我知復念幽憂即事竹樹參差合溪流半隠扉雨昏鳩婦閙風急雁奴歸策杖循沙步褰裳到石磯遊魚吾共樂身世自依違次韻盧憲春意少陵花惱便顚狂天與多情付此郎宿露園林鶯舌亂暖風庭院宻脾香閒愁幾欲縈春事幽怨還能入醉鄉應斷玉樓雙望眼便須催促理歸檣舟過荻塘野航春入荻芽塘逺意相傳接渺茫落日一竿桃葉浪薫風十里藕花香河囘遽失青山曲菱老難容碧草芳村北村南歌自答懸知嵗事到金穰過徐氏郊居林梢渺渺墮斜暉剥啄還來扣隠扉門巷劣容居士屩塵埃不到野人衣恰當夜甑黄粱熟盛供春山紫蕨肥侍坐無人只山月兩翁相對自忘機清明杏火燒空潑眼明遊人蕩槳緑蕪城山歌慣習吳歈調水戲終含楚些聲草滿池塘春漲淺燕歸簾幕午風輕踏青舊約誰能問已喜年來粥有餳石壁寺山縈細路走脩蛇峭壁連雲只蘚花木末忽看幡影亂馬頭初見殿隂斜迴廊迤迤穿危嶠側澗娟娟露淺沙秀色可餐吾事辦粥魚茶板莫相誇秋日閒居茅屋秋風斗破除蕭騷渾似浣溪居青山侍坐從吾好黄帽籠頭與俗疎頼有園官能送菜可無溪友解留魚從今輙莫慚枵腹一飽須煩挿架書喜次律兄見過大艑軻許暫留一樽相屬話千愁封胡羯末名終在許史金張迹浪投遵陸漸看鴻雁集在原當紀鶺鴒求他年㑹有相從樂泛宅浮家萬事休攝尉歸安呈江嘉無地誅鋤一束茅清吟端作反離騷奔波且復同香尉蕭散還須似馬曹名下吹嘘初定價暗中摹索便驚豪文章論世寧論晚肯慕羣飛學仰高新春書事蚤嵗驚逄上苑春蹇驢朝踏落花塵只今懶問芳菲事柳眼相看也笑人觀瓊花千里隋河走濁流檣烏東下指迷樓春風簾幕今何在只有瓊花伴客愁申應時尋山圖王維買宅先成畫申子尋山亦載圖他日眞能營小築此山佳處著儂無詶曾宏父二首小雨經旬户不開隔牆青子滿江梅幽禽葉底如相識睥睨空庭欲下來要知春色到池塘深院無人午夢長巳覺此身便静樂自温檀火炷爐香宋元詩㑹卷三十四
