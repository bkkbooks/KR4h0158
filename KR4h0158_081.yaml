body:
  text: 宋元詩會卷八十一兵部主事陳焯撰黃溍字晉卿婺州義烏人母童氏夢大星墜懷而生溍溍成童能記經書逮長以文名四方中延祐二年進士授台州寧海丞遷兩浙都轉運鹽使改諸暨州判官入為應奉翰林文字同知制誥兼翰林國史院編修官轉國子博士出為江浙儒學提舉年六十七不俟引年納祿徑歸未幾詔起為翰林直學士知制誥同修國史兼經筵官升侍講學士兼官如故自將仕郎七轉至中奉大夫謝政南還優游田里凡七年卒于繡湖之私第年八十一追封江夏郡公諡文獻溍學問淹博約之于至精剖析經史疑難及古今制度名物多先儒所未發者文詞布置謹嚴援据確切及門受業者後多為名儒所著日損齊藁三十餘卷雜詩三首晨起步南園旭日朗以清葵花衆草中粲粲敷丹榮流光非汝私獨爾心自傾覽物有深懷佇立方含情璞玉與寶劍淪落初未偶君看被煎祓各在千年後將身比金石誰當獨長久悠悠百代下相知復何有春風著萬物欣欣皆自私可憐兒女花榮悴更相持獨有澗底松偃蹇如不知何疑揚執㦸草𤣥鬢若絲效古三首上山見明月下山月相隨月豈知愛我我行自見之故山日已逺故人不可思殷勤謝明月願爾無時虧落花隨風吹各自東西飛花飛既不息水流復何極同生不同歸能勿異顔色木生則有枝豹死則有皮悠悠岐路間多言亦奚為飲酒莫盡醉盡醉無餘歡讀書莫弔古弔古多悲酸蕭艾蔽中野白露摧芳蘭鳯饑不得死鴟梟食琅玕去去復去去采芝青雲端連雨雜詩二首我思仇山人山川莽回互十書九不致木葉頻嵗暮頗聞近移居併失夢中路得無挈妻兒倒載入山去今日曷不樂孤倡無與酬兀坐把書卷展玩不自休借問誰所為其人已千秋山雨政可聽撥書置牀頭晚晴泄雲散積雨林木含餘清披衣有竒懷偶從林叟行新晴逺峰麗夕蔭孤花明曠日固所虞聊兹息營營夜歸空山四寥寥落日翳榛莽蜿蜒草中徑躡屩度寒雨楠杉窈深黑忽忽疑伏虎林窮澗水明稍聽歸人語曉行湖上曉行重湖上旭日青林半露霧寒未除鳬鷖靜初散夤緣際餘景閃倐多遺玩會心乍有得撫巳還成嘆夙豫丹霞約久兹芳洲畔獨往願易違離居嵗方換沙暄芷芽動春逺川華亂存期乃寂寞取適豈爛熳小隱倘見招漁樵共昏旦寄方子踐子發窮居悵無遂徂嵗聿載陰飛翹隕芳華候蟲厲哀音急颸扇叢薄泫露栖喬林撫景慨往古端操思繼今折蘭合幽佩解纓濯清潯石林窅蔥蒨佳柏鬱蕭森遺世豈余敢匡時非我任覽已謝高軌即事念所欽纒綿阻道里緬邈眺岡岑委懷竚芳訊貽好在規針東園晚歸淟涊嬰近務超遙愛佳辰興言望東菑良苗藹津津鄙人昧時趨曠途夙所遵幸逺簪組纍稍欣田圃鄰兀兀登故畦悠悠睇城闉理穢出新竹撼枯落荆薪夕日逗遠川餘暉散衣巾亹亹觀物變依依念農人渠渠長者言惻惻非賤貧贈葉審言别昔人稱好士乃有黃金臺黃金亦何物顧用驕賢才葉君被短褐志力何雄哉北走呌閶闔紅雲拍崔嵬終然無茍售自保同嬰孩車服非吾榮黃金真浮埃十年今何官茅屋歌蒼苔豈無琅玕樹鳯飛故低佪一朝脫身去歘觀雲路開葉君善自愛往矣無嫌猜迷邦古所誚豈弟貴不回願言吐竒胸落落排風雷尚念窮賤者衡門守蒿萊休日集於城南投耒從逺遊牽世乖明略豈不畏簡書未能置丘壑崇岡近盤互春物紛照灼休沐集諸彥迂趾惠前諾稍空林中尊復詠霞上作迢迢歷墟壠靡靡瞰城郭修楊蔭晴渚野櫻散朱萼撫時悼推斥畢景顧棲託損益向子明才能賈生薄眷言觀嵗寒無將愧場藿曉望城頭鴉鳴曙起坐理冠幘開窗寫遙望烟霧竟川澤喧喧市聲動漠漠井氣白如何山中人嵗暮塵埃客龍灣夜泊乘潮出逺浦日暮北風平高亭不可望遙遙笳鼓聲月明寒雁下江空夕烟生非關川途念沈憂坐自盈秋夜觀書作閒居感時駛獨學難為功眷言思古人幽懷極忡忡秉燭起中夜攬卷來清風恭惟千載心皎潔縣無窮泯俗自升降道妙非汙隆後來亦奚為黑白紛相攻華芳乍可悅軌轍何由通吾將離言說庶以觀其同所憂名為纍不懼蓄不豐開軒視明河白月當天中怡然掩書坐夜氣方鴻䝉登錢山望菰城慨然而賦吳興水為州諸山若浮萍况此一培塿瑣屑世未明所欣漁樵居乃與緇錫并種竹有萬竿結茅無十楹老僧解人意屣履能相迎芳草被行徑朱藤暗巖扃蕭條空階暮日照莓苔青猶嫌所歷卑未極遊眺情聳身白雲上始見春申城想當高會時樓觀飛青𡨕竭海薦罍勺窮山羞鼎鉶安知千載後寂寞無人行煌煌冠蓋區壤壤狐塋歸來朱門客聽此松風聲靈源偶為山中遊逺過雲關宿蒼燈閃初夜雨氣蒸深屋時聞清梵音窈眇松林曲草堂迢迢上方界水木翳清景山深不可留日暮衣裳冷凄其懷昔遊百嵗嗟俄頃鹿田披榛度空荒突兀崖寺古幽花雜紅白老屋亞雲雨前瞻石徑微咫尺不得取寶峯下山復上山躡屩行沮洳宿雲冒長嶺旭日映高樹山僧亦何為獨向城闉去山橋行行指木末路逐飛雲上時登巨石憩共聽春泉響尋源竟莫窮即事成幽賞寶石暮投招提境明發首歸路舉頭望山椒遙認經行處重重巖壑間蒼然正烟霧赤城雞鳴秣吾馬晚飯山中行何以慰旅懷赤城有嘉名灘長石齒齒樹細風泠泠時見巖壁間粲若丹砂明溫泉發其陽撝訶勤百靈前峰指金閣真境標殊庭白道人跡稀青崖雲氣生信美無少留緬焉起深情擔子窪自從始出關數日走崖谷迢迢度偏嶺險盡得平陸坡陀皆土山高下紛起伏連天暗豐草不復見林木行人烟際來牛羊雨中牧颯然衣裳單咫尺異寒燠佇立方有懷相逢仍問俗畏途宜疾驅更傍灣河宿遊寶陀寺十年望滄海臨流不能渡蒼茫嵗華晚邂逅舟楫具拂衣乘天風挂席隨烟霧旦從蛟門發暝指翁洲住前瞻積水深島嶼青無數梅岑特孤絶遙見日出處寄身人境外矯首禪關路粲粲金砂石離離白花樹高期愜幽抱歷覽增遐慕嗒然坐忘言目送寒潮去雪竇紀遊三首移舟泊泉口我行已信宿天寒洲渚生峰回川途曲烟霞罩蘭若别墅在林麓高人欣相迎山門帶流水風生珠樹間月窺鏡池裏觸景遂成迷應接殊未巳興移初出山繫纜長汀樹夜來雪已深溪風愈難度猶疑鐘磬音遙遙白雲處同王章甫待制校文上京八月十五夜宿龍門驛凉風墮黃榆萬馬皆南馳而我方北首度關及鳴雞驛路更幽阻僕夫慘不怡徐驅待明發泱漭窮烟霏貂裘者誰子怪我縫掖衣為言霜露多遑遑獨安之我非不自愛簡書今有期憶昔州縣間折腰向小兒荏苒二十年白首初登基同袍如燕鴻去住恆相違悠然慨平生與世何參差暝投龍門驛高館臨回溪青崖拱白月水木含餘輝秋色故瀟灑我行殊未遲相從况魁彥炯若珊瑚枝衰暮奚足云一觴聊共持送鄭以道鄭君不羈客漫仕常優游故人滿天上獨佐嶺南州嶺南風土異去天將萬里驛騎如流星衆手挽不止到官定多暇坐對梅花時溪石秀可硯泚筆成新詩詩成付回雁動是春冬隔用儒行召君努力崇明德嵗晏嵗晏木葉落遙見東城隅雉堞鬱岧嶤列屋何蕭疏悠悠西南望赫赫金張廬退朝集冠蓋鳴珂沸通衢合遝多俊遊並轡飛華裾顧盻有光彩行者為踟蹰俯慙筋力微無從效馳驅日斜坐官舍還拂案上書緬彼川路長感此年運徂遲回不能去嘆息將焉如送王鍊師歸四明飄飄采真侣乃在四明山霞裾朝帝所瓊館留人間忽聞雙鳬舄却向東南還望之若流星邈然不可攀海月照階戺天風飛佩環我何苦羇旅氷雪生朱顔陽山昱上人訪豫吳門寓舍求為湘竹詩豫辭以未見竹上人不逺六十里自山中舁其竹而來好事有如此者欣然為賦長句道人來自陽山麓手携舊種千竿竹小栽方斛不盈尺中有瀟湘江一曲未信天工能爾竒不知地脈從誰縮晴窗翛翛散烟霧眼底森然立羣玉豈期我乃纍此君䝉犯風埃走塵俗故山方逺重愁絶新句未成慙迫促黃岡之産大中椽政用材美刳其腹願言保此終天年嵗暮山中伴幽獨題李氏白石山房名山秀出鄱江曲上有立石如立玉尚書履聲忽已逺隱者新居在盤谷花開鳥鳴春晝永白雲重重養喬木夫君亦復稱其家有書能藏且能續露鈔雪纂久愈富何啻鄴侯三萬軸山靈翕霍謹呵護夜半虹光發深屋引泉天井助芳潤大勝吳儂飲山渌我欲從之不可到細字長書俄滿幅毫分縷析極根柢大義森然見條目鄙人愧莫知所對叩請安得留更僕頗聞石洞閟遺音龍門餘韻煩君續臨風傾詠寄綢繆衰朽終期挹膏馥題張清夫心逺堂吾聞古來賢逹士不擇山林與朝市百年塵甕兩醯雞鵬鷃逍遙俱可爾夫君平生瀟灑意俯睨軒裳猶敝屣翩然一舸鱸魚鄉歸來不待秋風起忘言兀兀坐終日天地古今齊一指但見山高湖水深青螺蕩漾銀杯裏柴桑之人去我久風味何妨略相似神交冥漠雲海長目送歸鴻渺千里題醉歌圖翰林主人天上來布帆不為鱸魚開江湖渺渺天一色朝光暮靄相徘徊昔賢心賞餘勝處祇有水竹無亭臺碑材久已沒荆棘屐齒不復留莓苔後來視今猶視昔今我不樂胡為哉太官馬湩逺莫致鄰翁緑蟻浮新醅欣然一飲便終夕鼻端氣息如雲雷是間别有一天地不知何處為蓬萊回觀方內海一粟醯雞塵甕何喧豗黃冠祕監太狂態騎鯨供奉非仙才揮毫政要真學士鋒車流水行相催瑶池曲宴多雨露歸歟酌彼黃金罍桃巖立石平如削飛雲近可梯莫窮千古勝但惜衆山低靈草經年長珍禽隔樹啼人言舊朝士感事有留題雨兀坐九十日雨聲殊未收花時翻益睡茅屋不禁愁生事吾何望春寒晚故留江波青滿眼萬里付雙鷗寄友人憐君山水意局促守柴扉故里悲秋草凉風滿褐衣滄洲斜日曉白社幾人歸寂寞分遙念天寒木葉稀秋懷二首稍稍秋河落娟娟宿露微天清江不息野迥樹相依回首狂歌數驚心昨夢非流螢無思極巧入絳帷飛風雨仍搖落江山且滯留懶從生事拙閒惜壯心休弱蔓縈欹石空槎卧洑流興懷到微物世故劇悠悠憑軒信有儒冠誤憑軒意欲迷山深風雨惡天濶羽毛低化日開炎瘴連城送鼓鼙荷殳吾愧爾未敢嘆塗泥風雨風雨忽如此閉門方晝眠故應為計拙可復要人憐燈火羌村路桑麻杜曲田悠悠今視昔把卷一茫然山中懷友卓犖恆山秀相逢幾抱琴五年風雨别四海弟兄心雪外梅花逺山中桂樹深定知嵇叔夜高興薄雲林聞子踐卧疾吾子乃多病何人共解顔水聲和藥臼春色閉松關積雨連三月懷人劇萬山同遊况零落浩蕩可追攀八詠樓懷古荒碑在登樓晚望賒秋陰垂野薄江勢抱城斜天地悲遊子氷霜感嵗華紅塵吹短褐歸興及清笳送陳養直歸四明迢迢浙河水同渡不同歸執袂方成别驚帆已若飛野橋行處酒風雪去時衣瞻望嗟何及天長鴻雁微送馬伯忱教授卓犖青雲彥飛騰及妙年書成天祿閣座有廣文氊九陌車塵外千軍筆陳前白頭慚倚席臨别思茫然題石門淨勝寺十頃蒼陂上山回地勢偏屋栖黃面老碑挂赤烏年葉葉風荷顫層層雪瀑縣青燈夜寥閴獨照一僧禪感舊華屋山丘不可期峴峰依舊緑參差空懷下榻延徐孺無復乘舟訪戴逵日暮更聞鄰舍笛嵗寒惟有角弓詩舊遊寂寞成今古冷石秋花處處悲早起漠漠晴簷散薄雲獨搔華髮立清晨春風入樹無行迹晚月窺簾欲近人旋覺新吟隨夢寐不知清霧濕衣巾何人正踏長安陌想見看花拂面塵獨立數盡飛花一愴然壯心迢遞夕雲邊十年人事空流水二月風光已杜鵑過眼青春寧復得汚人黃土絶堪憐故園尚有平生約可使蒼苔到石田寄友人繫舸一别雲水鄉暮川葭菼空蒼蒼漳濵卧病他年憶渭北題詩春日長蕪菁作花已爛熳楊栁飛絮若顛狂聞道茯苓久堪劚遲子青鞋經澗岡夏日漫書枕上初殘柏子香鳥聲簾外已斜陽碧山過雨晴逾好緑樹無風晚自凉芳嵗背人成荏苒好詩和夢落蒼茫羊求何不來三徑門掩殘書滿石牀逢葉伯幾水烟沙雨送歸航楓葉蘆花已十霜瑶曲天香春夢逺墨池秋草故遊荒碧峰又是新回雁白石依然舊化羊一笑相逢却成别暮雲千里思茫茫答友人芝掌峰前一杯酒别離嵗晚遞相望野梅如雪遙入眼曉雁連天寒呌霜閉門窮巷燈火冷回首蒼山雲樹長幾時抱被却同宿愧爾詩筒逺送將過烏傷墓丹青像設始何年翁仲遺墟自古傳時有北人來下馬不知秦樹幾啼鵑牧童解指看碑路野衲分耕祭墓田回首長安西日外茂陵松柏正蒼烟金陵天津橋五雲零落渺天涯陳迹蒼茫日自斜畫角已吹邊塞曲紅蘭新長內園花可憐遺老埋黃壤曽倚春風望翠華好在北山猿與鶴依然同住舊烟霞送人歸豫章已覺栖遲懶曵裾可能為我强躊躇一帆秋色紅塵外千里江關白雁初建業水清誰共飲潯陽潮斷定無書黃金未盡朱顔在莫種桃花學隱居佘山春雲牢落雁無聲沙岸參差石有稜雙屐漫窮芳草徑一龕長愧白頭僧晴濤閃閃翻孤日山木昏昏卷翠藤後夜清風滿遙念夢遊空指上方燈遣興青雲如夢慨平生白髮驚春忽數莖漸覺交遊隨日别强知顔色逐人行百年松檟誰能去五畝烟霞故可耕妄念掃除渾欲盡少游何得尚相輕客樓雨中江城飄泊動經年盡日高樓閲過船睡起小窗初聽雨岸傍垂栁已生烟坐拋嵗月今如此每望雲山欲泫然尚喜遊從得諸彥時將樂事寄新篇次韻答蔣春卿不謂紅塵拂面時軒然談笑一舒眉晴風石鼎浮花乳夜雨春盤冷碧絲握手遽成三宿戀論心那覺十年遲酒船漁網歸無計未必山前白鷺知花信巳覺尋芳去較遲千林紅紫想紛披幾經夜雨能無恙試問春風竟不知斜日遊蜂應有夢野亭立馬已多時殷勤却是江南客曽擘氷霜寄一枝送貢教授致仕歸里宦情鄉思兩依依獨裹寒氊去若飛嵗晏忍為千里别林間驚見一人歸官河逺樹迎山櫂夕日暄風揚綵衣漫使臨岐生悵望可容泉石借餘輝陳山晚泊一柱孤撑杳靄間人言此是客星山流風百世今誰嗣應詔諸生故未還荒塜草深迂石路高齊月滿閟松關窮年漫迹滄江上及此維舟獨厚顔上巖寺訪一公晚色微茫尚帶星修蹊犖確斷人行獨支瘦竹身猶健高入重雲地忽平落月正當山缺處細泉頻作雨來聲上方燈火青林曲隱隱疏鐘一再鳴題東柯谷圖長松密竹翠交加洞府新開碧海涯石上仙人留足跡春深澗水出桃花流傳圖畫來千里生長兒孫只一家目斷飛鴻那可到舊遊空指赤城霞題雪竇妙高樓偶為清遊宿梵宫凌晨試上最高峰水翻雪色寒猶落雲掩丹光逺更重舊有一僧能跨虎近聞三洞盡藏龍下方車馬應難到烟際唯聽日暮鐘送趙繼清潮州推官相國南遷有故居理官高選出新除承恩特與金魚袋訪舊爭迎駟馬車春入圜扉庭草暗天低驛路嶺梅疏鳯池不隔同年面歸及梅花雁影初送孔御史歸曲阜清流共喜聚羣賢新渥時聞下九天東觀紬書何日了中丞遺笏要人傳過家莫久依林廟封事先須徹御筵千載斯文寄來哲臨分握手重縣縣送龍南歐陽縣尹絲綸閣下半同袍獨上南船去莫招出宰不嫌官俸薄過家那覺驛程遙長溪白石晴雷轉深洞黃茅毒霧消想見行春有佳句坐令遐俗變風謡送尉彥誠道州經厯一别垂垂四十年朔風吹鬢兩蒼然寒氊久坐歸何日上幕初登望若仙莫使催科書下考盛談名理繼前賢春生馬首逢回雁併寫相思入近篇送陳季和高齊燈火正蕭條忽遡天風上泬寥共喜彈冠如貢禹豈期投筆學班超時清桴鼓元無用嵗晚弓旌倘見招雪後江南春水活重來休厭驛程遙次韻蘇侍郎平村暮歸中臺多暇獨儀曹退食歸來路不遙扶老未須蒼玉杖行春聊過赤䦨橋揮毫風雨傾三峽聽履星辰接九霄愧我白頭方倚席敢將巴曲和仙韶題莫氏山莊圗旋移小隱傍南峯逺有咸平處士風山態近人猶偃蹇湖光無雨亦空濛行春杖履時時到臨水軒窗面面通别作新亭供戲劇青帘搖曵杏花中鳯凰山滄海桑田事渺茫行看遺老色荒凉為言故國遊麋鹿漫指空山號鳯凰春盡緑莎迷輦道雨多蒼蘚上宫牆遙知江水東流畔更有平蕪與夕陽九日登石頭城背郭囂塵逺高秋川嶽清幽懷初曠蕩陳迹故縱橫遙望龍盤舊長憐蟻穴爭紺園隨處闢粉堞向來傾撥草窺眢井看碑驗故塋門開蒼耳路亭愛翠微名逺樹淮南出滄江鳥外明人烟川浩渺風物嵗崢嶸吹帽仍佳節傳觴但老兵登高未成賦覽古獨含情政復哀王粲何堪厭襧衡敝廬滄海曲目斷白雲生積觀賦絶句三首芙蓉峰下南朝寺水秀山明兩絶竒更向水窮山盡處一庵高貯碧雲師山中今是太平民尚與人間隔幾塵流水桃花三百曲莫教重誤武陵人坐愛春泉響翠微玉花吹濕薜蘿衣何人為擘氷壺破共看青天白練飛水仙圖翛翛翠羽映鳴璫誰遣乘風過我傍嵗晏高堂空四壁一簾烟雨夢瀟湘山水圖老樹無陰石有稜亂山高下白雲層夢中猶識江南路惟恨舟人唤不譍栁貫字道傳浦陽人器局凝定嘗受性理之學于金履祥期以實踐躬行自幼至老好學不倦凡六經百氏星厯術數及釋老異教之書靡所弗通作文沉鬱舂容涵肆演迤人多傳誦之始用察舉為江山縣儒學教諭仕至翰林待制所著文集四十卷字系近思録廣輯金石竹帛遺文共十五卷與黃溍齊名曰黃栁又合虞揭稱之曰四傑度居庸關居庸朔方塞始入兩崖張行行轉石角細路縈澗岡層壑倒天影半林漏晨光﨑嶔里四十所歷萬羊腸千轅絡前後兩軌通中央谷開稍夷曠在險獲康莊豈惟遂生聚列㕓參雁行激流或磯磑架廣亦僧坊我生山水窟愛此不能忘是日新雨已浮嵐亂沾裳水聲與石鬭風飄韻清商局轡不知高浮雲翼起驤考牒曩有聞經途今始詳緬惟古塞北八州猶漢疆控扼識形勢㑹同知樂康屬兹景運開六服連綏荒兩京備巡幸離宫岌相望守嶽將孝制如祠匪求祥式瞻虎氣騰足徴大業昌逺想王會圖勿賡祈招章李老谷聞子規老杜聞子規近在東西川猶云感時物收淚寫幽悁今我行塞徼子規相後先時夏雲景晦鳥呼搖空烟響入樹窅窅啼垂血濺濺想知岐路難不恤軀命全千聲復萬聲唤我歸言遄茍非木石心豈免腸內煎江南叢薄間有花名杜鵑開時是鳥至相戒治春田不歸如江水負此今五年風土孰云異物情要有遷寄巢勿浪出祝爾還自憐嚴程趣行邁且復揮吾鞭和袁集賢上都雜詩八首雨水漸衣黑雲沙際目黃烟開才黯淡日出已蒼凉徇俗高簷帽清心小篆香端居萬里念蕙草惜微芳昔建寰中業初開徼外山雎城平兀兀沙水淨灣灣朱夏宸游正清秋武衛閒叨陪文學乘空愧鬢毛斑徭俗隨方異溝途隔舍迷醺人惟馬湩勸客有駝蹄殿角孤花靚城隅雜樹低天涯中夜舞如意昔曽攜天潢猶白白雲幕故青青積潦摧車軸高風墮箭翎宫塗丹赭堊殿戶紫金釘女樂蓬萊祕哀簫動杳冥幄殿層雲障轅門積雪峰竒鷹皆戴角御馬盡飛龍瀚海將臨幸云亭望陟封青丘大羽獵有事待𤣥冬曹務唯章句官規自法程齊扉侵雨潤宴几得風清歷歷三刀夢行行萬里城明年遂耕隱深仗酒為名公子青絲轡王孫緑幰車宴酣風小定舞破日西斜手擲宫中果神行海上槎築郿無自厚儉德不期奢水草方方善弓弧戶户便合圍連婦女從戌到曽𤣥雪毳千家帳氷瓢百眼泉浚稽山更北長望斗光縣觀實喇鄂爾多御宴回毳幕承空枉繡楣綵繩亘地掣文霓辰旗忽動祠光下甲帳徐開殿影齊芍藥名花圍簇坐蒲萄法酒拆封泥御前賜酺千官醉思覺中天雨露低元日宴大安閣金殿開扉日映樞翠帷香霧動流蘇玉壺修幹雙龍捧寶座重裀瑞鵲敷春色入杯初瀲灔雪光浮檻尚模糊天元啓運三陽正需宴欣承湛露濡還次桓州塞雨初乾草木霜穹廬秋色滿沙場割鮮爼上薦黃鼠獵獲腰間縣白狼别部烏桓知幾族他山穡落是何方長雲西北天如水想見旌旗瀚海光題齊壁牧馬新來秣地椒衛頭挏酒玉傾瓢羲和白日經天近敕勒陰山度幕遙雨過忽然思御夾風清聊復快淩歊他年續作灤陽夢萬里排雲遡寂寥送臨川謝有源赴閩醫提領一路青山荔子叢華山西望粵臺東家風蘭玉庭階上官事參苓藥籠中鷁首去乘潮浪白蠣房催薦酒醅紅福州自是炎蒸少臘雪飛花落半空張養浩字希孟濟南人年方十嵗讀書不輟父母止之則默誦竊讀稍長肆力益勤山東按察使薦為學正遊京師獻書平章布呼密大竒之辟為令史選受棠邑縣尹多惠政召授東宫文學拜監察御史以言事忤僧格變姓名遁去尚書省罷召起右司都事遷翰林直學士祕書少監歷禮部侍郎尚書至參議中書省事諫止英宗張燈內廷尤人所不敢言者丁父憂屢召弗起天厯二年關中大旱特授陜西行省中丞聞命登車經華山禱雨痛哭不能起忽大雨二日到官四月以賑荒積勞得疾卒年六十秦人哀之如失父母追封濵國公諡文忠休日郊外久厭官居苦幽尋到澗阿鶴知松嵗月鷗狎海風波野迥塔孤立嶺高雲半過莬裘良未暇聊此慰蹉跎山行一懶將成性春遊尚爾勤花攲知雨力水皺見風文碧落一明月青山半白雲却愁從此去塵冗又紛紛齊居春暮漂泊東君底處家落紅風捲赤城霞半窗春夢子規月滿院客愁楊栁花世事悠悠惟缺酒棠陰密密欲藏鴉韶光九十須㬰頃不是劉郎鬢易華趵突泉繞欄驚視重徘徊流水緣何自起堆三尺不消平地雪四時常吼半空雷深通滄海愁波盡怒撼秋風恐岸摧每過塵懷為瀟灑斜陽欲沒未能回王執謙字六皆濟南人與張養浩李京輩稱詩家四傑孟光舉案圖白髮梁鴻與世乖賴逢光也配其才五噫歌罷愁無奈不覺春從案上來李京字景山河間人與王執謙張養浩田衍唱和士林美之稱為神人留别都城諸公蒼龍雙闕鬱岧嶤曾侍鵷鸞趂早朝往事已隨塵滚滚虛名贏得鬢蕭蕭長林豐草空相憶瘴雨蠻烟苦見招借問都門門外栁為誰留著最長條宋元詩㑹卷八十一
