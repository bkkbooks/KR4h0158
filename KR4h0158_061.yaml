body:
  text: 宋元詩㑹卷六十一兵部主事陳焯編金詩附司馬朴以下天水留金五人朴字文季溫公之猶子宋兵部侍郎以奉使見留居于祁陽授以官託疾不拜遨遊王公之門以壽終文季工書翰有晉人筆意金主嘗購其遺墨學之有雪霽同韓公度登圓福寺閣詩今略載于此積雪日出杲雪飛梅已殘朋遊要及時閣鄰有遐觀乘此蕪穢平快覽天宇寬霽色濕銀界空望連江干山如白毫相滉溢清揚端一氣轉浩渺萬里皆瀰漫優哉賦梁苑想像排廣寒下句俱殘缺不可讀云無餘居士齊壁有沈傳師遊道仙嶽麓詩石刻穆仲等和之因亦次韻湘西勝景豈易論羣山騰闖萬馬奔鶴泉一麓鶱鵬噣松風十里藏祗園當時侍御遇題寫筆力孰敢爭雄尊東京少年妙詞藻南陽舊族齊隂樊天心月脅出奇語使我展讀忘朝昏差差戈劍隱一敵落落旗鼓嚴千屯無餘居士厲幽志細研六藝方專門凍骭嬌兒慣腸莧啼饑瘦婦餘淚痕惟君德義克相愜每窮道妙角與根他人勸酒驚逐魂二子頻酌勤空樽醉中詩成渺江海風外幡影徒相翻卷藏篋笥已戢戢風生襟袖何軒軒嗟乎我亦有餘腐陋哉羊政囚華元滕茂實字秀穎姑蘇人初名祼徽宗改賜焉以太學正兼明堂司令與樞密路允迪翰林修撰宋彥通奉使割三鎮太原尋奉密詔據不下國相怒囚使人於雲中欽宗北遷秀穎謁見涕泣相從行主者不之許放允迪彥通南歸茂實留雁門與兄宗正承福字伯壽淮南發運使䄎共居久之家人至自汴梁秀穎往來并代之間布衣終身臨終令黃幡裹尸而葬仍大刻九字云宋使者東陽滕茂實墓士大夫哀其忠為之起墳于雁門歲時致祭雁門李鍾秀挺云喪亂以來家所藏書焚蕩都盡避兵山中民家偶于破箱中得秀穎詩一編紙已敗爛前序秀穎自作可辨者百餘字大略言能安於死生之分而不能忘感慨不平之氣又曰蘇屬國牧羊海上而五言之作自此始豫敢援以為例後敘是筆吏林泉野老彥古彥古不著姓年七十八手録三滕始末號東陽滕秀穎鳯山思逺記者詩數百首可讀者十六七臨終一詩缺三五字而已非筆吏此集則秀穎之事無以見於世蓋先生名節凜然不愧古人其文字言語宜有神物護持雖埋殁之久而光明發見決有不可掩焉者歟䄎字恐誤當作祹見南中高濟叔碑臨終詩并序某奉使亡狀不復反父母之邦猶當請從主行以全臣節或怒而與之死幸以所仗節幡裹其尸及有篆字九為刋之石埋于臺山之下不必封樹蓋昔年大病夢遊清涼境界覺而失病所在恐于此有緣如死窮徼則乞骸骨歸悉如前禱預作哀詞幾于不達方之淵明則不可亦庶幾少遊之遺風也虀鹽老書生謬列王都官索米了無補從事敢辭難殊鄰復盟好仗節來榆關城守久不下川塗望漫漫儉輩果不惜一往何當還牧羊困蘇武假道拘張騫流離念窘束坐閲四序遷同來悉言歸我獨留塞垣形影自相弔國破家亦殘呼天竟不聞痛甚傷肺肝相逢老兄弟悼歎安得宣波瀾卷大厦一木難求安就不違我心渠不汗我顏昔燕破齊王羣臣望風奔王蠋猶守節燕人有甘言經首自絶脰感慨今昔傳未嘗食齊祿徒以老為民况我祿數世一死何足論逺或死江海近或死朝昏斂我不須衣裹尸以黃幡題作宋臣墓篆字當深刋我室尚少女兒女皆童頑四海無置錐飄流倍悲酸誰當給衣食使不厄飢寒嵗時一酹我猶足慰我魂我魂亦悠悠異鄉寄沈寃他時風雨夜草木號空山喜雨旱暵雨霑渥豐穰都不疑商羊應屢舞布穀强多知龍見寧非數雲行自有時當年班夏令曽得近丹墀哀隆德守臣張確確浮休張舜民之弟嘗為烏雅帥幕獨不廷謁童貫作詩弔之雎陽萬古一張巡忠義傳家有世臣顏子服膺當入室潘郎望拜肯同塵圍城抱恨天猶晦仗劍臨危氣益振歎子鄰邦盡曹李偷生端作九泉人天寧節有感節臨重十慶天寧古殿焚香祝帝齡聲在北方金佛剎眼看南極老人星千官花覆常陪燕萬里雲遙阻在廷松柏滿山聊獻壽小臣孤操亦青青汴梁故老云徽宗本以五月五日生以俗忌移之十月十日故此詩有重十之句雨後蔬盤可喜偶成過雨盤蔬日日新從今休歎庾郎貧寒虀安取咄嗟辦火食不憂生死鄰野莧何施雖可鄙美芹欲獻去無因干戈萬里風塵晦慚愧平生肉食人五日節物驚心動逺思熏風又見浴蘭時空尋好句書紈扇無復佳人繫綵絲酒注菖蒲唯欲醉筒包菰黍不勝悲明年此日當何處風裏孤蓬自不知偶成纖雲卷盡見愁容古木交隂一掃空雪壓羣山曉來雨沙侵缺甃幾畨風欲歸未得人將老屢送還來鬼亦窮賴得子卿佳傳在整冠時讀慰飄蓬立春東皇布政物皆春山色禽聲便可人滿谷和風消積雪半窗晴日動遊塵宮花插帽枝枝秀菜甲堆槃種種新拘窘經時成土俗聊從一醉適天真何宏中字定逺先世居雁門叔祖青出武辨任欣州兵馬使因家焉祖行宣西遊遇仙不返行宣之子子奇子霖政和中中武舉高科子奇秉義郎武州宣寧尉子霖忠翊郎守豐州安豐寨皆沒王事定逺子奇子也幼倜儻儀觀秀整雅以奇節自許宣和末方賊擾江浙定逺以太學武舉進士陳破賊三䇿徽宗褒諭謂非近日言事者所可比已而破賊如定逺䇿遂知名宣和元年集英殿試䇿第二調滑州韋城尉汴京被圍州郡多避走獨韋不下兵退統制武漢英奏辟欽宗御札召赴軍前以路塞不果因請兵真定宣撫司時副帥种師中兵已潰宣撫司檄定逺副漢英守銀冶路既而太原破西路無完城定逺等提兵竝山而東將赴援京師俄漢英戰死定逺收合散亡立山栅七十四所號令所及千里而逺艱食數月人不敢相食詔以為武節大夫河東河北兩路統制接應使是後金兵日盛所守唯銀冶一城而已金師募人生致定逺天㑹五年二月糧盡被擒大帥扎拉憐其忠解縛授以官定逺投牒于地曰我常以此物誘人出死力若輩乃欲以此嚇我耶帥嘉其不屈又問欲還鄉否定逺謀南奔陽以願歸為言㑹監送使臣有先與定逺相攻劫者訴之囚西京府君廟二年帥一日召之授以官又不拜使之充軍亦不從取家屬填城黃龍府益偃蹇不行帥怒禠衣欲斬之定逺欣然就戮曰得死所矣擁之行已數十步帥終不忍召還問爾授官不願充軍又不行填城又不行斬又不懼畢竟如何定逺徐曰生死在公奚問為帥怒解繫之西京獄得州人保任者數十族乃放歸請為黃冠時神霄宮廢道士舊以徽宗為東華君將毁其像定逺為起紫微殿遷像事之年六十三正隆四年病殁自號通理先生所著成真通理二集藏于家州將傳慎微幾先贈詩云故人何定逺造物不虛生骨骼稜稜瘦詩篇字字清世皆尊道義我獨見忠誠尊酒分攜後何時復共傾其餘與朱少章輩唱酬甚多皆為所推重載之墓碣之隂述懷馬革盛尸每恨遲西山餓踣更何辭姓名不到中興厯付與皇天后土知姚孝錫字仲純豐縣人政和四年登科調代州兵曹金兵入雁門州將議以城降官屬恇怯投死無所仲純投牀大鼾略不以為意金帥就注五臺簿未幾移疾去因家五臺善治生亭榭場圃富於遊觀賓客日盈其門州境嵗飢出家所藏粟萬石賑貧乏多所全濟鄉人德之中年之後以家事付諸子放浪山水間詩酒自娛醉軒其自號也資稟簡重喜怒不形于色棄官時年二十九至八十三乃終名士大夫為詩以弔者數十人仲純長于尺牘所著雞肋集喪亂以來止存律詩五卷而已今略載于此次冠卿韻云節物後先南北異人情冷暖古今同次趙獻之韻云紅纈退風花著子緑針浮水稻抽秧溪野早春云久客交情諳冷暖衰年病骨識隂晴春日和德充云烟染緑絲迷别浦雨催紅糝綴長條雜詩云愁邊日晷偏疑短夢裏江山未當歸盤無兼味慙留客夢厭多岐不到鄉賦雪云酒敵餘威翻索莫詩含幽思倍清新雨云岸漲魚吹沫山空石轉雷峰山寺云谷虛繁地籟境寂散天香雲生古木千章秀山抱晴川一掌平懷士㑹云詩忙疏酒盞俸薄減厨烟感懷云𤣥宴暮年常抱病子山終日苦思歸古詩尤有高趣恨不復見之矣睡起睡起日侵牖開門遙見山曉風吹臘盡芳草惹春還烟暖鶯遷谷雲低雁渡關衰年人事減遇酒得開顏閒居無客訪衰殘柴門盡日關耽書真是癖惜酒近成慳苔徑行搜句茅檐臥看山却嫌明鏡裏偏照鬢毛斑次韻李相公偶成簾鳥呼歸夢竹風追夕涼感時空有淚却老分無方流水依山白孤雲帶日黃無人共尊酒散髮臥藜牀春日書懷雲散交情薄棋翻世態新山容猶帶臘鳥語已回春節物驚心遽丘園入夢頻東風如解語端笑未歸人用峰山舊韻春水上堤沙春晴散望賒衰年花近眼久客夢還家映日孤鴻沒迎風雙燕斜平生江海意蚤晚送浮槎次韻秋興老畏年光速愁添旅夢多西風著梧竹歸思入烟波夜永慿詩遣顏衰得酒和故溪千樹栁誰復曬漁蓑溪橋早春輕黃未染栁梢勻連日溪風捲塞塵乍暖乍寒花信晚相呼相喚鳥聲頻少勤謾挾經綸策老懶空餘病患身追憶故園桃李樹年年紅紫為誰新生涯生涯甘分寄耕桑山色圍門水繞牆因病久懲耽酒癖愛閒仍有和詩忙簷冰滴砌春猶冷野馬浮川日漸長舊事老年多記憶故園歸夢正悠揚栁溪别墅安車隨意飽甘肥晚食徐行理亦齊山市日高人未集柴門客至鳥先啼溪橋散望攜笻度野寺牽吟信筆題容膝易安聊自適甕天閒看舞醯雞次李平子登臺有感落日孤雲帶逺岡戍樓烟瘴舊邊場疲民卒嵗方懷土逺客憑高自憶鄉漢使一朝延四皓秦詩千古弔三良行藏此意無人解聊借青山送酒觴和成冠卿見寄别恨頻添鬢雪深百年懷抱鬱沈沈標名不挂金銀榜涉世空堅鐵石心俗物何勞供一醉殘僧正欲伴孤吟朱絃三㺯虛簷寂唯有清風是賞音感白髮彈鋏憑誰聽客歌震雷那復化魚梭梳頭白雪驚新有障眼𤣥花比舊多鄉問阻兵猶斷絶羇懷憑酒暫消磨不須更問今朝客門外元無雀可羅題佛光寺臧穀雖殊竟兩忘倚䦨終日念行藏已欣境寂洗塵慮更覺心清聞妙香孤鳥帶烟來逺樹斷雲收雨下斜陽人間未卜蝸牛舍逺目橫秋益自傷次韻公才對菊見懷髮蓬新感二毛侵尚阻清尊對菊斟久擬芝蘭同臭味莫疑魚鳥自高深食貧豈復甘秦炙客病空懷奏楚音挂席無由上牛斗漫憑流水送歸心題滕奉使祠本期蘇鄭共揚鑣不意芝蘭失後凋遺老祗今猶涕淚後生無復識風標西涇雁度霜前塞滹水樵爭日暮橋追想平生英偉魄凌雲一笑豈能招芭蕉鳯翅搖寒碧虛庭暑不侵何因有恨事常抱未舒心朱辨字少章宋吉州團練使因通問金廷見留命以官託目疾固辭猝然以錐刺之而不為瞬用是得歸凡居雲朔二十年自號觀如居士有曲洧風月堂詩話行于世紹興十二年皇子生大赦宋使洪皓張邵朱辨南歸秋夜秋夜雖漸永未抵客愁長秋月雖已圓不照寸心方將心貯此愁真作萬斛量惟月憐此夜誰共千里光空令還家夢欲趂征鴻翔北人以松皮為菜豫初不知味虞侍郎分餉一小把因飯素授厨人與園蔬雜進珍美可喜因作一詩吾老似出家晚悟愧根鈍滋㫖却羶葷禪悅要親近偉哉十八公兹道亦精進舍身奉刀几割體絶嗔恨鱗皴老龍皮鳴齒溢芳潤流膏為伏龜千歲未須問便堪奴筍蕨詎肯友芝菌跏趺得一飽萬事皆可擯侍郎文懿後落落衆推俊淡然世味簿內典得所信香厨留淨供頻食不言頓宴然默不語草木雷音震得法於此公骨髓傳心印應憐持節人餉此為問訊欲將無上味為我洗塵坌食之不敢餘感激在方寸炕寢三十韻風土南北殊習尚非一躅出鄉雖仗節入國暫同俗淹留嵗再殘朔雪滿崖谷禦冬貂裘敝一炕且跧伏西山石為薪黝色驚射目方熾絶可邇將盡還自續飛飛湧𤣥雲焰焰積紅玉稍疑雷出地又似風薄木誰容鼠棲