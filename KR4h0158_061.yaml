國又叢臺涇王許以酒餉龍溪老人幾月不至以詩促之先生寂莫草𤣥文正要侯巴作富鄰客至但須樽有酒日高不怕甑生塵急催嶺外傳梅使來餉籬邊采菊人已掃明窗供㸃筆為君擬賦洞庭春按叔通别號龍溪從人借琴嶧陽慣聽鳯雛鳴瀉出泠然萬籟聲已厭笙簧非雅曲幸從炊爨脫餘生昭文不鼓緣何意靖節無絃且寄情乞與南冠囚縶客為君一奏變春榮吳激字彥高宋宰臣拭之子王履道外孫而米芾元章壻也工詩能文字畫得其婦翁筆意將命帥府以知名留之仕為翰林待制知深州到官三日而卒有東山集十卷并樂府行于世雞林書事箕子朝鮮僻蓬丘弱水寬儒風通百粵舊史記三韓邑聚居巢慣村􅋔披髮安猶存犬籩豆兼用古衣冠兔穎家工縛鮭腥俗嗜餐騎兵腰玉具府衛挾金丸長袖鳶窺肉都場狖挂竿琴中蔡氏㺯指下祝家彈主禮分庭抗賓筵百拜難漬橙粇釀㫖滋桂鹿修乾潑墨松如櫛隤牆石似丹地偏先日出天迫衆山攢鵬翼雲帆逺羊腸石磴盤由來異文軌休訝變暄寒事可資談柄誰能記筆端聊將詩貌取歸作畫圖看歲暮江南以下補録二首故次排律之後吳淞潮水平月上小舟橫旋斫四腮鱠未輸千里羮搗虀香不厭照筯雪無聲幾見秋風起空悲白髮生長安懷古佳氣猶能想鬱蔥雲間雙闕峙蒼龍春風十里灞陵樹曉月一聲長樂鐘小苑花開紅漠漠曲江波漲碧溶溶眼前疊嶂青如畫借問南山共幾峰張斛字德容漁陽人仕宋為武陵守後乃北歸官祕書省著作郎有南遊北歸等詩行于世平安關道中二首高林俯青冥柯葉森若識陽光巳轉午隂嶺仍半黑崢嶸亂石間行子有苦色臨深地勢入涉險天宇塞四顧無所投足繭去未息悵然增百憂冥冥羡歸翼窮冬十日隂積雪千山路晴雲開半嶺落日猶在樹悠悠客心速慘慘天色暮寒鳥各有依解鞍尚無處遊魚誤銜鉤𤣥豹終隱霧行行謝冠冕復我林壑趣高寺高寺鳴鐘後孤舟落雁邊已知歸徑晚故就上方眠石峻溜聲急月高松影圓明朝下烟靄回首阻清川訪香林老風雨無時浪蹴天南浮舟楫信多艱半生夢破寒江月萬里春回故國山歸客自傷青髮改高僧長共白雲閒誅茅借我溪西地未厭相從水石間蔡松年字伯堅父靖宋季守燕山仕金為翰林學士伯堅行臺尚書省令史出身官至尚書右丞相鎮陽别業有蕭閒堂自號蕭閒老人薨諡文簡百年以來樂府推伯堅與吳彥高號吳蔡體有集行于世淮南道中三首南楚二月雨淮天如漏巵畏途泥三尺車馬真雞栖却思閒居樂雨具無所施高枕聽簷聲爐烟暈如絲三年鎮陽遊春歸緑扶疏櫻筍媚園林日長閒枕書行復當此時涼塵暗歸塗㑹洗酴醿雪月波浮祕壺鎮陽亘西南山河在圖畫花雨草烟間人家或僧舍經行每悵然真賞如未暇待豫籃輿歸香火復蓮社庚申閏月從師還自潁上對新月獨酌二首人言歸甚易但苦食不足必使極其求萬鍾不盈腹處世附所安無禍即無福却視高蓋車身寵神已辱問舍前年秋已買潭西地高明鬼所瞰聊取風雨蔽瀕溪樹嘉木成隂十年計仍當作茅舍名之以今是和子文寒食北潭夢裏潭光翠欲流何時春水一虛舟吾廬想見扶疏樹宦意渾如浩蕩鷗聞道西山明酒面應無外物到睂頭别來誰唱驚人句十里珠簾有莫愁雪晴呈玊堂諸公雪晴松頂玉斕斑曉眼清于化鶴山欲立凍雲搜傑句却思仙客退清班氊毺帳底沈香火薝蔔花中碧霧鬟喚取廣寒修月手月波千丈捲春還和子文晚望醉眼郊原感慨生夕陽長向古今明高人法士互憎愛美酒空名誰重輕二頃只謀他日老五絃猶喜晚風清因君欲賦思歸樂安得穿雲一笛橫韓侯朝仲許送名酒渴心生塵以詩促之好在銀瓶秋露光借君雲夢到枯腸解澆萬里客愁破暫吐十年黃卷香江水苦搖梁苑夢海棠新學漢宮粧天東四月春如許坐待白衣投醉鄉高士談字子文一字季默宋韓武昭王瓊之後宣和末任欣州户曹仕金為翰林直學士皇統初預宇文太學之禍有䝉城集行于世春愁曲壓花曉露萬珠冷金井咿啞轉纖綆寶階寂寂苔紋深東風搖碎湘簾影芙蓉帳暖春眠重窗外啼鶯喚新夢推枕起來嬌翠顰一線沈烟困金鳯游絲飛絮俱悠揚慵倚繡牀春晝長郎馬不嘶芳草暗半篩急雨飛橫塘將赴平陽諸公祖席分韻作灞橋波似箭南浦草如裙此夜燈前淚他年日暮雲醉和醒一半悲與笑相分莫作陽關疊愁多不忍聞秋晚書懷肅肅霜秋晚荒荒塞日斜老松經歲葉寒菊過時花天濶愁孤鳥江流憫斷槎有巢相喚急獨立羡歸鴉早起曉起先烏鵲愁多竟不眠風霜嚴塞草星月淡秋天落葉親攜帚垂瓶自汲泉禁門朝萬馬魂斷憶當年風雨宿江上風雨蕭蕭作暮寒半晴烟靄有無間殘紅一抹沈天日濕翠千重隔岸山短髮不羞黃葉亂寸心常羡白鷗閒濤聲午夜喧孤枕夢入瀟湘落木灣祝簡字亷夫單父人宋末登科金初倅某州仕至朝奉郎太常丞兼直史館有鳴嗚集行于世其詩說有云豫政和丁酉任洺州教官是時括蒼鮑慎由欽止出所注杜詩說天王守太白守讀如狩于河陽之狩高秋登寒山南望馬邑州馬邑州在成州界豫撿唐書志寶應元年徙馬邑州于鹽井城欽止為有據矣舊注馬邑屬雁門于杜子美作詩處全無關涉後人遂謂王源叔謬于牽引不知源叔初不注杜詩豫識其孫彥朝彥朝不說杜詩非其大父注蓋彥朝不學見流俗皆讀舊注因而認有可嘆可歎元好問常以此問趙禮部趙云亷夫前輩必不妄試更考之嗣好問見吳彥高東山集有贈李東美詩引云元祐間祕閣校對黃本鄧忠臣字慎思余栁氏姨之夫今世所注杜工部詩乃慎思平生究竭心力而為之者鏤板家標題遂以託名王源叔翰林兩王公前後記初無一語及此注而後記又言如源叔之能文止作記于後則源叔不注杜詩為可見矣舉世雷同無為辨之者宣和近貴李東美有才藻善行書且喜作小楷所寫杜集精密遒麗有足嘉賞為作古詩一篇紙尾因記鄧公事後人聞此其誰不疑然豫少時目擊不可不識姑以告李侯非求信後人也彥高此說正與廉夫合近歲得浙本杜詩是源叔之孫祖寧所傳前有序備言其大父源叔未嘗注杜詩廉夫彥高益可信矣故好問録廉夫詩而併記之舟次丹陽船頭東下趂晨鍾船外清霜氣暗通斷雁聲歸烟靄裏孤帆影落月明中隋河波浪千年急梁苑池臺一半空試問碧堤無限栁敗條衰葉幾秋風下第魚臺東寺病眼逢花亦倦開流鶯飛去誤相猜多情却愛僧堂燕才得春風却再來虛極齊獨坐虛齊長鋏短燈檠明月當窗夜氣清却掩塵編時閉目胡牀獨坐聽秋聲夏雨電掣雷轟雨覆盆晚來枕簟頗宜人小溝一夜水盈尺便有蛙聲喧四鄰朱之才字斯美洛西三鄉人于汴宋崇寧間登科入齊為諫官坐直言黜為泗水令尋乞閒退寓居嵫陽因而家焉昆弟數人皆有文名師美自號慶霖居士有霖堂集傳于世南越行南越太后邯鄲女皓齒明眸照蠻土珊瑚為帳象作牀錦繖高張擊銅鼓太液池內紅芙蓉自憐謫墮蠻烟中灞陵故人杳無耗深宮獨看南飛鴻隨兒作帝心不願惟願西朝柏梁殿茂陵劉郎亦可人遣郎海角來相見金猊夜燎龍涎香明珠火齊爭煌煌番禺秦甸隔萬里今夕得遂雙鴛鴦白首相君佩銀印干戈欲起蕭牆釁莫言女子無雄心置酒宮中潛結陳漢家使者懦且柔纖手自欲操霜矛孤鸞竟落老梟手可憐空奮韓千秋樓船戈鋋師四起或出桂陽下灕水越郎追斬吕嘉頭九郡同歸漢天子尉陀墳草幾畨青霸業猶與炎州橫玉璽初從真定得黃屋却為邯鄲傾五羊江連湘浦竹嬌魂應伴湘娥哭後薄薄酒薄酒可以謀醉不必霞滋玊味粗布可以禦冬不必狐貉䝉茸醜婦可以肥家不必楚女吳娃獨夫長夜商祚訖羲和湎淫紊天厯李白跌宕三百杯阮籍沈醟六十日眠瓮吏部寡廉恥解貂常侍隳法律儻使飲薄酒未見有此失秦昭狐腋幾喪首鄭臧鶡冠貽厥咎龍裘金玦豈不哀繡衣朱襮固無取皆緣粗衣惡不御賈禍招譏亦何有夏姬滅兩國驪姬禍五世捧心顰睂亡夫差墮髻啼粧敗梁冀醜婦似可惡終不至顛沛勸君飲簿衣粗娶醜婦此樂人間最長久劉著字鵬南舒州皖城人宋宣政末登進士第歸金預銓調碌碌州縣年六十餘始入翰林充修撰出守武缺遂終于欣州刺史皖城有玊照鄉既老號玉照老人示不忘本云枕上言懷九土將分裂中原政擾攘孰為真漢相却憶假齊王晉室遷神鼎梁園作戰場可憐羇客夢夜夜在家鄉次韻王子慎玉田道中一首兼呈韓公美閣老東晉風流屬子猷開元峭直讓韓休絲綸對掌驚三雋尊酒更酬失四愁古道隂隂槐樹老歸鴻杳杳荻花秋浩然詩思天涯逺月滿江南小謝樓至日亂離南國忽經年一線愁添未死前心折靈臺侯雲物眼看東海變桑田燕巢幕上終非計雉畜樊中政可憐安得絶雲行九萬却騎鯨背上青天再和彥高否泰由來在嵗星誰聽叩角作商聲一朝漢魏成今古百口燕秦隔死生雉堞僅能逃病婦雁書猶記作團兄雪雲埋盡遼西路有酒如淮奈此情宋元詩㑹卷六十一
