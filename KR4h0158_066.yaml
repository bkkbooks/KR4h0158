body:
  text: 宋元詩會卷六十六兵部主事陳焯編元有天下文治蔚興纍朝御製詞章史臣必編次成帙而元文類弗載一字當因內府藏本不落人間也茲從野史中搜得文宗詩二首用冠簡端元文宗上神智天畀怡情詞翰雅喜登臨居金陵潛邸時常屏從官獨造鍾山冶亭吟賞竟日曾命近臣房大年畫京都萬歲山圖大年辭以未至其地上索紙運筆先作一藳授之大年驚服謂格法周匝停勻雖積學專工莫能及也自集慶路入正大統途中偶吟穿了氁衫便著鞭一鈎殘月栁梢邊二三㸃露滴如雨六七箇星猶在天犬吠竹籬人過語雞鳴茅店客驚眠須臾捧出扶桑日七十二峰都在前望九華昔年曾見九華圖為問江南有也無今日五溪橋上見畫師猶自缺工夫楊奐字煥然乾州奉天人母夢日光射其身而生識者謂文明之兆因以奐名之金末舉進士不第作萬言䇿指陳時弊未及上而歸元太宗戊戌詔試諸道進士奐試東平兩中賦論第一用耶律楚材薦授河南路徵收課稅所長官兼亷訪使在官十年乃請老世祖總漠南驛召參議京兆宣撫司事纍辭得請年七十終于家諡文憲所著書百餘卷有懷梁仲經父美人熒熒在何處海濶天低隔烟霧珊瑚零落芙蓉空咫尺相望迷去路翠輦金輿雙鳳凰風吹環珮聲玎璫壺觴狼籍事已往一日萬里愁茫茫劉郎竟是誰家客歲晚霜華林葉赤美人熒熒在何處鴨緑江頭江月白宿草堂廢寺人蹤斷幽溪野性便魚須分浪細虎跡印沙圓馴雀偷僧飯饑蚊破客眠獻芹吾豈敢直欲斸山田寄商夢卿無窮惟永日有盡是流年白髮誰能免丹經恐妄傳㑹心人健否到處冡纍然滾滾風波地方思萬里船阿道村官路人家少邊城驛使頻季鷹終去洛王粲近歸秦天地羣龍鬬泥沙尺蠖伸親朋應笑我頭白傍風塵留别儒禪溪行魚不畏巖宿虎相隨怕客談新事逢人誦舊詩衲輕聊覆體米滑欲翻匙僧臘知餘幾霜髭已滿頥謝顧副言問疾久謝公家事時勞長者車可憐新病後未覺故人疏渭北偏饒夢河南近得書相忘吾豈敢欲出怯籃輿訪耿君玊隱居居幽穿洞府岸狹束溪流細徑鄰翁熟縣崖逺客愁橋明山月上窗暗野雲浮世事何曾到年侵易白頭雨夜二首關河隔千里筆硯寄餘生老覺鄉心重閒知世念輕浮風搖竹影細雨簌檐聲落魄緣何事吾今不用名窗秋風獵獵檐夜雨頻頻蛩韻愁於我燈花笑向人此身猶在洛何日定歸秦不必黃粱熟真慚白髮新未歸渭水遙通洛函關近隔秦百年垂老日千里未歸身夢寐嫌為客妻孥不諱貧一官無可戀花氣五陵春答京叔文季昆仲何處音書至劉家好弟兄科名先世在詩律早年成嶺北饒風雪淮南困甲兵論文吾有意尊酒阻同傾飲山家為愛春風好乘時把一杯百年雙眼在萬事寸心灰花向坐中落客從雲外來詩成無紙筆書地惜蒼苔浮生懷裕之漢節飛雲外秦城落照邊浮生空自老歸計定何年淚滿陳蕃榻心遙祖逖鞭短詩聊遣興羞向故人傳晚至青口長年困行役短髮易飄零世事驚春夢交親散曉星燒痕侵路黑栁色夾堤青落日明霞底原情動鶺鴒撫州北界連南界昌州又撫州月明魚泊夜霜冷鼠山秋為客無時了勞生有許愁殘年嬰世網吾欲謝溪鷗青峰寺哭燦然弟長别惟生死難忘是弟兄但吾今到處想汝昔曾行鄉社三年阻兵戈一夢驚青山風雨夜此去更傷情至滑州堤舊事悲存沒殘年厭往還孤城晴雪底雙塔暮雲間馬沒長津在龍歸老井閒隔林青數㸃多是濬州山出鴉谷宿北石橋燒火連山暗春雲出谷遲避人投野店繫馬就疏籬舊宇頽垣在新愁客枕知清明無幾日細與數歸期宿南石橋江流平入楚山勢逺連秦岸柳猶含凍溪花欲破春石銜車轍古沙印虎蹄新晚境長為客空山不見人承德亨見訪世事元無定人生只合閒君今悲白髮我亦負青山廢郭官居冷荒年旅食慳最憐情義厚朝至暮方還次答正卿二首客愁青鏡裏歸夢白鷗邊故國人何在新秋月又圓米鹽逢此日詩酒負殘年長羡平林鳥雙飛入暮烟何人依玊樹有客隱金華老覺身為纍時勞夢到家且騎山簡馬誰識子陽蛙日暮秋風起飛塵滿畫叉次答伯直侍郎家貧餘四壁地勝接三鄉詞賦狂司馬形容老遂良畫眉從爾濶舞袖為誰長生死交情在書紳示不忘冠氏留别趙帥主人情爛熳客子自奔忙不見猶頻夢相逢合斷腸秋凉拋藥裹夜雨倒壺觴回首髙城北幽燕去路長送靳才卿之平陽却向他州去蕭蕭雪滿簪丘園初到眼兒女總關心汾水野烟白霍山寒霧深得歸歸更好吾亦愛秦音呈君美上陽門外路日暮獨歸時齒髮已衰謝風塵仍别離斷雲橫紫閣急雨掠蒼陂地勝饒新句君將寄阿誰楊飛卿吾宗久零落之子亦中年紫邏堪髙卧𤣥經擬共傳前言非戲爾舊處想依然留著新詩筆教隨過海船文紀行贈之以馬洛水西頭路桃花夾岸香偏宜紅叱撥小試紫游韁雨徑沙初軟春山草正長杖藜猶過我此别莫相忘懷同祖卿東府倉皇别西河迤邐回元戎期坐嘯上客入行臺夢裏惠連句生前張翰杯龍池清似染應恨不歸來答張君美我無茅一把誰有橘千頭應物機仍拙憂時涕欲流謾違魚鳥信豈為稻粱謀老去輕三仕詩來抵四愁宿重陽宫村落到山盡軒窗臨水多野禽如舊識鄰叟漸相過林靜連官竹籬疏補女蘿夜深眠不著倚杖看星河應試萬寧宫月淡長楊曉色清天題飛下寂無聲南山霧豹文章在北海雲鵬羽翼成玊檻玲瓏紅靄重金爐縹眇翠烟輕誰言半夜曾前席白日君王問賈生稗史謂金章宗試貢士於萬寧宫楊紫陽年方弱冠席屋稍近殿檐金主出御幄顧之問其名氏里貫而去故有君王問賈生之句然考其本傳紫陽在金末實未有此遇也或即元太宗乎長安感懷此心直欲作東周再到長安已白頭往事無憑空擊楫故人何處獨登樓月搖銀海秦陵夜露濕金莖漢殿秋落日酒醒雙淚眼幾時清渭向西流呈公茂氷雪相看十五年照人風采只依然我今自分蓬蒿底君獨何心道路邊渭北幾時無夢寐終南何處有林泉不妨便作求田計伴取揚雄草太𤣥病中趙之讓見訪洛陽三月不得雨君家西來常苦隂酒杯雖好怕到手藥裹底事猶關心對牀幾日肯相就擁被中宵愁獨吟莫疑衰病便揮謝解吐新句酬知音寄商夢卿一望東原一惘然藝窗誰與伴髙眠秋風有意招張翰春草無由見惠連王母信音青鳥外溪翁心事白鷗邊殷勤為向侯芭道判却殘年老太𤣥讀汝南遺事二首軹道牽羊事已非更堪行酒著青衣裹頭婢子那知此爭逐君王烈焰歸六朝江氷故依然隔斷中原又百年長笑桓溫無逺略竟留王猛佐苻堅出郭作燕姬歌處囀鶯喉燕酒春來滑似油自有五陵年少在平明騎馬過盧溝過湯隂崇壽寺城荒古寺冷於氷絳帳誰燒照佛燈閒繞空階觀石刻偶聞音語得鄉僧憶君美銅柱從君泣墮鳶鴟夷心事五湖邊頭顱如此人間事不得青山對暮年管寧濯足圖踏遍遼東未是癡藜牀欲穴只心知好留一掬黃泥水墁却曹公受禪碑讀涑水通鑑風烟慘淡駐三巴漢燼將燃蜀婦髽欲起溫公問書法武侯入寇寇誰家耶律楚材字晉卿遼東丹王托雲八世孫父履以學行事金世宗特見親任終尚書右丞楚材生三歲而孤母楊氏教之學及長博極羣書旁通天文地理律歷術數之說下筆為文若宿搆章宗問以疑獄數事所對甚優遂辟為掾後仕為開州同知宣宗遷汴完顔復興留守燕辟為左右司員外郎元太祖定燕聞其名召見之日見親信嘗指楚材謂太宗曰此人天賜我家爾後軍國庶政當悉委之太宗即位首請肆赦且條便宜一十八事頒天下立燕京十路徵收課稅使國用充足拜中書令事無巨細皆先白之權貴屢譖不行克汴城奏活百姓百四十七萬人文治大興年五十五薨於位追封廣寧王諡文正九日黃華屬和西風殘日秋有客嗟幽獨偶爾得香醪凄然憶霜菊世態屢遷變人生多反復十年一夢中猶未黃粱熟酬非熊藹藹英聲鎮北州非熊人物本風流時逢佳客開青眼久領元戎尚黑頭已發豐城神劍出休嗟暗室夜光投驅兵經略關中了題遍長安舊酒樓柬趙庭玉子質萬里龍庭白草秋時時歸夢舊漁舟酌殘白酒難成醉老盡黃花無限愁久識人心多厭政喜逢天下已歸劉而今子入中州去莫惜寒梅寄隴頭元好問字裕之號遺山太原秀容人也父德明字東巖有聲場屋纍舉不第生二子長好古次好問皆以才名著而好問頴悟殊絶七歲能詩長從陵川郝天挺學六年大成下太行渡大河為箕山琴臺詩閒閒趙公見之謂少陵以來無此作也由是名震京師金興定五年舉進士金亡晦跡其詩益工學者宗之所作金史為一代鴻筆在陜時編中州集人少見者入明初始大行於世㶏亭春物已清美客懷自幽獨危亭一徘徊翛然若新沐宿雲淡野川元氣浮草木微茫盡楚尾平逺疑杜曲生平逺遊賦吟諷心自足朅來著世網抑抑就邊幅人生要適情無榮復何辱乾坤入望眼容我謝羈束一笑白鷗前春波動新緑龍潭層氷積浩蕩陵谷互吞吐窈窕轉幽壑突兀開淨宇回頭山水縣亦復墮塵土孤雲鐵梁北宇宙一仰俯風景初不殊川塗忽修阻寒潭海眼淨黯黑自終古蟄龍何年卧萬國待霖雨誰能裂蒼崖雷風視掀舉黃公廟羇客無恆居六月走長路清風黃公祠地古欣所遇劍飛素靈哭龍躍雲雨赴堂堂文成君談笑取帝傅功名要有命隂相知何預誰謂圯上人異事驚竹素河清不可俟筋力疲世故袖間一編書塵埃歎遲暮别李周卿行路澀于棘單車望千山歌君歸雲曲清涕留餘澘六年河朔州動輒得謗訕惟君篤髙義日來款柴關古交松柏心今交桃李顔古人去不返古道挽不還相思一樽酒幽恨寄山間九日讀書山中二首行帳適南下居人局庭户城中望青山一水不易渡今朝川涂靜偶得展衰步蕩如脫囚拘廣漠開四顧半生無根著筋力疲世故大似丁令威歸來歎墟墓鄉閭喪亂久觸目異平素枌榆雖尚有歲晏多霜露今日復何日霜氣倐已凄登髙有佳招山中古招提翩翩劉公子玊田重相攜乾坤動詩興澗壑忘攀躋霍侯家甚貧劣有酒與雞城居厭鼙鼓移家此幽棲世網不易逃所向皆塵泥何以濯我纓林間有清溪少林雲林入清深禪房坐蕭爽澄泉潔餘習髙鳥喚長往我無𤣥豹姿漫有紫霞想回首山中雲靈芝日應長緱山置酒靈宫肅清曉細柏含古春人言王子喬鶴馭此上賔白雲山蒼蒼平田木欣欣登髙覽元化浩蕩融心神西望洛陽城大路通平津行人細如蟻擾擾爭紅塵蓬萊風濤深鬢毛日夜新殷勤一杯酒愧爾雲間人種松百錢買松羔植之我東墻汲井浣塵土插籬護牛羊一日三摩挲愛此添丁郎昨宵入我夢忽爾變昻藏昻藏上雲雨慘淡含風霜起來月中看細鬛錯針芒惘然一太息何年起明堂鄰叟向我言種木本易長不見河畔栁顧盻百尺强君自作逺計今日何所望飲酒三首西郊一畝宅閉門秋草深牀頭有新釀意愜成孤斟舉杯謝明月蓬蓽肯相臨願將萬古色照我萬古心去古日已逺百僞無一真獨餘醉鄉地中有羲皇醇聖教難為功乃見酒力神誰能釀滄海盡醉區中民此飲又復醉此醉更酣適徘徊雲間月相對淡以默三更風露下巾袖警微濕浩歌天壤間今夕知何夕雜詩三首相士如相馬滅沒深天機區區銅馬法徒識牝與驪人言當塗公惡人知其微如何許劭語受之不復疑知人固不易人亦未易知妍媸在水鏡鉛粉徒自欺崑山有璞玉外質而內美唯其不自衒故與頑石齒和也速於售再獻甘滅趾在玉庸何傷惜君兩足耳堂堂明堂柱根節幾歲寒使與蒲栁同扶厦良亦難我衣敝緼袍我飯苜蓿盤天公方試我劍鋏勿妄彈放言韓非死孤憤虞卿著窮愁長沙一湘纍郊島兩詩囚人生定能幾肺肝日相讐井蛙奚足論褌虱良足羞正有一朝樂不償百年憂古來帝王師或從赤松遊大笑人間世起減真浮漚曾是萬户封不博一掉頭有來且當避未至吾何求學東坡移居五首廢地三畝餘十年長蒿萊瓦礫雖糞壤白骨深蒼苔孤客無所投即此營茅齊墾斸豈不苦寢處亦可懷辱身賤者事寧當惜筋骸伐木荒林中運甓古城隈辛勤八十日吾事乃得諧買宅必萬錢一錢不天來今晨見此屋一笑心顔開壬辰困重圍金粟論升勺明年出青城瞑目就束縛毫釐脫鬼手攘臂留空槖聊城千里外狼狽何所託諸公頗相念餘粒分鳬鶴得損不相償壞土填巨壑一冬不掣衣繒纊如紙薄一日僅兩食强半雜藜藿不羞蓬蔂行粗識瓢飲樂敵貧如敵冦自信頗亦慤兒啼飯籮空堅陳為屢却滄溟浮一葉渺不見止泊五窮果何神為戲乃爾虐舊隱嵩山陽筍蕨豐餽餉新齊浙江曲山水窮放浪乾坤兩茅含氣壓華屋上一從陵谷變歸顧無復望樵漁憶還往風土夢閒曠恍如悟前身姓改心不忘去年住佛屋盡室寄尋丈今年僦民居卧榻礙盆盎靜言尋禍本正坐一出妄青山不能隱俯首入羈鞅巢傾卵隨覆身在顔亦强空悲龍髯絶永負魚腹葬置錐良有餘終身志懲創國史經喪亂天幸有所歸但恨後十年時事無人知興廢屬之天事豈盡乖違傳聞入讐敵祇以興罵譏老臣與存亡髙賢死兵饑身死名亦滅義士為傷悲哀哀淮西城萬夫甘伏尸田橫巨擘耳猶為談者資我作南冠録一語不敢私稗官雜家流國風賤婦詩成書有作者起本良在兹濕薪烟滿眼破硯氷生髭造物留此筆吾貧復何辭此州多寓士論年悉肩隨風波同一舟奚必骨肉為倪家蓮花白每釀必見貽季昌妙琴事足以相娛嬉郭侯家多書篇帙得遍窺趙子篤於學間以問所疑王生舊鄰舍窮達心不移千里訪存殁十口分寒饑獨有仲通甫天馬不可羈直以論詩文稍稍窺藩籬永懷王與李朔漠行當歸我作野史亭日與諸君期相從一笑樂來事無庸知書來聞吉語報我脫縶維慚非一狐腋不值五羖皮野史亭夜雨感興私録關赴告求野或有取秋兔一寸毫盡力不易舉衰遲私自惜憂思當誰語展轉天未明幽窗響疏雨過晉陽故城書事惠逺祠前晉溪水翠葉銀花清見底水上西山如卧屏鬱鬱蒼蒼三百里中原北門形勢雄想見城闕雲烟中望川亭上閲今古但有麥浪搖春風君不見繫舟山頭龍角秃白塔一摧城覆沒薛王出降民不降屋瓦亂飛如箭鏃汾流决入大夏門府治移著唐明村只從巨屏失光彩河洛幾度風烟昏東闕蒼龍西玊虎金雀觚稜上雲雨不論民居與官府仙佛所廬餘百所鬼役天才千萬古爭教一炬成焦土至今父老哭向天死恨河南往來苦南人鬼巫好禨祥禺夫畚鍤開連岡官衙十字改丁字釘破并州渠亦亡幾時却到承平了重看官家築晉陽九月七日夢中作詩續以末後一句桃花紅深李花白昨日成團今日折歌聲滿耳何處來楊栁青旗洛陽陌拊君背握君手朝鐘暮鼓無了期世事于人竟何有青青鏡中髮忽忽成白首六國印何如負郭一頃田千載名不及即時一杯酒過劉子中新居鄆州城隅兩茅屋市聲喧喧自幽獨春風吹盡山杏花只有青青一叢竹先生愛畫如惜玉練鵲翔鸞餘百軸大兒踉蹡挾書歸土銼疏烟才一粥微官枉負半生閒也著區區簿領間何時却與溪南老紫蓋山前共往還高門關高門關頭霜樹老細路千山萬山繞亂餘村落不見人霰雪霏霏暗清曉莘川百里如掌平閒田滿眼人得耕山中樹藝亦不惡誰遣多田知姓名許李申楊竟何得只今惟有石灘聲歸舟怨渡頭楊栁青復青閨中少婦動離情只從問得狂夫處夜夜夢到洛陽城城南吹櫓聲北雁鳴嚶嚶江流望不極相思春草生天門引秦王深居不得近從破衡成欲誰信白頭遊客困咸陽憔悴黃金百斤盡海中仙人黃鵠舉大笑人間爭腐鼠丈夫何意作蘇秦六印才堪警兒女古來多為虛名老不見阿房淨如掃千年虎豹守天門一日牛羊卧秋草蛟龍引古劍咸陽墓中得抉開青雲見白日蛟龍地底氣如虹土花千年不敢蝕洪爐烈焰初騰精橫海已覺無長鯨世上元無倚天手匣中誰解不平鳴割城恨不逢相如佐酒恨不逢朱虛尚方未入朱雲請盟槃合與毛生俱誰念田文坐中客只將彈鋏歎無魚荆棘中杏花牆東荒蹊抱村斜荆棘狼藉盤根芽何年丹杏此留種小紅濈濈爭春華野人慣見漫不省獨有詩客來咨嗟天真不到鉛粉筆富艷自是宫闈花曲池芳徑非宿昔蒼苔濁酒同天涯京師惜花如惜玉曉擔賣徹東西家杏花看紅不看白十日忙殺遊春車誰家園亭有此樹鄭重已著重幃遮阿嬌新寵貯金屋明妃逺嫁愁悲笳落花縈簾拂牀席亦有飄泊沾泥沙天公無心物自物得意未用相陵誇黃昏人歸花不語唯有落月啼栖鴉湘夫人咏木蘭芙蓉滿芳洲白雲飛來北渚遊千秋萬歲帝鄉逺雲來雲去空悠悠秋風秋月沅江渡波上寒烟引輕素九疑山髙猿夜啼竹枝無聲墮殘露後平湖曲越女顔如花吳兒潔於玊天教並牆居不著同被宿美人一笑千黃金連城不博百年心樓上牆頭無一物暮爨朝舂一生足秋風拂羅裳秋水照紅妝舉頭見郎至低頭采蓮房郎心只如菱刺短妾意未覺藕絲長與郎期何許眼礙同舟女春波淡淡無盡情雙星盈盈不得語十里平湖艇子遲岸花汀草伴人歸鴛鴦驚起東西去唯有蜻蜓接翅飛隋故宫行渭川楊栁先得春二月鶯啼百囀新長春宫中千樹錦暖日晴雲思煞人君王半醉唱吳歌絳仙起舞嚬翠娥吳兒謾說曾行樂三十六宫能幾多千秋萬古金銀闕海沒三山一毫髮繁華夢覺人不知留得寒蛩泣秋月寄答溪南詩老辛願敬之五年不喚溪南渡日夕心馳洛西路山中今日見君詩惆悵良辰又相誤龍蛇大澤變風景虎豹天門鬱烟霧丈夫不合把鉏犁青鬢無情忽衰素平泉漫作窮愁志笠澤休題自憐賦長安正有五侯鯖骯髒誰能作樓護青燈老屋深蓬蒿蝙蝠掠面莎雞號劍歌夜半激悲壯松風萬壑翻雲濤區區墓上曹征西我知慚愧王東皋人生只有一杯酒螟蛉蜾螺安能豪密公寶章小集天東長白太寶幢天河發源導三江有木蔽映山朝陽云誰巢者雛鳳凰雲間吐氣日五色百鳥不敢言文章名都盤盤魏大梁黃金甲第羅康莊王家書絶畫亦絶欲與中祕論低昻密公書院無絲簧窗明几潔凝幽香元光以後門鑰費文士稍得連壺觴客來喜色浮清揚典衣置酒餘空箱生平俊氣不易降眼中俗物都茫茫淵明素琴嵇阮酒妙意所寄誰能量在昔武元握乾綱扶桑為弓射八荒獵取大國如驅羊民風朴魯資質彊文洽未及武剋剛興陵之孫越王子天以人瑞歸明昌十三執經侍帝傍十八健筆凌阿房撐腸文字五千卷靈臺架搆能鋪張髙陽苗裔襲衆芳胡不置之貢玉堂袖中正有活國手地下才得修文郎悲風蕭蕭吹白楊丘山零落可憐傷承平故態耿猶在拂試寶墨生輝光恰似如庵連榻坐一甌春露淡相忘密公子瑜完顔宗室中第一流人也平生所寶惟書畫家藏幾與中祕等南渡倉卒公抱持愛護與身存亡於他物一無所攜故竟坐窮以薨君子傷之覓神霄道士古銅爵雷章著土紛朱碧秋菌春蒲人不識若非儀狄墓中來應自杜康祠下得古人偶得酒之傳摸索飲器流饞涎巧偷豪奪吾何敢他日酬君九府錢贈休糧張鍊師金砂霧散風雨疾一㸃黃金鑄秋橘中林宴坐人不知野鹿銜花蜂課蜜富兒盤饌羅羶葷擾擾飛蠅復聚蚊見說西山好薇蕨一枝青竹願隨君題商孟卿家明皇合曲圖海棠一株春一國燕燕鶯鶯作寒食千古萬古開元日三郎搦管仰面吹天公大笑嗔不得寧王天人玉不如番綽樂句不可無宫腰不按羽衣譜疾舞底用牧豬奴風聳水聲閟清都夢中令人羡華胥何時却並宫牆聽不恨將身作李謨蟾池老蟇食月飽復吐天公一目頻年瞽下界新增養蟾户玉斧誰憐修月苦郡國蟾池知幾所碧玉清流水仙府小蟾徐行腹如鼓大蟾張頤怒于虎渠家眉間有黃乳膏粱大丁正須汝何人說與月復讎疾過池頭不容語向來屬私今屬官從今見蟇當好看爬沙即上青雲端劉逺筆老㕙力能舉玉杵文陳挽彊猶百鈞惜哉變化太狡獪嚮也褐衣今虎文宣城諸葛寂無聞前後兩劉新冊勳謝郎神鋒恨太雋雖然豈不超人羣三錢雞毛吐皇墳尖奴定能張吾軍何時酌我百壺酒為汝醉草垂天雲祖唐臣愚庵小智胠篋盜所羞大智移國鬼與讎浮生匹絹兩盂粥心計擾擾知何求青州荆州兔三窟古人今人貉一丘喚起羅池栁夫子與君同醉訾家洲常山妷生四十月能搦管作字筆意開廊有成人之量喜為賦詩使洛誦之大兒小兒舞商羊東家西家捉迷藏牙牙作羣雁雁行是中乃有常山郎常山嬌嬌可憐蟲四歲未有三歲彊黑鷹破殼自神駿黃犢放腳須跳梁只知見紙即塗抹誰謂轉腕能低昻渠家兩公破天荒劉輝夢靈果專場榮鄉亭中詩版在岐山名字香山香此郎晚出西樞房虎穴虎子不可當天驚地怪見落筆便合抱送中書堂文星煌煌照燕南青青子襟滿恆陽教官連被鳳尾諾瑞物多生金粟岡兒曹變化不作難何必二十始乖張明年作字一丈大當有稜角垂光芒金世宗御書田不伐望月婆羅門引分得楚字韻瑤光樓前按歌舞桂樹秋香月三五白頭誰解記開元四海歡聲沸簫鼓兩都秋色皆喬木三月阿房已焦土天上亦有别離情可是田郎心獨苦承平舊物霓裳譜寶氣暉暉映千古銀橋望極竟不歸滅沒燕鴻下平楚贈别孫德謙津橋垂楊雪花白挽斷春衫苦留客西湖一雨春意濃絶似銅駝洛陽陌湖亭轟醉卧春風到手金杯不放空鵲山一帶傷心碧羡殺孫郎馬首東紀子正杏園燕子紀翁種杏城西垠千株萬株紅艷新今年寒食好天色曉氣鬱鬱含芳津天公自愛此花好朝熏暮染煩花神融霞暈雪一傾倒非烟非霧非卿雲未開何所似乳兒粉妝深綘唇能啼能笑癡復騃畫出百子元非真半開何所似里中處女東家鄰陽和入骨春思動欲語不語時輕顰就中爛縵尤更好五家合隊虢與秦曲江江頭看車馬十里羅綺爭紅塵陽平一邑多詩豪主人買酒邀衆賓花時有成約恨少楊子張吾軍落花著衣紅繽紛四坐慘淡傷精魂花開花落十日耳對花不飲花應嗔愛花常苦得花晚爭教行樂無閒身芳苞一破不更合且看錦樹烘殘春泛舟大明湖長白山前繡江水展放荷花三十里看山水底山更佳一堆蒼烟收不起山從陽丘西來青一灣天公擲下半玉環大明湖上一杯酒昨日繡江眉睫間晚凉一櫂東城渡水暗荷深若無路江妃不惜水芝香狼藉秋風與秋露蘭襟鬱鬱散芳澤羅襪盈盈見微步晚晴一賦畫不成枉著風標誇白鷺我時驂鸞追散仙但見金支翠蕤相後先眼花耳熱不稱意髙唱吳歌叩兩舷喚取樊川搖醉筆風流聊與付他年賦邢州鵲山去時唐山道望望鵲山背今朝西北看竒秀益可愛蒼茫失層疊解駁見縈帶浮雲自來去盡巧寧變壞吳妝入小筆隱隱拂殘黛城隅靜女人不知擁髮低顰如有待太行橫截九州半一掩一重俱有態只知天平六峰天下稀此山東來亦閒在烟埋雨沒今幾時殆天所藏豫發之郭熙未足語平逺摹寫惟有韋郎詩癸卯歲杏花南州景氣暖杏花見紅梅讀書山前二月尾向陽杏花全未開待開竟不開怕寒貪睡嗔人催愛花被花惱不徹一日繞樹空千回牙牙嬌語山櫻破稠閙成團稀作顆小蕾從教絳蠟封繁枝未要晴雲裹兩月不舉酒半歲不作詩更教古銅瓶子無一枝緑隂青子長相思今年閏年好寒節花開不妨遲一月宋元詩會卷六十六
