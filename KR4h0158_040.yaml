body:
  text: 宋元詩會卷四十兵部主事陳焯編朱熹字元晦一字仲晦司勲吏部郎松之子初學語時父指天示之曰天也熹即問天之上何物松異之就外傅授以孝經讀畢題其上曰不若是非人也從羣兒戲沙上獨端坐用指畫沙視之八卦也年十八貢於鄉紹興戊辰登進士第主泉州同安簿請祠監潭州南嶽廟明年用薦與徐度吕廣問韓元吉同召以疾辭孝宗即位應詔上封事與時相不合除武學博士進密院編修待次乾道五年丁内艱胡銓用詩人薦以未終喪辭七年九年兩召不起上曰熹安貧守道可嘉也淳熙五年除知南康軍奏復白鹿洞書院明年應詔上疏激切忤㫖請祠不報除提舉江西常平公事入對極言時弊上為動容及之任所部肅然上謂王淮曰朱熹政事却可觀也以摘發失權貴意罷歸十四年周必大相起提㸃江西刑獄入奏上日久不見卿今當處以清要翌日除兵部郎官引足疾丐祠為侍郎林栗所紏仍舊職提刑江西再召因投匭進封事上已就寢乃起秉燭讀之明日除主管太乙宫兼崇政殿説書力辭奉祠光宗即位除知漳州自劾罷寧宗立趙汝愚首薦熹及陳傅良擢煥章閣待制侍講力辭不允每編次所講成帙以進上亦開懷容納會韓侂胄用事熹約吏侍彭龜年共論之而熹不得立於朝矣沈繼祖余嚞先後誣以大罪至乞斬熹於是攻偽學日急乃熹日與諸生講學曽不少休慶元五年請致仕明年卒年七十一諡曰文理宗朝贈太師追封信國公改徽國淳祐元年從祀孔子廟廷遠遊篇舉坐且停酒聽我歌遠遊遠遊何所至咫尺視九州九州何茫茫環海以為畺上有孤鳳翔下有神駒驤孰能不憚遠為我遊其方為子奉尊酒擊鋏歌慨慷送子臨大路寒日為無光悲風來遠壑執手空徊徨問子何所之行矣戒闗梁世路百艱難出門始憂傷東征憂暘谷西遊畏羊腸南轅犯癘毒北駕風裂裳願子馳堅車躐險摧其剛峩峩既不支瑣瑣誰能當朝登南極道暮宿臨太行睥睨即萬里超忽凌八荒無為蹩躄者終日守空堂擬古六首離離原上樹戢戢澗中蒲娟娟東家子鬱鬱方幽居濯濯明月姿靡靡朝華敷昔為春蘭芳今為秋蘼蕪寸心未銷歇託體思同車綺閣百餘尺朝霞冠其端飛櫩麗遠漢曲楹何盤桓清謠發徽音一唱再三歎借問誰為此佳人本邯鄲微響激流風浮雲慘將寒為言何所悲遊子在河闗不恨久離濶但憂芳嵗闌願為清宵夢燕昵窮餘歡上山採薇蕨側徑多幽蘭采之不盈握欲寄道里艱沈憂念故人長夜何漫漫芳馨坐銷歇徘徊以悲歎佳月朗秋夜蟋蟀鳴空堂大火西北流河漢未渠央野草不復滋白露結為霜梁燕起高飛雲雁亦南翔念我同心子音形阻一方不念執手歡隔我如參商寓龍不為澤畫餅難充腸金石徒自堅虚名真可傷高樓一何高俯瞰窮山河秋風一夕至惟悴已復多寒暑逓推遷嵗月如頽波離騷感遲暮惜誓閔蹉跎放意極驩虞咄此可奈何邯鄲多名姬素艷凌朝華妖歌掩齊右緩舞傾陽阿徘徊起梁塵繂縩紛衣羅麗服乘竒芬顧我長咨嗟願生喬木隂夤緣若絲羅夫君滄海至贈我一篋珠誰言君行近南北萬里餘結作同心花綴在紅羅襦雙垂合歡帶麗服眷微軀為君一起舞君情定何如友人黄子衡欲之上庠以詩留行若士有竒操久壓山林卑奮衣千里道已與親友辭子行何悠悠世路方如茲歸來亦何日車馬光陸離幽蘭生前林擢置白玊墀不以芳意遠結根終不移願子崇明德潛躍貴因時悲風靜夜聽喬木嵗寒姿何以迴軒駕千載相與期古意絲附樸樕桂樹生高岡弱蔓失所依佳木徒蒼蒼兩美不同根高下永相望相望無窮期相思諒徒為同車在夢想忽覺淚沾衣不恨嵗月遒但惜芳華姿嚴霜委百草坐恐及茲時盛年無再至已矣不復疑春日言懷春至草木變郊園猶掩扉兹晨與心會覽物徧芳非桃萼破淺紅時禽恱朝暉泉谷暖方融原田水初肥東作興庶甿嵗功始在兹端居適自慰世事復有期終然心所向農畝當還歸酬祕閣張丈簡寂之篇勞農會稽宅息駕丹元鄉丹元不可見翠壁空雲房是時中春月暄風發新陽白水注幽壑緑樹敷崇岡俯聽足怡悅仰觀共徜徉班坐得瑶草傾壺得瓊漿長吟遊仙詩亂以招隱章忽忽林景西躊躇申慨慷坐上江湖客兀傲鬚睂蒼逸氣邁霄漢英詞吐琳琅思與泉石勝韻隨笙鶴翔追遊不敢及咏歎可能忘秋懐懐疴坐竟日晩色散幽樹寂厯候蟲悲沆瀁碧草露端居興方淡沈黙自成趣羽觴歡獨持瑤琴誰與晤空知𤣥思清未惜年華度美人殊不來嵗月空遲暮賦歸雲洞人生信多患吾道初不窮云何感慨士伏死嵁巗中宜陽古道周竅石何嵌空窮幽厯肺腑履坦開房櫳頗疑有畸人往昔寄此宫歲月詎云㡬井竈無遺蹤我來記清秋歸途渺窮冬興懷重幽討永嘯回長風風回雲氣歸洞口春濛濛信美非人境出門吾欲東宿黄沙以上如翠浪湧分韻得如字日中秣吾馬日暮膏吾車﨑嶇陟南嶺浩蕩凌八區夜雨薦峰前朝登碧琳墟蒼茫永歗罷翕忽清景徂去此二三子我行將何如崔嵬正丘垤萬里思南圖釋奠齋居理事未逾月簿書終日親簡編不及顧几閣積埃塵今辰屬齋居煩跼一舒伸瞻聎庭宇肅仰首但秋旻茂樹禽囀幽忽如西澗濱聊參物外趣豈與俗子羣寄題金元貞長泰面山亭抗心塵境外結宇臨秋山乘高一騁望表裏窮遐觀衆崿互攢列連岡莾縈環陽崖煙景舒隂壑悲風寒碧草晩未凋林薄已復丹仙人羨門子歲晩當來還還家即事獻歳事行役徂春始言歸昔往草未芳今來翠成幃扶疎滿園隂時禽互翻飛叢萱亦已秀丹葩耀晨輝即事誰與娛淹留自忘機日暮復出門悵然心事違古人不可見獨掩荒園扉和林懌之黄雲之句兼簡同遊諸兄登覽日云晏歸車𦕈重岡天風振余旟夕露沾我裳數子情未厭春山杳茫茫還瞻長江白迥眺飛雲黄當念塵中友心期邈相望無為跨鴻鵠决起凌青蒼宿石岊館春江日東注我行遡其波揚帆指西澨兩岸青山多青山自逶迤飛石空嵯峨緑樹生其間幽鳥鳴相和搴篷騁遐眺擊楫成幽歌獨語無人晤兹懐竟如何過武夷作㺯舟縁碧澗棲集靈峰阿夏木紛已成流泉注驚波雲闗啟茫茫高城鬱嵯峨眷言羽衣子俛仰日婆娑不學飛仙術纍纍丘塜多齋居聞磬幽林滴露稀華月流空爽獨士守寒棲高齋絶羣想此時隣磬發聲合前山響起對玊書文誰知道機長川上見月歸示同行者川上偶攜手皓月起林端一舒臨流望𤣥露已先漙歸掩荒園扉更怯衣裳單清夜誰晤言獨處難為歡同安官舎夜作官署夜方寂幽林生月初閒居秋意遠花香寒露濡故國異時節欲歸懷簡書聊從西軒卧塵思一蕭疎秋蘭已悴以其根歸學古秋至百草晦寂莫寒露滋蘭皋一以悴蕪穢不能治端居念離索無物遺所思願言託孤根嵗晏以為期雪亭危亭竹栢間峭蒨日幽絶朔風一以厲愛此枝上雪仰悲𤣥景駛俯歎羣芳歇不用此時來那知嵗寒節客舎聽雨沈沈蒼山郭暮景寒餘清春靄起林際滿空寒雨生投裝即虚館簷響通夕鳴遙想山齋夜蕭蕭木葉聲月夜述懷皓月出林表照此秋牀單幽人起晤歎桂香發窗間高梧滴露鳴散髪天風寒抗志絶塵氛何不棲空山齋居感興七首涇舟膠楚澤周綱已陵夷况復王風降故宫黍離離至聖作春秋哀傷實在兹祥麟一以踣反袂空漣洏漂淪又百年僭侯荷爵珪王章久已喪何復嗟歎為馬公述孔業託始有餘悲拳拳信忠厚無乃迷先㡬東京失其御刑臣㺯大綱西園植姦穢五族沈忠良青青千里草乘時起陸梁當塗轉凶悖炎精遂無光桓桓左將軍仗鉞西南疆伏龍一奮躍鳳雛亦飛翔祀漢配彼天出師驚四方天意竟莫回王圖不偏昌晉史自帝魏後賢盍更張世無魯連子千載徒悲傷晉陽啟唐祚王明紹巢封垂統已如此繼體宜昏風麀聚瀆天倫牝晨司禍凶乾綱一以墜天樞遂崇崇滛毒穢宸極虐焰燔蒼穹向非狄張徒誰辦取日功云何歐陽子秉筆迷至公唐經亂周紀凡例孰此容侃侃范太史受說伊川翁春秋二三策萬古開羣䝉放勛始欽明南面亦恭已大哉精一傳萬世立人紀猗歟歎日躋穆穆歌敬止戒獒光武烈待旦起周禮恭惟千載心秋月照寒水魯叟何常師删述存聖軌飄颻學仙侣遺世在雲山盗啟元命祕竊當生死闗金鼎蟠龍虎三年養神丹刀圭一入口白日生羽翰我欲往從之脫屣諒非難但恐逆大道偷生詎能安西方論緣業卑卑喻羣愚流傳世代久梯接凌空虚顧盼指心性名言超有無㨗徑一以開靡然世爭趨號空不踐實躓彼榛棘途誰哉繼三聖為我焚其書卜居卜居屏山下俯仰三十秋終然村墟迥未愜心期幽近聞西山西深谷開平疇茆茨十數家清川可行舟風俗頗淳樸曠土非難求誓捐三徑資往遂一壑謀伐木南山顚結廬北山頭耕田東溪岸濯足西水流朋來即共懽客去成孤遊靜有山水樂而無身世憂著書俟來哲補過希前修兹焉畢暮景何必營莬裘白鹿洞書院在郡城東北十五里事見記文昔人讀書地町疃白鹿場世道有升降兹焉更表章矧今中興年治具一以張絃歌獨不嗣山水無輝光荒榛適剪除聖謨已汪洋亦有皇華使肻來登此堂問俗良懇惻懷賢增慨慷雅歌有餘韻絶學何能忘開先潄玊亭在萬杉西二里亭舊在橋上今廢竒哉康山陽雙劍屹對起上有横飛雲下有瀑布水崩騰復璀璨佳麗更雄偉勢從三梁外影落明湖裏平生兩仙句詠嘆深仰止三年落星灣悵望眼空眯今朝隨杖屨得此㺯清泚更誦玊虹篇塵襟諒昭洗簡寂觀在開先西五里陸修靜所居高士昔遺世築室蒼崖隂朝真石壇峻煉藥古井深結交五栁翁屢賞無絃琴相攜白蓮渚一笑傾夙心晩歲更市朝故山鎖雲岑柴車竟不返鸞鶴空遺音修靜晩為宋明帝召至建康卒于崇虚館我來千載餘舊事不可尋四顧但絶壁苦竹寒蕭摻相傳竹是修靜手植其萌即所謂甜苦筍者歸宗寺在簡寂西十里金輪紫霄上寶界鸞溪邊往昔王内史願香有餘煙相傳寺是王右軍故宅千年今一歸景物還依然澗水既蕩潏山花亦清妍不辭原隰勞樂此賓從賢訪古共紆鬱勞農獨勤拳憐我乖勝踐裂牋寄真詮逃禪公勿遽且畢區中緣康王谷水簾谷口景徳觀在温湯西十五里入谷又十五里至簾下循山西北騖﨑嶇幾經丘前行荒蹊斷豁見清溪流一涉臺殿古再涉川原幽縈紆復屢渡乃得寒巖陬飛泉天上來一落散不収披崖日璀璨噴壑風颼飀追薪爨絶品瀹茗澆窮愁敬酹古陸子何年復來遊以上五首俱同尤延之提舉作遊天池三年落星渚北望天池山臨風幾浩歎欲往無飛翰今朝復何朝陟此青雲端高尋已竒絶俯瞰何其寛西窮濂溪源東盡湓城闗渺然滄波外淮山碧連環我意殊未極更思出塵寰何當駕輕鴻八表須臾間視此長江水滔滔儻西還題霜傑集先生人物魏晉間題詩便欲傾天慳向來無地識眉宇今日天遣窺波瀾平生尚友陶彭澤未肯輕為折腰客胸中合處不作難霜下風姿自竒特小儒閥閱金匱書不滯周南滯海隅枌榆連隂一見晩何當挽袖凌空虚秋夜歎秋風淅瀝鳴清商秋草未死啼寒螿幽人夜半起晤歎仰視河漢天中央河漢西流去不息人生辛苦何終極蒼山萬疊雲氣深去錬形魂生羽翼壽母生朝秋風蕭爽天氣凉此日何日升斯堂堂中老人夀而康紅顔緑鬢雙瞳方家貧兒癡但深藏五年不出門庭荒竈陘十日九不煬豈辦甘脆陳壺觴低頭包羞汗如漿老人此心久已忘一笑謂汝庸何傷人間榮耀豈可常惟有道義思無疆勉礪汝節彌堅剛熹前再拜謝阿娘自古作善天降祥但願年年似今日老萊母子俱徜徉小集梵天寺坐間雨作已復開霽步至東橋玩月傑閣翔林杪披襟此日閒層雲生薄晩凉雨徧空山地迥衣裳冷天高澄霽還出門迷所適月色滿林闗梵天觀雨持身乏古節寸禄久棲遲蹔寄靈山寺空吟招隱詩讀書清磬外看雨暮鐘時漸喜凉秋近滄洲去有期十五日再登祝融用臺字韻江流圍玊界天影抱瓊臺拄杖煙霄外中巖日月回箕山藏遁許呉市隱仙梅一笑今何在相期再舉杯安仁曉行夙駕安仁道行行得自娛荒山圍野濶逺樹出林孤景晦長煙合天寒碧草枯歸心懷往路極目尚平蕪宿休菴用徳功壁間韻贈陳道人暮入千峰裏寒棲一草菴室連丹竈煖厨引石泉甘塵慮紛難到神光耿内含非君有道氣孤絶詎能堪晩望禾黍彌平野凄凉故國秋清霜凝碧樹落日翳層丘覽物知時變為農覺歳遒不堪從吏役憔悴欲歸休安溪書事清溪流不極夕霧起嵐隂虚邑帶寒水悲風號遠林涵山日欲晦窺閣景方沈極目無遺眺空令愁寸心梅花開盡不及吟賞感歎成詩憶昔身無事尋梅只怕遲沈吟窺老樹取次折横枝絶艷驚衰鬢餘芳入小詩今年何草草政爾負幽期即事有懷寄彦輔仲宗二兄一水方涵碧千林已變紅農収爭暖日老病怯高風徙倚非無計心期莫與同向來歡會處離合太悤悤酬知府府判二丈志士懷韜略竒兵吼鏌干闗河那得往肝膽不勝寒壯節悲如許雄圖渺未䦨皇輿方仄席陋巷敢求安登定王臺寂寞番君後光華帝子來千年餘故國萬事只空臺日月東西見湖山表裏開從知爽鳩樂莫作雍門哀和題吕少衛教授藏書閣西樓誰與共閒居茂樹婆娑清晝餘大隱祗今同一壑行吟非昔似三閭揣摩心事惟黄卷料理家傳亦素書更鑿寒泉供潄石世紛寧擬問焉如數日前與判院丈有宋村之約雪中有懷奉呈雲垂天濶歲將闌一室翛然獨掩闗擁褐不知風折木開軒惟見雪漫山𤣥空杳靄低迷外碧樹璁瓏掩映閒吟罷左思招隱句扁舟無路過長灣舫齋扁舟容與小房櫳揺颺簾旌蜀錦紅兩岸蒹葭秋色裏一川煙浪夕陽中漫愁灧澦雙蓬鬢未怯江湖萬里風築室水中聊爾爾何須極浦望朱宫秋香徑此首與晩蔬園共六詩皆和劉秀野雜詠門外黄塵沒九逵坊中叢桂長樛枝三秋冷蕊從開落終歲清隂不改移幽徑祗愁空翠滴濃香一任晩風吹攀援却恨王孫遠惆悵千林欲暮時雪後惆悵江村幾樹梅杖藜行遶去還來前時雪壓無尋處昨夜月明依舊開折寄遙憐人似玊相思應恨劫成灰沈吟日落寒鴉起却望柴荆獨自回和張彦甫看雪棲賢夜來春雪徧林丘却喜風威曉便収好上籃輿閒縱目休將衲被苦䝉頭微官正愧逍遙社勝日猶堪汗漫遊欲出林闗戀瑶草不妨樽酒更淹留晩蔬園未覺閒來歲月頻荷鉏方喜土膏匀連畦已放瑶簪露覆地行看玊本新小摘登盤先餉客晩炊當肉更宜人却憐寂寞公儀子拔盡園蔬不歎貧次秀野韻史君簾閣對脩筠起看名園雨後春便賦新詩留野客更傾芳酒酹花神未酬管樂平生志且作羲皇以上人祗恐功名相迫逐不容老子卧漳濱次韻詠雪二首一夜同雲匝四山曉來千里共漫漫不應琪樹猶含凍翻笑楊花許耐寒乘興正須披鶴氅瀹甘猶喜破龍團無端酒思催吟筆却恐長鯨吸海乾開門驚怪雪交加亂落横飛詎有涯密竹不妨呈勁節早梅何處覔殘花山隂客子須乘興洛下先生想卧家病廢杯觴寒至骨哦詩無復更豪誇奉和某侍郎使君唱酬西湖作越王城下水融融此樂從今與衆同滿眼芰荷方永日轉頭禾黍便西風湖光盡處天容濶潮信來時海氣通酬唱不誇風物好一心憂國願年豐䝉恩許遂休致陳昭遠文以詩見賀已和答之復賦一首闌干苜蓿久空槃未覺清羸帶眼寛老去光華姦黨籍向來羞辱侍臣冠極知此道無終否且喜閒身得暫安漢祚中天那可料明年大歲又涒灘寄雲谷瑞泉菴主憶昔誅茆日山房我自名風埃猶俗累煙雨負巖耕多謝空門侣能同物外情肯來分半壑聊爾度平生少待清秋日閒尋逺嶽盟不知誰是客一笑絶塵纓采菱舟湖平湖水碧桂櫂木蘭舟一曲菱歌晩驚飛欲下鷗祝孝友作枕屏小景以霜餘茂樹名之山寒夕飈急木落洞庭波㡬疊雲屏好一生秋夢多示西林可師身世年來欲兩忘一春隨意住僧房行逢舊隱低回久綠樹鶯啼清晝長入瑞巖道間得四絶句呈彦集克父二兄清溪流過碧山頭空水澄鮮一色秋隔斷紅塵三十里白雲黄葉兩悠悠山茶江南池館壓深紅零落荒煙細雨中却是北人知愛惜數枝和雪上屏風秋日一雨生凉杜若洲月波㣲漾緑溪流茆簷歸去無塵土淡薄閒花遶舎秋梅姑射仙人氷雪容塵心已共彩雲空年年一笑相逢處長在愁煙苦霧中吕祖謙字伯恭尚書右丞好問之孫也自其祖始居婺州祖謙學本家庭有中原文獻之傳長交張栻朱熹講索益精初䕃補入官後舉進士復中博學宏詞科除太學博士厯國史院編修實錄院檢討輪對勉孝宗留意聖學且言恢拓大事久之遷著作郎以末疾請祠歸先是書肆有書曰聖宋文海學士周必大請委館職擇取以成一代之書孝宗因命祖謙斷自南渡以前類為百五十卷賜名文鑑進秩直祕閣明年除著作郎兼國史院編修卒年四十五諡曰成送宋子華通判長沙騷人故悲秋九辨播三楚宋公舊題壁文彩照潭府千載得君侯遥遥接華緒還當初秋天又進湖湘櫓當家多勝事此役可兼取江山日日新一若相勞苦木脱獻羣峰雲生失前浦况持别乘權光華動徒旅元戎下分庭百史羣趨廡後車載仁風習習被南土預知潢池盗無復驚枹鼓政當勸賣劍不必禁挾弩入獻有訏謨論賞駢圭組臨分一杯酒不為離愁舉野步石梁俯清流苔髪明可數茆簷春晝長寂寂亭隂午鳥啼花徑深風絮浩無主幽人不可覿棋聲時出戸寄章冠之章侯平生一詩囊酬風酢月徧四方浩歌姑孰酒淋浪醉呼太白同舉觴遂登浮玊臨渺茫江濤挾筆益怒張沙頭倚檣樂未央興闌忽上秋浦航門前槐花日夜黄閉門琢詩聲繞梁白袍紛紛渠自忙飄然邂逅非所望自言久厭世鎖韁合眼巳夢廬山蒼君才甚碩氣方剛身雖欲隱文則彰江湖故人半朝行左推右挽摩天翔而我戢翼甘摧藏不能與俗相迎將徑當行前掃山房俟君功成還故鄉却駕柴車迎路旁方齋行世皆尚圓君獨方富貴可取君不忙閉門讀書聲琅琅舊書重疊堆在牀㸃勘同異分邊旁運精竭思心力彊十年足不離僧房荒山野路秋水長客雖欲至嫌路妨幽蘭無人為君芳采菊落英充餱糧客即不來有餘香題歸庵雲壁開蒼峽風林卷翠濤諸松皆老大一嶂獨孤高發興雖公等尋幽許我曹秋光端可賦不是楚人騷城樓城峻先迎月簾疎不隔風棋聲傳下界雁影没長空島嶼秋光裏樓臺海氣中登臨故待晩雨外夕陽紅蘇仁仲計議挽章幽棲略具便休官帝遣蒲輪喚不還大似文元居道院又如白傅過香山夢囘帷幄青㝠上醉墮風波浩蕩間向使胸中有榮辱那能八十鬢毛斑賀車駕幸祕書省麟臺高桞識雕輿共記中興幸省初黄道再傳天子蹕青編重入史臣書需雲下際君恩盛晨露高張樂節舒若寫鴻猷叅大雅定非周鼓頌田漁春日二首短短菰蒲綠未齊汀洲水暖雁行低桞隂小艇無人管自送流花下别溪簷鐸無聲鳥語稀徑深鐘梵出花遲日斜徧遶谿南寺未信東風屬酒旗陳亮字同甫婺州永康人生而目光有芒為人才氣超邁喜談兵論議風生下筆數千言立就隆興初婺州方以解頭薦因上中興五論奏入不報退修力學者十年淳熙五年亮更名同詣闕上書近萬言孝宗赫然震動欲牓諸朝堂以厲羣臣將用种放故事擢用之諸大臣惡其直言無諱百端交沮亮亟渡江而歸落魄醉酒戲為大言讐家挾告屢繫獄瀕死得免光宗立策進士問以禮樂刑政之要亮對策獨當上意親擢第一既知為亮則大喜時孝宗在南内寧宗在東宫聞知皆喜授簽書建康府判官㕔公事未至官一夕卒謫仙歌有序清夜獨坐天地無聲星斗動搖欣觀李白集高吟數篇皆古今不經人道語騷章逸句洒然無留思寥寥數百年間揚鞭獨步吾所起敬起慕者太白一人而已感歎久之恨無人能繼太白後因成謫仙歌用以祝太白舉觴以酬太白太白有靈其聽我聲知我意矣太白字太白清風肺腑明月魄揚鞭獨步止一人我誦太白手屢拍嘗聞太白長庚星夜半星在天上明仰天高聲呌李白星邊不見白應聲又疑白星是酒星銀河釀酒天上傾奈無兩趐飛見白王母池邊任解酲欲遊金陵自采石翫月乘舟歸赤壁欲上箕山首陽巔看白餐雪水底眠紫煙又不知在何處潄瑶泉酌霞盃悵望不見騎鶴來白也如今安在哉我生恨不與同時死猶喜得見其詩豈特文章惟足法凜凜氣節安可移金鑾殿上一篇頌沈香亭裏行樂詞此特太白細事耳他人所知吾亦知脫鞾奴使高力士辭官妾視楊貴妃此真太白大節處他人不知吾亦知歌其什鬼神泣解使青塜枯骨立呼其名鬼神驚惟有羣仙側耳聽我今去取崑山玊將白儀刑好彫琢四方上下常相隨江東渭北休興思會須乞我乾坤造化兒使我筆下光焰萬丈長虹飛廷對應制天朝銳意急英賢澒洞邊塵七十年際遇風雲凡事别積功日月壯心愆管蕭器小誰能識孔孟人存用則傳慚負壽皇勤教育奏篇半徹冕旒前及第謝恩和御賜詩韻雲漢昭回倬錦章爛然衣被九天光已將徳雨平分布更把仁風與奉揚治道修明當正宁皇威震疊到遐方復讐自是平生志勿謂儒臣鬢髪蒼陸九淵字子靜金谿人與兄九齡皆乾道間進士九齡官止教授九淵由崇安主簿用薦除國子正厯管台州崇道觀擢知荆門軍紹熙三年十二月卒年五十四子靜言道先徳性而後問學鵝湖之辯始與朱熹異晩年究歸於同然不事詞章無可傳之詩惟采象山一篇存其意致而已象山屬貴溪子靜結廬其上學者遂稱象山先生象山我家應天山山高數百丈上開園池美林壑千萬狀西山有龍虎煙霞耿相望寒清漾微波暖翠圍層嶂天光入行舟野色隨支杖吾黨二三子幽賞窮清曠引興谷雲邊題名巖石上碧桃吹曉笙𤣥鶴驚春帳一笑咏而歸千載應可尚陸九韶號梭山九淵之兄子美其字也子按宣教郎陸賀世居金谿延福鄉青田里生六長九思次九韶次九皋次九齡次九叙又次九淵惟淵與齡齊名而韶詩亦多佳句玊泉玊愛佳水飲之化為石規圓立山趾皎潔凌皓魄應厭舊經躔盈稀缺多夕一從寄兹蹤表表無晦蝕光彩雖暫埋體素多不易神物豈終潛早晩照九域黄幹字直卿福州閩縣人嘗往見清江劉清之期以遠到因命受學於朱熹熹語人曰直卿志堅思苦與之處甚為有益病革以所著書授之曰吾道之託在此吾無憾矣寧宗朝補將仕郎知漢陽軍主管武夷冲佑觀起知安慶府有異績詳府志中除大理不拜歸里聚徒講學一如熹時卒贈朝奉郎諡文肅答曾伯玊借長編白露下百草迅商薄脩林幽人起長歎感此節物深攬衣自徘徊撫劍還悲吟丈夫各有志莫作兒女心涉遠當疾趨畏影須就隂願言理輕車去上南山岑九日早發桃枝嶺登山豈不樂况此風露清排簷夜雨滴詰旦天空明歡然金石交要我林泉盟支笻趂汗漫勇往不計程一水何縈紆千峰鬱崢嶸仰視流雲馳俯聽幽壑鳴班荆得所適斗酒聊共傾人生會有累聚散如浮萍今晨諧勝遊異日難忘情意愜各賦詩庶以紀此行道間觀瀑布行行益以遠愜此心期幽一徑險復夷千林密相樛回首天際山矗靣縣飛流銀潢倚石壁玊龍下山湫光搖日璀璨勢激風颼飀可望不可親神往形獨留眷言桃枝山久懷卜築謀豈無一日閒努力窮㝠搜侍文公飲浮翠用劉叔通韻凉風振幽壑隂雲翳前山高懷勵清秋適意林莽間煙横萬家井水淨雙溪灣徙倚暮忘歸人境相與閒遊子獨何為千里方言還陪此杖屨遊忘彼道路艱心期更他歲依巖結柴闗讒人監謗兆周蹙偶語擠秦亡古風下刺上國步安且彊靖康發深痛熙豐啟餘殃惜哉天子明未免讒者傷讒者亦何為君子名愈彰拜文公先生墓下暝投大林谷晨登崒如亭高墳鬱嵯峨百拜雙淚零白楊自蕭蕭宿草何青青悲風振林薄猿鳥為悲鳴音容久寂寞欲語誰為聽空使千載後儒生抱遺經與胡伯履白露下百草𤣥雲翳崇岡遊子暮何之倐若孤雁翔朝發長沙渚夕息湘山陽飛鳴念儔侣慷慨增悲傷故人懷我深遠寄金玊章開緘且疾讀慰此饑渴腸是時届中火朔風掃枯黄歲月能㡬何皋蘭結微霜脂車策良馬日暮道正長徒僕審驅馳前途畏榛荒劣質苦難任白雲懷故鄉南山一舎隔矯首空西望送章元徳司理罷官歸永嘉送君北門坂遥望東甌路峨峨白鶴嶺渺渺飛鸞渡上有虎豹嗥下有蛟龍怒車馬堅且良維檝夙已具褰裳涉其險萬怪不足懼世路劇羊腸皦皦誠易汙但能心無愧窮達安所遇毋為婉孌者暫蹶輒驚顧生平麋鹿姿處世歎多忤胡為展良覿握手便如故高懷發鍼石正論諧韶濩情親復告别欲語誰與晤乾坤一逆旅日月雙脱寒儒守蓬蓽白首困章句期君以遠大庶足慰遲暮十二日復歸桃枝嶺大溪章溪溪水清上寮下寮山路平三山屹立相掎角百里連亘如長城仰干雲霄不盈尺俯視天高浮寸碧閒雲吞吐溢澗谷飛泉噴灑下石壁中有一山名芙蓉端冕正色羣山空望之令人起敬悚僧言直與衡嶽同坡陀突兀作雲洞虎豹蹲踞棲鸞鳳聞道前朝開闢日曾住浮屠幾千衆我來已作五日行皇天一雨復一晴穹林杳靄非人世手接羣仙朝玊京曉來更向山前去忽到山翁棲隱處却憶桃源洞裏人日出煙銷忘舊路遊靈洞巖歌深巖突兀山之阿足履危磴攀藤蘿巖下清泉響環珮巖前古木交枝柯當中洞門忽開豁上有石屋高嵯峨乾坤開闢藴奇特鬼神守䕶仍揮呵重門黯淡不可入以火來照所見多出門小洞亦竒絶神龍奮怒吞蛟鼉勝景如此難可得手倚石壁頻摩挱安有雄思如縣河千言落筆仍高歌訪高僉判所居遠樹分高下平洲半有無短亭低密竹小艇隱寒蘆轉浪魚深入斜陽鴉亂呼自慙貴公子未老賦歸歟甲子語溪閔雨二首塘中龍骨高數層龜坼田中縱復横青裠箬笠倚車卧但有空車無水聲牛女盈盈河漢旁清風肅肅吹羅裳朱門達旦聽歌曲莫遣濃隂蔽夜光王阮字南卿江州人其父祖三世皆有功於神宗朝阮少好學尚氣節自稱將種辭辯奮發嘗謁袁州守張栻栻導之見朱熹於武夷熹與語大悦之登隆興元年進士時孝宗初即位有恢復之志阮對策詳盡深切事勢知貢舉范成大歎曰是人傑也調南康都昌主簿以廉聞移永州教授紹熙中知濠州改知撫州韓侂胄聞其名遣密客用美官誘出門下阮不答侂胄大怒批㫖予祠阮歸隱廬山以終題嚴陵釣臺幷序題釣臺多矣大槩高之爾未有明其意者也光武既定天下深懲王氏之禍原于張禹孔光之流故昔之所謂坐論者一切吏之時或叱咤侯霸等俛首而已先生道高千古豈能堪此雖以禮聘不以禮答項枕卧語又從而蹸踐之使知已之不足驕士必不少留古語云使騏驎可係而羈兮豈云異夫犬羊此則先生之志也其首陽之流乎為賦小詩以發千載一笑西都庸庸生禍胎東都切切繩公台平生故人苦畏辱坐定白雲那肯來沈㡬深略滿帝腹且憩先生一雙足使知天上麒麟兒不似犬羊甘豢畜渭濱老叟不自持為人人以鷹名之豈識桐江一竿竹依舊秋風魚正肥古來賢者亦避世往往適逢天地閉得如建武亦不惡又值首陽難降志山木隂隂江面寒此天别在壺中寛㡬曾流出桃花去寶氣自駭人間觀當時不願世知已稱到于今却如此塞馬得失天好還千駟齊侯不窮理題高遠亭小攜樽酒作清遊行到方壺最上頭山在斷霞明處碧水從白鳥去邊流苦無妙句窺天巧賴有名亭慰客愁從此江南添勝景未應獨數庾公樓龍塘久别乘月再到奉呈同社龍塘疇昔擅雲烟破月重來倍爽然浮玊北堂三萬頃扁舟西子二千年青山識面爭迎櫂白鷺知心不避船華髪翛翛更何往一茅終在此橋邊鞏仲至東平人從學吕東萊夜雨曉起方覺夜雨鳴簷送五更不驚高卧最多情窗間細視花無恙牆外隨聽屐有聲數把柔絲堤栁嫩一奩方鏡閘波清出門眼界殊明潔但覺春寒處處生離建旅中多得早朝晴野潤衣襟苦未清時時數㸃雨猶落隱隱一聲雷不驚山入夏來差覺老花從春去久無情長汀又涉來時路麥隴桑村小問程韓元吉字無咎官龍圖閣學士先頴川人徙居上饒所居之前有澗水故號南澗涉澗而南有園亭號蒼筤元吉與張南軒同以任子入西掖葢孝宗時人於東萊放翁皆有投贈之什紅梅不隨羣艷競年芳獨自施朱對雪霜越女謾誇天下白壽陽還作醉時粧半依脩竹餘真態錯認夭桃有暗香月底瑶臺清夢到霓裳新換舞衣長送陸務觀得倅鎮江還越高文不試紫雲樓猶得聲名動九州金馬漸登難避世蓬萊已近却回舟燒城赤舌知何事許國丹心惜未酬歸卧鏡湖聊洗眼雨餘層壑正奔流雨中聞伯恭至湖上莫嫌鞭馬踏春泥茶鼎詩囊偶共攜山色雨深看更好湖光煙接望還迷連天花絮飛將盡夾道蒲荷長欲齊官事得閒須洗眼蓬壺只在帝城西韓琥南澗之子夏日片月生林白沿流澗亦明幽人方獨夜山寺有微行野處偏宜夏貧家不厭晴熏風吹老鬢腐草見飛螢秋懐四首地僻稀人跡重林目自虚鳥飛晨氣外蟬噪晩凉初餘潤從侵屨浮埃倦整書樵漁時上下閉户又何居木末芙蓉起亭亭緑且青牆猶承片瓦窗不礙疎櫺次第花擎葢縱横葉展屏石丁誰主者仙豈待沈㝠擁砌叢生菊何闗老意多澆花驚易燥耘草喜成科枕腊猶宜睡餐香豈待哦淵明藏不盡滿把尚婆娑秋聲連夜起秋意雨來時睡覺風生屋凉須水到池交遊稀自好出入懶方宜只被章泉誤書題又寄詩十三日南山春雪未全消路竝浮梁步石橋深緑漸歸高栁葉淺紅初上小梅梢悄寒寺院鐘聲起昏暮人家燭影揺一夜東風吹酒醒夢囘花月是元宵晩春幽砌疎畦送晩春水流山靜見閒身行吟散去風光好熟睡醒來雨氣新木筆豈非濃意態石楠終是淡精神鶯聲圓處鵑聲急景物方知不負人寒食曉色猶籠淡淡煙花間行過小溪邊人家寒食當晴日野老春遊近午天吹盡海棠無步障開成山栁有堆綿呼兒覔友從鄰伴閒看村農又下田宋元詩會卷四十
