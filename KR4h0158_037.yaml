body:
  text: 宋元詩㑹卷三十七兵部主事陳焯編吕本中字居仁宰相公著之曾孫幼敏悟公著奇愛之少從楊時游酢尹焞遊三家或有疑異未嘗茍同用䕃授承務郎紹興六年召赴行在特賜進士出身擢中舎請罷官吏犯贓黥面之刑從之又奏九江鄂渚諸路當宿重兵戡亂宜圖宻筭不當播虛聲於鄰境使得預防未幾引疾去召權直學士院初本中與秦檜為同舎相得甚歡檜既相私有引用之意本中力謝之會趙鼎遷僕射本中草制有曰合晉楚之成不若尊王而賤霸散牛李之黨未如明是以去非檜大怒諷御史蕭振劾罷之提舉太平觀卒諡文清有詩集二十卷出門見明月出門見明月入門思故人故人如此月一見一回新明月相見多故人相見少問爾何因緣長似此月好故人在何處南北東西路明月在咫尺夜夜庭前樹海陵書懷萬事不如意自然生白鬚極知少餘韻何敢厭窮途土俗尊魚婢生涯欠木奴東行見李白誰為致區區海陵雜興紛紛五代亂離偏一旦雲開復見天草木百年新雨露車書萬里舊山川尋常巷陌猶簪紱取次園林亦管絃人老太平春未老鶯花無恙日高眠秋後竹夫人與君宿昔尚同牀正坐西風一夜凉便學短檠牆角棄不如團扇篋中藏人情易變仍如此世事多虞祇自傷却笑班姬與陳后一生辛苦望專房探花謾遣兒童掃雪開却穿籬落看春回溪山冷淡泥三尺故舊飄零酒一杯止買芒鞵供踏雪更攜藜杖去尋梅玉川縱老生涯在時有鄰僧送米來栁州開元寺夏雨風雨翛翛似晩秋鴉歸門掩伴僧幽雲深不見千巖秀水漲初聞萬壑流鐘喚夢回空悵望人傳書至竟沈浮虎頭燕頷非吾相莫羨班超拜列侯張禕秀才乞詩白蓮菴中張居士夢斷世間風馬牛塵埃表物自無意神僊中人聊與遊澄江似趂北城眺苦雨不放南山秋君當先行我繼往句吳東亭泊小舟孟明田舎未嫌衰病出無車尚喜冬來食有魚往事高低孤枕夢故人南北數行書茅茨獨倚風霜下稉稻微収雁鶩餘欲識淵明只公是邇來吾亦愛吾廬宿州初暑暑氣侵人始欲愁簞瓢窮巷不堪憂亂蟬泊雨林塘靜密徑吹花草樹幽春盡茆檐深著燕日高田水故飛鷗莫欺湫隘無餘地待借元龍百尺樓無題荒裔安知鼎重輕禍胎元是起公卿襄陽耆舊惟龎老受禪碑中無姓名黄公度字師憲莆田人紹興間進士由簽書判官除祕省正字與趙鼎素善小人希秦檜意論罷之再貶南恩檜死召還官尚書吏部員外郎以疾卒秋旱熱甚尤苦登陟輿中戲成少皞不用事八月猶苦熱南方本炎蒸况乃甘澤闕雨師弛厥職旱魃逞餘孽金石鑠欲流汙池龜甲裂稼穡亦已休田家生理絶强欲築場圃漸聞罌瓶竭租斂數有恒不為愆陽輟州縣急鍿銖鞭箠動流血吁嗟號帝閽此語何由徹空村巫覡舞靈祠香火謁水旱制于天祈禱恐虚設嘗聞桑林禱爪犧亦清潔萬國幾為魚堯徳豈其劣但令備先具難必沴氣滅江淮十萬兵仰口資餽轍太倉無宿儲有司憂百結腐儒從薄宦籃輿走􅏭嵲王事有嚴程亭午不得歇林鳥呀無聲僕夫屢告暍焉得變𤣥冬隂厓踏層雪還家黎明呼羸童拄策渡野水輕嵐翳初日古道步平砥麥隴黄四出松竹翠相倚人間春告盡巖色秀未已眼入故鄉眀語還親舊喜印非朱買臣金無蘇季子竊笑免妻孥相過動鄰里富貴豈吾謀薄遊聊爾耳謝傅叅議彦濟雱惠筍用山谷韻北方九月霜賔盤無生菜嶺南信地暖窮冬竹萌賣君念庾郎貧繭栗供庖宰中有歲寒姿貞時久不壞前身渭川侯千畆償宿債珍可配天花賤不數石芥早薤與晩菘奴僕望賔介文園酒渴餘想不厭姑嘬預恐吹作竹明日東風噫急須驅兒童傾筐攜采采癸亥秋行縣夜寓下生院倦甚慨然有歸歟之想用韻題壁何須輪擁朱不願佩縣玊青山得去且歸去謀生待足何時足林間招提金碧開門外過客誰能來桂花落盡無人問古牆秋逕生青苔舊山泉石故應好菟裘不營亦可老此身已與三徑期未分淵明迹如掃惜别行送林梅卿大鼐赴闕刺桐城邊桐葉飛刺桐城外行人稀客來别我有所適問客此去何當歸林卿妙齡才秀發胸中萬卷涵溟渤家聲合沓葢九州里第嶙峋表雙闕朅來試吏天南方驥縶焉能騁所長梅僊脫身東市卒杜老把筆中書堂傳道淮壖減豺虎政須禮樂事明主之子軒軒霄漢姿好向春風刷毛羽奥村晩望山逐寒雲斷天隨暮靄低稻畦迷上下樵徑自東西故國存書劍他鄉咽鼔鼙涓埃期補報未敢卜幽棲庚申元日繭足度殘臘回頭又一年文書疎病眼事業付高眠盥櫛從朝懶衾裯覺夜便南鄰競春色車馬日喧闐久不得浙耗獨酌澆愁酒慵翻信手書折腰行俗吏投足且吾廬歲月鶯聲老江湖鴈影疎依棲五侯第旅食近何如苦熱玊井晨不冷茅簷午欲焚月搖看畫箑榴吐認紅裙迥野都如火竒峰空自雲衣巾負芒刺曝背有人耘倚薄茅簷供倚薄藜杖任扶攜天入平蕪濶山含宿靄低樹聲風曲折野色晩凄迷容易營生事秋田稻欲齊閒居一水遠能白羣山隂更青靜憐風細細閒任雨㝠㝠春色供多病時情畏獨醒平生憂國意客至問朝廷三月晦日郊外即事雨積稻畦白晴添麥壠黄野橋排鴈齒山路轉羊腸鳥語有時好田家隨事忙一年春盡日身迹更他鄉晩泊桃源驛奉懷幕府諸公下馬泊孤亭人煙接古城半村留晩照萬壑送秋聲風月思𤣥度文章愧長卿桃源何處在山驛至今名冬日道間歲熟牛羊飽村寒鳥雀呼霜餘山骨露水落澗毛枯歸艇收漁網行人問酒壚微軀任南北未覺旅懷孤壬戌中秋沿檄行縣與龔實之同宿琴泉軒揺落江城暮招提訪舊遊泉聲終夜雨竹影一絃秋露湛衣裳冷山空枕簟幽故人憐寂寞抱被肯相投西園意得壺觴外心清杖履間簿書休吏早花鳥向人閒舊隱在何許倦遊殊未還天涯賴有此退食一開顔正月晦日寄宋永兄萬事縈心空歲月一分春色已塵埃簷間雨脚何時斷陌上遨頭幾日來寒束幽花如有待風延啼鳥苦相催明年此會各南北趂取官閒共酒杯悲秋萬里西風入晩扉高齋悵望獨移時迢迢别浦㠶雙去漠漠平蕪天四垂雨意欲晴山鳥樂寒聲初到井梧知丈夫感慨闗時事不學楚人兒女悲陳晉江以壬戌四月上澣宴同僚于二公亭百年遺址俯郊坰十里蒼波帶古亭隔㟁樓臺春去逺兩朝煙雨酒微醒苔碑缺落庭松老野鳥去來汀草青風物不殊天竺路扁舟髣髴舊曾經道間即事花枝已盡鶯將老桑葉漸稀蠶欲眠半濕半晴梅雨道乍寒乍暖麥秋天村壚沽酒誰能擇郵壁題詩盡偶然方寸怡怡無一事麤裘糲食地行僊題白沙舖負郭可無三頃秫葢頭幸有兩間茅還鄉且盡田家樂舉世誰非市道交村酒一杯澆磊塊山程數驛更磽嶅羸驂莫怪歸鞭急心在輕紅荔子梢唱和盈軸而燕集未期小詩請廣文兄為遨頭煩君管領東君手收拾風光尊俎中與作遨頭共春燕何須擁鼻學秋蟲誰憐老子興不淺自笑窮人詩轉工趂取身閒酒價賤明年此日又西東贈泉守趙表之令衿扁舟昔艤浙江邊曾醉王孫玳瑁筵竹杖芒鞋晩城上金荷銀燭夜堂前宦遊我輩聊復爾聚散人間亦偶然誰料天涯今八載青燈相對各華顚春日宴共樂臺畫栱朱甍挿紫清連山帶水自紆縈閭閻高下魚鱗比田畝縱横碁局平花發鳥啼春耐事夜闌客散月多情寸隂自古千金重一笑人間萬慮輕秋城晩望斷續悲笳起麗譙㝠㝠晩色四山椒隔江人散墟分米十里津喧蜑趂潮夕照含山光黯淡西風動地鬢飄蕭低頭自笑微官縛東望滄溟歸路遥秋夜獨酌溪山態足身無事天地功深歲有秋投老相從管城子平生得意醉鄉侯捲簾清坐月排闥横笛誰家風滿樓可是離人更遺物自緣身世兩無求張九成字子韶其先開封人徙居錢塘從楊時學有權貴用重幣招致門下且許薦之館閣九成大笑拒之紹興二年策進士擢置首選楊時遺以書曰廷對乃中興來僅見之策非負氣剛大不能為也授鎮東軍簽判與提刑張宗臣爭釋無辜不合即投檄歸從學者日衆用趙鼎薦起著作郎時和議起九成謂趙鼎曰敵實厭兵而張虚聲以撼我當約以十事彼能從吾則與之和庶幾可也鼎既罷九成在經筵力申前説秦檜惡之謫守邵州中丞何鑄劾奏落職檜怒未已復嗾司諫詹大方論其與徑山僧宗杲謗訕朝政謫居南安軍檜死起知温州未㡬丐祠卒寶慶初特贈太師追封崇國公諡文忠首春出城春風驅我出騎馬到江頭出門日已暮獨行無獻酬江山多景物春色滿汀洲隔㟁花繞屋斜陽明戍樓人家漸成聚炊煙天際浮日落霧亦起羣山定在不江栁故撩人縈㡌不肯休隨行亦有酒無地可遲留聊寫我心耳長歌思悠悠出城望隔江茅舎茅屋臨江上四面惟柴荆綠隂繞籬落窗几一以明門前灘水急日與白鷗盟不知何隱士居此復何營朝來四山碧晩際沙鳥鳴碁聲度竹靜江深琴調清終攜一樽酒造門相對傾心期羲皇上安用知姓名九月七夜喜新凉晩來天宇隂便有如許凉衣襟不作苦燈火耿寒光青編如故人入眼興未央憶昔炎歊日蒸鬱如揚湯百事懶不支何暇攷短長念此深自喜拂窗凈琴張老來縱眵昏閉目自焚香心清神亦旺聖賢儼在旁此意勿輕語此景吾弗忘十一月忽見雪片居此七年未嘗有也寒色遽如許神清瘦不禁瓦溝聲磔索珠琲亂衣襟斯須忽復變玉屑墮前林風勁勢囘旋飄飄蔽遙岑落此炎瘴地七年到于今不見六花飛况聞寒玊音今年盈尺瑞天以慰吾心呼兒具杯盤開樽須滿斟更製白雪辭入我綠綺琴課書横浦非吾土久寓亦何聊不學竹林友把酒持蟹螯饑寒聊用遣惟以文字消方其得意處捽茹亦逍遥頓忘物我情天地本寛饒告爾二三子我歌汝其謠擬古六首平生澹無營生計亦草草吾廬儘有餘懶問長安道楚澤驚屈平書空咤殷浩願君且休矣沈憂令人老余生本無用頽然落澗阿饑食山頂薇寒編松上蘿豈敢怨明時貧賤固其宜原憲樂窮巷屈平愁深陂度量何相越道在胡速遲屈子則已矣原子有餘輝願隨春陽和不隨秋草萎光隂瞬息耳憂悲亦何為蘭蕙生深林時有朝露滋清香隨春風邈若有所思我亦慕明徳杖藜往從之林深不可見相遇終有時蕭騷老蠶婦窈窕深閨女閨女曳羅裳老婦勤機杼夜深燈火微那復凄寒雨辛勤貢王宫棄擲乃如許一縷不著身含愁誰敢語促裝何喧喧西笑都門道出門何所見王孫媚春草綠鬢仍朱顔未信人間老去去請勿遲功名苦不早少小有高志思與古人親二十學文史三十窮典墳坐觀世間事抱火厝積薪此心雖炯然不敢以告人君門深九重欲陳諒何因嘉祐寺曳屣出南郭招提在高岡誰言林樾中乃有此寶坊甘泉溢中庭修桂䕃層廊三秋此花開清香駐高堂試問紅塵中那得六月凉門外江聲濶堂中松韻長古殿儼像設佛燈龕夜光不見堂中人斗覺心悲傷人生本無定樂處是吾鄉吟餘復何事月落山蒼蒼食苦筍吾鄉苦筍佳出處惟石屋玊肌膩新酥黄衣緣深綠林深恐人知頭角互出縮煙雨養春姿此物未成熟三月臘酒香開罇媚幽獨烹庖入盤俎㸃醬真味足未須五鼎牛聊稱一囊粟朅來庾嶺下歲月去何速經冬又七春未分窮途哭今朝好事者恵我生一束頭髠甲斕斑味惡韻麤俗兒童不慣嘗噦噫驚媪僕老妻念鄉味放箸淚盈目丈夫志有在何事較口腹呼奴更傾酒一笑風生谷有客春雨止復作閉門無與居童奴告予言有客叩吾廬束帶出見之頎然一丈夫手攜一尊酒辭氣何宴如為言久聞名曾未瞻簪裾天寒宜飲酒一杯聊以娛盤餐亦草草蔬果間溪魚顔色温勝玊言談貫如珠豈期有道者而來警我愚酒酣意兩適心閒樂有餘四海元有人君勿輕荒區課書汲汲我何事愛此窗日光北門終日開風透軒檻凉貧病何以療六經真古方榮辱頓爾失泰山亦毫芒呼兒來讀書絃誦驚滿堂仕途有㨗徑掩口笑我狂辛未閏四月即事窮居不擇交賢否那復辨似人輒已喜况復曾半面相見且寒温不問風雨變晩來無與遊澄江喜如練攜笻信步行屈曲隨山轉數日雨不止衝波頽激箭舊雨已不來今雨誰復見甕頭香滿屋吾計今已辦豈復思故鄉無事且彊飯過報㤙寺籃輿訪蕭寺煙暝漲春空逺樹樓頭綠殘霞山外紅昏鐘發林杪人語殷橋東回首都無迹浮生真夢中城門晩景雨漲春江浪沄沄日夜奔羣山落雲裏萬壑吼巖根沙際人呼渡煙中牧入村蕭然何處士終日掩柴門晩春即事二首春來尋勝事此興亦何窮夜雨亂江淥朝花退日紅雷聲驚嶺北雲氣漲溪東蓑笠衝泥去誰知與我同幽事晩山色幽齋春雨餘亂紅欹澗水浮綠漲郊墟北牖迸新筍西園生野蔬槿籬遶茅屋已分老樵漁遊南路菩提寺次刁文叔韻高僧居物外有戸晝常扄海近知天濶泉甘識地靈一簾春月靜數㸃列山青便卜歸歟計移文漫勒銘陳淵字知黙南劍州沙縣人紹興五年廖剛胡寅等上言淵乃瓘之諸孫有文學可用李綱為江南西路安撫使辟為制置司機宜文字七年用胡安國薦召對改官賜進士出身除監察御史遷右正言上嘗與淵論程頤王安石之學併贊楊時能宗孔孟淵對曰楊時始宗安石後得程顥師之乃悟其非葢安石不止經義穿鑿其於道之大原無一不差如論語主仁愛人特仁之一端而安石遂以愛為仁中庸主誠豈分人我安石則謂中庸所以接人高明所以處已孟子七篇專發明性善安石取揚雄善惡混之言主於無善無惡其失性遠矣會鄭億年復官侍從淵言億年雖故相居中之子實有從賊之醜乞寢其職名億年秦檜親黨也檜怒嗾何鑄論淵落職主管台州崇道觀卒有黙堂集若干行世宋史載淵為楊時壻延平江上呈吳國華先生青山如偉人可望不可致屹然瞰洪流龍翔并虎視春風何時來草木舞深翠禽鳥暖相依飛鳴得真意願言斬茆淡結室傍薈蔚且要觀此身功業亦細事十五日過許夜雨暴作明日行四十里宿于潁橋又明日晴賦此狂風撼平野沙礫眯兩目筍輿我與君道遠疲徵逐驚雷一夜發暴雨溢川谷平明泥没趾寸步不容續我生賦窮蹇觸處背天福風雨豈不好行路非所欲中途聊息肩村驛便可宿我勞固其分端恐僵僮僕燎爐然濕薪傍舎酒初熟安能浣愁腸但取充饑腹中宵耿不眠明月忽挂屋攬衣起視夜秣馬亦膏轂人情易喜愠天道有翻覆隂霽那可知去去無欲速越州道中雜咏浮雲作秋隂細雨如朝霧放形山水間意適無艱步忽遇古招提空翠森囘互倚杖聽泉鳴悠然不能去鄧志宏送張思道遊福唐次韻紛紛涴耳俱宜洗坐遣高人厭丘里迅流蚤自促行舟更有西風滿江葦當年筆陣掃千人今日流輩推能文英詞雄辯灑醉墨倐忽百變春空雲人間萬事秋毫細軒冕儻來誰著意身隨去櫂落波間興逐㝠鴻渺天際宿僊霞聖僊寺呈伯思子靜風物吾鄉似山川地勢分稻畦翻碧浪麥壠布黄雲客舎常爭席山僧獨獻芹茆柴餘瀝在聊餉僕夫勤自建寧泛江至石首江注天圍盡舟排浪陣輕岸容疎栁色秋氣斷鴻聲風日雖堪好雲煙易妬晴鱸魚知有興好在未知名和韻呈李伯紀舎人時來將相寧有種衛青故是主家奴縣鶉未用歎歲惡濶網近喜除官逋本無得喪任失馬但有言說皆陳芻從君一飲百壺盡醉倒不知誰謂吾離紫溪驛小風吹面雨廉纎輕薄衣裳懶更添一線離情裁不斷暮雲將過粤山尖信州禪月院晩眺一覺華胥日又曛晩來愁緒亂紛紛角聲對起重城近吹動靈山萬疊雲汪應辰字聖錫信州玊山人五歲知讀書多識竒字未冠首貢鄉舉紹興五年登進士第一人年始十八上甚異之欲即除館職趙鼎言且令厯外任養成其才乃授鎮東軍簽判召為祕書省正字時秦檜力主和議應辰上疏抗言其非檜怒出通判建州遂請祠寓居常山道院以修身講學為事饘粥不繼宴如也趙鼎死扶喪過郡應辰為文祭之㡬罹不測賴胡寅遺檜書謂此事不足窮竟事乃寢檜死召為吏部郎官以母老乞外出知婺州尋丁内艱除祕少權吏書以議太上尊號不合乞補外知福州厯四川制置使蜀人悳之入覲陛見以畏天愛民為言除吏書兼翰學凡所陳請專革弊政中貴側目讒言日興出知平江府力疾請祠淳熙三年卒于家玊山太甲廟君王自古幸遊多未必南從到澗阿龍虎真藏金鼎火鳳皇朝食玊山禾雲霞落日舒旗幟琪樹西風響珮珂料得尹莘耕稼日也曾高隱碧嵯峨歸雲堂浮雲本無心人心逐雲去更作歸雲堂雲歸竟何處范浚字茂明婺之蘭江人紹興中舉賢良方正以秦檜用事高蹈不出隱居香溪學者稱香溪先生浚深於理學其所著心箴朱文公采入孟子註中故身後之名益著按曹能始將范茂明與范賢良分作兩人謬甚雜興二首荆梟昔見惡去楚將巢吳妖音不知革吳豈荆人殊梟能戒頰舌勿復輕鳴呼雖荆亦容爾何必他邦居高蟬䕃嘉木未省螗斧危勇蟲亦何愚不顧黄雀饑癡癡挾彈子已復露霑衣世事無不然古今同一悲狂泉昔有大荒國水以狂泉名國人皆飲泉狂顛率無寧一人自穿汲乃獨能常醒舉國既皆狂反見不狂驚顧謂不狂人無乃鬼物憑不然是狂疾救療當痊輕施針灼炷艾膚肉無全平而彼不狂者被虐楚不勝賁然走泉所酌飲不敢停既飲即亦狂萬慮皆迷㝠其狂與衆一衆始歡相傾世事今亦然嗟哉感時鳴安得跨鵬背獨往遊天溟寄謝彼狂子酌泉吾不能張生夜載酒相過湘簾一鈎揭衣寒覺露白未驚割面風且看磨鎌月玊椀鵞兒酒花甆虎子鹽張公鷄黍舊豈辭夜猒猒題八駿圖何年畫工搦毛錐貎此八馬姿權竒青絲絡頭十二蹄調柔意態行愉怡五馬放浪無維羈或齕或望仍迴嘶一牧牽鞚一牧騎製度彷彿唐巾衣不知此馬生何時昔周穆王逺遊嬉駕跨八駿驅東西高升崑崙躡瑶池驑騄驥駃勞飛馳日走萬里無停騑興元唐家危累棊百弮僅脫朱泚圍黄屋進狩懷光追八馬入谷七馬疲筋攣肉綻行人悲兩者資世皆顛羸虚名何有千載垂空得傳記流歌詩未如此馬閒猶夷牧坰不受鞭笞威不踣險遠安無危泉甘草薦足自肥安用號駿稱雲騅嗟㢤畫意誰能知讀長門賦阿嬌負恃顔姝好那知漢帝恩難保一朝秋水落芙蕖幾歲長門閉春草自憐身世等前魚舊寵全移衛子夫獨夜不眠香草枕東廂斜月上金鋪曉驚永巷車音近失喜疑君枉瑤軫臨風望幸立多時却是輕雷聲隱隱年年織女會牽牛百子池邊侍宴遊自從一落離宫後無復穿針更上樓人言消渴臨卭客天下工文專大册黄金取酒奉文君冀悟君王賜顔色賦成果得大家憐鳳觜煎膠續斷絃不似昭君離故土一生埋没紫濛天四月十六日同弟姪效李長吉體分韻得首字黄梅雨歇春歸後摶黍哺雛鳩喚婦紅殘小頰蹊上花翠刷濃眉陌頭栁籜㾗半脫煙篁瘦露裛幽香逗書牖雲容漠漠曉隂愁麥信風前一搔首六笑我笑支道林逺移買山書巢由古達士不聞買山居我笑賀知章欲乞鑑湖水嚴陵釣清江何曾問天子我笑陶靖節自祭真忘情胡為託青鳥乃欲長年齡我笑王無功琴外無所欲當其戀五斗乃獨不知足我笑杜子美夙昔具扁舟老大意轉拙欲伴習池遊我笑韓退之不取萬乘相三黜竟不去觸事得讒謗客言莫謾笑古人笑人未必不受嗔螳螂襲蟬雀在後只恐有人還笑君迴頭生愧不能語嘲評從今吞不吐譽堯非桀亦何為訕周譏禹終無取讀揚子雲傳老不曉事揚子雲綴文譏訶堅逐貧班生曲筆甚假借謂不戚戚元非真草𤣥欲作後人計投閣自迷身不利王涯筮中好其書寧復逆知甘露事鼃聲紫色欺昏童義士遠引如㝠鴻胡為顛眩尚執㦸美新屈首稱臣雄岷山沃野蹲鴟大拓落不歸良已過近危竟似井眉瓶虚作反騷嗤楚些詭情懐禄遭嘲評但用筆墨垂聲名文章要亦千古事久矣法言今正行讀王建射虎行我讀射虎行感慨興長歎官差射虎得虎難山下遠立常空還惜留猛虎著山裏射殺顧恐終身閒有如邊將圖偷安遵養時晦容其姦翻愁努力盡高鳥良弓挂壁無由彎君不見劉臣容高千里畱賊自資媒富貴恐賊盡誅身不利坐令屈律裹頭人横暴九州狂螫噬嗟嗟忠臣心不移受刀摩頸甘如飴紛紛血刃勇不顧一死未謝君王知景桓壯志吞狐狸狐狸不獲寧家為相公誓欲平淮西慨言賊在歸無期霍公裴公今已矣我吟射虎徒歔欷理喻郵亭羇客寒無氊夜懷家山情惘然燈前坐感雨蕭瑟浩歎達曉愁無眠鄰翁不出蓬茨裏聽雨聽風心似水黄昏鼻息已雷鳴往往簷喧不經耳愁霖一種聲紛紛鄰翁不聞羇客聞是中轉物有妙理起予暗契漆園㫖登富陽觀山寺弭櫂依寒渚臨亭俯碧川嘶雲征海雁椎鼓過風船水濶天低樹山空日暝煙擬題江似練終媿謝公賢次韻茂永兄首夏新晴燕落雨知節鳩鳴天欲晴行雲飛斷碧斜日漏微明筍出竹三徑苗肥田一成野人知得飽索酒坐班荆初冬郊行空濶野雲疎行行思鬱紆露花啼晩菊風葉舞高梧日落牛羊下天寒雁鶩呼却回南澗路暝色徧蓬廬雨後出郊扶輿穿密竹度彴過前溪霽色煙横野春聲水繞畦映山行白鷺遷木韻黄鸝客裏貪幽事歸時日已西歲暮喜晴晴山喜見曉㠝岏笑出蓬門不暇冠風掃斷雲齊萬弩日融殘雪上三竿早黄楊栁漏春信晩翠枇杷凌歲寒從此林芳入幽賞凍醪新壓味甘酸次韻端臣姪七夕萬古東西隔女牛停梭期會豈悠悠蝦蟇輪破青天暮烏鵲橋横碧漢秋莫放癡兒懽徹曙且容老子彊登樓舉瓢更取天漿酌一洗胸中十斛愁春雪晩晴出西郊步屧尋春犯雪泥村南村北鵓鳩啼墮梅殘白猶明樹著栁暗黄初映堤風景快晴雲擘絮江天未暮日縣規最憐碧漲侵沙尾更傍横橋一杖藜李燾字仁甫睂州丹稜人甫冠憤金讐未報著反正議十四篇紹興八年擢進士第調華陽簿改秩知雙流縣以公餘力學博極載籍于本朝典故尤悉力研覈于是自建隆迄靖康為編年一書名曰長編浩大未畢史官以聞詔給札進呈除潼川路運判召對擢兵部郎中叅定祭法因上續通鑑長編凡一百八卷遷祕少尋兼實錄院檢討因與右相虞允文論事不合請去轉運湖北改帥潼州進祕閣修撰同修國史以災異陳言賜金紫用幸太學恩特轉一官拜侍郎坐子垕為著作郎發策考上舎御史摘其語垕罷官燾亦出知常州召除敷文閣待制再上長編全書詔藏祕閣以學士致仕卒年七十著述凡十六種季按燾長子李璧字季璋次子李垕字永皆有文名登大慈寺臺重臺得雲氣深穩戸牖誰能發闗鍵樓下輪蹄渙散馳行人一顧不容返好遊獨是我輩閒褰衣直上相推挽層軒危檻倚欲徧更假胡牀同息偃西南繁會惟此都昔號富饒今已損填城華屋故依然孰為君王愛基本茫茫八表聊縱目情知日近長安遠白雲浩蕩飛鳥沒玊笙凄凉紅粉晩荷衣蕙帶芙蓉裳野服猶堪敵華衮去梯孰復共君謀殺馬毁車從此遁客懷三首寂寞三秋節凄凉萬里風關河盡形勝人物㡬英雄秦葉随流水周禾滿故宫此心縣魏闕夢遶浙西東壯矣府中縣索如城外村墨池今掃迹石筍舊餘根風急漢絃斷雨多秦鏡昏新秋一懷古情緒若為論雨意忽如此客愁將奈何出門誰可詣掩卷獨高歌塵世兔三穴古人蓬一窠區區奚足道黙黙幸無它靈雲巖路轉層岡十里餘武陵傳者一難如昔年煉藥仙人室今日餐霞道士居洞外蟠花開錦繡巖前石溜潄瓊琚猗與靈氣為時雨可惜圖經闕不書洪适字景伯皓長子㓜敏悟日誦三千言皓使朔方适年甫十三能任家事與弟遵同中博學宏詞科後三年弟邁亦中是選由是三洪名滿天下改祕書省正字甫數月皓歸忤秦檜出判饒州适亦出為台州通判皓卒服闋起知荆門軍厯戸部郎中孝宗即位權直學士院官至參知政事被論予祠年六十八薨諡文惠擬古四首明月皎夜光瑟瑟扇商籟衡紀直西躔雲章斜左界感彼林薄凋歲律倐云邁蜻蛚誰汝憐悽悽鳴戸外昔我耐久朋著鞭道方泰慰藉繒縞輕金蘭舊盟改東井不及泉須女無儔配君看貢公綦白首愧傾葢冉冉孤生竹成隂幽谷中聿來君子室葛藟施喬松喬松千百㝷攀附猶可窮思君江水深褰裳難為從同心而偏棲愧彼摩霄鴻灼灼芙蓉花凌波媚芳風非不努力愛秋老無復容昔盟倘不寒誰歎久西東迢迨牽牛星奕奕停梭女尋盟整瑤轡緘情遵漢渚欣讌未斯須别愁眉已度黄月不我畱殘機忍重顧翻羨巫山雨朝朝楚王遇青青河畔草英英籬邊菊亭亭當窗女濯濯手如玊淵淵錦中意粲粲未盈幅藳砧天一涯刀頭誤行卜却鏡怨新眉誰教逺山綠次韻蔡瞻明江樓秋晩斜照穿林迥歸雲斂岫遲蝸文寒壁篆蛛巧暮簷絲待月是愁處對山無倦時掀髯阻談綺細讀寄來詩寒巖寺峭壁挿青㝠層巖覆化城空中清磬發幽處慧燈明萬瓦足雲氣四簷無雨聲豐干不饒舌此地孰知名曉發秦安驛秋夢不能曉起行山徑迷小車驚宿鷺列炬誤鳴雞冷覺霜華重光瞻斗柄低金庭有佳處芳桂想幽棲交翠亭政和丙申家君主寧海簿明年作交翠亭是秋亭成而适生後廿有八年适來貳郡事行縣至此感舊賦詩三十年中事鸞棲築一亭寒聲長新籜清閟拂疎櫺水轉前時綠山濃遠處青重來勤問訊此别記秋螢海棠花雨濯吳妝膩風催蜀錦裁自嫌生較晩不得嫁寒梅洪邁字景盧皓季子也㓜讀書日數千言過目成誦博窮載籍雖稗官釋老無不淹通後二兄中第為敕令所刪定官以父忤秦檜投閒檜憾未巳復嗾御史汪勃論邁知其父不靖之謀遂出添差教授福州累遷吏禮二部郎紹興三十二年假翰林學士使金賀登位初欲效范成大有所執奏稍伸國體及至燕為北威所逼踉蹌以歸歸則孝宗已即位矣御史張震以邁使北辱命論罷之俄起知泉州召除起居舎人乾道三年直學士院仍參史事其父與兄皆厯是職邁又踵之六年出知贑州徙建寧府知婺州明年召對首論淮東邊備上嘉之以侍講同修國史俄拜翰林學士晩以端明殿學士致仕卒年八十諡文敏所著有容齋五筆夷堅志行于世駕幸玊津園喜晴應制五更猶自雨如麻無數都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公小試施生妙帝力堪同造物誇上苑春光無盡藏何須撾鼓更催花雙林寺見栁書幽谷雙林寺荒凉得遠尋誠懸遺墨在諫筆想心箴問鑄堂澤國春寒未見花一江流水夕陽斜我來試上津頭望問鑄堂前有幾家呉儆字益恭紹興間進士厯官知邕州軍州轉秦州主台州崇道觀卒淳熙中賜諡文肅與張南軒吕東萊諸賢友善學者稱為竹洲先生題騎牛圖陳仲舉賢良熙寧中言新法不便謫南康酒稅豢兩黄犢時與劉凝之跨之遊廬山李伯時繪為圖今藏其家汗血聲利塲舉世循一軌霜風老觳觫松路石齒齒牛瘦僕夫疲累累山谷裏兩翁非病狂顧獨不取彼牛背有佳處未可與俗子夷齊向千載凜凜有生氣試問齊景公烏用馬千駟次韻南軒先生榕溪閤閤山谷所名也紹聖用事臣黨與紛相樛當代幾忠良一朝咸黜幽太史坐直筆愈黜名愈休消長闗否泰天意匪人謀纍臣誰司城獨為景物留當時西復南萬里不停輈誰知百年定欲起九京遊積莽新陳迹寒泉薦冰甌想當千騎臨水木寒蕭颼我公今伊傅兹焉少夷猶炎方凋瘵餘公來今已瘳榕溪兩甘棠千載誰劣優太史後凋松公如巨川舟宿神潭洪氏醉經堂久客急歸程風雨事馳騖黄流鳴澗壑餘波或被路堆碕珠聨屬石徑齒齟齬籃輿惴危登杖策阻深度行行忽平岡神潭渺東注徒旅鳩後先煙火休薄暮主人延客入丈室千卷聚醉經揭佳名巨軸舒新句我亦舊高陽糟粕嘗已屢人言薄滋味舌根恐未具君但中聖賢當自知佳處獨酌松竹羅幽徑蓬蒿閟荆扉庭前兩梧桐濃綠涵清輝南楹開半山晨夕異煙霏樽酒自賔主禽鳥更塤篪飲罷兩無言還讀淵明詩早起積雨霽窮秋柴扄立清曉溪光照煙岫未覺秋容老溪邊烏臼林他日沒飛鳥濃隂半枯枝殷紅亂衰草搖落想騷人洞庭風嫋嫋吳子既結茆竹洲以娛親復於居之前沼為亭以朝爽名之葢亭西面於晨興看山為宜抱甕自灌園勝遊貴人門有口自酌酒勝與俗人言園中多蔓草晨夕費鋤芟遇夜或風雨安得久盤旋村酒不常有有亦多苦酸而况醉中語繆誤人所嫌不如飽喫飯清風北窗眠眠多則無覺夢境仍多端惟有古斷簡言行皆聖賢讀之未竟篇眵昏如夢間讀竟亦何為聚訟徒喧煩厭煩以靜勝又類枯木禪揠苗不耘苗亡羊兩茫然何如池上亭虚曠可看山山色日夕佳晨興夜氣還宴坐日過午清隂猶未遷西山倦拄頰南山興悠然陽村道邂逅趙仁甫脩途轉清溪孤村帶寒月瀟洒竹間亭意行成小立賔主莫誰何悠然良自適俄有貴公子青驄搖寶勒下馬相勞苦呼酒道疇昔遂令麋鹿姿頗為人物色佳實進霜堅異釀引寒碧興盡還獨歸沙頭寒月白和唐秘校見貽長篇君才離竒卧壑松力回萬牛匠非哲我如坎井可窺底短綆未汲先自竭饑寒驅置簿領中敢遇督郵腰不折憧憧往來窮朝昏貿貿江湖㺯風月邑雖陋室無佳士稍輸城府開私謁平生聞人說項斯秀句清江更清澈鼯徑經雨忽跫然傾囷倒廩不我屑渥洼汗血絶後殿天球河圖合前列要知冷暖須自知䑛蜜中邊不容說癡兒徒癡不了事相畱湯餅未暇設如今豈止傾葢舊向者固已聞風說命之窮達有宿分男兒功名在晩節未應種豆趨南山試一上書干北闕君不見少陵流落老更窮長歎自比稷與契弋陽道中積雨今朝霽東臯晩曰紅人家深蔽樹野水濶浮空久客仍行役青春已過中嶺頭人望處腸斷白雲東晩步水靜偏明眼山高不受塵晴沙棲白鳥野渡集歸人問字誰持酒行歌有負薪娟娟孤月影獨覺向人新送洪史君赴闕移節會府史君文彩漢相如暫向明時綰左符為郡似家身似客視民如子吏如奴魯公金石光千古吏部文章妙兩都戴白垂髫相與語如公治行向來無清明隂雨呈同舍薄薄輕寒作許隂村村花栁為誰新良辰欣見百五日冠者仍餘三兩人冷雨凄風連午夜飛花流水一年春窺園未阻江都興陌上應多翠黛顰寓壺源僧舍燈殘掩卷已三更風露涓涓月滿庭閒撲流螢衝暗樹危梢㸃㸃落寒星簟送人詩代簡幽窗相對小匡牀藍淺紗經冰麝香退食歸來高枕處滿林風雨夢瀟湘劉儀鳳字韶美普州人登紹興二年進士十年始調蓬溪尉監酒稅資陽為掾榮州紹興二十七年起居郎趙逵稱其富有詞華恬于進取召試館職不就遷祕丞禮部員外所草牋奏以典雅著聲尋兼國史院編修進兵部侍郎在朝十年終日閉門親疎罕得見面俸入盡以儲書凡萬餘卷人尤其簡傲御史張之綱論儀鳳私錄四庫書斥歸遂不復起晩知果州卒年六十六自歸州陸行至䕫州五首久客歸心速江流設險艱夢驚人酢甕生出鬼門闗草滿離騷國神依暮雨山未平千古恨慘澹入躋攀飛澑時時雨疎風處處蟬草茵秋卧月雲幕雨垂天夷險籃輿底隂晴鳥道邊荒村無勞酒坐睡媿赬肩户口村無㡬犁鋤力不堪林荒樗櫟壽月黒虎狼貪幽絶雲眠穩清閒谷飲甘故山深未極壤斷葢茅菴倚伏闗羣動幽微各有生燒根移窟穴林曲聚飛鳴瘠土常饑色層坡被惡名經行不唾地山好故畱情曠野無人宿危亭犯雨過嶺雲堆屭贔刹海現兠羅酒觸秋懷壯天留暮色多不勝行役苦裁入竹枝歌報恩寺晩途無力透空關佛土維留草數間决去已曾盟白水重遊仍欲住青山皇華詩句羞懷禄儒帥封章屢乞閒似我更宜歸計早雨蓑煙艇學魚蠻宋元詩會卷三十七
