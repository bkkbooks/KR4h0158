body:
  text: 宋元詩會卷三兵部主事陳焯編張詠字復之濮州鄄城人太平興國五年郡舉進士議以詠首薦有夙儒張覃者未第詠與冦凖致書郡將薦覃為首衆許其能讓是嵗詠登進士乙科授大理評事知崇陽縣用蘇易簡薦入為太子中允歷知麟相二州改濮州知浚儀縣擢荆湖北路轉運使太宗聞其強幹召還超拜虞部郎中賜金紫進樞密直學士同知銀臺通進封駁司出知益州恩威並行蜀民畏而戴之真宗即位加左諫議大夫入拜給事中改御史中丞同知貢舉會奏彈丞相酒過出知杭州未幾復命知益州歸朝掌三班領登聞檢院因患腦瘍乞解任命知并州大中祥符三年召還抗言丁謂王欽若當誅章三上出知陳州卒年七十贈左僕射諡忠定有集十卷悼蜀四十韻蜀國富且庶風俗矜浮薄奢僣極珠貝狂佚務娛樂虹橋吐飛泉煙栁閉朱閣燭影逐星沈歌聲和月落鬭雞破百萬呼盧縱大噱遊女白玉璫驕馬黃金絡酒肆夜不扃花市春漸作禾稼暮雲連紈繡淑氣錯熙熙三十年光景倐如昨天道本害盈侈極禍必作當時布政者罔思救民瘼不能宣淳化移風復儉約情性非方直多為聲色著從欲竊虛譽隨心縱貪攫蠶食生靈肌作威恣暴虐佞罔天子聼所利惟剝削一方忿恨興千里攘臂躍火氣烘寒空雪采揮蓮鍔無人能卻敵何暇施擊柝害物黷貨輩皆為白刃爍瓦礫積臺榭荆棘迷城郭里第鎖苔蕪庭軒喧鳥雀斗粟金帛酬束芻綺羅博悲夫驕奢民不能飽葵藿朝廷命元戎帥師蕩凶惡虎旅一以至梟巢一何弱燎毛焰晶熒破竹鋒熠爚兵驕不可戢殺人如戲謔悼耄皆麗誅玉石何所度未能剪強暴爭先謀剽掠民生計空賒死心愁隕穫四野搆豺狼五畝孰耕鑿出師不以律餘孽何由卻鄙夫識蜂蠆寡術能籠絡邉郵未肅清何顔食天爵世方尚奔馳誰復振蹇諤黃屋逺萬里九重髙寥廓時稱多英雄才豈無衛霍近聞命良臣拭目觀奇略縣齋秋夕才薄難勝任空銷懶惰情公堂羣吏散苔地亂蟲聲隔嵗鄉書絶新寒酒病生方今聖明代不敢話辭榮登麟州城樓莫問戎庭苦髙欄日夕攀時清官事少邉靜戍人間雉堞臨寒水穹廬倚亂山皇恩正無外不擬更移還送别蘇寺丞公身多不定何路慰飄離莫以微言合苦將幽思悲山程朝醉少雪屋夜眠遲即問逢春約芳菲折贈誰登黃鶴樓重重軒檻與雲平一度登臨萬想生黃鶴信移煙樹老碧雲魂亂晚風清何年紫陌紅塵息終日空江白浪聲莫道安邦是髙致此身終約到蓬瀛金陵郡齋述懷傍人往往羡清途野逸情懷亦自扶官舍四邊多種竹潮溝一面近生蘆病嫌見客低徊甚老覺臨官氣味粗不信浮名是身纍有時間撚白髭鬚遊趙氏西園蜀中春豔世間疏比並陳園恐未如數里花光浮暖日六街塵靜見香車翻空雅樂催歡處入格新詩上板初方信承平無一事淮陽間殺老尚書歸越東舊隱留别秦中知巳客亭楊栁葉初殘歌咽秋空慘别顔吟愛好峯歸越路醉衝寒雨出秦關煙蘿庭户重棲倚漁浦人家舊往還縱使功名無分得免教心在怨尤間再會傅逸人分到知心死不輕幾年曽是愴離情微風吹雨雁初下落葉滿階蟲正鳴燈盡苦嫌論劍略簟涼頻喜轉琴聲從來共約雲泉老肯向人間占好名郊居寄朝中知巳年來流水壞平田客徑窮愁自可憐汀葦亂搖寒夜雨沙鷗間弄夕陽天狂嫌濁酒難成醉冷笑清詩不直錢碧落故人知我否幾回相憶上漁船舟中晚望桃源山仙山初指眼初明倚棹因妨半日程雲裏未忘尋去路世間爭合有浮名嵓空暗老松千尺天靜時聞鶴一聲更謝暮霞憐惜别滿波紅影照崢嶸貽傅逸人少年名節動人羣避俗身居積水濆幾為典衣留逺客半乘欹枕看間雲門連酒舍青苔滑路近沙汀白鳥分誰道無情活黎庶數篇新咏帶南薰按史公幼與傅霖同學既貴之後求霖三十年不可得晚知陳州一日霖忽來謁公問昔何隱今何出霖曰子將行矣來報子爾翼日辭去後一月而公卒據此則傅霖乃學道通仙術者然公屢有會傅逸人詩其蹤迹未嘗疏濶即此作云門連酒舍留客典衣亦非逃世絶俗之流也史所載殆出於小説固未深考歟雙龍寺未踏關陽巳見山木鯨時吼翠微間老僧隨隊看雲起居士忘機共鶴間入眼煙光依砌濕倚空霧氣傍一作繞山環三朝寶訓神明護大讀經章祝玉顔鶴共憐潔白本天姿縱枉泥塵性不卑况是稻粱厭足日好尋煙月卻歸時迹參詩雅何年始名係仙經四海知應到昆丘指來歷曽陪鵷鷺浴華池新蟬脫塵還與比仙遊露腹何妨近品流嫩殼半遺紅藥地細聲偏傍緑楊樓詩家取象吟難盡畫格偷真意不休正好儒林擬緌拂馮唐無苦預悲秋過華山懷白雲陳先生性愚不肯林泉住強要清流擬致君今日星馳劍南去回頭慚愧華山雲雨夜二首四簷風雨滴秋聲醉起重挑背壁燈世事不窮身不定令人間憶虎溪僧簾幕蕭蕭竹院深客懷孤寂伴燈吟無端一夜空階雨滴破思鄉萬里心寄傅逸人當年失腳下漁磯苦為明時未得歸寄語巢由莫相笑此心不是愛輕肥送别王祕丞帝鄉三十年前别江外相逢鬢已衰清論未窮行計速為君臨水立多時聞鷓鴣畫中曽見曲中聞不是傷情即斷魂北客南來心未穩數聲相應在前村錢易字希白俶之從子年十七舉進士試崇政殿三篇日未中而就自此以才藻知名太宗嘗嘆世無李白蘇易簡曰今進士錢易其人也欲召置翰林不果真宗朝再舉進士以第二人中第除祕書丞通判信州改太常博士直集賢院遷尚書祠部員外郎擢知制誥官至翰林學士儤直未滿卒仁宗憐之召其妻盛氏人禁中賜以冠帔有集一百五十卷溫泉詩悲哉天寶時帝耄政不修寵幸尊婦人隂極陽巳柔外戚盛本枝櫛比封列侯丞相大將軍備位甚悠悠天下安既久積漸力不周車服金玉煥黎庶飢寒愁驪山溫泉宫晝幸與夜遊一遊百司備萬費一日休誰能心自快化作社稷憂國忠恣吞噬林甫懷姦偷缺雛據太原鐘鼓無許收黃塵滿長安慘黷九廟羞唐天未使絶返正知疾瘳自兹遊賞地荆棘生荒秋舊物悉巳廢蜘蛛挂重樓覽者咸寒心一過三回頭因知帝王業堅固宣鴻猷豈可信嗜欲侮弄生瘡疣西遊曲花銷秋老白日短敗紅荒緑迷空館擬將清血灑昭陵幽谷蛇啼半山晚十年辭家勤獻書王孫不許延公車江頭柤廟祭無日重門生草寒離離我有黃金三尺劍姦骨餘䀶古波艷佩入函關無故人玉握凋零七星暗南兵曽見南兵苦征遼事一如金瘡寒長肉紙甲雨生蛆山小虀霜骨河枯膾腐魚黎元無處哭丁户日相疏韓丕字太簡華州鄭人幼孤貧有志操年長始學文太平興國三年進士嘗著孟母碑返魯頌人多誦之授大理評事通判衡州用石熙載薦試中書擢著作佐郎直史館歷知制誥丕文思艱澀宰相以其稽緩書命常加督責積不能平乃表求外郡出知虢州太宗嘉其沖淡自處召為翰林學士終以遲鈍不敏難任禁近三出典州就加禮部侍郎大中祥符二年卒寄嶽陽劉從事秋來憶故人寓目臨大野逺近聞清商依稀奏豳雅經霜樹半紅無風葉自下一片洞庭心聊憑塞鴻寫菊冷淡花枝寂寂闌只緣開晚少人看若教總似陶潛眼肯向芳春艷牡丹唐異文鑑載詩而履歷莫考但其警句在宋中葉時巳盛傳自是前輩勝流未可與茫無籍里者同論也塞上作防秋人不到萬里絶妖氛馬放降來地雕盤戰後雲月依孤壘沒燒逐逺荒分未省為邉客宵笳懶欲聞間居書事幽居輕宿雨屐齒偏林塘一境無過客千山自夕陽晝禽多獨語夏木有餘涼招隱詩慵寄時清誰肯忘羅處約字思純益州華陽人父濟仕蜀歸朝至太常丞處約登太平興國中進士知吳縣時王禹稱知長洲縣日以詩篇唱和蘇杭間多傳誦後並召直史館處約終荆湖路巡撫年三十三泛太湖三萬六千頃湖侵海內田逢山方得地見月始知天南國吞將盡東溟勢欲連何當灑為雨無處不豐年潘閬字逍遙錢塘人與王禹稱孫何魏野輩遊處最歡放懷湖山吟詠自適人以謫仙擬之敘吟髙吟見太平不恥老無成髮任莖莖白詩須字字清搜疑滄海竭得恐鬼神驚此外非關念人間萬事輕夏日宿西禪此地絶炎蒸深疑到不能夜涼知有雨院靜若無僧枕潤連雲榻窗明照佛燈浮生多賤骨時日恐難勝嵗暮自桐廬歸錢塘晚泊漁浦久客見華髮孤棹桐廬歸新月無朗照落日有餘輝漁浦風浪急龍山煙火微時驚沙上雁一一背南飛落葉片片復落落園林漸向空幾番經夜雨一半是秋風靜擁莎階下間堆蘚徑中谷松與巖檜寧與此時同渭上秋夕秋色滿晴川登臨渭水邉殘陽初過雨何樹不鳴蟬極浦涵新月孤帆沒逺煙漁人空老盡誰似太公賢望華山髙愛三峯插太虛昂頭吟望倒騎驢旁人大笑從他笑終擬全家向上居宋太宗晚年燒丹閬曽獻方書及帝升遐懼罪乃變姓名匿舒州灊山寺為行者後真宗赦其罪以為滁州參軍卒路振字子發永州祁陽人淳化中進士試巵言日出賦太宗嘉其典贍擢置甲科由通判邠州召直史館大中祥符初使北歸撰乘軺録以獻擢左司諌知制誥振文詞溫麗屢奏賦頌為時輩所稱尤長詩詠卒平五十八伐棘篇伐棘何所山之巔秋風颾颾棘子丹折根破柢堅且頑斸夫趦趄汗汚顔攢鋒束芒趨道還之森森繚長藩暮冬號風雪暗天漏寒不鳴守犬眠主人堂上多金錢東陵暴客來窺垣舉手觸鋒身隕顛千矛萬戟爭後先襟袖結裂不可揎跖破指傷流血殷神離氣沮走蹁躚數尺之墻弗復攀無知小醜騷河壖朔方屯師連七年木波馬領沙填填氣脈不絶如喉咽官軍虎怒思吼軒強弩一發山河穿將不叶謀空即安玩養蟻寇成凶顛推芻挽粟徒喧喧邉臣無心靖國艱為余諷此伐棘篇种放字明逸河南洛陽人性沉默好學少志山林奉母隱終南豹林谷用張齊賢薦召赴闕授司諫進右諫議大夫真宗眷遇特厚始終不衰晚節耽名利時論薄之夏日山居隂隂林木靜寂寂無人境紅綻紫葳香嵐沈玉膏冷看雲時獨坐慎事常中省何客馭風來新篁動疏影諭蒙詩大瀛卑百瀆自成浮天潯崇丘下纍塊竟為蔽日深王者在謙小夙推堯禹心拜言尊賢仁慎德棄珠金自滿九族散匪驕百善尋炳兹夏商鑒滅國因誇淫酬陳齋民見寄竹扉常晝掩幽僻置身安自委漁樵分因思出處難周庭方設燎漢將尚封壇莫問煙霞意人寰事萬端冦準字平仲華州人太平興國中登進士時年十九淳熙五年參知政事定策立真宗為太子景德元年拜平章政事決親征之策封萊國公以丁謂之譛貶雷州司户卒諡忠愍暇日遊建平三閭故里廟貌荒涼慘動耳目噫賢者之祀世不絶享郡無正人遺棄若是感事傷俗因留斯句人生若逺遊多是悲登眺况復念三閭遺蹤良可吊道直出章華才髙逐邉徼寃聲噴夜江愁色迷煙嶠斷碑沒敗莎古木吟荒廟祠破少薦馨岸峻稀停棹神容漬老苔壞壁通殘照舊徑失朱門空庭起寒燒餘基雖索寞清問長光耀旌賢誰再興勿使過者誚水閣晨起板閣長晏眠偶獨起清旦月落簷鳥語煙開客船散長江色自澄汀樹聲空亂羣動又復然勞勞可長歎晚望有感出門望寒野四顧惟椒坡憶昔楚大夫還此情如何殘陽半明雨水落西風多因同下蔡恨不覺增悲歌長郊雨餘逺樹減翠新蟬忽鳴激耳嘹唳久客孤坐情如何哉形之於文聊以自遣遙山夏雨歇逺樹涼風至憑欄偶開襟新蟬動秋思沙溪潔細流庭木驚踈翠節候又復然幽憂斯所萃芳嵗若奔流羲光不停轡感物悼前期誰知此時意江南春波渺渺栁依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸春日登樓懷歸髙樓聊引望杳杳一川平逺水無人渡孤舟盡日橫荒村生斷靄深樹語流鶯舊業通清渭沈思忽自驚再歸秦川阮路何方盡西歸興未勞河流經陜狹山色入秦髙返照明秋壘孤村接暮濤還如丁令至故里滿蓬蒿秋夜勉友西風驚萬木危坐思悠哉故國經年别秋鴻半夜來人應多棄善天豈不憐才休學嚴夫子荒涼老釣臺秋日原上蕭蕭古原上景物感離腸逺嶠收殘雨寒林帶夕陽溪聲迷竹韻野色混秋光吟罷還西望平沙起雁行秦中感懷寄江外知已念子隔江海浩然時已秋蟬鳴關外樹人在水邉樓髮白猶搜句時清尚旅遊遙思當永夜不寐向孤舟水村即事虛齋臨逺水吟釣度朝晡葦岸秋聲合莎亭鶴影孤片雲藏疊巘野燒起寒蕪獨步時吟望離人隔五湖冬夜旅思年少嗟羇旅煙霄進未能江樓千里月雪屋一龕燈逺信憑邉雁孤吟寄嶽僧爐灰愁擁坐硯水巳成氷感興寄蓮嶽一二詩禪友西風傷逺别前計竟成非芳草此時暮故山何日歸禪應同雅道貧合長天機翻憶雲浮侣無憀對夕暉湖上作極目望南浦望中生逺思雁沈芳草渡燒斷夕陽陂嵗月寒萍梗江山念别離惟餘清夜夢暫與白雲期楚江夜懷西風生逺水蕭颯度吟臺明月夜還滿故人秋未來寒蛩啼暗壁敗葉下蒼苔誰念空江外年年首重回送人客亭殘照裏歌闋獨南行芳草無斷色旅人多别情逺塗方不極長笛更飛聲莫動鄉關念徒令白髮生巴東驛秋日晚望楚驛獨間望山村秋暮天數峯橫夕照孤笛起江船遣恨須言命冥心漸學禪遲遲未回首深谷暗寒煙東歸再經峽中復命經三峽波瀾極目愁片雲生斷壁孤石礙中流道路連巴塞風煙接楚丘重來登望處因念昔年遊荆南秋望西風吹户牖獨自客荆蠻積水浮秋漢微陽淡逺山蟬稀疏葉盡雨歇片雲間何日忘簮紱深居石室間夜泊江上嵗暮峽中村維舟古樹根羣峯初落月後夜獨聞猿流水自無盡客愁那可論平明離楚岸迢遞指吳門應制賦牡丹花時正言直館栽培終得近天家獨有芳名出衆花香遞暖風飄御座葉籠輕靄襯明霞縱吟宜把紅箋擘留賞惟張翠幄遮深覺侍臣千載幸許隨仙仗看穠華巴東寒食春雨蕭蕭寒食天逺行猶在楚江邉人思故國迷殘照鳥隔深花語斷煙薄宦未能酬壯節良時空自感流年因循未學陶潛興長見孤雲倍黯然過霧山青燈古殿枕寒溪門外天垂斗柄低啼鳥不知春向背落花依舊水東西半橋霜月光相照一帶松煙色未齊誰料百年榛莽地香雲今日繞輪蹄南浦春色入垂楊煙波漲南浦日落動離魂江花泣微雨送轉運梅學士進邉郡悵飲惜離羣窮邉去路分雪深山館夜孤雁背燈聞初夏雨中緑樹新隂暗井桐雜英當砌墜疏紅重門寂寂經初夏盡日垂簾細雨中歸州留别傅君楊栁如絲拂畫橋此中留語欲魂銷還愁别後巴東館獨聼空江半夜潮栁曉帶輕煙間杏花晚凝深翠拂平沙長條别有風流處密映錢塘蘇小家無題金甲珠襦鎖繡扄杜城殘月葬娥英春風候館花如雪空有鶯傳度曲聲南平驛心隨流水還鄉國身向青山上屈盤逺夢不成秋雨細西風一夜客亭寒舂陵聞雁危欄秋盡偶來憑霜落秋山爽氣澄誰道衡陽無雁過數聲殘日下舂陵秋日栁衰蟬噪寒煙沒地逈山遙暮雨收宛是昔年秋氣味只添多病與離愁輦下春日雨餘宫闕麗春隂三月花光照上林誰倚青樓望歸騎日斜南陌栁煙深錢惟演字希聖吳越王俶之子從俶歸朝為神武軍將軍博學能文詞召試學士院以笏起草立就真宗稱善改太僕少卿歷知制誥給事中翰林學士遷尚書工部侍郎仁宗即位進兵部初附丁謂以傾冦凖後復擠謂自解宰相馮拯惡其為人罷為鎮國軍節度改武勝軍節度使雅冀柄用抑鬱不得志而卒太常張瓌請諡文墨詔覆議改諡曰思惟演文詞清麗與揚億劉筠相上下所著典懿集三十卷槿花綺霞初結處珠露未晞時寶樹寧三尺華燈更九枝亭亭方自喜黯黯卻成悲欲作飛煙散猶憐返照遲秋夕池上圭月上金塘煙容帶水光朱華接蘭坂緑荇溢魚防叢暗禽棲密林疏露下涼秋懷巳潘鬢無奈更啼螿始皇天極周環百二都六王鐘鐻接流蘇金椎漫築甘泉道匕首還隨督亢圖已覺副車驚博浪更攜連弩望蓬壺不將寸土封諸子劉項繇來是匹夫漢武一曲橫汾鼓吹回侍臣髙會柏梁臺金芝霅煜凌晨見青雀軒翔白晝來立堠東溟邀鶴駕窮兵西極待龍媒甘泉祭罷神光滅更遣人間識玉杯南朝結綺臨春映夕霏景陽鐘動曙星稀潘妃寶釧光如畫江令花箋落似飛蚱蜢臨波朱火度觚稜拂漢紫煙微自從飲馬秦淮水蜀栁無因對殿幃詠唐天寶間事山上湯泉架玉梁雲中復道吐瑤光絲囊暗合三危露翠幰時遺百和香任走金雞親便坐更拋珠被掩方牀匆匆一曲梁州罷萬里橋邉見夕陽成都武侯千載有餘靈壘石刀䀶尚未平巴婦自饒丹穴富漢庭還責碧砮征雨經蜀市應和酒琴到臨卭别寄情知有忠臣能叱馭不論雲棧尚崢嶸公子蓮勺交衢接沁園來時十里一開筵歌翻南國桃根曲馬過章臺杏葉韉别殿對回雙綬貴後門歸夜九枝然間隨翠幰歌烏帽紫陌三條入栁煙宋玉章華清宴重遊陪已有微詞更有才神女夢靈因賦感屈平魂怨待招回悲秋千古情難盡障袂何時望可來袛用大言君自許景差無計上蘭臺寄靈仙觀舒職方學士方瞳玄髮粉闈郎絳闕齋心奉紫皇徴士髙懷雲在嶺騷人秋思水周堂間園露草開三徑靈宇華燈燭九光知有美田堪種玉幾時春渚逐歸航無題誤語成疑意已傷春山低斂翠眉長鄂君繡被朝猶掩荀令薰爐冷自香有恨豈因燕鳯去無言寧為息侯亡合歡不驗丁香結秪得凄涼對燭房苦熱赫赫烘霞鬭曉光雙紋枕簟碧牙牀頻傾蜜勺寧蠲渴久捧氷壺未覺涼雪嶺卻思隨博望風窗猶欲傲羲皇更憐乳燕翻飛處深入盧家白玉堂秋日小園碧簟涼生白夾衣廋園秋晚得幽期千房嫩菊金螢亂百葉衰荷鈿扇敧日薄蘚花沿素壁雨淫蛙鼓占清池翛然自合蒙莊趣誰識無心似標枝休沐有懷雕盤瓊蕊冰去聲寒澌密樹蟬嘶下直時更賦新詩答靈運不將團扇隔元規經旬緑草沿階上盡日流風轉蕙遲秪待觚稜照初旭橫經還集絳紗帷艷體三首絳縷初分麝氣濃絃聲不動意潛通圓蟾可見還歸海媚蝶多驚欲御風紈扇寄情雖自潔玉壺盛淚秖凝紅春窗亦有心知夢未到鳴鐘巳旋空耿耿寒燈照醉羅看朱成碧意如何虎頭辟惡無妨枕犀角涼心更待磨惟有幽蘭啼月露可將尺素託雲波山屏六曲歸來夜秪恐重投折齒梭香歇環沈無限猜春隂濃淡畫簾開有時盤馬看猶懶盡日投壺笑未回蝶怨豈能重傅粉雉驕疑待更求媒啼妝不治金翹暗腸斷溫郎玉照臺直夜千廬徼道發傳呼帝宇沈沈璧月孤重燎秖聞喧鬬鼠危枝誰見繞驚烏石螭霜重連鈎盾玉虎氷消下轆轤素髮自憐同騎省一竿何日釣秋鱸淚家在河陽路入秦樓頭相望秖酸辛江南滿目新亭宴塞外傷心故國春仙掌倚天頻滴露方諸待月自涵津荆王未辨連城價腸斷區區抱璧人送許洞歸吳草薰風暖接長亭一曲驪歌倒醁醽懷古更投玄石賦艤舟聞采紫莖萍醉拋隋岸楊花白吟過淮山桂樹青可使長離終鎩羽淵雲詞藻出天庭初秋屬疾蜜脾初滿石榴紅秋意先侵玉井桐薤簟自憑南郭几縠巾猶領北窗風雲迷候雁辭遙塞露濕飛螢起暗叢病巳不須傳七發粉箋香墨寄詩筒懷舊居武祀仙壇接里閭琴堂水閣半凌虛竹林舊享銅盤食門巷今容駟馬車楚國大言登宋玉漢家答詔用相如未知笳鼓歸何日空鎖鱣庭春草疏小園秋夕潘鬢秋來已自傷庾園時物更荒涼紫梨半熟連紅樹碧蘚初圓亂縹墻月露暗從孤桂滴水風猶獵敗荷香滑稽還喜鴟夷在欲取臨卭美酒嘗與客啓明越溪微霰灑寒梅家近嚴陵古釣臺夢欲成魚通夕去書曽憑犬隔秋回干時不為侏儒粟樂聖猶銜叔夜杯帝右豈無楊得意漢宫須薦長卿才送客不及橋濶川長恨巳多斑騅嘶斷隔雲羅遙山幾疊迷朱斾芳草經時駐玉珂髙鳥可能追夕照緑楊空自拂微波短轅白鼻何由得目送層樓一雁過再次韻和大年雲變危峯萬里橫簟鋪湘水一牀平紅蘭受露消晨渴緑蕙翻風析夜酲逸少偶書葵扇貴羊欣間臥練裙輕無妨天下芝泥熟獨看瑤光近太清館中新蟬習習光風泛紫蘭新聲含怨日將殘自憐伴省成團扇誰許迎秋集武冠委蛻亭臯隨木葉飛緌雲表拂仙盤青蔥玉樹連金爵不覺醯雞競羽翰梨紫花青蒂壓枝繁秋實離離出上闌東海圎圭無奈碧嵰山甜雪不勝寒已憂仙佩懸珠重更恐金刀切玉難自與相如解消渴何須瓊蕊作朝餐栁絮三月江南花漸稀春隂漠漠雪霏霏章臺街裏翻輕吹灞水橋邉送落暉陸凱傳情梅暗落韓憑遺恨蝶爭飛不知化作萍飄否惟見紛紛上客衣再賦荷花玉甃引清泉風髙露白天盈盈臨一水羃羃隔長煙巳分蘭芝溺仍憂趙后仙鮫絲衣更密珠蚌淚長圎瑟怨來湘浦鴻驚近洛川金塘正斜照誰倚木蘭船上已玉津園賜宴漢家傳洛飲楚俗泛蘭泉玉液初頒酒金盤屢擊鮮珥彤尋竹籞傾蓋集芝㕓錦羽翻晴旭霞英落暖煙雅音和舜樂睿澤洽堯天更聼承雲曲同歌在鎬年致齋太乙宫齋潔奉惟馨瑤臺獨自升樓迷五里霧壇燭九枝燈珠館來青雀璇題射玉繩疏鐘平野濶古柏夕霏凝鶴扇真窺月仙衣可鏤氷春茶泛雲液曉飯薦蘭蒸鍊藥疑洪井藏書類羽陵回瞻大帝室飛檻更長憑夜宴昨夜宴南堂華燈燭九光削青爭落筆舉白鬭飛觴祇覺輝裴玉寧思夢謝塘解煩憑蜜勺藉俎半蘭房促席風絃怨開簾月露涼酡顔君莫訴西北轉銀潢宣曲絳縷初分後銀環未解時巳障紈扇笑猶捧玉壺悲乞巧長生殿迎風太液池雕屏涵火齊寶帳隔琉璃欲買詞人賦空傳狎客詩蔗漿消內熱瓊蕊療朝飢綺蒂桃初熟紅心草欲披凌波渡羅襪向日翳華芝素臉分甘奈香津滴紫梨龍梭隨振素獺髓補凝脂蓬餌重陽節金針七夕期玉膏當淧溢翠蓋逐葳蕤弦急哀隨指歌長恨入眉青鸞惟有舞赤鳯可能疑下蔡迷還易平陽破未知髻髙叉自墜腰細佩長垂出恐嚴鐘晚歸嫌細幰遲轆轤驚曉夢鸚鵡漏春思魂怨惟愁斷腸柔巳自危壁璫螢影度瓊户蘚花滋掩鼻讒難訴披圖悔豈追秖應金帶枕聊為達微詞别墅别館斗城傍斜軒映曲房蒼頭冠緑幘中婦織流黃復道登平樂期門集未央意錢梁冀宅挾瑟莫愁堂走馬章臺栁停車陌上桑彀弓隨寶帳投轄付銀牀出戴繁星急歸衝細雨忙曽過阿君宿醉舞起跳梁清風溽暑迎秋盡涼飈逗曉回墜桐侵玉井拂栁度章臺已覺雲翹動還驚月幌開鮫簾移亂影瑤瑟泛餘哀扇掩藏鸞羽荷傾側露杯正當河左界不待雨東來自好傳垂翼寧勞起死灰楚宫誰第賦宋玉最多才屬疾積日勞無補彌天疾未瘳馬卿非避事盛憲自多憂目眩花成果心驚蟻鬬牛豳氷那浣熱洛笛更生愁拂枕窗風度穿簾隙日流唾壺從巳缺博齒亦慵投發篋尋桐籙支頤動越謳平生江海志夕夢繞滄洲荷花水濶雨蕭蕭風微影自搖徐娘羞半面楚女妬纎腰别恨拋深浦遺香逐畫橈華燈連霧夕鈿合映霞朝淚有鮫人見魂須宋玉招淩波終未渡疑待鵲為橋戊申年七夕烏鵲飛來接斷雲秪貪清淺渡星津不知一夜支機石卻屬乘槎上漢人玉露金河皓氣涼辛夷車轉桂旗香姮娥可是多猜忌不駐瓊輪放夜長一歲佳期一夕過羽旗雲蓋涉微波明朝若寄相思淚玉枕金莖得最多青鳥當時下紫雲綺囊書祕露桃新莫嫌夜半移牀逺朱雀窗中别有人驪阜凌雲對玉鈎千門髙切絳河秋欲聞天語猶嫌逺更結三層乞巧樓宋元詩會卷三
