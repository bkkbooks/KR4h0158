body:
  text: 宋元詩會卷六十九兵部主事陳焯編杜瑛字文玉其先霸州信安人金將亡避地河南緱氏山中時兵後文物凋喪瑛搜訪遺書盡讀之得其指趣古今得失如指諸掌間關轉徙教授汾晉間田中書鈕祜祿圭開府于相瑛赴其聘遂家焉與良千畝辭不受歲巳未世祖南伐至相召見問計瑛條對稱旨上悅曰儒者中乃有此人乎中統初詔徵瑛時王文統方用事辭不就杜門著書一不以窮通動其志年七十遺命二子處立處願曰吾即死當表吾墓曰緱山杜處士云所著春秋地里原委語孟旁通皇極引用皇極疑事極學律吕律厯禮樂雜志合文集共七十卷留春曲絮飛冷屑龍蟠玊花隕香摧鳳銜燭批頰深林呌新緑倚闌人唱留春曲春光欲去如死灰明年暖風吹又來何如日日長相守典衣共醉花前杯殷勤留春春不住白日西馳水東去鏡中絲髮奈老何君當持杯我欲歌弔故宫月上觚稜椒壁濕飢烏啄碎琅玕石劫灰飛盡海揚塵廢殿荒臺土花碧洛陽書生汴梁客一夜春風頭欲白尊中賴有酒如泉醉倚寒窗破愁寂秋思壯心忽忽劇縣旌秋氣能令客子驚白雁不聞雲外過清霜先向鬢邊生銅駝巷陌周東土金鳳樓臺鄴北城千古繁華俱一夢空餘草木戰風聲征南口號春早雲南麥已黃瀘江蒸霧水如湯馬蹄半帶隂山雪變作人天六月涼劉詵字桂翁廬陵人幼失父自知樹立年十二作為科場文有老成氣象既冠重厚醇雅以師道自居教學者有法聲譽日隆江南行御史臺屢以遺逸薦不報詵為文根本六經融液今古而不露其踔厲風發之狀四方求文者日至于門其集曰桂隱詵所號也年八十三卒感興四首昔在唐虞時萬象昭白日聖人垂龍衣巖殿吹鳳律朱草聨階生景星當戶出羣賢布天下野穀盡嘉實嗟哉戰國交九宇淪戈戟糟粳委仁義軒蓋寵權術孟軻起驅馳白髮颯垂軾空餘七篇書千載資歎息姬室逸其御天下皆兵交楚武首僭王名器從此淆仲父佐伯業仗義何嘐嘐正辭削其僭王綱可復昭奈何舍近事逺問南舟膠堂堂匡周師所得僅一茅所以魯仲尼加之器小嘲良會不再得誰能遏秦崤秦人燔詩書聖道散若煙宫殿干斗極東遊問神仙漢祖祠孔子遂為百代先大哉禮樂意所見何卓然因勢導其趨勇赴如決川但恨羣臣間餘習猶櫜鞬良平雖善慮不在三代前安得豁達資一見賈少年峨峨蓬萊山白玉為洞房仙人雲霧衣侍女氷雪妝丹霞縹眇中往來皆鳳凰借問羣仙人何者為秦皇羣仙顧我笑振袂凌風翔我有金鼎丹鍊之踰千霜相期息瑤樹歲晚何渺茫吾聞仙人家美酒如瓊漿長生所願求得醉亦可償春寒間居西里夜圍燭東鄰朝玩山相視無羡心豐約自不關芳草滿幽庭日晏人未還久隂忽微暄孤禽語花間古意昨日苦大燠酬以今日寒天道極必反人事盛必刓剛桑有迭施消長乘兩端彼美者誰子一生困辛酸日宴食未炊冬月衣不完著書垂白髮門草秋漫漫天道何由詰俯仰良自歎詩窮作詩能窮人誰能忍不作但見平生愁霏霏筆端落朝騎孤鳳凰暮駕兩黃鶴手攜王子晉吹笙上寥廓人言忌太髙下筆寧淺弱窮通信有命詩道未可薄天道種稻南山邊雨足多稻穗一朝疾風來腐折不可刈東家不知耕雨粟夜滿地問渠安得之飽食了無愧我欲廢鉏耰雨粟非可覬人事且自盡天道勿徒恃雜詩空山有一婦二十失所天貞心比堅石血淚迸湧泉寒燈役機杼拾穗裙不完婚男與嫁女辛苦雪滿顛自謂分當爾節義何足言城中髽孀姬潛好留少年門前立旌木世人何由傳古詩贈張漢臣遊金陵古詩出性情聲在閭巷間採之被絃歌聽者醇風還大音既寥濶羣喙何間關燕碈混良璞楚菉藏崇蘭妙理忽有合正在不可刪秋髙星河空天風吹珮環石人石門何年啓疑與開闢俱上有遺世人形軀略糢糊山空明月寒往來誰與徒吾聞晉榆石能言禎妖樞又聞榖城公頗窺隂符書叩之了不應無乃嗔我愚中秋故鄉南鄰楊氏招飲老來歸故里百事非故情惟有山間月猶作兒時明是時秋且半夕氣忽已清南鄰招客飲步聽危澗聲月色酒中亂樹影盤中橫鄉曲佳節意風露白髮莖我懷豈在酒酒觴且徐傾芍藥夏早衆緑翳階花始獨開窈窕專后德深房出徘徊翠蕤擁帝輦手擎紫霞杯夜永宫月酣餘香散蓬萊曉行星明天宇迥山驛鼓初發行人稍已動露氣漫野白方塘浸道隅荒荒似寒月日出炊煙橫雞聲隔林樾呈須溪劉先生仙人三山來袖有五尺琴緑尾龍門植朱絲軒轅音攜之曾謁舜三奏鳳舞庭風髙天路斷歸見崑崙青起視八極間琅琅成孤鳴緑海凝不動白日回夜明時違地亦失猶使天下傾但恨無子期彼直樂其名蕭孚有以左耳陶瓶對客煎茶名快媳婦坐間為賦十六韻南中土埴堅妙器出陶火控摶雅以靜整削平不頗渾淪象瓜團短小類橘顆粵椰實盡刳蜀芋膚未剖喙如柄揭西耳若栁生左油滋飾外煆灰坌增下裹高齋奉煎烹湯勢疾軒簸狹束蟹眼髙薄逼車聲播俄頃潤渴喉巧婦愧其惰乃知轉旋工政要傾酌妥主翁嗜吟詩佳客時滿座呼童汲清深瀹雪澆磊砢急需既能應間棄無不可東家重函鼎菌蠢腹徒果美人預為虀常恐遲及禍何如且小用慎勿誚么麼贈趙中山中山本舊公子于道有得蚤遊京師為諸名公所敬先生昔佩青珊瑚錦袍白馬玊雪膚夜遊鈞天聽廣樂帝旁分食瓊宫酥天風千丈吹緑髮紫鴛七十黃流蘇手㪺北斗酌玉女麻姑曉報滄溟枯東方烏啼白日薄姓名盡變騎鯨魚華池內養九芝露金房獨照千年珠肩摩淨名孔雀扇足躡子晉芙蓉車吹笙看月薊門市從者皆服貂襜褕羣真虛左願聞道親寫文字為其徒少年經世二十䇿海水洗盡無留餘始知古來忠孝士變幻不與常人俱君不見韓亡流落子房子千秋萬歲傳編書讀此可知天水剩流亦多變姓名入道者彼承旨公獨何心哉兒時喜見雪兒時喜見雪癡待天雲黃晝觀捲箔恨暝色夜聞欖裘思曙光佳人踏靴映玊靨獵士鞚馬驂白凰千金髙樓換美酒樓外三尺酒百觴寶香繡帳春色暖俯視萬里成大荒便從淮城取元濟直至延海歸蘇郎邇來悔狂年已過閉門讀書學堅卧蒲團竹几聽蕭瑟畏寒自補油窗破欲論往事誰復知但見羣兒似昔時昭君曲漢宫美人人不識初出宫門天下惜漢宫歌舞人不傳琵琶馬上行人憐君王含情重悽惻只在殿前留不得人生豈是無知音知音已晚徒傷心天寒衰草沙似雪舉頭惟見漢宫月十年漢使去無蹤夢中長在明光宫國家和親四海樂不怨君王悲命薄君不見秋風茂陵英雄才萬里江都嫁沙漠前醉歌天青青造就萬古事不平月皓皓照盡世間人醜好人言天月俱無心平頗醜好皆由人我言人生無智力明月青天愁所集簞瓢貧士年少死相君蒸乳老無齒販屠市兒萬户侯著經儒生白滿頭李君晚役將軍府文昌碑起韓碑仆啓期九十無一兒遷哲多孫披籍知雄狐妓圍叉列屋朝雉悲歌夕牧犢楚和抱璞哭山中燕人寶石緹十重百年老樹同一幹半作犧樽半溝斷古來恨事何其多青天明月奈爾何我有一斗酒澆君肝肺之嵯峨青天明月奈爾何後醉歌天如輪我行與之周八垠月如璧我坐對之居一室買酒酹月月滿巵買酒澆天天飲之長風吹天碧萬里纎雲飛盡月如水黃金滿塢董將軍長安夜炬髙焚雲胡椒八百元相國翠珥寶叉落荆棘征南竒勳泣杜郵屬鏤憤入洪濤秋禹山血濺麒麟閣機雲夢繞華亭鶴波心詞臣溺滿衣何如讀書閉山扉斷頭博士窘乘障何如得句支藜杖山中老人無機權有酒只勸月與天青天明月俱欣然貴賤吟庚午大飢天下死者相望秋大熟榖反大賤春大飢斗粟不易娉婷姬秋大熟三錢直買一斗粟人間貴賤反掌異賤未可輕貴難恃君不見土龍百拜還為塵病駒秣豆乘錦裀人間貴賤元無真題劉平妻殺虎圖君不見杞梁妻夫死但能哀聲悲又不見泰山婦虎食其夫哭當路人生伉儷重百年閨房無力救所天空餘肝腸裂千寸髙徹遙漢卑重泉何如濱州劉平妻獨勇殺虎奪夫曳其踵大兒三歲能助力小兒坐席癡不恐沙空月落山谷深妾命何輕夫命重當時視虎如狐眼中無虎惟有夫一朝義聲震百郡裴旻李廣皆庸奴古來君臣亦如此患難政要忠良扶何為當熊待馮媛何為敵來使鶴戰射猿老將世豈多搏獒車右今不見秋風展圖毛髮起始信人間有倫紀嗚呼河東女兒抉眼去其夫若見此圖當顙泚九日郊行九日登髙處心情歲歲同平田初穫稻曠野屢聞鴻風景悲塵世江山閲寓公茱萸朝雨濕愁報緑樽空酬以芳見貽山露沾琴潤山風到鬢寒酌多迷夢覺語久雜悲歡身豈如泥爪鬚難染石肝不知明月在何處是瑤壇和彭琦初見夀陋巷秋風處士家回思千劫算炊沙小年曾似三眠栁老去羞看九日花白髮夜深燈館字蒲團日宴地爐茶故人賸作飛騰祝試聽漁陽一摻撾送劉巨川赴惠州海豐巡檢大博之孫須溪孫子好才名百丈龍山繞屋春文學盡交天下士弓刀更治嶺南民盾頭墨潤長亭雪扇外旗麾列嶂塵若見羅浮花爛熳可能逺寄一枝新間居即事小窗拄頰看雲過不斷東風吹鬢皤松古何知春至早花濃偏值雨來多已安薄相食無肉更覺衰顔酒不酡無力能為移粟政有愁自賦采薇歌彭琦初用坡翁紙帳韻惠建昌楮衾次韻為謝雪綿揉碎密縈連清卧梅花性更便茸暖何須蠻客帳座寒但少廣文氊窗升紅日那知曉夢壓白雲疑近天但恐少陵茅屋漏雨宵沾破不成眠戴表元字帥初慶元奉化人七歲學古詩文多竒語宋咸淳中入太學既而試禮部第十人登進士乙科教授建寧府稍遷臨安教授行户部掌故皆不就大德八年表元年已六十餘用薦起家拜信州教授調婺州以疾辭最後翰林以修撰博士論薦而老疾不可起矣史稱其學博而肆其文清深雅潔化陳腐為神竒至元大德間為東南文章第一人惜其集不多見也門人最知名者為袁桷云飛花行贈馬衢州山上風花山下飛花飛欲盡山翁歸歸遲亦自忘行迹但覺滿地紅依依餘花更惜隨溪去溪上遊人山下路戀家漁父斷來蹤避難劉郎記前度花開花落春風前我昔與翁同少年祇今鶴去但華表何處烏啼悲杜鵑遊人自遊春日暮從翁問花花不語且當向花日日醉醉倒花前學花舞東離湖州七十里泊南潯佳聚落也張帆出東郭沽酒問南潯畫屋蘆花淨紅墻栁樹深魚艘寒滿港橘市晝成林吾道真迂濶浮家尚越吟苕溪六月苕溪路人看似若耶漁罾挂棕樹酒舫出荷花碧水千塍共青山一道斜人間無限事不厭是桑麻送同年潘昌朝客路秋深又送迎狂歌爛飲慰飄零風前數髮莖莖白馬上看山段段青古穴無丹生洞氣髙林有鶴避潮腥明年更欲三茅去擬借新箋道德經送百上人并簡善之聞説西湖已自憐君遊更傍早春天六橋水暖初楊栁三竺春深未杜鵑舊壁草生尋舊刻新巖茶熟試新泉城中詩友曾相識西蜀殘儒解草玄吳澄字幼清撫州崇仁人生三歲頴悟日發五歲勤學夜讀書至旦母憂其過勞節膏火不多與澄候寢然火復誦既長貫穿經傳嘗舉進士不中至元十三年樂安鄭松招澄居布水谷乃著孝經章句校定六籍御史程巨夫奉詔求賢起澄至京師未幾以母老辭歸左丞董士選延之於家親執饋食曰吳先生天下士也既入朝薦澄有道擢應奉翰林文字有司敦勸久之方至聞已有代者即日南歸未幾除江西儒學副提舉以疾去官至大元年召為國子監丞升司業立教法四條未及行一夕謝去俄拜集賢直學士疾作不果行泰定元年充經筵講官修英宗實録成未上即移疾歸詔加資善大夫賜鈔五千貫卒年八十五學者稱草廬先生贈左丞追封臨川郡公諡文正按元儒先後輩出于趙江漢諸公外其著者則導江張䇓蘭溪金履祥休寧陳櫟資州黃澤北海蕭㪺豫章熊朋來等諸所撰述皆有功聖賢甚大惜其詩不傳故于是編莫由采入也題唐隱士盧鴻十志圖嵩髙地中區下有隱者廬兩徵堅不起一志終不渝好爵等浮雲還歸對生徒官為營草堂殊恩耀山隅邇來數百年十境入畫圖之子服儒服浸淫老莊書翛然有仙意生白一室虛三宿戒凝戀十境亦可無送塗君歸浙昨歲抱琴來今兹抱琴去委質隨長風斷蓬與飛絮一家蠡湖南一住西湖東兩地各繾綣寸心漫怔忡浮雲豈無依倦鳥亦有棲迎門稚婦笑索果嬌兒啼歸裝春袖薄荒徑春花落理曲到求凰何人悲别鶴雪谷早行為張允中作路絶人蹤失關隘槎丫老樹森矛介兩間寥廓淨無塵誰剪天花遍飛灑風絮當頭零亂舞兹遊浪説平生快蹇駑瘦骨真耐寒踏破鴻濛新色界豈是提兵李常侍夜發文城薄淮蔡又非直諫韓侍郎逺謫潮陽出秦塞面梨凍坼髭綴銀何事催君早行邁君不見古昔閉門僵卧人髙似灞橋驢背償詩債過枯河髙堂出郭二舍近午憩東陽安樂鎮雙堤對峙似城牆中坳一道如壕甽驅車下坂為溝塍低平盡處還復登半坳一門字斗大濵滄行鹽兩分界不知此是古黃河且行且顧心疑怪前詢父老為余言河北山東此處分古河來自白馬渡東過開州城下去遂達浮光粵魯河入海當年由此處壽王講師欲雪未雪雲黯黑不知此日神仙謫桃實今經幾度紅梅花仍似當年白厭向閩山食荔蕉喜來江浦訪鸞簫廣文客舍寒如許自有春風長藥苗次韻楊司業春夏華榮變衰歇穨飈刮肌山露骨騷人望秋悲泬寥忽見小春梅蕊發頓然喜氣排寒冬不管天令嚴鈇鉞古來蹈道如蹈水與泊與齊偕出沒坐中白晝對羲皇門外黃埃自城闕只憐郭璞注蟲魚或誤蔡謨啖蜞􅒹爭似𡨕冥雲翼逺靜看滑滑霜蹄蹶公桑十畝邇洙泗我菊一區連楚越縣知真樂在曲肱到處扁舟堪散髮我能振袂從公遊分我南溪半風月湖口阻風登江磯山觀濤狂風吹人渾欲倒瑟瑟寒聲動秋草捫蘿徑上磯頭山萬頃江湖波浩渺怒鱗雲鬛奔騰來眩目快心千樣好向曾觀海難為觀回首匡廬青未了玄雲作帽深蒙頭五老藏昻元不老何時月夜水鏡淨漭蕩澄虛納蒼昊著我峰尖伴老人坐看海東紅日杲為舒景春賦東皋東皋種杏者今住杏花村收榖虎衛道銜珠蛇報恩窗紅開曉色草碧驗春溫豈待間舒嘯柏湖真有孫贈裴子晉怪子拋家去歸來非故吾閲人如水鏡知已慎江湖宿雨添新漲春風滿舊廬匆匆又言别聊為賦驪駒和劉尚友挺挺詞林秀栖栖越嶠東幾年淹此鳳何日見猶龍郊畤文中子談遷太史公萬金家寶在昭代定遭逢豫章貢院即事奉和雲林提舉客裏秋光好歸心不厭遲牆低孤塔見院靜一簾垂隔紙聞風怒臨階看日移宛然似三徑未負菊花期貢院中和張仲美牆外浮屠壓古城案頭文字浩縱橫不辭霜鬢年華老又辦天朝歲貢英秋隴故園迷蝶夢曉窗客枕厭雞聲何當孺子亭前去省想髙風浣俗情送丹陵胡道士遊京師逺遊誰為賦新篇來自丹陵小洞天拂日一鞭聊復爾御風雙袂已飄然快看鵬海三千里早證龍沙八百仙莫戀射熊春夢樂贈詩人在斗牛邊次韻胡器之問病鶯聲睍睆燕差池春到間中日更遲偶躡清都陪淨侶誰知勝境即良醫屋頭月上元無夜樹杪風來似有期坐客屢談渾忘答問余還職在何時次韻息窩道人三年隻影落天涯望極南雲眼欲花道上已驚仙枕夢河邊誤泛客星槎棗梨秋熟供新飯桃李春榮滿舊家喜得息窩消息好黃金粲粲待披沙客中即事次韻元復初郊行客中又過二分春聞道千紅百紫新雨到庭隅長芳草日窺窗隙弄遊塵縣知萬里只如此孤坐一堂還可人不信却須凌倒景九天樓閣倚長身題閣皂山漢吳仙迹兩峰齊欲拾瑤華路恐迷寶殿青紅疑地湧林巒蒼翠接天低九重香案分雲篆八景琅函記玊題仙鶴翔空清似水步虛聲在朵雲西用贈李粲然韻述懷故里香粳滑欲流歸田計晚愧遲留縣知海上三山客塵視人間萬户侯南去擬尋吳市卒北來喜共李仙舟玄翁一室渾無白誰識王龔貢鮑優次别易耕雲别去家山經歲年乍歸又著嶺南鞭雙眸眩眊畨船載滿口腥鹹海物鮮胸次氷霜寧受滓世間粉黛自爭妍早來共此青春樂日暖風和無際邊疊葉梅羅浮夢斷杳無蹤氷雪仙姿兩兩逢縞袂怯單寒後襲粉妝嫌薄曉來濃迎風一笑知顔厚臨水相看見影重道眼只將平等視玉環飛燕總天容夜坐物情自適更誰禁草際螢飛鳥宿林魯叟爾來無夢寐蜀莊此去只冥沈客中又見秋風起夜半初聞木葉吟涼意逼人眠不得坐看孤月到天心次韻芍藥寒沍深冬宿異根發榮今日謝春恩淺潮半醉流霞暈清印初昏淡月痕花下蜂狂成勝集草間狼藉到芳樽紫芝興味亦如此誰信京華有綺園次韻牡丹誰是舊時姚魏家喜從官舍得竒葩風前月下嬌嬈態天上人間富貴花化魄他年鎖子骨點唇何處箭頭砂後庭玊樹間歌曲羞殺陳宫説麗華何榮祖字繼先其先太原人金亡徙家廣平榮祖狀貌魁偉額有赤文背負隆起有相者謂曰子位極人臣且夀相也少以吏纍遷中書省椽擢御史臺都事史始折節讀書日記數千言阿哈瑪特專權監察御范方等劾奏甚力阿哈瑪特知榮祖主其謀奏為左右都事以𨽻巳未幾御史臺除治書侍御史升侍御史出為山東按察而阿哈瑪特莫逞其志遷按察河南除雲南行省參知政事以母老辭又拜御史中丞復出為山東東西道按察使召入為尚書參知政事時持論與僧格左以病告未幾起為尚書右丞僧格敗改中書右丞奏行所定至元新格請改按察為肅政亷訪司而立監治之法尋拜昭文館大學士預中書省事又加平章政事卒年七十九追封趙國公諡文憲齋居雜言名教無窮樂真知在暮年中庸萬事畢太極一心全世事頻觀易人情靜看天興來時有句率爾亦飄然郝天挺字繼先出都嚕别旌居安肅州凡五世父巴圖爾于憲宗之世多著武功天挺英爽有志略幼受業元好問世祖召見嘉其容止有旨俾執文字備宿衛春宫久之除參議雲南行尚書省事擢亷訪漢中入為吏部尚書三除外任俱不赴拜中書右丞與宰相論事有不合輒靣斥之成宗崩仁宗以太后命首定大難及武宗入正大統天挺與有力焉自是朝廷大事必召天挺密議始行歷江西河南二省右丞召拜御史中丞出為河南行省平章政事卒年六十七追封冀國公諡文定有注唐人鼓吹集十卷題麻姑壇路入雲關仙境佳瓊田瑤草帶煙霞貯經洞古無遺檢養藥爐存失舊砂青鳥不傳金母信紫鸞應返玉皇家巖扉不掩春長在開盡碧桃千樹花徐世隆字威卿陳州西華人弱冠登金正大四年進士辭職讀書歲壬辰奉母北渡嚴實招致東平幕府俾掌書記壬子世祖召見于日月山時方征雲南以問世隆對曰孟子有言不嗜殺人者能一之世祖曰誠如卿言吾事濟矣中統元年擢燕京等路宣撫使至元元年遷翰林侍講學士兼太常卿俄兼户部侍郎承詔定內外官制七年擢吏部尚書九年乞補外為東昌路總管十四年以按察使提刑山東明年移淮東十七年召為翰林學士以疾辭二十二年再召不起賜田十頃時年八十卒所著有瀛洲集百卷挽文丞相大元不殺文丞相君義臣忠兩得之義似漢皇封齒日忠於蜀將斬顔時乾坤日月華夷見海嶺風霜草木知只恐史書編不盡老夫和淚寫新詩中聨一作精忠貫日徑節凌霜此詩通鑑與稗史俱訛為王磐作今搜得元刻舊本乃知是徐非王也按王磐仕元為翰林承旨承旨正史官也安有史書編不到之慮乎焯於草年前曾序友人周子緼詩覼縷數百言致疑于王不當有是作及覩元刻始釋此疑然前序亦不妨並存耳熊朋來字與可豫章人宋進士元初徴為福建廬陵教授學者稱天慵先生鐵柱詩九牧失貢金司空不行水蛟龍弄波濤魑魅入城市吁嗟清談晉萬事漫不理遂令千載人稽首旌陽子趙世延字子敬其先永古特人祖安札爾幼孤鞠于外大資父卓裕勒嘉訛其音為趙家遂以趙為氏世延天秀發喜讀書究心儒者之學弱冠世祖召見俾入樞密院肄習官政至元二十一年授承事郎雲南諸路提刑按察司判官二十六年擢監察御史與同列五人劾丞相僧格不法其五人皆得罪而世延幸免二十九年出僉江南湖北道肅政亷訪司事踰年除山東亷訪江南行臺侍御史遷安西路總管皇慶二年拜江浙行省參知政事尋召還參大政中書歲餘遷御史中丞劾奏權臣特們德爾罪惡有詔奪官尋升翰林學士承旨進昭文館學士留守大都未幾乞補外拜四川行省平章政事仁宗崩特們德爾復相鋭意報復屬其黨誘世延從弟誣告世延欲置之死賴上護持屢繫得釋仍歷官中外出入不常晚除奎章閣大學士翰林學士承旨中書平章政事魯國公卒年七十七諡文忠代祀南嶽登祝融峰天風吹我躡雲根一覽羣山蟻垤紛瀛海波翻初日上石壇人語半空聞炎荒作鎮荆吳逺元氣流形天地分何日束書煨芋室孤峰絶頂看浮雲商挺字孟卿曹州濟隂人年二十四汴京破北走依冠氏趙天錫與元好問楊奐遊日益知名世祖受京兆分地聞挺名遣使徵召入對稱旨字而不名憲宗征蜀挺謂不宜輕動世祖深然之及憲宗崩世祖北還挺奏當特嚴符信以防姦詐後額哷布格使至軍中執而斬之其效立見中統元年改宣撫司為行中書省俾挺僉行省事進參知政事至元六年同僉樞密院事升副使九年封皇子安西王以挺為王相會同官趙炳死朝廷執擅殺者鞫問伏辜語連挺及其子瓛頌繫久之免死籍其家二十年復樞密副使俄以疾辭卒年八十有詩千餘首尤善𨽻書延祐間贈魯國公諡文定水仙花二首海外三山璧月明人間誰識許飛瓊秋風吹上青鸞背未散天香與素英明月珠衣翡翠裳氷肌玉骨自清涼不隨王母瑤池去來侍維摩病几傍王磐字文炳廣平永年人世業農饒於資金末父禧入財佐軍興補進義副尉金人遷汴舉家避地魯山磐客居貧甚年二十六擢正大四年進士授官不赴肆力問學轉徙淮襄間久之北歸楊惟中嚴實後先禮聘中統元年拜益都等路宣撫副使以疾免依李璮居青州題其居曰鹿菴有終焉之意及璮謀不軌磐覺之脫身入京師世祖聞之嘉其誠節撫勞甚厚事平挈妻子至東平召拜翰林為學士遷太常少卿乞致仕不允江南既下朝儀官制多賴磐議以定進資德大夫致仕年九十二卒追封洛國公諡文忠澤陽山今晨到谼谷駐馬五松邊山中富清景不暇相周旋瀑布落晴雪金燈開夜蓮空懷上方寺矯首浮雲巔巨源相過話舊有感中統三年春二月變起青齊帶吳越鯨鯢轉側海波翻城郭橫尸野流血我時辛苦賊中來兵塵糢糊眼不開妻孥棄捐豺虎口飛蓬飄轉無根荄天寒日暮齊河縣破驛荒涼絶煙爨騎行驛馬鈍如蛙官吏散逃無處喚與君此地忽相逢行臺郎中氣勢雄憫我白頭遭喪亂壯我臨難全孤忠急呼驛吏具鞍馬使我厄路還亨通明晨相隨濟南去出入條侯營壘中死生契濶不相棄起居飲食常與同標山華注日在眼綿歷春草及秋風四郊斫木桑柘盡濼源飲馬波濤空凶渠腰領膏野草始見齊魯收煙烽巨源巨源君且坐我欲髙歌君可和往事回頭十五年猶想離魂招楚些身逢播越百憂纒生不成名空老大我依破硯竊恩榮君佐雄藩收最課流萍暫聚不多時且喜相看顔一破我衰無力訪君難願君得暇頻相過馮子振字海粟攸州人其豪俊與陳孚略同于天下之書無所不記當其為文也酒酣耳熱命侍史二三人潤筆以俟子振據案疾書隨紙多寡頃刻輒盡雖事料醲郁美如簇錦律之法度未免乖刺大約工于詞曲而詩文次之塔燈擎天一柱礙雲低破暗功應日月齊半夜火龍蟠地軸八方星象下天梯光搖灔澦涵珠蚌影落滄溟照水犀文焰逼人髙萬丈倒持鐵筆向空題鶴骨笛胎仙脫脛寄飛瓊換羽移宫學鳳鳴噴月未醒千載夢徹雲猶帶九臯聲管含芝露吹香逺調引松風入髓清莫向江頭吹暮雪籠中媒老正關情江梅若有人兮湘水濆冷香和月浸黃昏自憐不入離騷譜待把芳心弔楚魂溪梅古樹橫斜澗水邊野橋村市獨暄妍玊堂路杳無心到甘與漁翁繫釣船野梅瓊林浮翠淡朦朣遙望珠仙隱見中一夜東風吹不散曉看渾似碧紗籠老梅古樹槎丫長緑苔半邊生死尚花開不須更問春深淺人道咸平手種來矮梅不放氷梢數尺長怕分春色過鄰牆大材未必難為用禹殿雲深鎖畫梁蠟梅洗却鉛華扮道妝檀心殘露紫香囊從今宫額翻新樣變作眉間一點黃宋元詩會卷六十九
