body:
  text: 宋元詩㑹卷四十九兵部主事陳焯編徐經孫字中立寳慶二年進士授潤陽主簿知臨武縣通判潭州擢監察御史劾京尹勵文翁不報即日出都上遣使追之不及進直寳章閣提刑福建升安撫召爲祕監歴宗正刑侍兼給事升太子詹事輔導東宫三年拜翰林學士知制誥忤丞相賈似道罷歸十年卒贈光禄大夫和黎丞梅關嶺峭壁接高天閒雲淡横嶺稍便僧房静未覺官曹冷風月兩閒人山川一佳境誰歟共兹樂老仙白垂領題施山觀音閣閣道連雲棧簷牙覆竹隂南來天馬渡北落水龍吟林鳥疑談偈田花欲布金凭欄觀下界洞見逺公心病中有感習懶多成病旬餘乆覆杯帳中聞燕語瓶裏看花開醫已肱三折愁來腸九廽何時得疎散屐齒印蒼苔福州即景一别居諸歲月増遥聞此景畫難能潮田種稻重収榖道路逢人半是僧城裏三山千簇寺夜間雙塔百枝燈常年六月東崖下地湧寒泉潄齒氷送仲時弟江關千里隔山川有弟能來慰眼前方喜雁行隨處樂可堪蟾影别時圓暑行勿亟宜彊飯湍激多驚莫問船歸到家山相勞苦團欒恰是菊花天方岳字巨山歙人紹定間進士官至吏部侍郎前後為權相所惡擯斥以死有秋崖集稗史云方巨山昔在趙丞相幕中因避趙父之諱改姓為万後又為丘岳屬官改名曰万山恐未必然燕來巢吾貧自無家客户寄村疃槿籬只三間荒寒天不管燕亦何所聞乃于我乎館豈以菊未莎而有竹可欵不叩富兒門寧爲老夫伴此意殊可人然亦似吾懶所須半丸泥不費一秉稈云胡及風熏相宅無乃緩勉哉爾翁姥坐席寧暇暖主人當賀成落以晴雲盌蟄室室中度以几其脩去尋一廣長半而贏崇爲咫者七牖一以爲明墐三以爲宻不供並横肱所貴劣容膝蠖屈㤀春霆龜穹美朝日𤣥㝠方用事萬木僵欲慄窮隂易中人戒子謹無出于時則然耳天者儻可必相爾室外寒磚爐坐捫蝨東西船昨日東船送風下突過乗輿快于馬今日西船使風上適從何來急于浪東船下時西船怨西船上時東船羡篙師勞苦自相寛明日那知風不轉推篷一笑奚爾爲怨遲羡速無休時沙頭漠漠杏花雨依舊年時檣燕語豆苖江南之筍天下竒春風悤悤催上籬秦郵之薑肥勝肉遠莫致之長負腹先生一鉢同僧居别有方法供齋蔬山房掃地布豆粒不煩勤荷煙中鉏手分瀑泉洒作雨覆以老瓦如穹廬平明發視玊髯磔一夜怒長堪氷苴自親火候瀹魚眼帶生芼入晴雲盌碧絲高壓涎滑蓴脆響平欺辛螫蔊晚菘早韭各一時非時不到詩人脾何如此雋咄嗟辦庾郎處貧未爲慣黄宰致江西詩雙井茶黄侯授我以江西詩禪之宗𣲖瀹我以雙井老仙之雪香磚爐春著兔毫玊石鼎月翻魚眼湯夜忩搜攬十年讀候蟲鳴秋聲殷墻廼翁詩家第一祖不用棒喝行諸方掀翻杜陵自作古夜半衣鉢誰升堂單傳横出三十六未許歙梅洪雁行雅聞滕閣藏墨本欲往從之山阻長牙箋大册忽在眼荒苔茆屋森珩璜東湖柳色入眉宇君其幾代之諸郎不離文字話祖意傳燈肯與留山房寧知三生受昏闇縱有此燈無此光宜州戍樓山月苦茫茫參到無何鄉黄宰當是山谷之孫而逸其名字何也齋中竹外一燈青殘書伴古㕔葉乾聞雨急山近覺嵐腥多病身爲累無心夢亦靈明朝有癡事須到采芹亭山居二首我愛山居好林梢一片晴野煙禽誶語春水桞閒情蘚石隨行枕藤花醒酒羮吾詩不堪煑亦足了吾生我愛山居好紅稠處處花雲粘居士屩藤覆野人家入饌春燒筍分燈夜作茶無人共襟抱煙雨話桑麻不寐不寐何爲者幽居事更稠怯風思鶴冷聞雨爲花愁草合妨遊屐沙崩壓釣舟春蓑故無恙欹枕數更籌寄姪爾亦爲貧驅忩間硯欲枯自從村野别曾到峡山無寒圃應肥菜秋霖怕損租有書供夜讀時一喚吾雛舟次嚴陵與雁分洲宿連雲做夢清江風月事老野雨客心驚潮急仍吞瀨更寒不過城子陵吾所韙蓑外㡳須名熱甚有懐山間終是山間别寒泉在脚邉戲魚争美䕃啼鳥破佳眠境寂夜如水僧閒日抵年欲來來未得戽斗救枯田聽雨竹齋眠聽雨夢裏長青苔門寂山相對身閒鳥不猜客應嫌酒盡花却爲詩開莫下簾尤好恐妨雲往來泊歙浦此路難爲别丹楓似去年人行秋色裏雁落客愁邊霜月欹寒渚江聲驚夜船孤城吹角處獨立渺風煙秋曉登山登興在丘林其如老見尋身餘持蟹手脚負看山心秋色蒼厓暝曉籬黄葉深唯應負苓者來往古松隂道中連雨蚤晏逢人問荒村店亦稀竹輿穿雨過沙鳥帶雲飛野渡疑無樹春山儘有薇不緣詩是伴誰與倚荆扉山墅且莫嫌窮僻山居儘自竒候樵分玊蕈熏穴得香貍杯雋明氷片崖寒孕雪芝不遺吾一美慙爾野人爲趙尉催築秋崖只爾三間屋吾貧未易云與山先定諡有客屢移文竹喜今年活梅從隔塢聞猶嫌灌園力多爲讀書分送王尉歸覲喜有吟詩癖吾儕得往還客惟依竹語官只似僧閒夜雨燈誰共秋崖藁未删柴門黄葉下别後正須關答趙玊汝人間無處不風波潮打西興雨一蓑難與命争俱老矣徑尋詩去奈吾何園成次第自花艸山是知聞空薜蘿賴有月明千里共煙寒數筆落行窩次韻鄭總幹㡳須咄咄漫書空未覺人間欠此翁黄犢自隨諳寂寞青山亦諱話窮通世方怒及水中蟹我亦㝠如天外鴻醉眼不知人幾品乆將樵牧等三公書戴式之詩卷石屏遊諸老間蚤得詩名及諸老凋謝獨石屏巋然魯靈光耳予生後三十二年纔此一識秋風别去因書數語集中七十行年戴石屏同時諸老各凋零扁舟歸去自漁舍冷骨秋來更鶴形天地無情頭盡白江山有分眼終青剡溪定有人乘興月下柴門不用扃感懐五首異人曽授相牛經竒字初傳瘞鶴銘敲月不知僧某甲鉏煙頼有老畦丁山靈呵䕶閒居賦象緯森羅處士星俯仰中心無愧怍芋區𤓰隴亦朝廷去國何年老一丘於今已換幾公侯不知我者謂爲拙是有命焉那用求舴艋舟應容釣蟹麒麟閣不畫騎牛百年長短身餘幾付與西風汗漫遊從古幽閒在澗阿不將齒髪犯風波共知韓愈亦人耳子謂伯寮如命何野處生成盤谷序襟期寫在醉時歌尚嫌山淺人知處更與移牀入薜蘿拄上風煙更一層瘦藤對倚玉崚嶒左花右竹自昭穆春鶴秋猿相友朋五畝園爲終老計半間雲住在家僧蹲鴟生乳菰如臂莫道山翁百不能曩昔行藏已熟籌最爲上䇿是無求看人面孔有何好如此頭顱只合休草草園廬山北住匆匆歲月水東流莫因一片梧桐葉瘦損能詩沈隱侯山居春溪甘滑潄山瓢歸卧藤隂蘚逕遥雲氣釀成巫峡雨松聲寒似浙江潮書生與世例迂濶山意向人殊寂寥却喜庾郎貧到骨韭畦時一摘煙苖次韻鄭僉判不論山北與山南是處移將竹兩三亦愛村深工部屋尚嫌門對相公潭夕陽歸鳥占花塢山雨飯牛規草庵日挂壁從生白醭此中除酒百無堪陪呉總侍集研山用趙端明送行韻煙波畫出暮江天著我蘆花明月船官滿只稱前進士路貧休問小行年一歸已後陶元亮衆論寧無班孟堅不負登臨重九約過江猶及菊花前立春初信東風入綵幡自挑雪薺飣春盤土牛又送一年老海鶴不知三逕寒筋力尚堪耕綠野鬢毛併欲挂黄冠無人共跨南山犢更作尋花問柳看次韻徐宰集珠溪僧不須敲飯後鐘自擕茶去借松風斬新山色佛頭綠依舊桃花人面紅春甕貯氷揺玊螘夜堂烘蠟綴釵蟲山靈共欲留人住新月隔溪煙霧濛過北固山下舊居池塘燕子舊人家楊柳春寒一逕斜夜讀自生書帶草朝饑曾對米囊花侯誰在矣山如昨今我來思鬢已華舍館不知何日定竹輿鳴雨又吚啞春日雜興二首高下雲藏野老家縱横水潄竹籬斜勒將春去許多雨流出山來都是花白首風煙三逕草清時鼓吹一池蛙身閒不耐閒雙手洗甑炊香夜作茶南岡北嶺對忩扉看盡朝嵐與夕霏社後未曾聞燕語雨中誰不惜花飛山醅約莫幾時熟沙筍輪囷一尺圍莫怨風光損桃李荼䕷芍藥又芳菲約黄成之觀瓊花予不及從以詩代簡杜宇聲中鬢欲華春風將綠又天涯欠隨江夏無雙士共看揚州第一花想像煙雲人跨鶴淋漓詩句字栖鴉蹇驢不管唐衫溼醉兀歸鞍暮雨斜夏日簡王尉松蘿爲屋芰荷衣只與鳬鷗共釣磯雌霓横溪遮雨斷雄風吹霧作塵飛山林誰可閒來往世俗難論眞是非頗喜雪舟王逸少夜凉吾欲扣齋扉山中剩斸荒寒地百弓儘供弄月與吟風太平世界豐登外小有洞天閒適中野服染成駝樣褐山花開到雁來紅夕陽籬落誰呼喚盂酒蹄肩賽社翁旅思索米長安鬢易絲向來書劍亦奚爲無詩傳與雞林去有賦羞令狗監知兩戒山河饒虎落五湖煙水欠鴟夷喜無光範三書草此叚差彊韓退之湖上老藤支我歩湖漘借與晴光一欠伸楊柳得春青眼舊山巒留雪白頭新鐡琅璫語尋齋鉢銀鱍剌肥収釣緍有兩黄冠共棋局相擕便作所歡人簡李桐廬愧面何堪見客星移舟且莫近前汀鷗沙草長連江暗蟹舍潮囘帶雨腥歸去尚餘初繭栗生來能費幾笭箵詩腸一夜生芒角試問故人雙玊缾逢梅二首水仙婉弱山礬冗我自視之兒女曹魯直徑令相伯仲至今未敢廣離騷人言草没孤山冡從此梅花不要詩却是未嫌吾輩在一枝開過竹巴籬岳珂字肅之相州人宋南渡後家江州甘棠湖考其詩所自述葢忠武裔也嘉熙戊戌官户部侍郎總餉沔鄂史無傳於他傳見之言其制置當塗横斂百出非亷士也將發琵琶亭前歲西􅑴鄂今歲東入呉同一琵琶亭行客各異塗當時白傅恨陳跡乆榛蕪突兀眼前屋丹堊塗楶櫨廢興曾幾時傳舍同蘧廬已見兩折柳于此餞老夫昔持使者節今發追鋒車我則齊出處世自分榮枯而况天地間萬變同須臾我觀商婦者𤨏𤨏豈足書琵琶本常技何地無此徒夫販浮梁茶婦即空舟居長吏溼青衫禮法毋乃疎樂天子牟心一念存江湖詎關蝦蟆陵維以懐故都譬之澤畔吟此語非寓歟蓋嘗考遺集一事曾同符聞歌鸚鵡洲尋聲得幼姝倚檣泣明月清淚垂眞珠夫君當此時正屬典午初不應竒謗後無復思亷隅六義有比興觀洧傳洵訏託物皆一理實事那相須人情伏與妬所値分賢愚低睂終不說正恥悻悻俱初意秪如此膠柱何足拘子折武昌柳予宅潯陽廬二詩端可識一笑聊洗誣後元祐行上平章喬益公正月二日天氣清六符兩兩三階平閤門催班報麻案珂馬汀玲萬人看押麻參政拆璽封宣詞舍人來殿東鞠躬一聲百僚聽軍國平章喬益公天心果與人心同大哉聖斷天與通本朝太平說元祐五嶽三光渾未剖當年一日三制頒呂范堂堂分左右䖍中大老更魁傑申國勲名比韓富民生是時非漢唐親見至治躋羲皇一塵不起四陲服軌順星躔蕃五榖士皆有造百姓寧官僚徹底清似氷桁楊畢空戈革偃天街鏡浄無欃槍彼何人斯階啟厲九縣囘颷八紘沸高皇匹馬開東南王業中興今五世窮荒極逺何自來中原萬里吹黄埃數殫剝復囘否泰胚腪元氣鍾竒才耆明夀雋軼千古呂望鷹揚稱尚父便教旦奭居東西穆穆迓衡今再覩官家即日開天章貂冠玊佩遊巖廊一都一俞一吁咈四海春風已披拂聖賢自昔難相逢巨魚縱壑鴻遇風輿人觀呼争誦說元祐嘉熙莫分别君不見徂徠處士歌一䕫濃墨大字慶厯詩生民至今受其賜千載萬載生光輝按宋史嘉熙三年喬行簡拜平章軍國重事封肅國公兹稱益公或係後來加封名號赤壁周郎二十四年少葢世功名隨一燎親提三萬走曹瞞不以敵勍恨兵少豫州失匕已膽折一日目明驚二妙最憐黄葢不知名吏士相從倚營嘯阿奴火攻本無策破竹自繇人不料貪降納侮理固宜泥淖華容幾盡勦古來行師有絕地毌乃重詒千古笑鏃湛縱是差可忍鼎峙詎關謀所召二喬春鎻何足言從此天光遂分耀我聞漢賊乆染指奮毒揺牙噬江表八荒囊括豈復遺一䠞呉宫已爲沼當時乘勝下部騎考地當居楚南徼䝉衝逆鬭須上流揖冦那容越津要武昌霸基跬步耳肯使國畿紛㦸旐坡仙訪古特寓意横槊雄姿誰與弔故將異地眩詞賦政恐因訛啟譏誚滄浪六月卷晴雪歴歴江山人物𦕈嵌空亂石今幾存彷彿棲巢尚驚鳥夜深刁斗聲四發星斗滿空羣籟悄便須喚起紫綺裘孤鶴南天楚江曉長門怨驚風不成雨行雲去無蹤妾生三十年著籍長門宫宫車轆轆春雷曉明星初熒緑雲擾增成丙舍争迎鑾惟有長門閉花鳥黄門開玊匙畫史圖蛾眉金鋪振瓊鑰玉秀生銅池朝陽纔囘金屋在轉盻不堪人事改入宫已作鄭袖嗁出塞那知延夀賣花殘鳥語頻長門春復春花鳥易驚老况復門内人東風動地夜來惡萬翆千紅繞簾幙莫熊自有匪石心肯顧班姬秋扇薄長門勿輕怨視此篋中扇白華兮緑衣自古兮有之病虎行長風吹谷白日暗曠野人稀雲黯澹狐狸嘯舞豺狼嗥病虎妥尾行蓬蒿天寒泉凍山骨高皮枯髀痒霜爪搔紛紛晴雪爬落毛垂頭帖耳身腥臊羣鴉搓牙噪古木燐火半青新鬼哭走麕過前不能逐目視眈眈蹲樸樕毛風血雨天地肅何日跳踉看食肉天生萬物有盛時當年一嘯天助威坐看雲起行引兒當塗寧復論老羆一朝老去守巖竇落葉滿山氷雪後壯心空在筋力疲寂寞長饑眠白晝古來豪傑多沉淪不用爲䑕皆若人范雎折脅西入秦内史長歡田甲嗔可憐百獸爲披靡轉顧不如圈中豕男兒奮跲亦渠似肯復虛爲倚崖死君不見南山白額曾報恩牆頭金枕投何人三江口過舟時方四鼓櫂鷁収金柅釵蟲綴玊缸地隣今七澤名襲古三江岷漾雖分𣲖荆揚却異邦晨光猶未發早認白鷗雙荷花盛開以病旬餘不至亭上偶成病襟慵䇿杖天鏡恰開奩青葢迷前浦紅粧間曲櫩藻窺知鷺下萍破識魚潛㑹看呉公陣官蛙奏曉嚴早起五夜玉繩轉雙轤金井寒背人鮫作市欺夢蟈鳴官竹徑風初度松梢月尚團踞龜猶汗漫何許覓乘鸞午睡東日平明際北窗高卧時五經方坦腹百慮且伸眉蕉覆從疑鹿槐安更獵龜覺來還一莞七椀玊川詩綿羊䢆毛吹朔雪細肋卧晴沙曉牧尾揺扇春遊項引車湩流便逐草酪􅕹正需茶日夕歸棲處因風想塞笳山中奉寄通判楊宗博多病山中客無人傍酒罇與猿分橡子爲鹿長禾孫白晝雲歸屋黄昏雨打門忽懐楊别駕煙靄隔重閽宿溪聲閣望香爐峰閴歴煙巖古琮琤雪澗横海潮秋八月山雨夜三更肯作隨流想難㤀潄石情壯懐徒激烈聊復以詩鳴庚子正月彗見于室有詔求言感作美芹野人意喬木世臣家尺璧諒非寳寸心元不遐誰知劒門棧已建鬰軍牙所恨韶鈞遠難堪聽夕笳排灣遇風對岸即彭澤舊縣隱約山藏霧砰􅗟地起雷黑風吹海立白雨過江來齊樂正應爾沛兒安在哉雄雌誰與辨試上楚王臺三塔寺寒光亭張于湖書詞寺柱呉毅夫命名後軒竹裏逢僧院殘碑不記年鴈題三崒堵龍化兩魁躔寳慶號應紀元豐墨尚鮮寒光定何似誰放五湖船楊梅渰歴三家市梅垂萬顆酸瑶池看火樹嶁室試金丹風露盈籃重氷霜透齒寒它楊應不類留與子雲看張公洞驢跡驚初踐鷹盤若有靈石橋通便户金鑰鎻殊庭滴乳看成像登臺仍刻銘更憐國山寺眞欲比云亭春波堂小飲懷棠湖舊居平生到處西湖長眼底波光日日新圖在輞川非舊隱夢囘笠澤是前身一江細雨欹青菊萬里雄風起白蘋獨立蒼茫動歸興釣磯須理未垂綸上已約客病不及往二詩呈陳元履王因道諸君我是棠磯舊釣徒天教生與水雲俱蘭亭正値人修禊柳岸還添浪拍湖幸有丈人觀筆法可無嘉客醉兵厨直須去躍城東馬更與留春作後圖予癸巳在京口因郡中元夕張燈偶閲國史靖康丙午正月十五日辛巳祐陵南廵駐蹕是郡二月二十三日己未始還京師凡居郡三十有八日兹聞簫鼓感舊興嘆不勝澘然因渉筆以記大略而僧有冲希者乃擕以示韓正倫彼謂予諷已遂架大怨迄興妄獄頼聖明察知其寃前謾盡白因悼正倫之殁閔其左計亮其初心附昔所作詩于後駕軺老子乆婆娑坐聽笙歌擁綺羅十里西凉憶如意百年南國比流梭吞聲有恨哀蒲柳紀節無人廢蓼莪寂寞丹心耿梅月挑燈頻問夜如何予歸未省松楸將以初秋望前汎湖之龍門已戒舟而值連雨因賦天問小心風伯紫宫囘眼看銀蟾海上來𤣥豹又成漫谷霧斷虹猶作隱山雷便教雨積三時害未信雲無一日開待試平生補天手爲君明鏡再安臺賀李微之兼工侍奎章夜下九重天雍乘疇咨法從賢紀雉重開五工正止麟還見一經傳紫荷佩袷新簪橐青汗磨鉛舊簡編便合史筵尊領袖紅雲堆裏望台躔雨中觀廬山雨裏觀山夐不同何須九疉看屏風紫觚壇上排蒼璧青步障邊鋪翆茸谷錦未廻晴日照衣綃聊借淡煙籠祗今萬木添紅纈更倩青霜染曉楓太平興國宫槐影西清舞翆鸞竹宫高接五雲環職陪温洛圖書地名在元封卜祝間晝訪未承龍閣問晨香猶厠羽衣班祠官到處無公事且聽松聲老此山將遊太平宫呈趙季茂聖治峰前松檜寒舊遊重此解歸鞍著身泉石無心客主掌雲山正額官老去隱居居紫府新來襍壓壓黄冠門東曾有劉仙洞剝蘚攜笻試扣看聞畫眉鳥聲戲作木杪幽禽巧語新何時曾記得名因樣傳京兆成雙嫵人指漁陽開小顰儘稱如簧啼白晝未須對鏡學青春山中有叟嗒無語短褐龎眉更笑人以廬山所産天花蕈冬筍玊延饟趙季茂通判已認山家作富家與猨分栗雀分茶氣先十月地抽筍光現五臺天雨花幸有玊延炊夜月肯令繡谷嚥朝霞憑君試雋幽厓味却較閒忙定不差設醮太平宫竣事呈偕行諸君星壇仙簴韻瓊瑶彷彿神斿下九霄龍駕清都三境接蜺旌綘節百靈朝霜澄夜氣俱明徹雲澹秋容想泬寥耿耿寸衷天所鑒憂時惟冀五兵銷已亥明禋覃恩封鄴矦感愧有作布衣所願極封留佩印歸來正倦遊汗馬無功開上郡鑄龜有意顧中流南廵空負黄圖恨北望還興紫陌愁王國不煩謀主父自嘲支子亦通侯詠小園雙竹錦綳玊立紀雙清瑞牒千年重得名龍竹高標儼元致態湘素節凛皇英質同隴麥兩岐秀竒並庭柯連理榮却羡此君尤特立虛心直道不孤生新荷出水貼水初翻紫玊團忽驚矗立傍䦨干瑶池七日來青鳥玊鑑孤奩舞翠鸞曉露走盤珠顆瑩晚風颺盖雪衣寒從今十丈開花面太蕐峰頭更一看白水浦懐王建寧南朝舊見王忠武此地曾屯十萬兵十里荒蹊秋兔徤千年陳迹暮鴻征無衣空藴包胥志遺幗終留諸葛名落日英雄滿襟淚鳯凰倚徙正孤城問道宜興粹儀夾綻盛花鈿人說先朝祀玊仙罨畫有溪春不老煉丹無竈古空傳乞靈賸擬羞蘋藻養性何勞學汞鉛書閣蒼龍應不遠爲君重寫白雲篇夢尚留三橋旅邸天上歸來打六更夢囘搔首正瞢騰玊霜初上三橋月絳綵猶明九市燈聲徹銅魚催勘箭影斜金鵲在觚稜帝鄉東望重囘首佳氣何時到五陵林希逸號鬳齋閩人端平間進士與劉克莊同年官至學士冬曉雲樹曉層層初霞照屋稜氷池紋似鏤霜瓦氣如蒸凍想歌樵客閒思煨芋僧癡翁吟太早窗下有殘燈雨後溪橋看水緑徧東西岸田家亦喜晴溪囘急雨漲雲放半山明沙外看流勢橋邊聽淺聲向令平十里應與剡争名資福嶺庵前作嶺路松隂好歸鞭爲小停苔封石面紫藤絡樹身青庵古無人住蟬多過客聽少時文㑹處近裏有祠庭和後村口占老去田翁多狎友年來觀主換新衘緣溪竹杖時行散面壁蒲團漸放參休夢筆花尋硯滴祗看貝葉守燈龕清朝越紼修祠禮留滯何妨似史談和唐衣苦著唐衣落魄多人生行樂不知他可曾癡説飛霞佩那肯吟思疉雪羅帶眼减多癯已甚布毛吹盡意如何溪隣更有笭箵伴時整牛衣共緝莎春谷示榕橋精舍二十四詩和其首韻春谷因榕費苦吟爲憐夾道緑隂隂身藏巖澗風霜老名入圖經歲月深北客未知題詠少南州莫向字書尋鶯啼庭葉曾留句獨賞河東刺史音先母忌日丁卯兒正癡時頼母賢如今滿鏡白于綿可堪遠日思存日更向衰年憶幼年嫠早獨攜三稚子世貧能有幾磽田書燈督課無虛夕曾解衣還束脯錢庾樓月夜明月今宵好曾經照庾公登樓當静夜懐古對秋風飛鏡緣空上危簷映水中胡牀無恙否岸幘爲誰雄老子今何在寒光昔亦同清談孤此景白髪向江東月此夜一輪滿騷情不禁秋月非人可掃人與月俱愁素魄憑誰問寒光爲底留擬隨風葉去遠似雪花浮竹影揺仍在波光散未収嫦娥如戲我移照讀書樓山村暮歸㸃㸃殘鴉過孤村帶落暉籬邊聞犬吠山下有人歸逺岫連芳塢長林遶翆微雲深認茆屋風細颺征衣樵唱同尋徑猿驚爲扣扉夜深燈火下兒女共依依杜鵑呌盡三巴月凄凉杜宇聲今人誰與語故主自呼名啼血嗟何意前身恨未平轉喉曾有諱弄舌似猶生姓字諸禽識君臣易世輕提壺無意緒醉魄謾飛鳴水碓機事嗟何巧空村不住舂潺湲因借力俯仰若爲容盡日勞雙杵疏泉隔幾峰無人長軋軋助我爲淙淙碓下僧長喜溪邊婦亦慵香厨炊已辦時借野雲封雁足書中郎沙漠外羝乳事何如頼有雲中雁能傳足上書衘蘆來内苑繫帛自穹廬地說荒寒極人稱老病餘史徒誇問犬詩莫詠烹魚青鳥仙家使吾今益信渠笛裏笛裏愁千緒更長憶故山今人吹古曲漢月照秦關霜竹和聲切匡牀倨坐閒一輪秋塞外萬嶂野雲間此夜聽渠弄何時招我還囘思帝城角花影映朝班宋元詩㑹卷四十九
