body:
  text: 宋元詩會卷八十八兵部主事陳焯編張翥字仲舉晉寧人翥少時負其才雋豪放不羈好音樂喜蹴踘不問家業其父憂之翥一旦翻然改曰大人勿憂今請易業矣乃謝客閉户讀書晝夜不輟遂以詩文知名一時至正初用薦者召為國子助教分教上都生尋退居淮南會修遼金宋三史起為國史院編修官書成歷應奉修撰遷太常博士禮儀院判官再入翰林為直學士侍講學士乃以侍讀兼祭酒除集賢學士授階榮祿大夫翰林承旨致仕給全俸終其身卒年八十二翥長于詩其文不逮詩而每以文自負常語人曰吾于文巳化矣他日翰林學士實喇卜示以所為文求改易數句翥苦思良久終不就實喇卜曰先生于文豈猶未化耶何思之苦也因相視大笑平生詩文最多遭世亂散亡所存律詩樂府僅三卷送黃中玉之慶元畨舶昔我遊四明壯觀溟海波褰裳空山頂曙色寒嵯峨月輪鎔生金涌出萬丈渦雲氣忽破碎朱光相蕩摩決眥蓬萊宫攜手扶桑柯羣仙迎我笑佩羽紛傞傞颶風歘驚潮騰擲鱷與鼉浮槎徑可攬從此超天河精神洞百靈上下煩撝訶歸來已十載逺夢時一過君家賢父兄儒術傳世科薄言捧省檄舶署聊婆娑是邦控島夷走集聚商舸珠香雜犀象稅入何其多權衡較低昻心計寧有訛資閲須歷試壯圖詎蹉跎維君官事隙為訪嵒之阿縣應仙者徒往往嘯且歌遐征渺不見空響遙相和題陳孝傳後昌化陳南仲幼失其生母王氏尋之六年後得之永豐縣百丈山前妾辭主禮賢鎮中子逢母三十餘年一日同白髮相看淚如雨阿㜷去時未斷乳兒壯但知心獨苦清湖老嫗天所留逆旅主人神使語歸來桑竹溪之滸婦前持觴孫起舞雙瓜生祥表秋圃豈待旌書動官府吳人買妾紛莫數嵗滿母歸遺子女巷南巷北不相覓况復山川兩修阻嗚呼千秋復萬古孝子之名在寰宇世上滔滔忘母人不愧唐昌一壞土螢苑曲楊花吹春一千里獸艦如雲錦帆起咸洛山河真帝都君王自愛揚州死軍裝小隊皆美人畫龍韉汗金麒麟香風搖蕩夜遊處二十四橋珠翠塵騎行不用燒紅燭萬點飛螢炫川谷金叉歌度苑中來寶帳香迷樓上宿醉魂貪作花月荒肯信戟劍生宫牆斕斑六合洗秋露尚疑怨血凝晶光至今落日行人路鬼火狐鳴隔煙樹腐草無情亦有情年年為照雷塘墓重賦明山歌送胥式有儀還武昌式從其師曽堅子白讀書明山旴母城南隱居者一生耕鑿旴南野何年移入明山來築樓山顛雲在下環山小塢三十六中有清池蔭桑竹日高塢口煙霧消稍見行人出深谷池頭古井穿石空絶底暗與江流通井中鯉魚長尺半人不敢取疑蛟龍隱居何人曽子白誰其從者胥生式先生喜與山為徒意不在仙在樓居胥也來讀山中書清泉煮酒不用酤興酣題詩滿青壁墨痕入石青模糊華蓋浮丘石門麻姑鄰峰丘壑可遊衍山中之樂遄吾軀生今掉頭不肯住京塵茫茫嵗云莫豈知卬亦愛山人未辦山資得歸去曽先生幾時把袂明山行灑掃樓上聽松聲黃精飽啖一千日飛上丹梯朝玉京息齋竹石古木為會稽韓季博士題上有歐陽原功書老竹葉稀多秃枝新竹碧潤含幽姿籜中龍子振春蟄突出雷雨頭參差傍蹲怪石石罅裂裂處恍惚疑龍穴山中有樹皆十圍活幹撑青死槎折霜皮食盡乾蘚文半頂斬立雙丫分最後一株身出羣垂枝倒走隂崖雲李侯標致不可得小字親題别塗黑縱橫不在摩詰下蕭爽直與洋州敵玉堂學士欣見之濃墨大書真崛奇森然一片鐵石筆妙甚七字瓊瑰詞此詩此畫今兩絶把玩微風動毛髮只應真宰泣雕鎪一夜山窗冷秋月伍牧宋將尹玉援常州戰死于此苦戰勤王事精魂泣鬼雄壞城兵氣黑遺鏃血花紅故老談亡國明時録死忠長吟一搔首落日鳥呼風題楊太史山居圖湖上山居好奎題壓翠微煙霞改舊色林壑發清暉松晚看書罷荷涼坐釣歸圖中有真趣須此挂朝衣陪東泉學士泛湖山靄忽空無春暉正滿湖船頭載家樂花裏駐行厨樂任喧呼動歸從酩酊扶使君留客意更為倒金壺登金山吞海亭了公請賦危亭突兀戴鰲頭俯視滄溟一勺浮龍伯衣冠藏下府梵王臺殿起中流扶桑夜色三山日灧澦江聲萬里秋老我惜無吞海句但磨崖石記曾遊寄成居竹隱君青袍朝士困京華此老蕭間竹滿家山壓窮愁詩強項海枯渴肺酒槎牙商巖未採芝如草彭澤將歸菊有花孤負江頭理漁事短篷春雨夢漚沙題唐子華畫王師魯尚書石田山房秋水橋邊紅葉林數家茅屋傍青岑岡頭種玉朝煙暖壠上鋤雲宿雨深摩詰輞川宜入畫少陵韋曲自成吟束薪嵗晚來同煮應許山中道士尋賦中書左曹小瀛洲東曹地逈集名郎宛是仙家紫翠房閶闔上通天咫尺蓬萊移出海中央金波日暖浮鳷鵲玉樹春濃下鳯凰幾度夢回清夜直此身如在五雲鄉登六和塔江上浮圖快一登望中煙岸是西興日生滄海橫流外人立青冥最上層潮落逺沙羣下雁樹敧髙壁獨巢鷹百年等是豪華盡怕聽興亡懶問僧三月望日遊虎丘寺題小吳軒海涌峯前雲樹盤佛宫飛閣出巑岏虎來古塜金精白龍卧秋池劍影寒禪老説空留壞石鬼仙題雨下虛壇憑髙不盡登臨興更借西山晚翠看題述律存道元帥平師宗三州卷後不用牙璋逺出師將軍憑軾定邊陲僰人爭歃金盤血漢使髙縣玉帳旗司馬文章傳太史武侯威略震南離只今老父蘭滄上擬刻寧蠻第一碑次韻存道元帥師宗感時及陡遡山俟刀寨入貢詩因送歸關戍徼外頻驚羽檄飛將軍三起著戎衣空山狐無藏穴平陸龍蛇有殺機已見趙他知漢德更令孟獲識天威此行整頓蠻荒了箐雨瀘煙好賦歸二月朔日登憫忠寺閣百級危梯遡碧空憑闌浩浩納長風金銀宫闕諸天上錦繡山川一氣中事往前朝僧自老魂來滄海鬼猶雄只憐春色城南苑寂寞餘花發舊紅奉答新仲銘禪師吳楓初冷雁連天夢在江南野水邊詞客欲歸嗟老大美人不嫁惜嬋娟豺狼正爾當官道龍象於今護法筵我識新公老禪衲一燈蒲坐是真傳題金陵運盡黃旗晉祚開天星俄復坼三台方驚掘地雙鵝起即見浮江五馬來草暗離宫碑卧土雨殘戰地骨生苔當時一掬新亭淚誰信清談自有才王繼學自海南召還翰林再除南臺侍御天上歸來錦作袍幾陪春色醉宫桃銀河有路惟飛鵲碧海無山不戴鼇卿月又臨仙掌動客星偏傍釣臺高廣陵路接金陵近擬拂塵衣望節旄吳江坐倚風檣看太湖波濤澒洞半三吳寒通上界咸池氣窈入中流水伯都雲暗蛟龍應起立雪深鴻雁自驚呼望亭有酒宵堪醉買得漁家一尺鱸寄題杜原父懷友軒尺五城南近世紛移家來並武夷君他年功業誰青史此日山林自白雲石氣曉侵書幌濕溪聲時雜棹歌聞故人巳有同棲約杖䇿行穿虎豹羣贈馬易之萬里征帆渡越江兹遊奇觀世無雙海中蓬島金銀闕天上玉堂雲霧窗吾道政須求柱石詩壇從此避旌幢青林白谷歸休地懷抱因君得暫降中秋對月時張外史有約以醉不赴明月中天雲霧消酒醒涼思正飄飄星河不動秋空濶鐘鼓無聲夜寂寥露下逺山皆落木風來滄海欲生潮仙家玩事無緣到虛負璚樓聽玉簫鳯山衰草寒煙老木風南朝佳氣落秋空璧來山鬼遮秦使盤泣銅仙别漢宫壞埒尚傳祠乙鳥荒池曽見射飛鴻騷人自古多遐思長在登臨感慨中氷蟾為金齊賢賦老蟾素魄稟金精千嵗玻璃幻結成明水夜零隂燧凍丹書秋滿肉芝生腹凝寒露藏虛白影入銀河浴太清擬向嫦娥乞靈藥與君騎向廣庭行題上清張道士壺洲錦水東頭觀闕青仙家元不隔滄溟鳯麟洲渚寒凝碧雲霧衣冠夜降靈金醴浸花留客醉玉簫吹月使龍吟看君福地容蕭爽長與曽孫宴㡢亭見雁雁行新自雁門來逺度平沙陳勢開光祿塞空霜氣冽受降城廢水聲哀烏孫公主歌誰和猿臂將軍射未回今日客中腸易斷不須更上最髙臺送式無外歸髙麗三韓山水有靈暉秀出斯人了佛機嶽寺禪餘留偈别王城齋罷戴經歸瓶收滄海降龍入錫度秋空近鶴飛只恐故林雲卧後一燈秋老木綿衣送俞伯疇還浙東四明遊客住京都旅舍青燈照影孤家信幾年黃耳犬鄉心一夜白頭烏却携長鋏辭金水直挂輕帆過鑑湖為問蠡吾王太守别來安穩有書無鐵笛為孟天暐作愛此輕圓鐵鑄成何須楚竹選孤生年多化作青蛇色夜靜吹如彩鳯聲繡出碧花凝錯落冷涵金氣發鏗清最宜携向君山去一聽仙翁奏月明仇逺一名仁逺字近仁杭州人張仲舉從之學詩潮一䀶初見海門生頃刻長驅作怒聲萬馬突圍天鼓碎六鼇翻背雪山傾逺朝魏闕心猶壯直到嚴灘勢始平寄語吳兒休踏浪天吳罔象正縱橫梅為怕緇塵著素衣凍痕封蘂放香遲月來忽送欄干影春到不分南北枝喚夢翠禽依樹宿銷魂玉笛隔花吹從他萬片隨風去須有青青葉底時卜居白龜池作一琴一鶴小生涯陋巷深居幾嵗華為愛西湖來卜隱却憐春野又移家荒城雨滑難騎馬近市天明巳賣花阿母抱孫間指點疏林盡處是栖霞黃鎮成字元鎮昭武人後至元間居金原山放情詩酒所著有秋聲集道山亭晚憩平池雨初晴日暮春水深殘霞墮空濶規月光巳沈驚波躍潛魚過影窺翔禽芰荷緑參差嘉木縣清隂但起垂綸想逺生江海心小大固有殊放歌無古今南田耕舍離離南山田采采山下緑兹晨涼風發秋氣巳可掬美人平生親零落在空谷顔色不可見何由踵髙躅我耕南山田我結南山屋下山擷桑麻上山友麋鹿還肯過鄰家鄰家酒應熟江仲謙恆德堂江君世令族家在君山陽君山四千仞上有白玉牀雲氣出隂壑靈苗産陽岡仙人時往來石室留禁方江君往得之歸為恆德堂九轉空青砂沃以神樓湯散入刀圭匕冬炎夏清涼夭閼一以合吾心乃夷康四海患痿痺齊民生痏瘡國醫敢束手忍視同膏肓大山多靈藥食之可年長安得往從君吹笙住藥房贈秋崖上人開士黃金剎齋房白雲外尋師天台山柿葉寫經唄凌晨餐正陽玉屑和沆瀣飛錫到城市刀圭起沈瘵逃名師伯林隱顯謝流輩有時棲石室宴坐真空界行藥度幽澗秋雲溼霞佩我欲往從之髙蹈塵宇隘他年嵩少間揮麈一投芥劉伯熙清溪圖暫脫塵鞅繫結此清溪居偶從農圃鄰時讀種樹書聽瀑掃松石眠雲依草廬韜琴自無絃直鈎不在魚未知穹壤間寵辱當何如贈何萬里瀧流繞郡山如戟黃茅洞深秋霧黑幽篁蔽空鼪鬼嘯絶澗下水沙蟲射生猺持刀跣雙足出入如飛踐荆棘官軍相持不敢殺年年出洞來為賊何侯挺身諭厥渠深入不用一卒驅椎牛釃酒拜縣令叱散部伍從降書君不見伏波將軍征五溪瘴雨溼衣歸棹遲又不見令公單騎褫敵魄萬馬不嘶邊月白古來豪士立奇功何侯身老心力雄上尊襲衣拜賜畢歸釣白雲清渭中李將軍歌李將軍少年意氣輕浮雲青絲絡馬黃金勒寶劍錯鏤交龍文十二髙樓連廣道千金結客大梁門昨日彎弓連白羽射殺南山白額虎歸來饗士酒千鍾自向青樓按歌舞前年起兵從義旗斬將陷陳身如飛上功幕府久未報有酒不樂當何為莫猺行莫猺射生蠻洞谷窄袴短衣雙赤足前年應募作官軍惡少如雲學裝束干村一過如蝗落婦滿軍中金滿槖豸冠擊碎且勿嗔鄰冦不虞吾所託分題送黃汝楫冉冉孤生竹生在崑崙之嶰谷直節離離出地深寒梢蔚蔚參天緑竹髙不受霜雪侵願君同此嵗寒心竹管可作簫韶聲願君吹作鳯凰鳴鳯凰鳴致時雍九奏方知孤竹功春日山行雜興二首山郭晴光逺臨髙逸興賒路經棲鶴地春入種桃家石頂尋雲母松根飲雪花故人留宿處朝飯有胡麻山翁留客住自説樂餘年日養分男舍春耕稅主田雨泥朝過鹿山木夜啼鵑雞黍煩相勞桃花出釣船春雨南田書事二首流水三椽舍桑隂五畝田飯香分野碓茶熟候山泉石榻看雲坐