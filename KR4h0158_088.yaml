語移春檻小度芳華金犢車輕載歌舞曲房夢斷章臺月東風不解丁香結鑰魚夜守蒼琅根海棠飛落胭脂雪輕紅流煙香雨足新槐影轉勾欄曲水晶簾箔度熏風黃吻烏衣語華屋掠簪墮髮初破睡粉䀶淺護修蛾緑並禽不受雕籠宿背人飛向荷隂浴鳯皇枝頭一葉飛碧疏朱紱生涼颸素紈團團恩愛衰含宫嚼羽吹參差瑤階露華霑履綦星橋月帳愁别離粉筵歡笑占蛛絲八姨手折摶樹枝海天凍合青玻璃瓊樓仙人喚滕六夜入銀潢剪瑛琭沈香火暖錦承塵回羅羔酒生春粼宫溝不寄題紅怨日映五紋添弱線旅夜二首逆旅頻看鏡秋來白髮生孤雲渺何許遊子獨關情野逈雞三唱霜寒雁一聲此時愁絶處歸夢度江城秋宵不成寐缺月向人斜更漏傳三鼓寒燈落一花窮愁長伴客幽夢只還家烽火何時息吾生未有涯風雨赤城旅夜書懷吾兒為客在黃山我向丹丘嵗又闌干里鄉關家信逺一燈風雨客氊寒衣鈎石角難行路船趂潮頭易上灘須信故園歸去好梅花相伴竹平安桐灘月夜舟中聞琵琶湛湛長江上有楓豫懷渺渺水雲空未誇湓浦逢商婦賸喜桐灘有釣翁敧枕醉眠秋渚月挂帆爭趂夜潮風曉寒難結思歸夢一尺清霜壓短篷寓錢塘寄呈元禮叔父遊子辭家負薜蘿故園春物近如何他山杜宇客懷惡清夜竹林歸夢多荃蕙化茅成楚怨牛衣扣角起商歌遙知病後無情思莫遣愁添兩鬢皤和韻春日二首雨香雲淡燕泥融珂馬如行罨畫中江上數峰浮暖翠日邊繁杏倚春紅鶯花世界惟消酒水榭簾櫳易受風陌上遊人皆倒載寧須拍手笑山公遊絲舞蝶共徘徊野馬空濛拂面來風雨偶然成晚霽園林何處不花開江橫羅帶銀鷗起雲想衣裳玉女裁賸喜麻姑能送酒只愁門外索空罍姑蘇臺烏喙難忘石室囚苧蘿西子入長洲鴟夷若裹姦臣去麋鹿安能此地遊落月當門縣目恨逺山顰黛捧心愁後人俯仰悲陳迹獨倚欄干對虎丘葺山中故廬有感溪上先人有敝廬昔年經始最勤劬弟兄已作辭家燕林木誰瞻愛屋烏牆角蓬蒿迷町疃簷牙風雨老枝梧百年堂構真吾事未讓揚雄宅一區紫巖寺古木回巖障緑隂此中知有小叢林縣崖置屋依空曲繞澗穿雲入窈深薝蔔香來清鼻觀蓮花色淨悟禪心寶坊亦有差徭及從此應無布地金次韻過表忠觀龍鳯山前一徑長錢王宰木鬱蒼蒼英雄何用作疑塜富貴不如歸故鄉錦繡湖山猶髣佛麒麟荆棘已荒涼表忠觀裏豐碑在異代文章尚耿光嚴士貞崇陽人字正卿别號寄菴生平貫穿經史旁通仙釋之書其于詩能自暢所欲言痛懲蹈襲之陋所著桃溪百詠當時爭傳誦之香霧亭香霧遺基尚宛然春來惟見草芊芊一庭花影留禽語半畝松隂借鶴眠鬱鬱新篁呈曉露依依髙栁拂晴煙尋芳誰記前朝事謾想風光似昔年遺文堂支笻訪古入祇園靜看先賢筆法玄迅若怒猊馳抉石雄如老驥渴奔泉山藏宿雨蒼碑潤僧打遺文妙墨鮮文字性空忘結習却來重了住山緣劈箭橋山際飛梁似跨鼇漚麻池湧帶奔濤林間虎嘯風初起洞口猿啼月正髙未把機鋒酬劈箭間拈落葉泛輕舠朝來獨向溪頭立添得桃花浪半篙羅漢巖谷邃山深雲作堆水源窮處梵宫開隈巖石藏何年轉飛錫髙僧近日回翠竹黃花皆佛事斷橋流水小天台超然步出松關外塵世紛紛付劫灰白羊洞絶頂髙寒境界幽倚笻舒嘯豁吟眸繞林筍蕨香初動夾道松杉翠欲流赤豹啼時山月曉白羊眠處洞雲秋鄉民嵗乞靈泉水一滴天瓢遍九州廣仁院幾度尋幽到此山城根清溜響潺潺僧遊南嶽經年别門對西溪盡日間水氣引涼生竹榻禽棲帶暝入松關要知自性元無二何用楞嚴辨八還棲真院梵音杳杳隔溪聞金剎晴嵐午未分荒蘚沿階留淺暈殘花墜水起圓紋蒼鯨吼破千山月白鳥衝開半嶺雲却羡老僧忘世慮結趺相對倚爐熏寶林院斷香浮月暮鐘微石徑生苔屐齒稀犬吠白雲知客至猿升青嶂玩僧歸空山振錫金環響深夜談禪玉塵揮一自心心相繼後宗門誰更説傳衣廣德觀瑤臺瓊館古朱砂知是神仙第一家不向山中餐柏實却來溪上看桃花玉壺春暖融丹液金鼎朝寒護碧霞須待三千功行滿御風同駕五雲車望仙觀樓閣崢嶸接斷阡旌陽曽歷舊山川飛神謁帝三清所拔宅凌空八百年夜醉人皆迷炭婦晝眠余獨愛茶仙翛然獨倚闌干久如在西山煙雨邊朱名世字晞顔吳人出身武胄而喜言詩嘗泛海作鯨背吟俱七言絶句専紀大海風景每首之末綴以成言蓋滑稽也東洋東溟雲氣接蓬萊徐福樓船此際開應是秦皇望消息采芝何處未歸來乳島逺望渾如兩乳同近前方信兩髙峰端知不似雞頭肉莫遣三郎解抹胸沙門島積沙成島浸蒼空古祀龍妃石崦東亦有遊人記曽到去年今日此門中萊州洋萊州洋內浪頻髙矴鐵千尋繫不牢傳與海神休恣意二三升水作波濤尋䑸萬艦同䑸在海心一時相雜不知音夜來欲問平安信明月蘆花何處尋落篷潮信篷留風力慳落蓬少歇浪中間殷勤為向梢人道又得浮生半日間遼陽遼陽别是個乾坤東望瀰漫逺浪奔問道錦州何處是牧童遙指杏花村分䑸髙句遼陽各問津半洋分路可傷神風帆相别東西去君向瀟湘我向秦宋元詩會卷八十八
