body:
  text: 宋元詩會卷九十三兵部主事陳焯編丁復字仲容天台人徙居金陵之城北其地深僻有園亭之勝左右列植古檜蒼茂若雲客至款坐亭上翛然以為樂仲容學博才敏為詩精麗竒偉格超而趣逺非時流所及集名檜亭稿其壻饒介之所編而序之者中山李桓也有鳥有鳥有鳥鳴聲嘐嘐自東有居則西于巢有翩者翼載戢載翹曷往曷否中心搖搖有鳥有鳥鳴聲孔悲生此東隅息彼西枝有翩者翼逝將奮飛我行遲遲莫知所依維東有山嶺路其岐維西有江湍流其枝伊此之懷復彼之思莫知所之我心孔哀昔我來思狐裘披披今我何為絺綌有淒譬彼行驥有縶其馳言提其玦載泣歔欷相彼鳴琴匪絃伊絲哀於塗人宜莫我知聖或弗濟伊命也而命也如兹我行其隨送劉士幹知事赴湖廣省掾衆羽之差差彼翰而鴟衆趾之離離我獨于夔夫乘而往我徒于追波濤洶洶則匪于江彼陸康莊則舍而杭我聞瞶瞶我視于盲爾牽于驅爰馽其駒爾行徐徐於余焉居我有旨酒聊樂與娛送章子端調浙東奏差維山其砠維水沮洳孰來豫蘇使君之車岨則有阪使車無反沮洳有衍伊澤斯逺維澤伊何孔碩洋洋我攸樂康使車彭彭維驂在隅弗疾其驅彼華紆徐維章子之裾維山斯岵維水有滸章裾楚楚實獲我所楚楚者衣肅肅者儀亦永其依我逸以敖娭甘雨昨日足甘雨昨日足今日豈不逰文漪散清沼緑樹未驚秋步出西郭門浩浩江漢流危檣隘川浦乃有逺人舟江租赴海漕驚沙無定漚號呼走羣吏肉食懷鄙謀及時不歸耕卒歲何用周悄悄緑髮子還家多白頭為農極凋瘁猶用苦誅求送趙有章教諭滿還郎浦昔在秋浦還我行淩浩渺尋君郎川宅相逢武林道君顔日方滋我髮初未皓及兹陵陽見顔髮非昔好故心無淺交論詩有深造兩意正云云逺别何草草長恐重見日復此同衰老相知在久要良用豁懷抱竹山離離鳯食幹綿互亘修巒君子懷靜儀虗貞媚蒼寒靈崖發潛穎崇苞閟幽盤筮鄰從蔣詡永結求羊歡同縣尹張志道徵士黃觀復隂秀才燕集六縣校官葉仲庸池上分韻二首江水秋未清林暉午能碧相忘散亂坐幸老談笑劇以君久寒氊且爾暫暖席同心勿辭飲況有陶彭澤王闕不注官從天得長假年衰豈能髙老坐不許下新秋席為展欲夕尊未罷誰揮魯陽戈請駐義和駕次韻鄭復初録事秋夜涼涼秋夜深時露沾重衣志士不在飽詎復懷饉飢啼蛄怨衰叢煥景淒已微屈父從遺則宋玉有餘悲馴致諒以道爾亦安爾為寥寥秋夜髙時物得其心榮華無終玩衰悴遞相尋微月流西極東溟足幽隂客為哀商奏絃促憂思深揮置各就寐已亡人與琴快翁上人還吳中秋江夕雨霽微涼生綌衣雲滅青宇空北鴻衆已飛鴻飛向南去而我獨不歸我歸復何所長蛟臥寒浦將擾東海龍且騎南山虎南山虎白額具區濤可驀題詩悼夫差具禮謁泰伯麋鹿猶故臺草青霜未白亦知舊鄉好奈何懷逺道佛國煙霞深錢塘早晚到靈鷲天竺來虗閣乘飛嶠白猿宅幽深秪許湖僧呌憑君唁許由搘䇿北峰頭月中下桂子腳底天香浮忽望凌霄道餘杭第幾橋題句容趙氏松澗堂愛客趙公子春登松澗堂展席翳長蔭臨流進餘觴陽漪動五色天聲散幽篁無謂山笛詠此樂殊未央題秋江晚渡圖白雲在青山紅葉爛無數亦有冬青枝長松共如故茅堂當樹間江光淡凝素扁舟不可呼誰令汝來暮題昭君圖曲逆老失計婁敬因自侯深宫如花人逺嫁龍沙頭龍沙萬里逺逺嫁不復返長思漢宫中淚痕日在眼淚眼不可止嬌姿看轉美琵琶寄深怨繁聲紛在指題畫馬為方逺上人賦上人超世資脫然了無為猶有愛馬癖或比道林支天馬由來出天池西大宛國乃有之房星寫神孕龍漦雄志倜儻精權竒飛行滅沒電莫追空塵留煙不得窺月氐之子那敢騎漢武逺慕穆天子欲隮昆崘遊具茨遣使先開玉關道鳯頸虎翼初就羈王良造父死已久當時不知馭者誰唐人為馬置馬監奚官果是何物兒況復教之作馬舞跪拜起伏取笑娭伏仗能鳴輒引去俯首低摧青絡絲欲從駑駘服轅下局促動遭箠䇿施非徒喪志失天性病骨瘦柴如宛錐所以韓幹為畫肉不忍神駿成凋羸大漠茫茫天作屋飢齕飽臥驕且馳蒲梢蕭颯輕風度苜蓿參差新雨滋胡為束縛對厮養長嘶無聲情內悲送孟久夫遷內臺掾陽烏本是日中物下來古柏棲冰霜南枝不如北枝好北枝近日揚清光揚清光散朝彩鳴鳳髙岡久相待天涯亦有鴻鵠羣莫使冥飛向雲海寶鴨曲銅池織風翠波躍睡足暖煙飢不唼重簾未厭雲水姿華屋清深寄間絶生硃剝花紅錦翅枯咽半溼薔薇水寶燈夜縣琉璃光恍若淡在滄浪裏方筵慢舞得嬌嬈指痕膩染羅紋細就中恐有絶纓人誤識韓郎衣上氣古聞舄化之言豈虛語願學飛仙作雙去題劉堯輔觀瀑圖劉侯校書天祿罷向人輒作山水畫長巒老樹翠蓋攲轉瀑崩巖練花瀉玄冠白袍問子誰濠梁漆園忘世者京都塵起碧於雲炎洲瘴來疾如射揮毫定憶龍河上挾帆久睨匡廬下王將軍歌送瑞卿之荔浦巡簡青天白日散五雲酒酣起别王將軍嶺右湘原五千里君恩如天無逺邇百丈牽船上湘水蒼梧九疑雲旖旖荔浦更在雲南頭寨中小官君莫愁生猺亦是天所産賦豫五性為人儔渠豈不知官好惡怒則猖狂喜還樂近日大官虎噉之骨肉可羮髓可酪我官我強民爾弱是乃不堪凶性作前年道州殺人去太守萬户走無路賊去官歸歡聚醑彼亦那知有其故將軍舊是廣東使屬州被患往相視此迹彼情知久矣今官況是猺之方山巖迫小官無房未足展仁化但用謹備防出入買賣無相妨往來見之等尋常殷勤趨庭使下拜喻以天子仁聖臣忠良送黃學録歸番陽有番之山嵯峨而嶔崎連峰結絡如幡旗或為菡萏芙蓉枝或似長人善鬚睂髙冠大服佩委蛇或似蒼虬奮角鬐下赴巨浸長雲披九江彭蠡繞其側波濤蕩擊而綿彌蒼蒼斷嶼如落星點綴碧落影倒垂行人裹糧備㸑炊片時竟月不可期山中美茹多紫芝山中之人歌自怡題稚川山水江光如空山在天好風佳日散晴煙緑隂成蓋崖樹連野橋楊柳亦娟娟擔簦之子何促速況有荷杖當我前茅堂獨坐豈待客或者傲兀忘流年又疑浣花溪上叟索句未得掩兩肘對樹不語胡為然將非得詩不得酒耐可有酒無詩篇荷鍤歸向南山田陶公種秫五十畝往往為酒愁無錢送秦元之赴太禧同僉君家好兄弟聖主自知之周爵推秦仲虞官舉伯夷萬方天浩蕩五彩鳯威㽔宣室虛前席蒼生屬論思金陵送人還武昌相送白鷺洲因思黃鶴樓遙觀鄂王迹重起禰生愁西上不可得東關曾獨留江邊趙他石歲月但空流題程先生西行集後峽束水如箭巴行船上天亂離藁葬後衰老秭歸邊手把西行集心追北上年東風故山淚落日灑江煙登髙分得疊嶂逺近不可數淡濃渾自成人煙諸崦隔鳥道半空橫日夕黃微映江寒碧倒生憑髙共臨眺憶得在宣城送李御史南臺鐵冠舊西府繡衣新吏部氷霜曉皇家雨露春三苗蠻作俗八桂嶺為鄰虞帝猶遺廟殷勤薦渚蘋送賈西伯西風苜蓿花南客又移家此道寧無用吾生未有涯峰青宜霽日潮白逆江沙猶憶南樓夜吹簫度歲華送張克讓秋花白露芹鄉郡萬山雲官冷難為滿囊空政喜聞灘船牽月上嶺路入閩分有客來書辟青霄記雁羣送王伯庸赴石埭板官先生官已冷縣僻冷於官坐席嵐歸潤琴堂月過寒竒峰花作朵幽瀨玉為湍所喜無迎送髙吟寄碧瀾送客馬帳朋方集麟經講未殘幡然懷故里誰此障狂瀾黃卷秋檠短青氊夜榻寒好將池草句題與惠連看送人省親子仕親亦喜子歸親更歡江湖片帆逺風雨一氊寒沙鳥行秋渚江豚拜午湍莫看松桂色容易厭時官送翟彥敬升中臺察院掾名彥登烏府清門可雀羅辟書催北上行李及南訛天濶涼雲積江明暑雨過東門羣掾集更起續離歌新寺和張仲舉兼次韻天宫兜率下崔嵬結綺交疏面面開地勢周圍龍虎國鐘聲疏應鳯凰臺鼎湖仙去秋遺劒笠澤僧歸夜渡杯千騎巡街羣樂動五雲深處御香來雁門送楊仲𢎞姪士耕歸龍泉江回彭蠡天逾碧路入臨川山復蒼令尹先為武進縣絃歌况逢君子鄉黃禽雙啼白日靜緑草自動春風香巾車數問虞夫子未慙元亮在柴桑越州景德寺鏡清方丈題醉仙嶽麓圖鏡清方丈見嶽麓堂虗咫尺行江潭樹木連霄巖影濕樓臺隔日水聲酣皇英雙騎龍上下蒼梧九點天東南道人得我千古意復遣老夢登雲龕送美上人歸臨川白雲不生華蓋峰青天淨倚碧芙蓉上船不記日多少到寺更行山幾重木客試人騎出虎淵靈求法脫為龍莫貪石室跏趺穩偏長松門薜荔封次韻答惠長老棄為狂士幸相容敢向明時歎不逢皎月近人間傍水白雲邀客更登峰百年耳厭咸陽犬千載神交劒浦龍車馬滿街門映燭夢魂初熟蔣陵鐘九月一日遊昭亭山色汀光帶近郊道傍楊栁舞寒條半生九日黃花酒多在西風白下橋千里客遊仍暮景異鄉人事又今朝老來未遣登臨懶盡醉東家緑玉瓢寄謝子木秦贅誰徴夢午年漢官倉氏豈淹賢荒涼秋浦時時酒倣佛番江夜夜船湖海客身皆暮齒家山兒蕨等春拳何時與和歸來賦白石黃沙未有田寄題道吾山聞禪師竹院道吾竹院芙蓉下老子藤牀翡翠深過雨雷霆龍捧闥滿天風露鶴當林此君靜對了不厭諸老清談亦許尋他山祭酒聞還出何人載歌金玉音送僧遊廬山二首十八社人五老邊香爐紫煙誰為然山光水影江行日風靜浪平船在天故里今逢霞外客孤篷曾坐月中禪清吟一為浣塵土宛對三梁看瀑泉廬山東南山水多石梁顚倒挂銀河仙燈夜半天人落佛屋春深海客過五老芙蓉還好在陶公楊桞定如何布帆又起江湖興應道西風動薜蘿寄題金鵝泉石軒金鵝泉石有深趣黃鶴仙人曾獨來巖雨溜雲青玉瀉海天澄日碧蓮開山翁宴坐秋簾靜野客倦遊溪棹回幽徑依然生藥草他年從此入天台題王元章梅三年不見王徵士一見梅花如見人風致山隂頻夢夜雪晴江上又逢春毫端只作尋常寫意度真同造化神聞道耶溪新買宅想栽千樹作比鄰送清涼寺友上人歸永嘉江心舊作野客宿石頭今逢開士歸半夜落潮隨棹發十年殘夢逐雲飛相看接手話鄉里獨老忍淚沾裳衣新春亦有還家願會過石室推煙扉次韻具菴送湛淵上人永喜省師早年為客曾遊處今日題詩郤送僧珠箔濺巖看雪瀑寶窗緣塔見天燈金仙爛熳開銀界玉女嬋娟倚翠層禮罷阿師窮勝討諸峰歷歷漸攀登題李息齋枯木竹圖霜柯洞庭寒露葉渭川冷幽人美清夜獨寫秋燈影賦山上松送常上人松生在山上垂柯蔭其下人生苦别離念此歲寒者元宵雨雪銀燭春光玉雪霄翠簾歌管思寥寥羅浮洞裏花如織誰立寒香背小橋馬德昭席上賦江上重逢鄒大娘桃花紅嫩染纎裳蔓青溪上曾相見猶記胡麻飯顆香賦蕙花次韻嶽上人香滿松房夜月虗紫蕤縣露泣方諸湘魂故惱維摩定起和離騷掃壁書酒間贈賈西白思入東風白雨邊暮雲春樹兩茫然不因絳灌輕新進未必長沙識少年王冕字元章諸暨人本田家子長七尺餘儀觀甚偉通春秋諸傳試進士舉不第即焚所為文讀古兵法衣履舉止詭異自放見者目為怪民嘗遊燕京台骨哈布哈薦以館職笑謝之工於畫梅用胭脂作沒體貴遊爭購之因題梅作絶句幾罹詩禍逃歸隱於九里山明初幕府平浙得冕將授以參軍一夕卒水仙圖寒風蕭蕭月入户渺渺雲飛水仙府仙人一去不知所池館荒涼似無主江城歲晚路途阻邂逅相看顔色古環無聲翠裳舞欲語不語情悽楚十二樓前問鸚鵡滄海桑田眯塵土王孫不歸望湘浦芳草連天愁夜雨對景吟濕雲不飛山雪滿越王城頭鼓聲短曉來溪上看梅花虎迹新移大如碗老烏縮項如凍鷖呼羣強作嬰兒啼紅桃翠栁眼欲迷舊時紈袴今塗泥淮北千里無煙火淮南近日多軍馬寸薪粒粟不論錢行客相看淚盈把如何五陵年少郎賣田去買青樓娼吳歌楚舞不知夜歸來也學山翁狂明朝酒醒入官府方知不是城南杜落花風急雨瀟瀟索寞無言面如土痛哭行雨淋日炙四海窮經綸可是真英雄岐豐禾黍泣寒露咸陽草木來悲風京邦大官飫酒肉村落飢民無粒粟東魯儒生徒步歸南州野老吞聲哭紛紛紅紫已亂朱古時妾婦今丈夫有耳何曾聽韶武有舌不喜論詩書昨夜虛雷槌布鼓中天月破無人補休説城南有韋杜白璧黃金天尺五送無咎遊金陵兼柬丁仲容隱居長松撼空風怒號前門大水推斷橋山中坐雨六十日不知野草如人髙今晨出門天氣好貶眼忽驚春事老楊花散作雪滿溪送客俄然動懷抱金陵六朝古帝都古時風景今何如珊瑚無根土花碧露團玉樹生流珠江上無人隔塵土丹鳯不來孤燕語上人脫灑無滯留底用登臨重懷古世人往往乘險機老我白髮無能為道甫問訊丁令威有鳥有鳥何時歸猛虎行去年江北多飛蟊今年江南多猛虎白日咆哮作隊行人家不敢開門户長林大谷風颼颼四郊食盡耕田牛殘膏賸骨委丘壑髑髏嘯雨無人收老烏銜腸上枯樹仰天烏烏為誰訴逋逃茫茫不見歸歸來又苦無家住老翁老婦相對哭布被多年不成幅天明起火無粒粟那更打門苛政酷折髀敗肘無全民我欲具陳難具陳縱使移家向㕓市破獍猰㺄喧成羣徑草行中原地古多徑草節如箭竹花如稻白露灑葉珠離離十月霜風吹不到萋萋不到王孫門青青不蓋讒佞墳遊根直下土百尺枯榮暗抱忠臣魂我問忠臣為何死元是漢家不降士白骨沈埋戰血深翠光瀲灔腥風起山南雨晴蝴蝶飛山北雨冷麒麟悲寸心搖搖為誰道道傍可許愁人知昨夜東風鳴羯鼓髑髏起作搖頭舞寸田尺宅且勿論金馬銅駝淚如雨蝦蟆山春風吹船著牛軛牛軛潭在蝦蟆山下扶藜直上山之脊山上老石怪且頑皮膚皴皵苔花碧我來不知石有名拊摩怪狀心亦驚野人指點為我説此物乃是蝦蟆精古昔曾偷太倉粟三百餘年耗中國天官燭其隂有毒敕丁破口劙其足至今突兀留山丘雨淋日炙無人收樹根穿尻蛇入肚老鴉啄背狐糞頭牧童時時放野火耕夫怒擊樵夫刴自從殘墮不能行見者唾之聞者罵蝦蟆蝦蟆非令僕無功那竊天之祿如今蝦蟆處處有天官何不夷其族致令驕氣吹風腥干霄上食天眼睛百蟲啖盡心未已假作鼓吹怡人情三月江南春水漲紆青拖紫爭跳浪漁父持竿不敢言獵犬布弩空惆悵黃童白叟相引悲田中更有科斗兒村居避世忘時勢茅廬傍小溪灌畦晴抱甕接樹濕封泥乳鹿依花臥幽禽過竹啼新詩隨處得不用别求題寫懷世情多曲折客况自堪憐聽雨愁如海懷人夜似年草肥燕地馬花老蜀山鵑冷淡無歸計蒼苔滿石田晚眺密樹連江暗殘陽隔浦明不知秦塞逺殊覺楚天明故國人何在荒城鳥亂鳴徘徊吟未已搔首忽傷情次韻答王敬助西圃餘薑蔗東皋足稻粱今年誠有望吾計未全荒倚仗停吟久看雲引興長鄰家新釀熟同醉菊花旁泊瓜洲落日大江秋淒涼覺底愁逆潮攻敗壘荒樹入沙洲險固空餘迹清平且壯遊不須腰十萬明日上揚州黃牛山招提萬山底古屋蔽煙霞密竹先秋意長藤過夏花繁隂沈雨腳清響潄雲牙老衲睂如雪相逢話作家齷齪齷齪寧堪處卑汙奈此逢看人騎白馬喚狗作烏龍濯濯河邊栁青青澗底松待看天氣好應得露華濃漫興四首草木何搖撼工商已破家饒州沈白器勾漏伏丹砂吳下難移粟江西不運茶朝廷政寬大應笑井中蛙壬辰天意别春夏雨冥冥雲氣何時斂江聲未得停書生憐白髮壯士喜青萍昨夜登西閣悲笳不忍聽處處言離亂紛紛覓隱居山林增氣象城郭轉空虗俠客思騎虎溪翁只釣魚諸生已星散那得論詩書干戈猶未定鼙鼓豈堪聞憂國心如醉還家夢似雲關山千里逺吳楚一江分朋舊俱零落空嗟白鳥羣偶成四月八日風雨歇放翁宅前湖水髙典衣沽酒亦足醉騎馬看花徒爾勞海國尚聞歌蔓草山陵誰與薦櫻桃元龍本是無能者後世謾稱湖海豪歸來頭白歸來驚面生東家西家知我名友朋投老漸凋落兒女向年俱長成野梅開花尚古色山風吹雨墮寒聲最喜溪翁會真率濁酒過牆香滿罌寄徐中幾僦得城樓枕臥龍儲無儋石是英雄吟詩不愧杜工部乞米或如顔魯公蘭省異於霄漢上草堂却在畫圖中故人相見無多論笑指松花落晚風山中答客問人間塵土苦歊煩林下清風六月寒夜半酒醒方脫屐日髙眠起不簪冠坐看遊蟻巡危磴靜聽間花落古壇老我自無軒冕意尋常豈是傲時官題金陵賞心亭前春草花賞心亭下栁生芽收功謾説韓擒虎亡國豈由張麗華江山萬古足登覽豪傑幾人來歎嗟野老相逢間指點六朝宫闕盡桑麻送欽上人石頭城下五更秋髙挂雲帆得順流鐵甕緣江即東府璚花隔岸是揚州作家相見本無語在客别離殊有愁後夜相思好明月老夫乘興獨登樓間題至元舊事樓臺矗矗帶山河金玉重重是帝家雲合紫駝開虎帳天連青草入龍沙春風小殿看飛燕夜雨重城散落花甲乙流蘇仙夢好莫教方士問丹砂金陵懷古避亂作壞牆幽徑草青青何處園林是舊京海氣或生山背雨江潮不到石頭城英雄消歇無人語形勢周遭夕照明回首長干思無限水風楊栁作秋聲謾興三首隱几看山與世違當門種竹亦無機五更驟雨隨風過滿眼落花如雪飛每為注書消夜燭亦常沽酒典春衣今朝急報任公子昨日蒼苔滿釣磯關中險固馮三輔隴右勾連接四川簇簇樓臺縣日月盈盈花草爛雲煙飈回海上沙飛雪雨足江南水拍天可笑華山陳處士風流文彩却貪眠青山隱隱帶灤河金碧光中望馺娑五穀不生牛馬盛二儀殊候雪霜多打圍陳合穹廬轉警蹕聲傳御駕過漠漠黃沙天萬里壯心未解説風波悼止齋王先生三月燕山聽子規追思令我淚垂垂雖然事業能經世可惜衣冠在此時霜慘晴窗琴獨冷月明秋水劒雙悲山河萬里人情别回首春風説向誰異鄉東山西山生白雲異鄉那忍見殘春野蒿得雨長過樹海燕隔花輕笑人每是閉門疏世事何曾惜酒惱比鄰過從時有相嗔怪不解潛夫意思真雨中江南江北水滔天羇客相逢亦可憐坐覺青山沈席底行驚白浪上窗前鵓鳩銜草栖危塔鸂鶒翻飛浴敗船轉首蠻村寥落甚絶無茅屋起炊煙秋興鼙鼓嘈嘈夜撼山霓裳歌舞出人間雲圍環珮沈斜谷風斂旌旗入劒關躩鑠野翁掀雉尾跳踃山鬼覿龍顔書生豪放成何事徒步歸來供奉班金水河春興二首方州何處見繁華儘好當時富貴家慷慨喚來黃字酒丁寧將出紫簾車春風嫋嫋穿楊栁小雨冥冥度杏花沈醉歸來不知夜又傳清響按琵琶金水河邊栁色新玉山館外少沙塵琵琶未必能愁客鸚鵡如何錯喚人翠袖錦襜馱白馬落花飛絮閧朱輪人間天上無多路只隔紅門别是春梅花十首五雲縹眇隔蓬萊仙子吹簫月下回轉眼不知春幾許霜花如雪滿瑶臺羅浮月白海無塵玉樹瓊林處處春半夜禹陵風雨作屋梁飛動欲生鱗玉雪玲瓏瘦影重不同桃李媚春風十分清致無人解猶在舊家池館中月明海底夜無煙恰似西湖雪後天清氣逼人禁不得玉簫吹上大樓船獨鶴髙飛雪氣濃梅煙清淺月朦朧一聲簫管歸何處人在瓊樓玉宇中春風一笑玉無根雲散空窗見月痕半夜鶴歸詩思好清香吹滿水南軒吹徹瑶笙鶴未還小橋流水碧潺潺夜深夢醒推窗看白月無痕雪滿山溪谷氷霜春到遲老夫長夜只吟詩憑誰説與中朝士此是江南第一枝海雲初破月團圓獨鶴歸來夜未闌一片笙簫湖水上玉妃無語下欄干和靖門前雪作堆多年積得滿身苔疏花箇箇團氷雪羌笛吹他不下來王元章在燕門賦此詩有目之為刺時者將捕之以逃免墨梅二首老仙醉吸墨數斗吐出梅花箇箇真相見莫嫌顔色異山林别是一般春我家洗硯池邊樹朵朵花開淡墨痕不要人誇好顔色只留清氣滿乾坤紅梅七首顔色雖殊心不異謾隨時俗混繁華清香吹散乾坤外不是尋常桃杏花白日遲遲照窗户深院不知春幾許紫簫聲轉香風回隔簾踏動胭脂雨洞天窅窅無人到白日丹光出樹林仙子竟忘餐玉法笑迎春色緑雲隂彩鳳穿花啄石苔玉窗瓊户紫煙開山人不説羅浮夢郤憶玄都觀裏來玉妃步月影毿毿燕罷瑶池酒正酣半夜不知香露冷春風吹夢過江南仙子雲中駕鶴歸翩翩霧佩曉風吹玉肌輕染胭脂色恰似羅浮夜醉時玉骨清癯怯素妝春風一醉九霞觴緑房午夜嬌雲暖不夢梨花夢海棠應教題梅刺刺北風吹倒人乾坤無處不沙塵如何凍死長城下誰信江南别有春下二句一作清髙只有老梅樹照水開花箇箇真劉炳字彥昺鄱陽人其父名斗鳳用虞揭諸公薦為翰林應奉未上而卒彥昺雅志汲古所著詩集則危素宋濂序之以為有謝康樂韋應物之風而楊維楨亦稱其能兼諸體云憶園廬種園在東皋草荒瓜蔓長日落秋樹涼褰衣獨還往時逢野老憩自足田園賞沿溪暝忘歸古寺煙鐘響行路難奉君五綵鳳凰之綺幄七寶鴛鴦之錦牀博山氤氲之氷屑金盤沆瀣之瓊漿春風無情不相待朱顔緑鬢年年改姑蘇臺上鼓如雷四時歌舞百花開當年意氣今安在鬼火如燈秋似海燕子樓同周伯寧賦寶瑟凝歌繞珠箔流蘇結帶黃金索翠紅香裏宿鴛鴦春風人間無此樂杏梁塵暗麝蘭篝黛瑣睂峰掩畫樓燈殘枕冷梨雲斷秋雨人間無此愁寒夜怨月來愁亦來心憐月去愁應改樓髙月轉遲停筝坐倚熏籠待月落郤成眠誰知枕冷愁仍在烏夜啼練髙同賦城頭烏啼風瑟瑟露滴銀牀秋月白錦屛金屋醉西施歌長漏短銅壺窄回首繁華散似雲姑蘇臺上鹿成羣令人卻憶烏啼月此月還應照後人河中之水歌寄劉子雍程伯羽河之水向東北洛陽女兒好顔色八歲畫娥睂九歲自裁衣十歲學識字十一拋梭攀錦機十二刺繡紋十三能睹棋十四彈箜篌十五才上頭鬢偏斜戴金團鳳臂弱不勝珠絡韝羅幃睡起傷春瘦畫閣妝成對日羞十六妖嬈解歌舞容色比花花不語扶持生怕下階行三寸春嬌雲一縷行媒將聘嫁周郎桂柱蘭堂錦作房比翼鏡奩妝玳瑁合歡裙帶繡鴛鴦茱萸露濕珊瑚枕蘇合香薰翡翠牀生憎啼鳥催春去不忿啼烏怨夜長杯成連理生何幸叉合同心死不忘眼前節物年年度只恐芳華不相顧南陌芙蓉午夜霜東園桃李三春雨君當為妾秉燭遊東海為缸糟作丘妾當為君金縷謳春風莫遣人間愁來日苦短黃子雍同賦來日苦短去日苦長人生如朝露不如笑歌置酒臨髙堂春風不到九泉下盛年一去難再芳老行及之徒悲傷鬼妾行閨中女兒白如雪縣官娶作專房妾黃金翠羽繡羅襦枕邊誓死心不渝豈意榮華草頭露好似青藤倚枯樹一朝樹倒藤無依垂垂哀哭牽腸肚依稀無復半年春新官到任遣媒人鴛鴦錦帳重還整鸞鳳金叉依舊新洞房更結叮嚀語却説新情多勝故自忿飛花逐水流為憐嬌蝶無鶯妬傷心認作主衣裳窗前臨鏡照新妝青銅欲待銷磨盡幾度春風幾斷腸邯鄲行白日下叢臺野曠秋風早不聞歌吹聲空遺往來道傷心卻憶平原君墓上牛羊踏荒草寒食客秦淮憶舊去年寒食長途客桃花落盡梨花白今年寒食客秦淮杏花李花無數開東風凋殘白羽箭落日獨倚黃金臺緇塵蕭騷吹病目破帽烏靴泥漉漉藜杖東山弔謝安悵望飛雲仰天哭凄涼心事更誰憐緑綺可以調絲絃子期已矣伯牙死髙山流水空荒煙王孫不歸芳草暮解衣沽酒驅愁去誰言一醉可消愁酒入吾腸肝膽露便擬揚帆析木津仍期挂劍扶桑樹志士長歌溝壑憂功名百歲等浮漚雨晴浪暖沙豚上載酒滄江弄釣舟寄徐宗周兼柬楊奐文阮宗泰李家池頭去年别大風揚沙天欲雪贈我鯉魚三十腮楊栁穿來帶寒血今年八月芝山樓我欲少住君不留蹇驢落日冒秋暑鬢絲汗溢黃塵流近過阮公茅屋底説君沈痾幾不起九月十月方離牀強健近來差可喜相望片雲老石山來往每嫌消息艱斯文凋謝少知巳恨不連牆相往還卻憶少年從義日聞雞不眠追祖逖殺敵風吹寶劍腥打圍雪壓雕鞍濕諸葛曾懷漢室憂包胥亦有秦庭泣投老相看四海清夙昔患難同離情歸來廬井有桑梓拜掃丘墓除榛荆傳家書在晚還讀負郭田深春自耕愛君窗前修竹大聽雨何時對牀臥郤扶藜杖過楊兄使酒怕渠將罵坐氣概頗與常人殊天經地軌談隂符黃岡溪頭懶垂釣未央殿前思上書功名定有國士報肝膽好將民瘼蘇黃金臺髙一千尺白日橫飛虎生翼吕望八十方致身五十富家朱買臣時來勳業自有待豈得甘作漁樵人題吕氏園草堂朱雀橋何處銷殘暑城南茅屋幽晚煙將墅色春樹帶江流愛竹呼兒種耽杯與婦謀生涯成老圃不是故時侯郊居雜興柬陳遂良風雨行人少柴門午尚扄土花沿砌碧山果墜枝青病眼耽書癖衰顔託酒星經邦方上武寂寞抱遺經早春呈吳待制上林春早陌塵香紫禁觚稜射日光新緑御河搖栁黛小紅宫樹試桃粧山連曉氣蟠龍虎臺枕東風憶鳳凰心折故園幽興獨尋僧看竹過鄰牆寄許永明公冕昆弟得夫先生少年曾共請長纓雲壓旄頭劍氣腥諸葛有心扶漢室包胥無淚哭秦廷九鰲夜徙龍沙黑八駿秋迷鳥道青一别關河俱白首斷腸煙樹滿長汀燕城懷古廣寒宫殿玉為樓萬歲鰲峰壓九州番國梵僧青鼠帽天魔宫女綵龍舟鈎陳蒼闕山南拱太液紅橋海北流唯有盧溝溝上月年年鴻雁不勝秋次秋日韻奉汝弼叔二首墨池秋淨水痕澄曲几焚香袖手憑霜煞栁條清栗里雨荒瓜蔓覆東陵戰餘趙壁車還列説下齊城軾獨憑因憶少年隨驃騎西風笳鼓醉呼鷹三徑歸來菊未荒半凋楊栁弄春涼銀屏紈扇題秋句金鴨羅衣換夕香老憶風雲趨北闕夢無花月待東牆狂遊尚記秦樓别翠袖紅綿拭淚行秋夜對月寄汪宗彛三首宫樹涼生絳闕玉階影轉銀河曾侍梨園供奉夢魂猶託笙歌辨舌曾歸白璧酬恩盡散黃金范叔綈袍誰念悲歌自㸑瑶琴薄枝寧為雞口雄心每借魚腸敝矣布袍雙袖御爐猶帶天香宋元詩會卷九十三
