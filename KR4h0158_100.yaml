body:
  text: 宋元詩㑹卷一百兵部主事陳焯編衲子十二人中峰本法名明本講席之盛為東南第一住天目山中峰趙孟俯歸依甚䖍以師禮事之咏葫蘆秀結團圞帶晚秋偏從根本易綢繆牆頭恍忽懸明月架上依稀綴碧旒密貯神仙三島藥穩乘羅漢五湖遊他年剖破成雙器半贈顔回半許由疏梅依稀殘雪浸寒波桃李漫山奈俗何瀟灑最宜三二㸃好花清影不須多苔梅古貌蒼然鶴膝枝吐花生暈護春機玉堂試看青袍客莫忘江南有白衣憶梅十分明月是揚州尚有春風在樹頭莫怪當年何水部歲寒心事與誰愁評梅月旦花前豈乏人風霜齒頰帶陽春江南野史餘芳論絶世清如古逸民惜梅香銷泥汙意徘徊掠地回風玉作堆愁絶黃昏無一語怕看孤月上窗來茅舍梅數椽草屋延清客竹作疏籬護玉葩不是玉堂無分到且和明月到山家風梅花間少女剪春寒粲粲霓裳舞隊仙月夜遙看環佩冷莫教吹落玉花鈿煙梅夢隔梨雲逗曉天苔枝浮翠逗春寒不嫌玉質籠輕素留與詩人冷淡看恕中贈道士凌雲峰坐夏不出戶塵緣淨于掃羽客苕溪來訪我無生道無生不可學可學成繳擾有物天地先冥冥還杳杳仙凡本一致明悟當及早跖蹻豈永年顔冉未曾天南薰破炎熱濃緑鶯聲老與子兩忘言塵寰即蓬島不歸篇昨日又不歸今日又不歸竟自無歸日勞我長歔欷歔欷為何事憐此忘家子棄卻祖翁業向外圖經紀嵗月苦無多悠悠水上波心源未昭廓奈此生死何歸來篇歸來兮歸來歸來免攀陪山泉甘露味草座黃金臺人生當自足自足真天祿寧為擊壤歌莫作窮途哭一法不留情青山四時青折松拂石坐白雲林外行無言歌為真如本長老作無言歌無言之道言難傳機頭領略猶鈍漢句後解㑹知徒然我本有口且無舌興來不妨歌一闋七金山外覓知音引得虛空笑聲咽君不見空生寂寂巖頭坐匝地天華亂飄墮又不見毗耶病夫施一默潦倒文殊歎無及兩處牢關盡掣開白日青天轟霹靂針仲規扁所居為清白居道人宴坐清白居身心不動長如如月窟深藏雪獅子氷壺靜貯銀蟾蜍絶色純真妙難測中下焉能造其域不修梵行事空王豈守邪禪作家賊縱橫廓落含十虛三尺丈六攜手歸徹骨風流秖者是六門日夜揚光輝靈利師僧近來少往往多從外邊討本無階級坦然平到此定應先踏倒一笑軒為宗旨南州賦一笑軒中行復坐青山白雲不可唾六戶虛凝絶㸃塵經案銅瓶安一箇靈山對衆拈花時百萬龍象徒蚩蚩金色頭陀獨解事囅然微笑揚雙眉笑邊真旨憑誰委木强楊岐未相許客來不必更躊躇便應識取軒中主寄宗聖西堂宿有扶宗志辛勤四十年句清堪供佛業白可箋天燕坐畦衣薄經行雪頂圓長庚光欲滅內院一燈傳熱大地爍金石禪心只宴如幽閒無濁慮鬱勃自清虛坐石頻揮塵臨流看躍魚優游三界內寒暑不關渠謝靜中過訪掃跡千巖裏柴門久不開正逢新雨足忽見故人來燒筍供茶碗烹薇薦粥杯欲留君共住分石坐堆堆題王山人草齊築室島溪上松門日夜開家貧無雀入山好有僧來雨漏重苫草年深旋積苔繞檐梨與栗祗為子孫栽元叟端擬寒山子詩四首木落湫水寒千峰正岑寂惟聞虎嘯聲不見人行跡霜露溼巖莎月輪挂空碧此時觀此心獨坐盤陀石名利是何物人心不自灰榮來終有辱樂去可無哀富冢草還出貧門花亦開耕桑枉辛苦鬚白鬢毛衰山中高且寒人罕來登陟松搖雪珊珊蘿罥烟羃羃巖華春不開潭氷夏方釋住此夫何為心源湛而寂我住在峰頂白雲常不開窗扉沿薜荔門徑疊莓苔山果猿偷去巖花鹿獻來長年無一事石上坐堆堆山居二首山木交柯莎滿庭馬蹄且不汚巖扄篝燈對雪坐吟偈擁裓繞泉行課經睡少每知茶有驗病多常怪藥無靈金園一嵗一牢落誰似孤松長自青小榻新營巖瀑西白雲無路草萋萋月明扄戶野猿嘯日晏擁衾山鳥啼積世詩書空簡蠧纍朝墳墓半鋤犁邯鄲枕畔一炊黍堪笑古今人自迷題古鴈圖年去年來又一年帛書曾達茂陵前影連薊北月橫塞聲斷衡陽霜滿天雨暗荻花愁晚渚露香菰米落秋田平生千里復萬里塵世網羅空自縣按趙子昻家居有以飛鳴宿食四鴈圖求跋者時詞客滿座而端叟老禪亦預焉子昻屬客賦詩端公援筆立成合座歎異乃潘訒叔以此詩入薩天錫集蓋未之考也山房自述故園歸路隔天涯絶頂閒房且寄家翻罷貝多山月上一簾華影漾袈裟雪樵珠霰飄飄柴在肩且謀燒火過殘年庭前此際無人立爐內憑誰續斷烟天上天上日沒月又出山中葉落花還開黃泉只見有人去不見一人曾得回題羅漢圖諸諦空來世所無神通百變絶名模不知何處留蹤跡却被人傳作畫圖楚石琦名梵琦小字曇曜族姓朱氏母夢日墮懷中而生九嵗時趙子昻見而異之為鬻僧牒得度傳法於徑山元叟端和尚帝師錫號曰佛日普照慧辨禪師送的藏主歸里日本師僧皆可喜不憚鯨波千萬里捐軀為法到南方如此出家今有幾苦參的是禪家流密證濳符更竒偉從來佛祖是生寃肯認山河為自已五千餘卷紙上語却笑癡蠅攢未巳自家寶藏無一物盡大地人提不起年窮臘盡歸去來東風入律梅花開送天寧謐藏主回淨光永嘉老子錯行腳被人呼為一宿覺曹溪只是箇樵夫佛法何曾解參學三千威儀八萬行一霎清風頓銷鑠偶然撰得文字成盲子喚作真丹經泥中洗土不唧𠺕畫蛇添足空丁寧看渠兩著渾未是學者焉能出生死如來藏裏本無珠萬古虛名挂唇齒為我殷勤問淨光永嘉老人應著忙說與如今甚時節莫戀松風與江月送興藏主遊金陵春山青春水緑一枝兩枝梅花開十里五里村路曲石城雲影聚復散草店雞聲斷仍續莫言描畫心手拙此景當前本竒絶誰能一字施品評簡盡五千四十八道人笑我虛開口矢上加尖成漏透背却法堂穿草鞋井深綆短終難搆送徑山一藏主一大藏教間葛藤盡大地人跳不出夢菴本是竒衲子夜半扶桑吐紅日拈起凌霄峰頂茶却是洞庭湖上橘三千世界菴摩勒放開揑聚誰能詰松風澗水自談𤣥却笑區區論權實送可禪人即心是佛無心道不覺全身入荒草語拙今人笑古人古人却笑今人巧後生晚長忘聰明且要低頭學老成却憶南泉好言語囑渠癡鈍過平生海屋普門道人索我歌未免平地生風波屋為海耶海為屋海屋之義當如何百千瀛渤從此起起亦不離涓滴水沃日滔天也大竒卷舒只在軒窗裏海東青行海東青高麗獻之天子庭萬人見之不敢睨玉爪金眸鐵作翎心在寒空韝在手一生自獵知無偶孤飛直出大鵬前猛志豈落駕鵝後是日霜風何凜冽長楊刷羽看騰瞥奔雲突霧入紫霄狡兔妖蟇灑丹血束身歸來如木雞衆鶻欲並功難齊爾輩無才空碌碌不應但費官厨肉上都避暑宜來此逢冬可住不地高天一握河雜水長流赤日不知夏清霜常似秋向來氷雪窟今作帝王州開平書事二首地勢斜臨北河流穩向東龍庭行萬里虎路達三嵕邉女裁皮服材官控角弓長吟對落景獨坐感飛蓬夜雪沙陀部春風敕勒川生涯惟釀黍樂事在彈弦不用臨城將何須負郭田雙鵰來海外一箭落天邉漠北懷古北向無城郭遙遙接大荒舊來聞漢土前去是河湟野蒜根含水沙蔥葉帶霜何人吹觱篥南客淚沾裳曠野多遺骨前朝數用兵烽連都護府柵繞可敦城健鶻雲間落妖狐塞下鳴却因班定遠牽動故鄉情石屋珙本名溫清珙卜居霅溪之西地曰天湖所著詩偈甚富惟擇其雅者存之天湖卜居五首林木長新葉繞屋清陰多深草沒塵跡隔山聽樵歌自耕復自種側笠披青蓑好雨及時來活我新栽禾遊目周宇宙物物皆消磨既善解空理不樂還如何月來照我門風來吹我襟勸君石上坐聽我山中吟𤣥鬚化為雪朝光成夕隂萬事草頭露豈得長如今種豆兩三畦離離覆原上不知陽和功惟言土力壯老兔伏崖根心心欲希望果能息汝貧吾寧不食醬山中一雨滋原上百物好手種三畝薯亦可延昏曉咄哉世間人名利常關抱頭上雪紛紛胸中塵浩浩結屋霞峰頭耕鉏供日課山田六七丘道人三兩箇開池放月來賣柴糴米過老子少機關家私都說破登霞峯晴明無事登霞峯伸睂望極開心胸太湖萬頃白㶑灔洞庭兩㸃青蒙茸初疑仙子始綰角碧紗作帽參差籠又疑天女獻花至玉盤捧出雙芙蓉明知此境俱幻妄對此悠然心未終徘徊不忍便歸去夕陽又轉山頭松閒居二首道人緣慮盡觸目是心光何處碧桃謝滿溪流水香草深蛇性悅日暖蝶心狂曾見樵翁說雲邉霅晝房巖臺舒野望依約見松門唐代高僧寺宋朝丞相墳溪光晴㵼逺野色晚來昏山路歌聲絶樵歸烟火村雜詠四首滿頭白髮瘦稜層日用生涯事事能木臼秋分舂白术竹筐春半曬朱藤黃精就買山前客紫菜長需海外僧誰道新年七十七開池尚欲種茭菱自入山來萬慮澄平懷一種任騰騰庭前樹色秋深減檻外泉聲雨後增挑薺煮茶延野客買盆移菊送鄰僧錦衣玉食公卿子不及山僧有此情茅屋青山緑水邉往來年久自相便數株紅白桃李樹一片青黃菜麥田竹榻夜移聽雨坐紙窗晴啓看雲眠人生無出清閒好到得清閒豈偶然法道寥寥不可模一菴深隱是良圖門前養竹高遮屋石上分泉直到厨猿抱子來崖果熟鶴移巢去澗松枯禪邉大有閒情緒收拾乾柴向地爐絶句二首茅屋低低三兩間團團環繞盡青山竹牀不許閒雲宿日未斜時便掩關離衆多年無坐具入山長久沒袈裟單單有箇鐵鐺子留待人來煮瀑花天如示友人塵網苦多纍暫閒如脫羈胡為塵外迹而乃東西馳聚談每倉卒既遠翻多思眼前失真宰身外何求知百骸如僕馬勢合聊相隨氣運忽遷謝一散無重期來日不可待去日不可追靜緣當自保世故方無涯夜坐聞蛩山人坐樹陰樹轉月當午江市夜猶喧笙歌雜砧杵寒蛩亦何情唧唧如共語前聲稍悲悽後聲轉哀苦人心汝莫知汝語人莫取萬類各有私悲歡豈同趣茫茫元化中同一風氣使何如悟天真隨分樂生死篳篥引西瑛懶雲窩距余禪室半里許時相過從吹篳篥以為供復于余言有所需乃賦長歌以贈西瑛為我吹篳篥發我十年夢相憶錢塘月夜鳳凰山曾聽酸齊吹鐵笛初吹一曲江風生餘響入樹秋嗚咽再吹一曲江潮驚愁雲忽低霜月黑坐中聽者六七人半是江湖未歸客歡者狂歌繞樹行悲者垂頭淚沾膝我時靜對同學人斂襟共坐松根石脫略悲歡萬念消悟聲無性聞無跡遊三相臺示甘楊諸友臺乃姚崇牛僧孺劉沆讀書處也我登三相臺南望雙㢲峰俯視下界如凌空開元老樹可百丈斷崕盡日呼顚風甘郎攀果學猿掛楊子枕石飛泉中垂藤離地坐我穩袒跣長嘯如乘龍嗚呼昔人不再得臺上土花幾秋色前身不與後身期白雲豈識羅衣客贈奕士高顯卿對客將為顯卿歌顯卿去兮吾奈何商山莫招象山暮當代如卿亦難遇不須殺活談兵圍我以氣色觀神機秋鷹失兔草莽動斷道夜雪行人稀丹還金鼎㑹龍虎海國破浪孤篷歸太初一黑蕩摩裏萬化白戰搏空起何曾一路無死生觀者紛紛少知此西來訪古崑崙丘拔劒夜舞呼蒼虬登白鶴兮問王屋汗漫長歌紫芝曲相逢安得聞此歌共笑人間殘局多上海舟中即事烏溪出閘催雙櫓急趂回潮下黃浦午前期到上洋城生怕潮來近亭午夜潮已落岸痕高風卷浪花翻雪滷渡頭趂度人如雞水行泥行亦良苦西岸衝波逺入村東岸湧沙作林圃岸上居民無定蹤頗怪潮行無定所吾年五十遊上洋今嵗重來五十五豈無玉雪美少年向來一揖成千古亦有鴟張萬石家勢去一朝無寸土噫吁嘻人生幻化若浮雲陵谷變遷何足數真州送别悅希雲欲别不别重相攜别思已逐寒雲飛飛雲一去不可得千村萬落明斜暉回首望吳山滿目青依依亦如送我望我去立盡風烟未忍歸送時無擇維那歸閩百計歸難禁生緣樂未窮聽鐘椰葉雨欹枕荔花風客久閩音化交深楚俗通片帆明日逺雲斷海天空重登秋月樓病力蘇新雨登樓看夕陽岸移江市逺州接柘園長村晚烟催暝水陰雲送凉客中情味熟隨地得相忘遊茅山雲林清遠之館華陽有客似重來新見雲林别館開寒日半巖松鶴起腥風萬壑雨龍回琴牀流露滋瑤草丹鼎飛春上玉梅居者未知清且逺人間咫尺望蓬萊次韻送古潛縣宰解印遄歸意若何山人長憶舊相過詞鋒稍見禪機熟案牘不如吟卷多花雨聽鶯春滿酒柳風回馬月搖波賞心樂事皆勳業留與溪翁溪女歌登茅山天市壇二首白雲剪作瑤壇雪寒旭蒸開玉洞花山北山南看更好炊烟朵朵是仙家郭仙清夜扣舷時萬籟秋笙月一池千載誰傳靈鳳曲羽童吟作步虛詞師子林即景半簷落日晒寒衣一鉢香羮野蕨肥春雨春烟二三子水西原上種松歸卧雲冷室睡魔醒殘漏聲聲促五更一夢又如過一世東方日出是來生天隱即事春路晴猶滑山亭晚更長竹枯湘淚盡花發楚魂香西湖水光山色四無人清曉誰看第一春紅日漸高絃管動半湖烟霧是遊塵寒食月暗花明掩竹房輕寒脉脉透衣裳清明院落無燈火獨繞回廊禮夜香愚菴及名智及字以中吳縣顧氏子入海雲院為沙彌見廣智欣公於建業與諸名流以詩句和同參訂之歸海雲見秋葉墜庭豁然有省後侍端叟居徑山嗣其法席屢主大剎宋景濂為序四㑹詩録極稱之答東皋伯逺法師東皋尊者隱郊壚小小屠㢝睹史居切柏代香朝演法卷簾進月夜抽書村園果熟秋霜後花徑苔生宿雨餘心境兩忘諸幻滅更從何處覓真如題師祖善權元翁小影為愛團圞十畝園紅芳消後緑陰連杖藜日涉真成趣野菜時挑不費錢臨濟栽松親钁地仰山種粟自燒田祖翁活計誰能㑹獨立南榮為惘然全室泐字季潭臨海人族姓周氏八嵗從天竺笑隱學佛二十受具居然有禪伯之稱寓意詞章尤精𨽻古虞伯生黃晉卿輩皆引為方外交所著詩文有全室外集望河源河源出自茂巴爾楚巴山西人呼黃河為瑪納斯氂牛河為必里楚楚巴者分界也其山西南所出之水則流入氂牛河東北之水是為河源豫西還宿山中嘗飲其水彼國人戲相語曰漢人今飲漢水矣其源東抵崑崙可七八百里今涉處尚三百餘里下與崑崙之水合流中國相傳以為源自崑崙非也崑崙實默札拉其山最高大四時常雪有神居之積雪覆崇岡冬夏常一色羣峯讓獨椎神君所栖宅傳聞嶰谷簧造律諧金石草木尚不生竹産疑非的漢使窮河源要領殊未得遂令西陲子千古笑中國老客此經過望之長太息立馬北風寒回首孤雲白登高丘而望逺海登高丘望東溟溟水方蕩激中有怒吼鯨聳沓類峰嶽鼓浪如雷霆噓煙噴沫雲霧冥揚鬐掉尾三山傾腹吞巨舟者百十蝦蟹不足饑腸撐奈何驕悍當海橫官漕賈船不敢行鮫人織綃機杼停神仙局踳逃蓬瀛天吳既辟易龍伯亦震驚徒為蟲族長空有水神名制御一顚倒含羞乞尋盟吁嗟彼鯨爾何獰恃其險惡雄勢成若失此海水何以藏其形使居陸阜間轉眼遭剝烹海濱壯士雙目瞪拔劍欲往心縣旌何不訴之於上帝天威下殛無遺生立見海水清且平海光不動青瑤瓊此詩為方谷真而作見心復名來復字見心號蒲菴豐城人族姓黃氏禮南悅楚公為師早有詩名遊燕京與虞歐諸君子交甚善元末亂作航海至鄞止於定水寺明初被召極承褒美後坐胡黨伏誅按稗史稱見心本姓明名天淵曾官至正間翰林學士削髮為僧不知何據送丁鶴年兵後還武昌冦亂移家去鄂城白頭重到影竛􅀈田歸東里新編甲墓指西人舊姓丁樵牧不侵經世變松楸無祭泣山靈野棠花落啼鵑急一酹椒漿老淚零奉柬周伯溫左丞學士風流玉雪標早陪鳳輦聽仙韶光分蓮炬從天下香帶爐烟近日飄書擬漢秦誇二篆史修南北見三朝承恩曽記東來後繡斧光華擁使軺山謳閒占雲霞作近鄰芋田雖薄不嫌貧五風十雨清平世萬壑千巖淡泊身南嶽馬駒應有䜟西湖獅子總無人金襴漫笑藏雞足傳到龍華是幾經守仁字一初稗史載與錢塘僧德祥皆在明初被召未幾俱罹禍想為智聰所株連乎石蟹泉神鰲馳水到禪家清出龍泓味更佳晴帶浦雲穿曉籪暗隨山雨走寒沙玉臍圓映波心月瓊沫香浮沼面花擬待春風招社客焚香來試九溪茶和虞邵菴見訪福勝寺老却黃花客未知回舟旬日漫相期龍江話月銜杯久獺徑看雲步屧遲天地長縣司馬記山川有待杜陵詩錦囊收拾同誰讀側耳蛩聲入思時德祥錢塘人見一初傳過湖州平生只想住湖州僻性迂情可自由一片水聲中倚杖數重山色裹行舟東林書卷貧猶買西塞綸竿老未收緩得歸程近寒食杏花春雨聽鳴鳩香奩十人盧希孟巴陵人賈瓊妻盧魏公五世孫也元兵破嶽州希孟誓不辱寫詩於衣帛自沈大江而死詳見郝經巴陵女子行自沈詩退鷁落迅風孤鸞弔空影簪堅折白玉瓶沈斷青綆妾死志不移改邑不改井我本瑚璉器安能作溺皿借此清江流葬我全首領皇天如有知定作血面請願魂化精衛填海使成嶺又裙帶中詩我質本瑚璉宗廟供蘋蘩一朝嬰禍難失身戎馬間寧當血刃死不作衽席完漢上有王猛江南無謝安長號赴洪流激烈摧心肝管道升字仲姬翰林承㫖趙孟俯妻生稟絶慧詩詞書法及繪事無所不通長子雍字仲穆壻王國器號筠菴則王叔明之父也奉中宮命題所畫梅雪後瓊枝嫩霜中玉蘂寒前村留不得移入月宮看仁宗命夫人書千文敕玉工磨玉軸送祕書監裝潢收藏因又命子昻書六體為六卷雍亦書一卷且曰令後世知我朝有善書婦人且一家皆能書亦竒事也附漁父詞人生貴極是王侯浮利浮名不自由爭得似一扁舟弄月吟風歸去休孫蕙蘭傅若金妻性慧工詩年二十二歸若金五月而卒緑窗吟窗裏人初起忩前柳正嬌捲簾衝落絮開鏡見垂條坐對分金線行防拂翠翹流鶯空巧語倦聽不須調小閣烹香茗疏簾下玉鈎燈光翻出鼎叉影倒沈甌婢捧消春困親嘗散暮愁吟詩因坐久月轉晚妝樓偶成小窗今日繡針閒坐對銀蟾整翠鬟凡世何曾到天上月宮依舊似人間假僧奴大理總管假功之女也其父有功於梁王博囉博囉妻以女曰阿結主又復忌假功而殺之僧奴幼知父寃時懷報仇之志將適夫家出手刺繡旗以與弟寶因作二詩示之蓋孝女而兼智勇者也志復父仇示弟寶珊瑚勾我出香閨滿目潸然淚溼衣氷鑑銀臺前長大金枝玉葉下芳菲烏飛兔走頻來往桂秀梅馨不暫移惆悵同胞未忍别應知含恨㸃蒼低何彼穠穠花自紅歸車獨别洱江東鴻臺燕苑難經目風刺霜刀易塞胸雲舊山高連水逺月新春疊與秋重淚珠恰似通宵雨千里關河幾處逢曹妙清字比玉自號雪齊錢塘人善鼓琴工詩行書㸃畫皆有法度三十不嫁風操可尚嘗寫詩寄鐵崖鐵崖答之云紅牙管蒂紫狸毫雪水初融玉帶袍寫得薛濤萱草帖西湖紙價可能高曹事母孝謹玉帶袍其家硯名和西湖竹枝詞美人絶似董嬌饒家住南山第一橋不肯隨人過湖去月明夜夜自吹簫張妙淨字惠蓮錢塘人善詩章曉音律晚居姑蘇之春夢樓號自然道人聖湖曲憶把明珠買妾時妾起梳頭郎畫睂郎今何處妾獨在怕見花間雙蝶飛薛蘭英吳郡人與其姝蕙英皆聰明秀麗能賦詩建一樓以處曰蘭蕙聨芳有詩數百首顔曰聨芳集楊廉夫製西湖竹枝詞和者百餘家薛見之笑曰西湖有竹枝曲東吳獨無竹枝曲乎乃效其體作蘇臺竹枝詞十章大為鐡崖所賞自是名播逺近目以班婕好蔡文姬復出云蘇臺竹枝詞姑蘇臺上月團團姑蘇臺下水潺潺月落西邉有時出水流東去幾時還館娃宮中麋鹿遊西施去泛五湖舟香魂玉骨歸何處不及真娘葬虎丘虎丘山上塔層層靜夜分明見佛燈約伴燒香寺中去自將叉釧施山僧門泊東吳萬里船烏啼月落水如煙寒山寺裏鐘聲早漁火江楓惱客眠洞庭餘柑三寸黃笠澤銀魚一寸長東南佳味人知少玉食無由進上方荻芽抽筍楝花開不見河豚石首來早起腥風滿城市郎從海口販鮮回楊柳青青楊柳黃青黃變色過年光妾似柳枝易憔悴郎如柳絮太顚狂翡翠雙飛不待呼鴛鴦並宿幾曾孤生憎寶帶橋頭水半入吳江半太湖一窩鳳髻緑如雲八字牙梳白似銀斜倚朱門翹首立往來多少斷腸人百尺樓臺倚碧天欄干曲曲畫屏連儂家自有蘇臺曲不去西湖唱採蓮鄭奎妻春詞春風吹花落紅雪楊柳隂濃啼百舌東家蝴蝶西家飛前嵗蟠桃今嵗結鞦韆蹴罷鬢鬖髿粉汗凝香沁緑紗侍女亦知心內事銀瓶汲水煮新茶夏詞芭蕉葉展青鸞尾萱草花含金鳳觜一雙乳燕出雕梁數㸃新荷浮緑水困人天氣日長時針線慵拈午漏遲起向石榴陰畔立戲將梅子打鶯兒秋詞鐵馬聲喧風力緊雪窗夢破鴛鴦枕玉爐燒麝有餘香羅扇撲螢無定影洞簫一曲是誰家河漢西流月半斜要染纎纎紅指甲金盆夜搗鳳仙花冬詞山茶半開梅半吐風動簾旌雪花舞金盤冒冷塑狻猊繡幕圍春護鸚鵡倩人呵筆畫雙睂脂水凝寒上臉遲妝罷扶頭重照鏡鳳叉斜壓瑞香枝惜花春起早胭脂曉破湘桃萼露重荼蘼香雪落媚紫濃遮刺繡窗嬌紅斜映鞦韆索轆轤驚夢急起來梳雲未暇臨妝臺笑呼侍女秉明燭先照海棠開未開愛月夜眠遲香肌半嚲金叉卸寂寂重門鎖深夜素魄初離碧海端清光已透珠簾罅徘徊不語倚欄干參橫斗轉風露寒小娃低語喚歸寢猶過薔薇架後看掬水月在手銀塘水滿蟾光吐嫦娥夜夜馮夷府蕩漾明珠若可捫分明兔頴如堪數美人自挹濯春蔥忽訝氷輪在掌中女伴臨流笑相語指尖擎出廣寒宮弄花香滿衣鵑聲響處東風急紅紫叢邉久凝立素手攀條恐刺傷金蓮移步嫌苔溼幽芳擷罷掩蘭堂馥郁餘香滿繡牀蜂蝶紛紛入窗戶飛來飛去繞衣裳鄭氏允端紀夢麻姑古仙人夜夢忽焉覩面生看漸熟儼然一處女年可十七八指爪長有咫高髻青霞衣餘髮散如縷自云接侍來三變桑田水近過蓬萊山弱水亦清泚招我西池遊池頭遇董許余笑而不言飄飄自高舉望夫石良人有行役逺在天一方自期三年歸一去凡幾霜登山臨絶巘引領望歸航歸航望不及躑躅空傍徨化作山頭石兀立倚穹蒼至今心不轉日夜遙相望石堅有時爛海枯成田桑石爛與海枯行人歸故鄉聽琴夜深衆籟寂天空缺月明幽人據槁梧逸響發清聲一韻再三彈中含太古情坐深聽未久山水有餘清子期既物化賞心誰與并感慨意不已天地空崢嶸憶妹有妹隨夫壻之官在匡廬到今一年久音問絶來書近聞羣盜起總在大江西所至剽城邑殺人血成渠不知患難中生死竟何如懷哉鶺鴒原獨坐渺愁豫秋胡妻婉彼魯姬姜出採林下桑逺人何處來下馬古道傍黃金致微言少年為貴郎婦人秉素心鐵石填衷腸豈為物所移古井波瀾揚為謝道旁子請歌行露章耕牧圖幽人薄世味耕牧山之隂自抱朴野姿常懷畎畝心行行南山歌落落梁甫吟挂書牛角上揮鋤瓦中金飽飯黃昏後力田春雨深四體勤樹藝三生語浮沈巢父世高尚德公人所欽伊人去已遠高風邈難尋撫卷空歎息俯仰成古今山水障歌我有一匹好素絹畫出江南無數山筆法豈但李營丘直擬遠過楊契丹良工好手不能遇此畫森然能布置層巒疊嶂擁復開怪石長松儼相對板橋茅屋林之隈瀑流激石聲如雷恍然坐我匡廬下便覺胸次無凡埃此身但向閨中老自恨無由致蓬島布襪青鞋負此生長對畫圖空懊惱吳人嫁女辭種花莫種官路傍嫁女莫嫁諸侯王種花官道人爭取嫁女侯王不久長花落色衰人易變離鸞鏡破終成怨不如嫁與田舍郎白首相看不下堂搗衣曲男兒遠向交河道鐵馬金戈事征討邉城八月風霜寒欲寄戎衣須及早急杵清砧搗夜深玉纎銅斗尉貼平裁縫製就衣襖裙千針萬線始得成封裹重重寄邉使為語夫君奮忠義好將勳業立邉陲要使聲名垂史記題畫誰寫江南景風烟萬里寬金銀開佛寺紫翠出林巒逺客馳行役幽人賦考槃蒼茫無限意撫卷為盤桓題明皇並轡圖三郎沈醉後上馬玉環隨如何西幸日不見並鞍時題村景㸃㸃青山翠欲流短蓑漁子坐扁舟荒村五月凉如水茅屋扶疏草樹秋咏橘滿林霜落洞庭西橘柚青黃照眼齊念我已無慈母奉故人書後不須題秋窗書懷詩骨從來不受肥那堪衰病弗勝衣朝來試把羅裙整瘦比今春又半圍水檻近水人家小結廬軒窗瀟灑勝幽居憑欄忽聽漁榔響知有小船來賣魚宮人程一寧元順帝時登翠鷲樓淡月清寒透碧紗小窗和夢聽啼鴉春風不管愁深淺夜夜開門掃落花附見梅花尼咏梅花終日尋春不見春芒鞋踏破嶺頭雲歸來笑撚梅花嗅春在枝頭已十分宋元詩㑹卷一百
