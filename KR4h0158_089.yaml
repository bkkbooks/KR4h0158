body:
  text: 宋元詩㑹卷八十九兵部主事陳焯編陳樵字君采婺之東陽人别號鹿皮子世為浙東巨族其父名取青宋末進士嘗抗章詆賈似道誤國及宋亡元丞相巴延見其章欲用之辭不就樵幼承家學又受易詩書春秋大義於李直方凡古今之書無不讀讀無不解學成而隱邈然不與世接著書數十種而易象數新說洪範傳經解左經新說太極圖通書解聖賢大意性理大明石室新語淳熙糾繆尤見稱於學者卒年八十有八為至正乙已年詳見宋景濓所撰墓志清隱亭白日照陽春九陌揚逺塵往來酣蟻戰誰是投閒人人生茍知足政復貴隱淪萬事等大夢汨沒徒艱辛所以賢達士不肯勞其神結亭林泉間歸來養清真窗虛野鳥狎樹密山猿馴草色上階秀花枝倚檻新俯仰有佳趣樽酒時相親終焉逺塵俗不愧無懷民送吉夫北上之子氷雪姿冥心學仙真官卑且勿念況復憂其貧邇來太白山山勢凌秋旻雲盡月照夜花開鳥鳴晨閒居少公事猿鶴為比鄰採芝過林麓釣魚游水濱七年不得調幽興如逸民通塞任物理聊用安此身憶昔始相識交情日以親問君煉藥方祕之不肯陳金液且莫採何以製水銀豈伊蓬萊中無分追後塵君今别我去九關朝帝宸功名信可就慎勿煩精神閬風青峩峩海波白粼粼他年重㑹面笑盼桃華春答李齊賢言别古來青雲士論德不論年及時揚意氣車服耀且鮮譬彼桃李花逢春各爭妍胡能學蘭菊遲暮秋風前羡子富年華文思如湧泉詞場早騰譽海內推英賢而我竟何為著鞭苦不先賦命有遲速行止任自然吾觀鴻鵠飛低回未須憐㑹當振六翮高舉摩青天嵗寒亭夕隕悲蕣華秋零悼蒲栁急景不可留髙風邈難久風霜十二月松竹凋獨後還與嶺上梅結為嵗寒友草木本無情猶能同嵗寒奈何市井交輕薄不足觀把酒把酒勸白日日車邈難攀朝來出東海薄暮沈西山東西若循環來去無時閒何如延光景令人駐朱顔送兄游姑蘇浮雲渺天末隨風恣悠揚遊子四方志去去道路長手中二尺琴朱絃泛宫商但恐和者寡使我心增傷晚香徑秋菊有佳色幽香知為誰蔚為霜中傑肯向露下衰獨賞心悠然酒至觴淋漓永懷陶靖節高風邈難追東飛伯勞西飛燕題飛花亭東飛伯勞西飛燕花光絮影從風轉蜂黃蝶粉照靈葩不散明珠祇散花霑衣墮袂花如雨羽人化蝶隨花去羽人下顧笑春紅春閨一夕生秋容骨齊熊耳君知否花艷春暉不經久羽衣一瞬千萬春蔫花墮蕊齊昆崘夜闌曲碧宇星回夜漫漫靈蕪煙暖重熏薦冷翠香銷青桂枝氷荷蓋光光繞帷纎腰艷舞金萎㽔吳羮蜀酒精瓊糜酒闌半解龍綃衣春朝曲渚聞鵾雞海人謠海南蠻丁髮垂耳朝朝采寶丹崖裏夜光盈尺出飛魚柏葉收珠寒蕊起幽箔連錢生緑花切玉蠻刀如切水九譯來朝萬里天北風不動明玕死行路難褰帷取流蘇流蘇不解連環解離情别思出君懷教人枉結流蘇帶作書報天孫河翻浪動七香軺折伊蘭兮捐艾蕭伊蘭化作榛中草美盼何須比目魚六翮安用頻伽鳥文鴛宛頸奈枝連不如見月生羽翰七夕宫詞內人拜月金鋪戶鳳宿梧枝秋葉舞露華入袂玉階寒織署錦工催祭杼月下金鈿照骨明同心絲鱠紅生縷素瓜碧寶上華樓夜闌飈馭下銀州送厲生之天台劉郎洞前藥草肥年年送春春不歸劉郎採藥路不迷路迷却是還家時人間藥盡採者稀醫師採藥歸來遲終南捷徑莫西去正在劉郎路迷處代嘲舊人吳王臺前天地老羊家吹笛煙花繞羊郎到老不識顰昨日西施顰更好妾行自綰春風髻姊送出門車在道塗金兩袖石麒麟姊唾乾時碧如草唾花一夜滿妾身云是背後淖夫人代玉山子答建中老父吹蘆管背花吹盡風花片雪中花老花未知我起開簾納江燕夏姬引鏡春爭妍房老不出金谷園花奴鼓急人人顧砑光帽滑花難住題海棠東風吹墮緗雲影别院春遲宫漏永繡幃寶帶綰流蘇夢入瑤臺呼不醒熒熒銀燭花蕊多城頭烏啼奈曉何題騎牛讀書圖朝看書騎牛出去日上初暮看書騎牛歸來日欲晡朝朝暮暮看書卷還慮牛飢無牧芻家貧本分辛勤過平時敢望閒工夫人生衣食皆有餘棄之不學將何如中秋月銀漢西流烏接翼回首人間化為碧瑤臺貝闕可避居三郎錯路歸魚鳧霓裳月裏親偷得却怪李謨偷壓笛投外憲職浙右饒名宦天潢異衆流星華婺女分印蘚越城秋長吏多佳政流人反故丘諸郎復為郡外憲此優游銀谷澗山房樓臺依水石石樹帶疏篁洞口有靈藥水西無夕陽天花空處沒春草定中長芳桂已飛盡有時聞妙香次周剛善僧房牡丹韻不擬維摩室春風步障開欲分清露浥故近白雲栽色奪人間艷香從天上來韶華正繁富啼鴂莫相催春日二首處處春風滿東皇信不偏蘼蕪窮逺岸梅栁共新年白水暖浮日碧山晴吐煙清時多樂事敢擬卜居篇細雨花隂重輕煙草色勻驚禽長避客嬌燕却依人絃管紅樓酒輪蹄紫陌塵東風競游賞因想杏園春送張仲舉歸晉陽舉進士挂帆謝公浦把酒闔閭城江栁不忍折春風當别行關雲連楚暗隴月向吳生葉落長安道思君北問程黃晉卿見過却歸烏傷江雨間行人江干雨又新今朝下垂榻幾日望行塵氷雪鶯遷樹江湖雁得春非君被軒鑒懷抱欲何伸太霞洞石林深處飯胡麻幾度登臨送日車雪到峰頭猶是雨雲生石上半成霞相看露下朝華草不放春歸冷艷花魏紫姚黃風捲盡人間蜂蝶到山家越觀吳根越角兩茫茫石傘峰頭俯大荒鳥道北來通禹㑹雁程南去盡衡陽雲移暫覺天河沒月暗不知松影長天姥若耶他日事明朝采蕺下山梁溪亭百尺層崖接翠微潭空石影曉離離雲隨白鶴翔千仞月與青猿共一枝不信水深騎赤鯉曾因夢裏殺黃鸝芳洲翠羽無人拾自補山中白接䍦翻經臺石函朱几曙雲中雲散臺高萬象空枝重有時來白鳥雨殘無處著晴虹血書貝葉三年碧秋入蘿衣半袂紅幾度山人同聽法翠微深處石池龍少霞洞山居二首輕霞洞口採金芝千嵗山南聽竹雞煮石鼎中饒緑薤封書燕外有丹泥度關僧寄婆羅樹入寺人傳木客詩又抱瑤琴向隂壑青禽啄碎碧梧枝木客詩見江西圖經煙霧霏霏溼麝媒文生緑硯硯生苔天風拂地鳳笙下楚雨入吳龍女回石壁水花泉湧出海棠春色鳥銜來洞天只在風塵裏門外游塵掃不開招隱巖何年積蓋與山齊樹轉峰回草徑微野火裂為方解石秋風不到寄生枝誰來樹下看雲坐半入人間作燕飛箬笠巖前今淨社寧須更草北山移紫微巖手種巖花對北峰花間無葉紫茸茸人行鳬雁不到處家在鶯花第幾重緑水值隂還又碧青春著樹却成紅紫霞漫入絲綸閣且伴山中白髮翁飛花亭昨日朝華照夕曛我看夕秀比朝菌松高猿見古時月花晚鶯添幾日春盛露囊中封臘藥無塵袖裏裹吳雲人間何用春長在只愛飛紅日日新水亭小鳳穿花照水明水禽衝浪動軒楹雲從薜荔衣中起雨向玕琪樹上生曲水傍人流白羽嬌花無語答黃鶯澗中日與山中日同上晴忩各自行南軒澗底菖蒲緑滿叢雲根水竹傍梧桐人來逺地見山碧月未冷時如日紅春水有聲通北澗晚花無信誤東風人間不是高寒地那得芳菲入夏中臨花亭芳草生煙藥在房鞓紅衣紫共芬芳丘園風雨三家市草木文章萬丈光花正欲言還寂默春無自性不堅良晚來只有鵝紅在莫放香絲取次黃西峴峰聽盡熙寧水樂聲斷碑無字倚荒庭雲歸僧舍樹皆濕犬吠獵園山誤譍覆屋松隂遮日黑隔林春色著雲青故侯轍迹無尋處丞相題詩擬峴亭上虞魏氏湖上精舍圗湖上蘭舟水上亭有時水漲與階平亭前古樹經春發門外孤洲昨夜生海氣遙連育王塔蜃樓斜入㑹稽城山隂道士攜琴至寫盡風聲到水聲霜巖石室洞天無暑亦無寒淑氣芳風不出山掃葉僧歸雲未濕賣花人去蝶先還滿庭修竹下黃葉千嵗古松生緑煙盡道雪中依裸壤虛疑夏室是氷天石磴磴平如席草茸香盛夏宜人石氣涼杜宇血銷添碧燐山雞食罷化餘糧赤松有約吾將老白髮無愁不解長醉則潄流眠枕此看雲不復據胡牀菊庵秋深紅紫滿秋籬穠蒂纎莖緑照扉猿飲澗中甘菊水雲粘石上舊蓑衣月知人境來相覓花有心情死不飛桃李自開還自落却疑晚卉未忘機山房冷雲堆裏散人家鹿幘羊裘不衣麻門外樹身無嵗月山中人語帶煙霞雲侵壞衲長生菌風斷游絲半度花采蕺林深人不見連筒引水自煎茶麞谷澗清流拂石下巖隈澗底菖蒲曳緑苔野鹿避人縣樹宿溪魚乘水上山來翠連春草誰能拾風觸石崖彊半回自入夏來涼意定更移修竹澗邊栽伏蟾山山上飛雲去不留山中蟾兔又經秋斗臨河曲侵鶉尾露上莎根到草頭緑桂花中歌白苧碧梧影裏飯青牛有時竹掃蟾蜍下滿腹丹書溼欲流山館石甗峰前緑草肥絲挾雨上梧枝天台道士投龍去少白山人相鶴歸苜蓿帶茸初映日雕胡落釜半成糜石楠花落無人掃誰臥水隂歌采薇春日閨思白玉堂前雙燕飛堂中思婦怨殘暉臂環寄逺青蕪合瓊字題乾白雁歸醉倚合昏驚葉暗愁尋豆蔻妬花肥忩間昨日同心錦染罷香絲不上機園築園却欲留方士一室圜中度嵗年有客持雲坐盤石無人伴月出蘿煙晴晞白髮三千丈寒折朱絲五十絃𤣥圃方壺君莫問人間回首即神仙玉雪亭二首花繞亭臺水繞門壺中别是一乾坤銀蟾飛去秋無色白石長來雲有根樹印虬枝翻畫譜僧調獺髓補詩痕相如健筆誰堪繼好騁詞華賦園羽仙飛步駕青鸞仙袂臨風響佩環琪樹移根來月裏瓊花無夢落人間春回隴首梅先覺舟入山隂客未還我亦玉堂揮翰手他年鵷鷺造朝班送蔡竹澗江山教諭仙霞嶺與落霞齊乘興吟游日未西簾影到池元是水縠紋浮雨却成溪煙清院竹鸞窺客日暖宮芹燕拾泥莫道廣文官况冷忩前生意草萋萋咏蘆雁宿沙汀栖處穩夜漏有奴看月暗蘆花白一身秋夢寒山水青山如髻樹如麻茅屋青帘認酒家侵曉一番飛雨過滿川流出碧桃花李孝光字季和溫州樂清人少博學雅志復古隱居雁蕩師峰下四方之士逺來受學名日益著台哈布哈以事之至正七年詔徴隱士用祕書監著作郎召赴京師見上於宣文閣進孝經上大悅賜上尊明年升祕書監丞卒于官年五十三有文集二十卷大星大星在天小星落城頭嗚嗚吹畫角津吏擊鼓河上船行人草草居人憐男兒墮地弧矢願南北東西君莫怨北風寄陳輔賢别本少前五句蕭蕭北風吹客船月未出海天蒼然客子放歌腳扣舷蕭臺東頭天裹海蕭臺西頭山刺天君行西過釣臺口寄謝江邊老病叟坐看雲臺落人手丈夫豈敢愛微軀奈此黃花一尊酒茅山謠道人兩鬢青如蓮大醉上山捫青天青天蕩蕩玉盤出引手舉盤天上縣銀海傾倒桂樹影長風吹香落丹井地上小兒沾玉馥白急搗𤣥霜熟愔愔仙家十二樓夜半起拂踆烏浴手招茅君呌列仙帶劍上立紅雲前茅君騎虎上天去道人乞我明霞篇送方叔高賦得長安道灞陵橋上秋風早行人曉出長安道長安城頭烏正啼長安陌上聞朝雞征車遙遙行復止征馬蕭蕭鳴不已將軍年少美且都黃金箭鏃雕玉弧未央前殿進書罷諸生拜官辭石渠將軍歸去亦草草長安道邉人羡好莫憐賈誼謫長沙不見馮唐禁中老妾薄命妾薄命當語誰身年二八為嬌兒阿母嵗嵗不嫁女二十三十顔色衰天公兩手搏日月下燭萬物無偏私奈何醜女得好匹一生常在黃金閨美女如花不嫁人父母既沒諸兄癡寄書東家小姑道得嫁莫擇夫壻好他人好惡那得知失時不嫁令人老越上賀家湖上又秋風放翁宅前東復東兩行雲樹忽逺近十里荷花能白紅游人濯足銀潢上越女梳頭青鏡中我欲張帆上南斗扶桑碧海與天通宿巢縣旅食荆吳改嵗年春風行路思綿綿青山故繞周瑜墓明月猶窺亞父泉楚縣城荒餘畫角巢湖日落有歸船天涯芳草萋萋緑漫為登樓憶仲宣送陳杏林赴潮州醫學教授三千驛路上灘船九品醫官半百年藥市得錢添月俸杏林收榖當公田北書漸覺江鴻逺南食初嘗海蛤鮮不用越巫驅瘴癘家家傳取衛生篇古長信秋詞二首缺月流光入綺疏金壺傳箭夢回初秦臺彩鳳無消息桂影空閒十二除輦路青苔雨後深銅魚雙鑰晝沈沈詞臣還有相如在不得當時買賦金李五峰擬古樂府與楊廉夫齊名今集內不傳一字當為拙目妄刪也吳王納涼圖六月長洲水殿涼酒酣揮袖倚新妝芙蕖露冷秋雲薄回首西風響屧廊游艮嶽一沼何堪役萬民一峰將使九州貧江山假設方成就真箇江山已屬人寄朱希顔江邊鴻雁下年年客子何由兩鬢𤣥七十二灘秋月白荻花風落釣魚船張昱字光弼廬陵人早遊湖海為虞集張翥所知楊左丞鎮江浙辟參謀軍府事遷杭省左右司員外郎行樞密院判官天下用兵藩府官多侵官怙勢光弼詩酒自娛超然物表左丞死棄官不出張氏欲禮致不應䇿其必敗題蕉葉寓意焉居西湖夀安坊今之花市也貧無以庀廬凌彥翀為疏募金繕葺之明初被徴至京閔其老厚賜放歸年八十三卒白鴒雀歌烏桓城下白鴒雀雄鳴雌隨求飲啄有時決起天上飛告訴生來毛羽弱西河伶人火倪赤能以絲聲代禽臆象牙指撥十三絃宛轉繁音哀且急玉真處子舞進觴團衫鞶帶分兩傍玉纎羅袖柘枝體要與雀聲相頡頏朝彈暮彈白鴒雀貴人聽之以為樂變化春光指顧間萬蕊千花動絃索只今蕭條河水邊宫庭毁盡沙依然傷哉不聞白鴒雀但見落日生寒烟賦白鴒雀者多矣覽此可得作歌之由歌風臺世間快意寧有此亭長還鄊作天子沛宮不樂復何為諸母父兄知舊事酒酣起舞和兒歌眼中盡是漢山河韓彭受誅黥布戮且喜壯士今無多縱酒極歡留十日慷慨傷懷淚沾臆萬乘旌旗不自尊魂魄猶為故鄊惜由來極樂易生哀泗水東流不再回萬嵗千秋誰不念古之帝王安在哉莓苔石刻今如許幾度西風灞陵雨漢家社稷四百年荒臺猶是開基處陪宴相府得芍藥花有感醉吐車茵愧不材馬前蝴蝶趂花回玉瓶盛露扶春起錦帳圍燈照夜開垂白敢思溱洧贈歌紅還是廟廊裁揚州何遜空才思惟對高寒詠閣梅惆悵三首三山夢斷綵雲空幾把長箋賦惱公畫閣小杯鸚鵡緑玉盤纎手荔枝紅春衫汗裛薔薇露夜帳香回茉莉風惆悵近來江海上却將鞍馬學從戎畫船湖上載春行日日花香扇底生蘇小樓前看洗馬水仙祠畔坐聞鶯碧桃紅杏渾相識紫燕黃蜂俱有情惆悵繁華同逝水盡歸江海作潮聲惆悵當年使酒來娼樓紅粉夜相催可憐明月二分在不見璚花半朵開誰復醉翁堂下栁更堪從事閣中梅揚州一片青青草誰信春來無雁回湖上漫興湖上新泥雪漸融門前溝水暗相通裙欺萱草輕盈緑粉學櫻桃淺淡紅暮雨欲來銀燭上春寒猶在酒樽空青綾被薄不成夢又是一番花信風秋興一夜涼風便覺秋楚人多感易生愁金盤露水何曾見紈扇恩情未肯休零落梧桐宮井上稀疏楊栁御街頭近來收得麻姑信說道蓬萊更可憂感事雨逼湖樓作晚寒此心時暫酒邊寬杞人惟恐青天墜精衛難期碧海乾鴻雁信從雲裏過山河影在月中看洛陽橋上聞鵑處誰識當時獨倚闌贈沈生還江州鄊心正爾怯高樓况復樓中賦逺遊客裏登臨俱是感人間送别不宜秋風前落葉隨車滿日下浮雲共水流知女琵琶亭畔去白頭司馬憶江州演法師惠紙帳銀燈照夜白紛紛四面光搖白縠文隔枕不聞巫峽雨繞牀惟走剡溪雲風和栁絮何因到月與梅花竟莫分塞北江南風景别却思氊帳舊從軍幕中呈楊左丞免胄日趨丞相府解鞍夜宿五侯家玉杯行酒聽春雨銀燭照天生晚霞世亂且從軍旅事功成須插御筵花漢王未可輕韓信尚要生擒李左車峽川石與青天近溪雲向客低自然堪下淚不是有猿啼水殿納涼圖别殿紅綃女無風亦自涼欄邊是湖水夜夜宿鴛鴦别劉博士秖為情如雨從教醉似泥免看楊栁色相送出城西栁花詞滿院長條散緑隂誰家門戶碧沈沈地衣不許重簾隔雪白花鋪一寸深婆留井錢王初生時將棄井宗婆奮留之故乳名婆留既貴以鏐代留字舊日婆留井未堙石闌苔蘚上龍鱗而今率土俱臣妾莫願皇天産異人題吳綵鸞寫韻圖小㸃紅鸞欲下遲逺山渾似畫來睂如何一念人間事上界仙曹便得知春日一陳東風一陳寒芭蕉長過石闌干只消幾箇懵騰醉看得春光到牡丹瞿宗吉云此詩刺淮張用事諸人也輦下曲守內番僧日念吽御廚酒肉按時供組鈴扇鼓諸天樂知在龍宫第幾重似嫌皎日破愚昏白晝尋常一釣軒男女傾城求受戒法中祕密不能言劉躍字宗起萁先南唐駙馬之後徙居廬陵其地名中洲故自號中洲釣者躍性警敏讀書過目成誦鈎𤣥托粹以大肆力于文章徴聘鼎來念祿不逮親概辭之作樓曰海雲延四方之士講學其中樂而忘老詩集若干卷禾川吳孟勤題為淵泉集蓋易中洲釣唱以是名美之嘉其學之有本也園樂為國賓先生賦君不見金谷平泉恣歡謔異石奇花成海嶽寧知富貴生百憂一旦荆榛總寥落灉江先生隱者流數畝荒園即為樂瓜畦新雨長更鉏橘井青天甘自鑿生意隨時灌野芳餘香暇日收仙藥倦來佳句獨長吟醉裏濁醪還更酌不讓習家兼有池絶似溫公乍居洛前年丹詔急賢良高臥白雲辭好爵東鄰公子帶橫金北里老翁田負郭從渠五鼎厭珍饌自分杯羮飽藜藿世路風波不暫停柴門烟月應如昨我亦江湖垂釣徒直鈎兼恨多蛟鱷明當抱瓮託幽棲尺書先寄東飛鶴梅村歌為金溪王用霖賦王先生有高趣家在梅村最深處清溪一派繞孤村種得寒梅千萬樹年年凍雪封林園羣木生意俱斬然忽驚一蕊破香玉直與天下春爭先繁花爛熳相高下倣佛枯梢晴雪亞光涵氷樹不勝秋影入瓊林欲無夜先生巾屨獨行吟看花繞樹窮幽深奚奴不覺錦囊重發興兼有龍蜃吟笑殺西風明月冷負却暗香與疏影絶似羅浮仙者流妙處無言心自領讀書樓為姪以安賦阿咸新起讀書樓十二欄干五月秋萬卷烟雲香墨潤一燈風露碧忩幽新題華扁回鸞鳳高捲朱簾近斗牛不用金籯遺孫子好傳鴻寶繼前修和送石維高之泉江愛君吟思浩無邊眼底交逰最少年開口已誇成玉唾論心偏得醉金船鳳凰瑞世鳴初日鴻雁排雲上逺天此别但應勞夢想高標梧竹淨姢娟沙渚盟鷗平沙白石渚初晴好共羣鷗訂舊盟斜日荒涼雲影落清風浩蕩雪衣輕海翁坐對應相狎山客行隨亦不驚却笑當筵賦鸚鵡疏慵久已謝浮名良月宴于棲遁處賦殘菊菊殘猶有最高枝棲遁齊前獨自怡深夜雪霜金瑣碎清晨風雨玉離披魏公不負題詩好陶令空嫌送酒遲憐爾秋香渾未減餐英回首更何之竒石為黃大賦相對憐孤石由來出四溟一峯支瘦骨千穴見竒形空洞含天趣巉巖育地靈鰲移愁負重龍擘帶餘腥巧斫慚羣匠神鞭謝六丁晴雲時吐白隂蘚間書青花木恢餘地琴書列廣庭願言題琬琰珍重列圖經張伯逺字可久號小山善製詞曲評者謂其清而且麗􅏞而不豔若披仙風招海月當以九方皋之眼相之餞祝直清朝餐狙林橡夕飲虎窟泉幽棲豈不逸于道為未全是以少微星含輝麗中天雲蘿謝招隱冠帶趨興賢魯生贊制作商老安疑然董子述徴驗賈誼明經權盛德有遭逢志士無棄捐長貧若忘世一出垂千年折梅楚山阿賦詩江水邊寂寞思古人中懷為君宣周密號草忩以樂府知名其出處籍里弗著惟成廷圭集中有送周草忩尊師歸廬山太平宫蓋元末詞人晚而學道者也然難直定為黃冠故不附張雨之後有懷袁季源江樓深夜倚涼入鬢蕭蕭人隔東西浙心隨早晚潮風高孤月暈河淡萬星搖欲寄今宵意新鴻或可招南園清芳堂下千株桂猶是韓家舊賜園白髮老翁和淚說百年中見兩平原吳當字伯尚澄之孫也當幼承祖訓以穎悟篤實稱長通經史百家言侍其祖至京補國子生至正五年以䕃授萬億四庫照磨未上用薦者改國子助教預修遼金宋三史書成除翰林修撰遷國子博士歷監丞司業祭酒待制翰林改禮部員外拜監察御史轉禮部郎中再入翰林為直學士時江南兵起大臣有薦當才可任政事者特授江西肅政廉訪使偕江西行省參政和尼齊兵部尚書黃昭招捕江西諸郡當召募民兵所至克捷連定建昌撫州二郡為總兵托多所忌構蜚語謂當與賊通而和尼齊者雅不善當亦力掩其平賊功狀於是當與黃昭皆左遷後誣白詔拜當江西行省參知政事命未下而陳友諒已陷江西當杜門著書友諒遣人辟之以死拒不屈終隱廬陵逾年病卒年六十五所著有周禮纂言及學言稿潯陽舟中百年頭上著烏紗一日江邊踏釣槎病似相如空有賦貧于杜甫更無家漁歌楚楚蒹葭月樵笛村村躑躅花事業已隨兵燹盡青門惟守邵平瓜宋元詩㑹卷八十九
