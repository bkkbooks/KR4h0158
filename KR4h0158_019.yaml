body:
  text: 宋元詩㑹卷十九兵部主事陳焯編周惇頤字茂叔道州營道人以其舅龍圖學士鄭向任為分寧主簿有疑獄久不決敦頤至一訊立辨邑人驚以為神部使者薦之調南安司理參軍移桂陽令治績尤著徙知南昌厯合州判官時趙抃行部惑讒口臨之甚威及通判䖍州而抃復守䖍因熟視其所為乃大悟執其手曰吾幾失君今而後始知周茂叔也熙寧初為廣東轉運判官提㸃刑獄因病求知南康軍遂家廬山蓮花峯下前有溪合於湓江乃取營道所居濂溪名之卒年五十七敦頤得聖賢絶學發明㣲言為有宋大儒之冠固不係乎名位也題濂溪書堂元子溪曰讓詩傳到于今此俗良易化不欺顧相欽廬山我所愛買田山之隂田間有清水清泚出山心山心無塵土白石照沈沈潺湲來數里到此始澄深書堂構其上隠几看雲岑倚梧或欹枕風月盈中襟有時吟復黙酒罷鳴幽琴數十黄卷軸賢聖談無音牕前即疇圃圃外桑麻林芋蔬可卒嵗絹布足衣衾吾樂葢易足名濂以自箴誰為相朝暮岸木寒蕭森書牕夜雨秋風拂盡熱半夜雨淋漓繞屋樹芭蕉一枕髙響圍恰似釣磯畔篷牕睡覺時静思篇静思歸舊隠日出半山晴醉榻雲籠潤吟牕瀑㵼清得閒方逹士失計只勞生朝市誰頭白車輪未曉鳴贈譚虞部致仕清時郎望貴白首故鄉歸有子紆藍綬將孫著綵衣松喬新道院鶴老舊漁磯知止自髙徳寧為遯者肥遊大林三月山房暖林花互照明路盤層頂上人在半空行水色雲含白禽聲谷應清天風拂襟袂縹緲覺身輕宿崇聖院公程無暇日暫得宿清幽始覺空門客不生浮世愁温泉喧古洞晩磬度危樓徹曉都忘寐心疑在沃州題冦順之道院壁一日復一日一杯復一杯青山無限好俗客不曾來往事已如此朱顔安在哉寄與地上客歴亂竟誰催香林别趙閲道公暇相陪塵外遊朝天仍得送行舟軒車更命入山脚旌節且從留渡頭精舍泉聲清㶁㶁髙林雲色淡悠悠談終宴罷愁分手明日瞻思上郡樓同石守遊山朝士誰知世外遊松杉影裏入吟幽爭名逐利千繩縳渡水尋山萬事休野鳥不驚如得伴白雲無語似相留傍人莫訝凭欄久為戀林居作退謀咏天池清和天氣年能幾短葛輕紗近水涯風似相知偏到袖魚如通信不驚槎笑凭山色傾新甕醉傍汀隂數落花嘯傲不妨眀月上一行歸路起栖鴉觀巴嶽木蓮仙姿元是華巔栽不向東林沼上開嫩蕊曉隨梅雨放清香時傍竹風來枝縣縞帶垂金彈瓣落蒼苔墜玉杯若使耶溪少年見定抛蘭漿到巖隈題春晩花落柴門掩夕暉昏鴉數㸃傍林飛吟餘小立䦨干外遥見樵漁一路歸題大顛壁退之自謂如夫子原道深排佛老非不識大顛何似者數書珍重更留衣經古寺琳宫金刹接林巒一徑濳通竹塢寒是處塵埃皆可息時清終未忍辭官江上别石郎中落葉蟬聲古渡頭沙灘人擁欲行舟别離情似長江水逺亦隨君日夜流趙抃字閱道衢州西安人進士及第為武安軍節度推官調知崇安海陵江原三縣通判泗州用曾公亮薦為侍御史殿中彈劾不避權倖時稱鐵面御史其言務欲朝廷别白君子小人上為之罷劉沆陳執中等而吳充鞠真卿歐陽修賈黯等或被逐或求去皆賴以召還留任請知睦州移益州轉運使召為右司諫以論樞副陳升之出知䖍州復召為御史知雜事改度支副使進天章閣待制河北都轉運使加龍圖閣直學士知成都神宗立召知諫院及謝帝曰聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦稱是乎未幾擢㕘知政事力言新法不便懇去位出知杭州改青州以大學士復知成都乞歸知越州復徙杭以太子少保致仕元豊七年薨年七十七諡清獻寄酬蔡州王陶正言自顧愚無堪老大何所用得郡江湖來一意雲泉縱驚此西南身連夕東北夢乃知故人念許與明月共荆書一紙賢季諾千金重寄我瓊瑶篇使得長諷誦寒松有唳鶴髙梧有鳴鳯何日謝知音為鼓商絃弄順風呈范御史濠州抵泗里數百長淮波平曉如席鳴鼙解繂楊栁堤畫船中有東吳客君恩得請許歸去聊治閭里去咫尺嵗窮天逺心欲飛念之汲汲事行役豁如天意適我願號令西北起風伯初時淅淅以鼓動布帆尚留十幅窄孤檣得勢安以平中流激箭巨浪擘篙横櫓閣力不用疾若鷙隼増羽翮瞥然兩眼瞬霎過木葉馳黄山走碧挐舟月餘今一快開樽自歌兩手拍樽中酒空不自歌順風好景如之何毗陵太守同此樂為言無惜新詩多次韻僧重喜聞琴歌我昔所寳真雷琴絃絲軫玉徽黄金晝横膝上夕抱寢平生與我為知音一朝如扇逢秋捨而今只有無絃者無情曲調無情聞浩浩之中都奏雅我黙彈兮師寂聽清風之中明月下子期有耳何處施自笑家風太瀟灑次孫直言九日登龍門山皇祐二年秋九月九日龍門遇佳節新都大夫孫隠之報政優游共民悦升山髙㑹賓主俱滿頭黄菊泛茱茰遥開醉眼極千里身髙氣爽胸懷舒眷言登臨風景異澄川秀野如披圖殊方真賞到竒處未來空只誇江湖嗟我江原忝民長周遭百里平如掌簿書役役甚囚拘聞有岷峨無計上及聞治邑兹山竒脚力不到神魂馳誰知我亦好山者篋中時復觀君詩村居午寢忘譏刺閒居杜送迎雨泥雙燕下煙壠一犂耕座入山光迥門連野色平吟餘仍兀坐誰與戰楸枰曲館日華烘玉甃煙縷亘雕甍棗熟房櫳暝花妍院落明醉輕春有味夢短晝無情欲識愔愔意回文織已成題九仙寺墜果春三徑蒸雲晚一軒廊腰迴戰蟻山腹合啼猿泉淡禽窺影苔深屐印㾗自慚名利者聊免世紛喧向晚向晚立汀沙人閒目更賖林疎僧屋露風轉客帆斜幽白孤飛鳥横紅數抹霞漁翁偶相問憐我宦天涯春日陪燕㑹春園亭為怕三春過因謀數刻狂醉輕欣射中歡甚惜歌長驕馬花間繋啼鶯栁下藏前旌歸去晚十里淡風光和范御史初出都門牘奏辭三院鄉榮領百城帝恩山嶽重臣命羽毛輕風月隨人好江湖照膽清須公贈金玉光照重行行次韻孔憲山齋訟簡嵗豐盈鈴齋竟日清牕排羣石怪簷擁逺山明古木風千葉新髭雪數莖開樽向幽處餘論見文情題靈山寺我為靈山好登留到日曛巖幽餘暑雪鐘冷入秋雲篇詠唯僧助塵煩與俗分明朝入東櫂因得識吾文送章岵少卿提舉洞霄宫秘館紅塵外瑶京白日邊樽中不空酒琴面已無絃曉上朝真閣春耕負郭田優游大自在何處更神仙暖風薄袂歌雲散輕盤舞袖低簾疎蕩樓閣塵暗逐輪蹄絮亂垂楊道香流種藥畦春牕惱閒思一枕杜鵑啼芳草翠宻馴文雉叢深隠畫輪離披金谷曉寂寞茂陵春古渡班荆客長堤走馬人芊芊似袍緑一雨一番新入蜀江上對月照不私毫髪波光上下浮明餘到琴淡清極入詩幽忽認江湖晝渾疑天地秋閒雲勿輕蔽有客坐孤舟次韻李元芳秀才秋日旅懷節物奚為感秋懷不自任曉寒侵逺夢秋力助髙吟薄脱驚風葉疎舂隔水砧商絃調一曲惟子定知音憶信安五弟拊臘殘鸚鵡洲邊過憶汝東吳住舊廬誦聖窮愁千卷外覔官留滯十年餘也知失意能平氣底事多時不寄書兄在松溪我荆楚别懷三處一欷歔初入峽峽江初過三遊洞天氣新調二月風樵戸人家隨處見仙源雲路有誰通峯巒壓岸東西碧桃李臨波上下紅險磧惡灘各幾許晚停征櫂問漁翁同萬州相里殿丞遊溪西山寺使君呼客入山行曉徑前驅照彩旌蠻女背樵巖側避野僧攜刺馬頭迎千層雲水迷三峽一閧人煙認百城樓閣凭餘清我聽竹風蕭瑟澗泉鳴寄永倅周惇頤虞部君去濂溪湖外行倅藩仍喜便鄉程九疑南向參空碧二水秋臨徹底清詩筆不閒真吏隠訟庭無事見民情霜鴻已到衡陽轉逺緒憑誰數寄聲寄題劉詔寺丞濫泉亭泉名從古冠齊丘獨占溪心湧不休深似蜀都入海眼勢如吳分起潮頭連宵鼓浪揺明月當暑迎風作素秋亭上主人留我語只將塵事指浮漚過鐵山舖寄交代吳龍圖暫留山驛又晨興西望旌麾想舊朋三院筆簪曾對直兩川兵印復交承年光頭鬢華如雪世態心情冷似冰境上憑詩馳逺意青泥蚤晚入雲燈過左緜偶成東南再守二年間自杭徙青徙蜀何須問險艱入覲已違龍尾道出麾還過鹿頭闗與民共約三春樂顧我都忘兩鬢斑歳滿乞骸何處好仙棋一局爛柯山鈐兵王閣使素芳亭賞梅花素萼清香並酒巵主人勤意囑留詩為逢蜀國新開日卻憶江南舊賞時春蚤未通桃李信臘殘都放雪霜姿先公舊植亭欄外肯構重來見本枝先司空鈐兵日始創是亭閣使復繼其職是謂有子矣次韻程給事寓越廨宇有懷越郡江南盡不如樂天流語信非疎人從鎖闥中間出宅在蓬萊向上居言念玉符分鎮日卻思瓊苑拜恩初臨風又辱詩筒寄足見優游刃有餘武林即事寄程給事二首乞得錢塘下九天徙從青社復三川坤維一往萬餘里吳分重來七八年鑑水坐遥懷舊治柯峯歸晚愧前賢東州賴有微之約曽寄詩筒遞百篇七十隨縁豈有由樂天曾不厭杭州青山未隠如千里白首重來又九秋月窟仙人遺桂子海門神物助潮頭自慙老子無心力坐鎮吾民静即休次韻即事見懷鑑水寛閒稱越國河塘繁劇是杭州蓬山君繼元丞相竹馬予慚郭細侯郡邑豐穰真可喜人家飽煖更何憂西陵隔岸無多逺數上臨江百尺樓次韻前人蓬萊閣即事蓬萊牕外曉光分夢覺初驚杜宇魂但有吏供衙府諾斷無人到訟庭喧濛濛宿靄開湖面隠隠更潮過海門一水兩州皆重鎮越清杭劇不同論上天竺寺石巖花對植齊開古梵宫欲求精筆畫難工直將春占三旬盛誰謂花無十日紅未羨山桃資客笑且陪庭栢作家風徧尋他處都無此寳殿前頭只兩叢謝許少卿寄臥龍山茶越芽逺寄入都時酬唱珍誇互見詩紫玉叢中觀雨脚翠峯頂上摘雲旗啜多思爽都忘寐吟苦更長了不知想到明年公進用臥龍春色自遲遲遊鴈蕩將抵温州寄太守石牧之霜風雙鬢雪鬖鬖物外尋真頓離凡子舍若非叨别乗我車安得到靈巖碧窺秋瀑心同洗紅嚼山杷口似饞多謝賢侯見招意數貽嘉詠與珍函題運判霍交瞻岷閣閣外風光滿意新諸公同上看梁岷蜀天六月雲如水梵界千峯雪似銀巖叟近傳多得夀羽人曾此數登真夫君不為神仙事早夜孜孜澤逺民題府庭海㯶海㯶根幹出栟櫚雙勢凌空劍外無長鎖荆榛嗟廟栢不禁風雨笑庭梧神僧過識已千嵗蜀守來觀只兩株離立峩峩同壯士側身東望拱皇都次蘓寀遊學射山錦川風俗喜時平上巳家家出郡城射圃人稠喧畫鼓龍湫波淨照紅旌迎真昔詫登天虎命侣今聞出谷鶯勉為逺民同樂事使臺仍是得賢明遊青城山三十六峯峻維岷在蜀竒方行刺史部重款丈人祠凍雪諸蕃隔晴雲六面披訪山窮寳洞山有寳仙第五洞昔投龍之所敕鬼覷豐碑泉落寒崖響蘿依古木垂良工存舊筆青城觀壁悉孫知微名畫老叟琢新詩陟險齊雙屐逢幽鼓七絲盤桓不忍去還作更來期初入荆江迢遞辭宸闕遷延換嵗華舟纔入荆渚人覺在天涯浪激多推岸流濡足沸沙勢盤帆小便漲淺路頻差横艇叉魚浦揺旗賣酒家山微因念越汪窄止通巴煙色汀蕪淡風光野燒斜蠻歌朝競唱祠鼓暮連撾渡口初分栁林邊未見花前程春始盛一一待詩誇庭楠彼美庭楠植基培幾十年夜來全庇月曉去薄生煙萬葉光齊動雙株影共圓幽棲疑有鶴清響為留蟬飲對傳三雅琴依按七絃河陽花自媚彭澤栁空眠勢翳門闌静幽侵几案鮮不才逢訟簡吟遶强成篇書院雨久藏書蠧風髙老屋斜隣居盡金碧一一梵王家和宿峽石寺下淮岸浮圖半倚天山僧應已離塵縁松闗暮鎖無人蹟惟放鐘聲入畫船賞春亭滂葩浩豔滿亭隈當席芳樽醉看來始信君恩不私物亂山窮處亦花開栁軒動入和風静惹煙翠條疎處露池蓮林中盡是能吟物春有黄鸝夏有蟬徐積字仲車山陽人孝行出於天稟三嵗父死旦旦求之甚哀長從胡翼之學啜菽飲水有饋之食者却弗受應舉入都不忍捨其母徙載而西登進士第同年生入拜其母致百金為夀辭之以父名石遇石則避而不踐母死七日不食廬墓三年雪夜伏墓側哭不絶聲學士過其廬聞而泣下曰使鬼神冇知亦當垂淚也年過五十以耳疾不能出仕元祐初用廷臣交薦授楚州教授遷和州防禦推官卒賜諡節孝官其一子濉陽婦嘗聞唐李氏世號為賢妻以力營七喪世或難庶幾孰知蔡家婦其事乃同之豈特在中饋無非而無儀孝盡於所尊慈盡於所卑既知義所在能終義所為我生至此極我嫁逢百罹其屬死殆盡其骨俱無歸身為未亡人心乃真男兒謂責當巳任無忘須臾時乃損奉生具而為送亡資面不近膏沐首不加冠笄金珠鬻於市文繡容何施更無囊中裝惟存身上衣甚將截其髪幸茍完其肌所得葢良苦所積從細微一舉十八喪身自沾塗泥居者歎於室行者泣於岐鳥亦助號呌人願操鋤犁㝠㝠長夜魂所獲喜可知吾聞古列女犖犖無甚竒一死猶易處一節亦易持至於張氏者使人尤歔欷誰為孝婦傳誰為黄絹碑亦有淮上翁為作濉陽詩移書太史氏勿令兹逸遺江南春今年是處春風早江南地煖春逾好春風次第入江山先入梅花既芳草芳草春深似有情直共江山到洞庭落花流水武陵道湖中有山春更青斜陽西落一㸃明少年莫上岳陽城述懷寄吕師試眺闗西山壁立春雲突盡長空窄濃嵐滴去渭川寒孤峯深入秦天碧白雲流水豈無情立馬吟詩定相憶且倩東風先寄聲我整西裝期已迫吟到秋風客放歸歸時待作瀟湘客送王濳聖公車待報凡幾年蕭生罷去心浩然鹽瀆野中尋舊隠楊子江頭呼渡船太湖波浪溼秋天洞庭橘柚生紅煙馬踏新霜吳嶺外猿啼小雪建溪邊闗西夫子雖遲暮行笑行吟正安步葘川海上牧羊兒解説公孫放豚處姚黄并序紫霄漫翁李道源見約分吟姚黄余畏其才不敢措筆不得已而後塞命因為之序曰天下牡丹九十餘種而姚黄居第一其名雖千葉而實不可數或累計萬有餘英不然不足髙一尺也花肉既重其梢下屈如一器欹側之狀此亦花之巨美而精傑者乎是宜見於詩而不可冺然使寂寂也黄河南畔伊川北姚家宅是真花窟古來多少豪奢兒埋却千鶯萬鶯骨中央精粹得之多西方秀氣來相和天與明光常借日水宫暗脈正通河春風如酒半酣時誰教榖雨報花期司馬坂前嬌半啟洛陽城内人俱知姚家門巷車馬填牆頭牆下人差肩花上紅綃都蔽日花傍翠幕恰如煙玉面兒來爭供帳錦袍郎去鬭抛錢無人不説姚花好費却春功亦不少日長風暖緑梢低坐上金仙困將倒麴塵餅劑和香檀何以貯之承露盤爛錦脱來嫌太艶鮮衣染就欲驂鸞君看此花肌肉豐一尺餘髙千萬重妆面深藏青步障寳冠斜墮碧霞叢步揺好稱釵鳯凰玉環犀珮珠鳴璫帝女何縁心好道阿嬌安用金為房紺窠累棲舒鴈雛沈煙噴出狻猊爐一種養成餘意態千花瘦盡春肌膚峨峨一器欹且傾覆杯難辨鍾與觥染以鮫綃求正色叩之玉挺希宫聲魏家紫共牛家碧迭霸花中聳髙格如今俛首甘下風九十種中為第一此花莫似武昭儀出得宫來不畫眉情貌欲為狐媚態衣裳却是比丘尼楊妃本是傾國身脱却紅襦號太真河水欲濡頭上髻馬嵬猶著舊時裙物色一定猶可疑人心作變宜難知容易莫評真與欺貌或如是心或非君不見老莊有深意萬物之中最防偽贈張敏叔張子生平最多難未老頭毛白一半頭雖更白詩更清正作詩時人莫喚頭不肯轉身不移口中聲調霜風淒太清宫殿月明時第一莫吹松竹詞答范君錫報漫翁無錢可沽酒青衫典不得黄卷賣不售借問公田中秫米種幾斗休管將來旱與水莫為妻兒種粳米兄來留下二萬錢送與酒家主人未不然何計見春風空將花挿白頭翁簿書營營幾時了何如載酒訪揚雄哀哀詞哀哀復哀哀哀哀至此極孤兒與慈母中路忽相失恍惚須臾間終日不復得誰復坐我堂誰復入我室誰復飲兒酒誰復哺兒食兒饑復誰念兒寒復誰恤耳不聞慈語目不見慈色譬如行路人日逺如一日行人猶可期逺道猶可追天窮地盡處一日猶可歸哀哀復哀哀此去無盡時誰言生離别不如死别離君不見人已閉門烏已棲黄昏塜畔孤兒啼富貴篇答李令我有一筒詩寫出千年意將令後世觀不是前言戯感君再唱洞庭謡我亦重歌酬子惠古人達者嘗有異姓王一門五侯三將軍弟兄同入中書堂對開大第連幾坊私門列㦸森鋒鋩十二簾捲珠熒煌雙姬扶起坐牙牀緑鬟紅袖花成行左盼右顧生春陽髙車食客劒佩鏘堂上已滿坐兩廊巨鑊大鼎烹牛羊玉壺把酒金船長美人拜客求盡觴歌姬一誤已絶吭纒頭彩幣堆如岡酬歌買笑金鴛鴦奴袍火浣直兩箱三千廐馬紅錦障厠幃文繡爐熏香更衣侍妾如閨房主人意氣秋鷹揚其心端如彩鳯凰一言合意青雲翔須臾睚眦磨刀鎗門前臘月可烘裳一日失勢成冰隍小者腰領屍道旁大者連頸宗族亡犬鷄散盡空遺牆野鳥入室山魈藏嗚呼哀哉可歎傷至死不悟猶陸梁古來如此有多少豈似洞庭湖上老無租無税一生閒有飯有魚一杯飽日落波間煙正昏雲開湖口山光曉櫂翁適自巴陵迴掛帆直指瀟湘道有言不問俗窮通何憂可入翁懷抱修竿短櫂已自足更有前村一茅屋賣魚沽酒任醉醒繡戸朱門自歌哭嗟余未往心先慕更謝櫂翁詢去住風煎月下有誰知醉魄吟魂自來去堂前畫作荆南圖夢中記得巴陵路送端叔并序夜漏將盡枕上再送端叔也洛水之陽馬上為我誦此詩即此詩用木葉書投之水中便為將來故事也延安塞上見羣鴈能為我誦此詩東南望否夜中枕上聞孤鴈聲尤數數誦此詩也紙窮意未盡端叔上馬去巷口馬頭轉我喚端叔時端叔急回面記取此時意莫使落風埃上東門外水正望楚州來此水一來不復見不及黄沙塞頭鴈送李昻長官征南兵勢欲平蠻軍聲殺氣秋風寒南國此時霜霰早八月草黄楓葉丹江有渚兮山有麓君向洞庭何處宿四垂天幕亂波平九嶷山送愁嵐綠日斜葉落黄陵祠月明風起清湘竹愁娥逺放峽雲來冤臣暮借江聲哭鴈號孤喙度蒼梧猿呌哀腸抱霜木此行正合風騷情縣衙仍在衡山足栁絮二首君看青絲蘂開花便棄捐臨風競離别就地忽團圓孤客正心亂浮雲來馬前灞橋逢杜甫老涙更潸然長條徒自重狂絮去何之禁籞穿花樹春江撲酒旗因風無定意著物有閒時謝韞何為者深情在雪詩寄張景修東南未回客行樂又經年吳市花朝酒松江月夜船窮閻無屋住廣殿有詩傳若論平生事無如任自然漁者家住前村蘆葦中一生無事是漁翁眼看波浪如平地身向江湖若斷蓬小艇醉眠寒夜雨短帆閒掛夕陽風營營市井應相笑不道刀錐盡是空送倪敦復手持報簡人歸後足步迴廊角住聲但恐舟行隨早晚此時秋色半隂晴明朝路向雲邊望今夜詩須枕上成四壁無燈窗有月直無老夢到三更夜賞春寄敦復莫道山陽官辛苦大夫未是不閒人晝來琴上披尋曲夜入花間㸃檢春拕袂帶歸香滿袖迴燈引去蝶隨身髙才自有風流格吟作吳謡事最新寄路倅洪澤阻水莫教容易過龜山多少人心願復還更有南城黄綬客但吟西戸綠楊間纔經濁汴無澄浪且趂清淮洗醉顔安得就公歌一曲緩吟遲步夕陽灣華陽山和查教授玉井温温浸月華幢幢松檜聳髙牙半峯已斷人間路絶頂自開天上花可恨白雲吟處起何堪行路望中賖怪來得似希夷子借問如今有幾家寄穎叔南郭茶杯菊未香西簷老栁覺疎黄家無縣令雙鳬舄夢有仙人五色羊梅信易傳來嶺北鴈書難附過衡陽定知逺俗懷公義若說威名背負芒鮮于侁字子駿閬州人性莊重力學舉進士為江陵司理㕘軍同里唐介稱其名于上官交章論薦調黟令通判綿州以㢘幹著從何郯辟簽判永興神宗詔求直言侁陳十六事神宗愛其文除利州路轉運判官上書論時政譏切王安石安石屢毁之賴上知得免凡居部九年徙京東西路為轉運使元豐二年召對命知揚州為舉吏所累罷主西京御史臺哲宗六復以侁使京東士民相慶如見慈母召為太常少卿議配享神宗力主富弼拜左諫議在職三月以疾求去知陳州年六十九侁刻意經術尤長於詩詞孫明復蘇子瞻皆嘆服以為不可及云雜興三首幽居觀物變天道固虚盈炎歊日方熾微隂一已生凉風動野草桃李先飄零蜩螗集髙栁絡緯響空庭愁心獨耿耿宵夢竟難成一氣幹元造為功未嘗煩羣生自委化天地亦何言鳬脛不可增楮葉不可鐫欲益固為損勞心非自然不見平陽侯醇酒聊終年三王貴養老取重在乞言酒醴副佳肴黄髪斯皤然朝廷本忠厚風俗亦變遷豈意漢道微侍中惟少年耆舊無備問李公所以歎新堂夜月色皎然由連理亭信步庭中徘徊久之因為五言一首秋風動微凉天雨新霽後閒齋獨隠几明月在髙栁振衣步庭下顥氣入襟袖天空雲漢明隠約辨列宿蒼蒼松檜上零露霏欲流脱葉滿閒園繁華迨衰朽清宵望蟾彩宜付一杯酒多病謝樽罍城頭轉寒漏王回字深甫福州侯官人敦行孝友質直平恕而不為小㢘曲謹以希譽舉進士為衛真簿稱病自免退居潁州久之不仕治平中擢忠武軍節度推官知南頓縣命下而卒其弟向字子直亦有文名悠悠西江水送李殿丞有序殿中丞李侯清叔筦潁之酒事三年入朝闕下將别其往還寮友皆索言焉長樂王回辱清叔之交最深而慕其才志魁特將有以成功名於世也以謂挾此才潛此志者第循其本而完之則物之應者自廣然功名之成否豈足道哉故作悠悠西江水詩一章以興其義塞清叔之索而聊寫其意云悠悠西江水浩浩拍兩涯深㵠食淵潭澄澄露陂池介鮮育性命跳泳各適宜人謀濟任途航楫又沿洄飄風吼天地白浪相翻豗旁觀駭非常水徳自不虧風收浪還恬狎者終何疑賢豪應世務有本亦若兹剛明發其用愷悌以成之外物雖横來我心固如夷功名豈足道請監江水詩邢居實字敦夫隨州人負俊才早世黄魯直極稱其詩有呻吟集寄陳履常十年客京洛衣袂多黄塵所交盡才彦惟子情相親㑹合能幾日歡樂何遽央春風東北來飄我西南翔驪駒已在門白日行且晚停觴不能飲將去更復返把腕捋髭鬚悲啼類兒女人生非鹿豕安得常羣聚朝别河上梁慕涉闗山道匹馬逐飛蓬離恨如春草去去日已逺行行涙横臆昨日同袍友今朝離鄉客來時城南陌始見梅花白回首漢江頭黄梅已堪摘杖䇿登髙城極目迥千里落日下青山但見白雲起逺望豈當歸長歌涕如雨歸心如明月幽夢過潁汝抱膝長相思故人安可見忽枉數行書彷彿如對面紛紜輦轂下冠葢爭馳逐吹嘘多賢豪肯復念幽獨空齋聽夜雨深竹聞子規此情不可道此心君詎知雨後出城馬上作既雨天氣佳微雲淡如掃欲尋煙際鐘騎馬河邊草紫椹飽黄鸝人家夏蠶老田婦踏繅車隔籬語音好嗟我一何愚讀書浪枯槁不及此中人終年客長道宋元詩㑹卷十九
