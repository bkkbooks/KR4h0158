body:
  text: 宋元詩會卷六十兵部主事陳焯編香奩二十九人花蘂夫人姓費氏青城人蜀主孟昶妃也太祖平蜀俘入後宫嘗以蜀亡問費費占一詩答之頗蒙寵愛後得罪賜死秋宵詞氷肌玉骨清無汗水殿風來暗香滿繡簾一點月窺人欹枕叉橫雲鬢亂起來庭户悄無聲時見疏星渡銀漢屈指西風來幾時不道流年暗中換口占答太祖君王城上竪降旗妾在深宫那得知十四萬人齊解甲更無一箇是男兒宫詞百首五雲樓閣鳯城間花木長新日月間三十六宮連內苑太平天子住崑山會真廣殿繞宫牆樓閣相扶倚太陽淨甃玉階橫水岸御爐香氣撲龍牀龍池九曲逺相通楊栁絲牽兩岸風長似江南好風景畫船來去碧波中殿名新立號重光島上亭臺盡改張但是一人行幸處黃金閣子鎖牙牀夾城門與內門通朝罷巡逰到苑中每日中官祇候處滿堤紅艷立春風厨盤進食蔟時新侍晏無非列近臣日午殿頭宣索膾隔花催喚打魚人立春日進內園花紅蘂輕輕嫩淺霞跪到玉階猶帶露一時宣賜與宫娃三面宫城盡夾牆苑中池水白茫茫一從獅子門前入旋見亭臺繞岸傍離宫别院繞宫城金板輕敲合鳯笙夜夜月明花樹底傍池長有按歌聲旋移紅樹劚新苔宣使龍池再鑿開展得緑波寬似海水心樓殿勝蓬萊太虛髙閣凌虛殿背倚城牆面枕池諸院各分娘子位羊車到處不教知御製新翻曲子成六宫才唱未知名盡將觱篥來抄譜先按君王玉笛聲才人出入每參隨筆硯行將繞曲池張向綵箋書大字忽防御製寫新詩六宫官職總新除宫女安排入畫圗二十四司分六局御前頻見錯相呼春風一面曉妝成偷折花枝傍水行却被內監遙覻見故將紅豆打黃鶯殿前排宴賞花開宫女侵晨探幾回斜望苑門遙舉袖傳聲宣喚近臣來小毬場近曲池頭宣喚勳臣試打毬先向畫樓排御幄管絃聲動立浮斿供奉頭籌不敢爭上棚等喚近臣名內人酌酒才宣賜馬上齊呼萬嵗聲殿前宫女總纎腰初學乘騎怯又嬌上得馬來才欲走幾回拋控抱鞍橋自教宫娥學打毬玊鞍初跨栁腰柔上棚知是官家認遍遍常贏第一籌翔鸞閣外夕陽天樹影花光逺接連望見內家來往處水門斜過畫樓船月頭支給買花錢滿殿宫人近數千遇著唱名多不語含羞走過御牀前內人追逐採蓮時驚起沙鷗兩岸飛蘭棹把來齊拍水並船相鬭溼羅衣修儀承寵住龍池掃地焚香日午時等候大家來院裏看教鸚鵡念新詩東內斜將紫禁通龍池鳯苑夾城中曉鐘聲斷嚴妝罷院院紗窗海日紅安排諸院接行廊外檻周回十里強青錦地衣紅繡毯盡鋪龍腦鬱金香新秋女伴各相逢罨畫船飛别渚中旋折荷花半歌舞夕陽斜照滿衣紅早春楊栁引長條倚岸沿堤一面髙稱與畫船牽錦纜暖風搓出綵絲縧內家宣賜生辰晏隔夜諸宫進御花後殿未聞公主入東門先報下金車選進仙韶第一人才勝羅綺不勝春重教按舞桃花下只踏殘紅作地裀侍女爭揮玉彈弓金丸飛入亂花中一時驚起流鶯散踏落殘花滿地紅七寶闌干白玉除新開涼殿幸金輿一溝泛碧流春水四面瓊鉤搭綺疏東宫花燭綵樓新天上仙橋不鎖春遍出六宫歌舞奏嫦娥初到月虛輪雞人報曉才三唱玉井金牀轉轆轤煙引御爐香繞殿漏籖初刻上銅壺宫女熏香進御衣殿前開鎖請金匙朝陽初上黃金屋禁掖春深晝漏遲鬭草深宫玉檻前春蒲如箭荇如錢不知紅藥闌干曲日暮何人落翠鈿春心滴破花邉漏曉夢敲回禁裏鐘十二楚山何處是御樓曽見兩三峯博山夜宿沈香火帳外時聞暖鳯笙理遍從頭心上曲殿前龍直未交更春殿千官宴却歸上林鶯舌報花時宣薇旋進新裁曲學士爭吟應詔詩白藤花限白銀花閣子門當寢殿斜近被宫中知了事每來隨駕使煎茶西毬場裏打毬回御宴先于苑內開宣索教坊諸伎樂傍池催喚入船來昭儀侍宴足精神玉燭抽看記飲巡倚賴識書為録事燈前時復錯瞞人小雨霜微潤緑苔後闌紅杏傍池開一枝插向金瓶裏捧進君王殿上來婕妤生長帝王家常近龍顔逐翠華楊栁岸長春日暮傍池行困倚桃花繁杏夭桃燦殿傍鑾輿頻幸鬭雞場歸輿倘玩宫中月好把龍涎爇滿牀平頭船子小龍牀多少神仙立御傍旋刺篙竿令過岸滿池春水蘸紅妝後宫阿監裹羅巾出入經過院囿頻承奉聖顔憂誤失就中常怕內夫人羅衫玉帶最風流斜插銀箆幔裹頭聞得殿前調御馬掉鞭橫過小紅樓六宫一例羅冠子新樣交鐫白玉花欲試淡妝兼道服面前宣與唾盂家三月櫻桃乍熟時內人相引看紅枝回頭索取黃金彈繞樹藏身打雀兒春天睡起曉妝成隨侍君王觸處行畫得自家梳洗樣相憑女伴把來呈小小宫娥到內園未梳雲鬢臉如蓮自從配與夫人後不使尋花亂入船芳菲桃李似新粧兩兩黃鸝呌樹傍倚遍碧闌忘去住俄驚宫月照華堂舞頭皆著畫羅衣唱得新翻御製詞每日內庭聞教隊樂聲飛上到龍池春早尋花入內園競傳宣旨欲黃昏明朝駕幸遊蠶市暗使氊車籠苑門春日龍池小宴開岸邉亭子號流杯沈檀刻作神仙女對捧金尊水上來後宫宫女無多少起得園中笑一團舞蝶落花相看著春風共語亦應難雨灑瑤階花盡開君王應是看花來靜憑雕檻渾忘倦忽聽笙簧殿外回流鶯枝上哢聲和惹得愁人愁轉多數月宫階無輦迹但聞别院閙笙歌酒庫新修近水傍潑醅初熟五雲漿殿前供御頻宣索進入花間一陳香半夜搖船載內家水門紅蠟一行斜聖人正在宫中飲宣使池頭旋折花東宫降誕近佳辰少海星邉擁瑞雲中尉傳開三日晏翰林當撰洗兒文薄羅衫子透肌膚夏日初長板閣虛獨自憑闌無一事水風涼處讀文書沈香亭子傍池斜夏日巡遊歇翠華簾畔越盆盛淨水內人手裏剖銀瓜苑東天子愛巡遊御岸花堤枕碧流新教內人供射鴨長將弓箭繞池頭水車踏水上宫城寢殿簷頭滴滴鳴助得聖人髙枕興夜涼長作逺灘聲三清臺近苑牆東樓檻重重映水紅盡日綺羅人度曲管絃聲在半天中畫船花舫總新妝進入池心近島傍松柏樓窗楠木板暖風吹過一團香管絃聲急滿龍池宫女藏鈎夜宴時好是聖人親捉得便將濃墨掃雙眉太液波清水殿涼畫船驚起宿鴛鴦翠眉不及池邉栁取次飛花入建章金作盤龍繡作麟壺氷樓閣禁中春君王避暑來遊幸風月橫秋氣象新端午生衣進御牀赭黃羅帕覆金箱美人捧入南熏殿玉腕斜封綵縷長少年相逐採蓮回羅帽羅衣巧製裁每到岸頭常拍水競提纎手出船來山樓綵鳳棲寒月晏殿金麟吐御香蜀錦地衣呈隊舞教頭先出拜君王西風吹葉撼宫梧早怯秋寒著繡襦玉宇無人雙燕去一彎新月上金樞內庭秋燕玉池東香散荷花水殿風阿監採菱牽錦纜月明猶在畫船中翠華香重御爐添雙鳯樓頭曉日暹扇掩紅鑾金殿悄一聲清蹕捲珠簾清曉自傾花上露冷侵宫殿玉蟾蜍擘開五色銷金紙碧鎖窗前學草書夜色樓臺月數層金猊煙穗繞觚稜重廊曲折連三殿密上真珠百寶燈天門晏閉九重關樓倚銀河氣象間一點星毬垂絳闕五雲仙仗下蓬山安排竹柵與巴籬養得新生鵓鴿兒宣受內家專喂飼花毛間看總皆知初年十五最風流新賜雲鬟使上頭按罷霓裳歸院裏畫樓雲閣總重修金畫香臺出露盤黃龍雕刻繞朱闌焚修每遇三元節天子親簮白玉冠錦城上起凝煙閣擁殿遮樓一面髙認得聖顔遙望見碧闌干映赭黃袍蕙炷香銷燭影殘御衣熏盡徹更闌歸來困頓眠紅帳一枕西風夢裏寒密室紅泥地火爐內人冬日晚傳呼今宵駕幸池頭宿排比椒房得暖無梨園弟子簇池頭小樂攜來候燕遊旋炙銀笙先按拍海棠花下合梁州樹葉初成鳥出窠石榴花底笑聲多醉中遺却金叉子拾得從他要賞羅小殿新妝粉欲乾貴妃姊妹自來看為逢好日先移入續向西街索牡丹內人相續報花開準擬君王便看來縫著五絃琴繡袋宜春院裏按歌回黃金盒裏盛紅雪重結香羅四出花一一傍邉書敕字分明賜與大臣家宫人早起笑相呼不識階前掃地夫乞與金錢爭借問外頭還似此間無小隨阿姊學吹笙好見君王乞與名夜掃玊牀朝把鏡黃金階下不教行日髙殿裏有香煙萬歲聲來動九天妃子院中初降誕內人爭乞洗兒錢宫花不與外邉同正月長生一朵紅供御櫻桃看守别直無鴉鵲到園中牀頭謝賜紫羅襦不下金階上軟輿官局總來為喜樂院中新拜內尚書舞來汗濕羅衣徹樓上人扶下玉梯歸到院中重洗面金盆水裏潑紅泥衆中愛得君王笑偷把金箱筆硯開書破紅蠻隔子上旋推當直內人來水中芹葉土中花拾得還將避衆家總待别人般數盡袖中拈出鬱金芽窗窗户户院相當總有珠簾玳瑁牀雖道君王不來宿帳中長是炷牙香按花蘂宫詞流傳已久或云四十首或云二十八首後來刻本增至百篇皆好事者附會之所為不足信也今就其本集百首內訛誤最著者約舉之如銀燭秋光冷畫屏輕羅小扇撲流螢此唐杜牧之絶句也敕賜一窠紅躑躅謝思未了報花開此王建宫詞也而王圭宫詞三十首竟移取十三章入花蘂集甚覺無味如翠鈿貼靨輕如笑鎖聲金掣閣門環三月金明栁絮飛內人稀見水鞦韆禁裏香濃蝶自飛釣線乘波漾綵舟金井秋啼絡緯聲御案橫金殿幄紅紗幔薄垂金麥穗御座垂簾繡額單天外明河翻玉浪夜寒金屋篆煙飛曉吹翩翩動翠旗諸什是也及遍訪别刻得花蘂最初本其百首內有十五首迥乎不同因悉採以易之究亦難定其是否尚賴博聞君子考證焉汴梁宫人宫詞四首歲歲逢元夜金蛾閙蔟巾見人心自怯終是女兒身殿前輪值罷偷去賭金叉怕見黃昏月殷勤上玉階翠翹朱掘背小殿夜藏鈎驀地羊車至低頭笑不休一向傳宣急誰知不復還來時舊針線記得在窗間靖康宫人題驛壁渭平沙淺雁來時渭漲沙移雁不歸江海一身多少事清風明月淚沾衣魏夫人虞美人草鴻門玉斗紛如雪十萬降兵夜流血咸陽宫殿三月紅霸業已隨灰燼滅剛強必死仁義王隂陵失道非天亡英雄本學萬人敵何用屑屑悲紅妝三軍散盡旌旗倒玉帳佳人坐中老香魂夜逐劍光飛青血化為原上草芳心寂寞倚寒枝舊曲聞來似斂眉哀怨徘徊愁不語恰如夜聽楚歌時滔滔逝水流今古漢楚興亡兩丘土當年遺事久成空慷慨尊前為誰舞趙令畤妻王氏咏懷白藕作花風已秋不堪殘睡更回頭晚雲帶雨歸飛急去作西窗一枕愁沈清友吳趨女子絶句晚天移棹泊垂虹間倚篷窗問釣翁為底鱸魚低價賣年來朝市怕秋風賀鑄妾某氏春日獨倚危闌淚滿襟小園春色懶追尋深恩總似丁香結難展芭蕉一寸心孟淑卿題采蓮美人圗緑槐蟬靜日偏長懶爇金爐百和香莫摘池中蓮子看箇中多半是空房春歸落盡棠梨水拍堤凄凄芳草望中迷無情最是枝頭鳥不管人愁只顧啼吳安持妻王氏荆公安石長女公集中有寄女詩曰伯姬不見我於今始七齡家書無虛月豈異常歸寧蓋答其憶家詩也呈父舒王西風吹入小窗紗秋氣應憐我憶家極目江山千里恨依然和淚看黃花曹組母王氏樓上望妓行雪中梁王晏罷下瑤臺窄窄紅鞋步雪來恰似陽春三月暮楊花飛處牡丹開方勉妻許氏夫犯夜禁代呈法官明時樂事娛詩酒帝里風光剩占春况是白衣重得侶不堪青旆自招人早知玉漏催三鼓肯把金貂換百巡大抵仁人憐氣節弗教孤客作囚身萊公姬蒨桃侍晏呈萊公二首一曲清歌一束綾美人猶自意嫌輕不知織女寒窗下幾度拋梭織得成風動衣單手屢呵幽窗軋軋度寒梭臘天日短不盈尺何似妖姬一曲歌徐宥女偶題絮如栁陌三春雨花落梨園一笛風百尺玉樓簾半捲夜深人在水晶宫溫婉寄逺小花靜院東風起燕燕鶯鶯拂桃李斜倚紅牆卜逺人樓外春山幾千里談意哥寄外瀟湘江上探春回消盡寒氷落盡梅願得兒夫似春色一年一度一歸來毗陵女子題破錢半輪殘月掩塵埃依稀猶有開元字想得清光未破時買盡人間不平事彈琴昔年嘗笑卓文君豈信絲桐解誤身今日未彈心已亂此心原是不由人浣花女潭畔芙蓉芙蓉花發滿江紅盡道芙蓉勝妾容昨日妾從堤上過如何不見看芙蓉陸放翁妾某氏偶吟玉階蟋蟀閙清夜金井梧桐辭故枝一枕凄涼眠不得呼燈起作感秋詩鄧氏寄衣戍所欲寄寒衣上帝都連宵裁剪眼糢糊可憐寬窄無人試淚逐西風灑去途題畫菊良工妙手恁安排筆底移來紙上栽葉緑花黃長自媚等間那與蝶蜂來李清照字易安趙明誠妻也以文學著稱明誠死再適非類未幾反目作啓與綦處厚云猥以桑榆之晚景配茲駔檜之下材聞者無不笑之非類者謂後夫張汝舟也浯溪中興頌碑和張文潛二篇五十年功如電掃華清宫栁咸陽草五坊供奉鬭雞兒酒肉堆中不知老叛兵忽自天上來逆臣亦是姦雄才勤政樓前走戎馬珠翠踏盡香塵埃何為出戰輒披靡傳置荔枝多馬死堯功舜德本如天安用區區紀文字著碑銘德真陋哉乃令神鬼磨山崖子儀光弼不自猜天心悔禍人心開夏為殷鑒當深戒簡策汗青今具在君不見當時張説最多機雖生已被姚崇賣君不見驚人廢興傳天寶中興碑上今生草不知負國有姦雄但説成功尊國老誰令妃子天上來虢國韓國皆天才苑桑羯鼓玉方響春風不敢生塵埃姓名誰復知安史健兒猛將安眠死去天尺五抱甕峯峯頭鑿出開元字時移勢去真可哀姦人心醜深如崖西蜀萬里尚能反南內一閉何時開可憐孝德如天大反使將軍稱好在嗚呼奴輩乃不能道輔國用事張后尊乃能念春薺長安作斤賣題八咏樓千古風流八咏樓江山留與後人愁水通南國三千里氣壓江城十四洲朱淑真錢塘人幼警慧善讀書父母無識嫁與市兒淑真恨配偶非人故詩多愁怨之作集名斷腸而小詞尤有風致中秋秋來長是病不易到中秋欲賞今宵月須登昨夜樓露濃梧影淡風細桂香浮莫做尋常看嫦娥亦解愁墨梅若箇龍眠手能傳處士詩借他窗上影寫作雪中枝頃刻回春色輕盈動玉巵不能殷七七橫笛月中吹湖上秋夕二首戀戀西湖景山頭帶夕陽歸禽翻竹露落果響芹塘葉倚風中靜魚遊水底涼半亭明月色荷氣惱人香極目寒郊外晚來微雨收隴頭霞散綺天際月縣鉤一字新鴻度千聲落葉秋倚欄堪聽處玉笛在漁舟立春停杯不飲待春來和氣先春動六街生菜乍挑宜捲餅羅幡旋剪稱聨叉休論殘臘千重恨管入新年百事諧從此對花并對景盡拘風月入詩懷春日輕寒噤瘁花期晚皺緑差鱗接逺波躍藻白魚翻玉尺穿林黃鳥度金梭間將詩草臨軒讀靜聽漁船隔岸歌盡日倚窗情脈脈眼前無事奈春何春詞屈指清明數日期紛紛紅紫競芳菲池塘水暖鶼鶼並巷陌風輕燕燕飛栁帶萬條籠淑景遊絲千尺舞晴暉人間何處無春色秖是西樓人未歸元夜月滿今宵霽色澄深沈簾幕管絃清誇毫鬭彩連仙館墜翠遺珠滿帝城一派笑聲連鼓吹六街燈火樂升平歸來禁漏踰三四窗上梅花瘦影橫燈花俗謂燈花冇財花有客花故成末句蘭釭和氣散氤氲忽作圎珠吐穗新膏脈破芽非藉手敷芳成艷不關春疑猜海角天涯事攪亂衾寒枕冷人我欲生憐心焰上何妨好客致清貧送人赴試禮部春闈報罷已三年又向西風促去鞭屢鼓莫嫌非作氣一飛當自卜沖天賈生少達終何遇馬援才髙老更堅大抵功名無早晚平津今見起災川清晝竹搖清影罩幽窗兩兩時禽噪夕陽謝却海棠飛盡絮困人天氣日初長約遊春不去二首鄰姬約我踏青遊強拂愁睂下小樓出户欲行還自省也知憔悴見人羞少年意思懶能酬愛好心情一向休若到舊家遊冶處只應滿眼是春愁元夜遇雨煙火笙歌是處休沈沈春雨暗皇州危樓十二闌干曲一曲闌干一曲愁窗西桃花盛開盡是劉郎手自栽劉郎去後幾番開東君有意能相顧蛺蝶無情更不來新荷平波浮動洛妃鈿翠色嬌圓小更鮮蕩漾湖光三十頃未知葉底是誰蓮東馬塍一塍芳草碧芊芊活水穿花暗護田蠶事正忙農事急不知春色為誰妍清瘦春花秋月若浮漚怎得心如不繫舟肌骨大都無一把可憐禁駕許多愁圓子輕圎絶勝雞頭肉滑膩偏宜蟹眼湯縱可風流無處説已輸湯餅試何郎落花連理枝頭花正開妬花風雨便相催願教青帝長為主莫遣紛紛點翠苔長春花一枝才謝一枝妍自是春工不與間縱使牡丹稱絶艷到頭榮瘁片時間張秦娥少以工小詩得名垂老流落關塞詳見金進士劉昻贈詩中南城坡頭望西山秋意已如許雲影渡江來霏霏半空雨麗澤長吟伐木詩停立以望子日暮飛鳥歸門前長春水采菱舟散策下松亭水清魚可數却上采菱舟乘風過南浦遙山秋水一林碧殘霞幾點紅水窮霞盡處隱隱兩三峯李少雲梅花素艷明寒雪清香任晚風可憐渾似我零落此山中鮑娘題杉溪驛溪驛舊名杉煙光滿翠嵐須知今夜好宿處是江南女郎慧姞賦情自憐新髻好對鏡久夷猶回首瞥見郎含羞整搔頭花間並郎行低説夜來話蝴蝶學嬌癡飛來傍裙帶羡殺葉底花色嬌香不漏安得郎如葉長將玉肌覆周韶韶本良家女流落營籍性慧多蓄竒茗與蔡君謨鬭勝之當陳述古蒞杭時韶泣求落籍座客曰可作一詩韶應聲立成東坡極為稱賞云求落籍隴上巢空嵗月驚忍教回首自梳翎開籠若放雪衣女長念觀音般若經時韶身著白衣盼盼惜春容少年看花雙鬢緑走馬章臺管絃逐而今老更惜花深終日看花花不足坐中美女顔如玉為我一歌金縷曲歸時壓得帽簷欹頭上春風紅簌簌胡楚亦杭妓也有送周韶落籍詩見東坡帖中芳草不見當時丁令威年年處處是相思若將此恨同芳草却恐青青有盡時送周韶落籍淡妝輕素鶴翎紅移入朱欄便不同應笑西園舊桃李強勻顔色待東風龍靚靚與胡楚周韶同以才慧擅青樓名其詩併見稱於坡老自嘲天與羣芳十樣葩獨分顔色不堪誇牡丹芍藥人題遍自笑身如鼓子花送周韶落籍桃花流水本無塵一落人間幾度春解佩暫酬交甫意濯纓還遇武陵人宋元詩會卷六十
