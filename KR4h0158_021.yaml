body:
  text: 宋元詩會卷二十一兵部主事陳焯編蘇軾下訪張山人萬木鎖雲龍天留與戴公路迷山向背人在瀼西東薺麥餘春雪櫻桃落晚風入城都不記歸路醉眠中過淮贈景山兼寄子由過淮山漸好松檜亦蒼然藹藹藏孤寺泠泠出細泉故人真吏隱小檻倚巖偏却望臨江市東風語笑傳新年三首曉雨暗人日春愁連上元水生挑菜渚煙濕落梅村小市人歸盡孤舟鶴踏翻猶堪慰寂寞漁火亂黃昏海國空自暖春山無限青氷花結瘴雨雪菌到江城更待輕雷發先催凍筍生豐湖有藤菜似可敵蓴羮荔子幾時熟花頭今已繁探春先揀樹買夏欲論園居士常攜客參軍許扣門明年更有味懷抱帶諸孫北寺即仙遊潭唐初傳有此亂後不留碑畏虎關門蚤無村得米遲山泉自入甕野桂不勝炊信美那能久應先學忍飢子由緑筠堂愛竹能延客求詩剩挂牆風梢千纛亂月影萬夫長谷鳥驚碁響山蜂識酒香只應陶靖節會聽北窗涼遊鶴林招隱郊原雨初霽春物有餘妍古寺滿修竹深林聞杜鵑睡餘柳花墮目眩山櫻然西窗有病客危坐看香煙乘舟過賈收水閣收不在見其子愛酒陶元亮能詩張志和青山來水檻白雨滿漁蓑淚垢添丁面貧低舉案蛾不知何所樂竟夕獨酣歌荆州三首遊人出三峽楚地盡平川北客隨南賈吳檣間蜀船江侵平野斷風捲白沙旋欲問興亡意重城自古堅南方舊戰國慘淡意猶存慷慨因劉表凄涼為屈原廢城猶帶井古姓聚成村亦解觀形勝升平不敢論朱檻城東角髙王此望沙江山非一國烽火畏三巴戰骨淪秋草危樓倚斷霞百年豪傑盡擾擾見魚蝦南康望湖亭八月渡長湖蕭條萬象疏秋風片帆急暮雨一山孤許國心猶在康時術已虛岷峨家萬里投老得歸無中隱堂詩并序岐山宰王君紳其祖故蜀人也避亂來長安而遂家焉其居第園圃有名長安城中號中隱堂者是也豫之長安王君以書戒其子弟邀豫遊且乞詩因賦此二月驚梅晚幽香此地無依依慰逺客皎皎似吳姝不恨故園隔空嗟芳嵗徂春深桃李亂笑汝益羇孤雨晴後野步雨過浮萍合蛙聲滿四鄰海棠真一夢梅子欲嘗新拄杖間挑菜鞦韆不見人殷勤木芍藥獨自殿餘春倦夜倦枕厭長夜小窗終未明孤村一犬吠殘月幾人行衰鬢久已白旅懷空自清荒園有絡緯虛織竟何成宋復古畫瀟湘晚景圖西征憶南國堂上畫瀟湘照眼雲山出浮空野水長舊遊心自省信手筆都忘會有衡陽客來看意渺茫去嵗與子野遊逍遙堂日欲沒因往西山叩羅浮道院至已二鼓矣遂宿於西堂今嵗索居儋耳子野復來相見作詩贈之往嵗追歡地寒窗夢不成笑談驚半夜風雨暗長檠雞唱山椒曉鐘鳴霜外聲只今那復見倣佛似三生大老寺竹間閣子殘花帶葉暗新筍出林香但見竹隂緑不知汧水黃樹髙傾隴鳥池浚落河魴栽植良辛苦孤僧瘦欲尫風水洞和李節推風轉鳴空穴泉幽㵼石門虛心聞地籟妄意覔桃源過客詩難好居僧語不繁歸瓶得氷雪清冷慰文園與述古自有美堂乘月夜歸娟娟雲月稍侵軒瀲瀲星河半隱山魚鑰未收清夜永鳯簫猶在翠微間凄風瑟縮經絃柱香霧凄迷著髻鬟共喜使君能鼓樂萬人爭看火城還次韻周長官夀星院同餞魯少卿琉璃百頃水仙家風靜湖平響釣車寂厯疏松欹晚照伶俜寒蝶抱秋花困眠不覺依蒲褐歸路相將踏桂花更著綸巾披鶴氅他年應作畫圖誇十月十五日觀月黃樓席上次韻中秋天氣未應殊不用紅紗照坐隅山下白雲橫匹素水中明月卧浮圖未成短棹還三峽已約輕舟泛五湖為問登臨好風景明年相憶使君無定州次韻曾仲錫元日見寄蕭索東風兩鬢華年年幡勝剪宫花愁聞塞曲吹蘆管喜見春盤得蓼芽吾國舊供雲澤米君家新致雪坑茶燕南異事真堪記三寸黃柑擘永嘉七月二十四日以久不雨出禱磻溪是日宿虢縣二十五日晚自虢縣渡渭宿於僧舍曽閣閣故曽氏所建也夜久不寐見壁上前縣令趙薦留名有懷其人龕燈明滅欲三更欹枕無人夢自驚深谷留風終夜響亂山銜月半牀明故人漸逺無消息古寺空來有姓名欲向磻溪問薑叟僕夫屢報斗杓傾和柳子玉過陳絶糧如我自觀猶可厭非君誰復肯相尋圖書跌宕悲年老燈火青熒語夜深蚤嵗便懷齊物意微官敢有濟時心南行千里成何事一聽秋濤萬鼓音宿氷陸寺寄北山清順僧二首草沒河堤雨暗村寺藏修竹不知門拾薪煮藥憐僧病掃地燒香淨客魂農事未休侵小雪佛燈初上報黃昏年來漸識幽居味思與髙人對榻論長嫌鐘鼓聒湖山此境蕭條却自然乞食繞村真為飽無言對客本非禪披榛覔路衝泥入洗足關門聽雨眠遙想後身窮賈島夜寒應聳作詩肩宋叔達家聽琵琶數絃已品龍香撥半面猶遮鳯尾槽新曲翻從玉連瑣舊聲終愛鬱輪袍夢回只記歸舟字賦罷雙垂紫錦縧何異烏孫送公主碧天無際鴈行髙有以官法酒見餉者因用前韻求述古為移厨飲湖上喜逢門外白衣人欲膾湖中赤玉鱗遊舫已妝吳榜穩舞衫初試越羅新欲將魚釣追黃帽未要靴刀抹絳巾芳意十分強半在為君先踏水邊春新城道中東風知我欲山行吹斷簷間積雨聲嶺上晴雲披絮帽樹頭初日挂銅鉦野桃含笑竹籬短溪柳自搖沙水清西崦人家應最樂煮芹燒筍餉春耕會客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和載酒無人過子雲掩關晝卧客書裙歌喉不共聽珠貫醉面何因作纈紋僧侣且陪香火社詩壇欲斂鸛鵝軍憑君遍繞湖邊寺漲渌晴來已十分病中遊祖塔院紫李黃瓜村路香烏紗白葛道衣涼閉門野寺松隂轉欹枕風軒客夢長因病得間殊不惡安心是藥更無方道人不惜階前水借與匏樽自在嘗初自徑山歸述古召飲介亭以病先起西風初作十分涼喜見新橙透甲香遲暮賞心驚節物登臨病眼怯秋光慣眠處士雲庵裏倦醉佳人錦瑟旁猶有夢回清興在卧聞歸路樂聲長次韻述古過周長官夜飲二更鐃鼓動諸鄰百首新詩間八珍已遣亂蛙成兩部更邀明月作三人雲煙湖寺家家鏡燈火沙河夜夜春曷不勸公勤秉燭老來光景似奔輪過永樂文長老已卒初驚鶴瘦不可識旋覺雲歸無處尋三過門間老病死一彈指頃去來今存亡慣見渾無淚鄉井難忘尚有心欲向錢塘訪圓澤葛洪川畔待秋深雪夜書北臺壁二首黃昏猶作雨纎纎夜靜無風勢轉嚴但覺衾裯如潑水不知庭院已堆鹽五更曉色來書幌半夜寒聲落畫簷試掃北臺看馬耳未隨埋沒有雙尖城頭初日始翻鴉陌上晴泥已沒車凍合玉樓寒起粟光搖銀海眩生花遺蝗入地應千尺宿麥連雲有幾家老病自嗟詩力退空吟氷柱憶劉義夜飲次韻畢推官簿書叢裏過春風酒聖時時且復中紅燭照庭嘶騕裊黃雞催曉唱玲瓏老來漸減金叉興醉後空驚玉筯工月未上時應蚤散免教壑谷問吾公與參寥師行園中得黃耳菌遣化何時取衆香法筵齋鉢久凄涼寒蔬病甲誰能採落葉空畦半已荒老楮忽生黃耳菌故人兼致白牙薑蕭然放筯東南去又入春山筍蕨鄉岐亭道上見梅花戲贈季常蕙死蘭枯菊亦摧返魂香入嶺頭梅數枝殘緑風吹盡一點芳心雀啅開野店初嘗竹葉酒江雲欲落豆秸灰行當更向叉頭見病起烏雲正作堆二月三日點燈會客江上東風浪接天苦寒無賴破春妍試開雲夢羔兒酒快瀉錢塘藥玉船蠶市光隂非故國馬行燈火記當年冷煙溼雪梅花在留得新春作上元泗州南山監倉蕭淵東軒北望飛塵苦晝霾洗心聊復寄東齋珍禽聲好猶思越野橘香清未過淮有信微泉來逺嶺無心明月轉空階一官倉庾真堪老坐看松根絡斷崖泗州除夜雪中黃師是送酥酒暮雪紛紛投碎米春流咽咽走黃沙舊遊似夢徒能説逐客如僧豈有家冷硯欲書先自凍孤燈何事獨成花使君半夜分酥酒驚起妻孥一笑譁杜介送魚新年已賜黃封酒舊老仍分頳尾魚陋巷關門負朝日小園除雪得春蔬病妻起斫銀絲膾稚子歡尋尺素書醉眼曚朧覓歸路松江煙雨晚疏疏舟行至清逺縣見顧秀才極談惠州風物之美到處聚觀香案吏此邦宜著玉堂仙江雲漠漠桂花溼海雨翛翛荔子然聞道黃柑常抵鵲不容朱橘更論錢恰從神武來𢎞景便向羅浮見稚川新釀桂酒搗香篩辣入瓶盆盎盎春溪帶雨渾收拾小山藏社甕招呼明月到芳樽酒材已遣門生致菜把仍叨地主恩爛煮葵羮斟桂醑風流可惜在蠻村正月二十六日偶與數客野步嘉祐僧舍東南野人家雜花盛開扣門求觀主人林氏媪出應白髮青裙少寡獨居三十年矣感歎之餘作詩記之縹帶緗枝出絳房緑隂青子送春忙涓涓泣露紫含笑焰焰燒空紅拂桑落日孤煙知客恨短籬破屋為誰香主人白髮青裙袂子美詩中黃四娘連雨江漲越井岡頭雲出山牂牁江上水如天牀牀避漏幽人屋浦浦移家蜒子船龍卷魚蝦并雨落人隨雞犬上牆眠秪應樓下平階水長記先生過嶺年白鶴峯新居欲成夜過西鄰翟秀才林行姿家初閉户翟夫子舍尚留關連娟缺月黃昏後縹眇新居紫翠間繫悶豈無羅帶水割愁還有劍鋩山中原北望無歸日鄰火村舂自往還庚辰嵗人日作時聞黃河已復北流老臣舊數論此今斯言乃驗二首老去仍棲隔海村夢中時見作詩孫天涯已慣逢人日歸路猶欣過鬼門三䇿已應思賈讓孤忠終未赦虞翻典衣剩買河源米屈指新篘作上元不用長愁挂月村檳榔生子竹生孫新巢語燕還窺硯舊雨來人不到門春水蘆根看鶴立夕陽楓葉見鴉翻此生念念隨泡影莫認家山作本元六月二十日夜渡海參橫斗轉欲三更苦雨終風也解晴雲散月明誰點綴天容海色本澄清空餘魯叟乘桴意粗識軒轅奏樂聲九死南荒吾不恨兹遊竒絶冠平生過嶺暫著南冠不到頭却隨北鴈與歸休平生不作兔三窟今古何殊貉一丘當日無人送臨賀至今有廟祀潮州劍關西望七千里乘興真為玉局遊留題顯聖寺渺渺疏林集晚鴉孤村煙火梵王家幽人自種千頭橘逺客來尋百結花浮石已乾霜後水焦坑間試雨前茶秪疑歸夢西南去翠竹江村繚白沙西蜀楊耆二十年前見之甚貧今見之亦貧所異於昔者蒼顔華髮耳女無美惡富者妍士無賢不肖貧者鄙使其逢時遇合豈減當世之士哉頃宿長安驛舍聞泣者甚怨問之乃昔富而今貧者為作一詩今以贈楊君孤村漸雨逐秋涼逆旅愁人怨夜長不寐相看唯櫪馬愁吟互答有寒螿天寒滯穗猶橫畝嵗晚空機尚倚牆勸爾一杯聊復睡人間貧富海茫茫獄中寄子由柏臺霜氣夜凄凄風動琅璫月向低夢繞雲山心似鹿魂飛湯火命如雞眼中犀角真吾子身後牛衣愧老妻百嵗神遊定何處桐鄉知在浙江西出獄次前韻平生文字為吾纍此去聲名不厭低塞上縱歸他日馬城中不鬭少年雞休官彭澤貧無酒隱几維摩病有妻堪笑雎陽老從事為余投檄向江西次韻完夫再贈之什某巳卜居毗陵與完夫有廬里之約云柳絮飛時筍籜斑風流二老對開關雪芽我為求陽羡乳水君應餉惠山竹簟水風眠畫永玉堂制草落人間應容緩急煩閭里桑柘聊同十畝間贈王子直秀才萬里雲山一破裘杖端間挂百錢遊五車書已留兒讀二頃田應為鶴謀水底笙歌蛙兩部山中奴婢橘千頭幅巾我欲相隨去海上何人識故侯贈清涼寺和長老代北初辭沒馬塵江南來見卧雲人問禪不契前三語施佛空留丈六身老去山林徒夢想雨餘鐘鼓更清新會須一洗黃茅瘴未用深藏白氎巾寄吕穆仲寺丞孤山寺下水侵門每到先看醉墨痕楚相未亡談笑是中郎不見典刑存君先去踏塵埃陌我亦來尋桑棗村回首西湖真一夢灰心霜鬢更休論九月二十日微雪懷子由弟岐陽九月天微雪已作蕭條嵗暮心短日送寒砧杵急冷官無事屋廬深愁腸别後能消酒白髮秋來已上簪近買貂裘堪出塞忽思乘傳問西琛送穆越州江海相忘十五年羡君松柏蔚蒼顔四朝耆舊冰霜後兩郡風流水石間舊政猶傳蜀父老先聲已振越溪山樽前俱是蓬萊守莫放髙樓雪月間正月二十日往岐亭郡人潘古郭三人送余於女王城東禪莊院十日春寒不出門不知江柳已搖村稍聞決決流冰谷盡放青青沒燒痕數畝荒園留我住半瓶濁酒待君溫去年今日關山路細雨梅花正斷魂第五橋白露凄風洗瘴煙夢回相對兩凄然雀羅廷尉非當日鳩杖先生愈少年世事飽諳思縮手主恩未報恥歸田誰憐第五橋東水獨照台州老鄭虔樓觀鳥噪猿呼晝閉門寂寥誰識古皇尊青牛久已辭轅軛白鶴時來訪子孫山近朔風吹積雪天寒落日淡孤村道人應怪遊人衆汲盡階前井水渾過嶺寄子由七年來往我何堪又試曹溪一勺甘夢裏似曽遷海外醉中不覺到江南波生濯足鳴空澗霧繞征衣滴翠嵐誰遣山雞忽驚起半巖花雨落毶毶歇白塔鋪甘山廬阜鬱長望林隙依稀漏日光吳國晚蠶初斷葉占城蚤稻欲移秧迢迢澗水隨人急冉冉巖花撲馬香望眼儘從飛鳥逺白雲深處是吾鄉李鈐轄坐上分題戴花二八佳人細馬駝十千美酒渭城歌簾前柳絮驚春曉頭上花枝奈老何露濕醉巾香掩冉月明歸路影婆娑緑珠吹笛何時見欲把斜紅插皂羅玉盤盂并序東武舊俗每嵗四月大會于南禪資福兩寺以芍藥供佛而今嵗最盛凡七千餘朵皆重跗纍萼繁麗豐碩中有白花正圓如覆盂其下十餘葉稍大承之如盤姿格絶異獨出於七千朵之上云得之城北蘇氏園中周宰相莒公之别業也而其名俚甚乃為易之雜花狼籍占春餘芍藥開時掃地無兩寺妝成寶瓔珞一枝爭看玉盤盂佳名會作新翻曲絶品難尋舊畫圖從此定知年穀熟姑山親見雪肌膚壺中九華詩我家岷蜀最髙峯夢裏猶驚翠掃空五嶺莫愁千嶂外九華今在一壺中天池水落層層見玉女窗明處處通念我仇池太孤絶百金歸買小玲瓏和子由寒食寒食今年二月晦樹林深翠已生煙繞城駿馬誰能借到處名園意盡便但挂酒壺那計盞偶題詩句不須編忽聞啼鵙驚羇旅江上何人治廢田紅梅怕愁貪睡獨開遲自恐冰容不入時故作小紅桃杏色尚餘孤瘦雪霜姿寒心未肯隨春態酒暈無端上玉肌詩老不知梅格在更看緑葉與青枝石曼卿紅梅詩云認桃無緑葉辨杏冇青枝和劉景文見贈元龍本志陋曹吳豪氣崢嶸老不除失路今為噲等伍作詩猶似建安初西來為我風黧面獨卧無人雪縞廬留子非為十日飲要令安世誦亡書九日尋臻闍黎遂泛小舟至勤師院湖上青山翠作堆蔥蔥鬱鬱氣佳哉笙歌叢裏抽身出雲水光中洗眼來白足赤髭迎我笑拒霜黃菊為誰開明年桑苧煎茶處憶著衰翁首重回皎然有九日與陸羽煎茶詩羽自號桑苧翁余來年九日去此久矣除夜野宿常州城外南來三見嵗云徂直恐終身走道塗老去怕看新厯日退歸擬學舊桃符煙花已作青春意霜雪偏尋病客鬚但把窮愁博長健不辭醉後飲屠酥與毛令方尉遊西菩提寺二首推擠不去已三年魚鳥依然笑我頑人未放歸江北路天教看盡浙西山尚書清節衣冠後處士風流水石間一笑相逢那易得數詩狂語不須刪路轉山腰足未移水清石瘦便能竒白雲自占東西嶺明月誰分上下池黑黍黃粱初熟後朱柑緑橘半甜時人生此樂須天賦莫遣兒曹取次知孔長源挽詞小偃門頭栁繫船吳山堂上月侵筵潮聲夜半千巖響詩句明朝萬口傳長源自越過杭夜飲有美堂上聨句長源詩云天目逺隨雙鳯落海門遙蹙兩潮趨一坐稱善豈意日斜庚子後忽驚嵗在巳辰年佳城一閉無窮事南望題詩淚灑箋宿州次韻劉涇我欲歸休瑟漸希舞雩何日著春衣多情白髮三千丈無用蒼皮四十圍晚覺文章真小技蚤知富貴有危機為君垂涕君知否千古華亭鶴自飛涇之兄汴亦有丈死矣贈惠山僧惠表行遍天涯意未闌將心到處遣人安山中老宿依然在案上楞嚴已不看欹枕落花餘幾片閉門新竹自千竿客來茶罷空無有盧橘楊梅尚帶酸初到黃州自笑平生為口忙老來事業轉荒唐長江繞郭知魚美好竹連山覺筍香逐客不妨員外置詩人例作水曹郎只慙無補絲毫事尚費官家壓酒囊檢校官例折支多得退酒袋朝雲詩并引世謂樂天有粥駱馬放楊柳枝詞嘉其主老病不忍去也然夢得有詩云春盡絮飛留不得隨風好去落誰家樂天亦云病與樂天相伴住春隨樊子一時歸則是樊素竟去也豫家有數妾四五年相繼辭去獨朝雲者隨豫南遷因讀樂天集戲作此詩朝雲姓王氏錢塘人嘗有子曰幹兒未期而夭云豈似楊枝别樂天恰如通德伴伶玄阿奴絡秀不同老天女維摩總解禪經卷藥爐新活計舞衫歌扇舊因緣丹成逐我三山去肯作巫陽雲雨仙桄榔杖寄張文潛一首時初聞黃魯直遷黔南范淳父九疑也睡起風清酒在亡身隨殘夢兩茫茫江邊曳杖桄榔瘦林下尋苖蓽撥香獨步儻逢勾漏令逺來莫恨曲江張遙知魯國真男子獨憶平生盛孝章汲江煎茶活水還須活火烹唐人云茶須緩火炙活火煎自臨釣石取深清大瓢貯月歸春甕小杓分江入夜瓶茶雨已翻煎處腳松風忽作瀉時聲枯腸未易禁三碗坐數荒村長短更庚辰嵗正月十二日天門冬酒熟豫自漉之且漉且嘗遂以大醉自撥牀頭一甕雲幽人先已醉濃芬天門冬熟新年喜麴米春香並舍聞杜子美詩云聞道雲安麴米春蓋酒名也菜圃漸疏花漠漠竹扉斜掩雨紛紛擁裘睡覺知何處吹面東風散纈紋贈詩僧道通雄豪而妙苦而腴秪有琴聰與蜜殊錢塘僧思聰總角善琴後捨琴而學詩復棄詩而學道其詩似皎然而加雄放安州僧仲殊詩敏捷立成而工妙絶人逺甚殊辟穀常啖蜜語帶煙霞從古少李太白云他人之文如山無煙霞春無草木氣含蔬筍到公無謂無酸饀氣也香林乍喜聞薝蔔古井惟愁斷轆轤為報韓公莫輕許從今島可是詩奴趙成伯家有姝麗僕沗鄉人不肯開樽徒吟春雪謹依元韻以當一笑繡簾朱戶未曽開誰見梅花落鏡臺試問髙吟三十韻何如低唱兩三杯莫嫌衰鬢聊相映須得纎腰與共回知道文君隔青鎖梁園賦客敢言才惠州近城數小山類蜀道春與進士許毅野步會意處飲之且醉作詩以記適參寥專使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也夕陽飛絮亂平蕪萬里春前一酒壺鐡化雙魚沈逺素劍分二嶺隔中區花曾識面香仍好鳥不知名聲自呼夢想平生消未盡滿林煙月到西湖八月七日初入贛過惶恐灘七千里外二毛人十八灘頭一葉身山憶喜歡勞逺夢蜀道有錯喜歡鋪在大散關上地名惶恐泣孤臣長風送客添帆腹積雨扶舟減石鱗便合與官充水手此生何止略知津立春日小集呈端叔白髮巳十載青春無一堪不驚新嵗換聊與故人談牛健民聲喜鴉嬌雪意酣霏微不到地和暖要宜蠶嵗月斜川似風流曲水慙衰懷久灰稿習氣尚饞貪白啖本河朔紅消真劍南辛盤得青韭臘酒是黃柑歸卧燈殘帳醒聞葉打庵須煩李居士重説後三三送范景仁遊洛中投老身彌健登山意未闌西遊為櫻筍東道盡鵷鸞杖屨攜兒去園亭借客看折花斑竹寺弄水石樓灘鬻馬哀憐白驚雷怯笑韓蘚書標洞府松蓋偃天壇試與劉夫子重尋靖長官同王勝之遊蔣山到郡席不暖居民空惘然好山無十里遺恨恐他年欲款南朝寺同登北郭船朱門收畫戟紺宇出青蓮夾路蒼髯古迎人翠麓偏龍腰蟠故國鳥爪寄層巔竹杪飛華屋松根泣細泉峯多巧障目江逺欲浮天略彴橫秋水浮屠插暮煙歸來踏人影雲細月娟娟靈上訪道人不遇花光紅滿欄草色緑無岸不逢青眼人長歌白石澗初入廬山青山若無素偃蹇不相親要識廬山面他年是故人出都來陳所乘船上有題小詩不知何人作有感豫心者聊以和之潁水非漢水亦作葡萄緑恨無襄陽兒令唱銅鞮曲軒窗東鄰多白楊夜作雨聲急窗下獨無眠秋蟲見燈入促織月叢號耿耿露葉泣漙漙夜長不自暖那憂公子寒吉祥寺賞牡丹人老簪花不自羞花應羞上老人頭醉歸扶路人應笑十里珠簾半上鈎望湖樓醉書二絶句黑雲翻墨未遮山白雨跳珠亂入船卷地風來忽吹散望湖樓下水如天放生魚鱉逐人來無主荷花到處開水枕能令山俯仰風船解與月裴回飲湖上初晴後雨水光瀲灧晴方好山色空濛雨亦竒欲把西湖比西子淡妝濃抹總相宜贈别青鳥銜巾久欲飛黃鶯别主更悲啼殷勤莫忘分攜處湖水東邊鳯嶺西書辨才白雲堂壁不辭清曉叩松扉却值支公久不歸山鳥不鳴天欲雪卷簾惟見白雲飛送蜀人張師厚赴殿試忘歸不覺鬢毛斑好事鄉人尚往還斷嶺不遮西望眼送君直過楚王山惠崇春江晚景竹外桃花三兩枝春江水暖鴨先知蔞蒿滿地蘆芽短正是河豚欲上時書李世南所畫秋景野水參差落漲痕疏林欹倒出霜根扁舟一棹歸何處家在江南黃葉村書林次中所得李伯時歸去來陽關二圖後二首不見何戡唱渭城舊人空數米嘉榮龍眠獨識殷勤處畫出陽關意外聲兩本新圖寶墨香樽前獨唱小秦王為君翻作歸來引不學陽關空斷腸澄邁驛通潮閣餘生欲老海南村帝遣巫陽招我魂杳杳天低鶻沒處青山一髮是中原僕年三十九在潤州道上過除夜作此詩又二十年在惠州録之以付過寺官官小未朝參紅日半窗春睡酣為報鄰雞莫驚覺更容殘夢到江南寒具纎手搓來玉數尋碧油輕蘸嫩黃深夜來春睡濃如酒壓褊佳人纒臂金絶句柴桑春晚思依依屋角鳴鳩雨欲飛昨日已收寒食火吹花風起却添衣答田國博二首嵗月翩翩下坂輪歸來杏子已生仁深紅落盡東風惡柳絮榆錢不當春火冷餳稀杏粥稠青裙縞袂餉田頭大夫行役家人怨應羡居鄉馬少遊淮上蚤發淡月輕雲曉角哀小風吹水碧鱗開此生定向江湖老默數淮中十往來望湖樓晚景青山斷處塔層層隔岸人家喚欲譍江上秋風晚來急為傳鐘鼓到西興西湖夀星院此君軒卧聽謖謖碎龍鱗俯看蒼蒼立玉身一舸鴟夷江海去尚餘君子六千人寒食夜漏聲透入碧窗紗人靜鞦韆影半斜沈麝不燒金鴨冷淡雲籠月照梨花梅花二首梅梢春色弄微和作意南枝翦刻多月黑林間逢縞袂霸陵醉尉誤誰何月地雲階漫一樽玉奴終不負東昏臨春結綺荒荆棘誰信幽香是返魂張翰畫像浮世功名食與眠季膺真得水中仙不須更説知幾蚤真為鱸魚也自賢讀開元天寶遺事二首潭裏春船百倍多廣陵銅器越溪羅三郎官爵如泥土爭唱𢎞農得寶歌琵琶絃急衮梁州羯鼓聲髙舞臂鞲破費八姨三百萬大唐天子要纒頭八月十五日看潮二首萬人鼓噪懾吳儂猶似浮江老阿童欲識潮頭髙幾許越山渾在浪花中江神河伯兩醯雞海若東來氣吐霓安得夫差水犀手三千強弩射潮低贈莘老三首嗟余與子久離羣耳冷心灰百不聞若對青山談世事當須舉白便浮君天目山前緑浸裾碧瀾堂下看銜艫作堤捍水非吾事間送苕溪入太湖三年京國厭藜蒿長羡淮魚壓楚糟今日駱駝橋下泊恣看修網出銀刀山村二首老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶解忘味邇來三月食無鹽杖藜裹飯去匆匆過眼青錢轉手空贏得兒童語音好一年強半在城中陳季常所畜朱陳村嫁娶圖我是朱陳舊使君勸耕曾入杏花村而今風物那堪畫縣吏催錢夜打門朱陳村在徐州蕭縣縱筆二首父老爭看烏角巾應緣曾現宰官身溪邊古路三義口獨立斜陽數過人北船不到米如珠醉飽蕭條半月無明日東家知祀竈隻雞斗酒定膰吾章惇附建州浦城人第進士調商洛令熙寧初王安石秉政悅其才用為編修三司條例官出任湖南北察訪使召還擢知制誥罷知湖州元豐三年拜參知政事尋罷知蔡州五年召拜門下侍郎哲宗即位知樞密院事宣仁后聽政惇與蔡確矯倡定䇿功會確罷惇不自安乃駁司馬光所更役法纍數千言務以求勝其説不行復憤恚爭辨簾前宣仁后怒劉摰蘇輒朱光庭王巖叟交章擊之出知汝州及哲宗親政有復熙寧元豐之意有起惇為尚書左僕射於是專以紹述為事凡元祐所罷一切復之元祐當局諸正人一切目以姦黨起同文之獄羅織貶竄正類胥空甚至欲追廢宣仁后則悖亂不道之尤矣玉光亭千層懷玉對軒窗池上新亭見玉光祗此便堪為吏隱神仙官職水雲鄉答劉子宣洞霄宫裏一間人東府西樞老舊臣多謝姑蘇賢太守殷勤分送洞庭春舒亶附字信道號亦樂居士初官臨海縣尉王安石當國聞其能為改官至御史裏行復同李定陷蘇軾於罪蓋忮險人也夢入天宫天風吹散赤城霞染出連雲萬樹花誤入醉鄉迷去路旁人應笑却還家村居水繞陂田竹繞籬榆錢落盡槿花稀夕陽牛背無人卧帶得寒鴉兩兩歸宋元詩會卷二十一
