body:
  text: 宋元詩㑹卷十二兵部主事陳焯編宋庠字公序安陸人徙雍丘遂為汴人天聖初舉進士第一擢大理評事同判襄州召試直史館纍遷左正言以爭郭后之廢坐罰金久之知制誥權判吏部流內銓詔為翰林學士寶元中參知政事與宰相吕夷簡論不合出知揚州皇祐中拜兵部侍郎同中書門下平章事諫官包拯奏庠在政府無所建明以觀文殿大學士出知河南府再遷兵部尚書以檢校太尉充樞密使封莒國公英宗即位改封鄭國公卒贈太尉兼侍中諡宣獻集四十卷庠初名郊緣李淑欲中之言其姓名有妨國號上諭改此嵗晏出沐感事內訟山海有完士希世無良籌偶穿東郭履遂别野人舟不恥篆刻賦來肩英俊遊私智甚鳬短塵容若鴟愁備員太史氏補屬富民侯姑學了官事何嘗分主憂口貪斗食利嵗感星躔周中都富才彥方駕若龍虬茂先善史漢平津治春秋髙文用司馬格五寵吾丘間濶路逢葛繽紛人召鄒桑羊興賈豎安國出縲囚汲鄭貴交盛徐陳英藻遒况乃天下樞雄雌來九州衣冠徑復道鼓吹出長楸席上萬錢箸橋邊八列騶雍容紱魯玦意氣拂吳鈎咨余良不韙瓴甓厠林璆吹竽昔已濫在梁今可尤臺閣魏舒被風霜蘇季裘有志謝鶴軒無機防海鷗恭俟杜陵課誅茅歸故疇有將獨鶴行都市道上者左右奔迫野態憔悴因成短韻明心本霄漢此路極喧埃何意鳴臯罷翻同舞市來波臣憂轍涸海鳥避風災寄語昻昻質非君羽獨摧春夕暝色蔽孤齊空軒向夕開花低應露下月暗覺雲來獨牖輕蛾聚風枝倦鳥猜無言聊隱几萬鏡一靈臺寄子京八年三郡駕朱輪更忝鴻樞對國均老去師丹多忘事少來之武不如人車中顧馬空能數海上浮鷗想見親唯有弟兄歸隱志共將耕鑿報堯仁府齊嵗晏節物感人輒成拙詩上寄昭文相公處世何常盡值才虛名髙位自驚猜千重浪裏隨流出百尺竿頭試險回衰鬢不徒欺曉雪孤心兼欲伴寒灰嵩陽潁曲風煙接已仗歸雲作隱媒西湖展江亭緑鴨東陂已可憐更因雪竇注西田鑿開魚鳥忘情地展盡汀湖極目天向夕舊灘都浸月過寒新樹便留煙使君直欲稱漁叟願賜閒州不記年宋祁字子京與兄庠同舉進士禮部奏祁第一章獻太后不欲以弟先兄乃置祁第十呼曰小宋授復州軍事推官用孫奭薦召試授直史館遷太常博士同知禮儀院厯權三司度支判官天章閣待制判太常禮儀院國子監出知夀州陳州還知制誥入翰林為學士改龍圖學士史館修撰修唐書書成遷左丞進工部尚書踰月拜翰林學士承㫖尋卒祁兄弟皆以文學顯而祁尤能文善議論惟清約莊重不及其兄云後諡景文九日藥市作陽九協嘉神期入始多暇五藥㑹廣㕓遊肩閙相駕靈品羅賈區仙芬冒闉舍擷露來山阿斸煙去巖罅係道雜提攜盈襜更薦藉乘時物無賤投乏利能射饔芩互作主參薺交相假曹植謹贋令韓康無二價西南嵗多癘卑溼連春夏佳劑止刀圭千金厚相謝刺史主求瘼萬室繫吾化顧賴惡石功捫襟重慚唶海棕哆熾風葉張囷皴雨皮厚叢橑列蓋端攢旄注旗首物以稀見珍材緣怪忘醜枇杷有果産西裔作花凌早寒樹繁碧玉葉柯疉黃金丸上都不可寄咀味獨長歎衆熙亭曉曯長夏宜髙明緩帶散煩窘慿軒一超然目與天俱盡山從雲端現日就林外隱風來草樹披煙生井閭近自公況多暇冲臆無留藴即此可宴居何須事遊軫和賈相公覽杜工部北征篇唐家六葉太平罷宫艷醉骨恬無憂孽闕詬天翠華出糢糊戰血腥九州乾瘡坤痍四海破白日殺氣寒颼颼少陵背賊走行在採梠拾橡填饑喉眼前亂離不忍見作詩感慨陳大猷北征之篇詞最切讀者心隕如搖輈莫肯念亂小雅怨自然流涕袁安愁才髙位下言不入憤氣鬱屈蟠長虬今日奔亡匪天作向來顛倒皆廟謀忠骸佞骨相撑拄一燎同燼悲崑丘相君覽古慨前事追歎子美真詩流前王不見後王見願以此語詒千秋贈楞嚴舒公上人丈室錦城隈庭閒地遍苔飯從香積取花續少林開講晝經殘葉禪宵燭委煤無嫌一時學要是暮雲才長安道中悵然作二首三輔古風煙征驂悵未前山園蓬顆外賈山議始皇侈葬言後世不得蓬顆蔽冢宫室黍離邊樹老經唐日碑殘刻漢年便須真隕涕不待雍門絃興亡作今古事往始堪悲宫破黃山在城空北斗移走岡寒兔隱啼戍暮鴉饑灞岸重回首惟餘王粲詩過惠崇舊居雖昧平生契懷賢要可傷生涯與薪盡法意共燈長遺畫空觀貌殘詩孰補亡神期通一語無乃困津梁贈清逸魏閒處士奕世依嵒石褒恩下帝庭姓名髙士傳父子少微星池溜遙通澗家林近帶坰分明詔書意天極賜鴻冥答勸農李淵宗嘉州江行見寄嘉月嘉州路軻峩接部船山圍杜宇國江入夜郎天霽引溪流望凉供水閣眠愧君舟楫意遂欲濟長川中秋新霽壕水初滿自城東隅泛舟回謝公命賦齊舫談經後官池載酒行斜陽鳥外落新月樹端生演漾思江浦夷猶繞郡城東轅有遺恨日想物華清再遊海雲寺作十里雲邊寺重驅千騎來天形欹野盡江勢讓山回園奈濃成幄樓鐘近殷雷斜陽歸鞅促飛蓋冒輕埃渡湘江春過瀟湘渡真觀八景圖雲藏嶽麓寺江入洞庭湖晴日花爭發豐年酒易沽長沙十萬户遊女似京都城隅晚意寥寥天意晚稍覺井閭閒水落呈全嶼雲生失半山牛羊樵路暗燈火客舟還暝思輸鳬鵠歸飛沆漭間夏日陪提刑彭學士登周襄王故城聊隨漢使者一上周王城片雨北郊晦殘陽西嶺明野禽呼自别香草問無名誰復黍離詠但多箕潁情東晉倉卒浮江日聲明建號初羣臣讓禁臠上宰製單綀氣鋭開桁戰心歡折屐書纎兒競撞壞不念好家居僑居公宇靜寥寥居然俗意銷屐閒誰記齒帶適自忘腰畝首秋殘穫城西日暮樵比來行樂慣隨意度溪橋臘後晚望寒日繫難定鳴笳弄已休凍崖初辨馬昏谷自量牛漢樹臨關密湖泉入塞流登髙能賦未風物古堯州集江瀆池二首五月追涼地滄江剩素漣林煙昏岸日樓影壓池天篠密工迷徑荷欹巧避船機忘更何事魚鳥亦留連飛檻枕溪光歡言客遍觴暫雲銷樹影驟雨發荷香辛臼橙虀熟庖刀鱠縷長蘋風如有意盈袵借浮涼將歸二首雲棧短長亭今兹重作經卭崍叱殘馭蜀分使回星旅鬢雙垂雪羇懷一泛萍驪駒在門久此曲若為聽逺假西南守三逢梅柳新衰令宦情薄老惜嵗華頻郫釀供銷日巴禽巧喚春離家何所恨雁後作歸人登琴臺詩故臺千古恨猶對舊家山半夜鸞凰去他年駟馬還死憂封禪晚坐愛茂陵閒惟有飄飄氣仍存天地間墨池宅廢經池在人亡墨溜乾蟾蜍兼滴破科斗共書殘蠧罷藝猶翠蒸餘竹自寒它揚無可問撫物費長嘆西樓炎氛隨日入岑寂坐遙帷倦鶩昏投浦驚蟬夜去枝桂華兼月破槎影帶星移珍重窗風好宜人即此時官下東泊驂驔一駐車騩雲芣木淡扶疏鄭有騩山風經禦冦仙遊外野識裨諶草創餘潁谷寒煙仍井邑時門殘日但丘墟兩都大道過從盛不稱支離佩左魚洛陽春寶樓斜倚闕西天北轉樓隂壓素漣白雪久殘梁復道黃頭間守漢樓船塵輕未損朝來霧樹暖才容臘外煙弭節不妨饒悵戀待歌魚藻記他年寄題相臺太尉韓公晝錦堂瑞節前驅晝錦身堂成署榜示州民遷鶯賀燕聨翩集嘉樹甘棠次第春漳岸夕波通沼溜魏臺暾日弄梁塵君看千古青編上得意如公有幾人寒食假中作九門煙樹蔽春㕓小雨初晴撥火前草色引開盤馬地簫聲催暖賣餳天縈絲早絮輕無著弄袖和風細可憐鰲署侍臣貪出沐珉糜珠饀愧頒宣把酒歌管嘈嘈月露前且將身世付酡然漫誇鼷鼠機頭箭不識醯雞甕外天青史有人譏巧宦黃金無術治流年君看醉趣兼醒趣始覺靈均更可憐余既到郡有詔仍修唐書寄局中諸僚一章通奏領州麾詔許殘書得自隨吾黨成章真小子官家了事是癡兒昏眸視久花爭亂倦首搔餘雪半垂所願弟兄皆傑筆劉生當見汗青期真定述事莫嫌屯壘是邊州試聽山河說上游帳下文書三幕府馬前鞾靺五諸侯王藩故社經涂國俠窟餘風解報仇四十年來民緩帶使君何事不輕裘擬杜子美峽中意天入虛樓倚百層四方遙謝此登臨驚風借壑為寒籟落日容雲作暝隂峴井北拋王粲宅楚衣南逐女嬃砧十年不識長安道九籥宸開紫氣深春宴行樂家園園芿初乾小雨泥飲壺遊屐況親攜身輕早蝶千回舞技癢新禽百種啼乘飲草茵侵坐軟畏風桃綬向林低陽暉自有留人意銜照髙樓未遽西落花墜素翻紅各自傷青樓煙雨忍相忘將飛更作回風舞已落猶成半面粧滄海客歸珠迸淚章臺人去骨遺香可能無意傳雙蝶盡付芳心與蜜房將到都先獻樞密太尉相公再試州旟驗不才却將憔悴到中臺相車問罷同牛喘大厦成時與燕來今日謀猷須丙魏他年賔客但鄒枚西園聞道餘春在尚及花前㶑灔杯和致政燕侍郎舟中寄晏尚書異時仙閣對三休頓首辭榮動邃旒疏廣故僚供祖帳鴟夷盡室付歸舟側階生玉懷歡宴列壁圖山代逺遊新句漸髙塵纍少紫芝巖曲要相求送越州陸學士梅天霞破候旗乾鄉樹依然越絶間挾䇿當年逢掖去懷章此日繡衣還亭餘內史浮觴水路入仙人取箭山牛酒盛誇先墅宴不妨春詔得親頒成都風物繁雄古奧區十年傖父巧論都雲藏海客星間石花識文君酒處壚兩劔作關屏對繞二江聨派練平鋪此時全盛超西漢還有淵雲作頌無九日宴射佳節慿髙駐綵旗亭臯霧罷轉晨曦堋間羽集號猿後臺外塵飛戲馬時芳菊治疴爭泛蘂丹萸辟惡遍傳枝明年此㑹知何處醉玉頽山不用辭程密學知益州墀塗晝對别堯蓂細札芝泥襲綬馨三蜀舊臺呼輻寵十連新府夢刀靈雲梯霽日明鈎棧雨閣蒼苔蝕劒銘只恐廉襦歌未厭熒煌歸應六符星題北樓少城西北之髙樓此地蒼茫天意秋驚風白日忽已晚落葉長年相與愁極塞雲物自慘淡趨林鳥雀時啁啾纓上朔塵久不洗安得手弄滄江流蜀地海棠繁媚有加膩幹豐條苒弱可愛北方所未見諸公作詩流播西人余素好玩不能自默然所道皆在前人陳跡中如國風申章亦無愧云蜀國天餘煦珍葩地所宜濃芳不隱葉並艷欲燃枝襞綵分羣萼均霞㸃萬蕤淺深雙絶態啼笑兩妍姿絳節排煙竦丹釭落帶垂回文錦官日傳信到邊遲余昔遊雲臺觀謁希夷先生陳摶祠堂緬想其人今追作此詩仙館三峯下年華百嵗中夢休孤蝶往蛻在一蟬空蘂笈微言祕宵晨浩氣通丹遺䑛後鼎林遣御餘風宿霧沈荒白餘霞委暗紅峨眉有歸約飛步與誰同懷古聎望城闉聊屬聎千古恨悠悠夏享空臺毁韓亡故社留廟祠旌潁鳳溪水識巢牛春色依林動晨煙傍戍浮庌騶閒自集田鶴呌相求町篠夤緣密川葭靃靡柔櫟墟迷鄭鄙隗路隔軒遊感昔如吾輩曽經幾斛愁詠史古有容容福人譏齪齪員生貪巧作奏死戒直如弦欲重髙門地非論媚竈天詩書大儒冢絲竹後堂旃東閣翻芻馬西園竊瘞錢道謀誰執咎户選不因賢朱鼓成妖日羌雛入賀年須防反室詔終取闔門憐異日讒成錦先時默似蟬空貽後人歎流涕掩青編覽蜀宫故城作國破江山老人亡岸谷摧鳥飛今日屋鹿聚向時臺故苑猶霏雪荒池但劫灰頳遺糊處壤闔記數殘枚恨月窺林下悲風覔隴來依城狐獨速失厦燕徘徊廢社才存樹隂垣自上苔有情惟杜宇長為故王哀集海雲鴻慶院地勝祠仍古春餘物遍華山雲時抱石佛雨不萎花嶺挾樓梯峻巖牽殿墄斜淙溪雜環珮怪蔓走龍蛇供坐僧飛鉢香園客戲沙吾遊真草草深意屬青霞次韻和季長學士正月二十八日出郊見寄之什邦人以是日祠保夀侯及唐杜丞相云雅俗傳祠日年華重宴辰初陽淡江霧小雨破街塵客蓋浮輕吹齊刀儼後陳林芳催兔目原色換龍鱗壤路歌聲雜褠倡舞疉新持杯遍酬客惟缺眼中人十日宴江瀆亭節去歡猶在賔來賞更延悠揚初短日淒緊乍寒天霽沼元非漲秋花自少妍蟻留新獻酎蕙續不殘煙戲鰋衝餘藻遊龜避折蓮流芳真可惜從此遂凋年浣花泛舟早夏清和在晴江沿􅑴時岸風搖鼓吹波日亂旌旗醉帟牽緗蔓游鬟撲絳㽔樹來驚浦進山失悟舟移雅俗西南盛歸軺東北馳此歡那復得拋恨寄天涯重陽不見菊蜀地秋髙未擬寒翠苞如粒露華乾重陽已過君休恨留取金英晚節看過摩訶池二首十頃隋家舊鑿池池平樹盡但回隄清塵滿道君知否半是當年濁水泥池邊不見帛蘭船麥隴連雲樹繞天百嵗興衰已如此爭教東海不為田九日食糕飇館輕霜拂曙袍糗餈花飲鬬分曹劉郎不敢題糕字空負詩中一世豪王圭字禹玉成都華陽人後徙舒弱嵗竒警出語驚人舉進士通判揚州召直集賢院為鹽鐵判官遷知制誥為翰林學士知開封府復召入為學士嘉祐中立皇子中書召圭草詔圭曰此大事也非面受㫖不可明日請對得上諭始屬草歐陽修歎曰此真學士也英宗在位之四年詔兼端明殿學士神宗即位遷學士承㫖熙寧九年進同中書門下平章事拜左僕射哲宗朝封岐國公年六十七薨於位諡曰文圭詩文名世而相業無稱時號三㫖宰相云梅花冷香疑到骨瓊艷幾堪餐半醉臨風折清吟拂曉觀贈春無限意和雪不知寒桃李有慚色枯枝託並欄依韻恭和聖製龍圖天章閣觀三聖御書半夜傳君召西清閲帝文筆回丹穴鳳歌起沛鄉雲御幄金虯轉仙墀羽仗分為章自天縱況復睿心勤和王原叔內翰有懷暮鑰嚴溫省宵鈴靜浴堂銀花無奈萎瑶草又還芳夢久聞仙笛班清犯曉霜帝閽何所叩一炷祝堯香依韻恭和聖製上元觀燈雪消華月滿仙臺萬燭當樓寶扇開雙鳳雲中扶輦下六鼇海上駕山來鎬宫春酒霑周宴汾水秋風陋漢才一曲升平人盡樂君王又進紫霞杯次韻和元厚之平羌詔收新土鳳林東四百年來一戰功蔥嶺自橫秦塞上金城還落漢圖中輕裘坐欵無遺策折箭來庭有舊風零雨未濛音已捷不勞歸旅咏周公聞仲諤脂米川大捷神兵十萬忽乘秋西磧妖氛一夕收匹馬不嘶榆塞外長城自起玉關頭君王别繪凌煙閣將帥今輕定逺侯莫道無人能報國紅旗行去取涼州金陵懷古懷鄉訪古事悠悠獨上江城滿目秋一鳥帶煙來别渚數帆和雨下歸舟蕭蕭暮吹驚紅葉慘慘寒雲壓舊樓故國淒涼誰與問人心無復更風流大饗明堂慶成皇祐更秋律明堂奉帝禋粢盛雖薦德霜露本懷親於赫朝三后思文秩百神九筵交玉幣重屋近星辰邃幄留飈御清壇墮月津衣冠漢儀舊金石舜韶新受胙開宣室鳴鐘降紫宸羣隂光復旦叶氣斗回春靈貺叢千祝豐恩滲四垠慙非老詞筆徒學煥堯文和吳相公從駕至開寶寺慶夀崇因閣崇因開寶構金碧晝相輝禁蹕隨曦馭層城轉斗機梵音獅子吼妙相鴿王歸洛水浮神篆天花散御衣塔疑從地湧簷擬入雲飛上行乘今果羣趨懼昨非慧珠常自照法雨遍成霏但起真如念梯梁不可幾宫詞三十首鼓角三聲夜奏嚴夕齊清廟宿重簾殿前太尉橫銀仗指㸃金盆御水添昨日龍輿幸寶文宸毫金軸展風雲前朝御印從頭折重整牙籖甲乙分盤龍新織翠雲裘簡㸃黃封玉匣收防備秋來供御著金箱捧入曝衣樓十三垂髻碧螺鬆學舞經年後苑中近日昭儀抄姓字一時宣撥入東宫麗日祥煙鎖禁林櫻桃初熟杏成隂年年翠輦來游幸花落春宫一寸深夕宴中秋醉廣寒閬風銀闕鎖三山美人半夜歌明月聲在玉壺天地間六龍觀稼奉宸游齊賀豐年薦麥秋後苑宴同卿相出內官金盒送來牟崇文殿裏勝蓬萊繡柱扶天祕閣開典籍校讐三館外圖書多出禁中來天外明河翻玉浪樓西涼月湧金盆香銷甲乙牀前帳宫鎖玲瓏閉殿門夜寒金屋篆煙飛燈燭分明在紫薇漏永禁宫三十六宴回爭踏月輪歸晚吹翩翩動翠旗爐煙千疉瑞雲飛何人奏對偏移刻御史天香隔繡衣金井秋啼絡緯聲出花宫漏報嚴更不知誰是金鸞直玉宇沈沈夜氣清紗幔薄垂金麥穗簾鈎纎掛玉蔥條樓西别起長春殿香碧紅泥透蜀椒翠鈿貼靨輕如葉玉鳳雕叉嫋欲飛拂曉賀來皇帝閣綵衣金勝近龍衣鎖聲金掣閣門環簾捲真珠十二間别殿春風呼萬嵗中丞新押散朝班御案橫金殿幄紅扇開雲表露天容太常奏備三千曲樂府新調十二鐘三月金明柳絮飛岸花堤草弄春時數船百戲催宣賜御輦今年不上池內人稀見水鞦韆爭擘珠簾帳殿前第一錦標誰奪得右軍輸却小樓船禁裏春濃蝶自飛御蠶眠處弄新絲碧窗盡日教鸚鵡念得君王數首詩御座垂簾繡額單氷山重疉貯金盤玉清迢遞無塵到殿角東西五月寒釣線沈波漾彩舟魚爭芳餌上龍鈎內人急捧金盤接撥刺紅鱗躍未休禁裏宫鶯曉未啼千牛仗下報班齊銀袍五百趨龍尾天子臨軒賜御題內苑宫人學打毬青絲飛控紫花騮朝朝結束防宣喚一樣真珠絡轡頭後苑歸來月上初天歌吹引六鸞輿春風料峭餘寒重猶索金函覽奏書中宫賜雪玉成峯滴露堆寒冷照空三十六窗明月夜嫦娥渾在水晶宫兩班齊賀玉關清新奏熙州曲破成畫鼓連聲催攧遍玉人多半未知名博士當年教玉箏六宫誰敢鬬新聲如今舊曲無心理寶柱一行秋鴈橫黃昏鎖院聽宣除翰長平明趂起居撰就白麻先進草金泥降出內中書雪晴鳷鵲樓邊月風落昭陽殿後梅爐炭灺消香獸暖獨拈香箸撥紅灰玉兔何年上月宫夜深搗藥特無蹤神丹不老嫦娥鬢乞取刀圭駐玉容宋元詩㑹卷十二
