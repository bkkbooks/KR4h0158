body:
  text: 宋元詩㑹卷四十七兵部主事陳焯編魏了翁字華父卭州蒲江人年數歲從諸兄入學英悟絶出鄉里目為神童登慶元五年進士第時方諱言道學了翁於對䇿昌言之由簽書節度判官召為國子正開禧元年召試學士院韓托胄方事開邊了翁力陳其不可謂當急於內修姑緩外攘䇿出衆大驚改祕省正字明年遷校書郎以親老乞外任乃知嘉定府旋丁父憂築室白鶴山下遠近從學者踵至起知漢州以細故豫祠未數月復原官知眉州士論大服治行彰聞擢潼川路提㸃刑獄歷提舉常平轉運主管潼川安撫丁母憂起知潼川府十五年被召入對蓋去國十有七年矣上迎勞優渥嘉納其言進兵部郎中俄改司封兼國史院編修奏事剴切無所鯁避而時相始不樂矣寧宗崩理宗自宗室即位事多艱虞了翁積憂成疾三疏求退不得遷起居郎明年改元寶慶屬濟王黜削以死有司顧望治葬弗䖍了翁請上厚倫紀以弭人言史彌遠益嫉之言官承風㫖劾了翁朋邪謗國降三官居靖州五年起知瀘州彌遠死進華文閣待制應詔上章乞復舊典十事皆如所請因從人望與真德秀並召還了翁權禮部尚書兼直學士院上將引與共政而忌者合力沮排不能安于朝矣乃以端明殿學士出督京湖軍馬尋又召簽密院其出入皆非上意遂力辭乞歸自是改官皆不拜嘉熙元年卒于家贈太師諡文靖所著有鶴山集九經要義等書登萬象樓和計次陽韻塵纓羈我身對景慵著語青山喚倚欄壯氣臨潁汝層雲卷油幕萬嶺眇煙縷酒䦨一橫笛樓前葉自雨送曹尚右從龍知信州分韻得州字長安十二門冠蓋如雲稠浮驂不停趨九衢滔滔流朝握扶桑轡暮行背椒丘駕言往從之道左傷吾輈溫陵有佳士清姿秀琅球早酬掄魁望勝泛蓬瀛洲榮進付膜外寡欲自日休需章臣有母自詭以一州彤襜下青冥錦輿居上頭小施活國手雕瘵㑹有瘳同省並門居昔我陪清遊一時四同年氣味骨肉侔而君堂堂去别袂挽不留迅商起層旻候蟲催功裘問學常苦難歲月忽忽遒古今同一岐古豈真難儔願言事穮蓘勿作刈穫謀西郊訪梅分韻得尾字荒煙散牛羊落日向城市天寒萬木脫歲晏羣動弭西郊有孤芳獨喚春事起幽光耿參月清灔明野水欲開未開時似語不語意或疑春較遲的皪下霜蕊誰知春風心渾在阿堵裏洞霄逍遙公九隴花月使領客居上頭蹇豫亦婪尾頗懷去年遊歲月如許駛悠悠竟何成總被物化使重陽領客以老杜重陽日詩分韻凡賔主十八人得否字天根斂秋陽雨畢水歸藪胡為爽常度白晝變昏黝農功將納場遺秉尚棲畝昨朝告方社卷去日中蔀羲和鞭六龍為我作重九雲頑驅復來渾未識臧否終然劃劙之金鑱發矇瞍所欣陽德競吾豈為杯酒悠然見南山陶公意何厚况今祠太宫羣公正奔走贈畫工王生七年謫五溪二年守三盧蠻煙瘴雨中不改舊時吾比來懶看鏡謂我衰且癯王生忽肖象氣貌何敷腴悔不賂王生圖作一病夫庶幾轉而上聽我歸林廬及此未衰日更讀幾年書題謝道耘一犂春雨圖牀頭夜雨滴到明村南村北春水生老婦攜兒出門去老翁赤腳呵牛耕一雙不借挂木杪半破夫須衝曉行耕罷洗泥枕犢鼻卧看人間蠻觸爭次韻虞果州剛簡泛雪黃雲靉靆風雪天欲之灞橋尋浪仙爐中榾柮熱寒客縱欲燒愁能得然撥灰嚼句不忍吐竟日南望雙眸穿誰知詩來亦念我字與六出爭明蠲美人美人呼不來昭華吹怨樓西偏况有山頭月為友觸撥煙痼撩詩顛豈無咏絮謝家集亦有閉户袁安眠未如山中之至樂白玉世界天相連朝看夜聽兩竒絶靴霜爐雪知誰賢褰裳急理剡溪櫂明月已旁羌江還和宇文漢州乞房樓記房公胸中妙刀尺剪刻玻璃貯寒碧今侯著樓于其上竹色荷光得良覿詩來殷勤問故侯别日雖賒情轉密因思當年飛蓋遊鷗鷺不驚潛鯉出春濃雪絮人影亂秋老松雲半天屹蘇公二十四橋月尚愛西湖風月夕江山好處余戀嫪縱不即人人自即况今簷撩雲與齊激楚高歌友朋集向來寒乞翻自嗤詩掃黃泥已無迹功名老我後加鞭文字輸人先奪席欲搜萬象供刻畫自有此湖難此筆終當為君記斯遊摹寫蒼顔真六一約許侍郎奕諸公酒半宋正仲德之至自都城人生能得幾回别一别公來四千日我騎紫騮出行春公指黃扉入當夕誰知行止不關人邂逅天涯復同席方看九陌爛紅英忽復濃陰顆青實斷霞明空白日靜過雨穿林亂雲濕如夢如夢夢耶非曰歸曰歸歸未得𤏡南山崒東流斷關西雲霾北風急酒逢故人一吸易語及新事百憂集試問吾歸將何歸梓州遂州有何擇况有青山老居士千騎東來闖然入更得可人高帝孫又欣末至臨卭客儘判三日作狂醒要話十年胸逼塞送杜兵侍孝嚴以華文待制知遂寧府敝貂衝寒馬聲濕餘杭門外送歸客去年曾送六朱幡今年又送四千石更有三令相後先采不盈筐去如織濛濛風雪人氣薄漠漠煙塵劍花蝕獨立長空倚天壁幾度乞歸歸未得二卿犖犖天與姿不肯隨俗相脂韋聲名早落虞舜聰霞裾雲佩明春暉虞舜已死不復返雲埋蒼梧天地悲萬物興歇各有期人生出處寧無時攬裾結佩下霄漢茍得吾志官無卑史臣昨侍玉皇案愛民一語何孜孜願公領此深長思民力竭矣誰其知更須同志共此事别公且去吾亦歸六月十四日后殿侍立新永康太守成嘉甫朝辭奏事詞氣懇惻上為嘉納嘗隨筆紀其事今鄉人祖帳分韻得西字遂書以贈行嚴精伐鼓趨晨雞龍媒戒仗喑無嘶宰臣奏事左墄降史臣曵履東階躋永康太守臣申之上殿立吐干虹霓曰臣前領大農簿試郡得請今當西遼帥求通反其使金人匿壯招吾攜勿言金能繼前好將二遼騎搖青齊時將有反事有間玩歲愒日憂噬臍皇帝瞿然曰是是伸頤頷首天聽低貼黃更請磔叛將褒恤死事不可稽陛下亦聞西事否昔號險阻今多蹊散關皂郊已平地白環黃牛猶潰隄分臺列閫越秦視體統漁散人情暌上云私意誤大事諄諄切切重提撕申之又言故臣丙昔嘗有德于坤倪上顧指臣曰安丙申之頓首如含凄紛紛交情異生死獨此推本祛羣迷臣時張拱立帝傍螭頭恨無千赫蹄為王留行力不足戴目處此羞梁鵜官無大小莫非事勇為天子綏羣黎天如有意聽臣歸問天重乞青玻瓈撫州崇仁縣玉清觀道士黃石老工古篆以李功父書來聖學不嗣千餘年并與小學遺其傳其間明道寧乏賢謂書小伎合舍旃十字九舛不可鐫楮生墨卿色有寃動以經史為執言豈知魏晉幾變遷况今經字宗開元請觀未有韻書前訓纂字林形相沿形聲迭推義乃全韻書既作人趨便未能書法窮根原但以聲韻求諸篇形存聲亡韻亦牽叔重少溫工磨研二徐鄭郭相後先書法賴此差綿延許李焉得無謬愆楚金分韻猶拘攣若更舍此徇俗妍不學操縵求安絃玉清道士來臨川用意周鼓兼泰山攜書過我渠江邊試令主拄與畫棬椳闑畿礎杗桷椽已能諧世而取憐猶欲度外求方圜眉山夫子思涌泉相與共講扶其偏道士稇載明當還更以一語申拳拳能于此處知其端事事物物誰非天九章八卦莫不然一毫人力無加焉鶴山書院前為荷塘三即其小嶼築亭久矣春後八日始榜曰夫容洲嚴風吹衣落南土手批猱藉封虎緣山跨谷三里城架竹編茆百家聚天公似為羇人謀閉藏佳境城東陬介然用之便成圃下視更得夫容洲水間木末高下照名字既同形亦肖自從羸豕伏羣龍紅白相輝轉明耀人憐風雪拘繫之委棄衰草蟠寒泥誰知炯炯含內美正于稿瘁生光輝大書三字為吹送喚起渠陽百年夢郤疑二華癡絶人身既隱矣名焉用送黃宜州實之任皇帝親政之初旬史臣了翁侍嚴宸宜州太守當就國袖出諫疏前開陳炎荒僻在飛燕外陛下一視同吾仁毋云指搐非害事往往四體為不伸臣請選侯如中州更飭膚使時咨詢但令正身以率下炎荒雖遠畿甸均皇帝顧謂汝可往布宣德意安吾民黃君下殿再拜謝盡以聖訓關史臣史臣拜手筆之册以君所聞還贈君惟今貪競習成俗公私已屈憂方新紀綱法令不敢知恃以立國維蒼旻蒼旻茫茫不可問人情欣戚天笑顰願君體此深長思便以聖訓書諸紳心誠求之莫非事子茍不欲民無貧丁大監文伯得余近作讀之疾愈以詩見貽黔巫之南溪水滋山粗石惡不可治崇寧邊臣務廣地山刋石斷林木斯其間掌許號為郡如以土偶安須眉中州人物猶此任纍臣舍是夫何詞况于風氣少疵厲且幸習俗無澆漓飽餐賤米溫舊讀書味雋永忘其疲坐看歲龍度丑戌幾見秋月弦虛危都梁有吏雲端來持書火急如符移美人家在九芙蓉門墻突兀那可窺聯緘纍牘夢耶非一年兩度劃見之我詩但能愈君疾君解與世醫狂癡乖逢休戚信有命歎上不使非知醫七夕南定樓飲同官誰將明星貼天宇州國宫垣象官府更將四七隨天旋常以昏中殷四序迢迢河漢衡秋旻前有蒼龍履𤣥武牽牛正向西南來左右兩旗北河鼓鼓星之側為天桴鼓上三星為織女何年人號天女孫便把牛郎擬夫婦不知此是天關梁河漢之津有常度晦明伏見莫非教肯為文人給嘲侮班曹庾謝猶讆言世上兒曹更堪數臨風三誦大東詩須信詞章有今古羅五星善奕棋贈以詩少年不識棋但見剝剝琢琢更相圍有人指授豫衝關奪角劫復持少年不識星但見腷腷膊膊環如棋亦有告豫者縮贏伏見元有期七年五溪讀書暇時把二事相悅怡久之剨然悟是間有數人不知三百六十一棋子此是乾䇿藏其竒萬有一千五百二十星若以三十六乘之乘之既盡除坤䇿恰與棋數無參差此理極精密歸後不復思羅生挾二長過我瀘之湄恍如著我五溪上欲與之語無閒時此須靜觀乃有得而我家住西山西生揣我何時歸臨發潼上許侍郎餞於東山賦詩留别人生出處亦何常又到涪江江上鄉山色如逢故人語松聲仍作去年香紅裳大舶滿清鏡翠㶑白沙明夕陽未省此歡何日再擬邀明月照昏黃真德秀字希元建寧浦城人四歲受書過目成誦登慶元五年進士再中博學宏詞科入閩帥幕召為太學正時韓托胄已誅入對首言改弦更張正當褒崇名節進祕書省正字歷沂王府教授權直學士院著作佐郎宰相將用德秀忌者詆之遂力請去出為江東轉運副使改知泉州再知隆興府十五年為湖南安撫使知潭州理宗即位召為中書舍人尋擢禮部侍郎直學士院入見奏陛下不幸處人倫之變流聞四方所損非淺願討論雍熙追封秦王舍罪恤孤故事為濟邸興滅繼絶又言賄賂公行薰染成風朝廷用人貴少輕老宜褒奬耆艾咨訪清亷上皆嘉納宰相史彌遠益嚴憚之嗾言官抨擊落職罷祠既歸修讀書記曰此人君為治之門如有用我執此以往紹定五年起知泉州迎者塞路彌遠死移知福州召為戶部尚書入見進大學衍義踰年知貢舉拜參知政事三乞祠以資政殿學士提舉萬壽宫卒上震悼輟朝贈上階諡文忠登南嶽山煙霞本成癖况復遊名山舉手招白雲欲納懷袖間竒峰七十二羅列皆蒼顔振衣遇長風浩浩天地寬送裘司直得請西歸輕舸龍山頭木蘭作雙櫓飄然裘司直乘向南昌去問君鵷鸞中脫身遽如許棲遲三十年始得官掌故少須上上考豈不登省戶自言野心性眯目九衢霧修竹歲云晚萱草秋亦暮嗷嗷投林鳥猶得反其哺江西父母邦非復昔饒裕蠻煙一腥穢樂歲且狼顧遺黎空杼軸行旅窘刀布天門窅萬里可望不可訴君今佐元帥安危繫一路瘡痍俟滌濯畫諾歸佽助先聲姦人惴高節懦夫慕遄當再前席一正天子度白鷗沒浩蕩蒼鶻在指呼我亦南陔人扁舟從此具司理弟之官嶽陽相别定王臺悽然感賦二首定王百尺臺長安萬里目昔人思親心山川誰能局於焉共登臨使我增感觸微霜隕陔蘭悲風撼庭木銀山在河許白雲但空谷搔首重裴回冥冥江樹緑先民不可見懷哉金玉音士雖一命微愛物宜存心矧兹圜扉內白日變重隂求情箠楚下寃哉詎能禁呼嗥漫弗省鬼神為悲吟子往涖其職朝夕惟欽欽祥刑勿留獄斯語真良針浦城勸糶陽和二月春草木皆生意那知田野間斯人極憔悴殷勤問何由父老各長喟富室不憐貧千倉盡封閉只圖價日高弗念民已敝去年值饑荒自分無噍類幸哉活至今且復遇豐歲庶幾一餉樂養育謝天地豈期新春來米榖更翔貴况又絶市無縱有濕且碎何以充饑腸而復多孥纍恨不死荒年免使見憂畏我聞父老言痛切貫心肺行行至平洲景象頓殊異白粲玉不如一升才十四問誰長者家作此利益事父老合掌言子文姓陳氏起家本儒生疇昔樂賑施憶昨艱食時巨室爭謀利米斗三百餘獨收七十二三都數千口受彼更生惠開庫質敝衣假此賑貧匱取本不取息所活豈勝計我曹非此翁久作溝中胔吁嗟薄俗中乃有此高義吾邦賢使君愛民均幼稚一聞平糶家褒賞無不至或與旌門閭或與錫金幣獨有潁川翁寵光未之被故作行路謠庶徹鈴齊邃且俾殖利徒聞風默知愧天道極昭明勿作幽遠視㑹三山十二縣宰皇皇造化鈞槖籥生萬彚林林滿穹壤異體實同氣痛癢本相關彼已當一視矧惟守令職休戚我焉寄盍推若保心眷焉撫孩稚橫目事征求往往學頑痺牀剝膚已侵鷹擊毛盡摰但期已豐腴遑恤彼憔悴近來二十年貪風日滋熾蒲萄得凉州西園閧成市環瞻郡邑間大半皆汙吏民窮盜乃起原野厭枯胔哀我罹禍徒念之輒揮涕天地忽開張清飈掃氛曀我乃于此時擁旄忝為帥顧慙老儒生蹇拙乏長技同官為僚友努力圖共濟惟閩古大都星羅邑十二豈無良大夫與我同厥志要如羔羊直委蛇自無愧勿為碩鼠貪躑躅乃多畏上方明黜陟我亦公舉刺民言即豐碑令問疾郵置黃堂一巵酒殷勤抒至意慎勿多酌豫憂心正如醉遊鼓山六月二日偕潛夫諸友遊鼓山飲湧泉亭明旦登天風海濤坐白雲亭追懷昔遊愴然有感偶成拙詩奉呈并簡住山明師嚴宸有追詔趣上太守符疲民未蘇醒還顧空躊躇來尋靈源盟喜與佳客俱始酌清泠泉一浣丹墨汙超然煩溽中置身在氷壺遲明陟危亭雲濤渺空虛煙霏倐開闔峰巒時有無偉哉此絶觀雄壓東南隅蒼崖萬仞立四面環瓊琚翠木巧蔽虧亭午清陰敷令人淡忘歸似到真華胥憶昨泛蓮日選勝邀朋徒摩挲巖上刻慨仰趙與朱舉觴酹且盟一節期終初重來三十年恍如隔朝晡並遊四五人存者獨老癯有懷子陳子感歎為欷歔子抱明月終我方長途趨顛踣懼不免警省當何如願言祝同社著力相攜扶禪伯亦可人新結峰頂廬老我故倦遊軒冕非所娛㑹須脫塵鞿來依懶瓚居挹仙亭漢宫葦篋兒呱呱濟南梓柱陰扶疏富平家人正偷樂安昌帝師工獻諛子真東南一尉耳黃綬凄凉百僚底手持短疏叩天閽義激丹衷淚橫眥翩然一朝徑拂衣愛君無路空依依人傳九江已仙去吳門再見是耶非神仙茫茫那可測上帝從來賞忠直天下果有驂鸞人合領羣真朝北極自從舉手謝世間千年白鶴何時還玉簫聲斷杉檜冷秪餘丹竈留空山谷口之孫古膚使亭斸青冥挹仙袂耿耿應懷貫日忠飄飄豈羡凌雲氣我來快讀華星篇清徹毛骨風冷然何當結茆最高頂一榻容我八刀雲煙嚴羽字儀卿號滄浪與戴石屏同時其論詩欲如那叱太子析骨還父析肉還母尋寧山人所居幽人以道隱結室嵒之東余亦避世客逢君於此中鳥因留食至泉為煉丹紅向晚下山去月高秋色空關山月今夜關山月偏能照馬鞍盧龍征戍客圓缺幾回看遙想金閨裏應悲玉露寒黃沙三萬里何日是長安行子吟二首行子在江海飄飄靡常踪有如芒碭野朔風捲飛蓬朔風無休期飛蓬日千里散落天地間寧有復歸理塞雁西北來一呌三徘徊何時别沙漠昨夜宿陽臺同羣一相失羽翮常低摧人物有殊性奈何罹此哀憶昔客遊初結交重豪邁高冠湛盧劍志若輕四海白首悔前圖蹉跎天一隅寒冬劍門道失路空踟蹰深林聚虎豹絶壁號猩鼯雪深車軸折征馬驚啼呼何當返故處餐黍居田廬淚下不能禁腸轉如轆轤我友遠言邁朔風卷秋樹白日寒無光是時鴻雁來四野何蒼茫我友遠言邁使我結中腸如何攜手歡一旦成異鄉行旅有期程遊子多悲傷置酒欲高歌淚來沾我裳四座慘相顧征馬亦倣徨未知㑹面日且復盡兹觴悠悠我行邁悠悠我行邁邈在天一方道路無終極時節異炎凉路逢故里親揮泣問我鄉妻子别離久不知今存亡中原多白骨城邑聚豺狼遠去無僮僕思還絶餱糧寄語家中人遠行良可傷朝日臨高臺朝日臨高臺眷彼芳樹間上有共棲鳥和鳴何關關爾乃慕儔侣我胡獨不然良友在萬里邈然河與山聚㑹豈不思歲月倐已殫未必無他人要非心所歡仙遊三首憶讀玲瓏篇來往虛皇閣空見白芙蓉秋風幾凋落昨逢紫陽君共有丹臺約下視塵埃中冠纓縛猿玃世事行若此悠悠復何託朝别簡寂觀夜行石鏡溪溪光照崖緑月色正相宜石上三道士頎然好丰姿或弄金光草或把珊瑚枝憑風招素手賜我一玉巵歎我事遠遊蕭颯朱顔衰長林孤月落羽蓋何葳㽔垂垂乘之去棄我忽若遺明發閴無覩但有青鼯啼瀑布似明月上有石梁橫矯首望東海正見蟾蜍生揚輝天漢間下照蓬丘城桂實幾凋落嫦娥空聞名咄哉玉斧子不如白精靈藥不服食執柯獨何成迢迢彩雲外誰吹白玉笙竦身一長聽豫若出寰瀛登豫章城憂來不自得登城望高天寒雲四面起朔氣下長川脫劍且却坐君知心惘然奈何平生志鬱抑江湖間凜凜秋風來茫茫落日晚長憂生白髮沉想忘朝飯向來經濟士本是碌碌人蕭曹刀筆吏樊灌屠販臣徒步取勳業漢道為光新我今何為者飄飄去鄉國狂歌豫章城醉卧楓江碧但取英雄笑終慙倜儻生名當以德載事恥因人成獨酌還獨酌哀歌還寂寞安得凌風翰為君拂寥邈遊臨江慧力寺舟中望古剎川上移琴樽隱隱林閣見迢迢鍾梵聞列岫不離席驚濤常在門風帆與沙鳥泛泛隨朝昏天高一幡挂室靜衆香焚煙起多近郭鴉歸無遠村松際尚微雪經年來暮猿賞惟靜者契法對高僧論安得息塵駕永懷瞻獨園明朝别此去惆悵滿松雲山居即事稍欣入林深已覺煩慮屏霜果垂秋山歸禽度嵐嶺紛紛葉易積漠漠雲欲盛澗户寂無人松蘿窅然暝惟聞山鳥啼月上柴門靜終嵗寡持醪延歡聊煮茗羣書北窗下帙亂誰能整廬陵客館雨霽登樓言懷寄友終日坐汾淟邈然無少欣登樓一周覽始見萬山羣微雨洗殘暑青天捲浮雲襟懷兩廓落朗若見夫君見君君何在顧影還獨笑吏非金門遊隱異滄洲調江明秋月白山空夜猿嘯徒事百卷文未返一竿釣留滯豈勝愁非君誰與謀水寒終赴海雁遠暫賔秋舉世不可語猶當倣巢由贈君三尺劍永駕五湖舟夢遊廬山謠示同志昨夜月落西窗陰倦推素枕憑石琴身居紅塵不自覺夢入廬山深復深廬山深處在何許五老仙人邀我語眉如秀雪顔桃花酌酒相酣坐箕踞明河九派倒西來石嶼巉絶古道開五公握手向我笑不見劫火揚塵灰獨騎一鹿窮䝉回窅然醉踏青錦苔松風號嘈何清哀湍飛瀑捲萬壑雷忽然驚起迷所向四坐已失黃崔嵬披衣倣徨還太息我與世途何所屑亂世茫茫飛蠓蠛囊中别有金膏訣須君之行當何如共向丹崖卧松雪還山吟日暮望南山悵然歸思發如何山中客屢看城頭月城頭月照女蘿秋石磴潺湲瀉碧流巖猿久别應惆悵澗鳥相呼亦共愁城南故人與我好令我忘却歸山道昨夜西窗夢到家忽驚千嶂芝花老朝來舟子促辭君回首空江語尚聞别後莫嗟難見面相思只望嶺頭雲孺子臺吟去年醉與東湖别欲上衡湘泛秋月君家留我却邅回悵望還成阻修濶西山縹眇翠屏開復憶滕王倒玉杯經過始識洪崖井調笑重登孺子臺臺前呼酒折荷花水淨煙明散落霞舉杯失笑君何在望斷行雲空咄嗟故人别後還愁緒此都不是余留處興來目送海邊鴻歸心挂在閩溪樹思歸引海上芝草緑芊芊洞門一閉今幾年仙驥去時留紫鞭挂壁見之心惘然欲歸即歸亦由我不待功成何不可堯舜未能屈巢由自餘王侯何足遊武陵春水緑蕭蕭就中亦有桑麻郊近聞秦人笑相語待我東溪種碧桃送戴式之歸天台歌吾聞天台華頂連石橋石橋巉絶橫煙霄下有滄溟萬折之洪濤上有赤城千丈之霞標峰懸磴斷杳莫測中有石屏古仙客吟窺混沌愁天公醉飲扶桑泣龍伯適來何事遊人間飄颻八極尋名山三花樹下一相見笑我蕭颯風沙顔手持玉杯酌我酒付我新詩五百首共結天邊汗漫遊重論方外雲霞友海內詩名今數誰羣賢翕沓爭相推胸襟浩蕩氣蕭爽豁如洞庭笠澤月寒空萬里雲開時人生聚散何超忽愁折瑤華贈君别君騎白鹿歸仙山我亦扁舟向吳越明日憑高一望君江花滿眼愁氛氲天長地濶不可見空有相思寄海雲送吳㑹卿再往淮南故人身披紫綺裘腰佩寶玦騎驊騮英風俠氣橫四海辭我遠向淮南遊淮南桂樹應猶在八公舉手遙相待明月高縣五兩頭隨君千里過淮流十年鞍馬邊城道又是邊城見春草春草萋萋路入秦長安北望空愁人荆楚竒材多劍客感慨相逢思報國男兒事業早致身青鬢須防霜雪迫我向人間久拂衣白雲相伴掩巖扉調琴鼓罷清商曲愁見孤鴻天際飛三衢逢周月船戎馬相逢日那知復此間客愁詩莫遣世事酒相關江上孤舟在天隅兩鬢斑更將憂國淚滿袖送君還蜀女怨幾時離月峽五見紫蘭凋塞鴈隨魂斷江花逐淚飄沙頭南北客京口去來潮日日無消息空登萬里橋聞鴈遠客驚秋鴈高樓復異鄉聲兼邊哨苦影落楚雲長此夜頭堪白他山葉又黃年年洞庭浪飄泊更無行樟樹鎮醉後題吾憐樟樹好取醉欲無還酒壓鵝兒色詞歌雉子斑朱樓當碧水紅日下青山興罷揚鞭去蒼蒼煙霧間豫章城愛此城高處回鞭醉每醒江花兩岸白煙樹一行青雲學山舒態天隨水賦形吾多徐孺子獨向此沉冥閒居寄友蕭條遺世心江海坐來深擁褐閒窺沼思山欲借琴有幡煙際寺無葉水邊林不見同袍友憐誰伴苦吟訪益上人蘭若獨尋青蓮宇行過白沙灘一徑入松雪數峰生暮寒山僧欣客至林閣借人看吟罷拂衣去鐘聲雲外殘出塞行將軍救朔邊都護上祁連六郡飛傳檄三河聚控弦連營當太白吹角動遙天何日旄頭落神州得宴然江樓夜月懷故山友人昨夜江樓月思君好斷腸猿聲相應發山色更青蒼楚塞來書遠閩關隔夢長今朝看愁鬢為爾半成霜有懷閬風山人把酒忽惆悵君今吳楚間孤雲隨馬首風雨隔河關心事竟安在此行殊未還空將百年意泣向寶刀環懷南昌舊遊昨在南昌府清遊不可窮杯行江色裏櫂進月明中樓笛吹晴雪菱歌漾晚風坐來懷舊迹萬里一飄蓬江行暝色蒹葭外蒼茫旅眺情殘雲和雁斷新月帶潮生天到水中盡舟隨樹杪行離家今幾宿厭聽櫂歌聲塞下鞍馬連年去關河萬里賒將軍思報國壯士恥還家大漠春無草天山雪作花誰憐李都尉白首沒黃沙登滕王閣高閣憑空浩蕩開當時遺跡幾荒苔煙含晚市悠悠見沙帶澄潭渺渺回此日登臨分壯氣百年淪落憶雄材可憐萬古神交意日暮蒼凉一笛哀夜泊夜聞估客送將歸葭菼蕭條月色微萬里江湖何處極孤舟鴻雁自相依杯拋黃菊乾賒酒城掩清砧罷搗衣不奈此時心斷絶長沙南去故人稀將至潯陽途中寄諸昆弟渺渺孤帆去幾程悠悠天際望湓城一身避亂辭鄉國千里相思隔弟兄猿叫匡廬寒暮色鴈過彭蠡帶秋聲江湖此去多飄泊腸斷風塵遠别情客中别吳季高悠悠遠别半生悲白日相逢又話離海內風塵愁未已天邊消息到何時洞庭旅雁春歸盡瓜步寒潮夜落遲惆悵孤舟從此去江湖未敢定前期寄郭招甫時在潯陽夢向三江買釣船挂帆西去白雲邊窗間曉色香爐見門落寒聲瀑布縣百年酒興陶彭澤四海詩名孟浩然何日真尋塵外跡焚香酌茗話先賢送崔九過丹陽郡上荆門省親江國歸心一雁牽河橋分手數杯傳千崖萬壑秋聲裏匹馬孤帆落照邊牛渚寒波翻極浦荆門晚樹合遙天他時莫枉瑤華問南北相思各渺然楚江晚思旅思遙遙倦向南誰家煙火起晴嵐孤城歸鳥連寒角極浦斜陽帶遠帆楓葉自能悲楚客竹枝何用怨江潭今朝欲寫風波恨千里書成手自緘送趙立道赴闕仍試春官即事感興因成五十韻嗣聖中天日遺氓憶漢時一王新盛禮萬國賀重熙官爵霑寰宇光明冠本支窮冬辭老母吉日赴京師祖席明斜照寒江結暮澌停杯愁把袂立馬語臨岐草動春前色梅繁雪後枝湖山饒逸興士友重遊嬉菱唱工迷客荷舟穩放維土風珍縞帶吳饌熟蓴絲塔寺開金碧樓臺漾渺瀰雲連勾踐國江動伍胥祠閶闔春朝早觚稜霽景遲柳迎仙仗軟花簇御樓欹苜蓿來宛馬櫻桃薦寢帷周家千歲厯漢殿萬年巵駐驆山川遠櫜弓歲月移天俄憂杞國日再仰咸池弓劍羣臣淚園陵故國悲乾坤開帝統雨露豁宸私蜂薑何為爾豺狼欲問誰箭流元帥幕城立叛營旗國體存矜恤皇猷務遠綏且從鷹一飽自待虎雙疲復說京西亂愁連蜀道危倉皇分隊伍指㸃護藩籬狙詐終勞馭遊魂不足羈幾年腥戰血今日痛瘡痍宗社神靈在邦家德澤遺㑹聞淝水捷可復雁門踦草詔詞頭切蒲輪禮意卑賢良多選拔社稷在扶持舉動新羣目經綸佇一䕫長沙何遽往鄭卜竟堪疑莫以朝廷重翻令盜竊窺稍懲鷹隼擊庶使鳯凰儀薪膽方無倦輿圖正入披王孫思報國天府待忠詞世道多為忌波流幸勿隨從容陳古昔感慨論邊陲仕進雖云始平生見在兹青氊今可復綵服更相宜漂泊微軀老蹉跎困翮垂散材元自逸正論竟焉禆誤賞騷人作深慙國士知呌閽時已晚鳴劍志空馳鬱鬱驅流俗悠悠歎亂離羊裘終隱去魚釣復何之出處從今隔飛騰不可追濟時須俊傑願覩中興期古懊儂歌朝亦出門啼暮亦出門啼蛛網挂風裏搖思無定時塞下曲孤城莽莽秋天外竟日無雲空自哀忽怪一時天盡黑合羣鴻雁向西來聞笛江上誰家吹笛聲月明霜白不堪聽孤舟萬里瀟湘客一夜歸心滿洞庭燕此篇或云三休作巢破春雛半不存銜泥空傍主人門一生巧計輸黃雀飲啄官倉長子孫宋元詩會卷四十七
