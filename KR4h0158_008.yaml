body:
  text: 宋元詩會卷八兵部主事陳焯編范仲淹字希文其先邠州人後徙家蘇州吳縣仲淹二嵗而孤母再適長山朱氏從其姓遂名朱説既長知其家世乃感泣辭母去之應天府依學於戚同文晝夜不息雖飢寒弗知苦也舉進士第為廣德軍司理參軍迎母歸養改集慶軍節度推官始復姓更其名監泰州鹽稅用晏殊薦為祕閣校理每發憤論天下事無所鯁避一時士大夫矯厲尚風節自仲淹倡之仁宗知其忠進右司諫會郭后廢伏閣爭之不得出知睦州徙蘇州拜尚書禮部員外郎纍遷吏部權知開封府忤宰相吕夷簡罷知饒州元昊反召為天章閣待制知永興軍改陕西都轉運司副夏竦經略兼知延州規畫戰守帝悉從其議無何以通書元昊降知耀州遷環慶路經略緣邉招討使賞罰嚴明諸羌受命因築細腰葫蘆等寨葛懷敏定川之敗關中震恐仲淹率衆六千援之賊遁去帝為嘉歎進樞密直學士右諫議大失尋與韓琦開府涇州同領經略號令明白愛養士卒賊不敢犯境元昊請和召拜樞密副使改參知政事帝方鋭意太平開天章閣召二府條對仲淹上十事皆採用之多於僥幸者不便自是謗毁稍行而朋黨之論起矣因邊警出為宣撫使及去攻者益急遂自請罷政事以户部侍郎知青州卒年六十四贈兵部尚書諡文正謝黃惣太博見示文集松桂有嘉色不與衆芳期金石有正聲詎將羣響隨君子著雅言以道不以時仰止江夏公大醇無小疵孜孜經緯心落落教化辭上有帝皇道下有人臣規邈與聖賢會豈以富貴移誰言荆棘滋獨此生蘭芝誰言蛙黽繁獨此蟠龍龜豈徒一時異將為千古竒願言周召風達我堯舜知致之諷諫路升之誥命司二雅正得失五典陳雍熙頌聲格九廟王澤及四陲自然天下文不復迷宗師農聖人作耒耜蒼蒼民乃粒國俗儉且淳人足而家給九載襄陵禍比户猶安輯何人變清風驕奢日相襲制度非唐虞賦斂由呼吸傷哉田桑人常悲大絃急一夫耕幾壠遊惰如雲集一蠶吐幾絲羅綺如山入太平不自存凶荒亦何及神農與后稷有霛應為泣寄題孫氏碧鮮亭天地何風流復生王子猷黃金買碧鮮緑玉排清秋非木亦非草東君嵗寒寶耿耿金石生雪霜不能老清風乃故人徘徊過此君泠泠鈞天音千載猶得聞應是聖賢魄鍾為此標格髙節見真清霛心隱虛白粉筠多體貌錦籜見兒童上交松桂枝下結蘭蕙叢秀氣靄晴嵐翠光凝緑水明月白露中靜如隱君子不願湘靈泣不求伶倫吹鳳凰得未晚蛟龍起何時蕭蕭雲水間良與主人宜緑塵滿浮世何當拂長袂坐嘯此亭中行歌此亭際逍遙復逍遙不知千萬嵗明月謠明月在天西初如玉鈎微一夕增一分堂堂有餘輝不掩五星耀不礙浮雲飛徘徊河漢間秀色若可餐清風起叢桂白露生階蘭髙樓望君時為君拂金徽奏以堯舜音此音天下稀明月或之聞顧我亦依依月有萬古光人須萬古心此心良可歌憑月為知音清風謠清風何處來先此高高臺蘭叢國香起桂枝天籟回飄飄度清漢浮雲安在哉萬古鬱結心一旦為君開有客慰所思臨風久徘徊神若遊華胥身疑立天台極渴飲沆瀣大暑執瓊瓌曠如攜松丘騰上煙霞遊熙如即莊老語入逍遙道朱絃鼓其熏可以解吾民滄浪比其清可以濯吾纓願此陽春時勿使飄暴生千靈無結愠萬卉不摧榮庶幾宋玉賦聊廣楚王情公路澗曹公與袁紹嘗爭據此地嵩高登靈源北望洛陽注清流引河漢白氣橫雲霧英雄惜此地百萬曽相距近代無戰爭常人自來去拜馬澗傳聞王子晉澗邊遺一驥當時青雲路雞犬亦可致未必真龍媒悠悠在平地天門泉天門有靈泉塵埃未嘗至日月自髙照雲霞亦輝庇惟抱夷齊心飲之可無愧峻極上寺徘徊峻極寺清意滿煙霞好風從天來吹落桂樹花高高人物外猶屬梵王家中峰嵩高最高處逸客偶登臨回首日月影正得天地心念此非常遊千載一披襟湖山湖山滿清氣賞心甲吳越晴嵐起片雲晚水連初月漁父得意歸歌詩等間發筠亭為愛碧鮮亭入夏姁姁至臺榭競生煙獨有清涼意髙岡鳳不來幽人此沈醉風笛風引湖邊笛焉知非隱淪一聲裂雲去明月生精神無為落梅調留寄隴頭人渚蓮武陵誰家子波面雙雙渡空積心中絲未成機上素似共織女期秋霄苦霜露天平山白雲泉靈泉在天半狂波不能侵神蛟穴其中渴虎不敢臨隱照涵秋碧泓然一勺深遊潤騰雲飛散作三日霖天造豈無意神化安可尋挹之如醍醐盡得清涼心聞之異絲竹不含哀樂音月好羣籟息涓涓度前林子晉罷雲笙伯牙收玉琴徘徊不擬去復發滄浪吟乃云堯湯嵗盈盈長若今萬里江海源千秋桂松隂兹焉如有價北斗量黃金和楊畋孤琴詠愛此千年器如見古人面欲彈換朱絲明月當秋漢我願宫商絃相應聲無間自然召南風莫起孤琴歎絳州園池綘臺使君府亭閣參園圃一泉西北來羣峰髙下覩池魚或躍金水簾長布雨怪柏鎖蛟虬醜石鬭貙虎羣花相倚笑垂楊自由舞靜境合通仙清音不知暑每與風月期可無詩酒助登臨問民俗依舊陶唐古鄱陽酬泉州曹使君見寄吾生豈不幸所稟多剛腸身甘一枝巢心苦千仞翔志意茍天命富貴非我望立談萬乘前肝竭喉無漿意君成大舜千古聞馨香片玉棄且在雙足何辭傷王章死於漢韓愈逐諸唐獄中與嶺外妻子不得將義士撫卷起眥血一霑裳於時宴安人滅然已不揚匹夫虎敢鬭女子熊能當况彼二長者烏肯巧如簧我愛古人節皎皎明如霜今日貶江徼多慙韓與王罪大禍不稱所損傷纎芒盡室來官下君恩大難忘酒聖無隱量詩豪有餘章秋來魏公亭金菊何煌煌登髙發祕思聊以攄吾狂卓有梅聖俞作邑郡之旁矯首賦虛烏擬彼歌滄浪因成答為戲移以贈君郎泉南曹使君詩源萬里長復我百餘言純純自宫商念此孤唳鶴聲應來逺方相期養心氣彌天浩無疆鋪之被萬物照之諧三光此道果迂濶陶潛吾醉鄉聽真上人琴歌銀潢耿耿霜稜稜西軒月色寒如氷上人一叩朱絲繩萬籟不起秋光凝伏羲歸天忽千古我聞遺音淚如雨嗟嗟不及鄭衛兒北里南鄰競歌舞競歌舞何時休師襄堂上心悠悠擊浮金戞鳴玉老龍秋啼滄海底幼猿暮嘯寒山曲隴頭瑟瑟咽流泉洞庭蕭蕭落寒木此聲感物何太靈十二銜珠下仙鵠為余再奏南風詩神人和暢舜無為為余試彈廣陵散鬼物悲哀晉方亂乃知聖人情慮深將調四海先調琴興亡哀樂不我遁坐中可見天下心和葛閎寺丞接花歌江城有卒老且貧憔悴抱關良苦辛衆中忽聞語聲好知是北來京洛人我試問云何至是欲語汍瀾墮雙淚斯須收淚始能言生自東都富貴地家有城南錦繡園少年只以花為事黃金用盡無他能却作瓊林苑中吏年年中使先春來曉宣口敕修花臺竒芬異卉百餘品求新換舊爭栽培猶恐君王厭顔色羣芳只似尋常開幸有神仙接花術更向都城求絶匹梁王苑裏索妍姿石氏園中􅊧淑質金刀玉尺裁量妙香膏膩壤彌縫密回得東皇造化工五色敷華異平日一朝寵愛歸牡丹千花相笑妖嬈難竊藥嫦娥新換骨嬋娟不似人間看太平天子春遊好金明栁色籠黃道道南樓殿五雲髙鈞天捧上蓬萊島四邊桃李不勝春何况花王對玉宸國色精明動韶景天香旖旎飄芳塵特奏霓裳羽衣曲千官獻壽羅星辰兌悅臨軒逾數刻花吏此時方得色白銀紅錦滿牙牀拜賜仗前生羽翼惟觀風景朝仍暮一心嵗嵗供春賦中途得罪情多端刻木在前何敢訴竄來江外知幾年骨月無音雁空度北人情况異南人瀟灑溪山苦無趣子規啼處血為花黃梅熟時雨如霧多愁多恨信傷人今年不及去年身目昏耳重精神減復有鄉心難具陳我聞此語聊悒悒近曽侍從班中立朝違日下暮天涯不學爾曹向隅泣人生榮辱如浮雲悠悠天地胡能執賈誼文才動漢家當時不免來長沙幽求功業開元盛亦作流人過梅嶺我無一事逮古人謫官却得神仙境自可優優樂名教曽不恓恓弔形影接花之技爾則竒江鄉卑濕何能施吾皇又詔還淳朴組織文章皆棄遺上林將議賜民畋似昔繁華徒爾為西都尚有名園處我欲抽身希白傅一日天恩放爾歸相逐栽花洛陽去中元夜百花洲作南陽太守清狂發未到中秋先賞月百花洲裏夜忘歸緑梧無聲露光滑天學碧海吐明珠寒輝射空星斗疏西樓下看人間世瑩然都在青玉壺從來酷暑不可避今夕涼生豈天意一笛吹銷萬里雲主人髙歌客大醉客醉起舞逐我歌弗舞弗歌如老何野色非煙亦非霧羃羃映樓臺白鳥忽點破夕陽還照開肯隨芳草歇疑逐逺帆來誰謂山公意登高醉始回送何白節推宰晉原盛府兼名邑榮歸指故林多年望鄉淚萬里倚門心江館春寒薄山程晚翠深板輿迎侍日桃李正芳隂送韓瀆殿院出守嶽陽仕宦自飄然君恩豈欲偏才歸劍門道忽上洞庭船墜絮傷春目舂濤廢夜眠嶽陽樓上月清賞浩無邊遊烏龍山寺髙嵐指天近逺溜出山遲萬事不到處白雲無盡時異花啼鳥樂靈草隱人知信是栖真地林僧半雪睂江干間望江干日清曠寓目一搘笻落葉信流水歸雲識舊峰蘭蓀誰共采鳬雁自相從莫愛蘋風起波來千萬重洞庭山吳山無此秀乘暇一遊之萬頃湖光裏千家橘熟時平看月上早逺覺鳥歸遲近古誰真賞白雲應得知虎丘山昔見虎耽耽今為佛子巖雲寒不出寺劍靜未離潭幽步蘿垂徑髙禪雪閉庵吳都十萬戶煙瓦亘西南應制賞花釣魚萬彚嘉亨日皇心豫宴辰華林新濯雨靈沼正涵春帝幄紛仙花天鈎擲錦鱗洋洋頒睿唱賡頌浹簪紳芝山寺樓殿冠崔嵬靈芝安在哉雲飛過江去花落入城來得食鴉朝聚聞經虎夜回偶臨西閣望五老夕陽開赴桐廬郡至淮上遇風聖宋非強楚清淮異汨羅平生仗忠信盡室任風波舟楫顛危甚蛟黿出沒多斜陽幸無事沽酒聽漁歌瀑布迥與衆流異發源髙更孤下山猶直在到海得清無勢鬭蛟龍惡聲吹雨雹粗晚來雲一色詩句自成圖堯廟千古如天日巍巍與善功禹終平洚水舜亦致熏風江海生靈外乾坤揖讓中鄉人不知此簫鼓謝年豐八月十四夜月光華豈不盛賞宴尚遲遲天意將圓夜人心待滿時已知千里共猶訝一分虧來夕如澄霽清風不負期試筆偶緣疏拙得天真豈問前途屈與伸車馬縱能欺倦客江山猶可助騷人懶如叔夜書盈几狂似淵明酒滿巾况有南窗姬易在此心那更起纎塵送石曼卿河光嶽色過秦關英氣飄飄酒滿顔賈誼書成動西漢謝安人笑起東山亨途去覺雲天近舊隱回思水石間此道聖朝如不墜疏封宜在立談間依韻酬太傅張相公見贈出處曽無致主功南陽為守地猶雄醉醒往日慙漁父得失今朝賀塞翁七里河邊歸帶月百花洲上嘯生風卧龍鄉曲多賢達願預逍遙九老中知府孫學士見示和終南監宫大保道懷因以綴篇玉皇近侍請修真賜得南山十里雲樽有聖賢聊自慰鼎多龍虎復誰分謝家山色朝晡見陶隱松風寤寐聞萬物已齊無一事獨醒微笑醉醺醺酬滕子京同年謝家風雅若為酬散吏方耽海上遊疏懶幾忘傳筆夢寂寥仍有負薪憂欲歌蘭雪歸真隱敢向簪軒競急流如共茂先占氣象莫言神物在南州遊廬山五老間遊倚舳艫碧梯嵐徑是程途雲開瀑影千峰挂雨過松篁十里鋪客愛往來何所得僧言榮辱此間無從今更識逍遙旨一聽升沈造化爐馬迹仙壇靈壇拱上百神清碧塢紅霞相映明曲徑已無青草合亂峰時有白雲生亭亭翠纛髙山矗隱隱狂雷落石轟待得九霄鸞鶴馭玉書應改地仙名歸鴈稻梁留不得一一起江天帶雪南離楚和春北入燕依依前伴侣歷歷舊山川木葉程猶逺梅花信可傳子規啼到曉鸚鵡鎖經年應羡冥冥者東風羽翼偏依韻和延安龎龍圖柳湖種栁穿湖後延安盛可遊逺懷忘澤國真賞即瀛洲江景來秦塞風情屬庾樓劉琨增坐嘯王粲乍銷憂秀發千絲墮光搖匹練柔雙雙翔乳燕兩兩睡馴鷗折翠贈歸客濯清招隱流宴回銀燭夜吟度玉關秋勝處千場醉勞生萬事浮王公多雅致思發共仙舟和延安龎龍圖寄嶽陽滕同年優遊滕太守郡枕洞庭邊幾處雲藏寺千家月在船疏鴻秋浦外長笛晚樓前旋撥醅頭酒新炮縮項鯿宦情須淡泊詩意定連綿迥是偷安地仍當飽食年只應天下樂無出日高眠豈信憂邊處缺兵隔一川淮上遇風一棹危如葉傍觀亦損神他時在平地無忽險中人題翠峰院范蠡舊宅翠峰髙與白雲間吾祖曽居水石間千載家風應未墜子孫還解愛青山過嚴灘漢包六合網英豪一箇冥鴻惜羽毛世祖功臣三十六雲臺爭似釣臺高慶朔堂慶朔堂前花自栽更移官去未曽開年年憶著成離恨只託春風勾管來按志公曽植九松於堂前間以雜卉未幾即移潤州故作此詩所謂芝産三莖松栽百尺者是也而稗史謂公别有屬意豈其然乎姚嗣宗附關中人與張吳二狂生稱三俠范希文見其題壁詩驚異之表入幕府題驛壁踏破賀蘭石掃清四海塵布衣能辦此可惜作窮人題空同山寺南粵干戈未息肩五原金鼓又轟天空同山叟笑無語飽聽松聲白晝眠范純仁字堯夫仲淹次子幼警悟八嵗能講所授書以父任為太祝中皇祐元年進士為養親久不拜官父殁始出仕以著作佐郎知襄城縣兄純祐有心疾奉之如父藥膳居服皆躬親時節之宋庠薦試館職亦力辭曰輦轂之下非兄養病地也簽書許州觀察判官召為侍御史因議濮王典禮與執政不合請出通判安州歷陜西轉運副使召還知諫院力奏王安石變法害民作尚書解以進安石大怒乞加重貶賴上知其無他命知河中府徙知成都路轉運使所至戒州縣停新法勿遽行安石益怒左遷知和州慶州中罹謗謫復知河中諸路哲宗立召為諫議大夫元祐初進吏部尚書同知樞密院事歷右僕射兼中書侍郎會黨論大作純仁力主渙羣反致攻擊求罷連知二郡尋召還復拜右僕射及章惇為相堅求去猶以救吕大防之貶竄忤惇意安置永州時兩目已失明怡然就道居三年徽宗即位顯肅后同聽政即日授純仁光祿卿分司南京復遣中使至永賜茶藥諭虛相位以待純仁捧詔感泣而已乞歸養疾徽宗不得已許之年七十五卒諡忠宣纍約舍弟純禮以職事未至落葉猶同飛寒鳥猶並枝我汝獨何負不得長相隨偶為細纍拘跬步成天涯後日更逺適會合倍難期尚願家國寧且作千日離悠悠百年間幾别顔即衰從宦非我志功名徒自欺雖言干寸祿坐使手足違逐末背本心得一萬已遺爾我粗有識此事良同悲安得長洲田清水稻百畦將汝入故廬親戚坐成圍幼弟就文史長兄近砭醫孝謹奉諸宗祭祀潔四時此外逐風月對酌白酒巵畢世為善人不負生育慈斯志倘未遂終為路旁嗤會師宰憶昨相逢際風喧洛城春芳菲供愁眼衣袂偕京塵艱難各有適會合寧逡巡君歸來何時我約赴無因自此還相望渴臆生埃塵晚嵗留故邱山川寂無鄰落日送樵牧蒼煙起荆榛季弟自城至開顔慰天倫遽言長者車相過止來晨兹遇出意表候迎屢冠巾寒途馬歷歷幽扉犬狺狺野夫競走報似喜得嘉賔空堂揖顔色和氣相氲氤開尊共燈燭笑語何諄諄朝遊禹門寺暮歷清伊濵危龕儼金像逺波舒翠鱗石樓最清絶就宿同裯茵灘聲夜逾急天然謝韶鈞間談盡物理至樂還天真人生足羈束此會猶難頻所期道義心白首長相親謁辛化光濃陰結秋意疏林嘯風聲時節感壯懷挈酒慰友生友生氷玉士節行映古清十五簪儒冠四十無華纓家貧道彌富身困譽益榮殷勤數賔侣足趨顔巷輕高齋面幽圃修筠擁軒楹班班寒露叢競吐籬下英食具簡且潔盤蔬亦晶明飲適言笑和至樂不亂情郁然蘭芷芬薰灼通心誠因嗟朝市間利欲空自兵蚤行夙駕冒輕寒身勞意自間鳴雞起遙野殘月滿空山水落灘沙白林稀落葉殷東方上朝旭始免畏途難寒食日泛舟合友逢佳節攜尊泛碧流溪風消酒力煙樹入春愁羣鴨開波練疏雲透月鈎平生懷古意最羡五湖遊和韓子文題王摩詰畫寒林摩詰傳遺迹家藏久自竒髙人不復見絶藝更誰師水石生寒蚤煙雲結雨遲筆端窮造化聊可敵君詩零陵憶弟妹感秋懷弟妹憔悴客瀟湘他日常星聚衰年隔雁行既盲難引望垂老易悲傷安得如鴻鵠髙飛向汝傍與王弱翁遊龍門誰知造化擘巍峩千古伊流向此過四面喬松擁香剎兩崖蒼石束寒波身間愈覺良朋貴詩拙翻羞好景多宜向諸方縱蕭散明朝望洛下長坡和王微之同持國泛舟登樓故人還喜笑言同把酒相看似夢中老去卜鄰逢晏子從來解榻賴陳公畫船穩泛平溪緑層觀髙橫落日紅莫訝狂歌先盡醉預愁羈旅向山東和韓侍中垂蘿洞勝遊今屬相君家臺榭髙開碧水涯森聳緑梧常映日縈紆寒溜曲穿花藤牽柔蔓垂長帶竹引新萌走蟄蛇下吏不歸峩醉辨卻愁歸汙繡茵車和韓侍中春陰馬上三月芳菲欲暮天可堪零雨晝連綿潤催隴麥將黃節寒阻春蠶趂蚤眠疏栁拂牆難結絮嫩苔鋪砌已成錢牡丹只待晴陽照看吐新花一尺圓和韓侍中登廣教院閣兩陪千騎叩禪關每聽髙吟解客顔吉甫壯猶方北伐謝公髙興在東山僧軒深閉芳菲靜春晝初長鳥雀間浮覽不知歸徑晚火城看逐隼旟還和韓侍中初夏遊興慶池池邊喜逐綵旗行初夏亭臺照水明筠籜乍開春後緑林梢長帶雨來聲新荷獵獵香風逺深洞沈沈晝景清珍重相君憂國意宴終遊亦念農耕謝師厚寄同黃壻魯直唱和忽得穰郊信翛然病魄醒懷賢心獨在感舊涕偏零南斗占神劍西豪聚德星卧龍看復起失馬顧曽經氷玉清相照芝蘭逺更馨微官應念我白首候戎亭春日寄許州韓持國湖上春遊阻重陪朱轓紅斾想徘徊鶯花對席應相惱不見頻攜醉客來雪中池上碧玉為池白玉隈千林萬木盡花開攜賔欲覓開尊處祇得清香辨野梅吳中復字仲庶興國永興人進士及第知峩睂縣有廉幹聲用中丞孫抃薦為監察御史富弼開六漯河賈昌朝助宦官劉恢隂中之詔中復往治其事立解以彈宰相劉沆改右司諫以待制出知澤州歷河東轉運知江寧府忤執政削一階提舉玉隆觀卒年六十八西園十詠西樓信美他鄉地登臨有故樓清風破大暑明月轉髙秋朝暮岷山秀東西錦水流賔朋逢好景把酒為遲留衆熙堂亭枕方塘上軒開四照新花涵清露曉風卷緑波春日暖眠汀鷺荷翻躍錦鱗熙熙遊宴地行樂慰西人竹洞隂森過百步屈曲鎖莓苔翠色寒無改清風時自來葉籠蒼玉幹路入碧雲堆吏散無公事支笻到幾回方物亭草木蟲魚部披尋自古無飛沈天産異生植土風殊物色隨心匠形容記繢圖虛亭玩真意浩思滿江湖翠柏亭衆木墜黃葉皴皮抱翠枝自然根性異不為雪霜移靈潤承多露清隂貫四時婆娑嵗寒意每到坐遲遲圓通菴對此圓通境陶然勝靜齋觀空無物我扣寂外形骸燕坐埋遺照虛名莫疾懷人間憂樂地所喪甚山崖琴壇瀟灑琴壇上賢侯養道情無今亦無古求意不求聲林邃風初靜雲收月乍明拂絃成一弄塵思浩然清流杯亭結客乘公暇流觴逐浩歌亂峰晴倒影曲水宛回波小海逢元已蘭亭記永和西州行樂事應比晉賢多喬柟亭木占西園勝亭延上客過色無花卉妬堅為雪霜多幹有千年秀根含一氣和明堂求柱石可得老巖阿錦亭簾幕臨雕檻窗疏照爛霞園林初過雨風日猛催花香入遊人袖紅堆刺史家四時俱好景終不似春華沈遘字文通錢塘人用蔭為郊舍郎舉進士廷唱第一以官故改第二通判江寧府歸奏本治論仁宗嘉之除集賢校理久之修起居注遂知制誥因父扶坐事免求知越州徙杭州精於吏事令行禁止閭閻長短纎悉必知治聲大著召知開封府遷龍圖閣學士拜翰林學士判流內銓丁母憂服未竟而卒年四十時論惜之和李審言上元寄王巖夫此都豪麗嵗仍豐此夕都人凱樂中車馬笙簫十里至樓臺燈火九衢通香輿軋軋凌風駛粉袂翩翩照地紅病守行春應勉強要堪攀倚少年叢戲盧中甫晴日春風花氣浮少年嬉逐滿揚州誰憐居士身常病獨坐空船理白頭還家自嘲意昨邊城初見春纎纎垂栁正爭新不知逺客貪歸意欲把柔絲繫畫輪田况字元均陽翟人家開封少有大志好讀書為詩文立成初舉進士賜同學究出身不就後中甲科補江寧府推官服除補楚州團練判官用舉者遷祕省著作通判江寧府數上書言事仁宗將用為諫官會夏英公范文正公經略陜西請以為佐又副韓公宣撫陜西除龍圖直學士知成德軍數有功移秦鳳路經略安撫使丁外艱起知渭州遂用諫議大夫知成都府蜀人愛之比於張忠定上賜書奬諭召為樞密直學士頃之遂拜樞密副使尋以檢校太傅充樞密使嘉祐三年請致仕八年二月卒年五十九三月三日麗日照芳春良會重元已陽濵修袚除華林程射技所尚或不同兹俗亦足喜門外盛車徒山半列鄽市彩棚飛鏑逺醉席歌聲起回頭望城郭煙靄相表裏秀色滿郊原遙景落川涘目倦意猶逺思餘情未已登髙貴能賦感物暢幽旨宜哉賢大夫繇斯見材美遊淨衆寺千騎出重闉嚴祠淨宇鄰映林沽酒斾迎馬獻花人豔日披江霧香飈起路塵韶華特明媚不似逺方春泛浣花溪浣花溪上春風後節物正宜行樂時十里綺羅青蓋密萬家歌吹緑楊垂畫船伐鼓臨芳溆綵閣凌波泛羽巵霞景漸曛歸棹促滿城歡醉待旌旗寒食開西園春風寒食節夜雨晝晴天日氣熏花色韶光遍錦川臨流飛鑿落倚榭立鞦韆檻外遊人滿林間飲帳鮮衆音方雜遝餘景更留連座客無辭醉芳菲又一年劉沆永新人天聖間進士長於吏事任數多智每刺探權近過失脅持取利歷權知開封府參知政事同平章事然以附張貴妃得進君子譏之家傳盛稱其至和中定策立儲與文富同功然以史考之譖毁潞公及沮排趙抃范師道忝相位多矣小孤山擎天有八柱此一柱仍存石聳千尋勢波流四面痕江湖中作鎮風浪裏盤根平地安然者饒他五嶽尊聰明泉義山山下有靈泉泉喚聰明自古傳四百年中三出相不才何意繼前賢王陶字樂道京兆萬年人第進士仕至太常丞而丁父憂乞以所遷官追贈其父詔允之服闋除太子中允遷監察御史裏行頗以能言著聲出知衛州改蔡州召為右正言英宗即位加直史館修起居注知制誥進龍圖閣學士知永興軍神宗立遷密直拜御史中丞加觀文殿大學士卒陶始受知於韓琦驟加奬拔既欲自取重位百端傾琦上遂薄其為人又陶微時寓京師苦貧其友薑愚氣豪樂施衣食多所取資又捐數百千為之營娶及陶貴尹洛愚老而喪明往謁之陶相視漠然但出尊酒而已士論益薄之有竇復者世居鎮戎能道邊事君不見鎮戎德順弓箭手耕種官田自防守相團置堡禦強軍下視賊庭殊不有殺羊取骨然艾炙試卜賊兵知入冦都挍招呼入堡居堡外重圍百里餘牆低城小不難破賊箭如棚城上過堡中不及數十人且鬭且罵且欣欣登陴斫門謂平取應弦死傷已無數窗間走箭射其魁一箭已聞哭聲舉爭將錦囊裹賊尸鳴金收衆唯恐遲不唯城堡依然固吾衆不傷毫與釐自從干戈動四鄙覆軍殺將曽無恥朝廷未省遺邊功何事此勳不聞紀安得天兵百萬衆盡如此輩堅且勇宋元詩會卷八
