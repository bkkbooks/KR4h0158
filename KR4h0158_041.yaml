body:
  text: 宋元詩會卷四十一兵部主事陳焯編張栻字敬夫丞相浚子也穎悟夙成師胡宏一見即告以孔門論仁之旨栻退而思若有得焉益自奮厲作希顔録初以廕補官除直祕閣孝宗新即位浚起謫籍開府治戎栻間以軍事入奏因有所啓沃孝宗異其言遂定君臣之契浚去位湯思退用事遂罷兵講和栻營葬甫畢即拜疏力言讐不可忘當以自強為務時宰相虞允文自任恢拓然所求者非其道栻亦不與茍同每奏事上前直抒已見多宰相所難堪者以是屢進輒退家居日久孝宗念之起知靜江府安撫廣南西路諸蠻悅服尋除祕閣修撰荆湖北路轉運副使因劾信陽守劉大辨不報求去詔提舉武夷山沖佑觀卒年四十八遊靜福山朔風天外來寒色方嚴冽駕言道山遊蒼松挺徑節羣鴉競鳴噪亂啄青山雪羽衣去千年髙峰挂霜月送朱元晦君侯起南服意氣凌九州聿登文石陛忠言動宸旒坐令聲利場縮頸仍包羞郤來卧衡門無愧自日休盡收湖海意仰希洙泗遊不逺關山阻為我再月留遺經得紬繹心事兩綢繆惟兹斷金友出處寧殊謀南山對牀話匪為林壑幽白雲政在望歸袂風颼颼朝來出别語已抱離索憂灕山灕江即湘江濈濈清見石其東列羣峰秋水碧復碧日出霧露收草徑上逼側憑欄舒望眼已足慰疇昔更窺岩穴勝創見為驚惕如何數里間竒觀屢接迹寬同厦屋深劃若巨靈擘日月遞光景風雲變朝夕石橋幾年成乳竇一時滴神龍舊隱處仰視多辟易蛻迹凜猶存隱隱印霜脊下有澄湫深餘波潄蒼壁往者已仙去來者此其宅薄晚叩松關風過聲索索聊麾車騎退容我且散策郤望訾家洲輕舫渡前磧回首煙樹林已復挂蟾魄宇曠淨餘滓羣物被光澤河洲寄遐思空岩皎虛白清輝猶可窺水色相激射天邊與川上亭亭如合璧居然廣寒遊不用假六翮嶽麓書院遊觀不作難呼舟渡清泚新晴宿潦淨羣山政如洗上方憑危欄萬象見根柢寒泉自可㪺况復雜肴醴髙談下夕陽邂逅玄鑰啓中流發浩歌月色在波底送楊廷秀平生風雨夕每念名節難窮冬百草歇手自種琅玕吾子三十策字字起三歎豈欲求人知正自方寸殫請哦碩人詩匪為樂考槃題城南書院招元晦積雨欣始霽清和在此時林葉既敷榮禽聲亦融怡鳴泉永不窮湖風起淪漪西山卷餘雲逾覺秀色滋層林叢緑間愛彼松柏姿青青初不改似與幽人期仲春過陽江亭子亭古危臨岸林幽巧近城煙容隨雨住花片著溪清春事已如許客懷隨與傾亭前幾株樹滿意欲敷榮九日與賓佐登龍山曉風獵獵笛橫秋澤國山河九日遊萬里煙雲歸老眼千年形勢接中州丘原到處堪懷古萸菊隨時豈解愁此日此心誰共領朝宗江漢自東流落梅清溪雨過小橋東落月紛紛水映紅五夜客愁花片裏一年春事角聲中歌殘玊樹人何在舞破香衫曲未終郤憶孤山醉歸路馬蹄殘雪襯東風此首已入三十八卷尤袤詩而南軒集中復見之必有一誤姑俟再考蘇雲卿附廣漢人少與張浚為布衣交浚以管樂期之紹興間來豫章東湖結廬獨居浚為相馳書函幣屬豫章帥漕親造其廬期以必致雲卿即日遁去題詩于壁莫知所之還張德逺書幣題詩蔬圃壁間多年别作一番風誰料聲名達帝聰自有時人求富貴莫將富貴汙去聲蘇公楊萬里字廷秀吉州吉水人紹興甲戌進士調永州零陵丞時張浚謫永杜門謝客萬里以書力請始得見浚勉以誠正之學因服教終身題其室曰誠齋丁父憂服闋知奉新縣用大臣薦召為國子博士歷吏部郎官將作少監出知漳州常州尋提舉廣東茶盬有平盜功孝宗稱之曰仁者之勇就除提點刑獄以憂去免喪召為尚左郎官淳熙十二年地震上封事萬言最為切直以爭張浚配享忤旨出知筠州光宗即位以祕監召再出轉運江東朝議欲用鐵錢萬里力疏其不便失宰相意改知贑州不赴子祠自是不復出矣寧宗嗣位召赴行在引年乞休嘉泰四年升寶謨閣學士卒年八十三諡文節子長孺新秋晚酌匡牀東鄉坐秋風忽凄其老夫衰病骨急令閉東扉西扉亦半掩壓風作東吹何必風及我風入涼自馳晚蟬是誰説我飲渠便知飛從何方來徑集庭樹枝三歎復九詠話盡新秋悲我老悲已忘汝語復為誰老烏啼一聲不知蟬所之蘇木灘灘雪清濺眸灘雷怒醒耳落洪翠壁立跳波碧山起船進若戰勝船退亦遊戲若非篙師苦進退皆可喜忽逢下灘舟掀舞快雲駛何曽費一棹才瞬已數里會有上灘時得意君勿恃聞一二故人相繼而逝感歎書懷故人昔同朝與遊每甚歡豈緣勢利合相得文字間有頃各補外不見今六年我來荆溪上敲榜索租錢故人復雙入飛上青雲端我雖世味淡羡心能恝然忽傳故人去得書墨未乾又傳故人亡驚悼摧肺肝鼎貴良獨佳安貧未遽賢向以我易彼安知不作難今以彼易我試問誰當慳如何捐此軀必要博好官顧謂妻與子官滿當歸田我賤汝勿羞我貧汝勿歎從汝丐我身百年庶團欒妻子笑答我修短未易言冨貴必速殞郭令當夭殘貧賤果永算顔子夀必延我復答渠道薄命我自憐我福肯如郭我德敢望顔造物本嗇與我乃多取旃借令彼不怒退者我獨安汝言自有理我意不可還暮宿半塗朝日在我東夕日在我西我行日亦行日歸我未歸勢須就人宿逺近或難期平生太疏放似黠亦似癡如何今日行不以衾枕隨幸逢春小暄倒睡莫解衣借令今夕寒我醉亦不知次日醉歸日晚頗欲歸主人苦見留我非不能飲老病怯觥籌人意不可違欲去且復休我醉彼自止醉亦何足愁歸路意昏昏落日在嶺陬竹裏有人家欲憩聊一投有叟喜我至呼我為君侯告以我非是俯笑仍掉頭機心久已盡猶有不下鷗田父亦外我我老誰與遊跋馬公弼省幹出示山谷草聖浣花醉圖名彥輔西人涪翁浣花醉圖歌歌詞自作復自寫少陵無人張顛死以翁奄有二子者不論叉股與錐沙更數旱蛟及驚蛇詩仙不合兼草聖鬼怒天嗔教薄命人言愛書緣愛賢紫眉未必勝青編舊時鬼門關外客如今一字抵尺璧何須千載空相憶送王監簿民瞻南歸庭圭潮頭打雲雲不留月波潑窗窗欲流夜寒報晴豈待曉天公端為盧溪老盧溪在山不知年盧溪出山即日還黃紙苦催得高卧青霞成癖誰能那詔謂先生式國人掉頭已復煙林深路傍莫作兩疏看老儒不用槖中金題嚴州新堂郡圃舊亭面東了無所見太守曹仲本撤材易地為堂貿地以廣之正對南山經始小築覺江山輻湊因得長句新堂略有次第否忙裏從公一來覷是時新秋收舊雨小風吹花掠巾屨江山只道不解語云何惠然堂上聚北山故挽南山住東溪不遣西溪去向來天藏在何處遭公拈出天不拒舊亭不為作山主背山起樓何以故更煩好手鏟東阜放出釣臺寸來許謝唐德明惠筍高人愛筍如愛玊忍口不餐要添竹云何又遣十輩來昏花兩眼為渠開販夫束縛向市賣外強中乾美安在錦紋猶帶落花泥不論燒煮兩皆奇豬肝纍人真可怍以筍纍公端不惡上元夜里俗粉米為繭絲書吉語置其中以占一歲之禍福謂之繭卜因戲作長句去年上元客三衢衝雨看燈強作娛今年上元家裏住村落無燈惟有雨隔溪叢祠稍簫鼓不知還有遊人否兒女炊玊作繭絲中藏吉語默有祈小兒祝身取官早小女只求蠶事好先生平生笑兒癡逢場亦復作兒戲不願著腳金華殿不願增巢上林苑只哦少陵七字詩但得長年飽喫飯心知繭卜未必然醉中得卜喜欲癲釣雪舟中霜夜望月溪邊小立苦待月月知人意偏遲出歸來閉户悶不看忽然飛上千峰端卻登釣雪聊一望氷輪正挂松柯上詩人愛月愛中秋有人問儂儂掉頭一年月色只臘裏雪汁揩磨霜水洗八荒萬里一青天碧潭浮出白玊盤更約梅花作渠伴中秋可是欠此段雪夜尋梅去年看梅南溪北月作主人梅作客今年看梅荆溪西玊為風骨雪為衣臘前欲雪竟未雪梅花不慣人間熱橫枝憔悴涴晴埃端令羞面不肻開縞裙夜訴玊皇殿乞得天花來作伴三更滕六駕海神先遣東風吹玊塵梅仙曉沐銀浦水氷膚别放瑤林春詩人莫作雪前看雪後精神添一半過霅川大溪菰蒲際天青無邊只堪蓮蕩不堪田中有一溪元不逺摺作三百六十灣政如緑錦地衣上玊龍盤屈於其間前船未轉後船隔前灣望得到不得及至前灣到得時只與後灣才咫尺朝來已度數百縈問知德清猶半程老夫乍喜棹夫悶管有到時君莫問插秧歌田夫拋秧田婦接小兒拔秧大兒插笠是兜鍪蓑是甲雨從頭上溼到胛喚渠朝餐歇半霎低頭折腰只不答秧根未牢蒔未匝照管鵝兒與雛鴨題望韶亭新隆寺後看韶石三三兩兩各依稀金坑津頭看韶石十十五五不整齊一來望韶亭上看九韶八音堆一案金鐘大鏞浮水涯玊瑟瑤琴倚天半堯時文物也粗疏禮樂猶帶鴻荒餘茅茨殿上捶土鼓葦籥聲外無笙竽黃能郎君走川嶽領取后夔搜禮樂嶧山桐樹半夜鳴泗水石頭清晝躍山祗川后爭獻珍姚家制作初一新帝思南嶽來時巡宫琛廟寶皆駿奔曲江清徹碧瓊軟海山孤尖翠屏展天顔有喜后夔知一奏雲韶供亞飯帝登九嶷忘卻歸不知斑盡湘笛枝后夔一脛破莫隨坐委衆樂江之湄儀鳳舞獸掃無迹獨留一狻守其側至今喚作獅子石雨淋日炙爛不得洞庭張樂已莓苔犍為獲磬亦塵埃不如九韶故無恙戛擊尚可冬起雷何時九秋霜月裏來聽湘妃瑟聲美曲終道是不見人江上數峰是誰子正月十二日遊東坡白鶴峰故居其北思無邪齋真迹猶存詩人自古例遷謫蘇李夜郎并惠州人言造物因嘲弄故遣各捉一處囚不知天公愛佳句曲與詩人為地頭詩人眼底高四海萬象不足供詩愁帝將湖海賜湯沐僅僅可以當冥搜郤令玊堂揮翰手為提椽筆判羅浮羅浮山色濃潑黛豐湖水光先得秋東坡日與羣仙遊朝發崑閬夕不周雲冠霞佩照宇宙金章玊句鳴天球但登詩壇將騷雅底用蟻穴封王侯元符諸賢下石者祗於千載掩鼻羞我來剝啄王粲宅鶴峰無恙江空流安知先生百嵗後不來弄月白蘋州無人挽住乞一句猶道雪乳氷湍不當年醉裏題壁處六丁巳遣雷電收獨遺無邪四箇字鸞飄鳳泊蟠銀鈎如今亦無合江樓嘉祐破寺風颼颼題南海東廟羅浮山如萬石鍾一股南走如渴龍雷奔雷激遮不住直抵海濱無去處低頭飲海吐絳霞舉頭對著祝融家珠宫玊室水晶殿萬水一日朝再衙青山四圍作城郭海濤半浸青山腳客來莫上浴日亭亭上見海君始驚青山缺處如玊玦潮頭飛來打雙闕晴天無雲濺碎雪天下都無此奇絶大海更在小海東西廟不如東廟雄南來若不到東廟西京未覩建章宫海神喜我著綺語為我改容收霧雨乾坤軒豁未能許小試日光穿漏句羅仲憲送蔊菜謝以長句學琴自有譜相鶴自有經蔬經我翻盡不見蔊菜名金華詩裏初相識玊友尊前每相憶坐令芥孫薑子芽一見風流俱避席取士取名多失真向來許靖亦誤人君不見鄭花不得半山句卻參魯直稱門生謝胡子逺郎中惠蒲大韶墨報以龍涎心字香墨家者流老蒲仙碧梧採花和麝煙華陽黑水煎膠漆大陰玄霜作肌骨龍尾磨汁飲鼠鬚落點髹几几不如夷甫清瞳光敵日一見墨卿驚自失後來夔州有梁杲爾來黟川有吳老亦追時好得時名竟為蒲生竪降旌吳墨往往玄尚白梁墨溼溼黐黏壁南宮先生來自西惠然贈我四玄圭我無鵲返鸞回字我無金章玊句子得君此贈端何似兀者得鞾僧得髢安得玊案雙鳴璫金刀繡段底物償送以龍涎心字香為君興雲繞明窗李聖俞郎中求吾家江西黃雀醝法戲作醝經遣之江夏無雙小道士一丘一壑長避世裁雲縫霧作羽衣蘆花柳綿當裘袂身騎鴻鵠太液池腳踏金蟇攀桂枝渴飲南陽菊潭水飢啄藍田粟玊芝今年天田秋大熟紫皇遣刈神倉穀一雙鳬舄墮雲羅夜隨弋人臥茅屋賣身不直程將軍卻與彭越俱策勳解衣戲入玊壺底壺中别是一乾坤水精鹽山兩岐麥身在椒蘭衆香國玊條脫下澡凝脂金叵羅中酌瓊液平生學仙不學禪刳心洗髓糟牀邊諸公爼豆驚四筵猶得留侯借箸前昔為飛仙今酒仙更入太史滑稽篇跋尤延之左司所藏光堯御書歌光堯太上皇帝御書西漢書列傳目上有璽文曰帝録臣袤得之以示臣萬里謹拜手稽首作歌敬書于後鸞臺長史老野僧月前病鶴霜後蠅文書海裏衮不了黑花亂發雙眼睛故人同舍尤太史敲門未揖心先喜袖中傾下十斛珠五色光芒射窗几自言天風來帝旁拾得復古殿中雲一張向來太上坐朝罷勝日光風花栁暇浣花藂裏氷雪容宣城雞距針芒鋒天顔有喜聊小試西京書目供遊戲韓彭衛霍欣挂名舒向卿雲感書字漢廷多少失意人九京寸恨不作塵一朝翻入聖筆底昭回之光喚渠起小臣濫巾縫掖行手抄孝經不徹章何曽下筆寫史漢再拜恭覽汗透裳太史結廬伴鷗鷺錫山山下荆溪渡紅光紫氣燭天衢箇是深藏寶書處行路難君不見河陽花今如泥土昔如霞君不見武昌栁春作金絲秋作帚人生馬耳射東風柳色桃花郤長久秦時東陵千户侯華蟲被體腰蒼璆漢初沛邑刀筆吏折腰如磬頭搶地蕭相厥初謁邵平中庭百拜百不譍邵平後來謁蕭相故侯一拜一惆悵萬事反覆何所無二子豈是大丈夫窮通流坎皆偶爾摶扶未必賢搶榆華胥别是一天地醉鄉何曽有生死儂欲與君歸去來千愁萬恨付一杯送薑夔堯章謁石湖先生釣璜英氣橫白霓咳唾珠玊皆新詩江山愁訴鶯為泣鬼神露索天泄機彭蠡波心弄明月詩星入腸肺肝裂吐作春風百種花吹散瀕湖數峰雪青鞋布襪軟紅塵千詩只博一字貧吾友夷陵蕭太守逢人説項不離口袖詩束來謁老夫慙無髙價當璠璵翻然卻買松江艇徑去蘇州參石湖謝王恭父贈梁杲墨君不見蜀人文字天下工前有相如後揚雄君不見蜀人烏丸天下妙前有蒲韶後梁杲初得梁墨黐糢糊老夫道梁不及蒲蓬山藏室王校書笑我未識真玄菟兩圭水蒼笏雙團點漆璧一併贈老夫此意已金石洮州緑玊試松花星潭黑雲走風沙龍蛇起陸鷹入骨卻愁雷電奪神物再賦石翁石婆石翁誰怒猶睅目石婆多愁鬢先秃荒山野水四無人二老對立今幾春珠襦玊匣化為土金雁銀鳬亦飛去知是六朝何帝陵摩挲碧蘚俱無語贈寫真水鑑處士王溫叔我不如森森千丈松我不如濯濯春月栁髯疏鬢秃已雪霜皮皺肉皴真老醜葉生畫時顔尚朱王生畫時骨更臞一生愛山吟不就兩肩化作秋山瘦君不見褒公鄂公圖凌煙腰間羽箭大如椽君不見浣花醉圖粉墨落日斜泥滑驢失腳貴人寒士兩相嗤畫圖猶在人已非王生王生且停手不如生前一杯酒嘲道旁楓松相倚雙楓一松相後前可憐老翁依少年少年翡翠新衫子老翁深衣青布被更看秋風清露時少年再換輕紅衣莫教一夜霜雪落少年赤立無衣著老翁深衣郤不惡臘夜普明寺睡覺作臘聊春酒依人只短檠略無更可數聽到雨無聲犬吠知何苦雞寒肯更鳴生來眠不足老去夢難成和仲良春晚即事筍改齋前路蔬眠雨後畦晴江明處動逺樹看來齊我語真雕朽君詩妙斫泥殷勤報春去恰恰一鶯啼泊樟頭此地三接淅從來四肅霜日斜秋樹轉市散暮船忙波捲青中白霞翻紫外黃汀沙渾換卻不記舊圓方理蔬小摘吾猶惜頻來徑自成青蟲捕仍有蠧葉病還生貧裏猶存竈霜餘正可羮窺園未妨學抱甕更須營之永和小憩資壽寺石子密鋪徑竹莖疏作行不緣憩騶僕幾失此山房佛像看都好林花靜自香來須清興盡歸更借僧牀白沙買船晚至嚴州重霧凝朝雨斜陽竟晚晴萬山江外盡一塔嶺尖明身小寧嫌窄途長已倦行子陵臺下水未酌意先清涉水溪宿淡山徑仄愁斜步溪深怯正看破船能不渡晴色敢辭寒白退山雲細青還玊宇寬險艱明已濟魂夢未渠安夜坐欲雪天還惜不風寒自生燈搖無定影火作始然聲又遣庭闈訊縣知骨肉情履端猶幾日有夢未歸程立春前一夕臘盡春還未朝暄暮復寒雨晴終日異衣著一冬難生菜知無分殘梅不用看本憑書遣睡轉使睡相干午憩東塘近白干江西地盡於此日以秋還短塗緣熱故長也知茅店窄奈此竹風涼更逺終然到而吾有底忙欲行猶小駐咫尺便它鄉秋夜讀書稚子慵都睡先生喚不譍蟲聲窗外月書册夜深燈半醉聊今古千年幾廢興有懷人未會不樂我何曽送葉叔羽寺丞持節淮東煮海誰為祟沿淮困不勝民思賢使者帝遣大農丞玊節寒侵斗牙檣凍作氷來歸聞早著紫禁要渠登别蕭挺之泉州八葉今成九一枝誰敢雙野人應補外賢者亦為邦夾岸梅臨水孤帆雪湧江别愁才半掬不遣我心降池亭小沼才階下孤亭恰水邊揩磨一玊鏡上下兩青天可惜無多水難堪著釣船今年非不暑每到輒醒然從范至能參政遊石湖精舍坐間走筆震澤分波入垂虹隔水看何須小風起生怕牡丹寒政坐諸峰好端令落筆難催人理歸棹落日許無端四月四日午初出浙東界入信州永豐外面千峰合中間一徑通日光自搖水天靜本無風村酒渟春緑林花倦午紅莫欺山堠子知我入江東曉晴過猿藤徑厭雨欣初霽貪程敢晏眠排天雙壁起受日一峰先入徑惟逢樹無人况有煙藤深猿不見聲到客愁邊羅溪道中每歲秋猶熱今年閏故涼松稀青有數山逺碧無常陳陳金風細家家玊粒香秪言官路短堠子暗添長宿蘭溪水驛前繫纜蘭溪岸開襟栁驛窗人爭趨夜市月自落秋江燈火疏還密帆檣隻更雙平生經此縣今夕駐孤幢發揚港渡入交石夾朝雨匆匆霽春山歷歷嘉老青交幼緑暗錦出明花漁艇十數隻雞聲三五家人生須富貴此輩亦生涯蚤起稜鎮人趂村中樹雞鳴擔上籠忽看一天紫未吐半輪紅誰撼扶桑露吹來楊栁風詩肩忍涼冷已出兩臞峰見淡菴胡先生舍人淡翁家近醉翁家二老風流莫等差黃帽朱耶飽煙雨白頭紫禁判鶯花補天老手何須石行地新堤早著沙三嵗别公千里見端能解榻瀹春芽和馬公弼雪灑竹穿梅湖更山客間得此未嫌寒髯疏也被輕輕點齒冷猶禁細細餐晴了還成三日凍消餘留得半庭看憑誰説似王郎婦鹽絮吟來總未安賀淡菴先生胡侍郎新居落成眼髙不肻住清都夢繞江南水竹居卻入青原更青處飽看黃本硬黃書剪裁風月聊堪醉拆洗乾坤正要渠賜宅不應公得免未知此第似林廬霰雪花遣霰作前鋒勢頗張皇欲暗空篩瓦巧尋疏處漏跳階誤到暖邊融寒聲帶雨山難白冷氣侵人火失紅方訝一冬暄較甚今宵敢歎臥如弓中秋前兩日别劉彥純彭仲壯於白馬山下匆匆離合夢非夢續續談諧眠不眠莫道對牀容易著試思分手幾何年長亭更放金荷淺後夜誰同璧月圓要得長隨二三友不知由我定由天答漢章直詩人今代謝宣城舉子新年章子平雨剩風殘忽春暮花催草喚又詩成五湖煙水三冬臥萬里雲霄一日程老裏睡多吟裏少舊家句熟近來生秋懷隨分哦詩足散愁老懷何用更冥搜聿來胥宇蟻移穴無以為家燕入秋蓋世功名吹劒首平生憂患淅矛頭從今歸去便歸去未到無顔見白鷗以糟蟹洞庭柑送丁端叔有詩因和其韻斗州只解寄鵝毛鼎肉何曽饋百牢驅使木奴供露顆催科郭索獻霜螯鄉封萬戶只名醉天作一丘都是糟卻被新詩太清絶喚將雪虐更風叨十二月草一日迎春星淡孤螢月一梳迎春早起正愁豫土牛只解催人老春氣自來何事渠官栁野梅殘雪後金幡玊勝曉光初郤思歸跨春山犢繭栗仍將挂漢書上元前大雪即晴臘前三白已奇絶年後六花仍作團才定忽斜偏有思欲消還凍不勝寒且留大地萬銀屋要伴青天孤玊盤今歲上元君記取紅燈白月雪中看寓倅廳寒夜不寐不堪斜雨打虛窗只願晴陽送曉光自是老人眠不著近來春夜幾曽長樓頭吹動梅花曲夢裏猶疑燕寢香道是官居如客舍等間一宿兩年強昨日訪子上不遇裴回庭砌觀木犀而歸再以七言乞數枝昨攜兒輩叩雲關繞遍巖花恣意看苔砌落深金布地水沈蒸透粟堆盤寄詩北院賒秋色供我西窗當晚餐小朵出叢須折郤莫教折破碧團欒題南雄驛外計堂攜家度嶺夜乘槎小泊淩江水北涯二月山城無菜把一年春事又楊花舉頭海國星辰近回顧梅山草樹遮客子相逢聞好語看山只欠到南華三月一日過摩舍那灘阻雨泊清溪鎮一聲霹靂霽光收急泊荒茆野渡頭摩舍那灘衝石過曼陀羅影漾江流山才入眼雲遮斷船去追程雨見留夜宿清溪望清逺舉頭不見隔英州春晴懷故園海棠竹邊臺榭水邊亭不要人隨只獨行乍暖栁條無氣力淡晴花影不分明一番過雨來幽徑無數新禽有喜聲只欠翠紗紅映肉兩年寒食負先生初食筍蕨炮鳳烹龍世浪傳猩脣熊掌我無緣只逢筍蕨杯盤日便是山林冨貴天稚子玊膚新脫錦小兒紫臂未開拳只嫌嶺外無珍饌一味春蔬不直錢南海東廟浴日亭南海端為四海魁扶桑絶境信奇哉日從若木梢頭轉潮到占城國裏回最愛五更紅浪沸忽吹萬里紫霞開天公管領詩人眼銀漢星槎借一來冬至節後賀皇太子及平陽郡主長樂鐘聲繞夢驚建章星影照人行千官燈語聽殘點一夜霜寒在五更金鑰玊􅙞開北闕銀鞍絲控謁東明青宫朱邸環天極五色祥雲覆帝城謝張功父送牡丹病眼看詩痛不勝落花千朵喚雙明淺紅濃紫各新樣雪白鵝黃非舊名擡舉精神微雨過留連消息嫩寒生蠟封水養松窗底未似雕欄倚半酲沈虞卿祕監招遊西湖蘇公堤逺栁生煙和靖園深竹映關船入芰荷香處去人從雲水國中還似寒如暖清和在欲雨翻晴頃刻間能為蓬萊老仙伯一杯痛快吸湖山跋陸務觀劒南詩稿今代詩人後陸雲天將詩本借詩人重尋子美行程舊盡拾靈均怨句新鬼嘯狨啼巴峽雨花紅玊白劒南春錦囊翻罷清風起吹仄西窗月半輪送周元吉顯謨左司將漕湖北又見周郎攜小喬武昌赤壁醉嬌嬈蜀江雪水來三峽吳苑風煙訪六朝秋月春花出肝肺新詞麗曲入笙簫歸來郤侍金鑾殿好看霜毫映珥貂過平望望中不著一山遮四顧平田接水涯栁樹行中分港汊竹林多處聚人家風將春色歸沙草天放晴光入浪花午睡起來情緒惡急呼蟹眼瀹龍芽送吳敏叔待制侍郎腳踏雞翹豹尾間心飛碧岫白雲端人看疏傅如圖畫帝念嚴光返釣灘玊殿松班唐次對竹宫茅立漢祠官自憐病鶴樊籠底方羡冥鴻片影寒戊申四月九日得請補外初出國門宿釋迦寺出卻金宫入梵宫翠微緑霧染衣濃三年不識西湖月一夜初聞南澗鐘藏室蓬山真昨戲園翁溪友得今從若非朝士相追送何處冥鴻更有蹤明發南屏新晴在在野花香過雨迢迢沙路長兩度立朝今結局一生作客老還鄉猶嫌數騎傳書札剩喜千山入肺腸到得前頭上船處莫將白髮照滄浪入玊山七里頭諸村不雨數旬餘此地瀕江萬寶蘇晚紫豆花初總角早黃稻穗已長須回頭金步野蹊逺當面玊山秋塔孤偶見年時解船處客愁依舊挂菰蒲過弋陽觀競渡急鼓繁鉦動地呼碧琉璃上兩龍趨一聲翻倒馮夷國千載凄涼楚大夫銀碗錦標誇勝捷畫橈繡臂照江湖三年端午真虛過奇觀初逢慰道塗宿放牛亭秦太師墳菴函關只有一穰侯瀛館寧無再帝丘天極八重心未死台星三點拆方休只看壁後新亭策恐作栘中屬國羞今日牛羊上丘壠不知承相更嗔不清明日午憩黃池鎮莫笑孤村小市頭花邊人出浦邊遊緑楊拂水雙浮鴨碧草粘天一落鷗懶困風光酣午睡陰沈天氣嫁春愁阿誰道是清明節我對清明喚作秋明發黃土龕過髙路又過崢嶸兩峽間也無溪水也無田嶺雲放腳寒垂地山麥掀髯翠拂天碧玊屏風吹不倒青綾步帳買無錢詩人冨貴非人世猶自凄涼意惘然送丘宗卿帥蜀諭蜀宣威百萬兵不須號令自精明酒揮勃律天西碗鼓卧蓬婆雪外城二月海棠傾國色五更杜宇説鄉情少陵山谷千年恨不遇丘遲眼為青發趙屯得風宿楊林池是日行二百里動地風來覺地浮拍天浪起帶天流舞翻栁樹知何喜拜殺蘆花未肯休兩岸萬山如走馬一帆千里送歸舟出籠病鶴孤飛後回首金籠始欲愁登鳳凰臺十年百尺鳳凰臺送盡潮回鳳不回白鷺北頭江草合烏衣西面杏花開龍蟠虎踞山川在古往今來鼓角哀只有謫仙留句處春風掌管拂蛛煤送簡壽王主簿之官臨桂柴門草徑儘莓苔不放黃塵俗子來詩客清晨衝雨入梅花一夜為君開飄蕭落葉殘燈火陸續清談濁酒杯二十一年才四見驪駒抵死又相催書黃廬陵伯庸詩卷句法何曾問外人單傳山谷當家春截來雲錦花無樣倒寫珠胎海亦貧汗竹香中翻墨汁扶桑梢上挂頭巾詩名官職看雙好向道儒冠不誤身九日菊未花舊説黃楊厄閏年今年併厄菊花天但挼青蕊浮新酒何必黃金鑄小錢半醉嚼香霜月底一枝卻老鬢絲邊阿誰會得開遲意暗展重陽十月前春日二首江水夜韶樂海棠春貴妃殷勤向春道莫遣一花飛日落碧簪外人行紅雨中幽人詩酒裏又是一春風夏日追涼夜熱依然午熱同開門小立月明中竹深樹密蟲鳴處時有微涼不是風書王右丞詩後晚因子厚識淵明早學蘇州得右丞忽夢少陵談句法勸參庾信謁陰鏗讀白元長慶二集詩讀過元詩與白詩一生少傅重微之再三不曉渠何意半是交情半是私瓶中紅白二蓮二首紅白蓮花共玊瓶紅蓮韻絶白蓮清空齋不是無秋暑暑被花銷斷不生白蓮半莟未開時看作紅蓮更不疑到得欲開渾别了玊膚洗退淡胭脂上章戴灘脫巾枕手仰哦詩醉上諸灘總不知回看他船上灘苦方知他看我船時三月二十七日送春絶句只餘三日便清和儘放春歸莫恨他落盡千花飛盡絮留春肯住欲如何宿靈鷲禪寺二首暑中帶汗入山中霜滿風篁雪滿松只是山寒清到骨也無霜雪也無風初疑夜雨忽朝晴乃是山泉終夜鳴流到前溪無半語在山做得許多聲出永豐縣西石橋上聞子規花愁月恨只長啼雨夕風晨不住飛自出錦江歸未得至今猶勸别人歸戲筆野菊荒苔各鑄錢金黃銅緑兩爭妍天公支與窮詩客只買清愁不買田大雪中過言水小盤渡西歸風捲寒江浪溼天斜吹亂雪忽平船碧琉璃上瓊花裏獨載詩人孟浩然題桄榔樹化工到得巧窮時東補西移也大奇君看桄榔一窠子竹身杏葉海棠枝送德輪行者瀝血抄經奈若何十年依舊一頭陀袈裟未著愁多事著了袈裟事更多過鳥石大小二浪灘俗呼為郎因戲作竹枝歌小郎灘下大郎灘伯仲分司水府關誰為行媒教作贅小姑山與大姑山三月三日上忠襄墳因之行散絶句三首長干橋外即烏衣今著屠沽賣菜兒晉殿吳宫猶碧草王亭謝館儘黃鸝遊人不是上墳回便是清湍禊事來最苦相逢無處避天禧寺及雨花臺除郤鍾山與石城六朝遺迹問難真里名只道新名好不道新名誤後人過松源晨炊漆公店莫言下嶺便無難賺得行人錯喜歡正入萬山圈子裏一山放出一山攔悶歌行阻風泊湖心康郎山旁小舟三宿作悶歌行風氣掀天浪打頭只須一笑不須愁近看兩日逺三日氣力窮時會自休有歎飽喜飢嗔笑殺儂鳳凰未可笑狙公儘逃暮四朝三外猶在桐花竹實中八月十三日望月才近中秋月已清鴉青幕挂一團氷忽然覺得今宵月元不粘天獨自行初秋戲作俳體二首自曝羣書舊間新淨揩白醭拂黃塵莫羞空腹無丁字且免秋陽晒殺人獨對秋筠倒晚壺喜無吏舍四歌呼栁梢一殼兹緇滓屋角雙斑谷古孤暮春花時追賞夜將朝花過遲眠日儘髙又與山禽爭口腹執竿挾彈守櫻桃木犀芙蓉盛開先生深住萬山村霧裹雲包不見痕也被間人知去處芙蓉巷裏木犀門楊長孺字伯子誠齋先生子也清節高文趾美克肖嘉定間為湖州守彈壓貴豪牧養小民治績冠于三輔及帥番禺將受代有俸錢七千緡盡委以充下戶租稅嘗言士大夫能清亷便是七分人了公忠仁明皆從此出一滴泉法眼三泓井曹溪一滴泉經秋杜宇血遺老徑山禪衲子非常釋叢林别是天方諸多少淚分灑汝江邊湖州民祠小像于學宫值有浙東庾節之除攜像以行自題其上面有憂民色天知報國心三年風月少兩鬢雪霜深更莫留形迹何曽廢古今不如隨我去相伴老山林按湖學之祠楊伯子也與工部尚書戴少望並爼豆焉楊羞與戴伍故卷藏以行當時士子有戲和楊韻者末句云可憐戴工部獨樹不成林帥番禺秩滿别石門石門得得泊歸舟江水依依别故侯擬把片香投贈汝這回欲帶忘來休晉吳隱之守五羊歸舟有香一片投石門江中詩用此事宋元詩會卷四十一
