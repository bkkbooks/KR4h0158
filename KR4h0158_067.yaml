body:
  text: 宋元詩㑹卷六十七兵部主事陳焯編元好問下送曹吉甫兼及通甫意氣羡君豪憐君屈騎曹安能事筆硯且復混弓刀風雪貂裘暗關山馬骨髙南飛見鴻雁應為惜哀勞并州聞雁八月并州雁清汾照旅羣一聲驚晚笛數㸃入秋雲滅沒樓中見哀勞枕畔聞南來復北去無計得隨君甲寅十二月四日出鎮陽寄宰魯伯滹水曉光動灞橋詩境同衝寒騎瘦馬認影識衰翁長岸風聲外孤城雪意中回頭歌笑處凄絶意何窮陽翟道中長路伶俜裏羇懷莽蒼中千山分落照萬籟入秋風頻見參旗縮虛傳朔幕空故園歸未得細問北來鴻月觀追和鄧州相公席上韻月觀知名舊池亭發興偏露凉驚夜鶴風細咽秋蟬緑泛兵厨酒紅依幕府蓮無緣逐清景空羡飲中仙方城道中懷山居技拙違時用年饑與食謀江山貧士歎日月賈胡留楚客頻招隱文園故倦遊衡門有幽事還我北窗幽勝槩勝槩烟塵外新詩杖履間偶隨流水去淡與白雲還吾道三緘口時情一解顔從今便髙卧已負半生閒少室南原地僻人烟斷山深鳥語譁清溪鳴石齒暖日長藤芽緑映髙低樹紅迷逺近花林間見雞犬直擬是仙家長夀新居地古村墟逈川回縣郭斜蒲池餘老節菊水引新芽卜築欣成趣歸耕覺有涯迎門顧兒女今日是山家寄程甥鐵安御史隂功在孫兒玊不如已能騎竹馬想亦愛銀魚異縣關山濶衡門骨肉疏幾時隨阿舅盡讀外家書巳亥元日五十未全老衰容新又新漸稀頭上髮别換鏡中人野史才張本山堂未買鄰不成騎瘦馬還更入紅塵發濟源旱暵今年劇他鄉底處歸贏糧先失具涉世本無機棄擲烏皮几裴徊白版扉殷勤雙語燕愧汝逺相依倪莊中秋强飲日逾瘦夾衣秋已寒兒童謾相憶行路豈知難露氣入茅屋溪聲喧石灘山中夜來月到曉不曾看送田益之從周帥西上市近厨無肉書香蠧有蟲深居誰不樂兀坐竟何功天日伸眉後江山洗眼中蓬萊如可到剩借玉川風庚子三月十日作殘夢忘書帙餘寒殢酒杯青銅元懶照白紵更寬裁水際時獨往花邊知幾回殷勤雙語燕應自謝家來春日里社春盤巧欲爭裁紅暈碧助春情忽驚此日仍為客卻想當年似隔生貧裏虀鹽憐節物亂來歌吹失歡聲南州剩有還鄉伴戎馬何時道路清葉縣雨中春旱連延入麥秋今朝一雨散千憂龍公有力回枯槁客子何心嘆滯留多稼即看連楚澤歸雲應亦到嵩丘兵塵浩蕩乾坤滿未厭明河拂地流秋懷凉葉蕭蕭散雨聲虛堂淅淅掩霜清黃華自與西風約白髮先從逺客生吟似候蟲秋更苦夢和寒鵲夜頻驚何時石嶺關頭路一望家山眼暫明橫波亭孤亭突兀插飛流氣壓元龍百尺樓萬里風濤接瀛海千年豪傑壯山丘疏星淡月魚龍夜老木清霜鴻雁秋倚劍長歌一杯酒浮雲西北是神州懷益之兄牢落關河雁一聲干戈滿眼若為情三年浪走空皮骨四海相望只弟兄黃耳定從秋後到白頭新自夜來生西樓日日西州道欲賦窮愁竟不成會善寺白塔沉沉插翠微魏家宫闕此餘基人生富貴有遺恨世事廢興無了期勝槩只今歸鷲嶺烟花從昔繞龍墀長松想是前朝物及見諸孫賦黍離西齊夜宴飄零無物慰天涯酒伴相逢飲倍加誤謬君當略彭澤回旋我亦笑長沙金叉醉嚲迎春髻銀燭光搖半夜花只缺東山游録事不來堅坐看紛譁送吳子英之官東橋且為解嘲柴車厯鹿送君東萬古書生蹭蹬中良醖暫留王績醉新詩無補玊川窮駒隂去我如决驟蟻蛭與誰爭長雄快築糟丘便歸老世間馬耳過春風京居辛卯八月六日作四壁秋蟲夜語低南窗孤客枕頻移野情自與軒裳隔旅食難堪日月遲平子歸田元有約魏舒襆被恐無期一莖白髮愁多少慚愧家人賦扊扅壬辰十二月即事二首萬里荆襄入戰塵汴州門外即荆榛蛟龍豈是池中物蟣虱空悲地上臣喬木他年懷故國野烟何處望行人秋風不用吹華髮滄海橫流要此身五雲宫闕露盤秋銀漢無聲桂樹稠復道漸看連上苑戈船仍擬下揚州曲中青塜傳新怨夢裏華胥失舊遊去去江南庾開府鳳凰樓畔莫回頭癸巳四月二十九出京塞外初捐宴賜金當時南牧已駸駸只知灞上真兒戲誰謂神州遂陸沉華表鶴來應有語銅槃人去亦何心興亡誰識天公意留著青城閲古今宋亡於青城而金亦亡於此喜李彥深過聊城圍城十月鬼為鄰異縣相逢白髮新恨我不如南去雁羡君獨是北歸人言詩匡鼎功名薄去國虞翻骨相屯老眼天公只如此窮途無用說悲辛秋夕小簟凉多睡思清一窗風雨送秋聲頻年但覺貂裘敝萬古何曾馬角生寄食且依嚴尹幕附書誰往鄧州城澆愁欲問東家酒恨殺寒雞不肯鳴淮右淮右城池幾處存宋州新事不堪論輪車謾欲通吳㑹突騎誰當搗薊門細水浮花歸别澗斷雲含雨入孤村空餘韓渥傷時語留與纍臣一斷魂望王李歸程一褐霜寒晚思孤難中行李見歸途虞卿仲子死不朽石父晏嬰今豈無義士龍沙元咫尺纍臣駒隙自舒徐何時斗酒歡相勞驚看燕家頭白烏杏花落後分韻得歸字獺髓能醫病頰肥鸞膠無那片紅飛殘陽淡淡不肯下流水溶溶何處歸煮酒青林寒食過明妝髙燭賞心違寫生正有徐熙在漢苑招魂果是非送輔之仲庸還大梁驊騮爭道渺翩翩誰遣風塵失壯年四壁舊聞縣磬宅一囊今有賣書錢淋浪别酒青燈夜滅沒孤帆落照邊想得還家過春半故山喬木滿蒼烟繡江泛舟有懷李郭二公荷花如錦水如天狼籍秋香擁畫船長白風烟最瀟灑外臺賓主重留連勝遊每恨隔千里樂事便當論百年咫尺西州兩詩客不來同作飲中仙寄欽止李兄征車南北轉秋蓬關塞相望兩秃翁衮衮便當隨世路悠悠難復倚天公銅駝荆棘千年後金馬衣冠一夢中尊酒雲州古城下幾時攜手哭春風望嵩少二首嵩少飛來崑閬山山家茅屋翠微間雞豚鄉社相勞苦花木禪房時往還結習尚餘三宿戀殘年多負半生閒長河一葦人千里望斷西城碧玊環飲鶴池邊萬木稠豢龍崖上五峰秋藤垂絶壁雲添潤澗落哀湍雪共流田父占年驚玉斾詩仙留迹嘆崑丘西風落日山陽道空對紅塵憶舊遊野谷道中懷昭禪師行行汾沁欲分疆漸喜人聲挾兩鄉野谷青山空自繞金城白塔已相望湯翻豆餅銀絲滑油㸃茶心雪蘂香說向阿師應被笑人生生處果難忘外家南寺在至孝社豫兒時讀書處也鬱鬱秋梧動晚烟一庭風露覺秋偏眼中髙岸移深谷愁裏殘陽更亂蟬去國衣冠有今日外家梨栗記當年白頭來往人間遍依舊僧窗借榻眠追賦定襄周帥夢卿家秋日牡丹千古吳中富貴家秋風吹送洛陽花真妃鏡裏春難老玉女車邊日易斜紀瑞定誰增舊譜換根原自有靈砂來遲不及西堂宴猶想分香入棣華周有棣華堂寄楊飛卿客夢悠悠信轉蓬藜牀殷殷動晨鐘西風白髮三千丈故國青山一萬重沙水有情留過雁乾坤多事泣秋蟲三間老屋知何處慚愧雲間陸士龍雨夜夢裏孤蓬雨打秋茅齊元更小於舟無錢正坐詩作祟識字重為時所讐千里謾思黃鵠舉六年真作賈胡留并州北望山無數一夜砧聲人白頭哀賢詩三首赤縣神州坐陸沉金湯無粟禍侵尋當官避事平生恥視死如歸社稷心文采是人知子重交朋無我與君深悲來不待山陽笛一憶同衾淚滿襟李欽叔冀都事死東州禍李翰林亡陜府兵方為騷人箋楚些更禁書客墮秦坑石苞本不容孫楚黃祖安能貸禰衡同甲四人三橫霣此身雖在亦堪驚李長源太學聲華弱冠馳青雲岐路九霄飛上前論事龍顔喜幕下籌邊犬吠稀壯志相如頭碎柱赤心嵇紹血沾衣從來聖牘褒忠義誰為幽魂一發揮王仲澤雪晴作晴光晃漾入危闌萬象都歸一色看搖筆尚堪凌浩蕩舉杯誰與慰荒寒化成銀界清凉近散盡氷花碧海乾後夜霜空月輪滿可無秦女共驂鸞過應州平野風埃接戍樓邊城三月似窮秋人家土屋才容膝驛路㫋車不斷頭隨俗未甘嘗馬湩敵寒直欲御羊裘十年紫禁烟花繞此日雲山是應州華不注山濟南作元氣遺形老更頑孤峰直上玊孱顔龍頭突出海波沸鰲足斷來天宇間齊國伯圖殘照裏謫仙詩興冷雲間乾坤一劍無人識夜夜光芒北斗寒送周帥夢卿之關中風華漠漠水迢迢長記金鞍入灞橋鬢鬢而今滿霜雪羽毛此日是雲霄火餘函谷青猶峙春動長陵紫未消射虎南山付公等可能仙掌不相招十月二十日雪中過石嶺關老天黯慘入平蕪朔吹崩奔萬竅呼雪意旋粧行路景詩家新有入關圖地爐圍坐慚田父絮帽衝寒怨僕夫故國烟花重回首蜀橙山麝記金壺燕府白兔仙穎迷離望莫攀爭教失腳下髙寒吸殘灝露瑤窗曉搗盡𤣥霜玉杵閒顧影乍疑雲外見寫生何似鏡中看褐衣擾擾皆三窟幾在闕經咳唾間出都二首漢宫曾動伯鸞歌事去英雄可奈何但見觚稜上金爵豈知荆棘卧銅駝神仙不到秋風客富貴空悲春夢婆行過盧溝重回首鳳城平日五雲多歷歷興亡敗局碁登臨疑夢復疑非斷霞落日天無盡老樹遺臺秋更悲滄海忽驚龍穴露廣寒猶想鳳笙歸從教盡剗瓊華了留在西山儘淚垂夀寧宫有瓊華島絶頂廣寒近為黃冦輩所撒過三鄉望女几村追懷溪南詩老二首雲際虛瞻處士星案頭多負讀書螢筆端有口傳三篋石上無禾養百齡從昔葛陂終變滅秖今韓嶽謾英靈因君重為前朝惜枉破青衫買一經女几山土人謂之韓嶽萬山青繞一川斜好句真堪字字誇棄擲泥塗豈天意折除時命是才華百錢卜肆成都市萬古詩壇子美家欲就溪南問遺事不禁衰涕落烟霞寄劉繼先清霜茅屋耿無眠坐憶分攜一慨然楚客登臨動歸興謝公哀樂感中年凄凉古驛人烟外迤邐荒山雪意邊千樹春風水楊栁待君同繫晉溪船為鮮于彥魯賦十月菊清霜淅淅散銀沙驚見芳叢閲歲華借暖定誰留翠被鍊顔應自有丹砂秋香舊入騷人賦晚節今傳好事家不是西風苦留客衰遲久已避梅花别周卿弟晚歲論詩辱見收相從許久重相留苦心亦有孟東野真賞誰如髙蜀州萬疊寒雲度歸雁孤洲春水淡沙鷗荒城後日思君處風色蕭蕭人白頭追録洛中舊作樂府新聲緑綺裘梁州舊曲錦纒頭酒兵易壓愁城破花影長隨日腳流萬里青雲休自負一莖白髮儘堪羞人間只怨天公了未便天公得自由晉溪石磴雲松著色屏岸花汀草展江亭青瑤疊甃通縣甕白玊雙龍掣迅霆地脉何嘗間今昔尾閭真解泄滄溟乾坤一雨兵塵了好就川妃問乞靈七月十二日行狼牙嶺狼牙路滑馬伶俜老鶴迢迢欲上征一曲松風寫幽致九秋雲物愴離情天開員嶠方壺境澗落銀河月窟聲覿面青山入渠手定誰胸次玊崢嶸答定齊李兄小山藂桂姓名香舉世何人得雁行滄海揚塵幾今昔長庚配月獨凄凉虛勞裴相求白傅正倚源明識漫郎十載相從未言晚城南泉石有雲莊聽姨女喬夫人鼓風入松白雪朱絃一再行春風纎指十三星雲窗霧閣有今昔寶靨羅裙無此聲瀟灑寒松度虛籟悠揚飛絮攪青冥胎仙不比湘靈瑟五字錢郎莫漫驚寒食上苑春風盛物華天津雲錦赤城霞輕舟矮馬追隨逺翠幕青旗笑語譁化國樓臺隔瀛海吳兒洲渚記仙家山齊此日腸堪斷寂寞銅鉼對杏花送樊順之弓刀十驛嶽蓮州渭水秦山得意秋王粲從軍正年少庾郎入幕更風流寒鄉况味真雞肋清鏡功名屬虎頭寄謝溪風亭上月老夫乘興欲西遊蜀昭烈廟合散扶傷老益堅荒祠重過為凄然君臣灑落知無恨庸蜀﨑嶇亦可憐一縣山陽堯故事三年章武魏長編錦宫羽葆今何處半夜樓桑呌杜鵑贈王仙翁道成覽照休驚白髮新奕棋翻覆見來頻燕南趙北留詩卷王後盧前盡故人平地青雲一爐藥舊都喬木百年身憑君剩醉浮香酒館名梁苑而今不算春趙汲古南園林園近與六街鄰塵漲都歸一水分魚樂定從濠上得荷香偏向雨中聞接籬倒