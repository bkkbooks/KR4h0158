玊瓶沈斷青綆妾死志不移改邑不改井我本瑚璉器安能作溺皿借此清江流葬我全首領皇天如有知定作血面請願魂化精衛填海使成嶺數百言余既髙希孟之節且悲其志作巴陵女子行北來諸軍飛渡江突騎一夜滿嶽陽樓頭火起入閭巷曹伍偶走如牛羊巴陵女子尚書婦生平不識門前路亂兵騎出勢倉皇夫壻翁姑在何處吞聲忍淚行且啼啼痕沾濕越羅衣此身忍使人再辱裂帛暗寫臨終詩上言社稷安危事下說投江誓天志一回宛轉一悲辛心折魂飛不成字詩成淚盡赴江流蛾眉蕭颯天為愁芙蓉零落入秋水玊骨直葬青海頭古來烈婦才一二誰似巴陵妙文理名與長江萬古流丞相魏公還不死蜀亡歎蜀破後有唐仲明者子西孫也被俘鬻於燕市安陸趙仁甫鳩資贖之子規啼缺峨眉月嘉陵江中半江血青天蜀道為坦塗馬蹄蹴落隂山雪芙蓉城碎朔風急虓虎磨牙綺羅穴不識兵戈三百年疊鼓一聲肝膽裂坡仙故里子西孫挺身北走來中原峨岷秋色橫眉宇骯髒獨倚燕市門時望蘇門一回首漠漠萬里烟塵昏古言蜀險甲天下一夫扞禦足成霸前劉後李王復孟虎視中原雄並駕于今底事谷為陵錦城萬里趨龍庭當時不與秦塞通一天自可延千齡吾子莫漫嗟飄零厲階權輿實五丁太平頂讀秦碑岱宗太平頂磨崖與天齊左勒聖后頌右刻張說辭文采與書法不離近代規漢封宛在周觀東秦壇敻出絶頂西壇前圓平值中峰突兀上有始皇碑年深雨漬百裂餘坼作兩峰蹲半龜靣陽數字仍可辨隙縫重銜苔蘚皮中間隱約見制可完好堪辨惟臣斯拳如叉股直如筯屈鐵碾玉秀且竒千年瘦徑益飛動回視諸家肥更癡當時風雨有餘怒豈容跨石獨在兹秖應神明愛尤物不肯轟擊常護持昔年韓文公曾賦岣嶁詩字青石赤皆傳聞漫為咨嗟涕漣洏何如親登泰山日觀峰光怪特見絳氣纒金虹摩挲細讀秦相碑天門髙詠來清風乃知山靈不相負夜宿天邊不忍去醉倚雲窗重回顧前聽角行此在蜩殼菴賦贈趙仁甫漢家有客北海北節毛落盡頭毛白聽此空令雙淚垂中原雁斷無消息南枝越鳥莫驚飛牢落天涯永相失江上舊梅花今夜落誰家樓頭有恨知何事牽住晴空幾縷霞後聽角行此宋咸淳癸酉被留儀真作燕南壯士江城客孤館無眠心已折那堪夜夜聞角聲怨曲悲凉更幽咽一噴牽殘楊栁風五更吹落梅花月霜天裂卻浮雲散雁行斷盡疏星接餘音眇眇渡江去依俙似向愁人說勸君且莫多嘆嗟家人恨殺生離别可憐辛苦為誰來凋盡朱顔頭半白萬緒千端都上心一寸肝腸能幾截當時聽角送南人南人吹角不送人不如睡著東風惡欹枕江聲總不聞奉使被留重圍雨久塌莓苔火鋪喧呼著棘栽唯有東風難禁約隔牆吹過落花來坊刻誤作王立中詩蓋因郝伯常被留儀真其所吟咏皆為安豐教授王時中藏録以傳後人遂訛王作乃時中又訛立中不可不知館人供雁持節江頭久食魚館人供雁意踟蹰呼兒細看雲間足恐有中原問訊書放雁北還繫書於足零落風髙縱所如歸期回首是春初上林天子援弓繳淮海纍臣有帛書按宋咸淳癸酉郝伯常充信使被賈似道羈留儀真已十五年時有以生雁饋者伯常因作詩繫其足縱之北還是年冬巴延南伐賈似道懼甚命總管段祐送伯常歸國明年三月虞人始獲此雁於汴梁金明池巴延䝉古巴林部人自曾祖蘇嚕克圖事太祖為其部左千户祖與父皆世其官至元初入事世祖見巴延儀貌大竒之預謀國事恆出廷臣右衆服曰真宰輔也十一年大舉伐宋能以不殺定江南時論方之曹彬誠為不愧先是宋末童謠云江南若破百雁來過莫有喻其意者及宋亡始知為䜟藝林載三詩相傳巴延下江南時所作皆健爽可誦然考元史本傳未嘗言其讀書知文字吟籍既收君子存之而已下江南詩劍指青山山欲裂馬飲長江江欲竭精兵百萬下江南干戈不染生靈血題馬鞭一節髙來一節低幾回敲鐙月中歸雖然三尺無鋒刃百萬英靈屬指揮過梅嶺馬首經從庾嶺歸王師到處悉平夷擔頭不帶江南物只插梅花三兩枝姚樞字公茂栁城人後遷洛陽金內翰宋九嘉識其有王佐略楊惟中乃與之偕覲太宗歲乙未南伐詔樞從惟中即軍中求儒道釋醫卜者拔德安得名儒趙復辛丑賜金符為燕京行臺郎中時伊喇沃濟行臺惟事貨賂每分及樞樞一切拒絶因棄官攜家來輝州作家廟别為室奉孔子及宋諸大儒像刋六經惠學者若將終身時許衡在魏至輝就學既而盡室依樞以居世祖在潛邸遣使召樞至大喜待以賔禮詢及治道樞為書數千言上之世祖竒其才動必召問世祖即位拜太子太師改大司農四年拜中書左丞十年拜昭文館大學士詳定禮儀十三年轉翰林學士承旨又四年卒諡曰文獻從子燧官亦至承旨卒諡曰文華不注行崑崙山巔半峰碧海風吹落猶帶濕意氣不欲隨羣山獨倚青空迥然立平地拔起驚孱顔劍稜徑插青雲間濟南名泉七十二㑹為一水來浸山我來方作鯨川遊玉臺公子邀同舟君山浮嵐洞庭晚小孤滴翠清江秋酒酣興極烟霏昏魚龍慘淡回山根少陵不來謫仙死舉杯更欲招其魂魂兮不來天亦老元氣崔嵬山自好超超絶頂來長風注目東溟望蓬島懷來醉歌燕姬蟠頭靣如玊一撒青金腰線緑當門舉酒喚客嘗俊入雙眸聳秋鶻白雲亂卷鑌鐵文蠟香一噴紅染唇據鞍側鞚半淋鬛春風滿靣不肯嗔繫馬門前折殘栁玉液和林送官酒二十五絃妝百寶一片氷泉落纎手須臾髙歌半酡顔貂裘護盡不覺寒誰道雪花大如席舉鞭已過千銀山被顧問題張萱畫明皇擊梧按樂圖阿萱五季名畫師尤工粉墨含春姿君王遊蕩墮聲色不知聲色傾人國開元無逸致太平天寶奢風生五兵偃月堂髙幽薊逺潛謀不入芙蓉苑咸陽行色馬嵬塵畫筆雖工恐未真四海蒼生半魚肉歸來豈為香囊哭一日重開日月光黃金卻鑄郭汾陽張𢎞範字仲疇張柔第九子善馬槊幼從學郝伯常能為詩歌年二十代兄攝順天總管事吏民服其明决中統初授御用局總管改行軍總管從親王噶必齊討李壇於濟南出竒制勝柔聞之曰真吾子也至元六年括諸道兵圍宋襄陽𢎞範佩金虎符為益都諸路行軍萬户建言取襄陽以兵千人城萬山八年築一字城逼襄陽遂拔之十一年丞相巴延伐宋𢎞範為前鋒破賈似道於蕪湖長驅至建康請旨進師十二年破宋將張世傑水軍於焦山改亳州萬户由海道㑹巴延進次臨安入城取宋稱臣降表以聞十五年授䝉古漢軍都元帥將水陸軍二萬分道南征獲宋丞相文天祥於五坡嶺天祥不屈待以賓禮獲禮部侍郎鄧光薦命子圭師事之十六年正月由潮陽港發舶入海次崖山宋亡紀功而還入朝慰勞甚厚未幾以瘴疾卒年四十三諡獻武按張柔本金國大臣世食厚祿而甘心降元為士論所不齒幸𢎞範稍識理義敬禮忠良差勝其父云攜妓泛舟遇雨醉漾扁舟去歡生儘櫂遲舞回風過處歌罷雨來時鳳斚傳瓊液鸞刀膾玉絲池塘烟樹外一一畫中詩逺烟慘蕩微風外氤氲老樹頭乍驚香霧薄遙認斷雲浮日落山腰暮雨晴天際秋清明藏不得一片晉家羞雛燕羽為香潤態含癡睡足雲兜力尚微喚母但能啾唧語戀巢猶倦往來飛熏風庭院簾初捲落日池臺人乍歸白鳳赤龍渾異事爭如隨分著烏衣燭淚惜别終宵話不休煌煌燈燭照離愁蠟花本是無情物持向人前也淚流劉秉忠字仲晦因從釋氏又名子聰其先瑞州人也曾大父仕金為邢州節度副使因家焉秉忠生而秀異志氣英爽不羈八歲入學日誦數百言十七為邢臺節度使府令史以養其親居常鬱鬱不樂一日棄去隱武安山中久之天寧虛照禪師遣徒招致為僧以其工文詞使掌書記後遊雲中世祖在潛邸海雲禪師被召過雲中聞其博學多才藝邀與俱行既入見應對稱㫖屢承顧問秉忠尤精易數凡三式六壬遁甲之屬無不洞達入微論天下事如指諸掌世祖大愛之海雲南還秉忠獨留藩邸癸丑從征大理明年征雲南每贊以好生去殺故城克之日不妄戮一人及伐宋所至全活不可勝計世祖即位秉忠猶不改舊服時人但以聰書記呼之至元元年帝覽翰林學士承㫖王鶚奏言即日拜光祿大夫位太保參預中書省事詔以竇默之女妻之賜第奉先坊寵任愈隆卒年五十九贈太傅封趙國公諡文貞有集十卷有懷雨過幽庭長緑苔東風時為掃塵埃無人曾見春來處門外桃花只自開按秉忠尤工小詞其乾荷葉曲云乾荷葉色蒼蒼老柄風搖蕩減了清香越添黃都因昨夜一場霜寂寞秋江上又弔宋行宫云南髙峰北髙峰慘淡烟霞洞宋髙宗一場空吳山依舊酒旗風兩度江南夢劉秉志太保弟也亦能詩附見白雲樓旌旗嫋嫋入隨州江漲祥烟散復收黃耳不來家信逺西風腸斷白雲樓宋元詩會卷六十七
