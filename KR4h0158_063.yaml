body:
  text: 宋元詩㑹卷六十三兵部主事陳焯編金詩附魏摶霄字飛卿初用䕃補以薦書從事史館明昌中宏詞中選授應奉翰林文字未㡬卒飛卿詩以富艶稱如張公子席間賦嵩山筆力豪邁党承㫖許其在劉無黨之上云田若虚遊龍門寶應用天隨子體賦詩因次其韻少室右臂禹所斷開排清伊來高寒土肉養石自古秀山腰流泉無時乾佛髻滴滴染深翠松風颼颼鳴驚湍白傅已矣不可見予誰從之投歸鞍王磵字逸賓先世原家臨洺至逸賓遂為汴梁人博學能文不就科舉孝友天至非其食不食家無儋石之儲宴如也明昌中故相馬吉甫惠迪知開封舉逸賓王彥功游宗之德行才能逸賓得鹿邑主簿乞致仕彥功以親老調鞏州教官宗之讓不受三人者雖出處不齊而時人皆以高士目之次文逺韻野性唯便閴寂居蒼苔鳥跡滿庭書林花過雨紅猶重籬竹和烟翠亦疎已與農人成保社更令兒輩學耕鋤賞音只有東郊客日袖新詩到敝廬雜詩二首晴日南溪物色饒草芽新緑凍全消金絲栁底洲沙沒數尺流波拍夜橋漢梁王苑古臺西秋思紛紛獨杖藜雲壓高城鴈飛盡一聲寒角夕陽低劉濤字及之夏津人明昌二年同進士用户部尚書孫鐸薦入翰苑歴太原運副汾州倅入為太子贊善以彰德治中致仕尋卒沁南節度康瑭良輔葬之林慮之寶巖宿平遙集福寺院僻和僧靜門閒與晝長燕泥朝雨淖蝶蘂晚風香野興煎詩思乾愁繞客腸青奴如解事供我暮窗涼送王純叔守曹州柏路人看御史驄年來眼落簿書叢單車乍别金鑾月五馬頻嘶玉勒風故國山河連小鄶舊家雞犬識新豐遙知别夜詩成處醉袖淋浪蜜炬紅路鐸字宣叔伯達之子與弟和叔父子俱有重名而宣叔文最奇尤長於詩精緻温潤自成一家任臺諌有古直臣風貞祐初出為孟州防禦使城陷投沁水死有虚舟居士集得之鄉人劉庭幹家雨中月翳有時吐風熏俄自清雲迴暑天影雨進夜窗聲眼聽參天籟神遊得化城覺來還故處饑鼠撼燈檠汴梁公廨西樓雲態看來變簷隂坐次移一蟬吟未了雙鳥去何之薄宦槐安夢浮名劍首炊安心元有法遣興可無詩七夕與信叔仲荀㑹飲晚歸有作秋香瀉月笑談香飲散歸來夜未央闕角星河搖淡影栁行燈火試新涼雄飛勲業歸時輩信美江山著漫郎萬事浮雲心鐵石休將梁國嚇䝉莊師拓字無忌平涼人舉進士不中明昌中有司薦其才以嗜酒不果冬夜雲破月穿牖夜嚴風號隙客子寢不安寒燈照空壁黙然不平事起坐長太息書但記姓名劍本匹夫敵追奔慕前哲恢張濟時䇿何意造物兒重此稻粱役興酣氣益振孤憤逺飄激非無南山雲高臥養虚寂茹芝酌縣流嘯吟展胸臆聖達豈不念且有不暖席此抱與誰知乾坤夜寥閴遊同樂園晴日明華構繁隂蕩綠波蓬丘滄海遠春色上林多流水時雖逝遷鶯暖自歌可憐懽樂極鉦鼔散雲和郡城南郭早望曉立囘塘上何人逸興同栁濃天霽雨萍坼岸含風鳥影明蒼靄湖光倒碧空秦川何日到解髮濯清灃中元後二日暑謝涼生際庭虚雨過時天長雲斷續風急樹離披世態貧逾薄秋光老易悲燕城寒事早還與舊貂期酈權字元輿安陽人作詩有筆力父瓊金初有功仕至武寧軍節度使元輿以門資叙宦不達朝議高其才明昌初以著作郎召之未㡬卒有坡軒集行於世竹林寺矮松蒼烟靄山曲囘溪抱脩筠中藏古佛宮荒僻無四鄰靈松插殿角偃蹇今㡬春何年霹靂雨投石搜灊鱗謫重飛舉難堕此蜿蜒身聫拳縮爪股氣屈不得伸臥枝老無力支撐藉樵薪無風自悲吟失水固不神安論才不才禍福了已分南山聳千嶂直幹排風雲正以中繩墨中道遭斧斤豈知無用資千嵗保其身西遊茅店雞聲外柴車犬吠間疎星涵積水殘月墮昏山好夢人何在秋風我獨還梨園有名酒聊此慰間闗七夕縹緲針樓外天教彩羽過步雲榆送影拂月桂交柯繡縷縈芳袂𤓰蓮得巧梭常娥如解妒還與試斜河留仲澤朝初猶濕紫宸霞暫輟旌旗擁使華馳馬彎弓真將種載書囊筆自名家江湖萬里春囘鴈燕趙千林月滿花明日升沈便霄壤更留玉樹倚蒹葭寄唐州幕官劉無黨白髮青衫宦苦卑邊荒誰識鳯麟姿河西落魄高書記劍外清貧杜拾遺紫玉山高傳楚夢蠙珠淵靜照黃陂禁中頗牧他年事先遣江淮草木知楊雲翼字之美樂平人以明昌五年登經義進士第一人詞賦亦中乙科天資穎發博通經傳至於天文律厯醫卜之學無不臻極事母孝與人友款曲周密處事詳雅而能以大節自任南渡後二十年與禮部閒閒公代掌文柄時人號楊趙而公以後輩自處不敢當也宣宗頻嵗南伐事勢有决不可者論議之際時相多以避嫌不敢言公獨直言極諫以為兩淮生靈皆陛下赤子不能外禦北兵而取償於宋以天下為度者不如是也是後再出兵時金一軍㡬為宋人所覆宣宗悔悟責主兵者曰我當何面目見楊雲翼也興定末拜吏部尚書中外望其旦暮入相竟以足疾不果正大五年八月終于翰林學士年五十九諡曰文獻子恕字誠之第進士大秦寺寺廢基空在人歸地自閒緑苔昏碧瓦白墖應青山暗谷行雲度蒼烟獨鳥還喚囘塵土夢聊此㺯澄灣烟雨涼氣先秋至重隂接望迷有無山遠近濃澹樹高低鳥雀枝間露牛羊舎北泥支頤政愁絶風雨過前溪侯右丞雲溪功成何許覓菟裘天地雲溪一釣舟夢破煩襟濯明月詩成醉耳枕寒流西風歸興隨黃鵠皎日盟言信白鷗政恐蒼生未忘在草堂才得畫中遊光林寺烟浮霜墖閉禪闗今落先生杖履間碧水同來㺯明月黃塵不解汙青山因縁多自成三宿物我終同付八還欲識光林全體露松花落盡嶺雲閒謾興乍寒簾幙一燈青從吏羇情爾許情葉擁西風秋有思天垂北斗夜無聲吟蛩遶夢家千里過鴈連愁月四更寄語黃華耐岑寂好看霜蘂到歸程李純甫字之純𢎞州人承安間進士仕至尚書右司都事三十嵗後徧觀佛書能悉其精微既而取道學書讀之著一書合三家為一就伊川橫渠晦菴諸人所得者而商略之毫髮不相貸且恨不同時與相詰難也灞陵風雪君不見浣花老人醉歸圖熊兒捉轡驥子扶又不見玉川先生一絶句徤倒莓苔三四五蹇驢駝著盡詩仙短策長鞭似有縁政在灞陵風雪裏管是襄陽孟浩然官家放歌殊不惡蹇驢大勝揚州鶴莫愛東華門外輭紅塵席㡌烏鞾老却人怪松謠阿誰栽汝來㡬時輪囷擁腫蒼虬姿鱗皴百怪雄牙髭拏空天矯蟠枯枝疑是秘魔巖中老慵物旱火燒天鞭不出睡中失却照海珠差入黃泉蜕其骨石鉗沙錮汗且僵埋頭臥角政摧藏試與摩挲定何似怒我掁觸鬚髥張壯士囚縛不得住神物世間無著處隄防夜半雷破山尾血淋漓飛却去史肅字舜元本京兆人僑居北京之和衆幼孤養於外家天資挺特高才博學作詩精微有理尤善用事古賦亦奇峭工于字畫業科舉為名進士立朝為才大夫優于政事所至有聲吏畏而安之累以亷陞歴赤縣及幕官入為監察御史遷治書出刺通州大中黨獄起為所詿誤謫靜難軍節度副使大安初召為中都路轉運副使超户部正郎復坐鐫降同知汾州事卒官别張信夫破壘殘星沒寒城曉角孤天低雲錯莫野曠雪糢糊小市千錢米征人丈八殳邊愁故未已不敢恨長途物化物化能忘我天遊不用心羶香羣蟻聚樹靜一蟬吟敗井勞深汲荒庭闕近尋枕書聊假息夕日半牆隂北潭竹隂松影玉蔥蘢十里平堤一徑通碧水乍開新鏡面青山都是好屏風寒蟬高鳥清愁外折葦枯荷小景中酒力未多秋興逸夕陽聊貸半林紅早出遵化朝來對酒不能觴看盡西風去鳥行山好未忘三日雅詩窮贏得一秋忙彊顔紅葉自由舞野性黃花無賴香多謝殷勤暮雲影更留淡墨寫溪光蕭貢字貞卿咸陽人唐太傅寘十七代孫博學能文不減前輩蔡正甫大定二十二年進士自涇州觀察判官召補省掾不四五月拜監察御史累遷右司郎中預修泰和律令歴大興同尹德州防禦使同知大名府事陜西西路轉運使河東北路按察轉運使靜難軍節度事南京都轉運使御史中丞以户部尚書致仕年六十六終于家諡曰文簡古採蓮曲洋洋長江水渺渺漲平湖田田青茄荷艷艷紅芙蕖酣酣斜日外苒苒涼風餘蒨蒨誰家子裊裊二八初兩兩并輕舟笑笑相招呼悠悠波上鴛潑潑蒲中魚采采不盈手依依欲何如漢歌華隂雙璧傳山鬼報道明年祖龍死草間豪傑伺天時攘袖撫衿爭欲起叢祠篝火妖狐語夥渉為王張大楚南公舊有三户謠東井新看五星聚中原茫茫走秦鹿天遣沛公興白屋大蛇斬斷素靈號蚩尤祭罷朱旗矗朅來扶義入闗中恩結人心帝道隆秦法煩苛猶一洗項王慓悍何勞攻三傑相須力人紀四老仍來安太子已令陸賈説詩書更詔孫通制儀禮阿翁著手規摹遠獨恨兒孫讀城旦王純霸雜寧不知不是不知知已晚按部道中寒城睥睨插山隅秋半霜風塞草枯月轉譙樓天未曉角聲吹徹小單于馬定國郢州城西亦有此末句當是偶同龎鑄字才卿大興人家世貴顯明昌五年進士風流文采為時輩所推字書亦有藴藉仕至京兆運使自號黙翁田器之燕子圖器之自敘云明昌丙辰予從軍塞外合鹵里山野舎荒涼難以狀言春末有雙燕亦巢此屋土人不之識屢欲捕之予曲為全䕶此燕晝出夜歸予必開户待之忽一日飛止坐隅都無驚畏巧語移時不去予始悟明日秋社此鳥當歸殆留别語也因作一詩贈之云㡬年塞外歴崎危誰謂烏衣亦此飛朝向蘆陂知有為暮投茅舎重相依君憐我處頻迎語我憶君時不掩扉明月西風悲鼓角君應先去我何歸此詩以細字寫之為蠟丸繋之燕足上明年四月予受代歸又八年泰和甲子任潞州觀察判官四月十二日偶坐廨舎之含翠堂忽雙燕至一飛簷户間一上硯屏予諦視之繋足蠟丸故在乃知此鳥葢往年贈詩者也因請同年龎君才卿畫為圖求諸公賦詩器之姓田名琢雲朔人明昌五年進士仕至山東路宣撫使田君才略燕雲客少年累有安邊策悔從筆硯取功名直要橫馳沙漠北塞垣春雪白皚皚東風未放𤣥隂開烏衣之國定何許一雙燕子能飛來三年驛舎安西道眼底鶯花無夢到忽見低飛入短簷此身似向邯鄲覺君居海東我中原相逢乃在穹廬前天涯流落俱為客感時念遠空澘然長安何限高高閣晝夜風閒開翠幕底事猜嫌不往依甘從此地風沙惡土人嗜肉無仁心一生弋獵誇從禽有巢幸穩勿浪出汝身未必輕千金朝來暮去益狎昵物我相忘情意一但怪重裘積漸添元是西風催社日須知音巧惟鷾鴯忽來坐隅如告辭我方留寓未歸得為君忍賦傷心詩詩成自述聊為戲繋足封之亦無意燕已歸飛我未歸刁斗聲中忽驚歳旄頭夜落妖氛收嫖姚獻凱歸神州玉闗早喜班超入北海不聞蘇武留君才經世寧終枉幕府須賢來上黨别後歸期兩及𤓰人間秋燕十來往沈沈官舎紅芳稀葛衣燕居澹忘機忽聞巧語入簷户大似相識來相依一飛簷外窺庭樹一上屏山驚不去解足分明得帛書真是當年留别句天生萬物禽最微固耶偶耶吾不知古道益逺交情醨朝恩暮怨雲遷移當時握手悲别離一旦富貴棄如遺聞予燕歌應自疑慎無示之嗔我譏王良臣字大用潞人承安五年進士作詩以敏捷稱又於内典有所得入翰林與李欽叔善從軍南征欽叔亦與行道中酬唱甚多有詩云蕎花冉冉蜜脾香禾穗纍纍鶻眼黃一縷晚烟吹不去為誰著意䕶秋霜欽叔愛之興定初自請北行沒于軍中贈孟州防禦使九月七日飲紫霞零落帶孤禽平楚蒼蒼秋意深月過初三半梳玉菊迎重九滿籬金天憐病骨商量暖雲促歸程㑹計隂風鴈飛來更瀟洒一枝蘆雪印波心雜詩二首老子平生酷愛閒天教行處得禪闗粥魚敲落簷頭月猶在梅花醉夢間殘陽收拾弟兄行揀得機心不到鄉安置小奴今夜夢蘆花風細月如霜高廷玉字獻臣恩州人大定末進士章宗衞王朝甚有時名為人豪爽尚氣節一時名士多歸之貞祐初自左右司郎官出為河南治中與知府復興屢以公事相可否時都城受圍使驛阻絶復興為安撫副使懼獻臣謀已乃以造逆誣之獻臣就逮龎才卿雷希顏王士衡辛敬之皆被羅織㡬有一網之禍比赦至獻臣瘐死矣獻臣多作詩賦海中牛頭云鑿開混沌竅闖出神農首人多稱道之天津橋同李之純待月驂鸞追散仙乘槎抵銀潢跳上玉龍背抱得銀蟾光素娥愁不歸再拜捧瑤觴問以天上事玊色儼以莊爾能為我歌白雪我亦為爾搗𤣥霜不然借我廣寒殿與爾長作無何鄉傍有謫仙人拍手笑我狂天風忽吹散人月兩茫茫飛山怨漢家自有飛將軍軍中駭嘆箭有神一朝乃與獄吏對惜無千金書牘背手把屬鏤口銜須號天者三我何辜伊吾壯志長已矣不得提攜玊龍死可憐休唱白浮鳩至今秦人悲杜郵道出平州寒食憶家栁色方濃别玉京程程又值石龜城山重水複人千里月苦風酸鴈一聲上國春風桃葉渡東陽寒食杏花餳楚魂蜀魄偏相妒兩地悠悠寄此情栁絮斷送春歸去紛飛不暫停和風三徑雪微雨一池萍蝶惹依芳草蜂沾過小庭靜宜投隙地狂欲攬青㝠得得穿朱户時時撲翠屏黃鶯枝上語似與訴飄零李遹字平甫欒城人明昌二年進士高才博學無所不通為人滑稽多智而不欲表表自見工畫山水得前輩不傳之妙龍虎亦入妙品然皆其餘事也使高麗去國五千里馬頭猶向東宦情蕉葉鹿世味蓼心蟲倦枕三更夢征衫八月風山川秋滿眼歸思寄孤鴻江村陸地無根客江村有髮僧兩盂殘喘粥一寸苦吟燈送窮昔年曽作送窮詩結栁齎糧擬退之送去還來因復語君家猶有讀書兒馮延登字子駿吉州人承安二年進士令寧邊日適閒閒公守此州與之考論文義相得甚歡故子駿詩文皆有律度正大末奉命北使見留使招鳯翔不從欲殺者久之割其鬚髥羈管豐州二年乃得還天興初授禮部侍郎京城陷自投井中宿三家寺老柏蒼蒼纒老藤招提牢落有殘僧暝禽自入藏經閣饑鼠時窺照佛燈未得安心如北秀却思覓法逐南能濛濛雨暗門前路更得雲房一曲肱寄笏青柯平飛雪驚沙捲屋茅清寒潑水透綈袍松風度壑江聲遠蘿月當軒扇影高敢對名山談世事不妨空腹貯離騷且將手版牢藏起政恐山人識馬曹華清故宮寵貴羊羔退曲江華清霧閣對雲窗層巒未了霓裳舞遷客俄驚羯鼓腔簷際疎星疑曉鏡天邊晴樹認高幢遊人尚喜風流在白石涵波皁莢雙高憲字仲常遼東人黃華之甥幼學于外家故詩筆字畫俱有舅氏之風天資穎悟博學彊記在太學中諸人莫敢與抗泰和三年乙科登第自言於世味澹無所好惟生死文字間而已寄李天英稻秸蒼蒼陂已枯西風剪剪㺯楸梧蒹葭水落魚梁迥蟋蟀聲高山驛孤社甕新成元亮酒并刀細落季膺鱸作詩遠寄霜前鴈人在海東天一隅趙元字宜之定襄人經童出身舉進士不中以年及調鞏西簿未㡬失明自少日博通書傳作詩有規矩泰和以後有詩名河東李屏山為賦愚軒有落筆突兀無黃初之句愚軒宜之自號也愚軒集中無甚好句因金源人甚推之勉存一二其膾炙人口者如鄰婦哭等詩意亦淺近不足録也書懐懶退無心廩與庖願攜諸子劚山磽閒消白日醒吟醉猛省浮生夢幻泡窈窕雲山三兔窟漂搖風樹一鳩巢聮名便入村家社莫認公卿是故交早發寶應龍門道中有感山僧送客客行東迴首雲寮夢寐中人語吚呦村店火㡌簷敧側石門風伊川遠映春冰綠少頂先攙曉日紅為問年來㡬還往只應烏鵲識衰翁密國公璹字子瑜興陵之孫越王之長子百年以來宗室中第一流人也少日學詩于朱臣觀學書于任君謨遂有出藍之譽文筆亦委曲能道所欲言朝臣自閒閒公楊禮部雷御史而下皆推重之賦資雅重薄于世味好賢樂善寒士有不能及者所居有樗軒又有如庵自號樗軒老人其詩號如庵小藁圍城中以疾薨時年六十一老境老境唯禪况幽居似寶坊酒盃盛硯水經卷貯詩囊懶甚書彌少閒多夢自長不知何處雨徑作夜來涼王生以秋騷見示謝之三年京國與君遊每恨知君尚未周始露雄文凌楚些又登長陌佩呉鉤燈殘茅店鷄催曉霜落金風鴈喚秋後夜文星出西洛仲宣知在水南樓思歸四時唯覺漏聲長㡬度吟殘蠟燼釭驚夢故人風動竹催春羯鼓雨敲窗新詩淡似鵞黃酒歸思濃如鴨緑江遙望翠雲亭下水滿陂青草鷺鷥雙秋晚出郭閒逰塵中俗事海漫漫暫出城闉借眼寛沙麓去邊羣牧小野雲平處一鵰盤殘荷露水秋光晚衰栁搖風古渡寒此幅大年橫景畫魯岡圖上似曽看自題寫真枯木寒灰久亦神因縁來現胙公身只縁酷愛東坡老人道前身趙德麟樗軒甞封胙國公書龍德公八景亭刻桷朱楹墮紺紗裙腰草色趂堦斜誰知剥落亭中石曽聽宣和玊樹花梁園一十八里汴堤栁三十六橋梁苑花縱使風光都似舊北人見了也思家王特起字正之代州崞縣人泰和三年進士調真定府錄事參軍有惠政改令沁原遷司竹監使廷議欲以館職召試㑹卒特起好學善議論音樂技藝無所不能其遊華山詩最為趙閒閒所賞漫作有時幽鳥話心事無限秋蟲誇口才北闕上書吾老矣東籬把菊思悠哉竹林留得巨源在蓮社招入淵明來不然餘子敗人意懐抱耿耿胡為開華山絶句三峰盤地軸一水落天紳造化無遺巧丹青總失真馮璧字叔獻别字天粹承安二年進士歴州縣召入翰林再為曹郎宣宗朝屢以使指鞫大獄權貴如歸德知府宿州總帥聲勢焰焰朝廷知其跋扈而不能摧伏者叔獻以法臨之毫髮不貸也幼有重名就所長論之館閣臺諫與賓客言乃其選也徒以小心奉法不畏彊禦故屢以城旦書屈之識者有用違其長之嘆興陵末以同知集慶軍節度使事致仕居崧山龍潭者十餘年諸生從之遊與四方問遺者不絶賦詩飲酒放浪山水間人望以為神仙焉年七十九終于家雨後看竝玊所控諸峰竝玊如高人壁立九千仞一日不見之令人生鄙吝春深木葉敷秀色益濡潤結茅寄僧藍晴碧時得趂老宿詫孫峰隅侍到齠齔連延青一色枚數須諦認溟濛空翠間我亦疑未信朝來雲氣昏埋沒瑜與瑾如蒼梧政愁湘妃鬱思舜重隂俄解駁霮濧夕暉襯娟娟忽層出歴歴分遠近雲峯互吞吐千狀纔一瞬出奇如孫吳相降如廉藺如衆星拱辰如侯伯入覲接武如朋簪承迎如价儐負固如吳楚爭長如齊晉怪詭如波斯駢羅貢琛贐窘蹙如擒獲係纍將就釁如應龍神靈蟄臥時奮迅如天駟超軼坰牧税羈靷如勁敵改容失箸駭疾震如猛士無譁攢槊俟嚴陣獨兩峰巍然魁傑儼崇峻光輔岳柱天鬱為中興鎮降生申及甫周室僨復振詩傳配崧高百世磨不磷和希顏虎守天門未易通庾塵無扇障西風主人何負盗憎主公論不明私害公老伏固非千里驥㝠飛似是五噫鴻紛紛往事渠知㡬都付崧巔一笑中雒帥覓蘭作詩以寄雲插高牙畫㦸新春移寶檻燕堂深水南紅藥初退舎嵩麓紫蘭今嗣音繭足頳肩坐香累高梁華柱豈渠心使君有問花應語玉樹誠佳非故林明皇撃梧桐圖三郎耳譜趂花奴風調才情信有餘天寶錯來非一拍霓裳中節亦區區習池醉歸圖襄漢方屯十萬兵習池日往不曽醒紛紛誤晉皆渠輩何獨王家一寧馨王若虚字從之槀城人承安三年經義進士師其舅周德卿及劉正甫得其論義為多博學彊記誦古詩至萬餘首他文稱是善持論李屏山杯酒間談辯鋒起時人莫能抗從之能以三數語窒之使噤不得語甚為名流所推釋褐鄜州録事歴門山令入翰林自應奉轉直學士居冷局十五年崔立之變羣小獻諂為立起功德碑以都堂命召從之從之外若遜辭而實欲以死守之時議稱焉北渡後居鄉里癸夘三月東遊與劉文季輩登泰山憇於黃峴峯之萃美亭談笑而化時年七十贈王士衡王生非狂者乃以善哭稱每至欲悲時不間醉與醒音詞初惻愴涕泗隨縱橫問之無所言坐客笑且驚王生不暇䘏若出諸其誠嗟我與生友此意猶未明絲染動墨悲麟亡傷孔情韓哀峻嶺陟阮感窮途行涕流賈太傅音抗唐衢生古來哭者多其哭非無名生其偶然歟何苦摧形神如其果有為為爾同發聲貧士歎甑無塵瓶無粟北風蕭蕭吹破屋入門四顧何凄涼稚子低睂老妻哭世無魯子敬郭元振之真丈夫故應餓死填坑谷蒼天生我亦何意葢世虚名食不足爭如只使冗且愚大腹便便飽粱肉病中學道今何得謀生久不成藍衫㡬棄物綘帳亦虚名事拙應天意交疎即世情煩憂時自解感觸又還生題淵明歸去來圖二首孤雲出岫暮鴻飛去住悠然兩不疑我自欲歸歸便了何須更説世相遺抛却微官百自由應無一事挂心頭銷憂更藉琴書力借問先生有底憂還家二首山杏溪桃化棘榛舞臺歌榭墮灰塵春來底事堪行處門外流鶯枉喚人囘思夢裏繁華事幸及當年樂此身閒立斜陽看兒戲憐渠虚作太平人麻九疇字知㡬莫州人三嵗識字七嵗能草書作大字有及數尺者故所至有神童之目章宗召見問汝入宮殿中亦懼怯否對曰君臣父子也子寧懼父耶上大奇之興定末府試經義第一詞賦第二省試亦然簾試以脱誤下第知㡬先有才名又連名甲選逺近想望風采雖牛童馬走亦能道麻九疇姓名正大三年右相侯蕭公趙禮部連章薦知㡬可試館職乃賜盧亞榜第二甲第一人及第授太祝權太常博士應奉翰林文字知㡬天資野逸高騫自便與人交一語不相合則逕去不返顧自度終不能與世合未㡬謝病去賦伯玊透光鏡太隂淪魄元不耀太陽分光成二曜嗚呼怪銅盜此幻透影在壁與背肖奩開㸌㸌光走庭劃如剸犀乍脱鞘泓澄秋落百丈潭疑有龍向天門跳秦娃漢婉化鴛土寵雨恩雲埋鳳詔當年椒塗鑑桃李身後泉臺映蓬藋枕簟無情草木香笙歌不暖梟狐嘯髑髏一醜不再妍不知持此將安照萬斛珠璣委俑人喚得偷兒成鬼剽借問金槌一控時何如海上青蠅弔壽如金石佳且好此銘此篆兩奇峭今誰子後曩誰先贏得鈿樞經蟻竅千古繁華一夢醒恍然入手稱神妙丹砂變紫翠羽青萬金難買人年少君侯新自洛陽來玊臺人物今温嶠相看大笑古人癡收鏡入奩還自笑竹癭冠為李道人賦東方有物字豐隆以鳴為職驅羣聾萬頭濈濈囚凍窟欲出不出愁天公迴寒作暖出一噫黒帝不敢藏昆蟲所以獨為六子長揮斥元氣周神功車轟鼓震頃萬里六甲雲風隨喚起四隂用事合收聲猶奮狂陽鳴不已號令非時遭物玩草木不凋花再蕾惱得司秋訴帝閽漏泄機緘法當死天公大怪下桎梏推落車中墮巖谷非程非馬亦非人化作蒼筤一枝竹勁氣剛風難遽銷夜聞風雨猶蕭蕭聳身直上三千尺天公又怪干雲霄鬼壓神縛不聽出只見白雲鎖三日雲散惟餘青屈盤頤隠於臍變仙質道人真是萬物盗斫取為冠就天巧秋霜爭敢上頭顱常與春風同醉倒此冠固奇惜未大有冠獨在方之外日月為藤織四時烟霞為籜綿千載天潢絶漢梁虚碧北斗旋衡簪沆瀣不隨脂粉侶狻猊不逐風霜陪獬豸一任旋乾復轉坤頭上峩峩終古在欲作檀那施此冠不識先生若為戴梁山宮圖梁山宮高高切雲秦家簫鼓空中聞宮殿作雲王作龍何人敢謁滈池君珠圍翠繞窮天下道上行人衣半赭不覺生靈血液枯化為宮上鴛鴦瓦朝盧生暮侯生師事二人學羨門焉知以政藏其身神仙亦死何曽神空能詐取六孱國不識盧生真間客種成間隙盧生去尚令道士作鬼語祖龍竟墮此機中以璧見欺猶未悟魚腥引得扛鼎來梁山火滅漢旗開何如後世丹青手一夫不役千樓臺梁山之圖却傳世梁山之宮安在哉陽夏何正卿作疊語四句未成章予復以疊語寄之凡四變緼緼蠢蠢何等民矯矯亢亢内守貞昻昻藏藏獨異俗落落莫莫丕厭貧歸與歸與且餬口鳯兮鳳兮德衰久樂云樂云無絃琴命乎命乎一杯酒匪鱣匪鮪故為臧避言避世必也狂至大至剛秣吾馬爰清爰凈循我牆用之捨之時所係晉如摧如寧復計暖然凄然任春秋優哉游哉聊卒嵗秋望雲氣東南壯風烟正北長遠人投屋小寒草帶城荒馴鴨便秋潦饑牛背夕陽閒情儘堪畫未要雨浪浪手植檜印章梁折山摧入小成日華留得寸暉明不盈一握空蟲篆未喪斯文麤姓名草木西周朝有暮圖書東觀死猶生二千年後司封紐未信栽時出此情秋懐昨夜新涼御褐裘一番節物㺯清愁月縣雙杵若為夜人在一隅偏覺秋敗葉只能驚畫扇啼螿終不到朱樓還鄉夢斷寒衾曉依舊雲山是蔡州李道人家山圖見説高齋住太行溪山襟帶古祠堂圭桐葉落周家雨鐵樹根盤晉國霜烽火不堪耕夜月畫圖猶可挂殘陽自憐不及汾州鴈春去秋來過石梁牛歎誰憐宿料一生無身後仍遭金十奴惟葢却教䝉狗馬不知何事負農夫清明村村榆火碧烟新拜掃歸來第四辰城裏看家多白髮遊春總是少年人紅梅一種冰魂物已尤朱唇㸃綴更風流歳寒未許東風管澹抹濃粧也自由劉從益字雲卿南山翁撝之曽孫大安元年進士拜監察御史坐與當路者辯曲直得罪去久之起為葉縣令未㡬被召百姓詣臺乞留不聽入授應奉翰林文字踰月以疾卒時年四十四過尉氏懐阮籍朝來國門遊暮抵蓬池宿有懐阮步兵豪氣無檢束嘯歌陟高臺長風振林木老眼何曽青四海無一物萬古留詩名九原銷醉骨居然方丈家惜也微瑕玊塗窮道不窮先生安用哭清和即事一度清明了一年温風嫋嫋雨班班㡬家繡幰尋芳去何處蹇驢䭾醉還宿草新墳驚世短落花流水占春閒曉鶯啼破松窗夢缺月東來挂屋山次韻三弟贈南菴老人一菴盤礴勝巢仙不入叢林恰是禪花圃蓮塘閒即景粥盂齋鉢老隨縁忘言已了八千偈適意更揮三兩絃邂逅我來推不去坐分一半好風烟宋九嘉字飛卿夏津人黃裳榜進士乙科歴藍田高陵扶風三水四縣令皆有能聲入為右警巡使應奉翰林文字正大中病失音廢居歿于癸巳之禍留别孫俊民姚公茂草根殘日射離觴主席風生熱肺腸此去兜零紅照夜輸君吹笛傍糟牀公茂此時固已知名于金矣詩不佳因其别公茂也存之酴醿菊酴醿風味醺人醉著莫東籬愛酒翁一夜金英全換骨冷香晴雪滿秋風雷淵字希顏别字季黙同知北京路轉運使事思之季子崇慶二年黃裳榜進士甲科釋褐涇州録事徐州觀察判官召為荆王府文學兼記室參軍轉應奉翰林文字同知制誥兼國史院編修官拜監察御史以公事免用宰相侯莘卿薦除太學博士還應奉終于翰林修撰㑹善寺松物生自有常怪特物之病嗟嗟此老蒼磊磊生魁柄侏儒蹙髀股宿瘤擁腮頸蜿蜒蛟龍戲騰擲貙虎競鬚髥喜張磔意氣怒狂迸匠石求柍桭節目足譏評芻蕘急薪槱堅悍空盻瞪靜言觀倚伏未易相弔慶雖違時世用顧免斤斧橫陽秋莫榮悴歳月何究竟盤盤曲則全挺挺獨也正小草誤掃迹伏神還守性儻随天中景廣宇共庥映讀孔北海傳漢室風流絶建安老瞞父子力排山可憐魯國真男子也著區區七子間宋元詩㑹卷六十三
